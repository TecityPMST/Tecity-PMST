<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tecity News Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbfbfa; --surface:#ffffff; --surface-2:#f6f6f4;
    --text:#16181d; --muted:#6c727e; --faint:#9aa0ab;
    --border:#ececec; --border-2:#e2e2e0; --ink:#16181d;
    --hover:#f4f4f2; --ring:rgba(20,23,28,.10);
    --shadow:0 1px 2px rgba(16,18,22,.04), 0 8px 24px rgba(16,18,22,.05);
    --shadow-sm:0 1px 2px rgba(16,18,22,.05);
    --wsj:#D85A30; --st:#1D9E75; --bt:#378ADD; --scmp:#D4537E;
    --maxw:1120px;
  }
  html[data-theme="dark"]{
    --bg:#0c0d10; --surface:#15171c; --surface-2:#1b1e25;
    --text:#eceef2; --muted:#9aa1ad; --faint:#6b7280;
    --border:#252830; --border-2:#2d313b; --ink:#eceef2;
    --hover:#1c1f26; --ring:rgba(255,255,255,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv02","cv03","cv04","ss01";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.6;
  }
  ::selection{background:rgba(120,120,120,.18)}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}

  /* header */
  header.top{position:sticky; top:0; z-index:20; backdrop-filter:saturate(180%) blur(14px);
    background:color-mix(in srgb, var(--bg) 82%, transparent); border-bottom:1px solid var(--border)}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 28px; max-width:var(--maxw); margin:0 auto}
  .brand{display:flex; flex-direction:column; gap:2px; min-width:0}
  .brand .title{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .brand .meta{font-size:12.5px; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:10px}
  select.date{appearance:none; font:inherit; font-size:13px; font-weight:500; color:var(--text);
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; padding:8px 32px 8px 12px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa0ab' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; cursor:pointer; transition:border-color .15s}
  select.date:hover{border-color:var(--ink)}
  .toggle{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; color:var(--muted); transition:.15s}
  .toggle:hover{color:var(--text); border-color:var(--ink)}
  .toggle svg{width:17px; height:17px}

  /* hero digest */
  .hero{padding:48px 0 14px}
  .hero .eyebrow{margin-bottom:16px}
  .digest{font-size:clamp(25px,3.6vw,37px); line-height:1.22; font-weight:400; letter-spacing:-.02em;
    max-width:none; color:var(--text)}
  .digest .lead{max-width:none}

  /* metrics */
  .metrics{display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:30px 0 8px}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px; box-shadow:var(--shadow-sm); transition:.18s}
  .metric:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .metric .v{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.05}
  .metric .l{font-size:12.5px; font-weight:500; margin-top:8px}
  .metric .s{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4}

  /* tabs */
  .tabs{display:flex; gap:26px; margin:34px 0 0; border-bottom:1px solid var(--border)}
  .tab{position:relative; cursor:pointer; padding:0 0 14px; font-size:14px; font-weight:500; color:var(--muted); transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px}

  .section{padding:30px 0 0}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px}
  .section-head h2{margin:0; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .section-head .hint{font-size:12.5px; color:var(--muted)}

  /* lead briefing card */
  .lead-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px 32px; box-shadow:var(--shadow); margin-bottom:16px}
  .lead-card .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:12px}
  .lead-card h3{margin:0 0 12px; font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1.2}
  .lead-card p{margin:0; font-size:15.5px; color:var(--text); line-height:1.65; max-width:none; column-width:34ch; column-gap:48px; column-fill:balance}

  /* briefing grid */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm); transition:.18s}
  .card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .card h3{margin:0 0 10px; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.3}
  .card p{margin:0; font-size:14px; color:var(--muted); line-height:1.62}

  /* coverage / bars */
  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm)}
  .bar-row{display:flex; align-items:center; gap:14px; margin:14px 0}
  .bar-row .name{width:42px; font-size:12.5px; font-weight:600; letter-spacing:.02em}
  .bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; border-radius:99px}
  .bar-row .cnt{width:26px; text-align:right; font-size:12.5px; color:var(--muted); font-weight:600}

  /* article */
  .feed-controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:4px 0 18px}
  .search{flex:1 1 260px; position:relative}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint)}
  .search input{width:100%; font:inherit; font-size:14px; color:var(--text); background:var(--surface);
    border:1px solid var(--border-2); border-radius:12px; padding:11px 14px 11px 38px; outline:none; transition:.15s}
  .search input:focus{border-color:var(--ink); box-shadow:0 0 0 4px var(--ring)}
  .pills{display:flex; flex-wrap:wrap; gap:8px}
  .pill{cursor:pointer; font-size:12.5px; font-weight:500; color:var(--muted); background:var(--surface);
    border:1px solid var(--border-2); border-radius:99px; padding:7px 13px; user-select:none; transition:.14s; line-height:1}
  .pill:hover{border-color:var(--ink); color:var(--text)}
  .pill.active{color:#fff; border-color:transparent}
  .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
  .count{font-size:12.5px; color:var(--muted); margin-bottom:14px}

  .article{padding:22px 4px; border-bottom:1px solid var(--border)}
  .article:first-child{padding-top:6px}
  .article .head{display:flex; align-items:center; gap:12px; margin-bottom:9px; flex-wrap:wrap}
  .src{display:inline-flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted)}
  .src .dot{width:8px; height:8px; border-radius:99px}
  .article h4{margin:0; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.32; flex:1; min-width:240px}
  .article h4 a{color:inherit; text-decoration:none; transition:color .15s}
  .article h4 a:hover{color:var(--wsj-hover, var(--muted))}
  .article .date{font-size:12px; color:var(--faint); white-space:nowrap}
  .article p{margin:6px 0 12px; font-size:14.5px; color:var(--muted); line-height:1.62; max-width:88ch}
  .tags{display:flex; flex-wrap:wrap; gap:7px}
  .tag{font-size:11px; font-weight:600; letter-spacing:.01em; border-radius:99px; padding:3px 10px; border:1px solid transparent}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:14px}
  footer{padding:48px 0 60px; color:var(--faint); font-size:12px; text-align:center}

  @media(max-width:980px){
    .metrics{grid-template-columns:repeat(3,1fr)}
    .cards{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap,.topbar{padding-left:18px; padding-right:18px}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .hero{padding-top:34px}
  }
</style>
</head>

<script>window.ALL_DAYS = {"2026-06-08": {"date": "2026-06-08", "dayOfWeek": "Monday", "totalArticles": 65, "sourceCounts": {"WSJ": 15, "ST": 17, "BT": 9, "SCMP": 24}, "executiveDigest": "A surprisingly strong US jobs report flipped the Fed from rate cuts toward hikes, detonating the Nasdaq's worst day in over a year, as Israel-Iran strikes resumed on the war's 100th day and Xi flew to Pyongyang.", "briefingCards": [{"title": "Lead story — Wall Street's worst day in a year", "body": "US equities suffered their sharpest fall in over a year as AI-spending doubts collided with rate fears: the Nasdaq dropped 4.2% and more than US$1.2 trillion was wiped from chip stocks (Micron, Intel and Super Micro all fell 11%+). The trigger was a surprisingly strong May jobs report (172k vs 80k expected) that pushed traders to bet the Fed's next move is a hike, not a cut — handing new chair Kevin Warsh an immediate fight. The WSJ frames it as over-reliance on a thinning band of megacaps; BT's columnists ask whether investors have simply become too optimistic. For Tecity, the rotation signals froth in AI names and renewed rate risk across the book."}, {"title": "Markets & finance — rates, currencies, S-REITs", "body": "Rates and currencies dominated: the 2-year Treasury yield hit a 16-month high of 4.16%, South Korea's won sank to its weakest since 2009 (prompting emergency intervention against speculators), and China's gold sales plunged about 90% as prices retreated from record highs. In Singapore, industrial S-REITs (CapitaLand Ascendas, Mapletree) posted resilient Q1 results with 10.6% rental reversions, while SGX firms were urged to master 'narrative' under value-up reforms as fundamentals alone no longer command premium valuations. Insider buying and buybacks stayed firm, led by Singtel. The cross-current: solid local fundamentals against a global tightening backdrop."}, {"title": "Asia realignment — Xi, Korea, Japan, the Quad", "body": "Xi Jinping makes his first foreign trip of 2026 to Pyongyang (June 8-9), his first in seven years, to reassert Chinese influence after Kim's tilt to Moscow — even as Kim Yo Jong declares the nuclear programme 'absolutely non-negotiable.' Japan edges toward a referendum to amend its pacifist Article 9 after pro-amendment forces secured a supermajority under PM Takaichi. The Quad's US$20 billion critical-minerals push aims to break China's 70-90% processing grip, while Beijing builds an 'economic fortress' screening outbound investment. Singapore's own diplomacy (FM Balakrishnan's rare Pyongyang trip) found little appetite for engagement."}, {"title": "Energy & climate — war premium, nuclear, data-centre power", "body": "The Israel-Iran war hit its 100th day with fresh strikes, keeping jet fuel around 70% higher and halving IATA's 2026 airline profit forecast to US$23 billion; the squeeze is a windfall for China's offshore-equipment shipyards now running flat out. Singapore advanced its nuclear option — a 2027 IAEA INIR review and a Sweden-backed study finding no major roadblocks to storing nuclear waste — as Malaysia's data-centre boom collides with clean-energy goals, with gas-fired power up 50.5% year on year. A separate study warned biodiversity loss could trigger sovereign-debt crises across US$83 trillion of assets."}, {"title": "Technology & AI — the IPO supercycle and China's price war", "body": "The IPO supercycle looms: SpaceX (trading June 12, ~US$1.77T valuation), Anthropic and OpenAI could add up to US$4 trillion in market value within months, with Google agreeing to pay SpaceX US$920 million a month for Nvidia-chip capacity. In China, DeepSeek's V4 triggered a brutal price war (Xiaomi cut API prices up to 99%), memory makers CXMT and YMTC neared mega-IPOs, and a Tibet quartz find could ease semiconductor-input dependence. Washington's tightened AI-chip export guidance and adviser Sriram Krishnan's exit add policy uncertainty. SoftBank's Son, now Japan's richest man, embodies both the AI euphoria and its fragility."}, {"title": "Singapore & SEA focus — housing, hub positioning, resilience", "body": "Singapore data points clustered around housing and resilience: 2,520 BTO flats with ~3-year waits launch in June, up to 3,550 new condo units are slated for H2 (analysts see a soft S$4,000 psf ceiling), and household net worth rose 6.7% even as debt grew faster at 8.2%. SIA Engineering deepened its aerospace MRO base with a US$118 million Safran JV for Leap engines, while JustCo's founder bought shares to shore up confidence after a weak IPO. Regionally, Taiwan is racing to become a 'China-free' drone hub and Malaysia wrestles with the energy cost of its data-centre ambitions. The throughline: Singapore positioning as a stable hub amid external volatility."}], "keyMetrics": [{"value": "−4.2%", "label": "Nasdaq's worst day", "sub": "Since the Apr 2025 tariff rout"}, {"value": "172k", "label": "US jobs added in May", "sub": "Beat 80k forecast; Fed eyes hikes"}, {"value": "US$1.2T", "label": "Chip value erased", "sub": "PHLX semiconductor index"}, {"value": "Day 100", "label": "Israel–Iran war", "sub": "Jet fuel +70%; airline profit halved"}, {"value": "620", "label": "China nuclear warheads", "sub": "+20 YoY (SIPRI)"}, {"value": "+6.7%", "label": "SG household net worth", "sub": "But liabilities up 8.2%"}], "articles": [{"id": "wsj-01", "title": "At Russia's Davos, Putin Tells His Soldiers to Keep Fighting", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "At Russia's St Petersburg economic forum, Putin rejected Zelensky's open-letter offer to meet and end the war, refusing even to name the Ukrainian leader and urging Russian soldiers to \"keep working, brothers.\" The event, stocked with MAGA-aligned American guests like Candace Owens, aimed to project international heft despite battlefield losses and falling poll ratings. Ukrainian drones struck within miles of the forum on its opening day. The rebuff marks one of Putin's sharpest rejections yet of direct negotiations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/At%20Russia%E2%80%99s%20Davos%2C%20Putin%20Tells%20His%20Soldiers%20to%20Keep%20Fighting.pdf"}, {"id": "wsj-02", "title": "Carnage in Chip Stocks Hits Extra Hard in Top-Heavy Market", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Nasdaq fell 4.2% (more than 1,100 points) in its worst day since the April 2025 tariff rout, as AI-spending doubts collided with rate fears after a strong jobs report. Micron, Intel, Super Micro and Sandisk each lost more than 11%, while Nvidia and Cisco fell over 6% and more than US$1.2 trillion was erased from the PHLX semiconductor index. The 2-year Treasury yield surged to 4.16%, a 16-month high, as traders priced in possible Fed hikes. The selloff underscores the market's dependence on a thinning group of megacap winners.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Carnage%20in%20Chip%20Stocks%20Hits%20Extra%20Hard%20in%20Top-Heavy%20Market.pdf"}, {"id": "wsj-03", "title": "Google to Pay SpaceX Nearly $1 Billion a Month in Cloud-Computing Deal", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Google will pay SpaceX US$920 million a month from October 2026 to June 2029 to rent data-centre capacity including at least 110,000 Nvidia chips, per a SpaceX securities filing. The deal expands SpaceX's AI business ahead of a June 12 IPO valuing the rocket company at US$1.77 trillion. SpaceX has pitched investors on orbital data centres to escape rising terrestrial energy costs, repurposing excess capacity from its Colossus clusters built to train Grok. Either party can cancel from next year with 90 days' notice.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Google%20to%20Pay%20SpaceX%20Nearly%20%241%20Billion%20a%20Month%20in%20Cloud-Computing%20Deal.pdf"}, {"id": "wsj-04", "title": "Iran Demands Cash for Peace. That's a Political Minefield for Trump.", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Talks to end the US-Iran war are stuck partly because Tehran wants early access to frozen assets — roughly US$12 billion up front and US$24 billion during a 60-day negotiation — which is politically perilous for Trump. Releasing cash would invite comparisons to the Obama-era payments Trump spent years attacking. Iranian adviser Mohsen Rezaei argued the sum \"is not much for America... This is our own, not America's money.\" Sporadic fighting continues as Trump alternates threats with predictions of an imminent breakthrough.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Iran%20Demands%20Cash%20for%20Peace.%20That%E2%80%99s%20a%20Political%20Minefield%20for%20Trump..pdf"}, {"id": "wsj-05", "title": "Kevin Warsh's Job Just Got a Lot More Complicated", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Two weeks into the job, Fed chair Kevin Warsh faces a bond market and White House pulling in opposite directions after Friday's strong jobs report pushed traders to bet on a year-end rate hike. Trump publicly complained that \"growth does not mean inflation\" as stocks sold off and the Nasdaq fell over 4%. Conditions have reversed since Warsh's January nomination: hiring has reaccelerated and the AI build-out is straining materials and electricity. He heads into his debut meeting this month amid talk of hikes beginning in December.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Kevin%20Warsh%E2%80%99s%20Job%20Just%20Got%20a%20Lot%20More%20Complicated.pdf"}, {"id": "wsj-06", "title": "May Jobs Growth Puts U.S. on a Strong Hiring Streak", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Finance & Markets"], "summary": "The US added a seasonally adjusted 172,000 jobs in May, far beating the 80,000 forecast, with unemployment steady at 4.3% and three straight months of strong gains. Leisure and hospitality (+70k), local government (+55k) and healthcare (+47k) led, while retail, information, finance and air transport shed jobs. Payroll gains have averaged 188,000 over three months, the best pace since March 2024. With inflation rising, the Fed's question has shifted from when to cut to whether to raise.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/May%20Jobs%20Growth%20Puts%20U.S.%20on%20a%20Strong%20Hiring%20Streak.pdf"}, {"id": "wsj-07", "title": "Senate Passes $70 Billion Border-Enforcement Bill Without Killing Trump 'Anti-Weaponization Fund'", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Politics"], "summary": "The Senate passed a US$70 billion border-enforcement package funding ICE and Border Patrol through Trump's term, 52-47, after a 19-hour overnight session, with Murkowski the lone GOP defector. Republicans declined to use their leverage to kill Trump's controversial US$1.8 billion \"anti-weaponization\" fund, letting vulnerable senators register objections without derailing the bill. Lawmakers feared the fund could compensate Trump allies or reward Jan 6 offenders. The House takes up the measure next week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Senate%20Passes%20%2470%20Billion%20Border-Enforcement%20Bill%20Without%20Killing%20Trump%20%E2%80%98Anti-Weaponization%20Fund%E2%80%99.pdf"}, {"id": "wsj-08", "title": "Small Stocks Are Trouncing Market Giants—and That's Not a Good Sign", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Finance & Markets"], "summary": "Smaller companies have quietly trounced megacaps in 2026: the Russell Microcap index is up 21% and the Russell 2000 nearly as much, versus 6% for the largest 50 and less for the Magnificent Seven. Penny stocks have jumped 28% since March 30 amid speculative frenzy, and three loss-making AI IPOs are poised to rank among the most valuable listings. The shift partly reflects the oil panic and rotation away from megacaps hit by higher energy costs. The author warns the outperformance signals froth that may not last.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Small%20Stocks%20Are%20Trouncing%20Market%20Giants-and%20That%E2%80%99s%20Not%20a%20Good%20Sign.pdf"}, {"id": "wsj-09", "title": "SoftBank CEO Masayoshi Son Was in Despair. An AI Spree Has Him Back on Top.", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Masayoshi Son has gone from despair three years ago to Japan's richest man, his SoftBank stake worth about US$100 billion after an all-in AI bet. SoftBank became Japan's most valuable company, ending Toyota's 23-year reign, on the back of a US$64 billion OpenAI stake, chip unit Arm, and a global data-centre spree including US$52 billion pledged for French sites. Son acknowledged a dot-com-scale AI downturn \"can happen any time,\" leaving the group highly exposed. Circular transactions and financial engineering have amplified its spending power and share price.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/SoftBank%20CEO%20Masayoshi%20Son%20Was%20in%20Despair.%20An%20AI%20Spree%20Has%20Him%20Back%20on%20Top..pdf"}, {"id": "wsj-10", "title": "The Metric CFOs Struggle to Track: AI Usage", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Finance chiefs are scrambling to track AI usage as vendors shift to per-token pricing, creating unpredictable costs. A KPMG survey found only 26% of companies have a comprehensive view of AI costs, 50% partial visibility and 22% none; some clients blew through annual token budgets in months or saw usage explode sixfold. Anthropic, OpenAI, Microsoft and Salesforce are among those metering enterprise pricing. CFOs accustomed to flat software fees are finding costs harder to model as they build AI agents.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/The%20Metric%20CFOs%20Struggle%20to%20Track%20AI%20Usage.pdf"}, {"id": "wsj-11", "title": "Trump Urges 'Less Shackled' Pulte to Fire Intelligence-Community Employees", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Politics"], "summary": "Trump said he wants incoming acting DNI Bill Pulte to begin firing a large number of intelligence-community employees, calling the ODNI \"unnecessary and/or too big.\" Pulte, currently FHFA director, was a surprise pick met with skepticism over his lack of national-security experience. Trump argued Pulte's acting status — up to 210 days without Senate confirmation — makes him \"less shackled\" to shake up the 18-agency apparatus before a permanent director arrives. Democrats and some Republicans voiced alarm.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Trump%20Urges%20%E2%80%98Less%20Shackled%E2%80%99%20Pulte%20to%20Fire%20Intelligence-Community%20Employees.pdf"}, {"id": "wsj-12", "title": "We're Preparing for the Wrong AI Labor Crisis", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "The essay argues that warnings from Senators Hawley and Sanders about AI causing mass white-collar unemployment misread the evidence. While entry-level hiring has weakened and firms like Meta and Amazon flatten hierarchies, aggregate labour demand remains stable with unemployment near 4.3% and payrolls still growing. AI is compressing the bottom layer of routine white-collar work rather than collapsing overall demand. The author warns policymakers risk legislating against the wrong problem.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/We%E2%80%99re%20Preparing%20for%20the%20Wrong%20AI%20Labor%20Crisis.pdf"}, {"id": "wsj-13", "title": "Why U.S. Presidents Misjudge Putin", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Geopolitics"], "summary": "The op-ed contends US presidents of both parties have repeatedly misread Putin by assuming his reasoning conforms to Western norms. It cites Trump's belief that Putin would negotiate in good faith, alongside Clinton's 2009 \"reset\" and Kerry's 2014 outrage over Crimea. A new Dutch book, \"Putin's Czarist Dream,\" argues his worldview has become as eschatological as Iran's clerics. The piece warns against persistent Western credulity toward the Kremlin's intentions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Why%20U.S.%20Presidents%20Misjudge%20Putin.pdf"}, {"id": "wsj-14", "title": "Xi to Leave China for First Time This Year. Destination: Pyongyang.", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Xi Jinping will visit North Korea on Monday and Tuesday, his first foreign trip of the year and first to Pyongyang in seven years, as he tries to reassert Beijing's influence after Kim's embrace of Moscow. The visit signals North Korea's rising importance among US adversaries increasingly coordinating with one another. Kim has supplied munitions and troops for Russia's war on Ukraine, warming Pyongyang-Moscow ties. Xi may seek to position himself as essential intermediary in any future US-North Korea diplomacy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/Xi%20to%20Leave%20China%20for%20First%20Time%20This%20Year.%20Destination%20Pyongyang..pdf"}, {"id": "wsj-15", "title": "'Like Two Cats Circling': Kamala Harris and Gavin Newsom Weigh a 2028 Showdown", "source": "WSJ", "date": "08 Jun 2026", "tags": ["Politics"], "summary": "Gavin Newsom and Kamala Harris, longtime Bay Area rivals, appear headed for a possible 2028 Democratic primary showdown. The two have shared mentors, donors and staff for two decades while alternately exchanging endorsements and snubs. Newsom, wrapping his second term as California governor, is widely expected to run; Harris, still stung by her 2024 loss, says she \"might.\" Early polls show both leading the potential Democratic field.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20WSJ/%E2%80%98Like%20Two%20Cats%20Circling%E2%80%99%20Kamala%20Harris%20and%20Gavin%20Newsom%20Weigh%20a%202028%20Showdown.pdf"}, {"id": "st-01", "title": "'Trusted and resilient': Taiwan's bid to position itself as a China-free drone hub", "source": "ST", "date": "08 Jun 2026", "tags": ["Technology & AI", "Defence", "Geopolitics"], "summary": "Taiwanese drone makers are seeing explosive export growth as they position the island as a \"non-red,\" China-free supply hub; Q1 2026 exports topped US$115 million, already eclipsing all of 2025. Most shipments went to the Czech Republic and Poland, with Ukraine the likely ultimate destination. The push is backed by a NT$44.2 billion (S$1.8 billion) government plan through 2030. Firms like Carbon-Based Technology are doubling workforces as countries seek drones free of Chinese components.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/%27Trusted%20and%20resilient%27%20Taiwan%27s%20bid%20to%20position%20itself%20as%20a%20China-free%20drone%20hub.pdf"}, {"id": "st-02", "title": "Airline profits to halve amid jet fuel price surge", "source": "ST", "date": "08 Jun 2026", "tags": ["Energy", "Trade"], "summary": "IATA halved its airline profit outlook for 2026 to US$23 billion from US$45 billion in 2025, blaming a 70% jet-fuel price surge from the Middle East war. Asia-Pacific profits are forecast to fall from US$9.8 billion to US$6.6 billion, as the region's reliance on Middle East crude creates fuel shortages and higher prices. Carriers are adjusting capacity, taking longer routes around airspace restrictions, and raising fares. Director-general Willie Walsh said all airlines are \"suffering.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Airline%20profits%20to%20halve%20amid%20jet%20fuel%20price%20surge.pdf"}, {"id": "st-03", "title": "France and allies eye national measures to pressure Israel over West Bank, say diplomats", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics"], "summary": "France is coordinating with several countries, reportedly including Britain and Norway, on national sanctions — asset freezes and travel bans — targeting individuals linked to settler violence in the occupied West Bank. The move follows EU deadlock over tougher measures against Netanyahu's government, which has expanded settlements diplomats say undermine a Palestinian state. Lists are not yet finalised and may differ by country. An announcement is expected within days.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/France%20and%20allies%20eye%20national%20measures%20to%20pressure%20Israel%20over%20West%20Bank%2C%20say%20diplomats.pdf"}, {"id": "st-04", "title": "How far would Australia propel Pauline Hanson's One Nation?", "source": "ST", "date": "08 Jun 2026", "tags": ["Politics"], "summary": "Australia is seriously debating whether anti-migrant firebrand Pauline Hanson's One Nation could reach power after the party led national polls for the first time. One Nation drew 29-30% in recent surveys, edging ahead of Labor, after absorbing voters from the fractured Liberal-National Coalition. The party won 23% in a South Australian state election and its first Lower House seat at a May by-election. Hanson, in Parliament since 1996, says she believes she could become prime minister.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/How%20far%20would%20Australia%20propel%20Pauline%20Hanson%27s%20One%20Nation.pdf"}, {"id": "st-05", "title": "IAEA INIR mission for Singapore's energy", "source": "ST", "date": "08 Jun 2026", "tags": ["Energy", "Southeast Asia"], "summary": "Singapore will begin Phase 1 of the IAEA's Integrated Nuclear Infrastructure Review in 2027, PM Lawrence Wong announced, as the city-state weighs nuclear among low-carbon options for its energy trilemma of security, affordability and sustainability. New bodies — EMA's Nuclear Energy Office and NEA's Nuclear Safety Division — reflect steady capability-building across promoter and regulator functions. The Singapore Nuclear Research and Safety Institute has developed reactor-safety and dispersion-modelling expertise since 2014. Advances in safer reactor technology have revived nuclear as a serious option.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/IAEA%20INIR%20mission%20for%20Singapore%27s%20energy.pdf"}, {"id": "st-06", "title": "Israeli strike kills nine in Gaza as Egypt hosts new ceasefire talks", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics"], "summary": "Israeli strikes on a Hamas-run police post and a vehicle killed at least nine people and wounded 20 in Gaza as Egypt hosted new ceasefire talks. Israel has intensified attacks on Hamas police, a sticking point in negotiations over Trump's plan for the enclave. Major fighting has been paused since October, but no deal has been reached on Israeli withdrawal, Hamas disarmament and reconstruction. Israeli troops still control more than half of Gaza, where 2 million residents are crammed into a coastal strip.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Israeli%20strike%20kills%20nine%20in%20Gaza%20as%20Egypt%20hosts%20new%20ceasefire%20talks.pdf"}, {"id": "st-07", "title": "JustCo CEO buys shares post-IPO", "source": "ST", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "JustCo founder Kong Wan Sing bought 500,000 shares of the flexible-workspace operator on the open market at prices below its 94-cent IPO, signalling confidence despite a weak debut. He paid 65.5 cents and 69.4 cents in two June tranches, lifting his total interest to 18.5%. Shares opened 11.5% below the IPO price and slid to 66.5 cents by June 5. Analysts said more must be done to demonstrate sustainable growth and profitability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/JustCo%20CEO%20buys%20shares%20post-IPO.pdf"}, {"id": "st-08", "title": "No major technical roadblocks prevent S'pore from storing nuclear waste, study shows", "source": "ST", "date": "08 Jun 2026", "tags": ["Energy", "Southeast Asia"], "summary": "A desktop study by Singapore's EMA, NEA and Sweden's SKB International found no major technical roadblocks to storing nuclear waste, possibly deep underground, should the Republic adopt nuclear energy. The 2023 study was made public in May 2026 alongside news of the 2027 IAEA assessment, which covers waste management among 19 critical areas. Future on-site surveys would be needed for a comprehensive assessment. Radioactive waste can remain hazardous for thousands of years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/No%20major%20technical%20roadblocks%20prevent%20S%27pore%20from%20storing%20nuclear%20waste%2C%20study%20with%20Swedish%20firm%20shows.pdf"}, {"id": "st-09", "title": "North Korea: Why diplomatic engagement is unlikely", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics"], "summary": "The analysis argues diplomatic engagement with North Korea remains unlikely, using Kim's armoured Taeyangho train as a metaphor for a regime that has institutionalised isolation as strategic advantage. Singapore FM Vivian Balakrishnan's rare May trip to Pyongyang concluded the regime had little appetite for diplomacy. North Korea holds an estimated 50 warheads and fissile material for 70-90 more. Decades of sanctions, isolation and economic pressure have failed to force it from its shell.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/North%20Korea%20Why%20diplomatic%20engagement%20is%20unlikely.pdf"}, {"id": "st-10", "title": "North Korea nuclear arms programme 'absolutely non-negotiable': Kim Jong Un's sister", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Kim Yo Jong, the powerful sister of Kim Jong Un, declared North Korea's nuclear weapons programme \"absolutely non-negotiable\" on the eve of Xi's June 8-9 visit. Pyongyang enshrined its nuclear status in its constitution in 2023 and has declared itself \"irreversible\" since the 2019 Trump summit collapsed. China remains a vital source of political and economic support. Kim has been emboldened by securing Russian backing for troops sent to fight in Ukraine.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/North%20Korea%20nuclear%20arms%20programme%20%27absolutely%20non-negotiable%27%20Kim%20Jong%20Un%27s%20sister.pdf"}, {"id": "st-11", "title": "Pentagon sees growing espionage threat from Israel", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "US intelligence reports warn that Israeli spy agencies have intensified eavesdropping on American negotiators working on an Iran peace deal, crossing a line that long-tolerated mutual spying had not. Targets reportedly include top negotiator Steve Witkoff and Pentagon policy chief Elbridge Colby. A DIA report raised the Israeli counter-intelligence threat to \"critical,\" its top level. The concern comes amid unprecedented US-Israeli military coordination against Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Pentagon%20sees%20growing%20espionage%20threat%20from%20Israel.pdf"}, {"id": "st-12", "title": "Singapore households' net wealth up, but also taking on more debt such as home loans", "source": "ST", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore household net worth rose 6.7% year on year to S$3.3 trillion in Q1 2026, but liabilities grew faster at 8.2% — the 10th straight quarter of accelerating borrowing. Assets rose 6.8%, slower than the prior quarter's 7.3%, meaning debt is now outpacing wealth accumulation. Total liabilities reached S$415 billion, much of it home loans. Analysts said systemic risk stays low given the sheer scale of household wealth, at 8.7 times annual take-home pay.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Singapore%20households%27%20net%20wealth%20up%2C%20but%20also%20taking%20on%20more%20debt%20such%20as%20home%20loans.pdf"}, {"id": "st-13", "title": "Study warns biodiversity loss could trigger wave of debt crises", "source": "ST", "date": "08 Jun 2026", "tags": ["Environment", "Finance & Markets"], "summary": "A study by economists at Sussex, Sheffield and Heriot-Watt warns financial markets are underpricing biodiversity loss, leaving some US$83 trillion of assets exposed and risking sovereign debt crises. Using an adjusted S&P methodology, partial ecosystem collapse could add US$162 billion to annual global sovereign interest payments and cut GDP by around US$2 trillion a year. India's rating could fall four notches and China's more than five under such scenarios. \"Financial markets are effectively blind to nature-related risks,\" said Sussex's Matthew Agarwala.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Study%20warns%20biodiversity%20loss%20could%20trigger%20wave%20of%20debt%20crises.pdf"}, {"id": "st-14", "title": "Sustainable jet fuel prices and aviation decarbonisation", "source": "ST", "date": "08 Jun 2026", "tags": ["Energy", "Environment"], "summary": "IATA called it \"obviously problematic\" that sustainable aviation fuel prices have climbed amid the Middle East war, even though green-fuel production costs are separate from conventional fuel. SAF prices rose from just over US$2,000 per tonne in February to about US$3,000 in May. Production has stagnated since December 2025 and will reach only 2.4 million tonnes in 2026 — under 1% of jet-fuel demand — despite capacity of nine million tonnes. IATA blamed policy structures favouring renewable diesel and uneven feedstock availability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/Sustainable%20jet%20fuel%20prices%20and%20aviation%20decarbonisation.pdf"}, {"id": "st-15", "title": "BTO flats launch in June with three-year waits", "source": "ST", "date": "08 Jun 2026", "tags": ["Southeast Asia"], "summary": "Singapore's HDB will offer 2,520 Build-To-Order flats with roughly three-year waits across three Sembawang and Ang Mo Kio projects in the June sales exercise, part of about 6,900 flats launching. The two Sembawang North projects carry shorter waits under three years, while Ang Mo Kio's is three years and one month. HDB said early planning with other agencies lets construction begin before launch. Sembawang Portico's two-years-seven-months wait is the shortest in the launch.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/TO%20flats%20launch%20in%20June%20with%20three-year%20waits.pdf"}, {"id": "st-16", "title": "US says it shot down Iran drones as war reaches 100th day", "source": "ST", "date": "08 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The US said it shot down two Iranian drones threatening the Strait of Hormuz as the war reached its 100th day with no end in sight. Mediator Pakistan delivered a \"special letter\" to Iran's leadership amid stalled efforts to turn a ceasefire into a settlement. The conflict has rattled global markets and pressured Trump ahead of US midterms. Ordinary Iranians described numbness and economic hardship as prices soar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/US%20says%20it%20shot%20down%20Iran%20drones%20as%20war%20reaches%20100th%20day.pdf"}, {"id": "st-17", "title": "US' Hegseth urges Europe on D-Day to counter present-day migrant 'invasion'", "source": "ST", "date": "08 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "US Defence Secretary Pete Hegseth used the 82nd D-Day anniversary in Normandy to urge Europe to counter a migrant \"invasion\" of its coastline and to spend more on its own defence. He pointedly skipped the main international commemoration ceremony. His remarks echoed Trump administration rhetoric and VP Vance's claim of European \"civilisational decline.\" He spoke before the 9,387 graves of American soldiers killed in the Battle of Normandy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20ST/US%27%20Hegseth%20urges%20Europe%20on%20D-Day%20to%20counter%20present-day%20migrant%20%27invasion%27.pdf"}, {"id": "bt-01", "title": "Can the stock market swallow SpaceX, Anthropic and OpenAI?", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX, Anthropic and OpenAI are lining up the largest IPOs in history, potentially adding up to US$4 trillion to US market value within months. SpaceX reportedly hopes to raise US$75 billion (trading June 12), with Anthropic and OpenAI rumoured to seek as much as US$60 billion each. A key worry is index compilers fast-tracking the trio, forcing trackers to buy and exhausting the buyer pool. The column argues America's deep, liquid market will absorb the listings, but to expect some \"indigestion\" afterward.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/Can%20the%20stock%20market%20swallow%20SpaceX%2C%20Anthropic%20and%20OpenAI.pdf"}, {"id": "bt-02", "title": "China builds an economic fortress as global tensions rise", "source": "BT", "date": "08 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "China is building an \"economic fortress,\" with the State Council imposing national-security screening on outbound investment and April rules letting authorities block foreign firms relocating supply chains. The measures aim to keep money, technology and companies inside the country amid rising tensions with the US and Europe. Analysts say they mark the end of the open-markets era that fuelled China's rise. Beijing has previewed the approach by blocking deals such as Meta's.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/China%20builds%20an%20economic%20fortress%20as%20global%20tensions%20rise.pdf"}, {"id": "bt-03", "title": "Have we become too optimistic about stocks?", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets"], "summary": "The columnist warns investors may have become too optimistic as major banks funnel resources into wealth franchises, presaging an \"avalanche of sales calls.\" Drawing on 1990s experience when Singapore and Malaysian banks first entered product-selling, it cautions that buttoned-down institutional culture is now pushing retail buyers toward risk. The piece frames occasional stock losses as inherent and unavoidable. It implies caution is warranted amid frothy markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/Have%20we%20become%20too%20optimistic%20about%20stocks.pdf"}, {"id": "bt-04", "title": "Ho Bee chair ups stake; M&G becomes substantial unitholder in NetLink NBN Trust", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Over four sessions to June 4, 22 SGX primary-listed companies conducted S$97 million of buybacks, led by Singtel's 13.3 million shares at S$4.33 under its S$2 billion programme. More than 80 director and substantial-shareholder filings covered over 40 stocks, with 17 acquisitions versus four disposals by directors or CEOs. Ho Bee Land executive chairman Chua Thian Poh lifted his deemed interest to 75.788%, while M&G became a substantial unitholder in NetLink NBN Trust. JustCo's CEO purchases also featured among the filings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/Ho%20Bee%20chair%20ups%20stake%20MG%20becomes%20substantial%20unitholder%20in%20NetLink%20NBN%20Trust.pdf"}, {"id": "bt-05", "title": "Industrial S-Reits maintain operational resilience while undertaking portfolio rejuvenation", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's industrial S-REITs posted resilient Q1 2026 results on positive rental reversions, healthy occupancy and active capital management while pursuing portfolio rejuvenation. CapitaLand Ascendas Reit reported over S$1.6 billion of accretive acquisitions at 4.3-7.4% yields, including a S$620.7 million debut Japan data-centre investment, with occupancy stable at 90.5% and reversions of 10.6%. Eight of 39 actively traded S-REITs hold industrial exposure. JLL expects higher-spec logistics demand to stay healthy, though occupiers could turn cost-conscious if global risks escalate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/Industrial%20S-Reits%20maintain%20operational%20resilience%20while%20undertaking%20portfolio%20rejuvenation.pdf"}, {"id": "bt-06", "title": "SIA Engineering, France's Safran in US$118 million JV for aircraft engine maintenance in Singapore", "source": "BT", "date": "08 Jun 2026", "tags": ["Southeast Asia", "Trade"], "summary": "SIA Engineering and France's Safran Aircraft Engines formed a US$118 million joint venture to build a full-fledged MRO shop in Singapore for CFM Leap engines that power the A320neo and Boeing 737 Max. Safran will hold 51% and SIAEC 49%, folding in existing quick-turn operations at Changi North. SIAEC will contribute up to US$57.8 million; the move would have lifted its EPS about 6.5%. The facility expands engine-servicing capacity and broadens maintenance services available in Singapore.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/SIA%20Engineering%2C%20France%27s%20Safran%20in%20US118%20million%20JV%20for%20aircraft%20engine%20maintenance%20in%20Singapore.pdf"}, {"id": "bt-07", "title": "South Korea unveils measures to stem won slide", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets"], "summary": "South Korea unveiled targeted measures to curb won weakness after the currency hit its weakest since 2009, pledging firm action against speculative trading. Finance Minister Koo Yun-cheol convened an emergency review with the central bank and regulators, vowing not to tolerate \"excessive volatility or one-sided moves.\" The plan includes tighter scrutiny of offshore non-deliverable forwards and investigations into illegal forex transactions. The won fell as much as 2% to 1,562.2 and is down over 7.5% in 2026, as Asian policymakers broadly defend currencies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/South%20Korea%20unveils%20measures%20to%20stem%20won%20slide.pdf"}, {"id": "bt-08", "title": "The new currency of markets is narrative; SGX companies must learn to master it", "source": "BT", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The commentary argues SGX-listed firms must master \"narrative\" as strong earnings and balance sheets no longer command premium valuations. Many fundamentally sound Singapore companies trade below intrinsic worth in a market increasingly driven by investor belief in future potential. Singapore's \"value-up\" initiatives, the theme of the 2026 Singapore Equities Forum, may mark one of the most important shifts in its equity market. Global capital today is mobile, comparative and narrative-driven, the author writes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/The%20new%20currency%20of%20markets%20is%20narrative%20SGX%20companies%20must%20learn%20to%20master%20it.pdf"}, {"id": "bt-09", "title": "Up to 11 new condo projects with 3,550 units lined up for H2 launch as price ceilings emerge", "source": "BT", "date": "08 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Up to 11 new condo projects totalling 3,550 units are slated for H2 2026 launch in Singapore, starting with four projects (1,679 units) in July, as clearer affordability ceilings emerge. Analysts do not expect average launch prices to breach the S$4,000 psf mark in the near term. The H2 tally stands at roughly the same level as the first half. The next wave is expected to push benchmarks higher while testing buyer appetite across sub-markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20BT/Up%20to%2011%20new%20condo%20projects%20with%203%2C550%20units%20lined%20up%20for%20H2%20launch%20as%20price%20ceilings%20emerge.pdf"}, {"id": "scmp-01", "title": "China adds warheads as nuclear powers 'walk away' from disarmament: SIPRI", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "SIPRI's latest yearbook says China added 20 nuclear warheads in the past year to reach 620 as of January 2026 and may be deploying more on missiles during exercises. China's stockpile is expected to keep growing over the coming decade, with an estimated 34 warheads now on operational forces, up from 24. China holds about 775 land-based missile silos. The think-tank warned major powers are \"walking away\" from disarmament as New Start's expiry ends the arms-control era.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/China%20adds%20warheads%20as%20nuclear%20powers%20%E2%80%98walk%20away%E2%80%99%20from%20disarmament%20SIPRI.pdf"}, {"id": "scmp-02", "title": "China powers green computing hub, smart factories amid AI push", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "China launched what it calls the world's first prefabricated energy hub for computing facilities in Qingdao, providing 100% green electricity to power data centres amid surging AI demand. Built by TGOOD, the modular hub cuts land footprint by over 30% and overall costs by 20% while syncing power and computing under a smart system. It will connect to enterprise data centres and national computing facilities in H2 2026. China is also establishing a four-tier nationwide smart-factory system.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/China%20powers%20green%20computing%20hub%2C%20smart%20factories%20amid%20AI%20push.pdf"}, {"id": "scmp-03", "title": "China urges SOEs, internet companies to offer more jobs as 12.7 million set to graduate", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Society", "Technology & AI"], "summary": "China is mobilising SOEs and major tech firms to expand hiring as a record 12.7 million university students graduate into a weak job market. Eight ministries launched a campaign requiring SOEs to hire from the 2026 class and recent unemployed graduates, with a centralised platform running until December. In a rare move, authorities surveyed internet-company vacancies and urged them to release more positions. It marks one of China's broadest labour-market interventions in years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/China%20urges%20SOEs%2C%20internet%20companies%20to%20offer%20more%20jobs%20as%2012.7%20million%20set%20to%20graduate.pdf"}, {"id": "scmp-04", "title": "China's gig economy is an employment reservoir – but is the well drying up?", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Society", "Technology & AI"], "summary": "More than 200 million Chinese are flexibly employed, but AI adoption, unstable income and weak social security make gig work increasingly precarious. The piece profiles a master's-degree-holding actress in Hengdian's micro-drama hub who fears being \"quietly replaced\" by AI. The gig sector has served as an employment reservoir amid a weak labour market. Structural pressures raise doubts about whether the well is drying up.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/China%E2%80%99s%20gig%20economy%20is%20an%20employment%20reservoir%20%E2%80%93%20but%20is%20the%20well%20drying%20up.pdf"}, {"id": "scmp-05", "title": "Chinese memory makers step up challenge to Korea's chip champions", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "China's leading memory-chip makers CXMT and YMTC are nearing public listings, posing a long-term challenge to South Korea's Samsung and SK Hynix. DRAM maker CXMT won approval for a nearly 30-billion-yuan (US$4.4 billion) Shanghai IPO, while NAND champion YMTC could file as early as June. Both benefit from an AI-driven memory upcycle and reflect China's evolution from catch-up player to credible global competitor. Analysts see limited immediate threat but significant long-term implications.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Chinese%20memory%20makers%20step%20up%20challenge%20to%20Korea%E2%80%99s%20chip%20champions.pdf"}, {"id": "scmp-06", "title": "DeepSeek V4 forces rivals to slash prices, rattling China's cloud providers", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI"], "summary": "DeepSeek's ultra-cheap V4 models have triggered a fresh price war among Chinese AI developers, pressuring rivals and unsettling cloud providers. Xiaomi slashed MiMo-V2.5 API costs by up to 99%, sending usage up more than 999% to 1.7 trillion tokens in a week and lifting it to sixth on US marketplace OpenRouter. AI unicorn MiniMax launched its M3 flagship pairing token billing with US$7-69 monthly subscriptions. The pricing shock is reshaping how China's cutthroat AI market monetises.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/DeepSeek%20V4%20forces%20rivals%20to%20slash%20prices%2C%20rattling%20China%E2%80%99s%20cloud%20providers.pdf"}, {"id": "scmp-07", "title": "European powers back Zelensky's call for summit with Putin", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics"], "summary": "The leaders of the UK, France and Germany backed Zelensky's call for direct ceasefire talks with Russia after defence meetings at 10 Downing Street, as the war stretched into its fifth year. Their joint statement supported direct dialogue with US and European participation, insisting \"international borders must not be changed by force.\" Zelensky had proposed a face-to-face meeting with Putin in a Thursday open letter. Putin ruled it out, seeing \"no point\" until a deal is agreed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/European%20powers%20back%20Zelensky%E2%80%99s%20call%20for%20summit%20with%20Putin.pdf"}, {"id": "scmp-08", "title": "Gold slump: China's sales plunge as precious metal's price dips, leaving buyers wary", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Finance & Markets"], "summary": "China's gold sales have plunged as prices pulled back from record highs, with one Shanghai dealer reporting daily sales down about 90% from 2-3kg to 100-200 grams. Consumers are holding off on investment-grade gold and jewellery amid fears of further price falls after a dramatic earlier rally. Spot gold dropped nearly 3% in May on shifting US rate expectations, a stronger dollar and profit-taking. Industry insiders expect underlying demand to endure given gold's cultural significance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Gold%20slump%20China%E2%80%99s%20sales%20plunge%20as%20precious%20metal%E2%80%99s%20price%20dips%2C%20leaving%20buyers%20wary.pdf"}, {"id": "scmp-09", "title": "Hong Kong tycoon bets China will overtake US economy 'in next decade or so'", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Hong Kong tycoon Gordon Wu, the 90-year-old Hopewell founder, predicted China will overtake the US as the world's largest economy \"in a decade or so,\" propelled by technology while Washington is weighed down by debt and defence spending. He called the US$39 trillion national debt and proposed US$1.5 trillion defence budget America's \"Achilles' heel.\" Yet he urged Hong Kong to look past geopolitics and court highly fluid American private wealth via its trading-hub role. The Princeton-educated engineer is dubbed the \"King of Highways.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Hong%20Kong%20tycoon%20bets%20China%20will%20overtake%20US%20economy%20%E2%80%98in%20next%20decade%20or%20so%E2%80%99.pdf"}, {"id": "scmp-10", "title": "How China is cashing in on a global scramble for offshore oil and gas", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Energy", "Trade"], "summary": "Rising oil and gas prices from the Iran war have been a windfall for China's offshore engineering equipment industry, which dominates over 50% of the global market. Chinese shipyards making floating rigs and wind-turbine installation vessels are running at full capacity as global offshore investment surges. Orders have not yet fully reflected the boom because yards are saturated. The sector had slumped in the late 2010s before this demand revival.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/How%20China%20is%20cashing%20in%20on%20a%20global%20scramble%20for%20offshore%20oil%20and%20gas.pdf"}, {"id": "scmp-11", "title": "Israel strikes Iran, defying Trump after 'I call the shots' claim", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "A fragile regional ceasefire appeared to collapse on the war's 100th day as Israel launched retaliatory air strikes on military targets in western and central Iran, with large explosions reported across Tehran, Tabriz and Isfahan. The strikes defied Trump, who had claimed \"I call the shots\" and said Israel would have to accept a deal. Isfahan hosts nuclear sites and military industries, though Iran said no urban zones were hit. Experts said Trump's credibility was being questioned as Israel ignored his warnings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Israel%20strikes%20Iran%2C%20defying%20Trump%20after%20%E2%80%98I%20call%20the%20shots%E2%80%99%20claim.pdf"}, {"id": "scmp-12", "title": "Japan prepares to drop its pacifist mask as the right rises", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Japan is edging toward a referendum on its pacifist constitution after a parliamentary realignment gave pro-amendment forces the two-thirds supermajority needed. Article 9 of the 1947 constitution has blocked Tokyo from maintaining a military with \"war potential\" for nearly eight decades. PM Sanae Takaichi, who won a February landslide, is seen as having the numbers, public mood and political will her predecessors lacked. Conservatives say momentum is building to finally amend it.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Japan%20prepares%20to%20drop%20its%20pacifist%20mask%20as%20the%20right%20rises.pdf"}, {"id": "scmp-13", "title": "Keir Starmer will be 'part of' any Labour leadership race, deputy says", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Politics"], "summary": "UK PM Keir Starmer will stand if a Labour leadership contest is triggered, Deputy PM David Lammy said, after reports Starmer called key backers insisting he would \"fight it.\" The move follows Manchester Mayor Andy Burnham signalling he would contest any race; Burnham is standing in a June 18 Makerfield by-election to return as an MP. A contest requires 81 MP signatures to launch. The Sun reported Starmer is \"hell-bent\" on running against Burnham.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Keir%20Starmer%20will%20be%20%E2%80%98part%20of%E2%80%99%20any%20Labour%20leadership%20race%2C%20deputy%20says.pdf"}, {"id": "scmp-14", "title": "Malaysia's gas-guzzling data centre boom clashes with its clean energy goals", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Energy", "Southeast Asia", "Technology & AI"], "summary": "Malaysia's ambition to be Southeast Asia's data-centre capital is clashing with its 2050 clean-energy goals as gas-fired power surges to feed the boom. The country had 54 operational data centres by end-2024, rising toward 81 by 2035, after 144.4 billion ringgit (US$36.3 billion) in approved investments from hyperscalers like Microsoft, Google and AWS. Gas-fired generation jumped 50.5% year on year in April to a record 5.54 TWh — its fastest pace in at least eight years. The two ambitions are \"pulling in opposite directions.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Malaysia%E2%80%99s%20gas-guzzling%20data%20centre%20boom%20clashes%20with%20its%20clean%20energy%20goals.pdf"}, {"id": "scmp-15", "title": "Open Questions: Nobel laureate James Heckman on risk-taking and China's 'common goal'", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Society", "Finance & Markets"], "summary": "Nobel laureate James Heckman, in an Open Questions interview, said the global economic outlook is poor amid Middle East fighting, rising oil prices and pervasive uncertainty. The University of Chicago economist discussed China's economic prospects, youth unemployment and whether it can overtake the US in science and technology. He emphasised the value of risk-taking and China's sense of \"common goal.\" His work spans inequality, social mobility and skills formation, including extensive China research.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Open%20QuestionsNobel%20laureate%20James%20Heckman%20on%20the%20value%20of%20risk-taking%2C%20and%20China%E2%80%99s%20%E2%80%98common%20goal%E2%80%99.pdf"}, {"id": "scmp-16", "title": "Park life: why China's malls are building forests, waterfalls and sky walkways", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Society"], "summary": "Chinese property developers are building shopping centres with forests, waterfalls and sky walkways as shoppers increasingly demand novelty and green space over conventional high-density malls. Savills' James Macdonald said consumers now treat retail as places to spend time, benefiting open, human-scale environments amid online-retail growth. Hong Kong's Swire Properties is investing 23 billion yuan (US$3.4 billion) in its first mainland Taikoo Place in Beijing, its single largest investment. Open-air formats also support events and nighttime consumption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Park%20life%20why%20China%E2%80%99s%20malls%20are%20building%20forests%2C%20waterfalls%20and%20sky%20walkways.pdf"}, {"id": "scmp-17", "title": "Past failures haunt Quad's US$20 billion critical minerals push", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "The Quad's newly announced US$20 billion critical-minerals framework aims to loosen China's near-monopoly on materials vital to defence, technology and clean energy. Success depends on Australia, the US, India and Japan moving beyond declarations, with analysts citing private-sector caution and a history of unfulfilled pledges. China leads refining for 19 of 20 strategic energy minerals, controlling 70-90% of processing for lithium, cobalt, graphite and manganese. Beijing has already restricted some dual-use shipments to Japan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Past%20failures%20haunt%20Quad%E2%80%99s%20US%2420%20billion%20critical%20minerals%20push.pdf"}, {"id": "scmp-18", "title": "Tibet quartz discovery boosts China's self-sufficiency push for hi-tech materials", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI", "Trade", "Energy"], "summary": "China discovered a new source of high-purity quartz in Tibet that could cut its reliance on US imports for making solar panels and semiconductors. A paper in the European Journal of Mineralogy found Tibetan leucogranites can yield quartz with silica content above 99.995%, exceeding hi-tech manufacturing thresholds. The material is a gold-standard input for products China's market often dominates. The discovery supports Beijing's self-sufficiency drive in critical materials.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Tibet%20quartz%20discovery%20boosts%20China%E2%80%99s%20self-sufficiency%20push%20for%20hi-tech%20materials.pdf"}, {"id": "scmp-19", "title": "Trump AI policy adviser Sriram Krishnan to leave position", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "Top White House AI policy adviser Sriram Krishnan said he will leave at the end of June, marking the exit of a leading figure shaping US frontier-tech policy. His departure comes as Trump weighs the US government acquiring stakes in AI firms, which the president likened to \"a partnership with the American public.\" Krishnan helped craft a national AI regulatory framework. Trump said he plans to meet AI executives as soon as next week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Trump%20AI%20policy%20adviser%20Sriram%20Krishnan%20to%20leave%20position.pdf"}, {"id": "scmp-20", "title": "US considers buying Chagos Islands from Mauritius, report says", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "US officials have drafted a proposal to bypass the UK and deal directly with Mauritius to control Diego Garcia, home to a joint US-UK airbase, a report says. The plan is among White House options offered as alternatives to Starmer ceding sovereignty of the Chagos Islands to Mauritius. A US official called Diego Garcia's Indian Ocean location \"vital and indispensable\" to national security. Britain put its handover deal on hold in April after Trump's criticism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/US%20considers%20buying%20Chagos%20Islands%20from%20Mauritius%2C%20report%20says.pdf"}, {"id": "scmp-21", "title": "Update: Israel hits Iran after taking missile fire, defying Trump to hold back", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Israel said it struck military targets in western and central Iran even after Trump reportedly told Netanyahu to refrain, imperilling the fragile April ceasefire. Trump said the strikes would not affect peace talks and insisted \"I call the shots... He doesn't call the shots,\" after rebuking Netanyahu with obscenities by phone. Iran fired a salvo of missiles at Israeli targets in retaliation, putting US-Iran talks at risk. Trump maintained a wider deal remains within reach.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/UpdateIsrael%20hits%20Iran%20after%20taking%20missile%20fire%2C%20defying%20Trump%20to%20hold%20back.pdf"}, {"id": "scmp-22", "title": "What does Washington's latest AI chip guidance mean for Chinese tech firms?", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Technology & AI", "Trade", "Geopolitics"], "summary": "China's Commerce Ministry condemned Washington's May 31 guidance requiring licences to export advanced computing items to entities headquartered in mainland China or Macau, even when operating abroad. Beijing accused the US of abusing export controls and disrupting the semiconductor supply chain. Trade lawyers said the document is more a clarification of a November 2023 rule than a new curb, with limited practical fallout. Chinese firms blocked from Nvidia's top chips have pivoted to Southeast Asian data centres.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/What%20does%20Washington%E2%80%99s%20latest%20AI%20chip%20guidance%20mean%20for%20Chinese%20tech%20firms.pdf"}, {"id": "scmp-23", "title": "Which company could become the Chinese Pfizer? Here are analysts' top picks", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Society", "Trade"], "summary": "Analysts expect a handful of Chinese biotech firms to sell drugs in Europe and the US under their own brands within 10-15 years, amid a boom in early-stage outlicensing. Outlicensing grants foreign firms rights to develop and commercialise drugs in return for upfront payments, milestones and royalties. Overseas markets, especially the US, are the most lucrative; America funds roughly three-quarters of global pharmaceutical profits with under 5% of world population. The debate centres on which firm could become a \"Chinese Pfizer.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Which%20company%20could%20become%20the%20Chinese%20Pfizer%20Here%20are%20analysts%E2%80%99%20top%20picks.pdf"}, {"id": "scmp-24", "title": "Will 'Trump-class' battleship be a sitting duck for Chinese carrier-killer missiles?", "source": "SCMP", "date": "08 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "A US congressional committee cast doubt on Trump's \"Golden Fleet\" programme, warning its nuclear-powered \"Trump-class\" battleship could overwhelm strained shipbuilding capacity. An amendment from Representative Joe Courtney requires the navy to report by March on building the BBG(X) battleship without disrupting existing nuclear programmes. One lawmaker warned battleships are vulnerable to China's PLA \"carrier killer\" missiles like the DF-21D. The move reflects doubts over reviving the US naval industrial base against Beijing's expanding fleet.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/8%20Jun%202026/08%20Jun%20SCMP/Will%20%E2%80%98Trump-class%E2%80%99%20battleship%20be%20a%20sitting%20duck%20for%20Chinese%20carrier-killer%20missiles.pdf"}]}, "2026-06-09": {"date": "2026-06-09", "dayOfWeek": "Tuesday", "totalArticles": 65, "sourceCounts": {"WSJ": 14, "ST": 18, "BT": 15, "SCMP": 18}, "executiveDigest": "Wall Street's rout rolled into Asia — South Korea's Kospi crashed 8.3% into a circuit breaker — as Israel and Iran traded missiles before Trump pressed both to 'stop shooting,' and Xi courted Kim in Pyongyang.", "briefingCards": [{"title": "Lead story — the tech rout sweeps Asia", "body": "Friday's Wall Street selloff rolled through Asia on Monday: South Korea's Kospi plunged as much as 8.8% and shut for a 20-minute circuit breaker before closing down 8.3% (Samsung -10.2%, SK Hynix -7.7%), Japan's Nikkei fell 3.9%, and Singapore's STI lost 1.7%. The trigger was the same AI-valuation anxiety plus Fed-hike fears after the strong US jobs print, with Broadcom's soft guidance and a rotation into the imminent SpaceX IPO adding pressure. Ray Dalio called the concentration \"classic bubble stuff.\" WSJ ('Bracing for Rockier Times'), BT ('Tech rout sweeps Asia') and ST ('Singapore stocks slide') all converged on the same fragility — directly relevant to any AI-heavy book."}, {"title": "Markets & finance — Fed fears, FX stress, gold", "body": "Markets priced ~50% odds of an October Fed hike, driving a broad Asian currency selloff: the rupiah hit record lows past 18,000/USD and the yen and won sank to multi-year lows, though the Singapore dollar bucked the trend. Gold slid near year-lows even as OCBC launched physical-gold trading and Singapore was tipped to become ASEAN's gold-clearing hub as Malaysia and Indonesia raise duties. In China, record panda-bond issuance, Tencent's expanded US$30B note plan, and savers shifting from deposits into tech funds all signalled a hunt for yield. Japan's resilient GDP keeps a BoJ hike on the table next week."}, {"title": "Asia realignment — Xi-Kim, Korea-Japan, the blacklist", "body": "Xi told Kim he'd lift China-North Korea ties to 'new heights' on his first Pyongyang visit since 2019, even as Seoul's President Lee demanded a genuine Japanese apology before any military-logistics pact — underscoring friction among US allies as North Korea, China and Russia draw closer. Washington escalated tech rivalry by adding Alibaba, BYD, Baidu and dozens more to its 'Chinese military companies' blacklist. Yet China's exports defied the war, surging 19.4% in May. PM Wong, previewing Singapore's 2026 ASEAN chairmanship, likened US-China interdependence to a new 'mutually assured destruction' and pushed for connectivity."}, {"title": "Energy & climate — Hormuz still shut, oil creeps up", "body": "With the Strait of Hormuz closed for 100+ days, OPEC+ approved a fourth, largely symbolic output hike (~188k bpd) as Brent rose over 4% to ~US$98 on the renewed Israel-Iran strikes. IATA warned jet fuel could hit US$152/barrel in 2026 and that high airfares will linger, while a separate column predicts an oil 'flood' within weeks of any reopening. Singapore leaned into resilience — expanding underground district cooling — and BT commentators urged Southeast Asia to lead an energy transition built on cheap solar, storage and nuclear baseload. Ireland's 'bring your own power' rule for data centres points to the same grid-strain reckoning."}, {"title": "Technology & AI — SpaceX week and the China stack", "body": "SpaceX's record IPO (~US$1.75T, listing this week) split index providers — Nasdaq will fast-track it, S&P won't — even as a WSJ investigation showed how embedded it is in the US 'war machine' (~US$4B government revenue). Nvidia's Jensen Huang locked in SK Hynix and Naver memory deals in Seoul; Alibaba consolidated AI under a new 'Token Foundry'; Apple gave Siri a Gemini-powered makeover at WWDC; and Temasek led a US$300M round in industrial-AI startup PhysicsX. Banks signalled AI-driven job cuts while HSBC insisted on 'human judgment.' Singapore launched its Aspire 2B national supercomputer."}, {"title": "Singapore & SEA focus — AI push meets softer growth", "body": "PM Wong called AI a potential 'game changer' for labour-short Singapore as the nation launched the Aspire 2B supercomputer and two-thirds of firms said they'd pay a premium for AI skills — even with hiring sentiment at its lowest since 2021. But economists trimmed 2026 growth to 3.3% and lifted inflation forecasts, citing Middle East energy and supply-chain risks. Wealth-management themes clustered: OCBC's physical-gold launch, Singapore's gold-hub ambit
