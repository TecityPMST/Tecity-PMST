ial guarantee for the Lake Mariner data-center cluster in New York, whose compute is rented to Anthropic. It is mimicking Nvidia's playbook of guarantees and circular financing to win customers for its tensor processing units, and struck a $5 billion deal with Blackstone to launch a cloud venture rivaling CoreWeave and Nebius. Nvidia's Jensen Huang plays down Google, arguing Anthropic is the TPU's only significant external customer. A Cloud leadership shake-up has added urgency.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Google%20Is%20Using%20Nvidia%E2%80%99s%20Playbook%20to%20Build%20a%20Rival%20AI%20Chip%20Business.pdf"}, {"id": "wsj-07", "title": "Grok Flubbed This Investing Test, Even With a Crystal Ball. I Did Too.", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Elm Wealth revived its 'Crystal Ball Challenge,' giving leading AI models a fictional $1 million and old WSJ front pages with market outcomes blacked out, to trade ahead of the news. Claude did best by far, averaging $2.6 million and parsing headlines well, while Gemini and Grok lost money on average by over-betting. The lesson, echoing founder Victor Haghani's LTCM blowup, is that risk management matters more than predicting headlines. Haghani now advocates index funds even with a slightly smudged crystal ball.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Grok%20Flubbed%20This%20Investing%20Test%2C%20Even%20With%20a%20Crystal%20Ball.%20I%20Did%20Too..pdf"}, {"id": "wsj-08", "title": "Hormuz Reopening Brings Relief for Global Economy", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "The planned reopening of the Strait of Hormuz fades the specter of an energy crunch and severe global downturn, but unwinding the damage will take months as mines are cleared and damaged fields and refineries restart. Brent traded around $78 on Thursday, versus a peak above $118 in March, but economists warn of sticky inflation as energy costs feed through to food and electricity over the coming year. Central banks including the Fed and BoE shelved rate-cut plans, and the ECB already raised. 'The world economy isn't what it used to be... more fractured now.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Hormuz%20Reopening%20Brings%20Relief%20for%20Global%20Economy.pdf"}, {"id": "wsj-09", "title": "Hormuz Reopening Shifts Focus to Gulf Oil Storage and Shipping", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Energy"], "summary": "With Hormuz gradually reopening, Gulf producers face a logistical test clearing shipping bottlenecks, with only around 6-10 verified transits a day versus more than 100 before the war. Rystad's Jorge Leon estimates traffic could take four to six months to return to prewar levels, as shipowners regain confidence and insurers cut premiums. Saudi Aramco is weighing expanding storage capacity worldwide, and energy security is set to become a bigger priority. Hormuz-bypass routes such as Saudi Arabia's Red Sea link and the UAE's Fujairah pipeline helped but were no substitute.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Hormuz%20Reopening%20Shifts%20Focus%20to%20Gulf%20Oil%20Storage%20and%20Shipping.pdf"}, {"id": "wsj-10", "title": "Israel, Hezbollah Agree to Renewed Ceasefire as Iran Peace Talks Postponed", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel and Hezbollah agreed to a renewed ceasefire on Friday after fighting intensified and threatened to derail US-Iran talks, prompting VP JD Vance to postpone his Switzerland trip. Iran called Israel's strikes a breach and sought guarantees they would end before negotiations; Supreme Leader Mojtaba Khamenei said Trump agreed to the deal 'out of desperation,' drawing the retort 'They are FINISHED!' Lebanon's health ministry reported at least 47 killed and about 100 injured. Israel said four soldiers died in a Hezbollah drone strike and that it conducted more than 150 strikes in response.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Israel%2C%20Hezbollah%20Agree%20to%20Renewed%20Ceasefire%20as%20Iran%20Peace%20Talks%20Postponed.pdf"}, {"id": "wsj-11", "title": "Secretive Wall Street Powerhouse Jane Street Seizes the AI Spotlight", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Jane Street, the famously secretive trading firm with 3,500 staff and profits now topping Goldman Sachs and Morgan Stanley, is stepping into the spotlight as it pushes to become an AI powerhouse, planning to recruit more than 500 employees this year. Its gains have been helped by investments in Anthropic and other private companies, and in April it invested $1 billion in CoreWeave and committed $6 billion to use its AI cloud. The firm is leaning into its wonky, math-department image to attract talent. Its activities are drawing scrutiny, including market-manipulation accusations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Secretive%20Wall%20Street%20Powerhouse%20Jane%20Street%20Seizes%20the%20AI%20Spotlight.pdf"}, {"id": "wsj-12", "title": "Tech Investor Prosus Posts Core Earnings Rise on Growth Across Units, Tencent", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Prosus, Tencent's largest shareholder, expects fiscal 2026 core headline earnings per share for continuing operations to rise 19% to 28%, boosted by its own operations and its Tencent stake. Revenue from its 'Ecosystem' unit (formerly e-commerce) exceeded $7.3 billion, up from $6.2 billion in fiscal 2025, with adjusted EBITDA of $1.1 billion. Growth is driven mainly by consolidated businesses in Latin America, Europe and India. Prosus continues to gradually trim its Tencent stake but remains committed; results are due June 29.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Tech%20Investor%20Prosus%20Posts%20Core%20Earnings%20Rise%20on%20Growth%20Across%20Units%2C%20Tencent.pdf"}, {"id": "wsj-13", "title": "Turbocharged Earnings Are Pushing Stocks Higher. There's a Catch.", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "S&P 500 earnings growth is expected to top 20% for a second consecutive quarter, lifted by soaring profits at semiconductor and AI-infrastructure firms, lending crucial support to the stock market. But a Morgan Stanley analyst calls it 'a golden window where everybody looks good' because hyperscaler AI-capex costs are deferred and recognized only gradually as depreciation. A big wave of depreciation expense is coming, and its size is unclear: the standard deviation of Meta's 2028 depreciation estimates blows out to 24% of the average, versus just 4% for revenue. That divergence leaves future margins vulnerable.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Turbocharged%20Earnings%20Are%20Pushing%20Stocks%20Higher.%20There%E2%80%99s%20a%20Catch..pdf"}, {"id": "wsj-14", "title": "U.S., Qatar Work to Give Iran Access to Billions of Dollars in Frozen Cash", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "The US is working with Qatar to make billions in frozen Iranian funds available for humanitarian spending, starting with $6 billion held in Qatar of an estimated $100 billion frozen worldwide. The facility could be a template for releasing the first tranche of the $24 billion Tehran wants freed, as an early incentive under Wednesday's war-ending deal. Iran still needs to agree, and critics say the deal gives Tehran payoffs before nuclear concessions. Trump insisted 'they get no money, not ten cents' even as his administration committed to make the assets 'fully available for use.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/U.S.%2C%20Qatar%20Work%20to%20Give%20Iran%20Access%20to%20Billions%20of%20Dollars%20in%20Frozen%20Cash.pdf"}, {"id": "wsj-15", "title": "Warsh's First Test as Fed Chairman: Reading the AI Boom", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "New Fed Chair Kevin Warsh's first challenge is reading the AI build-out, which can be interpreted two ways: either the productivity payoff is imminent and the Fed should sit still, or it is years off while demand overheats the economy now, forcing hikes. Warsh reaches for 1990s history under Greenspan, favoring the confident 1996 instinct that 'strong productivity-led growth is not something we fear,' though the economy may hand him the 1999 lesson that ended in the dot-com bust. The Fed held steady, with nearly half of officials seeing rates rising by year-end. Chicago Fed's Goolsbee argues an anticipated boom can overheat as people spend against the future.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Warsh%E2%80%99s%20First%20Test%20as%20Fed%20Chairman%20Reading%20the%20AI%20Boom.pdf"}, {"id": "wsj-16", "title": "What's Next for Trump's Iran Deal?", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "Trump's deal to reopen Hormuz is essentially a 60-day ceasefire MOU, not an end to Iran's nuclear program; the 'Phase One' trade lifts the US blockade and allows oil sales in exchange for reopening the strait. 'Phase 2' seeks an actual nuclear deal, but closed-door talks hit a stumbling block Friday and few expect a breakthrough. Eric Brewer warned 'the odds of failure are higher than the odds of success.' Spoilers include Iran covertly racing for a bomb or a reignited Israel-Hezbollah conflict; the path traces back to the June 2025 '12-day war' and US strikes on three nuclear sites.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/What%E2%80%99s%20Next%20for%20Trump%E2%80%99s%20Iran%20Deal.pdf"}, {"id": "wsj-17", "title": "Who Is Andy Burnham? Meet Britain's Likely Next Prime Minister", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Politics"], "summary": "Andy Burnham, the 'King of the North' and until this week Greater Manchester's mayor, easily won a by-election to re-enter Parliament, setting up a leadership challenge to PM Keir Starmer. His pitch is that only he has the charisma to save Labour from defeat and see off Nigel Farage's poll-leading Reform UK. Burnham sketches a 'business-friendly socialism' that decentralizes power to the deindustrialized north, citing admiration for NYC Mayor Zohran Mamdani. A win would push Britain's politics further left behind a more telegenic frontman, though his program remains light on detail.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Who%20Is%20Andy%20Burnham%20Meet%20Britain%E2%80%99s%20Likely%20Next%20Prime%20Minister.pdf"}, {"id": "wsj-18", "title": "'I'm the President and You're Not': Trump Tests His Power and Frustrates the GOP", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Politics"], "summary": "Seventeen months into his second term, Trump is increasingly relying on his own gut instincts, dismissing advisers with 'I'm the president and you're not' and frustrating Republicans who fear a midterm backlash. Senator Bill Cassidy called the Iran deal 'the worst foreign policy blunder in decades.' Trump also blew up Senate plans to confirm an intelligence chief and renew a spying law, refusing to sign unless a voter-ID bill passes. He has said he doesn't care about the midterms and 'I love the inflation,' stunning allies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/%E2%80%98I%E2%80%99m%20the%20President%20and%20You%E2%80%99re%20Not%E2%80%99%20Trump%20Tests%20His%20Power%20and%20Frustrates%20the%20GOP.pdf"}, {"id": "st-01", "title": "AI Simplifies OCBC Employees' Customer Service Tasks, Increases Productivity", "source": "ST", "date": "22 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "OCBC's introduction of AI at its Customer Service Centre in late 2024 has sharply boosted productivity, with service manager Nura Shereen Nordin now saving around 20 working hours a month. AI tools detect issues in real time and route customer feedback to the right departments faster, while the number of calls received has fallen to just one-fifth of previous levels. The bank also uses AI to anticipate inquiry volumes, such as Hari Raya demand for new banknotes. The case illustrates how Singapore's banks are operationalizing AI in frontline service.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/AI%20simplifies%20OCBC%20employees%27%20customer%20service%20tasks%2C%20increases%20productivity.pdf"}, {"id": "st-02", "title": "Iran War Gives Pakistan Its Biggest Diplomatic Boost in Decades", "source": "ST", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "Pakistan emerged as a central mediator in the Iran war, with PM Shehbaz Sharif the first to announce the truce and his signature on the 'Islamabad Memorandum of Understanding' alongside Trump and Pezeshkian. Sharif and military chief Asim Munir hosted talks and passed messages via back channels, giving Pakistan global heft it has lacked for decades. The role helped pull Pakistan from India's shadow, cement ties with Washington, the Gulf and Beijing, and could attract investment for its war-shattered economy. One analyst said Pakistan went 'from having virtually no influence... to being a player of consequence.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Iran%20war%20gives%20Pakistan%20its%20biggest%20diplomatic%20boost%20in%20decades.pdf"}, {"id": "st-03", "title": "Israeli Soldiers in Lebanon Free to Take Action if Under Threat, Katz Says", "source": "ST", "date": "22 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli Defence Minister Israel Katz said soldiers are free to act without restriction to eliminate threats in Lebanon, with troops remaining in a roughly 10km 'security zone.' A ceasefire with Iran-backed Hezbollah took effect on June 19, but June 20 Israeli strikes killed at least 20 people, which Israel said responded to projectiles fired at its troops. A Hezbollah official said the group remains committed to the ceasefire as long as Israel adheres but denies Israeli freedom of movement in the south. The lull marked the longest spell without major strikes since the Lebanon war began on March 2.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Israeli%20soldiers%20in%20Lebanon%20free%20to%20take%20action%20if%20under%20threat%2C%20Defence%20Minister%20Katz%20says.pdf"}, {"id": "st-04", "title": "Markets Rally with US-Iran Deal; SpaceX Ends First Week 14% Up", "source": "ST", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Markets cheered the first steps toward US-Iran peace, with the Straits Times Index hitting a 52-week high of 5,212.84 on June 18 before easing to 5,192.7, up more than 3% on the week. Brent crude fell below US$80 for the first time in three months, though Iran said it reclosed Hormuz on June 20 after Israeli strikes on Lebanon. Japan's Nikkei rose nearly 8% to a high of 71,250 and Korea's Kospi gained 5%, while Hong Kong's Hang Seng fell 3%. SpaceX ended its first week of trading 14% up.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Markets%20rally%20with%20US-Iran%20deal%20SpaceX%20ends%20first%20week%2014%20up.pdf"}, {"id": "st-05", "title": "Report Says British PM Keir Starmer Ready to Quit, but Source Says He Is Still Focused on the Job", "source": "ST", "date": "22 Jun 2026", "tags": ["Politics"], "summary": "Britain's Observer reported PM Keir Starmer was expected to resign on June 22 and set a departure timetable, though a government source said he remains focused on governing. Pressure spiked after rival Andy Burnham won a parliamentary seat on June 19, enabling a formal leadership challenge. More than 100 Labour MPs, roughly a quarter of the party's Commons representatives, have publicly urged him to quit or set an exit timetable. His departure would install Britain's seventh prime minister in just over a decade, the highest turnover in nearly two centuries.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Report%20says%20British%20PM%20Keir%20Starmer%20ready%20to%20quit%2C%20but%20source%20says%20he%20is%20still%20focused%20on%20the%20job.pdf"}, {"id": "st-06", "title": "Taiwan to Stage Five Days of Combat Readiness Drills", "source": "ST", "date": "22 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan's military will hold a five-day 'Immediate Combat Readiness Exercise' from June 22 to 26, shifting training from set-piece events toward realistic war simulations. Drills increasingly model a scenario in which China suddenly turns one of its regular exercises around the island into an actual attack, using 'actual troops, on actual terrain, in real time.' On the same day, Taiwan said China sent 21 aircraft, including J-16 fighters, KJ-500 early-warning planes and Y-20 refuelling aircraft, with 19 operating to the island's southwest and into the Western Pacific. Taiwan dispatched forces to respond.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Taiwan%20to%20stage%20five%20days%20of%20combat%20readiness%20drills.pdf"}, {"id": "st-07", "title": "Taiwan's 'Asian Nasdaq' Goal a Long Shot, but It May Not Be Just a Pipe Dream", "source": "ST", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "President Lai Ching-te's goal of turning Taiwan into an 'Asian Nasdaq' faces skepticism given a notoriously archaic, paperwork-heavy banking system. Yet Taiwan's stock market recently overtook India's to become the world's fifth-largest at US$4.95 trillion, driven by AI and semiconductor demand, with 2026 GDP growth forecast at 9.64%, the highest in 16 years. Structural roadblocks remain, including extreme index concentration, rigid financial regulations and a conservative investment culture. Being mentioned alongside Nasdaq is a long shot for Taipei.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/Taiwan%27s%20%27Asian%20Nasdaq%27%20goal%20a%20long%20shot%2C%20but%20it%20may%20not%20be%20just%20a%20pipe%20dream.pdf"}, {"id": "st-08", "title": "US-Iran Peace Talks Set to Start in Switzerland", "source": "ST", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "VP JD Vance opened what he called 'historic' face-to-face US-Iran talks at the Swiss resort of Burgenstock on June 21, claiming 'great progress' and describing the US stance as an 'outstretched hand' conditioned on Iran giving up regional destabilization and nuclear ambitions. The optimism was shadowed by disputes over the Strait of Hormuz and Lebanon, and by Trump, who simultaneously threatened to 'hit Iran very hard again' unless it stops its Hezbollah proxies. The talks are meant to trigger a 60-day period to settle decades-old issues. Iran's spokesman said no final-agreement phase is possible without an end to the Lebanon war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20ST/US-Iran%20peace%20talks%20set%20to%20start%20in%20Switzerland.pdf"}, {"id": "bt-01", "title": "Fresh Trump Threat Angers Teheran as US-Iran Peace Talks Open in Switzerland", "source": "BT", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "Trump threatened to restart war with Iran even as VP Vance met Iranian officials for the first talks under the interim peace deal, overshadowed by Tehran's announcement it had again closed the Strait of Hormuz. Iran's Tasnim news agency said the delegation refused to return to talks, though messages were exchanged through Qatari and Pakistani mediators. Trump wrote that Iran 'must immediately stop their highly paid PROXIES in Lebanon' or face being hit 'harder,' and reportedly warned that if Iran closed the strait 'you won't have a country.' The talks at the Qatari-owned Buergenstock resort were the first under the MOU extending the ceasefire 60 days.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Fresh%20Trump%20threat%20angers%20Teheran%2C%20as%20US-Iran%20peace%20talks%20open%20in%20Switzerland.pdf"}, {"id": "bt-02", "title": "Great Eastern Goes on the High-Net-Worth Offensive, but Don't Call It a Pivot", "source": "BT", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "After 118 years serving ordinary Singaporeans, Great Eastern is pushing into the wealthy segment by tapping parent OCBC and its private bank, Bank of Singapore. Group CEO Greg Hingston frames physical proximity as a competitive moat: its new Hewton Fair Suite, with an on-site Raffles Medical facility, can bring a client from the bank, generate a medical report by lunchtime and underwrite them by day's end. Hingston believes the insurer can out-compete multinational rivals and insists the affluent push is about growth, not abandoning the mass market. The strategy follows a mandate to 'grow and transform.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Great%20Eastern%20goes%20on%20the%20high-net-worth%20offensive%2C%20but%20don%27t%20call%20it%20a%20pivot.pdf"}, {"id": "bt-03", "title": "Key to the Future: What Is Digital Asset Custody, and How Does It Work?", "source": "BT", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "As regulation matures globally, digital asset custody is becoming critical market infrastructure rather than a niche service. Standard Chartered, HSBC and Citi say their client base is broadening beyond crypto-natives to pension funds, sovereign wealth funds and asset managers. Frameworks cited include the US Genius Act, Europe's MiCA, Hong Kong's stablecoin ordinance and, in Singapore, MAS's tokenised-bills pilot and stablecoin regime, with Japan's lower house also moving to regulate crypto like stocks. Bankers caution that faster on-chain settlement shifts risk toward technology, cyber and operational controls.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Key%20to%20the%20future%20What%20is%20digital%20asset%20custody%2C%20and%20how%20does%20it%20work.pdf"}, {"id": "bt-04", "title": "Middle East Conflict Pushes Asia Into Next Phase of Energy Rethink: Bank of America", "source": "BT", "date": "22 Jun 2026", "tags": ["Energy", "Southeast Asia"], "summary": "Bank of America's president of international, Bernard Mensah, says Asian companies and governments are entering the next phase of their response to the Middle East conflict, reassessing long-term energy security. The shift could spur fresh investment in renewables, refining capacity and new energy infrastructure, creating opportunities for banks and financiers. Mensah expects corporate and policy conversations particularly in Asia and Europe, both heavily reliant on imported energy. He likened it to Europe's post-2022 pivot away from Russian energy toward LNG and renewables.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Middle%20East%20conflict%20pushes%20Asia%20into%20next%20phase%20of%20energy%20rethink%20Bank%20of%20America.pdf"}, {"id": "bt-05", "title": "Nasdaq-Listed StoneX's Bullion Arm to Offer Gold, Silver Vaulting Services in Singapore", "source": "BT", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "StoneX Bullion, a subsidiary of Nasdaq-listed StoneX Group, is in talks with institutional vaulting providers to store and fulfil gold and silver orders in Singapore in the coming months. The move would let its global clients vault precious metals in the Republic, positioning the firm to capture growing demand for physical metals and storage. It comes as Singapore deepens its precious-metals infrastructure, with DPM Gan Kim Yong announcing OTC gold clearing and central-bank vaulting by year-end. Singapore already has more than 2,000 tonnes of commercial bullion vaulting capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Nasdaq-listed%20StoneX%27s%20bullion%20arm%20to%20offer%20gold%2C%20silver%20vaulting%20services%20in%20Singapore%2C%20sources%20say.pdf"}, {"id": "bt-06", "title": "Singapore Investors See SpaceX Investment as a Long-Term Bet on the Space Economy", "source": "BT", "date": "22 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore-based investors are backing SpaceX as a long-term bet on the nascent space economy. True Global Ventures' Lim Qing Ru eyed it in 2021 when it commanded about 60% of the global commercial launch market, citing Starlink's expanding satellite network. Turn Capital's Ho Kheng Lian invested roughly a decade ago at a ~US$16 billion valuation; SpaceX's market capitalisation is now about US$2.4 trillion. Both cite Musk's track record while noting the space sector remains capital-intensive, technically complex and high-risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Singapore%20investors%20see%20SpaceX%20investment%20as%20a%20long-term%20bet%20on%20the%20future%20of%20the%20space%20economy.pdf"}, {"id": "bt-07", "title": "The Asian Playbook for Global Brands No Longer Works", "source": "BT", "date": "22 Jun 2026", "tags": ["Trade", "Society"], "summary": "Global consumer brands in Singapore are moving in two directions at once: Gap, Topshop, Eggslut and Pull & Bear have exited, while Chick-fil-A, Chipotle and Australia's Zimmermann are entering or expanding. The divergence reflects that the old standardize-and-scale playbook is losing effectiveness in today's Asia. Demand remains strong, with Asia set to contribute roughly half of global consumption growth by 2030, but it now behaves as distinct consumer systems shaped by different digital ecosystems and trust dynamics. China's social commerce, Japan and Korea's brand-trust focus, and Southeast Asia's TikTok Shop, Shopee and Lazada each require adaptation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/The%20Asian%20playbook%20for%20global%20brands%20no%20longer%20works.pdf"}, {"id": "bt-08", "title": "Why the Fragile US-Iran MOU Won't Restart the Rate-Cut Cycle", "source": "BT", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "The interim US-Iran MOU carries more downside risk than buoyant markets are pricing, given the non-trivial chance the deal frays or collapses, this analysis argues. The crisis has already disrupted the global rate-cut cycle, with central banks from Australia to Norway, Japan and the eurozone's ECB raising rates in 2026; the ECB's was its first hike since 2023, with more expected. Eurozone 2026 inflation is now seen averaging 3%, and German 10-year yields eased to around 2.90%. Expected rate cuts in the US and UK 'may have stopped in their tracks'; some dub the 14-point pact a 'memorandum of misunderstanding.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20BT/Why%20the%20fragile%20US-Iran%20MOU%20won%27t%20restart%20the%20rate-cut%20cycle.pdf"}, {"id": "scmp-01", "title": "Apple Supplier Lingyi Seeks US$1.1 Billion Hong Kong IPO to Fund AI and Robotics Push", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Technology & AI"], "summary": "Apple supplier Lingyi iTech is seeking up to HK$8.3 billion (US$1.1 billion) in a Hong Kong IPO to fund expansion into AI servers, smart glasses and humanoid robotics, with cornerstone investors including Honor. The Shenzhen-listed components maker aims to become a top-three global supplier of embodied-intelligence hardware and plans to raise robot output from 10,000 units this year to 500,000 by 2030. It has acquired a stake in a joint venture with robot maker AgiBot and opened a robotics factory in Beijing. Robotics remains a small part of the business for now, but the dual listing marks a strategic diversification beyond smartphones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Apple%20supplier%20Lingyi%20seeks%20US%241.1%20billion%20Hong%20Kong%20IPO%20to%20fund%20AI%20and%20robotics%20push.pdf"}, {"id": "scmp-02", "title": "As the US Dismantles Its Global Hegemony, Will China Step Up?", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "Tsinghua University's Da Wei argues that 'America's global institutional hegemony is coming to an end' and is unlikely to be reversed as the world drifts from liberalism toward nationalism and realism. He stresses this is not a decline of US national power but a shift in how US leadership is executed, from institutions toward coercion and transaction. Even a future president could not rebuild global hegemony, he says, because America's moral prestige has been severely damaged. Yet Da pushes back on the idea China would replace the US, casting Beijing's path as partnerships rooted in sovereign equality rather than dominance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/As%20the%20US%20dismantles%20its%20global%20hegemony%2C%20will%20China%20step%20up.pdf"}, {"id": "scmp-03", "title": "Asia's Shaky Food Supply Shudders as 'Super' El Nino Arrives", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Environment", "Society"], "summary": "A 'super' El Nino has officially begun forming over the Pacific, with a bloom of ocean heat running 2.5C above normal, and forecasters warn it could peak among the highest levels observed since 1950. Australia's Bureau of Meteorology and its US counterpart both flag a strong-to-very-strong event, and the UN's Antonio Guterres warned it 'will hit even harder, travel even farther.' The phenomenon brings drought to some regions and catastrophic flooding to others, overwhelming crops. A decade ago a super El Nino devastated Indian soybeans, Thai rice, Vietnamese Robusta coffee and palm oil, threatening Asia's food supply again.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Asia%E2%80%99s%20shaky%20food%20supply%20shudders%20as%20%E2%80%98super%E2%80%99%20El%20Nino%20arrives.pdf"}, {"id": "scmp-04", "title": "Blockade Lifted, Assets to Be Returned to Iran in Swiss Talks Breakthrough", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The US-Iran talks in Switzerland delivered a breakthrough, with Iran's Foreign Minister Seyed Abbas Araghchi saying the blockade was lifted, oil and petrochemical exports waived, some frozen assets released and a reconstruction plan launched. He cautioned that the 'first real test' is a Lebanon deconfliction cell to monitor the end of military operations. A joint Qatar-Pakistan statement described the Lake Lucerne summit as 'positive and constructive,' with working groups on nuclear, sanctions and dispute resolution. The parties agreed to reach a final deal within 60 days and to establish a committee overseeing the mediation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Blockade%20lifted%2C%20assets%20to%20be%20returned%20to%20Iran%20in%20Swiss%20talks%20breakthrough.pdf"}, {"id": "scmp-05", "title": "Canada Steps Up at Rimpac to Rebut Trump's Freeriding Charge", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Canada is fielding its largest military contingent in years at the Rimpac naval exercise, deploying two frigates and submarine HMCS Corner Brook in a pointed rebuttal to Washington's 'freeriding' charge. The biennial drill, running through July 31, draws more than 25,000 personnel from 31 countries including Singapore, Australia, Japan and South Korea. In a signal of ambition, Canada is poised to command the air component while South Korea takes the maritime lead, roles traditionally reserved for major powers. Analysts question whether Ottawa can sustain the commitment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Canada%20steps%20up%20at%20Rimpac%20to%20rebut%20Trump%E2%80%99s%20freeriding%20charge.pdf"}, {"id": "scmp-06", "title": "China-Asean Relations Are Bigger Than Mere Geopolitics", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Southeast Asia", "Geopolitics"], "summary": "This commentary argues China-Asean ties run deeper than the usual danger-versus-opportunity binary, being built through food systems, satellites, aircraft, universities, finance, culture and data centres. A study tour to Chengdu, Kuala Lumpur and Jakarta highlighted China's drive to shape industries, from commercial satellites and eVTOL aircraft to food security symbolized by '24-hour milk.' Southeast Asia, the author writes, is trying to turn the structural reality of China into an advantage without losing control of its own choices. The relationship increasingly overlaps technology, security, finance and governance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/China-Asean%20relations%20are%20bigger%20than%20mere%20geopolitics.pdf"}, {"id": "scmp-07", "title": "China's Iran Strategy an Exercise in Power Without Projection", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "At the G7, Trump thanked China for staying 'neutral' in the Iran war and credited Beijing with preventing catastrophe, a scene unthinkable a year ago. This analysis says China exercised quiet but decisive leverage as Iran's largest oil customer, primary financial lifeline and diplomatic shield, delivering private messages urging flexibility. Foreign Minister Wang Yi held dozens of calls and envoy Zhai Jun shuttled the region since February, while Beijing coordinated with Pakistan and framed the conflict at the UN as requiring multilateral management. Its restraint, the piece argues, quietly altered the terms of great-power conduct ahead of the 14-point MOU.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/China%E2%80%99s%20Iran%20strategy%20an%20exercise%20in%20power%20without%20projection.pdf"}, {"id": "scmp-08", "title": "Chinese Start-up Tackles Fusion Energy Software Bottleneck With Help of AI", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "Beijing start-up VeloAlpha, founded in April by fusion theorist Xie Huasheng, is building 'FusionAlpha,' a simulator to test reactor designs on computers before committing to expensive physical experiments. Xie says AI advances and refined mathematical structures have sharply improved more than a dozen physics models, breaking fusion software's longstanding 'impossible triangle' of accuracy, speed and simplicity. He likens the tool to electronic design automation software in chipmaking, where designs are optimized before reaching the foundry. The approach aims to shorten fusion's costly trial-and-error cycle.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Chinese%20start-up%20tackles%20fusion%20energy%20software%20bottleneck%20with%20help%20of%20AI.pdf"}, {"id": "scmp-09", "title": "Cross-border Biotech Deals Grow More Complex as US Targets China Investment Links", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "China-US biotech deals are becoming more complicated and could see a modest slowdown as Washington expands investment and technology controls, including the proposed Biosecure Act, according to ING analysts. Despite the hurdles, the broader trend of Western pharmaceutical firms partnering with Chinese biotech is unlikely to reverse. ING estimates out-licensing agreements between Chinese biotech and Western drugmakers will reach about US$240 billion this year, up from US$136 billion in 2025. Such transactions will increasingly remain the domain of Big Pharma with the scale to navigate the political environment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Cross-border%20biotech%20deals%20grow%20more%20complex%20as%20US%20targets%20China%20investment%20links.pdf"}, {"id": "scmp-10", "title": "China Adds 10 US Firms to Export Control List, Restricts 46 From Government Procurement", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "China announced it will add 10 American firms, including drone makers Red Cat and Teal Drones and rare-earth players MP Materials and USA Rare Earth, to its export control list, barring shipments of dual-use items to them. Its finance ministry separately said it would restrict 46 US firms from government procurement. The commerce ministry cited 'malicious actions' by Washington after the Pentagon on June 9 expanded its list of 'Chinese military companies.' The tit-for-tat escalates US-China competition over sectors at the heart of their technological rivalry.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/DevelopingChina%20adds%2010%20US%20firms%20to%20export%20control%20list%2C%20restricts%2046%20from%20government%20procurement.pdf"}, {"id": "scmp-11", "title": "Energy Security Fears Drive Global Surge in Orders for Chinese Storage Firms", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Energy", "Technology & AI"], "summary": "Energy-security fears are driving a global surge in orders for China's energy-storage firms, with more than 25 GWh of capacity to be built in the US and Europe. In the first two weeks of June alone, CATL booked a combined 5.4 GWh of storage orders, including a 3 GWh deal with Finland's Merus Power and 2.4 GWh for projects in Australia. BofA's Matty Zhao says that regardless of the US-Iran deal, 'governments realise they need structural energy security,' pushing more funding toward storage. Demand is also driven by the urgent need to upgrade ageing grids in developed markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Energy%20security%20fears%20drive%20global%20surge%20in%20orders%20for%20Chinese%20storage%20firms.pdf"}, {"id": "scmp-12", "title": "Energy Storage: China's Battery Power Sets Stage for Global Leadership", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Energy"], "summary": "China's battery-based grid storage is set for 150% growth as Beijing prioritizes energy security, listing 'new energy storage' as a key pillar of its 2026-2030 five-year plan. A 3 billion yuan (US$444 million) CATL validation laboratory in Xiamen, equivalent in size to 14 football pitches, stress-tests storage systems under extreme heat, cold, sandstorms and fire before grid installation. Officials say China's experience will provide 'a model that serves as a valuable benchmark' for the world. Energy storage is cast as the balancer and stabiliser for a grid increasingly reliant on renewables.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Energy%20storage%20China%E2%80%99s%20battery%20power%20sets%20stage%20for%20global%20leadership.pdf"}, {"id": "scmp-13", "title": "Hong Kong to Roll Out Measures Boosting Offshore Yuan Trading in July: Finance Chief", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong will roll out measures next month to strengthen its role as an offshore yuan hub, pushing more listed firms to trade stocks in renminbi, Financial Secretary Paul Chan said ahead of the city's July 1 handover anniversary. Chan defended reliance on mainland Chinese IPOs as a strength, calling the city a gateway for overseas expansion, and flagged room to grow its roughly 1 trillion yuan (US$145 billion) offshore liquidity pool. He cited possible expansion of the Hong Kong dollar-yuan dual-counter model, currently used by just 23 firms including Tencent, AIA and Alibaba. The push aims to enrich yuan investment products.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Hong%20Kong%20to%20roll%20out%20measures%20boosting%20offshore%20yuan%20trading%20in%20July%20finance%20chief.pdf"}, {"id": "scmp-14", "title": "How China's Electric Car Boom Created a Yawning Fiscal Black Hole", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Environment", "Society"], "summary": "China's rapid EV adoption, with new-energy vehicles topping 60% of new car sales last month, is creating a fiscal black hole for local governments. Heavier electric cars send road-maintenance costs spiralling while undercutting the petrol tax that covered more than 80% of ordinary-road upkeep in 2021. China's aging network of nearly 5.2 million km needs ever more repairs, even as fuel-tax revenue falls. Researchers warn the country may need to raise taxes to meet a soaring roadworks bill, exposing a hidden cost of its celebrated EV transition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/How%20China%E2%80%99s%20electric%20car%20boom%20created%20a%20yawning%20fiscal%20black%20hole.pdf"}, {"id": "scmp-15", "title": "Iran, US Claims Conflict Over Hormuz as 3 Indian Crude Tankers Emerge", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Three fully laden India-linked supertankers, the Desh Vibhor, Desh Vaibhav and Sanmar Herald carrying nearly 6 million barrels of Iraqi and Kuwaiti oil, re-emerged in the Gulf of Oman, suggesting they took a Tehran-approved route past Qeshm. The transits add to a growing tally of vessels crossing Hormuz both ways amid conflicting Iran-US narratives. Iran proclaimed the strait shut on Saturday, citing Israel's continued attacks in southern Lebanon as a ceasefire violation, while US Central Command pushed back. The competing claims came as peace-deal negotiations were set to begin.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Iran%2C%20US%20claims%20conflict%20over%20Hormuz%20as%203%20Indian%20crude%20tankers%20emerge.pdf"}, {"id": "scmp-16", "title": "Iran-US Talks Continue as Trump Threat, Lebanon and Hormuz Strain Swiss Summit", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Geopolitics"], "summary": "The US expected talks with Iran to continue through the night in Switzerland despite a rocky start, with Tehran's delegation briefly walking out over Trump's threats to strike Iran over Hezbollah. A US diplomat said the Iranians were engaged in 'robust discussions on all elements of the nuclear deal' and clarified messaging on keeping the Strait of Hormuz 'fully open' via deconfliction mechanisms. The negotiations aim to trigger a 60-day period to settle decades-old issues, but disagreement over key sticking points and the threat of renewed Lebanon fighting weighed on the summit. Washington and Tehran traded threats in parallel with the talks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Iran-US%20talks%20continue%20as%20Trump%20threat%2C%20Lebanon%20and%20Hormuz%20strain%20Swiss%20summit.pdf"}, {"id": "scmp-17", "title": "Japan's G7 Rare Earth Proposal Risks Further Regional Tension", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "This commentary argues that Japanese PM Sanae Takaichi's G7 proposal to coordinate stockpiling of critical minerals, including rare earths, to ease China's supply-chain grip risks further regional tension. It frames the move, alongside oil stockpiling and proliferating security pacts, as faulty and shortsighted, reflecting a lack of vision for regional peace and economic integration. The author warns such logic could push East Asia toward renewed conflict. The piece presents a markedly China-sympathetic reading of Tokyo's posture toward Beijing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Japan%E2%80%99s%20G7%20rare%20earth%20proposal%20risks%20further%20regional%20tension.pdf"}, {"id": "scmp-18", "title": "Open Questions: Nie Huihua on the Non-Westernness of Chinese Government", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Politics", "Society"], "summary": "Renmin University economist Nie Huihua argues that understanding China requires moving beyond Western-centric frameworks, contrasting the West's bottom-up electoral system with China's top-down accountability system. He says formal institutions, informal grass-roots mechanisms and cultural collectivism couple into a self-consistent, adaptive governance system, with neither model categorically superior on growth or stability. The Harvard-trained professor examines the tension between strengthening centralised control and encouraging local enthusiasm and innovation. The interview is part of SCMP's Open Questions series.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Open%20QuestionsNie%20Huihua%20on%20the%20non-Westernness%20of%20Chinese%20government%20and%20the%20challenge%20to%20innovation.pdf"}, {"id": "scmp-19", "title": "South Korea Jostles With Germany for US$39 Billion Canadian Submarine Deal", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Defence", "Trade"], "summary": "South Korea and Germany are in a last-ditch race for Canada's next-generation submarine project worth up to US$39.14 billion (60 trillion won), with Ottawa expected to select a preferred bidder by month-end. The Canadian Patrol Submarine Project will replace four ageing Victoria-class boats with 12 new 3,000-tonne diesel-electric vessels plus long-term maintenance. Seoul has elevated its Hanwha Ocean-led bid to head-of-state diplomacy, with President Lee Jae-myung lobbying PM Mark Carney at the G7, though Germany's TKMS benefits from shared NATO membership. Hanwha proposes delivering the first four vessels by 2035 and all 12 by 2043.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/South%20Korea%20jostles%20with%20Germany%20for%20US%2439%20billion%20Canadian%20submarine%20deal.pdf"}, {"id": "scmp-20", "title": "Zelensky Says Ukraine Drones Hit Oil Refinery in Russia's Tyumen, Now Have 3,000km Range", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Defence", "Energy"], "summary": "President Zelensky said Ukrainian drones struck an oil refinery in Russia's Tyumen Region in western Siberia, more than 2,000km from the border, and that Ukraine has developed new long-range drones capable of operating beyond 3,000km. The strike is part of a months-long campaign targeting Russia's oil industry to hinder Moscow's ability to fund the war. Tyumen's governor said air defences repelled the attack with no damage and staff evacuated. The Tyumen refinery, one of Russia's most modern, processes roughly 6 million tonnes of crude annually.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Zelensky%20says%20Ukraine%20drones%20hit%20oil%20refinery%20in%20Russia%E2%80%99s%20Tyumen%2C%20now%20have%203%2C000km%20range.pdf"}, {"id": "scmp-21", "title": "Zhipu AI Market Cap Tops HK$1 Trillion as Shares of GLM-5.2 Developer Soar", "source": "SCMP", "date": "22 Jun 2026", "tags": ["Technology & AI"], "summary": "Hong Kong-listed AI pioneer Zhipu AI's market capitalisation topped HK$1 trillion (US$128 billion) on Monday, with shares surging as much as 42% to a peak of HK$2,980. The rally followed the release of its open-source GLM-5.2 model, which features a 1-million-token context window and ranked second globally on the Code Arena list for front-end web development, trailing only Anthropic's flagship Claude Fable 5. Elon Musk estimated a Chinese model matching Claude Fable 5 would arrive in the first quarter of next year, to which Zhipu founder Tang Jie responded it 'won't take that long.' The surge underscores intensifying US-China AI competition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20SCMP/Zhipu%20AI%20market%20cap%20tops%20HK%241%20trillion%20as%20shares%20of%20GLM-5.2%20developer%20soar.pdf"}]}, "2026-06-23": {"date": "2026-06-23", "dayOfWeek": "Tuesday", "totalArticles": 63, "sourceCounts": {"WSJ": 14, "ST": 17, "BT": 12, "SCMP": 20}, "executiveDigest": "A fragile 60-day US-Iran deal wobbles over Lebanon and the Strait of Hormuz even as an AI-fuelled memory supercycle vaults SK Hynix past Samsung and reignites US-China rare-earth retaliation.", "briefingCards": [{"title": "Lead story — Iran deal hangs by a thread", "body": "The interim US-Iran memorandum is straining within days: Iran again declared the Strait of Hormuz closed, blaming the US for a clear breach, while Trump's threats over Hezbollah briefly drove Iran's delegation out of the Switzerland talks. Mediators Pakistan and Qatar salvaged a road map to a final deal within 60 days, a Lebanon deconfliction cell and a Hormuz contact channel, and Vance says Iran agreed to readmit IAEA inspectors. Critics from Pence to the WSJ board call it appeasement that trades leverage for promises; Netanyahu, facing an election, has been publicly demeaned by Trump."}, {"title": "Markets & finance — AI exuberance meets warning signs", "body": "Strategists flag stretched valuations, a hawkish Fed under new chair Kevin Warsh, and a surge in equity issuance (SpaceX's $86bn IPO, Alphabet's $85bn offering) as classic late-cycle signals. Mackintosh warns the flood of money into AI is itself a red flag, while zombie unicorns face $0.5-1tn in looming valuation cuts. Nvidia tops global rankings near $5.1tn as seven US tech firms fill the top ten. The mass-affluent wealth tier is being handed to AI, reshaping who banks hire."}, {"title": "Asia realignment — minerals, alliances and the yuan", "body": "China's tit-for-tat export controls on 10 US firms and procurement bans on 46 test the fragile Busan truce, hardening G7 and Quad resolve to cut rare-earth reliance below 60% by 2030. Japan expands security partnerships and floats nuclear-powered submarines while hedging against a less reliable Washington; China warns off Japanese ships near its carrier drills. Beijing courts FDI with a 15-measure plan and extends the yuan's reach via Brazil's coming panda bond, even as Lagarde calls the currency 15-16% undervalued."}, {"title": "Energy & climate — supply shocks and full tanks", "body": "Ukrainian drone strikes have knocked over 20% of Russian refining offline, spreading fuel rationing to 53 regions in what the IEA calls unprecedented disruption. China, sitting on near-full crude stockpiles, is unlikely to rush back to imports, keeping a lid on prices even as Hormuz risk lingers. China's green-energy exports to the US jumped — PV cells up 346% — lifted by AI data-centre power demand. In South-east Asia, a US$564bn data-centre boom faces underpriced physical climate risk, with more than one in ten sites highly exposed to flooding."}, {"title": "Technology & AI — the memory supercycle and China's surge", "body": "An AI-driven DRAM/NAND shortage is rippling to consumers — pricier iPhones, Surface and Switch 2 — and made SK Hynix Korea's most valuable company (S$1.8tn, 61% HBM share), with Apple admitting it can't shield buyers. China is closing the model gap: Zhipu's open-weights GLM-5.2 ranks No. 2 globally on coding and runs at under a tenth of Fable 5's price, days after Washington restricted Anthropic's frontier model. China also dominates the humanoid-robot supply chain, where Unitree sells units under US$5,000."}, {"title": "Singapore & SEA focus — capital, chips and policy", "body": "Analysts see the Singapore dollar strengthening to ~1.26/USD on expected MAS tightening in July, with May core inflation eyed at 1.6%. Singapore anchors GlobalFoundries' physical AI push after its AMF silicon-photonics acquisition, reinforcing the Republic's chip-hub role. MAS's revised single-family-office framework starts a one-year compliance countdown, while Singapore, Thailand and Malaysia pursue incentive-led value-up market reforms. A commentary urges easing ABSD penalties so developers can hold condo units to meet rental demand."}], "keyMetrics": [{"value": "63", "label": "Articles curated today", "sub": "WSJ 14 · ST 17 · BT 12 · SCMP 20"}, {"value": "+340%", "label": "SK Hynix shares this year", "sub": "Now S$1.8tn — Korea's most valuable firm, 61% HBM share"}, {"value": "60 days", "label": "US-Iran deal window", "sub": "IAEA inspectors to return; Hormuz contact channel agreed"}, {"value": "20%+", "label": "Russian refining knocked offline", "sub": "Ukrainian drone strikes; fuel curbs in 53 regions"}, {"value": "No. 2", "label": "Zhipu GLM-5.2 global rank", "sub": "744bn params, open weights, under 1/10 the price of Fable 5"}, {"value": "US$564b", "label": "SE Asia data-centre spend by 2028", "sub": "More than 1 in 10 facilities at high climate risk (Moody's)"}], "articles": [{"id": "wsj-01", "title": "All the Money Flooding Into AI Is a Giant Warning Sign", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "James Mackintosh argues the wave of equity issuance to fund AI is a red flag that stocks are overpriced, since firms sell shares when valuations are high. Net equity issuance by non-financial companies turned positive in Q1 2026 for the first time since 2021, echoing the dot-com and 2020-21 SPAC manias. SpaceX raised $86 billion in its IPO and Alphabet announced an $85 billion offering. Mackintosh frames three scenarios: a genuinely vast opportunity, value-destroying overspend, or pure hype.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/All%20the%20Money%20Flooding%20Into%20AI%20Is%20a%20Giant%20Warning%20Sign.pdf"}, {"id": "wsj-02", "title": "As War With US Eases, Iran Steps Up Hangings of Dissidents", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Society"], "summary": "At least 45 people have been executed in Iran this year on political charges, most in the past three months, as the regime tightens its internal grip while opening sanctions-relief talks with the US. Rights groups say espionage is being used as an elastic accusation to suppress dissent, with cases such as Nasser Bakerzadeh built on coerced confessions. The crackdown followed January street protests that authorities violently suppressed. The memorandum with Washington promises a financial boost from ending oil-export sanctions even as repression intensifies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/As%20War%20With%20U.S.%20Eases%2C%20Iran%20Steps%20Up%20Hangings%20of%20Dissidents.pdf"}, {"id": "wsj-03", "title": "Donald Trump and JD Vance Echo the Anti-Israel Left", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Allysia Finley's column argues Trump and Vice-President Vance now criticise Netanyahu in terms once used by the far left and Tucker Carlson. A Fox News poll showed voters disapproved of Trump's war handling 64% to 35%, with worse marks on the economy. Finley notes roughly 20 million barrels a day flowed through Hormuz before the war and contends Iran was under more pressure than the US. She frames Vance's threats to cut Israeli weapons support as positioning for a 2028 presidential run.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Donald%20Trump%20and%20JD%20Vance%20Echo%20the%20Anti-Israel%20Left.pdf"}, {"id": "wsj-04", "title": "Iran Mediators Offer Plan to Ease Lebanon, Hormuz Tensions", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Mediators Pakistan and Qatar announced a mechanism to ensure the termination of military operations in Lebanon and a communication line to enable safe passage through the Strait of Hormuz. The breakthrough came after Trump's social-media threats prompted Iran's delegation to briefly walk out of the Switzerland talks. Iranian negotiators said progress was being made on oil sanction waivers and the release of frozen assets, but warned wider talks cannot advance until the Lebanon war ends. Technical talks continue at the Burgenstock resort.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Iran%20Mediators%20Offer%20Plan%20to%20Ease%20Lebanon%2C%20Hormuz%20Tensions.pdf"}, {"id": "wsj-05", "title": "Iran and Trump Blame Israel First", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "The WSJ editorial board notes Iran again declared the Strait of Hormuz closed, blaming the US for a clear breach of the memorandum of understanding, while Trump and Vance publicly criticised Netanyahu. The board argues Iran is orchestrating escalations to divide the US and Israel and win immunity for Hezbollah. It contends Trump gave away his leverage by signing the MOU, easing sanctions and ending the port blockade. The piece warns that attacking allies while appeasing adversaries amounts to peace through weakness.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Iran%20and%20Trump%20Blame%20Israel%20First.pdf"}, {"id": "wsj-06", "title": "Russia Faces Spreading Fuel Shortages After Ukrainian Drones Pummel Refineries", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Ukrainian long-range drone strikes have knocked an estimated 20%-plus of Russian refining capacity offline, triggering fuel rationing, surging prices and long queues. The IEA called the disruption unprecedented in the history of the conflict. Purchase restrictions have spread to 53 regions, and Crimea suspended private fuel sales entirely. Kyiv has targeted Russia's biggest, most modern refineries, repeatedly hitting the Moscow refinery in one of the largest attacks on the capital since 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Russia%20Faces%20Spreading%20Fuel%20Shortages%20After%20Ukrainian%20Drones%20Pummel%20Refineries.pdf"}, {"id": "wsj-07", "title": "The Biggest Risks Threatening This Highflying Stock Market", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Finance & Markets"], "summary": "Sam Goldfarb surveys the risks beneath a record-seeking US market: stretched valuations, higher rates, AI jitters and surging stock supply. The S&P 500's excess CAPE yield sits near a decade low around 1.3%, signalling thin compensation versus Treasurys. New Fed chair Kevin Warsh struck a more hawkish tone on inflation than expected. Four big tech firms are set to spend over $670 billion on AI infrastructure this year, making any pullback the market's biggest threat.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Biggest%20Risks%20Threatening%20This%20Highflying%20Stock%20Market.pdf"}, {"id": "wsj-08", "title": "The Memory-Chip Crisis Is Here — and You’re Footing the Bill", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A DRAM and NAND shortage driven by AI demand is pushing consumer-electronics prices sharply higher: the Surface Pro rose $600, the Switch 2 hit $499, and the iPhone 18 Pro may reach $1,299. The market is dominated by just three makers — SK Hynix, Samsung and Micron — whose values have roughly quintupled, with SK Hynix and Micron each topping $1 trillion. Micron's contract price for a common data-centre memory chip jumped from $350 to $1,300 over a year. Analysts expect shortages and price increases to persist for years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Memory-Chip%20Crisis%20Is%20Here-and%20You%E2%80%99re%20Footing%20the%20Bill.pdf"}, {"id": "wsj-09", "title": "The US Is Ramping Up Economic Warfare, but Its Enemies Aren’t Blinking", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "The US has imposed more than 1,000 sanctions on Iran in 18 months, yet Tehran's resilience exposes the limits of economic pressure on rogue regimes. Iran kept generating billions — an estimated $43 billion from oil in 2024, mostly to China — forcing Washington to physically blockade its ports. New US sanctions listings jumped from 880 in 2017 to over 3,000 in 2024, but North Korea, Russia, Venezuela and others have largely withstood them. Critics say the failure lies in enforcement, not the sanctions themselves.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20U.S.%20Is%20Ramping%20Up%20Economic%20Warfare.%20Its%20Enemies%20Aren%E2%80%99t%20Blinking..pdf"}, {"id": "wsj-10", "title": "The Would-Be Intelligence Chief Caught Between Trump and Congress", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Jay Clayton, the SDNY US attorney and Trump ally, has had his nomination as director of national intelligence delayed as Trump pressures Congress to pass election legislation. The hold could leave Clayton in limbo while acting director Bill Pulte — feared by some lawmakers as a politicising force — remains in place. Clayton has balanced loyalty with some independence, rebuffing a probe tied to E. Jean Carroll's suits against Trump. The episode underscores tensions between the independent-minded office and a Justice Department closely aligned with the White House.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Would-Be%20Intelligence%20Chief%20Caught%20Between%20Trump%20and%20Congress.pdf"}, {"id": "wsj-11", "title": "Victory Over Iran Is Still Possible", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "In an op-ed, former Vice-President Mike Pence argues the US-Iran memorandum is appeasement — a plan to make a plan — that fails to require verifiable dismantlement of Iran's nuclear and ballistic-missile programs. He warns it grants immediate sanctions relief worth an estimated $5 billion a month while postponing the hard security questions. Pence urges using the 60-day window to secure concessions first, insisting on verify and never trust. He says Trump should be prepared to let the military finish the job if goals aren't met.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Victory%20Over%20Iran%20Is%20Still%20Possible.pdf"}, {"id": "wsj-12", "title": "Wall Street's Hiring Dilemma: AI Can Model but Can’t Make the Next Rainmaker", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Banks are deploying AI across legal, wealth and investment-banking work — JPMorgan and Citi use Rogo's Felix agent, and Citi partnered with Google on a wealth agent — while wrestling with workforce implications. More than two-thirds of banking executives expect AI to have little impact on overall staffing over three years, though Standard Chartered plans to cut over 15% of back-office roles. Executives stress AI can accelerate modelling but cannot replace relationship-driven rainmakers. Jamie Dimon says some roles are already displaced but talented staff can be redeployed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Wall%20Street%20Hiring%20Dilemma%20AI%20Can%20Model%20but%20Can%E2%80%99t%20Make%20the%20Next%20Rainmaker.pdf"}, {"id": "wsj-13", "title": "Why Apple’s War Chest Can’t Win the Memory War", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Apple says it will raise product prices as soaring memory costs become unsustainable, a humbling admission for a company famed for supply-chain dominance. TrendForce expects DRAM prices for high-end smartphones to surge as much as 83% this quarter. Nvidia, buying tens of billions in DRAM for AI systems, is on track to overtake Apple in annual free cash flow, eroding Apple's procurement clout. As the only trillion-dollar tech firm without a major AI foothold, Apple faces a structural disadvantage because memory hits its cost of goods directly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Why%20Apple%E2%80%99s%20War%20Chest%20Can%E2%80%99t%20Win%20the%20Memory%20War.pdf"}, {"id": "wsj-14", "title": "Why the Memory Crunch Is Almost Impossible to Solve", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "With only a handful of memory makers and fabs taking years to build, policymakers have few quick fixes for the shortage behind Apple's price hikes. Micron's new Idaho plant won't open until mid-2027 and its New York facility not until 2030, while the big three stay cautious to avoid a glut despite record margins. Chinese makers CXMT and Yangtze Memory are expanding fast — CXMT's revenue rose over 700% year-on-year in Q1 2026 — but US national-security rules limit cooperation. Some consumer-tech firms are lobbying to loosen China restrictions even as Micron pushes for tighter ones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Why%20the%20Memory%20Crunch%20Is%20Almost%20Impossible%20to%20Solve.pdf"}, {"id": "st-01", "title": "Australia Sells Advanced Radar to Canada in S$2.26 Billion Deal", "source": "ST", "date": "23 Jun 2026", "tags": ["Defence", "Trade"], "summary": "Australia signed a record A$2.5 billion (S$2.26 billion) deal to export its over-the-horizon radar system to Canada, its largest-ever defence export and the first international sale of the technology. BAE Systems Australia begins delivery on July 1, with the system to bolster Canada's Arctic surveillance and strengthen NORAD. Defence Minister Richard Marles called it a significant new strategic dimension to the relationship. The deal supports about 300 jobs in Australia and nearly 2,300 a year in Canada, which signalled it is diversifying defence ties beyond the US.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Australia%20sells%20advanced%20radar%20to%20Canada%20in%202.26%20billion%20deal.pdf"}, {"id": "st-02", "title": "Britain’s Second Thoughts About Brexit Are Only Growing Stronger", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "On the tenth anniversary of the 2016 referendum, Jonathan Eyal argues Britain has quietly turned against Brexit even as no party in power will reopen it. The decision has helped destroy the careers of six consecutive prime ministers, including the departing Keir Starmer. Eyal contends the dimension that now matters most — security — was barely mentioned in 2016, leaving Britain marooned between a Europe it spurned and an America it can no longer count on. He frames Brexit as a verdict of failure attached to a status quo nobody dares revisit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Britain%27s%20second%20thoughts%20about%20Brexit%20are%20only%20growing%20stronger.pdf"}, {"id": "st-03", "title": "China Is Having Another AI Moment", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Beijing lab Zhipu's new GLM 5.2 is the most capable Chinese-trained model yet, runs at less than a tenth of the price of Anthropic's Fable 5, and ships with open weights, ranking fourth overall and top among open-source models on Artificial Analysis. The release lands days after the Trump administration barred non-Americans from Fable 5, prompting Anthropic to switch off access for everyone. Still, Fable 5 is about 17% cleverer on average, and private benchmarks suggest the US lead is really eight to ten months. Analysts warn Chinese models may teach to the test on public benchmarks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%20is%20having%20another%20AI%20moment.pdf"}, {"id": "st-04", "title": "China Moves Against US Rare Earth and Defence Firms in a Calibrated Response", "source": "ST", "date": "23 Jun 2026", "tags": ["Trade", "Defence"], "summary": "Beijing imposed export controls on 10 US companies — including rare-earth producers MP Materials and USA Rare Earth, plus L3Harris and drone maker Red Cat — and procurement bans on 46 firms such as Lockheed Martin and Raytheon. Analysts view it as a calibrated response to Washington's expanded Pentagon 1260H blacklist, which added Alibaba and Baidu. The controls extend extraterritorially, barring third parties from routing Chinese-origin dual-use items to the listed firms. China still controls more than 70% of rare-earth production and nearly 90% of refining capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%20moves%20against%20US%20rare%20earth%2C%20defence%20firms%20in%20%27calibrated%27%20response%20to%20Pentagon%20blacklist.pdf"}, {"id": "st-05", "title": "China’s Electric Vehicle Giants Are Building Much More Than Cars", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's EV dominance is generating dual-use capabilities that feed Beijing's civil-military fusion strategy, the piece argues, even without direct military control of carmakers. Modern EVs are software-defined platforms built on AI, sensors, mapping and autonomous navigation that can support unmanned systems and intelligent logistics. Battery leaders BYD and CATL, scaled through state support and competition, have technology adaptable to drones and other platforms. The analysis draws a parallel to China's shipbuilding sector, where commercial scale underpins naval capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%27s%20electric%20vehicle%20giants%20are%20building%20much%20more%20than%20cars.pdf"}, {"id": "st-06", "title": "From Sidelines to Centre Stage: Andy Burnham on Course to Be UK’s Next PM", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Greater Manchester mayor Andy Burnham, the King of the North, is the front-runner to succeed Keir Starmer after a decisive Makerfield by-election win that helped force the resignation. Burnham pitches himself as the only Labour figure with the charisma to beat Nigel Farage's Reform UK, which has led polls since early 2025. A supporter of decentralisation and a more interventionist state, he has recently moved toward the centre on nationalisation and the EU. If confirmed he would be Britain's seventh prime minister in a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/From%20sidelines%20to%20centre%20stage%2C%20Andy%20Burnham%20on%20course%20to%20be%20UK%27s%20next%20prime%20minister.pdf"}, {"id": "st-07", "title": "Israeli PM Netanyahu Faces One of the Biggest Challenges of His Career", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "With a final US-Iran deal due in about 60 days and an Israeli election weeks later, Netanyahu is fighting for political survival over an agreement Israel was not party to. Israelis across the spectrum have denounced the preliminary deal as a US capitulation that curtails Israel's freedom of action in Lebanon and leaves Iran's missiles and nuclear program unaddressed. Trump has publicly demeaned Netanyahu, saying he gets a little excited sometimes. Analysts call the outcome a colossal failure that hands Iran an economic windfall while delaying hard concessions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Israeli%20PM%20Netanyahu%20faces%20one%20of%20the%20biggest%20challenges%20of%20his%20career.pdf"}, {"id": "st-08", "title": "Keir Starmer Resigns as UK Prime Minister", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Keir Starmer has resigned as Labour leader, becoming the sixth British leader forced from office in a decade, and will stay on as PM until a successor is chosen between mid-July and September. Jonathan Eyal argues Starmer's undoing was the technocratic, vision-light outsider image that first made him popular. Repeated policy U-turns — scrapping then restoring the winter fuel allowance, and abandoning disability-benefit cuts — left him with the worst of all worlds. As he weakened, cabinet figures including finance minister Rachel Reeves openly defied him.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Keir%20Starmer%20resigns%20as%20UK%20Prime%20Minister.pdf"}, {"id": "st-09", "title": "Moscow Shoots Down Nearly 80 Drones; Russian Attacks Kill Six in Ukraine", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "More than 80 Ukrainian drones were downed over Moscow and 301 across Russian-controlled areas overnight, briefly suspending flights at the capital's airports days after Ukraine again struck Moscow's oil refinery. Russian drone and missile attacks killed at least six people in Ukraine, including three members of one family in the Sumy region. Russian drones also hit civilian merchant vessels, killing an Egyptian crew member aboard the Turkish-operated Victress. Crimea cancelled public events and curbed electricity use amid a deepening fuel crisis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Moscow%20shoots%20down%20nearly%2080%20drones%20Russian%20attacks%20kill%20six%20in%20Ukraine.pdf"}, {"id": "st-10", "title": "Singapore Dollar Set to Gain Against US Dollar, Say Analysts", "source": "ST", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Strategists expect the Singapore dollar to strengthen in the second half of 2026 despite a hawkish Federal Reserve, with the median Bloomberg forecast at 1.26 per US dollar — a gain of about 2.4% from last week's 1.2912. Expectations of further MAS tightening in July, given upside inflation risks, underpin the bullish view; ANZ sees 1.255 by year-end. Unlike peers, MAS manages the exchange rate via the S$NEER band rather than interest rates. Investors awaited May core inflation data, projected to rise to 1.6%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Singapore%20dollar%20set%20to%20gain%20against%20US%20dollar%2C%20say%20analysts.pdf"}, {"id": "st-11", "title": "Singapore Key to GlobalFoundries’ Quest to Equip Humanoid Robots With AI", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "GlobalFoundries, with a large Singapore footprint, sees physical AI — humanoid robots and the data-centre infrastructure to support them — as the next wave, and its 2025 acquisition of Singapore's Advanced Micro Foundry made it the world's largest pure-play silicon-photonics foundry. CTO Gregg Bartlett says the anticipatory investments position GF for a massive ramp over the next five years. BofA projects humanoid robot shipments rising from 20,000 units in 2025 to 10 million by 2035, with 90,000 expected in 2026. The deals reinforce Singapore's standing as a critical node in the global chip supply chain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Singapore%20key%20to%20GlobalFoundries%27%20quest%20to%20equip%20humanoid%20robots%20with%20AI.pdf"}, {"id": "st-12", "title": "South Korea’s Early Exports Jump Again as AI Boom Fuels Chip Demand", "source": "ST", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "South Korea's working-
