ts. Inflation has run 3% to 4% against a 2% target, leaving the 3.5%-3.75% rate target near zero in real terms. Drivers are idiosyncratic: tariffs, war-related energy and fertilizer disruptions, and the AI build-out. Minneapolis Fed's Neel Kashkari notes the labor market \"is not causing the inflation\"; Friday's monetary policy report judged wage growth consistent with 2%. Christopher Waller says risks have \"completely flipped.\" New York Fed's John Williams counsels patience, seeking monthly core readings of 0.2% or lower. BNP Paribas's James Egelhof expects three hikes starting by December.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Warsh%E2%80%99s%20First%20Big%20Call%20Whether%20to%20Undo%20Last%20Year%E2%80%99s%20Cuts.pdf"}, {"id": "bt-01", "title": "'Wage envy' between AI workers and their peers is a corporate time bomb", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Samsung Electronics reported on Jul 7 that preliminary quarterly profit surged 1,900 per cent year on year on AI-driven memory demand, a third straight record operating quarter. But the windfall deepens an internal \"wage envy\" rift: a May union deal handed some memory chip workers about US$400,000 in bonuses, while mobile and consumer electronics staff got roughly US$4,000. Dissenting workers wore black ribbons, a South Korean mourning symbol. The gap mirrors a global split between AI-adjacent staff and everyone else; in Singapore, AI salaries are rising up to five times faster than overall wages, and 2025 public-sector AI roles carried a 107 per cent premium. The piece argues for a \"stability premium\" for non-AI divisions, since cyclical chip booms eventually fade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/'Wage%20envy'%20between%20AI%20workers%20and%20their%20peers%20is%20a%20corporate%20time%20bomb.pdf"}, {"id": "bt-02", "title": "DBS crosses S$200 billion in market capitalisation as earnings optimism drives Singapore bank rally", "source": "BT", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "DBS pushed above S$200 billion in market capitalisation on Monday (Jul 13), becoming the first Singapore-listed company to cross that threshold, as all three local banks surged to record levels and lifted the Straits Times Index to a fresh high of 5,470.34. DBS closed up 0.5 per cent at S$70.79, OCBC rose 0.2 per cent to S$27.48, while UOB fell 0.9 per cent to S$43.98. Analysts cite a clearer earnings outlook, supportive Singdollar rates, strong credit growth and wealth management fees, plus safe-haven inflows amid Middle East conflict. Macquarie's Jayden Vantarakis upgraded DBS and UOB to \"outperform\" and lifted targets; Citi also raised targets. Morningstar's Kathy Chan warns rate upside may be capped. Q2 results begin with DBS on Aug 6.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/1.%20DBS%20crosses%20S200%20billion%20in%20market%20capitalisation%20as%20earnings%20optimism%20drives%20Singapore%20bank%20rally.pdf"}, {"id": "bt-03", "title": "AI is not enough to arrest China's decline", "source": "BT", "date": "14 Jul 2026", "tags": ["Geopolitics", "Technology & AI", "Finance & Markets"], "summary": "Ruchir Sharma argues China's AI prowess masks deep economic rot. Growth peaked in 2021; China's share of global GDP has slipped from 18 to 16.5 per cent in nominal terms while the US rose to 26 per cent. Independent estimates put real growth closer to zero than the official 4.5 to 5 per cent target. The working-age population is set to shrink by 75 million per decade, 2025 saw record-low births and record-high deaths. Chinese hyperscalers invest just US$100 billion in AI this year versus US$750 billion by US rivals, with an expected productivity boost of only a third of a percentage point by 2030. Total debt nears 350 per cent of GDP, property prices sit at 20-year lows, net FDI is negative and US$425 billion fled Chinese markets in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/AI%20is%20not%20enough%20to%20arrest%20China's%20decline.pdf"}, {"id": "bt-04", "title": "Asean's new financial geography: Connectivity takes centre stage", "source": "BT", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets", "Trade"], "summary": "Standard Chartered's corporate and investment bank CEO argues Asean's financial landscape is being reshaped by trade tensions, tariff uncertainty, geopolitical fragmentation and digitalisation, yet companies are adapting rather than retreating. Cross-border trade and investment remain robust; what is changing is the route. New corridors are emerging between China and South Asia, India and the Middle East, Europe and India, and within Asean, with South-South routes gaining on traditional East-West flows. Singapore is positioned as a coordination point for regional trade, liquidity and risk management, and a gateway linking Asean with China, India and the Middle East. Tokenisation is moving from experimentation to adoption, aided by MAS initiatives Project Guardian and the newly launched Bloom. Adoption will be incremental, with tokenised assets coexisting alongside existing infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Asean's%20new%20financial%20geography%20Connectivity%20takes%20centre%20stage.pdf"}, {"id": "bt-05", "title": "Bright prospects for Singapore tourism, but hotel players will need to fight hard to thrive", "source": "BT", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets", "Society"], "summary": "Singapore drew 16.9 million international visitors in 2025 with record tourism receipts of S$32.8 billion, and remains on track for its S$47 billion to S$50 billion goal by 2040. Investments include Changi Terminal 5 in the mid-2030s, the Marina Bay Cruise Centre expansion, expansions at Marina Bay Sands and Resorts World Sentosa, a Downtown Mice Hub at Straits View, Therme Singapore wellness attraction opening 2030, and plans for Sentosa and Pulau Brani. Mice receipts grew over 35 per cent to S$2.3 billion. But hotels face intense competition: inventory exceeds 74,000 rooms, occupancy ran 75 to 88 per cent, and Revpar was about S$211 in April. The Johor Bahru RTS Link adds a cheap alternative base. CapitaLand Ascott Trust sold The Robertson House for S$360 million at a 2.3 per cent exit yield.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Bright%20prospects%20for%20Singapore%20tourism,%20but%20hotel%20players%20will%20need%20to%20fight%20hard%20to%20thrive.pdf"}, {"id": "bt-06", "title": "Iran isn't the only conflict vexing the global oil market", "source": "BT", "date": "14 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Crude has fallen below US$75 a barrel, roughly pre-war levels, but refined product prices behave as if crude were above US$100. The cause is Ukraine's campaign against Russian refineries: 19 plants attacked over two months, some hit four times, with combined capacity near 4.9 million barrels a day, about 70 per cent of Russia's total. Kyiv has cut Russian diesel production capacity by roughly a third; Moscow has banned fuel exports and is dumping unrefined crude, depressing crude prices. The 3-2-1 crack spread has surged to about US$60 a barrel, a record, versus a US$10.50 average from 1985 to 2021. Roughly 10 per cent of world refining capacity, about eight million barrels a day, is offline. Trump blamed price gouging; the writer says the cause is geopolitical, not corporate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Iran%20isn't%20the%20only%20conflict%20vexing%20the%20global%20oil%20market.pdf"}, {"id": "bt-07", "title": "OpenAI, Meta, SpaceXAI compete for more cost-efficient AI models", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Three major AI developers released models in the past week, all pitching cost efficiency over raw capability. OpenAI's GPT-5.6 is designed to complete more work using significantly fewer tokens. SpaceXAI's Grok 4.5 claims twice the token efficiency of comparable rivals, and Meta says pricing for Muse Spark 1.1 will be \"attractive\". The shift comes as enterprises scrutinise AI spending after sticker shock, partly from developers like Anthropic moving to usage-based pricing; one CEO reportedly showed a monthly invoice running into millions. Mark Zuckerberg said rival labs price at \"very high margins\", while Sam Altman said enterprises now weigh spend against value. Cheaper Chinese open models from DeepSeek and routing services like OpenRouter, which raised over US$100 million in May, add pressure on Anthropic.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/OpenAI,%20Meta,%20SpaceXAI%20compete%20for%20more%20cost-efficient%20AI%20models.pdf"}, {"id": "bt-08", "title": "SGX securities trading value jumps 72% in June, caps 'stellar' FY2026", "source": "BT", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore Exchange said on Monday (Jul 13) that June securities market trading value jumped 72 per cent year on year to S$44.6 billion, capping what it called a \"stellar performance\" for FY2026. Securities daily average value rose 72 per cent to S$2.1 billion in June, while full-year SDAV gained 35 per cent to S$1.8 billion, the highest in 18 years. Total FY2026 turnover climbed 35 per cent to S$455.7 billion. The STI hit an all-time high of 5,218.96 on Jun 25, up 30.4 per cent year on year. Retail net inflows reached S$2.4 billion; small- and mid-cap SDAV surged 155 per cent to S$310 million. Derivatives volume rose 31 per cent to 34.3 million contracts in June, and ETF assets under management topped S$20.5 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/SGX%20securities%20trading%20value%20jumps%2072%20in%20June,%20caps%20'stellar'%20FY2026.pdf"}, {"id": "bt-09", "title": "SK Hynix plunges after Nasdaq debut amid diminishing earnings optimism", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SK Hynix's Seoul shares fell more than 15 per cent on Monday (Jul 13), their biggest one-day drop in nearly two decades, as investors unwound a rally following last week's Nasdaq listing. Its US-listed shares slid 8.3 per cent to US$154.1 premarket after a 12.8 per cent debut gain. Together with Samsung's decline, the selloff drove a 9 per cent plunge in the Kospi and a 20-minute trading halt. SK Hynix raised over US$26 billion selling ADRs at US$149. Analysts flagged oversupply risk from new 2027-2028 capacity, weaker-than-hoped HBM4 shipments and uncertain AI monetisation. CEO Kwak Noh-jung countered that the memory industry faces its most severe shortage in 2027. SK Hynix held a 58 per cent HBM revenue share in Q1 versus 21 per cent each for Samsung and Micron.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/SK%20Hynix%20plunges%20after%20Nasdaq%20debut%20amid%20diminishing%20earnings%20optimism.pdf"}, {"id": "bt-10", "title": "US-Iran ceasefire collapse proves businesses cannot wait out the war", "source": "BT", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "Trump declared the US-Iran ceasefire \"over\" on Jul 10 after Iranian attacks on commercial tankers in the Strait of Hormuz, following a June memorandum of understanding. US airstrikes and Iranian missile fire towards Bahrain, Kuwait and Qatar followed. Roughly a fifth of the world's oil and LNG transits Hormuz, plus about 30 per cent of internationally traded fertiliser. When war broke out in February, the strait effectively closed for weeks and Brent spiked above US$120; prices had drifted to around US$70 before jumping over 5 per cent on Jul 8. War-risk insurance premiums remain elevated and sea-mine risk lingers. Winners include US and Russian oil exporters, Saudi Arabia's Red Sea pipeline route, and EV and solar makers. The writer urges firms to treat Middle East risk as persistent and diversify suppliers and routes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/US-Iran%20ceasefire%20collapse%20proves%20businesses%20cannot%20wait%20out%20the%20war.pdf"}, {"id": "scmp-01", "title": "China seen using new tool to finance hi-tech advances amid slower economic growth", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Goldman Sachs says China could accelerate deployment of an 800 billion yuan (US$117.94 billion) New Policy-Based Financial Instrument to fund hi-tech development and cushion a forecast slowdown in quarterly growth. The quasi-fiscal tool channels strategic investment through policy banks outside commercial lending, meeting a \"dual objective\" of backing hi-tech while limiting local government debt risk. Economist Wang Lisheng wrote that the US-China technology race \"calls for larger and more durable funding support\" and noted hi-tech manufacturing funding, including AI supply chains, remains largely government-led. First-quarter growth was 5 per cent; second-quarter data is due Wednesday. Announced by the NDRC in September at 500 billion yuan, the instrument has funded AI, low-altitude economy, green energy and agriculture. Goldman estimates a 0.5-percentage-point GDP effect through early 2027, outperforming local government financing vehicles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%20seen%20using%20new%20tool%20to%20finance%20hi-tech%20advances%20amid%20slower%20economic%20growth.pdf"}, {"id": "scmp-02", "title": "China works on AI safety benchmark as regulators target large model risks", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "China's Ministry of Industry and Information Technology has begun building a safety benchmark to evaluate AI models, as US and European regulators tighten oversight. The MIIT-led National Industrial Information Security Development Research Centre is recruiting firms and experts to co-build it, with applications due Tuesday. The benchmark will assess generative AI across six dimensions - content safety, value alignment, robustness, fairness, privacy protection and trustworthiness - using a hybrid methodology covering 31 risks. It combines automated fuzzing and stress testing with human oversight to curb hallucinations, data leaks and \"jailbreak\" attacks. It follows a June White House executive order on classified cyber-capability benchmarking and Anthropic's April release of Mythos, withheld from general use. The EU AI Act mandates training-data transparency, with fines up to 7 per cent of turnover.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%20works%20on%20AI%20safety%20benchmark%20as%20regulators%20target%20large%20model%20risks.pdf"}, {"id": "scmp-03", "title": "China's historic sea-based rocket recovery puts spotlight on domestic shipbuilder", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "After China became the second nation after the US to achieve controlled recovery of an orbital-class rocket booster, attention has turned to Guangzhou Shipyard International (GSI), the China State Shipbuilding Corporation subsidiary that designed the Linghangzhe recovery platform with the Chinese Academy of Sciences. Following Friday's maiden launch of the reusable Long March-10B, the first-stage booster returned vertically and was caught by a net-capture system - four hooks latching onto a suspended net, unlike SpaceX and Blue Origin's leg-based landings. Converted from an unpowered barge, the 144-metre, 25,000-tonne platform carries a 36-metre capture net and DP-2 dynamic positioning. Maritime outlet eWorldship said the feat established \"the world's first sea-based net recovery system.\" GSI completed design by end-2024 and delivered the platform in December; all key equipment was Chinese-sourced.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%E2%80%99s%20historic%20sea-based%20rocket%20recovery%20puts%20spotlight%20on%20domestic%20shipbuilder.pdf"}, {"id": "scmp-04", "title": "Chinese medical device makers push into Europe as anti-corruption squeeze bites at home", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Chinese innovative medical device firms are accelerating into Europe as anti-corruption probes and profit squeezes hit the domestic market. Government-backed hospital purchases in China fell about 12 per cent year on year in the first five months of 2026, partly due to a new hospital corruption probe, HSBC's Linda Shu said. Public hospitals handle about 84 per cent of patient visits. Ningbo-based Jenscare Scientific won CE certification for its LuX-Valve Plus tricuspid valve device, calling it a \"milestone\"; it is not yet approved in China. Germany passed a healthcare savings bill targeting 18.8 billion euros in cuts. HSBC cut estimates for Mindray, Snibe and United Imaging, forecasting revenue growth of 2.5, 5.9 and 17 per cent respectively. The EU bars Chinese bidders from procurement contracts above 5 million euros.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Chinese%20medical%20device%20makers%20push%20into%20Europe%20as%20anti-corruption%20squeeze%20bites%20at%20home.pdf"}, {"id": "scmp-05", "title": "Dollar risks rising but Plaza Accord-style coordination not feasible now: ex-IMF adviser", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Economic historian Barry Eichengreen, a former senior IMF policy adviser, said Plaza Accord-style exchange-rate coordination is out of reach because central banks now prioritise domestic mandates such as price stability and employment. Speaking at an online lecture on Friday co-hosted by Tsinghua University, he warned that if erratic US policies and weakening institutional guard rails persist for another decade under Donald Trump and successors, the probability of an abrupt crisis of confidence in the dollar would exceed 50 per cent. He cited mounting US fiscal debt, threats to Federal Reserve independence, deregulation, tariffs and fraying alliances. Eichengreen favours a multipolar monetary system but said neither the euro nor yuan is ready to replace the dollar. He dismissed Beijing dumping US Treasuries, saying it \"could upend the global financial system.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Dollar%20risks%20rising%20but%20Plaza%20Accord-style%20coordination%20not%20feasible%20now%20ex-IMF%20adviser.pdf"}, {"id": "scmp-06", "title": "EU countries push for trade ban with Israeli settlements", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "Most European Union countries on Monday called for the bloc to propose banning imports from Israeli settlements, EU foreign policy chief Kaja Kallas said after a foreign ministers' meeting. \"The option that got the most support was banning the trade,\" she said, adding ambassadors were tasked to advance the work and an extraordinary meeting could be reconvened. Ireland, the Netherlands and Spain have already imposed national restrictions. The European Commission last week laid out options to curb settlement trade, but some diplomats accuse it of dragging its feet. Kallas called the West Bank situation \"intolerable\" and stressed the measures target settlements, not Israel. Brussels is divided over whether a ban needs unanimity or a weighted majority. More than 500,000 settlers live among some three million Palestinians.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/EU%20countries%20push%20for%20trade%20ban%20with%20Israeli%20settlements.pdf"}, {"id": "scmp-07", "title": "EU eyes social media curbs for children", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Society", "Technology & AI", "Politics"], "summary": "The European Union will move to limit young children's access to social media across the 27-member bloc, European Commission President Ursula von der Leyen said on Monday, in the biggest such effort to date. She presented an expert paper recommending a tiered approach under which under-13s could use social media only for limited periods supervised by parents, carers and teachers, with curbs lifted gradually as teenagers age. \"It is clear we need age-appropriate restrictions to platforms,\" she told reporters in Brussels. Von der Leyen signalled she would follow the recommendations, with a concrete proposal after the summer and an announcement expected at her September State of the Union address. Australia, Britain, China, India and the US have imposed or are weighing bans, mainly targeting TikTok, YouTube, Instagram and Facebook.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/EU%20eyes%20social%20media%20curbs%20for%20children.pdf"}, {"id": "scmp-08", "title": "How China plans to break SpaceX's launch monopoly with IPO push in new space race", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Geopolitics"], "summary": "Beijing is pursuing a coordinated multi-company \"wolf-pack\" strategy to challenge SpaceX's launch dominance, with at least 15 commercial aerospace firms in the IPO pipeline in Shanghai and Hong Kong. CAS Space and Beijing Minospace have reached the inquiry stage on Shanghai's Star Market, while LandSpace Technology - seen as a SpaceX challenger - had its review status restored to \"Inquired\" in late June and seeks 7.5 billion yuan (US$1.1 billion). LandSpace's Zhuque-3 reusable test rocket completed a static fire test. On July 10, China recovered the CASC-developed Long March-10B first stage at sea using the world's first net-based recovery. The push follows SpaceX's record Nasdaq debut in June. Bank of China International notes Chinese launch costs of at least US$5,000 per kilogram versus US$1,500 in America.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/How%20China%20plans%20to%20break%20SpaceX%E2%80%99s%20launch%20monopoly%20with%20IPO%20push%20in%20new%20space%20race.pdf"}, {"id": "scmp-09", "title": "How China's aerospace vision differs from Elon Musk's SpaceX", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's seaborne recovery of a Long March-10B booster using a net-capture vessel proved the viability of its state-led aerospace model, experts said, contrasting it with SpaceX's market-driven approach. Lung Siu Fung of CCB International said China's space sector is \"in a nutshell, a national team,\" with commercial firms supplementary, and bridging the US gap requires national guidance and mobilisation. The China Academy of Launch Vehicle Technology designed both rocket and platform, shifting engineering complexity from rocket to ship and eliminating landing legs. Bryan Luk of the Institute for Greater China Studies called space \"a strategic domain\" tied to sovereignty and industrial policy. The Qianfan constellation, a Starlink rival, passed 200 satellites. CNSA unveiled a 271-member Commercial Space Innovation Consortium on July 1.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/How%20China%E2%80%99s%20aerospace%20vision%20differs%20from%20Elon%20Musk%E2%80%99s%20SpaceX.pdf"}, {"id": "scmp-10", "title": "Is Japan a 'spy paradise' fuelling Russia's war machine?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Concern that foreign spies operate with impunity in Japan deepened after a New York Times report said dozens of Russian agents expelled from Western Europe have entered Tokyo to buy components for Moscow's war on Ukraine, including microchips, transmitters and advanced machinery. The report, citing five Western intelligence agencies, named Maksim Vladimirovich Filchenkov - ostensibly an Aeroflot employee but described as Moscow's most senior GRU 20th Directorate official in Japan - as leading the operation from February 2024, shipping goods via falsified records or third countries, frequently Vietnam. Ukrainian sanctions official Vladyslav Vlasiuk said Japanese components were recovered from around 90 per cent of Russian missiles fired at Ukraine. Japan lacks a specific anti-espionage law; Prime Minister Sanae Takaichi's government passed a bill in May creating a national intelligence bureau.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Is%20Japan%20a%20%E2%80%98spy%20paradise%E2%80%99%20fuelling%20Russia%E2%80%99s%20war%20machine.pdf"}, {"id": "scmp-11", "title": "Japan's 'destructive potential' in South China Sea may eclipse the US: analyst", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Geopolitics", "Southeast Asia"], "summary": "Wu Shicun, founding president of China's National Institute for South China Sea Studies, warned at a Hong Kong round table on Monday that Japan's growing military presence in the disputed waters carries a \"destructive potential\" that could surpass that of the United States. He cited Japan's full participation in this year's US-Philippine Balikatan drills, which deployed more than 1,400 Japanese personnel, three major warships and transport aircraft, and saw Tokyo fire a Type 88 anti-ship missile outside its territory for the first time. Wu said it was Japan's first display of \"military muscle\" since World War II. Foreign ministry official Qi Dahai accused Washington of stirring tensions. The remarks followed the 10th anniversary of the Hague ruling; Beijing summoned a Japanese embassy official to protest Tokyo's statement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Japan%E2%80%99s%20%E2%80%98destructive%20potential%E2%80%99%20in%20South%20China%20Sea%20may%20eclipse%20the%20US%20analyst.pdf"}, {"id": "scmp-12", "title": "Nvidia's future challenger? Chinese start-up reveals aggressive AI chip road map", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shanghai-based Dongfang Suanxin, backed by state funds and domestic tech giants, unveiled a plan to challenge Nvidia using alternative chip architectures that sidestep US export controls. Its strategy centres on software-defined computing and 3D-stacked near-memory architecture, reducing reliance on restricted advanced lithography and memory. Founder Wei Shaojun said: \"We have to forge a path of our own.\" Its flagship DF1000, a 14-nanometre processor, delivers 520 teraflops in BF16 with 6.4 terabytes per second memory bandwidth, and is ready for mass production with shipments by year-end. Valued at 12.3 billion yuan (US$1.81 billion), the firm plans a DF2000 in Q4 2026 to surpass Nvidia's H200 and a DF3000 in late 2027 to rival the B300. Wei conceded 3D stacking degrades yields and fabrication access remains the key constraint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Nvidia%E2%80%99s%20future%20challenger%20Chinese%20start-up%20reveals%20aggressive%20AI%20chip%20road%20map.pdf"}, {"id": "scmp-13", "title": "Pentagon invests US$25 million into rare earths start-up ReElement Technologies", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Trade"], "summary": "The US Department of Defence said on Monday it would invest US$25 million in rare earths start-up ReElement Technologies, part of a broader Trump administration push to boost domestic critical minerals supply and challenge China's dominance of the sector. ReElement plans to use novel processing technology to refine rare earths and other critical minerals at a commercial facility in Marion, Indiana. The rare earths are expected to feed magnets used in fighter jets, missiles and submarines. The Pentagon said funds will buy and install equipment at the Marion site, which will recycle magnets and produce rare earths plus germanium and gallium. It was unclear whether the money is a grant or loan. Reuters reported last week that ReElement had abandoned a US$80 million Pentagon loan after struggling with due diligence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Pentagon%20invests%20US%2425%20million%20into%20rare%20earths%20start-up%20ReElement%20Technologies.pdf"}, {"id": "scmp-14", "title": "Russian missiles strike Kyiv, triggering fires across the Ukrainian capital", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russian ballistic missiles struck Kyiv early on Tuesday, triggering fires across the Ukrainian capital, with the air alert lifted after about 50 minutes and no casualties reported. \"The enemy is attacking Kyiv with ballistic missiles,\" Mayor Vitali Klitschko said on Telegram, adding that air defences were operating. Tymur Tkachenko, head of the capital's military administration, said two storage areas were hit and set on fire in the Holosiivskyi district just outside the city centre. Klitschko said drone debris hit open ground in an eastern suburb, setting cars ablaze. Air-raid sirens preceded around half a dozen explosions. A drone attack in a town outside Kharkiv injured six people. The strikes followed Monday's Coalition of the Willing meeting in Paris. Thirty people were killed in a Russian bombardment on July 1-2.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Russian%20missiles%20strike%20Kyiv,%20triggering%20fires%20across%20the%20Ukrainian%20capital.pdf"}, {"id": "scmp-15", "title": "Taiwan's new military outsourcing plan: a pragmatic fix or security risk?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Politics"], "summary": "Taiwan's armed forces will outsource guard duties at nine military academy sites to private security firms in a pilot scheme, the defence ministry said on Monday, aiming to free personnel for core combat missions. Phase one starts September 1 at five sites; four more join from January 1. The island's forces are only about 79 per cent staffed, with eligible conscripts falling to 97,828 in 2023 and projected at 79,742 next year. Former National Security Bureau chief Lee Shying-jow noted 64 people were prosecuted for Beijing-linked espionage in 2024, triple 2021, calling the move \"tantamount to tearing down your own walls.\" Analyst Lu De-yun was more cautious, noting many retired soldiers work in private security. The ministry said guards face vetting and cannot access sensitive information.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Taiwan%E2%80%99s%20new%20military%20outsourcing%20plan%20a%20pragmatic%20fix%20or%20security%20risk.pdf"}, {"id": "scmp-16", "title": "Trump to restore Iran blockade, charge fees for Strait of Hormuz shipping", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "President Donald Trump said on Monday the US would charge commercial vessels a 20 per cent fee for passage through the Strait of Hormuz as Washington reinstates its blockade of Iran. Iranian ships and those trading with Iran would be barred; others retain access. Trump argued Washington should be reimbursed for protecting Gulf allies. The International Maritime Organization said there is \"no legal basis\" for mandatory tolls in international straits. Harvard's James Kraska called it \"a fee for services rendered (protection), not a fee for transit.\" Brent crude jumped 9.6 per cent and WTI 9.4 per cent. CENTCOM said US forces struck Bandar Abbas naval base with sea drones. Enforcement begins 2000 GMT Tuesday. Iranian Foreign Minister Abbas Araghchi mocked the plan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Trump%20to%20restore%20Iran%20blockade,%20charge%20fees%20for%20Strait%20of%20Hormuz%20shipping.pdf"}, {"id": "scmp-17", "title": "UAE says Iranian missiles struck tankers in Hormuz, killing and injuring crew", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "One Indian crew member was killed and eight others wounded when two Emirati oil tankers were struck by Iranian cruise missiles in the Strait of Hormuz, the UAE Ministry of Defence said on Tuesday. The tankers Mombasa and Al Bahiyah were targeted in the southern lane while in Omani territorial waters. Four of the wounded were seriously injured; six were Indian nationals and two Ukrainian. Fires broke out on both vessels but were brought under control. The UAE condemned a \"blatant attack\" and said it retained full right to respond. Separately, UKMTO said a tanker was hit by an unknown projectile 40 nautical miles northeast of Oman's Qalhat, striking the starboard engine room. Iran has not commented. War broke out on February 28 when the US and Israel attacked Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UAE%20says%20Iranian%20missiles%20struck%20tankers%20in%20Hormuz,%20killing%20and%20injuring%20crew.pdf"}, {"id": "scmp-18", "title": "UK bans support for Iran's IRGC and a linked group over antisemitic attacks in Britain", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Politics", "Geopolitics", "Society"], "summary": "Britain on Monday banned support for Iran's Islamic Revolutionary Guard Corps and a linked group following a series of antisemitic attacks, using new powers designed to stop the use of state-sponsored proxies. The ban follows attacks on Jewish-linked sites in London, including the torching of four Jewish community ambulances. The powers \"make it easier to prosecute and lock up anyone,\" Prime Minister Keir Starmer said. The government said the IRGC had \"almost certainly\" directed The Islamic Movement of Companions of the Right, which claimed seven attacks on Jewish, Israeli and Persian-language media locations. Anyone involved in sabotage for designated groups could face life imprisonment if parliament approves. Britain also designated the volunteer wing of Russia's GRU. Iran has previously denied using proxies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UK%20bans%20support%20for%20Iran%E2%80%99s%20IRGC%20and%20a%20linked%20group%20over%20antisemitic%20attacks%20in%20Britain.pdf"}, {"id": "scmp-19", "title": "UK's Burnham set to be PM after securing more Labour MPs' support", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Politics"], "summary": "Andy Burnham moved decisively closer to becoming Britain's next prime minister on Monday, gaining additional Labour MPs' nominations for an unassailable lead in the party's leadership contest. The veteran politician, 56, Greater Manchester mayor for nearly a decade, is the only Labour MP to publicly declare a candidacy to replace outgoing Prime Minister Keir Starmer, who said last month he was quitting after months of pressure over scandals, missteps and policy U-turns. After receiving 322 of 403 Labour MPs' votes on Thursday, Burnham gained 27 more by Monday, reaching 349 - making it impossible for any rival to secure the 81 endorsements needed to challenge. Nominations close Thursday; he will be crowned leader at a special conference and replace Starmer next Monday as Britain's seventh prime minister in a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UK%E2%80%99s%20Burnham%20set%20to%20be%20PM%20after%20securing%20more%20Labour%20MPs%E2%80%99%20support.pdf"}, {"id": "scmp-20", "title": "US tariff probe unlikely to derail fall Xi-Trump meeting: analysts", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Ongoing US Section 301 tariff investigations are unlikely to impair bilateral ties or the planned September Trump-Xi meeting, analysts said on Monday. The Trump administration launched a forced labour probe covering 60 countries and an excess capacity inquiry targeting 16, both including China alongside the EU, Japan, South Korea and India. \"China is just one of a group of countries,\" said Middlebury's Wei Liang, noting a \"tacit understanding\" that new tariffs will not exceed the suspended IEEPA rates struck down by the Supreme Court in February. China's effective tariff rate is just over 20 per cent; Washington proposes 20-25 per cent. Ambassador Xie Feng urged raising the Board of Trade's tariff-free limit from US$30 billion to US$300 billion. US-China goods trade totalled US$414 billion in 2025, down 28 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/US%20tariff%20probe%20unlikely%20to%20derail%20fall%20Xi-Trump%20meeting%20analysts.pdf"}, {"id": "scmp-21", "title": "Ukraine allies meet in Paris to boost air defence, pressure Russia to end war", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukraine's allies gathered in Paris on Monday to ramp up support for Kyiv, especially air defence, and increase pressure on Russia to end a war now in its fifth year. Representatives of the 37-member Coalition of the Willing, including President Volodymyr Zelensky, met at Les Invalides. The coalition is expected to announce the first joint exercises of the Multinational Force for Ukraine. Nine European countries and Ukraine formed a coalition to develop \"purely defensive\" anti-ballistic capabilities. French President Emmanuel Macron said Europe was \"in the process of becoming a power.\" The Kremlin dismissed the summit as \"a coalition of warmongers.\" Washington has permitted Ukraine to build US-designed Patriot systems and advanced legislation targeting buyers of Russian energy. France, Britain and Spain are ready to send troops.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Ukraine%20allies%20meet%20in%20Paris%20to%20boost%20air%20defence,%20pressure%20Russia%20to%20end%20war.pdf"}, {"id": "scmp-22", "title": "Why 'reverse tech transfer' from China remains a non-starter in the US auto industry", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Technology & AI", "Politics"], "summary": "As Canada and EU members embrace \"reverse tech transfer\" - courting Chinese EV investment to strengthen their industries - the US is moving the opposite way, analysts said. Washington maintains tariffs above 120 per cent on Chinese vehicles and last month banned Geely-owned Polestar from selling new US vehicles under the Commerce Department's Connected Vehicle Rule. Senator Bernie Moreno and Representative John Moolenaar introduced the Connected Vehicle Security Act to bar China-linked connected vehicles, software and hardware. LSE's John Minnich said he remains \"sceptical that Washington will allow significant Chinese greenfield manufacturing investment.\" Analysts warned protectionism breeds stagnation; Tu Le of Sino Auto Insights argued shielding markets removes urgency to innovate. Moolenaar has targeted Ford's CATL licensing deal in Michigan; a Gotion battery plant was abandoned there after protests.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Why%20%E2%80%98reverse%20tech%20transfer%E2%80%99%20from%20China%20remains%20a%20non-starter%20in%20the%20US%20auto%20industry.pdf"}, {"id": "scmp-23", "title": "Will Manila and Hanoi's maritime deal challenge Beijing in the South China Sea?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Geopolitics
