2002 Arab Peace Initiative. \"We are ready... Are you?\" he said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Lebanese%20president%20appeals%20to%20Israeli%20government%20to%20pursue%20talks%2C%20not%20war.pdf"},{"id":"st-07","title":"Modern warfare offers important AI lessons for enterprises","source":"ST","date":"10 Jun 2026","tags":["Technology & AI","Defence"],"summary":"AI battlefield platforms — Ukraine's NATO-backed Delta system and the Israel-US \"Project Maven\" campaign against Iran — show how fusing drone, satellite and ground data into one picture enables faster, more precise action. The piece argues enterprises can draw the same lesson: value comes from integrating fragmented signals, not any single algorithm. Banks, hospitals and agencies face similar needs to spot anomalies in real time. Situational awareness is the transferable advantage.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Modern%20warfare%20offers%20important%20AI%20lessons%20for%20enterprises.pdf"},{"id":"st-08","title":"Russian attacks on Ukraine kill three; Zelensky upbeat on talks with US envoys","source":"ST","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"Russian drone and missile attacks on Ukraine's Kharkiv region killed three, including a pregnant woman, as Crimea repelled drones amid intensified Ukrainian strikes on Russian oil facilities. Zelensky reported a \"positive\" call with US envoys Steve Witkoff and Jared Kushner, welcoming a push for a settlement in coming weeks. His open letter proposing face-to-face talks with Putin was rebuffed. Zelensky said Putin's circle is split and Russia's economy is in \"terrible\" shape.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Russian%20attacks%20on%20Ukraine%20kill%20three%20Zelensky%20upbeat%20on%20talks%20with%20US%20envoys.pdf"},{"id":"st-09","title":"Singapore to negotiate FTA with East African bloc","source":"ST","date":"10 Jun 2026","tags":["Southeast Asia","Trade"],"summary":"Singapore will negotiate a free-trade agreement with the eight-member East African Community, its first with an African partner, President Tharman announced during a Tanzania state visit. It would also be the EAC's first FTA with a non-African partner, spanning Burundi, the DR Congo, Kenya, Rwanda, Somalia, South Sudan, Tanzania and Uganda. Tharman called it a timely move to diversify trade networks amid geopolitical tensions. Singapore could be East African exporters' gateway to ASEAN.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Singapore%20to%20negotiate%20FTA%20with%20East%20African%20bloc.pdf"},{"id":"st-10","title":"SpaceX IPO: Can Singapore investors buy in?","source":"ST","date":"10 Jun 2026","tags":["Finance & Markets","Technology & AI","Southeast Asia"],"summary":"Ahead of SpaceX's June 12 Nasdaq debut — the largest IPO ever at ~US$1.75 trillion — Singapore investors are keen but will likely have to wait until after listing to buy shares. SpaceX, which owns AI firm xAI, will be the first AI company to go public, ahead of Anthropic and OpenAI, and has earmarked ~30% (US$22.5 billion) for retail. US distribution runs through brokers like Fidelity, Robinhood and SoFi, subject to eligibility. Indications of interest close June 10 with no fill guaranteed.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/SpaceX%20IPO%20Can%20Singapore%20investors%20buy%20in.pdf"},{"id":"st-11","title":"The problem with China's appeal for Europe to reject Japan's 'remilitarism'","source":"ST","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"The column examines China's lobbying of European capitals to view PM Takaichi's Japan as a revival of \"militarism\" that Europe, as co-author of the post-1945 order, should help contain. The pitch — echoed by FM Wang Yi at the Munich Security Conference — jars against D-Day commemorations in which Germany participated fully. The author flags the awkwardness of Beijing invoking WWII history against Japan. It frames a contested narrative battle over the Asian security order.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/The%20problem%20with%20China%27s%20appeal%20for%20Europe%20to%20reject%20Japan%27s%20%27remilitarism%27.pdf"},{"id":"st-12","title":"Trump claims Middle East peace deal near","source":"ST","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"Trump said negotiators were in the \"final throes\" of a Middle East peace deal — \"two or three days\" — after Iran and Israel halted fresh hostilities. He has repeatedly claimed an imminent agreement even as diplomacy stalls and both sides trade fire despite an April 8 ceasefire. Tehran insists any deal include Lebanon, where Israel presses its war on Hezbollah. Netanyahu said the \"fire on that front is contained.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Trump%20claims%20Middle%20East%20peace%20deal%20near.pdf"},{"id":"st-13","title":"UN warns of 'deepening crisis' in oceans, urges action","source":"ST","date":"10 Jun 2026","tags":["Environment"],"summary":"A UN World Ocean Assessment — five years' work by 600 scientists across 1,352 pages — warns oceans face a \"deepening crisis\" of warming, rising seas, shrinking ice and ecosystems near tipping points. It details the toll of climate change, pollution and overfishing on seas covering 70% of the planet. The report urges stronger multilateral cooperation and science-based decisions. It welcomed January's entry into force of a high-seas biodiversity treaty.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/UN%20warns%20of%20%27deepening%20crisis%27%20in%20oceans%2C%20urges%20action.pdf"},{"id":"st-14","title":"US judge blocks Trump's $100,000 fee for skilled visa applications","source":"ST","date":"10 Jun 2026","tags":["Politics","Trade"],"summary":"A US federal judge blocked Trump's US$100,000 fee on employer H-1B visa applications for skilled foreign workers, ruling it an unlawful tax that usurps Congress's taxation powers. Judge Leo Sorokin sided with 20 Democratic-led states, writing the payment \"is a tax, regardless of what it is called.\" A different judge upheld the fee in December in a separate, now-appealed case. The fee is part of Trump's broader immigration crackdown.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/US%20judge%20blocks%20Trump%27s%20129%2C000%20fee%20for%20skilled%20visa%20applications.pdf"},{"id":"st-15","title":"Xi leaves Pyongyang with renewed signs of China's influence","source":"ST","date":"10 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Xi Jinping left North Korea after a two-day visit that state media called a \"new era,\" easing fears that NK-Russia ties could eclipse Chinese influence. Pyongyang staged full pageantry — a 21-gun salute, friendship parade and a visit to the Sino-Korean Friendship Tower. Analysts saw the trip as reaffirming Beijing's sway amid Kim's deepening ties with Moscow. Xi and Kim pledged to defend each other's sovereignty; Kim called China his \"foremost strategic priority.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Xi%20leaves%20Pyongyang%20with%20renewed%20signs%20of%20China%27s%20influence.pdf"},{"id":"bt-01","title":"Bank of Japan to consider pausing bond taper next fiscal year: sources","source":"BT","date":"10 Jun 2026","tags":["Finance & Markets"],"summary":"The Bank of Japan will consider pausing its bond-taper (quantitative tightening) beyond next fiscal year, sources said, even as it is expected to raise its short-term rate to 1% from 0.75% next week. The nine-member board is split between soothing investor nerves and steadily shrinking the balance sheet. Current purchases run about 2.1 trillion yen a month. The June 15-16 meeting will set a new plan for fiscal 2027 and beyond.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Bank%20of%20Japan%20to%20consider%20pausing%20bond%20taper%20next%20fiscal%20year%20sources.pdf"},{"id":"bt-02","title":"China prepares two trillion yuan plan to fund nationwide AI build-out","source":"BT","date":"10 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"China is preparing to spend around 2 trillion yuan (about S$362 billion) over five years building a national network of interconnected data centres to advance its AI sector and surpass the US. State firms China Mobile and China Telecom would run most centres, relying on local suppliers like Huawei for at least 80% of technology such as AI chips — squeezing out Nvidia and AMD. The NDRC-led blueprint is Beijing's most aggressive AI-infrastructure push yet. It echoes past campaigns to build national champions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/China%20prepares%20two%20trillion%20yuan%20plan%20to%20fund%20nationwide%20AI%20build-out.pdf"},{"id":"bt-03","title":"Geopolitical shocks: what moves first and why it matters","source":"BT","date":"10 Jun 2026","tags":["Finance & Markets","Energy"],"summary":"A BT analysis of the Iran conflict's most intense phase (Feb 27-Mar 20) shows geopolitical shocks follow a recognisable pattern: energy prices move first, equities follow unevenly, and outcomes diverge by exposure. Brent rose from US$72 to US$100 a barrel as Hormuz supplies were disrupted. For investors, the value lies in knowing where to look and how to position as a shock unfolds. Energy markets lead and are the most forceful initial point of impact.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Geopolitical%20shocks%20What%20moves%20first%20and%20why%20it%20matters.pdf"},{"id":"bt-04","title":"Giant oil supertanker orders eclipse record set in 2008","source":"BT","date":"10 Jun 2026","tags":["Energy","Trade"],"summary":"Shipowners have ordered a record 262 very large crude carriers — surpassing the 2008 peak that preceded a glut and rate collapse — with deliveries stretching to the decade's end. The Iran war and Hormuz disruption sent VLCC freight rates to record highs of several hundred thousand dollars a day, double pre-conflict levels. The boom dominated the Posidonia conference in Athens. History suggests today's ordering spree could seed the next downturn.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Giant%20oil%20supertanker%20orders%20eclipse%20record%20set%20in%202008.pdf"},{"id":"bt-05","title":"Governance is key to families' ability to sustain generational wealth: US adviser","source":"BT","date":"10 Jun 2026","tags":["Finance & Markets","Society"],"summary":"Sustaining family wealth across generations hinges on governance, not just portfolios, US adviser Zhou Lu of Vanquour Global Wealth Management said. The largest US and European families overcome \"shirtsleeves to shirtsleeves in three generations\" through entrenched governance, legal structures, the operating business, the family office and managing family dynamics. Western culture's focus on risk mitigation — including among family members — is a discipline Asian families can learn from. Governance matters most in the long run.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Governance%20is%20key%20to%20families%27%20ability%20to%20sustain%20generational%20wealth%2C%20says%20US%20adviser.pdf"},{"id":"bt-06","title":"How banks are using SpaceX to woo the super rich","source":"BT","date":"10 Jun 2026","tags":["Finance & Markets"],"summary":"Wall Street banks are using the SpaceX IPO to court the ultra-wealthy, with 350 investors — including Robert Kraft and Kenneth Langone — gathering at JPMorgan to hear Elon Musk pitch the offering. Nearly two dozen banks will reap over US$500 million in fees, the largest such payout ever. Jamie Dimon framed it as the \"democratisation of finance,\" treating individuals like big institutions. Just as valuable is the chance to deepen and win ultra-rich client relationships.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/How%20banks%20are%20using%20SpaceX%20to%20woo%20the%20super%20rich.pdf"},{"id":"bt-07","title":"Malaysia's government-linked funds to invest in firms under MY Value Up programme","source":"BT","date":"10 Jun 2026","tags":["Southeast Asia","Finance & Markets"],"summary":"Malaysia's government-linked funds will channel capital to better-governed, value-creating firms under the MY Value Up programme, DPM Ahmad Zahid Hamidi said at Invest Malaysia 2026. Participants include Permodalan Nasional, the EPF and the Retirement Fund. Launched in March, the initiative targets the top 88 listed companies — about 80% of Bursa Malaysia's market cap — to articulate and deliver value-creation agendas. It anchors the 2026-2030 Capital Market Masterplan to attract investors.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Malaysia%27s%20government-linked%20funds%20to%20invest%20in%20firms%20under%20MY%20Value%20Up%20programme.pdf"},{"id":"bt-08","title":"Once deemed a costly failure, industrial policy is making a return - led by China","source":"BT","date":"10 Jun 2026","tags":["Trade","Geopolitics"],"summary":"State-led industrial policy, long dismissed as a costly failure outside the Asian Tigers, is returning — led by China — inaugurating a new era of economic planning. The World Bank, which once warned the Tigers' success was hard to replicate, now acknowledges its old advice didn't hold and published a 2026 guide on 21st-century industrial policy. Better macro management and subdued inflation make conditions more favourable. The debate has shifted from whether to intervene to how.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Once%20deemed%20a%20costly%20failure%2C%20industrial%20policy%20is%20making%20a%20return%20-%20led%20by%20China.pdf"},{"id":"bt-09","title":"SGX's Global Listing Board needs a few strong listings right out the gate","source":"BT","date":"10 Jun 2026","tags":["Southeast Asia","Finance & Markets"],"summary":"SGX's new Nasdaq-linked Global Listing Board needs strong early debuts or risks comparisons to the disappointing SPAC experiment, BT argues. After engineering the dual-listing bridge, the first GLB companies face pressure to perform; a poor showing would hurt both shareholders and SGX. Of three SPACs that listed in Singapore from 2021, only Vertex's VTAC completed a combination — with 17Live faring poorly afterward. Strong listings \"right out the gate\" are seen as critical.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/SGX%27s%20Global%20Listing%20Board%20needs%20a%20few%20strong%20listings%20right%20out%20the%20gate.pdf"},{"id":"bt-10","title":"Single founders, billion-dollar valuations: AI is minting unicorn startups at birth","source":"BT","date":"10 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"AI has altered company-building economics so that startups can be \"born as unicorns,\" Granite Asia's Jenny Lee said, with single founders shipping products in months and earning revenue within a year. Past cycles needed years of runway, 20-40 engineers and three to five years to product-market fit. She cited a sub-100-person drug-discovery firm that produced 20-plus biologics molecules and over US$100 million net profit in 2025. Asian founders, she noted, prioritise profitability over valuations.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Single%20founders%2C%20billion-dollar%20valuations%20AI%20is%20minting%20unicorn%20startups%20at%20birth.pdf"},{"id":"bt-11","title":"State of play at half-time of 2026","source":"BT","date":"10 Jun 2026","tags":["Finance & Markets"],"summary":"At the midpoint of 2026, equity markets have rallied to new highs despite Middle East headwinds, energy prices, inflation and rising yields, on an AI and semiconductor rerating and easing after the Trump-Xi summit and US-Iran talks. Three mega-IPOs at favourable valuations lifted sentiment. Friday's strong US payrolls triggered a selloff that spread to Asia, but Bank of Singapore stays \"overweight\" US equities. It urges a disciplined long-term game plan amid concentrated AI positioning.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/State%20of%20play%20at%20half-time%20of%202026.pdf"},{"id":"bt-12","title":"Trump's sliding approval ratings weigh on Republicans' prospects in US midterms","source":"BT","date":"10 Jun 2026","tags":["Politics"],"summary":"Trump's sliding approval ratings are weighing on Republican prospects for the November 2026 midterms, raising the odds Democrats recapture the House and possibly the Senate. Democrats now hold a 5.3-point generic-ballot edge, a near-eight-point swing from 2024, threatening 21 Republicans who won by under eight points. Immigration, once Trump's strongest card, has become a liability. Thin congressional margins make the shift an \"existential\" concern for the GOP.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Trump%27s%20sliding%20approval%20ratings%20weigh%20on%20Republicans%27%20prospects%20in%20US%20midterms.pdf"},{"id":"bt-13","title":"Why Europe's tariff plans on China won't solve its trade problem","source":"BT","date":"10 Jun 2026","tags":["Trade","Geopolitics"],"summary":"Europe's planned tariffs on China won't fix its deeper trade problems and risk hurting regional supply chains, the column argues. European policymakers increasingly echo US rhetoric that surging Chinese imports threaten domestic industry, beyond earlier strategic concerns over rare earths. The EU's bilateral goods deficit with China hit nearly EUR 360 billion in 2025, almost double a prior level, as EU firms struggle in China while Chinese exports to Europe surge. Tariffs address symptoms, not the structural export issue.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Why%20Europe%27s%20tariff%20plans%20on%20China%20won%27t%20solve%20its%20trade%20problem.pdf"},{"id":"bt-14","title":"With Trump mulling stakes in big AI firms, will the tech become a public utility?","source":"BT","date":"10 Jun 2026","tags":["Technology & AI","Politics"],"summary":"Trump and Senator Bernie Sanders share unlikely common ground on the US government taking equity stakes in AI companies so the public shares the rewards. Sanders proposed a sovereign wealth fund holding 50% stakes in big AI firms, via new legislation, to give the public a role and capture trillions in profits for affected workers. Anxiety is rising over AI's automation of white- and blue-collar jobs as OpenAI and Anthropic head to market. Questions remain over how a government shareholder would wield influence.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/With%20Trump%20mulling%20stakes%20in%20big%20AI%20firms%2C%20will%20the%20tech%20become%20a%20public%20utility.pdf"},{"id":"scmp-01","title":"Anthropic opens powerful Mythos AI model to public - with some safeguards","source":"SCMP","date":"10 Jun 2026","tags":["Technology & AI"],"summary":"Anthropic is releasing a public version of its powerful Mythos model — branded Claude Fable 5 — with guardrails barring risky uses like cybersecurity, after an earlier preview alarmed the world by finding thousands of software flaws. It is the most powerful model Anthropic has made for wide use, touting software-engineering and analytics performance. Access had been limited to about 200 organisations, including the US government, under the Glasswing programme. Broader access could extend momentum that lifted Anthropic's valuation above US$965 billion and past OpenAI.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Anthropic%20opens%20powerful%20Mythos%20AI%20model%20to%20public%20%E2%80%93%20with%20some%20safeguards.pdf"},{"id":"scmp-02","title":"As Putin courts Southeast Asia, does 'Russia need Asean more'?","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Energy"],"summary":"A Russia-ASEAN summit in Kazan on June 17-18 could ease Southeast Asia's energy crisis and Moscow's diplomatic isolation, though not all bloc leaders may attend. Analysts are divided on whether ASEAN chair, Philippine President Marcos, will travel. Marking 35 years of ties, the two sides discussed expanding their strategic partnership. The meeting tests how far Southeast Asia will engage Moscow for energy amid the Hormuz-driven crunch.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/As%20Putin%20courts%20Southeast%20Asia%2C%20does%20%E2%80%98Russia%20need%20Asean%20more%E2%80%99.pdf"},{"id":"scmp-03","title":"BYD playing catch-up with demand for fast-charging batteries as appeal of EVs rises","source":"SCMP","date":"10 Jun 2026","tags":["Technology & AI","Trade"],"summary":"BYD said demand for its second-generation Blade batteries and Flash Charging technology outstrips capacity, capping 2026 sales volume even as Chinese EVs gain globally. Chairman Wang Chuanfu said BYD is adding 20,000-30,000 units a month of battery capacity and expects strong domestic and international growth once supply catches up next year. Mass production of the new Blade Battery began in March. BYD is the world's largest EV producer.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/BYD%20playing%20catch-up%20with%20demand%20for%20fast-charging%20batteries%20as%20appeal%20of%20EVs%20rises.pdf"},{"id":"scmp-04","title":"Beijing regulators expect Hong Kong to press advantage as offshore yuan hub","source":"SCMP","date":"10 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"China's market regulators pledged \"unswerving\" support for Hong Kong as an international financial centre and urged the city to press its advantage as an offshore yuan hub. Officials want Hong Kong banks to deepen offshore-market development to boost global yuan adoption, said HKAB chair Sun Yu after a Beijing meeting. Regulators promised to expand opening-up and advance mainland-Hong Kong market connectivity. The push supports yuan internationalisation.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Beijing%20regulators%20expect%20Hong%20Kong%20to%20press%20advantage%20as%20offshore%20yuan%20hub.pdf"},{"id":"scmp-05","title":"China chip giants form US$577 million 'patient capital' fund to counter US tech curbs","source":"SCMP","date":"10 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"A coalition of Chinese tech firms including CXMT and Alibaba launched a 3.91 billion yuan (US$577 million) private-equity fund to provide \"patient capital\" for \"hard tech\" R&D amid tightening US export curbs. The Shanghai-registered Changzhi Hanhai fund pools capital from leading firms and state-backed vehicles, with a CXMT unit holding the largest 30% stake. It targets long-term deep-tech financing that short-term venture capital shuns. The move underscores China's self-sufficiency drive.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/China%20chip%20giants%20form%20US%24577%20million%20%E2%80%98patient%20capital%E2%80%99%20fund%20to%20counter%20US%20tech%20curbs.pdf"},{"id":"scmp-06","title":"China to bust Yangtze River chokepoint with US$11 billion 'water staircase' project","source":"SCMP","date":"10 Jun 2026","tags":["Trade","Energy"],"summary":"China began construction of a 77.2 billion yuan (US$11.4 billion) project to build mega ship locks — \"water staircases\" — near the Three Gorges dam to double freight capacity on the Yangtze. The decade-long effort, in the 15th five-year plan, would let larger vessels link inland industrial hubs to coastal ports. It aims to transform Asia's longest river into a high-capacity shipping conduit. Monday's groundbreaking advanced a cornerstone logistics strategy.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/China%20to%20bust%20Yangtze%20River%20chokepoint%20with%20US%2411%20billion%20%E2%80%98water%20staircase%E2%80%99%20project.pdf"},{"id":"scmp-07","title":"Driven by AI demand, China on track to pass US as top nuclear energy producer","source":"SCMP","date":"10 Jun 2026","tags":["Energy","Technology & AI"],"summary":"China is on track to overtake the US as the world's top nuclear-energy producer, building reactors at unrivalled speed as AI demand and the Hormuz energy crunch renew the push for reliable power, Gavekal reported. China now accounts for nearly half of reactors under construction globally and could match US capacity within five years. The US still leads in nuclear-fusion research. Beijing has made nuclear a crucial pillar of energy security.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Driven%20by%20AI%20demand%2C%20China%20on%20track%20to%20pass%20US%20as%20top%20nuclear%20energy%20producer.pdf"},{"id":"scmp-08","title":"Exclusive: US Chagos talks confirmed amid concerns over China's naval ambitions","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Defence"],"summary":"The US confirmed regular high-level talks with Britain to secure the long-term future of the Diego Garcia base amid concerns over China's expanding Indo-Pacific naval ambitions, an official told SCMP. Reports say the White House is weighing buying the Chagos Islands directly from Mauritius. Britain agreed last year to transfer sovereignty to Mauritius while preserving US-UK base use. The official called Diego Garcia \"vital and indispensable.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/ExclusiveUS%20Chagos%20talks%20confirmed%20amid%20concerns%20over%20China%E2%80%99s%20expanding%20naval%20ambitions.pdf"},{"id":"scmp-09","title":"Has Xi Jinping's North Korea visit helped cement China's vital role?","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"Analysts said Xi's North Korea visit reinforced China's \"indispensable\" regional role and Pyongyang's reliance on Beijing's economic support. Xi reached a \"critical consensus\" with Kim and pledged to guide ties \"in the new era,\" with both exchanging views on regional stability. Kim said the visit signalled their closer alignment to the world. The trip helped counter the narrative that Russia could supplant China's influence over Pyongyang.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Has%20Xi%20Jinping%E2%80%99s%20North%20Korea%20visit%20helped%20cement%20China%E2%80%99s%20vital%20role.pdf"},{"id":"scmp-10","title":"Is Trump calling the shots on Israel, or just pretending to?","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Analysts are sceptical of Trump's claims to have reprimanded Netanyahu over escalations with Hezbollah and Iran, seeing mostly finger-wagging and political theatre. Trump told Axios he warned \"Bibi, you better be careful, or you will be on your own,\" after earlier calling him \"crazy.\" Netanyahu's repeated unilateral defiance is seen as embarrassing Trump. Jaded observers view the exchanges as playing to the crowd rather than real leverage.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Is%20Trump%20calling%20the%20shots%20on%20Israel%2C%20or%20just%20pretending%20to.pdf"},{"id":"scmp-11","title":"Japan's looming typhoon crisis threatens disaster defences and tourism","source":"SCMP","date":"10 Jun 2026","tags":["Environment","Society"],"summary":"Japan could face one of its worst typhoon seasons, with Weathernews forecasting up to 28 typhoons affecting the country and 14 possibly making landfall — near historical extremes. A typical year sees about 25 systems form and under three strike the main islands. Repeated extreme weather could strain disaster defences and a summer tourism industry already stretched by packed trains and hotels. Typhoon Jangmi earlier caused disruption.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Japan%E2%80%99s%20looming%20typhoon%20crisis%20threatens%20disaster%20defences%20and%20tourism.pdf"},{"id":"scmp-12","title":"Microsoft cuts hundreds of cloud jobs on mainland as China, US tighten data laws","source":"SCMP","date":"10 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"Microsoft is laying off an estimated 200-400 employees at its Azure cloud unit in China as it navigates tightening US and Chinese data regulations — its third China downsizing in two years. Affected Beijing and Shanghai staff were told roles end July 6, with severance and an option to relocate to Canada. Other Microsoft units in China remain. The cuts reflect restrictions on cross-border data flows between the two countries.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Microsoft%20cuts%20hundreds%20of%20cloud%20jobs%20on%20mainland%2C%20as%20China%2C%20US%20tighten%20data%20laws%20sources.pdf"},{"id":"scmp-13","title":"New head of China's financial regulator vows to prevent 'blow-ups' in first policy meeting","source":"SCMP","date":"10 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"China's new financial-regulator chief Ding Xiangqun used her first major policy meeting to vow to prevent financial \"blow-ups,\" targeting risks at smaller lenders, the property sector and local-government debt. Ding, who took over the NFRA on May 29 and is the first woman to lead it, called for tougher supervision and faster risk resolution. She backed expanding the property white-list programme and transforming local-government financing vehicles. Smaller institutions are a key concern.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/New%20head%20of%20China%E2%80%99s%20financial%20regulator%20vows%20to%20prevent%20%E2%80%98blow-ups%E2%80%99%20in%20first%20policy%20meeting.pdf"},{"id":"scmp-14","title":"Pentagon blacklist raises spectre of investment curbs for Chinese tech firms","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Trade","Technology & AI"],"summary":"The Pentagon's widening \"Chinese military companies\" blacklist raises reputational and future US-investment-curb risks for top Chinese tech firms, legal experts say. The latest Section 1260H additions span AI, EVs, robotics and biotech — including Alibaba, Baidu, BYD, WuXi AppTec, RoboSense and Unitree — plus memory makers CXMT and YMTC, which had been briefly removed in February. The firms strongly reject the \"military\" label. The list follows earlier additions of Tencent and others.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Pentagon%20blacklist%20raises%20spectre%20of%20investment%20curbs%20for%20Chinese%20tech%20firms.pdf"},{"id":"scmp-15","title":"Trump's China thaw faces resistance from Congress and his own administration","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Trade"],"summary":"Trump's warmer tone toward Beijing — endorsing Chinese students, China-linked farmland purchases and downplaying espionage — faces resistance from Congress and his own administration, which keeps tariffs and export curbs in place. His suggestions of letting Chinese carmakers into the US are a non-starter across the executive branch and both parties. Experts call it a transactional approach that raises doubts about the truce's durability. The gap between rhetoric and policy is widening.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Trump%E2%80%99s%20China%20thaw%20faces%20resistance%20from%20Congress%20and%20his%20own%20administration.pdf"},{"id":"scmp-16","title":"US launches strikes against Iran over downed Apache helicopter","source":"SCMP","date":"10 Jun 2026","tags":["Geopolitics","Defence","Energy"],"summary":"The US launched fresh \"self-defence strikes\" against Iran on Tuesday, hours after Trump said Iran downed a US Apache helicopter patrolling the Strait of Hormuz, calling it a \"proportional response to unjustified Iranian aggression.\" Both US crew members were rescued near Oman, uninjured; US reports said the Apache had contacted an Iranian drone before going down. The retaliation adds new strain to fragile peace efforts. It reignites escalation risk just as a ceasefire seemed to hold.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/US%20launches%20strikes%20against%20Iran%20over%20downed%20Apache%20helicopter.pdf"},{"id":"scmp-17","title":"US trade court to Trump administration: speed up tariff refunds","source":"SCMP","date":"10 Jun 2026","tags":["Trade","Politics"],"summary":"The US Court of International Trade pressed the Trump administration to speed refunds of billions in tariffs collected under IEEPA and later struck down by the Supreme Court in February. \"The time has come to refund all the duties,\" Judge Richard Eaton said, citing \"growing inequity\" between big importers and small businesses. Customs said it would refund the rest later, unable to \"do it all at once.\" Of an estimated US$166 billion collected, only part has been returned.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/US%20trade%20court%20to%20Trump%20administration%20speed%20up%20tariff%20refunds.pdf"},{"id":"scmp-18","title":"With a global AI data shortage looming, China boosts its own supply","source":"SCMP","date":"10 Jun 2026","tags":["Technology & AI","Trade"],"summary":"China unveiled a nationwide plan to boost the supply of high-quality AI training data, treating data as a core strategic asset amid a looming global data drought. The National Data Administration's draft road map expands the supply, circulation and commercialisation of industry-specific datasets to anchor the \"AI Plus\" strategy. By 2028 it aims for a validated dataset ecosystem spanning research, manufacturing, energy, finance, healthcare and more. The push aims to secure China a leading AI position.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/With%20a%20global%20AI%20data%20shortage%20looming%2C%20China%20boosts%20its%20own%20supply.pdf"}]},"2026-06-11":{"date":"2026-06-11","dayOfWeek":"Thursday","totalArticles":69,"sourceCounts":{"WSJ":21,"ST":15,"BT":12,"SCMP":21},"executiveDigest":"US–Iran strikes enter a second day with Tehran declaring the Strait of Hormuz ‘completely closed’, driving oil and global inflation higher—even as a software-led tech sell-off and dot-com-era warnings collide with record AI-infrastructure financing from Google, Broadcom and Anthropic.","briefingCards":[{"title":"Lead story · Iran war and the Hormuz squeeze","body":"The US struck Iran for a second straight day as Tehran declared the Strait of Hormuz ‘completely closed’ and the Treasury added sanctions on entities, including some in China and Hong Kong, tied to Iranian weapons procurement. The energy ripple is now structural: a backlog of tankers holding roughly 100 million barrels waits to clear the strait, and S&P Global says inventory needs rise 5.8 million barrels for every day it stays shut. Governments are moving to stockpile oil, which analysts say will keep prices elevated regardless of how the conflict ends. Civilians are bearing the cost—US strikes on reservoirs left some 20,000 people in Sirik without water in 50°C heat. Trump warned Iran would ‘pay the price’ while insisting a deal is ‘really close’."},{"title":"Markets & finance · AI trade wobbles, banks shine","body":"After Friday’s brutal tech sell-off, Bank of America flagged a valuation gap between rich and cheap stocks at extremes last seen before the March 2000 dot-com bust, with a jumbo-IPO wave echoing past peaks. Singapore family offices are turning more discerning, pivoting from generic SaaS after the iShares Software ETF’s 30% plunge and uneven rebound. Against that, CGSI upgraded Singapore banks to ‘overweight’ on net-interest-income upside and 7.3% deposit growth, and SGX noted technology could overtake S-REITs in the iEdge Next 50. Hong Kong’s bond hub heated up as Tencent and Swire raised over US$5.2 billion. Spencer Jakab’s warning that index funds have become ‘a single bet’ on AI giants captures the mood."},{"title":"Asia realignment · hedging across blocs","body":"Singapore PM Lawrence Wong will visit Kazan for the Asean-Russia summit—the first high-level Singapore-Russia leader contact since the city-state sanctioned Moscow in 2022. Japan and Malaysia agreed to deepen maritime defence and energy cooperation amid shared concern over China’s claims, while Beijing accused Japanese aircraft of snooping near Taiwan and Xi signalled closer, if calibrated, ties with North Korea. Chinese diplomats are openly war-gaming the 2026 US midterms, warning a Democratic Congress could bring ‘renewed volatility’. The Pentagon’s Section 1260H blacklist swelled to 188 entities, snaring Alibaba, Baidu, BYD and WuXi AppTec ahead of Xi’s planned US visit."},{"title":"Energy & climate · the war’s long shadow","body":"The Hormuz disruption is feeding through to prices worldwide: Japan’s wholesale inflation hit a three-year high of 6.3% on crude and naphtha costs, all but locking in a Bank of Japan hike next week. China’s factory prices accelerated to 3.9%, partly on electrification and AI-driven demand for metals and machinery. Longer term, a Zurich Insurance report warned 75% of Asean renewable sites—some US$165 billion of value—face high climate-hazard risk by 2030, though US$13 billion of resilience spending could avert US$82 billion in losses. China pressed ahead with green-industrial heft, from a US$11.4 billion Yangtze ‘water staircase’ to the world’s largest ammonia carrier."},{"title":"Technology & AI · financing boom meets scrutiny","body":"The AI build-out’s financial plumbing came into view: Google is backstopping Anthropic’s lease payments behind a US$35 billion (S$45 billion) data-centre loan, while Broadcom, Apollo and Blackstone launched a US$35 billion platform targeting 20GW of compute for Anthropic and OpenAI. Anthropic released Claude Fable 5, a ‘Mythos-class’ model with guardrails, as the White House reined in its own AI-testing unit on national-security grounds. Apple, by contrast, hit a memory wall—its delayed Siri leans on Google and runs only on scarce 12GB-DRAM devices. China is preparing for AI’s job shock through courts and warnings to employers, even as Shopee cut ~8% of its developers."},{"title":"Singapore & SEA focus · building on trusted-hub strengths","body":"Applied Materials opened a US$500 million Tampines campus, doubling its Singapore footprint and adding 1,000 jobs to serve AI-driven chip demand, with DPM Gan Kim Yong hailing the opportunity. A commentary on the Economic Strategy Review argued Singapore should not chase the next ChatGPT but double down on its trusted-hub role connecting capital, talent and ideas. CICT unitholders waved through the S$3.9 billion Paragon acquisition (99.96% in favour) despite sharp questions on timing and funding. Colliers ranked Singapore the world’s third financial centre behind New York and London, and Temasek-backed iCapital is expanding in Asia as private-wealth demand for alternatives surges."}],"keyMetrics":[{"value":"69","label":"Articles today","sub":"WSJ 21 · ST 15 · BT 12 · SCMP 21"},{"value":"+19.4%","label":"China May exports","sub":"Beat forecasts on AI-driven demand"},{"value":"188","label":"Pentagon 1260H list","sub":"China military-linked firms, up from 134"},{"value":"US$45b","label":"Google–Anthropic chips","sub":"Backstops a US$35b data-centre loan"},{"value":"4.17m","label":"US May home sales","sub":"+3.2%, biggest rise this year"},{"value":"+6.3%","label":"Japan wholesale prices","sub":"Fastest in 3 years on energy shock"}],"articles":[{"id":"scmp-20","title":"US and Iran exchange more strikes, Tehran tightens hold on Hormuz","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Energy"],"summary":"The US carried out strikes against multiple targets in Iran for a second straight day, while the Treasury imposed fresh sanctions on entities, including some in mainland China and Hong Kong, accused of supporting Tehran's weapons procurement. Iran declared the Strait of Hormuz 'completely closed', tightening its grip on the vital chokepoint. 'We hit them hard yesterday and we're going to hit them again hard today,' Trump told reporters, adding talks remained 'really close' to a deal. The escalation further tests a fragile ceasefire and global energy supply.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/UpdateUS%20and%20Iran%20exchange%20more%20strikes%2C%20Tehran%20tightens%20hold%20on%20Hormuz.pdf"},{"id":"scmp-11","title":"Global AI trade flashing signals reminiscent of the dotcom bust, analysts warn","source":"SCMP","date":"11 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Analysts warn the global AI trade is flashing signals reminiscent of past market tops, with a handful of winners far outpacing the broader market. Bank of America said the valuation gap between richly priced and cheaper stocks has reached extremes last seen before the March 2000 dot-com bust. A wave of jumbo IPOs is matching the run-ups to the 2000 and 2008 declines, according to SPI Asset Management and others. The warnings follow a brutal Friday tech sell-off triggered by fears of monetary tightening and crowded positioning.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Global%20AI%20trade%20flashing%20signals%20reminiscent%20of%20the%20dotcom%20bust%2C%20analysts%20warn.pdf"},{"id":"st-05","title":"Google's backstops underpin $45 billion chip deal for Anthropic","source":"ST","date":"11 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Google has agreed to backstop Anthropic's lease payments across five data centres, helping the Claude maker secure financing amounting to a US$35 billion (S$45 billion) loan. The previously unreported arrangement underscores the complex, circular ties among the largest companies pouring money into AI. Google, an early Anthropic investor, also supplies the chips Anthropic will use at those data centres, giving it a chance to sell more hardware. The deal illustrates how leading firms are striking intricate deals to lock in AI compute capacity.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Google%27s%20backstops%20underpin%2045%20billion%20chip%20deal%20for%20Anthropic.pdf"},{"id":"scmp-14","title":"Singapore PM Lawrence Wong to visit Russia's Kazan, first since Ukraine war sanctions","source":"SCMP","date":"11 Jun 2026","tags":["Southeast Asia","Geopolitics"],"summary":"Singapore PM Lawrence Wong is set to visit Kazan, Russia, next week for the Asean-Russia Commemorative Summit (June 17-19), the first high-level Singapore-Russia leader contact since the city-state sanctioned Moscow in 2022. The summit marks 35 years of Asean-Russia dialogue relations and will reportedly be hosted by President Putin, though sources did not confirm a Wong-Putin meeting. Singapore was the only Asean member to impose sanctions over the Ukraine invasion, which it repeatedly condemned. Ties have been cold since 2022.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Singapore%20PM%20Lawrence%20Wong%20to%20visit%20Russia%E2%80%99s%20Kazan%2C%20first%20since%20Ukraine%20war%20sanctions.pdf"},{"id":"wsj-01","title":"A Rush to Stockpile Oil Will Keep Prices Higher for Longer","source":"WSJ","date":"11 Jun 2026","tags":["Energy","Geopolitics"],"summary":"Governments hit by a second energy crisis in four years are moving to stockpile oil, which analysts say could keep prices elevated regardless of how the Iran conflict ends. A backlog of tankers holding roughly 100 million barrels is waiting to clear the Strait of Hormuz, and close to 500 million barrels are needed to replenish drawn-down inventories outside the Gulf. S&P Global estimates that figure rises by 5.8 million barrels for every day the strait stays shut. Even a sustained 1-million-barrel-a-day surplus would take more than a year to rebuild stocks to prewar levels.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/A%20Rush%20to%20Stockpile%20Oil%20Will%20Keep%20Prices%20Higher%20for%20Longer.pdf"},{"id":"wsj-02","title":"Anthropic Releases Fable 5, a 'Mythos-Class' AI Model With Guardrails","source":"WSJ","date":"11 Jun 2026","tags":["Technology & AI"],"summary":"Anthropic is releasing Claude Fable 5, a next-generation 'Mythos-class' model, to the public with guardrails that strip dangerous cybersecurity and biological capabilities. When users probe sensitive areas such as bioweapons or software exploits, Fable redirects them to the older Opus 4.8 model. The company says Fable costs more than Opus 4.8 but has stronger memory, making it better at long, complex tasks with fewer instructions. Since Mythos was announced in April it has prompted the Trump administration to re-evaluate AI policy and unsettled cybersecurity experts.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Anthropic%20Releases%20Fable%205%2C%20a%20%E2%80%98Mythos-Class%E2%80%99%20AI%20Model%20With%20Guardrails.pdf"},{"id":"wsj-03","title":"Apple's Siri Hits a Memory Wall","source":"WSJ","date":"11 Jun 2026","tags":["Technology & AI"],"summary":"Apple's most powerful new Siri AI features will be limited to a handful of devices because on-device AI requires at least 12GB of DRAM, which only a small slice of its fleet carries. In the iPhone line only the two 17 Pro models and the poor-selling iPhone Air meet that bar, while 8GB has been standard for years. Booming AI data-centre demand is driving memory-chip shortages and soaring DRAM prices. That squeezes device makers like Apple to either raise prices or absorb thinner margins.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Apple%E2%80%99s%20Siri%20Hits%20A%20Memory%20Wall.pdf"},{"id":"wsj-04","title":"Broadcom, Apollo and Blackstone Launch $35 Billion AI Infrastructure Platform","source":"WSJ","date":"11 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Broadcom is partnering with Apollo Global Management and Blackstone's credit and insurance arm to launch an AI infrastructure platform backed by an initial $35 billion. The 'AI XPV Platform' aims to enable more than 20 gigawatts of compute capacity through 2028 using Broadcom chips, supporting customers including Anthropic and OpenAI. The first tranche will fund Anthropic's previously announced expansion of more than 1 gigawatt of compute. CEO Hock Tan said it pairs Broadcom's roadmap with long-term private capital amid surging AI demand.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Broadcom%2C%20Apollo%2C%20Blackstone%20Launch%20%2435%20Billion%20AI%20Infrastructure%20Platform.pdf"},{"id":"wsj-05","title":"China's Strength in Semiconductors, Rare Earths Drives Export Surge","source":"WSJ","date":"11 Jun 2026","tags":["Trade","Technology & AI"],"summary":"China's exports grew 19.4% in May from a year earlier in dollar terms, accelerating from April's 14.1% and surprising economists who expected a slowdown. Customs data show the global AI investment boom is fuelling demand for Chinese semiconductors, rare earths and green-energy goods, cushioning broader headwinds from the Iran war. Oxford Economics' Sheana Yue said the war is boosting demand for green exports such as EVs, batteries and solar. China's relative insulation from energy cost shocks reinforces its competitive edge.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/China%E2%80%99s%20Strength%20in%20Semiconductors%2C%20Rare%20Earths%20Drives%20Export%20Surge.pdf"},{"id":"wsj-06","title":"Does Trump Care About the 2026 Midterms? They Care About Him","source":"WSJ","date":"11 Jun 2026","tags":["Politics"],"summary":"Columnist Jason Riley argues Trump remains fixated on relitigating 2020 even as Republicans warn the 2026 midterms will decide his presidency's fate. Trump is promoting a $1.8 billion 'weaponization fund' to compensate MAGA allies, including potentially Jan. 6 rioters he calls 'heroes', despite polling showing most Americans view them as violent criminals. Riley notes that if Democrats take the House or Senate, Trump would spend his final two years fending off investigations and impeachment. Every Republican except Trump understands protecting the GOP majority should be the priority.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Does%20Trump%20Care%20About%20the%202026%20Midterms%20They%20Care%20About%20Him.pdf"},{"id":"wsj-07","title":"How to Get Crypto Exposure Without Ownership","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"As the crypto market matures, advisers are guiding clients who want digital-asset upside without holding coins directly toward spot ETFs in bitcoin or Ethereum, which dominate market capitalization. The SEC approved the first spot bitcoin ETFs in January 2024, with BlackRock's IBIT now the largest by assets, followed by Fidelity's FBTC and Grayscale's GBTC. Other indirect routes include crypto-linked equities and funds. The piece frames ETFs as a familiar wrapper for investors uneasy about custody and volatility.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/How%20to%20Get%20Crypto%20Exposure%20Without%20Ownership.pdf"},{"id":"wsj-08","title":"Inside Trump's Economic War on Iran","source":"WSJ","date":"11 Jun 2026","tags":["Geopolitics","Energy"],"summary":"Treasury and Pentagon officials describe 'Operation Economic Fury', launched April 16, as a sanctions-and-blockade campaign to choke the Iranian regime's revenue alongside the military 'Operation Epic Fury'. As of May 23 the naval blockade had redirected more than 100 vessels and involved over 15,000 troops, targeting oil and gas that account for 82% of Iran's export revenue. OFAC-led sanctions restrict financial and logistical flows, while the regime increasingly turns to cryptocurrency to move capital. The authors argue economic pressure may be the best route to leverage over Tehran.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Inside%20Trump%E2%80%99s%20Economic%20War%20on%20Iran.pdf"},{"id":"wsj-09","title":"Kalshi Plans Workplace Disclosure Rule to Combat Insider Trading","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"Prediction-market operator Kalshi will require some participants to disclose their employers after an advisory committee recommended tighter measures against insider trading and manipulation. Sensitive markets tied to company performance and national security, including the Iran war, are expected to require employment disclosure in the coming weeks. Kalshi says it won't verify the information unless suspicious activity is flagged, after which it will investigate. The move responds to growing scrutiny of Kalshi and rival Polymarket from lawmakers, regulators and prosecutors.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Kalshi%20Plans%20Workplace%20Disclosure%20Rule%20to%20Combat%20Insider%20Trading.pdf"},{"id":"wsj-10","title":"Lebanon Is Teetering at the Abyss of a New Civil War","source":"WSJ","date":"11 Jun 2026","tags":["Geopolitics"],"summary":"Lebanon's state can barely function, providing only a few hours of electricity a day, with Hezbollah remaining more powerful than its military. A strained ceasefire requires the state to gradually reclaim territory while disarming Hezbollah, a plan that faltered after the 2024 war. Tensions spiked after Israel struck Beirut's southern suburbs Sunday and Iran and Israel exchanged fire, testing Trump's fragile Middle East ceasefire. Israel's ground invasion and air raids have displaced more than a million people internally.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Lebanon%20Is%20Teetering%20at%20the%20Abyss%20of%20a%20New%20Civil%20War.pdf"},{"id":"wsj-11","title":"Manhattan's Red-Hot Office Market Poised for Its Best Year Since 2000","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Manhattan's office market is on pace for its strongest leasing year since 2000, driven this time by AI rather than dot-coms. AI firms leased 1 million square feet in the first quarter, more than in all of 2025, lifting AI's share of tech-sector leasing to 56%. OpenAI's presence has transformed SoHo, while Anthropic is nearing a deal for half a million square feet at Hudson Square. The parallels with the frothy dot-com era, when many money-losing startups later went bust, are hard to ignore.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Manhattan%E2%80%99s%20Red-Hot%20Office%20Market%20Poised%20for%20Its%20Best%20Year%20Since%202000.pdf"},{"id":"wsj-12","title":"May Home Sales Notched Their Biggest Rise This Year","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"US existing-home sales rose 3.2% in May to a seasonally adjusted annual rate of 4.17 million, the biggest monthly increase since December and well above forecasts. Lower April mortgage rates and rising for-sale inventory gave buyers more affordability and choice. NAR chief economist Lawrence Yun said a return toward 6% mortgage rates could pull the market out of a three-year slump. Still, sales are up just 0.7% over the first five months versus 2025, suggesting the recovery remains fragile.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/May%20Home%20Sales%20Notched%20Their%20Biggest%20Rise%20This%20Year.pdf"},{"id":"wsj-13","title":"Netanyahu Has Lost Middle America","source":"WSJ","date":"11 Jun 2026","tags":["Geopolitics","Society"],"summary":"William Galston argues the Gaza war has produced a catastrophic, lasting erosion of US public support for Israel. For the first time in a quarter-century of Gallup polling, more Americans sympathize with Palestinians than Israelis, with sympathy falling even among Republicans, down 17 points since 2020. The sharpest shift is among 35-to-54-year-olds, whose preference for Israelis fell 33 points. Support for a two-state solution has risen to 57%, the highest in over two decades, with attitudes shifting among American Jews as well.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Netanyahu%20Has%20Lost%20Middle%20America.pdf"},{"id":"wsj-14","title":"Social Security Now Expects Shortfall Earlier, in Late 2032","source":"WSJ","date":"11 Jun 2026","tags":["Politics","Finance & Markets"],"summary":"Social Security's trustees now project the retirement trust fund will be depleted by late 2032, a year earlier than last year's estimate. The acceleration reflects reduced revenue after Trump's tax law gave seniors an extra deduction, plus lower fertility and immigration shrinking the worker base. Without congressional action, depletion would trigger an automatic 22% cut in benefits. Trustees also lowered long-term fertility assumptions, signaling the strain will persist longer than previously expected.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Social%20Security%20Now%20Expects%20Shortfall%20Earlier%2C%20in%20Late%202032.pdf"},{"id":"wsj-15","title":"The Boom in Crypto ETFs Has a Downside for Investors","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"A surge of cryptocurrency ETFs has expanded investor choice but many carry higher fees and face closure risk if they fail to gain scale. Since spot crypto funds were approved in January 2024, managers have launched 130 funds and have another 155 digital-asset ETFs in the pipeline. Demand remains concentrated in low-cost bitcoin and Ethereum products from BlackRock and Fidelity, leaving newer funds struggling. Analysts warn as many as a third could shut within two years, forcing liquidations that may trigger capital-gains taxes.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/The%20Boom%20in%20Crypto%20ETFs%20Has%20a%20Downside%20for%20Investors.pdf"},{"id":"wsj-16","title":"The Fading Fun of Trump 2.0","source":"WSJ","date":"11 Jun 2026","tags":["Politics","Society"],"summary":"WSJ reports signs that Trump's cultural cachet is slipping, citing boos at Madison Square Garden during the NBA Finals. The celebratory air around his second inauguration, when stars performed and athletes mimicked 'the Trump shuffle', has dissipated. Several artists pulled out of a semiquincentennial concert series over its political ties, and a judge ordered Trump's name stripped from the Kennedy Center. The piece frames a broader waning of his influence in entertainment circles.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/The%20Fading%20Fun%20of%20Trump%202.0.pdf"},{"id":"wsj-17","title":"U.S. Trade Deficit Nearly Flat in April","source":"WSJ","date":"11 Jun 2026","tags":["Trade"],"summary":"America's trade deficit was roughly unchanged in April at $55.9 billion, down about 1.2% from March, adding evidence that tariffs have done little to rebalance trade. Imports rose 2% to $383 billion and exports 2.6% to $327.1 billion, with semiconductor and computer imports climbing on AI buildout and crude exports up $6.4 billion amid the energy shock. Since Trump's second term began the deficit has averaged just over $70 billion a month, near the Biden-era $72 billion. Tariff swings abated in 2026 after the Supreme Court curbed his IEEPA authority.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/U.S.%20Trade%20Deficit%20Nearly%20Flat%20in%20April.pdf"},{"id":"wsj-18","title":"When Stock Markets Become a Single Bet","source":"WSJ","date":"11 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Spencer Jakab warns that index investing increasingly means a concentrated wager on a handful of AI-exposed giants. Tech rebounded from Friday's selloff with one exception: Apple, whose underwhelming new Siri disappointed investors. He cites cautionary cases such as Novo Nordisk, whose single trial failure sent Denmark's index tumbling 3.6%, and the dot-com-era collapse of Nortel. The column questions whether broad index funds still deliver the diversification investors assume.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/When%20Stock%20Markets%20Become%20a%20Single%20Bet.pdf"},{"id":"wsj-19","title":"White House Reins In AI-Testing Unit as National-Security Concerns Grow","source":"WSJ","date":"11 Jun 2026","tags":["Technology & AI","Politics"],"summary":"Trump administration officials have ordered the Center for AI Standards and Innovation (CAISI) to halt public model assessments while a new executive order is implemented. The move, backed by National Cyber Director Sean Cairncross and Treasury Secretary Scott Bessent, reflects mounting concern over powerful models like Anthropic's Mythos that could enable cyberattacks or bioweapons. The administration is working with Anthropic and OpenAI to control access to their most capable products. Some officials see it as Cairncross expanding his influence over model evaluation.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/White%20House%20Reins%20In%20AI-Testing%20Unit%20as%20National-Security%20Concerns%20Grow.pdf"},{"id":"wsj-20","title":"Why Does It Take Years to Get a Patriot Missile From Factory to Front Line?","source":"WSJ","date":"11 Jun 2026","tags":["Defence"],"summary":"The newest PAC-3 MSE Patriot interceptors fire in seconds but take more than two years to build and cost around $4 million each, leaving the US and allies short of supply. The Pentagon agreed with Lockheed Martin to more than triple output to about 2,000 a year, but that target won't be reached until end-2030. The Iran war and continued fighting in Ukraine are draining stockpiles, and CSIS estimates replenishment will take at least three years and more money than Congress has allocated. Lockheed cites component bottlenecks and tight labor markets across its 400-plus suppliers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Why%20Does%20It%20Take%20Years%20to%20Get%20a%20Patriot%20Missile%20From%20Factory%20to%20Front%20Line.pdf"},{"id":"wsj-21","title":"Wyoming's AI Data-Center Boom Meets the 'Man Camp' Backlash","source":"WSJ","date":"11 Jun 2026","tags":["Technology & AI","Society"],"summary":"A data-centre construction wave in Cheyenne, Wyoming, including a Meta facility, a tripling Microsoft complex and the massive 'Project Jade', is transforming the prairie and straining housing. Developers have pitched a 'man camp' to house up to 5,600 workers, a complex that would be larger than 84 of Wyoming's incorporated towns. Iron Guard Housing markets the modular units as a comfortable 'lifestyle experience' with security, dining and pickleball courts. The plan has sparked local backlash in America's least populous state.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20WSJ/Wyoming%E2%80%99s%20AI%20Data-Center%20Boom%20Meets%20the%20%E2%80%98Man%20Camp%E2%80%99%20Backlash.pdf"},{"id":"st-01","title":"Applied Materials opens $600m Singapore plant","source":"ST","date":"11 Jun 2026","tags":["Southeast Asia","Technology & AI"],"summary":"Applied Materials opened a new US$500 million (S$644 million) Tampines Campus, doubling its Singapore manufacturing footprint and creating 1,000 local jobs over coming years. The US chip-gear maker said the plant will serve chipmakers expanding output to meet AI-driven demand. CEO Gary Dickerson said the expansion strengthens Applied's ability to deliver next-generation manufacturing equipment faster. Deputy Prime Minister Gan Kim Yong said AI is sharply lifting demand for computing power and creating new opportunities for the chip industry.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Applied%20Materials%20opens%20600m%20Singapore%20plant.pdf"},{"id":"st-02","title":"BYD aims to be world's biggest automaker","source":"ST","date":"11 Jun 2026","tags":["Trade","Technology & AI"],"summary":"BYD chairman Wang Chuanfu told shareholders he expects the firm to become the world's largest automaker by scale within five years, seeking to reassure investors after a steep share-price slide. BYD ranked sixth globally in 2025 with 4.6 million vehicles sold but has struggled with intensifying domestic competition; its Hong Kong shares are down more than 45% from their peak. Wang emphasised ramping output of its second-generation Blade Battery, which he called 2026's key growth bottleneck. He cited strong exports and battery and fast-charging advances as growth drivers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/BYD%20aims%20to%20be%20world%27s%20biggest%20automaker.pdf"},{"id":"st-03","title":"China is planning for AI's job shock. America isn't","source":"ST","date":"11 Jun 2026","tags":["Technology & AI","Society"],"summary":"This commentary argues Beijing is actively preparing for AI-driven job displacement amid a fragile labour market and persistent youth unemployment. The government has reportedly warned tech employers not to cut jobs as they adopt AI, and courts in Hangzhou and Beijing have sided with laid-off tech workers, setting a precedent. The author contrasts this with the US, where AI is increasingly a convenient cover for cost-cutting layoffs. But case-by-case litigation is deemed too weak an instrument for a labour shock of this scale.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/China%20is%20planning%20for%20AI%27s%20job%20shock.%20America%20isn%27t.pdf"},{"id":"st-04","title":"China's consumer inflation stalls even as factory prices surge","source":"ST","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"China's consumer price index rose 1.2% year-on-year in May, unchanged from April and below the 1.3% forecast, dragged by a 16% plunge in pork prices. Producer inflation accelerated to 3.9%, the fastest in almost four years, up from 2.8% in April and signalling the possible end of an economywide deflation streak. Core CPI eased to 1.1%. An NBS statistician attributed rising factory prices to electrification, AI integration and surging demand for computing power lifting metals, machinery and computer prices.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/China%27s%20consumer%20inflation%20stalls%20even%20as%20factory%20prices%20surge.pdf"},{"id":"st-06","title":"Japan and Malaysia agree on deeper maritime defence cooperation","source":"ST","date":"11 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Japanese PM Sanae Takaichi and Malaysia's Anwar Ibrahim agreed to deepen cooperation on defence and energy, citing shared concerns over China's maritime claims and Iran-war disruptions. Takaichi said the two would continue joint military exercises and explore further Japanese provision of military hardware, having supplied a diving support vessel in 2025. Anwar underlined support for Japan's Free and Open Indo-Pacific initiative. The talks unfolded against a backdrop of tense Japan-China relations, though that was not explicitly mentioned.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Japan%20and%20Malaysia%20agree%20on%20deeper%20maritime%20defence%20cooperation.pdf"},{"id":"st-07","title":"Japan wholesale inflation accelerates to fastest in 3 years as energy costs spike","source":"ST","date":"11 Jun 2026","tags":["Finance & Markets","Energy"],"summary":"Japan's producer price index rose 6.3% year-on-year in May, the fastest since March 2023 and above the 5.5% forecast, as Middle East war pressures broadened. The increase was driven by higher non-ferrous metals, chemical and petroleum costs after the effective closure of the Strait of Hormuz lifted crude and naphtha prices. Economists said the data make a Bank of Japan rate hike next week all but certain, which would be its first since December. A weak yen is compounding the war-induced energy shock.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Japan%20wholesale%20inflation%20accelerates%20to%20fastest%20in%203%20years%20as%20energy%20costs%20spike.pdf"},{"id":"st-08","title":"Meta partners with Reliance for India AI data centre","source":"ST","date":"11 Jun 2026","tags":["Technology & AI","Trade"],"summary":"Meta is partnering with Mukesh Ambani's Reliance Industries to build its first AI data centre in India, a 168MW facility in Jamnagar, Gujarat, that Meta will lease. The site sits beside the world's largest single oil refinery, with an option to expand over time. India is drawing heavy tech investment, including a combined US$52 billion from Amazon and Microsoft in 2026. The deal follows OpenAI's partnership with Tata to build a data centre scaling toward one gigawatt, underscoring India's rise as an AI infrastructure market.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Meta%20partners%20with%20Reliance%20for%20India%20AI%20data%20centre.pdf"},{"id":"st-09","title":"Netanyahu to run for re-election, again rebuffing doubtful Trump","source":"ST","date":"11 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Benjamin Netanyahu's Likud party announced he will seek re-election in 2026, after Trump publicly questioned whether the Israeli PM would stand again. The election, which must be held by October, will be the first since the October 2023 Hamas attack. Trump told ABC's Jonathan Karl he didn't know if Netanyahu would run, saying 'He's had an amazing career.' Polls have repeatedly suggested his coalition would fail to win a majority, after a tumultuous term marked by mass protests and the Gaza, Lebanon and Iran wars.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Netanyahu%20to%20run%20for%20re-election%2C%20again%20rebuffing%20doubtful%20Trump.pdf"},{"id":"st-10","title":"Sea's Shopee cuts hundreds of developer jobs in pivot to AI","source":"ST","date":"11 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"Sea's Shopee is cutting hundreds of developer jobs globally, about 8% of its developer workforce, as it adopts AI in the workplace. The reductions, which began this week and affect roles such as quality assurance, may be followed by more cuts. It is unclear whether the move is directly tied to Sea's AI push, but it coincides with global debate over AI's job impact and 'AI-washing' around layoffs at firms like Block and Oracle. Many tech firms hired aggressively during the pandemic and are now trimming.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Sea%27s%20Shopee%20cuts%20hundreds%20of%20developer%20jobs%20in%20pivot%20to%20AI.pdf"},{"id":"st-11","title":"Secret to AI strategy is building on what Singapore is already known for","source":"ST","date":"11 Jun 2026","tags":["Southeast Asia","Technology & AI"],"summary":"Terence Ho argues Singapore's Economic Strategy Review rightly identifies AI as a growth pillar while acknowledging the country won't build the next ChatGPT. Frontier models require capital, compute and talent at a scale only a few nations can sustain, and Singapore lacks the comparative advantage to compete with the US or China. Instead, he says, Singapore should leverage its enduring strength as a trusted hub connecting people, capital and ideas. That logic has underpinned its evolution from entrepot to manufacturing platform to finance and services centre.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Secret%20to%20AI%20strategy%20is%20building%20on%20what%20Singapore%20is%20already%20known%20for.pdf"},{"id":"st-12","title":"Singapore-Tanzania partnership for jobs and growth","source":"ST","date":"11 Jun 2026","tags":["Southeast Asia","Trade"],"summary":"President Tharman Shanmugaratnam said Singapore and Tanzania can combine their strengths to create good jobs and inclusive growth, during a state visit to Dar es Salaam. He highlighted Tanzania's young, entrepreneurial population, natural resources and strategic position, calling it 'a country of immense promise'. Tharman pointed to potential partnership across agri-business, tourism and infrastructure. He said Tanzania's advantages paired with Singapore's expertise in efficient systems, supply chains and the digital economy could yield higher capabilities.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Singapore-Tanzania%20partnership%20for%20jobs%20and%20growth.pdf"},{"id":"st-13","title":"Taiwan fires battle-tested rockets in 'shoot-and-scoot' anti-invasion drill","source":"ST","date":"11 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Taiwan's military fired HIMARS rockets on June 10 in a drill simulating an attack on an invading Chinese force, demonstrating its 'shoot-and-scoot' ability to fire and withdraw before counterstrikes. It was the first time the precision weapon was fired on the island's west coast, in Taichung, after an initial east-coast test in 2025. China, which claims Taiwan and has never renounced force, operates warplanes and warships around the island almost daily. The military said the drill greatly improves battlefield survivability.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Taiwan%20fires%20battle-tested%20rockets%20in%20%27shoot-and-scoot%27%20anti-invasion%20drill.pdf"},{"id":"st-14","title":"Trump says Iran has taken too long to negotiate, will 'pay the price'","source":"ST","date":"11 Jun 2026","tags":["Geopolitics"],"summary":"Trump warned on June 10 that Iran has taken too long to reach a deal and would 'have to pay the price', after the two sides exchanged strikes. Calling Iran 'all talk and no action', he told Fox News he was close to ordering new strikes on Iran's power plants and bridges if Tehran won't sign. The comments came as Qatari negotiators travelled to Tehran to try to finalise an agreement after consulting Washington. He has veered between warnings and optimism, reviving threats that rights experts earlier flagged as concerning.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Trump%20says%20Iran%20has%20taken%20too%20long%20to%20negotiate%2C%20will%20%27pay%20the%20price%27.pdf"},{"id":"st-15","title":"Ukraine, Latvia sign drone deal, Zelensky says","source":"ST","date":"11 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Ukraine has signed a drone agreement with Latvia, President Zelensky said on the sidelines of a Nordic-Baltic summit in Tallinn. He met prime ministers from the Nordic and Baltic states shortly after London talks with British, French and German leaders who said they were ready to support ceasefire efforts. The Kremlin said Europe was likely far from ready to act as a mediator. The US had been leading peace talks on the four-year war before the Iran conflict diverted its focus; Latvia would gain co-production know-how.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20ST/Ukraine%2C%20Latvia%20sign%20drone%20deal%2C%20Zelensky%20says.pdf"},{"id":"bt-01","title":"Agentic AI in banks won't make workers obsolete – they'll become more important","source":"BT","date":"11 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"As SuperAI convened thousands in Singapore, this commentary argues banking will be a key test of turning AI efficiency into revenue and new operating models. Agentic AI systems that initiate tasks, reason across data and execute workflows with limited human input represent more than cost savings, implying a fundamental redesign of banking work. The outcome will hinge on the infrastructure banks place under agentic AI and the human judgment they build around it. Firms that value human judgment, the author contends, will hold an advantage.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Agentic%20AI%20in%20banks%20won%27t%20make%20workers%20obsolete%20-%20they%27ll%20become%20more%20important.pdf"},{"id":"bt-02","title":"Apple is handing AI power to its rival Google","source":"BT","date":"11 Jun 2026","tags":["Technology & AI"],"summary":"This column argues Tim Cook's final WWDC as CEO deepened Apple's reliance on rival Alphabet, whose technology underpins the long-delayed Siri upgrade. Apple promised two years ago that Siri would read screen content and complete multistep tasks, but the features were embarrassingly delayed, forcing an admission it overpromised. The stumble underscored how far Apple fell behind in generative AI, a field it once
