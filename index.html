%20Jul%202026/20%20Jul%20BT/OpenAI%20grapples%20with%20surging%20startup%20demand%20in%20Apac%20even%20as%20it%20expands%20Singapore%20team.pdf"}, {"id": "bt-09", "title": "Retail resets: Mall owners reposition shopping centres as Singapore's consumer landscape evolves", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Major Singapore mall owners are launching a new wave of asset enhancement initiatives, investing hundreds of millions to reposition centres for shifting consumer habits and better returns. CapitaLand Integrated Commercial Trust's S$160 million revamp of Plaza Singapura and The Atrium@Orchard, running from Q3 2026 to end-2028, targets 6 to 7 per cent ROI and introduces experiential entertainment and themed dining, prompting closures like Golden Village and Tim Ho Wan. Frasers Centrepoint Trust's S$90 million NEX upgrade targets 7 per cent, converting carpark into retail and office space. Unlike 2000s refreshes, today's initiatives respond to e-commerce and declining anchor tenants. Well-capitalised Reits and institutional owners, with deep data and pockets, are best placed; enhancement yields beat low-4 per cent acquisition yields.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/Retail%20resets%20Mall%20owners%20reposition%20shopping%20centres%20as%20Singapore's%20consumer%20landscape%20evolves.pdf"}, {"id": "bt-10", "title": "Rising AI bills push Singapore companies to chase ROI over 'tokenmaxxing'", "source": "BT", "date": "20 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore companies are moving past AI experimentation to demand clearer returns as bills climb. Bain & Co found token prices halved between 2024 and 2025, but consumption surged 4.5 times, lifting overall spending. Singtel CEO Yuen Kuan Moon said not everything needs the latest frontier model, \"where you are maxing out your tokens.\" Google says Singapore is Gemini's highest per-capita adoption market and GIC notes it leads in Claude use, yet only 6 per cent of Singaporean desk workers use AI daily versus 11 per cent globally. Firms are matching models to workloads, reserving costly frontier models for complex reasoning and using open-weight models for classification and summarisation. Agentic workflows drive rising token use, pressuring costs at firms like AvePoint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/Rising%20AI%20bills%20push%20Singapore%20companies%20to%20chase%20ROI%20over%20'tokenmaxxing'.pdf"}, {"id": "bt-11", "title": "South Korea to ease forex rules for foreigners to trade won in push to liberalise market", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "South Korea has unveiled a detailed plan to make the won freely tradable among foreigners, its boldest step yet toward full convertibility. From January 2027, foreign investors can conduct unlimited won transactions through pre-registered foreign firms, ending the need for local won accounts, the finance ministry said with the central bank and regulators. Settlements will run through a new 24-hour Bank of Korea network piloting in September. The package eases reporting thresholds, exempts most foreigner-to-foreigner transfers from advance reporting, and permits securities lending of treasury bonds via Euroclear and Clearstream. Forex restrictions have long blocked MSCI developed-market status. Building on July's 24-hour won trading, the reforms aim to internationalise the currency and attract global reserve managers and pension funds.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/South%20Korea%20to%20ease%20forex%20rules%20for%20foreigners%20to%20trade%20won%20in%20push%20to%20liberalise%20market.pdf"}, {"id": "bt-12", "title": "The due diligence that investors in family businesses must not skip", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "For minority shareholders in family-controlled companies, common across Asia and Singapore's exchange, the true risk is how the family exercises control, not just business performance. Value can drift away through incremental, disclosed decisions: a listed firm buying property from the chairman's private vehicle, recurring management fees, licensing charges and supply contracts with family companies, and large cash balances that governance research links to lower valuations. Placements dilute outsiders while cheaply handing families more shares, and privatisation offers can be pitched low. Research by Claessens, Djankov and Lang shows East Asian families control through pyramids, with voting power exceeding ownership. Singapore's safeguard: related-party transactions above 3 per cent of net tangible assets must be announced, and above 5 per cent need a shareholder vote with the family abstaining.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/The%20due%20diligence%20that%20investors%20in%20family%20businesses%20must%20not%20skip.pdf"}, {"id": "scmp-01", "title": "Alibaba says newest Qwen AI model is second only to Anthropic's Claude Fable 5", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI"], "summary": "Alibaba previewed Qwen3.8-Max-Preview, its strongest next-generation AI model, calling it \"second only\" to Anthropic's Claude Fable 5. With 2.4 trillion parameters, it ranks among the most powerful models available and is offered via Alibaba's Token Plan subscription and Qoder agentic platforms. The unveiling at Shanghai's World AI Conference highlights Chinese labs entering the \"multi-trillion parameter\" age. Days earlier, Moonshot AI launched the 2.8-trillion-parameter Kimi K3, the world's largest open-source model, which surpassed Fable 5 and GPT-5.6 in some coding benchmarks. Alibaba said Qwen3.8 will soon release as open-weight. President Xi backed open-source collaboration at the summit. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Alibaba%20says%20newest%20Qwen%20AI%20model%20is%20second%20only%20to%20Anthropic%E2%80%99s%20Claude%20Fable%205.pdf"}, {"id": "scmp-02", "title": "Alibaba targets Nvidia's dominant software ecosystem with open-source AI stack", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Alibaba's chip unit T-Head will open-source its proprietary software stack SAIL, the foundational architecture for its Zhenwu AI chips, to challenge Nvidia's dominant CUDA ecosystem. Announced at Shanghai's World AI Conference, the move joins similar campaigns by Huawei and Moore Threads to offer alternatives to Nvidia's toolkit, which locks programmers into its hardware. T-Head said developers can migrate existing code to mainstream frameworks in under seven days. The strategy supports Chinese tech self-sufficiency amid US-China rivalry and export controls on Nvidia's top processors. T-Head aims to commercialise its Zhenwu chips; Alibaba had shipped 560,000 to over 400 clients by April. Alibaba is building full-stack AI capabilities and owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Alibaba%20targets%20Nvidia%E2%80%99s%20dominant%20software%20ecosystem%20with%20open-source%20AI%20stack.pdf"}, {"id": "scmp-03", "title": "Asia's AI boom has a dirty secret: the coal that powers it", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Energy", "Technology & AI", "Southeast Asia"], "summary": "Asia's rush to build AI data centres is being powered heavily by coal, the region's top \"stopgap source\" as renewable capacity lags surging electricity demand. Analysts say solar and wind cannot deliver the round-the-clock baseload data centres need. In Malaysia's Cyberjaya, dozens of data centres run already, straining water and power supplies that worry residents. Backup power systems now face two-year-plus waits amid manufacturing shortages. The US-Israel war on Iran has whipsawed oil prices from around US$60 to nearly US$120 a barrel, driving Singapore electricity tariffs to record highs and pushing the Philippines toward solar. Malaysia's subsidised rates have held, but analysts warn of eventual electricity and water choke points across Southeast Asia.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Asia%E2%80%99s%20AI%20boom%20has%20a%20dirty%20secret%20the%20coal%20that%20powers%20it.pdf"}, {"id": "scmp-04", "title": "Beijing steps in to stem China's stock market decline with US$8.9b in state purchases", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Two state-backed firms bought about 60 billion yuan (US$8.86 billion) of Chinese stocks to halt a market slide, a clear sign of government intervention. China Reform Holdings spent over 50 billion yuan on mainland-listed shares of centrally owned companies, while China Chengtong Holdings bought nearly 10 billion yuan of stocks and ETFs. The purchases follow brutal sell-offs, with the tech-heavy Star Market 50 Index tumbling more than 20 per cent from a record high into bear-market territory. The intervention underscores Beijing's push to stabilise its US$15 trillion market, seen as key to technological independence. Other state-backed shareholders announced stake increases or buybacks. The securities regulator convenes Monday with brokerages and fund firms to discuss stabilisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Beijing%20steps%20in%20to%20stem%20China%E2%80%99s%20stock%20market%20decline%20with%20US%248.9b%20in%20state%20purchases.pdf"}, {"id": "scmp-05", "title": "Changzhou says it is building China's first city-level clean-power AI token factory", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Energy"], "summary": "The eastern Chinese city of Changzhou is building what it calls the country's first city-level \"green token factory,\" answering Beijing's call to power AI computing with clean energy. Announced during Shanghai's World AI Conference, the project would produce 60 trillion tokens a year once completed, though no timeline was given. It would connect directly to renewable plants under a national policy allowing green power to bypass public grids, with token output expected to rise 62.5 per cent using the same computing resources. The agreement involves seven parties including Alibaba Cloud. Tokens are the basic unit for billing AI services. China's daily token consumption surged over 1,000-fold in two years. Beijing and Wenzhou have launched similar token facilities. Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Changzhou%20says%20it%20is%20building%20China%E2%80%99s%20first%20city-level%20clean-power%20AI%20token%20factory.pdf"}, {"id": "scmp-06", "title": "China ramps up ethylene output, aka 'industrial gold', amid Iran war disruptions", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Energy", "Trade"], "summary": "China is expanding ethylene production in its oil-and-gas-rich west as Middle East conflict raises supply-chain concerns. PetroChina subsidiary Dushanzi Petrochemical brought a new line online in Xinjiang, adding 1.2 million tonnes of annual capacity to reach 3 million tonnes, making it central and western China's largest ethylene hub. The move rebalances output away from eastern coastal regions, which accounted for 65 per cent of national capacity. Ethylene, dubbed \"industrial gold,\" is critical for plastics, fibres and advanced materials; China is the world's top producer at over 62 million tonnes. The US-Israel war on Iran has disrupted naphtha supplies, cutting Japanese plant operating rates to record lows. PetroChina calls the solar-powered base its first \"fully green\" production chain, supporting 2030 carbon-peak goals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/China%20ramps%20up%20ethylene%20output,%20aka%20%E2%80%98industrial%20gold%E2%80%99,%20amid%20Iran%20war%20disruptions.pdf"}, {"id": "scmp-07", "title": "China team cuts 3D optical chip production time from hours to seconds", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI"], "summary": "A Chinese research team says it has overcome a major manufacturing hurdle for photonic chips, cutting production time for complex three-dimensional optical structures from hours to seconds. Published in Advanced Materials on July 4, the study was led by scientists from the Chinese Academy of Sciences' Institute of Physics with the University of Hong Kong and others. Instead of a focused ion beam sculpting devices one at a time, the team developed a parallel process that transforms 2D patterns into 3D architectures across an entire 10cm wafer simultaneously, combining broad ion beam etching with a self-folding \"origami\" strategy. It achieves angular uniformity exceeding 97 per cent and cuts fabrication time by over two orders of magnitude, advancing photonics for AI computing amid intensifying global competition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/China%20team%20cuts%203D%20optical%20chip%20production%20time%20from%20hours%20to%20seconds.pdf"}, {"id": "scmp-08", "title": "China's AI weather warning system Mazu expanding across Global South", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Environment"], "summary": "China's AI-powered weather warning system Mazu is now used on the ground in seven developing countries to help prepare for disasters such as typhoons and rainstorms. China Meteorological Administration chief engineer Pan Jinjun called it an international public good providing \"tailored early warning services\" and the first national project answering the UN Early Warnings for All initiative. The public cloud version has been tested by 40 Global South countries, while the full system is deployed in Pakistan, Djibouti, Ethiopia, Jordan, Mongolia, the Solomon Islands and Sri Lanka. Upgrades cut spatial resolution from 9km to 3km and enabled six-hourly forecasts. It integrates Chinese AI models and satellite data with partner-country observations. Officials say building Global South AI capabilities is a new governance focus, though data limits persist.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/China%E2%80%99s%20AI%20weather%20warning%20system%20Mazu%20expanding%20across%20Global%20South.pdf"}, {"id": "scmp-09", "title": "China's state agencies are hiring retirees as the workforce rapidly ages", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Society", "Politics"], "summary": "Chinese public-sector employers, from universities and hospitals to government agencies, are increasingly rehiring retirees to cope with a rapidly ageing society and shrinking working-age population. One 62-year-old former engineering professor in Sichuan returns as a research fellow at about 10,000 yuan monthly, less than before but without social security contributions since he draws a pension. More than 323 million people, roughly 23 per cent of the population, were aged 60 or above late last year. Beijing plans to gradually raise the retirement age from 60 to 63 for men and 55 to 58 for female office workers. Yunnan's transport bureau plans to hire 42 retired engineers as consultants, while universities across many provinces and a Xinjiang hospital have issued rehiring notices for \"silver-haired professionals.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/China%E2%80%99s%20state%20agencies%20are%20hiring%20retirees%20as%20the%20workforce%20rapidly%20ages.pdf"}, {"id": "scmp-10", "title": "China's tech giants fuel the rise of AI tokens as a new corporate currency", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "AI tokens are becoming a new corporate currency in China as tech giants push staff to embed AI into daily work. One ByteDance employee says he burns close to a billion tokens monthly, yet is not near his department's top consumers. A token, called ciyuan in China, is the unit for measuring and billing AI use, like kilowatt-hours for electricity. A brutal price war is fuelling adoption: DeepSeek slashed its flagship V4-Pro price 75 per cent in May before later raising prices. Firms are experimenting with allocation: 360 Security distributed 100 million tokens across employee accounts without approval, Tencent handed out free tokens via internal tools with quotas reaching 40 million per day, and Alibaba granted allowances for tools like Qoder. Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/China%E2%80%99s%20tech%20giants%20fuel%20the%20rise%20of%20AI%20tokens%20as%20a%20new%20corporate%20currency.pdf"}, {"id": "scmp-11", "title": "Chinese Nvidia alternatives project massive sales as AI chip demand surges", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese chip designers Moore Threads and Hygon, positioning as home-grown Nvidia alternatives, projected sharp first-half revenue growth on surging domestic AI computing demand. Moore Threads, a GPU developer, expects revenue to jump 135 to 149 per cent year on year to between 1.65 and 1.75 billion yuan, citing demand for its full-function GPUs and Kua'e AI clusters. Hygon, which designs CPUs and AI accelerators, projected 56 to 70 per cent growth to between 8.5 and 9.3 billion yuan. The forecasts reflect strong appetite for computing infrastructure as US export controls restrict Nvidia's advanced hardware in China. Shares of both fell Friday amid a broader AI chip retreat. Rivals include Biren, MetaX, Iluvatar CoreX and Enflame; Bernstein calls Hygon the key CPU beneficiary.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Chinese%20Nvidia%20alternatives%20project%20massive%20sales%20as%20AI%20chip%20demand%20surges.pdf"}, {"id": "scmp-12", "title": "Chinese company demands compensation from the UK over British Steel nationalisation", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Jingye Group, the Chinese firm that formerly owned British Steel, demanded compensation from the UK government for investment losses after last week's nationalisation of the manufacturer. Britain took operational control after Jingye considered closing the blast furnaces at its Scunthorpe plant, the last in the UK making \"virgin steel\" from raw materials. Jingye said the move tarnished the government's credibility, spooked international investors and caused great losses, urging the UK to stop \"trampling on international investment rules.\" It has begun negotiation procedures under bilateral investment agreements, reserving the right to arbitration. The plant employs about 2,700 people; Jingye bought British Steel in 2020. The UK will conduct an independent evaluation on compensation. China's Foreign Ministry urged Britain to respect market principles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Chinese%20company%20demands%20compensation%20from%20the%20UK%20over%20British%20Steel%20nationalisation.pdf"}, {"id": "scmp-13", "title": "Chinese shipbuilders snap up more supertanker orders as Iran war turmoil drags on", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Trade", "Geopolitics", "Energy"], "summary": "Chinese shipbuilders have emerged as beneficiaries of Middle East turbulence and volatile oil prices, capturing 82 per cent of this year's global tanker orders by carrying capacity. BIMCO data showed crude oil tanker orders surged to a record 234 vessels totalling 60 million deadweight tons, most for very large crude carriers; Chinese yards bagged 133 of 151 VLCC orders placed worldwide. Official statistics show China led global completion volume, new orders and backlog in the first quarter, with deliveries extending into 2029. Analysts say America's war on Iran and disrupted Strait of Hormuz flows have lengthened shipping routes and driven up capacity demand. China's advantages include a complete industrial chain, high localisation and cost efficiency, plus Korean rivals shifting to LNG carriers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Chinese%20shipbuilders%20snap%20up%20more%20supertanker%20orders%20as%20Iran%20war%20turmoil%20drags%20on.pdf"}, {"id": "scmp-14", "title": "Did fear of US force Indonesia's 'slap in the face' to Iran?", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "Indonesia's decision to send only its ambassador to Ayatollah Ali Khamenei's funeral in Tehran raised questions about Jakarta's non-aligned foreign policy and President Prabowo Subianto's \"good-neighbour\" diplomacy. A former ambassador called the minimal presence \"a slap in the face\" for Iran and asked whether fear of Washington was to blame. Foreign Minister Sugiono said officials were too busy with state visits. Sugiono later flew to Iran with parliament and Islamic leaders, becoming the first foreign delegation to pay respects at Khamenei's grave in Mashhad, and Prabowo will visit at Iran's request. Analysts said Jakarta feared appearing to side with a party given high US-Iran distrust after the US-Israel war on Iran, which Tehran called an \"unprecedented violation\" of international law.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Did%20fear%20of%20US%20force%20Indonesia%E2%80%99s%20%E2%80%98slap%20in%20the%20face%E2%80%99%20to%20Iran.pdf"}, {"id": "scmp-15", "title": "Fewer opportunities, less passion, no clue? How the US' China expertise is fading", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "As the US marks its 250th anniversary, observers warn America's deep, experience-based understanding of China is undergoing a generational rupture. Earlier scholars learned about China the slow way, travelling to remote towns and villages for fieldwork during the reform era after Cold War estrangement, forming the backbone of US expertise. Now that intellectual tradition is under strain as veteran specialists leave and tensions erode academic exchange. A US-China Education Trust report in March warned America's ability to understand its most consequential relationship is eroding and could face a \"critical shortage of grounded China expertise within a decade,\" pointing to dwindling numbers of Americans studying in China. The 1980s-90s cohort of scholars gained unprecedented on-the-ground access now unavailable to younger researchers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Fewer%20opportunities,%20less%20passion,%20no%20clue%20How%20the%20US%E2%80%99%20China%20expertise%20is%20fading.pdf"}, {"id": "scmp-16", "title": "How China's resources deals have turned into a gold mine – literally", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Chinese gold producers that went on an overseas acquisition spree are reaping rewards as sky-high gold prices lift earnings. Prices soared to record highs and analysts see them reaching US$4,500 per ounce by year-end, driven by central banks and investors seeking safe havens. Zijin Gold International, a unit of China's largest miner, estimated net profits surged 169 per cent to around US$1.4 billion in the first half, with output rising to 27 tonnes; it owns mines across several continents and recently acquired mines in Ghana and Kazakhstan. Zhaojin International Gold estimated profits jumped over 300 per cent after taking control of Fiji's Vatukoula mine, while Lingbao Gold's profits rose 57 per cent after acquiring a Papua New Guinea mine. Analysts expect prices to stay high as central banks keep buying.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/How%20China%E2%80%99s%20resources%20deals%20have%20turned%20into%20a%20gold%20mine%20%E2%80%93%20literally.pdf"}, {"id": "scmp-17", "title": "How Chinese tech giants from Ant to Tencent use AI agents to win over enterprise clients", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese tech giants are doubling down on enterprise AI agents with new products unveiled at Shanghai's World Artificial Intelligence Conference, signalling heightened rivalry to win business clients. Ant Digital Technologies unveiled \"Agentar 2.0,\" a \"commercial AI agent super factory\" with 200 pre-configured digital expert templates, letting companies deploy autonomous AI workers without building from scratch. Ant Group CEO Cyril Han said the aim is to restructure enterprise workflows for wholesale productivity upgrades. Tencent launched a dedicated app for its WorkBuddy agent across iOS, Android and HarmonyOS, plus a partnership to embed it in smart glasses. Alibaba launched \"Meoo Team\" for businesses to manage resources and build AI applications, while Baidu showcased its \"DuMate\" agent, whose daily queries rose 20-fold since March. Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/How%20Chinese%20tech%20giants%20from%20Ant%20to%20Tencent%20use%20AI%20agents%20to%20win%20over%20enterprise%20clients.pdf"}, {"id": "scmp-18", "title": "Lebanon's president to meet Trump, push for Israeli withdrawal", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Lebanese President Joseph Aoun will make his first White House trip this week to present Trump a plan for disarming Iran-backed Hezbollah and securing Israel's withdrawal from southern Lebanon. Aoun, a former army commander and the first Lebanese head of state to visit in nearly 20 years, will meet Trump on Tuesday as Israeli troops occupy the country's south and hundreds of thousands remain displaced. Hezbollah firmly rejects direct talks with Israel and efforts to strip its arms. Aoun will ask Trump to pressure Israel to implement a US-brokered June 26 agreement aimed at disarming Hezbollah and enabling phased Israeli withdrawal. A new war erupted when Hezbollah fired at Israel on March 2 supporting Iran; the ensuing Israeli campaign has killed more than 4,300 people, Lebanon's health ministry says.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Lebanon%E2%80%99s%20president%20to%20meet%20Trump,%20push%20for%20Israeli%20withdrawal.pdf"}, {"id": "scmp-19", "title": "Why buyout funds, not IPOs, may define China's next capital market cycle: Zhang Yichen", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Finance & Markets"], "summary": "Citic Capital chairman and CEO Zhang Yichen argues buyout funds, not IPOs, may define China's next capital market cycle. In an Open Questions interview during the \"two sessions,\" the veteran investor and government adviser says relying solely on IPOs to exit China's large private equity pool is unrealistic, with the industry holding over 10 trillion yuan in legacy assets facing mounting exit pressures and limited IPO capacity. In mature markets, nearly 80 per cent of exits come through buyout funds. He says China's M&A market remains underdeveloped, with companies focused on listing rather than consolidation. New national-level buyout funds signal Beijing's greater emphasis on asset consolidation after years of early-stage investment. He also discusses patient capital, geopolitics pushing multinationals toward local partners, and the landmark McDonald's China buyout.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Open%20QuestionsWhy%20buyout%20funds,%20not%20IPOs,%20may%20define%20China%E2%80%99s%20next%20capital%20market%20cycle%20Zhang%20Yichen.pdf"}, {"id": "scmp-20", "title": "To survive China's cost-conscious market, global brands embrace AI and robots", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Multinationals are expanding AI and robotics use in China to survive intense competition in the world's second-largest consumer goods market, where local rivals have sharpened their edge and shoppers switch brands for value. L'Oreal accelerated AI and automation to support e-commerce, launching a Suzhou smart operations centre with automated sorting, mobile robots and intelligent storage, and opened a second UPX smart manufacturing phase with AI-powered quality inspection on fully automated lines. Swire Group integrated AI into customer service, logistics and aviation, introducing an AI shopping assistant at Beijing Taikoo Place, while Swire Coca-Cola built a smart robotic picking solution at its Zhengzhou plant. A PwC China report found the most AI-ready companies achieved AI-driven financial performance 7.2 times higher than peers, with strong cross-industry integration.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/To%20survive%20China%E2%80%99s%20cost-conscious%20market,%20global%20brands%20embrace%20AI%20and%20robots.pdf"}, {"id": "scmp-21", "title": "Tourism appeal adds to Australia's edge in drawing mainland Chinese, Hong Kong homebuyers", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Australia's tourist attractions, relaxed lifestyle and moderating property prices are burnishing its appeal for mainland Chinese and Hong Kong homebuyers beyond the traditional education draw, agents say. In 2025, more than 1 million mainland Chinese tourists visited Australia, up 17 per cent. Between July 2025 and March 2026, mainland Chinese buyers were the largest foreign investor group in Australian housing, buying 638 residential units worth A$800 million (US$559 million). Sydney home prices were down 2.1 per cent from their November peak and Melbourne 3.2 per cent off its high, creating opportunities as more than half of Chinese and Hong Kong buyers purchase with cash. Proximity, an eight-to-nine-hour flight and small time difference add appeal, though a ban on established-dwelling purchases runs until June 2029.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Tourism%20appeal%20adds%20to%20Australia%E2%80%99s%20edge%20in%20drawing%20mainland%20Chinese,%20Hong%20Kong%20homebuyers.pdf"}, {"id": "scmp-22", "title": "Trump welcomes reports Andy Burnham could open up North Sea oil drilling", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Energy", "Politics"], "summary": "US President Donald Trump said people in Aberdeen would be \"dancing in the streets\" following reports that incoming UK Prime Minister Andy Burnham could back new North Sea oil and gas drilling. Burnham, dubbed the \"King of the North\" for his work as Greater Manchester mayor, has not confirmed he is considering approving fossil fuel production at the Rosebank and Jackdaw fields. Trump, a vocal fossil-fuel supporter, claimed on Truth Social that Burnham said he would, and attacked wind power. Labour's 2024 manifesto pledged not to issue new North Sea licences; Burnham could approve already-licensed projects without breaking that pledge. Deputy leader Lucy Powell expected \"more a change of emphasis.\" Burnham, replacing Keir Starmer on Monday, will also scrap the digital ID scheme to focus on cost-of-living issues.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Trump%20welcomes%20reports%20Andy%20Burnham%20could%20open%20up%20North%20Sea%20oil%20drilling.pdf"}, {"id": "scmp-23", "title": "UAE's Hormuz workaround tries to bypass its trillion-dollar economic heart", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Trade", "Geopolitics", "Energy"], "summary": "The United Arab Emirates wants to cut dependence on the Strait of Hormuz to \"zero,\" yet its main ports, Jebel Ali and Khalifa, sit inside the waterway and handle most of its US$1 trillion in annual non-oil trade. With the US and Iran locked in conflict, nervous Asian exporters are hedging, benefiting Oman's ports at Duqm, Salalah and Sohar. The UAE plans to invest in east-coast ports including Khor Fakkan, Fujairah and Dibba. But capacity gaps are vast: Khor Fakkan moved 2.5 million containers last year versus Jebel Ali's 15.5 million. Analysts say diversification boosts resilience but any post-war Hormuz settlement will produce winners and losers, with the Jebel Ali free zone ecosystem hard to replicate. DP World appears largely unmoved by zero-reliance talk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/UAE%E2%80%99s%20Hormuz%20workaround%20tries%20to%20bypass%20its%20trillion-dollar%20economic%20heart.pdf"}, {"id": "scmp-24", "title": "US 'hit Iran very hard', Trump says, as both inch closer to all-out war", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The US began a new round of air strikes on Iran early Monday after another American service member's death, while Iran fired missiles toward Jordan, risking a wider conflict. Both sides have inched closer to all-out war as last month's interim deal crumbled and Strait of Hormuz shipping largely stalled; oil climbed above US$91 a barrel, a one-month high. Trump said \"we hit them very hard again tonight.\" The service member was killed in Iraq during a controlled detonation of a downed Iranian drone; 17 US personnel have died since the war began. US Central Command, in its ninth straight night of strikes, said it would keep degrading Iranian capabilities threatening Hormuz vessels. Bahrain, Jordan and Kuwait activated air defences; Iran said US strikes hit a planned nuclear plant site.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/US%20%E2%80%98hit%20Iran%20very%20hard%E2%80%99,%20Trump%20says,%20as%20both%20inch%20closer%20to%20all-out%20war.pdf"}, {"id": "scmp-25", "title": "Weather weapons: why the atmosphere could become the next geopolitical battleground", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Geopolitics", "Environment", "Defence"], "summary": "Weather modification is evolving from an agricultural tool into a potential instrument of geopolitical influence, stirring disquiet in several nations. After 2018 floods in India's Assam, New Delhi's security corridors questioned whether weather control could become a weapon, focusing on China's Tianhe, or Sky River, initiative to redirect atmospheric moisture across the Tibetan Plateau. China plans to expand artificial rainfall across 5.5 million sq km. India's defence minister framed climate change as a national security matter and vowed to rule out enemy involvement in disasters. Experts including Elizabeth Chalecki warn weather and climate modification could become an arena of great power competition, urging governance frameworks. India is advancing its own Mission Mausam with cloud research facilities and rainfall-triggering drones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Weather%20weapons%20why%20the%20atmosphere%20could%20become%20the%20next%20geopolitical%20battleground.pdf"}, {"id": "scmp-26", "title": "Why investors are upbeat on the long-delayed Asean power grid", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Energy", "Southeast Asia", "Finance & Markets"], "summary": "A long-discussed Asean power grid is gaining momentum as surging AI and data-centre demand and the region's energy transition fuel investor optimism, participants at the Nusa Dua Forum in Bali said. Asean has planned a unified grid since 1997, but by 2024 only eight of 18 interconnection projects were operational, generating around 7.5 gigawatts. Danantara's Stefanus Hadiwidjaja pointed to a Singapore-Indonesia pact under which Indonesia would export at least 3.4GW of renewable electricity, about a third of Singapore's demand by 2035, as a significant early step. He said the next challenge is commercial, needing large buyers and roughly 30-year offtake agreements to make financing viable, hoping to \"send out the first electron\" by 2029. Sriwijaya Capital's Arsjad Rasjid said the momentum is right.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Why%20investors%20are%20upbeat%20on%20the%20long-delayed%20Asean%20power%20grid.pdf"}, {"id": "scmp-27", "title": "Xi Jinping warns against creating 'new historical injustices' in AI era", "source": "SCMP", "date": "20 Jul 2026", "tags": ["Politics", "Technology & AI", "Geopolitics"], "summary": "President Xi Jinping warned against creating \"new historical injustices\" in the AI era, calling for greater support for the technology in the Global South and a more open, inclusive approach. Addressing the 2026 World Artificial Intelligence Conference in Shanghai, his speech came shortly after Trump accused Beijing of the \"largest compromise of election data in history\" in a prime-time broadcast. Xi urged countries to ensure AI is \"secure and controllable\" and opposed overstretching national security concerns in AI. His first in-person appearance signalled Beijing's intent to lead global AI governance amid US-China tech rivalry. He pledged 5,000 AI training programmes for developing countries and cooperation centres with Asean, the Arab League and others. China's core smart economy industries are now worth at least 1 trillion yuan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20SCMP/Xi%20Jinping%20warns%20against%20creating%20%E2%80%98new%20historical%20injustices%E2%80%99%20in%20AI%20era.pdf"}]}, "2026-07-21": {"date": "2026-07-21", "dayOfWeek": "Tuesday", "totalArticles": 66, "sourceCounts": {"WSJ": 16, "ST": 9, "BT": 14, "SCMP": 27}, "executiveDigest": "The US-Iran war widened dangerously - Houthis imposed a naval blockade on Saudi Arabia and Jordan became a new flashpoint as American troop deaths rose - while Trump escalated on trade, slapping 50% tariffs on Canada and ordering curbs on China-linked military mineral chains; China's open-weight Kimi K3 model rattled Silicon Valley, and Singapore's strong AI-led growth was said to 'mask economic risks'.", "briefingCards": [{"title": "Lead story - Iran war widens on new fronts", "body": "The US-Iran conflict opened dangerous new fronts: Houthi forces imposed a naval blockade on Saudi Arabia, and Jordan became a fresh flashpoint as American troop deaths rose. Tehran and Washington face what ST called a 'wake up moment', with Netanyahu's political future increasingly in question. Oil stayed volatile - Iran rushed out US$6 billion of crude during the brief truce, China's June crude purchases plunged, and Beijing signalled it won't waste reserves to cushion prices - leaving shares unsettled. Separately, Turkey moved to offload its Russian air-defence system as it seeks to buy US F-35s."}, {"title": "Markets & finance", "body": "Everyday investors are rotating out of the Magnificent Seven and into new AI 'darlings', and a coming US statistical revamp is set to lower measured inflation at a delicate moment. The SEC is expected to scrap the quarterly-earnings mandate despite public backlash, while WSJ flagged Washington's new temptation - inside information paired with prediction-market accounts. In Asia, China left its benchmark lending rates unchanged for a 14th straight month, Shanghai beat estimates with 5.6% growth in a two-speed recovery, and Hong Kong's exchange is weighing longer trading hours to sharpen its hub edge."}, {"title": "Asia realignment", "body": "Trump escalated on multiple trade fronts: 50% tariffs on Canadian goods (cars, alcohol, cheese), an order targeting China-linked military mineral supply chains, and moves against Brazil's payment system - even as both sides said a Xi summit trip is still on despite his election-meddling claims. The EU-China deficit widened, pushing Germany to join France's Beijing pushback, though China's trade is tilting south and east to compensate. China's Premier Li congratulated Britain's new PM Andy Burnham, and North Korea paved the way for a possible Kim trip to Moscow."}, {"title": "Energy & climate", "body": "Battery storage is emerging as the linchpin of the energy transition - and China dominates it, WSJ noted. But China's own EV industry, built on tax breaks now ending, faces 'payback' as home sales plunge, and Beijing signalled restraint on using reserves to blunt the Iran-war oil shock. Singapore's reserves are pursuing varied climate strategies, with industry urging regional energy coordination, while Malaysia's data-centre boom entered a 'reset mode' as resource and funding realities bite, per S&P."}, {"title": "Technology & AI", "body": "China's AI momentum unsettled Silicon Valley: its open-weight Kimi K3 model 'sparked anxiety', SenseTime bet on a 'task economy' as token prices are set to drop, and Chinese robot makers lamented needing a better 'brain' and more data. Bezos and others invested in a Temasek-backed AI startup discovering new chipmaking materials. IBM's CEO has 'nowhere to hide from AI', and BT probed the accountability gap when 'an AI agent decides'. Everyday investors are chasing the next AI darlings beyond the mega-caps."}, {"title": "Singapore & SEA focus", "body": "Singapore's robust AI-led growth 'masks economic risks', ST cautioned, even as the Republic eyes hedge-fund tax cuts to bolster its financial-hub role. Singapore and South Korea are reshaping Vietnam's FDI mix as Chinese inflows halve, and world powers are courting ASEAN - a moment BT says the region must seize. Bezos and Temasek backed an AI materials startup, CICT will reconfigure parts of Paragon (including the Metro space), and Faishal's resignation could hasten a Cabinet reshuffle, which analysts said reaffirms the PAP's high standards."}], "keyMetrics": [{"value": "66", "label": "Articles curated today", "sub": "WSJ 16 · ST 9 · BT 14 · SCMP 27"}, {"value": "New fronts", "label": "US-Iran war widens", "sub": "Houthi Saudi blockade; Jordan"}, {"value": "50%", "label": "Trump tariffs on Canada", "sub": "Cars, alcohol, cheese"}, {"value": "Kimi K3", "label": "China open-weight AI", "sub": "Sparks Silicon Valley anxiety"}, {"value": "5.6%", "label": "Shanghai GDP growth", "sub": "Beats estimates; two-speed"}, {"value": "Masks risks", "label": "Singapore AI growth", "sub": "Hedge-fund tax cuts eyed"}], "articles": [{"id": "wsj-01", "title": "A Statistical Revamp Is About to Lower Inflation, at a Critical Time", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The Bureau of Economic Analysis plans to overhaul how it measures three components of the Fed's preferred inflation gauge, the core PCE price index, applying changes retroactively over five years. Economists estimate the August data, published Sept. 30, will show core PCE inflation about two-tenths of a percentage point lower. The BEA is reworking measurement of software, investment-management fees and legal services, addressing distortions like AI-driven hardware costs inflating its software index. The tweak narrows an unusual gap with CPI (core CPI was 2.6% in June versus estimated 3.3% core PCE) and could marginally weaken the case for a rate hike. It arrives amid heightened alertness to potential political interference in economic data.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/A%20Statistical%20Revamp%20Is%20About%20to%20Lower%20Inflation,%20at%20a%20Critical%20Time.pdf"}, {"id": "wsj-02", "title": "Everyday Investors Are Over the Mag Seven and Into New AI Darlings", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Retail investors are cooling on the Magnificent Seven megacaps and shifting toward newer AI trades like chipmakers, memory suppliers and infrastructure plays such as SK Hynix, Marvell and the Roundhill Memory ETF, according to Vanda Research. All but two Mag Seven members trailed the market this year; Microsoft is down 19% while Apple leads with a 23% gain. The seven still make up 36% of the S&P 500. Vanda analysts said \"Retail aren't buying the Mag 7 anymore. They're picking winners.\" Risks surfaced Friday when China's Moonshot AI model spooked markets, sending the PHLX Semiconductor Index down 1.6% into bear territory. Retail trading volumes hit records in May and June, more than double the 2024 average.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Everyday%20Investors%20Are%20Over%20the%20Mag%20Seven%20and%20Into%20New%20AI%20Darlings.pdf"}, {"id": "wsj-03", "title": "IBM CEO Arvind Krishna Has Nowhere to Hide From AI", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "IBM's stock plunged 25% Tuesday, its worst drop since Black Monday 1987, after the company warned second-quarter results would badly miss expectations. The rout shows AI is threatening both IBM's software business and its legacy mainframe offerings as corporate IT spending reprioritizes away from Big Blue. CEO Arvind Krishna, 63, bet on a hybrid-cloud bridge strategy and touts quantum computing as three to five years away, but a middle-ground approach has proven difficult across prior tech waves in media, music and autos. IBM, once an AI pioneer with Watson, now trails leaders like Anthropic, whose Claude model targets IBM's traditional corporate customers and can rewrite legacy Cobol code, eroding IBM's moat. Shares had doubled under Krishna before this week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/IBM%20CEO%20Arvind%20Krishna%20Has%20Nowhere%20to%20Hide%20From%20AI.pdf"}, {"id": "wsj-04", "title": "Iran Rushed Out $6 Billion of Oil During Brief Truce With U.S.", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran exploited a roughly one-month window from mid-June to mid-July, when the U.S. lifted its blockade under a temporary June 17 agreement, to ship out about 70 million barrels of oil worth $5-6 billion, according to United Against Nuclear Iran and oil analysts. Roughly 20 Iranian tankers arrived off Malaysia's east coast, transferring oil at sea to other tankers bound for China's discount \"teapot\" refineries to evade sanctions. The rush gives Tehran a valuable revenue buffer now that Washington has reimposed its blockade of the Strait of Hormuz. Analysts say Iran will receive billions in revenue in coming months. \"Iran's economy is in its worst shape since the revolution, so every dollar of revenue matters,\" said the Atlantic Council's Jonathan Panikoff.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Iran%20Rushed%20Out%20%246%20Billion%20of%20Oil%20During%20Brief%20Truce%20With%20U.S..pdf"}, {"id": "wsj-05", "title": "Jordan Becomes New Flashpoint in U.S.-Iran War as Troop Deaths Rise", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Iran is intensifying missile and drone attacks on U.S. forces in Jordan to inflict American casualties and deter Washington from escalating, officials say. Weekend strikes at Muwaffaq Salti Air Base killed two U.S. servicemembers and left a third presumed dead, the first American combat deaths since an April ceasefire collapsed. Iran also hit King Faisal Air Base and a separate airfield, damaging Black Hawk helicopters. The Trump administration has broadened airstrikes inside Iran to hit bridges and infrastructure, with F-16s from Germany and F-35s from England deploying to the region. Defense Secretary Pete Hegseth said the deaths \"stiffens our resolve.\" Jordan, a key U.S. hub reliant on $1.45 billion in annual American aid, has become a target for its cooperation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Jordan%20Becomes%20New%20Flashpoint%20in%20U.S.-Iran%20War%20as%20Troop%20Deaths%20Rise.pdf"}, {"id": "wsj-06", "title": "Pentagon Office of Strategic Capital Hires Wall Street Bankers to Deploy $200 Billion", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Defence", "Finance & Markets"], "summary": "The Pentagon's Office of Strategic Capital plans to lend more than $200 billion over coming years to companies across 30-plus sectors deemed important to national security, from missile production to telecom. The four-year-old office, which lent nothing before 2025, has added 30 professionals from private-equity, private-credit and investment-banking firms and plans 40 more. Director David Lorch said staff took \"seven-figure pay cuts\" to join; OSC has committed $5 billion in direct loans this year and signed term sheets for $14 billion more. The hiring is part of the Trump administration's Wall Street-style push, led by Deputy Defense Secretary Steve Feinberg, to shore up the industrial base. Some senior roles pay up to $438,000 annually. Recruits include paused Stanford and Penn MBA students.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Pentagon%20Office%20of%20Strategic%20Capital%20Hires%20Wall%20Street%20Bankers%20to%20Deploy%20%24200%20Billion.pdf"}, {"id": "wsj-07", "title": "SEC Expected to Change Quarterly Earnings Rule Despite Public Backlash", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The SEC is expected to advance a version of its proposal to make quarterly financial reports optional, letting public companies disclose results twice yearly, despite receiving a record 200,000-plus public comments overwhelmingly opposed. Chairman Paul Atkins unveiled the plan in May; President Trump has long backed the idea. Many commenters, including nonprofits, retirement funds and academics, argued it would harm investors and let \"fraud fester.\" At least 20,000 echoed a grassroots campaign to keep quarterly reporting. Supporters, including Exxon Mobil, say material information is disclosed independently and semiannual filing would ease burdens on public companies. The Long-Term Stock Exchange petitioned the SEC last year. European and U.K. companies dropped mandatory quarterly reporting in prior decades, though many still report quarterly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/SEC%20Expected%20to%20Change%20Quarterly%20Earnings%20Rule%20Despite%20Public%20Backlash.pdf"}, {"id": "wsj-08", "title": "The CIA Operative Who Spied on the U.A.E.-and Played a Role in Its AI Win", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "CIA station chief Jonny Gannon, posing under a fake U.S. Embassy job, was tasked by top agency leadership with courting the U.A.E. as it sought Nvidia chips for its AI champion G42, run by Sheikh Tahnoon bin Zayed Al Nahyan. Washington feared Beijing was using G42 to steal American technology; the firm's CEO had renounced U.S. citizenship. Gannon both spied on G42 and advised Tahnoon on satisfying Washington, culminating in a June 2024 flight to lobby officials. The Biden administration created a path for the chips rather than cutting off the Emiratis. Trump accelerated access; days before his inauguration Tahnoon and co-investors committed $500 million to Trump's World Liberty Financial crypto venture. Last week the administration temporarily lifted caps on G42's chip access.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/The%20CIA%20Operative%20Who%20Spied%20on%20the%20U.A.E.-and%20Played%20a%20Role%20in%20Its%20AI%20Win.pdf"}, {"id": "wsj-09", "title": "The Clock Is Now Ticking on Netanyahu's Political Future", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Israeli Prime Minister Benjamin Netanyahu faces his first election since the Oct. 7, 2023 Hamas-led attack after the Knesset dissolved Friday, setting a late-October vote. Surveys show his path narrowing as opposition parties gain momentum, though analysts say the outcome remains uncertain. His main challenger is former army chief Gadi Eisenkot, whose centrist Yashar party polls level with Netanyahu's Likud, both near 20 seats, short of the 61 needed. A July 15 Channel 13 poll first showed the opposition potentially able to form a government. If neither bloc reaches the threshold, Netanyahu leads a caretaker government. The result carries major implications for U.S. relations, with over 100 House Democrats voting to cut $3 billion in military aid to Israel and Republicans, including JD Vance, drifting away.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/The%20Clock%20Is%20Now%20Ticking%20on%20Netanyahu%E2%80%99s%20Political%20Future.pdf"}, {"id": "wsj-10", "title": "The Key to Solar and Wind Power Is Battery Storage, and China Is Dominating", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Energy", "Environment"], "summary": "China has built massive grid-scale battery storage in just five years, expanding nonconventional storage capacity from under 4 gigawatts to around 155 gigawatts by this year's first quarter, targeting 300 gigawatts by 2030. The container-sized banks store excess solar and wind power, which now supplies 22% of China's electricity, though coal still generates over half. Beijing requires new data centers to draw 80% of power from renewables. Chinese firms dominate the supply chain, controlling lithium, cobalt and graphite processing; the world's top 10 storage battery-cell suppliers are all Chinese, holding 90% of the market. The U.S. ranks second with 57 gigawatts but relies heavily on Chinese cells, over 90% of installed systems, raising Washington's concerns. CATL expects storage to reach half its revenue by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/The%20Key%20to%20Solar%20and%20Wind%20Power%20Is%20Battery%20Storage,%20and%20China%20Is%20Dominating.pdf"}, {"id": "wsj-11", "title": "The New Washington Temptation: Inside Information and a Prediction Market Account", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Prediction markets like Polymarket and Kalshi have woven political betting into Washington, raising alarm that insiders exploit nonpublic information. White House lawyers investigated after anonymous accounts wagered five-figure sums on a Trump-Iran ceasefire; three accounts later won over $600,000 correctly betting the April announcement, per Bubblemaps. A late-March memo warned staff against trading on nonpublic information. Trump's teleprompter operator, Gabriel Perez, is under CFTC investigation for over $100,000 in wagers based on early access to speeches, and has been placed on unpaid leave. Political betting on Polymarket doubled to over $4 billion in the first quarter versus a year earlier. The CFTC has requested information from both platforms, though insider-trading laws weren't designed for prediction markets. Polymarket has a data partnership with Dow Jones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/The%20New%20Washington%20Temptation%20Inside%20Information%20and%20a%20Prediction%20Market%20Account.pdf"}, {"id": "wsj-12", "title": "This Conversation Is Being Recorded. They All Are.", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "In tech circles, recording every interaction has become default behavior, powered by AI note-takers like Granola and transcription apps on Zoom calls, in meetings, at bars and even on dates. Asking permission is increasingly skipped, though in all-party-consent states like California recording a private conversation without agreement can violate the law. Venture capitalist Eric Bahn now assumes founders are recording him and chooses words carefully, saying society is moving \"to a state of East Germany.\" Startup founder Emmie Chang wears a recording pin and sends first-date transcripts to Anthropic's Claude for feedback. As smartglasses, AI bracelets and covert devices proliferate, a societal shift toward permanent records is under way, with unclear implications for privacy and how candidly people speak.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/This%20Conversation%20Is%20Being%20Recorded.%20They%20All%20Are..pdf"}, {"id": "wsj-13", "title": "This Shortcut to Private-Equity Riches Is Minting Young Millionaires", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "A growing wave of entrepreneurs is bypassing traditional private-equity careers to buy small and midsize businesses like HVAC, plumbing and specialized manufacturers, using \"search funds\" and deal-by-deal financing. Bakari Akil, once a homeless college dropout, discovered the model in a Harvard case study and now, at 37, owns two multimillion-dollar companies and is worth seven figures. Buyers cobble together SBA loans, specialized investors and family-office money, paying lower earnings multiples but absorbing operational \"brain damage.\" Some 77 search funds were raised in 2025, historically high though below the 2023 peak of 101, per a Stanford study; independent-sponsor firms have roughly doubled since 2019 to about 1,400. The trend is fueled by \"entrepreneurship through acquisition\" courses and dimming prospects for big Wall Street payouts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/This%20Shortcut%20to%20Private-Equity%20Riches%20Is%20Minting%20Young%20Millionaires.pdf"}, {"id": "wsj-14", "title": "Turkey Aims to Offload Russian Air-Defense System as It Seeks to Buy U.S. F-35s", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Turkey is in talks to transfer its Russian S-400 air-defense system to the United Arab Emirates, hoping to clear U.S. objections to buying advanced F-35 warplanes, U.S. and regional officials say. Washington removed Turkey from the F-35 program in 2019 over the S-400, fearing the Russian system could learn the jet's radar signature. The talks follow Trump's visit to Turkey this month for a NATO summit, where he said he planned to lift restrictions; he has embraced President Erdogan as a geopolitical partner. The U.A.E. wants to bolster defenses against Iranian attacks. Hurdles remain: Turkey needs Russian approval to re-export the S-400, U.S. compliance certification, and possible congressional opposition. \"The rhetoric out of Ankara has changed nearly 180 degrees,\" said analyst Aaron Stein.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Turkey%20Aims%20to%20Offload%20Russian%20Air-Defense%20System%20as%20It%20Seeks%20to%20Buy%20U.S.%20F-35s.pdf"}, {"id": "wsj-15", "title": "Why Trump Is Going After Brazil's Beloved Payment System", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Trade", "Politics"], "summary": "Washington cited Brazil's PIX instant-payment system as a key justification for imposing a 25% tariff on some 3,000 Brazilian goods next week, provoking widespread outrage. More than 90% of Brazilian adults, over 140 million people, use the free government-run system, which now handles more transactions than credit and debit cards combined. The U.S. argues PIX unfairly disadvantages American firms like Visa and Mastercard, alongside grievances over Chinese companies, jailed ex-President Bolsonaro and ethanol tariffs. Brazil is the first country hit under Section 301, covering over $11 billion of exports but sparing beef and coffee. Secretary of State Marco Rubio blamed President Lula, who vowed retaliation. Analysts call it a warning to nations, including the EU's digital-euro effort, seeking control over payment systems.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Why%20Trump%20Is%20Going%20After%20Brazil%E2%80%99s%20Beloved%20Payment%20System.pdf"}, {"id": "wsj-16", "title": "Zelensky Seeks to Quell Growing Discontent Over Ouster of Defense Minister", "source": "WSJ", "date": "21 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukrainian President Volodymyr Zelensky sought to defuse anger over his abrupt dismissal of popular Defense Minister Mykhailo Fedorov, holding a second day of meetings with military commanders as Russia launched one of the largest ballistic-missile attacks on Kyiv since the war began. Fedorov, the 35-year-old drone-program champion, had clashed with 60-year-old Gen. Oleksandr Syrskiy over strategy; a Saturday protest of thousands demanded Syrskiy's ouster. Zelensky wants a minister who works harmoniously with Syrskiy, but reinstating Fedorov would mean dismissing his handpicked general. Both sides are intensifying long-range strikes: Ukraine hit oil depots in Stavropol and Russian tankers in the Black Sea, while downing 18 of 41 missiles overnight. Zelensky urged allies to supply more interceptors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20WSJ/Zelensky%20Seeks%20to%20Quell%20Growing%20Discontent%20Over%20Ouster%20of%20Defense%20Minister.pdf"}, {"id": "st-01", "title": "Andy Burnham promises new economic model in first speech as British PM", "source": "ST", "date": "21 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Andy Burnham pledged to end Britain's political instability with a new economic and political model in his first speech after becoming prime minister on July 20. He is Britain's seventh PM since 2016, invited by King Charles III after being elected Labour leader uncontested. Burnham promised a 10-year plan later in 2026 to restore the economy, plus costed cost-of-living measures from July 21. His rise follows two failed leadership bids and a stint as Manchester mayor. Outgoing PM Keir Starmer, who resigned amid poor polling and May local-election losses, gave his successor full backing. Burnham now faces appointing senior ministers and building support in a fractured party where MPs fear losing seats to fringe parties. BLOOMBERG.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Andy%20Burnham%20promises%20new%20economic%20model%20in%20first%20speech%20as%20British%20PM.pdf"}, {"id": "st-02", "title": "China's mysterious new billionaires are conquering the world", "source": "ST", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China is minting young self-made billionaires faster than anywhere but America, with 30 aged 40 or under in 2026, nine more than 2025, per Hurun. DeepSeek founder Liang Wenfeng, worth roughly US$38 billion after a US$71 billion valuation, tops a publicity-shy generation. Unlike predecessors in property and heavy industry, they favour video games, tea and coffee chains, toys and media, scaling globally at speed: Pop Mart, Chagee, Dreame and Insta360 rely heavily on overseas sales amid weak home spending. Many reject the punishing \"996\" work culture. Yet relations with Beijing have soured; Jack Ma and others saw fortunes shrink under \"common prosperity\", and global ambitions expose them to US-China tensions. Shunning publicity, they stay enigmatic. THE ECONOMIST.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/China's%20mysterious%20new%20billionaires%20are%20conquering%20the%20world.pdf"}, {"id": "st-03", "title": "Faishal's resignation could hasten Cabinet reshuffle, reaffirms PAP's high standards: Analysts", "source": "ST", "date": "21 Jul 2026", "tags": ["Politics", "Southeast Asia", "Society"], "summary": "Analysts said the resignation of Acting Minister-in-charge of Muslim Affairs Faishal Ibrahim could hasten a Cabinet reshuffle and reaffirms the PAP's high standards. Faishal quit as office-holder, MP and party member on July 20 over a \"lapse in judgment\" in interactions with a woman who emailed PM Lawrence Wong. Zaqy Mohamad replaces him. Observers called it a significant setback for 4G leadership, coming after Koh Poh Koon's June exit, and it leaves gaps in Malay/Muslim representation; besides Masagos Zulkifli, no other Malay MP is a full minister. Analysts said Wong's swift, decisive action signals accountability over convenience and high conduct expectations, though some question whether a \"whiter than white\" standard is sustainable amid intense social-media scrutiny.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Faishal's%20resignation%20could%20hasten%20Cabinet%20reshuffle,%20reaffirms%20PAP's%20high%20standards%20Analysts.pdf"}, {"id": "st-04", "title": "Houthis impose Saudi naval blockade, opening new front in US-Iran war", "source": "ST", "date": "21 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Yemen's Iran-aligned Houthis said on July 20 they were imposing a naval blockade on Saudi Arabia, opening a new front in the US-Iran war and widening threats to global energy and trade. They declared a \"maritime embargo against the criminal Saudi enemy\" in retaliation for an alleged siege of Yemen. Iran had pressed the Houthis to close the Bab el-Mandeb strait; a full closure would cut 7 per cent of global oil supply, atop 10 per cent already lost. Oil briefly rose then fell on diplomacy hopes: Tehran received a 10-day ceasefire proposal from mediators. US strikes entered a ninth night; Iran hit US assets in Jordan and Kuwait. Kuwait reported a desalination plant attacked. REUTERS.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Houthis%20impose%20Saudi%20naval%20blockade,%20opening%20new%20front%20in%20US-Iran%20war.pdf"}, {"id": "st-05", "title": "Retail investors: Are they ready for more investment funds?", "source": "ST", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "As MAS seeks feedback on proposals to broaden retail investors' access to more investment funds, The Straits Times highlights concerns about whether Singaporeans can assess complex products. Retiree Tye Hua Swee said undisclosed terms, including $1,000 monthly penalties, surfaced only after a partial withdrawal, and his sales agent turned unresponsive. Another investor lost thousands in a fund with unexplained sub-funds. MAS's reforms would speed approval of new fund types, such as futures-based single-commodity and single-country bond funds, while adding safeguards: enhanced disclosures, pre-transaction alerts, knowledge-assessment warnings and protections for vulnerable investors. It also proposes stronger recourse, including independent representatives, a grant scheme and removing compensation caps. Still, investors bear primary responsibility for understanding products, said SIAS's David Gerald.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Retail%20investors%20Are%20they%20ready%20for%20more%20investment%20funds.pdf"}, {"id": "st-06", "title": "Shares unsettled as oil climbs, earnings loom for AI", "source": "ST", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Energy", "Technology & AI"], "summary": "Shares and bonds slipped on July 20 as the escalating Gulf conflict lifted oil and stoked inflation fears, while big tech earnings loomed. Brent topped US$90 for the first time in over a month, rising 2.4 per cent to US$90.18; US crude hit US$84.18. AMP's Shane Oliver warned prices could reach US$150 if the Strait of Hormuz stays shut. Futures priced 29 basis points of Fed hikes by end-2026, with a 60 per cent chance of a September rise pushing 30-year Treasury yields above 5 per cent. The Philadelphia Semiconductor Index shed 10 per cent last week. Results from Alphabet, Intel and Tesla are due; BofA tips a 5 per cent earnings beat. Gold slipped to US$4,013. REUTERS.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Shares%20unsettled%20as%20oil%20climbs,%20earnings%20loom%20for%20AI.pdf"}, {"id": "st-07", "title": "Singapore's AI growth masks economic risks", "source": "ST", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Southeast Asia"], "summary": "Singapore's AI-driven boom lifted first-half 2026 growth to 6 per cent, two points above MTI's 2-4 per cent forecast, despite trade disruption and the Iran war's energy-price spike. Second-quarter GDP rose 5.7 per cent year on year, easing from an upgraded 6.3 per cent. Analysts raised full-year forecasts: BofA to 4.5 per cent, Nomura seeing upside to 4.6 per cent, crediting an AI-powered semiconductor super-cycle. Yet risks loom: semiconductors now supply 80.2 per cent of electronics value-added, exposing Singapore to any tech slowdown. Oil near US$85 after the ceasefire collapsed, looming US Section 301 and 232 tariffs on partners including Singapore, and a forceful El Nino threatening food prices all cloud the second-half outlook, economists warned.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Singapore's%20AI%20growth%20masks%20economic%20risks.pdf"}, {"id": "st-08", "title": "Tehran and Washington face a 'wake up moment'", "source": "ST", "date": "21 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "After a week of strikes that shattered a fragile ceasefire, the US-Iran conflict stands on a knife's edge, analysts say, urging a diplomatic off-ramp before war spirals uncontrollably. Both sides have struck water and desalination plants, blocked the Strait of Hormuz, and the US reinstated a blockade of Iranian ports. Iran's strikes on US forces in Jordan killed three soldiers, denting Washington's dominance. Neither side can easily afford escalation: Trump risks midterm damage over an unpopular war, while Iran's battered economy nears reckoning, with 268 prominent Iranians signing a \"No to war\" petition. Analysts frame recent Iranian ship attacks as leverage to stay relevant at negotiations. Escalation risks spreading, including a Houthi Red Sea blockade. NEW YORK TIMES.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Tehran%20and%20Washington%20face%20a%20'wake%20up%20moment'.pdf"}, {"id": "st-09", "title": "Ukraine blames Russia for deadly strike on Turkish cargo ship", "source": "ST", "date": "21 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukraine said Russian missile strikes on July 19 hit the Turkish-owned cargo ship Golden Leo, carrying grain near Odesa, killing six sailors with four missing; the crew included Syrian and Indian citizens and a Ukrainian pilot. It followed one of Russia's largest ballistic barrages on Kyiv, over 40 missiles killing one and wounding 16. Russia said it struck military and port targets. Ukraine, in its fifth war year, faces a Patriot interceptor shortage since the US-Israeli war on Iran, letting Russia intensify raids. Domestic turmoil grew as thousands protested defence minister Mykhailo Fedorov's removal; two top generals backed commander Oleksandr Syrskyi. A drone strike also hit the Chevron- and Shell-linked Caspian Pipeline terminal near Novorossiysk. AFP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20ST/Ukraine%20blames%20Russia%20for%20deadly%20strike%20on%20Turkish%20cargo%20ship.pdf"}, {"id": "bt-01", "title": "'Keep things simple': HP Greater Asia chief Michael Boyle on leading the tech giant beyond hardware", "source": "BT", "date": "21 Jul 2026", "tags": ["Technology & AI"], "summary": "Michael Boyle, senior vice-president and managing director for HP Greater Asia, tells BT that HP Inc is investing heavily in services-led growth and AI-enabled work solutions to lift profitability and recurring revenue beyond its PC and printer roots. Boyle, who moved to Singapore this year overseeing South-east Asia, Australia, New Zealand, South Korea and Japan, stresses setting \"a clear direction\" and keeping things simple. HP is embedding AI internally and marketing it via a workforce experience platform, and running Garage 2.0, an incubator backing AI startups. HP Inc posted US$14.4 billion revenue in the quarter to Apr 30, up 9 per cent. Singapore serves as a print manufacturing and R&D hub.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/'Keep%20things%20simple'%20HP%20Greater%20Asia%20chief%20Michael%20Boyle%20on%20leading%20the%20tech%20giant%20beyond%20hardware.pdf"}, {"id": "bt-02", "title": "Bezos, others invest in Temasek-backed AI startup to discover new materials for chipmaking", "source": "BT", "date": "21 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "CuspAI, a two-year-old Cambridge, UK startup backed by Temasek, raised US$450 million in Series B financing led by Kleiner Perkins and New Enterprise Associates, with participation from Jeff Bezos' Bezos Expeditions, valuing it at US$2.6 billion, up from US$520 million in September 2025. On Jul 20 it launched the AI Materials Foundry, a coalition of over 48 firms including Nvidia, Meta and Hyundai, to pool resources for faster, cheaper materials discovery for chipmakers. CEO Chad Edwards said 80 per cent of efforts target material discovery, aiming to cut reliance on rare metals like ruthenium. Advisers include Yann LeCun and Geoffrey Hinton. No project has yet produced a lab-beating candidate molecule.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Bezos,%20others%20invest%20in%20Temasek-backed%20AI%20startup%20to%20discover%20new%20materials%20for%20chipmaking.pdf"}, {"id": "bt-03", "title": "CICT to reconfigure parts of Paragon, including Metro space", "source": "BT", "date": "21 Jul 2026", "tags": ["Finance & Markets"], "summary": "CapitaLand Integrated Commercial Trust (CICT) is advancing plans to optimise and selectively reconfigure parts of Orchard Road's Paragon, including areas occupied by department store Metro, with feasibility studies under way. Metro said it will progressively shift away from large-format department stores towards specialised retail concepts, and will not renew its existing stores at Paragon and Causeway Point when leases expire. Metro's retail arm posted an S$11.4 million after-tax loss for FY ended Mar 31, 2026, versus S$6.9 million a year earlier. CICT, which completed its S$3.9 billion Paragon acquisition on Jul 1, is reviewing enhancement initiatives. CICT units closed 0.8 per cent lower at S$2.45; Metro rose to S$0.46.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/CICT%20to%20reconfigure%20parts%20of%20Paragon,%20including%20Metro%20space.pdf"}, {"id": "bt-04", "title": "China leaves benchmark lending rates unchanged for 14th consecutive month in July", "source": "BT", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China kept its loan prime rates unchanged for a 14th straight month on Jul 20, in line with expectations, signalling policymaker patience despite softer-than-expected second-quarter data. The one-year LPR stayed at 3 per cent and the five-year LPR at 3.5 per cent; all 23 economists in a Reuters survey had predicted no change. China's economy grew at its slowest pace in over three years in Q2, missing forecasts, as weak household consumption offset strong manufacturing and exports. The PBOC cited a structural mismatch between strong supply and weak demand. Attention turns to the end-July Politburo meeting. ING's Lynn Song expects a solid chance of a rate cut within the quarter.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/China%20leaves%20benchmark%20lending%20rates%20unchanged%20for%2014th%20consecutive%20month%20in%20July.pdf"}, {"id": "bt-05", "title": "Europe seeking 'balance' in review of capital rule ditched by US", "source": "BT", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The EU's financial services commi
