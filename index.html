er sold $25 billion of debt; its 2036 bonds' spread widened to 1.65 points.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/SpaceX%20Shares%20Stumble%20in%20Nasdaq-100%20Debut.pdf"}, {"id": "wsj-14", "title": "The Canadian Who Steered Europe Away From the U.S.", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Canadian PM Mark Carney, who swept to power on a backlash to Trump's \"51st state\" talk, emerged as a central figure pushing Europe and Canada to reduce dependence on the U.S. Trump had threatened predecessor Justin Trudeau to scrap the 1908 border agreement, telling him \"I tear that up and your whole country unravels.\" On taking charge in early 2025, Carney commissioned a review of Canada's reliance on the U.S. for data storage, military hardware and food. A former Bank of England governor, he argued for building a \"dense web of connections\" not dependent on any single country, contrasting with NATO chief Mark Rutte's push to double down on Trump. This is the second of a two-part WSJ series.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/The%20Canadian%20Who%20Steered%20Europe%20Away%20From%20the%20U.S..pdf"}, {"id": "wsj-15", "title": "Trump Wants a New Air Force One in His Presidential Library. It's Not a Done Deal.", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Politics", "Defence"], "summary": "Trump flew Wednesday on a new Air Force One, a Boeing 747 gifted by Qatar, and wants it to eventually anchor his planned presidential library in downtown Miami, like Reagan's California complex. He faces obstacles: future presidents may need the jet, Democrats aim to block him, and cramming the jumbo jet into a dense-city skyscraper poses logistical challenges. The plane, valued at roughly $400 million, drew bipartisan criticism and got about $400 million in taxpayer-funded upgrades. Boeing's two ordered replacement planes aren't expected until mid-2028. The Air Force calls the Qatari jet a VC-25B \"bridge\" aircraft. On June 24, Rep. Joe Courtney filed an amendment to the fiscal 2027 defense bill targeting the plan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Trump%20Wants%20a%20New%20Air%20Force%20One%20in%20His%20Presidential%20Library.%20It%E2%80%99s%20Not%20a%20Done%20Deal..pdf"}, {"id": "wsj-16", "title": "Trump's Push for F-35 Deal With Turkey Sets Up Potential Clash With Congress", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Defence", "Geopolitics", "Politics"], "summary": "President Trump said Tuesday he would consider selling F-35 fighters to Turkey, signaling his embrace of President Erdogan and setting up a showdown with lawmakers who long opposed such a deal. Speaking alongside Erdogan in Ankara at a NATO summit, Trump praised Turkey as \"much more loyal than other countries.\" The two nations have been at an impasse since Erdogan's 2017 purchase of Russia's S-400 air-defense system triggered U.S. sanctions and Turkey's removal from the F-35 program. A 2020 law bars Turkey's return until it removes all S-400 systems. Sen. John Cornyn objected; Sens. Jeanne Shaheen and Mike Rounds said the S-400 issue must be resolved first. Officials reported no progress breaking the impasse.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Trump%E2%80%99s%20Push%20for%20F-35%20Deal%20With%20Turkey%20Sets%20Up%20Potential%20Clash%20With%20Congress.pdf"}, {"id": "wsj-17", "title": "U.S. Trade Deficit Widened in May as Imports of AI Components Rose", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "The U.S. trade deficit widened 42.2% in May from the prior month to a seasonally adjusted $77.6 billion, its widest since March 2025, as imports of pharmaceuticals, vehicles and AI-related semiconductors rose while exports fell. Exports dropped 3.2%, led by a large decline in gold sales overseas; imports rose 3.3% on strong demand for AI build-out goods. Economists said the figures point to trade being a drag on second-quarter GDP growth; first-quarter GDP grew at a 2.1% annualized rate. Year-to-date, the deficit was 40.6% smaller through May than the same period in 2025, which was inflated by front-running of \"Liberation Day\" tariffs. Trade policy faces fresh doubt after the USMCA pact wasn't extended.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/U.S.%20Trade%20Deficit%20Widened%20in%20May%20as%20Imports%20of%20AI%20Components%20Rose.pdf"}, {"id": "wsj-18", "title": "U.S. and Iran Exchange Strikes in Latest Threat to Fragile Ceasefire", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The U.S. struck sites along Iran's coast and blocked its legal oil sales Tuesday in response to Tehran's recent attacks on ships near the Strait of Hormuz, marking the most significant escalation since a June 17 memorandum of understanding to reopen the strait. Central Command said it hit more than 80 targets, including air-defense systems and over 60 Iranian small boats, four to five times more extensive than prior strikes. Iran responded by firing drones and ballistic missiles at Bahrain and Kuwait, which host U.S. bases. Explosions were reported in Bandar Abbas, Qeshm and Sirik. Iran's Mohammad Bagher Ghalibaf said, \"We don't fold.\" Trump, in Ankara for a NATO meeting, seeks a lasting diplomatic resolution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/U.S.%20and%20Iran%20Exchange%20Strikes%20in%20Latest%20Threat%20to%20Fragile%20Ceasefire.pdf"}, {"id": "wsj-19", "title": "Value Investing's Comeback Is Just a Quirk (for Now)", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "Value and emerging-market funds' big 2026 gains are partly a quirk driven by AI-boom chip stocks rather than classic bargains, writes Spencer Jakab. The iShares MSCI USA Value Factor ETF (VLUE), a $10 billion fund, returned 43% year-to-date, four times the S&P 500, but got nearly a quarter of its weight from chipmaker Micron at midyear. Vanguard's Value ETF returned 16%, lifted by Micron, Intel and Cisco. Value maven Tobias Carlisle notes cyclical stocks like Micron temporarily look cheap when earnings surge, boosting concentrated funds \"almost by accident.\" Taiwan Semiconductor, Samsung and SK Hynix make up over 30% of MSCI's emerging-markets index; South Korea and Taiwan constitute half the benchmark.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Value%20Investing%E2%80%99s%20Comeback%20Is%20Just%20a%20Quirk%20(for%20Now).pdf"}, {"id": "wsj-20", "title": "Will Someone Finally Blink in the AI Spending War?", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Big tech's AI spending is crimping free cash flow and stock prices, with only Alphabet outperforming the S&P 500 this year, writes Dan Gallagher. There are signs firms are seeking to rationalize investments: SpaceX's xAI signed a deal to share computing capacity with Anthropic for $1.25 billion a month. SpaceX spent $12.7 billion on AI capex last year, with analysts expecting over $37 billion this year. Meta may develop a cloud business; Bernstein's Madison Rezaei says its network rivals cloud providers, with about 20 gigawatts of capacity and 14GW more coming. CEO Mark Zuckerberg said renting capacity is \"an option\" if Meta overbuilds. Chip companies now make up about 18% of the S&P 500, up from 5% five years ago.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Will%20Someone%20Finally%20Blink%20in%20the%20AI%20Spending%20War.pdf"}, {"id": "st-01", "title": "'Want our normal lives back': Bahrain, Kuwait residents distressed by Iran attacks", "source": "ST", "date": "9 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "Residents of Bahrain and Kuwait awoke on July 8 to sirens and explosions as fresh Iranian strikes shattered a brief calm, prompting US President Donald Trump to declare the ceasefire \"over\". Iran said it targeted US assets in both Gulf states, retaliating for American strikes that followed Iranian attacks on tankers in the Strait of Hormuz. Long seen as safe havens, the two small states again paid the price of great-power conflict. Bahraini businessman Adel Mohammed said continued instability harmed his livelihood, while residents including a Jordanian visitor and Egyptian worker described renewed anxiety. \"We do not want war to return to the region,\" said one Bahrain-based homemaker, echoing widespread fears of escalation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/'Want%20our%20normal%20lives%20back'%20Bahrain,%20Kuwait%20residents%20distressed%20by%20Iran%20attacks.pdf"}, {"id": "st-02", "title": "AI boom drives intangible investment to record level: UN", "source": "ST", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The AI boom helped push global investment in intangible assets such as software, data and research to a record high above US$10 trillion in 2025, the UN's World Intellectual Property Organization said on July 8. Across 29 economies studied, representing 57 per cent of global GDP, intangible investment has grown 3.5 per cent annually in real terms since 2008, far outpacing tangible investment. The US led with nearly US$5 trillion, roughly six times second-placed Japan. Sweden was the most intangible-intensive economy at 17.4 per cent of GDP. WIPO said the assets proved more resilient than physical ones amid high interest rates and trade tensions. Software and databases posted the strongest growth. China was not covered.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/AI%20boom%20drives%20intangible%20investment%20to%20record%20level%20UN.pdf"}, {"id": "st-03", "title": "Beijing looking at curbing overseas access to China's top AI models: Sources", "source": "ST", "date": "9 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Chinese authorities have held meetings with top tech firms over the past month about restricting overseas access to China's most advanced AI models, including unreleased ones, three sources told Reuters. Led by the Ministry of Commerce, talks involving Alibaba, ByteDance and start-up Z.ai discussed limiting closed and open models, criminalising AI theft under national security law, and curbing who can fund domestic start-ups. The scope remains undecided and may apply only to future models. The moves mirror Washington treating advanced AI as a critical asset, after the US restricted foreign access to Anthropic's Fable and Mythos models. Chinese officials reportedly fear Mythos could exploit software vulnerabilities against Chinese interests, echoing calls for a domestic equivalent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Beijing%20looking%20at%20curbing%20overseas%20access%20to%20China's%20top%20AI%20models%20Sources.pdf"}, {"id": "st-04", "title": "Gaza's future still unclear after Hamas dissolves governing body", "source": "ST", "date": "9 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Hamas announced on July 6 it was dissolving the 15-member committee that has administered Gaza since 2007, aiming to hand civil affairs to a technocratic National Committee for the Administration of Gaza. On paper this ends Hamas's day-to-day governance, but experts say it sidesteps the core deadlock: the group's weapons. Analysts view the move as pressuring Israel amid a stalled ceasefire, depriving it of arguments and signalling to mediators. Israeli officials called it a \"ruse\", insisting the war ends only when Hamas disarms and Gaza is demilitarised. Hamas refuses to surrender its leverage until a Palestinian authority is established and Israeli withdrawal begins. Since October 2025, Israeli forces have extended control over 60 per cent of the territory.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Gaza's%20future%20still%20unclear%20after%20Hamas%20dissolves%20governing%20body.pdf"}, {"id": "st-05", "title": "Growing shortage of high-skilled workers threatens US chip manufacturing revival", "source": "ST", "date": "9 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "A nationwide shortage of high-skilled workers threatens to delay billions of dollars in new US semiconductor plants and constrain chip production, according to a July 7 report from McKinsey, SEMI and the National Science Foundation. The skilled labour gap could reach 157,000 full-time workers by 2030, hitting hardest in Texas, California, Arizona, New York and Ohio. The deficit risks stalling TSMC's estimated US$265 billion Arizona plans, Micron's US$100 billion New York memory push, Samsung's Texas facility and Intel's delayed Ohio project. Only about 3 per cent of US engineering students enter the chip industry, most preferring lucrative AI software roles. The AI boom has also driven roughly 102,000 announced job cuts in 2026. Authors urged sustained government funding and curriculum expansion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Growing%20shortage%20of%20high-skilled%20workers%20threatens%20US%20chip%20manufacturing%20revival.pdf"}, {"id": "st-06", "title": "HSBC sees SGX-Nasdaq dual listing bridge boosting Singapore's financial hub status", "source": "ST", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's position as a financial hub will strengthen once the SGX-Nasdaq dual listing framework becomes operational, HSBC corporate and institutional banking chief Michael Roberts told The Straits Times. Set to debut mid-2026, the bridge would give firms, especially tech companies, access to both regional and global capital, offering better valuations, deeper liquidity and wider investor reach. Roberts cited Singapore's rising intra-Asia trade, geopolitical neutrality, talent pool and start-up ecosystem as draws for ASEAN and Chinese firms seeking regional bases. Foreign company headquarters here rose 33.8 per cent from about 770 in 2019 to 1,030 in 2024. HSBC pledged US$1.5 billion for venture-backed start-ups, supporting clients like cleaning-robotics firm LionsBot. Singapore is HSBC's fifth-largest profit contributor.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/HSBC%20sees%20SGX-Nasdaq%20dual%20listing%20bridge%20boosting%20Singapore's%20financial%20hub%20status.pdf"}, {"id": "st-07", "title": "Oil prices soar over 6% after Trump says US ceasefire with Iran is 'over'", "source": "ST", "date": "9 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Oil prices surged more than 6 per cent on July 8 after US President Donald Trump said the memorandum of understanding to end the conflict with Iran was \"over\", reviving fears over Middle East supply. Brent crude jumped 6.2 per cent to US$78.74 a barrel, while WTI rose 6.3 per cent to US$74.85, their highest since June 23. Prices had already climbed about 3 per cent after Washington revoked the licence authorising Iranian crude sales. US strikes followed Iranian attacks on three vessels in the Strait of Hormuz; Iran then targeted US sites in Bahrain and Kuwait. Analysts said prices near US$80 now better reflect fundamentals. Some tankers reportedly avoided or turned back from the strait.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Oil%20prices%20soar%20over%206%20after%20Trump%20says%20US%20ceasefire%20with%20Iran%20is%20'over'.pdf"}, {"id": "st-08", "title": "SK Hynix's $36 billion US listing said to be multiple times oversubscribed", "source": "ST", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SK Hynix's US$28 billion (S$36 billion) US listing is multiple times oversubscribed ahead of pricing on July 9, sources told Bloomberg. The South Korean memory-chip giant's offering drew strong early demand from global long-only funds and technology-focused investors, with about 1,000 institutional investors joining a July 6 marketing call. SK Hynix is selling 177.9 million American depositary receipts, each representing one-tenth of a common share, based on the July 3 Seoul closing price. That puts it on track to be the biggest-ever US listing by a foreign company, worth 2.5 per cent of a market value that has tripled in 2026 to over US$1 trillion. Baillie Gifford, Coatue and Situational Awareness Partners signalled interest in up to US$7 billion of ADRs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/SK%20Hynix's%2036%20billion%20US%20listing%20said%20to%20be%20multiple%20times%20oversubscribed.pdf"}, {"id": "st-09", "title": "Sam Altman offers a Trojan Horse to American taxpayers", "source": "ST", "date": "9 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "In this commentary, Gautam Mukunda warns against OpenAI chief Sam Altman's offer to give the US government a 5 per cent stake, worth US$42.6 billion, to share AI's bounty. He invokes economist George Stigler's theory of regulatory capture, arguing the \"gift\" would make government owner, regulator and gatekeeper at once, pressuring politicians to prop up OpenAI's value every election cycle. He notes OpenAI reportedly lost about US$21 billion from operations in 2025 on US$13 billion revenue, with its IPO slipping to 2027 and Oracle rattled. Government ownership, he adds, would make the firm look like a US state arm abroad, citing France replacing Palantir. Bernie Sanders' bill to nationalise half of major AI firms is deemed worse.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Sam%20Altman%20offers%20a%20Trojan%20Horse%20to%20American%20taxpayers.pdf"}, {"id": "st-10", "title": "Taiwan warns of China 'expansionism' persisting without global action", "source": "ST", "date": "9 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "China's \"authoritarian expansionism\" in regional waters will persist unless the world acts, a senior Taiwanese security official warned on July 8, describing Beijing's strategy as \"incremental salami slicing\". Lii Wen, deputy secretary-general of the National Security Council, said China uses military, coast guard, research and maritime militia vessels to press claims and turn international waterways into internal waters. Ocean Affairs Minister Kuan Bi-ling said Taiwan, Japan and the Philippines faced the same pattern of actions kept below the threshold of conventional warfare. The remarks followed a Japan-China coast guard face-off near the disputed Senkaku/Diaoyu islands. China began patrolling east of Taiwan in June. US Senator Tammy Duckworth urged the international community to keep transiting contested waters.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Taiwan%20warns%20of%20China%20'expansionism'%20persisting%20without%20global%20action.pdf"}, {"id": "st-11", "title": "Temasek doubles down on net-zero goal, says sustainable investments make profit", "source": "ST", "date": "9 Jul 2026", "tags": ["Environment", "Finance & Markets"], "summary": "Temasek is expanding its sustainable-living portfolio after such investments delivered strong long-term returns, doubling down on energy infrastructure as Middle East conflict highlights energy security. Its 2026 sustainability report showed portfolio emissions steady at 21 million tCO2e, and it conceded its 2030 target to halve emissions to about 11 million tonnes is unlikely to be met, though it retains the 2050 net-zero goal. Sustainable-living investments grew $3 billion to $49 billion. Chief sustainability officer Park Kyung-ah stressed every investment must clear returns hurdles. SIA and Sembcorp make up 62 per cent of portfolio emissions. Temasek is backing grid providers, nuclear and fusion firms, and betting energy transition and AI trends will \"intertwine and move together\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Temasek%20doubles%20down%20on%20net-zero%20goal,%20says%20sustainable%20investments%20make%20profit.pdf"}, {"id": "st-12", "title": "Temasek to grow AI investments to 15% of its portfolio by 2031", "source": "ST", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Temasek will more than double its portfolio exposure to artificial intelligence, targeting up to 15 per cent by March 2031 from around 6 per cent now, excluding its Singapore portfolio companies. Recent AI bets include Anthropic, OpenAI and SpaceX. Chief executive Dilhan Pillay said generative AI is reshaping business models and work. Temasek invests across five parts of the value chain: energy and data centres, semiconductors like TSMC and Nvidia, cloud providers, foundation models, and AI applications. Leaders said the US is a key destination and the trend is \"irreversible\", while acknowledging bubble and overvaluation concerns. The remaining 85 per cent of the portfolio must adopt AI for competitiveness. Temasek's portfolio companies employ around 400,000 people globally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Temasek%20to%20grow%20AI%20investments%20to%2015%20of%20its%20portfolio%20by%202031.pdf"}, {"id": "st-13", "title": "Trump NATO summit: allies discuss defence spending", "source": "ST", "date": "9 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "US President Donald Trump swung from antagonism to affection at a July 8 NATO summit in Ankara, telling reporters there was \"a lot of love in that room\" after earlier lashing allies over their response to his war on Iran. Behind closed doors he reassured leaders the US would stay in the alliance, and the final declaration reaffirmed the Article 5 mutual-defence commitment. Trump revived demands to acquire Greenland, branded Spain a \"terrible partner\", and declared the Iran ceasefire \"over\". Europe's core defence spending rose 11 per cent in 2026 to US$634 billion. Trump pledged to license Ukraine to make Patriot missiles, while Europe and Canada committed €70 billion a year in military support for 2026 and 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Trump%20NATO%20summit%20allies%20discuss%20defence%20spending.pdf"}, {"id": "st-14", "title": "Trump says Iran ceasefire over after fighting flares up", "source": "ST", "date": "9 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "US President Donald Trump said on July 8 the ceasefire with Iran was \"over\" but left the door open to talks, after fighting flared over Iranian attacks on ships in the Strait of Hormuz. Tehran insists on controlling the waterway, charging fees and threatening vessels that deviate from its route. US Central Command said its forces struck over 80 targets, including air defences and 60 IRGC boats; Iran reported explosions near Qeshm, Sirik, Bandar Abbas and Bushehr, and one Guard member killed. Iran retaliated against US facilities in Kuwait and Bahrain, where Kuwait intercepted missiles and drones. Trump accused Iran of misrepresenting the June 17 deal, calling them \"cuckoo\". Washington revoked Iranian oil sanction waivers on July 7. Oil jumped 5 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Trump%20says%20Iran%20ceasefire%20over%20after%20fighting%20flares%20up.pdf"}, {"id": "st-15", "title": "Who won the Iran war?", "source": "ST", "date": "9 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "In this commentary, retired Singapore diplomat Bilahari Kausikan rejects the fashionable narrative that Iran \"won\" the war and Trump lost. Though the Islamic republic survives, it is far weaker: proxies Hamas and Hezbollah are degraded, Assad has fallen, and its military, industrial base and enrichment facilities are wrecked. The IMF projects Iran's economy shrinking over 6 per cent with nearly 70 per cent inflation; damage is estimated at US$270 billion. Russia and China gave only token support, and Gulf states now see the US and Israel as ultimate guarantors. Kausikan warns the strait threat erodes as alternatives develop, and argues a fourth phase of war over Iran's nuclear ambitions is inevitable. Geopolitics, he says, must be managed as continual \"mowing the grass\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Who%20won%20the%20Iran%20war.pdf"}, {"id": "st-16", "title": "Why are singles' BTO application rates still so high?", "source": "ST", "date": "9 Jul 2026", "tags": ["Society", "Southeast Asia"], "summary": "Singapore singles remain heavily oversubscribed for the two-room flexi flats they alone are eligible for, keeping Build-To-Order application rates high. Graphic designer Melissa Low, 42, has applied four times since July 2025 without a queue number. Median singles' application rates peaked at 26.3 in October 2024 when singles could apply islandwide, tapering to around 7 recently, versus 1.4 for first-timer families seeking larger flats. Analysts cite affordability, with June flats priced from $139,000 to $247,000 before grants, against roughly $360,000 on the resale market. Some 20,000 two-room flexi flats will launch from 2026 to 2028, up 50 per cent. The Government is reviewing the age-35 threshold, but observers warn lowering it could intensify competition unless HDB builds faster.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20ST/Why%20are%20singles'%20BTO%20application%20rates%20still%20so%20high.pdf"}, {"id": "bt-01", "title": "Australia central banker says oil shock yet to slow economy", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Australia's recent oil shock has dented consumer and business confidence but shows few signs of a marked activity slowdown, RBA assistant governor Sarah Hunter said on Jul 8. She warned that if inflation expectations drift up, a period of low inflation and higher unemployment might be needed, stressing that supply shocks \"do not lessen the importance of maintaining low and stable inflation.\" The RBA has raised rates three times this year to 4.35 per cent to counter energy shocks from the Iran war, holding steady in June. Markets bet rates have peaked, pricing just 15 basis points of tightening by year-end, though Brent crude hit US$76.38 after fresh US strikes on Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Australia%20central%20banker%20says%20oil%20shock%20yet%20to%20slow%20economy.pdf"}, {"id": "bt-02", "title": "Frasers Property launches Dunearn House condo with prices from S$2,799 psf", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Frasers Property will preview Dunearn House, the first private residential project in the Bukit Timah Turf City precinct, on Jul 10, with prices from about S$2,799 psf. Jointly developed with CSC Land Group and Sekisui House, the 99-year leasehold project comprises 380 units across five blocks, with two-bedders (527 sq ft) from S$1.47 million. The developer targets a 70 per cent take-up rate, citing resilient demand despite the US-Iran war. The Frasers-led consortium won the Dunearn Road site for S$491.5 million (S$1,410 psf ppr) in June 2025, topping nine bids. It is near Sixth Avenue MRT and top schools. Booking sales start Jul 25.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Frasers%20Property%20launches%20Dunearn%20House%20condo%20with%20prices%20from%20S2,799%20psf.pdf"}, {"id": "bt-03", "title": "From Anthropic to Zegna - the A-to-Z of Temasek's strategies to thrive in a 'polycrisis' world", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Temasek is positioning at the forefront of the AI revolution and a global consumer rebound, its portfolio hitting a record S$518 billion in the year to March 2026. It added S$51 billion in new investments while divesting S$31 billion, doubling capital deployment. New holdings include Anthropic, OpenAI, Luckin Coffee and Ermenegildo Zegna. CEO Dilhan Pillay said the firm faces \"a polycrisis world\" and its most complex environment in five decades. Under its T2030 strategy, Temasek is refining its portfolio into three pillars and targets raising AI exposure to 15 per cent, core-plus infrastructure to 5 per cent and private credit to 5 per cent by March 2031, favouring larger, focused tickets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/From%20Anthropic%20to%20Zegna%20-%20the%20A-to-Z%20of%20Temasek's%20strategies%20to%20thrive%20in%20a%20'polycrisis'%20world.pdf"}, {"id": "bt-04", "title": "Governments must implement reforms before the next big financial crisis", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Despite recurring 2026 geopolitical shocks, the global economy has stayed resilient, but the IMF, World Bank and BIS warn that strength is fragile. The BIS flagged surging AI investment as a stress point, with the five largest hyperscalers set to spend over US$1 trillion in 2025-2026. If AI disappoints, it could trigger a downturn akin to past tech bubbles, hitting the US and China hardest given elevated household equity exposure. The commentary urges cutting public debt, projected to hit 100 per cent of global GDP, preserving price and financial stability, defending central bank independence, and structural reforms. It warns US-China tensions risk a \"spiral of escalation\" undermining growth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Governments%20must%20implement%20reforms%20before%20the%20next%20big%20financial%20crisis.pdf"}, {"id": "bt-05", "title": "How merchant states are reshaping global business connectivity", "source": "BT", "date": "9 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "The commentary argues that geopolitical tensions, regulatory divergence and shifting trade routes are pushing companies away from efficiency-driven, concentrated supply chains towards trust, connectivity and optionality. Firms are splitting production across Vietnam, India and Mexico and distributing financial functions across jurisdictions. Singapore and the United Arab Emirates exemplify \"merchant states\" that make risk manageable. Singapore offers legal certainty and a trusted financial hub, functioning as a regional operating platform, while the UAE provides physical connectivity via ports like Jebel Ali and pipelines bypassing the Strait of Hormuz. Both enable continuity amid fragmentation. The author concludes that jurisdictions offering stability and predictability will gain importance regardless of market size.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/How%20merchant%20states%20are%20reshaping%20global%20business%20connectivity.pdf"}, {"id": "bt-06", "title": "Malaysia's industrial property market shifts beyond the data centre boom", "source": "BT", "date": "9 Jul 2026", "tags": ["Southeast Asia", "Technology & AI"], "summary": "Malaysia's data centre investment wave is fading, but industrial demand is shifting towards advanced manufacturing, logistics and AI-related industries. Transactions fell 20.8 per cent quarter-on-quarter to 1,889 deals in Q1 2026, with value down 28 per cent to RM7.3 billion, largely reflecting softer SME demand and tighter data centre approvals rather than a broad slowdown. Analysts say the market is becoming more selective, with strategic land still commanding strong demand. Johor's vacant industrial land deals jumped to 128, while Penang's value trebled to RM204.6 million. Selangor, Johor, Perak, Sarawak and Penang are carving out specialised roles. Risks include reliance on foreign direct investment and policy consistency.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Malaysia's%20industrial%20property%20market%20shifts%20beyond%20the%20data%20centre%20boom.pdf"}, {"id": "bt-07", "title": "Nuclear power to climb 44% worldwide as China tops US: report", "source": "BT", "date": "9 Jul 2026", "tags": ["Energy", "Environment"], "summary": "Global nuclear capacity is set to climb 44 per cent over the next decade after years of tepid growth, reaching up to 535 gigawatts by 2036 from 372 GW in 2025, according to a BloombergNEF report released Jul 8. Growth is spurred by rising electricity demand and aggressive reactor building in China and India. China had 59 GW under construction at end-2025 and is on track to hit 102 GW by decade's end, overtaking the US as the world's biggest nuclear nation. The industry benefits from climate goals, surging demand from data centres and electrified homes, and rising social acceptance. The US has just one commercial plant under construction despite Trump administration support.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Nuclear%20power%20to%20climb%2044%20worldwide%20as%20China%20tops%20US%20report.pdf"}, {"id": "bt-08", "title": "S-Reits poised for rerating despite hawkish Fed backdrop: DBS", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "Reits in Singapore, Hong Kong and Thailand have shown resilience despite a more hawkish market backdrop, DBS Group Research said in a Jul 6 report, arguing negatives are already priced in. Investors have sought shelter in defensive Reits, keeping valuations attractive with yields of 4.9 to 7.6 per cent. The Fed left rates at 3.5-3.75 per cent in June but delivered a more hawkish message. DBS expects the upcoming earnings season to catalyse further rerating of S-Reits, which rose 0.4 per cent month-on-month versus a 2.6 per cent STI gain. It favours Reits with strong balance sheets, limited refinancing risk and Singapore-focused exposure, citing scope for debt repricing benefits as legacy borrowings mature.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/S-Reits%20poised%20for%20rerating%20despite%20hawkish%20Fed%20backdrop%20DBS.pdf"}, {"id": "bt-09", "title": "SGX-listed firms should be like DBS, be brave with forward guidance", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "The commentary urges SGX-listed companies to provide granular, credible forward guidance rather than bland generic statements about \"executing core strategy\" or \"prudent capital management.\" Ahead of quarterly results, it argues investors want detailed outlooks, and company boards, given deep business knowledge, may be more credible than analysts. It praises role models: the manager of Stoneweg Europe Stapled Trust guided 2026 distribution broadly in line with 2025, while DBS CEO Tan Su Shan gave detailed full-year guidance. Reits, with contracted leases, are especially well-placed. Acknowledging projections can go wrong from unforeseen shocks, the writer says investors are fair-minded and boards should boldly embrace guidance, which signals confidence and builds credibility.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/SGX-listed%20firms%20should%20be%20like%20DBS,%20be%20brave%20with%20forward%20guidance.pdf"}, {"id": "bt-10", "title": "Singapore retail investors more bullish on AI stocks than global peers: eToro survey", "source": "BT", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Singapore retail investors are more bullish on technology and AI stocks than global peers, with over half expecting AI stock prices to rise in 2026 versus 44 per cent globally, an eToro survey of 11,000 investors across 13 countries found. Some 40 per cent favour semiconductor and chipmaker firms for the strongest five-year returns. Over one in four Singaporean investors believe their country is best positioned to lead the AI race, third behind the US (56 per cent) and China (52 per cent). Technology has held the top preferred sector for four straight quarters. In Q2 2026, 36 per cent increased portfolio contributions. Analysts cited OpenAI's S$300 million commitment and a pipeline of new AI listings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Singapore%20retail%20investors%20more%20bullish%20on%20AI%20stocks%20than%20global%20peers%20eToro%20survey.pdf"}, {"id": "bt-11", "title": "Takaichi wants to make Japan Inc great again", "source": "BT", "date": "9 Jul 2026", "tags": ["Politics", "Trade"], "summary": "Japan's Prime Minister Sanae Takaichi has unveiled the country's first comprehensive industrial policy in decades, a post-deflation growth blueprint calling for 370 trillion yen (US$2.3 trillion) of domestic investment through 2040 to fortify Japan against China. It targets 17 areas and 62 priority products, including physical AI, quantum computing, defence, shipbuilding and cybersecurity, referring to China only as a \"certain country.\" The biggest challenge comes from Tokyo's fiscal conservatives: a controversial new fiscal architecture, with front-loaded bridge bonds backed by vaguely sketched resources, has stirred bond-market unease dubbed the \"Honebuto shock.\" Other risks include bureaucrats picking winners and securing private-sector buy-in. Takaichi's hurdle may be staying in office long enough.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Takaichi%20wants%20to%20make%20Japan%20Inc%20great%20again.pdf"}, {"id": "bt-12", "title": "Temasek's blue-chip portfolio companies drive value to record S$518 billion", "source": "BT", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "A strong performance from Temasek's Singapore-based portfolio companies and realised divestment gains drove its net portfolio value to a record S$518 billion for the year to March 2026, disclosed at the Temasek Review launch on Jul 8. One-year total shareholder return was 10.5 per cent, with NPV up S$49 billion. Gains were boosted by ST Telemedia's S$6.6 billion sale of an 82 per cent data centre stake to KKR and Singtel. Middle East events triggered a 2 per cent NPV drawdown in the final month, and a stronger Singapore dollar cut returns. Longer-term TSRs were 6.8 per cent over 20 years and 7.1 per cent over 10 years. The portfolio holds a roughly 40-40-20 split across three segments.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/Temasek's%20blue-chip%20portfolio%20companies%20drive%20value%20to%20record%20S518%20billion.pdf"}, {"id": "bt-13", "title": "What will democracy in the US look like after 250 years?", "source": "BT", "date": "9 Jul 2026", "tags": ["Politics", "Society"], "summary": "Marking 250 years since the Declaration of Independence, the commentary reflects that the US experiment has outlasted nearly every prediction of collapse, enduring as a global reference point defined not by size or wealth but by an idea: government by consent, divided and checked power, and individual liberty. It invokes John Winthrop's \"city upon a hill\" and the constitutions elsewhere that borrowed America's grammar of separated powers. The piece acknowledges slavery, disenfranchisement and dispossession, noting reformers invoked the founding creed to demand its promises be realised. Today the hill looks steeper amid eroded institutional trust, polarisation and rival authoritarian models. Whether the US remains a model depends on citizens valuing self-government despite its difficulty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20BT/What%20will%20democracy%20in%20the%20US%20look%20like%20after%20250%20years.pdf"}, {"id": "scmp-01", "title": "A healthy economy isn't built on asset bubbles and debt pyramids", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "An opinion piece argues modern finance dangerously equates rising asset prices and billionaire fortunes with stability. Global stock market capitalisation rose 18.5 per cent in 2025 to nearly US$152 trillion, while UBS counted 3,302 dollar billionaires, up 383. The author warns extreme wealth concentration and the \"saving glut of the rich\" inflate asset prices while piling debt onto lower- and middle-income groups, echoing pre-1929 and pre-2008 dynamics. Citing Schularick, Taylor, Reinhart and Rogoff, it notes rapid credit growth signals crises. Resilience should be measured by living standards, health, education and housing, not GDP or market indices. It praises China lifting nearly 800 million from poverty and urges directing finance toward the real economy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/A%20healthy%20economy%20isn%E2%80%99t%20built%20on%20asset%20bubbles%20and%20debt%20pyramids.pdf"}, {"id": "scmp-02", "title": "Anthropic hits back after China warns of Claude Code 'backdoor' risks", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Anthropic said China-based users advised to uninstall Claude Code were never authorised to use it, after Beijing warned of security \"backdoor\" risks. A platform run by China's Ministry of Industry and Information Technology called the agentic coding tool \"a serious threat,\" saying a built-in monitoring mechanism could send sensitive data to remote servers without consent. Anthropic confirmed it embedded hidden code to track user locations to curb illicit model \"distillation.\" The warning covered versions 2.1.91 to 2.1.196. Claude Code is popular among Chinese developers despite no official availability. Anthropic has accused DeepSeek, MiniMax and Alibaba of distillation; Alibaba banned employee use. Analysts expect more Chinese firms to drop the tool. Alibaba owns the Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Anthropic%20hits%20back%20after%20China%20warns%20of%20Claude%20Code%20%E2%80%98backdoor%E2%80%99%20risks.pdf"}, {"id": "scmp-03", "title": "Apple loses challenges against EU rules to curb Big Tech", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "Apple lost its challenge on Wednesday against EU rules designating its App Store and iOS as \"gatekeepers\" under the Digital Markets Act, which obliges dominant platforms to give rivals more room to compete. The Luxembourg-based General Court dismissed Apple's actions and ruled its claims over iMessage inadmissible. The DMA, effective since May 2023, threatens fines up to 10 per cent of global annual turnover and has drawn challenges from Apple, Meta and ByteDance. Apple reiterated the mandate \"goes beyond what is lawful and proportionate,\" warning it erodes privacy and security protections. Judges backed EU regulators, saying Apple's five app stores share one purpose. iMessage escaped DMA rules as it was not designated an important gateway.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Apple%20loses%20challenges%20against%20EU%20rules%20to%20curb%20Big%20Tech.pdf"}, {"id": "scmp-04", "title": "As Japanese yen sinks to a 40-year low, focus turns to the carry trade", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "Analysts weighed the outlook for the yen carry trade as the currency slid past 162 per US dollar, its weakest since 1986. A wide US-Japan interest rate differential, with the two-year swap spread near 250 basis points, continues driving capital out of Japan into higher-yielding assets. Bank of East Asia's Bosco Wu and CCB International strategists expect a hawkish Federal Reserve and gradual Bank of Japan tightening to sustain yen weakness near term. Goldman Sachs projected the yen at 162, 163 and 165 over three, six and 12 months. Hedge funds are the most bearish since 2007, with net shorts near 138,000 contracts. Strategists warned a simultaneous policy shift could trigger disorderly unwinding and volatility.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/As%20Japanese%20yen%20sinks%20to%20a%2040-year%20low,%20focus%20turns%20to%20the%20carry%20trade.pdf"}, {"id": "scmp-05", "title": "BYD challenges Porsche's 911 with launch of electric supercar in Europe", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Trade", "Technology & AI"], "summary": "BYD is targeting Porsche's supercars, planning to sell Denza-branded models in developed markets in a sign of its growing premium-vehicle heft. The Shenzhen carmaker planned to unveil the two-door Denza Z sports car, featuring its self-developed DiSus body control system and blade batteries, at the UK's Goodwood Festival of Speed, taking aim at the Porsche 911, which starts near US$140,000. Analysts said luring buyers from marques like Porsche could prove BYD's quality, aided by the energy crisis from the Iran war. Chinese automakers led by BYD are forecast to export 10 million units this year, up 41 per cent, while domestic sales may fall 10 per cent. European margins are higher despite tariffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/BYD%20challenges%20Porsche%E2%80%99s%20911%20with%20launch%20of%20electric%20supercar%20in%20Europe.pdf"}, {"id": "scmp-06", "title": "China eyes Russian submarine rescue expertise in Yellow Sea naval drills", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Chinese and Russian navies began the Joint Sea-2026 exercise in Qingdao on Monday, with Beijing hoping to gain submarine-rescue experience from Moscow amid intensifying undersea competition. The drills, running in the Yellow Sea until Monday, include anti-submarine warfare, search-and-rescue, air defence, and rescuing a simulated distressed submarine's crew using a deep-submergence rescue vehicle. The exercise coincided with China's launch of a submarine-fired ballistic missile into the Pacific, signalling progress on its sea-based nuclear deterrent. Vessels include Russia's submarine Ufa and rescue ship Igor Belousov, plus a Chinese Yuan-class submarine and rescue vessel Yangchenghu. Analysts noted Chinese nuclear submarines remain noisier than US and Russian counterparts. One called the drill \"relatively small\" versus the larger US-led Rimpac exercise.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/China%20eyes%20Russian%20submarine%20rescue%20expertise%20in%20Yellow%20Sea%20naval%20drills.pdf"}, {"id": "scmp-07", "title": "China now has 7 of world's 10 biggest banks as Beijing's financial ambitions grow", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "China's \"big four\" state-run banks are now the world's largest by tier-one capital, according to The Banker's latest ranking, underscoring Beijing's ambition to become a global financial powerhouse. ICBC, China Construction Bank, Agricultural Bank of China and Bank of China took the top four spots, with JPMorgan Chase fifth; Chinese banks filled seven of the top 10, all government-controlled, and Postal Savings Bank entered for the first time. Chinese banks held US$54.8 trillion in assets, more than double US banks' US$25 trillion, but US lenders retained a profitability edge. The expansion aligns with Beijing's push to internationalise the yuan and extend overseas banking influence. Editor Silvia Pavoni cited scale and resilience amid global uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/China%20now%20has%207%20of%20world%E2%80%99s%2010%20biggest%20banks%20as%20Beijing%E2%80%99s%20financial%20ambitions%20grow.pdf"}, {"id": "scmp-08", "title": "China's Xi Jinping calls for innovation system overhaul to beat global tech rivals", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "President Xi Jinping called for stronger efforts to attract overseas talent and fix flaws in China's innovation ecosystem as tech rivalry intensifies. Presenting the State Pre-eminent Science and Technology Award to lithium-battery pioneer Chen Liquan and military radar expert Ben De, each receiving 5 million yuan, Xi called 2026-2030 a critical phase for building a tech powerhouse. He admitted China suffers \"insufficient original innovation capability,\" an irrational talent structure and low investment efficiency. Xi urged focus on AI, quantum technology, life sciences, integrated circuits and advanced manufacturing, plus deep sea, space and Earth research. He targeted the low commercialisation rate, called for a national technology transfer system, and stressed clear ethical standards for AI and life sciences alongside national security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/China%E2%80%99s%20Xi%20Jinping%20calls%20for%20innovation%20system%20overhaul%20to%20beat%20global%20tech%20rivals.pdf"}, {"id": "scmp-09", "title": "Chinese city 'sold' same plot of land 18 times to inflate fiscal revenue: watchdog", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "China's top anti-corruption watchdog, the CCDI, said Nanning, capital of Guangxi, falsified land deals to inflate fiscal revenue, \"selling\" one plot 18 times without it ever changing hands. The tactic artificially boosted the city's revenue by 2.83 billion yuan (US$416.2 million) in 2024. Nanning had earlier transferred 15 parcels free to state-owned firms, then fabricated contracts converting them into sales worth up to 500 million yuan each. The city's land-sales revenue had tumbled to about 13.2 billion yuan, roughly a fifth of 2020's, yet officials still targeted 17.7 per cent growth. The National Audit Office found 21 provinces and cities inflated revenue by over 59.6 billion yuan. Analysts blamed promotion-driven incentives and provincial budget shortfalls near 5 trillion yuan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Chinese%20city%20%E2%80%98sold%E2%80%99%20same%20plot%20of%20land%2018%20times%20to%20inflate%20fiscal%20revenue%20watchdog.pdf"}, {"id": "scmp-10", "title": "Chinese profit-taking triggers record gold ETF outflows amid shift to equities", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets"], "summary": "Chinese investors pulled a record US$2.91 billion from domestic gold ETFs in June, taking profits as a stock-market surge and strong yuan dimmed the safe-haven metal's appeal, the World Gold Council said. Mainland funds were Asia's biggest drag, with Huaan Yifu Gold ETF losing about US$1.14 billion. Regional outflows hit US$2.3 billion, the worst month on record, though Asia still drew US$12 billion in the first half. North American funds saw US$7.67 billion in outflows, their weakest opening since 2013. Global gold trading averaged a record US$488 billion daily. Gold spot prices sit near US$4,130 an ounce, down about 5 per cent; MKS PAMP retained a US$4,500 forecast. Hong Kong launched gold clearing infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Chinese%20profit-taking%20triggers%20record%20gold%20ETF%20outflows%20amid%20shift%20to%20equities.pdf"}, {"id": "scmp-11", "title": "Goldman Sachs forecasts 50% jump for battery giant CATL's shares as energy storage takes off", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Goldman Sachs forecast a 50 per cent rise in CATL's shares to record highs over 12 months, expecting the battery giant's energy storage system business to become its next value-creation engine amid rising demand for energy independence. Goldman set target prices of HK$946 for the Hong Kong stock and 566 yuan for Shenzhen shares, implying 51 and 57 per cent gains. Analysts cited a deepening moat over Chinese peers built on cost, technology leadership and ecosystem. China's fragmented energy-storage battery market is ripe for consolidation, with CATL's domestic share forecast to double to 40 per cent around 2030. The world's largest EV battery maker held a 30 per cent global storage-battery share last year, and benefits from rising EV output.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Goldman%20Sachs%20forecasts%2050%25%20jump%20for%20battery%20giant%20CATL%E2%80%99s%20shares%20as%20energy%20storage%20takes%20off.pdf"}, {"id": "scmp-12", "title": "How much does China invest abroad? US$174 billion keeps it world's No 3 FDI source", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "China was the world's third-largest source of foreign direct investment and fourth-largest destination last year, holding firm in UNCTAD's annual ranking as the US led both categories. Chinese firms invested US$174 billion overseas, behind Japan and the US's US$263 billion, down from second place in 2020. Outflows became more targeted toward greenfield projects, manufacturing, energy, infrastructure and critical raw materials, often along South-South corridors. China attracted US$105 billion inbound, trailing Singapore, Hong Kong and the US. It accounted for about a third of global greenfield investment in critical minerals like copper, lithium and rare earths, and drove clean-tech expansion in batteries and EVs. Five strategic sectors' greenfield share rose from 16 to 44 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/How%20much%20does%20China%20invest%20abroad%20US%24174%20billion%20keeps%20it%20world%E2%80%99s%20No%203%20FDI%20source.pdf"}, {"id": "scmp-13", "title": "Is China's biggest daily US soybean order confirmation of Xi-Trump summit pact?", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "China made its largest daily US soybean purchase since November, buying 472,000 tonnes, in a sign of improving trade ties as Beijing moves to fulfil commitments from Trump's summit with Xi Jinping. Analysts called it a \"positive signal\" of intent. Under a White House readout, China agreed to buy at least US$17 billion of US farm goods annually from 2026 to 2028, atop earlier soybean pledges of 12 million tonnes for 2025 and 25 million tonnes yearly thereafter. State trader Cofco booked additional cargoes. US soybeans face a 13 per cent Chinese tariff versus 3 per cent for Brazil, which supplies over 70 per cent of imports. Xi is expected to visit Washington in September.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Is%20China%E2%80%99s%20biggest%20daily%20US%20soybean%20order%20confirmation%20of%20Xi-Trump%20summit%20pact.pdf"}, {"id": "scmp-14", "title": "Nato summit delivers unity and billions in defence deals, Rutte says", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Nato Secretary General Mark Rutte said the Ankara summit showed \"a huge sense of unity\" and produced over US$50 billion in procurement deals toward the 5 per cent of GDP defence-spending target set for 2035. Investments span deep precision strike, air and missile defence, uncrewed systems and AI. Members pledged €70 billion in military support for Ukraine. Rutte defended Trump, crediting his pressure for \"transforming\" the alliance, even as Trump was \"not happy\" allies refused to back his Iran campaign or help reopen the Strait of Hormuz. The declaration insisted Iran \"must never have a nuclear weapon.\" Rutte backed Trump's Arctic concerns over Russia and China, touted deeper Indo-Pacific ties, and dubbed the effort \"Nato 3.0.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Nato%20summit%20delivers%20unity%20and%20billions%20in%20defence%20deals,%20Rutte%20says.pdf"}, {"id": "scmp-15", "title": "Physical AI 'space race': can Europe compete with China and the US in humanoid robotics?", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "At the inaugural Machina Summit in Paris, European executives said they are fighting for a foothold in physical AI as China and the US lead humanoid robotics, warning of further deindustrialisation if Europe fails. Schaeffler's David Kehr urged Europe to lead on safety standards without over-regulating, and flagged faster training as a key hurdle. Most presenting firms were American, while Chinese players Unitree and AgiBot had a strong presence. BCG France's Olivier Scalabre warned up to 40 per cent of European industrial output is at risk. A core bottleneck is training data: Lightwheel's Steve Xie said physical AI needs 1,000 times more data than a self-driving model, making simulation the \"only scalable path.\" Apptronik's Jeff Cardenas called robots \"the space race of our time.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Physical%20AI%20%E2%80%98space%20race%E2%80%99%20can%20Europe%20compete%20with%20China%20and%20the%20US%20in%20humanoid%20robotics.pdf"}, {"id": "scmp-16", "title": "Spain plays down Trump's trade embargo threat, saying there is 'no tension'", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Spain played down President Trump's threat to halt all trade with the country over its defence policy, insisting relations remained \"positive\" with \"no tension.\" Trump called Spain a \"wasted cause\" and \"hopeless, bad people\" before a Nato meeting in Ankara, the second such threat since March, angered by Madrid's opposition to the 5 per cent GDP spending target and its lack of support for the US-Israel war on Iran. Prime Minister Pedro Sanchez said he had an informal chat with Trump, even discussing the World Cup. Madrid noted trade must go through the EU, and Brussels vowed to protect member states. Analyst Miguel Otero-Iglesias called it an empty threat; US trade is just 4.4 per cent of Spain's GDP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Spain%20plays%20down%20Trump%E2%80%99s%20trade%20embargo%20threat,%20saying%20there%20is%20%E2%80%98no%20tension%E2%80%99.pdf"}, {"id": "scmp-17", "title": "Trump switches back to old Air Force One, raising questions about Qatari jet", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Politics", "Defence"], "summary": "President Trump unexpectedly left Turkey aboard an older Air Force One rather than the newly renovated Qatari-donated jet that brought him to the Nato summit, later boarding the new plane in Britain. The switch followed months of scrutiny over the luxury gift, a Boeing 747 refitted by L3Harris as a temporary replacement amid Boeing's delays. Asked if an assassination threat prompted the move, Trump did not answer directly but said, \"I'm number one on the kill list for Iran.\" Democratic lawmakers estimated the conversion cost over US$1 billion and raised security concerns. Boeing's US$3.9 billion contract for two purpose-built jets is four years late, with delivery not expected until mid-2028 and costs exceeding US$5 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20SCMP/Trump%20switches%20back%20to%20old%20Air%20Force%20One,%20raising%20questions%20about%20Qatari%20jet.pdf"}, {"id": "scmp-18", "title": "Trump's tariff war pushes Brazil's trade towards China as US share hits record low", "source": "SCMP", "date": "9 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "The US share of Brazilian exports fell to 9.4 per cent in the first half of 2026, its lowest since 1997, while China widened its lead to 31.5 per cent, according to the American Chamber of Commerce for Brazil. Brazilian exports to the US dropped 13 per cent to US$17.4 billion; shipments to China jumped 21.9 per cent. China now ranks as top partner for 14 Brazilian states, reversing the map from two decades ago. The report landed as the USTR weighed an additional 25 per cent tariff, a year after Trump's 50 per cent levy. Senator Flavio Bolsonaro testified against tariffs while accusing President Lula of licking \"China's boots.\" Coca-Cola, Tesla and eBay filed against the levies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Docum
