 over $80 million from media settlements and millions from licensing his name overseas. Reuters estimates the Trump family has generated at least $2.3 billion in profit since he retook the presidency. Trump also earned from branded bibles, trainers and watches, and from overseas property deals in the UAE, Saudi Arabia, Romania and Qatar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Trump%20reports%20more%20than%20US%241.4%20billion%20in%20income%20from%20crypto%20ventures.pdf"}, {"id": "scmp-17", "title": "US State Department green lights possible sale of Hellfire missiles to Singapore", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Defence", "Southeast Asia", "Geopolitics"], "summary": "The US State Department has backed a potential US$22.3 million sale of AGM-114R Hellfire missiles to Singapore, a deal it said would strengthen the city state's defences as a key US strategic partner in Asia. The department said the sale would include 67 precision-guided, air-to-ground missiles plus spare parts and support, with Lockheed Martin as principal contractor. It said the sale would not alter the region's basic military balance. It is the latest in a string of US arms sales to Singapore this year, amid what Washington describes as China's accelerating military build-up. In January the US approved a US$2.3 billion P-8A aircraft sale, and in April an US$83.14 million rocket system deal. Singapore, which counts China as its largest trading partner, says it will not take sides.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/US%20State%20Department%20green%20lights%20possible%20sale%20of%20Hellfire%20missiles%20to%20Singapore.pdf"}, {"id": "scmp-18", "title": "US must innovate faster to counter China's tech rise, lawmakers told", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI", "Politics", "Geopolitics"], "summary": "A US congressional hearing on Tuesday urged the United States to innovate faster, smarter and better to counter China's growing technological muscle, even as several lawmakers slammed the Trump administration for policies they said undercut national interests. Testimony before the House Committee on Energy and Commerce came as the two giants increasingly face off over standards, economic models and supply chains, despite last month's Trump-Xi summit. Democrat Kathy Castor said China has overtaken the US in total R&D spending while the administration cancelled or froze more than 7,800 research grants, warning scientists are leaving. Witnesses called for legislation on AI, robotics, quantum computing and semiconductors, but noted over 1,700 state AI bills risk creating a hodgepodge of inconsistent rules.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/US%20must%20innovate%20faster%20to%20counter%20China%E2%80%99s%20tech%20rise,%20lawmakers%20told.pdf"}, {"id": "scmp-19", "title": "US, China should de-escalate from tit-for-tat actions, US lawmaker says", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Geopolitics", "Trade", "Politics"], "summary": "US Senator Steve Daines has urged Washington and Beijing to avoid escalating tensions through tit-for-tat actions, citing China's recent export controls against American rare earth firms and the Pentagon's blacklisting of Chinese tech companies as \"unfortunate developments.\" Weeks after the Trump-Xi summit in Beijing agreed to ease tensions, both sides resumed retaliatory actions. Last week China targeted MP Materials, USA Rare Earths and eight other firms with export controls and barred 46 US firms from procurement, responding to the Pentagon designating Chinese firms including Alibaba, Baidu and BYD as military-linked. Alibaba, which owns the SCMP, sued the Defence Department. Congressman Ro Khanna called Beijing's actions \"wrong.\" Congress is advancing the SECURE Minerals Act to counter China's critical minerals dominance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/US,%20China%20should%20de-escalate%20from%20tit-for-tat%20actions,%20US%20lawmaker%20says.pdf"}]}, "2026-07-02": {"date": "2026-07-02", "dayOfWeek": "Thursday", "totalArticles": 66, "sourceCounts": {"WSJ": 19, "ST": 12, "BT": 12, "SCMP": 23}, "executiveDigest": "Wall Street closes its best quarter in six years - the S&P 500 up 15% and Nasdaq 21% - and mints 1,200 US millionaires a day, even as the BIS and a UN panel warn the AI boom risks a bust and is outpacing governance; US-Iran talks in Doha show tentative progress, the yen hits a 40-year low, and Singapore firms reel from record energy tariffs as a new Digital Infrastructure Bill threatens data-centre fines.", "briefingCards": [{"title": "Lead story - Wall Street's best quarter since 2020", "body": "US stocks logged their strongest quarter in six years despite the largest oil shock in history: the S&P 500 rose 15%, the Nasdaq 21% and the Dow 13%, led by chips - Micron surged 242%, AMD 186% and the PHLX Semiconductor index 88% to a record. The boom minted more than 440,000 new US millionaires last year (over 1,200 a day, per UBS), lifting the global total near a record one million. But strategists flag stretched valuations, Strait of Hormuz uncertainty and Fed chair Kevin Warsh's inflation concern, with the core PCE gauge at 4.1%; gold fell 13% to $4,023 and silver dropped 20%."}, {"title": "Markets & finance", "body": "Beneath the euphoria, warning lights flashed. The BIS cautioned that AI overinvestment could trigger a bust once returns disappoint, amplified by US households' record stock exposure. The yen slid to a 40-year low past 162 per dollar - Tokyo has burned over $70 billion defending it and warned of 'decisive steps' coordinated with US Treasury's Scott Bessent. Jamie Dimon wants JPMorgan to invest more in defence, MicroStrategy's Strategy abandoned its 'never sell bitcoin' mantra to outlast a crypto winter, and UBS noted financial-market gains drove 79% of US wealth even as median US wealth fell nearly 20% over five years."}, {"title": "Asia realignment", "body": "China enacted a landmark overseas-investment law asserting control over offshore technology transfers - barring unauthorised know-how leaving via staff reassignments or remote work - as outbound investment hit US$63.4 billion early in 2026. The US confirmed it will not renew USMCA in its current form, with trade chief Jamieson Greer blaming Canada's courting of Chinese capital and leaving Ottawa off the next talks. Alibaba agreed to pay US$600 million to settle a US probe into illegal-product sales, and as the Communist Party marked its 105th year, Xi Jinping touted its growing global influence."}, {"title": "Energy & climate", "body": "US-Iran indirect talks in Doha showed tentative progress - Trump said denuclearisation is 'moving along well' - though a dispute over Iran charging Strait of Hormuz transit fees persists, and a ship ran aground in the strait after ignoring Iran's approved route. Trump was briefed on all-out war options but chose to stick with diplomacy, even as the Hormuz reopening dispute drove a wedge into US-Saudi ties. DBS called energy 'the chokepoint' for AI's next phase, urging investors into power infrastructure amid ~US$1 trillion in annual AI capex; Spain recorded over 1,000 heat-related deaths in June."}, {"title": "Technology & AI", "body": "Anthropic struck a deal with the Trump administration to restore access to its Fable model after an unprecedented two-and-a-half-week shutdown, adding a safeguard that defeats the evasion technique about 99% of the time. But a UN-backed panel of 40 experts warned AI is advancing faster than governance can manage - up to 84% of attacks on coding agents succeeded - echoing the BIS's bust warning. China's Kuaishou-backed Kling AI neared a US$3 billion round at an US$18 billion valuation, while OCBC launched AI avatars 'Wendy' and 'Wayne' and said it will hire 600 more relationship managers."}, {"title": "Singapore & SEA focus", "body": "Singapore businesses said they are 'stressed' as the July 1 tariff hike pushed the overall electricity tariff up 17.5% - one cake shop's bill jumped from about $1,900 to $3,200 in two months, prompting service-charge increases. A proposed Digital Infrastructure Bill would fine data-centre and cloud operators up to $1 million, or 10% of local turnover, for resiliency and reporting lapses. HDB resale prices dipped 0.3% for a second straight quarter as private-home growth slowed to 0.5%. Frasers Centrepoint Trust is selling Pasir Ris's White Sands mall for S$467 million, and UOB broke ground on a US$450 million Ho Chi Minh City tower."}], "keyMetrics": [{"value": "66", "label": "Articles curated today", "sub": "WSJ 19 · ST 12 · BT 12 · SCMP 23"}, {"value": "+15%", "label": "S&P 500 in Q2", "sub": "Best quarter since 2020; Nasdaq +21%"}, {"value": "1,200/day", "label": "New US millionaires", "sub": "SG millionaires up to 244,000"}, {"value": "162", "label": "Yen per US dollar", "sub": "40-year low; intervention watch"}, {"value": "+17.5%", "label": "SG power tariff", "sub": "Businesses 'stressed' by record highs"}, {"value": "US$600m", "label": "Alibaba US settlement", "sub": "Illegal-product-sales probe"}], "articles": [{"id": "wsj-01", "title": "A Dispute Over Opening Hormuz Drives a Wedge Into U.S.-Saudi Relations", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "More than 100 U.S. military aircraft were mobilizing this past spring to reopen the Strait of Hormuz when Saudi Arabia refused use of its bases and airspace. An incensed White House threatened to withhold interceptors Riyadh needs against Iranian missiles; Saudi Arabia backed down, but officials said the damage lingers. The U.S. now weighs reducing its footprint in the kingdom. Secretary of State Marco Rubio toured the Gulf but skipped Riyadh, read by Saudis as a snub. Crown Prince Mohammed bin Salman spurned a G-7 invitation in France, protesting U.S. war handling. The previously unreported threats mark the biggest rift in years in a relationship anchoring Gulf security since 1945.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/A%20Dispute%20Over%20Opening%20Hormuz%20Drives%20a%20Wedge%20Into%20U.S.-Saudi%20Relations.pdf"}, {"id": "wsj-02", "title": "A Theoretical AI Bust, South Korea Chips In and Memory Profits Soar", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The Bank for International Settlements' latest annual report warns that overinvestment in AI infrastructure could trigger a bust once returns fail to match outlays, prompting pullbacks in financing and stock prices. The BIS links a possible AI bust to unusually vulnerable consumers, governments and the global economy. U.S. households are far more exposed to stocks than in past decades, and U.S.-listed firms carry extraordinary weight in global indexes, threatening broad wealth erosion. Weak-balance-sheet construction contractors could suffer fast, debt could compound damage, and stretched government budgets limit fiscal responses. The BIS was prescient in March 2006 with a paper on subprime securitization risks, lending weight to the warning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/A%20Theoretical%20AI%20Bust,%20South%20Korea%20Chips%20In%20and%20Memory%20Profits%20Soar.pdf"}, {"id": "wsj-03", "title": "Amazon Sued by Australian Watchdog Over Streaming Contracts", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Australia's Competition and Consumer Commission on Tuesday sued Amazon in the Federal Court, alleging its local Prime contracts contained five unfair terms letting it unilaterally worsen service without offering anything in return. The ACCC said Amazon relied on those terms, breaching consumer law, to introduce advertising to more than 850,000 local streaming customers. Amazon added ads to its Australian service in July 2024, telling subscribers to pay extra to stay ad-free after they had already paid A$79 (US$54.40) annually. The action covers over a million contracts between November 2023 and August 2025. The ACCC seeks penalties, costs and customer redress; breaches can draw A$50 million-plus fines each.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Amazon%20Sued%20by%20Australian%20Watchdog%20Over%20Streaming%20Contracts.pdf"}, {"id": "wsj-04", "title": "Anthropic Reaches Deal With Trump Administration to Restore Access to Fable AI Model", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "Anthropic and the Trump administration reached a deal to restore access to Fable, a public version of Anthropic's powerful Mythos model capable of carrying out cyberattacks. Announced Tuesday, the pact has Anthropic fixing workarounds Amazon researchers used to evade Fable's safeguards, Commerce Secretary Howard Lutnick said on X. A new safeguard makes the described evasion technique fail about 99% of the time. Access resumes Wednesday after an unprecedented 2 1/2-week shutdown. Concerns prompted the administration to ban all foreign use of the tools in mid-June. The episode marks the first major instance of the government forcing a leading U.S. AI company to take down a model.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Anthropic%20Reaches%20Deal%20With%20Trump%20Administration%20to%20Restore%20Access%20to%20Fable%20AI%20Model.pdf"}, {"id": "wsj-05", "title": "He Dared to Buy Senior Housing at Its Lows. Now He Runs a $160 Billion Empire.", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Welltower CEO Shankh Mitra made one of commercial real estate's boldest bets in 2020, spending over $40 billion across six years to buy tens of thousands of senior-housing units as rivals retreated during the pandemic. Welltower now owns more than 2,500 senior-living communities and its market value has risen nearly sevenfold to about $160 billion, the world's largest publicly traded real-estate company. Mitra received an $821 million pay package last year, the biggest for any U.S. public-company CEO save Elon Musk, sparking backlash. ISS urged a vote against it. Occupancy rebounded to 89.9% in the first quarter from a pandemic low of 78.2%, aiding the turnaround.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/He%20Dared%20to%20Buy%20Senior%20Housing%20at%20Its%20Lows.%20Now%20He%20Runs%20a%20%24160%20Billion%20Empire..pdf"}, {"id": "wsj-06", "title": "Honey, I Shrank the Cash Flow", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets"], "summary": "Free cash flow yield ETFs from firms such as Pacer ETFs and Victory Capital have drawn tens of billions of dollars, a bright spot as old-school value investing falters. The funds focus on cash companies generate beyond investment needs, an approach favored by Warren Buffett, Charlie Munger and Joel Greenblatt. But a flaw is failing to adjust for noncash share-based compensation, which still costs shareholders. Atlassian's 3.4% yield fell to near zero after subtracting share awards; Uber's 5.6% dropped a full point; Amazon and Snowflake turned negative. Meb Faber calls omitting it \"totally insane,\" while Victory's Mannik Dhillon says backtests show no performance difference. Simple formulas can be too simple.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Honey,%20I%20Shrank%20the%20Cash%20Flow.pdf"}, {"id": "wsj-07", "title": "How Western Automakers Are Losing Their Grip on the Chinese Market", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Trade", "Technology & AI"], "summary": "Western carmakers are steadily losing their grip on China, the world's biggest auto market. Volkswagen, the largest Western automaker there, saw brand market share fall to 9.7% in 2025 from 14.7% in 2015, per AlixPartners, and now eyes tens of thousands of global job cuts; its Chinese profit is projected to sink to $228 million-$684 million from $5 billion. American brands' share fell to 5% last year from 12% in 2014. Chinese cars, offering more features and better technology, make up two-thirds of new sales and dominate EVs. Firms like XPeng, Li Auto and BYD refresh models every three years versus Ford's five. AlixPartners sees Chinese brands hitting 16% of European sales by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/How%20Western%20Automakers%20Are%20Losing%20Their%20Grip%20on%20the%20Chinese%20Market.pdf"}, {"id": "wsj-08", "title": "Iran's Diverging Priorities Are Jeopardizing U.S. Peace Talks", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "A power struggle inside Tehran is threatening U.S.-Iran peace talks. Civilian leaders under President Masoud Pezeshkian seek billions in frozen assets to ease war fallout, while the hardline Islamic Revolutionary Guard Corps presses for sole control of the Strait of Hormuz and a lucrative toll regime it says could generate $40 billion a year. The IRGC has warned mediators it would close the passage again without guarantees. Trump envoys Steve Witkoff and Jared Kushner met mediators in Doha Tuesday; indirect talks this week cover releasing $6 billion of the $12 billion held in Qatar. The divide suggests issues from the June 17 preliminary deal remain unresolved, with nuclear questions far off.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Iran%E2%80%99s%20Diverging%20Priorities%20Are%20Jeopardizing%20U.S.%20Peace%20Talks.pdf"}, {"id": "wsj-09", "title": "Jamie Dimon Wants JPMorgan to Invest More in Defense Companies", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Defence"], "summary": "JPMorgan CEO Jamie Dimon is pushing the biggest U.S. bank to invest its own capital directly into defense and national-security firms, a riskier but potentially more profitable strategy crystallized after a fall tour of an L3Harris missile factory in Huntsville, Alabama. The bank will deploy $10 billion into companies deemed critical to national security, and Dimon wants to eventually allocate $20 billion or more. JPMorgan also targets $1.5 trillion in traditional financing for such industries through 2035. It hired Berkshire Hathaway's Todd Combs to run the fund, which has invested in an Idaho gold mine and AI drone maker Shield AI. The move echoes Gilded Age merchant banking and aligns with Trump's defense aims.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Jamie%20Dimon%20Wants%20JPMorgan%20to%20Invest%20More%20in%20Defense%20Companies.pdf"}, {"id": "wsj-10", "title": "Japanese Yen Falls to 40-Year Low, Pleasing Tourists but Worrying Tokyo", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The Japanese yen touched a 40-year low against the dollar Tuesday, with a dollar buying a little more than 162 yen, its weakest since 1986. The yen is down about 3.5% this year and over 11% in three years, delighting foreign tourists but straining Japanese households. Tokyo has already burned through more than $70 billion of reserves to prop up the currency, and Finance Minister Satsuki Katayama warned of \"decisive steps\" agreed with U.S. Treasury Secretary Scott Bessent. Pressures include anxiety over PM Sanae Takaichi's fiscal plans, a slow Bank of Japan, and a dollar lifted by the Iran war and hawkish Fed Chairman Kevin Warsh. Levels past 160 raise intervention expectations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Japanese%20Yen%20Falls%20to%2040-Year%20Low,%20Pleasing%20Tourists%20but%20Worrying%20Tokyo.pdf"}, {"id": "wsj-11", "title": "Microsoft's Irish Hub Is Profit Powerhouse", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Microsoft's Ireland hub generates over $7 million in pretax profit per employee, 13 times its worldwide average, according to new required EU disclosures showing earnings concentrated in the low-tax jurisdiction. Microsoft booked 38.1% of its pretax profit in Ireland in the year ended June 30, 2025, and paid Ireland $5.6 billion in cash taxes, 19.5% of its global total. It employed 6,654 people there while reporting $47 billion in pretax profits, versus $661 million on 3,471 employees in Germany. Under new EU rules, large firms must publish revenues, profits and taxes by jurisdiction. Microsoft, which reported an 18% global effective tax rate, said it complies with tax laws. Sysco and P&G are in the early batch.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Microsoft%E2%80%99s%20Irish%20Hub%20Is%20Profit%20Powerhouse.pdf"}, {"id": "wsj-12", "title": "Putin Faces a Political Crisis as Fuel Shortages Ripple Through Russia", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Fuel shortages across Russia have created a political challenge for President Vladimir Putin as a relentless Ukrainian drone campaign against oil refineries brings the war home. Some 28% of Russia's refining capacity was offline as of June 20, estimated former Gazprom Neft strategist Sergey Vakulenko. For the first time in decades Russia plans to import fuel, Kremlin spokesman Dmitry Peskov said Tuesday. Moscow has banned gasoline and jet-fuel exports; Putin is weighing a diesel-export ban. Moscow gas stations have closed with hourslong waits; Siberian regions saw overnight lines and portable toilets. Improvised rationing evokes Soviet-era privations ahead of September parliamentary elections. Putin showed no intention of seeking a ceasefire.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Putin%20Faces%20a%20Political%20Crisis%20as%20Fuel%20Shortages%20Ripple%20Through%20Russia.pdf"}, {"id": "wsj-13", "title": "Strategy Abandons 'Never Sell Bitcoin' Mantra in Bid to Outlast Crypto Winter", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Michael Saylor's Strategy unveiled a turnaround plan Monday that abandons his \"Never sell your Bitcoin\" mantra as crypto winter bites. The firm authorized buying back up to $1 billion each of its preferred and Class A common shares and launched a $1.25 billion \"monetization program\" to raise capital via bitcoin sales. Bitcoin, which topped $126,000 in early October, recently broke below $60,000, and Strategy's mNAV dipped below 1 on Friday, freezing its ability to issue shares. Common shares are down more than 80% since November 2024. Strategy raised its preferred dividend to 12% and faces a $1.8 billion annual dividend obligation that dwarfs its software revenue, forcing hard choices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Strategy%20Abandons%20%E2%80%98Never%20Sell%20Bitcoin%E2%80%99%20Mantra%20in%20Bid%20to%20Outlast%20Crypto%20Winter.pdf"}, {"id": "wsj-14", "title": "The U.S. Added 1,200 New Millionaires a Day Last Year", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Over 440,000 people, more than 1,200 a day, became millionaires in the U.S. in 2025, nearly half the world's new millionaires, according to an annual UBS global wealth report published Tuesday. More than 23.6 million Americans are now worth seven figures or more, and the number of millionaires globally reached record levels in every market UBS tracks. The fastest-growing segment, rising 7.3% over five years, held $50 million to $100 million. U.S. gains came largely from surging financial markets, which made up 79% of gross wealth. Progress was uneven: average U.S. adult wealth climbed almost 10% net of inflation from 2020-2025, while median wealth fell nearly 20%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/The%20U.S.%20Added%201,200%20New%20Millionaires%20a%20Day%20Last%20Year.pdf"}, {"id": "wsj-15", "title": "Trump Briefed on All-Out War Options in Iran but Opts to Stick With Talks", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "President Trump has weighed a return to all-out war with Iran, holding multiple recent conversations with Defense Secretary Pete Hegseth and Joint Chiefs Chairman Gen. Dan Caine about more strikes, but decided to stick with diplomacy for now, U.S. officials said. Trump believes fresh full-scale attacks, described by some as \"finishing the job,\" could derail talks and hurt chances of dismantling Iran's nuclear program. He is fine with negotiations passing an Aug. 18 deadline. Envoys Steve Witkoff and Jared Kushner arrived in Doha Tuesday for indirect talks. A key dispute is Iran charging billions in Strait of Hormuz transit fees. The U.S. set up a crisis line between the IRGC and Central Command.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Trump%20Briefed%20on%20All-Out%20War%20Options%20in%20Iran%20but%20Opts%20to%20Stick%20With%20Talks.pdf"}, {"id": "wsj-16", "title": "U.S. Consumer Sentiment Climbed in June, Conference Board Says", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "U.S. consumer confidence ticked up in June as moderating oil prices eased pressure on households, The Conference Board said Tuesday. Its index rose to 91.2 from a downwardly revised 90.6 in May, below the 94.2 economists expected. Consumers' assessment of current business and labor conditions fell three points to 116.4, while the expectations index rose three points to 74.4. The labor-market differential fell 2.6 points to 2.4%, and the share saying jobs are \"hard to get\" rose to 22.5%, a 5 1/2-year high. Moderating gasoline prices and the U.S.-Iran ceasefire are lifting sentiment. The June employment report lands Thursday, with economists expecting 115,000 jobs added.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/U.S.%20Consumer%20Sentiment%20Climbed%20in%20June,%20Conference%20Board%20Says.pdf"}, {"id": "wsj-17", "title": "U.S. Home Price Growth Edged Up in April", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "U.S. home price growth ticked upward in April even as affordability pressures weighed on buyers. The S&P Cotality Case-Shiller National Home Price Index rose 0.8% in the 12 months through April. For the eleventh consecutive month home values fell in real terms, as April's 3.8% inflation ran roughly 3 percentage points above the 0.8% nominal gain. \"Home price growth remains constrained,\" said Nicholas Godec of S&P Dow Jones Indices, with housing treading water nominally and falling in real terms. Midwest and Northeast markets led moderate growth. Chicago was strongest at a 6.5% annual gain, followed by New York and Cleveland, while Seattle's 2.3% drop was steepest.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/U.S.%20Home%20Price%20Growth%20Edged%20Up%20in%20April.pdf"}, {"id": "wsj-18", "title": "Vance Earned Up to $7.4 Million Last Year, Mostly From Book Royalties", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Politics"], "summary": "Vice President JD Vance made as much as $7.4 million last year from book royalties, investments and his venture-capital firm, according to his latest financial disclosure released Tuesday. Most came from his 2016 bestselling memoir \"Hillbilly Elegy,\" earning between $1 million and $5 million in royalties. His 17-page report contrasts with President Trump's 927 pages; Trump made more than $1 billion on cryptocurrency deals alone. Vance reported $250,000-$500,000 in bitcoin, up to $50,000 in D.C. rental income, and spent as much as $2.6 million on ETFs. He took a promissory note from Narya Capital worth up to $1 million and sold a stake tied to Steve Case. VPs earn $235,100; Vance's rises to $292,300 this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Vance%20Earned%20Up%20to%20%247.4%20Million%20Last%20Year,%20Mostly%20From%20Book%20Royalties.pdf"}, {"id": "wsj-19", "title": "Wall Street's Best Quarter in Six Years Will Be a Hard Act to Follow", "source": "WSJ", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "U.S. stocks logged their best quarter in years despite the largest oil shock in history, AI-longevity worries and prospects of higher rates. The S&P 500 and Nasdaq rose 15% and 21% in the second quarter, their best since 2020, while the Dow gained 13%, its best since 2022. Chip stocks led: Micron surged 242%, AMD jumped 186%, and the PHLX Semiconductor index climbed 88% to a record. Stifel's Thomas Carroll raised his S&P 500 target to 7800. Risks include stretched valuations, uncertainty over the Strait of Hormuz, and new Fed Chairman Kevin Warsh signaling inflation concern, with the Fed's preferred gauge at 4.1%. Gold fell 13% to $4,022.90; silver dropped 20%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20WSJ/Wall%20Street%E2%80%99s%20Best%20Quarter%20in%20Six%20Years%20Will%20Be%20a%20Hard%20Act%20to%20Follow.pdf"}, {"id": "st-01", "title": "'Stressed': Singapore businesses rattled by higher electricity and gas prices", "source": "ST", "date": "2 Jul 2026", "tags": ["Energy", "Finance & Markets", "Society"], "summary": "Singapore businesses are reeling as energy costs drive electricity and town gas tariffs to record highs from July 1. Household electricity prices rose 4.64 cents to 31.91 cents per kWh before GST, while the overall tariff including non-households jumped 17.5 per cent. Town gas for homes climbed to 23.48 cents per kWh. Kok Sen owner Jacky Wong, \"stressed\" by rising costs, raised his service charge from 3 to 5 per cent. The Patissier cake shop saw its electricity bill spike from about $1,900 in March to $3,200 in May on wholesale rates. Spot prices surged as the Middle East conflict disrupted liquefied natural gas supply used to generate electricity locally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/'Stressed'%20Singapore%20businesses%20rattled%20by%20higher%20electricity%20and%20gas%20prices.pdf"}, {"id": "st-02", "title": "Communist Party of China marks 105 years", "source": "ST", "date": "2 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "President Xi Jinping urged the Communist Party of China to persevere with \"full and rigorous self-governance\" in a July 1 speech marking the party's 105th founding anniversary, amid rising unpredictable factors in the country's development. Speaking for 40 minutes at the Great Hall of the People, Xi awarded medals to eight members and stressed a \"decisive, sustained and comprehensive battle against corruption.\" Founded in 1921, the CPC has over 101 million members, second only to India's BJP. The disciplinary body punished a record 983,000 people in 2025, up 10.6 per cent. The anti-corruption drive has hit the military hard, reducing the high command from seven members to two.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Communist%20Party%20of%20China%20marks%20105%20years.pdf"}, {"id": "st-03", "title": "Digital Infrastructure Bill: Fines up to $1m for data centres, cloud providers", "source": "ST", "date": "2 Jul 2026", "tags": ["Technology & AI", "Politics", "Southeast Asia"], "summary": "Major data centre and cloud operators in Singapore could face fines up to $1 million, or 10 per cent of annual local turnover, for failing to meet cybersecurity, business continuity and incident reporting rules under the proposed Digital Infrastructure Bill. Released for public consultation on July 1 by MDDI and IMDA, the Bill introduces a licensing regime holding operators to higher resiliency standards as they underpin banking, ride-hailing and e-commerce. First mooted in March 2024 after service outages, it follows a 2023 data centre cooling fault that blocked 2.5 million bank transactions. Foundational digital infrastructure covers data centres needing 10MW of power and cloud services earning over $100 million annually.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Digital%20Infrastructure%20Bill%20Fines%20up%20to%201m%20for%20data%20centres,%20cloud%20providers.pdf"}, {"id": "st-04", "title": "HDB resale prices dip, private home prices rise slower", "source": "ST", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society", "Southeast Asia"], "summary": "Singapore HDB resale prices fell 0.3 per cent in the second quarter of 2026, a second consecutive decline, with 6,268 transactions, down 10.2 per cent year-on-year. Private home prices rose 0.5 per cent, slowing from 0.9 per cent previously, with non-landed prices dipping 0.1 per cent overall. Core central region prices climbed 2 per cent while city fringe fell 1.4 per cent. Analysts attributed the resale softness to macroeconomic uncertainty and a strong Build-To-Order pipeline. Christine Sun of Realion said buyers pivoted to cheaper BTO or older resale units. Shorter BTO wait times helped redistribute demand, with a June exercise offering 2,520 flats in Sembawang and Ang Mo Kio.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/HDB%20resale%20prices%20dip,%20private%20home%20prices%20rise%20slower.pdf"}, {"id": "st-05", "title": "Is AI an exoskeleton for the mind?", "source": "ST", "date": "2 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "This commentary explores whether artificial intelligence acts as an \"exoskeleton for the mind,\" enhancing capabilities like physical exoskeletons aid mobility. Researchers studying Boston Consulting Group consultants found AI boosted performance but little knowledge was retained once removed. The author warns young people risk impaired cognitive development, citing a study of nearly 27,000 Chinese students where AI adoption raised homework scores but significantly lowered exam scores. He questions the argument that knowledge is now unnecessary, noting one cannot think critically about something unknown, and that rising demand for senior developers shows technical expertise remains valuable. He rejects banning AI in education outright, arguing for balanced use that preserves foundational learning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Is%20AI%20an%20exoskeleton%20for%20the%20mind.pdf"}, {"id": "st-06", "title": "Microsoft to cut under 2.5% of workforce, affecting thousands of jobs: Media report", "source": "ST", "date": "2 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Microsoft is planning to cut under 2.5 per cent of its workforce, affecting thousands of roles, in layoffs that could be announced as early as next week, Business Insider reported on June 30 citing sources. The cuts will hit sales, consulting and the Xbox gaming division. Microsoft had about 228,000 full-time employees as at June 30, 2025. US firms across technology, media and finance have continued trimming headcount while investing heavily in AI infrastructure. Xbox, which raised console prices citing a global components crisis, is planning major layoffs and possible spin-off or restructuring. In July 2025 Microsoft cut nearly 4 per cent of staff. Meta plans to cut 10 per cent and Amazon roughly 16,000 jobs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Microsoft%20to%20cut%20under%202.5%20of%20workforce,%20affecting%20thousands%20of%20jobs%20Media%20report.pdf"}, {"id": "st-07", "title": "OCBC rolls out AI avatars, to hire 600 more relationship managers amid wealth push", "source": "ST", "date": "2 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Southeast Asia"], "summary": "OCBC will progressively launch what it calls South-east Asia's first AI-native mobile banking app, OCBC WoW, featuring two virtual avatars, \"Wendy\" and \"Wayne,\" that engage customers around the clock with personalised wealth management insights via voice or text. To support its wealth push, the bank will hire 600 additional relationship managers over three years. Group CEO Tan Teck Long unveiled the app on July 1 as part of the \"next frontier\" strategy harnessing AI, digital technology and data. Some 50 premier private clients with minimum $1.5 million assets and selected employees will test the beta. The standalone app delivers portfolio analysis and personalised market news; retail expansion may follow after the beta.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/OCBC%20rolls%20out%20AI%20avatars,%20to%20hire%20600%20more%20relationship%20managers%20amid%20wealth%20push.pdf"}, {"id": "st-08", "title": "Russia approved secret China military training at top level, sources say", "source": "ST", "date": "2 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China's covert military training of Russian forces in 2025 was personally approved by Defence Minister Andrei Belousov and involved at least four Russian and Chinese generals, according to two European officials and documents seen by Reuters. A classified Russian document referenced an August 2025 decree sending a delegation to People's Liberation Army facilities. One three-week course in Beijing in November covered radiological, chemical and biological protection, with soldiers shown a model nuclear reactor. Officials said the exchanges' strategic nature alarmed Europe. China's Foreign Ministry called the allegations \"entirely unfounded,\" maintaining neutrality on Ukraine. Reuters earlier reported China trained around 200 Russian personnel, some of whom later joined the war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Russia%20approved%20secret%20China%20military%20training%20at%20top%20level,%20sources%20say.pdf"}, {"id": "st-09", "title": "Singapore millionaires rise to 244,000: UBS", "source": "ST", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Global personal wealth jumped more than 10 per cent in 2025, its fastest pace in years, driven by strong equity markets and rising real estate values, according to the UBS Global Wealth Report 2026. Singapore remained among the wealthiest economies, with average wealth per adult reaching US$527,217 (S$683,600), ranking sixth globally. The number of US-dollar millionaires here grew 2.2 per cent, or 5,240 people, to 244,000. Financial assets made up 63.8 per cent of gross wealth locally. Globally, new millionaires surged to a record near one million, with the US minting over 1,200 daily. Wealth rose fastest in Europe and the Middle East; Asia-Pacific grew 5.9 per cent, holding a third of global wealth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Singapore%20millionaires%20rise%20to%20244,000%20UBS.pdf"}, {"id": "st-10", "title": "Spain records more than 1,000 heat-related deaths in June", "source": "ST", "date": "2 Jul 2026", "tags": ["Environment", "Society"], "summary": "More than 1,000 deaths in Spain were attributed to the recent heatwave that roasted Europe, as the country posted its hottest first six months on record, officials said on July 1. At least 1,028 people died of heat-related issues, the Carlos III Health Institute said, more than double the 407 deaths in June 2025. The first half of 2026 ran 1.6 deg C above normal, while June was the second-hottest on record at 3.2 deg C above the norm, weather agency Aemet said. The World Weather Attribution group called the late-June heatwave the most severe recorded in Europe and \"virtually impossible\" without climate change. All-time records fell in Germany, Poland, the Czech Republic, Slovakia, Hungary and France.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Spain%20records%20more%20than%201,000%20heat-related%20deaths%20in%20June.pdf"}, {"id": "st-11", "title": "Taiwan ships should ignore boarding requests by China Coast Guard, says Taipei", "source": "ST", "date": "2 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Taiwanese ships off the island's east coast should ignore any boarding and inspection demands by China's coast guard, and Taiwanese vessels will intervene if necessary, a senior official said on July 1. China, which claims Taiwan, sent coast guard ships in June for what it called a \"special maritime traffic law-enforcement operation,\" angering Taipei. Deputy coast guard head Hsieh Ching-chin told Parliament ships should notify authorities and not respond to boarding inspections, adding \"in our waters, China has no jurisdiction.\" China said the move responded to Japan-Philippines maritime boundary talks. Taipei said the patrols \"harassed\" commercial shipping and reflect Beijing's shift toward quasi-civilian \"grey zone\" tactics, drawing concern from the US, Britain, France and Germany.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/Taiwan%20ships%20should%20ignore%20boarding%20requests%20by%20China%20Coast%20Guard,%20says%20Taipei.pdf"}, {"id": "st-12", "title": "US and Iran enter technical talks to secure peace deal, restart shipping", "source": "ST", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "The US and Iran held technical talks in Doha on July 1, seeking to agree on shipping through the Strait of Hormuz and secure a lasting ceasefire, sources said. Jared Kushner and envoy Steve Witkoff met Qatar's Prime Minister, a mediator alongside Pakistan, to lay groundwork but did not attend the sessions. President Donald Trump said the US was \"getting along very well\" with Iran and that denuclearisation was \"moving along well.\" The talks build on a 14-point interim accord signed in June to halt the war that began with US-Israeli strikes in February. Iran seeks recognition of its control over the strait, fees on ships, and release of US$6 billion in frozen assets. Traffic has partially resumed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20ST/US%20and%20Iran%20enter%20technical%20talks%20to%20secure%20peace%20deal,%20restart%20shipping.pdf"}, {"id": "bt-01", "title": "AI development may be progressing too fast to manage risks effectively: UN experts", "source": "BT", "date": "2 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "A UN-backed scientific panel of 40 experts warned that AI capabilities are advancing faster than the ability to govern them, in a preliminary report published on Jul 1 ahead of a comprehensive 2027 assessment. Existing governance is fragmented and confined to corporate spheres, it said, creating an \"evidence dilemma\" for policymakers. Agentic systems escalate risks: as much as 84 per cent of documented attacks on widely deployed coding agents succeeded. Safety testing is undermined by models memorising test solutions or deceiving testers. The panel flagged distributional concerns, noting gaps between Global North and South and warning AI risks widening inequality. Secretary-General Antonio Guterres said \"the cost of waiting is rising.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/AI%20development%20may%20be%20progressing%20too%20fast%20to%20manage%20risks%20effectively%20UN%20experts.pdf"}, {"id": "bt-02", "title": "Asian airlines' Europe windfall fades as Gulf rivals rebound", "source": "BT", "date": "2 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Asian carriers that gained passengers and charged higher fares on European routes after the Iran conflict are losing those advantages as Gulf airlines restore flights and cut prices. Emirates, Qatar Airways and Etihad, which carried nearly a third of Asia-Europe passengers pre-war, returned to about 90 per cent of normal levels by mid-June. Singapore Airlines' Europe load factor surged 13.8 percentage points in March but narrowed to just 1.1 points in May. Korean Air, ANA and Cathay Pacific also reported softening gains. Australia's June lifting of a travel warning boosted Gulf bookings 36 per cent. Analysts describe a gradual, not sudden, rebalancing across the second quarter.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Asian%20airlines%27%20Europe%20windfall%20fades%20as%20Gulf%20rivals%20rebound.pdf"}, {"id": "bt-03", "title": "China, South Korea, Singapore lead Apac in global EV ranking", "source": "BT", "date": "2 Jul 2026", "tags": ["Energy", "Southeast Asia"], "summary": "China, South Korea and Singapore lead the Asia-Pacific in EV adoption and readiness, according to the EV-Friendly Countries Index by Australia-based Compare The Market, which scored 25 countries on charging access, 2025 market share, running costs, incentives and combustion bans. Norway placed first with 75.43, China second (75.27) and South Korea third (68.17). Singapore ranked seventh at 54.59, the only other Apac nation in the top 10, scoring second on market share and third on charger accessibility but among the highest driving costs at US$56.10 per 100 km. India (16th), Australia (19th), Japan (20th) and New Zealand (22nd) trailed. High charging costs did not appear to hinder adoption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/China%2C%20South%20Korea%2C%20Singapore%20lead%20Apac%20in%20global%20EV%20ranking.pdf"}, {"id": "bt-04", "title": "Energy is the chokepoint for AI's next growth phase, says DBS CIO", "source": "BT", "date": "2 Jul 2026", "tags": ["Energy", "Technology & AI"], "summary": "DBS is recommending investors add energy infrastructure alongside technology as an investment theme, with CIO Hou Wey Fook calling energy \"the chokepoint for the full deployment of AI.\" Citing Nvidia's Jensen Huang, he noted the next computing era needs 1,000 times more power. DBS expects roughly US$1 trillion in annual AI-related capex to sustain power demand, spanning renewables, hydrocarbons, storage, grids and nuclear. Strategists urged a \"layered\" approach starting with oil majors. The bank remains constructive on Indonesia despite the JCI falling over 30 per cent in H1 2026, targeting 8,000 versus 6,000 now. AI still drove around 80 per cent of total equity returns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Energy%20is%20the%20chokepoint%20for%20AI%27s%20next%20growth%20phase%2C%20says%20DBS%20CIO.pdf"}, {"id": "bt-05", "title": "Frasers Centrepoint Trust to sell White Sands mall for S$467 million", "source": "BT", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Frasers Centrepoint Trust (FCT) is divesting the White Sands mall in Pasir Ris for S$467 million, an 8.4 per cent premium over its May 31 independent valuation, its manager announced in a Jun 30 filing. The buyer is Growth Capital, linked to Han Chee Juan's Jack Investment, which owns Leisure Park Kallang. Completion is expected around Sep 30. FCT will use about S$454.1 million in net proceeds to repay debt, cutting aggregate leverage from 40 per cent to 36.5 per cent, and expects a net gain of about S$32.4 million. The remaining eight-mall suburban portfolio includes Causeway Point and NEX. Marketed by Cushman & Wakefield and Savills.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Frasers%20Centrepoint%20Trust%20to%20sell%20White%20Sands%20mall%20for%20S467%20million.pdf"}, {"id": "bt-06", "title": "Google's power struggles are killing its AI mojo", "source": "BT", "date": "2 Jul 2026", "tags": ["Technology & AI"], "summary": "Alphabet's Google rapidly caught up on AI last year with Gemini 3 but is now slipping behind on AI coding, hampered not by technology but by internal red tape and messy incentives. High-profile departures include transformer co-inventor Noam Shazeer (to OpenAI) and Nobel laureate John Jumper, Jonas Adler and Alexander Pritzel (to Anthropic). Anthropic's Claude Code and OpenAI's Codex dominate, while Google's Antigravity, from its US$2.4 billion Windsurf acquisition, draws little attention. Managers are rewarded for launching products, not maintaining them, and researchers face compute constraints and six-month publishing delays. Google still printed US$77 billion in Q1 revenue, up 15 per cent. CEO Sundar Pichai needs a fundamental rethink.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Google%27s%20power%20struggles%20are%20killing%20its%20AI%20mojo.pdf"}, {"id": "bt-07", "title": "Home flippers return to Hong Kong on property price recovery", "source": "BT", "date": "2 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong's residential property recovery is drawing back home flippers who renovate and resell into rising prices. The city recorded 586 sales within one year of purchase in the three months through April, more than double the prior quarter, per Midland Realty. The rebound followed the government's 2024 scrapping of a tax on properties bought and sold within two years, plus levies on speculators and foreign buyers. Prices are up more than 10 per cent over the past year, and flips were profitable 93 per cent of the time in April. Quick reselling concentrates in discounted new projects. Goldman Sachs predicts housing prices will rise 15 per cent in 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Home%20flippers%20return%20to%20Hong%20Kong%20on%20property%20price%20recovery.pdf"}, {"id": "bt-08", "title": "Sydney housing slump drags Australia prices down most since 2022", "source": "BT", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Australia's national home value index slipped 0.4 per cent in June, the biggest drop since December 2022, driven by accelerating declines in Sydney (-1.2 per cent) and Melbourne (-1 per cent), data from consultancy Cotality showed. Perth and Darwin bucked the trend. The median Sydney home still costs A$1.3 million. The Reserve Bank of Australia raised rates 75 basis points across its first three meetings this year, cutting borrowing power. The Labor government passed laws limiting investor tax breaks and raising capital gains taxes to aid first-home buyers. Prime Minister Anthony Albanese welcomed reduced competition at auctions. The RBA flagged risks from a material housing weakening dampening consumption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Sydney%20housing%20slump%20drags%20Australia%20prices%20down%20most%20since%202022.pdf"}, {"id": "bt-09", "title": "The yuan 'Plaza Accord' would barely dent China's edge", "source": "BT", "date": "2 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Western policymakers increasingly view yuan revaluation as a fix for China's competitive dominance, but analysts argue currency tinkering would barely dent Beijing's cost advantage. At June's G7 summit, German Chancellor Friedrich Merz blamed an \"artificially low\" yuan for China's 3.8 per cent-of-GDP current account surplus. A McKinsey Global Institute report found China is the cost leader in seven of 10 major projects, averaging just 58 per cent of the closest competitor's costs across eight sectors. A 25 per cent yuan revaluation would raise China's costs only about 14 per cent, cutting its lead by a quarter. The piece argues structural reforms, industrial policy and targeted tariffs are what's needed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/The%20yuan%20'Plaza%20Accord'%20would%20barely%20dent%20China%27s%20edge.pdf"}, {"id": "bt-10", "title": "UOB breaks ground on US$450 million tower in Vietnam's international financial centre", "source": "BT", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "UOB broke ground on Jul 1 on a US$450 million office tower in Ho Chi Minh City, becoming the first foreign bank to establish a dedicated headquarters in the Vietnam International Financial Centre (VIFC-HCMC). CEO Wee Ee Cheong said the 36-storey UOB Plaza HCMC, targeting Green Mark certification, could begin operations within two years, ahead of its 2030 target. Vietnam is central to UOB's Asean strategy; its FDI advisory unit has supported over 400 companies investing about S$9 billion since 2020. UOB meets the VIFC's toughest entry threshold, an AA- credit rating, which executives say has blocked more than 10 foreign banks. Local lenders including Vietcombank are also entering.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/UOB%20breaks%20ground%20on%20US450%20million%20tower%20in%20Vietnam%27s%20international%20financial%20centre.pdf"}, {"id": "bt-11", "title": "Waiting to transition to renewables is a losing game for companies", "source": "BT", "date": "2 Jul 2026", "tags": ["Energy", "Environment"], "summary": "The Iran war hit Asia hard, as the region buys around 60 per cent of its oil from the Middle East and Asian LNG prices jumped 97 per cent in the first week. Even as the war de-escalates, the author argues permanent energy shocks are here to stay, and companies can no longer rely on long-term government subsidies. Renewables, with solar module prices down about 90 per cent between 2015 and 2024, plus long-term power-purchase agreements, offer cost stability. Technology firms and data centres lead as savvy buyers. Late adopters could face premiums of 30 to 40 per cent. The writer is CEO of Singapore-based Peak Energy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Waiting%20to%20transition%20to%20renewables%20is%20a%20losing%20game%20for%20companies.pdf"}, {"id": "bt-12", "title": "Weaker jobs outlook dims HDB resale market as prices, volume slip further in Q2", "source": "BT", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Singapore HDB resale flat prices fell 0.3 per cent in Q2 after a 0.1 per cent dip in the prior quarter, as a softer labour market and macroeconomic uncertainty made buyers cautious, per HDB flash estimates released Jul 1. Transaction volumes shrank 10.2 per cent year on year to 6,268 units. Prices fell in 16 towns, steepest in Serangoon (-7.9 per cent), while the Central Area rose 19.7 per cent. Yet the market is bifurcating: 491 flats sold for at least S$1 million in Q2, lifting the first-half tally to 902, surpassing last year's 763. Analysts expect subdued conditions ahead, though Mogul.sg's Mak sees prices bottoming and recovering in late 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20BT/Weaker%20jobs%20outlook%20dims%20HDB%20resale%20market%20as%20prices%2C%20volume%20slip%20further%20in%20Q2.pdf"}, {"id": "scmp-01", "title": "Trump sees progress as US and Iran hold talks in Qatar", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "President Donald Trump said indirect US-Iran talks in Doha were making progress, a tentative sign diplomacy is holding after recent exchanges of fire. Iran's deputy foreign minister Kazem Gharibabadi said the sides agreed to establish a communication channel to record violations of their initial memorandum of understanding. Brokered by Qatar and Pakistan and sealed at a Lucerne summit, the deal includes a 60-day ceasefire, reopening the Strait of Hormuz and a nuclear timetable. Trump said \"the denuclearisation of Iran is moving along well.\" Talks also covered frozen Iranian assets, with part of an initial US$6 billion to buy needed goods. Envoys Kushner and Witkoff met Qatar's leaders but skipped the technical talks; Lebanon remains contentious.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/1.%20Trump%20sees%20progress%20as%20US%20and%20Iran%20hold%20talks%20in%20Qatar.pdf"}, {"id": "scmp-02", "title": "A model for other states? China's Xi lauds Communist Party's global influence", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Politics", "Geopolitics", "Defence"], "summary": "A year ahead of a major leadership reshuffle, President Xi Jinping projected strong confidence in Communist Party governance in a speech marking the organisation's 105th anniversary. He called the party the world's biggest ruling party with \"significant global influence,\" saying it offered a new model for developing nations. Xi warned members to weather \"high winds and rough waves\" and eliminate factors undermining party purity, a nod to anti-corruption drives. He urged accelerated military modernisation, pressing the PLA toward its 2027 centenary goals and a world-class force by 2050. On Taiwan he repeated reunification pledges without signalling urgency; analysts read a \"steady\" push. He honoured predecessors and awarded July 1 Medals to eight individuals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/A%20model%20for%20other%20states%20China%E2%80%99s%20Xi%20lauds%20Communist%20Party%E2%80%99s%20global%20influence.pdf"}, {"id": "scmp-03", "title": "Alibaba agrees to pay US$600 million to settle US probe into illegal product sales", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Trade", "Finance & Markets", "Technology & AI"], "summary": "Alibaba Group will pay US$600 million to settle a US Department of Justice investigation alleging its e-commerce platforms enabled sales of illegal pharmaceuticals, controlled substances and prohibited products into the United States, one of the largest criminal resolutions involving a Chinese tech firm. Non-prosecution agreements cover Alibaba and AUS Merchant Services (formerly Alipay US, now an Ant Group unit). Alibaba admitted merchants conducted about 80,000 illegal-import transactions between 2016 and 2024, exceeding US$200 million in value. Alibaba pays a US$125 million penalty and forfeits US$200 million; AUS pays US$85 million and forfeits US$190 million. Both will strengthen compliance. Alibaba, which owns the SCMP, cited a \"mutually satisfactory resolution\" and full cooperation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Alibaba%20agrees%20to%20pay%20US%24600%20million%20to%20settle%20US%20probe%20into%20illegal%20product%20sales.pdf"}, {"id": "scmp-04", "title": "Beijing's message for Asean – China doesn't want to become a regional hegemon", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Southeast Asia", "Energy"], "summary": "Senior Communist Party official Sun Haiyan told an Asean audience that Beijing does not seek to become a regional hegemon, saying China has \"harmonious coexistence\" embedded in its DNA. Speaking at the SCMP-organised Greater Bay Area-Asean summit in Shenzhen, the party International Department deputy head said it was a mistake to assume major powers inevitably become hegemons, in a swipe at the United States for \"treating internal diseases externally.\" Sun vowed to strengthen energy cooperation, noting Southeast Asia has been hit hard by the US-Israel war on Iran, which drove up fuel and fertiliser prices. She said China's diversified, renewable-heavy energy sector could help, urging coordinated regional planning on energy security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Beijing%E2%80%99s%20message%20for%20Asean%20%E2%80%93%20China%20doesn%E2%80%99t%20want%20to%20become%20a%20regional%20hegemon.pdf"}, {"id": "scmp-05", "title": "Can Hong Kong absorb US$100 billion of newly tradable shares amid the global AI boom?", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Hong Kong stocks trailed major markets in the first half, with the Hang Seng Index down 11 per cent even as the S&P 500 rose 20 per cent on the AI trade. A glut from expiring IPO lock-ups threatens further pressure: about HK$850 billion (US$108.4 billion) of shares could hit the market in the third quarter, a record, peaking in September. The exchange responded by halving the minimum stock-buying value to HK$1,000 and resetting lot sizes. Sluggish Chinese consumer spending weighs on Alibaba and Meituan, the top index weights. Asian peers fared far better, with South Korea's Kospi up 101 per cent on memory-chip demand. Analysts suggested high-dividend hedges amid the uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Can%20Hong%20Kong%20absorb%20US%24100%20billion%20of%20newly%20tradable%20shares%20amid%20the%20global%20AI%20boom.pdf"}, {"id": "scmp-06", "title": "China unveils industrial internet road map, with AI, 5G at core of manufacturing upgrade", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "China unveiled a road map to accelerate its industrial internet, deepening the integration of AI and 5G into manufacturing to bolster industrial competitiveness. Jointly issued by eight government agencies led by the Ministry of Industry and Information Technology, the plan targets 50,000 industrial 5G private networks by 2030 and aims for the sector's value added to exceed 2.5 trillion yuan (US$368 billion) within five years. It emphasises expanding digital infrastructure and data supply, promoting AI adoption across factories, and building world-leading platforms, positioning the sector as a pillar of \"new quality productive forces.\" Unlike earlier connectivity-focused policies, it highlights \"integrated applications.\" Authorities aim to build world-leading infrastructure within a decade, supporting new industrialisation by 2035.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/China%20unveils%20industrial%20internet%20road%20map,%20with%20AI,%205G%20at%20core%20of%20manufacturing%20upgrade.pdf"}, {"id": "scmp-07", "title": "China's Wang Yi reaffirms support for Mideast talks in meeting with top Saudi diplomat", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Chinese Foreign Minister Wang Yi met Saudi counterpart Prince Faisal bin Farhan al-Saud in Beijing, reaffirming support for Middle East negotiations despite a fragile ceasefire, saying \"talking is better than fighting.\" Wang said the priority was upholding the US-Iran memorandum of understanding signed June 17, which calls for halting military operations, safe passage for commercial vessels for 60 days and release of frozen Iranian assets. He offered to work with Riyadh to ease tensions and back a bigger Saudi global role. The ministers discussed energy, trade and technology cooperation. The meeting capped a flurry of China-Middle East diplomacy; Beijing postponed the second China-Arab States Summit, citing regional instability, as technical Iran-US talks hit roadblocks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/China%E2%80%99s%20Wang%20Yi%20reaffirms%20support%20for%20Mideast%20talks%20in%20meeting%20with%20top%20Saudi%20diplomat.pdf"}, {"id": "scmp-08", "title": "China's grip on global ship repair worries Japan. Can Tokyo end its dependence?", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Trade", "Geopolitics", "Defence"], "summary": "A 370 trillion yen (US$2.28 trillion) industrial upgrade plan approved by PM Sanae Takaichi's cabinet could revive Japan's ship repair sector as Tokyo seeks to cut reliance on China, which dominates the global market. The plan targets 17 strategic industries including semiconductors, AI and shipping, with about 100 billion yen (US$616 million) allocated to ship repair, financed through 2040. Japan handles only 7 per cent of its own ship repairs while China does 60 per cent of the global total. Analysts tied the push to economic security amid frayed ties, noting Takaichi's hawkish stance and her November remarks on Taiwan. Japan aims for a maritime chain \"independent of other countries,\" but capacity lags far behind China's US$165 billion market.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/China%E2%80%99s%20grip%20on%20global%20ship%20repair%20worries%20Japan.%20Can%20Tokyo%20end%20its%20dependence.pdf"}, {"id": "scmp-09", "title": "China's new investment law asserts control over offshore tech transfers in landmark move", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Trade", "Technology & AI", "Politics"], "summary": "China enacted a sweeping overseas-investment law to safeguard national interests against trade barriers and unauthorised use of advanced technology abroad. The State Council's 34-article Regulation on Overseas Investment, effective Wednesday, authorises \"necessary and defensive measures\" and coordinates retaliatory responses to foreign trade-related barriers. Officials called it a \"milestone\" for outbound investment. The 2026 ODI rules require investors to cooperate with authorities and bar unauthorised transfer of restricted technologies via personnel reassignments, cross-border staffing or remote assistance. Analysts said tech transfers are the key concern; the law follows the Nexperia dispute and Meta's aborted Manus acquisition. China's ODI hit 429.42 billion yuan (US$63.4 billion) in early 2026. Beijing is unlikely to directly target foreign firms, one analyst said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/China%E2%80%99s%20new%20investment%20law%20asserts%20control%20over%20offshore%20tech%20transfers%20in%20landmark%20move.pdf"}, {"id": "scmp-10", "title": "China's pressure campaign tests Trump's commitment to Japan", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Politics", "Defence"], "summary": "Over seven months, China has repeatedly punished Tokyo over PM Sanae Takaichi's November remarks that a Chinese attack on Taiwan could be an \"existential crisis\" drawing Japan in militarily. Analysts say a war-distracted Washington has held back, frustrating a Japan that expected stronger support from its treaty ally. Japanese officials have escalated private appeals for the US to press Beijing to ease rare earth curbs imposed in January, but sources said it was treated as low priority. Analysts link Trump's tepid stance to his personality, Middle East preoccupation, suspicion of allies as freeloaders and leverage with Xi. Beijing's measures include rare earth and dual-use export bans, a seafood ban, blacklists and a punitive tariff move.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/China%E2%80%99s%20pressure%20campaign%20tests%20Trump%E2%80%99s%20commitment%20to%20Japan.pdf"}, {"id": "scmp-11", "title": "China's Kling AI nears US$3 billion round at US$18 billion valuation: sources", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Kuaishou-backed Kling AI is close to completing a US$3 billion fundraising round valuing the company at US$18 billion post-investment, sources said, as competition intensifies in China's AI video-generation sector. The valuation was narrowed from an initial US$20 billion target set in April when Kuaishou first planned the spin-off. Investors include Tencent. Kuaishou expects to start Kling AI's Hong Kong listing process within 12 months, with IPO proceeds funding computing, data centres and talent. Kling AI's annualised revenue run rate reached US$500 million in March, five times a year earlier, with over 100 million global users. It competes with ByteDance's Seedance and US rival Runway in a market estimated at US$140 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/ExclusiveChina%E2%80%99s%20Kling%20AI%20nears%20US%243%20billion%20round%20at%20US%2418%20billion%20valuation%20sources.pdf"}, {"id": "scmp-12", "title": "How North Korean POWs caught Seoul in a Ukraine arms 'conundrum'", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Two North Korean prisoners of war who say they want to go to South Korea have given Kyiv leverage as it presses Seoul to sell weapons for its war against Russia, observers say. Captured in early 2025 after deployment to Kursk, the soldiers are considered South Korean nationals under Seoul's constitution. Ukraine will not forcibly repatriate them but has delayed a decision, tied to prisoner exchanges with Russia. Kyiv wants cost-effective South Korean \"K-weapons\"; the EU is also pressing Seoul, with a possible Canadian submarine contract as incentive. Seoul, wary of provoking Russia and Pyongyang, faces a diplomatic conundrum entangling the EU, Russia, Ukraine, North Korea and Canada. Sybiha pitched Ukraine's drone-warfare expertise as a bargaining chip.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/How%20North%20Korean%20POWs%20caught%20Seoul%20in%20a%20Ukraine%20arms%20%E2%80%98conundrum%E2%80%99.pdf"}, {"id": "scmp-13", "title": "How do Chinese police track and seize cryptocurrency? Rare paper reveals forensic tools", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Technology & AI", "Society", "Finance & Markets"], "summary": "Chinese police published a detailed technical report revealing a sophisticated arsenal of forensic tools for tracking, seizing and freezing cryptocurrency, which is illegal in China. Published June 4 in Forensic Science and Technology by public security officials, it outlines evidence collection, transaction tracing and asset seizure. Investigators comb seized devices for private keys and mnemonic phrases using forensic software like FileLocator and Meiya Pico tools, and extract text from images. When keys are not found, they trace funds on the public blockchain, tracking transaction fees to exchanges like Binance, analysing cross-chain hops and mixers, and obtaining KYC records. Seizure methods include private-key replacement into police-controlled multisignature wallets and freezing exchange accounts, with strict chain-of-custody rules.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/How%20do%20Chinese%20police%20track%20and%20seize%20cryptocurrency%20Rare%20paper%20reveals%20forensic%20tools.pdf"}, {"id": "scmp-14", "title": "Lorenzi warns of economic conflict and unplottable solutions: 'world without bearings'", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The global order has lost the structural anchors that ensured stability, entering a volatile period of economic conflict with \"no obvious solutions,\" warned Jean-Herve Lorenzi, head of French think tank Le Cercle des economistes. Ahead of the Aix-en-Provence forum, themed \"navigating a world without bearings,\" he argued major European powers must reach a strategic pact with China recognising Europe cannot let its industrial base be hollowed out. Reindustrialising is far harder than 30 years ago, he said, blaming the West's deliberate outsourcing to China. An ageing, risk-averse population hinders innovation. Lorenzi cited the biggest danger as a US-China clash, the \"Thucydides Trap,\" and urged structural reform led by four or five major EU states, bringing Britain closer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Lorenzi%20warns%20of%20economic%20conflict%20and%20unplottable%20solutions%20%E2%80%98world%20without%20bearings%E2%80%99.pdf"}, {"id": "scmp-15", "title": "New Japan visa rules threaten to force out foreign business owners: 'my dream is broken'", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Society", "Politics"], "summary": "Japan's tightened business manager visa rules, introduced by the ruling LDP in late 2025, threaten to force out foreign entrepreneurs even as the country faces labour shortages. Nepalese restaurateur Budhathoki Samjhana, who built three Tokyo eateries, faces expulsion after the capital requirement jumped to 30 million yen (US$184,000) from 5 million. \"My dream is broken,\" she said. Business manager visa holders reached about 46,000 by mid-2025, up 70 per cent from 2020, about half Chinese nationals. PM Sanae Takaichi has pushed tighter screening amid overtourism, rising land prices and the anti-immigration Sanseito party's \"silent invasion\" rhetoric. Officials now demand more documentation and require holders to employ a Japanese national. Over 67,800 people signed a petition against the rules.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/New%20Japan%20visa%20rules%20threaten%20to%20force%20out%20foreign%20business%20owners%20%E2%80%98my%20dream%20is%20broken%E2%80%99.pdf"}, {"id": "scmp-16", "title": "Ship runs aground in Strait of Hormuz, was not using Iran-approved route: Iranian state TV", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "A foreign container ship ran aground in the Strait of Hormuz while using a route not approved by Iran, Tehran's state television reported, in an apparent bid to underline Iran's claims to control the strait long considered an international waterway carrying a fifth of oil and gas. Since the US-Israel war began February 28, Iran has used the strait as leverage. The report came as US envoys Witkoff and Kushner and Iran's Kazem Gharibabadi were in Doha for talks to end the war. An interim deal lets ships pass free for 60 days, but Tehran insists on controlling routes and later charging fees, which the US and Gulf states reject. An Oman-UN route attempt sparked weekend attacks. Thai and South Korean vessels have largely departed safely.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Ship%20runs%20aground%20in%20Strait%20of%20Hormuz,%20was%20not%20using%20Iran-approved%20route%20Iranian%20state%20TV.pdf"}, {"id": "scmp-17", "title": "Trump takes first flight on new Air Force One, a gift from Qatar", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "President Donald Trump flew for the first time aboard a retrofitted Boeing 747 he accepted as a gift from Qatar, using it to visit the new Theodore Roosevelt Presidential Library in North Dakota. The luxury aircraft, reported worth about US$400 million, officially joined the Air Force One fleet last month after extensive modifications at US taxpayers' expense, including security upgrades. Trump accepted the jet in May 2025 despite fierce criticism, calling it \"a gift from a country that has treated us very well.\" Democrats denounced it as \"blatant corruption\" over legal and ethical concerns. Painted navy with red and gold stripes, it features plush carpets and lie-flat seats. Boeing is expected to deliver permanent replacements in 2028.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Trump%20takes%20first%20flight%20on%20new%20Air%20Force%20One,%20a%20gift%20from%20Qatar.pdf"}, {"id": "scmp-18", "title": "UBTech's lifelike humanoid robots built for companionship arriving in homes across China", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "UBTech Robotics, the world's first publicly traded humanoid robot maker, launched a consumer humanoid, the U1, designed for personal companionship with lifelike silicone skin and emotional AI, as Chinese firms move robots from factories to living rooms. Unveiled in Shenzhen, the U1 comes in male and female versions and Lite, Pro and Ultra variants priced from 119,800 yuan (US$17,650) to 990,000 yuan. It has 88 servo joints and runs emotional AI locally on a Rockchip processor, storing user data on-device. It c
