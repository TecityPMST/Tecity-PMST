: "Singapore & SEA focus — record exports, a BTO launch, ASEAN AI", "body": "Singapore's non-oil exports jumped 38.4% in May (electronics +94.8%) on the AI boom, prompting Maybank to triple its 2026 NODX forecast to 15%; HDB launched 6,952 BTO flats. As 2027 ASEAN chair, Singapore (Josephine Teo) will push cross-border data flows and AI adoption for smaller firms, while a BT survey of 500-plus Asean C-suite found capital pivoting home (the Johor-Singapore SEZ the top corridor). Sea quietly tested an AI chatbot in the US, and Keppel landed a fourth Bifrost subsea-cable fibre deal."}], "keyMetrics": [{"value": "Signed", "label": "US-Iran deal", "sub": "Hormuz to reopen; blockade lifted in 30 days"}, {"value": "<US$80", "label": "Brent crude", "sub": "3-month low on returning Iranian oil"}, {"value": "+38.4%", "label": "Singapore May exports", "sub": "Fastest in 20+ years; electronics +94.8%"}, {"value": "US$7.4b", "label": "DeepSeek raise", "sub": "China's most valuable AI startup (>US$50b)"}, {"value": "~50%", "label": "SpaceX surge", "sub": "Overtakes Amazon; US$60b Cursor deal"}, {"value": "6,952", "label": "HDB BTO flats", "sub": "Launched across 7 projects"}], "articles": [{"id": "wsj-01", "title": "A $40 Million Gold Heist Risks Exposing CIA's Top-Secret Spy Programs", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Defence", "Society", "Politics"], "summary": "CIA science-and-technology supervisor David Rush, arrested in May on charges of theft of public money, allegedly walked out with $40 million in gold bars by creating a fake special access program supposedly tied to continuity-of-government operations and run jointly with the Pentagon. An FBI search of his Virginia home uncovered over 600 pounds of gold, more than $2 million in cash, and dozens of Rolexes; he moved over 300 two-pound bars home before anyone noticed. Investigators found Rush gave contradictory accounts of his degrees and falsely claimed to be an elite Navy test pilot, holding no pilot credentials at all. Veterans fear the case could expose legitimate clandestine operations, echoing the 1974 Howard Hughes robbery that revealed a CIA bid to recover a sunken Soviet submarine.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/A %2440 Million Gold Heist Risks Exposing CIA%E2%80%99s Top-Secret Spy Programs.pdf"}, {"id": "wsj-02", "title": "Anthropic's Dire Marketing Worked Too Well", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Anthropic's habit of warning about AI dangers has backfired, making it harder to fight a Trump administration order issued Friday barring all foreigners, including Anthropic's own employees, from accessing its Mythos 5 and Fable 5 models. Anthropic is now the world's highest-valued private company at a $965 billion post-money valuation, topping OpenAI's $852 billion, per PitchBook, and could exceed $1 trillion once its pending IPO closes. The dispute is the second major clash with the administration, which deemed Anthropic a supply-chain risk over its refusal to allow unrestrained military use; Anthropic sued in March to undo that. The company introduced Mythos with the claim it was too dangerous to release in full, and \"the world got the message—maybe a bit too well.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Anthropic%E2%80%99s Dire Marketing Worked Too Well.pdf"}, {"id": "wsj-03", "title": "Databricks Releases General AI Agents for Businesses", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Databricks, valued at $134 billion, is releasing Genie One, an \"agentic co-worker\" that helps finance, marketing and sales teams get answers from corporate data, expanding beyond its core data offerings against rival Snowflake. CEO Ali Ghodsi said the company now generates an over $1.7 billion revenue run rate from AI products, up from over $1 billion last September, powered by a real-time context layer called Genie Ontology. Also Tuesday it announced Genie Agents and Genie App Builder for business users wanting to vibe-code their own apps, plus a developer agent called Genie Code. Albertsons and Rivian are early users; Ghodsi said Databricks will likely not IPO this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Databricks Releases General AI Agents for Businesses.pdf"}, {"id": "wsj-04", "title": "DeepSeek Becomes China's Most Valuable AI Startup After $7.4 Billion Fundraise", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's DeepSeek raised more than $7.4 billion in its first funding round at a valuation above $50 billion, making it the country's most valuable AI startup. Founder Liang Wenfeng, who held nearly 90% beforehand, invested around $3 billion himself and retained control via a limited partnership he manages, locking external backers in for five years. Investors included Tencent ($1.5 billion), battery maker CATL ($740 million), China's National AI fund ($150 million), JD.com, NetEase, IDG Capital and Monolith Management. The Hangzhou lab will fund R&D and computing infrastructure, continue pursuing artificial general intelligence and open-source technology, though its valuation remains a fraction of OpenAI's and Anthropic's.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/DeepSeek Becomes China%E2%80%99s Most Valuable AI Startup After %247.4 Billion Fundraise.pdf"}, {"id": "wsj-05", "title": "Import-Price Inflation Remained Firm in May", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Trade"], "summary": "U.S. import prices rose 1.9% in May, the Labor Department reported Tuesday, versus April's 2% and well above the 1.1% economists polled by The Wall Street Journal had expected. Fuel-import prices climbed 12.5% after an 18.6% April jump as the global economy adjusted to the Iran conflict, while nonpetroleum import prices grew 0.8%. The figures exclude duties such as Trump administration tariffs and transportation costs. Over the past 12 months, import prices climbed 6.7%, a sharp rise from near-flat readings much of last year and the largest annual import-price inflation since August 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Import-Price Inflation Remained Firm in May.pdf"}, {"id": "wsj-06", "title": "Iran Is Returning to Nuclear Talks No Longer Afraid of America", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "After a 40-day U.S.-Israeli airstrike campaign launched Feb. 28 that killed much of Iran's senior leadership, including Supreme Leader Ayatollah Ali Khamenei, the Iranian regime survived and consolidated, and now returns to nuclear talks emboldened and controlling the Strait of Hormuz. Analysts say Washington's main leverage, the credible threat of military force, has been removed since Iran proved it could absorb America's best punch and land effective counterstrikes. A memorandum of understanding negotiated via Pakistani and Qatari mediation, due to be signed Friday, would provide upfront cash but remains tenuous; the prior 12-day-war truce lasted only eight months. \"Iran is leaving this war with a sense of euphoria,\" said Iran expert Meir Javedanfar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Iran Is Returning to Nuclear Talks No Longer Afraid of America.pdf"}, {"id": "wsj-07", "title": "Qualcomm Is a Rare AI Chip Value Play", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Qualcomm shares have surged more than 40% since the company disclosed a major data-center customer during its late-April earnings call, yet it remains one of the cheapest chip stocks at just over 20 times projected earnings, versus Arm Holdings at around 175 times. The gap reflects dependence on Apple, which provided over $5 billion in annual modem revenue but will disappear entirely after this fall's phone releases, and a market that still sees Qualcomm as just a smartphone maker; handsets were 57% of recent quarterly revenue. CEO Cristiano Amon, in charge since 2021, has diversified into automotive ($1.3 billion last quarter, up from $240 million five years earlier), IoT and PC chips. His latest gambit is data-center AI chips, late to a market Nvidia dominates but a potential foothold using Alphawave technology, with custom chips shipping later this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Qualcomm Is a Rare AI Chip Value Play.pdf"}, {"id": "wsj-08", "title": "SpaceX Stock Has Climbed About 50%. The 'Flippers' Are Kicking Themselves.", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX shares surged nearly 50% in their first days of trading after a Friday debut, leaving early sellers, or \"flippers,\" remorseful; after a 4.8% Tuesday gain it became the world's fifth-largest public company by market cap, surpassing Amazon. The rally came as SpaceX announced a $60 billion deal to buy AI-coding startup Cursor. Trader Allen Tran, 28, made a small five-figure return selling Friday but estimates he missed about $60,000 in gains versus the $135 listing price. Tuesday marked the first day for SpaceX options, with about 1.8 million contracts traded, smashing the first-day record set by Meta in 2012; the S&P 500 fell 0.6% and the Nasdaq slid 1.2% while the Dow rose 0.6% to a record.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/SpaceX Stock Has Climbed About 50%. The %E2%80%98Flippers%E2%80%99 Are Kicking Themselves..pdf"}, {"id": "wsj-09", "title": "SpaceX's $60 Billion Deal to Buy Cursor Gives It More AI Coding Power", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SpaceX said it would buy Cursor parent Anysphere for $60 billion in stock, per a Tuesday filing, to catch up with AI rivals days after its Friday IPO that left its market value around $2.66 trillion and in the top five most valuable U.S. public companies. Cursor, started by four MIT graduates in 2023 and bringing in billions in annualized revenue, makes a tool letting developers toggle between AI models and competes with Anthropic's Claude Code and OpenAI's Codex. The deal could help SpaceX win enterprise clients wary of its in-house chatbot Grok; SpaceX had closed a November round valuing Cursor at $29.3 billion and earlier secured the right to buy it. The acquisition is expected to close in the third quarter of 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/SpaceX%E2%80%99s %2460 Billion Deal to Buy Cursor Gives It More AI Coding Power.pdf"}, {"id": "wsj-10", "title": "The AI Boom's Hunt for Cash Hits a New Corner of the Bond Market", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "AI companies are rushing into the convertible-bond market, with U.S.-listed firms including CoreWeave and Microchip Technology issuing about $54 billion worth so far this year, up 43% from 2025 and the highest year-to-date volume since the Covid pandemic, per Dealogic. Many pay coupons as low as 0% because AI-share volatility heightens the appeal of stock conversion; the ICE BofA US Convertible index has gained more than 20% this year, outpacing the S&P 500's 10% and Nasdaq's 13%. Akamai recently issued $3.5 billion in zero-coupon notes and CoreWeave $4 billion at 1.75%. Risks include a sharp reversal if investors sour on AI, echoing 2024's crypto-issuer wave led by Michael Saylor's Strategy that faded with bitcoin prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/The AI Boom%E2%80%99s Hunt for Cash Hits a New Corner of the Bond Market.pdf"}, {"id": "wsj-11", "title": "The Iran War's Odd Investing Lessons", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Spencer Jakab argues past geopolitical shocks were a faulty playbook for the three-and-a-half-month Iran conflict, during which oil moves stayed surprisingly tame despite supply losses nearly matching the Arab Oil Embargo, Iranian Revolution and First Gulf War combined, episodes that saw crude rise about 300%, 160% and 130%. Benchmark futures were only about 21% higher Friday than late February, reflecting a glutted market and peace expectations. Gold and silver failed as havens, falling about 20% and 25% after a historic 2025 rally, while bond yields and the dollar rose. The S&P 500 and Nasdaq rallied 8% and 14% from the start of fighting, driven mostly by AI enthusiasm; SpaceX, on its third trading day, is poised to overtake Amazon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/The Iran War%E2%80%99s Odd Investing Lessons.pdf"}, {"id": "wsj-12", "title": "The Trump-Iran Deal Allows Tehran to Immediately Sell Oil", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The U.S. will let Iran immediately begin selling oil and fuel under the war-ending deal, with sanctions waivers covering banking, transportation and insurance taking effect upon signing this week, people familiar said. United Against Nuclear Iran said an Iranian supertanker, Diona, left Chabahar and crossed the U.S. blockade Tuesday, the first such transit since the April blockade began, followed by a second tanker, Hero II. A draft memorandum reviewed by the Journal promises eventual extensive sanctions relief, frozen-asset release and reconstruction funding; officials discussed a $300 billion reconstruction fund and access to some of Iran's estimated $100 billion in frozen funds, though Trump said the U.S. wouldn't contribute. Iran sought $12 billion upfront and $24 billion during a 60-day negotiation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/The Trump-Iran Deal Allows Tehran to Immediately Sell Oil.pdf"}, {"id": "wsj-13", "title": "Trump Invokes Cold War-Era Law to Boost Munitions Production", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Defence", "Politics"], "summary": "President Trump invoked the Cold War-era Defense Production Act in a June 11 memo to Defense Secretary Pete Hegseth, signaling concern about a munitions shortfall after heavy use in Iran, citing \"limited production capacity, fragile supply chains, long-lead dependencies, and related production bottlenecks.\" The U.S. has fired more than 1,000 Tomahawk missiles and 1,500 to 2,000 air-defense missiles since the war began Feb. 28; fully replacing stockpiles could take up to six years. A CSIS report estimated Iran consumed roughly 27% of Tomahawks, nearly half of SM-3 missiles, more than half of Patriot interceptors and up to 80% of Thaad interceptors. The act lets the Pentagon strike voluntary agreements with contractors including Lockheed Martin and RTX; Lockheed is in talks with General Motors on parts manufacturing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Trump Invokes Cold War-Era Law to Boost Munitions Production.pdf"}, {"id": "wsj-14", "title": "Trump Is Losing the Hawks Who Once Defended the Iran War", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Hawkish conservatives who rushed to defend Trump's Iran war now fear he is losing at the negotiating table, worried the preliminary deal announced Sunday doesn't curb Iran's nuclear ambitions and could unlock billions in frozen funds to rebuild Tehran's missile arsenal. Critics include retired Gen. Jack Keane, who called the reports \"so disturbing,\" Marc Thiessen, who called them \"utterly disastrous,\" and Sen. Lindsey Graham, who said \"the way Iran describes it is awful.\" Officials say Iran will only access frozen funds by neutralizing enriched uranium and reopening the Strait of Hormuz. VP JD Vance, who helped negotiate the deal and travels Friday to Switzerland to sign it, dismissed \"propagandists,\" saying Iranians \"don't get a dime unless they behave.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Trump Is Losing the Hawks Who Once Defended the Iran War.pdf"}, {"id": "wsj-15", "title": "Trump Picked Warsh to Cut Rates. His Committee Is Talking About Hikes.", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Kevin Warsh enters his first meeting as Federal Reserve chairman in an awkward spot: picked by Trump in January to deliver rate cuts, but the committee conversation has shifted toward hikes as hiring picked back up and inflation climbed above 3%. The AI build-out, once expected to tame inflation via productivity, instead looks inflationary by straining chips, electricity and data-center materials, while the Iran war lifted gasoline and commodity prices. On Wednesday the Fed is expected to hold its benchmark steady between 3.5% and 3.75%, drop its \"easing bias\" language, and show in the dot plot a majority projecting an extended hold. Governor Christopher Waller said recent data \"just turned me the other way\"; Dallas's Lorie Logan is \"increasingly concerned\" higher rates could be needed later this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/Trump Picked Warsh to Cut Rates. His Committee Is Talking About Hikes..pdf"}, {"id": "wsj-16", "title": "U.S. Allies Use G-7 to Focus Trump's Attention Back to Ukraine", "source": "WSJ", "date": "18 Jun 2026", "tags": ["Geopolitics", "Politics", "Energy"], "summary": "At the G-7 summit in Evian-les-Bains, France, host President Emmanuel Macron prioritized Ukraine and invited President Volodymyr Zelensky as a special guest to refocus Trump after four months on the Iran war. On Tuesday German Chancellor Friedrich Merz said the U.S. would join allies in providing Ukraine more air-defense capabilities, and Trump indicated he would enforce Russia sanctions by ending oil-sale waivers. EU lawmakers approved legislation Tuesday eliminating tariffs on many U.S. imports under last year's trade agreement. Trump arrived seeking to celebrate the interim Iran deal and discuss reopening the Strait of Hormuz by clearing Iranian mines; he met Zelensky on the sidelines, flanked by Marco Rubio, after a meeting that started 54 minutes late.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun WSJ/U.S. Allies Use G-7 to Focus Trump%E2%80%99s Attention Back to Ukraine.pdf"}, {"id": "st-01", "title": "American AI dominance is going to create new issues for sovereignty", "source": "ST", "date": "18 Jun 2026", "tags": ["Technology & AI", "Geopolitics", "Politics"], "summary": "A NYTimes commentary argues the clash between Anthropic and the Trump administration marks a new conflict over who controls AI in an AI-dominated world. After Anthropic withheld its model Mythos two months ago and released a guard-railed version, Fable, Amazon bypassed some safeguards; the White House then used export-control power to forbid foreign use of Fable inside the US and any use abroad, prompting Anthropic to shut it down. The author frames this as previewing private-public regulatory struggles and a US-China geopolitical fight, warning middle powers like the EU face new dependence as economies become reliant on specific models. The piece cites a \"Europe 2031\" scenario in which the EU faces \"political and economic vassalage\" to the US or China without its own powerful AI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/American AI dominance is going to create new issues for sovereignty.pdf"}, {"id": "st-02", "title": "As Chinese consumers' belts stay tightened, Beijing banks on foreign tourists splurging", "source": "ST", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Trade"], "summary": "With domestic consumers cautious, Beijing is courting foreign tourists to revive consumption, promoting a \"Shopping in China\" (zhongguo gou) initiative via tax refunds and expanded visa-free travel, Culture and Tourism Minister Sun Yeli said at the Two Sessions. China recorded over 150 million inbound trips in 2025, up 17 per cent from 2024, with inbound spending exceeding US$130 billion (S$165 billion), nearly 40 per cent higher; over 30 million entered visa-free and inbound visitors spent more than 80 billion yuan (S$14.7 billion) via mobile payments. Oxford Economics' Betty Wang cautioned inbound tourism is only a \"supplementary boost\" given weak household demand, with consumption under 40 per cent of GDP versus about 68 per cent in the US. Tsinghua's Tian Xuan said raising the household consumption share to around 45 per cent over five years would significantly boost demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/As Chinese consumers' belts stay tightened, Beijing banks on foreign tourists splurging.pdf"}, {"id": "st-03", "title": "G-7 minus Trump rallies behind Ukraine, but US blocks call to pressure Russia", "source": "ST", "date": "18 Jun 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "On June 17, G-7 leaders minus US President Donald Trump vowed greater support for Ukraine, but the US blocked a joint statement pressuring Russia, objecting to language condemning Moscow to preserve its mediator role with Vladimir Putin. Trump flew back to the US on June 16 over the Israel-Iran conflict, skipping a planned meeting with Volodymyr Zelensky, hours after Russia hit Kyiv with one of its worst bombardments since February 2022, killing at least 16 people. Canadian PM Mark Carney announced C$2 billion (S$1.88 billion) in military support for Ukraine and, with Britain, tightened sanctions on Russia's shadow fleet. Zelensky said \"We are ready for the peace negotiation\" but stressed pressure was needed, while Trump threatened sweeping tariffs on July 9.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/G-7 minus Trump rallies behind Ukraine, but US blocks call to pressure Russia.pdf"}, {"id": "st-04", "title": "HDB launches 6,952 BTO flats for sale", "source": "ST", "date": "18 Jun 2026", "tags": ["Society", "Politics"], "summary": "The Housing Board launched 6,952 Build-To-Order flats on June 17 across seven projects in Ang Mo Kio, Bishan, Bukit Merah, Woodlands and Sembawang, with about 2,000 Sembawang flats having waits under three years. Two Prime projects feature Berlayar Rise in Bukit Merah (1,976 flats, 14 per cent subsidy clawback, four-room units $592,000-$810,000) and Lakeview Cascadia in Bishan (1,221 units, 10 per cent clawback), plus two Plus projects in Ang Mo Kio at 8 per cent clawback. National Development Minister Chee Hong Tat said more than a third of flats have waits of around three years or less, and the Third Child Priority Scheme quota rises from up to 5 per cent to up to 10 per cent. Applications close at 11.59pm on June 24, with the next exercise in October offering about 7,960 flats.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/HDB launches 6,952 BTO flats for sale.pdf"}, {"id": "st-05", "title": "How Malaysia is blending more palm oil into diesel to cut its reliance on crude oil imports", "source": "ST", "date": "18 Jun 2026", "tags": ["Energy", "Southeast Asia", "Trade"], "summary": "Since June 1, Malaysia is gradually raising the palm oil content in diesel from 10 per cent (B10) to 15 per cent (B15), after the Iran war choked the Strait of Hormuz shipping route and left fuel stockpiles warned to last only until July. Officials say each percentage point of palm oil methyl ester cuts diesel use equivalently, so B15 could lower diesel usage by about 5 per cent, saving at least 23 million litres monthly against average consumption of 465 million litres. The higher blend will consume 800,000 tonnes of palm oil domestically without affecting the roughly 16 million tonnes exported annually, Plantation Minister Noraini Ahmad said. Malaysia imported 3.4 million tonnes of crude in Q1 2026, about a third lower year-on-year, and targets B30 by 2030 under the 13th Malaysia Plan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/How Malaysia is blending more palm oil into diesel to cut its reliance on crude oil imports.pdf"}, {"id": "st-06", "title": "Japan's trade balance swings to deficit as yen inflates value of imports", "source": "ST", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Trade", "Energy"], "summary": "Japan's trade balance flipped to a 378.6 billion yen (S$3.02 billion) deficit in May, its first in four months, as a weak yen inflated import values even as import volumes fell nearly 7 per cent, the Finance Ministry reported on June 17. Import values rose 12.5 per cent and export values gained 17 per cent, with the yen averaging 158.29 to the US dollar, 10 per cent weaker than a year earlier. Oil imports plunged amid the Iran war, with US petroleum product imports up over 660 per cent to fill the gap, while chip exports rose 61.2 per cent and auto exports climbed nearly 19 per cent. The Bank of Japan raised its benchmark rate on June 16 to the highest since 1995, and the trade surplus with the US narrowed for a sixth straight month under 15 per cent tariffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Japan's trade balance swings to deficit as yen inflates value of imports.pdf"}, {"id": "st-07", "title": "Oil slides on Iran supply prospects as traders wait on Warsh", "source": "ST", "date": "18 Jun 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Crude prices tumbled on June 17 on news that Iranian fuel may soon return to markets, with Brent crude futures diving below US$80 to the lowest since the March opening of the US-Iran conflict, easing inflation fears and pushing bond yields lower. A senior US official said the US will waive sanctions on Iranian oil under the war-ending deal due to be signed June 19, raising prospects of millions of additional barrels; HSBC's Kim Fustier said markets are pricing \"a relatively high probability\" of Hormuz normalisation though the bank expects it by end-September. A three-month Hormuz stranglehold drained inventories, with US reserves at their lowest since 1983. Markets were quieter ahead of Kevin Warsh's debut as Federal Reserve chair, with the Nasdaq down 1.15 per cent overnight while the Dow notched a record high.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Oil slides on Iran supply prospects as traders wait on Warsh.pdf"}, {"id": "st-08", "title": "Philippines says China has removed structure in disputed South China Sea shoal", "source": "ST", "date": "18 Jun 2026", "tags": ["Geopolitics", "Defence", "Southeast Asia"], "summary": "The Philippines said patrols on the morning of June 17 confirmed China had removed a floating platform monitored within the lagoon of Scarborough Shoal, after Manila lodged a diplomatic protest over the \"illegal\" move. A Manila task force asserted the Philippines has \"indivisible, incontrovertible and longstanding sovereignty\" over the shoal it calls Bajo de Masinloc, while China's foreign ministry spokesman Lin Jian reiterated Beijing's \"indisputable sovereignty\" over what it calls Huangyan Island, calling the structure part of comprehensive scientific research. China took effective control of the shoal after a 2012 stand-off and has reclaimed reefs across contested waters. Last week China sanctioned Philippine Defence Secretary Gilberto Teodoro, accusing him of remarks that damaged bilateral ties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Philippines says China has removed structure in disputed South China Sea shoal.pdf"}, {"id": "st-09", "title": "Singapore coastal landowners prepare for sea level rise", "source": "ST", "date": "18 Jun 2026", "tags": ["Environment", "Society", "Politics"], "summary": "From 2028, all Singapore coastal landowners with at least 30 years remaining on their lease must have a plan to build defences against a possible 2.15m rise in sea level by 2150, under a Code of Practice on Coastal Protection released on June 17; those with under 30 years left must prepare for a 0.7m rise projected for 2050. The Government owns 70 per cent of coastal land, with the remaining 30 per cent of private land mostly shipyards, ports and oil, gas and manufacturing firms in areas like Jurong Island, Tuas, Pioneer and Senoko. Minister Grace Fu said the 80-page code gives landowners \"optionality\" via single-step or incremental approaches, with measures needing to last 120 years and annual declarations to PUB. The law will likely apply to more than 100 coastal landowners, who get about 10 years' notice, with non-compliance risking fines and jail.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Singapore coastal landowners prepare for sea level rise.pdf"}, {"id": "st-10", "title": "Singapore's most important AI companies are the ones nobody notices", "source": "ST", "date": "18 Jun 2026", "tags": ["Technology & AI", "Society", "Southeast Asia"], "summary": "In a commentary, Tangent executive director Vaughn Tan argues Singapore's AI economy should be built by thousands of small, specialised software firms serving traditional SMEs rather than a few venture-scale giants. Drawing on pragmatic South-east Asian entrepreneurs like Tan Kah Kee, he notes AI tools have made software an order of magnitude faster and cheaper to build, making niche B2B firms viable in an economy where nearly 80 per cent consists of non-tech industries like logistics, construction and shipping. He cites SysFreight's 25 years of freight software and Yumstone serving over 300 F&B operators as invisible successes, and Canada's Constellation Software as a model. Tan proposes three policy shifts, including reforming Enterprise Development Grant and Startup SG Tech criteria to support firms that do not take venture capital, to build a technology \"Mittelstand.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Singapore's most important AI companies are the ones nobody notices.pdf"}, {"id": "st-11", "title": "Taiwan launches website for Chinese nationals to report intelligence", "source": "ST", "date": "18 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Taiwan's government launched a website on June 14 encouraging Chinese nationals to report intelligence tips, saying it offers a secure channel to a growing number of people fed up with the system. The National Security Bureau said China's economic difficulties and \"tight\" political control have fuelled public discontent, prompting more individuals to approach Taiwanese agencies. The site, blocked in China but accessible via VPN, opens with an AI-generated promotional video showing a Chinese civil servant witnessing colleagues vanish, who concludes \"Now is the time to change.\" The bureau said it was following the lead of agencies in the US, Britain and Israel; China had announced a similar tip-off e-mail address targeting Taiwan \"separatists\" in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Taiwan launches website for Chinese nationals to report intelligence.pdf"}, {"id": "st-12", "title": "Trump on Iran deal: 'If I don't like it, we'll go back to shooting'", "source": "ST", "date": "18 Jun 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "At the G-7 summit in Evian-les-Bains, France, on June 17, US President Donald Trump said the memorandum of understanding on Iran was not final and he could resume bombing, warning \"we'll go back to shooting at them.\" The G-7 leaders demanded a ceasefire in Lebanon and said they would diversify energy supplies to reduce dependence on the Strait of Hormuz, welcoming the interim deal due to be signed across the Swiss border on June 19. The war has killed more than 7,000 people, mostly in Iran and Lebanon, and the memorandum extends an April ceasefire by 60 days; critics note Iran's government remains in place and its enriched uranium stockpile not surrendered. Israeli forces still occupy southern Lebanon and refuse to withdraw, opening a rift with Trump, who publicly berated Israeli PM Benjamin Netanyahu.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Trump on Iran deal: 'If I don't like it, we'll go back to shooting'.pdf"}, {"id": "st-13", "title": "What will power growth amid uncertainty? ASEAN businesses in BT survey say answer lies close to home", "source": "ST", "date": "18 Jun 2026", "tags": ["Southeast Asia", "Trade", "Finance & Markets"], "summary": "An inaugural Business Times survey of more than 500 C-suite leaders across the Asean-6, conducted with Kantar in February and April 2026, found ASEAN businesses reallocating capital and supply chains regionally amid global volatility. Positive sentiment fell from 92 per cent pre-crisis to 76 per cent after the Middle East conflict, with \"very positive\" responses dropping from 52 to 31 per cent and geopolitical tensions cited as the top risk by 59 per cent. All respondents plan to allocate new capital within intra-Asia, focused on ASEAN (90 per cent) and domestic markets (77 per cent), with only 31 per cent eyeing the US; eight in 10 named the Johor-Singapore Special Economic Zone the most attractive corridor. Approved FDI rose 20.9 per cent to RM207.1 billion in Malaysia in 2025, and DBS forecasts ASEAN to become the world's fourth-largest economic bloc by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/What will power growth amid uncertainty? ASEAN businesses in BT survey say answer lies close to home.pdf"}, {"id": "st-14", "title": "Zero Waste Masterplan to be reviewed as Singapore recycles less, disposes more", "source": "ST", "date": "18 Jun 2026", "tags": ["Environment", "Society", "Politics"], "summary": "Singapore will review its 2030 recycling and waste targets after the overall recycling rate fell to 52 per cent in 2025 from 59 per cent in 2019, moving further from the 70 per cent goal, Senior Minister of State Janil Puthucheary said on June 17. The domestic recycling rate dropped from 17 to 11 per cent and non-domestic from 73 to 67 per cent over 2019-2025, while waste disposed hit a record 3.36 million tonnes amid blue-bin contamination rates of about 40 per cent. The Zero Waste Masterplan review, slated for completion by 2027, will weigh adjusting goals and extending Semakau Landfill's life beyond its expected 2035 exhaustion. Each resident generated 0.83kg of waste daily in 2025, down 21 per cent from 2015, and the Beverage Container Return Scheme aims to collect 60 per cent of stock in its first year from Oct 1.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun ST/Zero Waste Masterplan to be reviewed as Singapore recycles less, disposes more.pdf"}, {"id": "bt-01", "title": "AI demand to keep Singapore's export growth robust despite Middle East uncertainty: economists", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Trade", "Finance & Markets"], "summary": "Singapore's non-oil domestic exports surged 38.4 per cent year on year in May, the fastest in over two decades, beating the 30.5 per cent median forecast, led by electronics shipments up 94.8 per cent on chip and computer demand. Maybank lifted its full-year 2026 NODX growth forecast to 15 per cent from 4.5 per cent, far above Enterprise Singapore's official 3 to 5 per cent range, citing a sustained global AI capex boom. Maybank's Chua Hak Bin and Brian Lee said US hyperscalers plan to raise capex about 76 per cent in H2, while UOB's Jester Koh expects AI tailwinds at least through Q3. OCBC's Selena Ling kept a 6 per cent forecast but expects moderation in H2 on higher base effects, as NODX to Taiwan more than doubled and shipments to the US rose 80.9 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/AI demand to keep Singapore's export growth robust despite Middle East uncertainty: economists.pdf"}, {"id": "bt-02", "title": "Asean must retain more value as its digital economy races towards US$2 trillion: Indonesian minister", "source": "BT", "date": "18 Jun 2026", "tags": ["Southeast Asia", "Technology & AI", "Trade"], "summary": "Indonesia's communications and digital affairs minister Meutya Hafid urged Asean nations to retain more of the economic value generated by their digital economies rather than let it flow to overseas platforms. She said Asean's 680 million-strong market gives the region bargaining power with global tech and AI firms if states act collectively, with the digital economy projected to expand from about US$300 billion to as much as US$2 trillion by 2030 if the Digital Economy Framework Agreement is implemented, with finalisation targeted for November. Speaking at the Asia Economic Summit in Jakarta alongside Singapore's Josephine Teo, she said: \"This is the chapter where South-east Asia stops being just a market.\" She linked the strategy to President Prabowo's agenda and stressed AI sovereignty, saying: \"Sovereignty, when done well, is not about building walls.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Asean must retain more value as its digital economy races towards US$2 trillion: Indonesian minister.pdf"}, {"id": "bt-03", "title": "China's central bank hints at shift towards overnight policy rate to match global peers", "source": "BT", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "PBOC governor Pan Gongsheng signalled at the Lujiazui Forum in Shanghai that the central bank will improve adjustment of short-term rates and expand overnight reverse repo operations, a move towards an overnight policy rate that would bring it closer to peers like the US Federal Reserve. Pan said the PBOC will set temporary overnight repo and reverse repo rates at 25 basis points above and below the seven-day reverse repo rate, narrowing the interest-rate corridor to 50 basis points from 70. Standard Chartered's Becky Liu said the overnight repo rate is the likely new de facto policy rate and interbank rates will be less volatile. The PBOC last cut its seven-day rate by 10 basis points to 1.4 per cent in May 2025, with many economists now pushing back the next cut to 2027 as factory-gate inflation picks up on the Iran war and higher oil prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/China's central bank hints at shift towards overnight policy rate to match global peers.pdf"}, {"id": "bt-04", "title": "Circular water economies will power South-east Asia's growth story", "source": "BT", "date": "18 Jun 2026", "tags": ["Environment", "Southeast Asia", "Energy"], "summary": "During Singapore International Water Week, attention focused on water security as cities such as Jakarta, Bangkok and Manila face demand exceeding infrastructural capacity amid urbanisation, industrial expansion and climate change. The circular water economy is gaining strategic importance, with Singapore's NEWater programme cited as the region's clearest example of transforming treated wastewater into high-grade reclaimed water via membrane filtration, reverse osmosis and UV disinfection. Other paths include Thailand's Eastern Economic Corridor industrial reuse, Vietnam's IoT smart metering in Ho Chi Minh City, Indonesia's Citarum River revitalisation and Malaysia's Pasir Gudang eco-industrial parks and Kuala Lumpur Smart Tunnel. Authors Cecilia Tortajada and Asit K Biswas argue Asean must treat water circularity as a critical pillar of economic resilience despite fragmented governance and financing constraints.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Circular water economies will power South-east Asia's growth story.pdf"}, {"id": "bt-05", "title": "CSE Global independent director quits after clashes with chairman Eugene Lai over board refresh", "source": "BT", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Technology systems integrator CSE Global disclosed exchanges between chairman Eugene Lai and former independent director Tan Chian Khong over governance and board renewal that led to Tan's Jun 2 resignation from lead independent director, audit committee chairman and nominating committee chairman roles. Tan said Lai, who also chairs controlling shareholder Heliconia Capital Management, requested his resignation during a May 19 call, which Tan refused, calling it a breach of good governance; Lai said he was transparently sharing a view that the company needed a board refresh with M&A experience, not an explicit direction to resign. Tan also alleged repeated attempts to pressure the audit committee into punitive action against a senior manager, which Lai disputed. CSE said the disagreements had no material adverse impact and that four of its seven remaining directors are independent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/CSE Global independent director quits after clashes with chairman Eugene Lai over board refresh.pdf"}, {"id": "bt-06", "title": "Economists raise inflation projections, lower growth forecasts in first MAS survey since Iran war", "source": "BT", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The MAS quarterly survey of professional forecasters raised 2026 median headline inflation to 2.3 per cent and core to 2 per cent, both up from 1.5 per cent in March, while trimming full-year growth to 3.5 per cent from 3.6 per cent. Most respondents still expect MAS to hold policy in July, but the share expecting tightening via a steeper S$NEER slope rose to 38.1 per cent from 23.5 per cent. Prolonged or escalating Middle East conflict was the top downside risk cited by 85 per cent of respondents, while the tech cycle was cited by all as an upside risk. DBS's Chua Han Teng said the projections reflect a resilient economy, while OCBC's Selena Ling flagged \"healthy scepticism\" about the reported US-Iran deal's sustainability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Economists raise inflation projections, lower growth forecasts in first MAS survey since Iran war.pdf"}, {"id": "bt-07", "title": "HSBC, Google AI partnership set to add over US$100 million gains", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "HSBC Holdings said it will use Alphabet's Google Cloud to roll out AI across its global operations, expecting each project to generate more than US$100 million in revenue or efficiency gains. The multi-year partnership will enable more than 200 new AI use cases over the next two years, drawing on Google's agentic capabilities including Gemini models and the Gemini Enterprise Agent Platform. The bank is weighing cutting about 20,000 roles, an estimated 10 per cent of its workforce, in coming years as a result of AI, though CEO Georges Elhedery said people will remain central to banks. The move follows comments from JPMorgan's Jamie Dimon, Citigroup's Jane Fraser and Goldman Sachs' John Waldron on AI's impact on jobs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/HSBC, Google AI partnership set to add over US$100 million gains.pdf"}, {"id": "bt-08", "title": "If Brussels starts a trade war, Beijing will finish it", "source": "BT", "date": "18 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Ahead of a Jun 18 to 19 EU leaders' meeting in Brussels to decide how to confront China on trade, this Financial Times commentary warns Europe against aggression towards an opponent with superior firepower. It recounts a table-top simulation of an EU-China trade war in which a Commission strategy to threaten tariffs and target China's dependence on Dutch firm ASML's lithography machinery was undercut by caution from Germany and Spain, and met with Chinese threats to cut off rare earths. The author notes a \"timeline disconnect\": cutting China off from lithography takes months, but Beijing can weaponise rare earths to hurt European car production within weeks. It concludes there is no real answer except the EU building a more resilient industrial sector and reducing rare-earths dependence over years or decades.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/If Brussels starts a trade war, Beijing will finish it.pdf"}, {"id": "bt-09", "title": "Iran deal includes US$300 billion fund, more than half of which already committed: source", "source": "BT", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy", "Finance & Markets"], "summary": "A US$300 billion private investment fund to trigger investment into Iran is outlined in the US-Iran framework agreement, with more than half already committed entirely from private-sector funds, a source told Reuters. To be named the Reconstruction and Development Fund, it is designed to give both sides an economic incentive to conclude a final deal to end the war, ahead of a planned Friday Jun 19 signing. Companies from the US, Gulf Arab states, Asia, South America and Africa have agreed to commit financing across energy, logistics, manufacturing and transport, with firms from South Korea, Japan, Singapore and Malaysia among those named. Iran originally sought US$400 billion as war-damage compensation; the fund will not become operational until a final deal is concluded, with a 60-day memorandum structuring the process covering nuclear, sanctions and regional security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Iran deal includes US$300 billion fund, more than half of which already committed: source.pdf"}, {"id": "bt-10", "title": "Keppel bags fourth fibre pair deal on Bifrost Cable System with 'global technology leader'", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Asset manager Keppel said it secured a deal for the fourth of five fibre pairs on the Bifrost Cable System via an indefeasible right of use contract through its connectivity division, with the counterparty described only as a \"global technology leader\". The transpacific Bifrost cable spans more than 20,000 km, connecting Singapore to the US West Coast via the Java and Celebes seas, supports AI workloads and cloud-native platforms, and began carrying commercial traffic in December after being declared ready for service in October 2025. Keppel expects an internal rate of return of about 30 per cent for the overall project, holding its investment through a 40-60 joint venture with private fund co-investors under its asset-light model. The group is in active discussions for the fifth fibre pair and is progressing on its next cable system, with shares up 1.9 per cent at S$11.42.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Keppel bags fourth fibre pair deal on Bifrost Cable System with 'global technology leader'.pdf"}, {"id": "bt-11", "title": "Malaysian tycoon Vincent Tan's sell-downs point to pruning rather than an exit plan", "source": "BT", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Malaysian tycoon Vincent Tan, ranked 29th on Forbes' 2026 list of Malaysia's richest with an estimated US$940 million net worth, has sparked market curiosity with stake reductions across Berjaya-linked companies including Berjaya Corp, Berjaya Food, Redtone Digital and 7-Eleven Malaysia. Analysts at Tradeview Capital and Spartan Ives Advisory read the moves as strategic portfolio pruning and ownership restructuring rather than a cash-out exit, with investment vehicle Detik Ria emerging as a substantial shareholder. The deals cut Tan's direct Berjaya Corp stake to 4.1 per cent and deemed interest to about 11 per cent, down from around 23 per cent, before he bought 60 million shares on Jun 8 to restore his substantial-shareholder status. The article frames the transactions as part of a years-long shift to a post-founder phase, with children Robin, Nerine, Chryseis, Rayvin and Tan U-Ming assuming key roles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Malaysian tycoon Vincent Tan's sell-downs point to pruning rather than an exit plan.pdf"}, {"id": "bt-12", "title": "Next advantage for Asean firms lies in ability to operate amid uncertainty: BT regional survey", "source": "BT", "date": "18 Jun 2026", "tags": ["Southeast Asia", "Technology & AI", "Trade"], "summary": "At the launch of The Business Times' inaugural Asean Intelligence 2026 report in Jakarta, BT editor Chen Huifen said Asean is now the primary base for the next phase of growth and that the advantage goes to firms that can operate amid instability. Commissioned from Kantar, the study polled more than 500 C-suite leaders across the Asean-6 in two waves and found the widest divide between opportunity and trust lies in regional markets, rooted in regulatory uncertainty and fragmentation. On AI, the top investment theme, about 45 per cent of respondents are \"first movers\", 42 per cent \"pragmatic optimisers\" and 13 per cent \"cautious traditionalists\", with 70 per cent of Indonesian firms feeling pressure to transform. An overwhelming majority plan to allocate new capital within Asia, with interest in the US and Europe slipping and China ranking third.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Next advantage for Asean firms lies in ability to operate amid uncertainty: BT regional survey.pdf"}, {"id": "bt-13", "title": "Singapore to advance AI agenda as Asean chair, focus on cross-border data flows, smaller firms", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Southeast Asia", "Politics"], "summary": "Singapore's Minister for Digital Development and Information Josephine Teo said that when the Republic assumes the Asean chairmanship in 2027 it will advance shared AI priorities centred on encouraging adoption, investing in shared digital public goods, deepening cross-border data-flow mechanisms and aligning regional AI governance. Speaking at the Asia Economic Summit in Jakarta, she identified two pitfalls: data policies, where onerous regulations may hamper innovation and hit small firms, and AI sovereignty, which she said is unrealistic to frame as a race to own the entire AI stack. Teo said national goals should balance using and governing AI for the public good, autonomy over sources and partnerships, and anchors to broaden AI ecosystems. Indonesia's Meutya Hafid shared similar concerns, citing use of AI in social-assistance programmes to reach rural communities.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Singapore to advance AI agenda as Asean chair, focus on cross-border data flows, smaller firms.pdf"}, {"id": "bt-14", "title": "Singapore's Sea tests AI chatbot Migoo in quiet US foray", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Southeast Asia", "Finance & Markets"], "summary": "Singapore's Sea is rolling out a generative-AI companion chatbot called Migoo in regions including the US, marking its maiden foray into the American consumer market, though the app does not mention Sea's ownership. Migoo integrates into platforms like Apple's iMessage and operates in the US under Marvelous Technology, registered to a proxy address in Sacramento and linked to a Singapore entity. The operator of Shopee and Garena has seen its shares fall more than 40 per cent over the past year, trailing Asian peers Alibaba and Tencent in AI, after CEO Forrest Li said a trillion-US-dollar market cap was possible if it doubled down on AI. The stealth playbook resembles ByteDance's Gauth and Alibaba's Happy Oyster, while Shopee is cutting hundreds of developer jobs globally, about 8 per cent of the unit's developer workforce.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Singapore's Sea tests AI chatbot Migoo in quiet US foray.pdf"}, {"id": "bt-15", "title": "The US-Iran deal is foreign policy realism at work", "source": "BT", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "This commentary argues the US-Iran interim agreement, finalised as a memorandum of understanding announced by President Trump on Jun 14 with formal signing scheduled Jun 19 in Geneva, is a significant accomplishment of foreign-policy realism despite being incomplete. It would remove the US naval blockade of Iranian ports, extend the ceasefire and restore shipping through the Strait of Hormuz, through which roughly a fifth of the world's oil and LNG had flowed before the conflict closed it. The author credits Pakistan and Oman-mediated talks as multilateral diplomacy functioning as it should, and frames the deal as sequencing that stops the bleeding before tackling harder nuclear questions over a 60-day window. It concludes the deal is \"the art of the possible\", which has always been the art of statesmanship.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/The US-Iran deal is foreign policy realism at work.pdf"}, {"id": "bt-16", "title": "Trump's renewed tariffs will likely expedite Asean integration", "source": "BT", "date": "18 Jun 2026", "tags": ["Trade", "Southeast Asia", "Geopolitics"], "summary": "This commentary argues that the White House's accelerating efforts to rebuild President Trump's tariff wall will likely expedite Asean integration while threatening to hurt the region's ties with the US. It notes that at the start of 2026 researchers at the Yale University Budget Lab calculated the overall average effective US tariff rate had jumped to its highest level since at least the Great Depression of the 1930s. The piece points to the US Supreme Court's February ruling that struck down most of Trump's so-called reciprocal and fentanyl tariffs, finding a president cannot use the International Emergency Economic Powers Act to implement them. The political agenda behind the renewed levies is framed as a risk to US-Asean relations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Trump's renewed tariffs will likely expedite Asean integration.pdf"}, {"id": "bt-17", "title": "Why middle management isn't 'safe' from AI displacement", "source": "BT", "date": "18 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "This commentary argues a \"careerquake\" is hitting middle management as agentic AI absorbs roles such as programme directors, regional operations leads and transformation managers, often without AI being named as the reason on redundancy letters. It cites Meta's late-May retrenchment of more than 8,000 employees amid over US$100 billion in 2026 AI capex, and notes Singapore's 2025 PMET retrenchment incidence of 10.1 per 1,000 employees, well above the economy-wide 6.3, attributed to reorganisation rather than poor performance. Forward-looking MOM data showed the share of firms planning to hire fell from 54.6 to 44.6 per cent between February and March. The writer, founder of Careerquake, urges Singapore to build visibility into workforce impact, citing its Model AI Governance Framework for Agentic AI and the Economic Strategy Review's call for earlier intervention.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/18 Jun 2026/18 Jun BT/Why middle management isn't 'safe' from AI displacement.pdf"}, {"id": "scmp-01", "title": "Alibaba Cloud launches data centres in France amid Europe's data sovereignty push", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Alibaba Cloud launched its first French data centres in Paris, its third European hub after Germany and Britain, responding to rising demand amid the continent's data sovereignty push. CTO Feifei Li said the move reinforces a commitment to \"sovereign, secure, and intelligent solutions\" as the firm plans agentic AI services across Europe in the second half. Despite ranking fourth globally by revenue, Alibaba Cloud remains small in a region where AWS, Azure and Google Cloud hold about 70 per cent. Its Cloud Intelligence Group revenue rose 38 per cent to 41.6 billion yuan in Q1; Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Alibaba%20Cloud%20launches%20data%20centres%20in%20France%20amid%20Europe%E2%80%99s%20data%20sovereignty%20push.pdf"}, {"id": "scmp-02", "title": "As the Iran war comes to a close, is the US pulling warships back to the west Pacific", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "The US Navy redeployed the USS Boxer amphibious assault ship and USS Portland, originally bound for the Middle East, to the South China Sea, signalling a refocus on the Pacific as the Iran war winds down. The Boxer joined the George Washington carrier strike group and carries F-35B fighters, Ospreys and the 11th Marine Expeditionary Unit of over 2,000 personnel. Analyst Collin Koh said the move signals US force levels in the theatre have \"returned to some form of normalcy\" to reassure allies unsettled by the earlier diversion of the Tripoli group. The Pentagon also renamed Indo-Pacific Command back to US Pacific Command.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/As%20the%20Iran%20war%20comes%20to%20a%20close,%20is%20the%20US%20pulling%20warships%20back%20to%20the%20west%20Pacific.pdf"}, {"id": "scmp-03", "title": "Can Chinese silicon replace Nvidia? Here are 5 AI models trained on local chips", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Technology & AI"], "summary": "Chinese AI labs are increasingly shifting earlier model training phases onto domestic chips, though none of China's top models are known to have been pre-trained on homegrown silicon. Zhipu AI's GLM-Image was trained entirely on Huawei Ascend hardware; Meituan's trillion-parameter LongCat-2.0 used 50,000-60,000 domestic chips; and ModelBest's BitCPM-CANN ran on Ascend, with the firm declaring \"domestic chips can only run inference\" a thing of the past. Huawei conducted full-parameter post-training for the 1.6-trillion-parameter DeepSeek-V4-Pro on 1,000-plus chips, while Peking University's EvoPhys-World used Moore Threads GPUs. Pre-training remains the unconquered, most demanding frontier; Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Can%20Chinese%20silicon%20replace%20Nvidia?%20Here%20are%205%20AI%20models%20trained%20on%20local%20chips.pdf"}, {"id": "scmp-04", "title": "China accelerates digital yuan push as 26 banks join new cross-border platform", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China onboarded a first batch of 26 domestic and overseas financial institutions to its Cross-border e-CNY Transfer Services (CBETS) platform, managed by the People's Bank of China, advancing digital yuan adoption. Participants include Chinese bank branches in Brazil, Qatar, Thailand, Hong Kong and Macau, plus Standard Chartered's China unit, who gain direct access to the cross-border network and reduced reliance on intermediaries. CBETS sits alongside the CIPS system as Beijing seeks to cut reliance on the US dollar-based financial order. As of November, nearly 3.5 billion digital yuan transactions worth around 16.7 trillion yuan had been processed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/China%20accelerates%20digital%20yuan%20push%20as%2026%20banks%20join%20new%20cross-border%20platform.pdf"}, {"id": "scmp-05", "title": "China mulls space-based control system for high-speed rail. Can it be hacked?", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Beijing railway researchers from CRSC have proposed a space-based train control system using low-orbit satellites to govern China's high-speed rail, aiming to prevent disasters like the 2011 Wenzhou crash that killed 40. A paper in Railway Signalling and Communication Engineering warns hackers could inject false movement authorities to crash trains, spoof position reports, or seize satellites designed with a \"function first, security later\" philosophy. The team proposed defences including military-grade encryption, cross-checking against inertial sensors and track circuits, and trusted computing. Analysts note host nations plugging into a Chinese-controlled network would cede control, echoing disputes over 5G and undersea cables.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/China%20mulls%20space-based%20control%20system%20for%20high-speed%20rail.%20Can%20it%20be%20hacked?.pdf"}, {"id": "scmp-06", "title": "China pledges support for trading of treasury bond futures in Hong Kong", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Finance & Markets"], "summary": "CSRC chairman Wu Qing said Beijing would support Hong Kong launching five-year Chinese government bond futures in the near term, easing long-term yuan allocations for overseas investors and advancing yuan internationalisation. Hong Kong Financial Secretary Paul Chan said the product would align with Bond Connect and Swap Connect to form a comprehensive risk-management suite, while the SFC said a timetable would be announced soon. The move aims to retain investors who have rotated to South Korea and Taiwan, as demand for yuan assets rises amid Middle East tensions and US fiscal stress. Wu also signalled Beijing may let select Hong Kong firms raise funds on mainland exchanges.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/China%20pledges%20support%20for%20trading%20of%20treasury%20bond%20futures%20in%20Hong%20Kong.pdf"}, {"id": "scmp-07", "title": "China vows new legal shield that could counter US sanctions and protect finance", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Vice-Premier He Lifeng told the Lujiazui Forum that China would incorporate blocking and countermeasure provisions into upcoming financial legislation to counter improper extraterritorial sanctions. \"We don't stir up trouble ... but we are absolutely not afraid of it,\" he said, after Washington blacklisted Alibaba, BYD, Baidu and others over alleged military ties, and sanctioned Chinese refineries buying Iranian crude. He warned that \"unilateralism, protectionism and the law of the jungle are destined to lead nowhere\" and pledged support for Shanghai to diversify marine-insurance products. His appearance marked the first vice-premier at the forum since 2019; Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/China%20vows%20new%20legal%20shield%20that%20could%20counter%20US%20sanctions%20and%20protect%20finance.pdf"}, {"id": "scmp-08", "title": "'Climate change in trade' battle lines drawn on Europe's new China strategy", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "EU leaders meet in Brussels to debate a possible new China policy, listed cryptically as \"global macroeconomic imbalances\" to avoid naming Beijing and provoking retaliation. Consultant Joerg Wuttke said Paris-Berlin distrust hampers a coherent plan, warning \"China is a climate change in trade,\" while shifting positions in Czech Republic, Lithuania, Belgium and Hungary have redrawn the policy map. Germany remains the decisive brake, though Chancellor Merz is reportedly convinced China Shock 2.0 drove industrial malaise, with research showing 400,000 lost German jobs. A coalition including Paris, Rome and Warsaw, representing 41 per cent of EU population, backs trade safeguards.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/%E2%80%98Climate%20change%20in%20trade%E2%80%99%20battle%20lines%20drawn%20on%20Europe%E2%80%99s%20new%20China%20strategy.pdf"}, {"id": "scmp-09", "title": "Despite Trump's promise of Iran peace, analysts say vague deal wobbly at best", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Trump framed his Iran accord as a major win at a G7 press conference in France, vowing to bomb Tehran if it fails to comply, after the 14-point Islamabad MOU's terms were finally released. The deal declares permanent termination of military operations, ends blockades, and works to return at least US$300 billion in seized funds, with a final deal due within 60 days. Trump praised Xi Jinping as \"totally neutral\" and Putin as \"very neutral,\" while knocking allies Japan and Britain for not contributing hardware. Analysts called the framework \"wobbly at best\" and \"intentionally ambiguous\"; Republicans Cruz and Cassidy condemned releasing Iranian funds.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Despite%20Trump%E2%80%99s%20promise%20of%20Iran%20peace,%20analysts%20say%20vague%20deal%20wobbly%20at%20best.pdf"}, {"id": "scmp-10", "title": "Iran and US sign peace deal, Strait of Hormuz to reopen immediately, Pakistan says", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Pakistan's Prime Minister Shehbaz Sharif announced that Iran and the US signed a peace deal taking immediate effect, with Iran reopening the Strait of Hormuz and the US lifting its naval blockade. Sharif, a chief mediator, said the memorandum was \"signed by honourable Presidents of both the countries\" and endorsed by him. A US-Iran delegation meeting headed by Vance and Ghalibaf is still expected Friday in Switzerland, with negotiations to reach a final deal within a maximum 60 days. The US will terminate all sanctions and unfreeze Iranian assets, fully removing the blockade within 30 days; a video showed Trump signing at Versailles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Iran%20and%20US%20sign%20peace%20deal,%20Strait%20of%20Hormuz%20to%20reopen%20immediately,%20Pakistan%20says.pdf"}, {"id": "scmp-11", "title": "Europe rallies around tough new China strategy ahead of key summit", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "A broad coalition of EU members is converging on urgent action to prevent Chinese-driven European deindustrialisation ahead of a key Brussels summit, multiple sources said. One proposed tool is modelled on Trump's Section 301 tariffs, first floated by Macron, alongside a diversification instrument and protective measures, with the EU goods trade deficit with China up about 15 per cent between 2024 and 2025. Merz, who said the yuan was \"undervalued by 20 to 30 per cent,\" has reportedly shifted Berlin's stance, while EPP leader Weber called the deficit \"unacceptable\" and proposed \"economic Nato\" thinking with the US. A Bertelsmann survey found 77 per cent of EU citizens back reducing dependency on China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Europe%20rallies%20around%20tough%20new%20China%20strategy%20ahead%20of%20key%20summit.pdf"}, {"id": "scmp-12", "title": "Exclusive: Why deeper China ties matter as Europe seeks to power its AI ambitions beyond America", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Christian Noyer, a founding ECB vice-president and former Bank of France governor, told the SCMP that Europe should welcome more Chinese investment and deepen industrial partnerships to reduce dependence on US technology. \"We cannot rely entirely on America,\" he said, arguing joint ventures and co-investment offer a more sustainable path than China simply exporting to the extreme. Lead author of a 2024 capital-markets report, Noyer said France has talent, research and nuclear power to build competitive AI, naming Mistral, and cited the US, China and France in AI mastery. He described Hong Kong as \"a fantastic gateway\" and said EU market reforms could finish before year-end.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Exclusive%20Why%20deeper%20China%20ties%20matter%20as%20Europe%20seeks%20to%20power%20its%20AI%20ambitions%20beyond%20America.pdf"}, {"id": "scmp-13", "title": "Japan failed to build its own airliner. Now it's turning to Boeing", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "After scrapping its SpaceJet airliner programme at a cost of around 1 trillion yen, Japan is pinning hopes on a potential Boeing partnership to rebuild a civil aviation sector and bridge the technology gap with China. Tokyo outlined a 2024 strategy to invest 5 trillion yen over a decade with a target to launch an aircraft by 2035, seeking a \"true hinomaru jet.\" Analyst Lance Gatling cited \"techno-nationalism\" and noted about one-third of every Boeing 787 uses Japanese components from Kawasaki, Mitsubishi and Subaru. With the 737 nearing retirement, a replacement could cost US$12-20 billion; analyst Stephen Nagy said China's scale advantage forces Japan to cooperate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Japan%20failed%20to%20build%20its%20own%20airliner.%20Now%20it%E2%80%99s%20turning%20to%20Boeing.pdf"}, {"id": "scmp-14", "title": "New UK party emerges as a threat to Farage. And it's even more far-right", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Politics", "Society"], "summary": "A new party called Restore Britain, led by businessman and ex-football chairman Rupert Lowe with Elon Musk's backing, threatens Nigel Farage's Reform UK ahead of a Makerfield by-election. Lowe, Restore's sole MP after splitting from Reform, takes a tougher anti-immigrant stance, with pollsters expecting his candidate to take 5-8 per cent and potentially deny Reform victory over Labour's Andy Burnham. The party's headline policy is mass deportations, plus banning the burka and a death-penalty referendum; author Daniel Trilling called its position \"openly ethno-nationalist.\" Musk, who promotes Lowe's posts to 240 million followers, tweeted that \"only Restore Britain can save Britain.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/New%20UK%20party%20emerges%20as%20a%20threat%20to%20Farage.%20And%20it%E2%80%99s%20even%20more%20far-right.pdf"}, {"id": "scmp-15", "title": "Shanghai to lead 'financial superpower' push as China unveils plan to boost yuan use", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Finance & Markets"], "summary": "PBOC governor Pan Gongsheng told the Lujiazui Forum that China would accelerate Shanghai's transformation into a global financial hub and encourage overseas yuan adoption, touting China's stability amid market volatility. He announced a pilot for offshore-yuan FX trading in Shanghai, repurchase facilities for overseas central banks using Chinese government bonds, and authorisation of six lenders to trade offshore yuan in the Free Trade Zone. Overseas institutions held 3.12 trillion yuan in China's interbank bond market by end-April, and fresh QDII quotas will be issued this fall. Pan said the PBOC would shift towards a price-based monetary framework centred on the seven-day reverse repo rate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Shanghai%20to%20lead%20%E2%80%98financial%20superpower%E2%80%99%20push%20as%20China%20unveils%20plan%20to%20boost%20yuan%20use.pdf"}, {"id": "scmp-16", "title": "The US and Iran publish their official agreement. Here's what's in it", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "A senior US official released the text of the 14-point \"Islamabad Memorandum of Understanding\" between Washington and Tehran following days of outcry over the Trump administration's lack of transparency. The MOU declares immediate and permanent termination of military operations including in Lebanon, commits to a final deal within 60 days, and has the US fully end its naval blockade within 30 days. The US will develop a plan with at least US$300 billion for Iran's reconstruction, terminate all sanctions including UN resolutions, and unfreeze Iranian funds, while Iran reaffirms it will not develop nuclear weapons and agrees to down-blend enriched material under IAEA supervision. The final deal will be endorsed by a binding UNSC resolution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/The%20US%20and%20Iran%20publish%20their%20official%20agreement.%20Here%E2%80%99s%20what%E2%80%99s%20in%20it.pdf"}, {"id": "scmp-17", "title": "The white paper making China's case for new rules for the world's new frontiers", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "China released a white paper titled \"More Just and Equitable Global Governance,\" pitching itself as a champion of rule-making for new frontiers including AI and outer space while upholding the UN's central role. Top diplomat Wang Yi warned the post-WWII system sits at a \"critical crossroads,\" saying \"the ship of human civilisation has entered dangerous waters,\" and called for governing frameworks for outer space, polar regions and cyberspace. The paper said China saw no need to \"rebuild\" or \"replace\" the existing system, but accused \"certain countries\" of being the world's largest source of turbulence. China is accelerating a World AI Cooperation Organisation; one expert said a fairer system may not emerge until around 2050.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/The%20white%20paper%20making%20China%E2%80%99s%20case%20for%20new%20rules%20for%20the%20world%E2%80%99s%20new%20frontiers.pdf"}, {"id": "scmp-18", "title": "Trump likes Canada's Chinese EV deal, Carney says after chat caught on hot mic", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Trade", "Politics"], "summary": "Canadian Prime Minister Mark Carney said Trump is happy with Canada's arrangement allowing capped Chinese EV imports at a low tariff, after a hot mic captured their G7 conversation in Evian. The deal, unveiled during Carney's January Beijing trip, allows up to 49,000 Chinese EVs per 12-month period at around 6 per cent tariff, down from over 100 per cent previously. \"He likes the structure, actually,\" Carney said, though Trump later said only \"I could understand that\" and that he would rather see a cap than no cap. Trump's administration has kept its 100 per cent tariff on Chinese EVs; Carney downplayed expectations for quick Chinese investment and ruled out knockdown kits.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Trump%20likes%20Canada%E2%80%99s%20Chinese%20EV%20deal,%20Carney%20says%20after%20chat%20caught%20on%20hot%20mic.pdf"}, {"id": "scmp-19", "title": "Trump says Japan 'doing very well' under his 'biggest fan' Takaichi", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Trump praised Japanese Prime Minister Takaichi after the G7 summit in Evian-les-Bains, saying \"Japan's doing very well\" and that she thinks he did a great job. His comments came after he was asked whether he had urged G7 members including Britain, Germany and Japan to send forces over the Strait of Hormuz, which had been effectively closed since US and Israeli strikes on Iran in late February. Takaichi, Japan's first female prime minister, has refrained from criticising Trump and earlier told him he was \"the only person who can bring peace and prosperity across the world.\" Trump said Japan was not willing to get involved during the war, adding \"Nobody did. We did it ourselves with Israel.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%2
