Wars in the Middle East and Ukraine exposed how multimillion-dollar Patriots are being wasted on drones costing a few thousand dollars. Firms are using off-the-shelf parts and automated manufacturing to cut prices to tens of thousands.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/America%20Downs%20Cheap%20Drones%20With%20Million-Dollar%20Missiles.%20A%20Fix%20Is%20In%20the%20Works..pdf"}, {"id": "wsj-04", "title": "America Has a Credit Card Problem, Just Not the One You Think", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "A New York Fed gauge shows credit-card balances 90 days or more delinquent topped 13% in Q1, near the post-2008 peak, stoking fears the US consumer is maxed out. But card debt today differs from 2008: at about $1.3 trillion total, the average household holds roughly $11,500, nearly $1,600 less in inflation-adjusted terms than the 2007 peak. Debt-service payments were 5.4% of disposable income in Q4 versus well over 7% twenty years earlier. A separate Fed metric shows under 3% of balances 30 days past due, below 2007 levels, suggesting the alarm is overstated.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/America%20Has%20a%20Credit%20Card%20Problem%2C%20Just%20Not%20the%20One%20You%20Think.pdf"}, {"id": "wsj-05", "title": "Anthropic Dispatches Staff to D.C., Racing to Resolve AI Export Restrictions", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Politics", "Geopolitics"], "summary": "Anthropic dispatched top technical staff to Washington over the weekend to resolve a Trump administration ban barring foreign governments, companies and individuals from using its Fable 5 and Mythos 5 models, which forced the firm to shut off access to everyone to comply. Hours of Saturday calls involved Commerce Secretary Howard Lutnick, National Cyber Director Sean Cairncross, co-founder Tom Brown and policy head Sarah Heck. Cybersecurity notables signed a letter saying the action \"has taken the best models away from defenders\" and risked America's AI leadership. Both sides want to restore access but a solution remains unclear.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Anthropic%20Dispatches%20Staff%20to%20D.C.%2C%20Racing%20to%20Resolve%20AI%20Export%20Restrictions.pdf"}, {"id": "wsj-06", "title": "As Kevin Warsh Arrives, Expect Him to Move Slowly", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Alan Blinder predicts the FOMC under new chairman Kevin Warsh will leave interest rates unchanged at its June 16-17 meeting, his first in the role. The gathering is notable as former chairman Jerome Powell stays on as an ordinary governor, a rare event. Blinder credits Powell with standing up to Trump's bullying and a \"ludicrous attempt to indict the chairman,\" defending Fed independence. Powell's term ended with the most divided FOMC of his chairmanship, with three regional presidents dissenting in late April.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/As%20Kevin%20Warsh%20Arrives%2C%20Expect%20Him%20to%20Move%20Slowly.pdf"}, {"id": "wsj-07", "title": "Coders Were Tech's MVPs. Now They're Fighting to Stay in the Game.", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Software engineers, once tech's prized hires, now face unfamiliar vulnerability as AI trained to code, post-pandemic layoffs and reduced remote-work perks reshape the field. Christopher Pack, who landed a Bay Area job in 2022, says he feels like he \"got on the last plane out of Vietnam\" and doubts he can plan a normal-length career. Job openings for software developers through late May are down about 70% from the 2022 peak, per Indeed, and remain below pre-Covid levels even as overall postings rose. The AI boom still creates openings for experienced developers who can steer and debug AI coding output.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Coders%20Were%20Tech%27s%20MVPs.%20Now%20They%27re%20Fighting%20to%20Stay%20in%20the%20Game..pdf"}, {"id": "wsj-08", "title": "Emboldened by SpaceX, Investors Are Piling Into All Things Space", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SpaceX's record IPO, which drew $75 billion from public-market investors, has supercharged a broader space-investing rush. Venture funding for US space firms excluding SpaceX jumped to $7.1 billion in 2025 from $2.5 billion a year earlier, per PitchBook. Recent rounds include Northwood Space's $100 million, CesiumAstro's $470 million in equity and financing, and Tom Mueller's $500 million for Impulse Space. \"Investors are finding there are real business models in space and money to be made,\" said Astranis CEO John Gedmark.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Emboldened%20by%20SpaceX%2C%20Investors%20Are%20Piling%20Into%20All%20Things%20Space.pdf"}, {"id": "wsj-09", "title": "Europe's Arms Race Is Creating Boomtowns. Why Are Locals So Unhappy?", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Defence", "Society", "Geopolitics"], "summary": "Europe's defense boom, meant to revive struggling towns, is instead sparking division and resentment. In Barrow-in-Furness, a multibillion-dollar nuclear-submarine contract has highlighted inequality and pulled workers from other professions, while residents of Bergerac complain a revamped explosives factory delivered only empty promises and drones overhead. The tensions create headwinds for leaders urging more defense spending against Russia and China at the expense of social programs. UK Defense Secretary John Healey resigned in protest of insufficient military funding proposed by Prime Minister Keir Starmer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Europe%27s%20Arms%20Race%20Is%20Creating%20Boomtowns.%20Why%20Are%20Locals%20So%20Unhappy.pdf"}, {"id": "wsj-10", "title": "Everyone Loves Chinese Cars, Except the Chinese", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Chinese vehicles are selling briskly almost everywhere except at home, where new-car sales fell 22% in May year-on-year to about 1.5 million, the eighth straight monthly decline. Weak domestic demand is pushing carmakers harder overseas: exports hit 784,000 cars in May, 75% more than a year earlier. Beijing's January cut to plug-in tax exemptions and trade-in subsidies, plus the Iran war's gasoline-price spike, hurt sales amid deflation and high youth unemployment. BYD's Q1 net profit roughly halved to about $590 million, its lowest since mid-2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Everyone%20Loves%20Chinese%20Cars%2C%20Except%20the%20Chinese.pdf"}, {"id": "wsj-11", "title": "Nvidia Is Developing an AI Healthcare Model With Startup Abridge", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI"], "summary": "Nvidia is partnering with Abridge, maker of an AI note-taking app for doctors, to train a healthcare model for clinical conversations used exclusively in Abridge's platform for tasks like decision support and documentation. The model will be built on Nvidia's open Nemotron models, with Abridge feeding de-identified clinical data to further customize them. The move follows Microsoft's collaboration with Mayo Clinic on a clinical AI model, as tech giants ramp healthcare investment. \"Nvidia has been known to be the AI company that works with every other AI company,\" said VP of healthcare Kimberly Powell.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Nvidia%20Is%20Developing%20an%20AI%20Healthcare%20Model%20With%20Startup%20Abridge.pdf"}, {"id": "wsj-12", "title": "Oil Executives Are Sounding the Alarm Over Dwindling Stockpiles", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Energy executives warn that dwindling oil stockpiles, drained for over 15 weeks while barrels stayed trapped behind the Strait of Hormuz, are nearing critical levels and could force prices to surge without fresh supply. Chevron's Mike Wirth has repeatedly flagged a looming supply crunch, while Exxon's Neil Chapman says the US is approaching \"unheard-of inventory levels.\" The US-Iran deal, set to be signed Friday in Switzerland, would reopen the strait through which 20% of the world's petroleum passes, but normalization could take months. Since late March the US drew about 66 million barrels from its Strategic Petroleum Reserve.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Oil%20Executives%20Are%20Sounding%20the%20Alarm%20Over%20Dwindling%20Stockpiles.pdf"}, {"id": "wsj-13", "title": "SpaceX's Retail-Powered Debut Helps Steady Shaky Markets", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX's smooth market debut Friday, valuing Elon Musk's company at $2.1 trillion, helped calm one of the year's most volatile weeks for markets. Do-it-yourself traders bought some $18 million of stock in the first 20 minutes, with net retail purchases reaching roughly $118 million, the biggest retail IPO in recent history per Vanda Research. One investor called it \"the ultimate FOMO IPO.\" The rally lifted banks, semiconductors and smaller companies, and analysts called the reception a good omen for two major AI IPOs expected later this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/SpaceX%27s%20Retail-Powered%20Debut%20Helps%20Steady%20Shaky%20Markets.pdf"}, {"id": "wsj-14", "title": "Tech's Next IPO Wave Promises a Charitable Windfall", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society", "Finance & Markets"], "summary": "Blockbuster IPOs from SpaceX, Anthropic and OpenAI are minting new millionaires and billionaires, promising a windfall for philanthropy. The foundation holding a 26% stake in OpenAI is expected to be worth around $180 billion, more than twice the Gates Foundation endowment, and has pledged at least $1 billion over the next year for causes like curing diseases. Daffy's Adam Nash predicts \"not just billions, but potentially tens of billions\" will flow into the charitable sector after the offerings. Experts point to the Facebook 2012 IPO as a template for the giving to come.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Tech%27s%20Next%20IPO%20Wave%20Promises%20a%20Charitable%20Windfall.pdf"}, {"id": "wsj-15", "title": "The Faulty Logic Behind the SpaceX Index Trade", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Finance & Markets"], "summary": "James Mackintosh argues the popular bet that SpaceX's fast-tracked entry into the Nasdaq-100 and other indexes guarantees \"free money\" is far weaker than usual because the IPO sits so close to index admission. Controversy preceded the listing over rule changes that admit SpaceX faster than normal, with only S&P among the big four resisting. The expected index buying is well understood by the bankers who set the $135-a-share price, so it should already be factored in. Friday's 19% pop reflects the customary IPO discount, leaving little extra to capture.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Faulty%20Logic%20Behind%20the%20SpaceX%20Index%20Trade.pdf"}, {"id": "wsj-16", "title": "The Iranian Enforcer Driving Tehran's Hard Bargaining With the U.S.", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ahmad Vahidi, commander in chief of the Islamic Revolutionary Guard Corps, has emerged as a key power broker pushing Tehran's hard line in talks with Washington. He advocated firing ballistic missiles at Israel to stop attacks on Hezbollah in Beirut, winning the argument over more moderate voices who feared jeopardizing a US deal that could save Iran's economy. The strikes were the first Iran-Israel exchanges since the April 8 ceasefire. As Trump signaled a preliminary deal was near, Iran pushed back on timing, with the Revolutionary Guard standing as the biggest obstacle to an agreement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Iranian%20Enforcer%20Driving%20Tehran%27s%20Hard%20Bargaining%20With%20the%20U.S..pdf"}, {"id": "wsj-17", "title": "The Kevin Warsh Era Begins at the Federal Reserve", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The WSJ editorial board argues new Fed chairman Kevin Warsh's first priority should be overhauling how the central bank communicates as he presides over his first FOMC meeting this week. It calls forward guidance one of the most counterproductive innovations since 2008, saying long statements, post-meeting press conferences and the quarterly Summary of Economic Projections have exposed how little the Fed understands the economy. The board recalls that until the 1990s the Fed cultivated \"an air of inscrutability,\" not even announcing rate changes. Warsh's broader reform list includes shrinking the balance sheet and keeping the Fed out of fiscal policy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Kevin%20Warsh%20Era%20Begins%20at%20the%20Federal%20Reserve.pdf"}, {"id": "wsj-18", "title": "The Race for Hypersonic Missiles", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "China fields roughly 600 hypersonic missiles per a leaked assessment, and Russia recently hit Kyiv with one, raising the question of whether America can catch up after a 2021 warning it was \"at least several years behind.\" Colorado's Ursa Major, founded by a former SpaceX and Blue Origin engineer, is helping close the gap, having pivoted from commercial launch to defense after funding dried up in 2023. The roughly 350-person firm uses additive manufacturing to 3-D print complex rocket engines able to withstand extreme pressure and temperature. The Air Force has asked it to develop an innovative liquid-fuel rocket design for the effort.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Race%20for%20Hypersonic%20Missiles.pdf"}, {"id": "st-01", "title": "AI job cuts are landing hardest in UK, Morgan Stanley says", "source": "ST", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Morgan Stanley research found the UK is losing more jobs than it creates from AI, and faster than international peers. British firms reported AI led to 8% net job losses over the past 12 months, the highest in a group including German, American, Japanese and Australian companies and twice the international average. UK firms saw an average 11.5% productivity boost, similar to US counterparts, yet US firms created more jobs than they cut. The losses come as Britain battles payroll costs, slow growth and unemployment near a five-year high, with software developer and consultant roles scaled back fastest.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/AI%20job%20cuts%20are%20landing%20hardest%20in%20UK%2C%20Morgan%20Stanley%20says.pdf"}, {"id": "st-02", "title": "Back to square one? A US-Iran 'deal' that resolves little and could make things worse", "source": "ST", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Jonathan Eyal argues the US-Iran memorandum of understanding, hailed by Trump as a \"peace deal,\" resolves none of the parties' differences and is merely a starting point for likely inconclusive talks. He says the two sides will be lucky if the MOU lasts 60 days without bloodshed, and that history may remember it as heralding the decline of American credibility in the Middle East. Trump attacked Iran on Feb 28 demanding it surrender nuclear capabilities, accept missile limits and drop support for proxies. The MOU fails on all three and even reinforces Iran's alliance with Hezbollah by tying a Gulf ceasefire to Israel halting attacks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Back%20to%20square%20one%20A%20US-Iran%20%27deal%27%20that%20resolves%20little%20and%20could%20make%20things%20worse.pdf"}, {"id": "st-03", "title": "China says military growth aids world peace, slamming Australia strike report", "source": "ST", "date": "16 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "China said on June 15 that strengthening its military benefits world peace, rejecting a Lowy Institute report warning the threat of a direct Chinese strike on Australia is growing. The Sydney-based report said Beijing is capable of a missile strike on Australia as it amasses long-range and hypersonic weapons and builds South China Sea islands, citing the DF-27 missile's 5,000km-8,000km range. \"The growth of China's military strength represents an increase in the forces for world peace,\" said Foreign Ministry spokesman Lin Jian, who urged institutions to stop \"hyping up the so-called China threat.\" The report said it assessed capability, not intentions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/China%20military%20growth%20aids%20world%20peace%20claim.pdf"}, {"id": "st-04", "title": "G-7 leaders meeting in France with Trump tariff threat looming", "source": "ST", "date": "16 Jun 2026", "tags": ["Geopolitics", "Trade", "Politics"], "summary": "G-7 leaders gathered at the French resort of Evian-les-Bains from June 15-17 amid unease over Trump's tariff threats and questions about US commitment to the global order. Discussions cover next steps on Iran after the preliminary US-Tehran deal, the Ukraine war and sourcing critical minerals outside dominant supplier China. Trump warned the US would \"have no choice\" but to apply 100% tariffs on French wine unless Paris drops its digital tax on US tech giants. He is due to meet Zelensky on June 16 as Russian advances slow and Ukraine seeks more military funding.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/G-7%20leaders%20meeting%20in%20France%20with%20Trump%20tariff%20threat%20looming.pdf"}, {"id": "st-05", "title": "Is Anthropic hallucinating when it calls for an AI development break?", "source": "ST", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Irene Tham examines Anthropic's June 4 report \"When AI Builds Itself,\" which warned AI has begun building itself and called for a global pause, even as the firm chases a US$1 trillion valuation ahead of a Wall Street debut. Skeptics note the alarm keeps Anthropic in the headlines, but Tham argues the concerns point to an undeniable reality. Claude now writes over 80% of the firm's production code and drove an eightfold engineering-productivity increase. In April Claude autonomously diagnosed and fixed over 800 complex errors, doing what would have taken a human four years of continuous work.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Is%20Anthropic%20hallucinating%20when%20it%20calls%20for%20an%20AI%20development%20break.pdf"}, {"id": "st-06", "title": "Israel says troops will stay in Lebanon, Gaza despite US-Iran peace deal", "source": "ST", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel's defence minister Israel Katz said Israeli forces will remain in Lebanon, Syria and Gaza indefinitely, hours after the US and Iran agreed to end their war. He said the IDF would stay in the security zones \"for an unlimited period\" to protect borders against jihadist elements, making no reference to the US-Iran deal. The June 14 agreement paved the way for further talks and Trump said it would reopen the Strait of Hormuz and remove the US naval blockade on Iranian ports. Two Israeli far-right ministers denounced the deal, with Itamar Ben Gvir insisting \"Trump's agreement does not bind us.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Israel%20says%20troops%20will%20stay%20in%20Lebanon%2C%20Gaza%20despite%20US-Iran%20peace%20deal.pdf"}, {"id": "st-07", "title": "Japan's urban redevelopment projects stall", "source": "ST", "date": "16 Jun 2026", "tags": ["Society", "Finance & Markets"], "summary": "Tokyo's \"once-in-a-century\" redevelopment of the Shibuya district has slipped nearly eight years behind schedule, now due to finish in March 2035 versus an original 2027 target. Skyrocketing material prices and an acute manpower squeeze, compounded by strict new overtime rules since 2024, have pushed costs relentlessly upward. The complexity is magnified by Shibuya Station being the world's second-busiest transit hub, serving 2.9 million daily commuters across nine lines run by four operators. Mayor Ken Hasebe stressed the makeover is a critical upgrade for disaster resilience and traffic management, not a vanity project.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Japan%27s%20urban%20redevelopment%20projects%20stall.pdf"}, {"id": "st-08", "title": "Lack of public understanding of nuclear energy in S-E Asia a challenge: IAEA chief", "source": "ST", "date": "16 Jun 2026", "tags": ["Energy", "Southeast Asia", "Environment"], "summary": "IAEA chief Rafael Grossi said a lack of public understanding of nuclear energy is a challenge in Southeast Asia, where people often conflate nuclear power with nuclear weapons. He hopes Singapore's 2027 ASEAN chairmanship will deepen dialogue between the agency and the region, noting \"what is successful in other parts of the world can also be successful in ASEAN.\" Energy-security concerns and the clean-energy transition have renewed regional interest, with Vietnam agreeing in March with Russia to build the Ninh Thuan 1 plant for the early 2030s. Singapore, undecided on nuclear, will undergo an IAEA assessment in 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Lack%20of%20public%20understanding%20of%20nuclear%20energy%20in%20S-E%20Asia%20a%20challenge%20IAEA%20chief.pdf"}, {"id": "st-09", "title": "MAS to offer gold vaulting services to foreign central banks from October", "source": "ST", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "From October, foreign central banks and sovereign entities will be able to store gold reserves with the Monetary Authority of Singapore, strengthening the city-state as a regional hub for gold trading and storage. The service complements commercial vaulting capacity exceeding 2,000 tonnes serving bullion banks and institutional investors, said DPM Gan Kim Yong. MAS will also extend gold accounts to select Singapore-based bullion banks to provide gold-related services and liquidity. The Singapore Exchange will establish an over-the-counter gold clearing system by end-2026, with interbank trading building from 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/MAS%20to%20offer%20gold%20vaulting%20services%20to%20foreign%20central%20banks%20from%20October.pdf"}, {"id": "st-10", "title": "South Korean President Lee calls for restraint in election protests, rejects rigging claims", "source": "ST", "date": "16 Jun 2026", "tags": ["Politics"], "summary": "South Korean President Lee Jae Myung urged protesters rallying over June 3 local election ballot shortages not to infringe on others' rights, after demonstrations near Olympic Park disrupted sports organizations' administrative work. He said he instructed police to investigate strictly those who obstructed work by force and those who conspired in such acts. The remarks came a day after he denounced the National Election Commission's handling of the polls as a serious failure, while warning against baseless conspiracy theories alleging rigging. He called the situation \"a matter of infringement of the right to vote\" and the foundation of democracy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/South%20Korean%20President%20Lee%20calls%20for%20restraint%20in%20election%20protests%2C%20rejects%20rigging%20claims.pdf"}, {"id": "st-11", "title": "Trump's Iran deal: A fragile peace?", "source": "ST", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Bhagyashree Garekar argues Trump's interim Iran deal, announced on his 80th birthday with the flourish \"Let the oil flow,\" leaves peace a \"shimmering mirage\" because the parties distrust each other. Iran cannot easily give up its nuclear ambition as a deterrent against regime change, and there is no smooth path for the US to grant Iran billions in frozen assets and sanctions relief. Brent futures fell 4% within an hour of the news, and lower oil prices will help ease costs. The piece notes about 20 million barrels a day were flowing through the Strait of Hormuz before Trump's Feb 28 war, and Iran may benefit more from its reopening.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Trump%27s%20Iran%20deal%20A%20fragile%20peace.pdf"}, {"id": "st-12", "title": "Where the Singdollar stretches the furthest in Asia", "source": "ST", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Singapore dollar has strengthened against several regional currencies in 2026 amid geopolitical uncertainty, holding firm after the MAS tightened policy in April by allowing faster appreciation. Robeco's Chow Thu Ha attributes the strength to Singapore's resilient economy, strong trade and financial position and safe-haven reputation. The Indonesian rupiah has weakened most sharply, down 8% against the Singdollar in 2026 after a 9.2% drop in 2025, crossing 14,000 for the first time on June 3 before recovering to 13,803.35 on June 15. Higher energy prices from the Iran war raised Indonesia's import costs and worsened its trade balance, spurring capital outflows.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Where%20the%20Singdollar%20stretches%20the%20furthest%20in%20Asia.pdf"}, {"id": "st-13", "title": "Xi swops fighter jets for diplomatic hardball to squeeze Taiwan", "source": "ST", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Xi Jinping is shifting tactics on Taiwan, ramping up diplomatic isolation while dialling down military provocations. Taiwan logged a daily average of five Chinese warplanes crossing the strait's buffer line through May 2026, half the 2025 rate, and in March Beijing sent none for seven straight days, the longest such absence on record. China has held no major drills around Taiwan in 2026, instead asserting claims via survey vessels and firefighting ships and broadening focus along the first island chain near Japan and the Philippines. Beijing has escalated efforts to silence President Lai Ching-te, punishing outlets that interviewed him and stalling his US transit and a planned Africa trip.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20ST/Xi%20swops%20fighter%20jets%20for%20diplomatic%20hardball%20to%20squeeze%20Taiwan.pdf"}, {"id": "bt-01", "title": "'Very low chance' US-Iran deal reverts energy flows to South-east Asia through Hormuz: Bloomberg Economics", "source": "BT", "date": "16 Jun 2026", "tags": ["Energy", "Southeast Asia", "Geopolitics"], "summary": "Bloomberg Economics warns there is a \"very low chance\" the Strait of Hormuz reverts to its pre-war state even with a US-Iran deal, as structural supply disruptions cannot be fixed overnight. South-east Asia economist Tamara Henderson said \"a pact is one thing, implementation is going to be another,\" noting deep distrust and misalignment on terms including Iran's demand for recognition of its control of the strait. Iran has been emboldened by the ease with which it influenced shipping flows during the conflict. The strait normally supplies about a fifth of global oil and LNG, largely to Asia, and regional growth in H2 is expected to slow amid high oil prices, US tariffs and fiscal concerns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/%27Very%20low%20chance%27%20that%20US-Iran%20deal%20reverts%20energy%20flows%20to%20South-east%20Asia%20through%20Hormuz%20Bloomberg%20Economics.pdf"}, {"id": "bt-02", "title": "AI work platform Monday.com to use Singapore as its second Asia-Pacific HQ", "source": "BT", "date": "16 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Work-management platform Monday.com announced its Singapore office will become its second Asia-Pacific headquarters after Sydney, naming South-east Asia its fastest-growing sub-region. The Singapore base will drive growth across South-east Asia, North-east Asia and subsequently India, a market the company says represents about a third of the world's population, while Sydney focuses on Australia. The Asia-Pacific accounted for only 8% of its US$351.3 million revenue in the quarter to March 31, versus 53% from North America and 28% from Europe. The firm's tools are traditionally used by small and medium-sized enterprises.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/AI%20work%20platform%20Monday.com%20to%20use%20Singapore%20as%20its%20second%20Asia-Pacific%20HQ.pdf"}, {"id": "bt-03", "title": "EU and Asean at 50: time for bold action", "source": "BT", "date": "16 Jun 2026", "tags": ["Trade", "Southeast Asia", "Geopolitics"], "summary": "Ahead of the EU-Asean partnership's 50th anniversary in 2027, this commentary argues the relationship, long defined by dialogue and declarations, must now deliver concrete results as the rules-based order gives way to uncertainty and protectionism. With a combined market of over one billion people and a fifth of global GDP, the blocs are urged to launch negotiations for a comprehensive region-to-region free trade agreement. In the EU-Asean Business Council's 2025 survey, 84% of respondents said such an FTA would deliver more advantages than the current patchwork of bilateral deals. The piece frames the anniversary as a chance for something far more substantive than another partnership upgrade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/EU%20and%20Asean%20at%2050%20time%20for%20bold%20action.pdf"}, {"id": "bt-04", "title": "Investment story trumps size for Reits; the key is to be sufficiently differentiated", "source": "BT", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "This commentary argues a compelling investment story matters more than sheer size for S-Reits, drawing lessons from CapitaLand Integrated Commercial Trust and contrasting fortunes of smaller trusts. CICT, Singapore's largest Reit with over S$27 billion in total assets, trades at S$2.34, a premium to its end-2025 NAV of S$2.14, and can easily raise equity, having drawn about S$750 million in a placement to help fund its Paragon purchase. While investors gravitate to liquid market leaders, the piece says an aspiring Reit that cannot assemble a S$10 billion-plus portfolio need not give up on listing if it is sufficiently differentiated. It cites the contrasting performance of Centurion Accommodation Reit and UI Boustead Reit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Investment%20story%20trumps%20size%20for%20Reits%20the%20key%20is%20to%20be%20sufficiently%20differentiated.pdf"}, {"id": "bt-05", "title": "Japan central bank set to hike rates to highest since 1995 despite governor absence", "source": "BT", "date": "16 Jun 2026", "tags": ["Finance & Markets"], "summary": "The Bank of Japan is widely expected to raise its benchmark rate by a quarter point to 1%, the highest since 1995, at its June 16 meeting, the first regular policy gathering ever held without the governor present. Kazuo Ueda, hospitalized for a hepatic cyst infection, will submit his views in writing but not vote, with deputy governor Shinichi Uchida holding the post-meeting press conference. It would be the first hike since December and comes as policymakers grapple with upside inflation risks from the prolonged Middle East conflict. The BOJ must avoid provoking Prime Minister Sanae Takaichi's administration, which is wary of premature normalization, while traders watch for clues on the next move and possible yen intervention.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Japan%20central%20bank%20set%20to%20hike%20rates%20to%20highest%20since%201995%20despite%20governor%20absence.pdf"}, {"id": "bt-06", "title": "New private home sales at three-month low in May as developers sell 447 units", "source": "BT", "date": "16 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore developers sold 447 private homes (excluding ECs) in May, a three-month low, well below April's 1,548 units, as only one project launched. Despite the slowdown, the figure was 43.3% above the 312 units sold a year earlier, URA data showed. Hudson Place Residences, the lone launch, sold 64% or 209 of its 327 units at a median S$2,465 per square foot, accounting for about 47% of May sales. Knight Frank's Leonard Tay said launch volume remains the key sales driver, outweighing geopolitical uncertainty, and developers have sold about 4,008 new homes in the first five months of 2026. Sales are expected to rebound in July.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/New%20private%20home%20sales%20at%20three-month%20low%20in%20May%2C%20with%20only%20one%20major%20new%20launch%20developers%20sell%20447%20units%20in%20all.pdf"}, {"id": "bt-07", "title": "Russia is the test of Europe's strategic autonomy", "source": "BT", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "This commentary frames finding a stable place for Russia in Europe's security architecture as the ultimate test of the continent's strategic autonomy in a post-American world. It recounts the June 11 visit to Moscow by E3 ambassadors from France, Germany and the UK to discuss ending the Ukraine war, which Foreign Minister Sergei Lavrov declined to attend, leaving his deputy to deliver \"an objective assessment of the destructive policies of the West.\" The piece calls the mission doomed yet right, arguing Europe needs more such visits even though it cannot mediate as a participant in the war. It notes the E3 previously filled a diplomatic void in early Iran nuclear negotiations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Russia%20is%20the%20test%20of%20Europe%27s%20strategic%20autonomy.pdf"}, {"id": "bt-08", "title": "Singapore's total employment growth slows in Q1; job vacancies dip while retrenchments inch up", "source": "BT", "date": "16 Jun 2026", "tags": ["Southeast Asia", "Society", "Finance & Markets"], "summary": "Singapore's total employment growth moderated in Q1 2026, driven mainly by slower non-resident hiring, while job vacancies fell slightly and retrenchments rose, mostly in external-oriented sectors like manufacturing, MOM data showed. Excluding migrant domestic workers, total employment rose 9,400 in its 18th straight quarter of growth, down from 17,700 the prior quarter, with resident gains improving to 5,400. Manpower Minister Tan See Leng said retrenchment levels \"remain within non-recessionary norms\" despite the increase. MOM warned firms may turn more cautious on hiring and pay amid geopolitical tensions, even as the economy grew 6% year-on-year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Singapore%27s%20total%20employment%20growth%20slows%20in%20Q1%20job%20vacancies%20dip%20while%20retrenchments%20inch%20up.pdf"}, {"id": "bt-09", "title": "Strait of Hormuz reopening would offer relief for Asia, but economic scars will remain", "source": "BT", "date": "16 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "A reopening of the Strait of Hormuz would bring near-term relief to Asia, which has borne the brunt of the war's economic fallout, but the shock waves are likely to ripple through year-end and beyond. Over three and a half months, Asian currencies plummeted, inflation surged and supply-chain bottlenecks choked industrial production, reflecting reliance on commodities moving through the waterway, where more than four-fifths of transiting petroleum and LNG is bound for Asia. Trump said an interim ceasefire would reopen the strait and authorized removing the US naval blockade, with signing scheduled for Friday, writing \"Ships of the World, start your engines.\" Experts caution that long-disrupted trade flows will need considerable time to normalize.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Strait%20of%20Hormuz%20reopening%20would%20offer%20relief%20for%20Asia%2C%20but%20economic%20scars%20will%20remain.pdf"}, {"id": "bt-10", "title": "The biggest AI skill may not be technical", "source": "BT", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "In a Business Times podcast, UOB group HR head Dean Tong and NUS-ISS deputy CEO Victor Chua frame AI's labour impact as transition rather than wholesale replacement, stressing problem-solving, curiosity and adaptability as the key skills employers seek. Tong said \"most jobs will be affected\" in the long term but insisted recent UOB workforce reductions had \"nothing to do with AI,\" reflecting instead technology, process redesign and disciplined replacement of leavers. He pointed to new roles such as the bank's Innovation Group rolling out AI, and continued hiring in anti-money laundering, financial crime prevention and sales. UOB's Better U Pivot Programme is reskilling staff for the shift.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/The%20biggest%20AI%20skill%20may%20not%20be%20technical.pdf"}, {"id": "bt-11", "title": "The enduring enigma of economic growth", "source": "BT", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "This commentary observes that, unlike politicians, economists admit they do not know why countries prosper or stagnate, opening with UK PM Keir Starmer, whose poll ratings tanked after the economy never took off. It notes development economists largely abandoned the big question of growth a quarter-century ago for narrow randomized experiments, which LSE's Lant Pritchett calls a massive misallocation of talent. Real-world experiments offer mixed lessons: Deng Xiaoping's 1978 \"reform and opening up\" delivered the fastest growth in human history, lifting average Chinese incomes twentyfold. India's reforms three decades ago were less spectacular but still raised average incomes nearly fivefold.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/The%20enduring%20enigma%20of%20economic%20growth.pdf"}, {"id": "bt-12", "title": "Top banks rush to fill chief AI roles as talent jumps to rivals", "source": "BT", "date": "16 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Banks from Sydney to London are racing to fill the chief AI officer role, a job that barely existed a year ago, with leaders at HSBC, Commonwealth Bank of Australia and Lloyds starting in the past three months. The positions can command salaries near US$3.5 million and rare skill sets, often forcing firms to poach from rivals, with median pay around US$1.6 million per Equilar. The role's shelf life is debated; David Hardoon, who left Standard Chartered in March, said \"any chief AI officer should operate on the premise that they should not have a role in the future.\" The share of organizations with a chief AI officer jumped to 76% this year from 26% in 2025, and AI heads are among Singapore's fastest-growing job listings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/Top%20banks%20rush%20to%20fill%20chief%20AI%20roles%20as%20talent%20jumps%20to%20rivals.pdf"}, {"id": "bt-13", "title": "US-Iran peace deal: S-Reits, aviation stocks, developers on investors' radar as potential winners", "source": "BT", "date": "16 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia", "Energy"], "summary": "S-Reits, aviation counters and property developers led gains on the Singapore bourse after the US-Iran peace deal, though analysts say much of the relief was already priced in. The Straits Times Index rose 1% or 51.49 points to close at 5,077.29, with top gainers Jardine Matheson, Yangzijiang Shipbuilding and SGX each up over 3%, while Keppel DC Reit was the worst performer. Regional markets rallied harder, with Japan's Nikkei up 5% and South Korea's Kospi up 5.2%. A formal US-Iran treaty is set to be signed Friday in Switzerland, reopening the blockaded Strait of Hormuz; Phillip Securities' Glenn Thum called the ceasefire \"a net positive for the (Singapore) market but largely priced in.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/US-Iran%20peace%20deal%20S-Reits%2C%20aviation%20stocks%2C%20developers%20on%20investors%27%20radar%20as%20potential%20winners.pdf"}, {"id": "bt-14", "title": "What the Iran-US peace deal means for businesses", "source": "BT", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "This commentary calls the US-Iran peace deal, announced by Pakistani PM Shehbaz Sharif with a Friday signing set in Switzerland, the most consequential market news since the war began in February, while urging continued caution. The closure of the Strait of Hormuz triggered what the IEA called the \"largest supply disruption in the history of the global oil market,\" with UN data showing daily transits collapsing from around 130 in February to six in March, a roughly 95% drop. Beyond oil and LNG, the crisis disrupted methanol, aluminium, sulphur and graphite, reshaping supply chains, while global merchandise trade growth is set to slow from 4.7% in 2025 to 1.5-2.5% in 2026. The deal's core architecture is sensible but nuclear details remain unfinalized.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20BT/What%20the%20Iran-US%20peace%20deal%20means%20for%20businesses.pdf"}, {"id": "scmp-01", "title": "AAPI survey finds fading faith in US as destination for immigrants amid Trump crackdown", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Society", "Politics"], "summary": "An AP-NORC survey found most Asian-American and Pacific Islander adults believe the US used to be a great place for immigrants but no longer is, with only one in three still seeing it as great and 64% saying it used to be. Forty-one per cent say they have started carrying proof of immigration status or citizenship, or know someone who has, and 34% say the same about changing travel plans. The findings come as Trump targets legal and illegal immigration in his second term, with ICE conducting operations across several cities. Half of AAPI adults said they or someone they know altered behaviour because of immigration status, with politics cited most as what divides the country.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/AAPI%20survey%20finds%20fading%20faith%20in%20US%20as%20destination%20for%20immigrants%20amid%20Trump%20crackdown.pdf"}, {"id": "scmp-02", "title": "After US-Iran accord and oil-price plunge, analysts warn of 'grey area' for Chinese firms", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy", "Finance & Markets"], "summary": "As oil prices plunged on the preliminary US-Iran accord, analysts cautioned that sanctioned Chinese firms face a \"grey area\" with no rush to lift existing measures. ING's Lynn Song said new purchases of Iranian oil ostensibly would not face fresh sanctions, but he does not expect a quick removal of existing sanctions on Chinese importers. A reported 14-point draft MOU showed the US committing to lift its maritime blockade, issue waivers for Iranian oil exports and outline a path to broader sanctions relief under a future final deal. Brent crude plunged more than 4% to a three-month low, but the EIU's Nick Marro urged caution given uncertainty over the deal's longevity and implementation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/After%20US-Iran%20accord%20and%20oil-price%20plunge%2C%20analysts%20warn%20of%20%E2%80%98grey%20area%E2%80%99%20for%20Chinese%20firms.pdf"}, {"id": "scmp-03", "title": "After US-Iran deal, Netanyahu says he will run in coming Israeli elections", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Israeli PM Benjamin Netanyahu said he intends to run in elections scheduled for later this year, declaring \"I am going to run ... and intend to win,\" in his first comments after the US-Iran deal. The 76-year-old, Israel's longest-serving premier and on trial for corruption, faces mounting opposition criticism over his wartime leadership. Israeli figures across the spectrum slammed the agreement as failing to protect the country's interests, with former PM Naftali Bennett calling it a \"dangerous turn for Israel's security.\" Netanyahu said the Iran campaign spared Israel from \"nuclear annihilation\" and that troops would remain in Lebanon, Gaza and Syria \"as long as necessary.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/After%20US-Iran%20deal%2C%20Netanyahu%20says%20he%20will%20run%20in%20coming%20Israeli%20elections.pdf"}, {"id": "scmp-04", "title": "Argentina edges back to China on currency swap despite US pressure", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Argentina is quietly edging back toward Beijing on a currency swap despite US pressure to abandon it, as its central bank chief Santiago Bausili met PBOC governor Pan Gongsheng in Shanghai. Buenos Aires publicly denies negotiating a renewal, but the US$19 billion (130 billion yuan) swap expires August 6 and national news agency Noticias Argentinas reported talks are advancing with only administrative steps remaining. For Argentina the line acts as an insurance policy, a source of yuan to shore up reserves and settle imports from China, its second-largest trading partner after Brazil. The framework was signed in 2009 and last renewed in June 2023 for three years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Argentina%20edges%20back%20to%20China%20on%20currency%20swap%20despite%20US%20pressure.pdf"}, {"id": "scmp-05", "title": "China credit data shows sluggish demand, more household deleveraging amid weak investment", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Finance & Markets"], "summary": "China's latest credit data points to persistently sluggish consumption and weak investment, with the tech sector a lone bright spot. New bank loans totalled 520 billion yuan (US$77 billion) in May, trailing the 620 billion yuan a year earlier and underscoring underperformance across corporate and household lending. Outstanding household lending fell 141 billion yuan in May, bringing the cumulative drop for the first five months of 2026 to 631 billion yuan. CICC analysts said weak household debt appetite is increasingly spilling into the corporate sector, while a chief economist noted rate cuts and consumption-loan subsidies have yielded limited results in housing and consumer spending.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%20credit%20data%20shows%20sluggish%20demand%2C%20more%20household%20deleveraging%20amid%20weak%20investment.pdf"}, {"id": "scmp-06", "title": "China reaches mass production of key isotope in quantum computing, Beijing says", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Technology & AI"], "summary": "China says it has achieved mass production of high-purity silicon-28, a critical material for silicon-based quantum computers, as Beijing pushes self-reliance in strategic technology. State-owned China National Nuclear Corporation said a research institute mass-produced the isotope at an abundance above 99.99%, the country's first independent large-scale production. The breakthrough plugs a long-standing supply-chain gap, as capabilities were previously concentrated among a small group of overseas players in Russia, Europe and US-linked supply chains. Silicon-28 is a stable isotope that creates an \"ultra-quiet\" environment, letting fragile qubits remain stable longer, which is vital for functioning quantum machines.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%20reaches%20mass%20production%20of%20key%20isotope%20in%20quantum%20computing%2C%20Beijing%20says.pdf"}, {"id": "scmp-07", "title": "China's military mouthpiece PLA Daily cites SpaceX role in warning of satellite arms race", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Defence", "Technology & AI", "Geopolitics"], "summary": "China's PLA Daily devoted a full page on Monday to warning that \"the era of the militarised application of low-orbit constellations is arriving at an accelerated pace,\" citing SpaceX as an example of US advances. The articles, by authors from China's Space Engineering University, ran just three days after SpaceX raised US$75 billion in its IPO and made Elon Musk the world's first trillionaire. One piece said the US has leveraged first-mover advantages and a mature commercial ecosystem to expand military use of low-orbit constellations. It noted SpaceX's Starlink already has more than 10,000 satellites in orbit and played a key role in the Russia-Ukraine conflict, calling such constellations an indispensable front-line capability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%E2%80%99s%20military%20mouthpiece%20PLA%20Daily%20cites%20SpaceX%20role%20in%20warning%20of%20satellite%20arms%20race.pdf"}, {"id": "scmp-08", "title": "Chinese compound chip stocks surge after Supreme Court blocks Infineon in GaN patent case", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Chinese compound-semiconductor stocks surged after China's Supreme People's Court upheld an injunction barring German chip giant Infineon from selling gallium nitride products in the mainland. The lower court found Infineon infringed two core GaN patents held by domestic rival Innoscience, ordering it to cease all Chinese sales and imports of the infringing products and pay 10 million yuan (US$1.47 million). Innoscience's Hong Kong shares surged 16.6%, while Silan Microelectronics and Sanan Optoelectronics hit their 10% daily limit. Infineon said the ruling would have a \"very limited effect\" on its GaN business and vowed to appeal, as the dispute was framed as a system-level confrontation over third-generation chip dominance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Chinese%20compound%20chip%20stocks%20surge%20after%20Supreme%20Court%20blocks%20Infineon%20in%20GaN%20patent%20case.pdf"}, {"id": "scmp-09", "title": "EU carbon tariff sows havoc in China as steel firms grapple with 'absurd' rules", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Environment", "Trade", "Geopolitics"], "summary": "The EU's Carbon Border Adjustment Mechanism, which entered its implementation phase in January, is creating heavy compliance burdens for Chinese exporters, with smaller producers using greener technology often hit hardest. Exporter Neil Miao described purchase orders arriving with complex multi-tabbed spreadsheets demanding technical data from factory coordinates to the carbon intensity of upstream materials, which his small Hebei firm had no ability to track or even understand. Buyers warn that without the completed forms, cargo will not clear European customs. The regime aims to prevent \"carbon leakage,\" but many Chinese producers say it creates mountains of red tape while often failing to achieve its stated goals, in the first of a three-part series.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/EU%20carbon%20tariff%20sows%20havoc%20in%20China%20as%20steel%20firms%20grapple%20with%20%E2%80%98absurd%E2%80%99%20rules.pdf"}, {"id": "scmp-10", "title": "Gavin Newsom accuses Trump of directing Justice Department to investigate him", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Politics"], "summary": "California Governor Gavin Newsom accused Trump of directing the Justice Department to launch a politically motivated investigation of him and his wife, saying \"he's coming after me because I am considering running for president.\" A person familiar said federal police in Sacramento have conducted several investigations related to the governor and his wife since 2025, though they originated in California, not Washington. Newsom, frequently cited as a top contender for the 2028 Democratic nomination, has raised his national profile and visited early primary states. The investigation into Jennifer Siebel Newsom relates to her taxes and a charity she co-founded promoting gender equity, which has received donations from people who do business with California.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Gavin%20Newsom%20accuses%20Trump%20of%20directing%20Justice%20Department%20to%20investigate%20him.pdf"}, {"id": "scmp-11", "title": "How to ride out Hong Kong's US$274 billion lock-up expiry wave hitting stocks this year", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong investors face a side effect of the city's IPO boom as an unprecedented US$274 billion of shares could be freed over the next 12 months when lock-up restrictions expire, per Goldman Sachs. The wave includes hot IPOs such as MiniMax Group and Knowledge Atlas Technology, and SPI Asset Management warned the supply surge could weigh on prices. \"Lock-up expiry is the supply risk investors cannot ignore,\" said SPI's Stephen Innes, noting names with large releases can face technical selling without fresh liquidity. Goldman data shows shares historically posted a median 4% decline three months after lock-ups expired, widening to 7% after six months; investors are advised to focus on firms with strong revenue growth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/How%20to%20ride%20out%20Hong%20Kong%E2%80%99s%20US%24274%20billion%20lock-up%20expiry%20wave%20hitting%20stocks%20this%20year.pdf"}, {"id": "scmp-12", "title": "Is Beijing planning to make more drones overseas for Middle Eastern buyers?", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Defence", "Geopolitics", "Trade"], "summary": "Chinese state defence contractor Norinco displayed a model drone assembly line at the Eurosatory exhibition in Paris, hinting it plans to make more weapons overseas. The miniature depicted manufacture of drones such as the BZK-005E reconnaissance aircraft, operated in Indonesia, Mauritania and reportedly Sudan, alongside the CY-8 cargo drone, described by state media as the world's heaviest, carrying a 3.5-tonne payload. A banner read \"Norinco defence localisation.\" Former PLA instructor Song Zhongping said it is not hard for China to transfer drone assembly lines to friendly countries, as it did with certain lines to Pakistan, and could consider Middle Eastern buyers given growing regional demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Is%20Beijing%20planning%20to%20make%20more%20drones%20overseas%20for%20Middle%20Eastern%20buyers.pdf"}, {"id": "scmp-13", "title": "Japan, Italy to boost tech, critical minerals cooperation", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Trade", "Defence"], "summary": "Japanese PM Sanae Takaichi and Italian counterpart Giorgia Meloni agreed to deepen cooperation in advanced technologies such as semiconductors and strengthen critical-mineral supply chains amid concerns over over-reliance on China, while advancing defence ties. The two welcomed the preliminary US-Iran agreement before the G7 summit in Evian-les-Bains, with Takaichi stressing that ensuring freedom of navigation through the Strait of Hormuz is of critical importance. Marking 160 years of diplomatic relations, they pledged to work as special strategic partners on the Middle East, Ukraine and East Asian security. In technology, they pledged broader cooperation between Japan's state-backed chip venture Rapidus and an Italian semiconductor design firm.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Japan%2C%20Italy%20to%20boost%20tech%2C%20critical%20minerals%20cooperation.pdf"}, {"id": "scmp-14", "title": "North Korea plays US-China rivalry card to justify 'irreversible' nuclear status", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "North Korea's latest defence of its nuclear arsenal leans into superpower rivalry to legitimise its weapons build-up, as analysts say the winding down of the Iran conflict may let Washington refocus pressure on the Korean peninsula. Pyongyang seized on a US commander's description of South Korea as a \"dagger\" pointed at China to frame its arsenal as a legitimate response to a hostile environment. Analyst Oh Gyeong-seob said the North is emphasising its role as a frontline actor in US-China rivalry to improve ties with Beijing and gain support for its nuclear build-up while bracing for renewed denuclearisation pressure. A foreign ministry spokesman accused Seoul of discarding its \"mask of peace\" by issuing a joint EU statement calling North Korea-Russia cooperation illegal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/North%20Korea%20plays%20US-China%20rivalry%20card%20to%20justify%20%E2%80%98irreversible%E2%80%99%20nuclear%20status.pdf"}, {"id": "scmp-15", "title": "The waste-to-sand plant that could pave the way for China's zero waste coal goal", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Environment", "Energy"], "summary": "A massive project in China's coal-rich Shanxi province has begun converting ultra-hard coal waste, called gangue, into high-value industrial materials, bringing the country's zero-waste goal for the fossil-fuel industry a step closer. The Gaoping plant produces 1,000 tonnes per day of building and industrial materials, including sand and gravel aggregates for construction. By cracking the tough gangue, China has almost achieved comprehensive clean utilisation of coal wastes, from contaminated water and exhaust gases to solids, and is also processing gangue and fly ash to obtain critical metals including lithium, gallium and germanium. China's accumulated coal gangue reserves exceeded 7 billion tonnes, long occupying vast land and triggering environmental problems.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/The%20waste-to-sand%20plant%20that%20could%20pave%20the%20way%20for%20China%E2%80%99s%20zero%20waste%20coal%20goal.pdf"}, {"id": "scmp-16", "title": "The 'rice of electronics': how AI-driven demand for MLCCs triggered a supply bottleneck", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Technology & AI"], "summary": "AI-driven demand has triggered a supply bottleneck in multilayer ceramic capacitors (MLCCs), tiny components dubbed \"the rice of the electronics industry\" that are indispensable from smartphones to electric vehicles. The build-out of power-hungry AI data centres is the key driver, with an AI server needing up to 28,000 MLCCs, a 13-fold increase over a standard set-up, per China Securities. Nvidia's next-generation Rubin architecture uses 12,000 MLCC units per board versus 6,500 on the current GB200, per TrendForce, while Murata says an EV with Level 2+ autonomy uses more than 10,000 units. Goldman Sachs calls it the \"largest and longest\" cycle in MLCC history, with Taiyo Yuden's CEO describing the demand surge as \"scary.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/The%20%E2%80%98rice%20of%20electronics%E2%80%99%20how%20AI-driven%20demand%20for%20MLCCs%20triggered%20a%20supply%20bottleneck.pdf"}, {"id": "scmp-17", "title": "Trump may get birthday gift of an Iran deal, but the party may be messy and short-lived", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Chinese analysts say the impending Iran deal is a fine 80th-birthday gift for Trump but warn celebrations could be short-lived if fragile details fail to hold, flagging Israel as the unpredictable factor. Obstacles include uncertainty over Iran's nuclear programme under its new regime, sanction-relief mechanisms and a rattled Israel vowing to remove \"existential threats.\" Shanghai Academy of Social Sciences expert Pan Guang said Trump can still be considered a winner, as his priorities of stabilising the economy and preparing for midterms are both served. The deal, first revealed by Pakistan's PM Shehbaz Sharif after months of on-and-off talks involving Saudi Arabia, Qatar and Turkey, would reopen the Strait of Hormuz and remove the US naval blockade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Trump%20may%20get%20birthday%20gift%20of%20an%20Iran%20deal%2C%20but%20the%20party%20may%20be%20messy%20and%20short-lived.pdf"}, {"id": "scmp-18", "title": "US judge dismisses Elon Musk's xAI trade secret lawsuit against OpenAI", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Technology & AI"], "summary": "A federal judge in San Francisco dismissed Elon Musk's xAI lawsuit accusing OpenAI of stealing trade secrets for chatbots, finding xAI failed to show OpenAI induced former engineer Xuechen Li to divulge confidential information related to its Grok chatbot. US District Judge Rita Lin dismissed the case with prejudice, saying it would be \"futile\" for xAI to continue, having already thrown out an earlier version in February. The decision is Musk's second legal loss against OpenAI in four weeks, following a May 18 jury ruling against him in a US$150 billion lawsuit accusing OpenAI of \"stealing a charity.\" The xAI business is part of Musk's rocket, satellite and AI company SpaceX.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/US%20judge%20dismisses%20Elon%20Musk%E2%80%99s%20xAI%20trade%20secret%20lawsuit%20against%20OpenAI.pdf"}, {"id": "scmp-19", "title": "US, Iran sign preliminary Hormuz deal ahead of formal ceremony", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "A senior US official said Trump and Vice-President J.D. Vance electronically signed a memorandum of understanding with Iran to reopen the Strait of Hormuz and end the American blockade of Iranian ports, with Iranian Parliament Speaker Mohammad Bagher Ghalibaf signing on Tehran's behalf. The administration has still not released the document nearly 24 hours after the Sunday announcement, with a formal ceremony set for Friday in Switzerland. Trump, meeting Macron in Evian, said the strait was already partially open and the deal was \"all signed,\" but Argus reported vessel traffic \"has not changed,\" suggesting shipowners await the planned signing and further details. Iran's President Masoud Pezeshkian called the memorandum a \"document of pride for the country.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/US%2C%20Iran%20sign%20preliminary%20Hormuz%20deal%20ahead%20of%20formal%20ceremony.pdf"}, {"id": "scmp-20", "title": "Will Beijing's tighter capital-control rules dampen Hong Kong's housing rebound?", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong's recovering housing market faces a crucial test as Beijing's latest capital-control measures intersect with developers' upcoming launches. Savills' Jack Tong said some developers have turned more cautious in launching primary projects. Mainland Chinese buyers had accounted for about a third of all Hong Kong home purchases since stamp duties were removed in 2024, buying 5,777 homes in the first four months of 2026, more than 41% of last year's total, per Midland Realty. The pace surged in April to 1,892 deals, a two-year high, with transaction value up nearly 31% to HK$18.9 billion. The lived-in home price index has been steadying or rising since April last year as developers raise prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Will%20Beijing%E2%80%99s%20tighter%20capital-control%20rules%20dampen%20Hong%20Kong%E2%80%99s%20housing%20rebound.pdf"}, {"id": "scmp-21", "title": "Will a US-Iran deal ease pressure on China's sanctions-hit firms?", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "A tentative US-Iran deal has eased fears of escalation, but the fine print on sanctions relief, after months of aggressive US enforcement under the \"Economic Fury\" campaign, remains contested and legally intricate for dozens of mainland and Hong Kong firms hit with secondary sanctions. A reported draft MOU outlines a phased sanctions-relief framework tied to implementation milestones, under which a final agreement, targeted within 60 days, would eventually lift all sanctions including UN, IAEA-related and US primary and secondary measures. During the interim, Washington would issue Treasury waivers permitting exports of Iranian crude and petrochemicals plus related banking, insurance and shipping services. The US would also gradually release restricted Iranian funds for beneficiaries designated by Iran's central bank.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Will%20a%20US-Iran%20deal%20ease%20pressure%20on%20China%E2%80%99s%20sanctions-hit%20firms.pdf"}, {"id": "scmp-22", "title": "Zelensky proposes meeting Putin in US after Russian leader 'ignores' G7 invitation", "source": "SCMP", "date": "16 Jun 2026", "tags": ["Geopolitics"], "summary": "Ukrainian President Volodymyr Zelensky said he is willing to meet Vladimir Putin in the United States, suggesting Putin would find such an offer \"harder to refuse,\" after the Russian leader ignored an invitation to meet at the G7 summit in France. Zelensky said he made the proposal in a call with Trump and is waiting to see what comes of it, warning that if Russia refuses \"additional pressure will be needed.\" Putin has repeatedly rejected face-to-face meetings, saying earlier this month he saw \"no point\" until a peace deal was ready. A Ukrainian presidency source said the proposal had been conveyed via intermediaries with no clear response, while the EU advanced Ukraine's membership bid to the next stage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Zelensky%20proposes%20meeting%20Putin%20in%20US%20after%20Russian%20leader%20%E2%80%98ignores%E2%80%99%20G7%20invitation.pdf"}]}, "2026-06-17": {"date": "2026-06-17", "dayOfWeek": "Wednesday", "totalArticles": 76, "sourceCounts": {"WSJ": 18, "ST": 19, "BT": 19, "SCMP": 20}, "executiveDigest": "A fragile US-Iran deal to reopen the Strait of Hormuz sends oil tumbling and stocks to records, even as shipowners warn transit will take weeks, central banks tilt hawkish, and Asia recalculates its energy, security and AI bets.", "briefingCards": [{"title": "Lead story: A fragile Iran deal reopens Hormuz but settles little", "body": "Trump declared his US-Iran deal \"done,\" promising the Strait of Hormuz fully open by Friday alongside a Geneva signing that ends the roughly four-month war and starts nuclear talks. But the unreleased memorandum only extends a 60-day ceasefire, and US officials, shipowners and Israel all flagged gaps: Mitsui OSK's CEO says transit may take weeks, while Tehran and Washington give clashing accounts of Lebanon, Hormuz fees and nuclear curbs. WSJ's editorial board calls it a \"retreat,\" and SCMP frames it as a freeze with \"no victory, no defeat.\" Israel, excluded from talks, is alarmed and vows to hold security zones in Lebanon, Gaza and Syria."}, {"title": "Markets & finance: Records on the deal, but central banks turn hawkish", "body": "The Dow closed at a record for the 16th time this year and the S&P 500 rose 1.7% as Brent crude fell 4.8% to just above $83 on the Iran deal, with chip stocks and SpaceX (now a $2.5 trillion company) fuelling the AI-led rally. Yet the energy shock has tilted central banks toward tightening: the Bank of Japan raised rates to a 31-year-high 1%, and new Fed chair Kevin Warsh faces a hot-inflation backdrop where talk has shifted from cuts to hikes. Commentators warn US 10-year yields near 4.7% threaten a US$39 trillion debt load, with some floating financial repression. Investors see room for cyclicals and small caps to broaden gains if oil pressure eases."}, {"title": "Asia realignment: Middle powers hedge as US guarantees fray", "body": "Gulf states, rattled that US defences struggled during the war, are openly discussing reducing dependence on Washington and diversifying toward Europe and Asia. A Chinese analyst frames Israel's bid to wean off US aid as a sign of broader \"America first\" alliance decline that Nato, Japan, South Korea and the Gulf may all face. At the G7, Japan's Sanae Takaichi pitched a critical-minerals stockpile to counter China and bridge Trump-bloc divides, while South Korea weighs whether to help secure Hormuz. A Straits Times essay urges Asia to draw on Sun Tzu and the Arthashastra rather than treat US-China conflict as inevitable."}, {"title": "Energy & climate: Hormuz reopening is no quick fix for the supply gap", "body": "Even with a deal, restoring Middle East crude could take four to six months and Hormuz transit weeks, leaving a global deficit of hundreds of millions of barrels. China has emerged as the world's first oil \"swing importer,\" cutting May imports to an eight-year low of 7.8 million barrels a day without apparent harm, a new \"oil shield\" against the US. The IEA called the war a \"stark wake-up call\" for fossil-fuel-dependent Southeast Asia, warning the region's import bill could triple to US$245 billion by 2035, even as green-power investment hit a record US$17 billion in 2025. Gold buying and central-bank diversification reflect the political-risk premium."}, {"title": "Technology & AI: Washington-Anthropic standoff as China pushes embodied AI", "body": "Anthropic pulled its Fable 5 and Mythos 5 models offline globally after the Commerce Department, fearing diversion to foreign military intelligence, restricted access; talks to restore them continued without resolution. The $965 billion company, IPO-bound, also faces a class-action suit alleging it oversold its $100 and $200 Max plans. Meanwhile China advanced rapidly: Alibaba launched its Qwen robot suite for embodied AI, Ant Group gave Alipay an autonomous \"Ah Bao\" agent, and a global survey found 11 nations see China leading in AI capability though trailing on trust. Brazil's Celso Amorim warned Latin America and Europe are bystanders in a two-power AI race."}, {"title": "Singapore & SEA focus: Hub-building from water to data centres", "body": "Singapore pressed its hub ambitions: DPM Gan Kim Yong pledged nearly $100 million for water R&D at Singapore International Water Week, while SGX plans coking-coal and steel futures plus an OTC gold clearing system, and MAS revised its takeover code to boost competition and disclosure. STT GDC, backed by Singtel and KKR, opened its first South Korean data centre to tap the AI boom. A strong May PMI, with electronics extending a 12-month expansion streak on AI-driven chip demand, underpins the manufacturing story, and a BT piece muses whether ST Engineering could one day challenge DBS atop the bourse. Local banks face scrutiny over indirect captive-coal exposure."}], "keyMetrics": [{"value": "-4.8%", "label": "Brent crude on the day", "sub": "Fell to just above $83 a barrel on the US-Iran deal"}, {"value": "16th", "label": "Dow record close of the year", "sub": "Up 0.9%; S&P 500 +1.7%, Nasdaq +3.1%"}, {"value": "1%", "label": "Bank of Japan policy rate", "sub": "First hike since December, a 31-year high (7-1 vote)"}, {"value": "US$2.5T", "label": "SpaceX market value", "sub": "Shares +20% on first full trading day, adding ~US$412B"}, {"value": "US$245B", "label": "SEA 2035 energy import bill if no reform", "sub": "Tripling from US$80B in 2024, IEA warns"}, {"value": "S$100m", "label": "Singapore water R&D commitment", "sub": "Including S$85m to PUB for water security"}], "articles": [{"id": "wsj-01", "title": "After Iran Tensions, Europe Is Just Trying to Avoid a Fight at G-7", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "European leaders arrived at the G-7 in Evian-les-Bains scarred by Trump's blowups over Iran and Greenland, with voters increasingly doubting whether the US remains a reliable ally. France, Germany, Italy and the UK committed to an international mission to clear Hormuz mines and escort shipping but insisted it stay \"strictly defensive and independent.\" Trump threatened a 100% tariff on French wines if Paris keeps its digital tax, drawing a rebuke from Macron, who skipped his scheduled red-carpet welcome. Iran, Ukraine, trade and AI all loom over the three-day summit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/After%20Iran%20Tensions%2C%20Europe%20Is%20Just%20Trying%20to%20Avoid%20a%20Fight%20at%20G-7.pdf"}, {"id": "wsj-02", "title": "Anthropic Sued Over Limits on Its $200-a-Month AI Plans", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "A federal lawsuit filed for Washington customer Karl Kahn alleges Anthropic oversold usage allowances on its premium Max 5x ($100/month) and Max 20x ($200/month) Claude plans, seeking class-action status for buyers since April last year. The suit claims actual caps are far below the advertised five and 20 times the Pro plan, citing July 2025 subscriber emails. Kahn says he blew through 15% of his weekly allowance in one five-hour coding sprint. Anthropic declined to comment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Anthropic%20Sued%20Over%20Limits%20on%20Its%20%24200-a-Month%20AI%20Plans.pdf"}, {"id": "wsj-03", "title": "Anthropic, Trump Officials Seek Deal on Restoring Powerful Model Access", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "Talks between Anthropic and the Trump administration continued Monday without a deal to resolve security concerns that pushed the White House to restrict access to its latest model, Fable 5; Anthropic shut down access to it and the more powerful Mythos 5 for all users to comply. Pulling models offline due to government intervention was an unprecedented move for a leading US AI company. Monday's talks were led by the Commerce Department and National Cyber Director Sean Cairncross. Anthropic, recently valued at $965 billion and headed toward an IPO, said both parties are \"working quickly to get this resolved.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Anthropic%2C%20Trump%20Officials%20Seek%20Deal%20on%20Restoring%20Powerful%20Model%20Access.pdf"}, {"id": "wsj-04", "title": "Eurozone Industrial Production Picked Up Again in April", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Ma
