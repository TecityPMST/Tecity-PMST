, doubting Washington as their security guarantor, are revising strategies after being blindsided by Iran's attacks and the short-lived \"Project Freedom\" to reopen the Strait of Hormuz. He contends only removing or gravely weakening Tehran's regime can prevent an arms race. The piece warns of lasting damage to US credibility from failing to consult allies.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/A%20Bad%20Iran%20Deal%20Could%20Spark%20a%20Nuclear%20Arms%20Race.pdf"},{"id":"wsj-02","title":"Amaryllis Fox Kennedy Says She Left the White House Over CIA Spending Concerns","source":"WSJ","date":"09 Jun 2026","tags":["Politics","Defence"],"summary":"Former senior Trump official Amaryllis Fox Kennedy said she resigned over inadequate oversight of intelligence-community spending, including unaccounted-for gold bullion. \"I couldn't keep signing the checks... I would have become complicit,\" the former deputy DNI and ex-CIA officer told the WSJ. She praised some intelligence work as courageous but called other activities \"broken and corrupt.\" Her concerns surface amid Trump's broader intelligence shake-up.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Amaryllis%20Fox%20Kennedy%20Says%20She%20Left%20the%20White%20House%20Over%20Concerns%20About%20CIA%20Spending%20-%20WSJ.pdf"},{"id":"wsj-03","title":"Bring Your Own Power, Ireland Tells Tech Titans Hungry for Data Centers","source":"WSJ","date":"09 Jun 2026","tags":["Energy","Technology & AI"],"summary":"Ireland, where data centres consume a fifth of national electricity, is requiring new facilities to bring their own on-site or contracted renewable power rather than draw from the grid. The \"Bring Your Own Power\" policy is seen as a model for balancing AI investment against grid strain and public backlash. US opposition to data centres is surging, with blocked projects rising sharply from six in 2023-24 to 30 in 2025. Minister Peter Burke said large energy users must bring energy \"to the table.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Bring%20Your%20Own%20Power%2C%20Ireland%20Tells%20Tech%20Titans%20Hungry%20for%20Data%20Centers.pdf"},{"id":"wsj-04","title":"Hormuz Crisis Exposes a Global Flaw That Will Take Years to Fix","source":"WSJ","date":"09 Jun 2026","tags":["Energy","Geopolitics"],"summary":"Iran's closure of the Strait of Hormuz has exposed how a state can weaponise an economic chokepoint, NATO's top commander Adm. Giuseppe Cavo Dragone told a Singapore security forum, calling it the \"weaponization of economic interdependence.\" Reducing reliance on Hormuz-transiting energy will require years of investment in new pipelines, export routes and strategic reserves. The episode parallels US dollar leverage and China's critical-minerals grip. A shaky ceasefire is barely holding.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Hormuz%20Crisis%20Exposes%20a%20Global%20Flaw%20That%20Will%20Take%20Years%20to%20Fix.pdf"},{"id":"wsj-05","title":"How SpaceX Became Embedded in America's War Machine","source":"WSJ","date":"09 Jun 2026","tags":["Defence","Technology & AI"],"summary":"SpaceX has become deeply embedded in US national security, with the government its largest client (\"Customer A\"), generating around $4 billion in 2025 revenue set to climb sharply. The Space Force recently awarded $2.3 billion and $4.2 billion fast-tracked contracts for military satellite communications and missile tracking. White House officials concluded last year the government couldn't cancel SpaceX contracts even amid the Musk-Trump feud. Analysts say its defence work could eventually rival Lockheed and Northrop's space businesses.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/How%20SpaceX%20Became%20Embedded%20in%20America%E2%80%99s%20War%20Machine.pdf"},{"id":"wsj-06","title":"Israel and Iran Exchange Fire, Renewing Fear of Escalation","source":"WSJ","date":"09 Jun 2026","tags":["Geopolitics","Energy"],"summary":"Israel and Iran traded missile barrages into Monday morning, testing Trump's fragile ceasefire after Iran fired multiple waves and Israel struck air-defence and missile sites in central and western Iran. Netanyahu faced domestic pressure to respond to the Iranian barrage despite Trump's plea to hold off, saying a deal was near. Israel also intercepted a ballistic missile launched from Houthi-controlled Yemen. No major injuries were reported.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Israel%20and%20Iran%20Exchange%20Fire%2C%20Renewing%20Fear%20of%20Escalation.pdf"},{"id":"wsj-07","title":"Market Rout Leaves Wall Street Bracing for Rockier Times","source":"WSJ","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Investors began the week battered after Friday's selloff hit stocks, bonds, gold and bitcoin alike, triggered by a strong jobs report that cut 4.2% off the Nasdaq and lifted Treasury yields to early-2025 highs. Ray Dalio called the move \"important,\" warning AI-stock concentration is \"classic bubble stuff\" and bonds now look more attractive than stretched equities. Some managers stayed sanguine, citing a strong economy. A key inflation report looms this week.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Market%20Rout%20Leaves%20Wall%20Street%20Bracing%20for%20Rockier%20Times.pdf"},{"id":"wsj-08","title":"Mass Ukrainian Drone Strikes Target Russian Military Facilities in St. Petersburg","source":"WSJ","date":"09 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Ukraine launched hundreds of drones at St. Petersburg, hitting naval arsenals and a base at Kronstadt, a day after Putin used an economic forum there to reject Zelensky's peace overture. \"Russia's ruler wants to keep fighting,\" Zelensky said, crediting precise strikes. Russia reported damage and injuries but no deaths, and briefly closed maritime access to Kronstadt. It was Ukraine's second recent strike on the city as its military presses momentum.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Mass%20Ukrainian%20Drone%20Strikes%20Target%20Russian%20Military%20Facilities%20in%20St.%20Petersburg.pdf"},{"id":"wsj-09","title":"OPEC, Allies Pledge Oil-Output Hike Even as Middle East War Chokes Exports","source":"WSJ","date":"09 Jun 2026","tags":["Energy","Geopolitics"],"summary":"OPEC+ agreed a fourth straight monthly output increase — about 188,000 bpd for July — in a move analysts called largely symbolic while the Strait of Hormuz stays closed. Saudi Arabia, Russia, Iraq and others backed the hike, but the market impact is limited until Hormuz flows resume. Gulf producers have rerouted crude, with Saudi Arabia lifting East-West pipeline flows toward Yanbu to around 7 million bpd. Oil has soared since Iran effectively shut Hormuz at the war's February 28 start.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/OPEC%2C%20Allies%20Pledge%20Oil-Output%20Hike%20Even%20as%20Middle%20East%20War%20Chokes%20Exports.pdf"},{"id":"wsj-10","title":"Real-Time Satellite Intelligence Is Making Ukraine's Drone Strikes Deadlier Than Ever","source":"WSJ","date":"09 Jun 2026","tags":["Defence","Technology & AI"],"summary":"Near-real-time commercial satellite imagery delivered straight to soldiers' devices has sharply increased the speed and precision of Ukraine's drone strikes. Images from Colorado-based Vantor have cut target-location-to-strike time by as much as 90%, helping units identify Russian command sites under tree cover. Accompanying software lets users investigate targets in detail. The capability marks a technological shift in the fifth year of the grinding war.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Real-Time%20Satellite%20Intelligence%20Is%20Making%20Ukraine%E2%80%99s%20Drone%20Strikes%20Deadlier%20Than%20Ever.pdf"},{"id":"wsj-11","title":"Stock Indexes Are Divided on Rules for Megacap IPOs. How Exposed Will You Be?","source":"WSJ","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Index providers are split on fast-tracking SpaceX (~$1.75 trillion valuation) and other megacap IPOs into benchmarks: Nasdaq will allow quick entry within 15 trading days, while S&P Global declined to waive its one-year trading and profitability rules. Early inclusion creates steady index-fund demand for the shares but could raise risk in the $18 trillion passive-fund market. FTSE Russell also eased its rules. Anthropic and OpenAI listings loom later this year.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Stock%20Indexes%20Are%20Divided%20on%20Rules%20for%20Megacap%20IPOs.%20How%20Exposed%20Will%20You%20Be.pdf"},{"id":"wsj-12","title":"The Job Market Is Shifting Into High Gear. But Why?","source":"WSJ","date":"09 Jun 2026","tags":["Finance & Markets"],"summary":"US hiring has surged, with over half a million jobs added between March and May — the best three-month stretch in over two years — as factories, restaurants and local government joined healthcare in hiring. Steadier tariff policy and an AI-driven data-centre construction boom have aided the rebound. The resurgence puzzles economists who thought an immigration crackdown had shifted the economy to a slower equilibrium. Well-off consumers keep spending, Friday's selloff notwithstanding.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/The%20Job%20Market%20Is%20Shifting%20Into%20High%20Gear.%20But%20Why.pdf"},{"id":"wsj-13","title":"The Pain Points Taking a Fragile Tech Rally Down a Notch","source":"WSJ","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Friday's tech carnage exposed the fragility of 2026's AI-driven rally, with three triggers: Broadcom's soft AI-revenue guidance, a strong jobs report raising Fed-hike odds (now ~50% for October), and investors selling the Magnificent Seven to rotate into the SpaceX IPO. More than half the S&P 500's value sits in stocks trading above 10 times sales. Stretched valuations and concentration leave the market jumpy, where any sign of weakness prompts selloffs.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/The%20Pain%20Points%20Taking%20a%20Fragile%20Tech%20Rally%20Down%20a%20Notch.pdf"},{"id":"wsj-14","title":"When Trump Jawbones the Market, Bet Against Him at Your Peril","source":"WSJ","date":"09 Jun 2026","tags":["Finance & Markets","Politics"],"summary":"Greg Ip argues Trump has repeatedly moved oil, stocks, rates and currencies through verbal intervention, punishing those betting against him rather than changing fundamentals. A single day saw oil swing on his posts about Lebanon and Iran talks, even as fighting and stalemate persisted. Unlike predecessors who intervened only in emergencies, Trump and Treasury's Scott Bessent actively steer markets — even buying pesos to support Argentina's Milei. Betting against his jawboning has proved costly.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/When%20Trump%20Jawbones%20the%20Market%2C%20Bet%20Against%20Him%20at%20Your%20Peril.pdf"},{"id":"st-01","title":"AI can be a 'game changer' in cities like Singapore: PM Wong","source":"ST","date":"09 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"PM Lawrence Wong said AI can be a \"game changer\" for labour-short cities like Singapore, transforming processes rather than being used superficially as chatbots. Singapore views AI as net positive despite risks to jobs and security, he told a Singapore Press Club dialogue. He urged humility about AI's ultimate labour-market impact — \"no one can predict\" whether it yields more or fewer jobs. Embedding AI across organisations will take time, he said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/AI%20can%20be%20%27game%20changer%27%20in%20cities%20like%20S%27pore%20PM%20Wong.pdf"},{"id":"st-02","title":"AI companions are coming. Privacy rules are not ready","source":"ST","date":"09 Jun 2026","tags":["Technology & AI","Society"],"summary":"Simon Chesterman argues privacy and data-protection rules are unprepared for AI companions that will know what users feel, fear and trust. He frames the shift through Pope Leo XIV's first encyclical, which casts AI as a challenge to human dignity. Traditional data-protection questions about consent and retention are no longer sufficient as chatbots infer users' needs and worries. Regulators, he writes, are the first line of defence.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/AI%20companions%20are%20coming.%20Privacy%20rules%20are%20not%20ready.pdf"},{"id":"st-03","title":"After months of war, Iranians sink into disillusionment and despair","source":"ST","date":"09 Jun 2026","tags":["Geopolitics","Society"],"summary":"After months of war and a teetering ceasefire, many Iranians have sunk into disillusionment and despair amid a reported 1,700 civilian deaths and economic implosion. Early hopes among regime opponents that the conflict might end theocratic rule have been snuffed out. The effective closure of the Strait of Hormuz has choked oil exports and sent basic-goods prices soaring. On-off talks and false claims the war was over have deepened anxiety, per interviews with more than 20 Iranians.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/After%20months%20of%20war%2C%20Iranians%20sink%20into%20disillusionment%20and%20despair.pdf"},{"id":"st-04","title":"Air fares to take longer to return to normal","source":"ST","date":"09 Jun 2026","tags":["Energy","Trade"],"summary":"IATA warned higher airfares will persist \"longer than many people think\" as the Strait of Hormuz closure disrupts Middle East oil exports and exposes a pre-existing \"refining crisis.\" Jet fuel is forecast to reach US$152 per barrel in 2026, up from under US$100 in 2025. Europe is especially exposed given its dependence on Gulf fuel imports. Chief economist Marie Owens Thomsen said it will take a long time to return to January's US$60 Brent.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Air%20fares%20to%20take%20longer%20to%20return%20to%20normal.pdf"},{"id":"st-05","title":"Are we at the start of a new investment super-cycle?","source":"ST","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"The column asks whether the record SpaceX IPO marks not a market top but the start of a new global investment super-cycle. Beyond AI, sectors including energy, defence and manufacturing are growing and demanding large capital infusions worldwide. The case requires only believing AI is transformative, that scaling it needs far more energy, and that a China-led clean-energy revolution is under way. It rests on broad capital-spending needs rather than resolving short-term unknowns.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Are%20we%20at%20the%20start%20of%20a%20new%20investment%20super-cycle.pdf"},{"id":"st-06","title":"Banks lay groundwork for mass workforce cuts as AI takes hold","source":"ST","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI","Society"],"summary":"Banks are laying the groundwork for major workforce cuts as AI takes hold, with graduates now facing AI-powered screening even before human interviews. Top executives broadly agree jobs will go: JPMorgan's Jamie Dimon said AI \"will eliminate jobs,\" Citi's Jane Fraser said some roles won't be needed, and StanChart's Bill Winters spoke of replacing \"lower-value human capital\" before apologising. Students are coaching themselves to clear automated rounds. The shift clouds entry-level finance careers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Banks%20lay%20groundwork%20for%20mass%20workforce%20cuts%20as%20AI%20takes%20hold.pdf"},{"id":"st-07","title":"Brace for a flood of oil as soon as Hormuz reopens","source":"ST","date":"09 Jun 2026","tags":["Energy"],"summary":"The columnist argues that whenever the Strait of Hormuz reopens, restarting around 10,000 idled wells — roughly 15% of world output shut for 100-plus days — will be an unprecedented operation with no playbook. Markets are split: bears see oil flooding back within weeks, bulls say six to eight months or longer, with some wells never restarting. The author sides with the bears, predicting a trickle that quickly becomes a flood once a US-Iran deal allows tanker traffic. Questions on tolls and shipping lanes remain.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Brace%20for%20a%20flood%20of%20oil%20as%20soon%20as%20Hormuz%20reopens.pdf"},{"id":"st-08","title":"Chinese military hovered as global executives flocked to Taiwan tech show","source":"ST","date":"09 Jun 2026","tags":["Geopolitics","Technology & AI","Defence"],"summary":"As Nvidia, Intel and SK Group championed Taiwan's role in the global supply chain at Computex, China's military loomed: 79 warplanes operated near the island and coast guards faced off near the Pratas Islands. Taiwan, home to TSMC and Foxconn, broadcast that Taiwan Strait peace is \"the lifeline of the technology industry.\" Beijing held another \"joint combat readiness patrol\" around Taiwan. The standoff underscored risks to the global AI supply chain should Beijing act on its threats.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Chinese%20military%20hovered%20as%20global%20executives%20flocked%20to%20Taiwan%20tech%20show.pdf"},{"id":"st-09","title":"Economists see slower Singapore growth in 2026, faster inflation: survey","source":"ST","date":"09 Jun 2026","tags":["Southeast Asia","Finance & Markets"],"summary":"Economists cut Singapore's 2026 growth forecast to 3.3% (from 3.5%) and Q2 to 3.9% (from 4.5%), while raising headline and core inflation forecasts to 2.3% and 2%, a Bloomberg survey found. The government kept its 2-4% growth range but flagged rising downside risks from Middle East energy and supply-chain disruptions. S&P's Ahmad Mobeen said supply shocks will compress margins in energy-intensive sectors. Growth is seen as uneven amid external uncertainty.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Economists%20see%20slower%20Singapore%20growth%20in%202026%2C%20faster%20inflation%20Survey.pdf"},{"id":"st-10","title":"European leaders ready to support ceasefire talks between Ukraine, Russia","source":"ST","date":"09 Jun 2026","tags":["Geopolitics"],"summary":"The leaders of Britain, Germany and France — the E3 — backed Zelensky's proposal for direct ceasefire talks with Putin, with Europe playing a role, in a June 7 joint statement at Downing Street. They \"commended\" Zelensky's call for a diplomatically negotiated end to the fifth-year war, with active US and European participation. Zelensky's open letter argued Russians had grown tired of attacks, inflation and fuel shortages. Putin had already rebuffed the face-to-face proposal.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/European%20leaders%20ready%20to%20support%20ceasefire%20talks%20between%20Ukraine%2C%20Russia.pdf"},{"id":"st-11","title":"IMF chief warns world isn't ready for shocks that are piling up","source":"ST","date":"09 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"IMF chief Kristalina Georgieva warned the world isn't ready for increasingly frequent shocks and must build more resilient foundations. \"We are not going to get to a place where shocks are gone,\" she said, citing Covid, Ukraine, tariff turmoil and now the Middle East conflict. She stressed objective analysis as the fund's best tool across its 191 members and roughly US$1 trillion lending capacity. She warned against repeating globalisation's failure to address AI-driven inequality.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/IMF%20chief%20warns%20world%20isn%27t%20ready%20for%20shocks%20that%20are%20piling%20up.pdf"},{"id":"st-12","title":"Iran, Israel call off strikes after Trump tells them to 'stop shooting'","source":"ST","date":"09 Jun 2026","tags":["Geopolitics","Energy"],"summary":"Iran and Israel signalled on June 8 they were ready to wind down an escalation that briefly shattered the two-month ceasefire, after Trump told both to \"stop shooting.\" Iran's military said it was halting attacks but warned of harsher action if Israel resumes strikes, including in southern Lebanon. Netanyahu ordered the military to halt preparations for another attack on Iran at Trump's request. Israel said strikes in southern Lebanon would nonetheless continue against Hezbollah.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Iran%2C%20Israel%20call%20off%20strikes%20after%20Trump%20tells%20them%20to%20%27stop%20shooting%27.pdf"},{"id":"st-13","title":"OCBC to offer physical gold trading and storage to wealthy clients in Singapore","source":"ST","date":"09 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"OCBC will offer physical gold trading and storage to institutional and high-net-worth clients from June 10, entering the bullion business as demand for holding gold in Singapore grows. Clients can buy serial-numbered 1kg or 400-troy-ounce bars with directly allocated ownership rather than a pooled claim. Bank of Singapore bullion holdings have risen over 40% since end-2025, mostly from ultra-high-net-worth clients. Clients increasingly prefer holding and transacting gold locally rather than via a US entity.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/OCBC%20to%20offer%20physical%20gold%20trading%20and%20storage%20to%20wealthy%20clients%2C%20institutions%20in%20Singapore.pdf"},{"id":"st-14","title":"Singapore firms willing to pay higher wages for AI, soft skills","source":"ST","date":"09 Jun 2026","tags":["Southeast Asia","Technology & AI"],"summary":"Two-thirds of 599 Singapore firms surveyed by ManpowerGroup would pay a salary premium for AI literacy, even as hiring sentiment fell to its lowest since 2021. Premiums are highest in the public sector, health and professional services, with willingness also to pay for AI model/application development (64%) and traditional IT and data skills (56%). Soft skills like critical thinking and communication are also rewarded. For next quarter, 41% plan to hold headcount steady and 22% expect cuts.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/S%27pore%20firms%20willing%20to%20pay%20higher%20wages%20for%20AI%2C%20soft%20skills.pdf"},{"id":"st-15","title":"Singapore launches new AI supercomputer to boost climate, healthcare research","source":"ST","date":"09 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"Singapore launched Aspire 2B, its latest national research supercomputer with the country's largest cluster of Nvidia GPUs — more computing power than 120,000 high-end AI laptops combined. Over 9,000 public researchers will use it to build complex AI models and shorten experimentation, said Minister Josephine Teo at the NTU launch. Workloads once sent overseas — advanced climate modelling, high-resolution weather forecasting and Asian-language chatbots — can now run locally. It is billed as a multiplier for the research community.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Singapore%20launches%20new%20AI%20supercomputer%20to%20boost%20climate%2C%20healthcare%20research.pdf"},{"id":"st-16","title":"Singapore stocks slide amid global tech rout, Iran war strikes","source":"ST","date":"09 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"The Straits Times Index fell 1.7% to 4,963.67 on June 8 amid a global tech selloff and Middle East escalation, with chip stocks hit hardest — AEM down about 3% and InnoTek over 4%. Across Asia, South Korea's Kospi plunged over 8%, Japan's Nikkei nearly 4% and Taiwan 3.5%, while Samsung sank 10% and SK Hynix over 7.5%. The slide followed Wall Street's June 5 drop. Technology names led the regional rout.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Singapore%20stocks%20slide%20amid%20global%20tech%20rout%2C%20Iran%20war%20strikes.pdf"},{"id":"st-17","title":"There's no AI boom without an energy boom","source":"ST","date":"09 Jun 2026","tags":["Energy","Technology & AI","Environment"],"summary":"David Fogarty argues AI's surging energy appetite has reached a crunch point that threatens both growth projections and Big Tech's social licence to operate. There simply aren't enough electricity grid connections — or water — to meet demand, since data centres are built faster than utilities can add grid capacity. Alphabet, Amazon, Meta and Microsoft are investing in renewables, on-site generation, nuclear and even fusion. The energy bottleneck is now central to AI's trajectory.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/There%27s%20no%20AI%20boom%20without%20an%20energy%20boom.pdf"},{"id":"st-18","title":"Xi says willing to bring China-North Korea ties to 'new heights' during rare visit","source":"ST","date":"09 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Xi Jinping made a rare June 8 visit to Pyongyang — his first since 2019 — telling an emboldened Kim Jong Un he was willing to bring China-North Korea ties to \"new heights.\" Kim, who has deepened his alliance with Putin by sending troops to fight for Russia, gave Xi a lavish red-carpet welcome. Xi urged stronger exchanges in diplomacy, law enforcement and the military. China remains North Korea's main trading partner and economic lifeline under heavy sanctions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Xi%20says%20willing%20to%20bring%20China-North%20Korea%20ties%20to%20%27new%20heights%27%20during%20rare%20visit.pdf"},{"id":"bt-01","title":"'Human judgment' is vital even with AI's introduction: HSBC CEO","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"HSBC CEO Georges Elhedery said human judgment, decision-making and accountability must stay at the core of banking even as AI becomes ubiquitous — and could even mean more hiring. His remarks counter recent CEO comments that rattled staff, including StanChart's Winters on replacing \"lower-value human capital.\" Elhedery said AI enables hyper-personalised services and productivity gains. \"The bank of the future means more capabilities,\" he said, framing investment as job creation.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/%27Human%20judgment%27%20is%20vital%20even%20with%20AI%27s%20introduction%20HSBC%20CEO.pdf"},{"id":"bt-02","title":"AI boom upends San Francisco housing market","source":"BT","date":"09 Jun 2026","tags":["Technology & AI","Society"],"summary":"The AI boom is upending San Francisco's housing market, creating extreme wealth as firms pay AI researchers packages up to US$250 million. The metro's median home price rose over 10% year on year to US$1.7 million in April — the highest in the US — pushing buyers like a nurse couple to raise budgets and shift to Marin County. Record AI fundraising compounds the pressure. The city's fortunes have reversed sharply since its pandemic-era reputational slump.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/AI%20boom%20upends%20San%20Francisco%20housing%20market.pdf"},{"id":"bt-03","title":"In a world of long-drawn crises, 'wait and see' may be a decreasingly tenable stance","source":"BT","date":"09 Jun 2026","tags":["Geopolitics","Trade"],"summary":"The commentary argues a \"wait and see\" stance is increasingly untenable in an era of long-drawn crises and seemingly irrational actors. Trump's tariffs persist despite being deemed illegal, with a new round proposed on 60 countries including Singapore, while the Iran war has passed its 100th day after many expected a swift end. The piece challenges the assumption that rational self-interest will prevail. It urges accepting absurdity and getting on with decisions amid volatility.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/In%20a%20world%20of%20long-drawn%20crises%2C%20%27wait%20and%20see%27%20may%20be%20a%20decreasingly%20tenable%20stance.pdf"},{"id":"bt-04","title":"Japan's growth holds up despite drop in business investment","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets"],"summary":"Japan's economy grew an annualised 1.8% in Q1 (revised down from 2.1%) as Iran-war turbulence prompted firms to cut capital spending, downgraded to -0.7%. Resilient consumer spending and AI-related export demand kept overall growth solid. The report should keep the Bank of Japan on track to raise interest rates next week. Net exports and consumption were left unchanged in the revision.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Japan%27s%20growth%20holds%20up%20despite%20drop%20in%20business%20investment.pdf"},{"id":"bt-05","title":"Mainland Chinese savers flock to Hong Kong as regulators tighten capital controls","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"Mainland Chinese savers are rushing to Hong Kong after Beijing's late-May crackdown on \"illegal\" cross-border securities trading, which punished three online brokers. An estimated US$54 billion in offshore assets — US and Hong Kong stocks — is at stake, per Kaiyuan Securities. Investors are moving assets to smaller Hong Kong-focused brokers and exploring offshore company setups to retain foreign-market access. Tightened bank due-diligence rules are adding friction.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Mainland%20Chinese%20savers%20flock%20to%20Hong%20Kong%20as%20regulators%20tighten%20capital%20controls.pdf"},{"id":"bt-06","title":"Nvidia clinches deals with South Korean giants including SK Group to advance AI boom","source":"BT","date":"09 Jun 2026","tags":["Technology & AI","Trade"],"summary":"Nvidia announced a series of South Korean deals with SK Hynix, Naver, SK Telecom and Doosan during CEO Jensen Huang's high-profile Seoul visit, securing memory-chip supply for its AI ambitions. SK Hynix signed a multi-year partnership to develop advanced memory for global AI data centres as makers strain to meet demand. Deal values were undisclosed. Huang's trip featured soju dinners and a baseball pitch with Korea's corporate bosses.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Nvidia%20clinches%20deals%20with%20South%20Korean%20giants%20including%20SK%20Group%20to%20advance%20AI%20boom.pdf"},{"id":"bt-07","title":"Oil market calm masks a host of unknowns","source":"BT","date":"09 Jun 2026","tags":["Energy"],"summary":"The biggest oil supply shock in decades has entered its fourth month with no resolution, yet the market remains surprisingly calm. Renewed Israel-Iran strikes pushed Brent up over 4% to US$98 on June 8, but prices stay well below recent peaks and within the past two decades' range. Traders are largely operating in the dark on inventories, global demand and geopolitics. The disconnect reflects deep underlying uncertainty.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Oil%20market%20calm%20masks%20a%20host%20of%20unknowns.pdf"},{"id":"bt-08","title":"Singapore well-placed to be Asean's gold-trading hub as regional duties rise: analysts","source":"BT","date":"09 Jun 2026","tags":["Southeast Asia","Finance & Markets"],"summary":"Singapore is well-placed to become ASEAN's neutral gold clearing and distribution hub as regional duties rise, analysts told BT. Malaysia's new 10% gold-bar import duty and Indonesia's export duty have stranded or redirected inventory, creating an opening. State Street's Robin Tsui said recent policy shifts let Singapore position as a stable regional hub for gold flows. Building market depth and infrastructure is now a priority rather than an option.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Singapore%20well-placed%20to%20be%20Asean%27s%20gold-trading%20hub%20as%20regional%20duties%20rise%20analysts.pdf"},{"id":"bt-09","title":"South-east Asia can lead the energy transition with its partners","source":"BT","date":"09 Jun 2026","tags":["Energy","Southeast Asia","Environment"],"summary":"A second oil-price shock in five years underscores that economies built on imported fossil fuels are strategically exposed, the commentary argues, urging Southeast Asia to lead an energy transition with partners. Solar and wind with storage are now among the cheapest, fastest new power sources, with nuclear offering baseload. Security has become policymakers' top priority within the energy trilemma of sustainability, security and affordability. Agile grids and connections can build resilience while weaning Asia off fossil fuels.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/South-east%20Asia%20can%20lead%20the%20energy%20transition%20with%20its%20partners.pdf"},{"id":"bt-10","title":"Strong US dollar and tariff threats ignite broad Asian currency sell-off","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets"],"summary":"A resurgent US dollar and US tariff threats have ignited a broad Asian currency selloff, dragging the rupiah to record lows (past 18,000 per US dollar) and the yen and won to multi-year lows. Expected Fed hikes after strong US jobs data and a widening rate gap are driving the pressure, compounded by Middle East energy shocks and capital outflows. The Singapore dollar has bucked the trend. Several Asian central banks are moving to defend their currencies.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Strong%20US%20dollar%20and%20tariff%20threats%20ignite%20broad%20Asian%20currency%20sell-off.pdf"},{"id":"bt-11","title":"Tech rout sweeps Asia as AI rally jitters spark sell-off","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"A rotation out of technology swept Asian markets on June 8 as investors feared the AI-driven rally had outrun fundamentals. South Korea's Kospi plunged as much as 8.8%, triggering a 20-minute circuit breaker before closing 8.3% lower — its steepest drop since March 4 — with Samsung down 10.2% and SK Hynix 7.7%. Japan's Nikkei fell 3.9%, Hong Kong's Hang Seng 1.2% and Singapore's STI 1.7%. Instability in the US-Iran ceasefire added to the pressure.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Tech%20rout%20sweeps%20Asia%20as%20AI%20rally%20jitters%20spark%20sell-off.pdf"},{"id":"bt-12","title":"Temasek-backed startup PhysicsX hits US$2.4 billion valuation for AI manufacturing","source":"BT","date":"09 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"British startup PhysicsX, which builds AI models for manufacturing components like jet engines and semiconductors, raised US$300 million at a roughly US$2.4 billion valuation in a round led by Singapore's Temasek. New backers Intrepid Growth Partners and M&G Catalyst joined existing investors Nvidia and Applied Materials, more than doubling its prior ~US$1 billion valuation. The firm needs cash to clear a roughly six-month customer backlog. It competes in a crowded \"industrial AI\" field that includes Jeff Bezos's Project Prometheus.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Temasek-backed%20startup%20PhysicsX%20hits%20US2.4%20billion%20valuation%20to%20provide%20AI%20for%20manufacturing.pdf"},{"id":"bt-13","title":"Think twice about rebuilding that old landed property into a super-big house","source":"BT","date":"09 Jun 2026","tags":["Southeast Asia","Society"],"summary":"The column cautions Singapore landed-home owners against rebuilding into maximally large houses to exploit floor area, citing high construction and recurring costs. Singapore's private stock held 73,662 landed homes against 350,503 condos in Q1, with landed ownership restricted to citizens and often bought for owner occupation. While maxing gross floor area lowers cost per square foot, oversized owner-occupied homes carry heavy upkeep. Buyers are urged to weigh bespoke ambitions against practicality.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Think%20twice%20about%20rebuilding%20that%20old%20landed%20property%20into%20a%20super-big%20house%20to%20max%20out%20GFA.pdf"},{"id":"bt-14","title":"UOB appoints new CEOs for China and Hong Kong offices","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"UOB named new CEOs for its mainland China and Hong Kong operations from July 1 to accelerate cross-border growth between Greater China and ASEAN. Adaline Zheng becomes CEO of UOB China, succeeding the retiring Peter Foo, while George Tung takes over UOB Hong Kong. Group CEO Wee Ee Cheong said mainland China remains a key driver of trade and capital flows into Southeast Asia. The bank is sharpening Hong Kong's role as a connector and strengthening private banking.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/UOB%20appoints%20new%20CEOs%20for%20China%20and%20Hong%20Kong%20offices.pdf"},{"id":"bt-15","title":"Why venture capital unlocks access to next-generation market leaders","source":"BT","date":"09 Jun 2026","tags":["Finance & Markets"],"summary":"The piece argues venture capital deserves a central rather than peripheral portfolio role as value is increasingly created earlier and in private markets. Investors holding only public equities and buyouts may be structurally late to important innovation cycles as companies stay private longer. VC offers diversification, disruption-risk hedging and access to increasingly institutionalised manager capabilities. It should be viewed as a strategic building block, not merely \"high-risk equity.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Why%20venture%20capital%20unlocks%20access%20to%20next-generation%20market%20leaders.pdf"},{"id":"scmp-01","title":"Alibaba forges Token Foundry as it hammers AI ambitions into shape","source":"SCMP","date":"09 Jun 2026","tags":["Technology & AI","Trade"],"summary":"Alibaba established a new unit called Token Foundry, consolidating its Tongyi Lab and Future Life Lab under CEO Eddie Wu to commercialise AI under a unified strategy. Qwen leader Zhou Jingren becomes Alibaba's chief scientist, heading a new model-development team. The restructuring pulls together video-generation and open-world model projects previously housed across business units. It signals Alibaba aligning its sprawling businesses around a single AI push.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Alibaba%20forges%20Token%20Foundry%20as%20it%20hammers%20AI%20ambitions%20into%20shape.pdf"},{"id":"scmp-02","title":"China begins large-scale delivery of gallium chips for space-ground 6G network","source":"SCMP","date":"09 Jun 2026","tags":["Technology & AI","Trade"],"summary":"China delivered 5 million gallium nitride semiconductors at scale for the first time, to power smart terminals in a space-air-ground integrated 6G network. The chips were developed by the US-sanctioned CETC No 55 Research Institute and subsidiary Nanjing Guobo Electronics. China, the world's largest gallium holder and exporter, imposes strict end-use export controls on the rare metal. Officials called the chips a backbone for 6G, commercial space programmes and emergency communications.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%20begins%20large-scale%20delivery%20of%20gallium%20chips%20for%20space-ground%206G%20network.pdf"},{"id":"scmp-03","title":"China sees record panda bond issuance in 2026 as foreign borrowers pile in","source":"SCMP","date":"09 Jun 2026","tags":["Finance & Markets","Trade"],"summary":"Foreign governments, banks and multinationals are piling into China's onshore bond market, driving panda-bond issuance to a record 136.5 billion yuan in the first five months of 2026, up 90% year on year. May alone saw 26.64 billion yuan, up 246%. Looser monetary policy, a wider market opening and yuan internationalisation are fuelling the trend. Issuers included the governments of Kazakhstan and Pakistan, plus Deutsche Bank, Morgan Stanley and Volkswagen.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%20sees%20record%20panda%20bond%20issuance%20in%202026%20as%20foreign%20borrowers%20pile%20in.pdf"},{"id":"scmp-04","title":"China's 5-year plans significantly impact American factories, US study says","source":"SCMP","date":"09 Jun 2026","tags":["Trade","Geopolitics"],"summary":"A US study finds China's five-year plans significantly hurt American factories: when Beijing backed an industry (2001-2020), US plants in that sector shed about 5% of jobs and 6% of investment, with closures rising. Chinese industries targeted for growth saw 12-15% surges in employment, investment and output per plan cycle. Emory's Jiang Wei tracked 1.6 million US factories and 1.1 million Chinese firms. She urged China to further rebalance its economy.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%E2%80%99s%205-year%20plans%20significantly%20impact%20American%20factories%2C%20US%20study%20says.pdf"},{"id":"scmp-05","title":"China's export machine defies gravity as shipments soar in May","source":"SCMP","date":"09 Jun 2026","tags":["Trade","Geopolitics"],"summary":"China's exports defied the Iran-war drag, surging 19.4% year on year to US$376.78 billion in May, far above the 12.4% forecast, helped by Trump's Beijing visit and robust global demand. Imports jumped 27.4%, widening the trade surplus to US$105.43 billion. It followed an unexpectedly strong April. Markets had watched closely to gauge whether China's export momentum could hold amid the conflict.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/DevelopingChina%E2%80%99s%20export%20machine%20defies%20gravity%20as%20shipments%20soar%20in%20May.pdf"},{"id":"scmp-06","title":"Forget air-con, Singapore looks underground for a cooler future","source":"SCMP","date":"09 Jun 2026","tags":["Environment","Southeast Asia","Energy"],"summary":"Singapore is expanding underground district cooling — a 140-year-old concept that uses less electricity than centralised air-conditioning — as energy security and a projected \"super El Nino\" raise the stakes. Pipes now run beneath at least eight neighbourhoods, including the world's largest underground Marina Bay network. The rollout comes amid US-Iran-war energy shortages, with the city's temperatures rising twice as fast as the global average. District cooling is projected to be a US$60 billion market by 2034.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Forget%20air-con%2C%20Singapore%20looks%20underground%20for%20a%20cooler%20future.pdf"},{"id":"scmp-07","title":"Hong Kong-listed Tencent eyes global note issuance amid AI investment surge","source":"SCMP","date":"09 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Tencent plans to issue new notes to international investors within a year, expanding its global medium-term note programme to a US$30 billion ceiling, joining a fundraising wave by Hong Kong-listed AI firms. Net proceeds are for general corporate purposes, with outstanding notes at US$17.51 billion. The move comes amid surging AI investment across the sector. It follows Tencent's first-ever yuan-denominated bonds last September.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Hong%20Kong-listed%20Tencent%20eyes%20global%20note%20issuance%20amid%20AI%20investment%20surge.pdf"},{"id":"scmp-08","title":"How China's 'Hefei model' spawned a chipmaker's multibillion-dollar IPO plan","source":"SCMP","date":"09 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Chinese DRAM maker CXMT is pushing for a landmark IPO on Shanghai's Star Market, vindicating the state-backed \"Hefei model\" after the city government leveraged over 220 billion yuan in capital to build industrial clusters. Pre-IPO estimates value CXMT at roughly 150 billion yuan (US$22.2 billion), with analysts projecting its market cap could top 1 trillion yuan once trading begins. The Hefei facility was a quiet epicentre of China's chip self-sufficiency gamble. It is among the country's most consequential tech listings.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/How%20China%E2%80%99s%20%E2%80%98Hefei%20model%E2%80%99%20spawned%20a%20chipmaker%E2%80%99s%20multibillion-dollar%20IPO%20plan.pdf"},{"id":"scmp-09","title":"Leaks and backdoors: China warns of security risks in relay services for foreign AI models","source":"SCMP","date":"09 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"China's Ministry of State Security warned of security risks in \"AI relay services\" that give local developers grey-market access to overseas AI models, citing data leaks and unauthorised cross-border transfers. These intermediaries aggregate domestic and foreign models through a single interface, offering convenience and lower prices. The MSS said some operators lack proper qualifications and security controls, raising risks of privacy breaches and illicit data trading. The warning reflects China's tightening grip on data flows.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Leaks%20and%20backdoors%20China%20warns%20of%20security%20risks%20in%20relay%20services%20for%20foreign%20AI%20models.pdf"},{"id":"scmp-10","title":"Singapore eyes Asean connectivity amid new US-China dynamic: Lawrence Wong","source":"SCMP","date":"09 Jun 2026","tags":["Southeast Asia","Geopolitics"],"summary":"PM Lawrence Wong said Singapore will push ASEAN connectivity as bloc chair next year amid a fraught US-China dynamic. He stressed that open Xi-Trump communication reduces miscalculation risk but is no panacea, and that the two deeply intertwined economies must coexist since neither can dominate. He likened the dynamic to a new \"mutually assured destruction.\" Singapore wants an open, inclusive environment to engage all major players.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Singapore%20eyes%20Asean%20connectivity%20amid%20new%20US-China%20dynamic%20Lawrence%20Wong.pdf"},{"id":"scmp-11","title":"South Korea tells Japan to apologise before military cooperation","source":"SCMP","date":"09 Jun 2026","tags":["Geopolitics","Defence"],"summary":"South Korean President Lee Jae Myung said Japan must offer a genuine apology before a bilateral military logistics pact (ACSA) can advance, despite pressure to deepen ties as North Korea, China and Russia draw closer. Lee likened it to an attacker asking a hospitalised victim to shake hands and move on. He acknowledged a \"practical need\" but cited deep public resentment in South Korea. The stance complicates US efforts to align its two allies.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/South%20Korea%20tells%20Japan%20to%20apologise%20before%20military%20cooperation.pdf"},{"id":"scmp-12","title":"Spying in Xinjiang? No, I was reporting from China's energy heartland","source":"SCMP","date":"09 Jun 2026","tags":["Energy","Society"],"summary":"An SCMP reporter's note documents a rare visit to Xinjiang's coal-chemical heartland — one of China's four major bases for large-scale coal-chemical production — as the Iran war disrupts global oil and chemical supplies. The coal-heavy sector is seizing the opportunity amid high oil prices. The reporter describes the difficulty of gaining access to the tightly controlled region and observing unstaffed mining operations. It accompanies a two-part reporting series on the ecosystem.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Spying%20in%20Xinjiang%20No%2C%20I%20was%20reporting%20from%20China%E2%80%99s%20energy%20heartland.pdf"},{"id":"scmp-13","title":"To keep up with China's fast-changing consumers, MNCs adapt via local alliances","source":"SCMP","date":"09 Jun 2026","tags":["Trade","Society"],"summary":"Foreign companies are increasingly selling China units, partnering or forming joint ventures with local firms to stay competitive amid rapid market shifts, following Starbucks and Burger King. General Mills said it would offload its Häagen-Dazs China business. Citi's Colin Banfield said China's sheer size makes a full exit unthinkable and that trends there \"play out in the rest of the world.\" China is \"a laboratory\" for how to sell and deliver to consumers, he said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/To%20keep%20up%20with%20China%E2%80%99s%20fast-changing%20consumers%2C%20MNCs%20adapt%20via%20local%20alliances.pdf"},{"id":"scmp-14","title":"UK's Starmer gives Apple, Google 3 months to stop children sending nude images","source":"SCMP","date":"09 Jun 2026","tags":["Politics","Technology & AI","Society"],"summary":"UK PM Keir Starmer gave Apple and Google three months to make it impossible for children to take, share or view nude images on smartphones, or face new laws, fines and potential criminal liability for tech bosses. Firms must activate or build device-level detection, meaning adults would need age verification to take or view such images. The rules would apply to existing and newly sold UK devices. \"Standing by is not an option,\" Starmer said at London Tech Week.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/UK%E2%80%99s%20Starmer%20gives%20Apple%2C%20Google%203%20months%20to%20stop%20children%20sending%20nude%20images.pdf"},{"id":"scmp-15","title":"US adds Alibaba, BYD and other Chinese tech champions to military company blacklist","source":"SCMP","date":"09 Jun 2026","tags":["Geopolitics","Trade","Technology & AI"],"summary":"The Pentagon is adding Alibaba, BYD, Baidu, Nio, WuXi AppTec and dozens more to its list of \"Chinese military companies\" under Section 1260H, widening a blacklist targeting EVs, AI, batteries, biotech and solar. The designation can complicate access to US capital markets and government business, though it doesn't automatically trigger sanctions. It marks a sharp escalation in US-China technological competition. The notice was scheduled for Federal Register publication on Wednesday.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/US%20adds%20Alibaba%2C%20BYD%20and%20other%20Chinese%20tech%20champions%20to%20military%20company%20blacklist.pdf"},{"id":"scmp-16","title":"Update: Israel and Iran hold fire after exchange, but warn of escalation if provoked","source":"SCMP","date":"09 Jun 2026","tags":["Geopolitics","Energy"],"summary":"Israel and Iran backed away from further strikes on June 8 but warned of retaliation if provoked, hours after trading fire for the first time since the April ceasefire. Trump called for an immediate stop, prompting Iran's joint command to announce a halt to offensive strikes while threatening \"crushing\" responses to further aggression, including in southern Lebanon. The renewed hostilities revived fears of a return to full-scale war. The conflict has driven up global energy and food prices since February 28.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/UpdateIsrael%20and%20Iran%20hold%20fire%20after%20exchange%2C%20but%20warn%20of%20escalation%20if%20provoked.pdf"},{"id":"scmp-17","title":"WWDC 2026: Apple gives Siri an AI makeover, but China must wait","source":"SCMP","date":"09 Jun 2026","tags":["Technology & AI","Trade"],"summary":"At WWDC 2026, Apple unveiled an AI makeover of Siri powered by Google's Gemini, abandoning preprogrammed responses for fluid, cross-app conversations with continuous chat history. A public beta arrives later this year for English-language devices, but China must wait as the updates remain walled off there. It was Tim Cook's final keynote before handing the reins to John Ternus in September. Analysts said Apple wants AI embedded in the OS, with Siri central to that ambition.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/WWDC%202026%20Apple%20gives%20Siri%20an%20AI%20makeover%2C%20but%20China%20must%20wait.pdf"},{"id":"scmp-18","title":"Why are Chinese savers moving money out of banks and into tech stocks?","source":"SCMP","date":"09 Jun 2026","tags":["Finance & Markets","Society"],"summary":"Falling deposit rates are pushing Chinese savers into technology-focused mutual funds, with some lenders pulling higher-rate long-term products. One Shanghai worker shifted half her savings into chip and co-packaged-optics funds after a three-year ICBC deposit's rate nearly halved to 1.55% from about 3% in 2023. The AI-stock rally has emboldened previously risk-averse savers. Chips and CPO are among the A-share market's hottest sectors.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Why%20are%20Chinese%20savers%20moving%20money%20out%20of%20banks%20and%20into%20tech%20stocks.pdf"}]},"2026-06-10":{"date":"2026-06-10","dayOfWeek":"Wednesday","totalArticles":61,"sourceCounts":{"WSJ":14,"ST":15,"BT":14,"SCMP":18},"executiveDigest":"The US struck Iran again after Trump said an Apache was downed over Hormuz — even as he claimed a deal was in its 'final throes' — while OpenAI filed to go public and China unveiled a ~US$280 billion plan to build AI data centres without Nvidia.","briefingCards":[{"title":"Lead story — Middle East whiplash, US strikes again","body":"The fragile calm shattered once more: the US launched fresh \"self-defence strikes\" on Iran after Trump said Tehran downed a US Apache over the Strait of Hormuz (both crew rescued, uninjured) — hours after Israel and Iran had de-escalated. Trump simultaneously claimed a deal was in its \"final throes\" (\"two or three days\"), yet he had struggled to rein in Netanyahu, who defied him twice. WSJ ('Trump Struggled to Rein In Netanyahu', 'Iran's Attack Reveals Ambitions'), ST ('How Israel is frustrating Trump') and SCMP ('Is Trump calling the shots... or pretending') all read the same way: Washington is a step behind events. For Tecity, the entrenched Hormuz blockade keeps an energy-risk premium live."},{"title":"Markets & finance — the AI funding deluge and IPO wall","body":"OpenAI confidentially filed to go public (possibly this fall), joining SpaceX (June 12, ~US$1.75T, potentially minting the first trillionaire) and Anthropic. Wall Street is funding the build-out \"every conceivable way\": hyperscalers issued US$159B of bonds (vs US$108B in 2025), Alphabet announced an US$85B equity raise, and ~two dozen banks reap >US$500M in SpaceX fees while using the deal to court the ultra-rich. Korea's leveraged \"ant\" retail investors were burned in the chip rout. Bank of Singapore stays overweight US equities at \"half-time\"; the BoJ leans toward pausing QT while hiking to 1%."},{"title":"Asia realignment — Xi's win, Europe's pivots, the blacklist","body":"Xi left Pyongyang having reaffirmed China as North Korea's \"foremost strategic priority,\" blunting fears of a Russia tilt — even as a WSJ feature called North Korea an unlikely economic success story. The Pentagon widened its \"Chinese military companies\" blacklist (Alibaba, Baidu, BYD, CXMT, YMTC), raising US-investment-curb risk, while Trump's China thaw met resistance from Congress and his own administration. Germany quit the FCAS jet project with France — a blow to European defence autonomy — and a WSJ op-ed pressed for faster US arms to Taiwan. Putin courts ASEAN at next week's Kazan summit."},{"title":"Energy & climate — Hormuz's long shadow","body":"With the strait still shut, shipowners ordered a record 262 supertankers (topping 2008) and freight rates hit record highs; a BT primer shows energy leads and equities follow in such shocks. Driven by AI demand and the energy crunch, China is on track to overtake the US as the top nuclear-energy producer, with nearly half the world's reactors under construction. A 1,352-page UN ocean assessment warned of a \"deepening crisis\" from warming, pollution and overfishing. The throughline: supply-chain and energy resilience is now a standing investment theme."},{"title":"Technology & AI — China's sovereign stack vs the West","body":"China is drafting a ~2 trillion yuan (~US$280B) five-year plan for interconnected data centres relying =80% on local tech (Huawei), explicitly squeezing out Nvidia and AMD, plus a national AI-data-supply push and a US$577M chip \"patient capital\" fund. Anthropic opened its powerful Mythos model (Claude Fable 5) to the public with guardrails, valuation above US$965B. Nvidia deepened Korea ties (SK Telecom gigawatt AI factories); Apple gave Siri a Google-Gemini makeover; a 24-year-old's AI fund hit US$20B AUM; and Senate Democrats unveiled a flood of AI-oversight bills."},{"title":"Singapore & SEA focus — diversification and capital-market ambition","body":"Singapore will negotiate its first African FTA with the eight-member East African Community (President Tharman), diversifying trade amid geopolitical strain. Local investors eyed the SpaceX IPO (retail likely only post-listing), while SGX's new Nasdaq-linked Global Listing Board needs strong debuts to avoid SPAC-style disappointment, and Malaysia's MY Value Up channels state funds into better-governed firms. Family-governance and generational-wealth themes featured prominently for private-wealth readers. Regionally: BoJ policy, Japan's severe typhoon outlook, and Malaysian parties' embrace of AI campaigning."}],"keyMetrics":[{"value":"US strikes","label":"US hits Iran again","sub":"Retaliation for a downed Apache over Hormuz"},{"value":"~US$280B","label":"China AI data-centre plan","sub":"~2 trillion yuan; built to bypass Nvidia"},{"value":"US$1.75T","label":"SpaceX IPO — Jun 12","sub":"Biggest ever; OpenAI also filed"},{"value":"115k","label":"US jobs lost to AI in 2026","sub":"Just 17% of Americans upbeat on AI"},{"value":"262","label":"Supertankers on order","sub":"Record; tops the 2008 peak"},{"value":"8","label":"East African states","sub":"Singapore's first Africa FTA (Tharman)"}],"articles":[{"id":"wsj-01","title":"Amazon Enters Agreement With Corning for Optical Fiber for Data Centers","source":"WSJ","date":"10 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Amazon signed a multibillion-dollar deal with Corning for optical fibre, cable and connectivity to support its expanding data-centre footprint, letting Corning add 1,000 jobs in North Carolina. Corning shares jumped 5.7% and have more than doubled this year on AI-infrastructure demand. The deal follows a US$500 million Nvidia investment and an agreement worth up to US$6 billion with Meta. Fibre optics are key connective tissue for AI build-outs that strain power grids.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Amazon%20Enters%20Agreement%20With%20Corning%20for%20Optical%20Fiber%20for%20Data%20Centers.pdf"},{"id":"wsj-02","title":"Apple WWDC 2026: The Latest Updates and Siri AI Overhaul","source":"WSJ","date":"10 Jun 2026","tags":["Technology & AI"],"summary":"Apple unveiled a new AI version of Siri at WWDC 2026, developed with Google, that it hopes will power a comeback in artificial intelligence. The chatbot makeover anchored the keynote — Tim Cook's last before handing over to John Ternus. It pairs Apple's hardware ecosystem with Google's Gemini model. The move underscores Apple's late but determined push to embed AI across its devices.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Apple%20WWDC%202026%20The%20Latest%20Updates%2C%20Announcements%20and%20Siri%20AI%20Updates.pdf"},{"id":"wsj-03","title":"Democrats Unveil Flood of AI Proposals in Potential Challenge to Tech Giants","source":"WSJ","date":"10 Jun 2026","tags":["Politics","Technology & AI"],"summary":"Senate Democrats are introducing a flood of AI bills that preview the oversight tech firms could face if the party retakes Congress, led by Adam Schiff's proposal to require human involvement when the Pentagon uses AI in weapons and to bar domestic AI surveillance. The bills follow Anthropic's recent Pentagon spat over human-in-the-loop guardrails. Lawmakers cite cyberattack-capable models, data-centre backlash and graduate joblessness. Schiff said AI \"could very well be the dominant issue in the next presidential election.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Democrats%20Unveil%20Flood%20of%20AI%20Proposals%20in%20Potential%20Challenge%20to%20Tech%20Giants.pdf"},{"id":"wsj-04","title":"Germany Drops Jet Project With France in Setback for European Defense Sovereignty","source":"WSJ","date":"10 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Germany pulled out of the stalled FCAS stealth-fighter project with France and Spain, a symbol of Europe's struggle to rebuild its militaries as the US reduces its presence. Berlin acted after failing to resolve an Airbus-Dassault dispute over who should lead development, catching Paris by surprise. The partners will still cooperate on the AI-powered \"combat cloud\" linking jets and drone swarms. Their defence ministries meet in July to map more realistic joint projects.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Germany%20Drops%20Jet%20Project%20With%20France%20in%20Setback%20for%20European%20Defense%20Sovereignty.pdf"},{"id":"wsj-05","title":"Iran's Attack on Israel Reveals New and Aggressive Regional Ambitions","source":"WSJ","date":"10 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Iran's ballistic-missile salvos at Israel signal Tehran's ambition to project regional power and show it retains strike capability despite the intense US-Israeli air campaign. Iran appears to be gambling that the attacks, plus Trump's desire to preserve a peace deal, will pressure Netanyahu to scale back operations against Hezbollah in Lebanon after Israel's Beirut strike. Tehran said it had ceased fire but warned it could resume and widen if Israel keeps striking. It has built deterrence partly by blockading the Strait of Hormuz.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Iran%E2%80%99s%20Attack%20on%20Israel%20Reveals%20New%20and%20Aggressive%20Regional%20Ambitions.pdf"},{"id":"wsj-06","title":"Nvidia Strikes Deals With Korean Tech Titans for AI Infrastructure Buildout","source":"WSJ","date":"10 Jun 2026","tags":["Technology & AI","Trade"],"summary":"Nvidia is partnering leading South Korean firms to build large-scale AI infrastructure in Asia, with SK Telecom advancing gigawatt-scale AI cloud \"factories\" expected online in 2027. The deals, during Jensen Huang's second Korea visit in under a year, deepen ties with SK Group, parent of key memory supplier SK Hynix. Nvidia aims to extend its ecosystem into robotics and industrial sectors. \"Without SK's partnership, today's AI industry would not have developed as wonderfully,\" Huang said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Nvidia%20Strikes%20Deals%20With%20Korean%20Tech%20Titans%20for%20AI%20Infrastructure%20Buildout.pdf"},{"id":"wsj-07","title":"OpenAI Files to Go Public in Test of Investor Appetite for Top AI Startups","source":"WSJ","date":"10 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"OpenAI confidentially filed IPO paperwork with the SEC, potentially going public as soon as this fall, though it cautioned \"it may be a while\" given the tradeoffs of being public. It joins SpaceX — listing this week in the biggest IPO ever, possibly minting the first trillionaire — and Anthropic in racing to tap investor appetite for AI. Bankers say whichever lists first will define the industry and access the deepest capital pools. The filing tests how much AI exposure markets can absorb.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/OpenAI%20Files%20to%20Go%20Public%20in%20Test%20of%20Investor%20Appetite%20for%20Top%20AI%20Startups.pdf"},{"id":"wsj-08","title":"Taiwan Needs U.S. Arms Now","source":"WSJ","date":"10 Jun 2026","tags":["Geopolitics","Defence"],"summary":"In a WSJ op-ed, CSIS's Seth Jones argues US foot-dragging on a US$14 billion arms package — atop a US$30 billion delivery backlog — emboldens China and erodes Indo-Pacific deterrence. Of 23 promised US defence items over a decade, Taiwan reports only five fully delivered. At roughly US$4 billion a year, clearing the backlog could take a decade — too slow given PLA invasion-readiness goals. He urges Washington to approve the package and accelerate deliveries.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Taiwan%20Needs%20U.S.%20Arms%20Now.pdf"},{"id":"wsj-09","title":"The 24-Year-Old AI Wiz Who Counts Jane Street as an Investor","source":"WSJ","date":"10 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Leopold Aschenbrenner, 24, has vaulted his AI-focused hedge fund Situational Awareness past US$20 billion in assets in under two years, approaching Pershing Square and Third Point in size. It is up about 270% after fees this year and over 1,000% since inception, with an Anthropic stake now roughly a fifth of assets. Investors now include Jane Street, which rarely backs outside managers. His AI forecasts earned a cult following that studies his filings \"like scripture.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/The%2024-Year-Old%20AI%20Wiz%20Who%20Counts%20Jane%20Street%20as%20an%20Investor.pdf"},{"id":"wsj-10","title":"The Fight to Break China's Rare-Earth Dominance Moves to a New Front in Brazil","source":"WSJ","date":"10 Jun 2026","tags":["Trade","Geopolitics","Energy"],"summary":"Western companies are pouring money into Brazil's rare-earth industry — the world's second-largest reserves — to loosen China's grip on minerals vital to EVs, turbines and weapons. Miners aim not just to dig ore but to build separation, metal and magnet plants, directly challenging China's more-than-90% processing dominance. \"This is world-class geology,\" said Viridis CEO Rafael Moreno. Brazil has become a focal point in the US-China critical-minerals struggle.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/The%20Fight%20to%20Break%20China%E2%80%99s%20Rare-Earth%20Dominance%20Moves%20to%20a%20New%20Front%20in%20Brazil.pdf"},{"id":"wsj-11","title":"The World's Most Surprising Economic Success Story Is...North Korea","source":"WSJ","date":"10 Jun 2026","tags":["Geopolitics","Society"],"summary":"North Korea has become an unlikely growth story, its economy flourishing on arms sales and troop deployments to Russia, Chinese supplies and financing, and sanctions evasion to import energy and components. Visitors describe ride-hailing apps, QR-code payments, brick-oven pizza and Chinese EVs in Pyongyang. Xi's visit this week underscored Beijing's renewed engagement. The boom benefits the Kim elite even as the regime stays largely closed.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/The%20World%E2%80%99s%20Most%20Surprising%20Economic%20Success%20Story%20Is%E2%80%A6North%20Korea.pdf"},{"id":"wsj-12","title":"These Five Primary Races Show How Messy the Midterms Are Getting","source":"WSJ","date":"10 Jun 2026","tags":["Politics"],"summary":"US primary races have turned into bruising fights, with some campaigns using AI to fabricate images of opponents and revamp attack ads. A WSJ rundown highlights five of the messiest, including a California incumbent-versus-incumbent Republican clash between Ken Calvert and Young Kim trading scandal-driven ads. The piece shows how AI and personal attacks are reshaping the 2026 midterms. Negative advertising has reached new intensity.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/These%20Five%20Primary%20Races%20Show%20How%20Messy%20the%20Midterms%20Are%20Getting.pdf"},{"id":"wsj-13","title":"Trump Struggled to Rein In Netanyahu's Strikes on Iran","source":"WSJ","date":"10 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Trump struggled to restrain Netanyahu after Iran's missile barrages, first telling Israel to stand down, then to keep any response limited as Israel struck back. He later asked Netanyahu to halt attacks after Israel hit an Iranian petrochemical site and Iran threatened regional energy facilities. Netanyahu publicly agreed to refrain unless Iran attacks again. The episode exposed diverging US-Israeli priorities, especially over Lebanon, complicating Trump's peace push.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Trump%20Struggled%20to%20Rein%20In%20Netanyahu%E2%80%99s%20Strikes%20on%20Iran.pdf"},{"id":"wsj-14","title":"Wall Street Is Rushing to Fund the AI Bonanza in Every Conceivable Way","source":"WSJ","date":"10 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Wall Street is funding the AI build-out \"in every conceivable way\" — 11-figure IPOs, three-continent bond sales and Alphabet's casual US$85 billion equity raise. AI hyperscalers (Alphabet, Amazon, Meta, Microsoft, Oracle) have issued US$159 billion of bonds this year, up from US$108 billion in all of 2025 and US$17 billion in 2024. SpaceX, Anthropic and OpenAI listings could make 2026 the biggest IPO year ever. Some investors warn of overspending and an eventual shakeout that could pressure stocks.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20WSJ/Wall%20Street%20Is%20Rushing%20to%20Fund%20the%20AI%20Bonanza%20in%20Every%20Conceivable%20Way.pdf"},{"id":"st-01","title":"AI job losses, the scramble for answers in America","source":"ST","date":"10 Jun 2026","tags":["Technology & AI","Society","Politics"],"summary":"As AI displaces US workers at visible scale — over 115,000 jobs lost to AI in 2026 — Washington is scrambling, with Trump set to host AI leaders to discuss once-fringe government equity stakes in AI firms. Only 17% of Americans think AI will benefit the country over the next decade, an Annenberg survey found, with optimism confined mainly to medical research. Frustration with policymakers spans party lines. Generative AI reached commercial maturity in 2024 and is now replacing workers in numbers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/AI%20job%20losses%2C%20the%20scramble%20for%20answers%20in%20America.pdf"},{"id":"st-02","title":"China exports jump 19% in May on booming AI trade as shipments to US surge","source":"ST","date":"10 Jun 2026","tags":["Trade","Technology & AI"],"summary":"China's exports rose more than 19% year on year in May, the fastest in three months and well above forecasts, as booming AI-hardware demand offset Iran-war disruptions. Imports soared over 27%, leaving a US$105.4 billion surplus, the biggest since January. The global AI infrastructure build-out has become a key force propelling Asian trade in 2026. Economists cited AI demand and possible front-loading amid geopolitical uncertainty as a buffer to domestic softness.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/China%20exports%20jump%2019%20in%20May%20on%20booming%20AI%20trade%20as%20shipments%20to%20US%20surge.pdf"},{"id":"st-03","title":"Chip rout puts South Korea's 'ant' investors to the test as margin debt soars","source":"ST","date":"10 Jun 2026","tags":["Finance & Markets"],"summary":"South Korea's leveraged retail \"ant\" investors are being tested after the Kospi plunged over 8% on June 8 in a tech selloff, swinging margin-funded bets into losses. One investor's leveraged Samsung ETF position flipped from +20% to -17% as Fed-hike bets ended Wall Street's nine-week run. A Bank of Korea report flagged surging margin debt as a volatility risk. It was Korean stocks' worst day in three months, rattling policymakers wary of a correction.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Chip%20rout%20puts%20South%20Korea%27s%20%27ant%27%20investors%20to%20the%20test%20as%20margin%20debt%20soars.pdf"},{"id":"st-04","title":"From ceramah to chatbots: Malaysian parties turn to AI to analyse, engage voters","source":"ST","date":"10 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"Malaysian political parties are deploying AI ahead of Johor and Negeri Sembilan state elections to analyse voter behaviour, shape narratives and target messaging. MCA's secretary-general said parties \"can no longer operate without AI,\" using it to integrate voter data and track hot-button issues in real time. Campaigning hasn't officially begun, but the digital groundwork is well under way. The shift marks a move from traditional ceramah rallies to chatbots.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/From%20ceramah%20to%20chatbots%20Malaysian%20political%20parties%20turn%20to%20AI%20tools%20to%20analyse%2C%20engage%20voters.pdf"},{"id":"st-05","title":"How Israel is frustrating Donald Trump's Iran plans","source":"ST","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"A 12-hour Israel-Iran flare-up on June 7 highlighted Trump's twin failures to control ally Israel and cajole Iran into a lasting truce. Netanyahu defied Trump twice — bombing Beirut despite a limited ceasefire, prompting an 11-missile Iranian salvo that caused no damage. Trump unconvincingly insisted both sides sought an \"immediate CEASEFIRE.\" The 40-day US-Israel war against Iran left an unresolved Hormuz blockade and an energy-price spike.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/How%20Israel%20is%20frustrating%20Donald%20Trump%27s%20Iran%20plans.pdf"},{"id":"st-06","title":"Lebanese president appeals to Israeli government to pursue talks, not war","source":"ST","date":"10 Jun 2026","tags":["Geopolitics"],"summary":"Lebanese President Joseph Aoun made a rare direct appeal to Israel's government and people to negotiate, warning a military solution \"will never provide you with security.\" Lebanon is in US-mediated direct talks with Israel for a full cessation of hostilities, despite Hezbollah's opposition. Aoun said he won't meet Netanyahu before a deal and that any pact would be non-aggression, not full peace, framed around the
