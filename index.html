ws%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Wayve%20Is%20Challenging%20Tesla%20and%20Waymo%20in%20the%20Race%20to%20Automate%20Driving.pdf"}, {"id": "wsj-15", "title": "Why One of Tech's Biggest Gamblers Is Betting Against Elon Musk's AI Vision", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SoftBank founder Masayoshi Son, known for wild bets, this past week questioned Elon Musk's plan for orbital AI data centers, asking investors in Japan, \"What's the point?\" Much of SpaceX's $2 trillion market value rests on Musk's plan to put data centers in orbit, arguing abundant solar energy beats Earth economics; its IPO paperwork targets deployment as soon as 2028. Son countered that electricity is just 7% of operating a data center, with chips dominating costs. Columnist Tim Higgins frames it as differing tactics toward similar sci-fi visions, with Son's winner-takes-all view seeing AI decided within years. Jeff Bezos has also called near-term orbital data centers \"a little ambitious.\" Waymo currently leads Tesla in robotaxis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Why%20One%20of%20Tech%E2%80%99s%20Biggest%20Gamblers%20Is%20Betting%20Against%20Elon%20Musk%E2%80%99s%20AI%20Vision.pdf"}, {"id": "st-01", "title": "Andy Burnham pledges radical devolution of British govt if he becomes PM", "source": "ST", "date": "30 Jun 2026", "tags": ["Politics"], "summary": "Andy Burnham, the front runner to succeed Keir Starmer as Labour leader and British prime minister, vowed on June 29 to deliver \"the biggest rebalancing of power\" the country has seen. Speaking in Manchester, he pledged to devolve greater powers to regional mayors, calling Britain one of the most over-centralised countries. He proposed a \"No. 10 North\" office to coordinate devolution and oversee a major council-house building programme, though without funding details. Coining \"Manchesterism\", a business-friendly socialism, he backed greater public control of transport, water and energy. Starmer resigned on June 22 after election losses and a scandal over appointing Peter Mandelson. Burnham, facing no challengers, could take office by mid-July. Rachel Reeves reportedly faces dismissal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/Andy%20Burnham%20pledges%20radical%20devolution%20of%20British%20govt%20if%20he%20becomes%20PM.pdf"}, {"id": "st-02", "title": "Australia, Vanuatu sign deal barring foreign military base on Pacific island", "source": "ST", "date": "30 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Australia and Vanuatu signed a sweeping economic and security agreement on June 29 barring any foreign military base on the Pacific island, amid China-West rivalry in the South Pacific. The Nakamal Agreement commits Australia to A$500 million (S$446 million) in support and states Vanuatu \"shall not permit its territory to be used for any foreign military base\". Prime Minister Anthony Albanese said it provides certainty against a foreign base; Vanuatu, whose largest creditor is China, agreed to keep infrastructure free from foreign interference. The deal recognises Australia as Vanuatu's primary policing partner. China has made navy port calls and funded a Luganville wharf. Analysts said Beijing-Canberra competition for influence would persist, given Vanuatu's non-alignment tradition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/Australia,%20Vanuatu%20sign%20deal%20barring%20foreign%20military%20base%20on%20Pacific%20island.pdf"}, {"id": "st-03", "title": "China imposes new export controls, deepening Japan row", "source": "ST", "date": "30 Jun 2026", "tags": ["Geopolitics", "Trade", "Defence"], "summary": "China placed 20 more Japanese organisations on a blacklist on June 29 over exports with possible military uses, deepening a months-long row with Tokyo. Beijing's commerce ministry said the firms, including Mitsubishi Electric Defence and Space Technologies and the National Institute for Defence Studies, \"have participated in enhancing Japan's military capabilities\". Japan's spokesman Minoru Kihara called the measures \"unacceptable and deeply regrettable\" and lodged a protest. Tensions escalated after PM Sanae Takaichi suggested Tokyo might react militarily to an attack on Taiwan. China, the top rare-earths producer, requires exporters to submit risk assessments. Japan also joined South Korea in criticising joint Chinese-Russian bomber and fighter flights over the region on June 27.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/China%20imposes%20new%20export%20controls,%20deepening%20Japan%20row.pdf"}, {"id": "st-04", "title": "China's new investment rules impact overseas expansion", "source": "ST", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Technology & AI", "Geopolitics"], "summary": "China's new outbound investment regulations, taking effect July 1, spotlight Singapore's role as a gateway for Chinese firms seeking global markets. Announced June 1, the rules introduce \"full-process supervision\" across investments' life cycle and explicitly link them to national security, meaning closer checks on AI, semiconductors, batteries and electric vehicles. Entrepreneurs and advisers told ST the rules may slow some deals short-term but are more likely to reshape than deter expansion through Singapore. Beijing's blocking of AI start-up Manus's sale to Meta signalled it won't cede strategic tech. Chinese investment into Singapore rose to US$17.89 billion in 2024. Advisers expect higher compliance costs, while some welcome greater regulatory clarity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/China's%20new%20investment%20rules%20impact%20overseas%20expansion.pdf"}, {"id": "st-05", "title": "Chinese AI, chip firms are driving an onshore IPO rebound", "source": "ST", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China's onshore technology IPOs are on track for their strongest year since 2023, as Beijing pushes chip and AI listings amid the US rivalry and a drive for tech self-reliance. Tech firms raised US$3.1 billion (S$4 billion) on mainland markets in the year to June 18, more than five times the year-earlier volume, per LSEG. Nearly 50 firms have applied for Shanghai and Shenzhen IPOs, raising at least 126.1 billion yuan. Memory chipmaker ChangXin plans a 29.5 billion yuan Shanghai listing, potentially 2026's largest. Regulators said they would support \"future industries\" like quantum tech and nuclear fusion. The rebound provides exit opportunities for private equity and venture capital backers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/Chinese%20AI,%20chip%20firms%20are%20driving%20an%20onshore%20IPO%20rebound.pdf"}, {"id": "st-06", "title": "Putin says Russia will press on with front-line campaign regardless of Ukraine proposals", "source": "ST", "date": "30 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "President Vladimir Putin said on June 28 that Russia will press ahead with its aim of fully capturing four Ukrainian regions, rejecting a Ukrainian proposal to rein in hostilities in the four-year-old war. He dismissed Kyiv's offer of a mutual halt to long-range strikes as a bid to relieve pressure on its forces, saying Russian counterstrikes are \"more destructive\". Putin said Russia must ramp up air defences against intensified Ukrainian drone attacks on its oil industry, acknowledging fuel shortages but claiming Russia was coping. He cited objectives of liberating Donbas and \"Novorossiya\". Putin expects resumed US diplomacy and a visit by envoys Witkoff and Kushner once the US-Israeli conflict with Iran resolves.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/Putin%20says%20Russia%20will%20press%20on%20with%20front-line%20campaign%20regardless%20of%20Ukraine%20proposals.pdf"}, {"id": "st-07", "title": "Ringgit vs Singdollar: What to expect in 2026", "source": "ST", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Malaysian ringgit is expected to weaken further against the Singapore dollar in the second half of 2026, analysts said, after depreciating in 2026 following a 4 per cent gain in 2025. It traded at 3.15 ringgit per Singdollar on June 29, near a six-month low of 3.21. Bank Negara Malaysia said on June 24 it would step up measures to support the currency, attributing weakness to global factors, not the economy. Analysts cited expectations of higher US interest rates, rising bond yields and lower oil prices, which hurt net energy exporter Malaysia. OCBC and CMC strategists expect the ringgit to slide to around 3.2-3.25 by end-2026, also citing Johor and Negeri Sembilan state-election uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/Ringgit%20vs%20Singdollar%20What%20to%20expect%20in%202026.pdf"}, {"id": "st-08", "title": "South Korea taps Samsung, SK Hynix in $745 billion plan to cement global AI chip lead", "source": "ST", "date": "30 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "South Korea on June 29 unveiled a sweeping industrial strategy centred on semiconductors and AI, with President Lee Jae Myung announcing over US$576 billion (S$745 billion) in investment to lock in global dominance and narrow regional disparities. Anchored by Samsung and SK Hynix, who will invest 800 trillion won with suppliers to build two new fabrication sites each in the south-west, the plan centres on a \"triple axis\" of semiconductors, physical AI and data centres. Lee said the country must secure AI's core elements faster than rivals. Critics questioned the south-west hub as politically motivated, given regional voting patterns. Samsung shares fell 4.8 per cent and SK Hynix 1.7 per cent on the news.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/South%20Korea%20taps%20Samsung,%20SK%20Hynix%20in%20745%20billion%20plan%20to%20cement%20global%20AI%20chip%20lead.pdf"}, {"id": "st-09", "title": "The killing machines taking over men in Ukraine", "source": "ST", "date": "30 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "Ukraine reportedly struck targets near Mariupol in June using fully AI-powered autonomous Hornet drones that lock onto targets without human intervention, signalling a battlefield shift, this commentary argues. Cheap, mass-produced unmanned systems now create a 40km chasm between front lines where any moving target is attacked. Ukraine's key innovation is software, not hardware, compressing military innovation cycles to days; over 450 companies develop new tools. The shift is transforming defence, with software-focused firms like Palantir and Anduril challenging traditional contractors. The US Replicator Initiative and a proposed US$1.5 trillion defence budget reflect the trend. The author warns law and arms control lag, with countries unable even to define autonomous weapons.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/The%20killing%20machines%20taking%20over%20men%20in%20Ukraine.pdf"}, {"id": "st-10", "title": "US and Iran set for fresh talks in Doha", "source": "ST", "date": "30 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "US and Iranian officials will hold talks on June 30 in Qatar, President Donald Trump said on June 29, signalling de-escalation after both sides traded strikes over the weekend. Trump is sending envoy Steve Witkoff and son-in-law Jared Kushner to Doha, with the focus on managing the Strait of Hormuz rather than senior political leaders. A June 17 14-point memorandum aimed to end four months of conflict and reopen the strait, whose closure had sent oil above US$100 a barrel. President Pezeshkian said US$6 billion of frozen assets in Qatar would be released, calling the accord \"a great victory\". Brent crude steadied near US$72 on news of renewed diplomacy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20ST/US%20and%20Iran%20set%20for%20fresh%20talks%20in%20Doha.pdf"}, {"id": "bt-01", "title": "AI relationships, no. AI relationship managers, yes", "source": "BT", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A columnist welcomes the prospect of banks replacing human relationship managers with AI for mass-affluent clients holding under a million dollars in liquid assets. Recounting a frustrating call with the latest manager assigned to her account, she questions the value of being pushed equity-linked notes, unit trusts with upfront sales charges and investment-linked insurance policies carrying hefty premiums. She argues that an AI relationship manager could deliver more impartial, lower-cost guidance without the conflicts of interest and sales pressure inherent in commission-driven human advisers. The piece frames automation of wealth advisory not as a loss but as a potential improvement for ordinary customers routinely offloaded onto junior or rotating staff.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/AI%20relationships,%20no.%20AI%20relationship%20managers,%20yes.pdf"}, {"id": "bt-02", "title": "Australia's AI startup Firmus and Singapore-based DayOne to build Indonesia data centre with Nvidia", "source": "BT", "date": "30 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Firmus Technologies will build its first Indonesian data centre via a partnership with Nvidia, with Singapore-based DayOne developing a 360-megawatt Nvidia DSX AI Factory campus in Batam, just off Singapore's coast. The eight-year Nvidia deal could yield US$25 billion to US$30 billion in committed offtake agreements over six years and covers up to 170,000 Nvidia accelerator chips through 2028. The Batam facility, under DayOne construction, goes live in the first quarter of 2027 as a multi-tenant project for AI-native customers. Firmus, valued at US$5.5 billion in an April round led by Coatue and backed by Nvidia, is expected to pursue an IPO this year. Co-CEO Tim Rosenfield called market jitters over chip demand \"largely irrelevant\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Australia%27s%20AI%20startup%20Firmus%20and%20Singapore-based%20DayOne%20to%20build%20Indonesia%20data%20centre%20with%20Nvidia.pdf"}, {"id": "bt-03", "title": "China says tech growth a challenge to predicting energy demand", "source": "BT", "date": "30 Jun 2026", "tags": ["Energy", "Technology & AI"], "summary": "China faces growing uncertainty in forecasting energy demand as AI, electric vehicles and other emerging sectors reshape consumption, said Ren Yuzhi, planning director-general at the National Energy Administration. Demand over the past five years surpassed government expectations, and forecasting electricity needs is a \"key challenge\" for the next planning cycle. China now expects average annual power demand growth of around 600 billion kilowatt-hours over five years, exceeding Germany's yearly output, versus 570 billion previously. Past misjudgements drove power shortages in 2021-2022 and a coal about-face. With plans to peak coal by 2030 and electrify usage, planners are weighing relocating energy-intensive industries westward, closer to renewable resources, rather than transmitting electricity east.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/China%20says%20tech%20growth%20a%20challenge%20to%20predicting%20energy%20demand.pdf"}, {"id": "bt-04", "title": "China's central bank debuts overnight reverse repo operation, withholding key interest rate", "source": "BT", "date": "30 Jun 2026", "tags": ["Finance & Markets"], "summary": "The People's Bank of China launched overnight reverse repo operations for the first time on Jun 29, offering 300 billion yuan (US$44.1 billion) to financial institutions, a move markets read as deepening liquidity control and aligning with global peers. The PBOC withheld the borrowing cost, though sources told Reuters the inaugural rate was 1.25 per cent, 15 points below the seven-day tenor, which remains China's primary policy rate. It separately injected 157.5 billion yuan via seven-day repos at an unchanged 1.4 per cent. Analysts said omitting the overnight rate avoids diluting the seven-day rate's signalling effect and pre-empting easing speculation. Overnight repos dominate over 80 per cent of interbank turnover; the Fed already uses overnight rates as its main anchor.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/China%27s%20central%20bank%20debuts%20overnight%20reverse%20repo%20operation,%20withholding%20key%20interest%20rate.pdf"}, {"id": "bt-05", "title": "Freehold Balestier Centre up for collective sale at S$180 million", "source": "BT", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Owners of the freehold, mixed-use Balestier Centre have launched a collective sale at a S$180 million guide price, translating to about S$1,495 per square foot per plot ratio, said exclusive agent Huttons Asia. The 40,133 sq ft site at 560-568 Balestier Road, zoned commercial and residential with a 3.0 plot ratio, houses ground-floor units and 20 apartments. It can reach roughly 120,400 sq ft gross floor area without land betterment charge. A consultant proposed a 14-storey project with commercial podiums and an eight-storey residential tower. Owners could net over S$3 million for residential and S$10 million-plus for commercial units. The bid secured roughly 86.7 per cent consent; the tender closes Jul 28.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Freehold%20Balestier%20Centre%20up%20for%20collective%20sale%20at%20S180%20million.pdf"}, {"id": "bt-06", "title": "G7 and China are competing to define global governance", "source": "BT", "date": "30 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "The near-simultaneous release of the G7's Evian statements and China's global governance white paper marks a contest over defining the world's problems and which institutions should solve them, writes Hao Nan. At Evian, G7 leaders adopted nine statements on geopolitics, growth, critical minerals, development, digital safety, health, migration and crime, consolidating a narrative of resilience, rules, secure supply chains and trusted partnerships, motivated partly by concerns over China's overcapacity and rare-earth dominance. China's paper instead blamed unilateralism, protectionism, hegemonism and Global South underrepresentation, championing sovereign equality, true multilateralism and UN-centred action. It positioned China as a public-goods provider through its Belt and Road and global Development, Security, Civilization and Governance initiatives.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/G7%20and%20China%20are%20competing%20to%20define%20global%20governance.pdf"}, {"id": "bt-07", "title": "If you thought the global financial crisis was bad...", "source": "BT", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "This commentary warns that within a few years AI will displace a significant share of highly paid knowledge workers, hitting aggregate demand and turning retirement-account flows net negative as workers stop contributing and start withdrawing. Outflows would come largely from passive funds, especially S&P 500 index trackers; though such redemptions sell constituents proportionally to index weight, the price impact would be uneven across the market. The author argues that when the resulting crash arrives, stabilising financial markets will prove the easy part compared with the far harder task of reordering society around an AI-driven economy, where labour displacement, income support and the social contract must be fundamentally rethought.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/If%20you%20thought%20the%20global%20financial%20crisis%20was%20bad....pdf"}, {"id": "bt-08", "title": "Is a European single market for energy such a good idea?", "source": "BT", "date": "30 Jun 2026", "tags": ["Energy", "Politics"], "summary": "This commentary examines whether a European single market for energy is wise amid this year's supply disruptions tied to the US-Iran peace process. The crisis, it argues, reinforces the case for phasing out fossil fuels for both climate and energy security. But for import-dependent Europe, less obvious implications may prove more consequential: to reverse its declining share of global GDP, Europe must lower energy costs. De-industrialisation stems not only from the decline of energy-intensive chemicals, fertilisers and steel, but from European industries paying roughly twice as much for electricity as US and Chinese rivals. The piece weighs whether deeper market integration would meaningfully narrow that competitive gap.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Is%20a%20European%20single%20market%20for%20energy%20such%20a%20good%20idea.pdf"}, {"id": "bt-09", "title": "JPMorgan adds Singapore dollar to blockchain network for 24/7 corporate payments", "source": "BT", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "JPMorgan Chase's blockchain unit is adding the Singapore dollar to its global deposit network as it expands tokenised deposits, digital coins representing traditional bank money on a blockchain, issued by regulated banks rather than private firms. Its Kinexys digital payments unit will let financial institutions and multinationals execute 24/7 on-chain foreign exchange between the Singdollar and six other major currencies, including the US dollar and euro. Global payments co-head Max Neukirchen said the move frees Singapore-based firms from market-closure constraints, enabling smaller buffers and lower working-capital needs. JPMorgan bets on tokenised deposits, offering programmability, over stablecoins for corporate payments. Kinexys has processed over US$4 trillion since inception, still under 0.06 per cent of the bank's daily fiat volumes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/JPMorgan%20adds%20Singapore%20dollar%20to%20blockchain%20network%20for%20247%20corporate%20payments.pdf"}, {"id": "bt-10", "title": "Singapore private housing is 'decoupling' from HDB market as buyer pools diverge: NUS survey", "source": "BT", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A structural divide may be emerging between Singapore's public and private housing markets as widening affordability gaps and policy measures shape buying dynamics, according to a survey by NUS's Institute of Real Estate and Urban Studies. Some 31 per cent of respondents expect the private market to become \"structurally decoupled\" from the HDB market, driven by distinct buyer profiles with differing capacities and capital outlays. Another 29 per cent said ongoing supply scarcity will keep private home prices firm regardless of public-housing fluctuations. The findings point to diverging buyer pools, with private and HDB segments increasingly serving separate demographics, suggesting the two markets may no longer move in tandem as they historically have.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Singapore%20private%20housing%20is%20%27decoupling%27%20from%20HDB%20market%20as%20buyer%20pools%20diverge%20NUS%20survey.pdf"}, {"id": "bt-11", "title": "The missing link in Asean's AI economy: trusted cross-border data flows", "source": "BT", "date": "30 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "AI could add nearly US$1 trillion to Asean's economy by 2030, equivalent to 10 to 18 per cent of regional GDP, but unlocking that growth hinges on data, this commentary argues. \"Data is the lifeblood of AI,\" said Singapore Digital Development Minister Josephine Teo at the Asia Economic Summit in Indonesia on Jun 17, stressing that common rules and frameworks are key to letting data flow seamlessly and securely across borders. Yet regional approaches to data governance diverge: some countries emphasise national security and stricter data controls, while others favour more open flows with safeguards. The piece frames trusted cross-border data flows as the missing link needed to realise Asean's AI economic potential.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/The%20missing%20link%20in%20Asean%27s%20AI%20economy%20trusted%20cross-border%20data%20flows.pdf"}, {"id": "bt-12", "title": "Three in four S-Reits surveyed are preparing for sustainability assurance readiness: PwC Singapore", "source": "BT", "date": "30 Jun 2026", "tags": ["Environment", "Finance & Markets"], "summary": "Three in four surveyed Singapore Reits are preparing for a sustainability assurance readiness assessment, according to a PwC Singapore study released Jun 29, signalling growing recognition of the need to strengthen data quality, processes and controls. Readiness means ESG data and reporting are sufficient to pass an independent third-party audit, often via an internal \"dry run\" to identify gaps. The survey covered 20 S-Reits, 48 per cent of the sector's S$201 billion in assets. S-Reits must report Scope 1 and 2 emissions by FY2025, with mandatory external limited assurance extended to FY2029. Three-quarters have moved beyond manual data processes, and 90 per cent complete reporting within four months of year-end. Only 15 per cent have obtained external assurance so far.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Three%20in%20four%20S-Reits%20surveyed%20are%20preparing%20for%20sustainability%20assurance%20readiness%20PwC%20Singapore.pdf"}, {"id": "bt-13", "title": "Why it makes sense to include 5-room HDB flats in Berlayar BTOs - even if price tag may be higher", "source": "BT", "date": "30 Jun 2026", "tags": ["Society", "Southeast Asia"], "summary": "This commentary argues Singapore's HDB should include five-room flats in future Berlayar Build-To-Order launches to meet demand for larger units in sought-after Greater Southern Waterfront locations, even if prices breach the S$1 million psychological barrier. The latest Berlayar Rise project offered 1,976 units: 816 two-room flexi, 172 three-room and 988 four-room flats, but no five-room option. Indicative prices excluding grants ran from S$247,000 to S$406,000 for two-room flexi, S$435,000 to S$591,000 for three-room and S$592,000 to S$810,000 for four-room units. The author contends that omitting larger flats underserves buyers seeking space in prime areas and that policymakers should not fear higher headline prices for premium-located public housing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/Why%20it%20makes%20sense%20to%20include%205-room%20HDB%20flats%20in%20Berlayar%20BTOs%20-%20even%20if%20price%20tag%20may%20be%20higher.pdf"}, {"id": "bt-14", "title": "With AI, it's not about coding better; workers need to think better: Koh Boon Hwee", "source": "BT", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Tech and investment veteran Koh Boon Hwee, SGX chairman and a GIC director, told The Business Times he would not invest in AI infrastructure, saying it \"has the potential to be loss-making for investors\" given the billions needed to train large language models. He would instead back companies that use AI to improve operations and those building specialised agentic AI systems. An early Razer backer and Sunningdale Tech chairman who visits Silicon Valley every other month, Koh praised the US tech corridor's mix of money, entrepreneurs and risk-taking. He noted Asia-Pacific remains reliant on US or Chinese technology and is disadvantaged by smaller data pools. AI's value, he stressed, lies in processing large data volumes, benefiting telcos, airlines and healthcare.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20BT/With%20AI,%20it%27s%20not%20about%20coding%20better%20workers%20need%20to%20think%20better%20Koh%20Boon%20Hwee.pdf"}, {"id": "scmp-01", "title": "Alternate route: China invests in Europe cargo corridor that avoids Russia, Middle East", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "China is investing in the Caspian Sea \"Middle Corridor\" to Europe, an alternative that sidesteps Russia and Middle East conflicts, analysts say. State-owned firms have already committed hundreds of millions of dollars to the 4,750km Trans-Caspian route, which runs through Kazakhstan, across the Caspian to Azerbaijan, Georgia and Turkey. Shipments could reach Europe in 15 to 18 days versus 45 to 60 by ocean. Experts note the corridor remains \"low capacity\" with higher per-unit costs and needs upgraded ports and railways, but China has the capital and expertise to develop it. Turkey, the EU's top supplier China, and Central Asian states stand to gain from diversification away from sanctions-hit Russian and piracy-prone maritime routes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Alternate%20route%20China%20invests%20in%20Europe%20cargo%20corridor%20that%20avoids%20Russia,%20Middle%20East.pdf"}, {"id": "scmp-02", "title": "As China dominates solar and energy sector, fears emerge over EU's 'high-risk' crackdown", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Energy", "Trade"], "summary": "Chinese firms dominated Europe's largest solar and storage exhibition in Munich, with about 750 of 2,650 exhibitors registered in China, underscoring European reliance on Chinese clean-energy hardware. The European Commission has barred Chinese inverters and power-conversion systems from all EU-funded projects, citing cybersecurity and dependency risks, affecting at least 14 gigawatts of new solar capacity. A proposed Cybersecurity Act revision could let the bloc bar \"high-risk\" suppliers entirely. Despite restrictions, Huawei, Sungrow, CATL and BYD pressed ahead with new products and European factories. Beijing accused the EU of labelling China high-risk without evidence. One Chinese manager said: \"What we fear is constant change.\" European players remain deeply entangled, sourcing components from China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/As%20China%20dominates%20solar%20and%20energy%20sector,%20fears%20emerge%20over%20EU%E2%80%99s%20%E2%80%98high-risk%E2%80%99%20crackdown.pdf"}, {"id": "scmp-03", "title": "Belarus' Lukashenko courts Moscow and Beijing as Ukraine tensions simmer", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Belarusian leader Alexander Lukashenko visited Russia and then China amid simmering tensions with Ukraine, meeting President Xi Jinping in Beijing and Vladimir Putin at his Valdai residence. Lukashenko told Xi being in China felt \"like coming home\". Xi said China supported Belarus's sovereignty and called for continued strategic dialogue. Ukraine believes Russia wants to pressure Belarus into more direct involvement in the war, which Lukashenko seeks to avoid despite allowing Russian forces to use Belarusian territory in 2022. Zelensky recently demanded Belarus switch off signal boosters aiding Russian drones, which it did. Putin praised Belarus as a potential mediator. Chinese statements emphasised Belarusian independence, a signal directed at both Moscow and Kyiv.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Belarus%E2%80%99%20Lukashenko%20courts%20Moscow%20and%20Beijing%20as%20Ukraine%20tensions%20simmer.pdf"}, {"id": "scmp-04", "title": "China opens new Central Asia rail link to strengthen overland trade amid shipping risks", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "A new 5,420km rail service connecting western China with Turkmenistan has launched, expanding Beijing's Central Asian trade network and bolstering supply-chain resilience. The inaugural 55-container train departed Xining, Qinghai, carrying appliances, auto parts and clothing, with a 14-to-15-day journey via the Horgos crossing and Kazakhstan. Qinghai's international rail links now reach 16 cities across 10 countries. The route is part of Beijing's push to build land-based trade networks under the Belt and Road Initiative, reducing reliance on vulnerable maritime lanes. Analysts say the railway cuts China's exposure to naval chokepoints like the Malacca Strait, gaining urgency after the Strait of Hormuz's closure during the US-Israeli war on Iran. Horgos has processed over 46,000 China-Europe trips.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/China%20opens%20new%20Central%20Asia%20rail%20link%20to%20strengthen%20overland%20trade%20amid%20shipping%20risks.pdf"}, {"id": "scmp-05", "title": "China's EV boom driven by local governments, not Beijing's industrial policy, study finds", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "A new study by Peking University and Australian National University scholars argues China's electric-vehicle rise was driven by local government-private capital alliances, not Beijing's headline industrial policy. The research found central subsidies played only a limited role and initially constrained private players, with state credit favouring SOEs. Local officials forged partnerships exploiting capital markets and \"policy loopholes\", helping Geely, Nio, Xpeng and BYD outcompete state and foreign rivals. Examples include Zhejiang backing Geely's early production and its Volvo acquisition, plus city-level stakes in Nio, Xpeng and Zeekr. Researchers say the EU's actions stem from \"panic\" over Chinese exports and should prompt reflection on Europe's failure to encourage innovation. The findings coincide with EU-China trade talks in Brussels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/China%E2%80%99s%20EV%20boom%20driven%20by%20local%20governments,%20not%20Beijing%E2%80%99s%20industrial%20policy,%20study%20finds.pdf"}, {"id": "scmp-06", "title": "China's cooling, e-commerce giants see sales surge as scorched Europe scrambles for relief", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Trade", "Environment"], "summary": "A historic heatwave sweeping Europe has triggered a massive surge in sales for Chinese home appliances, with Alibaba recording triple-digit growth for air conditioners and fans on overseas platforms. On AliExpress, a Midea air-conditioner model's German warehouse inventory was wiped out. Fan sales jumped 94 per cent in Spain and 100 per cent in Italy month-on-month, while wholesale fan orders soared 378 per cent in Sweden. The human toll is mounting, with France reporting about 1,000 additional deaths since Wednesday. Manufacturers Midea, Gree, TCL and Haier are reaping benefits; Midea's western Europe air-con revenue rose over 70 per cent. In May, China's air-conditioner exports to France, Germany and the Netherlands surged sharply. Alibaba owns the Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/China%E2%80%99s%20cooling,%20e-commerce%20giants%20see%20sales%20surge%20as%20scorched%20Europe%20scrambles%20for%20relief.pdf"}, {"id": "scmp-07", "title": "EU sets October deadline for 'tangible results' on China imbalances after key trade talks", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "The EU and China launched a new ministerial-level platform to resolve grievances, with Brussels demanding \"tangible results\" by October on trade imbalances, export controls and intellectual property. During marathon Brussels talks, the sides issued a rare joint statement announcing four workstreams, and Beijing agreed to establish a \"joint monitoring mechanism of trade flows\" to flag import surges entering a \"red\" zone. EU trade chief Maros Sefcovic called talks \"intensive, focused and constructive\" but warned of action absent progress. The EU's May trade deficit with China rose 15 per cent year-on-year; Germany's expanded 31.6 per cent. Von der Leyen is expected to present new China-policy tools at October's European Council. Chinese state media insisted Beijing could withstand a trade \"freeze\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/EU%20sets%20October%20deadline%20for%20%E2%80%98tangible%20results%E2%80%99%20on%20China%20imbalances%20after%20key%20trade%20talks.pdf"}, {"id": "scmp-08", "title": "Funding option: royalties giant opens Hong Kong base as mainland China biotech deals surge", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Royalty Pharma, the world's largest buyer of biopharmaceutical royalties, has opened its first Asia-Pacific base in Hong Kong as mainland Chinese biotech out-licensing deals hit record highs. Royalty financing offers drug developers an alternative cash source amid looming US investment restrictions, said Asia head Kenneth Sun. Chinese biotech business-development deals rose 30 per cent year-on-year through May, with total deal value up 87 per cent. Despite US lawmakers' Biotech Investment National Security Act, ING forecasts out-licensing deals will surge to around US$240 billion this year, up from US$136 billion in 2025. Recent deals include CStone with Australia's Arrotex and Abbisko with Eli Lilly. Morgan Stanley projects 35 per cent of new FDA-approved drugs will originate from Chinese firms by 2040.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Funding%20option%20royalties%20giant%20opens%20Hong%20Kong%20base%20as%20mainland%20China%20biotech%20deals%20surge.pdf"}, {"id": "scmp-09", "title": "Hong Kong positioned to link Asean, Greater Bay Area amid geopolitical shifts: John Lee", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Southeast Asia", "Trade"], "summary": "Hong Kong is uniquely positioned to connect Asean with the Greater Bay Area in a \"powerful and complementary partnership\" amid shifting geopolitics, Chief Executive John Lee said at the Post's GBA-Asean Summit 2026. The event also launched a new Asean Chamber of Commerce in the city. Lee stressed both regions are ocean-facing and that Hong Kong, a free port, can enable smooth flows of trade, investment and innovation. Asean has been Hong Kong's second-largest merchandise trading partner for 16 years, with bilateral goods trade reaching US$214 billion in 2025, up 29 per cent. About 830 Asean companies operated in Hong Kong in 2025. Lee invited Asean firms to invest in the Northern Metropolis megaproject and backed mainland firms' expansion into Asean.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Hong%20Kong%20positioned%20to%20link%20Asean,%20Greater%20Bay%20Area%20amid%20geopolitical%20shifts%20John%20Lee.pdf"}, {"id": "scmp-10", "title": "How South Korea's AI megaprojects aim to 'maintain edge' over China, meet demand", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "South Korea's US$518 billion semiconductor push aims to convert the AI boom into a durable advantage and keep pace with rival China, observers say. President Lee Jae Myung unveiled a \"Three Mega Projects\" initiative centred on semiconductors, physical AI and AI data centres. Samsung and SK Hynix will invest a combined 800 trillion won in a southwestern production hub, while SK Group, Naver and others invest 550 trillion won in data centres by 2029. The government will provide electricity, water, sites and discounted power rates. Global memory-chip demand is about twice supply, expected to reach 2.5 times by 2035. Challenges include workers' reluctance to relocate from Seoul and dispersed supply chains. Opposition parties questioned whether firms were pressured into investing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/How%20South%20Korea%E2%80%99s%20AI%20megaprojects%20aim%20to%20%E2%80%98maintain%20edge%E2%80%99%20over%20China,%20meet%20demand.pdf"}, {"id": "scmp-11", "title": "Japan aims to catch up on drone warfare by tapping Ukraine's experience", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "Japan is accelerating plans to acquire and develop military drones by deepening cooperation with Ukraine and learning from its wartime experience against Russia, given Japan's military manpower shortage and vast maritime territory. A soon-to-launch Japan-Ukraine Drone Cluster will link Japanese manufacturers with Ukrainian defence firms, universities and research institutions. Japan currently produces about 1,000 military-grade drones yearly, set to rise significantly. Russia filed a diplomatic protest after Terra Drone invested in Ukraine's Amazing Drones. Airbus signed an MOU with Kawasaki Heavy Industries to develop anti-submarine Eurodrones, while Anduril is reportedly eyeing a Nissan plant. Japan allocated 100 billion yen for unmanned ocean vessels. Analysts call Tokyo a \"laggard\" surpassed by China and Turkey in drone technology.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Japan%20aims%20to%20catch%20up%20on%20drone%20warfare%20by%20tapping%20Ukraine%E2%80%99s%20experience.pdf"}, {"id": "scmp-12", "title": "Just how far are China's local officials going in falsifying performance data?", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Beijing has publicised three cases of local governments falsifying achievements by manipulating revenue, misusing special-purpose bonds and concealing off-balance-sheet debt. Announced by the Central Commission for Discipline Inspection and a working group on the \"correct view of political performance\", the cases span Gansu, Zhejiang and Guangxi. Nanning falsely inflated 2024 revenue by 2.83 billion yuan by assigning values to land plots, with one plot used 18 times. Gansu officials relabelled a landscape project to fraudulently obtain 55.95 million yuan in treasury bonds, described as \"Tang Monk's flesh\". Hangzhou's Xiaoshan district created hidden debt via forged contracts and inflated valuations. The cases are the clearest yet from a party-wide education campaign ahead of next year's national congress.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Just%20how%20far%20are%20China%E2%80%99s%20local%20officials%20going%20in%20falsifying%20performance%20data.pdf"}, {"id": "scmp-13", "title": "Shanghai should step up as finance hub, as Hong Kong 'not enough', proposal says", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Shanghai should build itself into a hub serving Chinese firms' rising outbound investment needs, potentially increasing rivalry with Hong Kong, according to a proposal by Liu Xiaochun, vice-president of the Shanghai Finance Institute, made at a closed-door China Finance 40 meeting. Liu argued Hong Kong, though a mature international centre, is \"not enough to fully meet the special needs\" of Chinese outbound expansion, and Shanghai must play a role. He proposed Shanghai become a fundraising and investment centre helping firms raise syndicated loans, issue bonds and list shares, plus a non-dollar foreign-exchange trading centre and cross-border payment platforms. Hong Kong would retain its capital-markets gateway role. China's outbound direct investment reached US$62 billion in early 2026, up 7.7 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Shanghai%20should%20step%20up%20as%20finance%20hub,%20as%20Hong%20Kong%20%E2%80%98not%20enough%E2%80%99,%20proposal%20says.pdf"}, {"id": "scmp-14", "title": "Top China chip toolmakers consolidate to build national champions, defy US curbs", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's semiconductor self-sufficiency campaign has entered a consolidation phase, with state-backed toolmakers absorbing smaller rivals to forge national champions defying US export curbs. Shanghai-listed chip-equipment maker Piotech, whose largest shareholder is the state-backed \"Big Fund\" with a 16.5 per cent stake, said it plans to acquire a controlling stake in Wuxi Shangji Semiconductor via shares and cash. The deal would expand Piotech beyond thin-film deposition into wafer-bonding, PVD, etching and CVD equipment. The shift to a broad platform provider has grown urgent as Washington's controls tighten China's access to advanced foreign chipmaking tools. Piotech's first-quarter revenue surged 57 per cent to 1.11 billion yuan, swinging to net profit. It also plans to raise up to 4.6 billion yuan through a private placement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Top%20China%20chip%20toolmakers%20consolidate%20to%20build%20national%20champions,%20defy%20US%20curbs.pdf"}, {"id": "scmp-15", "title": "US FCC expands import ban to older Huawei, ZTE gear in continued crackdown on Chinese tech", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "New US restrictions on Chinese technology take effect next month after a Federal Communications Commission decision targeting legacy equipment in public-safety and telecommunications infrastructure. The rules expand the current import ban to include older models from Huawei, ZTE, Hytera, Hikvision and Dahua, which the FCC says \"continue to pose an unacceptable risk to national security\". A 2022 ban had blocked only new gear. Already-purchased equipment is not immediately affected. Hikvision \"strongly opposes\" the move, calling it politically motivated. The action is the latest in Washington's crackdown amid deepening US-China decoupling, following December's ban on Chinese drones including DJI, March's foreign Wi-fi router ban, and proposed licensing for Chinese undersea cable suppliers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/US%20FCC%20expands%20import%20ban%20to%20older%20Huawei,%20ZTE%20gear%20in%20continued%20crackdown%20on%20Chinese%20tech.pdf"}, {"id": "scmp-16", "title": "US Supreme Court boosts Trump's power to fire officials, but Fed's Cook keeps job", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Politics", "Finance & Markets"], "summary": "The US Supreme Court fortified President Donald Trump's power to fire members of independent government agencies, but carved out protections for the Federal Reserve by blocking the firing of Governor Lisa Cook. In a 6-3 ruling, the conservative majority rejected a challenge by FTC Commissioner Rebecca Slaughter, holding Trump could fire \"subordinates who exercise the President's power\". Chief Justice Roberts cited James Madison; Justice Sotomayor dissented that \"chaos will follow\". In a separate 5-4 verdict, the court ruled Trump could fire Fed governors only for cause, not \"for any reason or no reason\", stressing the Fed's independence. The court found Trump failed to afford Cook procedural protections. Cook, who denies mortgage-fraud allegations, welcomed the decision; Trump vowed immediate action.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/US%20Supreme%20Court%20boosts%20Trump%E2%80%99s%20power%20to%20fire%20officials,%20but%20Fed%E2%80%99s%20Cook%20keeps%20job.pdf"}, {"id": "scmp-17", "title": "Why Chinese-American success stories still provoke prejudice and fear", "source": "SCMP", "date": "30 Jun 2026", "tags": ["Society", "Geopolitics"], "summary": "As the US marks its 250th anniversary, anti-Asian prejudice persists nearly 150 years after the Chinese Exclusion Act, with Chinese-Americans long seen as \"perpetual foreigners\" whose success sparks suspicion. Frank Wu of Queens College said their achievements were viewed as \"unfair competition\". Chinese workers built the Transcontinental Railroad but were excluded from its celebration. Historian Ellen Wu cited landmark Yick Wo and Wong Kim Ark Supreme Court victories that widened American rights. Today, US-China tensions have turned ordinary Chinese-Americans into \"collateral damage\", with researchers scrutinised under Trump's 2018 China Initiative. Florida and Texas have banned Chinese citizens from buying land near military bases, with similar laws proposed elsewhere. Communities, including some white allies, are fighting back.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20SCMP/Why%20Chinese-American%20success%20stories%20still%20provoke%20prejudice%20and%20fear.pdf"}]}};</script>
