<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tecity News Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbfbfa; --surface:#ffffff; --surface-2:#f6f6f4;
    --text:#16181d; --muted:#6c727e; --faint:#9aa0ab;
    --border:#ececec; --border-2:#e2e2e0; --ink:#16181d;
    --hover:#f4f4f2; --ring:rgba(20,23,28,.10);
    --shadow:0 1px 2px rgba(16,18,22,.04), 0 8px 24px rgba(16,18,22,.05);
    --shadow-sm:0 1px 2px rgba(16,18,22,.05);
    --wsj:#D85A30; --st:#1D9E75; --bt:#378ADD; --scmp:#D4537E;
    --maxw:1120px;
  }
  html[data-theme="dark"]{
    --bg:#0c0d10; --surface:#15171c; --surface-2:#1b1e25;
    --text:#eceef2; --muted:#9aa1ad; --faint:#6b7280;
    --border:#252830; --border-2:#2d313b; --ink:#eceef2;
    --hover:#1c1f26; --ring:rgba(255,255,255,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv02","cv03","cv04","ss01";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.6;
  }
  ::selection{background:rgba(120,120,120,.18)}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}

  /* header */
  header.top{position:sticky; top:0; z-index:20; backdrop-filter:saturate(180%) blur(14px);
    background:color-mix(in srgb, var(--bg) 82%, transparent); border-bottom:1px solid var(--border)}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 28px; max-width:var(--maxw); margin:0 auto}
  .brand{display:flex; flex-direction:column; gap:2px; min-width:0}
  .brand .title{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .brand .meta{font-size:12.5px; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:10px}
  select.date{appearance:none; font:inherit; font-size:13px; font-weight:500; color:var(--text);
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; padding:8px 32px 8px 12px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa0ab' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; cursor:pointer; transition:border-color .15s}
  select.date:hover{border-color:var(--ink)}
  .toggle{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; color:var(--muted); transition:.15s}
  .toggle:hover{color:var(--text); border-color:var(--ink)}
  .toggle svg{width:17px; height:17px}

  /* hero digest */
  .hero{padding:48px 0 14px}
  .hero .eyebrow{margin-bottom:16px}
  .digest{font-size:clamp(25px,3.6vw,37px); line-height:1.22; font-weight:400; letter-spacing:-.02em;
    max-width:none; color:var(--text)}
  .digest .lead{max-width:none}

  /* metrics */
  .metrics{display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:30px 0 8px}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px; box-shadow:var(--shadow-sm); transition:.18s}
  .metric:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .metric .v{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.05}
  .metric .l{font-size:12.5px; font-weight:500; margin-top:8px}
  .metric .s{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4}

  /* tabs */
  .tabs{display:flex; gap:26px; margin:34px 0 0; border-bottom:1px solid var(--border)}
  .tab{position:relative; cursor:pointer; padding:0 0 14px; font-size:14px; font-weight:500; color:var(--muted); transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px}

  .section{padding:30px 0 0}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px}
  .section-head h2{margin:0; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .section-head .hint{font-size:12.5px; color:var(--muted)}

  /* lead briefing card */
  .lead-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px 32px; box-shadow:var(--shadow); margin-bottom:16px}
  .lead-card .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:12px}
  .lead-card h3{margin:0 0 12px; font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1.2}
  .lead-card p{margin:0; font-size:15.5px; color:var(--text); line-height:1.65; max-width:none; column-width:34ch; column-gap:48px; column-fill:balance}

  /* briefing grid */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm); transition:.18s}
  .card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .card h3{margin:0 0 10px; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.3}
  .card p{margin:0; font-size:14px; color:var(--muted); line-height:1.62}

  /* coverage / bars */
  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm)}
  .bar-row{display:flex; align-items:center; gap:14px; margin:14px 0}
  .bar-row .name{width:42px; font-size:12.5px; font-weight:600; letter-spacing:.02em}
  .bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; border-radius:99px}
  .bar-row .cnt{width:26px; text-align:right; font-size:12.5px; color:var(--muted); font-weight:600}

  /* article */
  .feed-controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:4px 0 18px}
  .search{flex:1 1 260px; position:relative}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint)}
  .search input{width:100%; font:inherit; font-size:14px; color:var(--text); background:var(--surface);
    border:1px solid var(--border-2); border-radius:12px; padding:11px 14px 11px 38px; outline:none; transition:.15s}
  .search input:focus{border-color:var(--ink); box-shadow:0 0 0 4px var(--ring)}
  .pills{display:flex; flex-wrap:wrap; gap:8px}
  .pill{cursor:pointer; font-size:12.5px; font-weight:500; color:var(--muted); background:var(--surface);
    border:1px solid var(--border-2); border-radius:99px; padding:7px 13px; user-select:none; transition:.14s; line-height:1}
  .pill:hover{border-color:var(--ink); color:var(--text)}
  .pill.active{color:#fff; border-color:transparent}
  .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
  .count{font-size:12.5px; color:var(--muted); margin-bottom:14px}

  .article{padding:22px 4px; border-bottom:1px solid var(--border)}
  .article:first-child{padding-top:6px}
  .article .head{display:flex; align-items:center; gap:12px; margin-bottom:9px; flex-wrap:wrap}
  .src{display:inline-flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted)}
  .src .dot{width:8px; height:8px; border-radius:99px}
  .article h4{margin:0; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.32; flex:1; min-width:240px}
  .article h4 a{color:inherit; text-decoration:none; transition:color .15s}
  .article h4 a:hover{color:var(--wsj-hover, var(--muted))}
  .article .date{font-size:12px; color:var(--faint); white-space:nowrap}
  .article p{margin:6px 0 12px; font-size:14.5px; color:var(--muted); line-height:1.62; max-width:88ch}
  .tags{display:flex; flex-wrap:wrap; gap:7px}
  .tag{font-size:11px; font-weight:600; letter-spacing:.01em; border-radius:99px; padding:3px 10px; border:1px solid transparent}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:14px}
  footer{padding:48px 0 60px; color:var(--faint); font-size:12px; text-align:center}

  @media(max-width:980px){
    .metrics{grid-template-columns:repeat(3,1fr)}
    .cards{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap,.topbar{padding-left:18px; padding-right:18px}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .hero{padding-top:34px}
  }
</style>
</head>

<script>window.ALL_DAYS = {"2026-06-15": {"date": "2026-06-15", "dayOfWeek": "Monday", "totalArticles": 57, "sourceCounts": {"WSJ": 19, "ST": 10, "BT": 11, "SCMP": 17}, "executiveDigest": "SpaceX's record $2.1 trillion debut crowns the AI-fuelled market melt-up just as a near-complete US-Iran deal tests whether the Strait of Hormuz reopens and energy-driven rate hikes follow.", "briefingCards": [{"title": "SpaceX's $2.1tn debut crowns the AI market melt-up", "body": "SpaceX soared 19% on its first day to a $2.1 trillion valuation, the largest IPO ever, making Elon Musk the world's first trillionaire and the sixth-most valuable US public company. The offering, more than four times subscribed, was powered by retail investors buying Musk's vision of orbital AI data centres, with OpenAI and Anthropic IPOs expected to follow. Analysts and commentators across WSJ, ST and BT urged scrutiny of the lofty valuation and the index-provider 'fast entry' rules that will sweep passive investors into the stock. The debut intensified bubble worries even as it validated Musk's 'superlative' strategy."}, {"title": "Central banks tilt hawkish as the Iran energy shock bites", "body": "The Bank of Japan is set to raise rates to a 31-year high of 1% on Tuesday, its first hike since December, while the Bank of Korea signalled it may resume tightening next month, both citing the Middle East energy shock. The ECB and several Asian peers have already moved, leaving the Federal Reserve in wait-and-see mode. Stress persists in private credit, where BlackRock's flagship fund faced 13.3% redemption requests but will repurchase only 5%. The UK economy contracted 0.1% in April as Iran-war fallout weighed on a previously strong year."}, {"title": "Middle powers recalibrate as US-China tone thaws", "body": "This year's Shangri-La Dialogue showed a clearer, improved US-China tone, forcing smaller states to recalibrate rather than simply choose sides. Japan is building a 'network of navies', agreeing to transfer Asagiri-class destroyers to Indonesia after similar moves with Australia and the Philippines, and hailing a GCAP 'near-alliance' with the UK. Veteran diplomat Richard Haass argued US-China talks must be 'institutionalised' to ease AI-era tensions. North Korea, meanwhile, signalled its Russia ties are hardening into a military alliance while hedging toward China."}, {"title": "Hormuz reopening hinges on a fragile, near-complete Iran deal", "body": "The US, Iran and mediator Pakistan declared a peace deal nearly complete, with a senior Trump official around 80% confident of agreement within days and a 60-day window to reopen the Strait of Hormuz and dismantle Iran's nuclear programme. Yet timing slipped: Tehran said it would 'not be tomorrow', Israeli strikes on Beirut drew Trump's rebuke, and intelligence suggests Iran rebuilt much of its missile arsenal with Russian help during the truce. Oil has stayed below $100, with US crude at $84.88, as markets price in diplomacy. Executives warn grain and fertilizer supplies remain imperiled while the strait stays effectively closed."}, {"title": "AI's export controls, price war and supply pinch converge", "body": "Washington banned foreign use of Anthropic's top Fable 5 and Mythos 5 models, prompting the company to halt all access, while a coalition of state attorneys general subpoenaed OpenAI. An AI price war is cutting some costs up to 95% as agents route cheap Chinese and open-source models for routine tasks, pressuring OpenAI and Anthropic. Supply bottlenecks bite too: Ajinomoto's chip film and China-controlled tungsten threaten the AI hardware chain, with tungsten hexafluoride up over 200%. China-linked operations are also using ChatGPT to inflame US data-centre debates."}, {"title": "Singapore tightens AI and wealth rules as a hub play", "body": "Singapore's revised single-family-office framework took effect on June 15, simplifying setup to a notification-and-bank-account requirement with a one-year transition. IMDA signed an MOU with Microsoft to test frontier AI model safety across languages, following alarm over Anthropic's Claude Mythos Preview, while a commentary backed Singapore's AI-agent registry as a model for accountability. DBS extended wealth-planning managers to 3.8 million retail customers. Regionally, Hong Kong is courting around 30 European family offices and Gulf wealth, and Hilton reported 4.7% Apac RevPAR growth, underscoring Asia's hub competition amid global flux."}], "keyMetrics": [{"value": "$2.1tn", "label": "SpaceX day-one market value", "sub": "Shares up 19%; largest IPO ever"}, {"value": "1%", "label": "BOJ policy rate expected Tuesday", "sub": "Highest since 1995; first hike since December"}, {"value": "$84.88", "label": "US crude per barrel", "sub": "Below $100 despite Iran war; deal hopes weigh"}, {"value": "13.3%", "label": "BlackRock private-credit redemptions sought", "sub": "Up from 9.3%; only 5% to be repurchased"}, {"value": "+200%", "label": "Tungsten hexafluoride price, YoY", "sub": "China curbs threaten Japan's AI chip chain"}, {"value": "3.8m", "label": "DBS retail customers with wealth manager", "sub": "About eight in 10 of its retail base"}], "articles": [{"id": "wsj-01", "title": "AI Is Turbocharging the Spamosphere, Amping Up Prolific Text-Message Scams", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Google sued a prolific scam group it calls “Outsider” in the first case against a defendant using its Gemini AI model. The group built a guide for Gemini to generate code for fake carrier websites, circulating hundreds of templates and over 8,000 phishing sites. The FBI says Outsider has stolen an estimated 3.87 million credit card numbers, causing $1.9 billion in losses since July 2023. Scammers pivoted from fake package and toll notices to impersonating phone companies offering expiring rewards points.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/AI%20Is%20Turbocharging%20the%20Spamosphere%2C%20Amping%20Up%20Prolific%20Text-Message%20Scams.pdf"}, {"id": "wsj-02", "title": "AI Needs Ajinomoto’s Film, but Its CEO Won’t Raise Prices Just Because", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Surging AI-chip demand is straining the supply of materials chips depend on, including Ajinomoto Build-up Film, an insulating material for which Japan's Ajinomoto is the dominant supplier. CEO Shigeo Nakamura said forecasts suggest the company can meet demand through 2030 but visibility beyond that is unclear. Despite investor pressure to exploit its near-monopoly, Ajinomoto says it hasn't hiked prices and won't do so simply because it can. Nakamura expects AI-related demand to keep “surging at an even faster pace.”", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/AI%20Needs%20Ajinomoto%E2%80%99s%20Film%2C%20but%20Its%20CEO%20Won%E2%80%99t%20Raise%20Prices%20Just%20Because.pdf"}, {"id": "wsj-03", "title": "Anthropic Halts Access to Top AI Models After U.S. Ban on Foreign Use", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The Trump administration banned foreign governments, companies and individuals from using Anthropic's most powerful AI tools, prompting the company to shut off all access to comply. Commerce Secretary Howard Lutnick told CEO Dario Amodei in a Friday letter that the new Fable 5 and Mythos 5 models are now subject to export restrictions. Because many foreign nationals and foreign-born employees fall under the rule, Anthropic limited access to both models entirely; other tools are unaffected. Anthropic said the letter “did not provide specific details” of the national-security concern.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Anthropic%20Halts%20Access%20to%20Top%20AI%20Models%20After%20U.S.%20Ban%20on%20Foreign%20Use.pdf"}, {"id": "wsj-04", "title": "Bank of Japan Poised to Raise Rates to 31-Year High", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "The Bank of Japan is widely expected to raise its policy rate to 1% at its two-day meeting concluding Tuesday, the highest level since 1995 and its first hike since last December. Markets have nearly fully priced in the tightening, driven by concern over accelerating underlying inflation amid the Middle East conflict, surging energy prices and yen weakness. The decision risks slowing growth and curbing investment just as Japan's recovery takes shape. Gov. Kazuo Ueda's recent messaging reinforced expectations of the 25-basis-point move.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Bank%20of%20Japan%20Poised%20to%20Raise%20Rates%20to%2031-Year%20High.pdf"}, {"id": "wsj-05", "title": "Bank of Korea Governor Signals Readiness to Raise Interest Rates as Inflation Risks Mount", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "Bank of Korea Gov. Shin Hyun-song warned against falling behind the curve on inflation, signaling the central bank may resume tightening as soon as next month. He cited the dragging Middle East conflict driving up energy prices and disrupting supply chains. Shin said current developments in growth, inflation and financial stability “point relatively clearly in one direction.” Several Asian peers and the ECB have already raised rates, while the Federal Reserve remains in wait-and-see mode.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Bank%20of%20Korea%20Governor%20Signals%20Readiness%20to%20Raise%20Interest%20Rates%20as%20Inflation%20Risks%20Mount.pdf"}, {"id": "wsj-06", "title": "BlackRock Private-Credit Fund Faces 13% Redemption Requests", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "Investors in BlackRock's flagship private-credit fund asked to redeem 13.3% of shares in the second quarter, up from 9.3% the prior period. BlackRock will repurchase only 5%, sticking with its stated threshold and cashing out shareholders on a prorated basis. The higher requests signal continued pressure on the private-credit industry amid concerns over loan losses, fraud and exposure to AI-vulnerable software firms. Blackstone's Bcred saw 10% redemption requests and Cliffwater 17% on its $31 billion fund.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/BlackRock%20Private-Credit%20Fund%20Faces%2013%25%20Redemption%20Requests.pdf"}, {"id": "wsj-07", "title": "Deal With Iran Is Close, but Accord Will Kickstart Toughest Phase of Talks", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The U.S., Iran and mediator Pakistan agreed Friday that a peace deal to end the war was nearly complete, though an initial accord would only begin the hardest phase of nuclear negotiations. A senior Trump official said he was around 80% confident a deal would be reached within days, including Iran's commitment not to develop a nuclear weapon and to destroy its highly enriched uranium stockpile. In exchange Iran would receive sanctions relief and economic benefits. An initial signing would open a 60-day period during which Iran reopens the Strait of Hormuz and the U.S. winds back its blockade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Deal%20With%20Iran%20Is%20Close%2C%20but%20Accord%20Will%20Kickstart%20Toughest%20Phase%20of%20Talks.pdf"}, {"id": "wsj-08", "title": "Donald Trump’s 80th Birthday Comes Amid a White House Strategy of Relentless Exposure", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Politics"], "summary": "As Trump turns 80 on Sunday, he and his advisers have made a strategic decision to make him an omnipresent figure in American life, contrasting with predecessor Joe Biden. He holds marathon Oval Office appearances, answers reporters' cold calls and posts on social media at all hours. The approach exposes Americans to both the good and bad of an aging president, including being caught nodding off at an NBA Finals game. He recently called the downing of a U.S. Apache near the Strait of Hormuz not “a big deal,” then ordered retaliatory strikes on Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Donald%20Trump%E2%80%99s%2080th%20Birthday%20Comes%20Amid%20a%20White%20House%20Strategy%20of%20Relentless%20Exposure.pdf"}, {"id": "wsj-09", "title": "JPMorgan Chase Has a Key Role for SpaceX’s IPO: Party Host", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "JPMorgan hosted the closing-deal party for SpaceX's record IPO on the 57th floor of its new 270 Park Ave. headquarters in Midtown Manhattan. The Friday-night celebration for SpaceX employees, executives and underwriters featured a buffet, a “carvery countdown” with logo-branded tomahawk steak bones, and themed cocktails including “The Future is Public” and “Falcon 9.” SpaceX CFO Bret Johnsen and President Gwynne Shotwell were among those attending. The bash marked the biggest IPO of all time.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/JPMorgan%20Chase%20Has%20a%20Key%20Role%20for%20SpaceX%E2%80%99s%20IPO%20Party%20Host.pdf"}, {"id": "wsj-10", "title": "OpenAI Investigated by Coalition of State Attorneys General", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "A coalition of state attorneys general has opened an investigation into OpenAI, serving it Friday with a subpoena from New York's attorney general. The subpoena seeks documents on advertising, user engagement and retention, consumer and health data, activities involving minors and seniors, deep learning models and model sycophancy. The probe is the latest in a series of state legal actions against AI companies; Florida earlier became the first state to sue OpenAI. The company confidentially filed IPO paperwork with the SEC this month.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/OpenAI%20Investigated%20by%20Coalition%20of%20State%20Attorneys%20General.pdf"}, {"id": "wsj-11", "title": "SpaceX, Now Worth $2.1 Trillion, Pulls Off Goldilocks Debut", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX shares soared 19% Friday as Elon Musk's rocket maker pulled off the largest IPO ever and one of the smoothest in recent history. Valued at $1.77 trillion when it sold $75 billion of shares a day earlier, it ended its first trading day worth $2.1 trillion, the sixth-most valuable U.S. public company ahead of Broadcom and Tesla. The offering turned Musk into the world's first trillionaire and handed longtime investors and employees billions. It was powered by individual investors buying into Musk's vision of putting data centers in space to support AI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/SpaceX%2C%20Now%20Worth%20%242.1%20Trillion%2C%20Pulls%20Off%20Goldilocks%20Debut.pdf"}, {"id": "wsj-12", "title": "SpaceX’s IPO Proves the Power of Elon Musk’s ‘Superlative’ Strategy", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX's record IPO embodied Elon Musk's roughly 25-year goal of using superlatives to capture attention and build public excitement for space travel. The offering became the world's biggest IPO ever, raising tens of billions to fund ambitions for orbital AI data centers and eventually a million-person city on Mars. Musk's original idea was far smaller: a publicity stunt to send plant seeds to Mars to sprout the first life there. “The public tends to respond to precedence and superlatives,” he explained.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/SpaceX%E2%80%99s%20IPO%20Proves%20the%20Power%20of%20Elon%20Musk%E2%80%99s%20%E2%80%98Superlative%E2%80%99%20Strategy.pdf"}, {"id": "wsj-13", "title": "The AI Price War Is Here, Piling Pressure on OpenAI and Anthropic", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI"], "summary": "An AI price war has begun as new cost-saving tools let businesses dynamically switch among third-party and in-house models built on open-source systems. Autonomous AI agents use cheap models, including those from Alibaba and DeepSeek, for most tasks and tap premium OpenAI and Anthropic models only for complex work, cutting some AI costs by as much as 95%. Detail founder Dan Robinson shifted 90% of his startup's workload off Claude and Gemini to custom open-source systems. He cited “an embarrassment of riches” coming from open-source labs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20AI%20Price%20War%20Is%20Here%2C%20Piling%20Pressure%20on%20OpenAI%20and%20Anthropic.pdf"}, {"id": "wsj-14", "title": "The Teachers Getting $50,000 Bonuses Thanks to a Massive Meta Data Center", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "A Louisiana school district says some teachers will receive bonuses exceeding $50,000 this year from increased tax revenue tied to a Meta data-center project. The parish brought in $42.9 million in sales and use tax over the first nine months of the fiscal year, more than double last year's total, and Meta separately paid $22.4 million in tax in May. The windfall comes as U.S. public opposition to data centers swells over their effect on affordability. For some teachers the bonuses may exceed their salaries.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20Teachers%20Getting%20%2450%2C000%20Bonuses%20Thanks%20to%20a%20Massive%20Meta%20Data%20Center.pdf"}, {"id": "wsj-15", "title": "The Wearable Boom Is Real. The Investment Case Is Murkier.", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Wearable makers Oura and Whoop are growing fast and seeking to go public, having each raised capital at private valuations of roughly $10 billion to $11 billion, about 10 times revenue. Oura's roughly $400 smart ring and Whoop's screenless subscription wristband have built strong user loyalty and celebrity backing. But WSJ cautions the history of consumer health hardware suggests turning self-optimization into a durable, fast-growing business is harder than it looks. The investment case is murkier than the boom itself.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20Wearable%20Boom%20Is%20Real.%20The%20Investment%20Case%20Is%20Murkier..pdf"}, {"id": "wsj-16", "title": "U.K. Economy Contracted in April After Strong Start to Year", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "The U.K. economy contracted 0.1% in April, the Office for National Statistics said, marking the first monthly contraction since August and matching economists' consensus. The decline followed a strong first quarter that outpaced the U.S. and most European peers, partly flattered by March front-loading ahead of higher energy costs and Middle East supply-chain disruptions. Economists warned the fallout from the Iran war will further weaken activity. Adviser Joe Nellis cited “persistently weak productivity” and rising geopolitical tensions weighing on growth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/U.K.%20Economy%20Contracted%20in%20April%20After%20Strong%20Start%20to%20Year.pdf"}, {"id": "wsj-17", "title": "Why Oil Prices Haven’t Shot Through the Roof — Yet", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Despite the Iran war and disruption to the Strait of Hormuz, which normally carries about 20% of the world's daily crude, oil has stayed below $100 a barrel for over three weeks, with U.S. crude at $84.88 Friday. Prices fell further on reports the U.S. and Iran neared a peace deal, giving Trump more time to negotiate. Oil executives and traders warn the worst may still come even if hostilities cease, as global stockpiles decline rapidly toward a critical low. Two weeks into the war, executives warned officials prices could climb much higher unless the strait reopened soon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Why%20Oil%20Prices%20Haven%E2%80%99t%20Shot%20Through%20the%20Roof-Yet.pdf"}, {"id": "wsj-18", "title": "World’s Food Supply Imperiled by Iran War, Fertiglobe Chief Says", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Energy", "Society"], "summary": "Fertiglobe CEO Ahmed El-Hoshy warned the Middle East conflict threatens to spike grain prices and worsen hunger among the world's poor. Ammonia and urea fertilizer prices have jumped as Middle East supply fell and the energy shock sent gas prices soaring; nitrogen fertilizers are vital to corn, wheat and rice yields. With the Strait effectively closed, Fertiglobe has trucked some product by road to other regional ports, but not enough to offset the supply hit. El-Hoshy urged governments to move fertilizer through the Persian Gulf and support farmers. Fertiglobe is majority owned by Adnoc.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/World%E2%80%99s%20Food%20Supply%20Imperiled%20by%20Iran%20War%2C%20Fertilizer%20Manufacturer%20Fertiglobe%20Chief%20Says.pdf"}, {"id": "wsj-19", "title": "Worried About a Tech-Stock Bubble? Here’s Where You Can Take Cover", "source": "WSJ", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Columnist Jason Zweig argues Europe offers a refuge for investors worried about U.S. market overconcentration and an AI bubble, intensified by SpaceX's IPO and pending OpenAI and Anthropic listings. Emerging markets are not a safer alternative: in May, all of the world's combined stock-market return came from South Korea's SK Hynix, and Korea and Taiwan are at least as exposed to the AI boom as the U.S. In an S&P 500 index fund, 47% of money sits in just two industries, technology and one other. Europe, by contrast, is far less AI-concentrated.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Worried%20About%20a%20Tech-Stock%20Bubble%20Here%E2%80%99s%20Where%20You%20Can%20Take%20Cover.pdf"}, {"id": "st-01", "title": "America's politics is reaching peak paranoia", "source": "ST", "date": "15 Jun 2026", "tags": ["Politics", "Society"], "summary": "The commentary argues contemporary American politics is gripped by surging conspiracy theories across the right and left, from “Deep State” subversion to claims Putin holds “kompromat” on Trump. It frames these as the latest manifestation of what historian Richard Hofstadter called “the paranoid style of American politics.” Hofstadter's 1964 essay has just been republished by Penguin/Random House alongside related writings. The piece warns the paranoid style appears more entrenched than ever.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/America%27s%20politics%20is%20reaching%20peak%20paranoia.pdf"}, {"id": "st-02", "title": "China's AI influence operations target US divisions", "source": "ST", "date": "15 Jun 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "China-linked influence campaigns are targeting America's divisions over contested AI issues such as data-center construction, US researchers say. OpenAI reported on June 10 it uncovered two clusters of ChatGPT accounts likely originating from China that promoted narratives to manipulate debate over US AI and tech policy. One cluster generated posts and images claiming AI data-center buildouts were raising household electricity prices. Operators prompted ChatGPT in Simplified Chinese while posing as Americans, and were likely a social-media team at a private Chinese tech firm doing provincial-government work.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/China%27s%20AI%20influence%20operations%20target%20US%20divisions.pdf"}, {"id": "st-03", "title": "DBS extends wealth planning to retail customers", "source": "ST", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "DBS Bank has given 3.8 million retail customers access to a personal wealth planning manager since launching the initiative in 2023, covering roughly eight in 10 of its retail customers aged 18 to 68. Customers like small-business owner Lim Mei Luan, surprised to be assigned a manager, were guided through digiWealth, a planning platform built into the DBS digibank app. Retail and POSB head Nelson Neo said the team began sending personalised emails about the service in 2023. The push democratises wealth planning beyond high-net-worth clients.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/DBS%20wealth%20planning%20for%20retail%20customers.pdf"}, {"id": "st-04", "title": "Experts urge closer look at SpaceX's lofty valuation on IPO rally", "source": "ST", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Elon Musk became the world's first trillionaire after SpaceX's record Nasdaq debut, with his net worth rising to an estimated US$1.1 trillion, up from about US$982 billion. SpaceX shares debuted at US$150 on June 12, peaked at US$176.52, and closed 7% higher at US$160.95; Musk holds an estimated 42% stake. The company raised a record US$75 billion, valuing it at US$1.77 trillion. Singapore investors can now trade SpaceX shares via platforms such as Tiger Brokers, Moomoo and Syfe, though experts urge scrutiny of the lofty valuation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/Experts%20urge%20closer%20look%20at%20SpaceX%27s%20lofty%20valuation%20on%20IPO%20rally.pdf"}, {"id": "st-05", "title": "More Japanese local governments levying hotel tax despite industry concerns", "source": "ST", "date": "15 Jun 2026", "tags": ["Trade", "Society"], "summary": "An increasing number of Japanese local governments are introducing accommodation taxes on overnight hotel guests, with the total expected to reach 55 this fiscal year, according to the Internal Affairs Ministry. Forty-five have already implemented the levy and another 10 plan to follow by year-end, aiming to fund handling of foreign-tourist influxes and tourism promotion. The hot-spring resort Yugawara, which sees about 600,000 overnight guests annually, became the first Kanagawa municipality to adopt the tax in April, charging 300 to 500 yen per night. Industry groups worry the levy could reduce guest numbers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/More%20Japanese%20local%20governments%20levying%20hotel%20tax%20despite%20industry%20concerns.pdf"}, {"id": "st-06", "title": "Resale condos staying on market longer as buyers take their time", "source": "ST", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore resale condominium units are taking longer to sell as buyers hold back and new launches compete for demand, while sellers resist cutting prices. One two-bedroom Serangoon unit, first listed in early February at $1.92 million, remained unsold after its owner cut $100,000 and a later deal collapsed; it has now been on the market at least four months. Agents say today's buyers have many resale choices and take their time shopping for the best buy. A common hurdle is buyers needing to sell their own home first.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/Resale%20condos%20staying%20on%20market%20longer%20as%20buyers%20take%20their%20time%2C%20sellers%20hold%20firm%20on%20prices.pdf"}, {"id": "st-07", "title": "Shangri-La Dialogue: False dichotomies, real consequences", "source": "ST", "date": "15 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "The commentary uses the 2026 Shangri-La Dialogue in Singapore as a barometer of global anxiety, noting a clear improvement in the US-China tone with implications for nations large and small. It argues smaller states can no longer hide behind the US shield or assume they must choose sides, and must recalibrate their calculus. Invoking the saying that when elephants fight the grass suffers, it adds a harsher truth: “even when elephants make love, the grass is not spared.” No one wants to be the grass.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/Shangri-La%20Dialogue%20False%20dichotomies%2C%20real%20consequences.pdf"}, {"id": "st-08", "title": "Singapore, Microsoft to explore ways to test the safety of frontier AI models", "source": "ST", "date": "15 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore's IMDA and Microsoft signed a memorandum of understanding on June 12 to jointly develop ways to access and test frontier AI models for safety and security, including how safely they operate across languages. The move follows global concerns over Anthropic's latest Claude Mythos Preview model, which can autonomously uncover unknown software vulnerabilities and engineer exploits. The partners will also exchange best practices and governance frameworks. IMDA said such collaboration is essential because AI is moving faster than any single actor can manage alone.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/Singapore%2C%20Microsoft%20to%20explore%20ways%20to%20test%20the%20safety%20of%20frontier%20AI%20models.pdf"}, {"id": "st-09", "title": "Trump again picks personal lawyer for top job as US attorney in Manhattan", "source": "ST", "date": "15 Jun 2026", "tags": ["Politics"], "summary": "Trump said on June 13 he would nominate James “Jamie” McDonald as the next US attorney for the Southern District of New York, again choosing one of his personal lawyers for a powerful legal post. McDonald, a Sullivan & Cromwell litigation partner, is a former SDNY Assistant US Attorney, served as the CFTC's enforcement director during Trump's first term, and clerked for Chief Justice John Roberts. He would replace Jay Clayton, Trump's pick to be director of national intelligence. Clayton's nomination still requires Senate confirmation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/Trump%20again%20picks%20personal%20lawyer%20for%20top%20job%20as%20US%20attorney%20in%20Manhattan.pdf"}, {"id": "st-10", "title": "US, Iran inch closer to deal, timing remains unclear", "source": "ST", "date": "15 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "US and Pakistani leaders forecast a June 14 signing of a framework agreement to end the US-Iran war, but Tehran cast doubt on the timing and hardline Iranian protesters voiced opposition. Trump posted on June 13 that the deal would be signed the next day, his 80th birthday, and Pakistani PM Shehbaz Sharif said Islamabad was preparing an electronic signing. But Iran's foreign ministry spokesman said it would “not be tomorrow” though it could happen “in the coming days.” Qatari negotiators flew to Tehran on June 14 as Iran's review of the framework continued.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20ST/US%2C%20Iran%20inch%20closer%20to%20deal%2C%20timing%20remains%20unclear.pdf"}, {"id": "bt-01", "title": "AI agents must be as accountable as human workers", "source": "BT", "date": "15 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore's announcement on June 2 of a registry of AI agents for its 150,000 public officers signals a government treating AI agents as operational realities that must be tracked, owned and governed, the commentary argues. It frames the shift from AI adoption to accountability as the defining challenge of the agentic AI era. As models move from advising to acting autonomously, chatbots are effectively becoming colleagues. The piece contends AI agents should be held to the same accountability standards as human workers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/AI%20agents%20must%20be%20as%20accountable%20as%20human%20workers.pdf"}, {"id": "bt-02", "title": "Australia bets on high-speed rail line as a housing-crisis fix", "source": "BT", "date": "15 Jun 2026", "tags": ["Society", "Trade"], "summary": "Australia's government is betting on a A$94 billion (S$85 billion) high-speed rail line to ease Sydney's housing-affordability crisis by shortening commutes and opening cheaper areas to workers. The new High Speed Rail Authority has been given an unprecedented US$462 million preparatory budget and is led by Tim Parker, whose record includes Hong Kong's Eastern Harbour Crossing and the Sydney Harbour Tunnel. Long derided as a financially flawed fantasy with a history of false starts, the bullet-train vision still faces skeptics. Parker said “everything has come together” with a government that wants to do it.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/Australia%20bets%20on%20high%20speed%20rail%20line%20as%20a%20housing%20crisis%20fix.pdf"}, {"id": "bt-03", "title": "California's general election is revealing fault lines in the Democratic Party", "source": "BT", "date": "15 Jun 2026", "tags": ["Politics"], "summary": "California's June 2 primaries set up two consequential November run-offs, a wide-open governor's race and a high-stakes Los Angeles mayoral battle, revealing a restless, ideologically fragmented electorate. With Gavin Newsom term-limited, a field of 61 candidates entered the governor's race. Republican candidates' strong showings pose existential questions for the Democratic Party. The contests were defined less by vision than by jockeying amid unresolved crises no administration has solved.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/California%27s%20general%20election%20is%20revealing%20fault%20lines%20in%20the%20Democratic%20Party.pdf"}, {"id": "bt-04", "title": "China markets are 'much cheaper', but beware the crackdown on overseas trading: Amundi CIO", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Amundi CIO Vincent Mortier remains optimistic on Chinese markets, calling them still “much cheaper” and citing the Five-Year Plan as reason for medium-term optimism. But he warned Beijing's recent crackdown on capital outflows is not a good signal, especially for foreign investors. He noted Chinese savers have largely kept money in bank accounts and short-term bonds rather than equities, with little foreign interest so far. Mortier maintained that China remains a good way to diversify portfolios.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/China%20markets%20are%20%27much%20cheaper%27%2C%20but%20beware%20the%20crackdown%20on%20overseas%20trading%20Amundi%20CIO.pdf"}, {"id": "bt-05", "title": "From moonshot to markets: Understand the mechanics before plunging into SpaceX's mega IPO", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The commentary urges investors to focus less on SpaceX's headline trillion-dollar valuation and more on the mechanics of what actually comes to market. SpaceX's IPO debuted on the Nasdaq on Friday June 12, with OpenAI and Anthropic potentially following later this year. These firms sit at the centre of major themes including space infrastructure, AI, computing power, data centres and national security. SpaceX's IPO price was set at US$135 a share with more than 555 million shares available.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/From%20moonshot%20to%20markets%20Understand%20the%20mechanics%20before%20plunging%20into%20SpaceX%27s%20mega%20IPO.pdf"}, {"id": "bt-06", "title": "Gold fever sends some vintage luxury watches to the melting furnace", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "With gold near record highs struck in January, some classic luxury watches are being melted down because their metal content is worth more than their resale value. Used models from Omega and LVMH's Tag Heuer are most affected, according to Reuters interviews with over a dozen traders and experts. British dealer Jon White of Gold Traders melted an 18-carat late-1970s Omega Constellation in excellent condition in May, one of dozens he has scrapped in 2026 as investment-gold demand rose. White questioned what the customer would have achieved at auction instead.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/Gold%20fever%20sends%20some%20vintage%20luxury%20watches%20to%20the%20melting%20furnace.pdf"}, {"id": "bt-07", "title": "Revised framework for single family offices to take effect on Jun 15: MAS", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore's revised framework for single family offices (SFOs) takes effect on June 15, with existing SFOs given until June 15, 2027 to comply. The framework simplifies the process for SFOs to establish operations in Singapore and streamlines documentation and reporting. Qualifying SFOs need only notify MAS and maintain an account with an MAS-licensed bank, plus file an annual return on total assets under management and bank name. The changes follow a public consultation and MAS' policy responses published in November 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/Revised%20framework%20for%20single%20family%20offices%20to%20take%20effect%20on%20Jun%2015%20MAS.pdf"}, {"id": "bt-08", "title": "Silent kingmakers: Market index providers are driving public investors into SpaceX and Big AI", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The commentary argues market index providers are quietly funnelling public investors into SpaceX and Big AI stocks. SpaceX's US$75 billion IPO was reportedly more than four times subscribed and shares ended their first session at US$160.95, over 19.2% above the US$135 IPO price, giving it a US$2.1 trillion market capitalisation. New “fast entry” rules from FTSE Russell and Nasdaq allow large companies rapid index inclusion, meaning many index-fund investors will soon own SpaceX. The piece notes this may sustain demand for the AI hardware powering Asia's best-performing markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/Silent%20kingmakers%20Market%20index%20providers%20are%20driving%20public%20investors%20into%20SpaceX%20and%20Big%20AI.pdf"}, {"id": "bt-09", "title": "South Korea's world-beating stock market eyes MSCI developed status", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "After one of its most volatile weeks in years, South Korea's stock market is nearing a long-sought path toward MSCI developed-market status. The Kospi has become 2026's best-performing major equity benchmark, surging over 90% as investors piled into AI winners, but the rally has also made it one of the world's most volatile markets, repeatedly triggering exchange safeguards. Investors await MSCI's annual classification review on June 23. Most of the 15 investors and strategists surveyed by Bloomberg expect MSCI to keep Korea in the emerging-market camp for now.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/South%20Korea%27s%20world-beating%20stock%20market%20eyes%20MSCI%20developed%20status.pdf"}, {"id": "bt-10", "title": "UK housing market slump shows signs of stabilising", "source": "BT", "date": "15 Jun 2026", "tags": ["Finance & Markets"], "summary": "Britain's residential property slowdown appears to have bottomed out as buyers and sellers accept higher borrowing costs and weak sentiment, a Royal Institution of Chartered Surveyors survey showed. The Rics indicator of new buyer demand held unchanged at minus 34 in May, ending three consecutive months of weakening. Sales activity remained subdued and house prices continued to edge lower, though the pace of decline appeared to be easing. Rics' Tarrant Parsons said the figures suggest the market is stabilising.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/UK%20housing%20market%20slump%20shows%20signs%20of%20stabilising.pdf"}, {"id": "bt-11", "title": "Unshaken in Apac: Hilton sees strong demand and fundamentals in the region amid global flux", "source": "BT", "date": "15 Jun 2026", "tags": ["Southeast Asia", "Trade"], "summary": "Hilton's Asia-Pacific outlook remains positive despite global geopolitical disruption, citing strong economic fundamentals, rising affluence, sustained infrastructure investment and an undersupply of rooms. For the first quarter ended March 31, 2026, revenue per available room grew across the region, up 4.7% year on year to US$65.58, despite uncertainty after the Middle East crisis broke out in late February. Growth was led by robust demand in Australasia, Japan and South Korea, said Apac president Alan Watts. China saw a modest improvement on renewed corporate demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20BT/Unshaken%20in%20Apac%20Hilton%20sees%20strong%20demand%2C%20fundamentals%2C%20investment%20in%20region%20amid%20global%20flux.pdf"}, {"id": "scmp-01", "title": "Abu Dhabi to tap Chinese tech to scale up green economy, energy chief says", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Abu Dhabi is fast-tracking its push to tap China's technologies, from renewable energy and EVs to robotics, as it pursues a greener economy, its energy chief said. Abdulla Humaid Al Jarwan, chairman of Abu Dhabi's department of energy, said his department was in talks with 22 Chinese firms, including CATL, during a recent Shanghai visit. He expects a deepened tie-up with China's industry leaders to support infrastructure development in the UAE capital. He said the two sides “should move faster, collaborate deeper and scale together.”", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Abu%20Dhabi%20to%20tap%20Chinese%20tech%20to%20scale%20up%20green%20economy%2C%20energy%20chief%20says.pdf"}, {"id": "scmp-02", "title": "China's AI 'hundred model' war shifts to enterprise value, JPMorgan says", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Technology & AI"], "summary": "China's AI monetisation battle has shifted toward “delivering measurable business value” rather than raw technical performance, said Alex Yao, JPMorgan's head of China equity research. He said the landscape is rapidly consolidating from a fragmented “hundred-model” fight to a smaller group of globally competitive leaders, especially those turning consumer features into enterprise-grade infrastructure. Major platforms are deploying paid subscriptions and coding tools to unlock commercial revenue. Chinese models still lag slightly behind top US counterparts on certain measures.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/China%E2%80%99s%20AI%20%E2%80%98hundred%20model%E2%80%99%20war%20shifts%20to%20enterprise%20value%2C%20JPMorgan%20says.pdf"}, {"id": "scmp-03", "title": "China's direct strike threat to Australia is 'growing', think tank report finds", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "China is capable of a direct missile strike on Australia and the threat is growing as Beijing amasses long-range and hypersonic weapons and builds islands in the South China Sea, the Lowy Institute said on Sunday. The report found the main threat is from Chinese missiles fired from ships, submarines and a new intermediate-range ballistic missile that could reach Australia from China. It said China's strike capacity would grow over the next decade as the DF-27 intermediate-range missile and potentially a conventionally armed ICBM enter service. The think tank urged Canberra to bolster its defences.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/China%E2%80%99s%20direct%20strike%20threat%20to%20Australia%20is%20%E2%80%98growing%E2%80%99%2C%20think%20tank%20report%20finds.pdf"}, {"id": "scmp-04", "title": "Do China's export curbs on tungsten threaten Japan's AI chip supply chain?", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Two major Japanese chemical manufacturers could halt production of a gas crucial to AI chipmaking as soon as next month as supply tightens and prices surge amid Beijing's export controls on tungsten. The price of tungsten hexafluoride, a critical precursor used to build microscopic connections inside advanced AI chips on 3- to 7-nanometre nodes, has jumped more than 200% year on year. The constraints highlight growing vulnerabilities in Japan's AI chip supply chain. The report underscores China's leverage over critical materials.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Do%20China%E2%80%99s%20export%20curbs%20on%20tungsten%20threaten%20Japan%E2%80%99s%20AI%20chip%20supply%20chain.pdf"}, {"id": "scmp-05", "title": "European wealth turns to Hong Kong as 30 family offices eye operations in the city", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Around 30 European family offices have expressed interest in establishing operations in Hong Kong, drawn by tax incentives and optimism about China's tech sector and Hong Kong's property market, according to InvestHK and industry participants. InvestHK's global head of family office, Jason Fong, said the agency is assisting these 30 European offices, about 19% of the 160 family-office cases it is currently handling. Hong Kong's family-office sector has expanded rapidly in recent years. A Deloitte study underscored the city's growing role as a wealth hub.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/European%20wealth%20turns%20to%20Hong%20Kong%20as%2030%20family%20offices%20eye%20operations%20in%20the%20city.pdf"}, {"id": "scmp-06", "title": "How Iran used the US ceasefire to replenish its depleted missile stockpiles", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Western allies believe Iran most likely added new-build Russian weapons to its inventory and reconstituted much of its missile arsenal during the eight-week ceasefire, intelligence assessments suggest. Iran now has about three-quarters of the munitions it had before the war and can easily build up further, including unspecified Russian missiles probably produced in the last year. That would give Tehran the firepower to strike back at nearly full strength if hostilities resume. Trump had said Iran was left with only 21-22% of its missiles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/How%20Iran%20used%20US%20ceasefire%20to%20replenish%20its%20depleted%20missile%20stockpiles.pdf"}, {"id": "scmp-07", "title": "Israeli strikes on Beirut foil US peace plans, Iran says 'no point' in talks", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel struck Hezbollah targets in Beirut's southern suburbs on Sunday, potentially complicating efforts to finalise a deal to end the US-Iran war, with Lebanese Civil Defense retrieving three bodies and six wounded from the rubble. Trump said “the attack on Beirut should not have happened” and urged no further attacks by anyone. Iran threatened a military response, with its foreign ministry holding the US directly responsible for ceasefire breaches. Trump insisted “we are very close to a Deal that will bring peace to the region.”", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Israeli%20strikes%20on%20Beirut%20foil%20US%20peace%20plans%2C%20Iran%20says%20%E2%80%98no%20point%E2%80%99%20in%20talks.pdf"}, {"id": "scmp-08", "title": "Japan adds Indonesia to 'network of navies' after Australia, Philippines", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Defence", "Southeast Asia"], "summary": "Japan confirmed on June 5 that it and Indonesia agreed to begin formal talks on transferring Asagiri-class destroyers to the Indonesian Navy, following a meeting between their defence ministers. Analysts say Tokyo is building a “network of navies” by exporting warships to bind partners through shared hardware while sidestepping formal military pacts. Indonesia sits at the confluence of the world's busiest sea lanes, with chokepoints like the Malacca and Lombok straits, but has long lacked subsurface awareness. The move follows similar arrangements with Australia and the Philippines.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Japan%20adds%20Indonesia%20to%20%E2%80%98network%20of%20navies%E2%80%99%20after%20Australia%2C%20Philippines.pdf"}, {"id": "scmp-09", "title": "AIIB head Zou Jiayi on why multilateralism is an 'infrastructure of global trust'", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "In an interview marking the Asian Infrastructure Investment Bank's 10th anniversary, president Zou Jiayi argued that multilateral institutions are an “infrastructure of global trust” that “create certainty amid uncertainty.” Zou previously served as a Chinese vice-minister of finance and represented China at the World Bank for eight years. She defended multilateralism amid rising geopolitical fragmentation and protectionism. The AIIB, inaugurated in 2016 and headquartered in Beijing, positions itself as a stabilising force in global development finance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Open%20QuestionsAIIB%20head%20Zou%20Jiayi%20on%20why%20multilateralism%20is%20an%20%E2%80%98infrastructure%20of%20global%20trust%E2%80%99.pdf"}, {"id": "scmp-10", "title": "Putin and Zelensky hold phone calls with Trump as US president marks his 80th birthday", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics"], "summary": "Russian President Vladimir Putin and Ukrainian President Volodymyr Zelensky each held phone calls with Trump on Sunday as he marked his 80th birthday and ahead of this week's G7 summit. Putin's call lasted just under an hour, according to aide Yuri Ushakov, who said Trump emphasised ending hostilities and his readiness to influence European allies and Kyiv. Trump said ending the Ukraine war could open the door to a “new quality of US-Russian relations,” per the Russian account. The war remained a flashpoint heading into the G7.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Putin%20and%20Zelensky%20hold%20phone%20calls%20with%20Trump%20as%20US%20president%20marks%20his%2080th%20birthday.pdf"}, {"id": "scmp-11", "title": "Takaichi hails UK defence ties despite next-gen jet spending uncertainty", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Japanese Prime Minister Sanae Takaichi hailed deepening defence cooperation with the UK during a meeting with Prime Minister Keir Starmer in London on Sunday, amid uncertainty over the GCAP next-generation fighter jet programme. Takaichi called the UK “a very important partner to Japan” across security and defence, and said GCAP had reached “a level that we can call a near-alliance.” She said she hoped to elevate ties further with Starmer and was pleased to reconfirm a deep commitment to GCAP. The billion-dollar jet programme also involves Italy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Takaichi%20hails%20UK%20defence%20ties%20despite%20next-gen%20jet%20spending%20uncertainty.pdf"}, {"id": "scmp-12", "title": "The quiet escalation around Taiwan's remote outposts as Beijing sends ships", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Taiwan for the first time reported mainland Chinese law enforcement vessels near Taiping, an island it controls in the South China Sea, a development experts say could form the basis of Beijing's effective control of the waters. Two mainland ships, the Sansha Zhifa 301 and Sansha No 2, managed by Hainan's city of Sansha, entered the area. The move followed Beijing's accusations that Taiwan's ruling DPP had been inactive amid Japan-Philippines maritime delineation talks affecting contested exclusive economic zones. The incident marks a quiet escalation around Taiwan's remote outposts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/The%20quiet%20escalation%20unfolding%20around%20Taiwan%E2%80%99s%20remote%20outposts%20as%20Beijing%20sends%20ships.pdf"}, {"id": "scmp-13", "title": "US, Pakistan announce peace deal with Iran is 'complete'", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Trump and Pakistani Prime Minister Shehbaz Sharif announced on Sunday that a landmark agreement with Iran had been reached to reopen the Strait of Hormuz and end the US naval blockade. “The Deal with the Islamic Republic of Iran is now complete,” Trump posted, authorising the “toll free opening of the Strait of Hormuz” and immediate removal of the blockade, declaring “let the oil flow.” Minutes later, however, he said the strait would open only after Iran took steps to dismantle its nuclear programme. The deal establishes a 60-day window to wind down Iran's nuclear activities.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/US%2C%20Pakistan%20announce%20peace%20deal%20with%20Iran%20is%20%E2%80%98complete%E2%80%99.pdf"}, {"id": "scmp-14", "title": "US-China talks need to be 'institutionalised' to ease tensions in AI era: Haass", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "Veteran US diplomat Richard Haass said Washington and Beijing should hold regular high-level meetings and deepen cooperation on emerging technologies like AI, as transparency is essential to avoid a downturn in relations. Haass, president emeritus of the Council on Foreign Relations, said such meetings should become routine rather than be treated as “news.” He told the Caixin Summit in Hong Kong via video that the relationship “needs to be institutionalised and regularised in its diplomatic interactions.” He argued both sides want to avoid confrontation in the AI era.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/US-China%20talks%20need%20to%20be%20%E2%80%98institutionalised%E2%80%99%20to%20ease%20tensions%20in%20AI%20era%20Haass.pdf"}, {"id": "scmp-15", "title": "What does North Korea get from its blossoming ties with Russia?", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "North Korean leader Kim Jong-un's latest reassurance to Vladimir Putin, sent in a Russia Day message on June 12, suggested Pyongyang-Moscow ties are evolving beyond a transactional relationship into a firm military alliance, observers say. Kim pledged unwavering support for Moscow's policies and vowed North Korea would “always stand together with the Russian Federation.” Coming shortly after Xi Jinping's visit to Pyongyang, the message constitutes strategic hedging as the North seeks to rekindle its “blood alliance” with China. Analysts say the deepening ties yield military and economic benefits for Pyongyang.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/What%20does%20North%20Korea%20get%20from%20its%20blossoming%20ties%20with%20Russia.pdf"}, {"id": "scmp-16", "title": "Why China is attracting wealthy Gulf families in search of education, tech and business", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "Growing interest in China's tech sector is reshaping Gulf travel to the world's second-largest economy, with wealthy families seeking education, technology and business opportunities. One UAE family of four adults, three children and a nanny spent about 300,000 yuan (US$44,228) on a seven-day educational and business tour to China in April, persisting despite Iran-war flight disruptions. Tour operator UFOX Travel said such Gulf clients barely existed a few years ago, reversing the earlier formula of taking Chinese entrepreneurs to Dubai. The trend reflects deepening China-Gulf economic ties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Why%20China%20is%20attracting%20wealthy%20Gulf%20families%20in%20search%20of%20education%2C%20tech%20and%20business.pdf"}, {"id": "scmp-17", "title": "Why gold may rebound 13% this year - and what could hold it back", "source": "SCMP", "date": "15 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Gold prices may rise at least 13% by year-end, reversing recent sell-offs, as central-bank diversification demand stays intact and hopes for a Middle East diplomatic solution ease inflation expectations, some money managers say. State Street Investment Management sees gold reaching US$4,750 to US$5,500 an ounce by end-2026 in its base case, while Germany's DWS forecasts US$5,400 by mid-2027. Spot gold traded at US$4,199.11 on Friday, down more than 20% from its January record. Higher bond yields and heavy AI spending could temper the recovery.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Why%20gold%20may%20rebound%2013%25%20this%20year%20%E2%80%93%20and%20what%20could%20hold%20it%20back.pdf"}]}, "2026-06-16": {"date": "2026-06-16", "dayOfWeek": "Tuesday", "totalArticles": 67, "sourceCounts": {"WSJ": 18, "ST": 13, "BT": 14, "SCMP": 22}, "executiveDigest": "A preliminary US-Iran deal to reopen the Strait of Hormuz sinks oil and steadies markets alongside SpaceX's $2.1 trillion debut, even as commentators warn the fragile accord resolves little and central banks at the BOJ and Fed turn a new page.", "briefingCards": [{"title": "US-Iran Hormuz deal dominates as implementation doubts persist", "body": "A preliminary US-Iran accord, signed electronically by Trump and Vance ahead of a formal Friday ceremony in Switzerland, would reopen the Strait of Hormuz and lift the US naval blockade, sending Brent crude down more than 4% to a three-month low. Yet the document remains unreleased nearly a day on, vessel traffic has \"not changed\" per Argus, and Bloomberg Economics sees a \"very low chance\" the strait reverts to its pre-war state. Commentators across ST, BT and SCMP warn the deal resolves little: Iran's nuclear programme, frozen assets and Israel's stance are unsettled, and Israel's defence minister vowed troops will stay in Lebanon, Gaza and Syria indefinitely. The IEA-dubbed \"largest supply disruption\" in oil history will leave economic scars through year-end even if the strait reopens."}, {"title": "Markets steadied by SpaceX debut as central banks turn the page", "body": "SpaceX's $2.1 trillion IPO debut, powered by roughly $118 million in net retail buying, helped calm one of the year's most volatile weeks, lifting banks, semiconductors and S-Reits, with the STI up 1% to 5,077.29. Central banks pivot this week: the Bank of Japan is set to hike to 1%, its highest since 1995, despite governor Ueda's hospitalization, while Kevin Warsh chairs his first FOMC, where rates are expected unchanged. Credit signals are mixed: US card delinquencies near post-2008 highs look overstated against lower real household debt, while China's May new loans of 520 billion yuan trailed last year amid household deleveraging. Hong Kong braces for a US$274 billion lock-up expiry wave that could pressure stocks."}, {"title": "Middle powers hedge and realign around China, minerals and minilaterals", "body": "Japan and Italy pledged to deepen semiconductor and critical-mineral cooperation to cut over-reliance on China, while G-7 leaders in Evian sought minerals outside the dominant Chinese supplier amid Trump's 100% French-wine tariff threat. Argentina quietly edged back toward Beijing on a US$19 billion currency swap despite US pressure. North Korea leaned into US-China rivalry to justify its \"irreversible\" nuclear status, and Zelensky offered to meet Putin on US soil after the Russian leader snubbed a G7 invitation. Beijing meanwhile shifted Taiwan tactics, swapping fighter-jet incursions for diplomatic isolation, and rejected a Lowy Institute warning of a growing Chinese missile threat to Australia."}, {"title": "Energy and climate: dwindling stockpiles, nuclear revival and carbon friction", "body": "Oil executives including Chevron's Mike Wirth warned that stockpiles drained over 15 weeks behind Hormuz are nearing critical levels, with the US having pulled about 66 million barrels from its Strategic Petroleum Reserve since late March. The IAEA chief flagged weak public understanding of nuclear energy as Southeast Asia revives atomic ambitions, with Vietnam's Russia-backed Ninh Thuan 1 plant due in the early 2030s and Singapore facing a 2027 IAEA assessment. The EU's carbon border tariff is sowing havoc among Chinese steel and metal exporters buried in \"absurd\" compliance paperwork. In Shanxi, a waste-to-sand plant turning coal gangue into aggregates advances China's zero-waste coal goal."}, {"title": "AI frontier: export bans, healthcare models and a brewing labour reckoning", "body": "The Trump administration's ban on foreign use of Anthropic's Fable 5 and Mythos 5 forced the firm to cut off access entirely and rush staff to Washington, as cybersecurity figures warned it took \"the best models away from defenders.\" Nvidia teamed with Abridge on a Nemotron-based clinical AI model, while a US judge dismissed Musk's xAI trade-secret suit against OpenAI. The labour reckoning sharpens: Morgan Stanley found AI drove 8% net UK job losses, software-developer openings are down about 70% from 2022, and banks are scrambling to hire chief AI officers at up to US$3.5 million. China offers relatively cheap AI stocks, achieved mass production of quantum-grade silicon-28, and AI demand triggered an MLCC supply bottleneck."}, {"title": "Singapore and SEA: gold hub ambitions, firm Singdollar, cooling property and jobs", "body": "Singapore pressed its financial-hub agenda as MAS announced gold vaulting for foreign central banks from October atop 2,000-plus tonnes of commercial capacity, with SGX launching OTC gold clearing by end-2026. The Singdollar has stretched further across Asia, with the rupiah down 8% against it in 2026, while S-Reits, aviation and developers led a priced-in market rally on the Iran deal. The property and labour markets cooled: developers sold just 447 new homes in May, a three-month low, and Q1 total employment growth slowed to 9,400 with retrenchments inching up, though MOM said levels stay \"within non-recessionary norms.\" Monday.com named Singapore its second Asia-Pacific HQ, calling SEA its fastest-growing sub-region."}], "keyMetrics": [{"value": "US$2.1T", "label": "SpaceX market cap at debut", "sub": "~US$118m net retail buying; biggest retail IPO in recent history"}, {"value": "1%", "label": "BOJ benchmark rate expected", "sub": "Highest since 1995; first hike since December, Ueda absent"}, {"value": ">4%", "label": "Brent crude drop to 3-month low", "sub": "On preliminary US-Iran Hormuz deal"}, {"value": "447", "label": "New private homes sold in May", "sub": "Three-month low, down from 1,548 in April"}, {"value": "US$274B", "label": "Hong Kong lock-up expiry wave", "sub": "Shares freed over next 12 months; historical median -4% at 3 months"}, {"value": "8%", "label": "Net UK job losses from AI", "sub": "Highest in peer group, twice the international average: Morgan Stanley"}], "articles": [{"id": "wsj-01", "title": "A Place Where Some AI Stocks Are Still Cheap: China", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "With AI mania inflating US and Asian tech valuations, China offers relative bargains, with large AI-investing firms costing less per dollar of revenue or profit than famous peers abroad. UBS's Eva Lee calls it \"an attractive opportunity\" with top AI names at \"historically low valuations.\" Alibaba, which has folded its Qwen model into e-commerce and is pouring $50 billion into cloud infrastructure, trades at a forward P/E of 17 versus a pricier figure for Amazon. Goldman's Alvin So notes China's market only found its footing early last year after DeepSeek proved local firms could compete globally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/A%20Place%20Where%20Some%20AI%20Stocks%20Are%20Still%20Cheap%20China.pdf"}, {"id": "wsj-02", "title": "AI Can Do Math, but Is It Really Math?", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "An OpenAI model disproved a long-standing Erdos conjecture on the unit-distance problem, finding point arrangements that repeatedly beat his supposed ceiling even as dot counts grow arbitrarily large. The solution surprisingly drew on algebraic number theory to crack a discrete-geometry problem. The breakthrough raises the question of whether machine-generated proofs nobody fully understands are really proofs. The author argues the field will need new human infrastructure to choose problems, check machine proofs and make them intelligible.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/16%20Jun%202026/16%20Jun%20WSJ/AI%20Can%20Do%20Math%2C%20but%20Is%20It%20Really%20Math.pdf"}, {"id": "wsj-03", "title": "America Downs Cheap Drones With Million-Dollar Missiles. A Fix Is In the Works.", "source": "WSJ", "date": "16 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "The US is shooting down cheap Iranian drones with interceptors that can cost upward of a million dollars, and startups plus big contractors are racing to build far cheaper alternatives. Former NASA engineer Jason Cornelius's Perseus Defense aims to make a missile in Texas costing $10,000, a stripped-down take on the AIM-9 Sidewinder.
