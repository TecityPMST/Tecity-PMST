d at a routine immigration hearing on Jan 2, was flown to Honduras and spent 118 days there before a court order let him return; his son was born in Texas without him. DACA is estimated to protect around 500,000 \"dreamers,\" but the administration has arrested at least 343 and deported at least 86, according to NGO Home is Here citing a Homeland Security letter to Congress. Another case involves Maria de Jesus Estrada, 42, who came aged 15, lived in California, and was arrested by six agents and deported to Mexico. Advocates call the removals unlawful and inhumane.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Protected%20but%20deported%20anyway,%20as%20Trump%20goes%20after%20'dreamers'.pdf"}, {"id": "st-09", "title": "Sheng Siong builds new $520m facility to support up to 120 stores", "source": "ST", "date": "14 Jul 2026", "tags": ["Trade", "Society"], "summary": "Supermarket chain Sheng Siong broke ground on July 13 on a $520 million Integrated Headquarters and Distribution Centre in Sungei Kadut, its largest investment to date. The seven-storey, 61,000 sq m building, about 2.5 times its existing Mandai Link centre, is due for completion in 2029 and can support more than 120 stores; Sheng Siong currently has 90. Deputy Prime Minister Gan Kim Yong, also Trade and Industry Minister, said geopolitical tensions, climate change and supply-chain disruptions have made food prices volatile, leaving import-reliant Singapore exposed. The JTC- and Enterprise Singapore-supported facility will feature automated storage, robotics and multi-temperature zones, freeing and reskilling staff. CEO Lim Hock Chee said the chain must build foundations to serve customers, suppliers and workers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Sheng%20Siong%20builds%20new%20520m%20facility%20to%20support%20up%20to%20120%20stores.pdf"}, {"id": "st-10", "title": "Singapore investors leverage AI for research but rely on human advisers to decide: HSBC study", "source": "ST", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Singapore's mass affluent and high-net-worth investors are adopting AI for finance faster than global peers but still lean on human advisers, an HSBC study found. A survey of over 600 Singapore investors, conducted by Ipsos in January and February, showed 76 per cent use AI tools for research versus a 72 per cent global average. Yet 79 per cent still turn to advisers for reassurance, and only 8 per cent called AI their most influential factor, below the 12 per cent global figure. Some 57 per cent favour combining AI with human advice. Adoption cuts across generations, reaching 90 per cent among those with US$2 million-plus in assets, who attribute 40 per cent of returns to AI. HSBC is expanding \"adviser-enabled AI.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Singapore%20investors%20leverage%20AI%20for%20research%20but%20rely%20on%20human%20advisers%20to%20decide%20HSBC%20study.pdf"}, {"id": "st-11", "title": "Singapore, Malaysia have made consistent choice to look to the future, build together: Tharman", "source": "ST", "date": "14 Jul 2026", "tags": ["Politics", "Southeast Asia"], "summary": "Singapore and Malaysia have consistently chosen, across every generation of leadership, to look to the future and build together, President Tharman Shanmugaratnam said during a call on Malaysia's King, Sultan Ibrahim Iskandar, at Istana Negara in Kuala Lumpur on July 13. He said the relationship has \"a quality that goes well beyond the here and now,\" noting the countries' shared history of the 1963 merger and 1965 separation. Tharman cited the Johor-Singapore Special Economic Zone and the upcoming Johor Bahru-Singapore RTS Link as examples of shared ambition, saying the RTS will boost tourism, healthcare and education exchanges. On day two of his four-day state visit, he received a state welcome, a banquet, and a call by Prime Minister Anwar Ibrahim.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Singapore,%20Malaysia%20have%20made%20consistent%20choice%20to%20look%20to%20the%20future,%20build%20together%20Tharman.pdf"}, {"id": "st-12", "title": "Strong Singapore dollar impacts businesses unevenly", "source": "ST", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Singapore's strong currency is affecting local businesses unevenly, hitting consumer-facing firms harder than manufacturers, who report little operational impact. The Singdollar stayed firm after MAS tightened policy in April, allowing faster appreciation; economists expect no change at the July meeting. While a stronger currency buffers against imported inflation, it dampens export and lifestyle revenues and shifts spending abroad. ASME president Ang Yuit said it erodes price competitiveness and pushes Singaporeans to spend overseas, especially during school holidays. A Thai restaurant manager noted more diners heading to cheaper Johor Bahru, while a Chinatown seafood restaurant reported footfall down about 10 per cent. But Bhavani Stores' Sreenivas Saba said cheaper imports from India are prompting his firm to bring in more Indian brands.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Strong%20Singapore%20dollar%20impacts%20businesses%20unevenly.pdf"}, {"id": "st-13", "title": "The panic over birth rates has a blind spot", "source": "ST", "date": "14 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "This commentary argues that falling birth rates need not mean permanently lower growth or eroding living standards. Fertility is dropping sharply, especially in Asia, with record lows in Japan and Singapore, plummeting births in Taiwan, and China's steepest population drop since the 1960 famine. Incentives have largely failed. But a paper by academics including Nobel laureate Daron Acemoglu and David Autor found output per employee rose between 1970 and 2020, challenging prevailing pessimism. Their model holds that labour scarcity spurs quick adoption of labour-saving technology, boosting GDP per worker; a one percentage-point birth-rate drop is linked to around 27 per cent higher worker output. Prime Minister Lawrence Wong urged humility, saying no one has the answers. The objective should be better lives for existing families.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/The%20panic%20over%20birth%20rates%20has%20a%20blind%20spot.pdf"}, {"id": "st-14", "title": "US Senator Lindsey Graham's death sets up succession drama in South Carolina", "source": "ST", "date": "14 Jul 2026", "tags": ["Politics"], "summary": "The sudden death of US Senator Lindsey Graham of South Carolina sets up a succession scramble in the deeply conservative state, less than four months before the mid-term elections. Graham died on July 11 after a \"brief and sudden illness,\" two days after turning 71, having been set to face Democrat Annie Andrews. Republican Governor Henry McMaster can name a replacement, followed by a special primary that could aid Andrews. President Trump said he has a candidate in mind but declined to name anyone. Representative Joe Wilson ruled himself out to protect the House majority, though he reportedly remains interested. Graham's death, alongside Mitch McConnell's hospitalisation, narrows the GOP majority. Nancy Mace and Ralph Norman may also vie for the seat.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/US%20Senator%20Lindsey%20Graham's%20death%20sets%20up%20succession%20drama%20in%20South%20Carolina.pdf"}, {"id": "st-15", "title": "Ukraine and allies set up coalition to tackle Russia ballistic missile threat", "source": "ST", "date": "14 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Ukraine and key Western allies on July 13 announced an air-defence coalition to jointly develop a new anti-ballistic missile system as a cheaper alternative to the US Patriot. Ten countries and about a dozen defence firms met in Paris for the Integrated Anti-Ballistic Missile Coalition, with Denmark, France, Germany, Italy, Netherlands, Norway, Spain, Sweden, Ukraine and Britain saying Europe's protection requires \"integrated missile defence architecture.\" Ukraine is critically low on munitions and largely unable to down fast ballistic missiles. Efforts will centre on the Freyja project, a European-backed, lower-cost Patriot alternative. President Zelensky, joining a broader Coalition of the Willing summit of 25 leaders, said more means to shoot down missiles raise the chance Putin negotiates. Russia has intensified deadly strikes on Kyiv.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Ukraine%20and%20allies%20set%20up%20coalition%20to%20tackle%20Russia%20ballistic%20missile%20threat.pdf"}, {"id": "st-16", "title": "Welcome to Hsinchu, the luxury city built by Taiwan's AI boom", "source": "ST", "date": "14 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Hsinchu, once farmland, has become Taiwan's luxury city built on the AI chip boom, home to TSMC and its Hsinchu Science Park. Rice fields gave way to luxury high-rises, plastic surgery clinics and upscale restaurants serving tech workers flush with AI riches, with high-speed rail carrying 80 million people yearly. In the Zhubei area, real estate has skyrocketed amid years-long apartment waiting lists. One neighbourhood reported average household incomes exceeding US$146,000 in 2023, roughly five times Taiwan's average. Even as East Asia faces population decline, so many children are born that schools cannot keep up. Hsinchu now has over one million people, but semiconductor wealth has not lifted other industries' wages, masking a widening divide between chip-linked residents and everyone else.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Welcome%20to%20Hsinchu,%20the%20luxury%20city%20built%20by%20Taiwan's%20AI%20boom.pdf"}, {"id": "st-17", "title": "When online outrage gets in the way of Beijing's diplomatic outreach", "source": "ST", "date": "14 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "The Chinese Embassy in India unusually reproduced a state-backed commentary urging netizens to approach India \"rationally,\" after xenophobic videos portraying Indians as uncivilised swept the Chinese internet, alongside false clips claiming Singapore had been overrun by Indians. Some netizens branded Ambassador Xu Feihong a traitor over visa issues. The commentary from The Paper called the \"patriotic pronouncements\" clickbait masquerading as patriotism. The intervention highlights a dilemma: after years of encouraging patriotic content, Beijing finds nationalist outrage undermining its diplomacy, as it seeks to repair ties with India following the deadly 2020 border clash. Progress includes restored direct flights, the resumed Kailash Mansarovar pilgrimage, and India letting four Chinese-owned manufacturers bid for certain power projects. Recommendation algorithms and commercial incentives fuel the content.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/When%20online%20outrage%20gets%20in%20the%20way%20of%20Beijing's%20diplomatic%20outreach.pdf"}, {"id": "st-18", "title": "Who should own AI? The case against - and for - nationalisation", "source": "ST", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "This commentary responds to a proposal by DBS chief economist Taimur Baig and former IMF economist Anthony Annett to nationalise parts of the AI industry, like nuclear weapons and central banks. The writer argues the real question is what to nationalise and how much, since AI spans foundational models, chip fabrication, data centres and start-ups. He acknowledges legitimate concerns: safety, given AI's potential to disrupt financial systems, spread disinformation or design pathogens; and power concentration among firms like OpenAI, Anthropic and Google that could translate economic dominance into political power. A fairness argument notes AI builds on publicly funded research and collective data, suggesting a capital dividend. But the writer contends the nuclear analogy fails, since AI is not a physical substance that can be fenced or inspected.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Who%20should%20own%20AI%20The%20case%20against%20-%20and%20for%20-%20nationalisation.pdf"}]}, "2026-07-15": {"date": "2026-07-15", "dayOfWeek": "Wednesday", "totalArticles": 62, "sourceCounts": {"WSJ": 12, "ST": 13, "BT": 18, "SCMP": 19}, "executiveDigest": "Trump reimposed the US naval blockade of Iran but scrapped his proposed Strait of Hormuz toll, and with the ceasefire 'technically dead' analysts warn Gulf danger is worse than before; gold fell and US inflation cooled on the brief truce though the Fed kept a hike open, while Singapore's Q2 growth slowed to 5.7% and the AI-bubble debate intensified as SoftBank's chief pegged AI's needs at US$6.5 trillion a year by 2040.", "briefingCards": [{"title": "Lead story - Iran blockade back, Hormuz toll dropped", "body": "Trump said he is reimposing the US naval blockade of Iran but scrapped his proposed Strait of Hormuz transit toll, which experts had warned could double shipping costs. With the ceasefire 'technically dead', analysts caution the danger in the Gulf over coming weeks is worse than before, as a wave of Iranian nationalism drowns out Tehran's diplomats. Markets were mixed: gold fell after the US and Iran traded fresh attacks, and the UAE's crude output surged in June after it exited OPEC. Frequent draws from the US Strategic Petroleum Reserve are pushing the ageing system to a breaking point."}, {"title": "Markets & finance", "body": "US inflation cooled on the brief ceasefire, but the Fed kept a rate-hike option open. Banks named AI-driven earnings growth and rising gold prices as their top themes for the second half, even as WSJ cautioned the S&P 500 is not as cheap as it looks. The AI-bubble debate sharpened: SoftBank's CEO said AI will need US$6.5 trillion a year by 2040 while dismissing bubble talk, Meta lifted the cost of its Louisiana data centre to US$50 billion, and the BIS warned the AI investment race could turn a debt-fuelled boom to bust. JPMorgan expects the industry to manage AI spend with more 'discipline'."}, {"title": "Asia realignment", "body": "China's second-quarter GDP growth missed - its weakest since end-2022 - as exports rode the AI boom while domestic demand struggled, prompting a first five-year consumption plan targeting US$9 trillion in annual retail sales by 2030. Beijing kept adding to its US Treasury holdings despite diversification talk, and its power exports to Asean surged 40% amid Hormuz tensions. The EU signalled emergency import curbs after a dramatic widening of its China trade gap, Taiwan's opposition TPP made a historic first trip to the mainland, and Marco Rubio defended dismantling the International Criminal Court."}, {"title": "Energy & climate", "body": "The UAE's crude surged after it left OPEC, and China's electricity exports to Asean jumped 40% in the first half as Hormuz tensions reshaped flows. China issued a plan to revitalise and potentially commercialise uninhabited islands, and its top lithium firms projected up to a 50-fold profit surge on the energy-transition boom. WSJ flagged a new foe for AI data centres - farmers - amid water and land strain, while Hong Kong pushed to integrate global carbon markets even as Singapore's ESG loan proceeds fell 41.2% in 2025."}, {"title": "Technology & AI", "body": "Signs of both frenzy and discipline: China's StepFun claimed the world's first 'AI smartphone', Alibaba teamed with Honor on agentic AI devices, and a Cambridge study found Boko Haram exploited US and Chinese AI chatbots for attacks - as ST reported AI now carries out cyberattacks with little human input. On chips, Nvidia halved its Asia buyer list in a China crackdown and the US called its H200 exports to China 'trivial' despite approvals. Lawmakers were warned the US must act quickly to counter China's tech progress, while ST argued 'US panic is missing the point on Chinese AI'."}, {"title": "Singapore & SEA focus", "body": "Singapore's Q2 economic growth slowed to 5.7%, still resilient - though BT warned that 'doing better than expected has its own dangers'. The MAS listing grant has backed 85 SGX debuts since 2019 as the equity-market revival gathers pace, while Singapore's ESG loan proceeds fell 41.2% in 2025. Singapore and Malaysia's heads of state encouraged deeper cooperation, a Singapore-Indonesia defence alumni network was launched, and JPMorgan - eyeing Singapore tech talent - expects more disciplined AI spending. South Korea forecast its strongest growth in five years on the AI-chip boom."}], "keyMetrics": [{"value": "62", "label": "Articles curated today", "sub": "WSJ 12 · ST 13 · BT 18 · SCMP 19"}, {"value": "5.7%", "label": "Singapore Q2 GDP", "sub": "Growth slows but stays resilient"}, {"value": "Blockade on", "label": "Iran; Hormuz toll off", "sub": "Gulf danger seen worse"}, {"value": "US$6.5t/yr", "label": "SoftBank's AI bill", "sub": "By 2040; 'no bubble'"}, {"value": "Miss", "label": "China Q2 GDP", "sub": "Weakest since end-2022"}, {"value": "85 debuts", "label": "MAS listing grant", "sub": "SGX revival since 2019"}], "articles": [{"id": "wsj-01", "title": "A New Foe Has Emerged for Data Centers: Farmers", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Technology & AI", "Environment", "Society"], "summary": "U.S. farmers and ranchers are raising alarms that the AI-driven data-center boom is draining farmland, water and electricity. Near Clint McRae's Montana ranch, NorthWestern Energy bought roughly 6,000 acres of grazing land. Roughly 5,000 data centers are finished or under construction nationally, per the American Farm Bureau Federation, with lawmakers in about two dozen states weighing restrictions. Illinois Farm Bureau president Philip Nelson warns idled centers could strand prime farmland if AI crashes. The Data Center Coalition's Dan Diorio counters that facilities use hybrid cooling, running air-based systems 90% of the year, and that Indiana and Georgia utilities cut rates on data-center revenue. Farming acreage fell by roughly Maine's size between 2017 and 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/A%20New%20Foe%20Has%20Emerged%20for%20Data%20Centers%20Farmers.pdf"}, {"id": "wsj-02", "title": "A Wave of Iranian Nationalism Is Drowning Out Its Diplomats", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "A surge of nationalist fervor in Iran is hampering diplomats and blocking implementation of the preliminary deal Trump signed nearly a month ago to reopen the Strait of Hormuz. Iran pledged to open the strait within 30 days but has repeatedly fired on ships, and the Revolutionary Guard declared Hormuz closed, sabotaging weekend talks mediated by Qatar. At supreme leader Khamenei's funeral, crowds unfurled \"kill Trump\" banners and heckled President Pezeshkian and Foreign Minister Araghchi. Hamshahri ran wanted-poster images of Trump, Rubio, Hegseth and Netanyahu. Analysts say the IRGC stokes patriotism to retain leverage; polls previously showed under 20% backed clerical rule, but war has broadened the regime's social base.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/A%20Wave%20of%20Iranian%20Nationalism%20Is%20Drowning%20Out%20Its%20Diplomats.pdf"}, {"id": "wsj-03", "title": "Frequent Oil Draws From U.S. Strategic Reserve Push Old System to Breaking Point", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Frequent drawdowns are straining the U.S. Strategic Petroleum Reserve. Over four years the Biden and Trump administrations released 352 million barrels, nearly half capacity. The 60 Gulf Coast salt caverns cannot draw or refill at designed rates, and the reserve has seen 16 major equipment failures since 2013, including a May 2024 Texas well rupture that lost up to 400,000 barrels. Stocks have fallen to their lowest since 1983. Trump's March-authorized 172 million-barrel release, structured as an exchange returning an extra 35 million barrels, helped cap crude futures at $112.95 amid the Iran war; prices now hover near $74. GAO says officials are holding the reserve together with \"Band-Aids.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Frequent%20Oil%20Draws%20From%20U.S.%20Strategic%20Reserve%20Push%20Old%20System%20to%20Breaking%20Point.pdf"}, {"id": "wsj-04", "title": "Gold Prices Fall After U.S. and Iran Trade Attacks", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Gold fell 2.6% Monday to $3,997 a troy ounce after the U.S. and Iran traded fresh attacks, leaving it about 25% below January's $5,318 record. The GLD ETF is down roughly 26%; silver has tumbled 50% from its $115 peak. Investors fear the Iran war could lift energy prices and inflation, keeping the Fed from cutting rates and raising the opportunity cost of holding non-yielding gold. Inflation hit a three-year high of 4.2% in May. Brent crude jumped nearly 10% Monday to $83.30, its biggest single-day gain since May 2020, and the Nasdaq fell about 1.6%. State Street's Aakash Doshi called the ceasefire break \"day-to-day noise.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Gold%20Prices%20Fall%20After%20U.S.%20and%20Iran%20Trade%20Attacks.pdf"}, {"id": "wsj-05", "title": "How $9.99 Became the Most Compelling Price in Retail", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "Makers of everyday goods are fixated on the $9.99 threshold, a psychological line shoppers resist crossing. Higher fuel costs, tariffs and other pressures make holding under $10 harder, forcing firms to cut packaging and margins. Hasbro CEO Chris Cocks calls it a \"snackable\" price; the company now sells Connect 4 in a sleeve and its World Cup Monopoly Deal with no packaging. Boston Beer switched Twisted Tea to a four-pack; Walmart cut 24-pack Coke and Pepsi below $10. Amazon charges 8% referral fees on sub-$10 baby, beauty and health items versus up to 15% above. Columbia's Vicki Morwitz notes consumers categorize prices into ranges. Clean Cult held prices seven years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/How%20%249.99%20Became%20the%20Most%20Compelling%20Price%20in%20Retail.pdf"}, {"id": "wsj-06", "title": "Intel to Invest €5 Billion for Expanded Manufacturing in Ireland", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Intel said it plans to invest €5 billion ($5.71 billion) to expand its Leixlip campus west of Dublin, boosting output of AI and high-performance chips using existing cleanroom capacity. The program, begun earlier this year, will strengthen Europe's semiconductor supply chain and lift production of Xeon 6 and next-generation Xeon processors on Intel 3 technology, CTO Naga Chandrasekaran said. In April Intel agreed to pay $14.2 billion for Apollo's 49% stake in the Fab 34 joint venture. Once the leading chip maker, Intel fell behind TSMC and Samsung. After CEO Lip-Bu Tan won over Trump, the government took a 10% stake; Apple will use some Intel chips. Shares fell 4.8% Monday.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Intel%20to%20Invest%20%E2%82%AC5%20Billion%20for%20Expanded%20Manufacturing%20in%20Ireland.pdf"}, {"id": "wsj-07", "title": "Marco Rubio: Why We're Dismantling the International Criminal Court", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "In an op-ed, Secretary of State Marco Rubio argues the U.S. will \"dismantle\" the International Criminal Court, calling it an unaccountable body seeking to prosecute American soldiers, agents and leaders under laws Americans never ratified. He notes President Clinton refused to submit the Rome Statute to the Senate, and a bipartisan supermajority passed the American Servicemembers' Protection Act authorizing force to prevent detentions. Rubio cites the ICC's 2020 Afghanistan war-crimes probe, chief prosecutor Fatou Bensouda, and calls to investigate Trump's strikes on narcoterrorists and El Salvador deportations. After Trump sanctioned ICC personnel, activists urged his arrest across 125 member states. Rubio pledges a diplomatic campaign favoring sovereignty over globalism, dismantling the court \"brick by brick.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Marco%20Rubio%20Why%20We%E2%80%99re%20Dismantling%20the%20International%20Criminal%20Court.pdf"}, {"id": "wsj-08", "title": "Meta Lifts Cost of Louisiana Data Center to $50 Billion", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Technology & AI", "Energy"], "summary": "Meta Platforms has scaled up its Northeast Louisiana data center to 5 gigawatts of compute capacity and now expects it to cost more than $50 billion, up from an original $27 billion, making it the company's largest facility and one of the world's biggest AI-infrastructure investments. Located in rural Richland Parish, the project counts Blue Owl Capital as a major stakeholder alongside BlackRock. Meta agreed to pay energy, water and infrastructure costs and struck a deal with Entergy Louisiana. Increased tax revenue has funded teacher bonuses of up to about $50,000, sometimes exceeding salaries. The buildout proceeds amid growing public opposition to data centers over affordability, taxed grids and surging electricity prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Meta%20Lifts%20Cost%20of%20Louisiana%20Data%20Center%20to%20%2450%20Billion.pdf"}, {"id": "wsj-09", "title": "Russian Cyberattacks Stretching Back 15 Years Prompt European Sanctions", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Geopolitics", "Defence", "Technology & AI"], "summary": "European authorities sanctioned Russian intelligence units and hackers Monday over a 15-year campaign targeting governments and critical infrastructure. The EU and U.K. highlighted the 16th Center of Russia's FSB, blaming it for a failed attack on Poland's power grid. U.K. Foreign Secretary Yvette Cooper said Russia is \"sinking to new lows.\" The U.K. sanctioned 24 individuals and entities, including GRU officials and media company Rybar accused of election interference in Moldova and Armenia, plus operators of Lumma Stealer malware. Three GRU unit 29155 officers linked to the Skripal poisoning were named. France said it faced attacks since 2017. The move coincided with a \"coalition of the willing\" meeting with Zelensky in Paris.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Russian%20Cyberattacks%20Stretching%20Back%2015%20Years%20Prompt%20European%20Sanctions.pdf"}, {"id": "wsj-10", "title": "Think the S&P 500 Looks Cheap? Read the Fine Print", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Finance & Markets"], "summary": "Wall Street's rosy S&P 500 earnings forecasts rest on distorted numbers, complicating valuation. Using actual net income for the past four quarters, the index trades near 29 times earnings; using analysts' 2026 estimates it looks cheaper at about 22 times, but those adjustments ignore real costs like stock-based pay and restructuring. FactSet showed nearly $275 a share for 2025 rising 24% to about $341 for 2026, blending GAAP and non-GAAP figures. S&P Global and Bloomberg peg 2025 GAAP EPS near $241, growing in the low teens. Bloomberg's 2026 GAAP estimate of about $323 implies an implausible 34% growth, suggesting inconsistent methodologies leave investors unable to agree what the \"E\" means.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Think%20the%20S&P%20500%20Looks%20Cheap%20Read%20the%20Fine%20Print.pdf"}, {"id": "wsj-11", "title": "Trump Says He Is Reimposing the U.S. Blockade of Iran", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "President Trump said Monday he is reimposing the U.S. blockade on Iranian shipping, escalating the standoff over the Strait of Hormuz, with Central Command resuming the port blockade at 4 p.m. ET Tuesday. He threatened strikes on Pickaxe Mountain near Natanz and said the U.S. would charge 20% of every cargo shipment, contradicting officials including Rubio who called tolls on an international waterway illegal. Iran's armed forces vowed to block U.S. interference. Kpler said weekend Hormuz traffic fell by more than half to 19 ships a day. Iran rejected an Omani compromise and struck Oman's Duqm and a Musandam base, plus sites in Kuwait, Bahrain and Qatar. Roughly 20% of global oil transits the strait.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/Trump%20Says%20He%20Is%20Reimposing%20the%20U.S.%20Blockade%20of%20Iran.pdf"}, {"id": "wsj-12", "title": "U.A.E. Crude Output Surged in June After OPEC Exit", "source": "WSJ", "date": "15 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "The United Arab Emirates boosted crude output 80% in June to 3.81 million barrels a day, up 1.64 million from May, after quitting OPEC to escape quotas, OPEC data showed. Abu Dhabi formally exited the cartel in early May, gaining flexibility to expand production and cut reliance on Hormuz. The IEA said U.A.E. output hit a record 4.1 million barrels a day in June and could reach 5.2 million by 2027. OPEC lowered its 2026 global demand-growth forecast to 780,000 barrels a day from 970,000; the IEA sees demand falling 1 million and the EIA 1.2 million barrels daily. OPEC+ output rose to 36.28 million barrels a day. Brent traded above $78 Monday.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20WSJ/U.A.E.%20Crude%20Output%20Surged%20in%20June%20After%20OPEC%20Exit.pdf"}, {"id": "st-01", "title": "AI and the new Mechanical Turk", "source": "ST", "date": "15 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "An FT columnist traces the \"Mechanical Turk\" from an 18th-century chess automaton hiding a human to Amazon Mechanical Turk, whose crowd-work platform closes to new customers on July 30, 2026. Large language models now handle many simple tasks once done by low-paid \"crowd workers.\" Demand for human AI trainers is shifting to physical settings, where Indian factory workers wear head cameras, and to specialist \"journalism\" and \"finance evaluators\" paid US$80 to US$120 hourly. Workers increasingly use AI themselves, prompting platforms like Prolific to detect agents masquerading as humans. Researchers now explore \"synthetic sampling,\" surveying LLMs role-playing demographics instead of real people. The era of humans pretending to be machines is over; machines pretending to be humans has begun.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/AI%20and%20the%20new%20Mechanical%20Turk.pdf"}, {"id": "st-02", "title": "AI now carries out cyberattacks with little human input: Report", "source": "ST", "date": "15 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "A 56-page Check Point Research report released July 14 says AI automated significant parts of cyber intrusions over the past year, touching social engineering, malware, live intrusion and vulnerability research. Researchers recorded AI autonomously executing attacks, including one on nine Mexican government agencies where a lone operator used Anthropic's Claude Code and OpenAI's GPT-4.1 to breach 400 million records. Separately, a Chinese-linked group automated up to 90 per cent of a campaign hitting 30 organisations. \"AI now does in minutes what used to take a skilled attacker hours,\" said Check Point's Lotem Finkelstein. The report warns generative AI is now common at work; high-risk prompts sharing confidential data doubled from 2 to 4 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/AI%20now%20carries%20out%20cyberattacks%20with%20little%20human%20input%20Report.pdf"}, {"id": "st-03", "title": "AI-driven earnings growth, rising gold prices: Banks' top market themes for second half of 2026", "source": "ST", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "At recent market-outlook briefings, banks named AI-driven earnings and rising gold as top themes for second-half 2026. Standard Chartered favours US and Asia ex-Japan equities, liking Taiwan semiconductors, China tech and India, but is bearish on ASEAN. DBS and OCBC flagged AI's capital-intensive nature and questioned monetisation, with DBS favouring semiconductor, network and oil-services suppliers. On gold, StanChart called it its \"preferred diversifier,\" citing emerging-market central bank buying; Poland added 18 tonnes in May and China 10 tonnes. StanChart cut targets to US$4,750 and US$5,100 per ounce, while OCBC sees US$4,180 in Q3. Gold has fallen over 20 per cent from January's US$5,600 peak. DBS expects it to regain safe-haven appeal longer term.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/AI-driven%20earnings%20growth,%20rising%20gold%20prices%20Banks'%20top%20market%20themes%20for%20second%20half%20of%202026.pdf"}, {"id": "st-04", "title": "China exports ride AI boom as domestic economy struggles", "source": "ST", "date": "15 Jul 2026", "tags": ["Trade", "Technology & AI"], "summary": "China's exports jumped 27 per cent year on year in June, their best in four months, driven by chip and computing-power orders feeding the global AI boom, Customs data showed July 14. Imports surged 36 per cent, a five-year high, lifted partly by semiconductor prices; purchases from South Korea rose 85 per cent. The trade surplus hit US$125.6 billion, keeping China on track for a second straight year above US$1 trillion. But domestic demand stays weak amid a property crisis, with retail sales flat and fixed-asset investment negative. Exports now equal 24 per cent of manufacturing sales, the highest since WTO entry in 2001. Economists expect Q2 GDP growth cooling to about 4.5 per cent, data due July 15.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/China%20exports%20ride%20AI%20boom%20as%20domestic%20economy%20struggles.pdf"}, {"id": "st-05", "title": "Singapore's Q2 economic growth slows to 5.7%", "source": "ST", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's economy grew 5.7 per cent year on year in Q2 2026, slowing from 6.3 per cent, as construction and wholesale trade eased, MTI said. Quarter-on-quarter growth was 1.1 per cent. Manufacturing bucked the trend, expanding 12.2 per cent on strong AI-related semiconductor demand, though chemicals and biomedical clusters contracted amid Middle East feedstock disruptions. Non-oil domestic exports rose 38.4 per cent in May. The renewed US-Iran conflict shattered the mid-June ceasefire, pushing oil back above US$80 and lifting Singapore electricity tariffs, while Trump plans a 20 per cent Hormuz reimbursement fee. Oxford Economics forecasts 3.4 per cent full-year growth, near MTI's 2 to 4 per cent range, while RHB warned an AI-market correction poses downside risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/Singapore's%20Q2%20economic%20growth%20slows%20to%205.7.pdf"}, {"id": "st-06", "title": "Singapore, Malaysia heads of state encourage deeper cooperation between the two countries", "source": "ST", "date": "15 Jul 2026", "tags": ["Southeast Asia", "Politics"], "summary": "On July 13, President Tharman Shanmugaratnam and Malaysia's King, Sultan Ibrahim Iskandar, encouraged deeper Singapore-Malaysia cooperation in renewable energy, sustainable development and people-to-people ties, Singapore's MFA said. During Tharman's four-day state visit, his first across the Causeway since becoming head of state in 2023, both welcomed progress on supply-chain resilience, connectivity and joint projects like the Johor Bahru-Singapore RTS Link and the Johor-Singapore Special Economic Zone. Prime Minister Anwar Ibrahim also called on Tharman, discussing the Middle East and reaffirming food and energy cooperation plus the UN Convention on the Law of the Sea. Tharman visited Selangor, met its Sultan and Menteri Besar, and addressed business leaders on navigating a post-unipolar world and deepening ASEAN integration.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/Singapore,%20Malaysia%20heads%20of%20state%20encourage%20deeper%20cooperation%20between%20the%20two%20countries.pdf"}, {"id": "st-07", "title": "Singapore-Indonesia defence alumni network launched", "source": "ST", "date": "15 Jul 2026", "tags": ["Defence", "Southeast Asia"], "summary": "Singapore and Indonesia launched a defence alumni network on July 14, deepening decades-old military ties. Defence Minister Chan Chun Sing and Indonesian counterpart Sjafrie Sjamsoeddin jointly launched the Indonesia-Singapore Defence Alumni Initiative, or PERSAHAN, in Jakarta, connecting SAF and TNI officers who trained together. Chan, a former army chief, recalled friendships from his time as army attache. Co-presidents are Singapore's Chief of Defence Force Vice-Admiral Aaron Beng and Indonesia's Armed Forces Commander General Agus Subiyanto. Chan cited joint projects including the Siabu Air Weapons Range and training facilities in Baturaja and West Kalimantan, echoing the July 6 leaders' retreat between PM Wong and President Prabowo. The neighbours have held joint naval exercises since 1974. Chan visits July 14 to 15.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/Singapore-Indonesia%20defence%20alumni%20network%20launched.pdf"}, {"id": "st-08", "title": "SoftBank CEO says AI will need $6.5 trillion per year by 2040, dismisses bubble talk", "source": "ST", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SoftBank chief executive Masayoshi Son said on July 14 that developing AI will require US$5 trillion (S$6.5 trillion) of investment annually by 2040, dismissing bubble talk as \"absurd.\" At SoftBank's Tokyo conference, Son argued the spending equals a \"rounding error\" if AI generates 20 per cent of global GDP, though he did not explain his figures. SoftBank has poured tens of billions into OpenAI, data centres and robotics; its OpenAI stake should exceed US$60 billion by end-2026. Son predicted AI data centres will need three terawatts of power by 2040, 1.8 times current global consumption, initially from gas, later nuclear fusion. He envisioned 100 trillion AI agents by 2040, ending humanity's reign as \"the highest life form.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/SoftBank%20CEO%20says%20AI%20will%20need%206.5%20trillion%20per%20year%20by%202040,%20dismisses%20bubble%20talk.pdf"}, {"id": "st-09", "title": "The world's superpowers are scrambling for an edge. It makes all of us less safe", "source": "ST", "date": "15 Jul 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "In a New York Times essay, IMF economic counsellor Pierre-Olivier Gourinchas warns that geopolitical and geoeconomic fragmentation risks ushering in a \"new age of war\" defined by economic coercion and insecurity. Decades of US-centred integration lifted trade toward US$35 trillion annually and cut extreme poverty from 43 per cent in 1990 to 10 per cent, but interdependence created choke points, as Iran recently exploited. He likens today to the pre-1914 era that preceded deglobalisation and two world wars. Though markets absorbed the Iran shock, he cautions against mistaking resilience for invulnerability. Gourinchas urges cooperation clusters, stronger social protection and sparing use of sanctions and tariffs, arguing coordination on AI, climate and finance must deepen. A new age of war is possible but not inevitable.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/The%20world's%20superpowers%20are%20scrambling%20for%20an%20edge.%20It%20makes%20all%20of%20us%20less%20safe.pdf"}, {"id": "st-10", "title": "Trump's Strait of Hormuz fee could double the cost of shipping: Experts", "source": "ST", "date": "15 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Shipping and logistics experts warn President Trump's proposed 20 per cent fee on cargo through the Strait of Hormuz could more than double oil-shipping costs. Announced July 13 to recoup US military protection costs, the levy drew scepticism it would materialise. ING's Rico Luman estimated it could add US$16 to the roughly US$10-per-barrel Gulf-to-Europe tanker charge, taking transport to US$26 a barrel; a two-million-barrel tanker could face over US$30 million in fees. A voluntary Strait of Malacca fee runs below 0.5 per cent of cargo value. The US and Iran are battling for control of the waterway carrying a fifth of world oil. Iran's Abbas Araghchi called 20 per cent \"too much\" but promised to \"be fair.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/Trump's%20Strait%20of%20Hormuz%20fee%20could%20double%20the%20cost%20of%20shipping%20Experts.pdf"}, {"id": "st-11", "title": "US panic is missing the point on Chinese AI", "source": "ST", "date": "15 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "A Bloomberg columnist argues US alarm over rising American use of Chinese AI models misses the point. The flashpoint is \"distillation,\" training one model on another's outputs, which US labs are rebranding from \"knowledge distillation\" to \"knowledge theft.\" Elon Musk called the technique \"standard practice.\" Anthropic's Claude Code, barred in China, reaches users via grey-market \"transfer stations\"; Anthropic recently rolled back hidden location-tracking code after criticism. Both Washington and Beijing are reportedly weighing restrictions on model access, but the author says clampdowns would hurt US developers most. Rather than banning Chinese offerings, she urges investment in open-weight projects, public compute and university partnerships, plus moats like institutional trust, warning short-sighted protectionism could stifle America's next champions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/US%20panic%20is%20missing%20the%20point%20on%20Chinese%20AI.pdf"}, {"id": "st-12", "title": "Why America keeps pressing its allies and partners to spend more on defence", "source": "ST", "date": "15 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "A University of Melbourne researcher argues Trump's push for allies to raise defence spending is really industrial policy expanding US arms exports. He touts \"The Trump Trillion,\" US$1.2 trillion more NATO spending, while allies bought over US$54 billion in US equipment in 2025. Deals include a US$142 billion Saudi package, AMRAAMs with Japan, and 82 HIMARS launchers for Taiwan worth over US$4 billion. Modern wars in Ukraine and the Middle East depleted Patriot and munitions stocks that take years to rebuild, so allied orders help justify larger production lines; the US will even build a Patriot plant in Europe. Domestically, the strategy protects Midwest factory jobs. Yet Europeans wary of dependence may ultimately seek to need America less.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/Why%20America%20keeps%20pressing%20its%20allies%20and%20partners%20to%20spend%20more%20on%20defence.pdf"}, {"id": "st-13", "title": "With the US-Iran ceasefire technically dead, danger in the Gulf in coming weeks is worse than before", "source": "ST", "date": "15 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Shipping has halted in the Strait of Hormuz as the US Navy resumed blockading Iran's ports from July 14, killing the last provision of a memorandum Trump signed 28 days earlier. Jonathan Eyal warns the coming weeks may prove worse than full-scale war. Three things changed: Iran widened the war by striking Gulf states including mediators Oman and Qatar, warning cooperation with the blockade means \"an act of war\"; a weaker, angrier post-Khamenei hardline regime distrusts US deals; and the blockade is an \"escalation machine.\" Trump muddied matters demanding a 20 per cent \"reimbursement,\" drawing IMO protest, and hinted at striking the buried Pickaxe Mountain nuclear site. Iran has avoided firing at Israel, and both sides still want to avert all-out war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20ST/With%20the%20US-Iran%20ceasefire%20technically%20dead,%20danger%20in%20the%20Gulf%20in%20coming%20weeks%20is%20worse%20than%20before.pdf"}, {"id": "bt-01", "title": "AI investment race could turn debt-fuelled boom to bust: BIS", "source": "BT", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The Bank for International Settlements warns the race to build AI infrastructure is on track to surpass past technology booms that ended in severe market disruptions. Rising borrowing and circular financing ties between hyperscalers and AI developers, where cloud builders take equity stakes in exchange for compute commitments, heighten financial stability risks if productivity gains disappoint. Economist Phurichai Rungcharoenkitkul notes a larger boom is both \"more likely to disappoint and more damaging.\" JPMorgan and Goldman Sachs estimate AI-related spending nearing US$6 trillion by 2030, much debt-financed. The BIS likens the buildout to 1830s canal mania, 1840s British railway mania and the late-1990s dotcom boom, warning the winner-takes-most dynamic encourages excessive, fragile investment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/AI%20investment%20race%20could%20turn%20debt-fuelled%20boom%20to%20bust%20BIS.pdf"}, {"id": "bt-02", "title": "Apac investors want more from active management than outperformance", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Schroders' Global Investor Insights Survey 2026, covering over 1,000 respondents including 245 from Asia-Pacific, found 86 per cent of regional investors confident active management can meet objectives over the next 12 to 18 months. Beyond outperformance (63 per cent), Apac investors prioritise nimbleness in navigating uncertainty (55 per cent) and responsiveness to geopolitical disruption (51 per cent), while differentiated investment philosophy ranks lowest at 28 per cent. Some 76 per cent rank Middle East conflict a top concern and 87 per cent expect greater volatility. Concentration in US tech drives 37 per cent toward active strategies. Investors increasingly value speed, private-market access and cross-asset judgment, reshaping what active management means regionally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Apac%20investors%20want%20more%20from%20active%20management%20than%20outperformance.pdf"}, {"id": "bt-03", "title": "Are markets too greedy?", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Standard Chartered's wealth CIO warns of mounting investor euphoria, most notably in semiconductors in South Korea and Taiwan, invoking Warren Buffett's counsel to be \"fearful when people are greedy.\" Record exposure to leveraged single-stock ETFs is a warning sign; after Korean regulators signalled regret over such products, the Kospi fell 10 per cent, and the market sits up over 62.5 per cent this year yet 25 per cent off its peak. Still optimistic given global earnings-growth consensus rising from 14 to over 26 per cent, he cautions US earnings quality is deteriorating. He favours diversification, equal-weighted indices, high-dividend stocks, US healthcare, Japanese banks and Asia ex-Japan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Are%20markets%20too%20greedy.pdf"}, {"id": "bt-04", "title": "As Singapore's growth continues to surprise, doing better than expected has its own dangers", "source": "BT", "date": "15 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore's economy keeps beating forecasts, with Q2 advance growth at 5.7 per cent versus a 5.5 per cent median poll estimate, and Q1 revised up to 6.3 per cent. May non-oil domestic exports surged 38.4 per cent, the fastest in over two decades. Citigroup, Maybank and UOB all lifted full-year forecasts to 4.8 per cent, though Citi's Kit Wei Zheng warns of a sharp H2 slowdown to 3.6 per cent and a possible technical recession. Much strength stems from AI-related electronics demand, shielding Singapore from Middle East fallout. The commentary cautions that any AI overvaluation sell-off could expose the economy, urging vigilance despite pleasant surprises.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/As%20Singapore's%20growth%20continues%20to%20surprise,%20doing%20better%20than%20expected%20has%20its%20own%20dangers.pdf"}, {"id": "bt-05", "title": "As the stock market grows bigger, our heads shouldn't", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets"], "summary": "This commentary observes Singapore's Straits Times Index climbing to new highs, hitting fresh records for five consecutive days from Monday, Jul 6. By Friday the index had broken past 5,400 and neared 5,500, with shares of the banking trio DBS, OCBC and UOB also reaching their own highs as the benchmark marched upward. The piece cautions that a rising stock price not backed by a growing business will eventually head south, warning investors against letting rising valuations inflate expectations. It frames the rally as a moment to stay disciplined rather than complacent, keeping perspective even as the market grows larger.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/As%20the%20stock%20market%20grows%20bigger,%20our%20heads%20shouldn't.pdf"}, {"id": "bt-06", "title": "Asia-Pacific's energy security: The engineering is ready; the regulatory infrastructure must follow", "source": "BT", "date": "15 Jul 2026", "tags": ["Energy", "Southeast Asia"], "summary": "A Siemens Energy executive argues Asia-Pacific's grids face a convergence of pressures: global electricity demand grew 4.4 per cent in 2024 and is forecast to rise 3.6 per cent annually through 2030, while data centres in Singapore and southern Malaysia add uninterruptible load and geopolitical tension threatens fuel routes. The May Asean Summit in Cebu placed grid resilience central, urging operationalisation of the Asean Power Grid. Yet only about US$2 billion has funded cross-border links over five decades, against an estimated US$800 billion vision by 2045. The core obstacle is regulatory misalignment, not engineering or capital. The writer says predictable frameworks are themselves infrastructure, essential to attract multi-decade investment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Asia-Pacific's%20energy%20security%20The%20engineering%20is%20ready%20the%20regulatory%20infrastructure%20must%20follow.pdf"}, {"id": "bt-07", "title": "China unveils first five-year consumption plan, targets US$9 trillion in annual retail sales by 2030", "source": "BT", "date": "15 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "China aims for annual retail sales of around 60 trillion yuan (US$9 trillion) by 2030 under its first five-year plan focused on consumption, implying slower growth of about 3.7 per cent versus roughly 5 per cent in 2021-2025. Approved by the State Council and released Monday, the plan pledges to raise household incomes and \"significantly\" lift consumption's share from around 40 per cent. It emphasises services such as elderly care, childcare, healthcare, tourism and education, expanded visa-free entry and more international flights. Per capita services spending was 46.1 per cent of consumption in 2025, well below America's roughly 70 per cent. Beijing promotes digital, AI-powered, green and experiential consumption while removing restrictive measures.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/China%20unveils%20first%20five-year%20consumption%20plan,%20targets%20US9%20trillion%20in%20annual%20retail%20sales%20by%202030.pdf"}, {"id": "bt-08", "title": "Hong Kong makes a push to integrate global carbon markets", "source": "BT", "date": "15 Jul 2026", "tags": ["Environment", "Finance & Markets"], "summary": "Hong Kong hosted the International Emissions Trading Association's Asia Climate Summit from Jul 7 to 9, culminating in a new platform to link global climate finance pathways. CGS International and Verdana HK signed with the Global Carbon Council to develop the Hong Kong Carbon Register and Services Body, aligned with Article 6 of the 2015 Paris Agreement and aimed at facilitating Chinese investment. The move supports Hong Kong's ambition to be a green finance hub amid rising Asean climate vulnerability; a McKinsey report urged lifting annual adaptation spending from US$12 billion to US$37 billion. Climate laws worldwide have grown from just over 50 in 1997 to more than 7,000, raising over US$107 billion through carbon pricing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Hong%20Kong%20makes%20a%20push%20to%20integrate%20global%20carbon%20markets.pdf"}, {"id": "bt-09", "title": "How China's EV boom got out of control", "source": "BT", "date": "15 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "China's electric-vehicle success stemmed less from top-down central planning than decentralised experimentation and ferocious regional competition, argues a China Journal study by Fengming Lu and Xiao Ma. Local governments, chasing jobs and tax revenue, backed as many carmakers as possible, creating over 140 clean-energy brands and chronic overcapacity. Champions like BYD, Geely and Chery emerged from scrappy local-private partnerships. The glut now weighs on global rivals: Mercedes-Benz cited an 8 per cent Q2 delivery drop, BMW cut its outlook, and Volkswagen frets over survival. Europe's trade deficit with China exceeds US$1 billion a day. With 23 new brands entering in 2025 and only nine exiting, consolidation conflicts with political incentives, leaving no quick fixes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/How%20China's%20EV%20boom%20got%20out%20of%20control.pdf"}, {"id": "bt-10", "title": "If AI looks like a bubble, acts like a bubble, then...", "source": "BT", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "This commentary invokes Chuck Prince's 2007 line, \"you've got to get up and dance,\" to describe AI-driven market euphoria where investors ignore valuations. It cites SpaceX trading at a roughly 138 price/sales ratio despite net losses, while hundreds of billions flow into AI chips, data centres and power. The piece draws parallels with the dotcom bubble, when investors correctly identified the internet revolution but mispriced companies. It concedes today's leaders, Nvidia, Microsoft, Alphabet, Amazon and Meta, are genuinely profitable and self-financing, yet warns bubbles arise when genuine success is extrapolated too far. Fear of missing out now rivals disciplined analysis, and if it looks and acts like a bubble, it probably is.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/If%20AI%20looks%20like%20a%20bubble,%20acts%20like%20a%20bubble,%20then....pdf"}, {"id": "bt-11", "title": "JPMorgan expects industry to manage AI spend with more 'discipline' as it eyes Singapore tech talent", "source": "BT", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "JPMorgan expects banks to impose stricter internal cost controls on generative AI as computing expenses, driven by soaring token consumption from reasoning models and AI agents, make budgets unpredictable. Max Neukirchen, co-head of Global Payments, said in Singapore that \"the days where everybody could just do anything are probably over,\" adding the bank now manages prompts with more discipline. Routine tasks will use lower-cost models while premium tokens serve revenue-adjacent functions like treasury agents. JPMorgan is investing in anti-fraud capabilities and is a partner in Anthropic's Project Glasswing, gaining access to Claude Mythos 5. It is hiring engineers in Singapore, praising MAS's pro-innovation oversight; its Kinexys platform has processed over US$4 trillion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/JPMorgan%20expects%20industry%20to%20manage%20AI%20spend%20with%20more%20'discipline'%20as%20it%20eyes%20Singapore%20tech%20talent.pdf"}, {"id": "bt-12", "title": "MAS listing grant backs 85 SGX debuts since 2019 as Singapore steps up equity market revival", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A MAS-administered listing grant has supported 85 listings since 2019, disclosed for the first time, including 12 mainboard listings in 2025 and H1 2026, plus 52 Catalist listings, nine ETFs and two depository receipts. The Grant for Equity Market Singapore (Gems) scheme co-funds eligible listing expenses; enhanced in July 2025 and extended to end-2028, it covers up to 70 per cent for mainboard IPOs, capped at S$2 million, and 20 per cent for Catalist, capped at S$300,000. Market participants say the grant supports rather than drives the IPO revival, improving economics especially for smaller firms. Evolve Capital's Jerry Chua said it can \"change the economics of the decision.\" Some urge raising Catalist support to 30 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/MAS%20listing%20grant%20backs%2085%20SGX%20debuts%20since%202019%20as%20Singapore%20steps%20up%20equity%20market%20revival.pdf"}, {"id": "bt-13", "title": "Nvidia halves Asia buyer list in China chip crackdown, steps up due diligence: report", "source": "BT", "date": "15 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Nvidia has more than halved the number of Asian customers authorised to buy its AI chips after creating a new \"white list\" of firms passing tougher compliance checks, the Financial Times reported. Aimed at preventing products reaching China, the chipmaker has intensified due diligence in Singapore, Malaysia and Japan over recent months, citing three people familiar. The move follows Trump administration efforts to stop advanced US chips reaching Chinese entities via third countries. The US Commerce Department issued guidance in May curbing exports to overseas subsidiaries, amid concerns Blackwell processors reached Chinese-linked entities in Malaysia. Nvidia staff now visit data centres, verify contracts and interview end users, with Commerce providing oversight and political backing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Nvidia%20halves%20Asia%20buyer%20list%20in%20China%20chip%20crackdown,%20steps%20up%20due%20diligence%20report.pdf"}, {"id": "bt-14", "title": "Should South-east Asia fear the second 'China shock'?", "source": "BT", "date": "15 Jul 2026", "tags": ["Trade", "Southeast Asia"], "summary": "South-east Asia imported over half a trillion dollars from China in 2025, running a roughly US$290 billion deficit as China's global surplus hit US$1.2 trillion. A Lowy Institute economist argues today's \"second China shock\" differs from the first: China now exports parts, components and machinery, becoming \"factory to the factories,\" and channels surplus into regional investment. Around 90 per cent of the region's China imports are intermediate or capital goods; Chinese manufacturing investment reached US$15.4 billion in 2024, up from US$5.7 billion in 2019. Though sectors like Indonesian textiles shed 80,000 jobs, regional exports and surpluses have grown alongside China's. Vietnam and Malaysia gain most; reforms are needed to sustain upgrading and avoid dependency.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Should%20South-east%20Asia%20fear%20the%20second%20'China%20shock'.pdf"}, {"id": "bt-15", "title": "Singapore's ESG loan proceeds fall 41.2% in 2025: MAS", "source": "BT", "date": "15 Jul 2026", "tags": ["Environment", "Finance & Markets"], "summary": "Proceeds from ESG-labelled loans issued in Singapore fell 41.2 per cent to S$27.4 billion in 2025 from S$46.6 billion in 2024, though ESG bond issuances rose 3 per cent to S$13.7 billion, MAS's sustainability report showed. Observers attributed weakness partly to volatility from US tariffs. Singapore remains Asean's largest labelled-debt market, over half the total, and saw its first transition-labelled loan. MAS chief sustainability officer Abigail Ng said Asian demand is supported by structural growth in clean energy and resilient infrastructure. MAS has fully shifted its climate transition equities portfolio to active management, extending it to corporate bonds, and targets cutting weighted average carbon intensity up to 50 per cent by FY2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Singapore's%20ESG%20loan%20proceeds%20fall%2041.2%20in%202025%20MAS.pdf"}, {"id": "bt-16", "title": "South Korea forecasts 2026 economic growth at 5-year high on AI chip boom", "source": "BT", "date": "15 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "South Korea raised its 2026 growth forecast to a five-year high of 3 per cent, up from 2 per cent previously and last year's 1.1 per cent, driven by a global semiconductor boom. The finance ministry pledged to swiftly advance AI investment and lift potential growth to 3 per cent from below 2 per cent, fast-tracking three \"mega projects\" covering semiconductors, AI data centres and physical AI. The 2027 budget will rise at least 10 per cent to over 800 trillion won. Vice-Finance Minister Lee Hyoung-il flagged both opportunities and challenges. Targets include becoming a top-four exporter and lifting per capita income to US$50,000. Inflation is forecast at 2.6 per cent amid high oil prices and Middle East conflict.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/South%20Korea%20forecasts%202026%20economic%20growth%20at%205-year%20high%20on%20AI%20chip%20boom.pdf"}, {"id": "bt-17", "title": "The rally, fragile truce and the anxiety beneath", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Markets rallied through much of the US-Iran conflict, but the truce now looks like a pause between strikes, with attacks resuming and the Strait of Hormuz a key pressure point. Despite tension, broader markets focus on inflation, rates, the dollar and the tech rally's sustainability. The record SpaceX IPO surged above US$2 trillion before retreating as valuation collided with rising yields. US headline PCE inflation topped 4 per cent, supporting the dollar and bond yields while pressuring richly valued AI stocks; gold weakened despite geopolitical risk. The writer applies Kahneman and Tversky's prospect theory to explain investor anxiety, urging discipline, diversification and process amid permanent uncertainty amplified by permanent commentary.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/The%20rally,%20fragile%20truce%20and%20the%20anxiety%20beneath.pdf"}, {"id": "bt-18", "title": "Why the world should copy Trump for once", "source": "BT", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "This Financial Times commentary praises the newly launched Trump Accounts, subsidised tax-efficient long-term investment accounts giving US$1,000 to children born during Trump's second term, invested in a State Street S&P 500 tracker. Trump said 500,000 children have received the allocation; those born between Jan 1, 2025 and end-2028 are eligible. With maximum US$5,000 annual contributions, a pot could reach US$271,000 by age 18, instilling saving habits and demonstrating compounding. Critics note many families lack cash savings or health insurance, and US-only fund bias limits diversification. The UK's scrapped Child Trust Fund left over £1 billion unclaimed. Despite politicised eligibility and branding, the writer calls it a good plan worth copying globally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20BT/Why%20the%20world%20should%20copy%20Trump%20for%20once.pdf"}, {"id": "scmp-01", "title": "Alibaba to team up with Honor in race to build AI agentic devices", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Technology & AI"], "summary": "Alibaba and Huawei spin-off Honor are set to deepen their partnership on an operating system for AI-powered devices, with an announcement expected at the World Artificial Intelligence Conference opening Friday in Shanghai. Honor, which hosts a WAIC sub-forum, has been developing a \"next-generation terminal operating system\" called Agentic OS, centred on user intent and able to plan and execute tasks across devices. Alibaba Cloud touted Honor's foldable Robot Phone, unveiled in Barcelona but not yet mass-produced. The tie-up builds on a 2025 strategic pact covering AI ecosystems and models. Competition is intensifying: StepFun launched its StepX Neo, and ZTE's Nubia plans a flagship AI agent phone. Alibaba recently introduced Qwen3.7-Plus, a multimodal agent model. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Alibaba%20to%20team%20up%20with%20Honor%20in%20race%20to%20build%20AI%20agentic%20devices.pdf"}, {"id": "scmp-02", "title": "Appetite for yuan assets sees London Clearing House accept dim sum bonds as collateral", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Finance & Markets"], "summary": "The London Clearing House has begun accepting offshore yuan-denominated Chinese government bonds, known as dim sum bonds, as eligible non-cash collateral, a milestone in Beijing's push to internationalise its currency. The move by LCH, owned by the London Stock Exchange Group, lets investors use offshore yuan sovereign bonds to meet margin requirements amid growing appetite for yuan assets. Bank of China led the roll-out, with three overseas units executing the first transactions on July 7; BOC Hong Kong facilitated institutional deposits settled through Euroclear. LCH accepted euro- and dollar-denominated Chinese sovereign bonds last May. Credit Agricole CIB's Patrick Wu said the step \"deepens the integration of Chinese assets\" into global financial infrastructure, marking an evolution in how Asia-Pacific markets connect with post-trade systems.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Appetite%20for%20yuan%20assets%20sees%20London%20Clearing%20House%20accept%20dim%20sum%20bonds%20as%20collateral.pdf"}, {"id": "scmp-03", "title": "Boko Haram exploited US and Chinese AI chatbots for attacks, Cambridge study finds", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Technology & AI", "Defence", "Society"], "summary": "A Cambridge University study based on interviews with 27 former Boko Haram members found the Nigerian group used both American and Chinese AI chatbots, including OpenAI's ChatGPT, Anthropic's Claude and DeepSeek, as operational tools for bomb-making, attack planning and propaganda through 2024 into mid-2025. Researcher Antonia Juelich said specialised \"trainers\" likely linked to Islamic State coached fighters using VPNs, and that safeguards were bypassed via jailbreaking tricks like framing questions as for a \"movie\". Internal AI units staffed by bomb-makers extracted solutions from the chatbots. The findings, the first on-the-ground evidence of AI use by an active terrorist group, fuel calls for US-China cooperation on misuse in upcoming AI safety talks, with debate over open-source model governance a sticking point.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Boko%20Haram%20exploited%20US%20and%20Chinese%20AI%20chatbots%20for%20attacks,%20Cambridge%20study%20finds.pdf"}, {"id": "scmp-04", "title": "Can Australian uranium fuel India's nuclear future without sparking an arms race?", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "A newly finalised deal gives India access to Australia's uranium reserves, the world's largest known, supporting Delhi's plan to expand nuclear capacity to 100 gigawatts by 2047 from about 8GW today. Australia had refused sales because India is not a Nuclear Non-Proliferation Treaty signatory, but rules concluded during Prime Minister Narendra Modi's visit ensure exports serve peaceful purposes under IAEA monitoring. Private entities will negotiate commercial supply contracts. Analysts said the pact bolsters fuel security and reflects deepening strategic trust between the Quad partners, following a 10-year uranium deal with Canada. India, which lacks sufficient domestic uranium, last year opened its nuclear sector to private and foreign operators. Both leaders voiced concern over China's recent Pacific ballistic missile test.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Can%20Australian%20uranium%20fuel%20India%E2%80%99s%20nuclear%20future%20without%20sparking%20an%20arms%20race.pdf"}, {"id": "scmp-05", "title": "China increases holdings of US Treasuries despite diversification trend", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China modestly raised its US Treasury holdings to US$659.3 billion in May from US$651.1 billion in April, when they hit an 18-year low, though the uptick did little to reverse Beijing's broader diversification away from American debt. Overall foreign holdings climbed to US$9.371 trillion. Japan, the largest holder, cut its stake to US$1.14 trillion, while Britain's rose to US$948.6 billion. China slipped to third place among holders last year. In contrast, the People's Bank of China extended gold purchases for a 20th straight month, to 75.44 million troy ounces, as a geopolitical hedge. Economist Barry Eichengreen warned erratic US policy could spark a dollar-confidence crisis but dismissed the idea Beijing could weaponise its Treasury holdings without harming itself.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%20increases%20holdings%20of%20US%20Treasuries%20despite%20diversification%20trend.pdf"}, {"id": "scmp-06", "title": "China issues plan to revitalise - and potentially commercialise - uninhabited islands", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Politics", "Environment"], "summary": "China has issued a plan to manage its natural resources, including minerals, more comprehensively by focusing on uninhabited islands and reclaimed land, apparently to boost local economies through commercialisation. A document from the Communist Party's Central Committee and State Council, published July 13 by Xinhua, calls for an uninhabited-island \"rights system\" and unified registration of land rights covering the islets. China has more than 11,000 islands, mostly off its southeastern coast; a 2022 study found 94 per cent of claimed islands uninhabited and many damaged. Economist Liang Yan said officials aim to clarify legal status so islands can be \"commercialised\", especially in Fujian, Guangdong and Zhejiang, amid property-hit local revenues. The plan targets a more complete resource-management system by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%20issues%20plan%20to%20revitalise%20%E2%80%93%20and%20potentially%20commercialise%20%E2%80%93%20uninhabited%20islands.pdf"}, {"id": "scmp-07", "title": "China sends a message to Pacific islands amid unease over missile test", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "A week after a Chinese submarine-launched ballistic missile test sparked protests across the Pacific, Beijing reaffirmed unconditional support for the Solomon Islands. Foreign Minister Wang Yi, meeting his Solomons counterpart in Beijing, pledged to deepen ties and expand cooperation on green energy, climate, health and education, insisting China's engagement carried \"no geopolitical intent\" and that island states were \"not anyone's backyard\". The July 6 test, splashing down near Nauru, Tuvalu and the Solomons, drew condemnation from the US, Australia, New Zealand, Japan and Pacific leaders. Solomons Prime Minister Matthew Wale, who lodged a strong protest, has pledged to review the 2022 security pact with Beijing while advancing a comprehensive treaty with Australia. Beijing holds ties with 11 of 14 Pacific states.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%20sends%20a%20message%20to%20Pacific%20islands%20amid%20unease%20over%20missile%20test.pdf"}, {"id": "scmp-08", "title": "China's StepFun claims it has unveiled the world's first AI smartphone", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Technology & AI"], "summary": "Tencent-backed start-up StepFun unveiled the StepX Neo in Shanghai, claiming it as the world's first \"agentic\" smartphone. Running on Step AOS, an operating system built for AI agents, the device is designed around AI rather than manually opened apps, interpreting requests and executing complex tasks autonomously via a native assistant called Amoo. StepFun announced integrations with Alipay, Trip.com, Didi Chuxing and Meituan to complete tasks across platforms. Founder Yin Qi argued AI agents require a ground-up operating system, and said the firm would not rely on hardware sales, pre-installed app fees or advertising, without disclosing price or release date. Analysts said the real value lies in continuous contextual data collection. Founded in 2023, StepFun raised nearly US$2.5 billion pre-IPO, valuing it around US$10 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%E2%80%99s%20StepFun%20claims%20it%20has%20unveiled%20the%20world%E2%80%99s%20first%20AI%20smartphone.pdf"}, {"id": "scmp-09", "title": "China's power exports to Asean surge 40% in first half of 2026 amid Hormuz tensions", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Energy", "Southeast Asia", "Trade"], "summary": "China's electricity exports to Asean countries surged more than 40 per cent in the first half of 2026, customs data showed, helping buffer Southeast Asia against energy-market volatility tied to Strait of Hormuz tensions. China exported 2.39 billion kilowatt-hours to the bloc, up 42.9 per cent year on year, highlighting its growing role as a regional energy supplier. Myanmar led the growth, with exports nearly doubling to US$48.9 million in the first five months, while shipments to Vietnam and Laos declined. Overall electricity exports totalled US$723.9 million, up 9.1 per cent. Customs spokesman Lu Daliang said the exports \"supported the region's production and daily life\", citing closer supply-chain integration that lifted China-Asean intermediate goods trade 24.5 per cent to 2.86 trillion yuan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqi
