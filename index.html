ssioner Maria Luis Albuquerque downplayed fully axing the contentious bank capital \"output floor\", hinting instead at temporary changes to address Europe's immediate economic needs. The rule, designed to stop banks gaming models to cut capital charges, was rejected by the US in March, while the EU had pledged phased introduction despite bank protests. Albuquerque said the floor is onerous for European lenders as many businesses lack credit ratings and rely on bank financing. The ECB's supervisory arm supports the floor, requiring dialogue. She dismissed concerns that tweaks would compromise Europe's global standing, and flagged that other reforms and the contentious deposits scheme remain in play toward first-quarter proposals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Europe%20seeking%20'balance'%20in%20review%20of%20capital%20rule%20ditched%20by%20US.pdf"}, {"id": "bt-06", "title": "Issue 203: Singapore reserves' varied climate strategies; industry urges regional energy coordination", "source": "BT", "date": "21 Jul 2026", "tags": ["Environment", "Energy", "Southeast Asia"], "summary": "MAS's latest sustainability report shows Singapore's three reserve managers, MAS, GIC and Temasek, take differing climate approaches, giving reserves diversified exposure. MAS, the most conservative, focuses on resilience, has cut developed-market equity carbon intensity 52 per cent and targets halving equity carbon intensity by fiscal 2030. Temasek, the most aggressive, is the only one setting portfolio emissions targets, aiming for net zero by 2050 via platforms like GenZero. GIC and Temasek weigh risks and opportunities but GIC avoids portfolio emissions goals. Separately, Siemens Energy SVP Thorbjorn Fors argued policy, not capital, is the main hurdle to South-east Asian grid interconnectivity, urging Asean regulatory alignment amid fragmented permitting and consensus-based coordination gaps.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Issue%20203%20Singapore%20reserves'%20varied%20climate%20strategies%20industry%20urges%20regional%20energy%20coordination.pdf"}, {"id": "bt-07", "title": "KKR, AEW Seek to Sell China Property Assets at Steep Losses", "source": "BT", "date": "21 Jul 2026", "tags": ["Finance & Markets"], "summary": "KKR and AEW Capital Management are seeking to offload commercial real estate in China, joining global investors selling into a prolonged property downturn. KKR plans to dispose of an upmarket Beijing multi-family complex and a Shanghai Bund hotel; AEW is seeking buyers for the HeXa International Plaza office tower, mixed-use Jing IN International Center in Beijing, and the Shanghai Pudong Development Bank building in Lujiazui. Talks are early, but managers expect to recoup more than loans covering 50-60 per cent of original prices. Foreign buyers invested nearly US$140 billion in Chinese property over 15 years but have turned sellers. Lenders including HSBC and Standard Chartered have booked provisions; a BlackRock fund's equity was wiped out.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/KKR,%20AEW%20Seek%20to%20Sell%20China%20Property%20Assets%20at%20Steep%20Losses.pdf"}, {"id": "bt-08", "title": "Malaysia data centre boom enters 'reset mode' as resource, funding realities bite: S&P", "source": "BT", "date": "21 Jul 2026", "tags": ["Technology & AI", "Energy", "Southeast Asia"], "summary": "Malaysia's data centre expansion is shifting into a deliberate reset as it faces stricter regulation, utility bottlenecks and a US$20 billion funding gap, S&P Global Ratings said. Johor, the surge's epicentre, is blocking less-efficient Tier 1 and 2 approvals, mandating Power Usage Effectiveness of 1.8 or lower and tighter water thresholds, plus shortfall penalties for missing 85 per cent utilisation. Electricity costs have risen 5-15 per cent and water tariffs 30-50 per cent. Data centres could consume nearly 31 per cent of Malaysia's energy capacity by 2035, up from 7 per cent. With funding threatening to breach the US$30 billion banking exposure cap, S&P expects a shift toward international project finance, private credit and securitisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Malaysia%20data%20centre%20boom%20enters%20'reset%20mode'%20as%20resource,%20funding%20realities%20bite%20SP.pdf"}, {"id": "bt-09", "title": "Singapore eyes hedge fund tax cuts to boost financial hub role: report", "source": "BT", "date": "21 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Monetary Authority of Singapore has held talks with investment firms on cutting taxes for fund managers to maintain competitiveness and retain talent, the Financial Times reported. Fund executives warned that planned changes to Hong Kong's tax laws could trigger relocations there. MAS said it is reviewing measures to sharpen Singapore's competitiveness as a financial centre. Hong Kong is proposing tax exemptions on carried interest for alternative asset managers, part of a broader push that has eased family office rules and embraced cryptocurrencies. One measure MAS is weighing is cutting the 10 per cent rate under a special incentive programme, below the 17 per cent corporate rate, letting firms pass savings to portfolio managers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Singapore%20eyes%20hedge%20fund%20tax%20cuts%20to%20boost%20financial%20hub%20role%20report.pdf"}, {"id": "bt-10", "title": "Singapore, South Korea reshape Vietnam's FDI mix as Chinese inflows halve", "source": "BT", "date": "21 Jul 2026", "tags": ["Trade", "Southeast Asia", "Finance & Markets"], "summary": "Fresh Chinese investment pledges into Vietnam fell 54 per cent to US$977 million in H1 2026, cutting mainland China's share to 5.6 per cent from 22.9 per cent, as Singapore and South Korea make bigger bets. Total registered foreign investment hit US$34.65 billion, up 61 per cent. Singapore's fresh commitments more than tripled to US$7.32 billion, a 42 per cent share, though partly reflecting holding-company structures. South Korea's average capital per project surged to US$25.8 million, with Samsung, LG Innotek, SK Innovation and Lotte among major backers. Tighter US Section 301 scrutiny of transshipment has made Chinese firms cautious. Vietnam's Resolution 10 prioritises semiconductors, AI and biotech, targeting 45-50 per cent localisation by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Singapore,%20South%20Korea%20reshape%20Vietnam's%20FDI%20mix%20as%20Chinese%20inflows%20halve.pdf"}, {"id": "bt-11", "title": "Who is accountable when an AI agent decides?", "source": "BT", "date": "21 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "This commentary by GovTech Singapore's CTO and deputy CEO explores who bears liability when autonomous AI agents act. It cites the 2022 Air Canada case, where a tribunal rejected the airline's claim that its chatbot was a \"separate legal entity\" and ordered it to pay. As agents now book, buy and move money across multiple firms' systems, accountability chains stretch across model builders, tool makers, platforms, clouds, deployers and users. Traditional negligence tests on duty, foresight and causation struggle when agents act unpredictably, as in a hypothetical assistant that hacks a server. Singapore's IMDA convened a working group; its May 2026 discussion paper is flagged. The author warns \"the chatbot did it\" offers weak defence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Who%20is%20accountable%20when%20an%20AI%20agent%20decides.pdf"}, {"id": "bt-12", "title": "Why organisations like GovTech are moving from projects to products", "source": "BT", "date": "21 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "GovTech's Jul 15 announcement of a two-year workforce transformation, including retrenching 93 employees in its first phase, spotlights a shift from project-based delivery via vendors to owning and continuously improving digital products in-house. A 2025 McKinsey survey of 757 executives found two-thirds redesigned operating models recently; Planview data suggests most work will become product-oriented within five years. Product models use permanent cross-functional teams measured by adoption, retention and revenue rather than on-time delivery. McKinsey found product-focused firms generated 60 per cent higher shareholder returns, but only 8 per cent of organisations successfully make the transition. GovTech chairman Chng Kai Fong said delaying would leave critical systems ageing and widen service gaps.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Why%20organisations%20like%20GovTech%20are%20moving%20from%20projects%20to%20products.pdf"}, {"id": "bt-13", "title": "Why small, open economies must rethink 'strategic incompleteness'", "source": "BT", "date": "21 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "This commentary argues small open economies like Singapore, Luxembourg and Ireland prospered through \"strategic incompleteness\", specialising in trade and capital while relying on the post-1945 order to enforce their rights. That settlement is weakening as US enforcement grows more selective, transactional and strategic, and as sanctions, export controls and investment screening make economic rights conditional. Ownership no longer guarantees usable control. Merchant states such as Singapore and the UAE adapt by offering connectivity and optionality, but still depend on wider systems protecting the connector. Drawing on the Delian League, Venice and Genoa, the author says small states must now choose how much autonomy to trade for protection and which critical networks to control rather than merely use.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/Why%20small,%20open%20economies%20must%20rethink%20'strategic%20incompleteness'.pdf"}, {"id": "bt-14", "title": "World powers are courting Asean. Can the region capitalise on that?", "source": "BT", "date": "21 Jul 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "The Philippines hosts the Asean Foreign Ministerial Meetings from Jul 21-25, drawing dialogue partners including the US, China, India and Russia, underscoring the bloc's rising appeal. Talks cover responses to Trump's incoming Section 301 tariffs and Myanmar's peace road map, while Quad ministers meet on the sidelines. US Secretary of State Marco Rubio, China's Wang Yi and Russia's Sergey Lavrov will attend; the Asean Regional Forum draws 27 countries. Asean's GDP topped US$13 trillion (PPP) in 2025 with nearly 700 million people. Leaders like Malaysia's Anwar Ibrahim urge unity to maximise leverage, but divisions over the South China Sea and Myanmar test cohesion. Friday marks the Treaty of Amity and Cooperation's 50th anniversary.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20BT/World%20powers%20are%20courting%20Asean.%20Can%20the%20region%20capitalise%20on%20that.pdf"}, {"id": "scmp-01", "title": "Alibaba vows to appeal US$629m EU fine for breaches of Digital Services Act", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Technology & AI", "Trade", "Geopolitics"], "summary": "AliExpress, owned by Alibaba Group Holding, has vowed to appeal a 550 million euro (US$629 million) fine imposed by the European Union on Monday for breaching the Digital Services Act. The firm called the penalty \"disproportionate\" and said it failed to reflect \"significant, proactive enhancements\" it had committed to. The European Commission said AliExpress did not diligently assess or mitigate systemic risks around illegal, unsafe and counterfeit products, overestimated its detection systems and lacked enough moderators. AliExpress has until October 20 to submit a remediation plan. The action reflects Brussels' tougher stance against Chinese and US tech firms; Temu, X and possibly Google face similar penalties. Alibaba also owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Alibaba%20vows%20to%20appeal%20US%24629m%20EU%20fine%20for%20breaches%20of%20Digital%20Services%20Act.pdf"}, {"id": "scmp-02", "title": "As EU's China trade deficit widens, Germany changes tack to join France's Beijing pushback", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Geopolitics", "Finance & Markets"], "summary": "Germany is aligning with France on a tougher stance toward Beijing as Europe's trade deficit with China widens by 1 billion euros (US$1.14 billion) daily, costing thousands of jobs. At the Franco-German Ministerial Council, Chancellor Friedrich Merz ranked China's economic challenge alongside Russia's war and a fraying US alliance, while President Emmanuel Macron denounced China's \"great trade aggressiveness.\" Both called on Brussels to strengthen trade defences and industrial policy, with a joint road map due by September before October talks with Beijing. Merz called the yuan \"drastically undervalued.\" Germany's 2025 trade deficit with China hit 89.3 billion euros, up 33.5 per cent. Both leaders stressed dialogue over conflict.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/As%20EU%E2%80%99s%20China%20trade%20deficit%20widens,%20Germany%20changes%20tack%20to%20join%20France%E2%80%99s%20Beijing%20pushback.pdf"}, {"id": "scmp-03", "title": "As the EU erects barriers, China's trade tilts south and east", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Geopolitics", "Southeast Asia"], "summary": "China's trade is undergoing a structural realignment away from Europe toward the developing world. In the first half of 2026, trade with Belt and Road partners rose 14.8 per cent to about US$1.9 trillion, over half of China's total, while trade with neighbours jumped 20.6 per cent. EU trade grew only 10.2 per cent. The shift is driven by Brussels' escalating barriers: anti-subsidy tariffs on EVs up to 38 per cent, the Foreign Subsidies Regulation, the Carbon Border Adjustment Mechanism and anti-coercion tools. Beijing is prioritising Latin America, Africa, Southeast Asia and the Middle East, expanding currency swap lines worth US$600 billion. Belt and Road trade of nearly US$2 trillion dwarfs roughly US$450 billion with the EU.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/As%20the%20EU%20erects%20barriers,%20China%E2%80%99s%20trade%20tilts%20south%20and%20east.pdf"}, {"id": "scmp-04", "title": "Brazil widens lead in China's soybean market as US shipments fall despite Trump-Xi deal", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Finance & Markets", "Geopolitics"], "summary": "China imported 12.08 million tonnes of Brazilian soybeans in June, up 13.7 per cent year on year, while US volumes fell 20.6 per cent to 1.27 million tonnes, far off the pace of the Trump-Xi purchasing deal. Total June arrivals hit a record 13.55 million tonnes. Over January-June, US imports dropped 42.4 per cent against a Chinese pledge to buy 25 million tonnes annually through 2028. Brazilian exports to China reached a record US$58.3 billion in the first half, up 22 per cent. On the same day, the US confirmed a 25 per cent tariff on Brazilian goods over deforestation, ethanol and payment disputes. Brazil rejected US pressure on critical minerals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Brazil%20widens%20lead%20in%20China%E2%80%99s%20soybean%20market%20as%20US%20shipments%20fall%20despite%20Trump-Xi%20deal.pdf"}, {"id": "scmp-05", "title": "Can Europe win a trade war with China? It may depend on how victory is defined", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Geopolitics", "Finance & Markets"], "summary": "While EU officials ramp up engagement with Beijing seeking an off-ramp, Brussels is quietly preparing for a trade war, determined to prevent deindustrialisation by a \"China Shock 2.0.\" Plans are accelerating to exclude Chinese firms from procurement, force EV technology transfers and diversify suppliers. Analysts say Europe is already in a trade war and must respond. Few expect the EU to win an escalatory tit-for-tat, given China's leverage over rare earths, illustrated when Beijing forced a US climbdown. Experts favour a \"distributed swarm\" of smaller measures over one big assault. But divided member states remain the EU's Achilles' heel; one ex-negotiator warned China views Europe as \"a paper tiger.\" Victory may mean preserving enough industry to survive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Can%20Europe%20win%20a%20trade%20war%20with%20China%20It%20may%20depend%20on%20how%20victory%20is%20defined.pdf"}, {"id": "scmp-06", "title": "China and US still in contact on Xi summit trip despite Trump's election claims", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "China and the US have stayed in contact over leader exchanges this year, Beijing said, hours after Secretary of State Marco Rubio downplayed fears that Trump's election-meddling claims would derail engagement. Foreign ministry spokesman Lin Jian said both sides maintained communication on head-of-state arrangements. The comments followed Trump's prime-time address accusing China of interfering in US elections, which Beijing called \"completely groundless.\" Rubio said Xi's September trip was still expected. Vice-minister Ma Zhaoxu is expected to visit Washington and Miami to prepare. The two presidents may meet up to four times this year, including at Apec in Shenzhen and the G20 in Miami. Strains persist over visas and Pentagon blacklistings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%20and%20US%20still%20in%20contact%20on%20Xi%20summit%20trip%20despite%20Trump%E2%80%99s%20election%20claims.pdf"}, {"id": "scmp-07", "title": "China moving up the industrial value chain with high-value exports", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Technology & AI", "Finance & Markets"], "summary": "China's push up the industrial value chain is gaining momentum, with exports of robots, EVs and advanced equipment expanding rapidly, June customs data show. Chinese quadruped robots now account for nearly 70 per cent of global sales, and over 400 humanoid robot models have been developed domestically. Robot exports reached nearly US$600 million in June, with over 40 per cent going to the EU. Plug-in hybrid EV export volumes doubled, with exports to the EU tripling. MIIT said equipment manufacturing made up nearly half of industrial export growth in the first half. Wind turbine and lithium battery exports each rose over a third; auto exports exceeded 5 million units. Beijing is extending this edge into AI infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%20moving%20up%20the%20industrial%20value%20chain%20with%20high-value%20exports.pdf"}, {"id": "scmp-08", "title": "China won't waste its reserves to cushion oil price impact of Iran war", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Energy", "Geopolitics", "Finance & Markets"], "summary": "This opinion piece argues China is unlikely to run down its strategic petroleum reserves to cushion oil prices as renewed US attacks on Iran keep the Strait of Hormuz closed. With US reserves at a 40-year low, keeping oil below US$100 a barrel will be difficult. China, the world's largest oil buyer, has cut imports by 3.5 million barrels a day since April. Conserving reserves and letting prices spike short-term may bring long-term benefits, the author contends, potentially popping the US AI stock bubble and pressuring Washington. China holds an estimated 1.3-1.4 billion barrels. Making stockpiles last would buy time to develop coal-chemical alternatives, with one Xinjiang zone atop 390 billion tonnes of coal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%20won%E2%80%99t%20waste%20its%20reserves%20to%20cushion%20oil%20price%20impact%20of%20Iran%20war.pdf"}, {"id": "scmp-09", "title": "China's EV industry rose with the aid of tax breaks. What happens when they end?", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Technology & AI", "Trade", "Energy"], "summary": "China is ending a decade-long tax exemption that helped fuel its EV and solar industries, a move analysts say could raise EV production costs and pressure manufacturers as Beijing curbs overcapacity and price wars. From September 1, a 2 per cent consumption tax applies to lithium-ion batteries, rising to 4 per cent a year later; solar cells face the tax from April. The levy could add about 1,000 yuan (US$147) per EV, squeezing razor-thin margins already at just 3.4 per cent industry-wide. The change creates a cost divide favouring carmakers building their own batteries. Analyst Jia Xinguang said scaling back support also responds to Europe's subsidy complaints. Perovskite, sodium-ion and solid-state batteries remain exempt until 2028.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%E2%80%99s%20EV%20industry%20rose%20with%20the%20aid%20of%20tax%20breaks.%20What%20happens%20when%20they%20end.pdf"}, {"id": "scmp-10", "title": "China's Li congratulates Andy Burnham on becoming Britain's new prime minister", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Chinese Premier Li Qiang congratulated Andy Burnham on becoming Britain's new prime minister, saying stronger China-UK dialogue would benefit both nations and \"inject stability into global peace,\" Reuters reported. In his first call with Trump, Burnham committed to defence and security and to supporting the safe reopening of the Strait of Hormuz. Trump hailed an \"outstanding relationship\" with the UK. Ukraine's Zelensky and France's Macron also congratulated Burnham, who pledged \"steadfast\" support for Kyiv. Burnham began appointing his cabinet, firing several of Keir Starmer's team including Rachel Reeves and David Lammy. John Healey was named chancellor, Ed Miliband foreign minister and Wes Streeting defence secretary.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%E2%80%99s%20Li%20congratulates%20Andy%20Burnham%20on%20becoming%20Britain%E2%80%99s%20new%20prime%20minister.pdf"}, {"id": "scmp-11", "title": "China's crude purchases plunge in June amid Middle East supply drop, higher prices", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Energy", "Finance & Markets", "Geopolitics"], "summary": "China's crude imports fell 41.3 per cent year on year to 29.27 million tonnes in June, driven by a steep drop in Middle East shipments as the country diversified energy sources. Gulf crude imports plunged 76.1 per cent by volume, while Russian purchases slipped 0.6 per cent as the Iran war eroded discounts. Kpler analyst Xu Muyu cited weak refining margins and subdued fuel demand. Meanwhile, LNG imports rose 8.3 per cent, driven by Malaysia and Russia offsetting a 93 per cent decline from Qatar. Coal purchases jumped nearly 30 per cent after a fatal Shanxi mine explosion cut domestic output. Brent averaged US$85 in June but breached US$90 on Monday amid fresh attacks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%E2%80%99s%20crude%20purchases%20plunge%20in%20June%20amid%20Middle%20East%20supply%20drop,%20higher%20prices.pdf"}, {"id": "scmp-12", "title": "China's military mouthpiece issues full-page warning on Japan's growing drone power", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China's PLA Daily devoted four articles in Monday's edition warning that Japan is using unmanned platforms to circumvent constitutional constraints on military development and advance \"remilitarisation.\" Japan's 2022 security documents identified unmanned defence capabilities as a counterstrike priority, pledging 1 trillion yen (US$6.2 billion) over five years. This year it allocated 277 billion yen for drones, including a multilayered littoral defence system called Shield, which PLA Daily likened to the US \"hellscape\" concept for a Taiwan contingency. Japan plans to buy 23 US MQ-9B SeaGuardian aircraft and deploy drones near Okinawa and key straits. The paper called Japan \"a dangerous wild card,\" citing PM Sanae Takaichi's shift from pacifist policies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/China%E2%80%99s%20military%20mouthpiece%20issues%20full-page%20warning%20on%20Japan%E2%80%99s%20growing%20drone%20power.pdf"}, {"id": "scmp-13", "title": "Chinese robot makers' lament: if we only had a better 'brain', and more data", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Technology & AI"], "summary": "Chinese robotics firms lack both sufficient data and a good \"brain\" to improve their products' interaction with the physical world, industry insiders said at the World Artificial Intelligence Conference in Shanghai. SenseTime co-founder Wang Xiaogang said the critical challenge is linking hardware, data, models and real-world scenarios into a closed-loop system. AgiBot's Yao Maoqing noted multi-modal physical-world data remains far from adequate compared with large language models, creating a bottleneck for training world models. Tencent's Zhang Zhengyou said today's smartest AI is still \"a brain in a tank.\" Ace Robotics unveiled its Kairos 3.1 world model, while Tencent released a suite of embodied AI offerings. Chinese firms are racing toward mass production and commercialisation this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Chinese%20robot%20makers%E2%80%99%20lament%20if%20we%20only%20had%20a%20better%20%E2%80%98brain%E2%80%99,%20and%20more%20data.pdf"}, {"id": "scmp-14", "title": "Chinese tourists blamed for overtourism in Japan's Kyoto despite huge fall in arrivals", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Society", "Geopolitics"], "summary": "Chinese tourists are being unfairly blamed for Kyoto's overtourism crisis even as data show mainland visitor numbers have plunged amid worsening China-Japan ties, a new report says. Many residents assume crowds and rising hotel prices are driven by Chinese tour groups, but relatively few Chinese visited recently after Beijing pressured citizens to holiday elsewhere. Chinese overnight stays fell about 60 per cent this year. Japan-wide, inbound tourism fell 2 per cent to 21.1 million in the first half, with Chinese arrivals down 56 per cent to 2.06 million, offset by South Korean, Taiwanese and US growth. Analysts blamed near-daily negative media coverage and PM Takaichi's November remarks on Taiwan for fuelling anti-Chinese sentiment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Chinese%20tourists%20blamed%20for%20overtourism%20in%20Japan%E2%80%99s%20Kyoto%20despite%20huge%20fall%20in%20arrivals.pdf"}, {"id": "scmp-15", "title": "Hong Kong bourse operator weighs longer trading hours to sharpen hub edge, sources say", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong Exchanges and Clearing (HKEX) is considering extending trading hours to match global peers and sharpen the city's competitiveness as an international financial centre, sources said. Both HKEX and the Securities and Futures Commission confirmed early-stage discussions. Options include extending the afternoon close to 5pm or even 8pm, though scrapping the one-hour lunch break is not being actively considered. Pressure has mounted after Nasdaq planned to expand to 23 hours a day and London weighed 24-hour trading. HKEX currently trades five and a half hours on weekdays. Industry figure Tom Chan supported longer hours but cautioned against cancelling the lunch break, noting mainland, Japanese and Singapore markets keep theirs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Hong%20Kong%20bourse%20operator%20weighs%20longer%20trading%20hours%20to%20sharpen%20hub%20edge,%20sources%20say.pdf"}, {"id": "scmp-16", "title": "Hungary investigates deal with China's BYD after ex-foreign minister takes job there", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Politics", "Trade", "Geopolitics"], "summary": "Hungary's government announced an investigation into a large BYD investment negotiated by former foreign minister Peter Szijjarto, who last week resigned from parliament to take an executive role at the Chinese carmaker, prompting conflict-of-interest accusations. Prime Minister Peter Magyar said Szijjarto, a close ally of former PM Viktor Orban, had helped BYD with public money, diplomatic support and infrastructure. The probe will examine subsidies, tax breaks, permits and environmental exemptions. Szijjarto helped BYD open its first European factory in Hungary in 2023 and locate its European headquarters in Budapest with 20 billion forints (US$63.7 million) in state aid. He also maintained close ties with Russia's Sergey Lavrov despite the Ukraine war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Hungary%20investigates%20deal%20with%20China%E2%80%99s%20BYD%20after%20ex-foreign%20minister%20takes%20job%20there.pdf"}, {"id": "scmp-17", "title": "Is China building a bigger support ship for its future Type 004 carrier battle group?", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China appears to be developing one of its largest fast combat-support ships to sustain long-range operations of the future Type 004 aircraft carrier, still under construction. Commercial satellite imagery from July 2 shows construction progress at the Comec Longxue shipyard near Guangzhou. Analysts assess the vessel as a larger variant of the Type 901 replenishment ship, likely tailored to support advanced carriers and their battle groups. Measuring about 271 metres with a 37-metre beam, it will rank among the largest replenishment ships worldwide, exceeding the 240-metre, 45,000-tonne Type 901. The expanded capacity would let it carry aviation fuel, precision weapons and provisions while resupplying escorts, extending carrier groups' reach for longer deployments.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Is%20China%20building%20a%20bigger%20support%20ship%20for%20its%20future%20Type%20004%20carrier%20battle%20group.pdf"}, {"id": "scmp-18", "title": "New tech wealth sparks luxury property rush in Chinese city home to 'Six Little Dragons'", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Society"], "summary": "New tech wealth is fuelling a luxury property rush in Hangzhou, home to the start-up cluster dubbed the \"Six Little Dragons.\" All 66 units of the high-end Wangtianji development's first batch sold on launch day July 16, generating 3.36 billion yuan (US$496 million), with seven to eight bidders per riverfront flat. A 624 square metre duplex penthouse fetched a record 152 million yuan. Buyers averaged 39 years old, largely new money from technology, AI and finance. Hangzhou hosts Alibaba, Unitree and DeepSeek and 25 unicorns. Luxury home transactions above 20 million yuan hit a 10-year high. Yet the sales underscore market polarisation, as secondary volumes in core areas halved amid China's broader property slump.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/New%20tech%20wealth%20sparks%20luxury%20property%20rush%20in%20Chinese%20city%20home%20to%20%E2%80%98Six%20Little%20Dragons%E2%80%99.pdf"}, {"id": "scmp-19", "title": "No longer token economy? SenseTime bets on 'task economy' as token prices set to drop", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The commercialisation of AI will shift from a \"token economy\" to a \"task economy\" as token prices decline in coming years, Chinese AI firm SenseTime says. CEO Xu Li said token pricing will inevitably drop, like telecoms data two decades ago, and true commercial value will move toward users paying for completed complex tasks such as reviewing blueprints or generating videos. China's daily AI token consumption has surged over 1,000-fold in two years. Xu said the addressable market could expand at least tenfold as adoption reaches the masses. SenseTime is doubling down on multimodal AI, launching its SenseNova U1 Pro model at WAIC. The Hong Kong-listed firm is reaping the agentic AI boom, paving the way for profitability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/No%20longer%20token%20economy%20SenseTime%20bets%20on%20%E2%80%98task%20economy%E2%80%99%20as%20token%20prices%20set%20to%20drop.pdf"}, {"id": "scmp-20", "title": "North Korea paves way for possible Kim trip to Moscow", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "North Korea's top diplomat Choe Son-hui was in Moscow this weekend for talks analysts say likely focused on fresh ammunition and missile shipments for Russia's war in Ukraine while laying groundwork for a possible Kim Jong-un visit. Choe met Vladimir Putin on Sunday, more than two years after he invited Kim during their 2024 Pyongyang summit. Putin expressed gratitude for North Korean troops in the Kursk region. Choe said Pyongyang would continue strengthening allied ties with Moscow. Analysts said North Korea has deployed about 16,000 troops to Russia and become a de facto ammunition factory, seeking advanced military technology in return. Experts predict a potential Kim visit \"later this year\" amid pendulum diplomacy between Beijing and Moscow.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/North%20Korea%20paves%20way%20for%20possible%20Kim%20trip%20to%20Moscow.pdf"}, {"id": "scmp-21", "title": "Shanghai beats GDP estimates with 5.6% growth - but two-speed recovery persists", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Finance & Markets", "Trade", "Technology & AI"], "summary": "Shanghai's economy expanded 5.6 per cent in the first half, beating expectations on strong hi-tech manufacturing and exports, but exposing an uneven \"K-shaped\" recovery. The reading surpassed the national 4.7 per cent rate. Strategic frontier industries - integrated circuits, AI manufacturing and biomedicine - grew a combined 14.5 per cent, while the NEV sector rose over 30 per cent and hi-tech investment surged 36 per cent. Goods trade jumped 18.6 per cent. Yet retail sales rose just 0.7 per cent, reflecting cautious households and a deflating property market. Economist Shao Yu urged more safety-net policies. Researcher Yang Jianwen projected major stimulus, including consumer vouchers, at the Politburo meeting, noting the China-US trade truce expires in November.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Shanghai%20beats%20GDP%20estimates%20with%205.6%25%20growth%20%E2%80%93%20but%20two-speed%20recovery%20persists.pdf"}, {"id": "scmp-22", "title": "Trump imposes 50% tariffs on Canadian goods, citing disputes over cars, alcohol and cheese", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Politics", "Geopolitics"], "summary": "President Donald Trump on Monday imposed 50 per cent tariffs on most Canadian goods, declaring Canada had unfairly discriminated against American cars, alcohol and dairy products. An official said Canada was one of the only nations besides China to retaliate against Trump's previous tariffs and must be held accountable. Trump signed three proclamations under Section 338 of the 1930 Trade Act. The tariffs exclude energy, potash, fish and critical minerals but include goods previously protected under the recently expired USMCA. Trump also asked aides to consider additional tariffs because Canadian wildfires hurt US air quality. His argument rests largely on Canada's retaliatory measures, including a 25 per cent tariff on US vehicles and halted purchases of American alcohol.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Trump%20imposes%2050%25%20tariffs%20on%20Canadian%20goods,%20citing%20disputes%20over%20cars,%20alcohol%20and%20cheese.pdf"}, {"id": "scmp-23", "title": "Trump order targets China-linked military mineral supply chains", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Defence", "Geopolitics", "Trade"], "summary": "President Donald Trump on Monday signed an executive order aimed at reducing US defence dependence on China for critical minerals, directing military contractors to shift from Beijing-linked supply chains beginning January 2027. Without naming China, the order stresses maintaining US military dominance \"in an era of renewed great power competition.\" China accounts for roughly two-thirds of global rare earth mining and about 90 per cent of refining. Contractors must submit \"formal mitigation\" plans identifying non-compliant sources. White House adviser Peter Navarro accused China of a \"starve-not-strangle strategy.\" Beijing rejected the accusations. The order follows China placing MP Materials and USA Rare Earth on its export control list. A 2025 report found 78 per cent of US weapons components contain Chinese-sourced minerals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Trump%20order%20targets%20China-linked%20military%20mineral%20supply%20chains.pdf"}, {"id": "scmp-24", "title": "Trump turns to China in renewed US birthright citizenship push", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Politics", "Society", "Geopolitics"], "summary": "After the Supreme Court rejected his attempt to restrict birthright citizenship, President Trump turned his focus to China, sarcastically congratulating President Xi on a \"WIN.\" The Justice Department instructed prosecutors to prioritise \"birth tourism\" investigations, and House Speaker Mike Johnson said lawmakers were examining legislation. The court ruled 6-3 that children born in the US are citizens under the 14th Amendment. Legal experts note no data measures how many women travel to the US to give birth, and figures show births to China-resident women are a minute share. The Justice Department cited prosecutions relying on visa fraud allegations. Critics call the term \"birth tourism\" fearmongering that targets Chinese and Chinese-American travellers, invoking the Wong Kim Ark case.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Trump%20turns%20to%20China%20in%20renewed%20US%20birthright%20citizenship%20push.pdf"}, {"id": "scmp-25", "title": "Why China's open-weight AI model Kimi K3 is sparking anxiety in Silicon Valley", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Chinese start-up Moonshot AI's Kimi K3 has narrowed the country's AI gap with the US to \"a matter of weeks,\" stoking Silicon Valley jitters as China doubles down on open-source. The Beijing unicorn released the 2.8 trillion-parameter model late last week, featuring native vision and built for long-horizon coding and complex reasoning. It outperformed closed-source models including Anthropic's Claude Opus 4.8 and OpenAI's GPT-5.5, trailing only Claude Fable 5 and GPT-5.6 Sol, per Artificial Analysis. At US$0.95 per task, K3 is far cheaper than US alternatives. Analysts said it disproves the notion Chinese models merely distil on US ones. David Sacks called it \"concerning,\" while users noted subpar speed as surging demand forced Moonshot to pause subscriptions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Why%20China%E2%80%99s%20open-weight%20AI%20model%20Kimi%20K3%20is%20sparking%20anxiety%20in%20Silicon%20Valley.pdf"}, {"id": "scmp-26", "title": "Why tourists are flocking to South Korea's pharmacies and wellness services", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "Beauty and wellness tourism is booming in South Korea, with packages mixing medical technology, beauty services and lifestyle experiences. Once synonymous with cosmetics, K-beauty now draws visitors booking dermatology clinics, scalp treatments, personal colour consultations and pharmacy visits. Social media on YouTube, Instagram and TikTok has accelerated growth. Foreign visitors spent over 2 trillion won (US$1.3 billion) via credit cards in May, up 67.1 per cent year on year. Pharmacies like Ready Young have expanded in tourist districts, selling over-the-counter medicines and supplements. KTO data showed K-beauty and wellness spending rose 38.4 per cent in the first quarter and medical tourism 33.2 per cent. The government launched a 2026 Korea Beauty Festival to build a tourism platform.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/Why%20tourists%20are%20flocking%20to%20South%20Korea%E2%80%99s%20pharmacies%20and%20wellness%20services.pdf"}, {"id": "scmp-27", "title": "'Payback': why China's world-beating car industry faces plunging sales at home", "source": "SCMP", "date": "21 Jul 2026", "tags": ["Trade", "Finance & Markets", "Technology & AI"], "summary": "China's car sales at home have plunged as Beijing scales back subsidies and consumers stay cautious, even as it remains the world's largest car exporter. Passenger vehicle sales fell 20.2 per cent year on year in the first half, tumbling over 23 per cent in June. Beijing cut its trade-in subsidy, now capped at 10 per cent of price, and reduced total funding by 50 billion yuan. Gavekal Dragonomics said a \"payback\" effect could depress sales for up to two years. Higher petrol prices from the Iran war and expectations of further price cuts compound the slump. Carmakers like BYD and Chery are pivoting to overseas markets; exports rose 73 per cent in five months, driven by EVs, especially in Europe, where Brussels weighs hybrid tariffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/21%20Jul%202026/21%20Jul%20SCMP/%E2%80%98Payback%E2%80%99%20why%20China%E2%80%99s%20world-beating%20car%20industry%20faces%20plunging%20sales%20at%20home.pdf"}]}, "2026-07-22": {"date": "2026-07-22", "dayOfWeek": "Wednesday", "totalArticles": 67, "sourceCounts": {"WSJ": 17, "ST": 14, "BT": 16, "SCMP": 20}, "executiveDigest": "China's AI event delivered a blunt message to the US - 'we're coming for you' - as models from Moonshot's Kimi K3 to Alibaba's latest narrowed the gap and prompted top American AI execs to sound the alarm in 'another DeepSeek moment'; meanwhile the Iran war escalated as a missile struck US troop housing at a Jordan base (cost now US$37.5 billion), BlackRock led a US$12 billion Meta data-centre financing, and SGX opened access for Singapore investors to buy Grab, Sea and SpaceX.", "briefingCards": [{"title": "Lead story - China's AI 'coming for you'", "body": "China's flagship AI event delivered a pointed message to Washington - 'we're coming for you' - as a wave of Chinese models narrowed the gap: Moonshot's open-weight Kimi K3 triggered 'another DeepSeek moment', Alibaba said its newest model is second only to Anthropic's Fable 5, Zhipu's shares surged 37% on a giant data centre powered by Chinese chips, and an AI agent, Qiushi Engine, was said to outperform Claude Code in autonomous research. Top American AI executives sounded the alarm, warning safety curbs may be holding US models back. Trump softened his tone on China election-meddling claims ahead of Rubio-Wang talks and signalled 'deal me in'."}, {"title": "Markets & finance", "body": "The AI build-out kept drawing record capital - BlackRock led a US$12 billion financing for new Meta data centres in Texas, and Ant International raised US$1.2 billion - though WSJ cautioned the massive supply deals feeding the frenzy are 'no sure thing'. Closer to home, Singapore inflation expectations inched up to 3.4% on geopolitical and trade fears, analysts flagged 'positive surprises' for S-Reits' H1 earnings, and SGX opened access for local investors to buy Grab, Sea and SpaceX. BT argued the Fed needs to tighten, and China signalled it will expand capital-outflow channels."}, {"title": "Asia realignment", "body": "Flashpoints multiplied: the US condemned China after a South China Sea clash and is pressing across three maritime fronts, EU lawmakers arrived in Beijing for high-stakes talks, and North Korea and Russia's foreign ministers held strategic talks in Moscow, with a fifth China-Russia rail link planned. Taiwan opened the door to Starlink, pending Elon Musk. Britain's new PM Andy Burnham stamped his authority with a Cabinet shake-up and took a call from Trump, who is betting big-government Burnham can be a partner."}, {"title": "Energy & climate", "body": "Energy risk stayed acute: a missile strike and the Houthi threat of a Saudi blockade left Asia's oil buyers facing a US$100-per-barrel risk, and China kept a tight grip on fuel exports despite eased curbs. BT asked how long energy markets can withstand the Iran war, whose US cost has reached US$37.5 billion. On the transition, SCMP examined how China's policy playbook took its EV sector 'from zero to hero', and EGP Energy offered one million public shares at S$0.51 in a Singapore mainboard listing."}, {"title": "Technology & AI", "body": "Beyond the model race, the AI economy's plumbing was in focus: WSJ asked whether AI might actually help solve the next labour crisis, even as ST probed the unease of 'training an AI that replaces you', and BT flagged 'Model Autophagy Disorder' - the risk of AI trained on AI-generated data. Singapore's Josephine Teo warned the risks of autonomous AI agents are 'not yet fully understood', and an ex-Hyundai robotics lead will spearhead a new Samsung robotics initiative. Bain found many ASEAN firms still struggle to roll AI out."}, {"title": "Singapore & SEA focus", "body": "SGX opened access for Singapore investors to buy Grab, Sea and SpaceX, and a new professional-services centre will help firms expand regionally. Singapore's military is exploring quantum computing for mission planning, while inflation expectations rose to 3.4%. In property, Kingsford Group agreed to buy the Tan Boon Liat Building at a lower reserve price of S$950 million, and EGP Energy launched a mainboard IPO. Japan is seeking South-east Asian sea lanes to avoid troubled waters, underscoring the region's rising strategic weight."}], "keyMetrics": [{"value": "67", "label": "Articles curated today", "sub": "WSJ 17 · ST 14 · BT 16 · SCMP 20"}, {"value": "Coming for you", "label": "China AI narrows gap", "sub": "Kimi K3; US execs alarmed"}, {"value": "US$12b", "label": "BlackRock-Meta centres", "sub": "AI capex keeps surging"}, {"value": "US$37.5b", "label": "US Iran war cost", "sub": "Missile hits Jordan troop base"}, {"value": "3.4%", "label": "SG inflation expectations", "sub": "Up on geopolitical, trade fears"}, {"value": "Grab, Sea, SpaceX", "label": "SGX opens access", "sub": "For Singapore investors"}], "articles": [{"id": "wsj-01", "title": "Alibaba Says New AI Model Is Just Second to Anthropic's Fable 5", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Alibaba previewed Qwen3.8 Max, a flagship large language model it says ranks second only to Anthropic's Fable 5, signaling China is fast closing the technological gap with the U.S. The preview version boasts 2.4 trillion parameters and is available on Alibaba's coding platforms; the company plans to make it open-weight soon. The Sunday release came days after Moonshot's Kimi K3, a 2.8-trillion-parameter model billed as the world's biggest open-source system that surpassed Z.AI's GLM-5.2 on benchmarks. Alibaba's Hong Kong shares rose as much as 5.6%, while Z.AI and MiniMax fell 13% and 5.7%. Analysts expect intensifying competition to leave only a small group of frontier-model developers standing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Alibaba%20Says%20New%20AI%20Model%20Is%20Just%20Second%20to%20Anthropic%E2%80%99s%20Fable%205.pdf"}, {"id": "wsj-02", "title": "BlackRock Leads $12 Billion Financing for New Meta Data Centers in Texas", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "BlackRock is leading a debt sale targeting at least $12 billion for its massive new El Paso data-center project backed by Meta Platforms, people familiar said. BlackRock and its infrastructure and private-credit arms own an 80% stake, while Meta, which will use the centers, owns 20%; the complex is expected to have roughly 1 gigawatt of capacity. JPMorgan Chase and Morgan Stanley are leading the jumbo debt sale. BlackRock has poured tens of billions into data-center investments, including a $40 billion deal to buy Aligned Data Centers. CEO Larry Fink's purchases of Global Infrastructure Partners and HPS make the $15 trillion asset manager more active in owning assets. The structure mirrors Meta's $27 billion Louisiana deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/BlackRock%20Leads%20%2412%20Billion%20Financing%20for%20New%20Meta%20Data%20Centers%20in%20Texas.pdf"}, {"id": "wsj-03", "title": "China's Top AI Event Delivers Message to the U.S.: We're Coming for You", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's biggest AI convention, the ninth World Artificial Intelligence Conference in Shanghai, showcased the country's rapid advances and its message to American rivals. On the first day, Beijing-based Moonshot AI jolted markets with a new model ranked among the world's best; two days later Alibaba claimed to top it. Some 20 football fields of exhibition space displayed AI hardware and robots dancing, making cappuccinos and massaging visitors. Beijing flaunted its prowess at overcoming U.S. sanctions that largely block access to the best chips. Not everything worked: humanoids remain better at tricks than chores, and export controls forced Moonshot to halt new premium subscriptions after Kimi K3 demand strained computing. China's advances dashed U.S. hopes of an impregnable AI lead.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/China%E2%80%99s%20Top%20AI%20Event%20Delivers%20Message%20to%20the%20U.S.%20We%E2%80%99re%20Coming%20for%20You.pdf"}, {"id": "wsj-04", "title": "Iran Missile Struck Housing Units for U.S. Troops at Jordan Base", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "An Iranian ballistic missile that killed two U.S. servicemembers at Jordan's Muwaffaq Salti Air Base struck prefabricated housing units where troops slept, U.S. officials said. It was one of three strikes on the base in 24 hours; a third person's remains were found. That three missiles slipped through defenses underscores the challenge of protecting an estimated 50,000 regional troops from Iran's ballistic missiles and drones. Trump threatened retaliation, and the U.S. launched new strikes to degrade Iran's ability to attack Strait of Hormuz shipping. \"Every time Iran kills an American Soldier they will pay,\" Trump wrote. Seventeen servicemembers have been killed since the war began; an 18th is missing. No evidence shows Iran specifically targeted the quarters.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Iran%20Missile%20Struck%20Housing%20Units%20for%20U.S.%20Troops%20at%20Jordan%20Base.pdf"}, {"id": "wsj-05", "title": "Iran War Mediators Push for Traction on New Ceasefire", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Mediators worked Monday to push the U.S. and Iran toward a new ceasefire, fearing a prolonged low-grade conflict that disrupts regional economies and risks escalation. The effort follows a ninth straight night of U.S. attacks, Iranian retaliation against Kuwait and Bahrain, and two more vessels struck in the Strait of Hormuz. Trump threatened retaliation after Iranian strikes killed at least two servicemembers. Strait traffic is crippled, averaging 10 ships daily, and Yemen's Houthis announced a blockade of Saudi shipping. Qatar floated a 10-day ceasefire and an end to shipping restrictions, but Iran's Revolutionary Guard hasn't responded. Diplomats face mutually exclusive demands over who administers the waterway's reopening, making mediation \"nearly an impossible task,\" one researcher said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Iran%20War%20Mediators%20Push%20for%20Traction%20on%20New%20Ceasefire.pdf"}, {"id": "wsj-06", "title": "Iran's Fortitude Is Its Decisive Edge", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "This opinion piece argues Tehran holds a wartime advantage over Washington because Iran's ruling elite wants to fight and will endure far more pain than Trump. The authors contend the revolutionary faithful have embraced such tests since the Iran-Iraq war and Syria's civil war, using conflict to bond the IRGC and security forces. Team Trump and Israel believed sustained bombing could defang a fragile Islamic Republic, but no collapse came. The writers criticize JD Vance for entertaining illusions of Iranian moderates, noting counterparts Ghalibaf and Araghchi are committed revolutionaries. They argue the regime, unified by the brutal suppression of a January 2026 insurrection, is more determined than at any point since 1980, and has shrewdly relaxed hijab enforcement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Iran%E2%80%99s%20Fortitude%20Is%20Its%20Decisive%20Edge.pdf"}, {"id": "wsj-07", "title": "Israel Believes Iran Moved Nuclear Centrifuges Into Pickaxe Mountain", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli intelligence believes Iran moved thousands of uranium-enrichment centrifuges into tunnels deep inside Pickaxe Mountain last fall, Israeli and U.S. officials say, raising fears Tehran could reconstitute its nuclear program. The transfer allegedly followed June's 12-day war, when U.S. and Israeli strikes hit Iran's three main nuclear sites. As war aims diverge, Netanyahu has pressed Trump to resume all-out attacks; Trump said the U.S. was prepared to strike Pickaxe, calling it \"a possible target for a nice big fat shot.\" Known as Mount Kolang, the site reaches 300 to 450 feet beneath rock and presents challenges to airstrikes. Experts warn a covert breakout is the worst-case scenario and the IAEA must inspect the unverified facility.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Israel%20Believes%20Iran%20Moved%20Nuclear%20Centrifuges%20Into%20Pickaxe%20Mountain.pdf"}, {"id": "wsj-08", "title": "Lockheed Martin Plans Bargain-Rate Patriot Missile to Replenish Low Stockpiles", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Defence", "Finance & Markets"], "summary": "Lockheed Martin said it would field a new, cheaper Patriot missile that could reach the battlefield faster as global stockpiles of high-end interceptors dwindle. The planned PAC-3 Adapted Capability Effector can be built more quickly and will cost buyers less than half of Lockheed's bestselling MSE version, which runs over $4 million a round. It targets cruise missiles and close- and short-range ballistic missiles, not longer-range threats. Lockheed will ask European defense firms to supply parts like rocket motors and seekers, aiming to produce in Europe. Flight testing is planned for 2028. The U.S. Army separately launched a competition for a sub-$1 million interceptor. Cahill said the design would \"thin the herd\" of drones and cruise missiles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Lockheed%20Martin%20Plans%20Bargain-Rate%20Patriot%20Missile%20to%20Replenish%20Low%20Stockpiles.pdf"}, {"id": "wsj-09", "title": "Netanyahu Won't Be Arrested After New York City Mayor's Comments, Says Trump", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Trump said Monday that Benjamin Netanyahu wouldn't be arrested \"in any way, shape or form\" in the U.S., after New York City Mayor Zohran Mamdani said he would explore whether local authorities could detain the Israeli premier. Mamdani, a Democratic socialist and sharp critic of Israel, called Netanyahu a \"war criminal\" who \"belongs in The Hague,\" where the ICC issued an arrest warrant over alleged Gaza war crimes. Netanyahu is expected in New York in September for the U.N. General Assembly. Critics called the arrest idea \"third-world behavior,\" and legal scholars said Mamdani's authority is tenuous: the U.S. doesn't recognize the ICC, and a 2002 federal law bars local police from cooperating with it.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Netanyahu%20Won%E2%80%99t%20Be%20Arrested%20After%20New%20York%20City%20Mayor%E2%80%99s%20Comments,%20Says%20Trump.pdf"}, {"id": "wsj-10", "title": "The Massive Supply Deals Feeding the AI Frenzy Are No Sure Thing", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Multibillion-dollar contracts to supply AI computing power have become the glue holding the boom together, but investors shouldn't rely on them if demand fades. The memory-chip business is the most extreme example: explosive growth of memory-intensive AI agents has turned a cutthroat, cyclical industry into something more stable. Samsung, SK Hynix and Micron are posting record profits and tout a shortage lasting into 2028. Micron's five-year, take-or-pay agreements will supply more than half its future revenue, CEO Sanjay Mehrotra said. Micron's stock roughly tripled this year. Yet if demand ebbs before contracts expire, deals will likely be renegotiated or extended, since suppliers avoid forcing unwanted chips on customers. A similar shift during the Covid-era shortage was reversed when glut returned.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/The%20Massive%20Supply%20Deals%20Feeding%20the%20AI%20Frenzy%20Are%20No%20Sure%20Thing.pdf"}, {"id": "wsj-11", "title": "The Pentagon Is Finally Buying (Some) Weapons From Startups", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Defence", "Technology & AI"], "summary": "Defense Secretary Pete Hegseth has rewritten Pentagon procurement rules, showering money on high-tech defense startups while also expanding spending on traditional vendors he calls slow and bloated. Investor exuberance has sent valuations soaring; Anduril doubled to $61 billion by May. Contract spending on the 15 highest-valued defense-tech startups tripled from 2022, yet still accounts for under 1% of total defense dollars. Roughly 10,000 new defense companies entered the market in two years, and nontraditional firms received over $122 billion last fiscal year, though the Pentagon also doubled prime-contractor spending to $372 billion. Spending has climbed amid Taiwan concerns and Ukraine's drone lessons. Startups fear Congress may slow funding amid scrutiny of Hegseth and the Iran war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/The%20Pentagon%20Is%20Finally%20Buying%20(Some)%20Weapons%20From%20Startups.pdf"}, {"id": "wsj-12", "title": "The U.S. Puts Once-Unthinkable Ideas on the Table to Disarm Hezbollah", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "With Israel having battered Hezbollah over two years and many Lebanese turning against it, U.S., Israeli and Lebanese officials see growing consensus that the militia must give up its weapons, but no easy path. Israel's continuing occupation of southern Lebanon complicates cooperation. Three ideas are emerging: training and vetting elite Lebanese Armed Forces units to disarm Hezbollah town by town, with operations beginning Monday to clear three southern villages; Trump's suggestion that Syria's new government under former jihadist Ahmed al-Sharaa choke off supply lines; and using the Israeli military directly. Critics warn each carries fatal flaws. The weak Lebanese army harbors Hezbollah sympathizers, and vetting risks fracturing it along sectarian lines. Rome talks set a handover structure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/The%20U.S.%20Puts%20Once-Unthinkable%20Ideas%20on%20the%20Table%20to%20Disarm%20Hezbollah.pdf"}, {"id": "wsj-13", "title": "Top American AI Execs Sound Alarm on Chinese Models", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "OpenAI and Anthropic executives are warning that cheap, powerful new Chinese AI models will lead to a \"dystopian\" future and pose security risks without regulation, as Washington and Silicon Valley debate whether U.S. firms should use them. Critics say the two companies, preparing for public listings, simply want to eliminate competition. Highly capable open-weight systems like Moonshot's Kimi K3 and Alibaba's Qwen 3.8 Max, competitive on some benchmarks, have upended the race. OpenAI strategist Dean Ball warned of \"full AI communism\" and a \"dystopian hellscape,\" though he said it wasn't OpenAI's position. Anthropic CEO Dario Amodei called freely downloadable models with cyber capabilities \"a serious concern.\" Use of cheaper Chinese models is surging at U.S. companies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Top%20American%20AI%20Execs%20Sound%20Alarm%20on%20Chinese%20Models.pdf"}, {"id": "wsj-14", "title": "Trump to China: Deal Me In", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "This opinion column argues Trump put his dealmaker reputation on the line with China. Beijing's Commerce Ministry welcomed his decision not to renew a 2020 emergency order that sanctioned nine Hong Kong and mainland officials, though sanctions on 39 others, including Chief Executive John Lee, remain. Critics call the relief a kowtow, seeing no clear return; the Hong Kong government termed it a \"positive shift.\" Mark Clifford, a Jimmy Lai biographer, called it a significant softening coming the same week as more bookseller arrests. Trump did press China to free pastor Ezra Jin and continues advocating for imprisoned newsman Jimmy Lai, the world's most famous political prisoner. The author, McGurn, is close to Lai's family.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Trump%20to%20China%20Deal%20Me%20In.pdf"}, {"id": "wsj-15", "title": "U.K.'s New Leader Andy Burnham Bets Big Government Can Save the Country", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Politics", "Energy"], "summary": "Andy Burnham, Britain's seventh prime minister in a decade, arrived at Downing Street Monday promising a bigger, more muscular state can solve economic woes and restore stability. The 56-year-old former Manchester mayor pledged to roll back 40 years of neoliberalism, devolve power to the regions, bring \"life's essentials under state control,\" and end rough sleeping. Policies under consideration include rent controls and subsidies for energy bills and bus fares; U.K. 10-year borrowing costs rose to a two-month high. Burnham replaced Keir Starmer, ousted after Labour cratered in polls behind Reform UK. He named centrist John Healey treasury chief to reassure investors. Trump urged Burnham to allow North Sea oil drilling to enrich the country.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/U.K.%E2%80%99s%20New%20Leader%20Andy%20Burnham%20Bets%20Big%20Government%20Can%20Save%20the%20Country.pdf"}, {"id": "wsj-16", "title": "USA Rare Earth Names Serra Verde CEO Moraitis to Lead Combined Company", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "USA Rare Earth named Serra Verde Group Chief Executive Thras Moraitis to lead the company after completing a $2.8 billion combination of the two mining firms. Moraitis's appointment is effective Oct. 1, succeeding Barbara Humpton, who is retiring from the company and board. The firm also named board chair Michael Blitzer executive chairman, effective immediately. USA Rare Earth agreed in April to buy Serra Verde, which owns a rare-earth mine and processing plant in Brazil, to strengthen its mine-to-magnets supply chain amid heightened U.S.-China tensions; the cash-and-stock deal is expected to close by the end of August. Humpton, previously Siemens USA CEO, helped secure public-private partnerships. Moraitis built Serra Verde into a major producer outside Asia.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/USA%20Rare%20Earth%20Names%20Serra%20Verde%20CEO%20Moraitis%20to%20Lead%20Combined%20Company.pdf"}, {"id": "wsj-17", "title": "Why AI Might Actually Help Solve the Next Labor Crisis", "source": "WSJ", "date": "22 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Fears that AI will leave too few jobs may be misplaced; the bigger challenge could be a sharp slowing in workforce entrants leading to unprecedented labor scarcity, according to demographer Steven Ruggles. He forecasts the U.S. labor force will expand by just 9.1 million over the decade ending 2030, the fewest since 1960, then contract by 2.1 million over the following decade. Rising women's participation and immigration long cushioned the decline, but both have run their course, while falling fertility since the mid-2000s means fewer young workers. Ruggles says scarcity could lift wages and workers' bargaining power. That, he argues, is where AI's productivity boost could help, though a rebound in immigration could ease the shortage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20WSJ/Why%20AI%20Might%20Actually%20Help%20Solve%20the%20Next%20Labor%20Crisis.pdf"}, {"id": "st-01", "title": "Britain's new PM Andy Burnham stamps his authority with Cabinet shake-up", "source": "ST", "date": "22 Jul 2026", "tags": ["Politics", "Society"], "summary": "New British PM Andy Burnham took power on July 20, replacing Keir Starmer and purging the Cabinet of his predecessor's loyalists while signalling a leftward tilt. Burnham, 56, the former Greater Manchester mayor nicknamed \"King of the North\", sacked Rachel Reeves and David Lammy, made John Healey finance minister, Ed Miliband foreign minister, and Wes Streeting defence minister; Angela Rayner returned. He pledged a 10-year plan to ease cost-of-living pressures, end rough sleeping, reindustrialise Britain and build public housing. Burnham held early calls with Trump and Zelensky. Installed without a leadership contest, he inherits a tepid economy, high borrowing costs and rising Reform UK support, drawing opposition calls for a snap election.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Britain's%20new%20PM%20Andy%20Burnham%20stamps%20his%20authority%20with%20Cabinet%20shake-up.pdf"}, {"id": "st-02", "title": "Ex-Hyundai robotics lead to spearhead Samsung robotics initiative", "source": "ST", "date": "22 Jul 2026", "tags": ["Technology & AI"], "summary": "Samsung Electronics said on July 21 it will set up a robotics division, RX or \"Robotics eXperience\", reporting directly to the chief executive to accelerate development and commercialisation and establish robotics as a major growth engine. The division will oversee mid- to long-term strategy, core technology and business execution while expanding research at home and overseas. Executive vice-president Lee Dong-kun, who previously led robotics strategy at Hyundai Motor Group including Boston Dynamics, will head the Robotics Strategy Team. Samsung plans research hubs in the US, China and Japan. The move builds on earlier pledges to achieve tangible humanoid robotics results in 2026 and to consider investments and acquisitions, aided by advances in physical AI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Ex-Hyundai%20robotics%20lead%20to%20spearhead%20Samsung%20robotics%20initiative.pdf"}, {"id": "st-03", "title": "Iranian forces target Bahrain and Kuwait after US hits Iran's south", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "US forces bombed southern Iran overnight after Trump warned Tehran would pay for American deaths, while Iran struck US sites in Bahrain, Kuwait and Jordan and a tanker was hit in the Strait of Hormuz. US troop deaths rose to 17. US Central Command said it struck command centres, missile and drone sites and air defences. Iran's Revolutionary Guards targeted Amazon infrastructure and a US air base in Bahrain, plus bases in Kuwait; Jordan intercepted five drones. Yemen's Houthis threatened a naval blockade on Saudi Arabia, raising energy-supply risks. A senior Iranian official said Tehran received a mediators' proposal for a 10-day ceasefire to salvage the collapsing interim deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Iranian%20forces%20target%20Bahrain%20and%20Kuwait%20after%20US%20hits%20Iran's%20south.pdf"}, {"id": "st-04", "title": "Israel watches tensely as US-Iran conflict escalates", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel has stayed on the sidelines of the escalating US-Iran clashes, but analysts question whether that will hold. Trump launched the war on Iran alongside Israel in late February, but later diverged from PM Benjamin Netanyahu, telling him to stop escalating and signing a short-lived June ceasefire against Israeli opposition. Iran has not directly bombarded Israel since, a move that would herald full-blown war. Netanyahu warned Israel would inflict \"much more powerful\" retaliation if attacked. Fighting has crept closer: on July 19 Israeli forces fired interceptors at missile debris from an Iran barrage aimed at Jordan. Facing October elections and unfinished war aims, Netanyahu weighs resuming fighting against risking ties with Washington.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Israel%20watches%20tensely%20as%20US-Iran%20conflict%20escalates.pdf"}, {"id": "st-05", "title": "Lebanese army deployed in southern town after Israeli withdrawal, official says", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Lebanese army troops began deploying in the southern town of Zawtar al-Gharbiyeh on July 21 after Israeli forces withdrew, under a US-brokered plan, a senior security official said. The plan, called the pilot zone programme, foresees Lebanese troops confiscating Hezbollah weapons and phased Israeli withdrawals; the handover is its first test. Lebanon hopes to restore control over a strip about 10km deep still occupied by Israel, where villages have been razed and infrastructure destroyed. Army engineering teams are sweeping for unexploded ordnance. Mayor Abed Ezzeddin said more than half the town was destroyed and it remains uninhabitable, questioning safety with Israeli forces nearby. President Joseph Aoun was due to meet Trump in Washington.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Lebanese%20army%20deployed%20in%20southern%20town%20after%20Israeli%20withdrawal,%20official%20says.pdf"}, {"id": "st-06", "title": "North Korea, Russia foreign ministers hold strategic talks in Moscow, says report", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics"], "summary": "North Korean Foreign Minister Choe Son Hui and Russian Foreign Minister Sergei Lavrov held their third strategic dialogue in Moscow on July 20, KCNA reported, reaching consensus on all issues discussed. Talks focused on implementing their comprehensive strategic partnership treaty signed in June 2024. Russia backed North Korean measures against \"hostile acts\", while Pyongyang voiced \"invariable support\" for Russia's policies in Ukraine. Choe met President Vladimir Putin on July 19, conveying greetings from Kim Jong Un. The two sides discussed high-level visits and diplomatic coordination. North Korea sent an estimated 14,000 troops to help Russia repel Ukraine's Kursk incursion. Analysts watch for signs of another Kim visit to Russia, as Pyongyang also deepens ties with China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/North%20Korea,%20Russia%20foreign%20ministers%20hold%20strategic%20talks%20in%20Moscow,%20says%20report.pdf"}, {"id": "st-07", "title": "S'pore professional services centre to aid regional expansion", "source": "ST", "date": "22 Jul 2026", "tags": ["Trade", "Southeast Asia"], "summary": "The Singapore Professional Services (PS) Centre, launched July 21 at ISCA House, will anchor a regional network helping home-grown companies expand across Asia. It links businesses to PS centres in Shanghai, Nanjing and Ho Chi Minh City, with Jakarta planned later in 2026 and Bangkok, Johor Bahru and Shenzhen on the cards. The centre gives access to legal, accounting, tax, HR, valuation, sustainability and consulting expertise under one roof. Existing centres have served over 700 visitors and facilitated 65-plus connections. Second Finance Minister Indranee Rajah said internationalisation is not easy and trusted professional services have a role to play. A new Business Growth Clinic will let owners bring challenges to expert panels covering expansion, AI adoption and succession.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/S'pore%20professional%20services%20centre%20to%20aid%20regional%20expansion.pdf"}, {"id": "st-08", "title": "SGX allows Singapore investors to buy Grab, Sea & SpaceX", "source": "ST", "date": "22 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Singapore Exchange on July 21 announced its first US Singapore Depository Receipts (SDRs), letting retail investors buy US-listed Grab, Sea Limited and SpaceX from July 22 through local brokerages without Wall Street's higher costs. SDRs represent fractions of foreign shares, trade in Singapore dollars during local hours, and allow a minimum of 10 lots versus 100 for other SDRs. Sea and SpaceX trade at US$107 and US$122 respectively. Officials said the aim is not new market access but adding familiar globally recognised names. Risks include forex exposure and thinner liquidity than underlying stocks. SGX's SDR business has grown over 300 per cent year-on-year; total holdings reached $280 million, over 80 per cent retail.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/SGX%20allows%20Singapore%20investors%20to%20buy%20Grab,%20Sea%20SpaceX.pdf"}, {"id": "st-09", "title": "Singapore military explores quantum computing for mission planning", "source": "ST", "date": "22 Jul 2026", "tags": ["Technology & AI", "Defence"], "summary": "Singapore's military is assessing whether quantum computers can optimise mission planning, potentially using unmanned drones to identify hostile forces. On July 21, IBM, the SAF's Digital and Intelligence Service (DIS) and the Defence Science and Technology Agency (DSTA) announced a tie-up, giving DIS and DSTA access to IBM's quantum resources and building expertise. Other applications include efficient routing of supply trucks and fuel bowsers. Commander Guo Jinghua cited national-security advantages despite the tech being nascent, noting 20 trucks across 50 location
