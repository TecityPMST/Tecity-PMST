 in global FX rankings. Doug Petno, 61, was also elevated to co-president and will run the commercial and investment bank alone, setting up a two-person race. The reshuffle resulted in the departure of Marianne Lake, long viewed as the likeliest successor. Rohrbaugh has little consumer-banking experience, having mostly worked in markets and trading.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Who%20Is%20Troy%20Rohrbaugh%20The%20Options%20Trader%20and%20Surprise%20Front-Runner%20to%20Succeed%20Jamie%20Dimon.pdf"}, {"id": "st-01", "title": "AI's next frontier? China and the US look to space in the computing race", "source": "ST", "date": "29 Jun 2026", "tags": ["Technology & AI", "Geopolitics", "Energy"], "summary": "China and the US are eyeing orbital data centres, or space computing, as a new frontier in their AI infrastructure rivalry. The field could process satellite data in orbit using solar power, easing land, electricity and water strains on Earth. Elon Musk proposed launching up to one million data-centre satellites, while China approved Beijing's first space computing innovation centre and is building its Three-Body Computing Constellation, targeting over 1,000 satellites. Nvidia plans space-specific GPUs; STAR.AI aims to launch satellites by end-2026. Analysts say the US leads in chips, launch and capital, but China sees a \"historic window\" to bypass GPU constraints. Hurdles include radiation, cooling, congestion and cost: a one-gigawatt orbital centre could cost US$170 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/AI%27s%20next%20frontier%20China%20and%20the%20US%20look%20to%20space%20in%20the%20computing%20race.pdf"}, {"id": "st-02", "title": "Asia's vendors grapple with rising costs of ever-present plastics", "source": "ST", "date": "29 Jun 2026", "tags": ["Trade", "Southeast Asia", "Energy"], "summary": "Food vendors across Asia face surging plastic costs from the energy crisis sparked by the Middle East war and the Strait of Hormuz closure. Plastics derive from ethylene, made from naphtha, an oil by-product; about 60 per cent of Asia's naphtha comes from the Gulf. Petrochemical firms in South Korea and Japan cut production amid tight supply, sending bag prices soaring. A Taipei chicken vendor said plastic bag prices jumped nearly 60 per cent; a Bangkok seller cited 30 per cent higher costs. Vendors say they have no practical alternative and dare not raise prices. Formosa Petrochemical cut its ethylene cracker rate to 35 per cent. Some firms shifted to Chinese and African suppliers to ease shortages.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/Asia%27s%20vendors%20grapple%20with%20rising%20costs%20of%20ever-present%20plastics.pdf"}, {"id": "st-03", "title": "Australia toughens kids' social media ban, doubles potential penalties for tech firms", "source": "ST", "date": "29 Jun 2026", "tags": ["Technology & AI", "Society", "Politics"], "summary": "Australia said on June 27 it will double the maximum penalty on tech firms failing to uphold its under-16 social media ban, raising it to A$99 million from A$49.5 million. It will also boost the eSafety Commissioner's powers to compel platforms to show how they block under-16 accounts. Five platforms are being investigated: Instagram, Facebook, YouTube, Snapchat and TikTok. The six-month-old ban, watched globally, has had little effect: a British Medical Journal study of 408 adolescents found 85 per cent of Australians aged 12 to 15 still used social media three months on, often by self-declaring an older age. PM Anthony Albanese said over five million under-16 accounts were deactivated. Reddit is challenging the ban on free speech grounds.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/Australia%20toughens%20kids%27%20social%20media%20ban%2C%20doubles%20potential%20penalties%20for%20tech%20firms.pdf"}, {"id": "st-04", "title": "How digital wallets are replacing pocket money", "source": "ST", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Banks and fintechs in Singapore have rolled out digital payment options for children and teens over the past five years, raising questions about whether young people can manage money this way. Without cash, youth may not feel the \"pain of paying\". Parents and advisers favour starting with physical cash, then shifting to cards as children mature. Options include Revolut and YouTrip cards, OCBC's MyOwn account, which has over 108,000 sign-ups, StanChart's FirstSaver and DBS's POSB Smart Buddy and PayLah! for Teens. Apps offer guard rails like spending limits, notifications and card locks, plus savings-goal features and incentives such as DBS Smiley Stamps. Advisers stress money conversations and that some parents still prefer cash to teach counting.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/How%20digital%20wallets%20are%20replacing%20pocket%20money.pdf"}, {"id": "st-05", "title": "Regional trade bloc CPTPP welcomes reopening of Strait of Hormuz, steps up expansion efforts", "source": "ST", "date": "29 Jun 2026", "tags": ["Trade", "Geopolitics", "Energy"], "summary": "CPTPP ministers welcomed the US-Iran agreement to reopen the Strait of Hormuz and pledged to strengthen energy supply chain resilience. In a June 26 joint statement, the 12-member bloc, including Singapore, stressed keeping sea lanes open and maintaining \"safe, unimpeded and continuous transit passage\" under international law. They reaffirmed support for free, rules-based trade in crude oil, gas, petrochemicals, plastics and fertilisers, and vowed not to impose unjustified trade restrictions. The bloc will accelerate supply chain provisions and crisis response. On expansion, it will formalise Costa Rica's accession, advance Uruguay's bid, and begin preparatory talks with the UAE, Philippines and Indonesia. A new working group will tighten rules of origin and curb circumvention and illegal transshipment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/Regional%20trade%20bloc%20CPTPP%20welcomes%20reopening%20of%20Strait%20of%20Hormuz%2C%20steps%20up%20expansion%20efforts.pdf"}, {"id": "st-06", "title": "Shenzhen's shift into robotaxis leaves drivers by the wayside", "source": "ST", "date": "29 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Shenzhen's new rules will let the government permit robotaxis from July 1, putting the tech hub at the forefront of automation but threatening hundreds of thousands of taxi and ride-hailing drivers. The city has nearly 400,000 licensed drivers on 26 platforms, and authorities warned in May the \"saturated\" market yields just over 13 fares a day. Drivers, many displaced from manufacturing, fear robotaxis from operators like Pony.ai and Baidu will steal their business. One earns 11,000 yuan monthly working 12-hour days. China has an estimated 320 million flexible workers. Pony.ai said its robotaxis aim to complement, not replace, human drivers. Analysts expect a gradual roll-out, but some drivers voiced anger, with one saying he wants to smash them.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/Shenzhen%27s%20shift%20into%20robotaxis%20leaves%20drivers%20by%20the%20wayside.pdf"}, {"id": "st-07", "title": "South Korea, Japan reaffirm pledge to denuclearise Korean peninsula", "source": "ST", "date": "29 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "The defence ministers of South Korea and Japan reaffirmed on June 28 their commitment to denuclearising the Korean peninsula, despite Pyongyang's repeated vows to expand its nuclear arsenal. South Korean Defence Minister Ahn Gyu-back met Japanese counterpart Shinjiro Koizumi in Seoul, agreeing to deepen defence cooperation. Both are US security allies, though ties have been strained by Japan's colonial rule. They pledged continued bilateral and trilateral cooperation with Washington. The meeting followed their first joint maritime search-and-rescue exercise in nine years. North Korean leader Kim Jong Un vowed to boost defences, equip his navy with nuclear weapons and build larger warships, citing South Korean and US moves. Pyongyang has called itself an \"irreversible\" nuclear state since the 2019 Hanoi summit collapsed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/South%20Korea%2C%20Japan%20reaffirm%20pledge%20to%20denuclearise%20Korean%20peninsula.pdf"}, {"id": "st-08", "title": "US strikes Iran after tanker attack", "source": "ST", "date": "29 Jun 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Iran launched missiles and drones on US military sites in Kuwait and Bahrain early on June 28, after President Donald Trump threatened to wipe out Iran's leadership unless it honoured an interim deal to end the US-Iran war. The US struck Iran hours after a Panama-flagged tanker was hit in the Strait of Hormuz, the world's most important energy route, largely cut off during the conflict. Trump warned the Islamic Republic \"will no longer exist\". The IRGC said US strikes violated the ceasefire and halt all diplomacy, and warned American bases would \"experience hell\". Kuwait intercepted two missiles; Bahrain reported building damage but no casualties. Israel separately struck Hezbollah in Lebanon. Oil prices had tumbled near pre-war levels as blockaded ships exited the strait.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20ST/US%20strikes%20Iran%20after%20tanker%20attack.pdf"}, {"id": "bt-01", "title": "Beyond the assembly line - Can Malaysia climb the semiconductor value chain?", "source": "BT", "date": "29 Jun 2026", "tags": ["Technology & AI", "Southeast Asia", "Trade"], "summary": "Malaysia, which accounts for nearly 13 per cent of the global outsourced semiconductor assembly and test (OSAT) market, faces the question of whether it can move beyond commoditised, low-margin packaging into higher-value advanced packaging. Two disruptions create an opening: geopolitical supply-chain diversification and the exhaustion of Moore's Law, which shifts performance gains toward chiplet integration. Advanced packaging commands up to 50 per cent gross margins and could reach US$80 billion by 2030. Malaysia gained engineering talent from Intel's frozen Penang Project Pelican, while Putrajaya's National Semiconductor Strategy earmarks RM25 billion and aims to train 60,000 engineers. The writer, a Vertex Ventures investor backing startup FusionAP, sets four tests for investors but warns of capital intensity and execution risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/Beyond%20the%20assembly%20line%20-%20Can%20Malaysia%20climb%20the%20semiconductor%20value%20chain.pdf"}, {"id": "bt-02", "title": "Debt, AI boom and fragilities raise global risks: BIS", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Bank for International Settlements warned in its Annual Economic Report that rising public debt, financial fragilities and the sustainability of the AI boom are increasing global risks, requiring disciplined policymaking. Inflation has picked up again, and BIS cautioned that frequent supply disruptions could entrench higher inflation expectations. General manager Pablo Hernandez de Cos called the US-Iran ceasefire and reopened Strait of Hormuz \"good news\" but said oil markets need time to normalise. BIS flagged uncertainty over AI investment durability, warning of possible overinvestment. Record-high public debt and hedge-fund-dominated sovereign markets have created a \"new sovereign-financial stability nexus.\" BIS urged policymakers to prioritise price stability, fiscal sustainability and oversight beyond banking, stressing that delay raises adjustment costs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/Debt,%20AI%20boom%20and%20fragilities%20raise%20global%20risks%20BIS.pdf"}, {"id": "bt-03", "title": "Director accumulation extends across established and newly listed counters", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets"], "summary": "Director and CEO activity stayed active over the five sessions to Jun 25, with more than 70 director interests and substantial shareholdings filed for over 30 primary-listed stocks. Directors or CEOs reported 21 acquisitions and five disposals; substantial shareholders recorded six acquisitions and two disposals. Soon Hock Enterprise chairman Tan Yeow Khoon lifted his stake to 73.32 per cent. Aspial Lifestyle chairman Koh Wee Seng, UltraGreen.ai CEO Ravinder Sajwan and JustCo CEO Kong Wan Sing all added shares. Ow Chio Kiat raised exposure across Stamford Land and Singapore Shipping. Some 28 companies bought back S$79 million in shares, led by Singtel. Lum Chang Creations also launched a S$11.4 million placement supporting its mainboard transition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/Director%20accumulation%20extends%20across%20established%20and%20newly%20listed%20counters.pdf"}, {"id": "bt-04", "title": "Europe's hunt for AI stocks leads to power suppliers and banks", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Technology & AI", "Energy"], "summary": "Investors seeking AI exposure in Europe are getting creative, targeting enablers and beneficiaries as the few chip stocks grow crowded and expensive. Tech is just 9 per cent of the Stoxx 600 versus 44 per cent for the S&P 500. Electrification and power supply are favoured trades, aided by the EU's over 800 billion euros in decarbonisation grants and Germany's 500-billion-euro package; Schneider Electric, Prysmian, Siemens Energy and ABB have surged. Banks are emerging winners, with Morgan Stanley estimating AI could lift productivity up to 50 per cent. Santander targets over one billion euros in AI value by 2028. Core plays like ASML remain crowded, prompting some to trim. Citigroup says this could be \"Europe's AI moment.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/Europe%27s%20hunt%20for%20AI%20stocks%20leads%20to%20power%20suppliers%20and%20banks.pdf"}, {"id": "bt-05", "title": "JustCo's dismal debut: Did institutional investors misjudge the company's public market value?", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Flexible workspace provider JustCo listed last month at S$0.94 but closed Jun 26 at S$0.54, some 42.6 per cent below its IPO price. The company raised S$100 million and is opening a new CBD centre at the Octagon, part of plans to grow from 54 centres in 12 cities to over 100 across 20 cities by 2029. JustCo turned profitable in 2025 with US$144.2 million revenue and US$2.7 million profit, and is backed by Frasers Property and GIC. The columnist argues the slump may reflect IPO investors misjudging its public-market value despite EQDP-funded cornerstone backers including Avanda, JP Morgan and Tecity. Other 2026 listings like UI Boustead Reit and Catalist debutants also trade underwater.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/JustCo%27s%20dismal%20debut%20Did%20institutional%20investors%20misjudge%20the%20company%27s%20public%20market%20value.pdf"}, {"id": "bt-06", "title": "More cash, not less digital - expanded cash access does not signal retreat from Singapore's payments push", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Society", "Southeast Asia"], "summary": "Singapore's move to expand cash access does not signal a retreat from becoming a cash-light society but reflects recognition that financial inclusion remains essential, observers said. Physical cash still builds consumer confidence amid rising scams and fraud. On Jun 26, DBS, OCBC, UOB and Nets pledged ATMs, branches and cashpoints within 500m of every HDB block by 2027, serving seniors. Off-premise ATMs fell about 2 per cent annually over the decade, and withdrawals dropped over 30 per cent from 2015 to 2024. Analysts cited a global rethink, with the UK, Australia and Switzerland protecting cash access. Forrester's Tom Mouhsian questioned the cost-benefit, warning of potential \"overkill,\" while authorities also enhanced the PayNow QR network.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/More%20cash,%20not%20less%20digital%20-%20expanded%20cash%20access%20does%20not%20signal%20retreat%20from%20Singapore%27s%20payments%20push.pdf"}, {"id": "bt-07", "title": "More freight, bad weather cause delays in Singapore port", "source": "BT", "date": "29 Jun 2026", "tags": ["Trade", "Southeast Asia"], "summary": "PSA Singapore reported a surge in vessel arrival volumes, attributing the cluster to regional weather disruptions in the Far East and compounding delays upstream on some east-bound routes. PSA said conditions are expected to be temporary and that it is working with customers to minimise delays. Kuehne+Nagel reported average waiting times around 1.25 days, with yard utilisation at 80 to 85 per cent, while GoComet showed delays of 1.67 days, better than the prior week. Project44 noted Singapore absorbed 2 per cent of shipments originally bound for Jebel Ali after US-Israel attacks on Iran began Feb 28. Linerlytica's Tan Hua Joo said global port congestion worsened over two weeks, sharply lifting freight rates.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/More%20freight,%20bad%20weather%20cause%20delays%20in%20Singapore%20port.pdf"}, {"id": "bt-08", "title": "Royal Group plans long-stay serviced apartment project in Claymore Road", "source": "BT", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Royal Group of Companies plans a long-stay serviced apartment project with about 100 units at 11 Claymore Road, with co-chairman Bobby Hiranandani estimating an all-in cost of S$185 million to S$190 million. That includes the S$75 million paid for the 17,974 sq ft freehold site and a S$35.2 million land betterment charge. After URA rejected a hotel, Royal Group took the SA2 long-stay option requiring a three-month minimum stay on 10-year temporary permission. The updated scheme envisages 102 two-bedroom apartments of 42 to 45 sq m across 17 floors, managed by a serviced apartment operator. Hiranandani expects demand from corporate relocations and embassies, targeting monthly rentals of S$7,500 to S$8,000, augmenting the group's prime freehold assets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/Royal%20Group%20plans%20long-stay%20serviced%20apartment%20project%20in%20Claymore%20Road.pdf"}, {"id": "bt-09", "title": "US Democrats cannot afford to ignore Mamdani and the socialist movement any longer", "source": "BT", "date": "29 Jun 2026", "tags": ["Politics", "Society"], "summary": "A slate of progressive candidates backed by New York Mayor Zohran Mamdani and the Democratic Socialists of America swept Democratic primaries on Jun 23, ousting two sitting congressmen. Brad Lander beat Dan Goldman, Darializa Avila Chevalier toppled five-term Adriano Espaillat, and DSA member Claire Valdez won easily. House Democratic leader Hakeem Jeffries campaigned against them and lost. The article traces the movement's roots from the 2008 crisis and Occupy Wall Street through Bernie Sanders and Alexandria Ocasio-Cortez, with DSA membership surging past 90,000. Mamdani, praised by both Trump and Governor Hochul, ran on rent freezes, free childcare and taxing the wealthy. The piece argues Democrats can no longer ignore a durable, rising socialist movement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20BT/US%20Democrats%20cannot%20afford%20to%20ignore%20Mamdani%20and%20the%20socialist%20movement%20any%20longer.pdf"}, {"id": "scmp-01", "title": "AI agents that provide 'economic value' are next frontier, says Meta AI research chief", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Technology & AI"], "summary": "The next AI frontier is agents performing \"economically valuable\" work across real-world domains, said Dawn Song, Meta Platforms' new AI research vice-president, speaking at Summer Davos before joining Meta's Superintelligence Labs. Song, a UC Berkeley professor and Virtue AI co-founder, helped create UC Berkeley RDI's Agents' Last Exam (ALE), a benchmark testing agents on over 1,500 tasks across 55 industries. OpenAI's GPT-5.5 with the Codex harness leads at a 24.3 per cent pass rate; Anthropic's Claude Fable 5 ranks third at 22 per cent. ByteDance's Seed2.1 Pro tops Chinese models at 19.5 per cent. On ALE's hardest tier, nearly every frontier agent scored zero, showing agents remain \"still far from human-level performance.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/AI%20agents%20that%20provide%20%E2%80%98economic%20value%E2%80%99%20are%20next%20frontier,%20says%20Meta%20AI%20research%20chief.pdf"}, {"id": "scmp-02", "title": "As AI pushes data centres to breaking point, some Chinese chipmakers bet on SiC", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "As the AI boom strains data centre power grids, some Chinese chipmakers are betting on highly efficient silicon carbide (SiC) semiconductors. Shenzhen-based Basic Semiconductor, a fully integrated SiC manufacturer founded in 2016, passed a Hong Kong listing hearing toward an IPO, joining peers Silan and China Resources Microelectronics. UBS expects Nvidia's 800V Kyber racks to give SiC and gallium nitride 10-15 per cent of power semiconductor architecture by 2027, helping absorb a currently oversupplied market. TrendForce projects China's SiC power device market could exceed US$6 billion by 2030. Basic, unprofitable with a 335 million yuan net loss in 2025, holds 2.9 per cent domestic share and faces entrenched rivals Infineon, STMicroelectronics and Wolfspeed amid fierce price wars.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/As%20AI%20pushes%20data%20centres%20to%20breaking%20point,%20some%20Chinese%20chipmakers%20bet%20on%20SiC.pdf"}, {"id": "scmp-03", "title": "As China's tech firms adapt to AI era, workers worry they'll be 'optimised' out of a job", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "China's office workers increasingly fear AI will replace their jobs, with the dreaded term youhua (\"optimisation\") now carrying a new undertone. Rumours that Meituan planned to cut up to half its product roles, though denied, struck a nerve across the tech industry, where firms from Baidu to Xiaomi have trimmed teams. The shift follows Anthropic CEO Dario Amodei's warning that AI could wipe out half of entry-level white-collar jobs within five years. Software engineers are on the front lines: Anthropic says over 80 per cent of code merged into its codebase was AI-written, and Tencent's Dowson Tong said most of the firm's code this year was AI-generated. Engineers increasingly act as supervisors guiding AI output.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/As%20China%E2%80%99s%20tech%20firms%20adapt%20to%20AI%20era,%20workers%20worry%20they%E2%80%99ll%20be%20%E2%80%98optimised%E2%80%99%20out%20of%20a%20job.pdf"}, {"id": "scmp-04", "title": "Australian energy exploration hits 10-year high as Asian gas demand surges", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Energy", "Trade"], "summary": "Energy exploration has picked up sharply in Australia, driven by growing Asian gas demand, technological advances and an improved investment climate, with the Iran war underscoring urgency. Quarterly oil and gas exploration spending in the world's No 2 LNG producer hit a 10-year high of A$471 million (US$324 million) in the March quarter. Rystad Energy expects spending to rise about 10 per cent this year to over US$1 billion, though Canberra's move requiring 20 per cent of gas be reserved for domestic use sparked industry backlash. Drilling focuses on the Otway Basin, Beetaloo shale and Taroom Trough. Santos plans three Beetaloo appraisal wells; Japan's Inpex took a stake. Climate advocates warn shale drilling could be \"very destructive.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Australian%20energy%20exploration%20hits%2010-year%20high%20as%20Asian%20gas%20demand%20surges.pdf"}, {"id": "scmp-05", "title": "Beijing is building Shanghai into a major offshore yuan centre. Should Hong Kong worry?", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Beijing's push to expand Shanghai's offshore finance role has revived debate over whether mainland China's financial hub rivals or complements Hong Kong, the long-standing centre for yuan internationalisation. Amid fears of US dollar weaponisation, policymakers question whether a single offshore centre can shoulder the yuan's global ambitions. Experts say developing multiple centres in Hong Kong, Shanghai or Singapore is a \"smart move\" aimed at internationalisation rather than diminishing Hong Kong. At this month's Lujiazui Forum, regulators unveiled a blueprint expanding Shanghai's offshore capabilities, including a pilot for offshore yuan FX trading in its free-trade zone. Analysts say Shanghai has so far made only limited inroads into Hong Kong's dominance, but rivalry concerns persist.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Beijing%20is%20building%20Shanghai%20into%20a%20major%20offshore%20yuan%20centre.%20Should%20Hong%20Kong%20worry.pdf"}, {"id": "scmp-06", "title": "Beijing's handover anniversary policy gift to Hong Kong? It could be a 'Reit Connect'", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets"], "summary": "As Hong Kong marks the 29th handover anniversary, its finance sector again watches for policy \"gifts\" from Beijing, with anticipation centring on including real estate investment trusts (Reits) in the cross-border connect programme. Past July 1 anniversaries delivered finance measures spanning offshore yuan, overseas IPOs and ETF trading expansion. Deloitte's Edward Au projected the Reit Connect switch could flip in coming quarters, stretching into early 2027. The inclusion could inject fresh liquidity into Hong Kong's 21-year-old Reit market, though structural challenges remain. The connect programme began in 2014 with Stock Connect and expanded to bonds, ETFs and wealth products. HKEX CEO Bonnie Chan said the bourse was preparing for the long-discussed measure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Beijing%E2%80%99s%20handover%20anniversary%20policy%20gift%20to%20Hong%20Kong%20It%20could%20be%20a%20%E2%80%98Reit%20Connect%E2%80%99.pdf"}, {"id": "scmp-07", "title": "China fires up world's biggest superconducting magnet for nuclear fusion project", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "The world's biggest superconducting magnet for a nuclear fusion reactor has passed final tests as part of China's CRAFT \"artificial sun\" project, eclipsing international benchmarks. Achieved by the Institute of Plasma Physics under the Chinese Academy of Sciences, the assembly comprises a toroidal-field magnet acting as a magnetic cage and a central solenoid serving as igniter. The Comprehensive Research Facility for Fusion Technology aims to confine plasma hotter than 100 million degrees Celsius. At 21 metres long and weighing 582 tonnes, the toroidal-field magnet has 1.3 times the volume and triple the energy storage of its ITER counterpart in France. Director Song Yuntao said the coil took six years to build, with its steel, insulation and superconducting wires all made in China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%20fires%20up%20world%E2%80%99s%20biggest%20superconducting%20magnet%20for%20nuclear%20fusion%20project.pdf"}, {"id": "scmp-08", "title": "China leads in GPS-style, reconnaissance and anti-satellite abilities, US report says", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Defence", "Geopolitics", "Technology & AI"], "summary": "China has leapfrogged the United States in GPS-style navigation, satellite reconnaissance and anti-satellite weaponry, according to a report from the Washington-based Information Technology and Innovation Foundation. The report warns that without decisive US action, China could claim the top spot in a global space economy projected to exceed US$1 trillion within a decade. China has surpassed Russia as America's main space competitor, building a robust commercial sector under strong state backing. The US retains a clear lead in low Earth orbit broadband via SpaceX's Starlink and Amazon's Project Kuiper, while China leads in positioning via BeiDou and in remote sensing via Gaofen and Jilin-1 constellations. Most capabilities are dual-use, with militaries relying heavily on them.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%20leads%20in%20GPS-style,%20reconnaissance%20and%20anti-satellite%20abilities,%20US%20report%20says.pdf"}, {"id": "scmp-09", "title": "China removes 6 generals from legislature as military anti-corruption drive continues", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Politics", "Defence"], "summary": "China removed six senior PLA officers from its top legislative body, signalling President Xi Jinping's military anti-corruption campaign is not slowing. A late-night notice from the National People's Congress Standing Committee said 13 legislature members were removed and one resigned, including a former top financial regulator and the former Xinjiang Communist Party chief. The dismissed commanders included General Xu Xueqiang from the Equipment Development Department, who missed an October party meeting, and Lieutenant General Yin Hongxing of the Tibet Military Command. Others removed were from the Western Theatre Command, air force and cyberspace force. Of seven Central Military Commission members named in 2022, only Xi and anti-corruption chief Zhang Shengmin remain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%20removes%206%20generals%20from%20legislature%20as%20military%20anti-corruption%20drive%20continues.pdf"}, {"id": "scmp-10", "title": "China to generate 50% of electricity from nuclear and non-fossil sources by 2030", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Energy", "Environment", "Politics"], "summary": "China unveiled a five-year plan to generate half its electricity from nuclear and other non-fossil sources by 2030, with recent oil shocks strengthening Beijing's resolve to balance decarbonisation with securing future demand, including for AI. Announced by the National Energy Administration and NDRC, the plan also markedly increases wind and solar's share of new capacity. Total annual energy production capacity will rise to a sum equivalent to 5.8 billion tonnes in 2030, with related investment exceeding 20 trillion yuan (US$2.9 trillion). China will continue coastal nuclear construction targeting 110 million kilowatts of installed capacity by 2030, focusing on third-generation reactors, and pursue controlled nuclear fusion. The plan promotes \"two-way empowerment\" between AI and energy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%20to%20generate%2050%25%20of%20electricity%20from%20nuclear%20and%20non-fossil%20sources%20by%202030.pdf"}, {"id": "scmp-11", "title": "China's big trucks go electric and abroad as subsidies help pave road to net-zero freight", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Trade", "Energy", "Southeast Asia"], "summary": "Domestic makers of heavy-duty trucks are emerging as beneficiaries of accelerating electrification on China's roads, with technological gains and lower ownership costs bolstering overseas sales. Southeast Asia and Africa, where Chinese makers have established assembly hubs, are expected to be new growth engines for firms from FAW Jiefang to Foton, according to S&P Global Ratings. Chinese truck makers reported a 33 per cent year-on-year jump in overseas sales in the first quarter of 2026, topping 100,000 units. Aided by battery advances and subsidies, owning a pure electric heavy-duty truck nears cost parity with diesel at about 500,000 yuan after subsidies. China's Ministry of Transport targets 40 per cent electric heavy-truck penetration by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%E2%80%99s%20big%20trucks%20go%20electric%20and%20abroad%20as%20subsidies%20help%20pave%20road%20to%20net-zero%20freight.pdf"}, {"id": "scmp-12", "title": "China's first AI-powered cancer vaccine production line set to launch in Beijing", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "China has broken ground on what developers call the country's first production line for AI-assisted personalised tumour vaccines. By October, Beijing-based Likang Life Sciences expects to complete a drug research and manufacturing centre in the Beijing Economic and Technological Development Zone, with about 110 million yuan (US$16.1 million) invested. The facility will produce LK101, a personalised cancer vaccine analysing each patient's tumour DNA to pinpoint genetic mutations; with AI the procedure could be completed in a day. The project reflects a global pharmaceutical shift toward AI, with Bank of America projecting the global AI healthcare market could exceed US$1 trillion by 2035. Cancer is China's second-leading cause of death, with about 5.15 million new cases in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/China%E2%80%99s%20first%20AI-powered%20cancer%20vaccine%20production%20line%20set%20to%20launch%20in%20Beijing.pdf"}, {"id": "scmp-13", "title": "China adds 20 Japanese entities to export control list over remilitarisation concerns", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Geopolitics", "Trade", "Defence"], "summary": "China's Ministry of Commerce said it added 20 Japanese entities \"involved in enhancing Japan's military capabilities\" to an export control list, citing Japan's \"remilitarisation\" and attempts to \"acquire nuclear weapons.\" Twenty more entities were added to a watch list. The ministry said the move safeguards national security and fulfils non-proliferation obligations, targeting only dual-use items and a \"small number\" of entities. The list includes Japan's National Institute for Defense Studies, military research institutes, units of Mitsubishi Electric and Mitsubishi Heavy Industries, and Kawasaki subsidiary NIPPI Corporation. China added 20 Japanese entities in February too. Beijing condemned Japan's first \"offensive missile\" test overseas in eight decades, warning Tokyo's \"neo-militarism\" threatened regional stability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/DevelopingChina%20adds%2020%20Japanese%20entities%20to%20export%20control%20list%20over%20remilitarisation%20concerns.pdf"}, {"id": "scmp-14", "title": "EU confronts 'China shock' ahead of pivotal Brussels trade talks", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Trade", "Geopolitics", "Finance & Markets"], "summary": "EU leaders face renewed urgency over China policy after Volkswagen reportedly planned up to 100,000 job cuts amid cutthroat Chinese competition. At a Brussels summit, the bloc's 27 leaders instructed the European Commission to accelerate efforts against a damaging surge in Chinese shipments while ramping up engagement. Trade chief Maros Sefcovic prepared to welcome Chinese Commerce Minister Wang Wentao, with both sides launching a new trade and investment consultation platform. One senior source said: \"China's economic model, driven by overcapacity, will not change.\" SCMP calculations show the EU's trade deficit with China widened 15 per cent year on year in May, with Germany's deficit up 31.6 per cent. Chancellor Merz accused China of \"flooding markets.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/EU%20confronts%20%E2%80%98China%20shock%E2%80%99%20ahead%20of%20pivotal%20Brussels%20trade%20talks.pdf"}, {"id": "scmp-15", "title": "Global hydropower outlook report puts China at the head of the pack", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Energy", "Environment"], "summary": "China is cementing its dominance in global hydropower, highlighted by the Yarlung Tsangpo project, expected to be the world's largest, and a massive pipeline of pumped storage facilities. The International Hydropower Association said the Tibet project, with estimated annual output of 300,000 gigawatt-hours, could generate roughly three times as much electricity as the Three Gorges Dam, targeting 60 gigawatts of installed capacity. IHA president Malcolm Turnbull noted megaprojects face immense hurdles and long timelines. Costing 1.2 trillion yuan (US$176.4 billion), construction began last July, sparking geopolitical concerns for downstream India, where the river is known as the Brahmaputra. China has over 300GW of hydropower under construction, including 217.5GW of pumped storage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Global%20hydropower%20outlook%20report%20puts%20China%20at%20the%20head%20of%20the%20pack.pdf"}, {"id": "scmp-16", "title": "Hong Kong can drive 'China Opportunity 2.0' push for global growth: Paul Chan", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Politics", "Trade"], "summary": "Hong Kong is uniquely positioned to add value to Beijing's \"China Opportunity 2.0\" narrative, serving as a bridge for the global expansion of mainland enterprises, the city's finance chief said. Financial Secretary Paul Chan Mo-po also identified the Northern Metropolis megaproject as a destination empowering mainland firms to commercialise research outcomes. At Summer Davos in Dalian, Premier Li Qiang first raised \"China Opportunity 2.0\", reframed from the Western term \"China Shock 2.0\", arguing China's technological advancement represents an opportunity rather than a shock to the world. Chan said Hong Kong is a \"super converter\" of standards between innovation and international markets, and a \"super adapter\" alongside its roles as superconnector and super value-adder under \"one country, two systems.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Hong%20Kong%20can%20drive%20%E2%80%98China%20Opportunity%202.0%E2%80%99%20push%20for%20global%20growth%20Paul%20Chan.pdf"}, {"id": "scmp-17", "title": "How is China shaping up in the global competition to sell air defence weapons?", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Defence", "Geopolitics", "Trade"], "summary": "Chinese firms joined global competitors at Eurosatory, the recently concluded arms fair, where air defences took centre stage in a market made more important by drone warfare in Ukraine and the Middle East. Experts said China could anticipate sales from the Global South thanks to cost efficiency, but geopolitical constraints would bar it from US-allied countries seeking combat-proven, interoperable systems. China's largest ground-arms maker Norinco showcased its Sky Dragon 100 and Yitian II surface-to-air missiles plus anti-drone solutions. The HQ-9 long-range missile has reportedly sold to Azerbaijan, Egypt, Pakistan and others, while Serbia operates the FK-3. Rivals Lockheed Martin displayed THAAD and PAC-3, and European venture Eurosam showed the SAMP/T NG.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/How%20is%20China%20shaping%20up%20in%20the%20global%20competition%20to%20sell%20air%20defence%20weapons.pdf"}, {"id": "scmp-18", "title": "How the AI boom exposes investors to risk, while a downturn could see a sharp crash: BIS", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Bank for International Settlements warned that an AI downturn could develop into a sharper, faster crash than a traditional banking crisis, as funding increasingly flows through loosely regulated non-bank channels. In its annual economic report, the BIS said AI funding is channelled through hedge funds, private credit vehicles and other intermediaries operating with less oversight, creating blind spots. Asia-Pacific representative Zhang Tao warned a correction could spread faster than previous banking crises. Investor enthusiasm has reached records: SpaceX's listing raised US$86 billion, while OpenAI and Anthropic were expected to follow. South Korea's Kospi swung from a record high to a nearly 10 per cent crash. The five largest hyperscalers are spending beyond earnings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/How%20the%20AI%20boom%20exposes%20investors%20to%20risk,%20while%20a%20downturn%20could%20see%20a%20sharp%20crash%20BIS.pdf"}, {"id": "scmp-19", "title": "Iran survived 3 months of war. Can it survive the aftermath?", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Three months of war with the United States and Israel may not have broken Iran's resistance, but its economy has been brought to its knees. Forty days of bombing targeting energy grids, steel mills, ports and transport, followed by a two-month US naval blockade, drove the damage bill to an estimated US$270 billion against a 2025 GDP of US$371 billion. With negotiators convening in Switzerland and a fragile ceasefire holding, the question is whether economic ruin can succeed where sanctions could not. A first round of talks yielded a 60-day sanctions waiver on oil exports and unfreezing of US$12-24 billion in seized earnings. UNDP simulations project real GDP growth falling 8.8 to 10.4 percentage points relative to a no-war baseline.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Iran%20survived%203%20months%20of%20war.%20Can%20it%20survive%20the%20aftermath.pdf"}, {"id": "scmp-20", "title": "Iran warns ships not to bypass its chosen Hormuz route as interim deal tested", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran's top diplomat warned that any attempt by ships to bypass its preferred route through the Strait of Hormuz would \"increase tensions\" in the Middle East, as US and Iranian forces again traded attacks. The exchanges underscored the fragility of a Pakistan-brokered agreement aimed at ending the war launched by the US and Israel in February. Tehran was angered by Oman's announcement of an alternative route hugging the Omani shoreline. Iran insists on controlling passage through the strait, through which a fifth of the world's oil and LNG travel. US Central Command said it attacked 10 Iranian military targets over \"continued Iranian aggression against commercial shipping\"; Iran said it retaliated against US bases in Kuwait and Bahrain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Iran%20warns%20ships%20not%20to%20bypass%20its%20chosen%20Hormuz%20route%20as%20interim%20deal%20tested.pdf"}, {"id": "scmp-21", "title": "Open Questions: Economist Richard Koo on China and Japan's shared 'battle against time'", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Nomura Research Institute chief economist Richard Koo, known for his \"balance sheet recession\" interpretation of Japan's 1990s downfall, assesses risks facing China's economy and parallels with Tokyo. Koo argues China's reported 5 per cent GDP growth seems optimistic, reflecting only the production side while expenditure and consumption lag. He watches China's 10-year government bond yield, about 1.7 to 1.8 per cent, calling it a \"ridiculously low rate\" signalling that many are paying down debt rather than borrowing, with banks left lending mainly to the government. Japan's yield similarly fell from 8 per cent in 1990 to 1.7 per cent by 1997. Koo warns market size and technology alone may not avert a Japan-like fate, and that giving consumers money will not help.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Open%20QuestionsEconomist%20Richard%20Koo%20on%20China%20and%20Japan%E2%80%99s%20shared%20%E2%80%98battle%20against%20time%E2%80%99.pdf"}, {"id": "scmp-22", "title": "Pakistan rattles India with new Chinese-built stealth submarine", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Half a century after a bruising naval defeat, Pakistan is signalling it can again challenge India on its eastern flank with a new Chinese-built stealth submarine. PNS Hangor, the first of a class of eight attack submarines, four built in China and the rest in Pakistan, arrived in Karachi on June 11. Escort commander Commodore Omer Farooq declared it a \"game changer\" capable of operating deep into what India considers its maritime backyard, raising eyebrows in New Delhi. The Hangor class features air-independent propulsion, letting it remain submerged for weeks, making it stealthier than the ageing Agosta vessels it replaces. Pakistan has not maintained a meaningful naval presence east of India since its 1971 defeat that helped create Bangladesh.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Pakistan%20rattles%20India%20with%20new%20Chinese-built%20stealth%20submarine.pdf"}, {"id": "scmp-23", "title": "Sovereign investors with US$29 trillion pivot to energy assets, flag dollar fears", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Sovereign wealth funds and central banks managing US$29 trillion are turning to energy assets and raising concerns about the dollar in a portfolio reassessment driven by geopolitical shifts, according to a survey by Invesco. The poll of 90 sovereign wealth funds and 54 central banks showed increasing focus on diversification and resilient portfolios amid tariffs, closed shipping channels and wars in Ukraine and the Middle East. Some 80 per cent said energy security and transition infrastructure were the most credible resilience investments, with the AI infrastructure race adding appeal. Concerns about the dollar were \"widespread and deepening\": 61 per cent of central banks said US debt levels negatively impact the dollar's reserve status, up from 20 per cent in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Sovereign%20investors%20with%20US%2429%20trillion%20pivot%20to%20energy%20assets,%20flag%20dollar%20fears.pdf"}, {"id": "scmp-24", "title": "Trump threatens 100% tariff on countries that impose digital services tax", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Trade", "Technology & AI", "Geopolitics"], "summary": "US President Donald Trump threatened a 100 per cent tax on imports from any country that imposed a tax on digital services from American companies. In a social media post, Trump took aim at European countries he said were discussing \"imminent\" implementation of taxes on US firms, vowing any such country would \"immediately be met with a 100% TARIFF.\" He added the penalty would supersede previously negotiated trade deals. The threat comes ahead of Trump's July 4 deadline for the EU and US to start implementing a tariff deal capping most EU export tariffs at 15 per cent. Digital taxes were not part of that agreement and remain a sticking point. It was unclear how Trump would enact the threat.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Trump%20threatens%20100%25%20tariff%20on%20countries%20that%20impose%20digital%20services%20tax.pdf"}, {"id": "scmp-25", "title": "UK's likely next prime minister Burnham to unveil plan to shift power from London", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Politics"], "summary": "Andy Burnham, the Labour lawmaker expected to replace Keir Starmer as British prime minister, will outline his vision Monday, promising to shift power from London to the regions. Burnham, who returned to Westminster this month after winning a parliamentary seat, is the only declared candidate and could be installed within weeks after Starmer announced he would step down amid sinking popularity. The former Greater Manchester mayor, dubbed \"King of the North\", will make devolving power his flagship proposal, alongside a 10-year mission to raise living standards through re-industrialisation, housing and infrastructure. If he takes office, Burnham would be Britain's seventh prime minister in a decade, with Britain's economy struggling from the Ukraine war and the Iran energy shock.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/UK%E2%80%99s%20likely%20next%20prime%20minister%20Burnham%20to%20unveil%20plan%20to%20shift%20power%20from%20London.pdf"}, {"id": "scmp-26", "title": "Ukraine drones ignite Russian refinery as Putin acknowledges fuel shortages", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Ukraine kept up its heavy drone assault on Russia, setting fire to a major southern oil refinery, as President Vladimir Putin acknowledged for the first time that the country faced a \"certain deficit\" of fuel and vowed to strengthen oil-facility protection. Ukraine has stepped up long-range attacks on Russian military industries and energy facilities to cut Moscow's war revenue, now in its fifth year. President Zelensky called the strikes \"long-range sanctions.\" The campaign has choked fuel supplies, causing shortages, long petrol-station queues and rationing across regions. Putin said Ukraine proposed halting deep strikes and offered to limit fighting to four annexed regions, Donetsk, Luhansk, Kherson and Zaporizhzhia, but he rejected the proposal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Ukraine%20drones%20ignite%20Russian%20refinery%20as%20Putin%20acknowledges%20fuel%20shortages.pdf"}, {"id": "scmp-27", "title": "Why Chinese exporters and shipping firms remain wary despite the US-Iran peace deal", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Trade", "Geopolitics", "Energy"], "summary": "Despite a temporary US-Iran ceasefire, uncertainty continues to cast a shadow over Chinese businesses across the Gulf region, with many traders reluctant to make long-term commitments. The interim accord included a 60-day ceasefire, an oil-export waiver and the reopening of the Strait of Hormuz, plus a framework to negotiate a broader deal. For businessman Abbas Shi, the immediate priority is clearing a backlog of orders rather than new business, with shipping through Hormuz still not resumed. Firms have been forced onto rail freight, where freight rates have climbed to nearly US$9,000 per container amid no capacity left in June. Shi remained sceptical Trump would follow through, saying \"it feels like all three sides are putting on a show.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Why%20Chinese%20exporters%20and%20shipping%20firms%20remain%20wary%20despite%20the%20US-Iran%20peace%20deal.pdf"}, {"id": "scmp-28", "title": "Why brokers believe China's AI-driven stock run will find fresh legs", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Chinese stocks may extend gains in the second half as resilient exports and recovering producer prices support growth while high-oil-price disruption fades, according to brokerages at home and abroad. Guosen Securities sees average full-year earnings growth accelerating to 10 per cent, with households potentially channelling 2 trillion yuan (US$294 billion) into equities. HSBC said the CSI 300 would close 2026 at 5,400, an 11 per cent gain, while Morgan Stanley predicted a 27 per cent gain in the MSCI China Index through mid-2027. The CSI 300 has risen about 5 per cent this year, with AI chipmakers and optical-module producers driving gains; a Shanghai tech-board gauge jumped over 50 per cent. HSBC said the run could broaden beyond technology.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Why%20brokers%20believe%20China%E2%80%99s%20AI-driven%20stock%20run%20will%20find%20fresh%20legs.pdf"}, {"id": "scmp-29", "title": "Why the Trump-Xi relationship may be the weakest link in US-China ties", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "As the summit between Xi Jinping and Donald Trump fades, marked by anaemic deliverables and poor transparency, analysts warn the world's most consequential relationship has become inordinately dependent on the two leaders' personal rapport. Trump's May China trip, the first by a US president in nearly a decade, produced vague, contradictory readouts, underwhelming deals and no communique, failing to address deep structural problems. Georgetown's Evan Medeiros said \"Donald Trump runs China policy\" and would be \"the China desk officer\" for the rest of 2026. Analysts say Trump's turbulent style provides a rickety structure for stability, and that he has centralised decision-making while eliminating US departments versed in China's complex system, leaving shrinking institutional channels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Why%20the%20Trump-Xi%20relationship%20may%20be%20the%20weakest%20link%20in%20US-China%20ties.pdf"}, {"id": "scmp-30", "title": "Will China's new northern tech bases in Hebei and Tianjin spark local housing demand?", "source": "SCMP", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Technology & AI", "Society"], "summary": "Chinese technology companies establishing new headquarters in northern cities around Beijing are expected to boost local rental demand, but analysts say home sales growth will be far milder than past surges. Local governments hoping AI or chip firms would lift slumping property markets are likely to be disappointed. E-commerce firm Pinduoduo signed a June 21 agreement to move into an industrial park in Xiongan New Area in Hebei, its first property acquisition, and launched a drive to hire over 5,000 employees. Fitch's Lulu Shi said the link between corporate investment and home purchases appears weaker than in the past, with incoming staff more likely to rent first. China's property sector has remained sluggish since late 2020, eroding household wealth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20SCMP/Will%20China%E2%80%99s%20new%20northern%20tech%20bases%20in%20Hebei%20and%20Tianjin%20spark%20local%20housing%20demand.pdf"}]}, "2026-06-30": {"date": "2026-06-30", "dayOfWeek": "Tuesday", "totalArticles": 56, "sourceCounts": {"WSJ": 15, "ST": 10, "BT": 14, "SCMP": 17}, "executiveDigest": "The US and Iran step back from the brink, agreeing to halt fighting over the Strait of Hormuz and meet in Doha, as oil steadies near US$72; South Korea unveils a US$576 billion Samsung/SK Hynix push to cement its AI-chip lead, WSJ reports China has matched Anthropic on cybersecurity AI, and record US margin debt of US$1.4 trillion underlines how leverage is lifting markets to risky heights.", "briefingCards": [{"title": "Lead story - US-Iran step back from the brink", "body": "After a weekend of strikes, the US and Iran agreed to halt fighting around the Strait of Hormuz and resume talks in Doha on June 30, with Trump sending envoy Steve Witkoff and Jared Kushner to focus on the waterway rather than the wider nuclear file. Brent crude steadied near US$72 as President Pezeshkian said US$6 billion of frozen assets in Qatar would be released, calling the accord 'a great victory'. Iran's foreign minister still asserted sole authority over the strait, clashing with US demands for unimpeded navigation - leaving the June 17 memorandum intact but fragile."}, {"title": "Markets & finance", "body": "WSJ flagged a leverage warning: US margin debt jumped 54% to a record US$1.4 trillion in May, and high-risk leveraged ETFs nearly doubled to a record US$220 billion - a Direxion 3X semiconductor fund soared ~700% before plunging 31% in a day. Chip makers are capturing AI's profits at others' expense: Micron lifted DRAM prices over 60% in a quarter (NAND over 80%), with memory names up ~290% this year while hyperscalers Microsoft and Meta fell. CEO pay hit records, and private-equity managers are collecting big fees on paper gains."}, {"title": "Asia realignment", "body": "China deepened its row with Japan, blacklisting 20 more Japanese organisations - including Mitsubishi Electric Defence and Space and the National Institute for Defence Studies - over alleged military uses, which Tokyo called 'unacceptable'. Tensions trace to PM Takaichi's suggestion Japan might respond militarily to an attack on Taiwan. Japan and South Korea both criticised joint Chinese-Russian bomber flights, Japan is tapping Ukraine's experience to catch up on drone warfare, and Australia and Vanuatu signed a deal barring foreign military bases on the Pacific island."}, {"title": "Energy & climate", "body": "Oil steadied near US$72 on renewed US-Iran diplomacy after the Hormuz flare-up. China said surging tech and AI demand is complicating energy-demand forecasts, days after pledging 50% non-fossil power by 2030, while a study found its EV boom is driven by local governments rather than Beijing's industrial policy. Europe debated whether a single energy market is wise, and scorched by a heatwave, the continent scrambled for relief - lifting Chinese cooling and e-commerce giants' sales. China also opened new Central Asia rail links to hedge shipping risk."}, {"title": "Technology & AI", "body": "The US-China AI race reset: WSJ reported Zhipu AI's open-weight GLM-5.2 bested Anthropic's Claude Opus 4.8 on some cybersecurity benchmarks, and 360's new bug-finder rivals Anthropic's Mythos - its CEO warning such capability can't 'remain solely in American hands'. South Korea unveiled a US$576 billion (S$745 billion) Samsung/SK Hynix plan to cement its chip lead (shares fell on the news), China's toolmakers consolidated into national champions to defy US curbs, and the US FCC widened its import ban on older Huawei and ZTE gear. The EU moved to bring AWS and Azure under the Digital Markets Act."}, {"title": "Singapore & SEA focus", "body": "Singapore-linked AI infrastructure scaled up: DayOne will build a 360-megawatt Nvidia AI Factory campus in Batam (live Q1 2027) with Australia's Firmus, an Nvidia deal worth up to US$30 billion, and JPMorgan added the Singapore dollar to its Kinexys blockchain network for 24/7 tokenised corporate FX. An NUS survey suggested Singapore's private housing is 'structurally decoupling' from the HDB market as buyer pools diverge, while Freehold Balestier Centre went up for collective sale at S$180 million. Three in four S-Reits are preparing for sustainability-assurance readiness, and the ringgit is seen sliding further versus the Singdollar."}], "keyMetrics": [{"value": "56", "label": "Articles curated today", "sub": "WSJ 15 · ST 10 · BT 14 · SCMP 17"}, {"value": "Doha talks", "label": "US-Iran de-escalate", "sub": "Fighting halted; oil near US$72"}, {"value": "US$576b", "label": "South Korea chip plan", "sub": "Samsung, SK Hynix anchor AI push"}, {"value": "US$1.4t", "label": "US margin debt", "sub": "Record; leverage lifts markets"}, {"value": "+60%", "label": "Micron DRAM prices", "sub": "Chip makers capture AI profits"}, {"value": "US$30b", "label": "Batam AI data centre", "sub": "DayOne, Firmus, Nvidia off Singapore"}], "articles": [{"id": "wsj-01", "title": "A $55 Billion Safety Net? Government Tab to Prop Up American Farms Is Rising", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Politics", "Trade"], "summary": "The USDA earlier this year estimated direct payments to U.S. farmers would hit $44 billion in 2026, over a quarter of projected net farm income. On Wednesday, President Trump asked Congress for $11 billion more, largely to offset effects of the war with Iran, which could push payments to a record. Government support has grown over the past decade via trade-war payouts, Covid relief and low-price checks. Net farm income was estimated at $153.4 billion before the new aid. Economist Scott Irwin said, \"We've become really addicted to these ad hoc payments.\" Critics including analyst Susan Stroud warn aid keeps inefficient farmers planting beyond market need. Corn and soybean growers face a grain glut depressing prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/A%20%2455%20Billion%20Safety%20Net%20Government%20Tab%20to%20Prop%20Up%20American%20Farms%20Is%20Rising.pdf"}, {"id": "wsj-02", "title": "A Rising Star's Abrupt Fall Shows Xi's Crackdown on Overambitious Officials", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Jiang Duntao rose fast after becoming Communist Party chief of Zibo, China, in 2019, pivoting the local economy toward higher-end manufacturing while raising debt. The party expelled him in April, calling him \"eager for quick success, and acted blindly and recklessly.\" As China's economy slows, Xi Jinping is cracking down on officials who chase flashy projects; in February Xi warned such practices \"exhaust the people and drain the treasury.\" Authorities punished nearly 160,000 people last year for policy inaction, recklessness or deceit. Cases included a vice mayor who approved titanium plants with billions in deals, less than 7% of which materialized, and Leiyang officials who inflated a stroller industrial park's tenant count. A new indoctrination campaign features seminars and confessions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/A%20Rising%20Star%E2%80%99s%20Abrupt%20Fall%20Shows%20Xi%E2%80%99s%20Crackdown%20on%20Overambitious%20Officials.pdf"}, {"id": "wsj-03", "title": "Amazon, Microsoft's Cloud Services Should Fall Under DMA, EU Says", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The European Commission said Thursday that Amazon Web Services and Microsoft Azure should be designated gatekeepers for cloud computing under the Digital Markets Act, requiring extra steps to avoid stifling competition. EU officials said AWS and Azure had revenue, operations and investments significantly outpacing rivals, plus vast user bases, and that AI tools and partnerships were fueling cloud demand retained within their ecosystems. EVP Henna Virkkunen cited their \"central role in Europe's digital future.\" The findings are preliminary; the companies can review documents and respond, and if designated would have six months to comply. AWS and Microsoft pushed back, citing healthy competition. The EU launched the probe in November. Noncompliance can draw fines up to 10% of global revenue, 20% for repeat infringements.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Amazon,%20Microsoft%E2%80%99s%20Cloud%20Services%20Should%20Fall%20Under%20DMA,%20EU%20Says.pdf"}, {"id": "wsj-04", "title": "CEOs Are Pulling In Record Pay. Here Are Some Big Numbers.", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Chief-executive pay keeps hitting new highs, beyond Elon Musk's multibillion-dollar Tesla package. CEOs making over $100 million hit a four-year high in 2025, and nearly a dozen passed $200 million, per the WSJ's annual ranking based on MyLogIQ data. The ranking includes 392 S&P 500 CEOs whose collective pay reached $9.9 billion excluding Musk's $158 billion package. Shankh Mitra of Welltower was 2025's highest-paid CEO after Musk at $821 million, versus a $124,995 median employee. The smallest package, $1, went to Block's Jack Dorsey. Warren Buffett's pay went almost entirely to security beyond a $100,000 salary. Banks had the lowest median CEO pay; media and entertainment the highest at $53.2 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/CEOs%20Are%20Pulling%20In%20Record%20Pay.%20Here%20Are%20Some%20Big%20Numbers..pdf"}, {"id": "wsj-05", "title": "China Has Matched Anthropic in Cybersecurity, Resetting AI Race", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Chinese AI systems have matched Anthropic's model Mythos in some cybersecurity scenarios, pressuring the White House amid its AI-policy overhaul. Researchers said Zhipu AI's (Z.ai) new open-weight model GLM-5.2, ranked among OpenRouter's 10 most-used, bested Anthropic's Claude Opus 4.8 in some Semgrep benchmarks for finding security bugs. On Wednesday, 360 Security Technology released a bug-finding tool, Tulongfeng, it called comparable to Mythos; CEO Zhou Hongyi said such \"powerful weapon\" capability can't \"remain solely in American hands.\" OpenAI limited access to GPT-5.6 over security concerns, and the Trump administration restricted foreign use of an Anthropic model, later restoring some access to Mythos 5. Critics called the moves counterproductive given continued AI-chip exports to China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/China%20Has%20Matched%20Anthropic%20in%20Cybersecurity,%20Resetting%20AI%20Race.pdf"}, {"id": "wsj-06", "title": "China Sharpens Tools for Hitting Back at Foreign Sanctions", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "China is preparing new legal tools to retaliate against foreign economic pressure, raising risks for foreign businesses. Senior lawmakers in Beijing this week reviewed a bill on \"procuratorial public-interest litigation\" that would let state prosecutors sue foreign organizations and individuals deemed to damage China's interests. The draft passed its second reading at a session ending Friday; a third reading could come by year-end. Beijing hasn't specified which acts would be covered. The measure adds to mechanisms countering foreign sanctions, building on a 2021 antiforeign sanctions law. Defendants may face compensation orders, criminal penalties and exit bans. AmCham China, representing over 800 companies, said members \"will be closely watching how the law is implemented.\" Trivium China called it another counter-sanctions tool.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/China%20Sharpens%20Tools%20for%20Hitting%20Back%20at%20Foreign%20Sanctions.pdf"}, {"id": "wsj-07", "title": "Chip Makers Are Profiting Off AI at the Expense of Just About Everyone Else", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Micron Technology's profit surge marks a massive cash transfer from AI providers to memory-chip makers, columnist James Mackintosh argues. In the quarter ending May 28, Micron raised DRAM prices more than 60% over the prior three months while shipments rose only a low single-digit percentage; NAND flash jumped over 80%. Customers paid $18 billion more in the quarter alone, with prices quadrupling in a year. Apple raised MacBook prices over 15%. AI firms like OpenAI and Anthropic absorb costs rather than pass them on, deepening losses or forcing higher token prices. This year Micron and SK Hynix shares rose about 290% and Samsung 166%, while hyperscalers Microsoft and Meta fell, signaling profits shifting down the AI stack.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Chip%20Makers%20Are%20Profiting%20Off%20AI%20at%20the%20Expense%20of%20Just%20About%20Everyone%20Else.pdf"}, {"id": "wsj-08", "title": "How Some Private-Equity Managers Collect Big Fees on Paper Gains", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Finance & Markets"], "summary": "Some private-equity funds catering to wealthy individuals charge large performance fees on unrealized paper gains before profits are locked in. StepStone Private Venture and Growth Fund, or Spring, posted a 43% return for the fiscal year ended March 31, with net unrealized gains of $1.87 billion versus just $3 million in realized gains at the $6.5 billion fund. Spring accrued $271.3 million in incentive fees plus $56.8 million in management fees; StepStone said $185 million was actually paid for calendar 2025, nearly 4% of net assets. A related compensation liability tripled to about $2.3 billion, turning StepStone Group's common equity negative. TPG Private Equity Opportunities similarly charged $19.3 million in performance fees against zero realized gains.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/How%20Some%20Private-Equity%20Managers%20Collect%20Big%20Fees%20on%20Paper%20Gains.pdf"}, {"id": "wsj-09", "title": "Kevin Warsh Invokes Alan Greenspan to Shrink the Fed-and Strengthen Its Chair", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "New Federal Reserve Chairman Kevin Warsh, sworn in last month, is reshaping the institution while invoking Alan Greenspan, who died this past week at 100 after leading the Fed nearly 19 years. Warsh announced five task forces covering communications and the data the Fed uses, with one set to evaluate new information sources and methodological changes for more actionable readings. Critics including former Fed research director David Wilcox warn it would be \"extremely problematic\" for the Fed to design the yardsticks measuring its own performance, especially with inflation stubborn. Greenspan retargeted the PCE price index over CPI in the mid-1990s as inflation fell. On communication, Warsh emulates the early, inscrutable Greenspan, seeking to get the Fed out of narrating decisions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Kevin%20Warsh%20Invokes%20Alan%20Greenspan%20to%20Shrink%20the%20Fed-and%20Strengthen%20Its%20Chair.pdf"}, {"id": "wsj-10", "title": "Russians Feel the War's Hardships as Ukraine Pummels Crimea", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukraine has turned Crimea, annexed by Putin in 2014, into a new war theater with hundreds of daily drone attacks on power and fuel facilities, a campaign Zelensky calls \"long-range sanctions.\" Crimea now sees air-raid alerts, power outages and black-market gasoline reaching $25 a gallon. Russia-backed authorities imposed a state of emergency last week as thousands fled across the Kerch Bridge; a drone blockade cut supplies. In Sevastopol, former base of Russia's Black Sea Fleet, residents reported days without electricity and spoiled goods. Tourism, which drew about seven million visitors last year, has slumped, with bookings down as much as half. The strikes come ahead of September parliamentary elections, and the Kremlin pledged to make up energy deficits.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/Russians%20Feel%20the%20War%E2%80%99s%20Hardships%20as%20Ukraine%20Pummels%20Crimea.pdf"}, {"id": "wsj-11", "title": "The Openness That Powered Germany's Economy Is Now Its Biggest Weakness", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Germany's open economy, once its greatest asset delivering almost 20 years of uninterrupted growth, has become its biggest liability. China has turned into a mercantilist superpower producing similar goods cheaply and crowding out German firms abroad. Germany has proved vulnerable to protectionism, including a U.S. halt in June on exporting Anthropic's latest AI models and Beijing's rare-earth export curbs affecting autos and weapons. Chancellor Friedrich Merz's government offered tax relief, energy-price cuts and higher defense spending, and plans to raise the retirement age to 70 from 67. Most economists expect GDP growth of 1% or less this year, underperforming the eurozone since 2019. Manufacturing jobs fell to 6.6 million, a 10-year low.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/The%20Openness%20That%20Powered%20Germany%E2%80%99s%20Economy%20Is%20Now%20Its%20Biggest%20Weakness.pdf"}, {"id": "wsj-12", "title": "The Trillion-Dollar Borrowing Binge Lifting the Stock Market to Risky Heights", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Finance & Markets"], "summary": "Investors are using record leverage to amplify stock returns, a possible warning sign. U.S. margin debt rose 54% to a record $1.4 trillion in May from a year earlier, per Finra. High-risk leveraged ETFs delivering double or triple daily moves nearly doubled to a record $220 billion between March 30 and June 3, per FactSet. Risks surfaced in South Korea, where leveraged semiconductor bets triggered circuit-breakers and spilled into U.S. AI stocks. Leveraged funds bought roughly $300 billion in single-stock and index derivatives since March-end, Barclays estimates, spurring market-maker buying that lifts shares but threatens spiral declines. Direxion's 3X Bull Semiconductor ETF soared about 700% from late March to late June, then plunged 31% on June 5.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/The%20Trillion-Dollar%20Borrowing%20Binge%20Lifting%20the%20Stock%20Market%20to%20Risky%20Heights.pdf"}, {"id": "wsj-13", "title": "U.S. and Iran Agree to Halt Days of Fighting Over Strait", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "The U.S. and Iran agreed to end days of fighting around the Strait of Hormuz and resume peace talks, officials said. Violence began Thursday when Iran attacked a ship crossing the strait along Oman's coast, disrupting recovery of a waterway through which 20% of the world's crude once flowed. The U.S. offered talks at a Doha summit, possibly as early as Tuesday, focused on Hormuz. Iran's Foreign Minister Abbas Araghchi asserted sole authority over the strait, clashing with U.S. insistence on unimpeded navigation. The June 17 memorandum pushes nuclear issues to a later phase. Iran struck a containership and a Qatari oil tanker; the U.S. hit Iranian sites, and Iran then attacked Kuwait and Bahrain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/30%20Jun%202026/30%20Jun%20WSJ/U.S.%20and%20Iran%20Agree%20to%20Halt%20Days%20of%20Fighting%20Over%20Strait.pdf"}, {"id": "wsj-14", "title": "Wayve Is Challenging Tesla and Waymo in the Race to Automate Driving", "source": "WSJ", "date": "30 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "British startup Wayve is emerging as an unlikely front-runner against Tesla and Alphabet's Waymo in autonomous driving by selling its AI driver as an off-the-shelf system to automakers. Stellantis said last month it would deploy Wayve's technology across Jeep, Chrysler, Dodge and Ram brands from 2028, following a similar Nissan deal envisaging an earlier Japan launch. The system enables hands-free highway and urban driving with an attentive backup driver. Founded in 2017 by Alex Kendall and a Cambridge robotics PhD, Wayve raised $1.05 billion in 2024 led by SoftBank, and $1.5 billion this year at an $8.6 billion valuation from backers including Stellantis, Mercedes-Benz, Nissan, AMD, Arm and Qualcomm. It plans a London robotaxi trial with Uber this summer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20Ne
