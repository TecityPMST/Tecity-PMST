oom, the Middle East war, and tariffs as forces that could sustain inflation. Officials voted unanimously to hold the benchmark at 3.5%-3.75%, unchanged since December. Nine of 18 participants penciled in at least one rate increase by December, up from none in March; only one saw lower rates, down from 12. The meeting was the first under Chairman Kevin Warsh, who did not submit a projection but vowed price stability. The Fed's preferred gauge has run near 4%; oil recently sat near $70 a barrel.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/Fed%20Officials%20Flagged%20Risks%20That%20Would%20Warrant%20Higher%20Rates.pdf"}, {"id": "wsj-06", "title": "How Xi Jinping Steamrolls Dissent With Tactics From Stalin and Mao", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Chinese leader Xi Jinping, 73 and in his 14th year as party chief, is using autocratic tactics reminiscent of Stalin and Mao to crush opposition and stack the leadership with loyalists as he prepares to extend his rule, WSJ reports. Xi has purged dozens of senior officials, including protégés, grown a personality cult, and demanded absolute loyalty. Since starting his third term in 2022, he removed three sitting Politburo members in six months, the biggest such purge since 1976, plus the ministers of defense, foreign affairs and agriculture. He discarded age-based retirement norms and repealed the two-term presidency limit. Historian Joseph Torigian warns strongman tactics make policymaking arbitrary and, lacking succession planning, risk post-death power struggles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/How%20Xi%20Jinping%20Steamrolls%20Dissent%20With%20Tactics%20From%20Stalin%20and%20Mao.pdf"}, {"id": "wsj-07", "title": "Iran Is Leveraging Khamenei's Martyr-Like Legacy to Rally Support Abroad", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Iran has designed a weeklong funeral for slain Supreme Leader Ali Khamenei, killed in an airstrike early in the war, to boost his religious stature among more than 200 million Shia Muslims worldwide, WSJ reports. Crowds flooded Najaf on Wednesday before a final burial in Iran on Thursday. The effort is aimed especially at Iraq, where Baghdad is pushing pro-Iran militias to disarm and integrate into state forces by end-September. The funeral echoes the martyrdom of Imam Hussein, beheaded at Karbala in 680; Khamenei died alongside family members, including a one-year-old granddaughter. Scholar Narges Bajoghli said the circumstances map neatly onto the Karbala paradigm. Khamenei ruled a nation of 90 million after his 1989 appointment succeeding Khomeini.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/Iran%20Is%20Leveraging%20Khamenei%E2%80%99s%20Martyr-Like%20Legacy%20to%20Rally%20Support%20Abroad.pdf"}, {"id": "wsj-08", "title": "Iraq Agrees to U.S. Demands to Halt Dollar Flows to Iran-Backed Militias", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Iraq has agreed to new controls to prevent U.S. dollars from reaching Iran and its militia allies in exchange for the Trump administration lifting a four-month suspension of American currency shipments to Baghdad, U.S. and Iraqi officials said. Treasury halted deliveries in late February at the start of the Iran war, depriving Prime Minister Ali Al Zaidi's government of oil-sale cash held at the New York Fed. The Fed canceled at least two shipments, including one of around $500 million; deliveries resumed late last month. Baghdad promised to curb dollars flowing through currency-exchange businesses and militia salary payments. Zaidi, expected to meet Trump this month, was chosen in May and asked to exclude Iran-backed militias from the next government.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/Iraq%20Agrees%20to%20U.S.%20Demands%20to%20Halt%20Dollar%20Flows%20to%20Iran-Backed%20Militias.pdf"}, {"id": "wsj-09", "title": "JPMorgan Plans to Target Small-Company Deals as Part of M&A Push", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Finance & Markets"], "summary": "JPMorgan Chase is establishing a new team of investment bankers focused on small-cap companies valued between $100 million and $500 million, executives said. The effort builds on its midcap initiative for firms worth roughly $500 million to $2 billion, which now generates over $1 billion in annual revenue with year-over-year growth exceeding 20%, per John Richert, who will help oversee the small-cap team. The midcap team nears 400 bankers; the small-cap unit initially targets more than 75 people. JPMorgan has advised on over $500 billion of U.S. deals year to date, second to Goldman Sachs. New hires report to Michael Flynn, who joined from G2 Capital Advisors. Teams will operate from Atlanta, Chicago, Dallas, Los Angeles and New York.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/JPMorgan%20Plans%20to%20Target%20Small-Company%20Deals%20as%20Part%20of%20M&A%20Push.pdf"}, {"id": "wsj-10", "title": "NATO Sets a Lower Bar for Success: Keeping Trump Happy", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "At an annual NATO summit in Ankara, Turkey, allies counted it a win that President Trump didn't threaten to abandon the alliance, WSJ reports, reflecting a new lower bar for success. Trump arrived sour, saying he might not have attended if not for host Recep Tayyip Erdogan, voiced anger that Europeans didn't back the U.S. war against Iran, singled out Spain over defense spending, and pressed his bid to control Greenland. But in closed-door talks a friendlier Trump emerged, dropping Greenland and praising high-spending members. One senior European official texted a one-word debrief: \"Phew.\" Erdogan gifted leaders personalized inscribed revolvers; those from strict gun-law countries left them behind. Trump claimed \"tremendous love in that room.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/NATO%20Sets%20a%20Lower%20Bar%20for%20Success%20Keeping%20Trump%20Happy.pdf"}, {"id": "wsj-11", "title": "SK Hynix's Stock Market Bargain Mirage", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SK Hynix's stock looks like an AI bargain, but WSJ cautions the modest valuation reflects memory-industry cyclicality. Shares have more than tripled this year, yet the forward price/earnings ratio sits around 7 times, a level tied to out-of-favor value stocks. American Depositary Receipts begin trading Friday, potentially lifting the multiple. Peers look cheap too: Samsung, which forecast a 19-fold jump in second-quarter operating profit, trades under 6 times forward earnings, yet its shares fell 6.9% Tuesday in Korea. Memory makers tout long-term supply agreements and shortages; analysts project SK Hynix revenue rising yearly through 2030, though growth moderates after more than doubling this year, per FactSet. Another cyclical downturn seems nearly certain eventually.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/SK%20Hynix%E2%80%99s%20Stock%20Market%20Bargain%20Mirage.pdf"}, {"id": "wsj-12", "title": "Trump Says He Supports Ukrainian Long-Range Strikes Deep Inside Russia", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "President Trump said he supported Ukraine striking targets deep inside Russian territory, calling it \"an escalation that could help lead to an end.\" The comments, his strongest praise yet of Ukraine's strategy, deal a blow to Russia's efforts to keep Trump onside in peace talks. Speaking alongside President Volodymyr Zelensky at the NATO summit in Ankara on Wednesday, Trump offered warm words, signaled he would consider licensing Kyiv to produce U.S. Patriot interceptors, and said he might travel to Kyiv. Ukraine has run critically low on Patriots amid deadly Russian attacks this summer. Kyiv is also pushing for Starlink access over Russia to strike energy and military sites more precisely, as Zelensky pressures Moscow to sue for peace.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/Trump%20Says%20He%20Supports%20Ukrainian%20Long-Range%20Strikes%20Deep%20Inside%20Russia.pdf"}, {"id": "wsj-13", "title": "U.S. Crude Oil Stockpiles Post Unexpected Build", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "U.S. crude oil inventories rose for the first time in 11 weeks as production and imports increased and exports fell, EIA data released Wednesday showed. Commercial crude stocks excluding the Strategic Petroleum Reserve climbed 3 million barrels to 411.4 million barrels in the week ended July 3, about 6% below the five-year average; analysts surveyed by the Journal had expected a 1.4 million-barrel draw. SPR stocks fell 6.2 million barrels to 319.5 million. Crude production edged up 50,000 barrels a day to just under 13.9 million; imports rose to 5.6 million, exports fell to 3.3 million. Refineries ran at 95.8% of capacity. Gasoline stocks fell 1.9 million barrels; distillate stocks dropped 5 million barrels, about 12% below average.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/U.S.%20Crude%20Oil%20Stockpiles%20Post%20Unexpected%20Build.pdf"}, {"id": "wsj-14", "title": "U.S., Iran Exchange Fire After Trump Declares Ceasefire Over", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The U.S. and Iran exchanged fire again Wednesday night after President Trump pronounced the end of an eight-week ceasefire. The U.S. struck 90 military targets, including missile and drone sites, air defenses and bridges near the Strait of Hormuz, to degrade Iran's ability to attack shipping, Central Command said. Explosions hit Bandar Abbas and Sirik. Iran fired on Kuwait and Bahrain, which host U.S. bases; both reported attacks and Qatar briefly raised its threat level. Trump called the strikes retribution for Iranian attacks on commercial vessels, warning \"it will get much worse.\" Aboard Air Force One he said Iran sought a deal \"so badly.\" Tuesday, Trump also revoked a license letting Iran sell oil, gutting Tehran's interim-deal benefit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/U.S.,%20Iran%20Exchange%20Fire%20After%20Trump%20Declares%20Ceasefire%20Over.pdf"}, {"id": "wsj-15", "title": "Wall Street's Peace Trade Collides With Renewed Iran Fighting", "source": "WSJ", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Energy", "Geopolitics"], "summary": "The explosive end of the U.S.-Iran ceasefire is reopening ruptures in the oil market that could dent stocks and complicate the Fed's inflation fight, WSJ reports. Global oil prices surged Wednesday in their steepest one-day jump since May after Trump said the truce was over, amid warnings that Strait of Hormuz tanker traffic could slow again. Brent crude rose 5.2% to $78.02 a barrel, its highest since June's 60-day ceasefire; U.S. futures rose 4.4%. The Dow Jones Industrial Average fell 1.1%, losing around 577 points, dragged by American Express, Sherwin-Williams and Boeing; the S&P 500 slipped 0.3% while the Nasdaq rose 0.2%. Treasury revoked a waiver letting Iran sell oil, and Trump weighed reimposing a naval blockade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20WSJ/Wall%20Street%E2%80%99s%20Peace%20Trade%20Collides%20With%20Renewed%20Iran%20Fighting.pdf"}, {"id": "st-01", "title": "A new kind of 'ceasefire' between US and Iran where talks, strikes are part of the same process", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Jonathan Eyal argues the US and Iran have perfected a paradoxical \"ceasefire\" where shooting and talking are instruments of the same process. Two nights of US air strikes answered Iranian drone attacks on Strait of Hormuz tankers, seemingly collapsing June's memorandum of understanding. Trump, in Ankara for a NATO summit, called the deal \"over\" and Iran's rulers \"scum,\" yet insisted war would not resume and oil would flow freely. Iran interprets the MOU's ambiguity as licence to control Hormuz, its substitute for destroyed nuclear capabilities. Eyal flags two dangers: the crisis coincides with Khamenei's funeral amid an internal power struggle, and increasingly angry Gulf Arab monarchies refuse to remain sitting targets, raising miscalculation risks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/A%20new%20kind%20of%20'ceasefire'%20between%20US%20and%20Iran%20where%20talks,%20strikes%20are%20part%20of%20the%20same%20process.pdf"}, {"id": "st-02", "title": "China to let AI firms buy Nvidia H200s, says report", "source": "ST", "date": "10 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Trade"], "summary": "China plans to allow top AI companies to buy a limited number of Nvidia H200 chips, easing curbs on the coveted US technology, the Information reported. Officials told firms including Alibaba, ByteDance and DeepSeek they may purchase some processors, subject to justifying quantities. Though Trump granted Nvidia export permission in December, Beijing had been slow to admit the chips, citing concerns about undermining an indigenous industry and cybersecurity risks. Soaring compute demand spurred the shift; the total may stay below 200,000 units, small given a single data centre can use over 400,000 Blackwell chips. Nvidia shares rose 3.7 per cent to US$204.12. CFO Colette Kress said in May the H200 had generated no China revenue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/China%20to%20let%20AI%20firms%20buy%20Nvidia%20H200s,%20says%20report.pdf"}, {"id": "st-03", "title": "Healthcare AI models tailored to S'pore patients being built", "source": "ST", "date": "10 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Singapore is developing healthcare AI models tailored to local patients under a national initiative called Singapore Medical Foundation AI Model (SIMFONI), announced July 9. Most healthcare foundation models are trained on Western data, limiting accuracy locally. Health Minister Ong Ye Kung said SIMFONI \"would have gone to our local medical school,\" offering possible diagnoses and treatment pathways while doctors make final calls. A programme under Cris, it will use de-identified local data to help manage diabetes, high blood pressure and cholesterol, plus eye diseases. Ong cited three prerequisites: a strong digital environment, quality data and sound policy. MOH is integrating IT systems, adopting a common electronic medical record by 2028, with all providers contributing to the NEHR by early 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/Healthcare%20AI%20models%20tailored%20to%20S'pore%20patients%20being%20built.pdf"}, {"id": "st-04", "title": "How long will Asia's 'long peace' last?", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ng Chee Khern of ISEAS asks whether East Asia can preserve its decades-long \"long peace\" as war returns globally. PRIO's Conflict Trends report counted 65 state-based conflicts in 2025, the highest since 1946, with 245,000 battle deaths. East Asia's calm rests on managing unfinished history: Taiwan, Korea, and the East and South China Seas overlay unresolved sovereignty questions with renewed US-China great-power rivalry. Grey-zone tactics like water-cannon and ramming normalise risk-taking below armed-conflict thresholds, raising miscalculation dangers. A South China Sea conflict, carrying US$6 trillion in annual trade and 45 per cent of crude shipments, would be globally devastating; a Taiwan clash would threaten semiconductor production. Ng urges deterrence, dialogue and restraint, warning the first shot is easy to fire but impossible to control.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/How%20long%20will%20Asia's%20'long%20peace'%20last.pdf"}, {"id": "st-05", "title": "Iran says it hits US military targets in the Gulf, prepares to bury slain leader Khamenei", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Iran launched attacks on US military infrastructure in Gulf states on July 9 following US strikes on its coastal and eastern provinces, straining a three-week-old ceasefire. Iran targeted US Patriot systems in Kuwait, an early-warning antenna in Qatar and a fuel store in Bahrain; Kuwait engaged missiles and drones, and Jordan intercepted eight missiles. Tehran buried supreme leader Ali Khamenei, killed Feb 28, in Mashhad. Iranian officials said US strikes killed 14 and injured 78 across five provinces; CENTCOM said it struck about 90 targets \"in retribution\" for tanker attacks. Trump, at the Ankara NATO summit, called the MOU \"over\" but doubted escalation. Oil prices fell back as investors weighed whether the flare-up was tactical or a full ceasefire collapse.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/Iran%20says%20it%20hits%20US%20military%20targets%20in%20the%20Gulf,%20prepares%20to%20bury%20slain%20leader%20Khamenei.pdf"}, {"id": "st-06", "title": "Modi inks uranium and defence deals in Australia amid regional anxieties", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Australia agreed on July 9 to sell India uranium, with both leaders committing to deeper defence and energy cooperation amid shared concerns over China's military rise. After signing in Melbourne, PM Modi said Australia offered \"historic opportunities\" for India's clean-energy transition. Australia, holding the world's largest uranium reserves, could help India lift nuclear output from 8 to 100 gigawatts by 2047 for power-hungry data centres. Analysts say India seeks to reduce reliance on Russian supplies. A new defence deal expands exercises and information-sharing, citing concern over a July 6 Chinese Pacific missile test. The Quad partners also agreed to fast-track a free trade pact; two-way trade reached A$50 billion in 2025. One expert called China \"the elephant in the room.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/Modi%20inks%20uranium%20and%20defence%20deals%20in%20Australia%20amid%20regional%20anxieties.pdf"}, {"id": "st-07", "title": "NATO allies commit to giving Ukraine military aid through 2027", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "NATO members pledged 70 billion euros (S$103.41 billion) in military aid to Ukraine for 2026 and \"at least the equivalent levels\" in 2027, in a statement adopted at a summit in Ankara of the alliance's 32 countries. The money involves no new contributions, combining a prior 40-billion-euro annual pledge with 30 billion from an EU loan, but marks a shift from 2025, when leaders omitted financial help. The US stance evolved as Russia peace talks stalled, with Trump offering guarded praise of Zelensky and backing a G-7 pledge. Zelensky arrived more confident despite frozen membership hopes, but Kyiv urgently needs more Patriot defences. Leaders again declared Russia a long-term threat and stressed freedom of navigation in the Strait of Hormuz.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/NATO%20allies%20commit%20to%20giving%20Ukraine%20military%20aid%20through%202027.pdf"}, {"id": "st-08", "title": "NATO tensions aside, Trump's visit marks a win for Turkey's Erdogan", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Turkey staged an air show and named an airport building after Trump at the Ankara NATO summit, elevating US ties even as the American leader lashed out at other allies. Erdogan walked arm-in-arm with his \"dear friend,\" who promised to lift sanctions imposed over Turkey's 2019 purchase of Russian S-400 systems and signalled willingness to sell blocked F-35 jets. Trump defended Erdogan against Netanyahu's warnings and said he attended only because Erdogan hosted. The promises, though largely rhetorical and facing Congressional resistance, could boost Erdogan domestically amid a crackdown on the opposition that critics call a democratic test. Trump also disrupted the summit by demanding cut trade ties with Spain and reiterating claims on Greenland, irking Denmark.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/NATO%20tensions%20aside,%20Trump's%20visit%20marks%20a%20win%20for%20Turkey's%20Erdogan.pdf"}, {"id": "st-09", "title": "Singapore's role in unlocking $1.5b to finance climate projects, green energy in Asia", "source": "ST", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Energy", "Environment"], "summary": "Singapore's climate finance initiative, Financing Asia's Transition Partnership (FAST-P), has raised US$1.14 billion (S$1.5 billion) for green energy projects including solar plants, battery storage, bioenergy and improved grids across Asia. Formed in 2023 by the Monetary Authority of Singapore, it aims for US$5 billion using blended finance, layering public, private and philanthropic money to de-risk investments for wary lenders. Its Green Investments Partnership, run by Pentagreen Capital, has raised US$800 million, funding projects like a Mindanao solar plant powering 82,000 homes; a coal-phase-out pillar under Clifford Capital secured US$345 million. Officials note the IEA says South-east Asia must scale clean-energy investment to US$190 billion by 2035. The US-Iran conflict has driven capital outflows and market volatility.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/Singapore's%20role%20in%20unlocking%201.5b%20to%20finance%20climate%20projects,%20green%20energy%20in%20Asia.pdf"}, {"id": "st-10", "title": "The bull market's next test", "source": "ST", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "UBS's Tan Min Lan argues the equity bull market is not over despite mounting concerns. Global equities climbed in the first half of 2026 on resilient earnings and a sturdy economy. AI remains central: hyperscaler capital expenditure is expected to rise almost 70 per cent to around US$820 billion in 2026, nearing US$1 trillion in 2027, with GPU rental prices accelerating and cloud revenues up 40 per cent. Tan favours the \"picks and shovels\" suppliers but warns the concentrated cycle hinges on monetisation. Market breadth is broadening, with healthcare outperforming and the equal-weighted S&P 500 catching up. Lower oil should aid South and South-east Asian markets. Key risks: AI capex durability beyond 2027, rising bond yields and the US-Iran ceasefire.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/The%20bull%20market's%20next%20test.pdf"}, {"id": "st-11", "title": "Trump says troop levels in Europe will depend on Greenland, Iran", "source": "ST", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Trump said US troop levels in Europe would hinge on how allies address his concerns over Greenland and the Iran war, comments likely to deepen NATO worries over his commitment to collective security. Returning from the Ankara summit aboard Air Force One, he said \"I haven't made that final determination,\" adding much depends on Greenland and Iran. He assailed partners over defence spending and reluctance to help against Iran, and said he was \"very unhappy\" over Greenland, a Danish territory he has long coveted. Anxiety is fuelled by the Pentagon's six-month European force-posture review, cancelled armoured deployments, and Defence Secretary Pete Hegseth's confrontational Brussels speech. The US maintains roughly 80,000 troops in Europe, expanded after Russia's 2022 invasion of Ukraine.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20ST/Trump%20says%20troop%20levels%20in%20Europe%20will%20depend%20on%20Greenland,%20Iran.pdf"}, {"id": "bt-01", "title": "New MAS proposal could pave way for commodity futures funds, more single-country bond funds for retail investors", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore on Jul 9 launched a public consultation, running to Aug 10, on amendments to the Code on Collective Investment Schemes that could give retail investors access to futures-based single-commodity funds and a wider range of single-country government bond funds. A proposed Alternative Funds Appendix would allow undiversified or derivatives-heavy funds, with guard rails and enhanced disclosures. MAS aims to cut authorisation timelines from six-to-12 months to about three months for setting guard rails, then three weeks per fund. Industry figures from Kennedys Law, Lion Global Investors, KPMG and SGX welcomed the flexibility but stressed investor education, suitability and safeguards remain essential.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/1.%20New%20MAS%20proposal%20could%20pave%20way%20for%20commodity%20futures%20funds,%20more%20single-country%20bond%20funds%20for%20retail%20investors.pdf"}, {"id": "bt-02", "title": "As US-Iran war resumes, volatility returns to SIA, Oiltek shares", "source": "BT", "date": "10 Jul 2026", "tags": ["Geopolitics", "Energy", "Finance & Markets"], "summary": "Renewed US-Iran conflict and the effective re-closure of the Strait of Hormuz, through which 20 per cent of global oil normally flows, jolted Singapore markets on Jul 9. Oiltek shares rose 6.3 per cent to S$1.51, while Singapore Airlines, with fuel as its largest cost, fell 2 per cent to S$7.68, the worst STI performer. West Texas Intermediate briefly rose 1.1 per cent to US$74.31 before easing to US$73.48; Brent neared US$79 then slipped to US$78. The US launched fresh strikes after Trump declared an interim deal \"over,\" following an assault on three cargo ships. Rystad's Jorge Leon said the 60-day truce is unlikely to become permanent peace.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/As%20US-Iran%20war%20resumes,%20volatility%20returns%20to%20SIA,%20Oiltek%20shares.pdf"}, {"id": "bt-03", "title": "Bank of Japan sees growing inflation pressures from Middle East war", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The Bank of Japan said on Jul 9 that the US-Israeli war on Iran will likely prompt more firms to raise prices later this year, signalling caution over inflation that could support further rate hikes. In its quarterly regional report, the BOJ maintained its assessment for all nine areas as recovering or picking up moderately, noting export and output risks are receding as firms reroute shipments. Many regions reported planned price rises for food and daily necessities from summer. Having lifted rates to a 31-year high of 1 per cent last month, the BOJ is set to hold at its Jul 31 meeting. Wholesale inflation hit a three-year high of 6.3 per cent in May.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/Bank%20of%20Japan%20sees%20growing%20inflation%20pressures%20from%20Middle%20East%20war.pdf"}, {"id": "bt-04", "title": "China's producer inflation jumps to 4-year high, squeezing manufacturers", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "China's producer price index rose 4.1 per cent year on year in June, the highest since July 2022 and up for a fourth straight month, squeezing manufacturers' margins as weak domestic demand limits pricing power. The gain, matching a Reuters poll, was partly driven by a low base and by higher coal, electrical machinery, electronics and ferrous metal prices; month on month PPI fell 0.3 per cent after oil dropped post-ceasefire. Consumer prices climbed just 1 per cent yoy, slowing from May. Analysts said an AI-fuelled export surge lifts advanced manufacturing while property weakness restrains activity, and expect policymakers to keep rate cuts on hold in 2026 amid an \"anti-involution\" crackdown on price wars.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/China's%20producer%20inflation%20jumps%20to%204-year%20high,%20squeezing%20manufacturers.pdf"}, {"id": "bt-05", "title": "Gold's epicentre is shifting to Asia, with prices buoyed by regional demand: analysts", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Asia is emerging as the global gold market's new centre of gravity, with resilient regional demand supporting bullion as Singapore and Hong Kong deepen trading, vaulting and clearing infrastructure. Gold traded at US$4,105.44 an ounce on Jul 9, down about 25 per cent from January's US$5,500 record. Asia led global inflows into gold-backed ETFs in the first half, adding a record US$12.4 billion versus Europe's US$3.2 billion, while North America saw US$7.7 billion of outflows. Analysts from Standard Chartered, OCBC, WGC and State Street said low prices will not derail the hubs' long-term ambitions. WGC expects gold near US$4,100 in H2, with a move towards US$5,000 needing a weaker US dollar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/Gold's%20epicentre%20is%20shifting%20to%20Asia,%20with%20prices%20buoyed%20by%20regional%20demand%20analysts.pdf"}, {"id": "bt-06", "title": "How Temasek is leveraging AI for better all-round performance", "source": "BT", "date": "10 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Southeast Asia"], "summary": "Temasek plans to grow AI-linked investments from 6 per cent to as much as 15 per cent of its portfolio by March 2031, said Temasek Global Investments CEO Chia Song Hwee, as the firm's portfolio hit a record S$518 billion for the year ended Mar 31. Temasek identified digitisation as a key trend in 2016, set up an AI pod in 2019, and founded Aicadium with over 60 technologists. It holds stakes in Anthropic and OpenAI via later-stage and fund routes, and joined the AI Infrastructure Partnership with BlackRock, GIP and MGX. Chia is training Temasek's 1,000-strong workforce to be AI-fluent, but cautioned gains will take years to show at portfolio level.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/How%20Temasek%20is%20leveraging%20AI%20for%20better%20all-round%20performance.pdf"}, {"id": "bt-07", "title": "Malaysia's central bank holds rate for sixth straight meeting amid steady growth", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Bank Negara Malaysia kept its overnight policy rate at 2.75 per cent on Jul 9 for a sixth straight meeting, as forecast by all but one of 31 economists polled by Reuters, citing moderate inflation and sustained growth. The central bank said strong fundamentals underpin resilience against external shocks and expects resilient second-quarter growth on domestic demand and stronger exports. It sees 2026 growth within its 4-to-5 per cent forecast range, easing from 5.2 per cent in 2025; first-quarter GDP rose 5.4 per cent. Headline and core inflation averaged 1.7 and 2.1 per cent over five months. Most economists expect no change for the rest of 2026; the last move was a July 2025 cut.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/Malaysia's%20central%20bank%20holds%20rate%20for%20sixth%20straight%20meeting%20amid%20steady%20growth.pdf"}, {"id": "bt-08", "title": "The missing ingredient for European tech sovereignty", "source": "BT", "date": "10 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "The European Commission's Tech Sovereignty Package, unveiled in early June, targets strategic autonomy via investments in AI, semiconductors, cloud and open-source software, but this commentary argues it falls short. Roughly 80 per cent of the bloc's digital technologies are imported, mainly from the US; Amazon, Google and Microsoft control 70 per cent of Europe's cloud market. Tripling data-centre capacity will not build a competitive ecosystem unless Europeans capture more value and curb Big Tech consolidation, which saw nearly 100 AI startups acquired from 2010 to 2023. The writer urges firmer Digital Markets Act enforcement, tougher merger control, and pursuing \"frugal\" and physical AI rather than imitating Silicon Valley's resource-intensive model.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/The%20missing%20ingredient%20for%20European%20tech%20sovereignty.pdf"}, {"id": "bt-09", "title": "UK housing market downturn eased a little in June, RICS reports", "source": "BT", "date": "10 Jul 2026", "tags": ["Finance & Markets"], "summary": "Britain's housing market downturn abated slightly in June, though sentiment remains fragile, a Royal Institution of Chartered Surveyors survey showed on Jul 9. The headline house price balance was little changed at -33 per cent, with May revised up to -34 per cent. New buyer enquiries improved to -29 per cent from -34 per cent, the least negative since February, and near-term sales expectations recovered to -16 per cent from a March low of -34 per cent. Twelve-month price expectations rose to +8 per cent. Rental tenant demand strengthened to +18 per cent, with rents seen rising about 2.5 per cent. RICS's Tarrant Parsons said uncertainty over inflation and interest rates continues to weigh on activity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20BT/UK%20housing%20market%20downturn%20eased%20a%20little%20in%20June,%20RICS%20reports.pdf"}, {"id": "scmp-01", "title": "Active fault line threatens world's biggest hydropower project, Chinese geologists warn", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Environment", "Energy"], "summary": "Chinese geologists warn that an active fault line, the Paizhen Fault, runs directly beneath the world's largest hydropower project on Tibet's Yarlung Tsangpo (Brahmaputra) River. A paper in the journal Sedimentary Geology and Tethyan Geology, supervised by the state-owned China Geological Survey, says the fault has been highly active since the Pleistocene and could undermine the mega-dam's structural stability, plus nearby roads, bridges and tunnels. The team urges slope reinforcement and retaining barriers to mitigate landslide and collapse risks. Construction began last year on the dam, with estimated annual capacity of 300 billion kilowatt-hours, triple the Three Gorges Dam. A 2017 magnitude 6.9 quake at the fault's northern end signals modern seismic potential. India and Bangladesh have raised downstream concerns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Active%20fault%20line%20threatens%20world%E2%80%99s%20biggest%20hydropower%20project,%20Chinese%20geologists%20warn.pdf"}, {"id": "scmp-02", "title": "Asia's top climate scientist warns of 'humanitarian disasters' as Earth teeters", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Environment", "Society"], "summary": "Benjamin Horton, dean at City University of Hong Kong and winner of the Asia Oceania Geosciences Society Axford Medal, warns the climate is \"spiralling out of control\" and accelerating faster than expected. He says humanity has crossed seven of nine planetary boundaries, and warming oceans make intense typhoons like Super Typhoon Bavi more prone to rapid intensification. Historical statistics are becoming obsolete: Hurricane Sandy, once a 500-year event, is now a 50-year one and could recur every five years by 2050. Horton warns recurring heatwaves could break social and energy systems, turning weather into \"humanitarian disasters\". Yet he cites hope in renewable energy, cooling paints, ecosystem restoration and motivated students, calling the crisis \"very solvable\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Asia%E2%80%99s%20top%20climate%20scientist%20warns%20of%20%E2%80%98humanitarian%20disasters%E2%80%99%20as%20Earth%20teeters.pdf"}, {"id": "scmp-03", "title": "China aims to revive physical stores, make them 'immersive', as shield against e-commerce", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "Beijing has issued guidelines to revive bricks-and-mortar retailers squeezed by e-commerce, after retail sales growth cooled in May to the slowest pace since December 2022. The Ministry of Commerce and eight other authorities released a road map through 2030 to transform physical stores into destinations for shopping, \"immersive experiences\" and social entertainment, while narrowing online-offline price gaps and cracking down on unfair pricing. The plan targets a \"well-structured\" modern retail system and \"globally competitive\" firms. It responds to persistent \"trading down\", with shoppers switching to cheaper brands or buying less. Analysts and a Qiushi Journal commentary cite muted job and wage expectations, weak social security and a sluggish property market as drivers of precautionary saving and cautious spending.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/China%20aims%20to%20revive%20physical%20stores,%20make%20them%20%E2%80%98immersive%E2%80%99,%20as%20shield%20against%20e-commerce.pdf"}, {"id": "scmp-04", "title": "China unveils high-power microwave weapon arsenal with up to 100 gigawatts of power", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Defence", "Technology & AI"], "summary": "Chinese defence scientists say the country's high-power microwave (HPM) weapons can deliver output up to 100 gigawatts, a rare public disclosure detailed in the journal High Power Laser and Particle Beams. Researchers from the National University of Defence Technology, led by Zhang Jun, describe pulsed-power devices that have moved from prototypes to practical use. The flagship 100GW-class system synchronises multiple pulse generators; pulses reaching just 1 gigawatt can damage low Earth orbit satellites. Scientists say the technology could threaten satellite networks such as Starlink at extremely low cost, especially during military use. A new lithium-ion capacitor hybrid can activate at minus 40 degrees Celsius, aiding winter and polar electronic warfare. Rival nations face rare-earth, R&D and industrial hurdles to catch up.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/China%20unveils%20high-power%20microwave%20weapon%20arsenal%20with%20up%20to%20100%20gigawatts%20of%20power.pdf"}, {"id": "scmp-05", "title": "China's central bank vows flexible approach as it acknowledges uneven economic picture", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "China's central bank pledged to keep a \"moderately loose\" monetary policy while adopting a more forward-looking, flexible and targeted approach, flagging \"structural divergence\" as a key domestic challenge for the first time. A People's Bank of China monetary policy committee readout described the external environment as \"more complex and volatile\", citing geopolitical tensions and trade frictions. The economy is increasingly uneven, with AI-related sectors, hi-tech manufacturing and exports outperforming while consumption and private investment stay weak. Fixed-asset investment fell 4.1 per cent in the first five months of 2026, and May retail sales dropped 0.6 per cent year on year. Goldman Sachs saw no imminent easing, expecting faster fiscal implementation and targeted credit rather than rate or reserve-ratio cuts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/China%E2%80%99s%20central%20bank%20vows%20flexible%20approach%20as%20it%20acknowledges%20uneven%20economic%20picture.pdf"}, {"id": "scmp-06", "title": "China's top DRAM maker sets date for US$4.3b Shanghai IPO amid memory boom", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "ChangXin Memory Technologies (CXMT), China's top DRAM maker, launched the final stage of its Shanghai Star Market listing, expected to raise at least 29.5 billion yuan (US$4.3 billion). The Hefei-based firm holds its price consultation on Monday and opens subscriptions on July 16, in a deal that would rank as the market's second-largest after SMIC's 2020 IPO. Beijing is channelling capital into strategic chip firms amid an AI- and data-centre-driven memory upcycle. Omdia projects China's semiconductor market growing 93 per cent in 2026 to US$812.1 billion, and its memory-chip market up 263 per cent to US$449.6 billion. Founded in 2016, CXMT is the world's fourth-largest DRAM maker, though Samsung, SK Hynix and Micron together held over 90 per cent of the global market in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/China%E2%80%99s%20top%20DRAM%20maker%20sets%20date%20for%20US%244.3b%20Shanghai%20IPO%20amid%20memory%20boom.pdf"}, {"id": "scmp-07", "title": "Chinese firms look to strike gold in a volatile global metals market", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Chinese futures brokerages and exchanges are accelerating global expansion as domestic miners and manufacturers seek better hedging tools amid volatile metal prices and geopolitical tensions. In the first quarter, Chinese mining and metals firms completed US$6.17 billion of cross-border M&A, a more than tenfold jump from 2025; Zijin Mining's 28 billion yuan purchase of Canada's Allied Gold was the largest. Shanghai brokers Guotai Junan Futures and Orient Futures are applying for London Metal Exchange membership, joining six Chinese institutions already holding LME clearing status. Shandong Gold lifted its 2026 hedging budget 51 per cent. The LME plans an October Shanghai hot-rolled coil contract pegged to Shanghai Futures Exchange prices, advancing China's push to globalise its own pricing benchmarks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Chinese%20firms%20look%20to%20strike%20gold%20in%20a%20volatile%20global%20metals%20market.pdf"}, {"id": "scmp-08", "title": "How the RMB Business Facility will help consolidate Hong Kong's financial role", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Hong Kong's RMB Business Facility, a yuan funding window run by the Hong Kong Monetary Authority, launched an upgrade on Friday, expanding its quota 150 per cent to 500 billion yuan and extending tenor to two to three years from one. It lets participating banks borrow yuan at the relatively cheap Shanghai three-month interbank rate, about two percentage points below the US Federal Reserve rate, to fund corporate trade finance, capital expenditure and working-capital loans. The facility channels onshore liquidity via the currency swap line with the People's Bank of China; international clients in 12 jurisdictions already use it. Part of 11 measures announced with the SFC, it aims to consolidate Hong Kong's offshore renminbi hub role amid competition from Shanghai, Singapore and London.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/How%20the%20RMB%20Business%20Facility%20will%20help%20consolidate%20Hong%20Kong%E2%80%99s%20financial%20role.pdf"}, {"id": "scmp-09", "title": "Iran mourners defiant as Khamenei buried: 'only revenge can soothe the pain'", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Iran buried former supreme leader Ali Khamenei in Mashhad's Imam Reza shrine over four months after he was killed in a February 28 air strike, as two days of US-Iranian attacks raised fears of renewed war. Iranian officials said US strikes killed 17 people; Tehran said it resumed attacks on US assets in Kuwait, Bahrain and Qatar, and Jordan intercepted eight missiles. Successor Mojtaba Khamenei, reportedly wounded, did not appear publicly. Mourners chanted revenge slogans against Trump and Netanyahu, one saying \"only revenge can soothe the pain\". The Wall Street Journal reported Israel warned Washington of a new Iranian plot to kill Trump. Traffic through the vital Strait of Hormuz has fallen sharply since Wednesday after vessels were attacked.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Iran%20mourners%20defiant%20as%20Khamenei%20buried%20%E2%80%98only%20revenge%20can%20soothe%20the%20pain%E2%80%99.pdf"}, {"id": "scmp-10", "title": "Meet Biomni: the free powerful biomed AI agent turning data into hypotheses", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "A Stanford-led team, including two Chinese researchers, unveiled Biomni, described as the first general-purpose biomedical AI agent able to work alongside human scientists. Released open-source with a code-free web interface, it already has over 10,000 users worldwide, supervisor Jure Leskovec said. Reported in Science, Biomni turns plain-language requests into full research workflows, from searching databases and writing analysis code to finding disease-causing genes and generating lab protocols. In tests across more than 400 tasks, it reached expert-level accuracy, once completing in 35 minutes an analysis that took a human three weeks. Developers Kexin Huang and Yuanhao Qu co-founded start-up Phylo to broaden access. Leskovec stressed Biomni is \"a powerful tool, not a decision maker\", with limits in deeper scientific judgment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Meet%20Biomni%20the%20free%20powerful%20biomed%20AI%20agent%20turning%20data%20into%20hypotheses.pdf"}, {"id": "scmp-11", "title": "North Korea's premier heads to China for defence treaty anniversary as allies extend thaw", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "North Korean Premier Pak Thae-song will arrive in China on Friday for a three-day visit marking the 65th anniversary of the China-North Korea Treaty of Friendship, Cooperation and Mutual Assistance, Beijing's only formal defence pact. The trip signals warming ties, coming weeks after President Xi Jinping's first visit to Pyongyang in seven years, during which he pledged \"unwavering\" commitment to mutual sovereignty and Kim Jong-un called closer ties his \"most important strategic mission\". Foreign ministry spokeswoman Mao Ning stressed developing relations as a steadfast strategic policy. The thaw follows a cooling tied to pandemic border closures and Pyongyang's alignment with Moscow, including troops sent to aid Russia's war on Ukraine. Two-way trade hit 2.25 billion yuan in April, the highest since 2017 UN sanctions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/North%20Korea%E2%80%99s%20premier%20heads%20to%20China%20for%20defence%20treaty%20anniversary%20as%20allies%20extend%20thaw.pdf"}, {"id": "scmp-12", "title": "Philippines looks to space for bird's-eye view of South China Sea threats", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Defence", "Southeast Asia", "Geopolitics"], "summary": "The Philippines plans to establish a military space centre by 2028 to bolster surveillance, communications and command across its archipelago and contested South China Sea areas. Armed forces chief General Romeo Brawner Jnr said the initiative, presented to President Marcos Jnr and pursued with the Philippine Space Agency, would lay groundwork for a future space command covering missile systems and drone operations. Analysts said the goal is achievable if kept modest, but warned of technical, financial and manpower hurdles, especially training operators. Options include launching its own satellites or contracting allied or commercial systems. Experts cited lessons from Ukraine on self-reliance and said meaningful capability needs collaboration with the US, Japan and Australia, potentially modelled on Nato's space-based surveillance sharing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Philippines%20looks%20to%20space%20for%20bird%E2%80%99s-eye%20view%20of%20South%20China%20Sea%20threats.pdf"}, {"id": "scmp-13", "title": "South Korea set to power US fight for naval dominance amid rising geopolitical tensions", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Defence", "Geopolitics", "Trade"], "summary": "The United States is turning to South Korea's world-leading shipbuilders to refresh its ageing naval fleet, potentially expanding the alliance into defence manufacturing and industrial production. At last month's G7 summit, Trump reportedly asked President Lee Jae Myung whether Seoul could rapidly build 10 warships. The US Defence Department sent requests for information on combat ships to HD Hyundai Heavy Industries and Hanwha Ocean, and for replenishment tankers to those firms plus Samsung Heavy Industries. Shipbuilding falls within a US$350 billion investment package, with US$150 billion earmarked for the sector. Analysts say the US retains a technological edge but trails China, which has the world's largest commercial shipbuilding industry, in fleet size. US law still largely bars building warships in foreign yards.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/South%20Korea%20set%20to%20power%20US%20fight%20for%20naval%20dominance%20amid%20rising%20geopolitical%20tensions.pdf"}, {"id": "scmp-14", "title": "The radar system that Taiwan says tracked the PLA's ballistic missile launch", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan tracked a Chinese ballistic missile launch this week using its US-supplied AN/FPS-115 Pave Paws long-range early-warning radar and intelligence sharing with Washington, the Liberty Times reported. The missile was fired from a nuclear-powered submarine in the South China Sea; the radar, housed at the Leshan station in Hsinchu county at 2,600 metres elevation, can detect launches up to 5,000km away. As the missile flew eastward, Taiwan shared data with the US, whose satellites and radars tracked later flight phases. National Security Council chief Joseph Wu posted a map showing a JL-2 missile flying over the northern Philippines before landing between Nauru and Tonga. Concerns persist that the US$1.4 billion radar could be a PLA target in any conflict.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/The%20radar%20system%20that%20Taiwan%20says%20tracked%20the%20PLA%E2%80%99s%20ballistic%20missile%20launch.pdf"}, {"id": "scmp-15", "title": "Trump's fickle behaviour over Iran puts world economy at risk - again", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "This SCMP editorial argues US President Donald Trump's unpredictability over Iran again endangers the world economy. Trump declared the ceasefire with Iran over, saying \"I think it is over\", while leaving the door open for negotiations and floating reinstating a naval blockade, after fresh US air strikes and reported attacks on shipping in the Strait of Hormuz. The piece notes about 20 per cent of the world's oil passes through the strait, and warns tit-for-tat Iranian attacks on Gulf states are reviving market uncertainty, though initial shocks to energy prices and stocks stayed contained. China's foreign ministry urged both sides back to talks, with spokeswoman Mao Ning saying military means cannot solve the fundamental issue. Restoring the ceasefire is deemed paramount.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Trump%E2%80%99s%20fickle%20behaviour%20over%20Iran%20puts%20world%20economy%20at%20risk%20%E2%80%93%20again.pdf"}, {"id": "scmp-16", "title": "US-China AI war boils down to a contest over electricity", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Technology & AI", "Energy"], "summary": "This SCMP opinion piece argues the US-China AI contest is becoming a competition over electricity output and cost, as AI models commoditise and services get priced by cost rather than uniqueness. It says open-source Chinese releases from DeepSeek and Zhipu AI have erased the perceived gap with US closed-source models. With electricity the dominant cost of AI tokens, the author frames it as China's renewable path versus America's hydrocarbons. China added roughly 334 billion kWh of solar and 130 billion kWh of wind output last year and produces power near two US cents per kWh, potentially halving that. US output, about 4.43 trillion kWh, barely grows and costs about 2.5 times more. The author predicts US closed-source valuations could collapse, risking recession.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/US-China%20AI%20war%20boils%20down%20to%20a%20contest%20over%20electricity.pdf"}, {"id": "scmp-17", "title": "Why AI race with US is a 'knockout game' China cannot afford to lose", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Chinese academic Huang Ping, assistant dean at the Chinese University of Hong Kong (Shenzhen)'s public policy school, warns China must overhaul its innovation ecosystem or risk losing an existential AI \"knockout game\" with the US. In an online GBA Review article, he urges strong backing for open-source AI to counter costly American closed-source models, \"unconventional\" talent reforms, and shifting foundational research from bureaucratic state universities to leading tech enterprises under corporate-led co-investment. He listed DeepSeek V4 Pro as co-author. Huang says the raw performance gap has closed but a \"stark\" divide remains in autonomous agentic AI, citing Anthropic's Claude Fable 5 and OpenAI's GPT-5.6 family. He warns falling behind would erode economic growth, military modernisation and Beijing's leverage over Taiwan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/Why%20AI%20race%20with%20US%20is%20a%20%E2%80%98knockout%20game%E2%80%99%20China%20cannot%20afford%20to%20lose.pdf"}, {"id": "scmp-18", "title": "'Token economy' emerging as AI use soars in China, experts tell conference", "source": "SCMP", "date": "10 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese tech experts told the China Internet Conference in Beijing that surging AI token use is giving rise to a \"token economy\", with the tiny units that underpin AI services evolving into the basis for pricing and delivering them. Chinese Academy of Sciences academician Yin Hao said tokens have become a new production factor linking model capability, computing resources and commercial value. Daily AI token consumption has surged more than 1,000-fold in about two years, from around 100 billion at the start of 2024 to over 140 trillion in March, roughly 100,000 per person. China Unicom said AI agents lifted document and contract efficiency 70 per cent and handled 85 per cent of hotline calls, cutting annual costs over 100 million yuan. Huawei called it a defining opportunity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/10%20Jul%202026/10%20Jul%20SCMP/%E2%80%98Token%20economy%E2%80%99%20emerging%20as%20AI%20use%20soars%20in%20China,%20experts%20tell%20conference.pdf"}]}, "2026-07-13": {"date": "2026-07-13", "dayOfWeek": "Monday", "totalArticles": 63, "sourceCounts": {"WSJ": 15, "ST": 9, "BT": 13, "SCMP": 26}, "executiveDigest": "Iran declared the Strait of Hormuz closed and struck Gulf states as the US insisted the waterway remains open and launched further strikes, with Washington now openly pessimistic about a nuclear deal; the shock rippled into supply chains as China banned helium exports, straining the chip industry - while Apple sued OpenAI over trade secrets and Singapore's banks hit record highs, with DBS topping S$70 for the first time.", "briefingCards": [{"title": "Lead story - Iran declares Hormuz closed", "body": "Iran declared the Strait of Hormuz closed and attacked Gulf states, even as the US insisted the waterway remains open and Central Command launched further strikes. The Trump administration is now increasingly pessimistic about clinching an Iran nuclear deal, while a wave of assassinations unleashed during the war is haunting the endgame. The IEA said an oil-demand recovery is under way but that US-Iran escalation clouds the outlook. The shock is spreading into supply chains: China imposed a temporary ban on helium exports as the war strains the chip supply chain, and Russia's diesel export ban dealt a further blow to strained energy markets."}, {"title": "Markets & finance", "body": "Singapore's banks hit record highs, with DBS topping S$70 for the first time, as the sector's re-rating continued. But BT warned investors to 'prepare for a perilous summer', and WSJ chronicled an IPO gold rush in which Texas is coming for New York's crown - even as Singapore and Hong Kong's own IPO rebound is set to continue into the second half of 2026. SK Hynix's debut, BT argued, is effectively a bet that AI has broken the chip sector's boom-and-bust cycle. Asia-Pacific investors, meanwhile, are cooling on venture capital despite returns topping global private markets in 2025."}, {"title": "Asia realignment", "body": "Beijing hit out as a US-led coalition marked the 10th anniversary of the South China Sea arbitration ruling, and scholar Wu Shicun said China will not rule out construction at Scarborough Shoal. A top Beijing adviser argued a formal China-US 'G2' framework is key to guaranteeing world peace. China is watching the Hormuz crisis with anxiety over its own 'Malacca Dilemma', while Tharman framed the Singapore-Malaysia partnership as driven by mutual respect - and SCMP argued a second 'China shock' may actually benefit South-east Asia."}, {"title": "Energy & climate", "body": "The Hormuz closure and further US strikes upended energy markets: the IEA flagged a recovering oil demand clouded by escalation, and Russia's diesel export ban added fresh strain. In Singapore, record electricity prices are being cushioned for data-centre operators by fixed contracts and cost pass-through arrangements, while Seatrium transferred the first energy from its floating lab into Singapore's electricity grid. WSJ noted airlines and hyperscalers are clamouring for turbines that only a handful of companies can supply - a fresh bottleneck for AI power."}, {"title": "Technology & AI", "body": "Apple sued OpenAI, alleging it stole trade secrets, and the EU said Meta failed to protect users from addictive apps. WSJ warned America 'risks blowing the AI race', offering seven fixes, even as it credited the White House's Intel turnaround as 'working'. In China, Beijing called for 'patient capital' amid the AI investment frenzy, China Life set up a semiconductor fund, and domestic AI tools stand to benefit after the Claude Code back-door alert. Singapore proposed mandatory notification when firms use personal data for AI training."}, {"title": "Singapore & SEA focus", "body": "Singapore's banks led the market to record highs, with DBS above S$70, and the battle for wealth talent is broadening beyond private bankers. New citizens and permanent residents are driving luxury-home sales in a 'flight to safety' even as the broader market cools, and JPMorgan said Malaysia's data-centre pipeline now beats its neighbours' - though Singapore will retain premium status. Singapore proposed mandatory notification for personal data used in AI training, Seatrium fed its first floating-lab energy to the grid, and Woodlands Gateway was unveiled as a new transport hub."}], "keyMetrics": [{"value": "63", "label": "Articles curated today", "sub": "WSJ 15 · ST 9 · BT 13 · SCMP 26"}, {"value": "Closed", "label": "Iran declares Hormuz shut", "sub": "US strikes again; says it stays open"}, {"value": "S$70+", "label": "DBS share price", "sub": "Record; SG banks at all-time highs"}, {"value": "Helium ban", "label": "China export curb", "sub": "Chip supply chain strained"}, {"value": "Apple v OpenAI", "label": "Trade-secrets suit", "sub": "Big Tech legal escalation"}, {"value": "H2 rebound", "label": "SG & HK IPOs", "sub": "Set to continue; risks remain"}], "articles": [{"id": "wsj-01", "title": "Airlines and Hyperscalers Clamor for Turbines. Only a Few Companies Make the Parts.", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Technology & AI", "Energy", "Finance & Markets"], "summary": "Western production of turbine blades and vanes, needed for jet engines and data-center gas turbines, is concentrated in four firms: Howmet Aerospace, Berkshire Hathaway-owned Precision Castparts, Consolidated Precision Products and DPC Holdings, which listed in New York last month. Howmet's first-quarter commercial-aerospace sales rose 20% and gas-turbine revenue 39%; it holds over 50% of the global gas-turbine share and expects that segment to double in three to five years. DPC's aerospace and gas-turbine revenue jumped 43% and 29%. Aircraft wait times run 10 years; heavy-duty power turbines face eight-year backlogs. Spares are now about 23% of Howmet's revenue, up from 11% in 2019. Capital discipline persists: Howmet plans $500 million capex; DPC $58 million. Berkshire took a $10 billion Precision Castparts write-down in 2020.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Airlines%20and%20Hyperscalers%20Clamor%20for%20Turbines.%20Only%20a%20Few%20Companies%20Make%20the%20Parts..pdf"}, {"id": "wsj-02", "title": "America Risks Blowing the AI Race. Here Are Seven Ideas to Get Back on Track.", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Technology & AI", "Politics", "Society"], "summary": "Axios co-founder Jim VandeHei argues the U.S. is fumbling the AI race despite unmatched resources. Starting next year, American AI companies will spend roughly $1 trillion in a single year, comparable to the Manhattan Project, Apollo landings, Interstate Highway System and Human Genome Project combined. He says government, business and universities are in \"panicked and confused paralysis\" while China pursues a state-directed plan to dominate AI and lock down supply chains. He proposes seven society-level fixes: frame AI as a national moonshot with China as competitor; build a coordinating working group with real authority; pre-legislate staged responses to job displacement, with triggers if unemployment hits 6%; and create a real-time national AI labor app. He cites Dario Amodei's warnings and Elon Musk's claims about work becoming optional.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/America%20Risks%20Blowing%20the%20AI%20Race.%20Here%20Are%20Seven%20Ideas%20to%20Get%20Back%20on%20Track..pdf"}, {"id": "wsj-03", "title": "Apple Sues OpenAI, Alleging It Stole Trade Secrets", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Technology & AI"], "summary": "Apple sued OpenAI on Friday in the Northern District of California, alleging theft of trade secrets to build competing devices. The suit names OpenAI chief hardware officer Tang Tan, a 24-year Apple veteran who worked with Jony Ive, and technical staffer Chang Liu, both ex-Apple. Apple alleges Tan emailed himself supplier information and asked Apple job candidates to bring \"actual parts\" to interviews, and that Liu used a colleague's work computer to download \"dozens of Apple's confidential hardware-related files.\" OpenAI said it has \"no interest in other companies' trade secrets.\" Relations soured since the 2024 ChatGPT-Siri deal; Apple's new Siri AI, announced in June, runs on Google's Gemini. OpenAI also faces a trade-secrets suit from iyO. News Corp, WSJ's parent, has an OpenAI content deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Apple%20Sues%20OpenAI,%20Alleging%20It%20Stole%20Trade%20Secrets.pdf"}, {"id": "wsj-04", "title": "Democrats Picked a Chairman From the Grassroots. Now, Some See a '10-Alarm Fire.'", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Politics"], "summary": "Ken Martin's Democratic National Committee is struggling more than a year into his chairmanship, with Republicans holding a roughly 2-to-1 cash advantage. The DNC has spent $7.3 million more than it raised this cycle, including a $15 million loan taken in October, and ended May with $18.3 million in debt against $14.9 million in cash. The RNC and its two congressional arms held $256.1 million, versus $126.7 million for Democratic counterparts. Rufus Gifford, the 2024 Biden-Harris finance chair, called the gap \"a 10-alarm fire.\" More than a dozen operatives questioned Martin's fundraising reach; he declined an interview but defended his grassroots approach. Democrats also face a Maine Senate nominee scandal and socialist primary upsets ahead of the November midterms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Democrats%20Picked%20a%20Chairman%20From%20the%20Grassroots.%20Now,%20Some%20See%20a%20%E2%80%9810-Alarm%20Fire.%E2%80%99.pdf"}, {"id": "wsj-05", "title": "Do We Really Feel This Lousy About the Economy, or Is a Key Survey Broken?", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "The University of Michigan consumer sentiment index hit a record-low 44.8 in May and edged to 49.5 in June, below the prior trough set in mid-2022 when inflation topped 9%. Critics say methodology is to blame: Michigan shifted to web-based surveying in 2024, and economists Ryan Cummings and Ernie Tedeschi estimated the change shaved about nine points off the index. A Chicago Fed analysis raised similar concerns. Attorney Joel Wertheimer argues the sample skews Democratic, saying \"The survey has way too many Democrats.\" Survey director Joanne Hsu pushed back Friday, attributing weakness to a post-Covid mood shift and noting the Democratic skew followed Trump's inauguration. Conference Board, New York Fed and Gallup gauges are also downbeat. Preliminary July data arrives July 17.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Do%20We%20Really%20Feel%20This%20Lousy%20About%20the%20Economy,%20or%20Is%20a%20Key%20Survey%20Broken.pdf"}, {"id": "wsj-06", "title": "Fears Over New Luxury Jet Forced Trump Back to an Old Air Force One After Israeli Warning", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "President Trump flew home from a NATO summit in Ankara aboard an older Air Force One after Israeli intelligence indicated a possible Iranian plot to kill him, U.S. officials said. The threat was deemed not entirely credible, but the Secret Service, the White House military office and national security staff judged his preferred jet, gifted by Qatar and overhauled by the Air Force, lacked adequate defensive capabilities. Trump denied a security concern, saying he faces threats \"all the time.\" Some officials suspect Israel shared the intelligence to push Washington back toward war with Iran. Former Air Force Secretary Frank Kendall said a full retrofit takes three to four years; the jet cost about $250 million versus roughly $2 billion for Air Force One.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Fears%20Over%20New%20Luxury%20Jet%20Forced%20Trump%20Back%20to%20an%20Old%20Air%20Force%20One%20After%20Israeli%20Warning.pdf"}, {"id": "wsj-07", "title": "Housing Bill Becomes Law Despite Trump Refusing to Sign It", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Politics", "Society"], "summary": "A landmark housing affordability bill became law on Saturday without President Trump's signature, a rare occurrence, after he protested the stalled SAVE America Act mandating proof of citizenship to register and nationwide voter ID. House Speaker Mike Johnson transmitted the bill on June 29, starting a 10-day clock. Trump also wants to ban most mail-in voting and add provisions on transgender athletes and youth gender treatments. The bill, passed with big bipartisan majorities, contains some 50 provisions to ease homebuilding, including a ban on institutional investors buying single-family homes that Trump himself pushed. Sen. Ruben Gallego said the bill became law \"in spite of, not because of, the president.\" Sen. Mike Rounds praised it. Midterms are four months away.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Housing%20Bill%20Becomes%20Law%20Despite%20Trump%20Refusing%20to%20Sign%20It.pdf"}, {"id": "wsj-08", "title": "How Charles Schwab Turbocharged Trump's Stock-Trading Frenzy", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "A New York appeals court's August decision to throw out a roughly $500 million penalty against the Trumps freed cash in a Charles Schwab account, triggering an automated trading spree. Trump's latest financial disclosure revealed more than 21,000 trades over the past year, up from dozens or hundreds earlier in his term, drawing ethics scrutiny. Schwab's \"account no. 7\" held the most money of eight investment accounts and had among the highest trade volumes after the ruling; UBS and JPMorgan also manage family accounts. The Trumps use direct indexing, which tracks indexes like the S&P 500 while harvesting tax losses. Schwab also extended the trust a pledged-asset credit line above $50 million. The eight accounts held at least $858 million in 2025, up from $237 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/How%20Charles%20Schwab%20Turbocharged%20Trump%E2%80%99s%20Stock-Trading%20Frenzy.pdf"}, {"id": "wsj-09", "title": "Meta Failed to Protect Users From Addictive Apps, EU Says", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Technology & AI", "Society", "Politics"], "summary": "The European Commission issued preliminary findings Friday that Meta breached the Digital Services Act by failing to protect users' physical and mental health from addictive designs on Instagram and Facebook. If confirmed, Meta could be fined up to 6% of global revenue per platform. Regulators said Meta inadequately assessed risks, noting time-management tools are easily dismissed and parental controls are hard to use; possible remedies include disabling default autoplay and infinite scrolling. The features \"shift the brain into 'autopilot mode',\" the commission said. Meta disagreed, citing teen-safety steps. The findings follow U.S. jury verdicts in California, against Meta and YouTube, and New Mexico. The EU has also warned TikTok over addictive design and fined Elon Musk's X almost $140 million last year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Meta%20Failed%20to%20Protect%20Users%20From%20Addictive%20Apps,%20EU%20Says.pdf"}, {"id": "wsj-10", "title": "Oil Demand Recovery Is Under Way but U.S.-Iran Escalation Clouds Outlook, IEA Says", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Energy", "Geopolitics", "Finance & Markets"], "summary": "The International Energy Agency said global oil demand is recovering after Middle East disruptions, but renewed U.S.-Iran fighting clouds the outlook. Consumption is projected to fall 1 million barrels a day in 2026, easing from a 4.8 million b/d second-quarter drop and a forecast 1.7 million b/d third-quarter decline, before growing 1.2 million b/d in the fourth quarter. For 2027, the IEA sees demand up 1.9 million b/d and supply surging about 7.5 million b/d, with OPEC+ adding 5.3 million b/d. Traffic through the Strait of Hormuz, normally a fifth of world oil and gas flows, is near a halt again after Trump declared the ceasefire over and revoked Iran's oil-sales license. Brent traded near $75; WTI just above $71. June supply rose 4.1 million b/d to 98.8 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Oil%20Demand%20Recovery%20Is%20Under%20Way%20but%20U.S.-Iran%20Escalation%20Clouds%20Outlook,%20IEA%20Says.pdf"}, {"id": "wsj-11", "title": "The War in Ukraine Is Shifting Against Putin but He Isn't Giving In", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "After four years betting on attrition, Russia is losing ground in the drone war: its gains along the 700-mile front are shrinking, casualties have outstripped recruitment since last winter, and Ukrainian strikes are causing a fuel crisis in occupied Crimea and hitting refineries deep inside Russia. Moscow analyst Ruslan Pukhov said Russia's strategic position \"has deteriorated over the past year,\" with signs of exhaustion in its armed forces, but predicted Putin will fight on indefinitely. Michael Kofman said Putin appears fed inaccurate reports suggesting victory in Donetsk, where troops are infiltrating Kostyantynivka. Trump, who once told Volodymyr Zelensky he had \"no cards,\" praised Ukraine's drone capability at the NATO summit in Turkey. Zelensky called Russian ballistic missiles its \"last major advantage\" and urged more Patriots.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/The%20War%20in%20Ukraine%20Is%20Shifting%20Against%20Putin%20but%20He%20Isn%E2%80%99t%20Giving%20In.pdf"}, {"id": "wsj-12", "title": "The White House Made Fixing Intel Its Pet Project. It's Working.", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Technology & AI", "Politics", "Trade"], "summary": "The Trump administration's hands-on patronage has revived Intel, whose shares have more than quadrupled since Lip-Bu Tan became CEO in March 2025. The government converted $9 billion in federal grants into a 10% stake, becoming Intel's largest shareholder, after Trump had publicly demanded Tan resign over his China ties, flagged by Sen. Tom Cotton, then warmed to him. Trump and Commerce Secretary Howard Lutnick pressed Tim Cook to use Intel fabs during tariff-exemption talks; Trump later announced on Truth Social that Apple would use Intel chips, for Mac laptops and iPhones, sending shares to record highs. Nvidia invested $5 billion in September, and Musk's SpaceX added Intel to his Terafab initiative in April. Tan visits Washington monthly; chips czar Bill Frauenhofer gets quarterly CFO briefings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/The%20White%20House%20Made%20Fixing%20Intel%20Its%20Pet%20Project.%20It%E2%80%99s%20Working..pdf"}, {"id": "wsj-13", "title": "There's an IPO Gold Rush-and Texas Is Coming for New York", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Texas Stock Exchange began real trading Friday at 9:30 a.m., with a handful of small symbols, after practice runs involving Goldman Sachs and Citadel Securities traders. TXSE grew from a 2022 Houston dinner where Governor Greg Abbott floated the idea to James Lee, who built it; backers include BlackRock, Goldman, Fortress Investment Group and Charles Schwab. The launch lands amid an IPO boom: SpaceX's $86 billion listing was the largest ever, and OpenAI and Anthropic could go public within months. TXSE has no listings yet and hired Liz Hocker from the NYSE to win IPOs. Texas has more Fortune 500 headquarters than any state and built business courts to challenge Delaware. Lee said, \"We will be a permanent, established part of the U.S. capital markets.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%
