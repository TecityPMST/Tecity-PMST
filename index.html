n June 29 it authorized selling up to $1.25 billion of bitcoin to buy back shares. It sold 3,588 bitcoins for $216 million last week and raised its STRC preferred dividend to 12%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Michael%20Saylor%E2%80%99s%20Strategy%20Is%20Trapped%20by%20Its%20Own%20Broken%20Bitcoin%20Math.pdf"}, {"id": "wsj-08", "title": "Microsoft Will Lay Off More Than 3,000 Xbox Division Staffers", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Technology & AI"], "summary": "Microsoft will cut about 3,200 jobs from its Xbox videogames division, roughly one-fifth of headcount, as it restructures the struggling business. Xbox CEO Asha Sharma told staff Monday the company will lay off 1,600 people this week and 1,250 more later this fiscal year, plus at least 350 from selling or spinning off four game studios. \"Our business today is not healthy,\" Sharma wrote. Game Pass has about 30 million subscribers, far below a projected 77 million. Xbox revenue fell 5% in the quarter ended March; fiscal-year profit margin was 3%. Sharma, a former Instacart COO named in February, is cutting games published, investing in Minecraft, Candy Crush and Fallout, and raised console prices amid AI-driven memory-chip shortages.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Microsoft%20Will%20Lay%20Off%20More%20Than%203,000%20Xbox%20Division%20Staffers.pdf"}, {"id": "wsj-09", "title": "SpaceX Is About to Join the Nasdaq-100. Here's How Exposed You'll Be.", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX joins the Nasdaq-100 on Tuesday, forcing funds tracking the index, including Invesco's QQQ ETF and $800 billion in collective assets, to buy its shares at Monday's close. Elon Musk's company was fast-tracked under new rules for newly public megacaps. Despite a $2.1 trillion market cap, SpaceX enters as a small component: it sold under 5% of shares in last month's IPO, so float-adjustment caps its weight below 1%, treating it like a $300 billion company. QQQ charges 0.18%, undercut by State Street's new 0.1% SPDR fund and Invesco's own QQQM at 0.15%. Index inclusion creates automatic demand, but employee lockups will add selling pressure. SpaceX won't join the S&P 500 for at least a year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/SpaceX%20Is%20About%20to%20Join%20the%20Nasdaq-100.%20Here%E2%80%99s%20How%20Exposed%20You%E2%80%99ll%20Be..pdf"}, {"id": "wsj-10", "title": "The Iran War Has Oil-Rich Alaska Freaked Out About $9 Gas", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Energy", "Politics"], "summary": "In remote Alaska, the Iran war has driven fuel prices to the nation's highest, around $9 to $10 a gallon, because off-road communities receive fuel by summer barge and many ordered in spring as prices soared. Even if Hormuz reopens, rural Alaskans face high prices for months. Dillingham estimates spending an extra $166,015 in fiscal 2027. The national gas average peaked at $4.56 in May, now $3.80. The paradox is stark given Alaska's fossil-fuel wealth and Trump's energy agenda; new projects like Repsol/Santos's Pikka (80,000 barrels/day) and ConocoPhillips's $9 billion Willow aim to revive output. The energy crisis is eroding Trump's support and shaping a tight Senate race between Republican Dan Sullivan and Democrat Mary Peltola.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/The%20Iran%20War%20Has%20Oil-Rich%20Alaska%20Freaked%20Out%20About%20%249%20Gas.pdf"}, {"id": "wsj-11", "title": "Ukraine's Shortage of Patriot Missiles Leaves Kyiv Undefended", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Ukraine has virtually run out of Patriot interceptors, leaving Kyiv exposed. Monday's Russian missile attack killed at least 12 and wounded nearly 50; Ukraine intercepted none of 23 ballistic missiles. A global shortage, worsened by the U.S.-Iran war, means Ukraine waits among about 20 countries for interceptors that take over two years to build. Thursday's strike killed 31. Ukraine stops 90% of long-range drones and 80% of 722 cruise missiles, but 70% of 522 ballistic missiles get through. President Zelensky will press Western allies at the Ankara NATO summit. Lockheed delivered about 620 PAC-3 interceptors last year at roughly $2 million each, targeting 2,000 annually only by 2030. Kyiv ordered nearly 100 PAC-2s from a new German MBDA factory.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Ukraine%E2%80%99s%20Shortage%20of%20Patriot%20Missiles%20Leaves%20Kyiv%20Undefended.pdf"}, {"id": "wsj-12", "title": "War Has Changed. How It's Being Waged Has Reached a Technological Inflection Point", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Defence", "Technology & AI"], "summary": "Warfare is at a technological inflection point as drones, cheap precision munitions and AI-guided autonomous systems upend doctrine, raising doubts about hundreds of billions spent on tanks, planes and warships. Germany's defense chief Gen. Carsten Breuer says \"the character of warfare is changing fundamentally.\" Rear areas are no longer safe, and massed maneuvers are harder as cheap sensors expose troop concentrations. Autonomy already aids U.S. target lists against Iran and Ukrainian and Russian drones. Palantir's Louis Mosley predicts 2026 may be remembered like the advent of gunpowder. Ukraine's \"e-points\" system lets brigades buy drones directly based on confirmed hits; drones account for over 90% of enemy losses. Weapons become obsolete within months, making adaptability decisive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/War%20Has%20Changed.%20How%20It%E2%80%99s%20Being%20Waged%20Has%20Reached%20a%20Technological%20Inflection%20Point.pdf"}, {"id": "wsj-13", "title": "World's Hottest Market Risks Becoming a Squid Game", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "South Korea's Kospi has surged 165% in a year but with extreme volatility: 77 moves of at least 2% versus five for the S&P 500, and 23 moves of 5%-plus. Swings are driven largely by chipmakers Samsung and SK Hynix, intensified by leveraged products forced to buy or sell into moves. Regulators and the central bank are alarmed and seeking to curb speculation; prospective buyers of leveraged products must pass a quiz. Foreign investors are exiting, with outflows exceeding $100 billion in the first half of 2026 and $30 billion in June alone, potentially leaving locals holding losses. South Korea's market is now among the world's largest despite a population of 51 million. Columnist Spencer Jakab warns U.S. regulators.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/World%E2%80%99s%20Hottest%20Market%20Risks%20Becoming%20a%20Squid%20Game.pdf"}, {"id": "wsj-14", "title": "'Killer Robots' Must Be Banned, U.N. Secretary-General Says", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Technology & AI", "Defence"], "summary": "U.N. Secretary-General Antonio Guterres called Monday for lethal autonomous weapons to be \"banned by international law,\" calling them \"morally repugnant\" in a Geneva speech on AI governance. The issue resurfaces Anthropic's schism with the Pentagon: early this year Anthropic sought assurances its models wouldn't power domestic-surveillance or autonomous-weapons systems, but the Pentagon, then a heavy user, refused, and the two are fighting in court. Pope Leo XIV backed a ban in a spring encyclical, warning AI weapons \"normalize an anti-human vision.\" Proponents argue autonomous weapons stay under human control and add precision; detractors warn AI makes mistakes. Last month the Trump administration lifted an export ban on two Anthropic models. \"Some decisions must remain forever human,\" Guterres said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/%E2%80%98Killer%20Robots%E2%80%99%20Must%20Be%20Banned,%20U.N.%20Secretary-General%20Says.pdf"}, {"id": "st-01", "title": "Are baby investors the answer to Trump's midterm blues?", "source": "ST", "date": "8 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "President Donald Trump launched \"Trump Accounts\" on July 6, ringing the opening bell inside the Oval Office for the first time. Every child born during his second term receives US$1,000, with families and employers able to add up to US$5,000 yearly; six million children are enrolled. Billionaire Michael Dell donated US$6.25 billion in seed money for lower-income kids. Funded via the One Big Beautiful Bill Act, Republicans hope it lifts them at the Nov 3 midterms, pitching it as giving \"every child a stake\" in the American Dream. Democrats call it a distraction from safety-net cuts. Trump, whose approval sits near 40 per cent, is also pressing Walmart to cut prices and demanding lower petrol costs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Are%20baby%20investors%20the%20answer%20to%20Trump's%20midterm%20blues.pdf"}, {"id": "st-02", "title": "China missile test raises nuclear proliferation concerns", "source": "ST", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China test-fired a dummy warhead from a nuclear submarine into the Pacific on July 6, landing about 1,000km north-east of the Solomon Islands and prompting US and Australian alarm over Beijing's rapid nuclear build-up. Solomon Islands leader Matthew Wale lodged a \"strong protest,\" saying \"this is not something a friend does.\" Taiwan identified the missile as a JL-2 with a range exceeding 8,000km that overflew the Philippines, which called it a \"reckless display of military power.\" The State Department urged arms-control talks after New START lapsed in February. Analysts said the launch signals a more survivable sea-based deterrent able to target the continental US. Russia defended the test as China's \"sovereign right.\" Australia and Fiji signed a defence treaty the same day.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/China%20missile%20test%20raises%20nuclear%20proliferation%20concerns.pdf"}, {"id": "st-03", "title": "Has China obtained the world's most important machine?", "source": "ST", "date": "8 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The Trump administration alleges an ASML extreme-ultraviolet (EUV) lithography machine, essential for the most advanced chips, may have reached China, throwing Europe's most valuable company into crisis. Commerce Secretary Howard Lutnick raised the concern; ASML insists it knows the location of all 340 EUV machines and has shipped none to China. The Dutch government backs ASML but takes the claim seriously. Experts call the allegation \"unverified\" yet \"not unfounded,\" suspecting components or older DUV tools rather than a whole machine. China's SMIC and Huawei use DUV \"multi-patterning\" to make sub-seven-nanometre chips. Washington's MATCH Act would curb DUV sales and servicing, straining ties with the Netherlands, which recently seized chipmaker Nexperia and faced Chinese export retaliation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Has%20China%20obtained%20the%20world's%20most%20important%20machine.pdf"}, {"id": "st-04", "title": "Home prices in Singapore are finally cooling. That's a healthy sign", "source": "ST", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Singapore's long-rising housing market is finally cooling, which analysts view as healthy rather than a slump. HDB resale prices slipped 0.3 per cent in the second quarter of 2026 after a 0.1 per cent fall, the first back-to-back quarterly decline in seven years, while private home price growth slowed to 0.5 per cent. HDB resale volumes dropped 10.2 per cent year on year. Lower interest rates, with SORA near 1.1 per cent, plus a larger Build-To-Order pipeline, have made buyers more selective and patient. Older flats with short leases face the most pressure, while well-located newer homes hold value. New launches like Pinery and Tengah Garden Residences still sold strongly. Cooling measures since 2021 curbed speculation without triggering a downturn.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Home%20prices%20in%20Singapore%20are%20finally%20cooling.%20That's%20a%20healthy%20sign.pdf"}, {"id": "st-05", "title": "How to stop AI from becoming the enemy of younger workers", "source": "ST", "date": "8 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "South Korea looks like an AI winner, with Samsung Electronics and SK Hynix topping US$1 trillion market values and unionised workers winning bonuses averaging nearly US$400,000. But the gains deepen an \"insider-outsider\" divide, bypassing subcontractors and youth. Bank of Korea economists found 211,000 youth jobs (ages 15-29) vanished over three years while workers in their 50s gained 209,000, calling it \"seniority-biased technological change\" as AI replaces junior tasks. Youth employment fell 11.2 per cent in computer programming and 23.8 per cent in information services. Strong protection for incumbents shifts adjustment onto young entrants. Using semiconductor tax windfalls, the government plans a \"Future Response Fund\" to subsidise hiring, training and start-ups so struggling youth can, as the author quips, beat them.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/How%20to%20stop%20AI%20from%20becoming%20the%20enemy%20of%20younger%20workers.pdf"}, {"id": "st-06", "title": "London still Europe's financial hub despite Brexit", "source": "ST", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "A decade after Britain voted for Brexit, predictions that London would lose its crown as Europe's top financial centre have not materialised. Banks built EU-facing legal shells but kept traders and decision-makers in London. The Bank of France cites about 2,500 new banking jobs and 220 billion euros in assets moving to Paris, while Dublin took asset-management funds, Frankfurt banking assets and Amsterdam briefly led equities, yet none rivalled London's ecosystem. Euro derivatives clearing worth over 90 trillion euros stays with LCH SwapClear. London's edge rests on English common law, language, its time zone and three centuries of talent. Real competition now comes from New York, Singapore and Asia; Wise moved to New York and AstraZeneca has weighed leaving.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/London%20still%20Europe's%20financial%20hub%20despite%20Brexit.pdf"}, {"id": "st-07", "title": "MAS proposing new corporate structure for insurance", "source": "ST", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore is proposing a new corporate structure, the protected cell company (PCC), targeted for 2028, to deepen Singapore's role as Asia's risk-management hub. A PCC combines a central \"core\" with legally segregated \"cells,\" letting multiple insurance solutions run independently within one entity at lower cost than separate special purpose vehicles. A consultation paper is open until Aug 7, following DPM Gan Kim Yong's June 25 announcement. MAS proposes three initial use cases: captive insurance (including a \"rent-a-captive\" model for smaller firms), issuing insurance-linked securities, and pooling sovereign catastrophe risks such as the SEADRIF regional facility. Industry figures from Aon and Rajah & Tann say mid-sized firms would benefit most and new insurance jobs could emerge.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/MAS%20proposing%20new%20corporate%20structure%20for%20insurance.pdf"}, {"id": "st-08", "title": "Microsoft AI layoffs: 4,800 jobs cut", "source": "ST", "date": "8 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Microsoft is cutting about 4,800 jobs, or 2.1 per cent of its workforce, restructuring its commercial and Xbox businesses as it shifts investment towards AI infrastructure, joining Amazon and Meta in 2026 layoffs. Shares closed down 1 per cent on July 6 after a near-23 per cent first-half slump, its worst since 2022. Chief people officer Amy Coleman said the eliminated roles \"are not being replaced by AI,\" though AI is changing how work gets done. Big Tech's AI spending is set to top US$700 billion in 2026. Azure cloud growth is strong, but data-centre costs squeeze cash flow, and surging memory-chip prices forced Xbox console price rises. Microsoft is weighing options for the gaming unit, including a possible spin-off.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Microsoft%20AI%20layoffs%204,800%20jobs%20cut.pdf"}, {"id": "st-09", "title": "Singapore tops list of world's most expensive cities for the rich", "source": "ST", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Singapore retained its title as the world's most expensive city for the affluent for a fourth straight year, according to the Julius Baer Global Wealth and Lifestyle Report 2026, released July 7. The ranking reflects high residential property and car prices, the heaviest-weighted items, and a strong Singapore dollar. The index tracks 20 luxury goods and services across 25 cities. Singapore remains the priciest place to buy a car and third for property, though healthcare fell from third to 23rd. Zurich rose to second, displacing London, while Monaco entered the top three. Rising gold prices lifted jewellery costs. Asia-Pacific investors increased diversification, with over 70 per cent boosting it; equities stay preferred, with cash rising ahead of real estate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Singapore%20tops%20list%20of%20world's%20most%20expensive%20cities%20for%20the%20rich.pdf"}, {"id": "st-10", "title": "Tankers hit in Hormuz as huge crowds mourn Khamenei in Iran", "source": "ST", "date": "8 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Two tankers were struck in the Strait of Hormuz on July 7: a Qatari LNG carrier, Al Rekayyat, at risk of exploding after an engine-room fire, and a Saudi-flagged crude supertanker damaged off Oman. A US official said initial indications were that Iran fired at the vessels; there was no claim of responsibility, and Tehran did not comment. The attacks came as hundreds of thousands mourned Iran's slain supreme leader, Ayatollah Ali Khamenei, in Qom, some carrying \"KILL TRUMP\" placards. Iran's clerical rulers are asserting control over the shipping route and seeking to charge fees. A war paused in June under an interim deal shows no negotiating progress; Trump threatened to \"finish the job.\" Oil prices ticked up about 1 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20ST/Tankers%20hit%20in%20Hormuz%20as%20huge%20crowds%20mourn%20Khamenei%20in%20Iran.pdf"}, {"id": "bt-01", "title": "AI can now access your brokerage account. Should you let it?", "source": "BT", "date": "8 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Interactive Brokers and Moomoo now let retail users connect external AI tools such as ChatGPT, Claude or Grok directly to trading accounts, giving them real-time access to positions, balances, trade history and risk exposures. Both require user confirmation before any trade executes. Experts warn the convenience amplifies overconfidence and overtrading, especially among young investors, because agreeable AI encourages chasing trends. Providend's Bryan Chan cautions that AI lacks personalised context and is not a licensed adviser. Former MAS risk lead Gary Ang says plausible-sounding wrong answers, outdated figures and prompt-injection attacks pose bigger dangers than obvious errors. Recommended precautions include using AI to understand not trade, requiring approval for every trade, choosing regulated providers, granting least access, enabling two-factor authentication and verifying all outputs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/AI%20can%20now%20access%20your%20brokerage%20account.%20Should%20you%20let%20it.pdf"}, {"id": "bt-02", "title": "Asean can lower cost of green transition by yuan debt: China's green finance veteran", "source": "BT", "date": "8 Jul 2026", "tags": ["Southeast Asia", "Energy", "Finance & Markets"], "summary": "Ma Jun, former PBOC chief economist and a key architect of China's green-finance system, argues Asean can cut green-transition financing costs by issuing yuan-denominated debt. China's 3 per cent benchmark rate sits below the US 3.75 per cent and regional rates like Indonesia's 5.75 per cent, while intense competition among Chinese banks compresses lending margins. He cited Pakistan's 1.8 billion yuan panda bond, carrying a 2.5 per cent coupon and oversubscribed more than fivefold, as proof of concept. Only 11 per cent of Asian international bonds were yuan-denominated in 2024 versus 67 per cent in US dollars. Ma also urged deploying Chinese green technology across solar, hydrogen, biomass and waste, downplaying debt-trap fears and noting private-sector investment avoids government borrowing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/Asean%20can%20lower%20cost%20of%20green%20transition%20by%20yuan%20debt%20China's%20green%20finance%20veteran.pdf"}, {"id": "bt-03", "title": "Beijing bolsters Hong Kong bond, gold trading in global renminbi push", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Beijing and Hong Kong unveiled measures to strengthen the city as a leading offshore renminbi centre amid heightened geopolitical tensions. Hong Kong launched a central gold clearing system, revived US dollar gold futures and plans renminbi-denominated gold futures, targeting over 2,000 tonnes of storage by 2030. The southbound Bond Connect quota expands to 800 billion yuan from 500 billion, while a renminbi-liquidity facility with the HKMA rises to 500 billion yuan from 200 billion. PBOC governor Pan Gongsheng said global renminbi demand is expanding into investment, financing, pricing and reserves. Chief Executive John Lee promised tax incentives, saying if gold is the world's safe haven, Hong Kong will be its \"safe harbour\". A new electronic platform will boost secondary bond and FX trading.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/Beijing%20bolsters%20Hong%20Kong%20bond,%20gold%20trading%20in%20global%20renminbi%20push.pdf"}, {"id": "bt-04", "title": "CICT, CapitaLand should snap up Bugis Junction Towers", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "This opinion piece argues CapitaLand Integrated Commercial Trust (CICT) and other CapitaLand entities should acquire Bugis Junction Towers, the 15-storey office block guide-priced at S$685 million, or about S$2,750 per square foot on nearly 250,000 sq ft net lettable area at a 3.5 per cent net yield. It is being sold by a TPG Angelo Gordon-led consortium and is fully leased, anchored by Enterprise Singapore. CICT already owns the adjoining mall. Acquiring the tower would position the group to redevelop the ageing 1995 integrated complex above a major MRT interchange, potentially adding residential and civic uses under URA's Strategic Development Incentive Scheme. The writer cites the Liang Court transformation as a model and notes roughly 63 years of lease remain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/CICT,%20CapitaLand%20should%20snap%20up%20Bugis%20Junction%20Towers.pdf"}, {"id": "bt-05", "title": "China's next soft-power export could be beauty", "source": "BT", "date": "8 Jul 2026", "tags": ["Society", "Southeast Asia", "Trade"], "summary": "China's cosmetics industry, or C-beauty, is emerging as a soft-power export following Japan and South Korea's playbook, with South-east Asia the most critical growth region rather than the West. Chinese brands compete on lower prices, rapid roll-outs, broader skin-tone ranges and halal-certified, wudhu-friendly products for the region's 200 million-plus Muslims. Shanghai-based Joy Group's international sales surged tenfold to US$87 million in 2025, lifting group revenue 22 per cent to US$620 million. Asean beauty imports from China more than doubled over five years, with Indonesia the top market. TikTok Shop and Lazada, plus \"Douyin makeup\" trends and hit dramas like Pursuit of Jade, spread cultural influence. China's US$5.7 billion beauty exports remain modest, about a quarter of France's total.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/China's%20next%20soft-power%20export%20could%20be%20beauty.pdf"}, {"id": "bt-06", "title": "DBS, OCBC and UOB shares hit all-time highs as sentiment improves", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "Shares of Singapore's three banks closed at record highs on Tuesday, July 7, topping the Straits Times Index after a Citi note raised target prices. OCBC led, up 3.3 per cent to S$26.34; UOB gained 2.9 per cent to a record S$41.69; and DBS rose 2.6 per cent to S$68.64. Citi named DBS its preferred pick with a \"buy\", OCBC a \"buy\" and UOB \"neutral\", forecasting about 10 per cent DBS earnings growth in 2027 and 2028 on loan-growth recovery. Falling Sora rates near 1 per cent, May loan growth of 8.7 per cent outpacing deposits, and lifted net-interest-margin and sector loan-growth forecasts underpin the upgrade. Citi favours DBS's dividend visibility and Asia wealth positioning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/DBS,%20OCBC%20and%20UOB%20shares%20hit%20all-time%20highs%20as%20sentiment%20improves.pdf"}, {"id": "bt-07", "title": "Fed chair Kevin Warsh's agenda clashes with reality", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Nearly two months into his tenure as the Federal Reserve's 17th chair, Kevin Warsh finds his reform agenda clashing with reality. Confirmed by a record-narrow 54-45 Senate vote and seen as a Trump-aligned dove, Warsh instead faces sticky inflation, with the Fed's preferred PCE index hitting its highest since 2023 after Middle East conflict. Futures now price essentially no 2026 rate cut, and a hike is possible. Warsh stressed \"price stability\" over easing, faces intense scrutiny over independence, and must build authority alongside predecessor Jerome Powell, who stays on the board and keeps his vote. His plans to shrink the balance sheet, curb forward guidance and harness AI face a nine-to-12-month horizon amid constant political pressure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/Fed%20chair%20Kevin%20Warsh's%20agenda%20clashes%20with%20reality.pdf"}, {"id": "bt-08", "title": "How the EU can lead the rest of the West", "source": "BT", "date": "8 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "This opinion essay argues the EU should lead a coalition of like-minded middle powers rather than pursue solitary sovereignty. Citing Canadian PM Mark Carney's Davos warning that middle powers must \"act together\" or risk being \"on the menu\", the writer proposes a Compact for Open and Resilient Economies (CORE) linking the EU with Switzerland, Norway, the UK, Canada, Australia, Japan and South Korea, jointly exceeding US GDP and approaching China's manufacturing output. The EU would consult partners before major trade or industrial-policy decisions and adopt a \"made with Europe\" approach treating partner inputs as equivalent. The writer urges revising the Industrial Accelerator Act and exempting CORE countries from restrictive new steel-import rules that halve tariff-free quotas and double tariffs to 50 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/How%20the%20EU%20can%20lead%20the%20rest%20of%20the%20West.pdf"}, {"id": "bt-09", "title": "Memory makers, especially the South Korean ones, must learn to speak up", "source": "BT", "date": "8 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "This opinion piece argues memory-chip makers Samsung, SK Hynix and Micron must publicly explain surging prices or risk being cast as a cartel. \"Techflation\" has replaced technology's decades-long disinflation, with memory chips increasingly blamed for rising costs. The trio already earns close to US$400 billion a year combined, rivalling Apple, Alphabet, Meta and Amazon, yet still speaks in vague \"supercycle\" terms. A California antitrust suit by 17 plaintiffs alleges they conspired to keep DRAM artificially scarce via a coordinated pivot to high-bandwidth memory. The writer notes AI servers hold eight-to-ten times more memory and HBM burns roughly three wafers per commodity part. Recalling a 1998-2002 price-fixing conviction, he urges the firms to show order books and capacity maths.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/Memory%20makers,%20especially%20the%20South%20Korean%20ones,%20must%20learn%20to%20speak%20up.pdf"}, {"id": "bt-10", "title": "Singapore to speed up cross-listing of foreign ETFs with 3-month approval target", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "Singapore is moving to cut foreign ETF cross-listing time on SGX to within three months, down from about two years, under a streamlined approach that reduces regulatory friction and broadens investor choice. MAS on June 25 announced plans to speed approvals for non-traditional funds. SGX said retail investors and digital platforms now account for more than 40 per cent of SGX-listed ETF assets, driven by robo-advisers and model portfolios. Singapore has 53 listed ETFs versus Hong Kong's 184, lacking products such as leveraged and inverse single-stock ETFs. DPM Gan Kim Yong, also MAS chairman, stressed \"trusted innovation at greater speed\", with guard rails taking three months per new fund type and three weeks thereafter. MAS will consult soon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/Singapore%20to%20speed%20up%20cross-listing%20of%20foreign%20ETFs%20with%203-month%20approval%20target.pdf"}, {"id": "bt-11", "title": "The US$100 billion question that SpaceX raised", "source": "BT", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "This opinion column uses SpaceX's record Nasdaq IPO, which drew more than US$100 billion in retail orders, to examine investor psychology. The writer, Endowus's group chief investment officer, argues the frenzy reflects humans' hardwired instinct to \"do something\" even though investing rewards restraint. Citing Michael Jensen's research, he notes fewer than one in five active US funds have beaten their benchmark over two decades, and individuals fare worse given higher costs and stronger emotion. He warns concentrated bets driven by narrative and fear of missing out resemble speculation, quoting Paul Samuelson's quip that economists forecast nine of the last five recessions. He advocates broad diversification, low costs, exposure to systematic return drivers and discipline, checking portfolios roughly yearly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/The%20US100%20billion%20question%20that%20SpaceX%20raised.pdf"}, {"id": "bt-12", "title": "The real AI bottleneck isn't chips. It's power", "source": "BT", "date": "8 Jul 2026", "tags": ["Energy", "Technology & AI"], "summary": "This opinion piece by DBS Bank's chief investment officer argues electricity, not chips, is now the binding constraint on AI scaling. Nvidia CEO Jensen Huang says computing energy needs could ultimately reach roughly a thousand times today's levels as always-on AI agents proliferate, and a single AI query can consume double to more than ten times a web search's energy. Data-centre demand is growing faster than grids, behaving like unforgiving baseload, compounded by EVs and electrification. Ageing infrastructure built for one-way flows struggles with distributed renewables and volatile spikes, while transmission projects face permitting delays. The writer sees durable opportunity across oil majors, refiners, utilities, grid operators, storage and nuclear or uranium, urging investors to hold both hydrocarbons and new infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/The%20real%20AI%20bottleneck%20isn't%20chips.%20It's%20power.pdf"}, {"id": "bt-13", "title": "US tech stocks stumble, but the AI boom is far from over", "source": "BT", "date": "8 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "This opinion piece by an FSMOne research analyst argues the recent US tech sell-off is a healthy reset, not the bursting of an AI bubble. Between June 18 and July 2 the Nasdaq-100 fell over 3.5 per cent and a US semiconductor index dropped more than 10 per cent, triggered by shifting rate expectations, with futures implying about 77 per cent odds of a hike, plus capex-return worries after Meta explored selling AI compute access. The writer highlights strong demand signals: Google's cloud backlog nearly doubled to US$462 billion and Micron sees tight memory beyond 2027. He favours cheaper Asian semiconductors trading near 15 times forward earnings versus 34 for US peers, offering a larger margin of safety.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20BT/US%20tech%20stocks%20stumble,%20but%20the%20AI%20boom%20is%20far%20from%20over.pdf"}, {"id": "scmp-01", "title": "3 tracks are shaping the Middle East's post-Iran war order", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "With the Iran battlefield quieter, the contest has shifted to who writes the Middle East's post-war rules. Three overlapping tracks are emerging: a US-led framework expanding the Abraham Accords, integrating Israel and restraining Iran; a regional-autonomy caucus of Saudi Arabia, Egypt, Turkey and Pakistan; and a China-supported de-escalation track built on Saudi-Iranian rapprochement. All three want to prevent wider war, keep the Strait of Hormuz open and protect energy markets, but diverge over Iran's place, Israeli normalisation and Palestine. The US offers hard security but faces legitimacy problems; the quartet lacks enforcement mechanisms; China provides diplomacy without military guarantees. Saudi Arabia is the pivotal swing actor likely to leverage all three toward an uneasy hybrid order.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/3%20tracks%20are%20shaping%20the%20Middle%20East%E2%80%99s%20post-Iran%20war%20order.pdf"}, {"id": "scmp-02", "title": "Barrage of explosions rocks Kyiv after Ukraine says drones attacked Russia 'shadow fleet'", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "A barrage of ballistic-missile explosions struck Kyiv, triggering fires in two districts and injuring two people, Mayor Vitali Klitschko said, warning residents to shelter. The onslaught followed Russian strikes that killed 30 people across Ukraine on Monday. President Volodymyr Zelensky, in Ankara for the Nato summit, urged backers to boost air defences amid interceptor shortages. Ukraine's military said its drones attacked about a dozen tankers from Russia's \"shadow fleet\" over two days, striking eight sanctioned vessels in the Sea of Azov plus later hits, aiming to isolate Crimea and cut fuel and ammunition supply. Kyiv has stepped up attacks on Crimean logistics and energy infrastructure, prompting a state of emergency on the peninsula.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Barrage%20of%20explosions%20rocks%20Kyiv%20after%20Ukraine%20says%20drones%20attacked%20Russia%20%E2%80%98shadow%20fleet%E2%80%99.pdf"}, {"id": "scmp-03", "title": "China achieves microwatt milestone with self-reliant carbon-14 nuclear battery", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Technology & AI", "Energy"], "summary": "Northwest Normal University and Gansu Zhulong Technology unveiled the Qianjiyuan Tianshu carbon-14 nuclear battery and a domestically made silicon carbide transducer, saying it was developed without foreign technology or parts. The device cuts radioactive material use to 22 per cent while boosting short-circuit current 2.5 times and maximum power 2.6 times, achieving a 15.5-fold rise in volumetric power density. Measuring 16.8 cubic cm, it delivers 1.13 microwatts and, given carbon-14's 5,730-year half-life, a theoretical lifespan of thousands of years, operating between minus 100 and 200 degrees Celsius. Project leader Su Maogen cited uses in medical implants, deep-sea and polar regions, defence and aerospace. Nuclear batteries harness radioactive decay rather than fission, differing from reactors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/China%20achieves%20microwatt%20milestone%20with%20self-reliant%20carbon-14%20nuclear%20battery.pdf"}, {"id": "scmp-04", "title": "China extends gold-buying binge to 20th month amid Beijing's de-dollarisation push", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China's central bank extended its gold-buying streak to a 20th straight month in June, adding 480,000 troy ounces (14.93 tonnes) to lift holdings to 75.44 million ounces (2,346 tonnes), the longest run since 2015. The accumulation underscores Beijing's drive to diversify reserves and reduce dependence on US-denominated assets, though gold remains under 10 per cent of the portfolio. Foreign-exchange reserves fell US$26 billion, or 0.75 per cent, to US$3.4163 trillion. Analysts say bullion increasingly appeals as an asset insulated from sanctions and US financial volatility. Spot gold traded near US$4,140 an ounce; Goldman Sachs maintained a US$4,900 end-2026 target, citing sustained central-bank demand, rising global debt and de-dollarisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/China%20extends%20gold-buying%20binge%20to%2020th%20month%20amid%20Beijing%E2%80%99s%20de-dollarisation%20push.pdf"}, {"id": "scmp-05", "title": "China has potential to become world's largest consumer market by 2041, policy adviser says", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Mainland China could become the world's largest consumer market within 10 to 15 years, with its share of global consumption surpassing 20 per cent, said Chi Fulin, president of the China Institute for Reform and Development. Speaking at the SCMP's China Conference in Hong Kong, Chi noted China accounts for over a third of global manufacturing but only 13-15 per cent of consumption, leaving a significant gap. Closing it would make China the largest consumer market and biggest importer, becoming Hong Kong's \"strongest economic anchor.\" The comments come as retail-sales growth slowed to its weakest since December 2022. Chi urged deploying 100 trillion yuan in state capital toward households, and said Hong Kong may join RCEP this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/China%20has%20potential%20to%20become%20world%E2%80%99s%20largest%20consumer%20market%20by%202041,%20policy%20adviser%20says.pdf"}, {"id": "scmp-06", "title": "China's chip equipment rally faces earnings test as memory boom fuels bets on local tools", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's semiconductor equipment makers head into first-half earnings under scrutiny after a broad stock rally. Naura Technology has soared over 70 per cent this year, while Amec, Piotech and Hwatsing Technology more than doubled, reflecting bets that memory expansion, advanced packaging and Beijing's self-reliance push will translate into orders. Fourteen firms tracked by Soochow posted 90 billion yuan in 2025 revenue, up 35 per cent, with first-quarter 2026 revenue up 32 per cent and net profit up 61 per cent. Huatai expects global memory capex to rise 150 per cent to US$193.7 billion by 2028. Localisation sits in the low-20-per-cent range, leaving gaps in lithography and metrology. Analysts warn margins are squeezed by heavy R&D spending.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/China%E2%80%99s%20chip%20equipment%20rally%20faces%20earnings%20test%20as%20memory%20boom%20fuels%20bets%20on%20local%20tools.pdf"}, {"id": "scmp-07", "title": "Dutch trade minister in China for high-stakes talks on tech war, tariff tensions", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Trade", "Technology & AI", "Geopolitics"], "summary": "Dutch Trade Minister Sjoerd Sjoerdsma departed for a three-day China mission with representatives from 17 Dutch companies, including semiconductor firms ASML, NXP, ASM and Nearfield Instruments, amid intensifying US-China tech competition. His agenda includes a meeting with Chinese counterpart Wang Wentao and a CEO round table in Beijing and Shanghai. The delegation also features FrieslandCampina and Vion Foods, both hit by China's retaliatory duties on European dairy and pork; Vion faces a 19.8 per cent anti-dumping rate. Sjoerdsma pledged to raise \"points of concern\" and promote Dutch business interests. In June he met US Commerce Secretary Howard Lutnick over the proposed Match Act, which would further restrict ASML sales to China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Dutch%20trade%20minister%20in%20China%20for%20high-stakes%20talks%20on%20tech%20war,%20tariff%20tensions.pdf"}, {"id": "scmp-08", "title": "FCC denies US firm with Chinese links approval to provide telecoms services", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The US Federal Communications Commission added California-based Digitalsystem Technology to its list of companies posing national-security risks, citing links to Chinese telecoms firms and ownership by a Chinese national. The FCC denied the Los Angeles IT company permission to provide international telecommunications services, warning it could be exploited by Chinese threat actors to collect, disrupt or misroute US communications. The agency cited partnerships with Hong Kong-based PCCW, China Unicom and China Mobile. The move follows earlier bars on China Mobile, China Telecom and China Unicom, and steps to revoke HKT's US operating ability. The Trump administration has taken a tough line, recently banning equipment imports from Huawei, Dahua, ZTE and Hikvision, plus Chinese drones and routers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/FCC%20denies%20US%20firm%20with%20Chinese%20links%20approval%20to%20provide%20telecoms%20services.pdf"}, {"id": "scmp-09", "title": "Hong Kong yuan facility to expand 150% to US$73.6 billion to meet international demand", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong will expand its RMB Business Facility for banks by 1.5 times to 500 billion yuan (US$73.6 billion) from Friday, the Monetary Authority said, after the existing 200 billion yuan quota was exhausted and international clients across 12 jurisdictions sought yuan loans. Tenure extends to two or three years. HKMA chief Eddie Yue said the move promotes yuan usage across Hong Kong, Asean, the Middle East and Europe. It is among 11 measures with the Securities and Futures Commission, including a new electronic fixed-income and currency trading platform from CFETS and HKEX, awaiting a licence. HKEX clearing houses will accept onshore Chinese government bonds as collateral and launch five-year bond futures on August 3.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Hong%20Kong%20yuan%20facility%20to%20expand%20150%25%20to%20US%2473.6%20billion%20to%20meet%20international%20demand.pdf"}, {"id": "scmp-10", "title": "Hong Kong's property market set to cool despite run of record-breaking deals", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong's residential property rally is likely to lose steam in the second half of 2026 as a weak stock market weighs on sentiment, analysts warn. Recent trophy deals include a Cullinan Harbour flat at HK$247.9 million (US$31.6 million) and a Victoria Harbour flat at HK$200 million, a Hong Kong Island East record. But CBRE said luxury transaction value fell 30 per cent to HK$8.76 billion in the second quarter, with deals dropping from 70 to 48. The Hang Seng fell 11 per cent in the first half. Secondary prices have climbed 10.4 per cent this year, but JPMorgan expects gains to slow below 5 per cent, citing prolonged equity weakness as the biggest downside risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Hong%20Kong%E2%80%99s%20property%20market%20set%20to%20cool%20despite%20run%20of%20record-breaking%20deals.pdf"}, {"id": "scmp-11", "title": "How Hong Kong is fighting to redefine its future with an institutional moat, wealth surge", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Hong Kong is deploying a multipronged strategy to defend its status as a leading financial centre amid warnings of decline, shifting capital flows and Sino-US tensions. Despite Stephen Roach's \"Hong Kong is over\" claim, the city took the IPO fundraising crown in 2024 and ranks third globally on the Z/Yen index. Analysts cite an enduring institutional moat: common law, financial infrastructure, deep talent and the world's largest offshore renminbi pool of about 1 trillion yuan. Managed wealth rose 20 per cent to a record HK$42.2 trillion in 2025. New measures include tax incentives, zero-rate carried interest for qualifying funds and a gold clearing system. Critics warn reliance on mainland issuers and Beijing-granted privileges pose long-term risks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/How%20Hong%20Kong%20is%20fighting%20to%20redefine%20its%20future%20with%20an%20institutional%20moat,%20wealth%20surge.pdf"}, {"id": "scmp-12", "title": "Latest US political divide emerges: the age gap over whether China is cause for concern", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "The 2026 Reagan Institute Summer Survey found American unease over China climbs steeply with age, revealing a marked generational divide even as China draws less partisan split than other foreign-policy issues. Surveying 1,555 respondents on 11 China-specific issues, it found the widest gaps on espionage, technology theft, unfair trade and Taiwan. On China's alleged ability to spy on Americans, 93 per cent of those 65 and older were concerned versus 62 per cent of those aged 18-29, a 31-point split. On taking Taiwan by force, concern dropped from 86 to 56 per cent. China's role in the fentanyl crisis drew the greatest bipartisan concern at 82 per cent. Views split sharply over Trump's China approach.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Latest%20US%20political%20divide%20emerges%20the%20age%20gap%20over%20whether%20China%20is%20cause%20for%20concern.pdf"}, {"id": "scmp-13", "title": "Nato launches defence projects to counter Russia and China", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Nato members unveiled defence initiatives at the Summit Defence Industry Forum in Ankara, targeting weapons development, production and supply chains against Russia and China. Secretary General Mark Rutte announced a 12-nation project on defence-critical raw materials to acquire, store and manage stockpiles, noting China produces over 90 per cent of global rare earths and gallium and has wielded export controls as deterrence. A new Nato Drone Edge initiative involving all 32 members will invest US$40 billion over five years, while eight members are putting US$26.3 billion into integrated air and missile defence. Rutte warned Russia is devoting half its budget to war and working with China, North Korea and Iran, urging a \"transatlantic defence industrial revolution.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Nato%20launches%20defence%20projects%20to%20counter%20Russia%20and%20China.pdf"}, {"id": "scmp-14", "title": "South Korea loses Canada submarine deal but cements top-tier defence status", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "South Korea lost Canada's roughly US$40 billion submarine order to Germany's Thyssenkrupp Marine Systems, but analysts say its close-run bid proved it can challenge traditional undersea-warfare powers. Canada named TKMS preferred supplier for up to 12 diesel-electric submarines, keeping Hanwha Ocean's KSS-III as reserve. Experts noted performance and cost accounted for only 20 per cent of Ottawa's evaluation, with 80 per cent reflecting industrial, diplomatic and Nato-interoperability factors; Hanwha cited South Korea's non-Nato status as a barrier. Seoul aims to become a top-four arms exporter, having secured US$15.4 billion in defence orders last year, up 60.4 per cent. President Lee Jae Myung pledged continued support, saying the experience strengthens future bids in Greece, Saudi Arabia and the Philippines.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/South%20Korea%20loses%20Canada%20submarine%20deal%20but%20cements%20top-tier%20defence%20status.pdf"}, {"id": "scmp-15", "title": "Trump still 'disappointed' with Nato, says US should control Greenland as summit kicks off", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Politics", "Defence", "Geopolitics"], "summary": "President Donald Trump, arriving in Ankara for the Nato summit, said he was \"very disappointed\" that allies refused to aid Washington's military operation against Iran and the reopening of the Strait of Hormuz, naming Italy, Germany and France. He argued Greenland \"should be controlled by the United States, not by Denmark,\" claiming it is surrounded by Chinese and Russian ships. Meeting Turkish President Erdogan, Trump praised Turkey as loyal and said he would consider selling F-35 jets and lift 2020 sanctions imposed over its Russian S-400 system, despite Israeli objections. He called Nato a \"paper tiger\" and cited a May withdrawal of 5,000 US troops from Germany. Trump said Putin and Zelensky both want a deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Trump%20still%20%E2%80%98disappointed%E2%80%99%20with%20Nato,%20says%20US%20should%20control%20Greenland%20as%20summit%20kicks%20off.pdf"}, {"id": "scmp-16", "title": "UK's Nigel Farage to quit as lawmaker, seeks re-election to clear name", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Politics"], "summary": "Reform UK leader Nigel Farage said he will quit as a lawmaker and seek re-election to clear his name over financial allegations, insisting he has \"done nothing wrong.\" He faces a parliamentary standards probe over a £5 million (US$6.7 million) gift from Thailand-based businessman Christopher Harborne, plus a sought inquiry into donations from crypto-gambling entrepreneur George Cottrell. The probes could have led to suspension or expulsion, so Farage will trigger a by-election for his Clacton seat, framing it as \"people-versus-the-establishment.\" Even if he wins, the standards inquiry is likely to resume. Reform UK holds only eight of 650 Commons seats but leads opinion polls, though it recently lost three special elections, suggesting support may be sagging.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/UK%E2%80%99s%20Nigel%20Farage%20to%20quit%20as%20lawmaker,%20seeks%20re-election%20to%20clear%20name.pdf"}, {"id": "scmp-17", "title": "US strikes Iran, revokes oil waiver after attacks on ships in Strait of Hormuz", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The United States launched fresh strikes against Iran and revoked a temporary oil-sales waiver on Tuesday after three commercial vessels were attacked in the Strait of Hormuz, sharply escalating tensions and threatening last month's fragile ceasefire. US Central Command said forces struck \"to impose heavy costs\" for targeting shipping, hitting air-defence systems, coastal surveillance and drone positions near Sirik. One LNG tanker caught fire near the Omani coast; Qatar blamed Iran and held it \"fully legally responsible.\" Tehran accused Washington of violating the Islamabad memorandum and vowed decisive measures. The strait carries roughly one-fifth of global oil and gas trade, and oil prices surged on fears of wider confrontation. Iran continues funerals for slain supreme leader Ali Khamenei.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/US%20strikes%20Iran,%20revokes%20oil%20waiver%20after%20attacks%20on%20ships%20in%20Strait%20of%20Hormuz.pdf"}, {"id": "scmp-18", "title": "What does China's submarine missile test mean for its nuclear triad expansion?", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China's rare launch of a ballistic missile from a nuclear-powered submarine into the deep Pacific sent a strategic signal to the US and neighbours, particularly Japan, analysts said. Monday's test, China's first known submarine-launched ballistic missile launch since 1982, demonstrated the operational readiness of its sea-based deterrent as Beijing builds a full nuclear triad. Analysts believe it likely took place in the South China Sea and involved a JL-3 missile, which has a range exceeding 10,000km. Beijing notified Australia, Japan and New Zealand of falling debris. Washington struck a sharper tone than after 2024's ICBM test, citing China's \"rapid and opaque\" build-up. Japan, Australia and New Zealand voiced concern; Beijing urged others not to overinterpret the launch.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/What%20does%20China%E2%80%99s%20submarine%20missile%20test%20mean%20for%20its%20nuclear%20triad%20expansion.pdf"}, {"id": "scmp-19", "title": "World working together 'as one ecosystem' on RISC-V chip research: executive", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Global cooperation on the RISC-V chip architecture remains resilient despite US-China rivalry, said Alibaba vice-president Qi Xiaoning at the SCMP's China Conference 2026. He said major firms from the US, China, India, Brazil and Europe work together \"as one unified ecosystem\" on the open-standard architecture for edge and cloud applications. RISC-V, free to use and modify, has surged in China as businesses reduce reliance on foreign proprietary technology amid US curbs, though it trails Intel's x86 and Arm. Alibaba, an early mover, launched its XuanTie series in 2018 and unveiled the C950 flagship in March. Qi, who sits on RISC-V International's board, noted a persistent gap in chip manufacturing due to limited access to EUV lithography tools.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/World%20working%20together%20%E2%80%98as%20one%20ecosystem%E2%80%99%20on%20RISC-V%20chip%20research%20executive.pdf"}, {"id": "scmp-20", "title": "Zhipu AI, MiniMax shares to provide gut check for Hong Kong investors as lock-ups end", "source": "SCMP", "date": "8 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Hong Kong's stock market could face sell-off pressure as six-month lock-ups end for hot AI and semiconductor picks including Zhipu AI and MiniMax, releasing shares worth about US$11.5 billion. Analysts also warned of a liquidity drain as many firms eye large secondary placements, creating dual selling pressure, said Fulbright Financial's Stevan Tam. Zhipu, known internationally as Z.ai, and MiniMax see 25.68 million and 150 million shares become tradeable respectively. Zhipu gained 5.2 per cent to HK$1,610 Tuesday after Monday's 14.6 per cent slide; MiniMax fell 3.3 per cent. Goldman Sachs estimated a record US$274 billion of shares will unlock over 12 months, with such stocks typically declining 4-7 per cent after expiry.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20SCMP/Zhipu%20AI,%20MiniMax%20shares%20to%20provide%20gut%20check%20for%20Hong%20Kong%20investors%20as%20lock-ups%20end.pdf"}]}, "2026-07-09": {"date": "2026-07-09", "dayOfWeek": "Thursday", "totalArticles": 70, "sourceCounts": {"WSJ": 20, "ST": 16, "BT": 13, "SCMP": 21}, "executiveDigest": "Trump declared the Iran ceasefire 'over' as the US and Iran exchanged fresh strikes and Tehran fired at Gulf neighbours, sending oil soaring more than 6%; Temasek unveiled a record S$518 billion portfolio and a plan to lift AI to 15% of holdings by 2031; NATO's Ankara summit delivered unity and billions in defence deals; and the AI 'spending war' intensified as giants gave away free computing power.", "briefingCards": [{"title": "Lead story - Iran ceasefire declared over", "body": "President Trump declared the US-Iran ceasefire 'over' after the two sides exchanged fresh strikes and Iran's forces fired at neighbouring Gulf states, distressing residents in Bahrain and Kuwait who say they want 'our normal lives back'. Oil prices soared more than 6% on renewed fears for the Strait of Hormuz. The collapse followed Iranian attacks on shipping and the revoked US oil waiver, leaving the interim Islamabad memorandum in tatters as commentators openly asked 'who won the Iran war?' Gaza's future remained unclear after Hamas dissolved its governing body, and the US said China gave only hours' warning before a Pacific submarine missile launch."}, {"title": "Markets & finance", "body": "The AI 'spending war' escalated - WSJ asked whether anyone will 'blink' as giants hand out free computing power to lock in startups, Nvidia-backed Nscale secured US$900 million for data centres, and Nokia pivoted to supplying the boom. SK Hynix's US$36 billion US listing was said to be multiple times oversubscribed, though SpaceX shares stumbled in their Nasdaq-100 debut. HSBC said a new SGX-Nasdaq dual-listing bridge could boost Singapore's hub status, DBS sees S-Reits poised for a rerating despite a hawkish Fed, and the yen's slide to a 40-year low turned focus to the carry trade."}, {"title": "Asia realignment", "body": "NATO's Ankara summit delivered 'unity and billions in defence deals', chief Mark Rutte said, floating a 'World Bank for defense' as Raytheon moved to build AMRAAM missile components in Europe - even as Trump's F-35 push for Turkey risks clashing with Congress. China flexed: it now holds seven of the world's ten biggest banks, Xi Jinping called for an innovation-system overhaul to beat tech rivals, and Beijing weighed curbing overseas access to its top AI models. Trump's tariff war pushed Brazil's trade toward China as the US share of Brazilian trade hit a record low."}, {"title": "Energy & climate", "body": "The renewed Iran conflict drove crude up more than 6%, though Australia's central bank said the oil shock has yet to slow its economy. A report projected global nuclear power will climb 44%, with China overtaking the US, and Italy's Eni invested US$225 million in a Chile lithium project via startup EnergyX. Temasek doubled down on its net-zero goal, arguing sustainable investments are profitable, while Goldman Sachs forecast a 50% jump for battery giant CATL's shares as energy storage takes off."}, {"title": "Technology & AI", "body": "The intangible-AI investment boom hit record levels, per the UN, even as a high-skilled worker shortage threatens the US chip-manufacturing revival and developing countries feel squeezed by the AI focus. Anthropic hit back after China warned its Claude Code carried a 'backdoor' risk, and Beijing is weighing curbs on overseas access to China's top AI models. Sam Altman's pitch of a taxpayer-backed compute plan drew scepticism as 'a Trojan Horse', and Singapore retail investors are more bullish on AI stocks than global peers, an eToro survey found."}, {"title": "Singapore & SEA focus", "body": "Temasek headlined the local news: its net portfolio value hit a record S$518 billion, and it plans to grow AI investments to 15% of the portfolio by 2031 while navigating a 'polycrisis' world spanning holdings from 'Anthropic to Zegna'. HSBC flagged an SGX-Nasdaq dual-listing bridge as a boost to Singapore's financial hub, and BT urged more SGX-listed firms to be 'brave' with forward guidance like DBS. Frasers Property launched its Dunearn House condo from S$2,799 psf, and Malaysia's industrial-property market is broadening beyond the data-centre boom."}], "keyMetrics": [{"value": "70", "label": "Articles curated today", "sub": "WSJ 20 · ST 16 · BT 13 · SCMP 21"}, {"value": "Over", "label": "Iran ceasefire ends", "sub": "Oil soars 6%; strikes exchanged"}, {"value": "S$518b", "label": "Temasek portfolio", "sub": "Record; AI to 15% by 2031"}, {"value": "7 of 10", "label": "World's biggest banks", "sub": "Now Chinese; Beijing ambitions grow"}, {"value": "US$36b", "label": "SK Hynix US listing", "sub": "Multiple times oversubscribed"}, {"value": "+44%", "label": "Global nuclear power", "sub": "China set to overtake US"}], "articles": [{"id": "wsj-01", "title": "A New Model to Fund War: A World Bank for Defense", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Defence", "Finance & Markets", "Geopolitics"], "summary": "Canada, Luxembourg, Turkey, Ukraine and five other countries announced the launch of the Defense, Security and Resilience Bank at NATO's annual summit in Ankara. The lender aims to plug funding gaps for arms makers by leveraging members' sovereign credit ratings to raise capital at a triple-A rating, providing guarantees to commercial banks or lending directly. Canadian PM Mark Carney, a former Bank of England governor, is its biggest advocate, championing \"middle powers\" banding together. Rob Murray, who conceived the DSRB in 2018, said finance is now \"part of deterrence.\" The push follows NATO's pledge to spend 5% of output on defense. The U.S. and Germany may eventually join, organizers say.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/A%20New%20Model%20to%20Fund%20War%20A%20World%20Bank%20for%20Defense.pdf"}, {"id": "wsj-02", "title": "AI Giants Are Handing Out Tons of Free Computing Power to Grab Startup Share", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Top AI firms including OpenAI, Anthropic and Google are showering startups with computing credits and discounts to win enterprise customers. Some founders have received offers exceeding $3 million in cloud and token credits from multiple companies, roughly the size of the median U.S. seed round per PitchBook. Cursor, the AI-coding firm bought by SpaceX, offered a 75% discount through July 5; Google Cloud gives some startups up to $500,000 in credits. The giants seek lasting revenue streams ahead of expected IPOs while facing pressure to improve margins and competition from cheaper Chinese \"open weight\" models. Anthropic's revenue surged via Claude Code and Cowork; OpenAI rebounded after March's GPT-5.4 release.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/AI%20Giants%20Are%20Handing%20Out%20Tons%20of%20Free%20Computing%20Power%20to%20Grab%20Startup%20Share.pdf"}, {"id": "wsj-03", "title": "Democratic Lawmakers Probe Lutnick's Possible Ties to Cantor Fitzgerald Deal", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Democratic lawmakers are seeking information from Cantor Fitzgerald over potential conflict-of-interest violations tied to Commerce Secretary Howard Lutnick and the government's $1.6 billion investment in USA Rare Earth. In a letter to Cantor Chairman Brandon Lutnick, the secretary's son, Sens. Elizabeth Warren, Ron Wyden and Chris Van Hollen plus Rep. Zoe Lofgren asked how Cantor was selected as lead placement agent and what fees it collected. Cantor, led by the elder Lutnick for over 30 years before he handed ownership to his children, said it had no role in USA Rare Earth's government negotiations. The January deal, finalized in June, included $1.6 billion in loans and incentives plus a $1.5 billion private share offering.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Democratic%20Lawmakers%20Probe%20Lutnick%E2%80%99s%20Possible%20Ties%20to%20Cantor%20Fitzgerald%20Deal.pdf"}, {"id": "wsj-04", "title": "Florida Cities Are Already Cutting Spending Ahead of Pivotal Property-Tax Vote", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Politics", "Society"], "summary": "Florida cities and counties are freezing hiring and capital projects ahead of a November vote on a constitutional amendment that would slash property taxes. Promoted by GOP Gov. Ron DeSantis and approved by the legislature in June, the measure would raise the homestead exemption to $150,000 in 2027 from $50,000, and to $250,000 in 2028. It needs 60% voter backing; a recent poll pegged support at 64%. Leon County administrator Vincent Long, who called it \"an amputation,\" has frozen hiring. The changes would cut statewide property-tax revenue nearly $5 billion in 2027-28, rising to $10.8 billion by 2030-31. Miami-Dade alone could lose $304 million in year one.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Florida%20Cities%20Are%20Already%20Cutting%20Spending%20Ahead%20of%20Pivotal%20Property-Tax%20Vote.pdf"}, {"id": "wsj-05", "title": "Foreign Investment Rises, but Developing Countries Squeezed by AI Focus, Says UN", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Trade", "Technology & AI"], "summary": "Overseas business investment rose 6% in 2025 to $1.6 trillion, but is increasingly steered by governments toward strategic sectors as geopolitical rivalries intensify, UNCTAD said. FDI in developing economies grew just 2%. The U.S. remained the top destination despite inflows falling to $277 billion from $284 billion; China drew $105 billion, down from $116 billion; Europe surged to $285 billion. New investment in strategic sectors like AI infrastructure, critical minerals and semiconductors jumped to $576 billion in 2025 from $109 billion in 2020, with AI accounting for 60%. Poorer countries captured only 10%. Acting secretary-general Pedro Manuel Moreno warned \"this logic rewards deep pockets.\" Government investment measures hit a record 229.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Foreign%20Investment%20Rises,%20but%20Developing%20Countries%20Squeezed%20by%20AI%20Focus,%20Says%20UN.pdf"}, {"id": "wsj-06", "title": "Italy's Eni Invests $225 Million in U.S. Startup EnergyX's Chile Lithium Project", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Italian energy company Eni is buying a 25% stake in the Black Giant lithium project owned by Austin-based Energy Exploration Technologies (EnergyX) for $225 million, gaining rights to up to a quarter of future output. The lithium could supply a battery plant Eni is developing in southern Italy. The deal comes three-and-a-half years after Eni's venture arm first backed EnergyX in a round led by General Motors. Located in Chile's Antofagasta region, Black Giant will use direct lithium extraction and is designed to produce up to 52,500 metric tons of lithium carbonate annually by 2030, with first phase output in 2028. EnergyX estimates the first two stages cost about $820 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Italy%E2%80%99s%20Eni%20Invests%20%24225%20Million%20in%20U.S.%20Startup%20EnergyX%E2%80%99s%20Chile%20Lithium%20Project.pdf"}, {"id": "wsj-07", "title": "Lawmakers to Press Bessent on Russia Sanctions Bill on Sidelines of NATO Summit", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Geopolitics", "Politics", "Energy"], "summary": "A bipartisan group of U.S. lawmakers planned to lobby Treasury Secretary Scott Bessent for passage of long-stalled Russia sanctions legislation at a NATO summit dinner in Ankara hosted by ambassador Tom Barrack. The Graham-Blumenthal bill would let the president impose sanctions and tariffs on countries buying Russian oil and uranium, but has languished amid White House resistance seeking more negotiating latitude over Ukraine. Sen. Chris Coons said lawmakers would also urge Bessent not to extend Russian oil sanctions waivers; three 30-day waivers were issued after the Iran war and Strait of Hormuz closure, the last expiring in June. Sen. Mike Rounds stressed Trump's buy-in is crucial to Senate passage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Lawmakers%20to%20Press%20Bessent%20on%20Russia%20Sanctions%20Bill%20on%20Sidelines%20of%20NATO%20Summit.pdf"}, {"id": "wsj-08", "title": "Lockheed Paying $5 Million for White House Helipad", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Defence", "Politics"], "summary": "President Trump said Pentagon contractor Lockheed Martin agreed to pay roughly $5 million toward a new granite helipad on the White House South Lawn, where construction was already under way Monday. \"Sikorsky is paying for it,\" Trump said, claiming the firm felt \"guilty\" over the helicopters' power. Lockheed's Sikorsky unit makes Marine One helicopters and won a 2014 contract for a new fleet costing about $5 billion. Officials knew as early as 2018 that the newer VH-92A's engines could damage the lawn. Lockheed said it donated the funds to the National Park Service. The helipad is Trump's latest White House revamp, alongside demolishing the East Wing for a ballroom that Lockheed also helped fund.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Lockheed%20Paying%20%245%20Million%20for%20White%20House%20Helipad.pdf"}, {"id": "wsj-09", "title": "Nokia's New Act: Supplying the AI Data Center Boom", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Finland's Nokia has pivoted from cellphones to supplying data-center infrastructure powering the AI boom, selling switches and routers that connect servers. CEO Justin Hotard called its offerings \"the backbone of the AI economy.\" The stock has risen roughly 90% this year as hyperscalers like OpenAI, Meta and Alphabet race to build data centers. Under former CEO Pekka Lundmark, Nokia bought optical-networking maker Infinera for $2.3 billion, lifting its North American optical market share to 27.3% in 2025 from 6.3%, second behind Ciena's 50.1%. Nvidia bought a 2.9% stake for $1 billion in October. Nokia nearly doubled its full-year growth guidance to 18-20%. Mobile infrastructure still makes up over half of revenue but is declining.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Nokia%E2%80%99s%20New%20Act%20Supplying%20the%20AI%20Data%20Center%20Boom.pdf"}, {"id": "wsj-10", "title": "Nvidia-Backed Startup Nscale Locks in $900 Million for Data-Center Buildout", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Nscale Global Holdings secured a $900 million revolving credit facility to expand AI data-center buildouts across Europe, the U.S. and Asia Pacific. A consortium including J.P. Morgan, Goldman Sachs, Morgan Stanley, MUFG and Bank of America syndicated the facility. The U.K. startup, backed by Nvidia, Dell and Nokia, raised $2 billion earlier this year at a $14.6 billion valuation. CEO Josh Payne said the funds add flexibility to build \"at speed and at scale.\" The deal comes nearly two months after Nscale secured $790 million to build a data center near Narvik in northern Norway, expected to house over 30,000 Nvidia Rubin processing units. Some investors worry AI-infrastructure debt could create a market bubble.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Nvidia-Backed%20Startup%20Nscale%20Locks%20in%20%24900%20Million%20for%20Data-Center%20Buildout.pdf"}, {"id": "wsj-11", "title": "Private-Equity Firms Are Sitting on a Nine-Year Backlog", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Buyout firms face a worsening backlog of unsold portfolio companies, expected to take about nine years to clear at the current pace, per a PwC analysis of PitchBook data. About 13,500 U.S. companies sat in private-equity portfolios as of June 30, up from 13,300 at end-2025; nearly 4,000 have been held six-plus years and about 1,500 nine-plus years. Software firms bought in 2020-21 at lofty valuations are hardest to exit after the \"SaaS-Pocalypse\" slashed valuations over AI fears. Fundraising is muted, with $159.6 billion raised in the first half. One bright spot: firms took 16 companies public in the first half, raising $10.1 billion, the most since 2021.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Private-Equity%20Firms%20Are%20Sitting%20on%20a%20Nine-Year%20Backlog.pdf"}, {"id": "wsj-12", "title": "Raytheon, NATO Move to Build Advanced AMRAAM Missile Components in Europe", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Raytheon, an RTX company, and a coalition of NATO allies signed an agreement to expand the AMRAAM program, clearing the way to build components of the advanced medium-range air-to-air missile on European soil for the first time. Announced after a NATO summit in Turkey, the initiative involves feasibility studies to qualify new European suppliers for priority components, creating a localized co-production footprint to accelerate deliveries and replenish depleted air-defense stockpiles. \"Expanding AMRAAM production capacity is essential,\" said Defense Department undersecretary Michael Duffey. The AMRAAM has been heavily deployed in the Russia-Ukraine war and the recent U.S.-Israel-Iran conflict, serving as a primary defense against drone swarms, severely depleting U.S. and allied stockpiles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/09%20Jul%202026/09%20Jul%20WSJ/Raytheon,%20NATO%20Move%20to%20Build%20Advanced%20AMRAAM%20Missile%20Components%20in%20Europe.pdf"}, {"id": "wsj-13", "title": "SpaceX Shares Stumble in Nasdaq-100 Debut", "source": "WSJ", "date": "9 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX shares dropped 6.8% to $149.47 on their first day in the Nasdaq-100, amid a broad tech decline. That was above the $135 IPO price but below the $150 where shares began trading on June 12 and a peak above $200. Funds with roughly $800 billion in assets were expected to buy shares to mirror the index, but analysts warned the buying was already priced in. The Nasdaq composite fell 1.2%, the S&P 500 dropped 0.4%. Deutsche Bank set a $255 target, citing reusable rockets and satellite internet. SpaceX, valued at $2 trillion with over $100 billion cash, earli
