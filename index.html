ng reliance on Hormuz-transiting energy will require years of investment in new pipelines, export routes and strategic reserves. The episode parallels US dollar leverage and China's critical-minerals grip. A shaky ceasefire is barely holding.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Hormuz%20Crisis%20Exposes%20a%20Global%20Flaw%20That%20Will%20Take%20Years%20to%20Fix.pdf"}, {"id": "wsj-05", "title": "How SpaceX Became Embedded in America's War Machine", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "SpaceX has become deeply embedded in US national security, with the government its largest client (\"Customer A\"), generating around $4 billion in 2025 revenue set to climb sharply. The Space Force recently awarded $2.3 billion and $4.2 billion fast-tracked contracts for military satellite communications and missile tracking. White House officials concluded last year the government couldn't cancel SpaceX contracts even amid the Musk-Trump feud. Analysts say its defence work could eventually rival Lockheed and Northrop's space businesses.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/How%20SpaceX%20Became%20Embedded%20in%20America%E2%80%99s%20War%20Machine.pdf"}, {"id": "wsj-06", "title": "Israel and Iran Exchange Fire, Renewing Fear of Escalation", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Israel and Iran traded missile barrages into Monday morning, testing Trump's fragile ceasefire after Iran fired multiple waves and Israel struck air-defence and missile sites in central and western Iran. Netanyahu faced domestic pressure to respond to the Iranian barrage despite Trump's plea to hold off, saying a deal was near. Israel also intercepted a ballistic missile launched from Houthi-controlled Yemen. No major injuries were reported.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Israel%20and%20Iran%20Exchange%20Fire%2C%20Renewing%20Fear%20of%20Escalation.pdf"}, {"id": "wsj-07", "title": "Market Rout Leaves Wall Street Bracing for Rockier Times", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Investors began the week battered after Friday's selloff hit stocks, bonds, gold and bitcoin alike, triggered by a strong jobs report that cut 4.2% off the Nasdaq and lifted Treasury yields to early-2025 highs. Ray Dalio called the move \"important,\" warning AI-stock concentration is \"classic bubble stuff\" and bonds now look more attractive than stretched equities. Some managers stayed sanguine, citing a strong economy. A key inflation report looms this week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Market%20Rout%20Leaves%20Wall%20Street%20Bracing%20for%20Rockier%20Times.pdf"}, {"id": "wsj-08", "title": "Mass Ukrainian Drone Strikes Target Russian Military Facilities in St. Petersburg", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukraine launched hundreds of drones at St. Petersburg, hitting naval arsenals and a base at Kronstadt, a day after Putin used an economic forum there to reject Zelensky's peace overture. \"Russia's ruler wants to keep fighting,\" Zelensky said, crediting precise strikes. Russia reported damage and injuries but no deaths, and briefly closed maritime access to Kronstadt. It was Ukraine's second recent strike on the city as its military presses momentum.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Mass%20Ukrainian%20Drone%20Strikes%20Target%20Russian%20Military%20Facilities%20in%20St.%20Petersburg.pdf"}, {"id": "wsj-09", "title": "OPEC, Allies Pledge Oil-Output Hike Even as Middle East War Chokes Exports", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "OPEC+ agreed a fourth straight monthly output increase — about 188,000 bpd for July — in a move analysts called largely symbolic while the Strait of Hormuz stays closed. Saudi Arabia, Russia, Iraq and others backed the hike, but the market impact is limited until Hormuz flows resume. Gulf producers have rerouted crude, with Saudi Arabia lifting East-West pipeline flows toward Yanbu to around 7 million bpd. Oil has soared since Iran effectively shut Hormuz at the war's February 28 start.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/OPEC%2C%20Allies%20Pledge%20Oil-Output%20Hike%20Even%20as%20Middle%20East%20War%20Chokes%20Exports.pdf"}, {"id": "wsj-10", "title": "Real-Time Satellite Intelligence Is Making Ukraine's Drone Strikes Deadlier Than Ever", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "Near-real-time commercial satellite imagery delivered straight to soldiers' devices has sharply increased the speed and precision of Ukraine's drone strikes. Images from Colorado-based Vantor have cut target-location-to-strike time by as much as 90%, helping units identify Russian command sites under tree cover. Accompanying software lets users investigate targets in detail. The capability marks a technological shift in the fifth year of the grinding war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Real-Time%20Satellite%20Intelligence%20Is%20Making%20Ukraine%E2%80%99s%20Drone%20Strikes%20Deadlier%20Than%20Ever.pdf"}, {"id": "wsj-11", "title": "Stock Indexes Are Divided on Rules for Megacap IPOs. How Exposed Will You Be?", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Index providers are split on fast-tracking SpaceX (~$1.75 trillion valuation) and other megacap IPOs into benchmarks: Nasdaq will allow quick entry within 15 trading days, while S&P Global declined to waive its one-year trading and profitability rules. Early inclusion creates steady index-fund demand for the shares but could raise risk in the $18 trillion passive-fund market. FTSE Russell also eased its rules. Anthropic and OpenAI listings loom later this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/Stock%20Indexes%20Are%20Divided%20on%20Rules%20for%20Megacap%20IPOs.%20How%20Exposed%20Will%20You%20Be.pdf"}, {"id": "wsj-12", "title": "The Job Market Is Shifting Into High Gear. But Why?", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Finance & Markets"], "summary": "US hiring has surged, with over half a million jobs added between March and May — the best three-month stretch in over two years — as factories, restaurants and local government joined healthcare in hiring. Steadier tariff policy and an AI-driven data-centre construction boom have aided the rebound. The resurgence puzzles economists who thought an immigration crackdown had shifted the economy to a slower equilibrium. Well-off consumers keep spending, Friday's selloff notwithstanding.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/The%20Job%20Market%20Is%20Shifting%20Into%20High%20Gear.%20But%20Why.pdf"}, {"id": "wsj-13", "title": "The Pain Points Taking a Fragile Tech Rally Down a Notch", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Friday's tech carnage exposed the fragility of 2026's AI-driven rally, with three triggers: Broadcom's soft AI-revenue guidance, a strong jobs report raising Fed-hike odds (now ~50% for October), and investors selling the Magnificent Seven to rotate into the SpaceX IPO. More than half the S&P 500's value sits in stocks trading above 10 times sales. Stretched valuations and concentration leave the market jumpy, where any sign of weakness prompts selloffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/The%20Pain%20Points%20Taking%20a%20Fragile%20Tech%20Rally%20Down%20a%20Notch.pdf"}, {"id": "wsj-14", "title": "When Trump Jawbones the Market, Bet Against Him at Your Peril", "source": "WSJ", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Greg Ip argues Trump has repeatedly moved oil, stocks, rates and currencies through verbal intervention, punishing those betting against him rather than changing fundamentals. A single day saw oil swing on his posts about Lebanon and Iran talks, even as fighting and stalemate persisted. Unlike predecessors who intervened only in emergencies, Trump and Treasury's Scott Bessent actively steer markets — even buying pesos to support Argentina's Milei. Betting against his jawboning has proved costly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20WSJ/When%20Trump%20Jawbones%20the%20Market%2C%20Bet%20Against%20Him%20at%20Your%20Peril.pdf"}, {"id": "st-01", "title": "AI can be a 'game changer' in cities like Singapore: PM Wong", "source": "ST", "date": "09 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "PM Lawrence Wong said AI can be a \"game changer\" for labour-short cities like Singapore, transforming processes rather than being used superficially as chatbots. Singapore views AI as net positive despite risks to jobs and security, he told a Singapore Press Club dialogue. He urged humility about AI's ultimate labour-market impact — \"no one can predict\" whether it yields more or fewer jobs. Embedding AI across organisations will take time, he said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/AI%20can%20be%20%27game%20changer%27%20in%20cities%20like%20S%27pore%20PM%20Wong.pdf"}, {"id": "st-02", "title": "AI companions are coming. Privacy rules are not ready", "source": "ST", "date": "09 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Simon Chesterman argues privacy and data-protection rules are unprepared for AI companions that will know what users feel, fear and trust. He frames the shift through Pope Leo XIV's first encyclical, which casts AI as a challenge to human dignity. Traditional data-protection questions about consent and retention are no longer sufficient as chatbots infer users' needs and worries. Regulators, he writes, are the first line of defence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/AI%20companions%20are%20coming.%20Privacy%20rules%20are%20not%20ready.pdf"}, {"id": "st-03", "title": "After months of war, Iranians sink into disillusionment and despair", "source": "ST", "date": "09 Jun 2026", "tags": ["Geopolitics", "Society"], "summary": "After months of war and a teetering ceasefire, many Iranians have sunk into disillusionment and despair amid a reported 1,700 civilian deaths and economic implosion. Early hopes among regime opponents that the conflict might end theocratic rule have been snuffed out. The effective closure of the Strait of Hormuz has choked oil exports and sent basic-goods prices soaring. On-off talks and false claims the war was over have deepened anxiety, per interviews with more than 20 Iranians.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/After%20months%20of%20war%2C%20Iranians%20sink%20into%20disillusionment%20and%20despair.pdf"}, {"id": "st-04", "title": "Air fares to take longer to return to normal", "source": "ST", "date": "09 Jun 2026", "tags": ["Energy", "Trade"], "summary": "IATA warned higher airfares will persist \"longer than many people think\" as the Strait of Hormuz closure disrupts Middle East oil exports and exposes a pre-existing \"refining crisis.\" Jet fuel is forecast to reach US$152 per barrel in 2026, up from under US$100 in 2025. Europe is especially exposed given its dependence on Gulf fuel imports. Chief economist Marie Owens Thomsen said it will take a long time to return to January's US$60 Brent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Air%20fares%20to%20take%20longer%20to%20return%20to%20normal.pdf"}, {"id": "st-05", "title": "Are we at the start of a new investment super-cycle?", "source": "ST", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The column asks whether the record SpaceX IPO marks not a market top but the start of a new global investment super-cycle. Beyond AI, sectors including energy, defence and manufacturing are growing and demanding large capital infusions worldwide. The case requires only believing AI is transformative, that scaling it needs far more energy, and that a China-led clean-energy revolution is under way. It rests on broad capital-spending needs rather than resolving short-term unknowns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Are%20we%20at%20the%20start%20of%20a%20new%20investment%20super-cycle.pdf"}, {"id": "st-06", "title": "Banks lay groundwork for mass workforce cuts as AI takes hold", "source": "ST", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI", "Society"], "summary": "Banks are laying the groundwork for major workforce cuts as AI takes hold, with graduates now facing AI-powered screening even before human interviews. Top executives broadly agree jobs will go: JPMorgan's Jamie Dimon said AI \"will eliminate jobs,\" Citi's Jane Fraser said some roles won't be needed, and StanChart's Bill Winters spoke of replacing \"lower-value human capital\" before apologising. Students are coaching themselves to clear automated rounds. The shift clouds entry-level finance careers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Banks%20lay%20groundwork%20for%20mass%20workforce%20cuts%20as%20AI%20takes%20hold.pdf"}, {"id": "st-07", "title": "Brace for a flood of oil as soon as Hormuz reopens", "source": "ST", "date": "09 Jun 2026", "tags": ["Energy"], "summary": "The columnist argues that whenever the Strait of Hormuz reopens, restarting around 10,000 idled wells — roughly 15% of world output shut for 100-plus days — will be an unprecedented operation with no playbook. Markets are split: bears see oil flooding back within weeks, bulls say six to eight months or longer, with some wells never restarting. The author sides with the bears, predicting a trickle that quickly becomes a flood once a US-Iran deal allows tanker traffic. Questions on tolls and shipping lanes remain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Brace%20for%20a%20flood%20of%20oil%20as%20soon%20as%20Hormuz%20reopens.pdf"}, {"id": "st-08", "title": "Chinese military hovered as global executives flocked to Taiwan tech show", "source": "ST", "date": "09 Jun 2026", "tags": ["Geopolitics", "Technology & AI", "Defence"], "summary": "As Nvidia, Intel and SK Group championed Taiwan's role in the global supply chain at Computex, China's military loomed: 79 warplanes operated near the island and coast guards faced off near the Pratas Islands. Taiwan, home to TSMC and Foxconn, broadcast that Taiwan Strait peace is \"the lifeline of the technology industry.\" Beijing held another \"joint combat readiness patrol\" around Taiwan. The standoff underscored risks to the global AI supply chain should Beijing act on its threats.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Chinese%20military%20hovered%20as%20global%20executives%20flocked%20to%20Taiwan%20tech%20show.pdf"}, {"id": "st-09", "title": "Economists see slower Singapore growth in 2026, faster inflation: survey", "source": "ST", "date": "09 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Economists cut Singapore's 2026 growth forecast to 3.3% (from 3.5%) and Q2 to 3.9% (from 4.5%), while raising headline and core inflation forecasts to 2.3% and 2%, a Bloomberg survey found. The government kept its 2-4% growth range but flagged rising downside risks from Middle East energy and supply-chain disruptions. S&P's Ahmad Mobeen said supply shocks will compress margins in energy-intensive sectors. Growth is seen as uneven amid external uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Economists%20see%20slower%20Singapore%20growth%20in%202026%2C%20faster%20inflation%20Survey.pdf"}, {"id": "st-10", "title": "European leaders ready to support ceasefire talks between Ukraine, Russia", "source": "ST", "date": "09 Jun 2026", "tags": ["Geopolitics"], "summary": "The leaders of Britain, Germany and France — the E3 — backed Zelensky's proposal for direct ceasefire talks with Putin, with Europe playing a role, in a June 7 joint statement at Downing Street. They \"commended\" Zelensky's call for a diplomatically negotiated end to the fifth-year war, with active US and European participation. Zelensky's open letter argued Russians had grown tired of attacks, inflation and fuel shortages. Putin had already rebuffed the face-to-face proposal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/European%20leaders%20ready%20to%20support%20ceasefire%20talks%20between%20Ukraine%2C%20Russia.pdf"}, {"id": "st-11", "title": "IMF chief warns world isn't ready for shocks that are piling up", "source": "ST", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "IMF chief Kristalina Georgieva warned the world isn't ready for increasingly frequent shocks and must build more resilient foundations. \"We are not going to get to a place where shocks are gone,\" she said, citing Covid, Ukraine, tariff turmoil and now the Middle East conflict. She stressed objective analysis as the fund's best tool across its 191 members and roughly US$1 trillion lending capacity. She warned against repeating globalisation's failure to address AI-driven inequality.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/IMF%20chief%20warns%20world%20isn%27t%20ready%20for%20shocks%20that%20are%20piling%20up.pdf"}, {"id": "st-12", "title": "Iran, Israel call off strikes after Trump tells them to 'stop shooting'", "source": "ST", "date": "09 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran and Israel signalled on June 8 they were ready to wind down an escalation that briefly shattered the two-month ceasefire, after Trump told both to \"stop shooting.\" Iran's military said it was halting attacks but warned of harsher action if Israel resumes strikes, including in southern Lebanon. Netanyahu ordered the military to halt preparations for another attack on Iran at Trump's request. Israel said strikes in southern Lebanon would nonetheless continue against Hezbollah.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Iran%2C%20Israel%20call%20off%20strikes%20after%20Trump%20tells%20them%20to%20%27stop%20shooting%27.pdf"}, {"id": "st-13", "title": "OCBC to offer physical gold trading and storage to wealthy clients in Singapore", "source": "ST", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "OCBC will offer physical gold trading and storage to institutional and high-net-worth clients from June 10, entering the bullion business as demand for holding gold in Singapore grows. Clients can buy serial-numbered 1kg or 400-troy-ounce bars with directly allocated ownership rather than a pooled claim. Bank of Singapore bullion holdings have risen over 40% since end-2025, mostly from ultra-high-net-worth clients. Clients increasingly prefer holding and transacting gold locally rather than via a US entity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/OCBC%20to%20offer%20physical%20gold%20trading%20and%20storage%20to%20wealthy%20clients%2C%20institutions%20in%20Singapore.pdf"}, {"id": "st-14", "title": "Singapore firms willing to pay higher wages for AI, soft skills", "source": "ST", "date": "09 Jun 2026", "tags": ["Southeast Asia", "Technology & AI"], "summary": "Two-thirds of 599 Singapore firms surveyed by ManpowerGroup would pay a salary premium for AI literacy, even as hiring sentiment fell to its lowest since 2021. Premiums are highest in the public sector, health and professional services, with willingness also to pay for AI model/application development (64%) and traditional IT and data skills (56%). Soft skills like critical thinking and communication are also rewarded. For next quarter, 41% plan to hold headcount steady and 22% expect cuts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/S%27pore%20firms%20willing%20to%20pay%20higher%20wages%20for%20AI%2C%20soft%20skills.pdf"}, {"id": "st-15", "title": "Singapore launches new AI supercomputer to boost climate, healthcare research", "source": "ST", "date": "09 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore launched Aspire 2B, its latest national research supercomputer with the country's largest cluster of Nvidia GPUs — more computing power than 120,000 high-end AI laptops combined. Over 9,000 public researchers will use it to build complex AI models and shorten experimentation, said Minister Josephine Teo at the NTU launch. Workloads once sent overseas — advanced climate modelling, high-resolution weather forecasting and Asian-language chatbots — can now run locally. It is billed as a multiplier for the research community.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Singapore%20launches%20new%20AI%20supercomputer%20to%20boost%20climate%2C%20healthcare%20research.pdf"}, {"id": "st-16", "title": "Singapore stocks slide amid global tech rout, Iran war strikes", "source": "ST", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Straits Times Index fell 1.7% to 4,963.67 on June 8 amid a global tech selloff and Middle East escalation, with chip stocks hit hardest — AEM down about 3% and InnoTek over 4%. Across Asia, South Korea's Kospi plunged over 8%, Japan's Nikkei nearly 4% and Taiwan 3.5%, while Samsung sank 10% and SK Hynix over 7.5%. The slide followed Wall Street's June 5 drop. Technology names led the regional rout.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Singapore%20stocks%20slide%20amid%20global%20tech%20rout%2C%20Iran%20war%20strikes.pdf"}, {"id": "st-17", "title": "There's no AI boom without an energy boom", "source": "ST", "date": "09 Jun 2026", "tags": ["Energy", "Technology & AI", "Environment"], "summary": "David Fogarty argues AI's surging energy appetite has reached a crunch point that threatens both growth projections and Big Tech's social licence to operate. There simply aren't enough electricity grid connections — or water — to meet demand, since data centres are built faster than utilities can add grid capacity. Alphabet, Amazon, Meta and Microsoft are investing in renewables, on-site generation, nuclear and even fusion. The energy bottleneck is now central to AI's trajectory.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/There%27s%20no%20AI%20boom%20without%20an%20energy%20boom.pdf"}, {"id": "st-18", "title": "Xi says willing to bring China-North Korea ties to 'new heights' during rare visit", "source": "ST", "date": "09 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Xi Jinping made a rare June 8 visit to Pyongyang — his first since 2019 — telling an emboldened Kim Jong Un he was willing to bring China-North Korea ties to \"new heights.\" Kim, who has deepened his alliance with Putin by sending troops to fight for Russia, gave Xi a lavish red-carpet welcome. Xi urged stronger exchanges in diplomacy, law enforcement and the military. China remains North Korea's main trading partner and economic lifeline under heavy sanctions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20ST/Xi%20says%20willing%20to%20bring%20China-North%20Korea%20ties%20to%20%27new%20heights%27%20during%20rare%20visit.pdf"}, {"id": "bt-01", "title": "'Human judgment' is vital even with AI's introduction: HSBC CEO", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "HSBC CEO Georges Elhedery said human judgment, decision-making and accountability must stay at the core of banking even as AI becomes ubiquitous — and could even mean more hiring. His remarks counter recent CEO comments that rattled staff, including StanChart's Winters on replacing \"lower-value human capital.\" Elhedery said AI enables hyper-personalised services and productivity gains. \"The bank of the future means more capabilities,\" he said, framing investment as job creation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/%27Human%20judgment%27%20is%20vital%20even%20with%20AI%27s%20introduction%20HSBC%20CEO.pdf"}, {"id": "bt-02", "title": "AI boom upends San Francisco housing market", "source": "BT", "date": "09 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "The AI boom is upending San Francisco's housing market, creating extreme wealth as firms pay AI researchers packages up to US$250 million. The metro's median home price rose over 10% year on year to US$1.7 million in April — the highest in the US — pushing buyers like a nurse couple to raise budgets and shift to Marin County. Record AI fundraising compounds the pressure. The city's fortunes have reversed sharply since its pandemic-era reputational slump.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/AI%20boom%20upends%20San%20Francisco%20housing%20market.pdf"}, {"id": "bt-03", "title": "In a world of long-drawn crises, 'wait and see' may be a decreasingly tenable stance", "source": "BT", "date": "09 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "The commentary argues a \"wait and see\" stance is increasingly untenable in an era of long-drawn crises and seemingly irrational actors. Trump's tariffs persist despite being deemed illegal, with a new round proposed on 60 countries including Singapore, while the Iran war has passed its 100th day after many expected a swift end. The piece challenges the assumption that rational self-interest will prevail. It urges accepting absurdity and getting on with decisions amid volatility.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/In%20a%20world%20of%20long-drawn%20crises%2C%20%27wait%20and%20see%27%20may%20be%20a%20decreasingly%20tenable%20stance.pdf"}, {"id": "bt-04", "title": "Japan's growth holds up despite drop in business investment", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets"], "summary": "Japan's economy grew an annualised 1.8% in Q1 (revised down from 2.1%) as Iran-war turbulence prompted firms to cut capital spending, downgraded to -0.7%. Resilient consumer spending and AI-related export demand kept overall growth solid. The report should keep the Bank of Japan on track to raise interest rates next week. Net exports and consumption were left unchanged in the revision.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Japan%27s%20growth%20holds%20up%20despite%20drop%20in%20business%20investment.pdf"}, {"id": "bt-05", "title": "Mainland Chinese savers flock to Hong Kong as regulators tighten capital controls", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Mainland Chinese savers are rushing to Hong Kong after Beijing's late-May crackdown on \"illegal\" cross-border securities trading, which punished three online brokers. An estimated US$54 billion in offshore assets — US and Hong Kong stocks — is at stake, per Kaiyuan Securities. Investors are moving assets to smaller Hong Kong-focused brokers and exploring offshore company setups to retain foreign-market access. Tightened bank due-diligence rules are adding friction.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Mainland%20Chinese%20savers%20flock%20to%20Hong%20Kong%20as%20regulators%20tighten%20capital%20controls.pdf"}, {"id": "bt-06", "title": "Nvidia clinches deals with South Korean giants including SK Group to advance AI boom", "source": "BT", "date": "09 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Nvidia announced a series of South Korean deals with SK Hynix, Naver, SK Telecom and Doosan during CEO Jensen Huang's high-profile Seoul visit, securing memory-chip supply for its AI ambitions. SK Hynix signed a multi-year partnership to develop advanced memory for global AI data centres as makers strain to meet demand. Deal values were undisclosed. Huang's trip featured soju dinners and a baseball pitch with Korea's corporate bosses.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Nvidia%20clinches%20deals%20with%20South%20Korean%20giants%20including%20SK%20Group%20to%20advance%20AI%20boom.pdf"}, {"id": "bt-07", "title": "Oil market calm masks a host of unknowns", "source": "BT", "date": "09 Jun 2026", "tags": ["Energy"], "summary": "The biggest oil supply shock in decades has entered its fourth month with no resolution, yet the market remains surprisingly calm. Renewed Israel-Iran strikes pushed Brent up over 4% to US$98 on June 8, but prices stay well below recent peaks and within the past two decades' range. Traders are largely operating in the dark on inventories, global demand and geopolitics. The disconnect reflects deep underlying uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Oil%20market%20calm%20masks%20a%20host%20of%20unknowns.pdf"}, {"id": "bt-08", "title": "Singapore well-placed to be Asean's gold-trading hub as regional duties rise: analysts", "source": "BT", "date": "09 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore is well-placed to become ASEAN's neutral gold clearing and distribution hub as regional duties rise, analysts told BT. Malaysia's new 10% gold-bar import duty and Indonesia's export duty have stranded or redirected inventory, creating an opening. State Street's Robin Tsui said recent policy shifts let Singapore position as a stable regional hub for gold flows. Building market depth and infrastructure is now a priority rather than an option.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Singapore%20well-placed%20to%20be%20Asean%27s%20gold-trading%20hub%20as%20regional%20duties%20rise%20analysts.pdf"}, {"id": "bt-09", "title": "South-east Asia can lead the energy transition with its partners", "source": "BT", "date": "09 Jun 2026", "tags": ["Energy", "Southeast Asia", "Environment"], "summary": "A second oil-price shock in five years underscores that economies built on imported fossil fuels are strategically exposed, the commentary argues, urging Southeast Asia to lead an energy transition with partners. Solar and wind with storage are now among the cheapest, fastest new power sources, with nuclear offering baseload. Security has become policymakers' top priority within the energy trilemma of sustainability, security and affordability. Agile grids and connections can build resilience while weaning Asia off fossil fuels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/South-east%20Asia%20can%20lead%20the%20energy%20transition%20with%20its%20partners.pdf"}, {"id": "bt-10", "title": "Strong US dollar and tariff threats ignite broad Asian currency sell-off", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets"], "summary": "A resurgent US dollar and US tariff threats have ignited a broad Asian currency selloff, dragging the rupiah to record lows (past 18,000 per US dollar) and the yen and won to multi-year lows. Expected Fed hikes after strong US jobs data and a widening rate gap are driving the pressure, compounded by Middle East energy shocks and capital outflows. The Singapore dollar has bucked the trend. Several Asian central banks are moving to defend their currencies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Strong%20US%20dollar%20and%20tariff%20threats%20ignite%20broad%20Asian%20currency%20sell-off.pdf"}, {"id": "bt-11", "title": "Tech rout sweeps Asia as AI rally jitters spark sell-off", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A rotation out of technology swept Asian markets on June 8 as investors feared the AI-driven rally had outrun fundamentals. South Korea's Kospi plunged as much as 8.8%, triggering a 20-minute circuit breaker before closing 8.3% lower — its steepest drop since March 4 — with Samsung down 10.2% and SK Hynix 7.7%. Japan's Nikkei fell 3.9%, Hong Kong's Hang Seng 1.2% and Singapore's STI 1.7%. Instability in the US-Iran ceasefire added to the pressure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Tech%20rout%20sweeps%20Asia%20as%20AI%20rally%20jitters%20spark%20sell-off.pdf"}, {"id": "bt-12", "title": "Temasek-backed startup PhysicsX hits US$2.4 billion valuation for AI manufacturing", "source": "BT", "date": "09 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "British startup PhysicsX, which builds AI models for manufacturing components like jet engines and semiconductors, raised US$300 million at a roughly US$2.4 billion valuation in a round led by Singapore's Temasek. New backers Intrepid Growth Partners and M&G Catalyst joined existing investors Nvidia and Applied Materials, more than doubling its prior ~US$1 billion valuation. The firm needs cash to clear a roughly six-month customer backlog. It competes in a crowded \"industrial AI\" field that includes Jeff Bezos's Project Prometheus.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Temasek-backed%20startup%20PhysicsX%20hits%20US2.4%20billion%20valuation%20to%20provide%20AI%20for%20manufacturing.pdf"}, {"id": "bt-13", "title": "Think twice about rebuilding that old landed property into a super-big house", "source": "BT", "date": "09 Jun 2026", "tags": ["Southeast Asia", "Society"], "summary": "The column cautions Singapore landed-home owners against rebuilding into maximally large houses to exploit floor area, citing high construction and recurring costs. Singapore's private stock held 73,662 landed homes against 350,503 condos in Q1, with landed ownership restricted to citizens and often bought for owner occupation. While maxing gross floor area lowers cost per square foot, oversized owner-occupied homes carry heavy upkeep. Buyers are urged to weigh bespoke ambitions against practicality.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Think%20twice%20about%20rebuilding%20that%20old%20landed%20property%20into%20a%20super-big%20house%20to%20max%20out%20GFA.pdf"}, {"id": "bt-14", "title": "UOB appoints new CEOs for China and Hong Kong offices", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "UOB named new CEOs for its mainland China and Hong Kong operations from July 1 to accelerate cross-border growth between Greater China and ASEAN. Adaline Zheng becomes CEO of UOB China, succeeding the retiring Peter Foo, while George Tung takes over UOB Hong Kong. Group CEO Wee Ee Cheong said mainland China remains a key driver of trade and capital flows into Southeast Asia. The bank is sharpening Hong Kong's role as a connector and strengthening private banking.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/UOB%20appoints%20new%20CEOs%20for%20China%20and%20Hong%20Kong%20offices.pdf"}, {"id": "bt-15", "title": "Why venture capital unlocks access to next-generation market leaders", "source": "BT", "date": "09 Jun 2026", "tags": ["Finance & Markets"], "summary": "The piece argues venture capital deserves a central rather than peripheral portfolio role as value is increasingly created earlier and in private markets. Investors holding only public equities and buyouts may be structurally late to important innovation cycles as companies stay private longer. VC offers diversification, disruption-risk hedging and access to increasingly institutionalised manager capabilities. It should be viewed as a strategic building block, not merely \"high-risk equity.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20BT/Why%20venture%20capital%20unlocks%20access%20to%20next-generation%20market%20leaders.pdf"}, {"id": "scmp-01", "title": "Alibaba forges Token Foundry as it hammers AI ambitions into shape", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "Alibaba established a new unit called Token Foundry, consolidating its Tongyi Lab and Future Life Lab under CEO Eddie Wu to commercialise AI under a unified strategy. Qwen leader Zhou Jingren becomes Alibaba's chief scientist, heading a new model-development team. The restructuring pulls together video-generation and open-world model projects previously housed across business units. It signals Alibaba aligning its sprawling businesses around a single AI push.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Alibaba%20forges%20Token%20Foundry%20as%20it%20hammers%20AI%20ambitions%20into%20shape.pdf"}, {"id": "scmp-02", "title": "China begins large-scale delivery of gallium chips for space-ground 6G network", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "China delivered 5 million gallium nitride semiconductors at scale for the first time, to power smart terminals in a space-air-ground integrated 6G network. The chips were developed by the US-sanctioned CETC No 55 Research Institute and subsidiary Nanjing Guobo Electronics. China, the world's largest gallium holder and exporter, imposes strict end-use export controls on the rare metal. Officials called the chips a backbone for 6G, commercial space programmes and emergency communications.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%20begins%20large-scale%20delivery%20of%20gallium%20chips%20for%20space-ground%206G%20network.pdf"}, {"id": "scmp-03", "title": "China sees record panda bond issuance in 2026 as foreign borrowers pile in", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Trade"], "summary": "Foreign governments, banks and multinationals are piling into China's onshore bond market, driving panda-bond issuance to a record 136.5 billion yuan in the first five months of 2026, up 90% year on year. May alone saw 26.64 billion yuan, up 246%. Looser monetary policy, a wider market opening and yuan internationalisation are fuelling the trend. Issuers included the governments of Kazakhstan and Pakistan, plus Deutsche Bank, Morgan Stanley and Volkswagen.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%20sees%20record%20panda%20bond%20issuance%20in%202026%20as%20foreign%20borrowers%20pile%20in.pdf"}, {"id": "scmp-04", "title": "China's 5-year plans significantly impact American factories, US study says", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "A US study finds China's five-year plans significantly hurt American factories: when Beijing backed an industry (2001-2020), US plants in that sector shed about 5% of jobs and 6% of investment, with closures rising. Chinese industries targeted for growth saw 12-15% surges in employment, investment and output per plan cycle. Emory's Jiang Wei tracked 1.6 million US factories and 1.1 million Chinese firms. She urged China to further rebalance its economy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/China%E2%80%99s%205-year%20plans%20significantly%20impact%20American%20factories%2C%20US%20study%20says.pdf"}, {"id": "scmp-05", "title": "China's export machine defies gravity as shipments soar in May", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "China's exports defied the Iran-war drag, surging 19.4% year on year to US$376.78 billion in May, far above the 12.4% forecast, helped by Trump's Beijing visit and robust global demand. Imports jumped 27.4%, widening the trade surplus to US$105.43 billion. It followed an unexpectedly strong April. Markets had watched closely to gauge whether China's export momentum could hold amid the conflict.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/DevelopingChina%E2%80%99s%20export%20machine%20defies%20gravity%20as%20shipments%20soar%20in%20May.pdf"}, {"id": "scmp-06", "title": "Forget air-con, Singapore looks underground for a cooler future", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Environment", "Southeast Asia", "Energy"], "summary": "Singapore is expanding underground district cooling — a 140-year-old concept that uses less electricity than centralised air-conditioning — as energy security and a projected \"super El Nino\" raise the stakes. Pipes now run beneath at least eight neighbourhoods, including the world's largest underground Marina Bay network. The rollout comes amid US-Iran-war energy shortages, with the city's temperatures rising twice as fast as the global average. District cooling is projected to be a US$60 billion market by 2034.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Forget%20air-con%2C%20Singapore%20looks%20underground%20for%20a%20cooler%20future.pdf"}, {"id": "scmp-07", "title": "Hong Kong-listed Tencent eyes global note issuance amid AI investment surge", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Tencent plans to issue new notes to international investors within a year, expanding its global medium-term note programme to a US$30 billion ceiling, joining a fundraising wave by Hong Kong-listed AI firms. Net proceeds are for general corporate purposes, with outstanding notes at US$17.51 billion. The move comes amid surging AI investment across the sector. It follows Tencent's first-ever yuan-denominated bonds last September.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Hong%20Kong-listed%20Tencent%20eyes%20global%20note%20issuance%20amid%20AI%20investment%20surge.pdf"}, {"id": "scmp-08", "title": "How China's 'Hefei model' spawned a chipmaker's multibillion-dollar IPO plan", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese DRAM maker CXMT is pushing for a landmark IPO on Shanghai's Star Market, vindicating the state-backed \"Hefei model\" after the city government leveraged over 220 billion yuan in capital to build industrial clusters. Pre-IPO estimates value CXMT at roughly 150 billion yuan (US$22.2 billion), with analysts projecting its market cap could top 1 trillion yuan once trading begins. The Hefei facility was a quiet epicentre of China's chip self-sufficiency gamble. It is among the country's most consequential tech listings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/How%20China%E2%80%99s%20%E2%80%98Hefei%20model%E2%80%99%20spawned%20a%20chipmaker%E2%80%99s%20multibillion-dollar%20IPO%20plan.pdf"}, {"id": "scmp-09", "title": "Leaks and backdoors: China warns of security risks in relay services for foreign AI models", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's Ministry of State Security warned of security risks in \"AI relay services\" that give local developers grey-market access to overseas AI models, citing data leaks and unauthorised cross-border transfers. These intermediaries aggregate domestic and foreign models through a single interface, offering convenience and lower prices. The MSS said some operators lack proper qualifications and security controls, raising risks of privacy breaches and illicit data trading. The warning reflects China's tightening grip on data flows.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Leaks%20and%20backdoors%20China%20warns%20of%20security%20risks%20in%20relay%20services%20for%20foreign%20AI%20models.pdf"}, {"id": "scmp-10", "title": "Singapore eyes Asean connectivity amid new US-China dynamic: Lawrence Wong", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Southeast Asia", "Geopolitics"], "summary": "PM Lawrence Wong said Singapore will push ASEAN connectivity as bloc chair next year amid a fraught US-China dynamic. He stressed that open Xi-Trump communication reduces miscalculation risk but is no panacea, and that the two deeply intertwined economies must coexist since neither can dominate. He likened the dynamic to a new \"mutually assured destruction.\" Singapore wants an open, inclusive environment to engage all major players.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Singapore%20eyes%20Asean%20connectivity%20amid%20new%20US-China%20dynamic%20Lawrence%20Wong.pdf"}, {"id": "scmp-11", "title": "South Korea tells Japan to apologise before military cooperation", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "South Korean President Lee Jae Myung said Japan must offer a genuine apology before a bilateral military logistics pact (ACSA) can advance, despite pressure to deepen ties as North Korea, China and Russia draw closer. Lee likened it to an attacker asking a hospitalised victim to shake hands and move on. He acknowledged a \"practical need\" but cited deep public resentment in South Korea. The stance complicates US efforts to align its two allies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/South%20Korea%20tells%20Japan%20to%20apologise%20before%20military%20cooperation.pdf"}, {"id": "scmp-12", "title": "Spying in Xinjiang? No, I was reporting from China's energy heartland", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Energy", "Society"], "summary": "An SCMP reporter's note documents a rare visit to Xinjiang's coal-chemical heartland — one of China's four major bases for large-scale coal-chemical production — as the Iran war disrupts global oil and chemical supplies. The coal-heavy sector is seizing the opportunity amid high oil prices. The reporter describes the difficulty of gaining access to the tightly controlled region and observing unstaffed mining operations. It accompanies a two-part reporting series on the ecosystem.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Spying%20in%20Xinjiang%20No%2C%20I%20was%20reporting%20from%20China%E2%80%99s%20energy%20heartland.pdf"}, {"id": "scmp-13", "title": "To keep up with China's fast-changing consumers, MNCs adapt via local alliances", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Trade", "Society"], "summary": "Foreign companies are increasingly selling China units, partnering or forming joint ventures with local firms to stay competitive amid rapid market shifts, following Starbucks and Burger King. General Mills said it would offload its Häagen-Dazs China business. Citi's Colin Banfield said China's sheer size makes a full exit unthinkable and that trends there \"play out in the rest of the world.\" China is \"a laboratory\" for how to sell and deliver to consumers, he said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/To%20keep%20up%20with%20China%E2%80%99s%20fast-changing%20consumers%2C%20MNCs%20adapt%20via%20local%20alliances.pdf"}, {"id": "scmp-14", "title": "UK's Starmer gives Apple, Google 3 months to stop children sending nude images", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Politics", "Technology & AI", "Society"], "summary": "UK PM Keir Starmer gave Apple and Google three months to make it impossible for children to take, share or view nude images on smartphones, or face new laws, fines and potential criminal liability for tech bosses. Firms must activate or build device-level detection, meaning adults would need age verification to take or view such images. The rules would apply to existing and newly sold UK devices. \"Standing by is not an option,\" Starmer said at London Tech Week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/UK%E2%80%99s%20Starmer%20gives%20Apple%2C%20Google%203%20months%20to%20stop%20children%20sending%20nude%20images.pdf"}, {"id": "scmp-15", "title": "US adds Alibaba, BYD and other Chinese tech champions to military company blacklist", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Geopolitics", "Trade", "Technology & AI"], "summary": "The Pentagon is adding Alibaba, BYD, Baidu, Nio, WuXi AppTec and dozens more to its list of \"Chinese military companies\" under Section 1260H, widening a blacklist targeting EVs, AI, batteries, biotech and solar. The designation can complicate access to US capital markets and government business, though it doesn't automatically trigger sanctions. It marks a sharp escalation in US-China technological competition. The notice was scheduled for Federal Register publication on Wednesday.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/US%20adds%20Alibaba%2C%20BYD%20and%20other%20Chinese%20tech%20champions%20to%20military%20company%20blacklist.pdf"}, {"id": "scmp-16", "title": "Update: Israel and Iran hold fire after exchange, but warn of escalation if provoked", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Israel and Iran backed away from further strikes on June 8 but warned of retaliation if provoked, hours after trading fire for the first time since the April ceasefire. Trump called for an immediate stop, prompting Iran's joint command to announce a halt to offensive strikes while threatening \"crushing\" responses to further aggression, including in southern Lebanon. The renewed hostilities revived fears of a return to full-scale war. The conflict has driven up global energy and food prices since February 28.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/UpdateIsrael%20and%20Iran%20hold%20fire%20after%20exchange%2C%20but%20warn%20of%20escalation%20if%20provoked.pdf"}, {"id": "scmp-17", "title": "WWDC 2026: Apple gives Siri an AI makeover, but China must wait", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "At WWDC 2026, Apple unveiled an AI makeover of Siri powered by Google's Gemini, abandoning preprogrammed responses for fluid, cross-app conversations with continuous chat history. A public beta arrives later this year for English-language devices, but China must wait as the updates remain walled off there. It was Tim Cook's final keynote before handing the reins to John Ternus in September. Analysts said Apple wants AI embedded in the OS, with Siri central to that ambition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/WWDC%202026%20Apple%20gives%20Siri%20an%20AI%20makeover%2C%20but%20China%20must%20wait.pdf"}, {"id": "scmp-18", "title": "Why are Chinese savers moving money out of banks and into tech stocks?", "source": "SCMP", "date": "09 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Falling deposit rates are pushing Chinese savers into technology-focused mutual funds, with some lenders pulling higher-rate long-term products. One Shanghai worker shifted half her savings into chip and co-packaged-optics funds after a three-year ICBC deposit's rate nearly halved to 1.55% from about 3% in 2023. The AI-stock rally has emboldened previously risk-averse savers. Chips and CPO are among the A-share market's hottest sectors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/9%20Jun%202026/09%20Jun%20SCMP/Why%20are%20Chinese%20savers%20moving%20money%20out%20of%20banks%20and%20into%20tech%20stocks.pdf"}]}};</script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SRC = { WSJ:{c:"var(--wsj)",name:"Wall Street Journal"}, ST:{c:"var(--st)",name:"Straits Times"},
  BT:{c:"var(--bt)",name:"Business Times"}, SCMP:{c:"var(--scmp)",name:"South China Morning Post"} };
const SRC_ORDER = ["WSJ","ST","BT","SCMP"];
const TAGS = {
  "Geopolitics":"var(--t-geopolitics)","Energy":"var(--t-energy)","Finance & Markets":"var(--t-finance)",
  "Technology & AI":"var(--t-tech)","Southeast Asia":"var(--t-sea)","Defence":"var(--t-defence)",
  "Society":"var(--t-society)","Politics":"var(--t-politics)","Trade":"var(--t-trade)","Environment":"var(--t-environment)"
};

function Metric({m}){
  return (<div className="metric"><div className="v">{m.value}</div><div className="l">{m.label}</div><div className="s">{m.sub}</div></div>);
}

function SourceBars({counts,total}){
  const max = Math.max(...SRC_ORDER.map(s=>counts[s]||0),1);
  return (<div className="bars">
    <div className="section-title" style={{margin:"0 0 6px"}}>Coverage by source</div>
    {SRC_ORDER.map(s=>(
      <div className="bar-row" key={s}>
        <div className="name" style={{color:SRC[s].c}}>{s}</div>
        <div className="bar-track"><div className="bar-fill" style={{width:((counts[s]||0)/max*100)+"%",background:SRC[s].c}}/></div>
        <div className="cnt">{counts[s]||0}</div>
      </div>))}
    <div className="s" style={{color:"var(--muted)",fontSize:12,marginTop:8}}>{total} articles total</div>
  </div>);
}

function Tag({t}){ return <span className="tag" style={{background:TAGS[t]||"#888"}}>{t}</span>; }

function ArticleCard({a}){
  return (<div className="article">
    <div className="head">
      <span className="src-badge" style={{background:SRC[a.source].c}}>{a.source}</span>
      <h4>{a.url? <a href={a.url} target="_blank" rel="noopener">{a.title}</a> : a.title}</h4>
      <span className="date">{a.date}</span>
    </div>
    <p>{a.summary}</p>
    <div>{a.tags.map(t=><Tag key={t} t={t}/>)}</div>
  </div>);
}

function Overview({day}){
  const lead = day.briefingCards;
  const top = day.articles.slice(0,4);
  return (<div>
    <div className="section-title">Briefing cards</div>
    <div className="cards">
      {lead.map((c,i)=>(<div className="card" key={i}><h3>{c.title}</h3><p>{c.body}</p></div>))}
    </div>
    <div className="section-title">Lead stories &amp; coverage</div>
    <div className="grid-2">
      <div>
        {top.map(a=><ArticleCard key={a.id} a={a}/>)}
      </div>
      <SourceBars counts={day.sourceCounts} total={day.totalArticles}/>
    </div>
  </div>);
}

function Feed({day}){
  const [q,setQ]=useState("");
  const [src,setSrc]=useState(new Set());
  const [tags,setTags]=useState(new Set());
  const toggle=(set,setter,v)=>{const n=new Set(set); n.has(v)?n.delete(v):n.add(v); setter(n);};
  const filtered = useMemo(()=>{
    const qq=q.trim().toLowerCase();
    return day.articles.filter(a=>{
      if(src.size && !src.has(a.source)) return false;
      if(tags.size && !a.tags.some(t=>tags.has(t))) return false;
      if(qq && !(a.title.toLowerCase().includes(qq)||a.summary.toLowerCase().includes(qq))) return false;
      return true;
    });
  },[q,src,tags,day]);
  return (<div>
    <div className="filters">
      <input type="text" placeholder="Search headlines and summaries…" value={q}
        onChange={e=>setQ(e.target.value)} style={{flex:"1 1 240px"}}/>
      {SRC_ORDER.map(s=>(
        <span key={s} className={"pill"+(src.has(s)?" active":"")}
          style={src.has(s)?{background:SRC[s].c}:{}} onClick={()=>toggle(src,setSrc,s)}>{s}</span>))}
    </div>
    <div className="tagrow">
      {Object.keys(TAGS).map(t=>(
        <span key={t} className={"pill"+(tags.has(t)?" active":"")}
          style={tags.has(t)?{background:TAGS[t]}:{}} onClick={()=>toggle(tags,setTags,t)}>{t}</span>))}
    </div>
    <div className="meta">{filtered.length} of {day.totalArticles} articles{(src.size||tags.size||q)?" (filtered)":""}</div>
    {filtered.length? filtered.map(a=><ArticleCard key={a.id} a={a}/>) : <div className="empty">No articles match your filters.</div>}
  </div>);
}

function App(){
  const days = window.ALL_DAYS || {};
  const keys = Object.keys(days).sort().reverse();
  const [date,setDate]=useState(keys[0]);
  const [tab,setTab]=useState("overview");
  const [theme,setTheme]=useState("light");
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  if(!keys.length) return <div className="wrap"><p>No dashboard data available.</p></div>;
  const day = days[date];
  const fmt = (k)=>{ const d=new Date(k+"T00:00:00"); return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"}); };
  return (<div className="wrap">
    <header className="top">
      <div className="brand">
        <h1>Tecity News Dashboard</h1>
        <div className="sub">{day.dayOfWeek}, {day.date} · {day.totalArticles} articles · WSJ · ST · BT · SCMP</div>
      </div>
      <div className="controls">
        <select value={date} onChange={e=>setDate(e.target.value)}>
          {keys.map(k=><option key={k} value={k}>{fmt(k)}</option>)}
        </select>
        <span className="iconbtn" onClick={()=>setTheme(theme==="light"?"dark":"light")}>{theme==="light"?"🌙 Dark":"☀ Light"}</span>
      </div>
    </header>
    <div className="digest">
      <div className="k">Executive digest</div>
      {day.executiveDigest}
    </div>
    <div className="metrics">{day.keyMetrics.map((m,i)=><Metric key={i} m={m}/>)}</div>
    <div className="tabs">
      <div className={"tab"+(tab==="overview"?" active":"")} onClick={()=>setTab("overview")}>Overview</div>
      <div className={"tab"+(tab==="feed"?" active":"")} onClick={()=>setTab("feed")}>Feed</div>
    </div>
    {tab==="overview"? <Overview day={day}/> : <Feed day={day}/>}
    <footer>Tecity News Dashboard · rolling 7-trading-day window · generated locally, synced via OneDrive</footer>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
