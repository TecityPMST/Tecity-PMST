S.%20to%20Speed%20Up%20Early%20Drug%20Research%20to%20Better%20Compete%20With%20China.pdf"}, {"id": "wsj-16", "title": "Why Apple Enjoys Peerless iPhone Pricing Power", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Apple can raise prices confidently because it has wiped out competition for the wealthiest smartphone buyers: it holds over two-thirds of the premium ($600-plus) market and more than three-quarters of phones priced above $1,000. Though Apple ships only one in five of the world's 1.3 billion phones — similar to Samsung — it captures the overwhelming majority of industry gross profits. Its latest models were the top three best-sellers in Q1, with US share near 60%. Industry-wide price hikes are set to cut shipments by double digits this year, but the premium segment is forecast to grow modestly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Why%20Apple%20Enjoys%20Peerless%20iPhone%20Pricing%20Power.pdf"}, {"id": "st-01", "title": "Australians Favour China Ties Over US", "source": "ST", "date": "24 Jun 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "A Lowy Institute 2026 survey found 51% of Australians now see ties with China as more important than the US relationship — an eight-point jump and a first in the poll's history — as confidence in Trump hit a record low. Fewer than a third trust Washington to act responsibly, and trust in the US alliance for security fell seven points to 73%, the sharpest sustained drop on record. Support for the AUKUS submarine pact held firm at 68%. The poll also showed an insecure population, with a majority feeling 'unsafe' and a slim majority calling immigration too high.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Australians%20favour%20China%20ties%20over%20US.pdf"}, {"id": "st-02", "title": "Buy-Now-Pay-Later for $4 Bubble Tea Highlights Thailand's Household Debt Risk", "source": "ST", "date": "24 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Thai central bank governor Vitai Ratanakorn is moving to curb buy-now-pay-later services that let consumers split purchases as small as a 106-baht (S$4) bubble tea, warning they breed a habit of 'spending money they don't have.' Thai household debt sits near 87% of GDP, among Asia's highest and unusually tied to consumer spending rather than housing. Vitai estimates BNPL accounts surged nearly tenfold to about six million. The debt overhang has long weighed on consumption and complicated efforts to revive Thailand's growth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Buy-now-pay-later%20for%204%20bubble%20tea%20highlights%20Thailand%27s%20household%20debt%20risk.pdf"}, {"id": "st-03", "title": "In South Korea, a Job or Partner at Samsung, SK Hynix Is the New 'A+' Catch", "source": "ST", "date": "24 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "The AI-driven chip boom has turned SK Hynix and Samsung employees into prized catches in South Korea's marriage market, ranked alongside doctors and lawyers as hefty AI bonuses create a new affluent class. Matchmakers say chip workers have moved from 'B+ or A-grade' to 'A+,' while cram schools now run courses to prep applicants for jobs at the chip giants. On June 22, SK Hynix overtook Samsung as Korea's most valuable firm. Samsung struck a union pay deal including performance bonuses of around US$416,000 (S$538,700) for some chip staff.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/In%20South%20Korea%2C%20a%20job%20or%20partner%20at%20Samsung%2C%20SK%20Hynix%20is%20the%20new%20%27A%27%20catch.pdf"}, {"id": "st-04", "title": "Iran Is Where the Next Solar Boom Will Happen", "source": "ST", "date": "24 Jun 2026", "tags": ["Energy", "Environment"], "summary": "Despite subsidised petrol as cheap as 10 US cents a gallon and never ratifying the Paris Agreement, Iran may become one of the biggest growth markets for solar power — paradoxically to sustain its oil industry. Its old, fractured fields need roughly 110 billion cubic metres of gas reinjected annually to maintain pressure, but Iran achieves only about 10% of that, risking permanent damage. Diverting solar to free up gas for reinjection could rescue oil output. The piece frames a breakneck solar build-out as essential to Iran's post-war energy strategy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Iran%20is%20where%20the%20next%20solar%20boom%20will%20happen.pdf"}, {"id": "st-05", "title": "Is Singapore Ready for an AI Outage?", "source": "ST", "date": "24 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "The June 12 suspension of Anthropic's Fable 5 and Mythos 5 models — triggered by a US national-security directive applying to foreign nationals worldwide — is a warning that Singapore's access to frontier AI can be cut off abruptly. The piece urges Singapore to be clear-eyed about dependence on foreign model providers without retreating from global AI, given AI is becoming embedded in banking, healthcare and public services. It links the risk to Singapore's national AI strategies and Economic Strategy. The framing: resilience and optionality matter as much as adoption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Is%20Singapore%20ready%20for%20an%20AI%20outage.pdf"}, {"id": "st-06", "title": "OCBC Boosts Hiring for Indonesia Wealth Business as Assets Rise", "source": "ST", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "OCBC plans to double its Indonesia wealth advisers to 400 by end-2026 after agreeing to buy HSBC's retail and wealth assets in the country, with client assets up about 11% to 127 trillion rupiah (S$9.2 billion). Indonesia head Parwati Surjaudaja said lower onshore tax rates may prompt the wealthy to keep more money at home rather than offshore in Singapore or Switzerland. CEO Tan Teck Long has flagged banking Indonesia's rich as a key growth area. Information-sharing rules with Indonesian tax authorities have made hiding overseas assets harder.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/OCBC%20boosts%20hiring%20for%20Indonesia%20wealth%20business%20as%20assets%20rise.pdf"}, {"id": "st-07", "title": "SK Hynix ETF's Assets Soar to $21.7 Billion, Making It Biggest in Hong Kong", "source": "ST", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "CSOP's leveraged ETF tracking SK Hynix has amassed over US$16.8 billion (S$21.7 billion), overtaking the Tracker Fund of Hong Kong to become the city's largest ETF and underscoring appetite for risky chip bets. The product, designed to deliver twice the stock's daily return, has returned almost 900% year-to-date with nearly US$2 billion of inflows. SK Hynix shares have jumped over 300% in 2026 on AI demand, while the Hang Seng Index has fallen about 7.5%. Bloomberg Intelligence's Rebecca Sin cautioned investors on the leveraged product's daily tracking difference.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/SK%20Hynix%20ETF%27s%20assets%20soar%20to%2021.7%20billion%2C%20making%20it%20biggest%20in%20Hong%20Kong.pdf"}, {"id": "st-08", "title": "Singapore Core Inflation Steady, but Prices May Rise Later", "source": "ST", "date": "24 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore's core inflation held at 1.4% in May, below the 1.6% economists expected, with headline inflation steady at 1.8%, as MAS and MTI warned higher global energy costs will lift import prices over time. Private transport inflation jumped to 8.6% from 8.1% on car and motorcycle prices, offset by softer services inflation. The authorities cautioned that energy costs, still above 2025 levels, are not yet fully reflected locally and will pass through supply chains with a lag. The data feeds expectations around MAS policy and the Singapore dollar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Singapore%20core%20inflation%20steady%2C%20but%20prices%20may%20rise%20later.pdf"}, {"id": "st-09", "title": "The Old Model Is Broken. Telcos Need to Reinvent Themselves", "source": "ST", "date": "24 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "The collapse of the Simba-M1 merger and Singtel's renewed consolidation interest have revived debate over whether Singapore needs three or four telcos — but the deeper issue is a broken business model. After three decades of liberalisation since Singtel's 1992 corporatisation, voice and SMS no longer deliver high margins as data is commoditised. Mobile subscriptions rose from 414,000 in 1997 to 2.44 million by 2000, but the value drivers have shifted. The piece argues consolidation alone won't solve structural problems; telcos must reinvent around new services.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/The%20old%20model%20is%20broken.%20Telcos%20need%20to%20reinvent%20themselves.pdf"}, {"id": "st-10", "title": "UK Political Instability and Prime Minister Turnover", "source": "ST", "date": "24 Jun 2026", "tags": ["Politics", "Society"], "summary": "Keir Starmer quit on June 22 less than two years after a landslide win, becoming the sixth UK leader to resign in a decade — the highest turnover in almost two centuries. Like predecessors, he failed to stem anger over living standards stagnant since the 2008 crash, ballooning debt and illegal immigration. Historian Anthony Seldon warned that if likely successor Andy Burnham fails, 'the outlook for Britain is bleak.' Once a pillar of stability under Thatcher and Blair, Britain has been hammered since the global financial crisis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/UK%20political%20instability%20and%20prime%20minister%20turnover.pdf"}, {"id": "st-11", "title": "US Waives Iran Sanctions for 60 Days", "source": "ST", "date": "24 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Trump said on June 23 that Iran agreed to nuclear inspections 'into infinity' and that unfrozen assets would buy US humanitarian supplies, after Washington waived sanctions for 60 days from June 22. VP Vance said talks in Buergenstock, Switzerland, mediated by Qatar and Pakistan, laid a good foundation, but Iran's foreign ministry denied agreeing to IAEA inspections or meeting Grossi. Trump hit back at Iran's 'protestations and false statements,' insisting on 'Nuclear Honesty.' Unfrozen assets would go to escrow for US corn, wheat and soybeans.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/US%20waives%20Iran%20sanctions%20for%2060%20days.pdf"}, {"id": "st-12", "title": "Why AI's Gains Could Come With a Burnout Cost", "source": "ST", "date": "24 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Rather than freeing workers as Keynes predicted in 1930, AI may be packing more work into every hour and breeding anxiety about the value of human contribution. The author recounts an executive unsure where he fits as machines absorb defining tasks. A study of 136,000 US workers found those in the most AI-exposed jobs worked longer hours and reported lower work-life balance. The piece contrasts this with optimistic predictions from Gates and Musk that AI could shrink the working week or make work optional.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20ST/Why%20AI%27s%20gains%20could%20come%20with%20a%20burnout%20cost.pdf"}, {"id": "bt-01", "title": "Andy Burnham's Victory May Change Labour's Politics, but Not Britain's Business Direction", "source": "BT", "date": "24 Jun 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Andy Burnham's 54.8% win in the Makerfield by-election — in a seat that weeks earlier leaned to Farage's Reform UK — strengthens his claim to replace Starmer, making him likely PM within weeks in what looks like a coronation. The piece argues the business impact will be less dramatic than many assume, with continuity for investors and regulated sectors. His ability to unite Labour's base while drawing anti-Reform tactical support passed the twin leadership tests. The win reshapes Labour's politics more than Britain's economic direction.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Andy%20Burnham%27s%20victory%20may%20change%20Labour%27s%20politics%2C%20but%20not%20Britain%27s%20business%20direction.pdf"}, {"id": "bt-02", "title": "Australia's Tax Overhaul Chills Nation's Long Love Affair With Property", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Australia's biggest tax change in decades — ending property investment tax breaks — has chilled the housing obsession, with national weekend auction clearance rates falling below 50%, the lowest since the pandemic. At a Bondi-area auction, a A$5.2 million (S$4.7 million) five-bedroom home drew no bids. The shift, unveiled last month, is seen by some as ending generations of property-led wealth-building that made Sydney and Melbourne among the world's least affordable markets. The cooling marks a structural turn for an economy long anchored on housing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Australia%27s%20tax%20overhaul%20chills%20nation%27s%20long%20love%20affair%20with%20property.pdf"}, {"id": "bt-03", "title": "China AI Rally Broadens as Funds Move Past Overvalued First-Tier Winners to Indirect Beneficiaries", "source": "BT", "date": "24 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shanghai's Star 50 Index of tech-focused firms is up 42.2% year-to-date and hit a record on June 19, far outpacing the broader SSE Composite's 3.1% and the CSI 300's 6.7%, while Hong Kong's Hang Seng lost 6.7%. With first-tier AI winners looking richly valued, funds are rotating into second-tier and indirect beneficiaries. China's AI market grew from US$23 billion in 2024, per CAICT and Frost & Sullivan estimates. The broadening rally signals maturing investor positioning in China's domestic tech boom.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/China%20AI%20rally%20broadens%20as%20funds%20move%20past%20overvalued%20first-tier%20winners%20to%20indirect%20beneficiaries.pdf"}, {"id": "bt-04", "title": "China Can Be a Useful Bogeyman in American Politics", "source": "BT", "date": "24 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "China's latest Five-Year Plan, announced in March, targets a major leap in international influence to win the 'battle for global public opinion' and counter Western biases. The piece notes recent polls show rising global support for China, but argues this reflects disgruntlement with Trump's America more than warmth toward the Communist Party. It warns the contest turns nasty when influence operations go covert, citing documented Chinese state actors disguising their hand. The framing cautions against both Chinese manipulation and US overreaction.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/China%20can%20be%20a%20useful%20bogeyman%20in%20American%20politics.pdf"}, {"id": "bt-05", "title": "China Pursues Austerity With First Fiscal Gap Cutback Since 2023", "source": "BT", "date": "24 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "China narrowed its combined fiscal deficit for the first time in over two years, with the shortfall under its two biggest budgets shrinking 4.1% in the first five months to 3.2 trillion yuan (S$611 billion). May government spending fell 3.9% year-on-year, the third straight monthly decline, even as broad income rose 0.8%. Authorities have strengthened tax collection, targeting overseas capital gains and foreign income. Goldman Sachs economists said fiscal policy turned less supportive in Q2 amid falling land-sale revenue and shrinking policy-bank support.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/China%20pursues%20austerity%20with%20first%20fiscal%20gap%20cutback%20since%202023.pdf"}, {"id": "bt-06", "title": "Digital Euro Clears Key Hurdle as EU Seeks to Break Free From US Credit Cards", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The ECB secured European Parliament economic-committee backing for a digital euro, an electronic wallet aimed at cutting the eurozone's reliance on US payment networks amid fraying transatlantic ties. Six years in the making, the project gained urgency after Trump's tariffs and fears the US could weaponise dominance over Visa and Mastercard. Approval followed three years of wrangling with banks worried about deposit flight. The digital euro would let all eurozone residents pay online and in person, guaranteed by the central bank but marketed by banks and fintechs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Digital%20euro%20clears%20key%20hurdle%20as%20EU%20seeks%20to%20break%20free%20from%20US%20credit%20cards.pdf"}, {"id": "bt-07", "title": "Don't Mistake the Familiarity of Singapore Equities for Diversification", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "After the Straits Times Index rose more than 20% in 2025 and posted double-digit gains this year, the piece warns Singapore investors against over-concentrating in a home market that feels reassuring but isn't truly diversified. Local stocks — banks, Reits, infrastructure and industrial conglomerates — share underlying sensitivities to local interest rates and property fundamentals. Bank gains from higher rates are not permanent. The caution: familiarity is not the same as diversification, and the rally may be tempting investors to overweight.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Don%27t%20mistake%20the%20familiarity%20of%20Singapore%20equities%20for%20diversification.pdf"}, {"id": "bt-08", "title": "Greenspan's Stumbles Hold Lessons for Warsh's Fed", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Alan Greenspan, who led the Fed through the 'Great Moderation,' has died at 100 just as elements of his free-market philosophy enjoy a renaissance under new Fed chair Kevin Warsh, a self-described admirer. The piece revisits Greenspan's record of mostly stable prices and booming markets alongside his stumbles — notably underestimating financial-system risks before the 2008 crisis. It frames his legacy as a cautionary lesson for Warsh's Fed. The timing links a bygone era of central-bank deregulation to today's policy debates.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Greenspan%27s%20stumbles%20hold%20lessons%20for%20Warsh%27s%20Fed.pdf"}, {"id": "bt-09", "title": "Mega IPOs Could Turn the Tide in Public Equity Issuance: Fidelity Manager", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Fidelity's George Efstathopoulos says mega-IPOs like SpaceX and the impending Anthropic and OpenAI listings could herald a fresh era of public equity issuance, reversing years of shrinking free floats. US listed companies peaked above 8,000 in 1996 and fell to around 4,300 by 2023 as firms stayed private longer on abundant private capital. He believes the market may have found the trough, with private debt now facing headwinds from higher rates. A revival in issuance would expand the universe for active investors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Mega%20IPOs%20could%20turn%20the%20tide%20in%20public%20equity%20issuance%20Fidelity%20manager.pdf"}, {"id": "bt-10", "title": "Moving Into H2 2026 — Resilience Over Perfection", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Entering the second half of 2026, the author argues corporate earnings show real resilience — consensus growth revised from about 12% to near 29% — with margins holding and AI spending intact, but markets have priced in plenty of good news. Since the Iran war's first ceasefire on April 7, semiconductors surged 76% in 40 days before pulling back. The theme is 'resilience over perfection': investors still want the AI trade but no longer at any price. Earnings strength offers support even as valuations leave little room for disappointment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Moving%20into%20H2%202026%20-%20resilience%20over%20perfection.pdf"}, {"id": "bt-11", "title": "Singapore Real Estate Execs Turn Pessimistic in Q1 as Inflation Fears Mount: NUS Poll", "source": "BT", "date": "24 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "An NUS Ireus quarterly survey found Singapore real estate executives turned markedly more pessimistic in Q1 2026, with 80% citing inflation and interest rates as a concern, up sharply from 11.8% in Q4. Ireus director Qian Wenlan blamed the Middle East crisis and its 'cascading effects' on energy costs, inflation and rates. The residential sector remained a rare bright spot even as commercial sentiment weakened. Previously optimistic sentiment has given way to 'anticipation of dire exogenous risks.'", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Singapore%20real%20estate%20execs%20turn%20pessimistic%20in%20Q1%20as%20inflation%20fears%20mount%20NUS%20poll.pdf"}, {"id": "bt-12", "title": "Singaporeans Should Keep Watch as Australian Politics Turn Right", "source": "BT", "date": "24 Jun 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "A Roy Morgan poll shows Pauline Hanson's One Nation as Australia's most popular party by primary support, ahead of PM Albanese's Labor — a dramatic turnabout for a once-fringe figure. The piece links the rise to cost-of-living pressure from soaring oil prices and unpopular budget changes to capital gains and trusts, amplified by social media. It parallels Farage's Reform in Britain and the broader Western populist surge. Singapore is urged to watch closely given Australia's importance as a regional partner.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Singaporeans%20should%20keep%20watch%20as%20Australian%20politics%20turn%20right.pdf"}, {"id": "bt-13", "title": "Singtel Sells S$1 Billion Stake in Thailand's Gulf Development; Placement Leaves It With 4.95% Interest", "source": "BT", "date": "24 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singtel sold a 2.8% stake in Thai energy firm Gulf Development for about S$1 billion via private placement, booking cumulative gains of some S$140 million and leaving it with a 4.95% stake worth an estimated S$1.8 billion. A 90-day lockup applies to the residual, which DBS's Sachin Mittal called 'modestly sized but non-trivial,' suggesting Singtel will retain it near-term. CFO Arthur Lang said strong share-price performance let Singtel crystallise value and reallocate capital, with an analyst expecting proceeds to fund data-centre growth capex. Singtel received the original 7.7% stake in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/Singtel%20sells%20S1%20billion%20stake%20in%20Thailand%27s%20Gulf%20Development%20placement%20leaves%20it%20with%204.95%20interest.pdf"}, {"id": "bt-14", "title": "The Bright Side to the CSE Global Clash", "source": "BT", "date": "24 Jun 2026", "tags": ["Southeast Asia", "Politics"], "summary": "A boardroom row at Singapore-listed CSE Global has a silver lining: an independent director taking a stand against the controlling shareholder, with SGX Regco taking interest. Veteran auditor Tan Chian Khong resigned on June 2 as lead independent director, citing a 'difference of views' over working with controlling shareholders. Tan alleges non-executive chairman Eugene Lai asked him to resign before his 2028 term-end and to step down as nominating-committee chair. The piece frames it as a chance to address governance risks amid CSE's strategic review.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/The%20bright%20side%20to%20the%20CSE%20Global%20clash.pdf"}, {"id": "bt-15", "title": "UK Economy Shrinks for Second Straight Month, Flash PMI Shows", "source": "BT", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "S&P Global's UK flash PMI slipped to 49.4 in June, a 14-month low and below May's 49.7, signalling a second straight month of contraction as firms cut more jobs. The reading reinforces fears of stagnant Q2 output after Britain posted the fastest G7 growth in Q1. Labour's government, elected in 2024 on a growth promise, has struggled to deliver, and the employment sub-index has been negative for 21 months. The data lands as the party prepares to govern under a new leader following Starmer's resignation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20BT/UK%20economy%20shrinks%20for%20second%20straight%20month%2C%20flash%20PMI%20shows.pdf"}, {"id": "scmp-01", "title": "After 6 Prime Ministers in 10 Years, Can Anyone Fix the UK?", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Politics", "Society"], "summary": "Keir Starmer quit less than two years after a landslide win, the sixth UK leader to resign in a decade and, by this Reuters account, leaving his successor as the seventh prime minister since Brexit in 2016. Like predecessors, he failed to stem anger over living standards stagnant since 2008, ballooning debt from global shocks, and divisions over illegal immigration. The piece captures the highest political turnover in almost two centuries. It questions whether any leader can fix a country mired in low growth and fractured politics.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/After%206%20prime%20ministers%20in%2010%20years%2C%20can%20anyone%20fix%20the%20UK.pdf"}, {"id": "scmp-02", "title": "Alibaba Chip Unit T-Head Triples Capital Amid AI Hardware Bet", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Alibaba's chip-design unit T-Head more than tripled its registered capital to 1 billion yuan (US$148 million), its first injection in over three years, as the group builds full-stack AI infrastructure from Qwen models to chips to cloud. The move aligns with China's chip self-sufficiency drive and coincides with a planned spin-off of the unit amid renewed AI-hardware frenzy. T-Head's bespoke chips are being integrated with Alibaba Cloud and Qwen foundational models. It marks Alibaba's deepening bet on domestic semiconductors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Alibaba%20chip%20unit%20T-Head%20triples%20capital%20amid%20AI%20hardware%20bet.pdf"}, {"id": "scmp-03", "title": "Alibaba Sues Pentagon Over China Military Blacklist", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "Alibaba sued the US Department of Defence in a San Jose district court, seeking removal from a blacklist of firms deemed to support China's military, arguing the Pentagon acted without substantial evidence and violated due process and free-speech rights. The DoD added Alibaba — owner of the South China Morning Post — alongside BYD and Nio on June 9. The suit is the latest flashpoint in US-China tech tensions. A blacklisting can deter US institutional investment and complicate commercial ties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Alibaba%20sues%20Pentagon%20over%20China%20military%20blacklist.pdf"}, {"id": "scmp-04", "title": "Apple Faces Fresh Antitrust Complaint From Chinese Developers Over 'Unfair' App Store Fees", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "A group of 48 Chinese iOS developers filed a complaint with China's State Administration for Market Regulation, accusing Apple of 'abusing market dominance' through 'unfair and excessively high' App Store commissions. They allege Apple failed to honour a promise to offer the lowest commission rate to the Chinese market. The open letter, published by developer Tian Junwei, asks the regulator to investigate and penalise Apple. It adds regulatory pressure on Apple's lucrative ecosystem in a key market.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Apple%20faces%20fresh%20antitrust%20complaint%20from%20Chinese%20developers%20over%20%E2%80%98unfair%E2%80%99%20App%20Store%20fees.pdf"}, {"id": "scmp-05", "title": "China's CATL Bets Big on Sodium-Ion Batteries to Navigate Lithium Price Volatility", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Energy", "Technology & AI"], "summary": "CATL, the world's largest EV-battery maker, plans to ramp sodium-ion cell output to 200 gigawatt-hours annually — nearly three times last year's estimated global capacity of 70GWh — to hedge lithium-price volatility. It invested 650 million euros (US$742 million) to expand capacity and introduced its first sodium-based energy-storage system. Sodium-ion cells, using cheaper and more abundant materials, could reshape both EV and grid-storage economics. The bet positions CATL to lead an emerging battery chemistry.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/China%E2%80%99s%20CATL%20bets%20big%20on%20sodium-ion%20batteries%20to%20navigate%20lithium%20price%20volatility.pdf"}, {"id": "scmp-06", "title": "China's Biotech Surge Sparks US Security Concerns as Drug Trials Break Records in 2025", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's clinical drug-trial registrations hit a record 5,215 in 2025, more than double 2020, with 57.5% for new drugs — an 18% year-on-year rise — and cancer treatments the top focus. The surge reflects Beijing's drive to make biotech a strategic industry and is drawing US security scrutiny as American firms increasingly license Chinese drug candidates. The pipeline growth signals China's rising weight in global pharma innovation. It feeds Washington's parallel push to speed domestic early-stage research.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/China%E2%80%99s%20biotech%20surge%20sparks%20US%20security%20concerns%20as%20drug%20trials%20break%20records%20in%202025.pdf"}, {"id": "scmp-07", "title": "DeepSeek's Harness Team Races to Recruit Talent in Booming AI Agent Market", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI"], "summary": "Chinese AI start-up DeepSeek is rapidly expanding its new Harness team to push into the booming AI-agent market, racing to turn foundational models into autonomous commercial products. Cui Tianyi, a former Jane Street quant who joined in March to lead the team, said on X that it faces an acute talent shortage despite its ambitions. The hiring blitz is part of an urgent effort to build DeepSeek's next-generation tools. It underscores the intensifying global race to commercialise AI agents.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/DeepSeek%E2%80%99s%20Harness%20team%20races%20to%20recruit%20talent%20in%20booming%20AI%20agent%20market.pdf"}, {"id": "scmp-08", "title": "Global Farming, Chinese Food Imports at Stake as El Nino Threatens Drought", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Environment", "Geopolitics"], "summary": "The UN's FAO warned that a dry, hot El Nino pattern threatens agriculture worldwide, with the sharpest risks in Southeast Asia, South Asia, Africa and Latin America, where pastureland faces over a 50% chance of drought in coming months. An analyst flagged a possible challenge to China's food supplies. El Nino cycles can destroy harvests, kill livestock and force migration, hitting countries already in conflict and economic stress hardest. The warning carries implications for global food prices and Chinese imports.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Global%20farming%2C%20Chinese%20food%20imports%20at%20stake%20as%20El%20Nino%20threatens%20drought.pdf"}, {"id": "scmp-09", "title": "Growth of Hong Kong's Ultra-Wealthy Class Outpaces Super-Rich Rivals in 2025: Altrata", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Hong Kong's population of ultra-high-net-worth individuals — those with over US$30 million — jumped 26.4% in 2025 to nearly 18,300, the fastest growth among the world's top 10 super-rich cities and second only to Seoul among the top 12. Altrata attributed the surge to an equity-market revival, real estate and investment reforms, and rising wealth-management demand. That works out to roughly one super-rich resident for every 412 people. The data signals Hong Kong's reinforced status as a wealth hub.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Growth%20of%20Hong%20Kong%E2%80%99s%20ultra-wealthy%20class%20outpaces%20super-rich%20rivals%20in%202025%20Altrata.pdf"}, {"id": "scmp-10", "title": "How Anthropic's Fable 5 Shutdown Could Help China's Zhipu GLM-5.2 Gain Ground", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The global suspension of Anthropic's Claude Fable 5 — after Washington blocked foreign access to what is widely seen as the world's most advanced AI model, citing jailbreaking risks — has prompted businesses worldwide to reassess reliance on US technology. Unveiled June 9 as the public face of the powerful Claude Mythos model, Fable 5 remains unavailable globally after Anthropic disabled it rather than screen users by nationality. The disruption creates an opening for capable Chinese rivals such as Zhipu's GLM-5.2. It crystallises concerns over US AI-infrastructure reliability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/How%20Anthropic%E2%80%99s%20Fable%205%20shutdown%20could%20help%20China%E2%80%99s%20Zhipu%20GLM-5.2%20gain%20ground.pdf"}, {"id": "scmp-11", "title": "How Japan Seeks to Win Over Allies by Refuting China's Militarism Claim", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Japanese Defence Minister Shinjiro Koizumi is pushing back on Beijing's 'new militarism' label, questioning the accuracy of China's official military-spending data while touting Japan's transparent approach in his first foreign-media interview on June 17. Analysts say the comments aim to shape allied perceptions and prevent the label from slowing Japan's security reforms. Koizumi contrasted Japan's openness on drones and AI warfare with China's opacity. The messaging is a calculated bid to reassure state partners.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/How%20Japan%20seeks%20to%20win%20over%20allies%20by%20refuting%20China%E2%80%99s%20militarism%20claim.pdf"}, {"id": "scmp-12", "title": "Israel Purposely Targeted Gaza Children: UN", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Society"], "summary": "An independent UN Commission of Inquiry said Israeli forces deliberately targeted Palestinian children, amounting to genocide, crimes against humanity and war crimes in Gaza, with war crimes also in the West Bank. The report found roughly 30% of those killed in the Gaza war were children and cited evidence of genocidal intent. Israel denied the claims, having earlier called a September genocide finding against officials including Netanyahu 'scandalous.' The findings examine violations since the war began on October 7, 2023.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Israel%20purposely%20targeted%20Gaza%20children%20UN.pdf"}, {"id": "scmp-13", "title": "Pummelled by Ukraine, Russia Says US Hasn't Delivered on Trump-Putin 'Understandings'", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russia accused the US of failing to deliver on 'understandings' from the Putin-Trump Alaska summit last August, with three senior officials voicing the complaint in three days — a sign of growing frustration in Moscow. The shift follows intensified Ukrainian drone strikes deep inside Russia, including two attacks last week on a Moscow oil refinery, and a G7 summit where Zelensky pressed Western leaders. Kyiv claims to be turning the tide of the conflict. The friction complicates US-brokered peace efforts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Pummelled%20by%20Ukraine%2C%20Russia%20says%20US%20hasn%E2%80%99t%20delivered%20on%20Trump-Putin%20%E2%80%98understandings%E2%80%99.pdf"}, {"id": "scmp-14", "title": "Russia Considers Fuel Imports Amid Ukraine's Strikes on Refineries: Newspaper", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Russia is weighing fuel imports and price-capping subsidies to offset petrol and diesel shortages caused by Ukrainian strikes on its refineries, Vedomosti reported, citing two sources. Numerous regions of the world's third-largest crude producer report sales restrictions, rising prices and long queues at filling stations. Ukrainian attacks have forced Russia to ban petrol and jet-fuel exports despite normally being a major oil-products exporter. The supply squeeze marks a notable reversal for an energy superpower.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Russia%20considers%20fuel%20imports%20amid%20Ukraine%E2%80%99s%20strikes%20on%20refineries%20newspaper.pdf"}, {"id": "scmp-15", "title": "The Copper Crunch: Inside the US-China Battle for a Critical Global Supply Chain", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Washington's drive to rebuild domestic copper production is colliding with Chinese dominance over a metal vital to AI servers, EV batteries and modern weapons, fuelling fresh geopolitical tension. Commerce Secretary Howard Lutnick is due to deliver an updated market assessment to the White House by June 30, following Trump's executive order to secure supply. Copper has become one of the 21st century's most strategic commodities. The contest mirrors broader US-China competition in AI, energy and defence supply chains.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/The%20copper%20crunch%20inside%20the%20US-China%20battle%20for%20a%20critical%20global%20supply%20chain.pdf"}, {"id": "scmp-16", "title": "Trains Stopped Across Germany Over Technical Glitch", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Society", "Technology & AI"], "summary": "Deutsche Bahn halted all trains nationwide late Tuesday after a failure in the GSM-R digital communication system used for internal railway operations, stranding passengers across Germany. The operator said at midnight, 90 minutes after first flagging the problem, that the cause had been identified but gave no specifics or restoration timeline. The outage underscored the fragility of critical infrastructure dependent on single communication systems. It offered no estimate of how many trains or passengers were affected.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Trains%20stopped%20across%20Germany%20over%20technical%20glitch.pdf"}, {"id": "scmp-17", "title": "Trump Touts Iran Inspection Deal as Tehran Disputes Terms", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Trump insisted Iran agreed to 'highest level' nuclear inspections 'long into the future,' even as Iranian officials disputed that any decision on IAEA access had been made, exposing how much remains contested under the tentative deal. Trump said he agreed to keep the Strait of Hormuz open based on the agreement but could reinstate the naval blockade, though he called that 'highly unlikely.' The framing pits Washington's optimistic spin against Tehran's denials. The gap underscores the fragility of the emerging truce.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Trump%20touts%20Iran%20inspection%20deal%20as%20Tehran%20disputes%20terms.pdf"}, {"id": "scmp-18", "title": "US Stocks Slide, as Wall Street Gets AI Wake-Up Call", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A bruising sell-off in technology giants dragged US stocks lower as worries about frothy AI valuations sparked fresh volatility after a near three-month surge in riskier assets. The S&P 500 fell 1.4% and the Nasdaq 2.2%, while the tech-light Dow ended just 0.1% lower; losses were sharper in Asia, with South Korea's Kospi plunging from a record. The benchmark had logged 11 of its prior 12 weekly gains, largely led by tech. The reversal served as a reality check on the AI-driven bull market.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/US%20stocks%20slide%2C%20as%20Wall%20Street%20gets%20AI%20wake-up%20call.pdf"}, {"id": "scmp-19", "title": "US Targets Cuba Mining Sector in Move With Implications for China-Linked Supply Chains", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "The Trump administration expanded sanctions on Cuba, targeting state-owned mining company GeoMinera and five entities, as Washington seeks alternative critical-mineral supply chains and less reliance on rivals. Secretary of State Marco Rubio announced measures also hitting firms tied to the military-run GAESA conglomerate, which Havana slammed as 'dishonest and mendacious.' GeoMinera oversees foreign-backed ventures and Cuba's non-nickel metallic minerals. The move carries implications for China-linked supply chains operating in Cuba.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/US%20targets%20Cuba%20mining%20sector%20in%20move%20with%20implications%20for%20China-linked%20supply%20chains.pdf"}, {"id": "scmp-20", "title": "What Fuels Global Trade Imbalances: China's Overcapacity or America's Failure to Adapt?", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Peking University's Huang Yiping, a central-bank adviser, argued at the World Economic Forum in Dalian that China's overcapacity should not be singled out for global trade imbalances, since economies worldwide are struggling to adapt to structural shifts. He directed his remarks at the US, saying imbalances grow because others adjust their economic structure more slowly. Economists at the forum highlighted China's green-manufacturing capacity as potential support for the global energy transition. The comments reframe the overcapacity debate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/What%20fuels%20global%20trade%20imbalances%20China%E2%80%99s%20overcapacity%20or%20America%E2%80%99s%20failure%20to%20adapt.pdf"}, {"id": "scmp-21", "title": "Why South Korea's AI Chip Boom Is a 'Serious Concern' for Its Economy", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "South Korea's AI-driven chip boom has pushed exports, profits and stock prices to records, but Presidential Policy Office chief Kim Yong-beom warned the windfall could fuel property speculation and deepen inequality if gains stay narrowly concentrated. He noted nominal GDP growth could top double digits this year after 17.1% in Q1, the highest since 2002, yet said 'a corner of my heart feels heavy.' Economists warn construction, retail, services and small businesses will struggle to keep pace. The concern is lopsided, chip-led growth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Why%20South%20Korea%E2%80%99s%20AI%20chip%20boom%20is%20a%20%E2%80%98serious%20concern%E2%80%99%20for%20its%20economy.pdf"}, {"id": "scmp-22", "title": "Will Andy Burnham Shake Up the UK's China Policy if He Becomes Prime Minister?", "source": "SCMP", "date": "24 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Analysts told SCMP that Andy Burnham, Starmer's likely successor, would probably continue a pragmatic approach to China, with domestic economic challenges taking immediate priority. Starmer announced his intention to step down on Monday under mounting Labour pressure, clearing the way for Britain's seventh prime minister in a decade. Burnham confirmed he would run after a landslide by-election return, having been Greater Manchester mayor since 2017. Observers expect continuity rather than a reset in UK-China ties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20SCMP/Will%20Andy%20Burnham%20shake%20up%20the%20UK%E2%80%99s%20China%20policy%20if%20he%20becomes%20prime%20minister.pdf"}]}, "2026-06-25": {"date": "2026-06-25", "dayOfWeek": "Thursday", "totalArticles": 73, "sourceCounts": {"WSJ": 24, "ST": 13, "BT": 15, "SCMP": 21}, "executiveDigest": "A global AI-led tech sell-off (Nasdaq -2.2%, Kospi -10%) collides with Fed rate-hike fears under new chair Kevin Warsh, even as the US Senate joins the House to rebuke Trump over the Iran war, oil softens on a Strait of Hormuz reopening, and Singapore's year-long Economic Strategy Review urges a faster pivot to an AI-driven, fragmented world.", "briefingCards": [{"title": "Lead story - AI's reality check", "body": "A synchronised tech sell-off hit global markets: the Nasdaq fell 2.2% and the S&P 500 1.4%, with sharper pain in Asia where South Korea's Kospi plunged 10% (Samsung, SK Hynix) and memory names Sandisk and Micron dropped more than 13%. Investors are rattled by stretched valuations, doubts over whether AI capex will outstrip profits, and Fed chair Kevin Warsh signalling rates may still rise to fight war-fuelled inflation, with May CPI at a three-year high of 4.2%. Morgan Stanley's Lisa Shalett warned AI models are commoditising and turning more rate-sensitive."}, {"title": "Markets & finance", "body": "The rate shock rippled outward: the US 30-year mortgage climbed back to 6.66% as Hormuz restrictions resurfaced, keeping a four-year housing slump frozen. The ringgit sank to a seven-month low of 4.13 on hawkish-Fed repricing despite record Malaysian bond inflows, while Singapore core inflation held at 1.4%, leaving MAS expected to stay on hold in July. Hong Kong's Southbound Stock Connect flows hit a record US$152 billion on an IPO revival, and BT argued the worst is over for S-Reits - time to turn offensive rather than park the bus."}, {"title": "Asia realignment", "body": "Middle powers kept repositioning. Canada will send warships to the Indo-Pacific in two 2026 deployments and signed defence-tech pacts with Japan, hedging against a turbulent Trump relationship while recalibrating toward China. Taiwan warned that warning-time for a Chinese attack is shortening as the PLA's new carrier Fujian transited the strait during drills; North Korea's Kim Jong-un vowed to arm his navy with nuclear weapons. At Dalian's WEF, Premier Li Qiang recast China Shock 2.0 as China Opportunity 2.0 even as Beijing's trade surplus hit a record US$1.2 trillion and Germany's Merz pressed for currency talks."}, {"title": "Energy & climate", "body": "Oil kept softening: Asian refiners slowed Middle Eastern crude buying after a three-week spree as Iraq and Kuwait ramp output ahead of a possible Hormuz reopening, tipping benchmarks into bearish contango. The US is offering $17.5 billion in low-cost loans to revive nuclear power - 10 AP1000 reactors - to feed AI data-centre demand. Singapore's SIIA issued a rare red alert on severe haze risk for the second half, citing a returning El Nino and Indonesia's 50% palm-biodiesel mandate from July 1, with Hormuz-driven diesel and fertiliser costs up 20-30%."}, {"title": "Technology & AI", "body": "Even amid the rout, AI and quantum spending surged. Trump signed quantum executive orders as IBM unveiled Anderon, a roughly $2 billion quantum-chip foundry (half US-government funded), and Chicago bet its revival on a quantum park. Oracle cut 21,000 jobs (13%) to fund AI data centres; Microsoft's stock is down 22% YTD on $190 billion of capex; Intel's 18A yields still aren't margin-accretive. Alibaba slashed Qwen model prices during US working hours in a price war, while BT cautioned that pure-play AI vendors will capture under US$100 billion of a projected US$2.5 trillion 2026 AI spend - value accrues at the application layer."}, {"title": "Singapore & SEA focus", "body": "Singapore's year-long Economic Strategy Review delivered its final report, urging the Republic to adapt faster to an AI-driven, fragmented world: position as a trusted AI hub rather than a frontier-model builder, add quantum and space bets, and support workers before retrenchment. Local semiconductor firms (AEM, Ecsal, Visiontec) are scaling US operations on AI-chip demand, and SGX-listed tech proved resilient to the global sell-off on low AI exposure and supportive macro data. HDB's June BTO drew 22,634 applicants for 6,952 flats, and DBS extended a US$210 million loan under MAS's Fast-P blended-finance initiative."}], "keyMetrics": [{"value": "73", "label": "Articles curated today", "sub": "WSJ 24 · ST 13 · BT 15 · SCMP 21"}, {"value": "-2.2%", "label": "Nasdaq composite", "sub": "AI-led sell-off; Kospi -10%"}, {"value": "6.66%", "label": "US 30-year mortgage", "sub": "Warsh-era rate fears resurface"}, {"value": "50-48", "label": "US Senate Iran vote", "sub": "Both chambers move to end war"}, {"value": "US$152b", "label": "Southbound Stock Connect", "sub": "Record HK inflows on IPO revival"}, {"value": "S$37b", "label": "Singapore RIE2030 bet", "sub": "Review urges faster AI pivot"}], "articles": [{"id": "wsj-01", "title": "A Landmark Housing Bill Passed Congress. Home Builders Fear It Will Fizzle", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Politics", "Society"], "summary": "Congress passed its most ambitious housing legislation since the 1980s, the 21st Century ROAD to Housing Act, with the House voting 358-32 after the Senate's 85-5 approval; Trump is expected to sign it. The 50-plus provisions speed federal environmental reviews, ease manufactured-home rules and tie cities' federal funding to housing production, but include no new affordable-housing money. Home builders shrugged, noting Congress cannot change local zoning and building codes that actually govern development. \"This is like ordering an appetizer,\" said NRP Group's Aaron Pechota. Led by Senators Elizabeth Warren and Tim Scott, the bill responds to affordability concerns, with existing-home prices nearly five times median income. A contentious seven-year rental-sale provision was dropped.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/A%20Landmark%20Housing%20Bill%20Passed%20Congress.%20Home%20Builders%20Fear%20It%20Will%20Fizzle..pdf"}, {"id": "wsj-02", "title": "Agility, Maker of Humanlike Robots, to Go Public in $2.5 Billion SPAC Deal", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Agility Robotics, maker of the humanoid robot Digit used in warehouses and factories, will go public via merger with Michael Klein's Churchill Capital Corp. XI at a roughly $2.5 billion valuation, listing as AGLT. The deal targets over $600 million in gross proceeds, including $420 million from Churchill and a $200 million-plus PIPE led by Foxconn. Customers include Amazon, QXO, Schaeffler and Toyota; backers include Nvidia, Amazon and SoftBank. CEO Peggy Johnson, a former Microsoft and Magic Leap executive, cited pent-up investor demand and labor-gap reshoring tailwinds, and said Agility's Salem, Oregon factory could make 10,000 units annually. Competitors include Tesla, Boston Dynamics, Figure AI and Apptronik.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Agility,%20Maker%20of%20Humanlike%20Robots,%20to%20Go%20Public%20in%20$2.5%20Billion%20SPAC%20Deal.pdf"}, {"id": "wsj-03", "title": "Brief Drop in Mortgage Rates Points to Another False Start for the Housing Market", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "The U.S. mortgage market is caught between geopolitical relief and a hawkish Fed. The 30-year fixed rate dipped below 6% in late February before U.S.-Israeli strikes on Iran spiked oil and inflation, pushing rates above 6.5% in May. A ceasefire trimmed the average to 6.47%, but renewed Strait of Hormuz restrictions sent it back to 6.66% Monday. With May inflation at a three-year high of 4.2% and Fed Chairman Kevin Warsh signaling possible hikes, economists see little relief. The typical monthly payment for a median-priced home hit $2,647, a one-year high. The Mortgage Bankers Association and NAR both forecast rates averaging 6.5% in 2026, keeping the four-year sales slump frozen.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Brief%20Drop%20in%20Mortgage%20Rates%20Points%20to%20Another%20False%20Start%20for%20the%20Housing%20Market.pdf"}, {"id": "wsj-04", "title": "Can the Market Still Bet on the 'Greenspan Put'?", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets"], "summary": "James Mackintosh examines whether the \"Fed Put\"—the expectation that the central bank rescues falling markets—still holds after post-pandemic inflation. The phenomenon began with Alan Greenspan's response to the 1987 Black Monday crash, when the S&P 500 fell 20% in a day and the Fed promised liquidity and cut rates; it recurred with LTCM's 1998 rescue and the 2001 dot-com easing. Critics warn it creates moral hazard. Mackintosh argues the put is currently on hold: in 2022 the Fed kept hiking even as the S&P fell a quarter, prioritizing inflation, last below 2% in February 2021. He expects it to return only if a downturn severe enough to threaten the economy lowers inflation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Can%20the%20Market%20Still%20Bet%20on%20the%20%E2%80%98Greenspan%20Put%E2%80%99.pdf"}, {"id": "wsj-05", "title": "Chicago Missed the Tech Boom. Quantum Computing Gives It a Second Chance", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Chicago is betting on quantum computing to revive its economy via the Illinois Quantum and Microelectronics Park, built on the former U.S. Steel mill site on the South Side. Governor JB Pritzker marshaled $500 million in state funding, and companies have pledged roughly $5 billion. PsiQuantum is installing one of the world's largest quantum computers, with IBM also planning a machine and a 750-person team by 2030. The region leverages quantum expertise at the University of Chicago, Argonne and Fermilab. Trump signed executive orders Monday speeding quantum development. Backers expect about 1,000 permanent jobs initially. Risks remain: scaling and commercialization are unproven, and PsiQuantum's chief scientist says \"nobody yet has the real dream machine.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Chicago%20Missed%20the%20Tech%20Boom.%20Quantum%20Computing%20Gives%20It%20a%20Second%20Chance..pdf"}, {"id": "wsj-06", "title": "Energy Stocks Could Be a Slick Trade", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Spencer Jakab argues energy stocks are overlooked despite the Strait of Hormuz crisis. Amid a tech selloff—South Korea's Kospi fell 10% overnight and SpaceX was set to open down a third from its peak—the U.S. energy index trades below pre-conflict levels even though war kept oil and gas from customers. Analyst free-cash-flow forecasts for Exxon Mobil, Chevron and ConocoPhillips rose a combined $60 billion across this year and next, plus $18 billion for refiners Valero and Marathon. Depleted global stockpiles guarantee refill demand, and supply from stable Western Hemisphere regions should command a premium. The entire U.S. energy sector is worth half of Nvidia alone, echoing the \"HALO\" heavy-assets trade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Energy%20Stocks%20Could%20Be%20a%20Slick%20Trade.pdf"}, {"id": "wsj-07", "title": "Europeans Are Terrified of Spending Money, and It's Hurting the Economy", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "European frugality is dragging on the continent's economy. Household consumption has risen just 5.5% in the eurozone and 2% in the U.K. since 2019, versus 18% in the U.S., according to OECD data. Real disposable incomes are 8% higher than pre-pandemic, yet eurozone households saved around 15% of income last year, up from 12.5% before Covid. ING's Marieke Blom estimates returning to prepandemic saving levels would lift eurozone GDP 1.3%. Cultural thrift—in Dutch and German the word for debt also means guilt—plus inflation scarring and pension anxiety drive the caution. Europeans keep about a third of financial assets in cash. The war-driven inflation resurgence threatens to deepen the malaise.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Europeans%20Are%20Terrified%20of%20Spending%20Money,%20and%20It%E2%80%99s%20Hurting%20the%20Economy.pdf"}, {"id": "wsj-08", "title": "How a $45 Million Donation Brought Larry Ellison Deeper Into Trump's Circle", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Politics", "Technology & AI"], "summary": "Oracle's Larry Ellison gave roughly $45 million to a political nonprofit backing Trump's 2024 campaign—one of the cycle's largest single injections—plus millions more since, including for Trump's legacy initiatives. The previously unreported giving deepened a symbiotic alliance. The day after Trump's 2025 inauguration, Oracle was named architectural backbone of the $500 billion Stargate AI data-center plan, and later joined the group controlling TikTok's U.S. operations. Ellison's son David, whose Paramount Skydance won an $81 billion Warner Bros. Discovery takeover after a $16 million settlement of Trump's CBS lawsuit, installed Bari Weiss atop CBS News. Larry Ellison initially backed Senator Tim Scott for VP, recalibrating to Trump after Vance was picked.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/How%20a%20$45%20Million%20Donation%20Brought%20Larry%20Ellison%20Deeper%20Into%20Trump%E2%80%99s%20Circle.pdf"}, {"id": "wsj-09", "title": "IBM Getting Ready to Scale Quantum Computing", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI"], "summary": "IBM is moving quantum computing from science project to scalable business at its Yorktown Heights labs. It plans a new independent subsidiary, Anderon, a foundry producing silicon wafers for quantum processors, seeded by $1 billion from the Trump administration and $1 billion of IBM's own cash. Anderon will sell wafers to other firms and supply IBM's own development, targeting a market BCG projects at $90 billion-$170 billion by 2040. IBM will also spend $9 billion over five years toward Starling, a fault-tolerant machine targeted for 2029. Director of Research Jay Gambetta says superconducting qubits offer speed and scalability. The administration gets equity but no governance. CEO Arvind Krishna attended Monday's quantum executive-order signing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/IBM%20Getting%20Ready%20to%20Scale%20Quantum%20Computing.pdf"}, {"id": "wsj-10", "title": "Intel's Stock Has Soared, but It Needs an Engineering Comeback", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Intel's stock has surged over 550% in the past year to a $700 billion-plus valuation, driven by a U.S. government 10% equity stake, a $5 billion Nvidia investment, and deals with Google, Apple and Elon Musk's chip-fab project, plus Trump's cheerleading. But Asa Fitch warns the rally belies unresolved technical struggles. Intel has begun shipping chips on its cutting-edge 18A process, yet CFO David Zinsner concedes yields aren't yet accretive to gross margins. Its foundry division posted a $2.4 billion operating loss on $5.4 billion Q1 revenue. CEO Lip-Bu Tan has made progress, but Intel's record of broken promises—delayed 10nm and 7nm chips that let TSMC take the lead—makes this a momentum play dependent on execution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Intel%E2%80%99s%20Stock%20Has%20Soared,%20but%20It%20Needs%20an%20Engineering%20Comeback.pdf"}, {"id": "wsj-11", "title": "Israel's Military Is Caught in a Political No Man's Land in Lebanon", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli troops in southern Lebanon are caught between U.S. limits and domestic pressure to fight Iran-backed Hezbollah, risking the U.S.-Tehran truce. On Tuesday, Israel struck twice near the Ali al-Taher ridge, where it says Hezbollah maintains an underground fortress; last week's offensive there, which killed at least four Israeli soldiers, nearly derailed U.S.-Iran talks and drew rebukes from Trump and JD Vance. The U.S. presses Israel to withdraw and back pilot handovers to the Lebanese army, but Netanyahu insists on keeping a six-mile security zone ahead of fall elections. Hezbollah's fiber-optic drones have proven a leading killer of soldiers. A May poll showed 57% of Israelis back a permanent security zone.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Israel%E2%80%99s%20Military%20Is%20Caught%20in%20a%20Political%20No%20Man%E2%80%99s%20Land%20in%20Lebanon.pdf"}, {"id": "wsj-12", "title": "Microsoft Needs Its Own AI Strategy", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Dan Gallagher argues Microsoft is trying to carve its own AI path but it won't be cheap. The company launched its own lower-cost AI models for corporate use, and CEO Satya Nadella has criticized rivals' \"doomer\" messaging. Yet Microsoft has lost its early-mover advantage in investors' eyes: its stock has slumped more than 22% this year—worst among big techs—shedding over $1 trillion in market value since last fall. Total capital spending will hit $190 billion this calendar year, pushing adjusted free cash flow near negative territory. Microsoft struck a 20-year deal with Chevron for a gas-powered West Texas data center, but first power won't arrive until 2028. A real turn requires Azure growth re-accelerating.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Microsoft%20Needs%20Its%20Own%20AI%20Strategy.pdf"}, {"id": "wsj-13", "title": "Nonstop Trading, Loads of Leverage. How 'Perp Futures' Are Shaking Up Wall Street", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Perpetual futures—derivatives that never expire and allow heavy leverage—are landing in the U.S. and hitting incumbent exchanges. After the CFTC approved crypto perps at Kalshi and gave Coinbase access to global perpetuals, Kalshi's basket topped $8.5 billion in volume within weeks. Since the approval, CME shares fell 12%, Cboe 26%, ICE 11% and Nasdaq 9%. CME sued the CFTC, alleging \"textbook competitive injury,\" while CEO Terry Duffy warned about offshore leverage exceeding 100x. Critics cite auto-liquidation risk—Trump's Oct. 10 100% China tariff announcement erased over $19 billion in leveraged positions. Kalshi's Tarek Mansour says it offers around six times leverage, comparable with traditional futures, and that incumbents simply fear competition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Nonstop%20Trading,%20Loads%20of%20Leverage.%20How%20%E2%80%98Perp%20Futures%E2%80%99%20Are%20Shaking%20Up%20Wall%20Street..pdf"}, {"id": "wsj-14", "title": "Oracle Sheds 21,000 Jobs as It Sharpens Focus on AI", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Oracle cut around 21,000 jobs last fiscal year—roughly 13% of its workforce—as it pours money into AI and data centers, ending May with about 141,000 full-time employees versus 162,000 a year earlier. The Austin-based company reported $1.84 billion in severance and restructuring costs and warned AI adoption may drive further cuts. It expects to spend a net $70 billion this fiscal year, up from $55.7 billion, highlighting the AI boom's high cost. Oracle became an AI darling after landing deals worth hundreds of billions, including an arrangement under which OpenAI is expected to buy roughly $300 billion in computing capacity over about five years. Investors are now scrutinizing whether such spending is sustainable. Meta and Amazon have made similar cuts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Oracle%20Sheds%2021,000%20Jobs%20as%20It%20Sharpens%20Focus%20on%20AI.pdf"}, {"id": "wsj-15", "title": "Ranks of the Ultrawealthy Jumped in 2025", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "The number of ultrawealthy individuals—those with a net worth above $30 million—jumped 14.4% in 2025 to 556,850 people worldwide, the fastest pace since 2017, according to wealth-intelligence firm Altrata. Senior Director Maya Imberg credited the AI trade lifting global markets, lower inflation and resilient earnings. Centi-millionaires, worth over $100 million, were among the fastest-growing subgroups, mainly tech founders and investors. The ultrawealthy made up 0.01% of global adults but held 11% of all private wealth. The U.S. hosts 37% of the ultrawealthy—more than the rest of the top 10 combined—followed by China (about 10%) and Germany (5%). New York remained the top metro, ahead of Hong Kong, Los Angeles and San Francisco.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Ranks%20of%20the%20Ultrawealthy%20Jumped%20in%202025.pdf"}, {"id": "wsj-16", "title": "Russia Pressures Belarus in Bid to Open New Front in Ukraine War", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russia is pressuring its closest ally Belarus as a potential new front in the Ukraine war, current and former officials say. Moscow wants to use Belarusian territory to launch drone attacks, extend the front line westward, or stage operations against NATO neighbors, while threatening to withhold financial lifelines. Lukashenko said Macron warned him in a 90-minute call against deeper engagement. Belarus has sold refined oil to Russia amid Ukrainian strikes on Russian refineries, and Moscow uses Belarusian drone ground stations; about 2,000 Russian troops are stationed there. Zelensky threatened to strike those stations, used in attacks on Rivne, Zhytomyr and Volyn. Last month Russia and Belarus held joint nuclear exercises, moving warheads to Belarusian missile positions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Russia%20Pressures%20Belarus%20in%20Bid%20to%20Open%20New%20Front%20in%20Ukraine%20War.pdf"}, {"id": "wsj-17", "title": "Scott Bessent: Hamilton Inspires Trump's Economic Statecraft", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Trade", "Politics"], "summary": "In an op-ed adapted from a speech to the Economic Club of New York, Treasury Secretary Scott Bessent lays out five principles for Trump's economic statecraft, invoking Alexander Hamilton's view that a nation \"ought to endeavor to possess within itself all the essentials of national supply.\" The principles: economic security begins with national capacity in industries like semiconductors, AI, quantum computing, shipbuilding and critical minerals; American openness must be reciprocated; America must write the rules of the next economy; financial leadership and the dollar are instruments of statecraft; and statecraft must serve the American people. Bessent argues postwar trade asymmetries hardened into vulnerabilities, and that the U.S. is now a partner with \"higher standards and greater expectations.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Scott%20Bessent%20Hamilton%20Inspires%20Trump%E2%80%99s%20Economic%20Statecraft.pdf"}, {"id": "wsj-18", "title": "See How Sam Altman's Personal Investments Benefit From Ties to OpenAI", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Sam Altman owns no direct equity in OpenAI, creating an unusual situation in which his financial motives aren't tied to the company he runs—instead, much of his wealth sits in a vast network of tech ventures from nuclear fusion to a startup building a new Mediterranean city. The Journal identified dozens of his investments and analyzed how some deals affect his wealth. Public-company CEOs are typically discouraged from large outside stakes over self-dealing concerns. One of Altman's biggest is nuclear-fusion startup Helion, which he backed at Y Combinator; his efforts to partner OpenAI with Helion stirred internal controversy. OpenAI chairman Bret Taylor says Altman has been transparent and conflicts are carefully managed. Stakes in Cerebras and Retro Biosciences surfaced in the OpenAI-Musk trial.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/See%20How%20Sam%20Altman%E2%80%99s%20Personal%20Investments%20Benefit%20From%20Ties%20to%20OpenAI.pdf"}, {"id": "wsj-19", "title": "Senate Democrats Call for Hearings Into $500 Million Trump Deal With Emirati Royal", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Top Senate Democrats are demanding hearings into a secret $500 million investment in the Trump family's crypto venture, World Liberty Financial, from a group led by Sheikh Tahnoon bin Zayed al Nahyan, brother of the UAE president and head of its spy agencies. The agreement, signed by Eric Trump four days before the inauguration, sold 49% of WLF and steered at least $187 million to Trump family entities and $31 million to entities linked to envoy Steve Witkoff. Four months later, the administration granted the UAE access to coveted AI chips previously blocked under Biden. Senators Blumenthal, Warren, Peters, Durbin and Wyden signed the letter; hearings need Republican support. The White House denies any quid pro quo.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Senate%20Democrats%20Call%20for%20Hearings%20Into%20$500%20Million%20Trump%20Deal%20With%20Emirati%20Royal.pdf"}, {"id": "wsj-20", "title": "Senate Passes Resolution Directing Trump to End Hostilities With Iran", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "The Senate voted 50-48 to limit Trump's ability to conduct military operations against Iran without congressional authorization, a stinging rebuke a week after he signed a memorandum of understanding with Tehran. Four Republicans—Bill Cassidy, Susan Collins, Lisa Murkowski and Rand Paul—joined nearly all Democrats; John Fetterman voted no. The nonbinding concurrent resolution, previously passed by the House 215-208, marks the first time both chambers passed the same measure curbing Trump's war powers. Schumer called the war one of history's worst foreign-policy decisions; Trump called the vote \"poorly timed and meaningless.\" Legal scholars say the concurrent resolution isn't binding due to a 1980s Supreme Court ruling, but its sponsor Tim Kaine called it a historic, powerful vote.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Senate%20Passes%20Resolution%20Directing%20Trump%20to%20End%20Hostilities%20With%20Iran.pdf"}, {"id": "wsj-21", "title": "The Stratospheric Rally Has Left Tech Stocks Vulnerable to Sharp Reversals", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A global tech selloff intensified Tuesday, dragging the Nasdaq composite down 2.2% amid worries about higher rates, stretched valuations and whether AI spending will outstrip profits. Memory stocks Sandisk and Micron both fell more than 13%, trimming their 2026 gains to 727% and 269%; Micron reports earnings Wednesday. The Nasdaq has slid in four of the past five sessions. South Korea's Kospi fell 10%, led by Samsung and SK Hynix. The Fed last week signaled rates may still rise to fight war-fueled inflation, with Warsh stressing commitment to the 2% target. The S&P 500 slid 1.4% while the Dow slipped less than 0.1%; six of 11 sectors gained. Morgan Stanley's Lisa Shalett warned AI models are commoditizing and turning more rate-sensitive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/The%20Stratospheric%20Rally%20Has%20Left%20Tech%20Stocks%20Vulnerable%20to%20Sharp%20Reversals.pdf"}, {"id": "wsj-22", "title": "Trump Is Running Out of European Friends-Even on the Nationalist Right", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Trump is losing allies even among Europe's nationalist right, who once cast themselves as bridges to the White House at a 2025 \"Make Europe Great Again\" Madrid gathering. A public feud erupted between Trump and Italian PM Giorgia Meloni after he claimed she \"begged\" for a G-7 photo; she retorted, \"I and Italy never beg.\" Trump is deeply unpopular with European voters, underwater even among Meloni's Brothers of Italy and Farage's Reform UK supporters—37% of British voters cited Farage's Trump support as a top reason not to back Reform. Le Pen, Farage and Germany's AfD have questioned Trump's Iran war. Orban lost re-election despite a Vance visit. The Iran war's energy fallout sharpened diverging national interests.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/Trump%20Is%20Running%20Out%20of%20European%20Friends-Even%20on%20the%20Nationalist%20Right.pdf"}, {"id": "wsj-23", "title": "U.S. Bets Billions of Dollars in Low-Cost Loans Can Revive Nuclear Power", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Energy", "Politics"], "summary": "The Trump administration is offering $17.5 billion in low-interest Energy Department loans to help utilities finance equipment for Westinghouse's flagship AP1000 reactor, aiming to speed construction of 10 reactors across five two-reactor projects. Energy Secretary Chris Wright said the loans could accelerate timelines by up to three years; Westinghouse CEO Dan Sumner expects new AP1000s online from 2035. Seven utilities have signed letters of intent. The bet addresses a troubled history: Georgia's two Vogtle units ran from a planned $14 billion to over $30 billion, and a South Carolina project was abandoned in 2017 past $9 billion. Rising electricity demand from AI data centers is reviving interest; each AP1000 produces about 1,100 megawatts. China is building 11 more CAP1000 variants.", "url": "https://stcsg-my.s
