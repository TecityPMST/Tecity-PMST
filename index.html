0SCMP/Trump%20says%20Japan%20%E2%80%98doing%20very%20well%E2%80%99%20under%20his%20%E2%80%98biggest%20fan%E2%80%99%20Takaichi.pdf"}, {"id": "scmp-20", "title": "Why the US-Iran deal may fail to revive shipping through the Strait of Hormuz", "source": "SCMP", "date": "18 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Despite the US-Iran peace deal to reopen the Strait of Hormuz, major shipping firms such as Maersk are likely to hold off resuming normal operations amid concerns over security and the agreement's durability. Maersk said \"there are no changes to our operations in the Middle East\" as officials prepare to sign an MOU in Switzerland on Friday, with the strait at a near standstill since late February. The waterway previously carried about one-fifth of the world's seaborne oil and LNG; Veson Nautical's Winsome Wang said companies are unlikely to immediately downgrade it from a high-risk zone. Charter rates for very large crude carriers surged 138 per cent year-on-year, and Fitch warned uncertainty persists over implementation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/18%20Jun%202026/18%20Jun%20SCMP/Why%20the%20US-Iran%20deal%20may%20fail%20to%20revive%20shipping%20through%20the%20Strait%20of%20Hormuz.pdf"}]}, "2026-06-19": {"date": "2026-06-19", "dayOfWeek": "Friday", "totalArticles": 63, "sourceCounts": {"WSJ": 18, "ST": 14, "BT": 13, "SCMP": 18}, "executiveDigest": "Trump signs the US-Iran peace deal at Versailles, reopening Hormuz and sinking oil to pre-war levels, even as a hawkish Warsh-led Fed tilts toward hikes and Singapore reclaims the world's top competitiveness crown.", "briefingCards": [{"title": "Lead story: Trump signs US-Iran deal at Versailles, first tankers cross Hormuz", "body": "President Trump signed the interim US-Iran memorandum of understanding at the Palace of Versailles on June 17, two days earlier than expected, starting a 60-day clock toward a final settlement and committing Washington to immediately waive Iranian oil sanctions and lift its naval blockade. Three Saudi-flagged supertankers carrying six million barrels of crude crossed the Strait of Hormuz on June 18, the most departures in weeks. Yet the deal's foundations look shaky: Israel launched fresh strikes in Lebanon and Netanyahu ruled out troop withdrawal, while a US$300 billion Iran reconstruction fund became a flashpoint Trump distanced himself from. Vance called it a \"win-win\" as Trump branded critics \"fools.\""}, {"title": "Markets & finance: Warsh's hawkish Fed debut lifts the dollar, oil tumbles to pre-war levels", "body": "New Fed chair Kevin Warsh held rates at 3.5-3.75% in a unanimous vote but signaled hikes are now more likely than cuts, with nine of 19 officials penciling in an increase by year-end versus none in March. The hawkish tone, a terse 114-word statement and five new policy task forces drove the dollar to a one-year high, with futures fully pricing a hike by October. Oil sank towards pre-war levels, Brent near US$77.83 and WTI US$74.70, after the US-Iran deal. The S-REIT-relevant rate outlook turned tougher even as Asian equities staged a relief rally, with Japan's Nikkei surging past 71,000."}, {"title": "Asia realignment: middle powers maneuver as G7 opens to Asia-Pacific and Korea presses Trump", "body": "The G7 summit in Evian showcased rising Asia-Pacific and business influence, with AI chiefs attending and a \"trusted partners\" scheme for allied AI access under discussion. South Korea's Lee Jae Myung pressed Washington back toward North Korea diplomacy, drawing a signal from Trump favoring talks over force, though Pyongyang showed \"little incentive\" to engage and Kim Yo-jong warned of \"disaster\" over denuclearisation calls. A CSIS survey found Japanese and South Korean elites mostly oppose going nuclear, but support could spike if one moves first. Trump is preparing to welcome Xi in September, avoiding a Taiwan call or new arms sales."}, {"title": "Energy & climate: Hormuz reopens, IEA flags an oil glut, and tech doubles down on carbon removal", "body": "With Hormuz reopening, the IEA expects global oil demand to fall 1.1 million barrels a day this year while supply surges around 8 million next year, warning of \"a significant overhang emerging next year.\" Around 31 supertankers holding 62 million barrels are set to swamp well-supplied Asian refiners, and the IMO warned Iranian transit tolls would set a \"dangerous precedent.\" Singapore households face a significant electricity tariff rise from July, and the Iran war spurred a rooftop-solar boom across South-east Asia. A Frontier group including Anthropic committed $915 million more to carbon-removal credits, and Ukraine struck a Moscow refinery."}, {"title": "Technology & AI: chip shortage hits Apple, Anthropic's models alarm Washington, China eyes the moat", "body": "AI-driven demand for memory chips is forcing Apple to raise prices, with Tim Cook calling increases \"unavoidable\" and analysts estimating the iPhone 18 Pro could reach $1,299. Anthropic's frontier models loom large: a hacker showed its Mythos model could easily exploit Linux bugs, the US banned foreign access to two models, and Trump said restoration talks were \"going fine.\" SpaceX bankers prepared a US$20 billion bond to fund an AI buildout after absorbing xAI. A Hong Kong scholar argued China's energy and applications edge could erode the US AI \"moat\" within 10 to 20 years."}, {"title": "Singapore & SEA focus: Singapore tops two global rankings as hub status and local markets firm", "body": "Singapore reclaimed first place in the 2026 IMD World Competitiveness Ranking, displacing Switzerland on the back of improved business efficiency, and separately topped the INSEAD Global Talent Competitiveness Index for the first time as the US slid to ninth. The property market stayed hot: a Sunway MCL-CSC tie-up bid a record S$1,730 psf ppr for a River Valley site, the Orchid Hotel sold for about S$273 million, and HDB will launch nearly 8,000 BTO flats in October. MAS added crypto exchange Bybit to its investor alert list, while a survey found Singapore workers among the region's most AI-sceptical."}], "keyMetrics": [{"value": "US$77.83", "label": "Brent crude per barrel", "sub": "Down 2.2% on June 18, near pre-war levels as US-Iran deal reopens Hormuz"}, {"value": "3.5-3.75%", "label": "Fed benchmark rate held", "sub": "Warsh signals hikes likelier than cuts; 9 of 19 officials see a 2026 increase"}, {"value": "US$300b", "label": "Iran reconstruction fund", "sub": "Flashpoint in the 14-point MOU; Trump says US will not invest"}, {"value": "S$750.6m", "label": "River Valley Green top bid", "sub": "Record S$1,730 psf ppr, about 22% above the last nearby site"}, {"value": "No. 1", "label": "Singapore competitiveness", "sub": "Tops 2026 IMD ranking and INSEAD talent index, displacing Switzerland"}, {"value": "US$915m", "label": "Frontier carbon-removal pledge", "sub": "Tech group including Anthropic adds to a prior $1 billion commitment"}], "articles": [{"id": "wsj-01", "title": "Anthropic, Google, Other Tech Companies Commit $915 Million to Pull Carbon Out of the Sky", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Environment", "Technology & AI"], "summary": "A Frontier group including Stripe, Google, Salesforce and newly joined Anthropic committed $915 million to buy carbon-removal credits, on top of $1 billion previously pledged. The cash backs direct air capture, enhanced rock weathering and bio-energy with carbon capture and storage. To date 49 million credits have sold for roughly $12 billion, up from a few hundred million four years ago, per CDR.fyi. Microsoft remains the dominant buyer at about 37 million credits, leaving the market on fragile ground.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Anthropic%2C%20Google%2C%20Other%20Tech%20Companies%20Commit%20%24915%20Million%20to%20Pull%20Carbon%20Out%20of%20the%20Sky.pdf"}, {"id": "wsj-02", "title": "Apple Price Increases 'Unavoidable,' Tim Cook Says in WSJ Exclusive", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Technology & AI"], "summary": "Apple plans to raise product prices to offset surging memory and storage chip costs, CEO Tim Cook said in an exclusive interview, calling increases \"unavoidable\" and the situation \"unsustainable.\" Cook declined to specify timing or scale, though Macs and iPads could see increases before the September iPhone 18 launch. AI-driven demand for DRAM and NAND has pushed chip costs so high that passing them on would add roughly $270 to the next iPhone Pro, per TechInsights. Apple already raised the Mac Mini's starting price last month.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Apple%20Price%20Increases%20%E2%80%98Unavoidable%2C%E2%80%99%20Tim%20Cook%20Says%20in%20WSJ%20Exclusive%20-%20WSJ.pdf"}, {"id": "wsj-03", "title": "At G-7, a Subdued Trump Spells Relief for Allies", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "President Trump arrived at the G-7 summit in Evian-les-Bains far more subdued than in prior years, ceding the table to host Emmanuel Macron and praising fellow leaders. He defended his interim Iran agreement, insisting it ended the war, reopened the Strait of Hormuz and blocked Iran's nuclear weapon, citing rising stocks and falling oil. G-7 leaders called the deal a \"breakthrough\" secured under Trump's \"strong leadership.\" Private tensions persisted, with Macron caught on a hot mic speaking to Zelensky.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/At%20G-7%2C%20a%20Subdued%20Trump%20Spells%20Relief%20for%20Allies.pdf"}, {"id": "wsj-04", "title": "Europe's Biggest Banking Deal in Years Is Getting Closer", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "Italy's UniCredit is nearing a takeover of German rival Commerzbank, having amassed control of around 42% of its stock plus an economic interest in a further 13%. The all-stock offer values Commerzbank at around $50 billion, ranking as Europe's biggest banking deal since the 2008-9 crisis. CEO Andrea Orcel used derivatives to quietly build the stake despite repeated German rejections. The German government still owns 12% and opposes the deal, which faces regulatory and integration hurdles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Europe%E2%80%99s%20Biggest%20Banking%20Deal%20in%20Years%20Is%20Getting%20Closer.pdf"}, {"id": "wsj-05", "title": "Fed Holds Interest Rates Steady; Signals Rate Increase More Likely Than Cut This Year", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "At Kevin Warsh's first meeting as chairman, the Fed held its benchmark rate steady at 3.5% to 3.75% in a unanimous vote but signaled hikes are now more likely than cuts. Nine of 19 officials penciled in at least one rate increase by year-end, up from none in March, while just one foresaw a cut, down from 12. Traders saw a roughly one-in-three chance of a hike as soon as next month. Inflation reaccelerated this year, driven by the Iran energy shock and the AI demand boom.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Fed%20Holds%20Interest%20Rates%20Steady%3B%20Signals%20rate%20increase%20More%20Likely%20Than%20Cut%20This%20Year.pdf"}, {"id": "wsj-06", "title": "Five Things the Hormuz Crisis Taught Us About the Global Economy", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Reopening the Strait of Hormuz under a US-Iran peace deal would ease an energy crisis that sapped growth and fueled inflation worldwide. A surprise of the monthslong closure was that the global shock was milder than after Russia's 2022 invasion or the 1970s oil crises, as Europe and Asia held ample strategic reserves. The burden fell hardest on poorer nations like Bangladesh and Sri Lanka, which rationed fuel. The IEA estimated global oil demand fell around 5%, or roughly 5 million barrels a day, in the second quarter.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Five%20Things%20the%20Hormuz%20Crisis%20Taught%20Us%20About%20the%20Global%20Economy.pdf"}, {"id": "wsj-07", "title": "Florida Redistricting Pits Democrats Against Each Other and It's Getting Messy", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Politics", "Society"], "summary": "A Republican-led redistricting plan signed by Governor Ron DeSantis has roiled Florida Democratic politics ahead of an Aug. 18 primary. Longtime Rep. Debbie Wasserman Schultz plans to pivot into a largely Black and Caribbean 20th District, drawing objections from Black candidate Dale Holness, who warned \"we're destroying the party.\" The Congressional Black Caucus warns GOP map redraws across the South will hurt Black representation. The contest is splitting the party over establishment versus outsider candidates.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Florida%20Redistricting%20Pits%20Democrats%20Against%20Each%20Other-and%20It%E2%80%99s%20Getting%20Messy.pdf"}, {"id": "wsj-08", "title": "How Quickly Can the Strait of Hormuz Get Back Up and Running?", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Energy", "Trade"], "summary": "Oil prices fell on hopes the US-Iran deal would end one of the biggest supply disruptions in decades, but traders warn the market will stay tight for weeks or months as vessels reposition and inventories rebuild. The deal is a \"release valve, not a floodgate.\" As of Monday, Hormuz traffic remained quiet, with the Iranian navy yet to confirm the strait had opened, though GPS signals returned. About 10 ships transited daily in early June versus 100 or more before the war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/How%20Quickly%20Can%20the%20Strait%20of%20Hormuz%20Get%20Back%20Up%20and%20Running.pdf"}, {"id": "wsj-09", "title": "Oil Supply Could Far Outstrip Demand Growth if Middle East Peace Deal Holds, IEA Says", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Energy"], "summary": "The IEA expects global oil demand to fall by 1.1 million barrels a day this year, a sharp downgrade from its prior 420,000-barrel forecast, citing high prices and supply disruptions. Next year demand should rise by 2 million barrels a day while supplies surge by around 8 million, signaling \"a significant overhang emerging next year.\" Brent dropped below $80 and WTI near $76 on Wednesday, both at their lowest close since early March. The WSJ reported the deal includes sanctions waivers on Iranian oil sales.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Oil%20Supply%20Could%20Far%20Outstrip%20Demand%20Growth%20if%20Middle%20East%20Peace%20Deal%20Holds%2C%20IEA%20Says.pdf"}, {"id": "wsj-10", "title": "See Where Iran's Billions of Dollars in Frozen Assets Are Held", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Iran enters negotiations eyeing tens of billions of dollars in assets frozen abroad, mostly recent oil-sale payments stuck after Trump reinstated sanctions in 2018. Tehran says its blocked assets total at least $100 billion and prioritizes unblocking an initial $24 billion in phases. China, the biggest buyer of Iranian oil, holds an estimated $20 billion to $50 billion. The US can block payments because nearly all global oil deals transact in dollars, giving the Treasury powerful leverage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/See%20Where%20Iran%E2%80%99s%20Billions%20of%20Dollars%20in%20Frozen%20Assets%20Are%20Held.pdf"}, {"id": "wsj-11", "title": "Social Security Has a Big Problem. It's Already Here.", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Society", "Finance & Markets"], "summary": "Actuaries now peg the fourth quarter of 2032 as the date the Old-Age and Survivors Insurance Trust Fund runs dry, which would cut checks by more than a fifth. The crisis is effectively already here: payroll taxes stopped covering program costs 16 years ago, and last year the retiree-and-survivor fund's reserves shrank by $200 billion to $2.34 trillion. With the main trust fund shrinking, the federal budget now needs extra cash from Treasury investors amid rising fiscal worries. That could pressure taxes, mortgage rates and markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Social%20Security%20Has%20a%20Big%20Problem.%20It%E2%80%99s%20Already%20Here..pdf"}, {"id": "wsj-12", "title": "The Hacker Sent by Anthropic to Calm the Government's Nerves About AI Safety", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Technology & AI", "Defence"], "summary": "Anthropic researcher Nicholas Carlini, a respected hacker and self-described AI \"professional skeptic,\" demonstrated to 700 cybersecurity experts how easily Anthropic's Mythos model could find and exploit critical bugs, including in Linux and the Ghost web-publishing software. Having never previously found a bug in either, he discovered many, concluding current models \"are better vulnerability researchers than I am.\" He urged Anthropic not to release Mythos yet, triggering what insiders dubbed \"Bugmageddon.\" Trump officials have been fretting over the model's cybersecurity implications.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/The%20Hacker%20Sent%20by%20Anthropic%20to%20Calm%20the%20Government%E2%80%99s%20Nerves%20About%20AI%20Safety.pdf"}, {"id": "wsj-13", "title": "Trump Defends Iran Deal, Says He Wants to Avoid 'Economic Catastrophe'", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Trump defended his agreement to end the Iran war, saying he wanted to avoid an \"economic catastrophe\" and did not want to be compared to Herbert Hoover during the 1929 crash. He unexpectedly signed the deal Wednesday at Versailles, acknowledging the stock market's rise influenced him after earlier insisting Americans' finances mattered \"not even a little bit.\" Senior US officials read the text to reporters to counter what they called misrepresentations. The agreement, announced Sunday, was withheld from the public at Iran's request.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Trump%20Defends%20Iran%20Deal%2C%20Says%20He%20Wants%20to%20Avoid%20%E2%80%98Economic%20Catastrophe%E2%80%99.pdf"}, {"id": "wsj-14", "title": "Trump Says Anthropic Negotiations Continue as AI Leaders Huddle at G-7", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Trump said negotiations with Anthropic over restoring access to its latest AI models were \"going fine,\" nearly a week after the administration banned foreign use of two models, prompting Anthropic to shut off access for all users on Friday. After a G-7 lunch with AI executives including Dario Amodei, Sam Altman and Demis Hassabis, Trump touted US AI investment. The ban fueled concerns that unilateral US action could dictate who can use leading models and complicate global AI coordination.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/Trump%20Says%20Anthropic%20Negotiations%20Continue%20as%20AI%20Leaders%20Huddle%20at%20G-7.pdf"}, {"id": "wsj-15", "title": "U.S. Companies Stop Waiting for Supply Chains to Return to Normal", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Trade"], "summary": "US companies are building more flexible logistics networks in response to global upheaval from the Iran war and trade negotiations, with Ford's Doug Cantriel declaring \"normalcy is not coming back.\" Businesses spent $2.4 trillion on logistics last year, down 1%, with logistics costs falling to 7.8% of GDP from 8.3%, aided by a 36% drop in ocean shipping costs. Costs are rising again this year as trucking rates climb. Short-term rates from Asia to the US West Coast jumped nearly 48% month-on-month by June 12.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/U.S.%20Companies%20Stop%20Waiting%20for%20Supply%20Chains%20to%20Return%20to%20Normal.pdf"}, {"id": "wsj-16", "title": "U.S. Pending-Home Sales Rises More Than Expected in May", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "US pending-home sales rose 3.8% on the month in May to an index of 76.8, more than expected, signaling pent-up housing demand. NAR chief economist Lawrence Yun cited \"a late spring buyer rush\" despite mortgage rates not budging, with buyers accepting above-6% rates as \"the new normal.\" The Northeast led with an 8.7% gain, followed by 8.1% in the Midwest. Yun said falling oil prices will help lower mortgage rates, though declines will be modest given federal borrowing and AI investment spending.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/U.S.%20Pending-Home%20Sales%20Rises%20More%20Than%20Expected%20in%20May.pdf"}, {"id": "wsj-17", "title": "U.S. Retailers' Sales Growth Accelerated Last Month", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "US retail sales grew 0.9% in May to $763.7 billion, up from 0.4% in April and above expectations, as consumers kept spending despite elevated gasoline prices. Furniture sales rose 1% and motor vehicle sales 1.2% after April declines, signaling underlying strength. Year-over-year inflation hit a three-year high of 4.2% in May as the Iran war pushed up energy prices, with core prices up 2.9%. Some Fed officials cited robust spending as a reason for caution on inflation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/U.S.%20Retailers%E2%80%99%20Sales%20Growth%20Accelerated%20Last%20Month.pdf"}, {"id": "wsj-18", "title": "We Did the Math on Why the iPhone 18 Pro Could Cost $1,299", "source": "WSJ", "date": "19 Jun 2026", "tags": ["Technology & AI"], "summary": "A WSJ analysis estimates the global memory-chip shortage could push the base iPhone 18 Pro up by $200 or more, potentially to $1,299. AI-driven demand has created an unprecedented run on DRAM and NAND flash, with manufacturers like Samsung and Micron shifting output to enterprise components. TechInsights estimates Apple's DRAM cost could rise from about $39 to $145 per unit and flash storage from $13 to $51. Prices for these components are projected to quadruple by fall versus last year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20WSJ/We%20Did%20the%20Math%20on%20Why%20the%20iPhone%2018%20Pro%20Could%20Cost%20%241%2C299.pdf"}, {"id": "st-01", "title": "Australia Says Net Migration Down as Far-Right Popularity Surges", "source": "ST", "date": "19 Jun 2026", "tags": ["Politics", "Society"], "summary": "Australia's net overseas migration fell to 301,000 in 2025, down 9% on the year and 45% below a 2023 post-Covid peak, official data showed. Immigration Minister Tony Burke said the government is bringing migration down with a \"sensible, measured approach\" while prioritizing skilled workers. The decline comes as Pauline Hanson's far-right One Nation surged in 2026 to become the country's most popular party, riding discontent over housing and living costs. Hanson called for Australia to embrace \"monoculturalism.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Australia%20says%20net%20migration%20down%20as%20far-right%20popularity%20surges.pdf"}, {"id": "st-02", "title": "BTO Projects in Bayshore, Tengah Among Nearly 8,000 Flats to Be Launched in October", "source": "ST", "date": "19 Jun 2026", "tags": ["Southeast Asia", "Society"], "summary": "Singapore's HDB will launch 7,970 BTO flats across Bedok, Geylang, Sembawang, Tengah, Toa Payoh and Yishun in October, including two Bayshore projects near East Coast Park offering a combined 2,500 flats. Nearly half the Bayshore units, or 1,240 flats, are two-room flexi flats for seniors and singles, with the rest four- and three-room units. Analysts expect the Bayshore projects to fall under the Plus category, carrying a 10-year minimum occupation period and subsidy clawback. Strong demand is anticipated.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/BTO%20projects%20in%20Bayshore%2C%20Tengah%20among%20nearly%208%2C000%20flats%20to%20be%20launched%20in%20October.pdf"}, {"id": "st-03", "title": "Electricity Tariff to Rise Significantly From July in Singapore", "source": "ST", "date": "19 Jun 2026", "tags": ["Energy", "Southeast Asia"], "summary": "Most Singapore households face a significant rise in electricity costs from the third quarter, the EMA told The Straits Times, despite the US-Iran peace deal reopening Hormuz. Analyst estimates for the regulated tariff increase ranged up to 30%, driven by Iran war energy costs; the tariff is currently 29.72 cents per kWh. S&P Global's Amanda Kang, expecting a 20-25% rise, said this could add about $30 to the monthly bill for a four-room HDB flat, whose average bill is close to $88. The revision reflects fuel costs from April to mid-June.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Electricity%20tariff%20to%20rise%20significantly%20from%20July%20in%20S%27pore.pdf"}, {"id": "st-04", "title": "First Tankers Cross Hormuz After US, Iran Ink Interim Deal to End War", "source": "ST", "date": "19 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Three Saudi-flagged supertankers carrying six million barrels of crude sailed through the Strait of Hormuz on June 18, hours after Trump signed a deal with Iran. But Israeli forces launched fresh air strikes in Lebanon, raising doubt over Trump's pledge to halt the offensive. Trump signed the memorandum of understanding at Versailles on June 17, starting a 60-day negotiation period for a final settlement. Washington commits to immediately waiving oil sanctions, and a final deal would facilitate a US$300 billion reconstruction fund.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/First%20tankers%20cross%20Hormuz%20after%20US%2C%20Iran%20ink%20interim%20deal%20to%20end%20war.pdf"}, {"id": "st-05", "title": "How Iran Turned the Tables on Israel", "source": "ST", "date": "19 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli PM Netanyahu took more than 24 hours to comment meaningfully on the US-Iran ceasefire, a silence reflecting what columnist Jonathan Eyal calls a \"stunning defeat\" for Israel. The memorandum requires Israel to withdraw from Lebanon under any final agreement and includes the Israel-Hezbollah fighting in its ceasefire. The setback may be Israel's worst strategic blow since Oct 7, 2023, with Netanyahu's chances in the upcoming general election crumbling. He gambled heavily on the military adventure with the US and lost.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/How%20Iran%20turned%20the%20tables%20on%20Israel.pdf"}, {"id": "st-06", "title": "Inside the Text of the US-Iran Peace Plan", "source": "ST", "date": "19 Jun 2026", "tags": ["Geopolitics"], "summary": "A senior US official disclosed the full text of the US-Iran deal, dubbed the \"Islamabad Memorandum of Understanding,\" read out on a conference call under White House ground rules. Paragraph 1 declares the \"immediate and permanent termination of military operations on all fronts, including in Lebanon,\" and commits both sides to respect Lebanon's territorial integrity and sovereignty. Analysts noted the Lebanon references amount to remarkable US rejections of Israel's concerns about Hezbollah. Many issues, including Iran's nuclear programme, remain unsettled.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Inside%20the%20text%20of%20the%20US-Iran%20peace%20plan.pdf"}, {"id": "st-07", "title": "Iran's Hormuz Tolls Would Set a Dangerous Precedent, Says Global Shipping Watchdog", "source": "ST", "date": "19 Jun 2026", "tags": ["Trade", "Energy"], "summary": "IMO secretary-general Arsenio Dominguez warned that allowing Iran to charge tolls for Hormuz transit would mark a \"dangerous precedent\" that is unacceptable and not in line with international practice. Iran charged vessels during the conflict, and control over Hormuz including tolls was one of Tehran's ceasefire conditions, per state media. Maritime traffic through the strait remains largely halted, and the IMO is working to re-establish pre-war crossing mechanisms. A group of countries including Britain is working to confirm Hormuz is mine-free.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Iran%27s%20Hormuz%20tolls%20would%20set%20a%20dangerous%20precedent%2C%20says%20global%20shipping%20watchdog.pdf"}, {"id": "st-08", "title": "Israel in Talks With US Over Continuing Its Lebanon Troop Deployment, Officials Say", "source": "ST", "date": "19 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel is negotiating with the US to continue its troop deployment in southern Lebanon, two Israeli officials told Reuters, a day after the interim pact called for ensuring Lebanon's \"territorial integrity and sovereignty.\" A senior official said Israel was \"conducting stubborn negotiations\" and would not back down, including keeping troops south of the Litani River. Israel describes seized territory in Lebanon, Gaza and Syria as \"buffer zones.\" The outcome may hinge on whether Trump decides to force the issue through threats.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Israel%20in%20talks%20with%20US%20over%20continuing%20its%20Lebanon%20troop%20deployment%2C%20officials%20say.pdf"}, {"id": "st-09", "title": "Oil Prices Sink Towards Pre-War Levels as US and Iran Sign Peace Deal", "source": "ST", "date": "19 Jun 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Oil prices tumbled on June 18 after the US-Iran interim deal to reopen Hormuz, with Brent down 2.2% to US$77.83 and WTI down 2.7% to US$74.70, nearly back to pre-war levels of around US$72 and US$67. Both contracts have fallen more than 15% since talk of an agreement began. Japan's Nikkei surged past 71,000 for the first time and South Korea's Kospi rose 2.25%, while the Straits Times Index gained 0.7%. The mood was tempered by a hawkish Fed signaling a rate hike is more likely than a cut this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Oil%20prices%20sink%20towards%20pre-war%20levels%20as%20US%20and%20Iran%20sign%20peace%20deal.pdf"}, {"id": "st-10", "title": "RTS Link: What JB Can Learn From Penang and Kuching", "source": "ST", "date": "19 Jun 2026", "tags": ["Southeast Asia"], "summary": "As the Johor Bahru-Singapore RTS Link nears its 2027 launch, attention has turned to Johor Bahru's lack of efficient public transport to feed the cross-border rail link, a gap that could weigh on ridership. Singapore travelers can reach Woodlands North via MRT, but connectivity around the Bukit Chagar terminus is far less straightforward, with only about 37,000 commuters, or 2.1% of the city's 1.7 million population, using public buses daily. The article looks to Penang and Kuching for lessons in moving people without funneling more cars onto congested streets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/RTS%20Link%20What%20JB%20can%20learn%20from%20Penang%20and%20Kuching.pdf"}, {"id": "st-11", "title": "Singapore No. 1 in Global Competition for Talent", "source": "ST", "date": "19 Jun 2026", "tags": ["Southeast Asia", "Technology & AI"], "summary": "Singapore leapfrogged Switzerland to top the latest Global Talent Competitiveness Index for the first time, riding its strength in cultivating adaptable, digitally fluent and innovation-ready workforces in the AI age. The INSEAD ranking, themed \"Resilience in the Age of Disruption,\" assessed 135 economies on 77 indicators including AI talent concentration. High-income European economies anchor the top 10, but the US slid from 3rd to 9th place. Singapore's GTCI win underscores its talent-system resilience amid global disruption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Singapore%20no.%201%20in%20global%20competition%20for%20talent.pdf"}, {"id": "st-12", "title": "Trump at Versailles: The Shadow of History That Hangs Over the US-Iran Deal", "source": "ST", "date": "19 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Columnist Jonathan Eyal argues Trump may regret signing his Iran deal at Versailles, a palace associated with one of history's most catastrophic diplomatic blunders. Trump was drawn to the gold-drenched 17th-century setting and to signing while G-7 leaders gathered, making for perfect \"gold, glitz and power\" choreography. But in 1919 the victorious powers produced the Treaty of Versailles, which saddled Germany with war guilt and crushing reparations. The historical parallel casts a long shadow over the US-Iran agreement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Trump%20at%20Versailles%20The%20shadow%20of%20history%20that%20hangs%20over%20the%20US-Iran%20deal.pdf"}, {"id": "st-13", "title": "War in Iran Spurs Solar Boom in Oil-Dependent South-East Asia", "source": "ST", "date": "19 Jun 2026", "tags": ["Energy", "Southeast Asia"], "summary": "The Iran war has spurred a solar boom across South-east Asia, a region heavily reliant on oil imported via the Strait of Hormuz, as households rush to install rooftop panels. After US-Israeli strikes began the war on Feb 28, the Philippines declared a national emergency warning of rolling blackouts as oil prices skyrocketed. Residents in Marikina, Kuala Lumpur and Yogyakarta installed panels to cut bills and reduce grid dependence. The surge has benefited China, the world's largest solar panel maker, which sold 5.5 gigawatts of capacity to the region in March.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/War%20in%20Iran%20spurs%20solar%20boom%20in%20oil-dependent%20South-east%20Asia.pdf"}, {"id": "st-14", "title": "Wave of Persian Gulf Oil Set to Swamp Asian Refiners When Ships Sail Out of Strait of Hormuz", "source": "ST", "date": "19 Jun 2026", "tags": ["Energy", "Trade"], "summary": "An impending wave of oil trapped inside Hormuz is set to swamp Asia, with around 31 supertankers holding about 62 million barrels of crude stuck in the Persian Gulf, per Signal Group data. The gush could come soon after the US-Iran interim deal reopens the strait, taking about a week to reach India or three weeks to East Asia. Yet Asian refiners are already well supplied for June and July after scrambling to replace Middle Eastern flows and cutting processing rates. Iraqi output has jumped and Gulf sellers like Adnoc and Kuwait Petroleum are marketing supply.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20ST/Wave%20of%20Persian%20Gulf%20oil%20set%20to%20swamp%20Asian%20refiners%20when%20ships%20sail%20out%20of%20Strait%20of%20Hormuz.pdf"}, {"id": "bt-01", "title": "Asian Currencies Likely to Stay Under Pressure as New Fed Regime Keeps Rates Steady", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "Asian currencies will likely stay under pressure from an elevated greenback after the Fed held rates at 3.5-3.75% under new chair Kevin Warsh, with inflation above target. BlackRock's Navin Saigal said the hawkish read points to a stronger dollar and higher Asian rates, though regional central banks in Indonesia, the Philippines, Australia and Japan have raised or are expected to raise rates. Lower oil prices and the US-Iran deal should keep dollar appreciation in check, producing a \"resilient rather than relentlessly stronger\" dollar. The deal sparked a relief rally across equities and credit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Asian%20currencies%20likely%20to%20stay%20under%20pressure%20as%20new%20Fed%20regime%20keeps%20rates%20steady.pdf"}, {"id": "bt-02", "title": "China's 2.2 Trillion Yuan Pile of Bad Consumer Debt Threatens Economy", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "As many as 100 million Chinese consumers are struggling to service personal debt, with non-performing household debt soaring 21% last year to a record at least 2.2 trillion yuan (S$419 billion), per Gavekal Dragonomics. Authorities stopped releasing aggregate delinquency figures, and Zhejiang University estimates two to three trillion yuan must be disposed of annually. As much as 10.6% of China's 1.1 billion adults were behind on payments at end-2025. The overhang is undermining efforts to boost consumption, with banks extending fewer loans amid a pandemic-level retail slump.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/China%27s%202.2%20trillion%20yuan%20pile%20of%20bad%20consumer%20debt%20threatens%20economy.pdf"}, {"id": "bt-03", "title": "First Tankers Cross Strait After Iran Deal; Israeli Strikes Stir Doubt in Lebanon", "source": "BT", "date": "19 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Three Saudi-flagged supertankers carrying six million barrels of crude sailed through Hormuz on June 18, broadcasting their positions after weeks of switching off transponders, hours after Trump signed the deal with Iran. The departures from Saudi ports were the most in weeks. Saudi Arabia had mainly used its Red Sea Yanbu terminal during the closure. Three crude tankers were also loading at the UAE's Fujairah, with two heading to Europe. Trump and President Pezeshkian signed the MOU Wednesday, calling for immediate opening of Hormuz and lifting of the US blockade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/First%20tankers%20cross%20strait%20after%20Iran%20deal%20Israeli%20strikes%20stir%20doubt%20in%20Lebanon.pdf"}, {"id": "bt-04", "title": "G7 Summit Opens Door to Asia-Pacific and Businesses", "source": "BT", "date": "19 Jun 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "The G7 leaders' summit in Evian, France, from June 15-17 showed growing influence from the business community and Asia-Pacific in the club's discussions. The Business 7 (B7), now hosted by France's Medef representing over 750,000 firms, issued a 28-page communique emphasizing economic security, a sharp departure from earlier ad hoc business input. AI firm leaders including OpenAI's Sam Altman, Anthropic's Dario Amodei and Meta's Alexandr Wang attended, discussing a \"trusted partners\" scheme for allied AI access, notable given US export controls on Anthropic's Fable 5 and Mythos 5 models.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/G7%20summit%20opens%20door%20to%20Asia-Pacific%20and%20businesses.pdf"}, {"id": "bt-05", "title": "Greenback Hits One-Year High on Fed Hike Bets; Japan Warns on Yen", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "The US dollar rose to its highest in more than a year on June 18 after the Fed's hawkish hold triggered rate-hike bets, while yen weakness drew verbal warnings from Japanese officials. The Fed funds futures market is fully pricing a hike by October, with strong retail sales adding to hawkish bets. The euro fell 0.3% to US$1.146 and sterling 0.54% to US$1.322, both two-month lows, while the dollar index rose 0.36% to 100.71, its highest since May 2025. Lower oil after the US-Iran deal did little to stop the dollar's rise.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Greenback%20hits%20one-year%20high%20on%20Fed%20hike%20bets%20Japan%20warns%20on%20yen.pdf"}, {"id": "bt-06", "title": "MAS Adds One of World's Largest Crypto Exchanges to List Warning Investors", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore added Bybit, one of the world's largest crypto exchanges with more than 85 million users and daily volume surpassing US$20 billion, to its investor alert list on June 17. No reason was specified, though the list warns that named firms are not licensed in Singapore. Bybit said it does not offer services to Singapore users and is blocking local IP addresses. Co-founded in 2018 by Singapore-based Ben Zhou, the exchange is also barred in Canada, China, Hong Kong and the US, and faced Malaysian enforcement action.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/MAS%20adds%20one%20of%20world%27s%20largest%20crypto%20exchanges%20to%20list%20warning%20investors.pdf"}, {"id": "bt-07", "title": "New Fed Chief Kevin Warsh: A Hawk in Dove's Clothing?", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "New Fed chair Kevin Warsh sounded more hawkish than predecessor Jerome Powell at his June debut, emphasizing \"price stability\" despite Trump appointing him hoping for dovishness. Warsh changed the Fed's tone with a terse 114-word statement, less than half the length of Powell's last, signaling a more tight-lipped institution. The board voted unanimously to hold rates at 3.5-3.75%, citing supply shocks driving energy price increases. Half of dot-plot members now anticipate a 2026 hike, eight expect no change and one sees a cut.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/New%20Fed%20chief%20Kevin%20Warsh%20a%20hawk%20in%20dove%27s%20clothing.pdf"}, {"id": "bt-08", "title": "Orchid Hotel in Tanjong Pagar Sold for About S$273 Million", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The 272-room Orchid Hotel in Tanjong Pagar has been sold for about S$273 million to a joint venture majority-controlled by an entity linked to Leow Ban Leong of Master Contract Services, with North America-headquartered Westmont Hospitality holding the minority stake. The hotel occupies the top 18 floors at 1 Tras Link near Tanjong Pagar MRT, on a site with about 80 years of lease remaining, with a 5,000 sq ft strata office unit included. Knight Frank brokered the private treaty deal, expected to complete in the third quarter, with rebranding anticipated.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Orchid%20Hotel%20in%20Tanjong%20Pagar%20sold%20for%20about%20S273%20million.pdf"}, {"id": "bt-09", "title": "Singapore Firms Expected to Show Net-Zero Progress Under Revised Standards, Instead of Just Set Targets", "source": "BT", "date": "19 Jun 2026", "tags": ["Environment", "Southeast Asia"], "summary": "A major overhaul of the Science Based Targets initiative (SBTi) net-zero framework will pressure Singapore companies to demonstrate tangible progress rather than just set ambitious targets. Firms will increasingly be judged on implementation, governance and real-world decarbonisation, with PwC's Fang Eu-Lin noting \"a stronger push to translate targets into actionable transition plans.\" Companies will be assessed on a \"best-effort\" basis to account for constraints, which raises greenwashing concerns. Singapore corporates said they are studying the changes and will adjust their strategies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Singapore%20firms%20expected%20to%20show%20net-zero%20progress%20under%20revised%20standards%2C%20instead%20of%20just%20set%20targets.pdf"}, {"id": "bt-10", "title": "Singapore Reclaims Top Spot in IMD World Competitiveness Ranking as Business Efficiency Improves", "source": "BT", "date": "19 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore returned to first place in the 2026 IMD World Competitiveness Ranking, rebounding from second in 2025 and displacing Switzerland atop the index of 70 economies. The gain was driven by a seven-place jump to top globally in business efficiency, though it slipped two places to third in economic performance. IMD said competitiveness is \"no longer primarily a contest of cost, scale or even of innovation, but one of institutional credibility.\" OCBC's Selena Ling said geo-economic fragmentation plays to Singapore's neutral, pro-business, safe-haven strengths.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Singapore%20reclaims%20top%20spot%20in%20IMD%20world%20competitiveness%20ranking%20as%20business%20efficiency%20improves.pdf"}, {"id": "bt-11", "title": "Sunway MCL, CSC Make Bold Bet on River Valley Site With S$1,730 psf ppr Bid at S$750.6 Million", "source": "BT", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A tie-up between Sunway MCL and CSC Land Group topped four bidders with a S$750.6 million offer for the third River Valley Green site, at S$1,730 per square foot per plot ratio, above analyst expectations and about 22% higher than the last nearby site sold in 2025, marking a new area high. They pipped a China Overseas Land & Investment unit by just 4%. Huttons CEO Mark Yip said future CCR home selling prices in 2027 are likely to be calibrated upwards and test the S$3,600 psf level. The tight bid spread suggests market consensus on valuation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Sunway%20MCL%2C%20CSC%20make%20bold%20bet%20on%20River%20Valley%20site%20with%20S1%2C730%20psf%20ppr%20bid%20at%20S750.6%20million.pdf"}, {"id": "bt-12", "title": "Vietnam Workers Keenest on AI in South-East Asia; Singapore Employees Among Most Sceptical: Survey", "source": "BT", "date": "19 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "An ADP survey of more than 39,000 working adults found Vietnam workers among the world's most frequent AI users and the most optimistic in South-east Asia, while Singapore employees were the most sceptical about AI's productivity impact and most wary about job security. Just 15% of Singapore workers strongly agreed AI would positively affect their job responsibilities, the lowest among five regional markets, versus 29% in Vietnam. ADP's Jessica Zhang said mature markets like Singapore \"want to see proof that productivity is improving before confidence levels rise.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/Vietnam%20workers%20keenest%20on%20AI%20in%20South-east%20Asia%20Singapore%20employees%20among%20most%20sceptical%20survey.pdf"}, {"id": "bt-13", "title": "What Singapore Can Learn From Chengdu About Revitalising Retail", "source": "BT", "date": "19 Jun 2026", "tags": ["Southeast Asia", "Society"], "summary": "A columnist reflecting on a Chengdu learning programme argues Singapore retail must rethink its approach as Orchard Road's shine dulls. Where Singapore asks \"what tenants should we bring in?\", Chengdu's better operators begin with \"why would people want to be here?\" At Dongjiao Memory, a converted factory hub combining art, culture and retail, people wandered, took photos and lingered, drawing around 18 million visitors and over 3,000 events in 2025. After Chengdu Media Group took over in 2021, rentals rose from about 100 yuan per square metre to more than 400.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20BT/What%20Singapore%20can%20learn%20from%20Chengdu%20about%20revitalising%20retail.pdf"}, {"id": "scmp-01", "title": "Can Lee Jae Myung's G7 Balancing Act Bridge North Korea Divide?", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "South Korean President Lee Jae Myung used his first major diplomatic outing to the G7 to press Washington back towards diplomacy with North Korea, drawing what observers called a signal from Trump favoring talks over force. Lee said he held \"in-depth\" discussions with Trump on Korean peninsula peace during a 90-minute dinner, and Trump reportedly gifted him a signature pen. Analysts warned the push faced a hard reality, as Pyongyang has shown \"little incentive\" to pursue dialogue amid deepening alignment with Moscow and Beijing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Can%20Lee%20Jae%20Myung%E2%80%99s%20G7%20balancing%20act%20bridge%20North%20Korea%20divide.pdf"}, {"id": "scmp-02", "title": "Can the US-Iran Deal Survive a Defiant Israel and Hormuz Uncertainties?", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Analysts warn the US-Iran memorandum, signed electronically by Trump and Pezeshkian at Versailles, is built on ground too shaky to guarantee lasting peace. Pakistani PM Shehbaz Sharif, a key mediator, said the \"Islamabad MOU\" took immediate effect, with Iran instantly reopening Hormuz as the US lifts its naval blockade. Niu Xinchun of Ningxia University said the 14-point deal shows Washington made far greater concessions because it is \"more desperate to disentangle itself from the war.\" Any final agreement would require lifting all UN and unilateral sanctions on Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Can%20the%20US-Iran%20deal%20survive%20a%20defiant%20Israel%20and%20Hormuz%20uncertainties.pdf"}, {"id": "scmp-03", "title": "China Tests Future of Shipping on Its Next Major Trade Corridor: A US$10 Billion Canal", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Trade", "Technology & AI"], "summary": "China is trialing autonomous navigation and smart shipping on the roughly US$10 billion Pinglu Canal, which will link landlocked southwestern Guangxi to South-east Asia via the Gulf of Tonkin to spur trade and connectivity. Intelligent LNG-powered barges have been tested since Wednesday, sending real-time navigation and hydrographic data between ships and carrying out automated mooring. The canal's main lock, 300 metres long, could accommodate six such ships simultaneously. More vessels are expected by August as the megaproject nears commissioning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/China%20tests%20future%20of%20shipping%20on%20its%20next%20major%20trade%20corridor%20a%20US%2410%20billion%20canal.pdf"}, {"id": "scmp-04", "title": "China's Policy Blitz at Lujiazui Forum - What It Means for Markets, Outflows and the Yuan", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Chinese regulators unveiled measures at the Lujiazui Forum to broaden outbound-investment channels and facilitate cross-border capital flows, reflecting a push for \"rules-based capital account opening\" and yuan internationalisation amid the currency's appreciation. The initiatives boost offshore trading of yuan-denominated products and expand existing investment schemes, while channelling flows through compliant pathways to help authorities monitor outflows. Analyst Dai Lu said the pilot equips the PBOC with \"a new lever to influence the offshore market.\" PBOC governor Pan Gongsheng announced Shanghai Free Trade Zone steps.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/China%E2%80%99s%20policy%20blitz%20at%20Lujiazui%20Forum%20%E2%80%93%20what%20it%20means%20for%20markets%2C%20outflows%20and%20the%20yuan.pdf"}, {"id": "scmp-05", "title": "Exclusive: No Call With Taiwan, No New Arms Sales - How Trump Is Preparing to Welcome Xi", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Trump is not expected to phone Taiwanese leader Lai Ching-te any time soon, despite earlier saying he was open to it, as three sources said a call could derail an expected September summit with Xi Jinping in Washington and the May detente. No new US arms-sale announcements for Taiwan are likely in the near term, though some packages may follow afterward. Beijing previously protested a 2016 Trump-Tsai call as a \"small trick.\" Taiwanese Foreign Minister Lin Chia-lung said Taipei is \"ready to have a call at any time.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/ExclusiveNo%20call%20with%20Taiwan%2C%20no%20new%20arms%20sales%20how%20Trump%20is%20preparing%20to%20welcome%20Xi.pdf"}, {"id": "scmp-06", "title": "Hegseth Blasts Nato for Not Giving US Access to European Bases During Iran War", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "US Defence Secretary Pete Hegseth lashed out at Nato allies, announcing a six-month Pentagon review of US forces in Europe whose outcome depends on how fast Europeans take responsibility for their own security. He called allies' failure to provide base access to attack Iran \"shameful,\" saying it put \"America's sons and daughters\" at risk. Hegseth said US dues, roughly US$790 million in 2026, would be \"contingent\" on allies meeting spending targets. He also railed against European migration and gender equality policies, echoing earlier remarks by Vice-President Vance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Hegseth%20blasts%20Nato%20for%20not%20giving%20US%20access%20to%20European%20bases%20during%20Iran%20war.pdf"}, {"id": "scmp-07", "title": "Hong Kong Sets August Debut for Long-Awaited Offshore Yuan Bond Futures", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong will launch trading of Chinese treasury futures on five-year government bonds on August 3, the SFC and HKEX said, a long-anticipated move to strengthen the city's status as a global offshore yuan hub and internationalise the currency. The derivative broadens yuan-denominated products for overseas investors as Hong Kong contends with stock outflows tied to limited AI supply-chain exposure. HKEX chairman Carlson Tong called it \"an important milestone\" for the city's fixed-income and currencies ecosystem. The launch follows the Lujiazui Forum and remains subject to SFC approval.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Hong%20Kong%20sets%20August%20debut%20for%20long-awaited%20offshore%20yuan%20bond%20futures.pdf"}, {"id": "scmp-08", "title": "Japan, South Korea Not for Nuclear Weapons - Until One of Them Changes Policy, That Is", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "A CSIS survey of strategic elites found 75% of South Korean and nearly 80% of Japanese respondents opposed or were uncertain about their countries acquiring nuclear weapons. However, should one country take the lead, support in the other could rise rapidly, with an impact potentially exceeding that of reduced US troop deployments, affecting northeast Asian nuclear stability. The survey, led by Victor Cha and Kristi Govella, contrasts with public polls: a 2024 Gallup poll showed over 72% of the South Korean public supported possessing nuclear weapons.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Japan%2C%20South%20Korea%20not%20for%20nuclear%20weapons%20until%20one%20of%20them%20changes%20policy%20that%20is.pdf"}, {"id": "scmp-09", "title": "Netanyahu Rules Out Israeli Troop Withdrawal From Southern Lebanon", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli PM Netanyahu on Thursday ruled out withdrawing troops from southern Lebanon for the foreseeable future, describing the \"security zone\" as a barrier between Hezbollah and northern Israeli communities. Lebanon's government considers the area illegally occupied territory. The US-Iran framework calls for a comprehensive end to regional conflicts but contains no explicit provision requiring Israeli withdrawal from southern Lebanon. Separately, Trump envoy Steve Witkoff told lawmakers Iran will invite UN nuclear inspectors and begin uncovering enriched-material locations, with no side deals in the MOU.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Netanyahu%20rules%20out%20Israeli%20troop%20withdrawal%20from%20southern%20Lebanon.pdf"}, {"id": "scmp-10", "title": "North Korea Warns of 'Disaster' if G7 Tries to Strip Its Nuclear Weapons", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "North Korea's Kim Yo-jong condemned a G7 call for denuclearisation as a violation of its constitution and an infringement of sovereignty, state media KCNA said. She called denuclearisation an \"irreversibly finalised agenda\" that could never be realised, describing nuclear possession as the country's core interest and a \"line of no retreat.\" Anyone trying to hurt those interests would be making \"the worst option of inviting disaster.\" The G7 had expressed \"deep concern\" over North Korea's nuclear and ballistic missile programmes and reaffirmed commitment to complete denuclearisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/North%20Korea%20warns%20of%20%E2%80%98disaster%E2%80%99%20if%20G7%20tries%20to%20strip%20its%20nuclear%20weapons.pdf"}, {"id": "scmp-11", "title": "SpaceX Bankers Prepare for Potential US$20 Billion Bond Offering, Sources Say", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX's bankers are preparing to meet investors as early as next week to discuss a bond offering of at least US$20 billion, sources said, as Elon Musk's newly public company seeks funding for a capital-intensive AI expansion requiring tens of billions for data centres, computing hardware and power. It would be the first time the rockets-to-AI company has issued investment-grade dollar bonds, refinancing a US$20 billion bridging loan taken after acquiring xAI in February. SpaceX's valuation surged past US$2 trillion following its blockbuster Nasdaq debut last week; shares were down 6% on Thursday.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/SpaceX%20bankers%20prepare%20for%20potential%20US%2420%20billion%20bond%20offering%2C%20sources%20say.pdf"}, {"id": "scmp-12", "title": "US AI Dominance Vulnerable to China Amid Long-Term 'Structural Challenges', Scholar Says", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "University of Hong Kong scholar Li Cheng argues China's advantages in energy and industrial applications could erode America's AI \"moat\" within 10 to 20 years, even as the US holds the crown for cutting-edge chips. Using Jensen Huang's \"five-layer cake\" framework, the paper benchmarked the superpowers across energy, chips, infrastructure, models and applications, finding the US dominant in advanced chips and infrastructure but China leading in energy and applications. The gap in AI models was narrowing to \"a manageable range,\" aided by China's embrace of cost-efficient open-source models.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/US%20AI%20dominance%20vulnerable%20to%20China%20amid%20long-term%20%E2%80%98structural%20challenges%E2%80%99%2C%20scholar%20says.pdf"}, {"id": "scmp-13", "title": "US and Iran Have Good Reasons to Stay the Course for Peace", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "An SCMP editorial argues the US and Iran have good reasons to sustain their peace deal, which extends their ceasefire by 60 days or more, with Iran reopening Hormuz to energy cargoes and the US lifting its naval blockade. Chinese Foreign Minister Wang Yi said there must be \"no turning back on the path of negotiation.\" Thousands have been killed, including in Lebanon. Thorny issues remain, including Iran's nuclear programme; per the outline, Iran affirms it will not develop nuclear weapons and the US will not impose new sanctions, with both sides resolving enriched-material stockpiles via an agreed mechanism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/US%20and%20Iran%20have%20good%20reasons%20to%20stay%20the%20course%20for%20peace.pdf"}, {"id": "scmp-14", "title": "US Trade Official Takes Aim at Beijing, Faults Washington on Industry", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "US under secretary of commerce William Kimmitt took a veiled swipe at China for unfair trade practices while faulting US leaders for allowing industrial decline. He said China \"subsidised, they dumped, they erected regulatory barriers\" to capture American market share, but added Washington \"too often stood by and watched as American factories closed.\" Touting Trump's \"America first\" trade policy of tariffs and supply-chain decoupling, he said America needs \"factories, furnaces and smelters\" and the capacity to manufacture for its economy and national defence. He spoke at the Hudson Institute.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/US%20trade%20official%20takes%20aim%20at%20Beijing%2C%20faults%20Washington%20on%20industry.pdf"}, {"id": "scmp-15", "title": "Ukraine Hits Moscow Oil Refinery in Major Drone Attack on Russian Capital", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Ukraine struck a major Moscow oil refinery for the second time in a week and disrupted flights at Moscow airports in one of its biggest drone attacks since Russia's invasion four years ago, Russian officials said. Ukraine has repeatedly targeted Russian oil facilities to cut Moscow's war revenue, with some areas reporting fuel shortages. The attack came hours after Zelensky said he held \"an important coordination call\" with Trump and Macron. Zelensky urged European allies to speed up purchases of US weaponry, especially Patriot air defence missiles, calling the strike a \"fully justified response.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Ukraine%20hits%20Moscow%20oil%20refinery%20in%20major%20drone%20attack%20on%20Russian%20capital.pdf"}, {"id": "scmp-16", "title": "Vance Calls Iran Deal a 'Win-Win' as Trump Lashes Out at 'Fools' Who Oppose It", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Vice-President J.D. Vance defended the \"win-win\" US-Iran agreement, claiming \"we have all the cards\" and that Iran will not receive money or sanctions relief unless it meets its obligations. Trump punched back at critics of the memorandum, calling those who see problems \"fools\" who are \"jealous, bad people, or stupid.\" The nearly four-month war, started by Trump and Netanyahu in late February, has seen Trump's poll numbers sag, gas prices soar and inflation mount before the November midterms. Iran sold the deal as a \"message from powerful Iran\" that survived the onslaught.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Vance%20calls%20Iran%20deal%20a%20%E2%80%98win-win%E2%80%99%20as%20Trump%20lashes%20out%20at%20%E2%80%98fools%E2%80%99%20who%20oppose%20it.pdf"}, {"id": "scmp-17", "title": "Warsh's US Fed Debuts With 'Hawkish' Inflation Message and Policy Shift: Chinese Analysts", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Kevin Warsh's first policy meeting as Fed chair carried a noticeably more hawkish inflation message despite the widely expected hold, Chinese analysts said. Warsh scaled back the Fed's reliance on forward guidance and announced five task forces to review its policy framework and communications, moves analysts said marked the start of a new era. The Fed held its benchmark at 3.5-3.75% in a unanimous 12-0 vote, citing supply shocks driving energy price increases, and pledged \"the Committee will deliver price stability.\" Yuekai Securities called the institutional adjustment a watershed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Warsh%E2%80%99s%20US%20Fed%20debuts%20with%20%E2%80%98hawkish%E2%80%99%20inflation%20message%20and%20policy%20shift%20Chinese%20analysts.pdf"}, {"id": "scmp-18", "title": "Who Pays for Iran's Recovery? US$300 Billion Fund Emerges as Flashpoint in Ceasefire Deal", "source": "SCMP", "date": "19 Jun 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "A US$300 billion reconstruction fund for Iran, outlined in the 14-point US-Iran memorandum, has emerged as a flashpoint, raising questions over who will bear the cost. The agreement commits Washington to work with regional partners on Iran's recovery but offers no detail on contributions. Trump moved to distance the US, saying it would not invest in the fund and dismissing claims it pressured Gulf states, appearing to contradict Vance's reference to a \"Gulf coast coalition.\" Analysts said the ambiguity fuels concern Gulf countries may finance a recovery for a conflict in which they had limited say.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/19%20Jun%202026/19%20Jun%20SCMP/Who%20pays%20for%20Iran%E2%80%99s%20recovery%20US%24300%20billion%20fund%20emerges%20as%20flashpoint%20in%20ceasefire%20deal.pdf"}]}, "2026-06-22": {"date": "2026-06-22", "dayOfWeek": "Monday", "totalArticles": 55, "sourceCounts": {"WSJ": 18, "ST": 8, "BT": 8, "SCMP": 21}, "executiveDigest": "The US-Iran Swiss summit swung from a Trump-threat walkout to a Monday breakthrough — blockade lifted, frozen assets released and a Lebanon 'deconfliction cell' created — even as a one-year-high dollar and stalled global rate cuts signalled that the war's inflation legacy will outlast its fragile ceasefire.", "briefingCards": [{"title": "Lead story — US-Iran Swiss talks: walkout to breakthrough", "body": "At Lake Lucerne, the first talks under the interim MOU nearly collapsed as Iran's delegation walked out over Trump's threat to hit it 'harder' unless it reined in Hezbollah, while Tehran said it had again closed Hormuz. By Monday, FM Araghchi reported a breakthrough: the blockade lifted, oil and petrochemical export waivers, some frozen assets released and a reconstruction plan, with a Qatar-Pakistan 'deconfliction cell' to monitor Lebanon as the 'first real test.' Working groups on nuclear, sanctions and dispute resolution aim for a final deal within 60 days, while the US separately works with Qatar to free $6 billion of an estimated $100 billion in frozen Iranian cash. WSJ flagged 'odds of failure higher than success'; SCMP cast China as quietly altering great-power conduct through restraint."}, {"title": "Markets & finance — Dollar at one-year high as rate cuts stall", "body": "The DXY hit 101.13, its highest since May 2025, as nine of 19 Fed officials penciled in at least one hike by year-end and markets priced ~90% odds of a September move — Kevin Warsh's first meeting as Chair stressing price stability. Singapore's STI hit a 52-week high of 5,212.84 and Brent fell below $80 for the first time in three months, but BT warns the fragile MOU won't restart the rate-cut cycle: the ECB made its first hike since 2023, with Australia, Norway and Japan also tightening. WSJ cautions that the S&P 500's 20%-plus earnings growth is flattered by deferred AI-capex depreciation — 'a golden window where everybody looks good.'"}, {"title": "Asia realignment — Pakistan rises; Canada and Korea jostle", "body": "Pakistan emerged from the Iran war with its biggest diplomatic boost in decades, PM Sharif's signature on the 'Islamabad MOU' as mediator cementing ties with Washington, the Gulf and Beijing while pushing India aside. Canada fielded its largest Rimpac contingent in years — commanding the air component, with South Korea taking the maritime lead — to rebut Trump's 'freeriding' charge, even as Seoul battles Germany's TKMS for Canada's $39 billion submarine deal. SCMP framed the moment as America dismantling its institutional hegemony while China builds influence through partnerships, not alliances."}, {"title": "Energy & climate — Hormuz reopens slowly; storage boom; super El Nino", "body": "Hormuz is reopening but only around 6-10 tankers a day transit versus 100-plus prewar, with full recovery four to six months off; three India-linked supertankers re-emerged via a Tehran-approved route. Saudi Aramco weighs expanding global storage as energy security becomes the priority, driving a surge in orders for Chinese storage firms (CATL booked 5.4 GWh in two weeks) and 150% projected growth in China's grid batteries. Meanwhile a 'super' El Nino is forming, with ocean heat 2.5C above normal, threatening Asian rice, coffee and palm-oil harvests."}, {"title": "Technology & AI — Chip rivalries, robotics IPOs, a model chasing Claude", "body": "Google is using Nvidia's playbook — a $3.2 billion guarantee for the Anthropic-supplied Lake Mariner cluster and a $5 billion Blackstone cloud venture — to challenge Nvidia in AI chips, even as Huang dismisses the TPU's reach. Asian markets are in an AI-fuelled retail mania, Apple supplier Lingyi seeks a $1.1 billion Hong Kong IPO for humanoid robotics, and Jane Street steps out as an AI investor. Zhipu AI's cap topped HK$1 trillion after GLM-5.2 ranked second globally on Code Arena, behind only Anthropic's Claude Fable 5 — with Musk predicting a Chinese match by Q1."}, {"title": "Singapore & SEA focus — Wealth, bullion and the space economy", "body": "Singapore's financial hub deepens: Great Eastern pivots toward high-net-worth clients via OCBC and Bank of Singapore; Nasdaq-listed StoneX's bullion arm eyes Singapore vaulting as DPM Gan Kim Yong promises OTC gold clearing and central-bank vaulting by year-end; and digital-asset custody matures under MAS's stablecoin regime. OCBC's AI rollout cut call volumes to a fifth and saves staff around 20 hours a month. Singapore investors are backing SpaceX (now ~$2.4 trillion) as a long-term space-economy bet, while BT warns the old standardize-and-scale playbook for global brands no longer works in a fragmented Asia."}], "keyMetrics": [{"value": "101.13", "label": "Dollar index (DXY)", "sub": "One-year high; ~90% odds of a Sept Fed hike"}, {"value": "<$80", "label": "Brent crude", "sub": "Below $80 first time in 3 months; ~$118 March peak"}, {"value": "5,212.84", "label": "STI 52-week high", "sub": "Up 3%+ on the week before easing"}, {"value": "60 days", "label": "US-Iran final-deal window", "sub": "Blockade lifted; Lebanon deconfliction cell"}, {"value": "HK$1tn", "label": "Zhipu AI market cap", "sub": "GLM-5.2 #2 on Code Arena, behind Claude Fable 5"}, {"value": "2.5°C", "label": "Pacific ocean heat", "sub": "'Super' El Nino threatens Asian harvests"}], "articles": [{"id": "wsj-01", "title": "AI Warfare Is at the Point of No Return. What Now?", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Technology & AI", "Defence"], "summary": "AI is swinging from a supporting intelligence role to acting as an agent of death, with Ukraine's drone makers, Israel and the Pentagon weaving algorithms into targeting and military networks. President Trump issued an executive order on AI in national security calling for aggressive use within applicable laws and directing the Pentagon to update three-year-old AI rules, even as the administration escalated a fight with Anthropic over who limits AI in combat. Retired Lt Gen Jack Shanahan and Eric Schmidt warn that armed forces are improvising the rules as an automation arms race accelerates. Experts say only the atomic bomb sparked a comparable civilizational dilemma.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/AI%20Warfare%20Is%20at%20the%20Point%20of%20No%20Return.%20What%20Now.pdf"}, {"id": "wsj-02", "title": "America's Economic Anxiety Is Rising Up the Income Ladder", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Society", "Politics"], "summary": "A new WSJ poll of 2,000 Americans finds economic anxiety climbing into the wealthiest classes: more than 40% of self-described upper or upper-middle class say they haven't saved enough to retire comfortably. Some 86% lack confidence their children's lives will be better than theirs, up sharply from 64% in a 2019 survey. And 65% of the most affluent say the political and economic system is 'stacked against people like me,' versus 29% who saw a rigged system in 2017. Pessimism among the wealthy stood out for worsening despite an economy that has favored them.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/America%E2%80%99s%20Economic%20Anxiety%20Is%20Rising%20Up%20the%20Income%20Ladder.pdf"}, {"id": "wsj-03", "title": "Charles Schwab Breaks Into the Prediction Market Business", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets"], "summary": "Charles Schwab is wading into prediction markets, working with Cboe to roll out all-or-nothing binary options letting customers wager yes-or-no on S&P 500 performance within months, plus a 'plus zone' feature for partial payouts. It follows Robinhood and Interactive Brokers; CEO Rick Wurster, who in December called prediction markets 'not high on our list,' now concedes competitive necessity. Unlike Kalshi or Polymarket, the contracts are options rather than futures but function similarly. Schwab plans to stick to verifiable financial outcomes, not World Cup or Oscars bets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Charles%20Schwab%20Breaks%20Into%20the%20Prediction%20Market%20Business.pdf"}, {"id": "wsj-04", "title": "Crazy Rich Returns Lure Cabbies and Even Kids to Red-Hot Asian Markets", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A retail-investing mania has gripped South Korea, Taiwan and Japan as the AI boom enriches their chip exporters, with Korea the world's top market over 18 months, Taiwan doubled and Japan's Nikkei up more than 80% (triple the S&P). Samsung memory-chip workers expect bonuses averaging around $400,000, and the four US hyperscalers plan up to $670 billion in AI capex this year. Global exports of AI-enabling goods hit nearly $4 trillion last year, with Asia accounting for two-thirds. Asia's hardware suppliers look set to prosper whether or not AI services ultimately monetize.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Crazy%20Rich%20Returns%20Lure%20Cabbies%20and%20Even%20Kids%20to%20Red-Hot%20Asian%20Markets.pdf"}, {"id": "wsj-05", "title": "Dollar Rises to One-Year High on Increased Prospects of Higher U.S. Interest Rates", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Finance & Markets"], "summary": "The dollar rose to a one-year high, with the DXY reaching 101.127, its strongest since May 2025, on growing expectations the Fed could raise rates in coming months. The Fed held at 3.5%-3.75% but nine of 19 officials penciled in at least one hike by year-end, up from none in March, and markets implied a 90% chance of a 25bp September move. New Chair Kevin Warsh emphasized price stability and a 2% inflation target. The euro fell to a three-month low of $1.1416; ING was skeptical the dollar's gains would last.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/22%20Jun%202026/22%20Jun%20WSJ/Dollar%20Rises%20to%20One-Year%20High%20on%20Increased%20Prospects%20of%20Higher%20U.S.%20Interest%20Rates.pdf"}, {"id": "wsj-06", "title": "Google Is Using Nvidia's Playbook to Build a Rival AI Chip Business", "source": "WSJ", "date": "22 Jun 2026", "tags": ["Technology & AI"], "summary": "Google is making an aggressive bid for the AI-chip market, providing a $3.2 billion financ
