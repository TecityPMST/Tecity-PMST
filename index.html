ijing was abruptly postponed, along with a meeting involving EU official Olof Skoog, as bilateral ties deteriorate. The cancellations precede a crucial week of EU meetings: foreign ministers debate China in Luxembourg on Monday and leaders in Brussels next Thursday and Friday, with the Commission pushing safeguards, a \"diversification instrument\" and curbs on Chinese firms. German Chancellor Friedrich Merz backed a more robust approach, vowing to \"defend our interests and our industry\". EU sources said the move was not believed to be retaliatory, though Beijing had called for more dialogue.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Have%20trade%20tensions%20scuppered%20EU-China%20talks%20ahead%20of%20tough%20Brussels%20decisions.pdf"},{"id":"scmp-12","title":"How major LNG deal with Japan signals Malaysia as rising Asean 'middle power'","source":"SCMP","date":"12 Jun 2026","tags":["Energy","Southeast Asia","Geopolitics"],"summary":"Under a 20-year deal signed during PM Anwar Ibrahim's Tokyo visit Wednesday, Malaysia's Petronas will supply Japanese utility JERA with 2 million tonnes of LNG annually from 2028. Japan already imports 15 per cent of its LNG from Malaysia, its second-largest supplier behind Australia, as it manages Strait of Hormuz exposure. Analysts including ISIS Malaysia's Shahriman Lockman said the deal casts Malaysia as a reliable energy partner and rising \"middle power\" amid the Iran war. Four memorandums on maritime security, environment, waste and medical devices were also signed alongside the Takaichi-Anwar meeting.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/How%20major%20LNG%20deal%20with%20Japan%20signals%20Malaysia%20as%20rising%20Asean%20%E2%80%98middle%20power%E2%80%99.pdf"},{"id":"scmp-13","title":"How Nvidia's South Korean AI deals could fuel 'the next industrial revolution'","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"During Jensen Huang's three-day Seoul trip ending Sunday, Nvidia struck deals with SK Telecom to build a gigawatt-scale AI cloud and factory by 2027, plus agreements with Naver, LG, Hyundai, SK Hynix and Doosan on AI factories and physical AI. SK Hynix will co-develop next-generation high-bandwidth memory, with Huang saying \"AI factories are the engines of the next industrial revolution\". Hyundai plans to invest 9 trillion won (US$5.9 billion) in a Saemangeum \"AI valley\". Sogang University's Hur Jung warned many deals are non-binding MOUs that risk \"painting a rosy picture\" amid a semiconductor stock boom.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/How%20Nvidia%E2%80%99s%20South%20Korean%20AI%20deals%20could%20fuel%20%E2%80%98the%20next%20industrial%20revolution%E2%80%99.pdf"},{"id":"scmp-14","title":"Iran's 'unity of theatres' strategy exposes US-Israel rift","source":"SCMP","date":"12 Jun 2026","tags":["Geopolitics","Defence","Energy"],"summary":"After Israel bombed a Hezbollah command centre in Beirut's Dahiyeh on Sunday, Iran and the Houthis retaliated with limited missile-drone strikes, exposing tensions between Trump and Netanyahu over who \"calls the shots\". Iran's \"unity of theatres\" tactic links its Axis of Resistance allies, and officials threatened to extend the Strait of Hormuz chokehold to the Bab el-Mandeb Strait. Rice University's Kristian Coates Ulrichsen said blocking Hormuz is \"a far better tool of deterrence than possessing a nuclear weapon\". Analyst Farzan Sabet expects a narrow deal to reopen the strait, though broader nuclear issues remain hard to resolve.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Iran%E2%80%99s%20%E2%80%98unity%20of%20theatres%E2%80%99%20strategy%20exposes%20US-Israel%20rift.pdf"},{"id":"scmp-15","title":"Malaysia's hunt for Russian oil tests Anwar's 'friends with all' policy","source":"SCMP","date":"12 Jun 2026","tags":["Energy","Southeast Asia","Geopolitics"],"summary":"Malaysia is exploring Russian and Turkish crude after Iran declared the Strait of Hormuz closed, with Economy Minister Akmal Nasrullah saying supply is secured until end-July. Brent crude rose to US$94.58 a barrel Thursday, up from about US$73 before the conflict, as Washington signals it wants to end Russian-oil sanction waivers \"as soon as possible\". Petronas CEO Tengku Muhammad Taufik said about 40 per cent of Malaysia's crude imports pass through the strait, with domestic output at 350,000 barrels per day against 700,000 of refining demand. Analysts warned Russian crude tests Anwar's \"friends with all\" hedging policy by inviting Western backlash.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Malaysia%E2%80%99s%20hunt%20for%20Russian%20oil%20tests%20Anwar%E2%80%99s%20%E2%80%98friends%20with%20all%E2%80%99%20policy.pdf"},{"id":"scmp-16","title":"Taipei envoy sees US$14 billion arms package moving ahead under Trump","source":"SCMP","date":"12 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Taiwan's de facto US envoy Alexander Tah-ray Yui told CNN he expects Washington to approve a pending US$14 billion arms sale, saying \"it's up to President Trump to decide\". KMT chairwoman Cheng Li-wun, visiting Washington and meeting several lawmakers, said her party does not oppose the sales but questioned the ruling DPP's procurement procedures. The comments followed Taiwan's Himars live-fire exercise aimed toward mainland China on Wednesday. A US arms review remains paused; acting Navy head Hung Cao cited munitions needs for \"Epic Fury\" amid shortages from the Iran war, while Defence Secretary Pete Hegseth said any decision rests with Trump.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Taipei%20envoy%20sees%20US$14%20billion%20arms%20package%20moving%20ahead%20under%20Trump.pdf"},{"id":"scmp-17","title":"To beat chip crunch, Chinese firm inks memory deal bigger than its sales","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Chinese memory module maker Biwin signed a two-year US$1.86 billion (12.6 billion yuan) deal for flash memory chips, exceeding its 2025 revenue of 11.3 billion yuan, per a Tuesday Shanghai Stock Exchange filing. The locked-volume, locked-price arrangement runs from Q3 2026 to Q2 2028 with an undisclosed supplier, as AI server and data-centre demand squeezes supply. TrendForce reported Q1 revenue at the five largest NAND brands jumped 83.7 per cent quarter-on-quarter to over US$38.9 billion, with Samsung up 104.7 per cent. Biwin's own Q1 revenue surged 341.5 per cent year-on-year to 6.81 billion yuan.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/To%20beat%20chip%20crunch,%20Chinese%20firm%20inks%20memory%20deal%20bigger%20than%20its%20sales.pdf"},{"id":"scmp-18","title":"Trump calls off Iran strikes, citing progress in talks","source":"SCMP","date":"12 Jun 2026","tags":["Geopolitics","Defence","Energy"],"summary":"Trump said Thursday on Truth Social he cancelled planned strikes against Iran after negotiations reached \"the highest level of Iranian leadership\" and won approval, saying a deal could be signed as soon as this weekend, possibly in Europe. The reversal followed his earlier warning that US forces would strike \"VERY HARD TONIGHT\" and a suggestion the US could seize Kharg Island. Iran's chief negotiator, parliamentary speaker Mohammad Bagher Ghalibaf, had warned that \"impulsive decisions\" would \"explode energy infrastructure and markets\". Trump said the US-led naval blockade would remain until a final agreement is signed; China called for an immediate halt to operations.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Trump%20calls%20off%20Iran%20strikes,%20citing%20progress%20in%20talks.pdf"},{"id":"scmp-19","title":"Trump taps Wall Street top cop Jay Clayton as spy chief after Pulte backlash","source":"SCMP","date":"12 Jun 2026","tags":["Politics","Finance & Markets"],"summary":"Trump said he is nominating Jay Clayton, the top federal prosecutor in Manhattan and a former SEC chairman, as director of national intelligence, after controversy over naming housing regulator Bill Pulte as acting spy chief. The Pulte row led the US House on Thursday to reject a short-term extension of a major warrantless surveillance programme in protest. Outgoing DNI Tulsi Gabbard, who is stepping down to care for her husband, had her departure brought forward to June 19. Trump had earlier defended Pulte, who has no intelligence background, ordering him to cut intelligence community jobs.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Trump%20taps%20Wall%20Street%20top%20cop%20Jay%20Clayton%20as%20spy%20chief%20after%20Pulte%20backlash.pdf"},{"id":"scmp-20","title":"What's behind Beijing's seabed mapping east of Taiwan?","source":"SCMP","date":"12 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Beijing completed its first hydrographic survey of waters east of Taiwan during a five-day maritime law-enforcement operation ending Wednesday, per state-affiliated Yuyuan Tantian, with the Haixun 08 survey ship covering 1,025 nautical miles. Experts said the move counters US-Japan-Philippines maritime cooperation, after Manila hosted a trilateral Maritime Dialogue on Monday. Beijing Union University's Zhu Songling called the Japan-Philippines border talks \"dangerous\", while NUS's Ja Ian Chong said surveying \"allows operational awareness but does not confer control\" and could enable \"more effective submarine and anti-submarine operations\" in waters reaching 3,000 to 5,000 metres deep.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/What%E2%80%99s%20behind%20Beijing%E2%80%99s%20seabed%20mapping%20east%20of%20Taiwan.pdf"},{"id":"scmp-21","title":"UK defence chief John Healey resigns amid feud with Starmer over military spending","source":"SCMP","date":"12 Jun 2026","tags":["Defence","Politics"],"summary":"British Defence Minister John Healey quit Thursday over a military-spending dispute, accusing PM Keir Starmer in a scathing letter of failing to \"commit the resources that the nation needs to defend the country\". The resignation deepens Starmer's crisis amid a likely leadership challenge, following Wes Streeting's May exit and Andy Burnham's bid. The row centres on the delayed Defence Investment Plan, which Starmer said would be published before a NATO summit beginning July 7. Healey said the financial settlement, given to him in full only Monday, falls \"well short\" and would reduce forces' readiness amid frequent Russian incursions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/UK%20defence%20chief%20John%20Healey%20resigns%20amid%20feud%20with%20Starmer%20over%20military%20spending.pdf"},{"id":"scmp-22","title":"US lawmakers warn next revolution in AI race must be in America, not China","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Geopolitics","Politics"],"summary":"At a Thursday congressional hearing titled \"AI and the American Dream\", lawmakers showed bipartisan support for retaining US leadership in AI over China. Banking Committee chairman Tim Scott said the US \"cannot afford to let China or any other adversary gain a technological edge in artificial intelligence\". Senator Jim Banks of Indiana said no contest matters more than beating China in AI, arguing \"the nation that leads in AI will set the terms of the world's economy and command the high ground in military power\". Witnesses warned the US must ensure the next chapter of responsible innovation is written in America.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/US%20lawmakers%20warn%20next%20revolution%20in%20AI%20race%20must%20be%20in%20America,%20not%20China.pdf"}]},"2026-06-15":{"date":"2026-06-15","dayOfWeek":"Monday","totalArticles":57,"sourceCounts":{"WSJ":19,"ST":10,"BT":11,"SCMP":17},"executiveDigest":"Trump and Pakistan declared a US-Iran deal 'complete' — reopening the Strait of Hormuz with a June 19 signing and sending oil down about 4% — even as Israeli strikes on Beirut and Iranian doubts clouded it, while SpaceX stormed public markets at a US$2.1 trillion valuation and a looming BOJ hike to a 31-year high and an AI price war rattled investors.","briefingCards":[{"title":"Lead story — US-Iran deal declared 'complete', but fragile","body":"Trump and Pakistan's Shehbaz Sharif announced a deal to reopen the Strait of Hormuz and end the US naval blockade, with a June 19 signing in Switzerland and a 60-day window on Iran's nuclear programme; oil fell more than 4%. Yet Israeli strikes on Beirut's Dahiyeh drew Iran's warning there was 'no point' in talks, and the Wall Street Journal called any accord the start of the 'toughest phase'. Western intelligence believes Iran used the prior ceasefire to rebuild about three-quarters of its missile stockpile."},{"title":"Markets & finance — SpaceX debut, a BOJ hike and an AI price war","body":"SpaceX pulled off a 'Goldilocks' debut, soaring 19% to a US$2.1 trillion valuation in the largest IPO ever and making Elon Musk the first trillionaire, even as a tech-bubble debate raged and index providers funnel passive money into it and Big AI. The Bank of Japan is poised to raise rates to a 31-year high and the Bank of Korea signalled hikes, while a BlackRock private-credit fund faced 13% redemption requests. Oil's ~4% drop on the Iran deal eased some inflation fear."},{"title":"Asia realignment — navies, missiles and the Korea-Russia axis","body":"Japan added Indonesia to its 'network of navies' (after Australia and the Philippines), agreeing to transfer Asagiri-class destroyers, while a Lowy Institute report warned China's ability to strike Australia directly is 'growing'. Beijing sent law-enforcement ships into restricted waters near Taiwan's Taiping Island. Kim Jong Un pledged to 'always stand together' with Russia, as analysts said Pyongyang now extracts security from Moscow, economics from Beijing and tacit nuclear acceptance from both."},{"title":"Energy & climate — Hormuz set to reopen as oil slides","body":"The declared Iran deal would reopen Hormuz — which carries about 20% of global oil and gas — pulling crude down over 4%, though Fertiglobe's chief warned the war still imperils the world's food supply via fertilizer (30% of regional urea exports stuck). WSJ examined why oil hadn't 'shot through the roof', and gold (down over 20% from January's record) may rebound 13% as tensions ease. Abu Dhabi is courting 22 Chinese firms, including CATL, to scale renewables and storage."},{"title":"Technology & AI — price war, export curbs and a foreign-use ban","body":"An AI price war erupted as agents dynamically switch to cheaper models (cutting some costs up to 95%) and OpenAI weighs deep cuts; Anthropic halted access to its top models after a US ban on foreign use, and OpenAI was subpoenaed by a coalition of state attorneys-general. China's 'hundred-model' war is shifting to enterprise value per JPMorgan, while Beijing's tungsten export curbs threaten Japan's advanced-chip gas supply. Meta's data centres are even funding US$50,000 teacher bonuses near new sites."},{"title":"Singapore & SEA focus — family-office rules and wealth flows","body":"MAS's revised single-family-office framework took effect June 15 (existing SFOs get a one-year transition), as Hong Kong rival hubs court European wealth — about 30 family offices eyeing the city. Singapore detailed a registry of AI agents covering 150,000 public officers, IMDA and Microsoft agreed to jointly test frontier-AI safety, and DBS extended wealth planning to 3.8 million retail customers. Resale-condo listings are now sitting nearly twice as long as at the 2022 peak as buyers wait and sellers hold firm."}],"keyMetrics":[{"value":"US$2.1t","label":"SpaceX IPO valuation","sub":"'Goldilocks' debut, +19%; largest ever"},{"value":"−4%","label":"Oil on Iran deal","sub":"Hormuz to reopen; signing set Jun 19"},{"value":"31-yr high","label":"BOJ rate path","sub":"Hike to 1% poised; BOK signals too"},{"value":"~75%","label":"Iran missile restock","sub":"Rebuilt during the ceasefire, allies say"},{"value":"+13%","label":"Gold rebound call","sub":"From ~US$4,199; central banks buying"},{"value":"Jun 15","label":"MAS family-office rules","sub":"Revised single-FO framework in effect"}],"articles":[{"id":"wsj-01","title":"AI Is Turbocharging the Spamosphere, Amping Up Prolific Text-Message Scams","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Society"],"summary":"Google sued a scam group it calls \"Outsider,\" its first case against a defendant using its Gemini AI model, which the group used to generate code for fake phone-carrier websites. Using more than 8,000 phishing websites, Outsider has stolen an estimated 3.87 million credit card numbers, causing $1.9 billion in losses since July 2023, the FBI said. Google received about 55,000 reports of suspicious messages on Google Messages in the two weeks ended June 1. \"Criminals increasingly use AI to make fraud like this more convincing,\" said the FBI's Brett Leatherman.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/AI%20Is%20Turbocharging%20the%20Spamosphere,%20Amping%20Up%20Prolific%20Text-Message%20Scams.pdf"},{"id":"wsj-02","title":"AI Needs Ajinomoto's Film, but Its CEO Won't Raise Prices Just Because","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Japan's Ajinomoto, dominant supplier of Ajinomoto Build-up Film (ABF) that insulates chip layers, says it can meet AI demand through 2030 but won't hike prices despite investor pressure to exploit its monopoly. CEO Shigeo Nakamura is securing land in central Japan for new facilities, with production expected to start in 2032, possibly earlier. \"[AI-related] demand is expected to continue surging,\" he told the Journal, dismissing a bubble: \"AI isn't just a temporary boom.\" Analyst Ming-Chi Kuo said glass will join, not replace, ABF in chip packaging by 2028.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/AI%20Needs%20Ajinomoto%E2%80%99s%20Film,%20but%20Its%20CEO%20Won%E2%80%99t%20Raise%20Prices%20Just%20Because.pdf"},{"id":"wsj-03","title":"Anthropic Halts Access to Top AI Models After U.S. Ban on Foreign Use","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Politics","Defence"],"summary":"After Commerce Secretary Howard Lutnick told CEO Dario Amodei on Friday that Anthropic's Fable 5 and Mythos 5 models face export restrictions, the company shut off all access to both since many foreign users and foreign-born employees fall under the rule. The ban follows months of feuding with the Trump administration over guardrails and a recent executive order giving security officials more control over model releases. \"The letter did not provide specific details of [the government's] national-security concern,\" Anthropic said. Critics noted U.S. allies like the U.K. couldn't access the technology.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Anthropic%20Halts%20Access%20to%20Top%20AI%20Models%20After%20U.S.%20Ban%20on%20Foreign%20Use.pdf"},{"id":"wsj-04","title":"Bank of Japan Poised to Raise Rates to 31-Year High","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"Markets widely expect the Bank of Japan to raise its policy rate to 1% on Tuesday, the highest since 1995 and its first hike since last December, to counter a price shock from the Middle East conflict. Policymakers expect the move to ease yen weakness that has inflated import costs and to adjust a deeply negative real interest rate. Gov. Kazuo Ueda has been hospitalized and will miss the meeting, with Deputy Gov. Shinichi Uchida holding the news conference. Officials worry rising bond yields reflect doubts about BOJ independence under PM Sanae Takaichi.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Bank%20of%20Japan%20Poised%20to%20Raise%20Rates%20to%2031-Year%20High.pdf"},{"id":"wsj-05","title":"Bank of Korea Governor Signals Readiness to Raise Interest Rates as Inflation Risks Mount","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"Bank of Korea Gov. Shin Hyun-song warned against \"falling behind the curve\" on inflation in a Friday speech marking the bank's 76th anniversary, reinforcing expectations the BOK will resume tightening as soon as next month as the Iran crisis drives up energy prices. The Oxford-trained economist, appointed in May, struck a cautiously optimistic tone on growth thanks to the AI boom fueling exports, but flagged K-shaped recovery risks. The won remains down nearly 6% versus the dollar year to date despite emergency support measures. \"Current developments... point relatively clearly in one direction,\" Shin said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Bank%20of%20Korea%20Governor%20Signals%20Readiness%20to%20Raise%20Interest%20Rates%20as%20Inflation%20Risks%20Mount.pdf"},{"id":"wsj-06","title":"BlackRock Private-Credit Fund Faces 13% Redemption Requests","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets"],"summary":"Investors in BlackRock's flagship HPS Corporate Lending Fund asked to redeem a collective 13.3% of shares in the second quarter, up from 9.3%, but BlackRock will repurchase only 5% per its stated threshold, it said Friday. The requests reflect ongoing pressure on private credit amid concerns over loan losses, fraud and AI exposure; Blackstone's Bcred saw 10% redemption requests and Cliffwater 17%. The fund has returned an annualized 10.2% since inception. CEO Larry Fink said institutional investors like pensions are still adding money on a net basis.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/BlackRock%20Private-Credit%20Fund%20Faces%2013%25%20Redemption%20Requests.pdf"},{"id":"wsj-07","title":"Deal With Iran Is Close, but Accord Will Kickstart Toughest Phase of Talks","source":"WSJ","date":"15 Jun 2026","tags":["Geopolitics","Energy","Defence"],"summary":"The U.S., Iran and mediator Pakistan agreed Friday a peace deal is nearly complete, with a senior Trump official roughly 80% confident of agreement within days, including Iran destroying its highly enriched uranium stockpile in exchange for sanctions relief. An initial accord opens a 60-day window to reopen the Strait of Hormuz and negotiate a final nuclear deal; Iran will get no upfront money despite seeking $24 billion in frozen assets. Iran's Revolutionary Guard had not signed off, a potential stumbling block. The war began Feb. 28 with 39 days of fighting before an April ceasefire.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Deal%20With%20Iran%20Is%20Close,%20but%20Accord%20Will%20Kickstart%20Toughest%20Phase%20of%20Talks.pdf"},{"id":"wsj-08","title":"Donald Trump's 80th Birthday Comes Amid a White House Strategy of Relentless Exposure","source":"WSJ","date":"15 Jun 2026","tags":["Politics","Society"],"summary":"As Trump turns 80 on Sunday, the oldest man to become president, he and advisers have made him an omnipresent figure to contrast with predecessor Joe Biden, accepting that Americans see both good and bad of an aging leader. He has confused details, referring to Greenland as Iceland and the Strait of Hormuz as the Strait of Iran, and gained 14 pounds between physicals. He plans to host a first-of-its-kind UFC cage match on the White House lawn Sunday. \"It's not a number I like, but I'm here nevertheless,\" Trump said of the milestone.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Donald%20Trump%E2%80%99s%2080th%20Birthday%20Comes%20Amid%20a%20White%20House%20Strategy%20of%20Relentless%20Exposure.pdf"},{"id":"wsj-09","title":"JPMorgan Chase Has a Key Role for SpaceX's IPO: Party Host","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"JPMorgan hosted SpaceX's closing-deal IPO party Friday night on the 57th floor of its new 270 Park Ave. headquarters, featuring a \"dessert in the stars\" reception pitched by CEO Jamie Dimon to Elon Musk, plus a building light display of launching rockets. CFO Bret Johnsen and President Gwynne Shotwell were to attend; Musk, in Starbase, Texas, was not. JPMorgan is one of 23 banks on the deal and will make about $75 million in fees. The event marks a reconciliation after Musk and Dimon openly feuded; Musk testified in 2023 \"JPMorgan hates Tesla.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/JPMorgan%20Chase%20Has%20a%20Key%20Role%20for%20SpaceX%E2%80%99s%20IPO%20Party%20Host.pdf"},{"id":"wsj-10","title":"OpenAI Investigated by Coalition of State Attorneys General","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Politics","Society"],"summary":"A coalition of state attorneys general has opened an investigation into OpenAI, serving it Friday with a subpoena from New York's attorney general seeking documents on advertising, user engagement, consumer and health data, activities related to minors and seniors, and model sycophancy. The company confidentially filed IPO paperwork with the SEC this month. Earlier in June, Florida became the first state to sue OpenAI and CEO Sam Altman, claiming they knowingly released an unsafe product. \"We take the concerns raised by state attorneys general seriously,\" an OpenAI spokesperson said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/OpenAI%20Investigated%20by%20Coalition%20of%20State%20Attorneys%20General.pdf"},{"id":"wsj-11","title":"SpaceX, Now Worth $2.1 Trillion, Pulls Off Goldilocks Debut","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"SpaceX shares soared 19% Friday in the largest IPO ever, closing at $160.95 versus the $135 offer price and giving the company a $2.1 trillion market value, making Elon Musk the world's first trillionaire. The firm sold $75 billion of shares and now ranks as the sixth-most valuable U.S. public company, ahead of Broadcom and Tesla. SpaceX lost $4.9 billion last year on revenue of $18.7 billion, with much future revenue pinned on a nascent AI unit targeting orbital data centers. Roughly two dozen banks will share a $500 million offering fee; the IPO bodes well for Anthropic and OpenAI.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/SpaceX,%20Now%20Worth%20$2.1%20Trillion,%20Pulls%20Off%20Goldilocks%20Debut.pdf"},{"id":"wsj-12","title":"SpaceX's IPO Proves the Power of Elon Musk's 'Superlative' Strategy","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"The world's biggest-ever IPO fits Elon Musk's roughly 25-year strategy of pursuing superlatives to capture attention and public support for space travel, columnist Tim Higgins writes. Founded in 2002 after an initial idea to send plant seeds to Mars, SpaceX became the first private company to orbit a liquid-fueled rocket and to land one, and built the largest low-orbit satellite system. \"The public tends to respond to precedence and superlatives,\" Musk said at Stanford. The everyday investors who drove shares up 19% made Musk the first trillionaire, even as some dreams behind the IPO may never come true.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/SpaceX%E2%80%99s%20IPO%20Proves%20the%20Power%20of%20Elon%20Musk%E2%80%99s%20%E2%80%98Superlative%E2%80%99%20Strategy.pdf"},{"id":"wsj-13","title":"The AI Price War Is Here, Piling Pressure on OpenAI and Anthropic","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Finance & Markets","Trade"],"summary":"New cost-saving tools let AI agents dynamically switch among third-party and open-source models, including Chinese ones from Alibaba and DeepSeek, cutting some AI work costs by up to 95%. OpenAI is weighing drastic price cuts ahead of expected Anthropic cuts; CEO Sam Altman said costs had suddenly become \"a huge issue.\" DeepSeek's share of usage on Vercel rose from 1% in April to 17% in May, and Anthropic's Fable 5 is more than 50 times costlier per token than DeepSeek's V4 Pro. The war threatens to widen losses at OpenAI and Anthropic, both of which filed confidential IPO paperwork.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20AI%20Price%20War%20Is%20Here,%20Piling%20Pressure%20on%20OpenAI%20and%20Anthropic.pdf"},{"id":"wsj-14","title":"The Teachers Getting $50,000 Bonuses Thanks to a Massive Meta Data Center","source":"WSJ","date":"15 Jun 2026","tags":["Technology & AI","Society"],"summary":"Richland Parish, Louisiana, will pay some teachers bonuses of up to $50,935 this year, up from $10,200, funded by a 1% sales tax boosted by Meta's $10 billion, 4 million-square-foot Hyperion data center. The parish collected $42.9 million in sales tax over nine months, more than double a year earlier, and Meta made a separate $22.4 million payment in May. The windfall comes as U.S. opposition to data centers swells, with over half of a Reuters/Ipsos survey opposing new ones locally. \"Sales tax at that level may be somewhat temporary,\" said chamber director Scott Franklin, but property taxes \"will live forever.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20Teachers%20Getting%20$50,000%20Bonuses%20Thanks%20to%20a%20Massive%20Meta%20Data%20Center.pdf"},{"id":"wsj-15","title":"The Wearable Boom Is Real. The Investment Case Is Murkier.","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI","Society"],"summary":"Smart-ring maker Oura and wristband firm Whoop are growing fast and eyeing IPOs, both recently valued at roughly $10 billion to $11 billion, about 10 times revenue, but the history of consumer health hardware is cautionary. Oura has sold more than 5.5 million rings and Whoop reports over 2.5 million members, yet Fitbit hit a near-$10 billion cap before Google bought it for about $2.1 billion. IDC expects global smart-ring shipments to plateau in the U.S. by 2028. Profitable rival Garmin trades at just five-to-six times revenue, about half Oura and Whoop's multiples.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/The%20Wearable%20Boom%20Is%20Real.%20The%20Investment%20Case%20Is%20Murkier..pdf"},{"id":"wsj-16","title":"U.K. Economy Contracted in April After Strong Start to Year","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"U.K. GDP fell 0.1% in April, in line with consensus and the first contraction since August, after a 0.6% rise in the first quarter that outpaced the U.S. and most European peers. Services output dropped 0.2% while manufacturing rose 0.4%, with fallout from the Iran war set to weaken activity further. The OECD upgraded 2026 growth to 0.9% but forecasts U.K. inflation rising to 3.7%, the G7's second-highest after the U.S. The downturn gives the Bank of England another reason to hold rates next week. \"We're back in that stagnation feeling,\" said RSM UK's Thomas Pugh.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/U.K.%20Economy%20Contracted%20in%20April%20After%20Strong%20Start%20to%20Year.pdf"},{"id":"wsj-17","title":"Why Oil Prices Haven't Shot Through the Roof-Yet","source":"WSJ","date":"15 Jun 2026","tags":["Energy","Geopolitics","Finance & Markets"],"summary":"Despite the Strait of Hormuz carrying about 20% of the world's daily crude, oil has stayed below $100, with U.S. crude at $84.88 Friday on peace-deal hopes. Factors include China's imports falling to 7.8 million barrels a day in May, the lowest in nearly eight years; recovering \"dark\" tanker flows of about 2.5 million barrels a day; energy efficiency gains; and Saudi and Emirati pipelines bypassing Hormuz with nearly 9 million barrels a day. But OECD fuel inventories may sink below 2.3 billion barrels by December, the lowest since 2003. Exxon's Neil Chapman warned prices could shoot up to \"$150, $160\" a barrel.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Why%20Oil%20Prices%20Haven%E2%80%99t%20Shot%20Through%20the%20Roof-Yet.pdf"},{"id":"wsj-18","title":"World's Food Supply Imperiled by Iran War, Fertilizer Manufacturer Fertiglobe Chief Says","source":"WSJ","date":"15 Jun 2026","tags":["Geopolitics","Energy","Trade"],"summary":"Fertiglobe CEO Ahmed El-Hoshy warned the Middle East conflict threatens to spike grain prices and worsen hunger, with the Strait effectively closed and some 30% of urea exports unable to leave the region. Ammonia and urea fertilizer prices have jumped as supply fell and gas prices soared; fertilizers produce calories for roughly half of the world's 8 billion people. The EU said Friday it would provide 540 million euros (about $625 million) to help farmers buy fertilizers. ING analysts called it \"a tragedy unfolding in slow motion,\" with Southern Hemisphere farmers disproportionately affected during planting.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/World%E2%80%99s%20Food%20Supply%20Imperiled%20by%20Iran%20War,%20Fertilizer%20Manufacturer%20Fertiglobe%20Chief%20Says.pdf"},{"id":"wsj-19","title":"Worried About a Tech-Stock Bubble? Here's Where You Can Take Cover","source":"WSJ","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Columnist Jason Zweig argues Europe offers cover for investors fearful of U.S. tech concentration and an AI bubble, intensified by SpaceX's IPO and pending OpenAI and Anthropic listings. In an S&P 500 fund, 47% sits in technology and communications with nearly 8% in Nvidia alone, and U.S. stocks trade at 41 times long-term inflation-adjusted earnings versus under 23 for Europe. European stocks yield almost 3% against the S&P 500's 1.1%, offering \"ballast,\" said Fidelity's Jurrien Timmer. Emerging markets like South Korea and Taiwan are no safer, being at least as exposed to AI.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20WSJ/Worried%20About%20a%20Tech-Stock%20Bubble?%20Here%E2%80%99s%20Where%20You%20Can%20Take%20Cover.pdf"},{"id":"st-01","title":"America's politics is reaching peak paranoia","source":"ST","date":"15 Jun 2026","tags":["Politics","Society"],"summary":"Bloomberg columnist Adrian Wooldridge argues conspiracy thinking has moved from the US margins to power, citing historian Richard Hofstadter's 1964 Harper's essay \"the paranoid style of American politics\", newly republished by Penguin/Random House. He notes right-wing \"Deep State\" beliefs and left-wing Putin \"kompromat\" claims, plus figures like RFK Jr endorsing vaccine-autism and 5G control ideas. Trust in government to \"do the right thing\" fell from about 75 per cent in 1952 to 17 per cent today. Hofstadter attributed the style to radical change, status anxiety and cultural dispossession.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/America's%20politics%20is%20reaching%20peak%20paranoia.pdf"},{"id":"st-02","title":"China's AI influence operations target US divisions","source":"ST","date":"15 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"OpenAI said on June 10 it uncovered two ChatGPT account clusters likely from China promoting narratives that AI data-centre build-outs raise family electricity prices and that US tech policies and tariffs aim to dominate US-China competition. Operators, posing as Americans, were likely a Chinese tech firm's social media team working for provincial government clients. Clemson's Professor Darren Linvill said operators are \"experimenting right now with the use of AI tools\" and face little downside when caught. Republican Senator Tom Cotton on June 10 asked the DOJ to investigate CCP-led influence efforts; Trump on June 4 said \"No, I'm not worried about it.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/China's%20AI%20influence%20operations%20target%20US%20divisions.pdf"},{"id":"st-03","title":"DBS wealth planning for retail customers","source":"ST","date":"15 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"DBS has given 3.8 million retail customers aged 18 to 68 (about eight in 10) access to a personal wealth planning manager since launching the initiative in 2023, via the digiWealth platform in its digibank app. Reverse inquiries tripled in the first four months of 2026 year on year, and nearly one million DBS and POSB customers now invest or hold insurance, a figure the bank aims to double by 2030. Customers upgrading to DBS Treasures (at least $350,000 investible assets) rose 130 per cent year on year in Q1 2026, and retail wealth revenue almost doubled from 2023 to 2025. DBS will open two new Treasures centres in Singapore by end-2027, adding to three existing branches.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/DBS%20wealth%20planning%20for%20retail%20customers.pdf"},{"id":"st-04","title":"Experts urge closer look at SpaceX's lofty valuation on IPO rally","source":"ST","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Elon Musk became the world's first trillionaire, his net worth rising to about US$1.1 trillion, after SpaceX's Nasdaq debut; shares opened at US$150 on June 12 and closed 7 per cent higher at US$160.95. SpaceX raised a record US$75 billion, valuing it at US$1.77 trillion, with Musk holding about 42 per cent. OCBC's Chez Anbu urged discipline, advising investors to research \"the float, the index path, the lock-up schedule\" rather than rush in. Swissquote's Ipek Ozkardeskaya warned the rally would \"almost certainly be followed by a period of valuation reset\", as OpenAI and Anthropic also confidentially filed for IPOs.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/Experts%20urge%20closer%20look%20at%20SpaceX's%20lofty%20valuation%20on%20IPO%20rally.pdf"},{"id":"st-05","title":"More Japanese local governments levying hotel tax despite industry concerns","source":"ST","date":"15 Jun 2026","tags":["Trade","Society"],"summary":"Japan's Internal Affairs and Communications Ministry says accommodation-tax adopters will reach 55 this fiscal year, with 45 already implementing the levy and 10 more planning to follow. Yugawara, the first Kanagawa municipality to introduce it in April, charges 300 yen (S$2) per night for rooms under 50,000 yen and expects 186 million yen in revenue. Kyoto raised its maximum levy from 1,000 yen to 10,000 yen for stays of 100,000 yen or more, expecting revenue to more than double to 13.2 billion yen, while Tokyo plans a 3 per cent room-rate charge from fiscal 2027. Akita shelved its plan in March 2025 amid operator concerns over fewer guests and collection burdens.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/More%20Japanese%20local%20governments%20levying%20hotel%20tax%20despite%20industry%20concerns.pdf"},{"id":"st-06","title":"Resale condos staying on market longer as buyers take their time, sellers hold firm on prices","source":"ST","date":"15 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Singapore resale condo listings are staying online nearly twice as long as at the post-Covid peak, with PropertyGuru active listings created in early 2026 reaching a median age of 81 days as at May 18, up from 45 days in 2022. On 99.co, listings taken down in Q1 2026 had been up a median of 106 days versus 66 a year earlier, with the core central region jumping to 145 days. Resale volumes have fallen for two consecutive quarters since July-September 2025, but PropNex's Kelvin Fong said median resale price rose to $1,770 psf from $1,747, still 44.3 per cent below the $2,554 psf new-condo median. Some sellers hold firm as Newmark's Wong Shanting cites higher land costs raising replacement home costs over 12 to 18 months.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/Resale%20condos%20staying%20on%20market%20longer%20as%20buyers%20take%20their%20time,%20sellers%20hold%20firm%20on%20prices.pdf"},{"id":"st-07","title":"Shangri-La Dialogue: False dichotomies, real consequences","source":"ST","date":"15 Jun 2026","tags":["Defence","Geopolitics"],"summary":"In a commentary, Singapore's Coordinating Minister for Public Services and Defence Minister reflects on the 2026 Shangri-La Dialogue, noting a clearer, improved tone between the US and China that forced nations large and small to recalibrate. He warns that smaller states racing to arm trigger a security dilemma akin to Newton's third law, where boosting defence makes neighbours panic and buy more weapons. He identifies three false dichotomies: choosing between talking and arming, treating everything transactionally while disregarding rules, and focusing on today's fires while ignoring tomorrow's threats. He concludes that leaders attend seeking solidarity, and that in defence diplomacy \"a successful meeting is usually one that stays completely out of the news\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/Shangri-La%20Dialogue%20False%20dichotomies,%20real%20consequences.pdf"},{"id":"st-08","title":"Singapore, Microsoft to explore ways to test the safety of frontier AI models","source":"ST","date":"15 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"Singapore's IMDA and Microsoft signed a memorandum of understanding on June 12 to jointly develop ways to test and assess frontier AI models, including how safely they operate across different languages, and to exchange governance best practices. The move follows concerns over Anthropic's Claude Mythos Preview, which in April identified about 10,000 high-to-critical severity flaws across major operating systems and browsers, some hidden for decades, prompting restricted access under Project Glasswing. The European Central Bank probed its risks, and US Treasury Secretary Scott Bessent and Fed chair Jerome Powell convened an urgent meeting with bank chiefs. IMDA's Kiren Kumar said the collaboration shows how government and industry can \"partner together to drive and scale good governance\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/Singapore,%20Microsoft%20to%20explore%20ways%20to%20test%20the%20safety%20of%20frontier%20AI%20models.pdf"},{"id":"st-09","title":"Trump again picks personal lawyer for top job as US attorney in Manhattan","source":"ST","date":"15 Jun 2026","tags":["Politics"],"summary":"Trump said on June 13 he would nominate James (Jamie) McDonald, a Sullivan & Cromwell litigation partner and one of his personal lawyers, as US attorney for the Southern District of New York. McDonald, a former assistant US attorney, CFTC enforcement director and clerk to Chief Justice John Roberts, sits on Trump's appeals team for his Manhattan conviction on 34 felony counts of falsifying business records. He would replace Jay Clayton, Trump's pick for director of national intelligence, and oversee about 200 assistant US attorneys. At Sullivan & Cromwell he represented Live Nation and Polymarket, both of which received favourable Justice Department treatment under Trump.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/Trump%20again%20picks%20personal%20lawyer%20for%20top%20job%20as%20US%20attorney%20in%20Manhattan.pdf"},{"id":"st-10","title":"US, Iran inch closer to deal, timing remains unclear","source":"ST","date":"15 Jun 2026","tags":["Geopolitics","Energy"],"summary":"US and Pakistani leaders forecast a June 14 signing of a framework agreement to end months of US-Iran fighting, but Tehran cast doubt, with Iran's Fars agency saying no final decision was taken. Under draft terms, the US would release US$25 billion in frozen Iranian assets and waive oil sanctions while Iran agrees not to produce nuclear weapons and to reopen the Strait of Hormuz, which carried 20 per cent of world oil shipments before the war. A US official said Iran \"is going to open up the Strait of Hormuz, that is a requirement,\" after which the US would lift its naval blockade. Nuclear talks would follow over a 60-day period; the IAEA estimated Iran held 440.9kg of uranium enriched to 60 per cent before the June 13, 2025 Israeli strikes.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20ST/US,%20Iran%20inch%20closer%20to%20deal,%20timing%20remains%20unclear.pdf"},{"id":"bt-01","title":"AI agents must be as accountable as human workers","source":"BT","date":"15 Jun 2026","tags":["Technology & AI","Society"],"summary":"Singapore announced on Jun 2 plans for a registry of AI agents covering its 150,000 public officers, signalling a shift from adoption to accountability in the agentic AI era. The piece cites failures elsewhere, including Replit's coding agent deleting a live production database of 1,200+ executives and a Cursor AI agent wiping a production database and backups in nine seconds. IBM's Cost of a Data Breach Report 2025 found 97 per cent of organisations with AI-related breaches lacked proper AI access controls. Singapore's Model AI Governance Framework for Agentic AI, unveiled by Minister Josephine Teo at WEF in January, treats agents as \"digital teammates\" with named human owners.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/AI%20agents%20must%20be%20as%20accountable%20as%20human%20workers.pdf"},{"id":"bt-02","title":"Australia bets on high speed rail line as a housing crisis fix","source":"BT","date":"15 Jun 2026","tags":["Society","Trade"],"summary":"PM Anthony Albanese's government is backing a A$94 billion (S$85 billion) high-speed rail bet, with the new High Speed Rail Authority given a US$462 million preparatory budget and headed by Tim Parker. The first 194 km Sydney-Newcastle line would cut the trip to 60 minutes and could spawn 160,000 new homes, 99,000 jobs and A$250 billion over 50 years. The ultimate vision is 1,800 km of east-coast track running up to 320 kmh, connecting Brisbane, Sydney, Canberra and Melbourne by 2060. Parker called it \"a project whose time has come\" but critics cite cost blowouts seen in the UK's HS2 and California's delayed LA-San Francisco link.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/Australia%20bets%20on%20high%20speed%20rail%20line%20as%20a%20housing%20crisis%20fix.pdf"},{"id":"bt-03","title":"California's general election is revealing fault lines in the Democratic Party","source":"BT","date":"15 Jun 2026","tags":["Politics","Society"],"summary":"California's Jun 2 primary saw 61 candidates vie for the open governor's race, with Democrat Xavier Becerra leading at about 28 per cent, ahead of Trump-endorsed Republican Steve Hilton at 25 per cent and billionaire Tom Steyer at 23 per cent. The fragmented Democratic field risked a two-Republican \"lockout\" in a state Democrats have dominated since the last GOP statewide win in 2006. In Los Angeles, Mayor Karen Bass (34 per cent) failed to clear 50 per cent and faces a November run-off against councilmember Nithya Raman (29 per cent), with reality star Spencer Pratt at 27 per cent. Turnout was just over 23 per cent amid unresolved wildfire recovery, homelessness and housing crises.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/California's%20general%20election%20is%20revealing%20fault%20lines%20in%20the%20Democratic%20Party.pdf"},{"id":"bt-04","title":"China markets are 'much cheaper', but beware the crackdown on overseas trading: Amundi CIO","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"Amundi CIO Vincent Mortier, speaking at the firm's World Investment Forum in Paris on Jun 12, said Chinese markets remain \"much cheaper\" and the Five-Year Plan gives medium-term optimism. He warned Beijing's crackdown on illicit cross-border stock trading to stem capital outflows \"was not a very good signal\" and deters foreigners from onshore equities. Mortier said the move could benefit Hong Kong, which \"remains a proxy for China,\" with companies driven to list there and access preserved via Stock Connect. He is bullish on China's chip sector, predicting it will produce \"competitive\" chips within a few years despite South Korean, Taiwanese and US leads.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/China%20markets%20are%20'much%20cheaper',%20but%20beware%20the%20crackdown%20on%20overseas%20trading%20Amundi%20CIO.pdf"},{"id":"bt-05","title":"From moonshot to markets: Understand the mechanics before plunging into SpaceX's mega IPO","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"SpaceX debuted on the Nasdaq on Jun 12 with shares priced at US$135 and over 555 million shares offered, raising about US$75 billion at a US$1.77 trillion valuation. The author, OCBC's head of wealth advisory, stresses that the float, only a little over 4 per cent of the company, matters more than the headline value for index mechanics. SpaceX is reportedly not net-income profitable, so S&P 500 inclusion is not a near-term certainty given seasoning, float and profitability rules. Citing Facebook's 2012, Alibaba's 2014 and Saudi Aramco's 2019 IPOs, he urges discipline on float, index path, lock-ups and price, with OpenAI and Anthropic potentially listing later this year.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/From%20moonshot%20to%20markets%20Understand%20the%20mechanics%20before%20plunging%20into%20SpaceX's%20mega%20IPO.pdf"},{"id":"bt-06","title":"Gold fever sends some vintage luxury watches to the melting furnace","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Society"],"summary":"With gold near record highs, some classic watches by Omega and LVMH's Tag Heuer are being melted as metal value tops resale worth, per Reuters interviews with over a dozen traders and experts. British dealer Jon White scrapped an 18-carat late-1970s Omega Constellation in May whose gold content was worth £5,750, about 35 per cent above its £4,000-£4,500 auction estimate. Gold hit a record US$5,600 an ounce in January and hovers near US$4,200, nearly double its 2024 average, with 2026 forecasts of US$5,400 to US$6,300. Rolex accounted for 61 per cent of new Swiss watch sales above 3,000 francs last year, while less exclusive brands like Omega's Speedmaster depreciate sharply and face scrapping.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/Gold%20fever%20sends%20some%20vintage%20luxury%20watches%20to%20the%20melting%20furnace.pdf"},{"id":"bt-07","title":"Revised framework for single family offices to take effect on Jun 15: MAS","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"The Monetary Authority of Singapore said on Jun 12 that its revised framework for single family offices (SFOs) takes effect Jun 15, with existing SFOs given a one-year transition until Jun 15, 2027 to comply. The framework simplifies setting up operations in Singapore and streamlines documentation and reporting requirements. Qualifying SFOs need only notify MAS and maintain an account with an MAS-licensed bank, plus file an annual return on total assets under management and bank name. It follows a public consultation and MAS' policy responses to industry feedback published in November 2024.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/Revised%20framework%20for%20single%20family%20offices%20to%20take%20effect%20on%20Jun%2015%20MAS.pdf"},{"id":"bt-08","title":"Silent kingmakers: Market index providers are driving public investors into SpaceX and Big AI","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"SpaceX's US$75 billion IPO was over four times subscribed and closed Jun 12 at US$160.95, 19.2 per cent above its US$135 price, giving a US$2.1 trillion market cap. New \"fast entry\" rules from FTSE Russell (5 days) and Nasdaq (15 days), plus MSCI's 10-day fast-track, could force passive funds to absorb billions, though S&P Dow Jones refused to shorten its 12-month seasoning period. By contrast MSCI's January investability warning helped send Jakarta's Composite Index down 30.5 per cent, while AI-driven gains lifted Taiwan's Taiex 52.5 per cent and Korea's Kospi 92.8 per cent. Singapore's Straits Times Index returned 35.3 per cent over 12 months, led by City Developments at 83.5 per cent.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/Silent%20kingmakers%20Market%20index%20providers%20are%20driving%20public%20investors%20into%20SpaceX%20and%20Big%20AI.pdf"},{"id":"bt-09","title":"South Korea's world-beating stock market eyes MSCI developed status","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"South Korea's Kospi, the world's best-performing major benchmark in 2026 with gains over 90 per cent, awaits MSCI's Jun 23 review on a possible watchlist for developed-market status. Most of 15 investors polled by Bloomberg expect MSCI to keep it in the emerging-market camp for now; Korea holds a 23 per cent weighting in the MSCI EM index, with the market nearly trebling to about US$4.4 trillion. Samsung Electronics and SK Hynix account for over half the Kospi's weighting, fuelling record foreign outflows of over US$78 billion in 2026 as funds hit single-stock limits. BNP Paribas estimates promotion could attract roughly US$30 billion of inflows and narrow the Korea Discount.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/South%20Korea's%20world-beating%20stock%20market%20eyes%20MSCI%20developed%20status.pdf"},{"id":"bt-10","title":"UK housing market slump shows signs of stabilising","source":"BT","date":"15 Jun 2026","tags":["Finance & Markets","Society"],"summary":"Britain's residential property slowdown appears to have bottomed out, per the Royal Institution of Chartered Surveyors, whose new buyer demand indicator held at minus 34 in May, ending three months of weakening. Rics' Tarrant Parsons said the downturn \"may be beginning to stabilise\" but warned it would be \"premature to interpret this as the start of a recovery.\" Separately, Nationwide said May house prices fell at the fastest pace in almost a year on higher mortgage costs tied to the Middle East conflict. Markets now expect one or two Bank of England rate hikes by year-end, reversing prior cut expectations, with the next policy meeting on Jun 18.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/UK%20housing%20market%20slump%20shows%20signs%20of%20stabilising.pdf"},{"id":"bt-11","title":"Unshaken in Apac: Hilton sees strong demand, fundamentals, investment in region amid global flux","source":"BT","date":"15 Jun 2026","tags":["Trade","Southeast Asia"],"summary":"Hilton's Asia-Pacific outlook remains positive on strong fundamentals and rising affluence, with Q1 ended Mar 31, 2026 revenue per available room up 4.7 per cent year on year to US$65.58 and occupancy up 2.2 points to 64.8 per cent. Apac president Alan Watts cited severe undersupply, noting one hotel room per 50 people in America versus one per 300 in China and one per 9,000 in India. Hilton has over 1,300 hotels trading in the region with 1,000 more planned, targeting room growth \"a percentage north of 15 per cent,\" roughly 30,000 keys yearly. Franchised and licensed properties make up close to 70 per cent of the 1,303 Apac hotels, with a deal to open 125 Hampton hotels in India.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20BT/Unshaken%20in%20Apac%20Hilton%20sees%20strong%20demand,%20fundamentals,%20investment%20in%20region%20amid%20global%20flux.pdf"},{"id":"scmp-01","title":"Abu Dhabi to tap Chinese tech to scale up green economy, energy chief says","source":"SCMP","date":"15 Jun 2026","tags":["Energy","Technology & AI","Trade"],"summary":"Abu Dhabi's energy department is in talks with 22 Chinese firms, including battery giant CATL, to accelerate its green economy push across renewables, EVs and robotics, chairman Abdulla Humaid Al Jarwan told the SCMP after a Shanghai visit. The emirate plans to add at least 3GW of solar power annually, fuelling demand spurred by AI-driven power consumption. China dominates energy-storage systems with over 80 per cent of the market per SNE Research, and built an ultra-fast EV charging station in Abu Dhabi in six weeks. Al Jarwan urged both sides to \"move faster, collaborate deeper and scale together\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Abu%20Dhabi%20to%20tap%20Chinese%20tech%20to%20scale%20up%20green%20economy,%20energy%20chief%20says.pdf"},{"id":"scmp-02","title":"China's AI 'hundred model' war shifts to enterprise value, JPMorgan says","source":"SCMP","date":"15 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"China's AI monetisation battle is now about \"delivering measurable business value\" rather than raw performance, said Alex Yao, JPMorgan's head of China equity research, predicting consolidation from a fragmented \"hundred-model\" field to a few leaders. ByteDance launched Doubao subscription tiers from 68 to 500 yuan monthly in early May, while Alibaba opened its Qwen ecosystem to KFC and Luckin Coffee and Zhipu launched a GLM Coding Plan rivalling Anthropic's Claude. Yao said the global enterprise AI opportunity is roughly four times the consumer segment. \"Once a model reaches the capability of a strong master's-level graduate, it can start doing real work,\" he said.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/China%E2%80%99s%20AI%20%E2%80%98hundred%20model%E2%80%99%20war%20shifts%20to%20enterprise%20value,%20JPMorgan%20says.pdf"},{"id":"scmp-03","title":"China's direct strike threat to Australia is 'growing', think tank report finds","source":"SCMP","date":"15 Jun 2026","tags":["Defence","Geopolitics"],"summary":"A Lowy Institute report released Sunday found China can directly strike Australia and the threat is growing as Beijing amasses long-range and hypersonic weapons, citing missiles from ships, submarines and the new DF-27 ballistic missile with a 5,000-8,000km range. The Dong Feng-26 could reach northern Australia if deployed from artificial South China Sea islands. Lowy's Sam Roggeveen called the report \"neither hawkish nor dovish, neither alarmist nor complacent\". The threat would \"dramatically escalate\" if China fields a long-range bomber or deploys missiles on Pacific islands near Australia.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/China%E2%80%99s%20direct%20strike%20threat%20to%20Australia%20is%20%E2%80%98growing%E2%80%99,%20think%20tank%20report%20finds.pdf"},{"id":"scmp-04","title":"Do China's export curbs on tungsten threaten Japan's AI chip supply chain?","source":"SCMP","date":"15 Jun 2026","tags":["Trade","Technology & AI"],"summary":"Japanese makers Showa Denko Kanto and Central Glass plan to suspend July production of tungsten hexafluoride, a precursor for advanced AI chips on 3-7nm nodes, amid Beijing's tungsten export controls. The gas's price has jumped more than 200 per cent year on year, with five-nines purity exceeding 1,700 yuan (US$251) per kg, triple a year earlier. Japan's tungsten imports from China fell 50 per cent in April versus the 2025 average. Beijing imposed export curbs after PM Takaichi suggested an attack on Taiwan could be a \"survival-threatening situation\" for Japan, later adding 20 Japanese entities to its control list.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Do%20China%E2%80%99s%20export%20curbs%20on%20tungsten%20threaten%20Japan%E2%80%99s%20AI%20chip%20supply%20chain.pdf"},{"id":"scmp-05","title":"European wealth turns to Hong Kong as 30 family offices eye operations in the city","source":"SCMP","date":"15 Jun 2026","tags":["Finance & Markets","Society"],"summary":"Around 30 European family offices have expressed interest in setting up in Hong Kong, about 19 per cent of the 160 cases InvestHK is handling, drawn by tax incentives and optimism on China tech and Hong Kong property, said InvestHK's Jason Fong. A Deloitte study found single-family offices in the city rose 25 per cent over two years to about 3,384 by end-2025. Hong Kong waives its 16.5 per cent profit tax for single-family offices with portfolios of HK$240 million (US$30.8 million) or more. The city overtook Switzerland last year as the world's largest cross-border wealth hub with US$2.95 trillion booked.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/European%20wealth%20turns%20to%20Hong%20Kong%20as%2030%20family%20offices%20eye%20operations%20in%20the%20city.pdf"},{"id":"scmp-06","title":"How Iran used US ceasefire to replenish its depleted missile stockpiles","source":"SCMP","date":"15 Jun 2026","tags":["Defence","Geopolitics"],"summary":"Western allies believe Iran reconstituted much of its missile arsenal and likely added new Russian-built weapons during the eight-week ceasefire, leaving it able to strike at near-full strength, per intelligence assessments. Tehran now has about three-quarters of its pre-war munitions, versus Trump's claim it had only 21-22 per cent remaining. From February 28 to April 8 Iran launched over 1,850 missiles and at least twice as many Shahed-type cruise missiles, which cost under US$50,000 each. \"Iran has shown remarkable resilience and ability to reconstitute its missile arsenal,\" said Bloomberg Economics' Becca Wasser.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/How%20Iran%20used%20US%20ceasefire%20to%20replenish%20its%20depleted%20missile%20stockpiles.pdf"},{"id":"scmp-07","title":"Israeli strikes on Beirut foil US peace plans, Iran says 'no point' in talks","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Israel struck Hezbollah targets in Beirut's southern Dahiyeh suburbs on Sunday for the second time in a week, killing three with six wounded, after it said three drones hit northern Israel. Trump said \"the attack on Beirut should not have happened\" and urged no further attacks as a US-Iran deal neared. Iranian chief negotiator Mohammad Bagher Ghalibaf said there was \"no point\" continuing peace talks, and Iran held Washington responsible for ceasefire breaches. Lebanon says Israel's air and ground campaign has killed more than 3,700 people; a fifth round of Israel-Lebanon talks is scheduled this month.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Israeli%20strikes%20on%20Beirut%20foil%20US%20peace%20plans,%20Iran%20says%20%E2%80%98no%20point%E2%80%99%20in%20talks.pdf"},{"id":"scmp-08","title":"Japan adds Indonesia to 'network of navies' after Australia, Philippines","source":"SCMP","date":"15 Jun 2026","tags":["Defence","Southeast Asia"],"summary":"Japan and Indonesia agreed on June 5 to begin formal talks on transferring decommissioned Asagiri-class anti-submarine destroyers to the Indonesian Navy, following a meeting between defence ministers Shinjiro Koizumi and Sjafrie Sjamsoeddin. The move responds to Chinese coastguard incursions into Indonesia's EEZ in the North Natuna Sea. The Asagiri carries Sea Sparrow and Harpoon missiles plus ASW systems. Australia is buying 11 Mogami-class frigates in Japan's largest-ever arms deal and the Philippines is to receive up to six Abukuma-class escorts. Analyst Ayu Anastasya Rachman said Japan is building \"a network of navies capable of operating together without requiring a new command structure\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Japan%20adds%20Indonesia%20to%20%E2%80%98network%20of%20navies%E2%80%99%20after%20Australia,%20Philippines.pdf"},{"id":"scmp-09","title":"Open Questions: AIIB head Zou Jiayi on why multilateralism is an 'infrastructure of global trust'","source":"SCMP","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"AIIB president Zou Jiayi, who took office on the bank's 10th anniversary on January 16, told SCMP the Beijing-based lender has grown from 57 to 111 members and committed over US$70 billion to 370 projects. She aims to broadly double annual financing by 2030 while preserving its AAA rating, with over 70 per cent of approved financing last year being climate finance. Zou described multilateralism as \"an infrastructure of global trust\" and said MDBs \"create certainty amid uncertainty\". She defended the new Hong Kong office for capital-markets work and called AIIB the largest co-financier of both the ADB and World Bank.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Open%20QuestionsAIIB%20head%20Zou%20Jiayi%20on%20why%20multilateralism%20is%20an%20%E2%80%98infrastructure%20of%20global%20trust%E2%80%99.pdf"},{"id":"scmp-10","title":"Putin and Zelensky hold phone calls with Trump as US president marks his 80th birthday","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Vladimir Putin and Volodymyr Zelensky each phoned Donald Trump on Sunday, his 80th birthday, ahead of this week's G7 summit in France where Ukraine will feature. Putin's call ran just under an hour; he said if Zelensky wants a meeting, \"let him come to Moscow\", per aide Yuri Ushakov, while Trump said ending the war could open \"a truly new quality of US-Russian relations\". Envoy Steve Witkoff and Jared Kushner are expected in Russia soon. Separately, UK forces boarded and detained a sanctioned tanker, the Smyrtos, suspected of belonging to Russia's \"shadow fleet\" in the English Channel.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Putin%20and%20Zelensky%20hold%20phone%20calls%20with%20Trump%20as%20US%20president%20marks%20his%2080th%20birthday.pdf"},{"id":"scmp-11","title":"Takaichi hails UK defence ties despite next-gen jet spending uncertainty","source":"SCMP","date":"15 Jun 2026","tags":["Defence","Politics"],"summary":"Japanese PM Sanae Takaichi praised UK defence cooperation in a London meeting with Keir Starmer on Sunday, calling ties under the GCAP fighter-jet programme \"a near-alliance\", as the UK-Japan-Italy project to field a jet by 2035 faces delays to Britain's funding and the Thursday resignation of Defence Secretary John Healey. Italy backed a US$10.7 billion plan in February, while Japan spent over 500 billion yen (US$3.1 billion) over five years and earmarked another 170 billion yen. Starmer is also seeking up to 9 billion pounds (US$12 billion) for offshore wind, months after blocking a Chinese turbine maker's Scotland factory on security grounds.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Takaichi%20hails%20UK%20defence%20ties%20despite%20next-gen%20jet%20spending%20uncertainty.pdf"},{"id":"scmp-12","title":"The quiet escalation unfolding around Taiwan's remote outposts as Beijing sends ships","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Taiwan reported for the first time that mainland Chinese law enforcement vessels entered restricted waters near Taiping Island (Itu Aba) in the South China Sea, with two Sansha-managed ships entering the 3.2-nautical-mile prohibited zone at 8.28am Thursday before being driven away at 8.43am. A mainland coastguard ship had earlier entered Pratas Islands waters on June 5. Taiping hosts 200 coastguard personnel, a paved runway and a deepwater wharf. Xiamen University's Zhang Wensheng said China could \"first take back Taiping, or even Dongsha\", linking the moves to Japan-Philippines maritime delineation talks.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/The%20quiet%20escalation%20unfolding%20around%20Taiwan%E2%80%99s%20remote%20outposts%20as%20Beijing%20sends%20ships.pdf"},{"id":"scmp-13","title":"US, Pakistan announce peace deal with Iran is 'complete'","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Energy"],"summary":"Trump and Pakistani PM Shehbaz Sharif announced Sunday a deal with Iran to reopen the Strait of Hormuz and end the US naval blockade, with a signing ceremony set for Friday, June 19 in Switzerland and a 60-day window to address Iran's nuclear programme. \"The Deal with the Islamic Republic of Iran is now complete,\" Trump posted. The war, launched in late February as Operation Epic Fury and reportedly killing supreme leader Ali Khamenei, shut Hormuz and disrupted around 20 per cent of global oil and gas supplies. Oil fell more than 4 per cent on the news; analysts including Defence Priorities' Jennifer Kavanagh voiced scepticism that \"we've actually achieved much\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/US,%20Pakistan%20announce%20peace%20deal%20with%20Iran%20is%20%E2%80%98complete%E2%80%99.pdf"},{"id":"scmp-14","title":"US-China talks need to be 'institutionalised' to ease tensions in AI era: Haass","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Technology & AI"],"summary":"Veteran US diplomat Richard Haass, president emeritus of the Council on Foreign Relations, told the Caixin Summit in Hong Kong via video on Friday that US-China high-level meetings should become routine rather than \"news\". He urged serious dialogue on AI, biotechnology and quantum computing to \"increase transparency, increase predictability\" and possibly halt destabilising tech. His remarks followed Trump's first China visit since 2017. \"It's probably unrealistic to think that economics alone can provide the foundation of the US-China relationship,\" Haass said, calling deeper cooperation a \"win-win\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/US-China%20talks%20need%20to%20be%20%E2%80%98institutionalised%E2%80%99%20to%20ease%20tensions%20in%20AI%20era%20Haass.pdf"},{"id":"scmp-15","title":"What does North Korea get from its blossoming ties with Russia?","source":"SCMP","date":"15 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Kim Jong-un's Russia Day message on June 12 vowed North Korea would \"always stand together with the Russian Federation\", signalling ties are evolving into a firm military alliance, observers said, shortly after Xi Jinping's Pyongyang visit. Analyst Oh Gyeong-seob called it strategic hedging to reassure Moscow that Pyongyang is not drifting back into Beijing's orbit. Yang Moo-jin said North Korea is obtaining security commitments from Russia, economic benefits from China, and tacit acceptance of its nuclear arsenal from both. China remains its largest trading partner, with trade in April reportedly at an eight-year high.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/What%20does%20North%20Korea%20get%20from%20its%20blossoming%20ties%20with%20Russia.pdf"},{"id":"scmp-16","title":"Why China is attracting wealthy Gulf families in search of education, tech and business","source":"SCMP","date":"15 Jun 2026","tags":["Society","Finance & Markets","Geopolitics"],"summary":"Wealthy Gulf families are increasingly drawn to China for education, technology and business, reshaping travel to the world's second-largest economy, Middle East-focused tour operators say. One UAE family of eight spent about 300,000 yuan (US$44,228) on a seven-day educational-and-business tour in April despite Iran-war flight disruptions, while a 40-strong Abu Dhabi school group was most captivated by robotics showrooms, real-world AI and digital infrastructure. The China Culture Centre in the UAE reported over 150,000 GCC nationals visited China last year, a more than 100 per cent jump on 2024, aided by expanded visa-free policies and TikTok-driven perceptions. UFOX Travel's Lilian Liu said some clients now find concentrating wealth in the Middle East 'increasingly risky' and are exploring opening bank accounts and companies in China to diversify.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Why%20China%20is%20attracting%20wealthy%20Gulf%20families%20in%20search%20of%20education,%20tech%20and%20business.pdf"},{"id":"scmp-17","title":"Why gold may rebound 13% this year - and what could hold it back","source":"SCMP","date":"15 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"Gold may rise at least 13 per cent by year-end as central-bank demand persists and easing Middle East tensions dial back inflation expectations, money managers say. State Street sees a base case of US$4,750-US$5,500 an ounce by end-2026 and DWS forecasts US$5,400 by mid-2027, versus US$4,199.11 spot on Friday, down over 20 per cent from January's record after a 65 per cent run in 2025. The People's Bank of China bought 9.95 tonnes in May, its most in 15 months. T. Rowe Price turned tactically neutral, citing higher real yields and capital drain from AI infrastructure investment.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jun%202026/15%20Jun%20SCMP/Why%20gold%20may%20rebound%2013%25%20this%20year%20%E2%80%93%20and%20what%20could%20hold%20it%20back.pdf"}]},"2026-06-16":{"date":"2026-06-16","dayOfWeek":"Tuesday","totalArticles":67,"sourceCounts":{"WSJ":18,"ST":13,"BT":14,"SCMP":22},"executiveDigest":"The US and Iran reached a preliminary deal to reopen the Strait of Hormuz — signing set for June 19, sending Brent down about 5% — but it was widely judged fragile, as Israel vowed to keep troops in Lebanon and Gaza and Netanyahu announced a re-election run; meanwhile the BOJ moved to a 31-year-high rate, Kevin Warsh's first Fed meeting began, and SpaceX's afterglow fuelled a space-investing frenzy.","briefingCards":[{"title":"Lead story — A fragile US-Iran deal to reopen Hormuz","body":"Washington and Tehran reached a preliminary accord to reopen the Strait of Hormuz and lift the US naval blockade, with a formal signing set for June 19 in Switzerland and a 60-day window on Iran's nuclear programme; Brent fell about 5% to around US$83. But the deal was widely judged to 'resolve little': Israel said troops will stay in Lebanon, Gaza and Syria 'for an unlimited period', Netanyahu announced a re-election run, and hardline IRGC commander Ahmad Vahidi is driving Tehran's tough line. Western intelligence believes Iran rebuilt about three-quarters of its missiles during the prior ceasefire."},{"title":"Markets & finance — BOJ hikes, Warsh's Fed debut, oil slides","body":"The Bank of Japan is set to raise rates to a 31-year-high 1% (with governor Ueda hospitalised), as Kevin Warsh opens his Fed chairmanship at a June 16-17 FOMC expected to hold. Oil's ~5% drop on the Iran deal lifted Singapore's STI 1% to a record 5,077, with S-Reits, SIA and developers tipped as winners — though analysts say much relief is already priced in. A BlackRock private-credit fund faced 13% redemption requests, and US card delinquencies neared 2008 levels (if healthier underneath)."},{"title":"Asia realignment — minerals, navies and the China-NK card","body":"Japan and Italy agreed to deepen
