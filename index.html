ngwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%E2%80%99s%20power%20exports%20to%20Asean%20surge%2040%25%20in%20first%20half%20of%202026%20amid%20Hormuz%20tensions.pdf"}, {"id": "scmp-10", "title": "China's second-quarter GDP growth misses mark, with lowest reading since end of 2022", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Finance & Markets"], "summary": "China's second-quarter GDP grew 4.3 per cent year on year, missing the 4.48 per cent forecast and marking the slowest quarterly pace since end-2022, underscoring weak domestic demand and calls for stronger policy support. Growth decelerated from 5 per cent in the first quarter, bringing first-half expansion to 4.7 per cent against Beijing's \"4.5 to 5 per cent\" annual target. Exports stayed resilient, rising 27 per cent in June, but fixed-asset investment fell 5.7 per cent and property investment dropped 18 per cent in the first half. Retail sales rose 1 per cent, beating forecasts. Economists flagged a deepening divergence between external and domestic demand, urging swifter action. Analysts expect July's Politburo meeting to signal policymakers' second-half stance. Urban unemployment stood at 5 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%E2%80%99s%20second-quarter%20GDP%20growth%20misses%20mark,%20with%20lowest%20reading%20since%20end%20of%202022.pdf"}, {"id": "scmp-11", "title": "China's top lithium firms project up to 50-fold profit surge amid energy transition boom", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "China's two largest lithium producers expect first-half earnings to soar as global demand for energy independence powers the sector. Tianqi Lithium projected net profit of 2.85 billion to 4.25 billion yuan, a year-on-year jump of up to 4,935 per cent, citing sharply higher selling prices. Ganfeng Lithium forecast 3.65 billion to 4.6 billion yuan, reversing a year-earlier loss and ending two years of interim losses, aided by booming energy-storage and battery sales. Middle East conflict has driven demand for EVs and storage systems dominated by Chinese makers, while resource nationalism tightened lithium access, lifting lithium carbonate above 200,000 yuan per tonne in mid-May. Still, profitability trails 2023 levels, and both firms' Hong Kong shares have underperformed the Hang Seng Index this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/China%E2%80%99s%20top%20lithium%20firms%20project%20up%20to%2050-fold%20profit%20surge%20amid%20energy%20transition%20boom.pdf"}, {"id": "scmp-12", "title": "EU demands 'youth mode' to protect children from addictive social media features", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Society", "Technology & AI"], "summary": "EU lawmakers demanded a \"youth mode\" for children on social media, switching off addictive features and targeted advertising, as pressure grows for platforms to be safe by design before minors use them. The features of concern include infinite scroll, autoplay, push notifications and highly personalised recommender systems. Parliament's culture committee also urged an EU code of conduct for influencers and greater algorithmic transparency. A Monday expert report recommended restricting social media for under-13s to adult-supervised access. Commission chief Ursula von der Leyen backed setting a legal age and phased access, promising a legislative proposal after the summer break. Brussels recently told Facebook and Instagram to dismantle \"addictive\" features, following a similar warning to TikTok in February.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/EU%20demands%20%E2%80%98youth%20mode%E2%80%99%20to%20protect%20children%20from%20addictive%20social%20media%20features.pdf"}, {"id": "scmp-13", "title": "EU signals emergency import curbs after dramatic growth in Chinese trade gap", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "The EU is prepared to introduce emergency safeguard measures, including case-by-case tariffs and quotas, to counter China's export surge after new data showed the trade gap widening dramatically, deputy trade director general Denis Redonnet told the European Parliament. China's first-half trade surplus with the EU grew 23.7 per cent in dollar terms, and 80.8 per cent with Germany. Brussels expects no structural change from Beijing before an October deadline. German Chancellor Friedrich Merz accused China of artificially devaluing the yuan. Redonnet warned China's share of global manufacturing could rise from 37 to 45 per cent by 2030, describing \"industrial dominance\". The bloc recently opened an anti-dumping probe into Chinese Pekin ducks and imposed tyre duties, while pursuing a joint monitoring mechanism and further talks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/EU%20signals%20emergency%20import%20curbs%20after%20dramatic%20growth%20in%20Chinese%20trade%20gap.pdf"}, {"id": "scmp-14", "title": "How Beijing's islands of control are reshaping the South China Sea", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "A decade after The Hague's tribunal rejected China's expansive South China Sea claims, Beijing's island-building has effectively eclipsed the 2016 ruling, observers say. On Tree Island in the Paracels, China has built houses, offices, a prison, power stations and tourist infrastructure, part of a campaign to cement de facto control. In the Spratlys, artificial islands on seven reefs include the fully militarised \"Big Three\" - Fiery Cross, Mischief and Subi - with runways and missile batteries. Analyst Alexander Vuving said China now has huge leverage and could \"close the South China Sea at will\", though experts noted forward bases' wartime vulnerability. Vietnam has raced to match Beijing, adding 216 hectares since last year. New reclamation is under way at Antelope Reef; Scarborough Shoal remains a flashpoint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/How%20Beijing%E2%80%99s%20islands%20of%20control%20are%20reshaping%20the%20South%20China%20Sea.pdf"}, {"id": "scmp-15", "title": "Taiwan's opposition TPP launches historic first trip to mainland China", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Taiwan's opposition Taiwan People's Party sent its first formal delegation to mainland China since its 2019 founding, a nine-member group travelling to Shanghai for a four-day visit focused on youth exchanges, urban governance, AI and innovation. Delegation leader Lee Wei-hwa, chairman of the party's Central Review Committee, called the trip a milestone aimed at building goodwill and reducing cross-strait misunderstandings, saying \"the darker the moment, the more we cannot afford to lose communication\". Members will tour technology companies and meet students at Shanghai Jiao Tong University. TPP chairman Huang Kuo-chang said the visit centred on pragmatic dialogue anchored by founder Ko Wen-je's platform of \"Taiwan's autonomy and cross-strait peace\", stressing communication could coexist with defending Taiwan's democracy amid heightened tensions with Beijing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Taiwan%E2%80%99s%20opposition%20TPP%20launches%20historic%20first%20trip%20to%20mainland%20China.pdf"}, {"id": "scmp-16", "title": "Trump scraps Hormuz toll plan but presses ahead with Iran blockade", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "US President Donald Trump abandoned his plan to impose a 20 per cent charge on cargo passing through the Strait of Hormuz, less than a day after proposing it, saying trade and investment deals with Gulf states would replace the fee. He said unnamed governments had offered \"billions\" in US investment, though he gave no details. Trump had called the US the strait's \"guardian\"; the toll was widely criticised as unenforceable and at odds with freedom of navigation. Despite dropping it, Trump pressed ahead with a \"full blockade\" of Iranian trade, which CENTCOM reinstated. US forces struck Iranian coastal defences, and Iran retaliated against vessels, setting two UAE-linked ships ablaze and killing one mariner. China urged restoration of safe passage and restraint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/Trump%20scraps%20Hormuz%20toll%20plan%20but%20presses%20ahead%20with%20Iran%20blockade.pdf"}, {"id": "scmp-17", "title": "US inflation cools on brief ceasefire but Fed keeps rate hike option", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Finance & Markets"], "summary": "US consumer inflation cooled more than expected in June as energy prices retreated during a brief US-Iran ceasefire, but not enough to rule out a Federal Reserve rate increase this year. The Consumer Price Index fell 0.4 per cent monthly, its first decline since April 2020, and rose 3.5 per cent annually, down from May's 4.2 per cent, driven by a 5.7 per cent drop in energy prices and a 9.7 per cent plunge in petrol. Core inflation eased to 2.6 per cent. New Fed Chair Kevin Warsh told lawmakers the central bank had \"no tolerance for persistently elevated inflation\". With the ceasefire collapsed and a naval blockade reimposed, oil hit a four-week high; traders saw a 60 per cent chance of a September hike.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/US%20inflation%20cools%20on%20brief%20ceasefire%20but%20Fed%20keeps%20rate%20hike%20option.pdf"}, {"id": "scmp-18", "title": "US must act quickly to counter China's growing tech progress, lawmakers told", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China poses an existential threat and Washington must slow Beijing's momentum while accelerating US technological advances or fall behind, witnesses told a Congressional round table convened by a House Oversight subcommittee. Analysts urged expanding the \"Silicon Shield\" beyond semiconductors to drones and other technologies, cutting bureaucracy, prioritising quantum and countering China's push to set global standards. Piero Tozzi of the America First Policy Institute called China a \"systemic rival\" seeking to displace the US-led order. Hoover Institution's Glenn Tiffert said Beijing achieved technological parity through decades of industrial policy, technology transfers and openly acquired know-how, not just theft. Alex Epstein criticised the unstable US permitting system. Panellists noted China's state-directed model breeds duplication and corruption but also intense competitive pressure, exemplified by EV giant BYD.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/US%20must%20act%20quickly%20to%20counter%20China%E2%80%99s%20growing%20tech%20progress,%20lawmakers%20told.pdf"}, {"id": "scmp-19", "title": "US says Nvidia's H200 exports to China remain 'trivial' despite approvals", "source": "SCMP", "date": "15 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Only a \"very small quantity\" of Nvidia's H200 AI chips have reached mainland China and Hong Kong, US Under Secretary of Commerce Jeffrey Kessler told lawmakers, calling the volumes \"trivial\" in the first deliveries since Washington approved such sales. Trump cleared H200 exports in December, with roughly 10 Chinese firms, including Tencent and ByteDance, approved to buy; the more advanced Blackwell line stays banned. Democrat Gregory Meeks criticised the administration for adding no Chinese firms to the export blacklist since October 2025, the longest gap in over a decade, while Republican Brian Mast urged blacklisting more military-linked companies. Kessler stressed enforcing existing restrictions. The US and China agreed to hold AI-governance talks after the Xi-Trump May summit. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/15%20Jul%202026/15%20Jul%20SCMP/US%20says%20Nvidia%E2%80%99s%20H200%20exports%20to%20China%20remain%20%E2%80%98trivial%E2%80%99%20despite%20approvals.pdf"}]}, "2026-07-16": {"date": "2026-07-16", "dayOfWeek": "Thursday", "totalArticles": 71, "sourceCounts": {"WSJ": 25, "ST": 11, "BT": 14, "SCMP": 21}, "executiveDigest": "Oil surged the most since 2020 as markets bet the Strait of Hormuz won't return to normal - the US launched more strikes, hit a tanker breaking its blockade, and Trump pledged to escalate until Iran relents; yet US inflation cooled to 3.5% and big banks posted a red-hot quarter, while Singapore's DBS set a S$1 trillion AUM goal and IBM's 25% drop showed the AI boom claiming enterprise-tech victims.", "briefingCards": [{"title": "Lead story - Oil spikes as Hormuz blockade hardens", "body": "Oil surged the most since 2020, reflecting a market bet that the Strait of Hormuz won't return to normal. The US launched a fresh 'wave of strikes' on Iran - hitting a tanker trying to break its renewed blockade - as Trump pledged to keep escalating until Iran relents, and Iran threatened to close more vital seaways. Tankers carrying Iranian oil are seeking safe harbour in Pakistan. BP flagged further oil-trading gains from the volatility, and the US unveiled sea drones as its latest weapon against Iran. SCMP openly asked whether Trump is sliding into a Vietnam-style 'quagmire'."}, {"title": "Markets & finance", "body": "Despite the war, US inflation cooled to 3.5% in June as Americans caught a break on gas, and big banks' profits surged after a red-hot quarter on Wall Street. New Fed chair Kevin Warsh told Congress the central bank has 'no tolerance' for high inflation. But cracks showed in tech: IBM's 25% drop marked the AI boom's latest enterprise victim, data-centre builders are racing to offload billions in stakes, and OpenAI's mounting challenges are narrowing its IPO window. In Singapore, DBS set a target of S$1 trillion in assets under management by 2030, backed by an AI and hiring push."}, {"title": "Asia realignment", "body": "The balance of perceptions shifted: a Pew survey found global views of China and Xi Jinping improving as the US declines, a top Russian scientist called China the world's No. 1 science power, and WSJ argued Putin has gone from Xi's role model to his junior partner. The EU accused China of seeking to reshape the global order in a stark new strategy paper, and a Chinese report warned against a European-led 'NATO 3.0' expanding into the Asia-Pacific. China is also widening global access to yuan assets as panda-bond demand surges."}, {"title": "Energy & climate", "body": "Energy dominated: oil's spike, Trump teasing 'massive' oil deals with Iraq, and Malaysia noting higher prices will support its subsidy spending. Singapore's climate ambassador Ravi Menon declared 'energy is the new water', and President Tharman said Singapore and Malaysia share a vision for ASEAN to become a green-energy powerhouse. China's electric taxis are cushioning the oil-price shock at home. In the US, New York is set to temporarily ban large new data centres amid grid and resource strain, echoing warnings that AI growth may outrun power supply."}, {"title": "Technology & AI", "body": "The AI narrative turned more sober: BT warned AI-driven growth may stall as energy grids lag, China's People's Daily warned of an 'Iron Curtain' forming in global AI, and the US hardened its stance as Anthropic urged extending America's lead. DeepSeek is raising fresh capital at a roughly US$70-74 billion valuation ahead of an onshore IPO. Meta faced a staff lawsuit alleging AI-driven discriminatory layoffs and privacy blowback over its smartglasses flood, while Singapore's business leaders are actively positioning their AI-governance frameworks."}, {"title": "Singapore & SEA focus", "body": "DBS set an ambitious S$1 trillion AUM goal for 2030 on an AI and hiring drive, and Singapore's Q1 tourism receipts climbed 5.8% to S$8.6 billion on a quality-tourism push. A Frasers Property-led consortium won the Bayshore Drive mixed-use site with a S$2.13 billion bid, while CapitaLand Ascendas Reit divested Kim Chuan Telecommunications Complex for more than twice its purchase price; new private-home sales slowed in June amid a school-holiday lull. GovTech is restructuring toward technical roles, and Tharman championed an ASEAN green-energy vision with Malaysia."}], "keyMetrics": [{"value": "71", "label": "Articles curated today", "sub": "WSJ 25 · ST 11 · BT 14 · SCMP 21"}, {"value": "Since 2020", "label": "Oil's biggest surge", "sub": "Hormuz blockade hardens"}, {"value": "3.5%", "label": "US June CPI", "sub": "Cools on gas-price relief"}, {"value": "S$1t", "label": "DBS 2030 AUM goal", "sub": "AI and hiring push"}, {"value": "-25%", "label": "IBM shares", "sub": "AI boom's latest victim"}, {"value": "S$8.6b", "label": "SG Q1 tourism receipts", "sub": "Up 5.8%; quality push"}], "articles": [{"id": "wsj-01", "title": "America's Latest Weapon Against Iran: Sea Drones", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Defence", "Technology & AI", "Geopolitics"], "summary": "Three American drone boats sneaked into Iran's Bandar Abbas Naval Base on Sunday and blew up a submarine and ship-maintenance facility in a kamikaze mission, U.S. Central Command said, the first combat use of sea drones by American forces. The 24-foot Saronic Corsairs travel over 1,000 miles, carry 1,000-pound payloads, cost under $1 million each, and are built in Texas by Saronic, co-founded by ex-Navy SEAL Dino Mavrookas. Saronic raised $1.75 billion at a $9.25 billion valuation. The attack, amid the battle for the Strait of Hormuz, follows Ukraine's pioneering use of maritime drones since 2022. Centcom chief Adm. Brad Cooper started a regional AI and drone task force in 2021.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/America%E2%80%99s%20Latest%20Weapon%20Against%20Iran%20Sea%20Drones.pdf"}, {"id": "wsj-02", "title": "BP Sees Further Oil-Trading Gains as Iran Conflict Fuels Volatility", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "BP said Tuesday it expects higher second-quarter oil-trading results than the first quarter but lower upstream output, as the Iran conflict roils energy markets. The U.K. major will take a $1 billion hit from write-downs on gas and low-carbon transition businesses. Shares rose 3% in early European trading. Price lags in the Gulf of Mexico and UAE should add $1.8 billion-$2.1 billion to its oil-production segment. Quarterly upstream output is seen at 2.17-2.22 million barrels of oil equivalent daily, down from 2.34 million, on seasonal maintenance and Middle East disruption. Net debt is forecast at $22 billion-$23 billion, from $25.3 billion in March. New CEO Meg O'Neill navigates market and leadership turmoil.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/BP%20Sees%20Further%20Oil-Trading%20Gains%20as%20Iran%20Conflict%20Fuels%20Volatility.pdf"}, {"id": "wsj-03", "title": "Big Banks' Profits Surge After a Red-Hot Quarter on Wall Street", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets"], "summary": "JPMorgan, Goldman Sachs, Bank of America, Citigroup and Wells Fargo collectively earned more than $49 billion, a 39% jump from a year ago, beating estimates, with combined revenues up over a fifth. A Wall Street boom fueled by hot IPOs and volatility drove results; Goldman led SpaceX's IPO, doubling its equity-underwriting fees to nearly $1 billion. First-half M&A volume rose 72% in the U.S. and 45% globally, records in Dealogic data since 1995. JPMorgan's equity-markets revenue rose 86%; Goldman's equities revenue jumped 72%. Goldman stock rose 9% to a record; Citi fell over 5%. CEO Jamie Dimon warned inflation and deficits are \"shifting below the surface like tectonic plates.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Big%20Banks%E2%80%99%20Profits%20Surge%20After%20a%20Red-Hot%20Quarter%20on%20Wall%20Street.pdf"}, {"id": "wsj-04", "title": "CPI Data Report: Inflation Slowed to 3.5% in June, as Americans Got a Break From Gas Prices", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "U.S. consumer prices rose 3.5% in June from a year earlier, beating the 3.8% expected and improving from May's 4.2%, as gasoline prices dropped. Core prices, excluding food and energy, were flat month over month, the first such reading in more than five years; overall prices declined monthly for the first time in two years. Traders cut bets on a July Fed rate increase from about 40% to 17%; the Nasdaq rose 0.9%. Fed Chairman Kevin Warsh said the data doesn't mean \"mission accomplished.\" Gasoline was still up 27% year over year; software prices jumped over 17%, a record. Oil rebounded 14% in July, suggesting inflation relief may prove temporary.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/CPI%20Data%20Report%20Inflation%20Slowed%20to%203.5%25%20in%20June,%20as%20Americans%20Got%20a%20Break%20From%20Gas%20Prices.pdf"}, {"id": "wsj-05", "title": "China Aggressively Patrols Disputed Waters. Now the U.S. Coast Guard Is Moving In.", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence", "Southeast Asia"], "summary": "Six 154-foot U.S. Coast Guard fast-response cutters, previously in the Middle East, are now operating from Singapore and Subic Bay in the Philippines to challenge China's power in the western Pacific. Part of a reimagined \"expeditionary cutter squadron,\" they are approved to operate through at least September, the first time the smaller cutters have worked from Subic Bay. The deployment helps offset Navy vessels moved to the Iran war and deters Beijing over Taiwan and the South China Sea. China has invested heavily in its coast guard, including the world's longest patrol vessels. The U.S. Coast Guard's Force Design 2028 aims to add 15,000 personnel from about 46,000, backed by roughly $25 billion from Congress.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/China%20Aggressively%20Patrols%20Disputed%20Waters.%20Now%20the%20U.S.%20Coast%20Guard%20Is%20Moving%20In..pdf"}, {"id": "wsj-06", "title": "Corporate Bonds Have the Best Yields in Years. They Still Aren't Enough.", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets"], "summary": "Investment-grade U.S. corporate bonds maturing in at least 10 years yield just shy of 6%, per ICE BofA data, far above the sub-5% common after the 2008-09 crisis. But the yield spread over Treasurys on 10-plus-year bonds is only about half a point higher than on one-to-three-year bonds, near post-crisis lows versus a full point in 2022. Strategists say tight long-term pricing partly reflects scarce supply against strong demand from yield-hungry pensions and insurers. Risks include possible Fed rate hikes, a U.S. deficit still over 5% of GDP in 2025, and heavy AI-related borrowing. Amazon recently issued bonds maturing in 2066. Analysts warn spreads could widen, lowering bond values.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Corporate%20Bonds%20Have%20the%20Best%20Yields%20in%20Years.%20They%20Still%20Aren%E2%80%99t%20Enough..pdf"}, {"id": "wsj-07", "title": "Data-Center Builders Are Racing to Offload Stakes Worth Billions", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "U.S. data-center developers are working with bankers to sell majority stakes worth tens of billions this summer, pitching private-equity firms on AI-driven demand. Targets include Netrality, DataBank, Edged, EdgeCore and others. The DataBank sale, owned by a DigitalBridge-led consortium, could reach $25 billion; EdgeCore, owned by Partners Group, sought offers last week. KKR's Helix Digital Infrastructure is among evaluators. Nvidia's Jensen Huang estimated a gigawatt of new computing could soon cost $80 billion-$100 billion. In 2025, data-center M&A hit about $50 billion, more than double the prior year. Blackstone took a 49% stake in Rowan; a BlackRock/MGX consortium agreed to buy Aligned for about $40 billion. Local NIMBY opposition is rising.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Data-Center%20Builders%20Are%20Racing%20to%20Offload%20Stakes%20Worth%20Billions.pdf"}, {"id": "wsj-08", "title": "Ericsson Cautions on Lower Profitability Due to Rising Component Costs", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Ericsson warned Tuesday of weaker profitability in its networks business as North American sales declined and rising semiconductor and component costs, driven partly by AI demand, squeezed margins. The Swedish firm's networks unit posted a 4% organic sales decline in the second quarter, with an adjusted gross margin of 50.4%, guided to 48%-50% in the third quarter. Group EBIT fell to 5.92 billion Swedish kronor ($609 million) from 6.39 billion a year earlier; sales fell 6.1% to 52.69 billion kronor, below the 53.94 billion FactSet estimate. It marks CEO Borje Ekholm's final earnings report after nine years; networks head Per Narvinger takes over October 1. Ekholm cited pricing actions to offset cost inflation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Ericsson%20Cautions%20on%20Lower%20Profitability%20Due%20to%20Rising%20Component%20Costs.pdf"}, {"id": "wsj-09", "title": "European Defense Groups to Work on Ballistic-Missile Shield", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Destinus, MBDA, Safran, Airbus and Thales signed a letter of intent to form a consortium developing the Bliksem EXO system to intercept medium- and intermediate-range ballistic missiles above the atmosphere, aiming for a binding agreement within three months. Russia's invasion of Ukraine spurred European defense spending; the interceptor would also work against Russia's nuclear-capable hypersonic Oreshnik-class missiles. Destinus leads and builds the kill vehicle; MBDA Deutschland provides the booster, launcher and canister; Safran supplies the seeker; Airbus and Thales handle command, control and radar. The system complements NATO's Integrated Air and Missile Defence and the European Sky Shield Initiative. Engineering starts in August, with a kill-vehicle space test planned next year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/European%20Defense%20Groups%20to%20Work%20on%20Ballistic-Missile%20Shield.pdf"}, {"id": "wsj-10", "title": "Ford Executive Chairman on Chinese Cars: U.S. 'Can't Expect to Keep Them Out Forever'", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Trade", "Politics"], "summary": "Ford executive chairman Bill Ford said Tuesday at an Axios event in Washington that the U.S. auto industry must prepare to compete with China's carmakers, warning America \"can't expect to keep them out forever.\" His remarks come as a bipartisan bill effectively banning Chinese cars advances, with a Senate committee vote expected Wednesday; Ford Motor supports it. Chinese automakers like BYD and Geely, aided by state subsidies, more than doubled EV and hybrid exports in June to about 877,000 units. Ford is preparing a $30,000 all-electric pickup, built in Kentucky, for 2027 to counter cheap Chinese EVs. Geely-controlled Polestar quit the U.S. over connected-vehicle software rules. Ford urged a bipartisan industrial policy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Ford%20Executive%20Chairman%20on%20Chinese%20Cars%20U.S.%20%E2%80%98Can%E2%80%99t%20Expect%20to%20Keep%20Them%20Out%20Forever%E2%80%99.pdf"}, {"id": "wsj-11", "title": "IBM's 25% Drop Shows the Enterprise Tech Company Is AI Boom's Latest Victim", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "IBM shares fell more than 25% Tuesday, its largest one-day drop on record, wiping out $69 billion in market value after a rare profit warning. CEO Arvind Krishna said June clients shifted capital spending toward AI servers, storage and memory chips ahead of price increases, crowding out traditional tech budgets. Sales of the z17 mainframe fell short; IBM now expects infrastructure revenue to fall 7%. Rising chip costs, driven by a DRAM and NAND memory crunch at SK Hynix, Micron and Samsung, are squeezing bank customers' budgets. Software peers Salesforce, Workday, Adobe and ServiceNow ended down 2.1%, 3.5%, 4.3% and 5.8%. IBM also launched Anderon, seeded with $1 billion, for quantum-chip wafers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/IBM%E2%80%99s%2025%25%20Drop%20Shows%20the%20Enterprise%20Tech%20Company%20Is%20AI%20Boom%E2%80%99s%20Latest%20Victim.pdf"}, {"id": "wsj-12", "title": "Meta Is Flooding the Market With Smartglasses. Privacy Advocates Are Up in Arms.", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Meta is aggressively pushing AI-enabled smartglasses, made with EssilorLuxottica, as the next dominant non-smartphone device, selling seven million pairs in 2025 and planning a new Ray-Ban generation at its September developer conference. Products range from $299 non-Ray-Ban glasses to $499 Oakley sports models; Meta donated over 100,000 pairs to blind veterans and partnered with Kylie Jenner. Privacy advocates object: over 70 organizations signed an April letter demanding Meta halt its NameTag facial-recognition feature, with the ACLU saying \"your glasses should not know my name.\" Meta is also testing constant audio-visual capture without the recording light, and filed a patent to log users' moods. New York courthouses banned the devices this month.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Meta%20Is%20Flooding%20the%20Market%20With%20Smartglasses.%20Privacy%20Advocates%20Are%20Up%20in%20Arms..pdf"}, {"id": "wsj-13", "title": "Meta Workers Accuse It of Using AI to Conduct Discriminatory Layoffs", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "A group of 26 current and former Meta employees sued the company in the Northern District of California, alleging its spring layoffs of 8,000 workers, roughly 10% of staff, relied on a \"constellation of internal artificial-intelligence systems\" that disproportionately cut workers with disabilities or on protected leave. The suit claims AI metrics like productivity and AI-token use targeted those absent for medical or family reasons, violating discrimination laws. One plaintiff on pregnancy leave was told of her layoff two days before giving birth. Plaintiffs seek a preliminary injunction pending arbitration. A Meta spokesman rejected the allegations, saying decisions were made by people, not AI, and \"these claims lack merit.\" It is among the first U.S. suits scrutinizing AI in layoffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Meta%20Workers%20Accuse%20It%20of%20Using%20AI%20to%20Conduct%20Discriminatory%20Layoffs.pdf"}, {"id": "wsj-14", "title": "New York Set to Temporarily Ban Large New Data Centers", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Environment", "Politics"], "summary": "New York Gov. Kathy Hochul, a Democrat, was set to sign an executive order Tuesday halting construction of large new data centers for up to a year, making New York the first state to enact such a freeze. The moratorium applies to data centers with capacities of at least 50 megawatts, exempting hospitals and universities, and gives the state time to write regulations protecting the environment and energy grid. Communities nationwide have protested data centers over utility bills and power strain, fueling an anti-AI movement. Hochul, running for re-election in November, ordered officials to study how communities can benefit financially and wants to end sales-tax subsidies for data centers. Maine's governor vetoed a similar bill earlier this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/New%20York%20Set%20to%20Temporarily%20Ban%20Large%20New%20Data%20Centers.pdf"}, {"id": "wsj-15", "title": "Oil Surges Most Since 2020, Reflecting Bet That Strait Won't Go Back to Normal", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Energy", "Geopolitics", "Finance & Markets"], "summary": "Renewed weekend fighting and President Trump's reimposition of the U.S. blockade on Iranian shipping through the Strait of Hormuz pushed Brent and U.S. crude up more than 10%, the largest daily gain since May 2020. Brent jumped 13% for the week, trading above $86 a barrel after Iran attacked two tankers. Markets revived the \"NACHO trade\" (Not a Chance Hormuz Opens), betting the route carrying about 20% of the world's oil stays largely shut. Gulf producers plan pipelines to bypass Hormuz; Goldman Sachs estimates over 45% of prewar Gulf exports could reroute by end-2027. The U.S. Strategic Petroleum Reserve sits at its lowest since 1983. Over 34 million barrels of Iranian crude moved through since June 18.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Oil%20Surges%20Most%20Since%202020,%20Reflecting%20Bet%20That%20Strait%20Won%E2%80%99t%20Go%20Back%20to%20Normal.pdf"}, {"id": "wsj-16", "title": "On Bastille Day, Macron Offers Spectacle of European Military Might", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "At Tuesday's Bastille Day parade in Paris, French President Emmanuel Macron staged a celebration of European unity and military might, featuring 500 soldiers from the \"coalition of the willing\" backing Ukraine. UK PM Keir Starmer, German Chancellor Friedrich Merz and Ukraine's Volodymyr Zelensky attended. Macron and Zelensky announced Ukraine access to advanced French technology, including Rafale jets, and rights to produce Aster 30 antiaircraft missiles domestically; ten coalition members created an antiballistic missile coalition. It is Macron's last Bastille Day parade as president. Despite his push for European \"strategic autonomy,\" efforts remain hamstrung by discord: France and Germany abandoned a stealth-fighter plan last month, and U.S. F-35s and F-16s still flew overhead.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/On%20Bastille%20Day,%20Macron%20Offers%20Spectacle%20of%20European%20Military%20Might.pdf"}, {"id": "wsj-17", "title": "OpenAI's Growing Challenges Narrow Its IPO Window", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "OpenAI faces an IPO dilemma as its position weakens. Its Microsoft relationship has grown distant, ChatGPT is no longer the clear market leader, and rival Anthropic has surpassed OpenAI in private-market valuation. Though OpenAI won a court battle with Elon Musk in May, the lawsuit exposed internal workings, and Apple sued Friday alleging trade-secret theft, threatening OpenAI's device growth strategy. OpenAI filed IPO paperwork last month, with pressure to move fast to beat Anthropic, which filed to go public earlier, for investor capital. Yet waiting might be wiser given legal challenges and the departure of Altman's number-two executive for medical reasons. Analyst Asa Fitch argues the mounting troubles strengthen the case to move quickly and raise money.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/OpenAI%E2%80%99s%20Growing%20Challenges%20Narrow%20Its%20IPO%20Window.pdf"}, {"id": "wsj-18", "title": "Putin Was Xi's Role Model. Now He's the Junior Partner.", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Four years of war and isolation have made Vladimir Putin a supplicant to Xi Jinping, whom he once called a \"role model.\" On his 14th China trip in May, Putin signed 42 agreements but failed to secure the Power of Siberia 2 gas pipeline; Beijing demanded Russia sell gas at below-market domestic rates. China now accounts for nearly 40% of Russia's trade, versus about 10% in 2013; Russia is under 4% of China's. Beijing keeps Russia's war economy running by buying discounted oil and supplying components. Analysts say China may never sign the pipeline as its gas imports peak in the mid-2030s. Beijing is also uneasy over Russia's deepening ties with North Korea; Xi visited Pyongyang in June.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Putin%20Was%20Xi%E2%80%99s%20Role%20Model.%20Now%20He%E2%80%99s%20the%20Junior%20Partner..pdf"}, {"id": "wsj-19", "title": "Startup Mass-Producing Cheap Killer Drones Wins $500 Million Army Contract", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Defence", "Technology & AI"], "summary": "Neros, founded in 2023 by drone hobbyists Olaf Hichwa, 24, and Soren Monroe-Anderson, 23, won a Defense Department contract worth up to $500 million to supply first-person-view attack drones to the Army, the service's largest-ever small-FPV deal. The Army aims to lift drone purchases from about 50,000 to at least one million a year within two years. Neros builds 1,200 drones weekly in Southern California, targeting one million annually by 2028. Its Archer drone costs about $2,000, or $5,000 armed, achieving price parity with banned Chinese DJI models. Investors have put $121 million into Neros, including Sequoia's Shaun Maguire. Defense Secretary Pete Hegseth's $1.1 billion Drone Dominance initiative seeks 300,000 low-cost drones by 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Startup%20Mass-Producing%20Cheap%20Killer%20Drones%20Wins%20%24500%20Million%20Army%20Contract.pdf"}, {"id": "wsj-20", "title": "The Americans Striking It Rich in the Data-Center Buildout", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "In Salem Township, Pennsylvania, 96 families collectively sold about 1,700 acres to data-center developer QTS, an arm of Blackstone, for $586 million, averaging $330,000 an acre and $5.5 million per family. Marilee and David Kiliti sold their 89-acre hog farm for more than $22 million. The land's value stems from existing transmission lines and substation infrastructure near gas and nuclear plants. A neighboring deal is in the works: 200 sellers eyeing $1.3 billion, organized by developer Jack Sordoni's firm 4-3 Consulting. Luzerne County's median household income is under $64,000. While sellers celebrate with printed T-shirts and new homes, nearby residents like Stephanie Black fight proposed data centers, warning \"you just sold out your entire town.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/The%20Americans%20Striking%20It%20Rich%20in%20the%20Data-Center%20Buildout.pdf"}, {"id": "wsj-21", "title": "The Meaning of the Warsh Task Forces", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The Wall Street Journal editorial board argues the real action at the Fed lies in the five reform task forces Chairman Kevin Warsh has created, whose leadership was announced late last week. The heavyweight roster includes former Bank of England Governor Mervyn King on communications, Harvard's Greg Mankiw on inflation, former Walmart CEO Doug McMillon on data quality, and Marc Andreessen and Microsoft's Asha Sharma on productivity. The balance-sheet panel pairs Raghuram Rajan with Harvard's Jeremy Stein and Karen Dynan, signaling genuine debate rather than a rubber stamp. Each task force will produce a public report. The board says the panels are the Fed's best chance in years to rebuild credibility after missing the worst inflation surge in 40 years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/The%20Meaning%20of%20the%20Warsh%20Task%20Forces.pdf"}, {"id": "wsj-22", "title": "U.A.E. Rewarded With Coveted AI Chips for Supporting U.S. War in Iran", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Politics"], "summary": "The UAE gained expanded U.S. access to advanced AI chips after aiding America against Iran, carrying out dozens of airstrikes, intercepting hundreds of missiles and keeping oil moving through the Strait of Hormuz. Under a Trump rule announced Friday, the UAE will be treated like European countries, South Korea and India, up from a group including China. The change lets AI company G42, controlled by national-security adviser Sheikh Tahnoon bin Zayed Al Nahyan, buy Nvidia chips freely for nine months, and frees Microsoft and OpenAI data-center plans. It drew scrutiny: Tahnoon invested $500 million for a 49% stake in the Trump family's World Liberty Financial, from which Trump reported $263 million. One lawmaker called it a possible \"pay-to-play scheme.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/U.A.E.%20Rewarded%20With%20Coveted%20AI%20Chips%20for%20Supporting%20U.S.%20War%20in%20Iran.pdf"}, {"id": "wsj-23", "title": "U.S. Small Business Confidence Improved in June", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets"], "summary": "The National Federation of Independent Business said Tuesday its small-business optimism index rose 2.1 points in June to 97.4, above the 95.7 economists polled by The Wall Street Journal expected, as lower fuel costs provided relief. Small businesses account for nearly half of private-sector jobs. The net share of owners expecting better conditions over the next six months rose 10 points to 13%, improving for the first time this year. The net percent raising average selling prices rose for a fourth consecutive month, the highest since January 2023, while the share planning future price increases declined. NFIB Chief Economist Bill Dunkelberg said high interest rates and modest growth still make owners cautious on hiring and capital spending.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/U.S.%20Small%20Business%20Confidence%20Improved%20in%20June.pdf"}, {"id": "wsj-24", "title": "Warsh Tells Congress the Fed Has 'No Tolerance' for High Inflation", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Fed Chairman Kevin Warsh pledged to the House Financial Services Committee on Tuesday that policymakers \"have no tolerance for persistently elevated inflation,\" faulting the central bank for five years above its 2% target. Testifying for three hours the same morning consumer prices fell in June, he warned against declaring \"mission accomplished.\" Warsh, a Fed governor from 2006-2011 who arrived in May, said little on rate direction, arguing the Fed shouldn't telegraph moves. He promised to set rates without political factors after Trump's unprecedented pressure on predecessor Jerome Powell. Warsh devoted heavy attention to the AI build-out's growth potential and defended his five reform task forces, insisting \"there's going to be nothing held in secret here.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/Warsh%20Tells%20Congress%20the%20Fed%20Has%20%E2%80%98No%20Tolerance%E2%80%99%20for%20High%20Inflation.pdf"}, {"id": "wsj-25", "title": "What's in Lindsey Graham's Russia-Tariffs Bill", "source": "WSJ", "date": "16 Jul 2026", "tags": ["Geopolitics", "Trade", "Politics"], "summary": "A bill championed by the late Sen. Lindsey Graham, expected in Congress this week, would give President Trump authority to impose up to 100% tariffs on the top five buyers of Russian oil and gas, with China and India atop the list, to punish Moscow over Ukraine. Co-drafted by Sen. Richard Blumenthal, it also sanctions Russian defense, energy and financial targets and the shadow fleet. It would be the first time Congress authorized tariffs as an explicit geopolitical weapon. An earlier version proposed 500% tariffs, but the White House sought flexibility. Top 2025 Russian crude buyers were China, India, Slovakia, Hungary and Azerbaijan. Passage faces a \"blue slip\" hurdle requiring revenue bills to originate in the House.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20WSJ/What%E2%80%99s%20in%20Lindsey%20Graham%E2%80%99s%20Russia-Tariffs%20Bill.pdf"}, {"id": "st-01", "title": "'Like my lover': Chinese users bid farewell to AI companions", "source": "ST", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Chinese users of AI companion bots posted heart-rending farewells as national rules took effect on July 15 to curb emotional dependency. The regulations, jointly issued by five departments including the Cyberspace Administration of China, bar tools that \"excessively cater to users\" or damage real relationships. Major providers, including ByteDance's Doubao, Alibaba's Qwen and Tencent's Yuanbao, suspended custom AI agent and companion features, sparking an outpouring of grief online. One Doubao user wrote, \"I can't accept that my AI lover will leave me.\" The rules ban virtual partners for minors and require crisis-intervention systems. China is the first major jurisdiction targeting immersive romantic AI. Its digital-human industry was worth about 4.1 billion yuan in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/'Like%20my%20lover'%20Chinese%20users%20bid%20farewell%20to%20AI%20companions.pdf"}, {"id": "st-02", "title": "Are Singapore REITs still attractive dividend plays?", "source": "ST", "date": "16 Jul 2026", "tags": ["Finance & Markets"], "summary": "Singapore's $100 billion REIT market is expected to stay resilient despite interest-rate volatility under new US Federal Reserve chairman Kevin Warsh, with analysts saying framework refinements and new listed real-estate vehicles could bolster long-term appeal. The market, Asia's largest excluding Japan, spans roughly 40 trusts. The Fed held rates at 3.5 to 3.75 per cent at Warsh's first June meeting, and June minutes showed officials favouring a hike toward the 2 per cent inflation target. Warsh has criticised \"forward guidance\" as excessive, which analysts warn could raise volatility. REITs are rate-sensitive because they rely on debt; higher borrowing costs cut distributable income. Investor David Ong remains committed despite slow growth. Traders eye the July 28-29 meeting.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Are%20Singapore%20REITs%20still%20attractive%20dividend%20plays.pdf"}, {"id": "st-03", "title": "China's economy slows, exposing widening divide between exports and domestic demand", "source": "ST", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "China's economy grew 4.3 per cent in the second quarter of 2026, its slowest since late 2022 and below forecasts, as weak consumer spending, property and investment outweighed resilient exports and industrial output. Data released July 15 showed cooling from 5 per cent first-quarter growth. Economists describe a \"K-shaped\" economy, with AI-linked exports of chips, computers and power equipment driving growth while domestic demand lags. Moody's economist Sarah Tan said strong external demand is \"cushioning, but not reversing\" domestic softness. First-half growth was 4.7 per cent, keeping Beijing near its 4.5-5 per cent annual target. Fixed-asset investment fell 5.7 per cent in the first half, a sharper drop than expected, amid a weak labour market and property downturn.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/China's%20economy%20slows,%20exposing%20widening%20divide%20between%20exports%20and%20domestic%20demand.pdf"}, {"id": "st-04", "title": "China's electric taxis cushion oil price shock", "source": "ST", "date": "16 Jul 2026", "tags": ["Energy", "Environment"], "summary": "China has an increasingly important buffer against oil-price shocks: electric taxis. Ride-hailing and taxi use are booming, with 3.05 billion trips in May, up 6 per cent since the Iran war began in late February 2026. Fares are falling despite rising petrol prices as jobless drivers flood the market and cheap EVs cut costs, drawing passengers seeking savings. About half of China's 1.3 million taxis are electric, nearing 100 per cent in major cities. Didi's non-fossil fleet reached eight million cars. China burned 10 per cent less petrol and 14 per cent less diesel in May year-on-year, and oil imports fell 41 per cent in June. Greenpeace forecasts 90 per cent of taxi mileage electric by 2035.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/China's%20electric%20taxis%20cushion%20oil%20price%20shock.pdf"}, {"id": "st-05", "title": "Chinese state paper People's Daily warns of 'Iron Curtain' developing in world AI", "source": "ST", "date": "16 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's People's Daily warned of an \"AI Iron Curtain\" dividing the world, pledging Beijing would share AI advances while resisting attempts to monopolise the technology, in a commentary setting the tone for President Xi Jinping's tech-summit keynote. The editorial opposed using AI for hegemony or tech barriers, contrasting an \"oil mindset\" of hoarding data and computing with a shared \"water\" approach. It followed US pressure on labs like Anthropic to curb foreign access, and reports Beijing weighs similar curbs on its top models. Chinese developers such as DeepSeek, Alibaba's Qwen and Zhipu's GLM embrace open-source. The paper noted AI is inherently cross-border. China plans to leverage the World Artificial Intelligence Conference. Anthropic still bars Chinese developers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Chinese%20state%20paper%20People's%20Daily%20warns%20of%20'Iron%20Curtain'%20developing%20in%20world%20AI.pdf"}, {"id": "st-06", "title": "GovTech restructuring signals shift towards technical roles", "source": "ST", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "GovTech's restructuring reflects a broader shift toward hands-on technical workers who deliver business outcomes as administrative tasks get automated, recruitment experts said. On July 15 the Government Technology Agency announced it had retrenched 93 staff and expects 7 to 9 per cent of roles affected by restructuring over two years. GovTech has about 3,900 employees, excluding Open Government Products. Project-delivery and vendor-management staff are among those hit, functions increasingly folded into leaner, product-led teams. ManpowerGroup's Linda Teo cited less reliance on middle management. Michael Page's Anurag Garg said firms want in-house capability to \"own risk\" rather than outsource judgment. Robert Walters' Felicia Romli called the cut notable given GovTech's frontline tech role, urging workforce and skills evolution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/GovTech%20restructuring%20signals%20shift%20towards%20technical%20roles.pdf"}, {"id": "st-07", "title": "Second China Shock? Wait till you see Version 3.0", "source": "ST", "date": "16 Jul 2026", "tags": ["Trade", "Southeast Asia", "Geopolitics"], "summary": "In this column, Ravi Velloor warns a \"second China shock\" in services may follow the manufacturing wave already battering economies. Singapore financiers touring China marvelled at Tencent-founded WeBank, whose customer-acquisition cost fell to 2 yuan (38 Singapore cents) per person. Chinese exports hit a record US$412 billion in June, exceeding US$2 trillion for the first half, aided by a record one million EVs sold overseas. Within ASEAN, Indonesia's textiles and Thailand's auto and ceramics industries are reeling, and Muar furniture makers have folded. Indonesia's middle class has shrunk for six years, and Thailand faces premature deindustrialisation. Luxembourg's PM called China an \"existential threat,\" and Germany's Merz blamed an undervalued yuan for industrial distress.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Second%20China%20Shock%20Wait%20till%20you%20see%20Version%203.0.pdf"}, {"id": "st-08", "title": "Singapore and Malaysia share vision for ASEAN to become green energy powerhouse: President Tharman", "source": "ST", "date": "16 Jul 2026", "tags": ["Energy", "Southeast Asia"], "summary": "Singapore and Malaysia are \"leaning forward\" on ASEAN and share a vision for the bloc to become a powerhouse for green energy and data centres, President Tharman Shanmugaratnam said on July 15, on the final day of his Malaysia state visit. He cited \"a good meeting of minds\" with Sultan Ibrahim Iskandar and Malaysian leaders on bilateral ties, ASEAN and global issues. Member states could join forces on green energy, processing power and the digital economy, strengthening the grouping in a fragmenting world. Both agree on upholding UNCLOS and toll-free passage through the Malacca and Singapore straits. They also want to avoid being forced into a US- or China-led bloc. Singapore assumes the ASEAN chair in 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Singapore%20and%20Malaysia%20share%20vision%20for%20ASEAN%20to%20become%20green%20energy%20powerhouse%20President%20Tharman.pdf"}, {"id": "st-09", "title": "Trump is driving another nail into the coffin of US science", "source": "ST", "date": "16 Jul 2026", "tags": ["Politics", "Society"], "summary": "A proposed White House rule threatens US science, letting political appointees review federal research grants to ensure they \"demonstrably advance the President's priorities\" and terminate those deemed off-line, even ongoing clinical trials. The Office of Management and Budget's Regulation for Federal Financial Assistance could take effect in October, adding curbs on international collaborations and diversity- or gender-related grants. The consultation drew 300,000 comments and vigorous opposition; the American Physical Society and over 30 professional groups objected, and 57 patient groups urged Congress to block it. Five agencies share over US$180 billion in annual federal R&D. Critics say it overrides peer review and harms global cooperation. Nobel laureate Omar Yaghi left Berkeley for Tsinghua.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Trump%20is%20driving%20another%20nail%20into%20the%20coffin%20of%20US%20science.pdf"}, {"id": "st-10", "title": "Trump teases 'massive' oil deals with Iraq during visit from PM", "source": "ST", "date": "16 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "President Donald Trump said \"massive\" new oil deals with Iraq would be announced soon as he hosted Iraqi Prime Minister Ali al-Zaidi at the White House on July 14, hailing more US business there. Trump promised \"a lot of deals\" within a week or two but gave no details, describing them as \"among the largest.\" The deals would boost al-Zaidi, who seeks US investment to raise oil and gas capacity. The visit comes as the US and Iran clash over the Strait of Hormuz, whose closure hit Iraq's finances hard. Iraq is pressing OPEC for bigger quotas and has floated exiting the cartel. Trump sidestepped backing that push, seeking to curb Iranian influence in Baghdad.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/Trump%20teases%20'massive'%20oil%20deals%20with%20Iraq%20during%20visit%20from%20PM.pdf"}, {"id": "st-11", "title": "US reports 'wave of strikes' on Iran", "source": "ST", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "The United States launched a \"wave of strikes\" against Iran on July 15 after reimposing a naval blockade, resuming war nearly a month after both signed a memorandum toward ending the conflict that began in February. Iran's Revolutionary Guards said they targeted the US Fifth Fleet in Bahrain, while Jordan downed three missiles. CENTCOM said the strikes aimed to degrade Iranian capabilities used against commercial shipping in the Strait of Hormuz. Trump threatened to widen attacks on power plants and bridges unless Tehran returns to talks, telling Fox News, \"Next week it gets really bad for them.\" Iran reported explosions near Bandar Abbas, Qeshm and Bushehr. Trump backed down on a planned 20 per cent levy on ships using the strait.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20ST/US%20reports%20'wave%20of%20strikes'%20on%20Iran.pdf"}, {"id": "bt-01", "title": "AI-driven growth may run out of steam as energy grids struggle to keep up with innovation", "source": "BT", "date": "16 Jul 2026", "tags": ["Technology & AI", "Energy", "Finance & Markets"], "summary": "Standard Chartered global research head Eric Robertsen warned that AI innovation risks outrunning available energy and grid capacity, a growing headwind for economies buoyed by AI capex. He cited New York becoming the first US state to impose a moratorium on new AI data centres after over 70 per cent of polled residents opposed them. Tech firms are building their own power sources, prompting community pushback. Hyperscalers' planned investments are seen hitting US$650 billion-US$725 billion in 2026. Chief economist Edward Lee said AI-related demand drove 1.35 of the US' 1.6 per cent Q1 GDP growth, and around 40 per cent of Singapore's H1 growth, making AI capex \"more of a risk than a baseline.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/AI-driven%20growth%20may%20run%20out%20of%20steam%20as%20energy%20grids%20struggle%20to%20keep%20up%20with%20innovation.pdf"}, {"id": "bt-02", "title": "CapitaLand Ascendas Reit to divest Kim Chuan Telecommunications Complex for more than twice its acquisition price", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "CapitaLand Ascendas Reit (Clar) is divesting Kim Chuan Telecommunications Complex, a 10-storey data centre at 38 Kim Chuan Road, for about S$200.4 million to an unrelated third party. The price is more than double the S$100 million Clar paid in March 2005, and a 32 per cent premium to its end-June valuation of S$151.8 million. The single-tenant property's lease ended April 30, 2026. Net proceeds of about S$180 million may fund investments, repay debt or distributions. CEO William Tay said the sale enhances financial flexibility for accretive opportunities. Pro forma leverage would fall to 41.4 per cent from 42 per cent. Completion is expected by H2 2026. Units closed unchanged at S$2.49.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/CapitaLand%20Ascendas%20Reit%20to%20divest%20Kim%20Chuan%20Telecommunications%20Complex%20for%20more%20than%20twice%20its%20acquisition%20price.pdf"}, {"id": "bt-03", "title": "China new home prices decline at slower pace in June amid improvement in key cities", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China's new home prices fell 0.1 per cent month-on-month in June, easing from May's 0.2 per cent drop, while annual declines narrowed to 3.3 per cent, per Reuters calculations on official data. The housing slump, now in its fifth year, continues to constrain consumption. Q2 GDP growth slowed to 4.3 per cent year-on-year, missing expectations. Economists expect weak demand to persist as Beijing refrains from major stimulus. Tier-one cities showed modest gains, but smaller cities kept struggling. Moody's economist Sarah Tan warned external headwinds are intensifying and resilient exports \"cannot carry the economy alone.\" Morningstar's Jeff Zhang said July's Politburo meeting was unlikely to deliver major stimulus, favouring city-specific measures instead.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/China%20new%20home%20prices%20decline%20at%20slower%20pace%20in%20June%20amid%20improvement%20in%20key%20cities.pdf"}, {"id": "bt-04", "title": "China's DeepSeek to raise fresh capital at US74 billion valuation ahead of onshore IPO", "source": "BT", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Geopolitics"], "summary": "Chinese AI startup DeepSeek is planning a fresh fundraising round valuing it at about 500 billion yuan (US$74 billion), ahead of a potential mainland IPO, sources said. It aims to raise as much as 50 billion yuan, weeks after a June round that raised about US$7.4 billion at a 450 billion yuan post-money valuation. The Hangzhou-based firm has begun early deliberations for a listing on Shanghai's Star Market, targeting an IPO filing this year. Rising costs of frontier AI, including computing power and a planned in-house inference chip, forced founder Liang Wenfeng to abandon self-funding. June backers included Tencent, CATL, China's national AI fund, NetEase and JD.com, underscoring DeepSeek's strategic importance to Beijing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/China's%20DeepSeek%20to%20raise%20fresh%20capital%20at%20US74%20billion%20valuation%20ahead%20of%20onshore%20IPO.pdf"}, {"id": "bt-05", "title": "DBS targets S1 trillion in AUM by 2030 as it steps up AI, hiring push", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "DBS aims to accumulate more than S$1 trillion in assets under management across retail and wealth segments by 2030, doubling down on AI, partnerships and regional expansion. South-east Asia's largest bank plans to hire 600 more front-line advisers and platform engineers by end-2028, said group head of consumer banking and wealth Shee Tse Koon. Its earlier S$500 billion wealth AUM target already hit S$492 billion by Q1. AI investments cut name-screening time 75 per cent and lifted new high-net-worth clients 20 per cent. The digiWealth platform drove a fivefold rise in financial-planning enquiries. DBS also signed an MOU with Samsung Securities to access South Korea's market and seeks more ecosystem partnerships.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/DBS%20targets%20S1%20trillion%20in%20AUM%20by%202030%20as%20it%20steps%20up%20AI,%20hiring%20push.pdf"}, {"id": "bt-06", "title": "Energy is the new water, says climate ambassador Ravi Menon", "source": "BT", "date": "16 Jul 2026", "tags": ["Energy", "Southeast Asia", "Environment"], "summary": "Singapore's climate action ambassador Ravi Menon said Asean must devise policy responses that let energy be traded so all parties benefit, arguing \"energy is the new water\" as scarcity drives responses. Speaking at RSIS after a lecture on geo-economics, he urged the region to reimagine itself around energy trade the way it once built infrastructure for goods and services. He championed the long-discussed Asean Power Grid, an interconnected cross-border network letting renewable-deficit countries buy from surplus states. Singapore has given conditional approvals for cross-border low-carbon electricity projects in Indonesia and Vietnam. Menon said the semiconductor supply-chain bifurcation over national security is unlikely to affect Asean's power grid, as chipmaking is concentrated in few markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Energy%20is%20the%20new%20water,%20says%20climate%20ambassador%20Ravi%20Menon.pdf"}, {"id": "bt-07", "title": "Frasers Property-led consortium outbids two others with S2.13 billion offer for Bayshore Drive mixed-use site", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A consortium led by Frasers Property, with Frasers Centrepoint Trust, Sunway MCL, Sekisui House and Lum Chang, placed the top bid of nearly S$2.13 billion (about S$1,323 psf ppr) for the Bayshore Drive mixed-use site, winning the state tender that drew three bids. The offer was 5.8 per cent above a City Developments-led bid of S$2.01 billion; a CapitaLand-UOL tie-up bid nearly S$1.99 billion. The 618,500 sq ft, 99-year leasehold plot will yield up to 1,280 private homes integrated with the upcoming Bedok South MRT station, a bus interchange and a retail mall. It is the second GLS site in the Bayshore precinct, envisioned as the neighbourhood centre for a waterfront district of about 10,000 homes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Frasers%20Property-led%20consortium%20outbids%20two%20others%20with%20S2.13%20billion%20offer%20for%20Bayshore%20Drive%20mixed-use%20site.pdf"}, {"id": "bt-08", "title": "How Singapore's business leaders are positioning AI governance", "source": "BT", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society", "Finance & Markets"], "summary": "This commentary argues AI governance in businesses lags fast-developing technology, likened to fixing a plane while flying it. Drawing on analysis of large firms and SMEs, the author proposes three perspectives: return, risk and responsibility. Return centres on profitability and return on escalating AI investment; risk covers hallucinations, bias and loss of human control; responsibility spans privacy, safety, accountability and worker displacement. Larger adopters like DBS and Keppel manage all three, while SMEs focus mainly on return. DBS, named \"World's Best AI Bank\" in 2025, runs over 1,500 AI models across 370-plus use cases with over S$1 billion projected impact, and validates high-impact models for bias. Keppel uses GenAI for investment, research and data-centre operations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/How%20Singapore's%20business%20leaders%20are%20positioning%20AI%20governance.pdf"}, {"id": "bt-09", "title": "Kuroda's negative rate surprise shocked his own BOJ board, minutes show", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Newly released Bank of Japan minutes show its 2016 introduction of negative rates drew intense internal criticism, with dissenters calling it half-baked and risky. The decision, approved 5-4, exposed the resistance former chief Haruhiko Kuroda faced. Board member Takehiro Sato warned the 0.1 per cent charge on some deposits could spark a rate-cut competition with the ECB, calling it a \"futile game.\" Koji Ishida doubted it would boost lending, while Sayuri Shirai said the economy was not weak enough to justify such a radical step. The move stunned markets, coming days after Kuroda ruled it out in parliament. The BOJ ended negative rates in 2024; current chief Kazuo Ueda has since raised rates, hiking to 1 per cent in June.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Kuroda's%20negative%20rate%20surprise%20shocked%20his%20own%20BOJ%20board,%20minutes%20show.pdf"}, {"id": "bt-10", "title": "Malaysia says higher energy prices will support subsidy spending", "source": "BT", "date": "16 Jul 2026", "tags": ["Energy", "Southeast Asia", "Politics"], "summary": "Malaysia said higher global energy prices are boosting petroleum revenues enough to cover part of its rising fuel subsidy costs, easing pressure on government finances. The government could spend up to RM40 billion (US$9.83 billion) on fuel subsidies this year, far above the RM15 billion initially set aside in its 2026 Budget, amid higher energy prices linked to the Middle East conflict. Deputy Finance Minister Liew Chin Tong told parliament every US$1 per barrel change in crude prices affects federal petroleum revenue by around RM300 million, excluding Petronas dividends. He said the extra revenue helps offset subsidy pressure, and any review of 2026 fiscal targets would be announced in the federal Budget due in October.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Malaysia%20says%20higher%20energy%20prices%20will%20support%20subsidy%20spending.pdf"}, {"id": "bt-11", "title": "New private home sales slow in June as launches dry up amid school-holiday lull", "source": "BT", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia", "Society"], "summary": "Singapore developers sold 156 private homes in June, down 42.6 per cent from 272 a year earlier and about a third of May's 447 units, URA data showed. No new private homes were launched in June, a first since records began in 2007. Including ECs, 184 units sold with no launches. Q2's tally reached 2,151 units; H1 2026 sales totalled 4,164, down 9.2 per cent year-on-year but more than double H1 2024. Analysts attributed the lull to the June school holidays, a smaller launch pipeline and developers awaiting reaction to new EC restrictions. A rebound is expected in July with launches of the 499-unit Lentor Gardens Residences and 380-unit Dunearn House, both drawing strong preview turnout.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/New%20private%20home%20sales%20slow%20in%20June%20as%20launches%20dry%20up%20amid%20school-holiday%20lull.pdf"}, {"id": "bt-12", "title": "Singapore tourism receipts climb 5.8 to S8.6 billion in Q1 amid quality tourism push", "source": "BT", "date": "16 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets", "Society"], "summary": "Singapore collected S$8.6 billion in tourism receipts in Q1 2026, up 5.8 per cent from S$8.1 billion a year earlier, as international visitor arrivals rose 2.9 per cent to 4.4 million, STB data showed. The board credited healthy visitor spending under its quality tourism strategy but warned demand may moderate amid global uncertainty. Sightseeing, entertainment and gaming jumped 22.8 per cent to S$2 billion; shopping rose 7 per cent to S$1.4 billion, while F&B and accommodation dipped. Mainland China remained the top receipts generator at S$1.3 billion, up 3.4 per cent, followed by Indonesia, Australia, the US and India. CEO Melissa Ow noted continued appeal but flagged softening arrivals from some markets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Singapore%20tourism%20receipts%20climb%205.8%20to%20S8.6%20billion%20in%20Q1%20amid%20quality%20tourism%20push.pdf"}, {"id": "bt-13", "title": "The West's Turkey dilemma", "source": "BT", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "This commentary argues that safeguarding the vital Nato alliance with Turkey is likely to come at the expense of democratic credibility. China's rise, Russia's invasion of Ukraine and the US-Israel war with Iran have made geopolitical rivalry the dominant force shaping the global economy, a reality reflected at the recent Nato summit in Ankara. Straddling Europe and Asia, controlling the Bosphorus and fielding Nato's second-largest military, Turkey is strategically indispensable despite weakened Western ties and democratic backsliding under Erdogan. Trump appears less troubled by this than predecessors, advancing over US$700 million in jet-engine sales for Turkey's Kaan fighter and reconsidering the F-35 deal blocked after Ankara bought Russia's S-400 system, epitomising Turkey's ambiguous foreign policy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/The%20West's%20Turkey%20dilemma.pdf"}, {"id": "bt-14", "title": "Trump pledges to escalate attacks until Iran relents on Hormuz", "source": "BT", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "US President Donald Trump vowed to intensify bombardment of Iran until it stops attacking ships in the Strait of Hormuz and reopens the waterway. American forces hit Iranian military targets for a fourth straight day, drawing counterstrikes on US bases in Kuwait and Bahrain. A June 17 interim peace deal has all but collapsed as the sides feud over the strait, through which Saudi Arabia, Qatar and the UAE ship most energy exports. Brent crude jumped to almost US$86 a barrel, up 13 per cent this week. Trump warned power plants and bridges would be targeted, leaving energy sites \"for last.\" The IRGC said the strait stays closed until US strikes end. Strikes have killed more than 30 civilians, Iran said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20BT/Trump%20pledges%20to%20escalate%20attacks%20until%20Iran%20relents%20on%20Hormuz.pdf"}, {"id": "scmp-01", "title": "China's DeepSeek chases US$70 billion valuation in fresh round", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese frontier AI start-up DeepSeek is in talks to raise fresh funding at around US$70 billion pre-investment valuation, just after closing its landmark first round. That June Series A brought in about US$7 billion, valuing the Hangzhou firm near US$60 billion, backed by Tencent, NetEase, JD.com and battery giant CATL. DeepSeek launched the new round because the first was limited to select backers, leaving other investors eager to support a national AI champion. Sources say talks remain preliminary and the valuation could change. The company also eyes a domestic IPO on Shanghai's Star Market, though it is in no rush, prioritising training more capable models amid competition from rivals like Zhipu AI. DeepSeek is on a hiring spree, aiming to double each department.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/AI%20investor%20mania%20China%E2%80%99s%20DeepSeek%20chases%20US%2470%20billion%20valuation%20in%20fresh%20round.pdf"}, {"id": "scmp-02", "title": "China eyes broader global access to yuan assets, as panda bond demand surges", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China's central bank pledged further measures easing global investor access to yuan-denominated assets, citing the currency's strength and surging panda bond demand as signs of rising international recognition. The yuan appreciated 3 per cent against the US dollar and 4.7 per cent against a currency basket in the first half of 2026. Panda bonds - yuan bonds issued by foreign entities onshore - jumped 69 per cent to exceed 160 billion yuan (US$23.6 billion), with Hungary and Kazakhstan tapping the market and Indonesia and Brazil reportedly preparing debuts. Deputy governor Zou Lan said trading institutions rose to 2,493. The bank vowed to stabilise offshore yuan liquidity, deepen Hong Kong cooperation, and set the daily fixing at 6.7910 to the dollar.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/China%20eyes%20broader%20global%20access%20to%20yuan%20assets,%20as%20panda%20bond%20demand%20surges.pdf"}, {"id": "scmp-03", "title": "China is now world's No 1 science power, top Russian scientist Artem Oganov says", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Leading Russian chemist Artem Oganov, awarded China's top International Science and Technology Cooperation Award by Xi Jinping, called the honour from \"the world's No 1 science power\" a sign he was on the right track. Oganov said China now leads in industry, economy and science, accounting for a third of global publications and topping the 2026 Nature Index, with the US second. A long-time China collaborator since 2008, he joined the 1,000 talents programme and built labs in Xian and Urumqi. He criticised the US \"China Initiative\" for targeting scientists, citing physicist Zhang Shouch
