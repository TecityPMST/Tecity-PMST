<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tecity News Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbfbfa; --surface:#ffffff; --surface-2:#f6f6f4;
    --text:#16181d; --muted:#6c727e; --faint:#9aa0ab;
    --border:#ececec; --border-2:#e2e2e0; --ink:#16181d;
    --hover:#f4f4f2; --ring:rgba(20,23,28,.10);
    --shadow:0 1px 2px rgba(16,18,22,.04), 0 8px 24px rgba(16,18,22,.05);
    --shadow-sm:0 1px 2px rgba(16,18,22,.05);
    --wsj:#D85A30; --st:#1D9E75; --bt:#378ADD; --scmp:#D4537E;
    --maxw:1120px;
  }
  html[data-theme="dark"]{
    --bg:#0c0d10; --surface:#15171c; --surface-2:#1b1e25;
    --text:#eceef2; --muted:#9aa1ad; --faint:#6b7280;
    --border:#252830; --border-2:#2d313b; --ink:#eceef2;
    --hover:#1c1f26; --ring:rgba(255,255,255,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv02","cv03","cv04","ss01";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.6;
  }
  ::selection{background:rgba(120,120,120,.18)}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}

  /* header */
  header.top{position:sticky; top:0; z-index:20; backdrop-filter:saturate(180%) blur(14px);
    background:color-mix(in srgb, var(--bg) 82%, transparent); border-bottom:1px solid var(--border)}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 28px; max-width:var(--maxw); margin:0 auto}
  .brand{display:flex; flex-direction:column; gap:2px; min-width:0}
  .brand .title{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .brand .meta{font-size:12.5px; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:10px}
  select.date{appearance:none; font:inherit; font-size:13px; font-weight:500; color:var(--text);
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; padding:8px 32px 8px 12px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa0ab' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; cursor:pointer; transition:border-color .15s}
  select.date:hover{border-color:var(--ink)}
  .toggle{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; color:var(--muted); transition:.15s}
  .toggle:hover{color:var(--text); border-color:var(--ink)}
  .toggle svg{width:17px; height:17px}

  /* hero digest */
  .hero{padding:48px 0 14px}
  .hero .eyebrow{margin-bottom:16px}
  .digest{font-size:clamp(25px,3.6vw,37px); line-height:1.22; font-weight:400; letter-spacing:-.02em;
    max-width:none; color:var(--text)}
  .digest .lead{max-width:none}

  /* metrics */
  .metrics{display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:30px 0 8px}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px; box-shadow:var(--shadow-sm); transition:.18s}
  .metric:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .metric .v{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.05}
  .metric .l{font-size:12.5px; font-weight:500; margin-top:8px}
  .metric .s{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4}

  /* tabs */
  .tabs{display:flex; gap:26px; margin:34px 0 0; border-bottom:1px solid var(--border)}
  .tab{position:relative; cursor:pointer; padding:0 0 14px; font-size:14px; font-weight:500; color:var(--muted); transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px}

  .section{padding:30px 0 0}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px}
  .section-head h2{margin:0; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .section-head .hint{font-size:12.5px; color:var(--muted)}

  /* lead briefing card */
  .lead-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px 32px; box-shadow:var(--shadow); margin-bottom:16px}
  .lead-card .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:12px}
  .lead-card h3{margin:0 0 12px; font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1.2}
  .lead-card p{margin:0; font-size:15.5px; color:var(--text); line-height:1.65; max-width:none; column-width:34ch; column-gap:48px; column-fill:balance}

  /* briefing grid */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm); transition:.18s}
  .card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .card h3{margin:0 0 10px; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.3}
  .card p{margin:0; font-size:14px; color:var(--muted); line-height:1.62}

  /* coverage / bars */
  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm)}
  .bar-row{display:flex; align-items:center; gap:14px; margin:14px 0}
  .bar-row .name{width:42px; font-size:12.5px; font-weight:600; letter-spacing:.02em}
  .bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; border-radius:99px}
  .bar-row .cnt{width:26px; text-align:right; font-size:12.5px; color:var(--muted); font-weight:600}

  /* article */
  .feed-controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:4px 0 18px}
  .search{flex:1 1 260px; position:relative}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint)}
  .search input{width:100%; font:inherit; font-size:14px; color:var(--text); background:var(--surface);
    border:1px solid var(--border-2); border-radius:12px; padding:11px 14px 11px 38px; outline:none; transition:.15s}
  .search input:focus{border-color:var(--ink); box-shadow:0 0 0 4px var(--ring)}
  .pills{display:flex; flex-wrap:wrap; gap:8px}
  .pill{cursor:pointer; font-size:12.5px; font-weight:500; color:var(--muted); background:var(--surface);
    border:1px solid var(--border-2); border-radius:99px; padding:7px 13px; user-select:none; transition:.14s; line-height:1}
  .pill:hover{border-color:var(--ink); color:var(--text)}
  .pill.active{color:#fff; border-color:transparent}
  .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
  .count{font-size:12.5px; color:var(--muted); margin-bottom:14px}

  .article{padding:22px 4px; border-bottom:1px solid var(--border)}
  .article:first-child{padding-top:6px}
  .article .head{display:flex; align-items:center; gap:12px; margin-bottom:9px; flex-wrap:wrap}
  .src{display:inline-flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted)}
  .src .dot{width:8px; height:8px; border-radius:99px}
  .article h4{margin:0; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.32; flex:1; min-width:240px}
  .article h4 a{color:inherit; text-decoration:none; transition:color .15s}
  .article h4 a:hover{color:var(--wsj-hover, var(--muted))}
  .article .date{font-size:12px; color:var(--faint); white-space:nowrap}
  .article p{margin:6px 0 12px; font-size:14.5px; color:var(--muted); line-height:1.62; max-width:88ch}
  .tags{display:flex; flex-wrap:wrap; gap:7px}
  .tag{font-size:11px; font-weight:600; letter-spacing:.01em; border-radius:99px; padding:3px 10px; border:1px solid transparent}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:14px}
  footer{padding:48px 0 60px; color:var(--faint); font-size:12px; text-align:center}

  @media(max-width:980px){
    .metrics{grid-template-columns:repeat(3,1fr)}
    .cards{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap,.topbar{padding-left:18px; padding-right:18px}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .hero{padding-top:34px}
  }
</style>
</head>

<script>window.ALL_DAYS = {"2026-07-06": {"date": "2026-07-06", "dayOfWeek": "Monday", "totalArticles": 45, "sourceCounts": {"WSJ": 0, "ST": 7, "BT": 10, "SCMP": 28}, "executiveDigest": "With US markets shut for the July 4 long weekend, the dollar headed for its biggest weekly drop since April after soft jobs data cut Fed-hike bets, and the AI trade wobbled - a Meta-cloud rumour sparked a (later dismissed) computing-stock panic as China's open-source models began cannibalising their own industry; oil slid on glut fears as OPEC+ ratified another quota hike and ships kept shunning the Strait of Hormuz, while Putin and Trump discussed Ukraine and Iran.", "briefingCards": [{"title": "Lead story - AI trade wobbles as the dollar slides", "body": "With Wall Street closed for Independence Day, the backdrop softened: the dollar headed for its biggest weekly drop since April after Friday's weak US jobs report lowered Fed rate-hike bets. The AI trade flashed warning signs - BT noted it is 'losing one of its key signals', and a rumour that Meta would lease external cloud capacity triggered a computing-stock panic analysts later called 'erroneous'. Adding pressure, ST argued Chinese open-source AI is 'eating its own industry' as free, capable models undercut paid rivals. Citi's chief executive said two AI races - for infrastructure and for applications - will shape the future of banking."}, {"title": "Markets & finance", "body": "Singapore's exchange is on course for a bumper crop of IPOs even as the yen stayed on a roller coaster, while South Korea launched historic 24-hour won trading. A sobering retail lesson landed: nearly a million investors lost a combined $4.9 billion on Trump's crypto coin. Singapore dealmakers welcomed a revised takeover code that offers targeted guidance rather than an outright ban on deal-protection measures, and Frasers Property unveiled a big asset shuffle - its controlling shareholder stepping in to drive value and keep the developer listed."}, {"title": "Asia realignment", "body": "Geopolitical wires stayed busy over the long weekend: Putin and Trump discussed Ukraine and Iran in a July 4 call, and Trump will meet Ukraine's Zelensky and Syria's new leader Ahmed al-Sharaa at a NATO summit in Turkey, where his demands for 'loyalty' are testing the alliance chief. China's Wang Yi urged Sweden to help rebuild trust, Iran's new Supreme Leader Mojtaba Khamenei was said to hold a 'positive' view of China, and Taiwan resumed 'anti-communist' classes for military graduates, citing the Chinese threat."}, {"title": "Energy & climate", "body": "Oil's supply wave rekindled fears of a global glut: prices tumbled as OPEC+ ratified another planned quota hike and Gulf flows rebounded, even as fewer ships transited the Strait of Hormuz along Oman's coast amid minefields and stalled talks that keep the waterway in 'strategic limbo'. Asia is racing to rethink post-Hormuz supply chains 'as soon as possible'. Resilient aluminium prices are set to favour Asian smelters over global rivals, and a Chinese-made portable air-conditioner is selling out across a heat-stricken Europe."}, {"title": "Technology & AI", "body": "China's AI ecosystem was in ferment: Alibaba banned staff from using Anthropic's Claude Code over 'spyware' concerns, while its Elements Claw AI agent helped discover four new superconductors; ByteDance and Alibaba moved to disable humanlike custom AI agents as new rules loom. A Chinese memory-module giant's first-half profit is set to jump more than 600-fold on the chip super-cycle, and an AI-chip start-up exited stealth betting on 3D stacking to bypass US export controls. China also offered undersea-cable detection technology to clients across the Middle East, Europe and Asia."}, {"title": "Singapore & SEA focus", "body": "Singapore's building watchdog (BCA) warned that boutique condominium projects are more likely to have quality defects, urging buyer caution. SGX's IPO pipeline is filling up, and a revised takeover code drew a warm reception from dealmakers, while Frasers Property's controlling shareholder is orchestrating an asset shuffle to unlock value and keep the group listed. Across the region, the post-Hormuz shipping reset and OPEC+ supply add-backs dominate the trade outlook, while Chinese carmakers - increasingly displacing Japanese rivals in Europe - signal intensifying competition ahead for South-east Asia's auto market."}], "keyMetrics": [{"value": "45", "label": "Articles curated today", "sub": "ST 7 · BT 10 · SCMP 28 · WSJ closed (Jul 4)"}, {"value": "Weekly drop", "label": "US dollar slides", "sub": "Biggest since April on jobs miss"}, {"value": "$4.9b", "label": "Lost on Trump coin", "sub": "Nearly 1m retail investors hit"}, {"value": ">600x", "label": "China memory profit", "sub": "H1 jump on chip super-cycle"}, {"value": "OPEC+", "label": "Oil quota hike", "sub": "Glut fears; prices slide"}, {"value": "24hr", "label": "Korean won trading", "sub": "Historic round-the-clock launch"}], "articles": [{"id": "st-01", "title": "Boutique condos likely to have more quality defects: BCA", "source": "ST", "date": "6 Jul 2026", "tags": ["Society"], "summary": "Small private residential projects, typically under 50 units, score worse for construction workmanship than larger developments, Building and Construction Authority (BCA) data shows. Over the past six years, small condos made up over 58 per cent of projects with low ratings under the Construction Quality Assessment System (Conquas). Of 167 assessed projects, 48 received the lowest bands 4-6, and 28 were small condos. A band 6 developer sees 80 defects per 1,000 units versus under one for band 1. Several weaker-scoring projects were marketed as luxury, including The Carrara and 33 Devonshire. NUS's Sing Tien Foo said small projects rely more on on-site works vulnerable to weather. A new Land Sales Disqualification Framework took effect May 22.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/1.%20Boutique%20condos%20likely%20to%20have%20more%20quality%20defects%20BCA.pdf"}, {"id": "st-02", "title": "Nearly a million investors lost a total of $4.9 billion on Trump crypto coin", "source": "ST", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Nearly one million people who bought President Donald Trump's $TRUMP meme coin lost money through end-June, cryptocurrency analytics firm Nansen reported. Their losses total US$3.81 billion (S$4.9 billion), with 988,905 wallets in the red, roughly two of every three buyers. Trump profited regardless of price direction, collecting returns on trades he pushed via Truth Social, and disclosed a US$636 million (S$821 million) payout. The coin traded at US$1.76 on July 3, down 97 per cent from its US$75.35 peak. Under 500,000 wallets recorded profits totalling US$4 billion, mostly early buyers. Trump's separate World Liberty Financial coin, $WLFI, trades at 5.7 US cents, down 82 per cent since September.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/Nearly%20a%20million%20investors%20lost%20a%20total%20of%204.9%20billion%20on%20Trump%20crypto%20coin.pdf"}, {"id": "st-03", "title": "SGX on course for bumper crop of IPOs, yen on roller coaster", "source": "ST", "date": "6 Jul 2026", "tags": ["Finance & Markets"], "summary": "Singapore saw a flurry of IPO filings this week as the Straits Times Index rose above 1 per cent to close at 5,244.29. SGX could record 20 to 30 IPOs in 2026, up from 15 in 2025, though about 60 per cent of recent listings struggled post-debut. Temasek-backed Foundation Healthcare Holdings, multiple times oversubscribed, aims to raise $242 million, listing July 8 at a $1 billion valuation. The yen hit a 40-year low against the US dollar and an all-time low versus the Singdollar. From Oct 5, SGX cuts board lot sizes for pricier stocks. White Sands mall was sold for $467 million. CNMC Goldmine won approval to shift to the mainboard.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/SGX%20on%20course%20for%20bumper%20crop%20of%20IPOs,%20yen%20on%20roller%20coaster.pdf"}, {"id": "st-04", "title": "Taiwan military resumes 'anti-communist' classes for graduates, citing Chinese threat", "source": "ST", "date": "6 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan's military has resumed \"anti-communist\" patriotic classes for its academy graduates after a quarter-century gap, the defence ministry said on July 5, citing rising military and infiltration danger from China. The formal education ended in 2002 and was renamed \"patriotic education\". Officials from bodies including the Mainland Affairs Council and National Security Council will lecture graduates, aiming to instil a clear awareness of \"why we fight, and for whom\". China's military operates almost daily around Taiwan. As at July 3, Taiwan tracked a record of over 110 Chinese military and Coast Guard ships along the First Island Chain. On July 4, China's Coast Guard launched a new patrol off Taiwan's east coast, drawing a sharp Taipei rebuke.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/Taiwan%20military%20resumes%20'anti-communist'%20classes%20for%20graduates,%20citing%20Chinese%20threat.pdf"}, {"id": "st-05", "title": "The prime minister who'd rather not talk about immigration", "source": "ST", "date": "6 Jul 2026", "tags": ["Politics", "Society"], "summary": "Australian PM Anthony Albanese faces his most serious challenge from Pauline Hanson's far-right One Nation rather than the Liberal-National Coalition. Rather than debating Hanson on immigration, Albanese shifts the contest to the economy, wages, public services and inequality, where Labor believes it is stronger. A Lowy Institute poll found 55 per cent of Australians think migration is too high. Albanese attacks One Nation's opposition to minimum wage rises and childcare support, and Hanson's ties to mining magnate Gina Rinehart. Labor has reclaimed its polling lead, the June 29 Newspoll putting it at 33 per cent versus One Nation's 29. Experts say the economy-focused strategy could offer lessons for centre-left parties globally, unlike Britain's departing Keir Starmer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/The%20prime%20minister%20who'd%20rather%20not%20talk%20about%20immigration.pdf"}, {"id": "st-06", "title": "We can't wait for an AI crisis before taking action", "source": "ST", "date": "6 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "In this commentary, Simon Chesterman and Wendy Hall argue that OpenAI's Sam Altman, who called for a \"simple framework\" governing advanced AI, omits the UN just as its AI governance process enters a crucial phase. This week Geneva hosts the first UN Global Dialogue on AI Governance, where the new International Scientific Panel presents its preliminary report. Unlike a club of powerful states or companies, every country has a seat. The authors flag four problems: speed, fragmentation, accountability and equity. They propose a blueprint for an International Artificial Intelligence Agency that is independent, science-based and globally representative, maintaining evidence bases and supporting safety standards. A coalition of committed states could begin without waiting for unanimity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/We%20can't%20wait%20for%20an%20AI%20crisis%20before%20taking%20action.pdf"}, {"id": "st-07", "title": "When the disruptor gets disrupted: How Chinese open-source AI is eating its own industry", "source": "ST", "date": "6 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "AI is disrupting AI, writes Vikram Khanna, as free, open-source Chinese models flood the market. Labs like DeepSeek, Alibaba's Qwen, Moonshot's Kimi and Zhipu's GLM now account for close to a third of AI model usage on major aggregator platforms, with Qwen overtaking Meta's Llama as history's most-downloaded open-source family. Developers pay about US$10 hourly for Claude coding versus under 50 US cents on DeepSeek, a textbook low-end disruption per Clayton Christensen's theory. Airbnb, Cursor and even Microsoft use Chinese models; Singapore's SEA-LION switched from Llama to Qwen. Alibaba gives Qwen away to pull users onto its cloud, though its stock has fallen about 35 per cent amid heavy infrastructure spending and Pentagon scrutiny.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20ST/When%20the%20disruptor%20gets%20disrupted%20How%20Chinese%20open-source%20AI%20is%20eating%20its%20own%20industry.pdf"}, {"id": "bt-01", "title": "Fewer ships transiting Strait of Hormuz along Oman coast after U-turns", "source": "BT", "date": "6 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Vessel traffic through the Strait of Hormuz along the Omani coast fell to a trickle on Sunday (Jul 5), a day after several exiting ships made sharp reversals, underscoring Iran's efforts to control the waterway. Over Friday and Saturday at least eight vessels U-turned; four then sailed north toward the Iranian route and left the strait. Kpler data showed 19 crossings Saturday but only one openly signalled inbound transit along the Omani coast, versus 13 on Friday. Iran has demanded ships use only Tehran-authorised routes and has fired on some that proceeded. Tanker firms are struggling with the stop-start reopening, crucial for normalising an oil market recovering from a four-month crisis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/.%20Fewer%20ships%20transiting%20Strait%20of%20Hormuz%20along%20Oman%20coast%20after%20U-turns.pdf"}, {"id": "bt-02", "title": "Dollar set for biggest weekly drop since April after jobs data lowers Fed hike bets", "source": "BT", "date": "6 Jul 2026", "tags": ["Finance & Markets"], "summary": "The US dollar headed for its biggest weekly loss in 12 weeks on Friday after Thursday's tepid June jobs report cooled expectations of a near-term Federal Reserve rate hike. Payroll gains for the prior two months were revised lower, prompting traders to trim bets; markets price about a 45 percent chance of a September hike per CME FedWatch. The dollar index slipped to 100.83, down 0.5 percent on the week. The euro rose to $1.1440 and the pound to $1.3352. The yen strengthened past 161 per dollar from a 40-year low of 162.84, but investors stayed alert for intervention as Japan warned it was in regular contact with Washington and ready to support the currency.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Dollar%20set%20for%20biggest%20weekly%20drop%20since%20April%20after%20jobs%20data%20lowers%20Fed%20hike%20bets.pdf"}, {"id": "bt-03", "title": "Frasers Property's big asset shuffle: Controlling shareholder helping it drive value and stay listed", "source": "BT", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Frasers Property's (FPL) proposed optimisation plan reshuffles S$2.1 billion of hospitality assets held under the privatised Frasers Hospitality Trust between FPL and controlling shareholder TCC Group Investments (TCCGI). TCCGI, linked to Thai billionaire Charoen Sirivadhanabhakdi, takes full ownership of S$1.1 billion of mature assets, while FPL fully acquires Frasers Suites Singapore for S$320 million to pursue Valley Point redevelopment. FPL expects net proceeds of S$99.5 million and cuts hospitality balance-sheet exposure from S$3.7 billion to S$2.5 billion. Shares closed Friday at S$1.07, just 0.45 times NAV of S$2.40. DBS targets S$1.50. The column argues latent value may take a long time to be realised in an apathetic market.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Frasers%20Property's%20big%20asset%20shuffle%20Controlling%20shareholder%20helping%20it%20drive%20value%20and%20stay%20listed.pdf"}, {"id": "bt-04", "title": "Investing in an age of lawlessness", "source": "BT", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "This Financial Times column argues investors must reckon with a structural slide toward global lawlessness. It notes Trump earned over US$1 billion in 2025 from crypto, real estate and stock trades while overseeing related policy, plus a new Kazakh mining deal blending government and personal business. Former Citi analyst Matt King of Satori sees Trump as a symptom of eroding US legal norms since 2014 and a crumbling rules-based order. King warns bonds are risky as recovery rates can be wiped out by political change, while equities with real assets, pricing power or the right connections can thrive. Some hedge funds now copy elites' investments, a \"tribal\" play that carries steep downside if leaders fall from grace.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Investing%20in%20an%20age%20of%20lawlessness.pdf"}, {"id": "bt-05", "title": "Knowing how to use AI is no longer enough. We need to build with it", "source": "BT", "date": "6 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "This commentary argues Singapore's AI-literacy focus is incomplete because operating AI tools loses value as models improve; the durable skills are judgment and problem literacy. Singapore ranks first globally for innovation inputs but ninth for outputs in WIPO's 2025 index, harvesting less than it invests. The authors urge building products, not just training seats, citing local firms PatSnap and Tookitaki that solve regulated, data-dense problems using proprietary data and trust. They note China subsidises solo AI founders, with Shanghai's Pudong covering up to 300,000 yuan of computing costs. The biggest hurdle is confidence, not talent or capital. They call for funding product teams, measuring paying customers, and treating distribution as economic infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Knowing%20how%20to%20use%20AI%20is%20no%20longer%20enough.%20We%20need%20to%20build%20with%20it.pdf"}, {"id": "bt-06", "title": "Oil's supply wave, tumbling prices rekindle fears of global glut", "source": "BT", "date": "6 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "A US-Iran peace deal is unleashing a wave of oil supply, overwhelming demand and reviving glut fears just months after the physical benchmark hit an all-time high. Brent has tumbled 43 percent from its late-April peak as over 60 million trapped barrels flood out of the Persian Gulf, aided by sanctions waivers on Iranian oil. Saudi Arabia and the UAE are near pre-war export levels. Analysts from Morgan Stanley to Goldman warn of a 2027 glut. JPMorgan's Natasha Kaneva says barrels have \"nowhere to go except China. But China is not buying,\" with imports down about five million barrels a day. Contango, record US reserve releases and weak Chinese demand deepen the surplus, pressuring Opec+ toward possible output cuts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Oil's%20supply%20wave,%20tumbling%20prices%20rekindle%20fears%20of%20global%20glut.pdf"}, {"id": "bt-07", "title": "Opec+ ratifies planned oil quota hike as Gulf flows rebound", "source": "BT", "date": "6 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Major Opec+ members agreed on Sunday (Jul 5) to add another 188,000 barrels a day to output targets for next month, extending plans to reverse curbs as a US-Iran peace pact restores Gulf flows. Seven nations led by Saudi Arabia and Russia have now added 940,000 barrels a day to quotas since the war began, nearly 1 percent of global demand. Oil has tumbled 43 percent from its wartime peak to near US$72 in London, and glut forecasts raise the risk of a price war. Opec faces unity strains: Iraq threatens to exit if denied a higher limit, and the UAE quit in May. Russia's exports hit records even as Ukrainian drone strikes hit refineries. The group meets again on Aug 2.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Opec%20ratifies%20planned%20oil%20quota%20hike%20as%20Gulf%20flows%20rebound.pdf"}, {"id": "bt-08", "title": "Resilient aluminium prices set to boost Asia's smelters over global rivals: analysts", "source": "BT", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Elevated aluminium prices could position low-cost smelters in China, India and Indonesia to sustain stronger margins than global rivals, thanks to cheaper power and competitive raw-material sourcing, analysts told The Business Times. LME aluminium rose 19.5 percent to a four-year high of US$3,752.50 a tonne by Jun 2 on US-Iran war supply fears, then shed 17.6 percent to US$3,091.50 on Jul 2. The war removed an estimated three million tonnes of production; ING's Ewa Manthey forecasts a 1.8 million-tonne global deficit this year. CMC's Oriano Lizza expects prices near US$3,500 in the second half. Integrated supply and low-cost power give Asian producers an edge over high-cost Australia, Europe and the US, potentially attracting investment and decarbonisation, though a glut could force closures elsewhere.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Resilient%20aluminium%20prices%20set%20to%20boost%20Asia's%20smelters%20over%20global%20rivals%20analysts.pdf"}, {"id": "bt-09", "title": "Revised takeover code: Dealmakers welcome targeted guidance instead of ban on deal protection", "source": "BT", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's revised takeover code, issued by MAS on the advice of the Securities Industry Council and effective Jul 16, opts for targeted guidance rather than a blanket ban on deal protection measures, which lawyers welcomed as a pragmatic compromise. It caps total break fees at 1 percent of the offeree's value, tightens disclosures, extends advertising restrictions to social media, and requires scheme meetings within six months. WongPartnership's Andrew Ang said SIC gives offeree boards guidance rather than a UK-style prohibition. Christopher Kummer said capping fees at 1 percent makes them \"almost negligible,\" versus US fees three to four times higher. Advisers cited the 2021-2022 SPH bidding contest as the type of issue addressed. Experts say it improves competition without fundamentally shifting bidder-board balance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/Revised%20takeover%20code%20Dealmakers%20welcome%20targeted%20guidance%20instead%20of%20ban%20on%20deal%20protection.pdf"}, {"id": "bt-10", "title": "The AI trade is losing one of its key signals", "source": "BT", "date": "6 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The Silicon Data LLM Token Expenditure Index, tracking what users pay for AI tokens, is down almost 20 percent from a May high after nearly doubling since December 2025, unsettling markets over whether the US$700 billion-plus AI capex boom will pay off. The gauge blends prices and usage, so a dip could mean falling list prices, a shift to cheaper models, or softening willingness to pay. Investor Louis Navellier cites reports of users restraining use over cost and OpenAI delaying its IPO. Allianz Research flags a 46 percent gap between AI investment and sales, worse than the 2001 telecom bust. Top GPUs are sold out through 2026. Regulatory burdens from the EU AI Act and US actions may push workloads to cheaper models. Analysts urge holding both bull and bear reads.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20BT/The%20AI%20trade%20is%20losing%20one%20of%20its%20key%20signals.pdf"}, {"id": "scmp-01", "title": "AI computing stock panic over Meta cloud rumour 'erroneous', analysts say", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Research firm SemiAnalysis called a global sell-off of semiconductor and cloud stocks \"erroneous\", after investors misread Meta's reported cloud plans as a sign of an AI hardware glut. Bloomberg reported Meta was developing a cloud business selling AI compute and models, rivalling AWS, Azure and Google Cloud. CoreWeave and Nebius plunged 14 and 17 per cent Thursday; Micron, AMD, Intel and SanDisk fell 4-14 per cent. Samsung, SK Hynix, SMIC and Hua Hong also tumbled across Asia. SemiAnalysis argued Meta's compute procurement would \"accelerate, not slow down\", with 2027 capex \"shockingly high\", framing the cloud push as a high-margin opportunity. Meta was also said to be near talks with Anthropic to host private Claude instances.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/AI%20computing%20stock%20panic%20over%20Meta%20cloud%20rumour%20%E2%80%98erroneous%E2%80%99%2C%20analysts%20say.pdf"}, {"id": "scmp-02", "title": "Alibaba bans staff from using Claude Code over Anthropic spyware concerns", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Alibaba has banned employees from using Anthropic's Claude Code, listing it as \"high-risk\" software after the US firm was found to have embedded hidden code tracking whether users were in China or affiliated with Chinese AI labs. The ban takes effect July 10. Security researchers exposed the practice, which logged proxy use and Chinese time zones; Anthropic engineer Thariq Shihipar called it \"an experiment\" to prevent reseller abuse and distillation, saying it would be rolled back. Chinese experts warned of back-door and cross-border data-compliance risks. Washington last month imposed then lifted export controls on Anthropic's Fable 5 model. Alibaba, which owns the SCMP, recommended staff use its own Qoder platform instead.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Alibaba%20bans%20staff%20from%20using%20Claude%20Code%20over%20Anthropic%20spyware%20concerns.pdf"}, {"id": "scmp-03", "title": "Alibaba's Elements Claw AI agent unearths 4 new superconductors", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI"], "summary": "Alibaba's Damo Academy unveiled what it calls the industry's first AI agent for discovering superconducting materials, saying the tool, Elements Claw, has already found four previously unknown compounds later verified in laboratory experiments. Superconductors conduct electricity without resistance and could transform power grids, quantum computing and maglev trains, but discovery has relied on trial and error. Powered by a one-billion-parameter model trained on 125 million molecular and crystal structures, the agent screened 2.4 million stable structures in 28 hours, identifying about 68,000 candidates before narrowing to the most promising. Developed with Renmin University and the University of Chinese Academy of Sciences, the framework could extend to solid-state batteries, catalysts and thermoelectrics. Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Alibaba%E2%80%99s%20Elements%20Claw%20AI%20agent%20unearths%204%20new%20superconductors.pdf"}, {"id": "scmp-04", "title": "As tech rallies and consumer shares lag, China's stock market forms microcosm for economy", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China's uneven economy is mirrored in its US$16 trillion stock market, where technology firms surge while consumer stocks lag. AI chipmakers such as Cambricon and Moore Threads led a roughly 50 per cent gain in the Star Market this year, while Kweichow Moutai and other liquor makers fell at least 11 per cent, and CSI 300 consumer stocks dropped about 20 per cent. May retail sales fell 0.6 per cent, the first contraction since December 2022. Fixed-asset investment dropped 4.1 per cent led by a 16 per cent property slump, while semiconductor output surged 23 per cent and industrial robots 28 per cent. Analysts expect divergence to persist absent state consumption stimulus, favouring production over consumer sectors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/As%20tech%20rallies%20and%20consumer%20shares%20lag%2C%20China%E2%80%99s%20stock%20market%20forms%20microcosm%20for%20economy.pdf"}, {"id": "scmp-05", "title": "ByteDance and Alibaba to disable humanlike AI custom agents as new rules loom", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "ByteDance's Doubao and Alibaba's Qwen are moving to disable customised AI agent features ahead of Beijing's Interim Measures on AI Anthropomorphic Interaction Services, effective July 15. Doubao's agent feature goes offline July 15, with related data no longer recoverable after October 15; Qwen disables user-created agents July 10 and broader agent services July 15. Both apps had let users build named assistants, tutors or companions with fixed personas. The rules target services that \"simulate human personality traits\" for sustained emotional interaction, citing risks of addiction, privacy leaks and mental harm, while exempting customer service and workplace tools. Tencent removed a similar Yuanbao feature in June. Some users protested losing their \"emotional support\" agents. Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/ByteDance%20and%20Alibaba%20to%20disable%20humanlike%20AI%20custom%20agents%20as%20new%20rules%20loom.pdf"}, {"id": "scmp-06", "title": "China memory module giant's first-half profit set to jump more than 600-fold", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shenzhen Longsys Electronics, one of China's biggest memory module makers, forecasts a more than 600-fold surge in first-half net profit to between 9.2 billion and 11 billion yuan (US$1.36 billion), versus just 14.8 million yuan a year earlier, implying year-on-year growth of 62,204 to 74,394 per cent. Revenue is seen at 22-25 billion yuan, up from 10.2 billion. Longsys attributed the jump to strong downstream demand and limited global memory wafer capacity, aided by renewed long-term supply agreements. The forecast reflects a global DRAM and NAND upcycle driven by AI demand. Longsys plans to raise up to 3.7 billion yuan via a private placement for high-end AI memory, and has refiled for a Hong Kong listing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/China%20memory%20module%20giant%E2%80%99s%20first-half%20profit%20set%20to%20jump%20more%20than%20600-fold.pdf"}, {"id": "scmp-07", "title": "China offers sea cable detection tech to clients in Middle East, Europe and Asia", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China plans to export robots capable of locating marine cables buried under the seabed to Southeast Asia, the Middle East and Europe, according to the official Science and Technology Daily, aiming to boost its standing in the global marine equipment sector and challenge foreign dominance. Developed at Dalian Jiaotong University, the robots locate buried cables with a positioning error under 5 per cent, operate around the clock at depths up to 300 metres, and stay stable in turbulent currents. Sonar scans wide areas while electromagnetic sensors pinpoint routes; denoising algorithms raised decision speed 40 per cent. The tech has been deployed on Hainan optical cable and Zhejiang power cable projects, and set a benchmark burying cables at 11.6 metres per minute in Guangdong.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/China%20offers%20sea%20cable%20detection%20tech%20to%20clients%20in%20Middle%20East%2C%20Europe%20and%20Asia.pdf"}, {"id": "scmp-08", "title": "China's carmakers are rewriting Europe's auto hierarchy as Japanese rivals lose ground", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Chinese carmakers are seizing market share from Japanese rivals in western Europe, pushing the latter's share to its lowest in four decades. Data from Schmidt Automotive Research showed Chinese brands' share in 18 western European countries surged to 10 per cent in April from 4.9 per cent a year earlier, while Japanese marques fell to 10.3 per cent. In May, Chinese carmakers surpassed Japanese rivals across 32 countries for the first time. BYD sold 175,349 units globally last month, up nearly 95 per cent; Geely exports surged 157 per cent. JPMorgan and BNP Paribas project Chinese smart cars taking 20 per cent of Europe within four years, though the EU may extend tariffs to plug-in hybrids, potentially slowing the advance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/China%E2%80%99s%20carmakers%20are%20rewriting%20Europe%E2%80%99s%20auto%20hierarchy%20as%20Japanese%20rivals%20lose%20ground.pdf"}, {"id": "scmp-09", "title": "China's rare earth industry has critical weakness, researchers warn", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "A new study by Chinese researchers argues that China's rare earth industry, dominant in mining, refining and exports, has a critical weakness in key patents for advanced technologies. Published in the Bulletin of the Chinese Academy of Sciences, the University of Science and Technology of China study found key patents for high-end rare earth functional materials remain largely controlled by Japan and the United States. Downstream products such as permanent magnets, catalysts and luminescent materials account for over 80 per cent of rare earth patents. Japan leads in magnets, the US in catalysts, luminescent and polishing materials. Researchers blamed a weak innovation system, few high-value international patents, and poor coordination between universities, industry and IP management, urging targeted programmes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/China%E2%80%99s%20rare%20earth%20industry%20has%20critical%20weakness%2C%20researchers%20warn.pdf"}, {"id": "scmp-10", "title": "Chinese AI chip start-up exits stealth mode, bets on 3D stacking to bypass US controls", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Dongfang Suanxin, a Chinese AI chip start-up led by industry veteran Wei Shaojun, has emerged from stealth mode, joining Huawei in betting on 3D stacking to bypass US export controls. Founded in 2024, the Shanghai-based firm launched a website and social media account, positioning itself as a formidable player in China's AI computing sector. It uses \"software-defined chips\" and \"3D stacked near-memory computing\" and relies entirely on a domestic supply chain. Its DF1000 AI accelerator supports training and inference for large models. The company has over 500 employees and R&D in seven cities. Investors include the National AI Industry Investment Fund, Jack Ma-backed Yunfeng Capital, and the venture arms of Xiaomi and JD.com. Ma founded Alibaba, which owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Chinese%20AI%20chip%20start-up%20exits%20stealth%20mode%2C%20bets%20on%203D%20stacking%20to%20bypass%20US%20controls.pdf"}, {"id": "scmp-11", "title": "Chinese foreign minister Wang Yi calls on Sweden to help rebuild trust", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "Chinese Foreign Minister Wang Yi urged Sweden to help rebuild bilateral trust and cultivate a \"correct perception\" of each other, telling Prime Minister Ulf Kristersson in Stockholm that ties had \"encountered some difficulties\". Wang is the first top Chinese diplomat to visit Sweden since 2004, with stops also in Denmark, Norway and Finland, amid an EU debate over responding to Chinese industrial overcapacity. Brussels says subsidised Chinese firms undercut local industries; Beijing denies it. The Nordic states, top per-capita military donors to Ukraine, are wary of Beijing's ties with Moscow. Kristersson reaffirmed the one-China policy and backed EU-China dialogue. Swedish counterpart Maria Malmer Stenergard said the EU is more united on trade and pressed for the release of detained bookseller Gui Minhai.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Chinese%20foreign%20minister%20Wang%20Yi%20calls%20on%20Sweden%20to%20help%20rebuild%20trust.pdf"}, {"id": "scmp-12", "title": "Citi CEO says 2 AI races are shaping future of banking", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Citi CEO Jane Fraser said the global financial sector is engaged in two simultaneous AI races. The first is applying AI to business models to drive revenue growth, shorten product cycles, boost efficiency and improve customer service; the second is defensive, fortifying the financial ecosystem against fraud, money laundering and cyber threats. In March, Citi raised its 2026-2030 global AI capital expenditure and revenue forecast to US$8.9 trillion. McKinsey expects agentic advisers in retail and private banking. Fraser acknowledged \"there will be job dislocations\" and changing job types, but expects new roles created and AI augmenting workers. Citigroup laid off 3,500 technology staff in mainland China last year, based in Shanghai and Dalian, in a global cost-cutting drive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Citi%20CEO%20says%202%20AI%20races%20are%20shaping%20future%20of%20banking.pdf"}, {"id": "scmp-13", "title": "Could China hawk Nancy Pelosi's pick for US Congress influence Beijing ties?", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Former House speaker Nancy Pelosi's endorsement of Connie Chan to succeed her in Congress could create opportunities at the margins of US-China relations, analysts said. Chan, 47, a San Francisco supervisor and progressive of Chinese ethnicity, advanced to the November run-off for California's 11th District, finishing 11 points behind State Senator Scott Wiener. Focused strictly on local issues, Chan has adopted a softer tone toward China than Pelosi, whose 2022 Taiwan visit angered Beijing. Born in Hong Kong and raised partly in Taiwan, Chan calls for mutual respect and peaceful coexistence. Tsinghua analyst Sun Chenghao said her background could offer Congress \"a narrative different from simple confrontation\" and preserve city-to-city ties, though competitive toughness remains mainstream and consistency on Taiwan is critical.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Could%20China%20hawk%20Nancy%20Pelosi%E2%80%99s%20pick%20for%20US%20Congress%20influence%20Beijing%20ties.pdf"}, {"id": "scmp-14", "title": "First money, now 'loyalty': Trump's demands test Nato chief's flattery tactics", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Nato Secretary General Mark Rutte has relied on flattery to keep US President Donald Trump anchored to the alliance, but faces new challenges at this week's summit in Turkey. Initially the friction was over money; allies committed last year to spend as much as America. Now the goalposts have shifted: Trump, disappointed allies refused to join his Iran war, said \"I just want loyalty\". Rutte pitched a \"Trump Trillion\" chart showing US$1.2 trillion in European and Canadian spending since 2017, but Trump appeared unmoved. Trump has threatened to leave Nato, mused about seizing Greenland, and the Pentagon has scaled back forces it would provide if an ally is attacked, undermining unity as Russia probes European defences with drones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/First%20money%2C%20now%20%E2%80%98loyalty%E2%80%99%20Trump%E2%80%99s%20demands%20test%20Nato%20chief%E2%80%99s%20flattery%20tactics.pdf"}, {"id": "scmp-15", "title": "Iran's new Supreme Leader Mojtaba Khamenei holds 'positive' view of China, ambassador says", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran's new supreme leader shares his late father's \"positive\" view of relations with China, Tehran's ambassador Abdolreza Rahmani Fazli told a security forum in Beijing. Mojtaba Khamenei became leader after his father, Ayatollah Ali Khamenei, was killed in an air strike on February 28, the first day of the US-Israeli war. The 56-year-old, named successor in March, has not appeared in public, fuelling questions about his health; Fazli said he was \"in very good health\" and managing the country. Tehran confirmed he was wounded in attacks that also killed his wife and son. Fazli said Iran would charge \"service fees\", not tolls, for Strait of Hormuz transit, with China possibly receiving \"special\" treatment as a friendly nation, done \"with the participation of Oman\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Iran%E2%80%99s%20new%20Supreme%20Leader%20Mojtaba%20Khamenei%20holds%20%E2%80%98positive%E2%80%99%20view%20of%20China%2C%20ambassador%20says.pdf"}, {"id": "scmp-16", "title": "Minefields, stalled talks keep Strait of Hormuz in strategic limbo", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "The future of energy exports through the Strait of Hormuz remains uncertain after Iran-US talks in Doha ended without agreement on releasing frozen funds. Tehran has not begun demining and still threatens ships leaving the Gulf without permission, leaving both sides short of their June 17 MOU obligations. Iran rejected a France-Oman demining deal, insisting operations be \"exclusively\" Iranian. Attacks forced suspension of an IMO evacuation corridor, stranding some 600 vessels and 11,000 crew. Analysts said Iran retains 80-90 per cent of mining capability, having laid only about 80 of an estimated 5,000-6,000 mines. Chatham House's Nitya Labh said neither side has the capability or trust to demine alone. Some ships exit via Omani waters with tracking switched off, a risky workaround.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Minefields%2C%20stalled%20talks%20keep%20Strait%20of%20Hormuz%20in%20strategic%20limbo.pdf"}, {"id": "scmp-17", "title": "Netanyahu says some Lebanese villages 'asked to be annexed to Israel'", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli Prime Minister Benjamin Netanyahu said some Christian villages in southern Lebanon had \"asked to be annexed to Israel\" for protection from Hezbollah, telling Fox News that Israel guards them against \"Hezbollah fanatics who want to kill them\". He named no villages. Lebanon entered the wider Middle East war on March 2 when Hezbollah fired rockets after the killing of Iran's supreme leader; Israel responded with air strikes and a ground invasion, now occupying border territory. The mayor of Christian village Rmeish denied the claim, and 15 Christian towns issued statements reaffirming loyalty to Lebanon. Netanyahu vowed Israeli forces would remain in Lebanon \"as long as necessary\". He also addressed reported friction with Trump, who said Netanyahu \"knows who the boss is\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Netanyahu%20says%20some%20Lebanese%20villages%20%E2%80%98asked%20to%20be%20annexed%20to%20Israel%E2%80%99.pdf"}, {"id": "scmp-18", "title": "Putin and Trump discuss Ukraine, Iran in US Independence Day call", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russian President Vladimir Putin and US President Donald Trump discussed Ukraine, Iran and the coming Nato summit in Turkey during an 85-minute call on Saturday, in which Putin congratulated Trump on the 250th US independence anniversary. Trump reaffirmed his readiness to facilitate a swift end to hostilities, and envoys Steve Witkoff and Jared Kushner were ready to travel to Moscow. Russia stressed a preference for a political settlement on its terms. The call followed one of Russia's most intense air strikes of the year on Kyiv, killing 30. Putin claimed capture of Kostiantynivka in Donetsk, which Zelensky dismissed as \"another Russian lie\", insisting the city held. Zelensky, who also spoke with Trump, said there is \"a real prospect to end this war\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Putin%20and%20Trump%20discuss%20Ukraine%2C%20Iran%20in%20US%20Independence%20Day%20call.pdf"}, {"id": "scmp-19", "title": "South Korean won holds steady as historic 24-hour trading begins", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Finance & Markets"], "summary": "The South Korean won held steady against the dollar as it began its first day of 24-hour trading, a milestone in Seoul's push to open financial markets to global investors. The won eased 0.1 per cent to 1,531.40 after rising as much as 0.2 per cent at the 6am start. The round-the-clock trading is the centrepiece of a years-long effort to improve foreign access and support an upgrade to MSCI's developed-market index. Finance Minister Koo Yun-cheol called it \"the starting point for the won's global leap\". Won-dollar trading now runs 6am Monday to 6am Saturday during US daylight saving. Analysts see stabilising benefits from real-time shock absorption, but warn thin overnight liquidity could trigger sudden swings. The Kospi remains this year's top major gainer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/South%20Korean%20won%20holds%20steady%20as%20historic%2024-hour%20trading%20begins.pdf"}, {"id": "scmp-20", "title": "Trump lauds US in storm-delayed 250th birthday speech: 'we'll always be on top'", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Politics", "Society"], "summary": "US President Donald Trump hailed America on its 250th birthday as the \"crowning achievement\" of human history, saying \"we will always be on top\", in a speech delayed several hours after storms forced crowds off the National Mall. He renewed attacks on domestic opponents he called communists, saying \"it's like a cancer, you've got to cut it out\", reprising a theme ahead of November's midterms. Trump boasted of military campaigns against Iran and Venezuela. Temperatures hit a record 39.4C in Washington, with 160 million Americans under extreme weather warnings. Near Capitol Hill, masked men carrying Confederate flags and white supremacist Patriot Front logos gathered. A Quinnipiac poll found 61 per cent of Americans thought the US was not living up to its founding ideals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Trump%20lauds%20US%20in%20storm-delayed%20250th%20birthday%20speech%20%E2%80%98we%E2%80%99ll%20always%20be%20on%20top%E2%80%99.pdf"}, {"id": "scmp-21", "title": "Trump to meet Ukraine's Zelensky and Syria's Sharaa during Nato summit in Turkey", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "US President Donald Trump plans to meet Ukrainian President Volodymyr Zelensky and Syrian President Ahmad al-Sharaa on Wednesday while attending the Nato summit in Turkey, the White House said. Talks come as Kyiv tries to refocus Trump on the war in Ukraine, now in its fifth year, and as Trump muses about Syria's Middle East role. Both Zelensky and Putin called Trump on Saturday. A senior US official said Trump feels urgency to end the war and is expected to follow up with Putin after meeting Zelensky. Trump has stunned the region by suggesting Syria fight Hezbollah, which Sharaa has rejected. Meanwhile, French President Emmanuel Macron will soon visit Syria, becoming the first Western leader there since Assad's 2024 removal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Trump%20to%20meet%20Ukraine%E2%80%99s%20Zelensky%20and%20Syria%E2%80%99s%20Sharaa%20during%20Nato%20summit%20in%20Turkey.pdf"}, {"id": "scmp-22", "title": "White supremacists' July 4 march counts as free speech, US interior secretary says", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Politics", "Society"], "summary": "US Interior Secretary Doug Burgum said federal officials had no reason to stop a white supremacist group's July 4 rally in Washington because of free speech protections. Hundreds of masked Patriot Front members who marched through the capital on Independence Day did nothing illegal, Burgum told CNN, though he said their anti-immigrant ideology was \"nothing that I could possibly agree with\". He said it was protected speech even if it \"makes democracy messy\", noting anti-Trump protesters enjoy the same rights. Patriot Front's manifesto declares \"Democracy has failed this once great nation\". Burgum declined to say whether he condemned the group. He also touted Trump's Washington renovations, including a controversial US$14.7 million Lincoln Memorial Reflecting Pool project that later deteriorated.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/White%20supremacists%E2%80%99%20July%204%20march%20counts%20as%20free%20speech%2C%20US%20interior%20secretary%20says.pdf"}, {"id": "scmp-23", "title": "Why US and China are struggling to reach a consensus over future shape of relationship", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "China and the US have agreed to a \"constructive\" relationship of \"strategic stability\" but cannot agree on what that means, a Beijing forum heard. Stimson Centre's Sun Yun said no consensus exists on a deliverables package for President Xi Jinping's possible US visit this year. Beijing focuses on cooperation while Washington prioritises managing disputes and establishing military communication channels, especially between US Pacific Command and Chinese counterparts, to avert crises over the South China Sea or Taiwan Strait. A planned visit by US defence undersecretary Elbridge Colby is stalled over a US$14 billion Taiwan arms package. Fudan's Wu Xinbo warned there will be \"no strategic stability\" if Washington resumes Taiwan arms sales. Eurasia Group's Clifford Kupchan urged compartmentalising critical issues to avoid accidents.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Why%20US%20and%20China%20are%20struggling%20to%20reach%20a%20consensus%20over%20future%20shape%20of%20relationship.pdf"}, {"id": "scmp-24", "title": "Why has China lowered its own ranking in global financial competitiveness?", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A Beijing-based government think tank has lowered China's global financial competitiveness ranking by one place to fifth, behind the US, Japan, UK and Germany, despite leaders vowing to build a financial superpower. The Chinese Academy of Social Sciences report attributed the slip mainly to stock market volatility in 2024 and 2025, putting China 0.09 points behind Germany. Canada, South Korea, France, Australia and Switzerland ranked sixth to tenth. The system, introduced in 2021, evaluates 31 countries on financial industry, currency, infrastructure, fintech and international governance. In fintech, China ranked third and had the smallest gap with leaders, described as its \"core competitive strength\". The US score rose, underpinned by the dollar's status, while the yuan's global standing still lags China's economic scale.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Why%20has%20China%20lowered%20its%20own%20ranking%20in%20global%20financial%20competitiveness.pdf"}, {"id": "scmp-25", "title": "Why is a Chinese-made portable AC selling out across heat-stricken Europe?", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Trade", "Society"], "summary": "Amid weeks of intense heat exceeding 40C, a portable air conditioner made by Chinese giant Midea, the PortaSplit, has sold out across European e-commerce platforms. The unit's appeal stems from sidestepping regulatory and structural constraints, including historic-preservation rules restricting exterior-wall drilling; it needs no permanent installation, using a window bracket to suspend the outdoor unit. Priced around 900 euros last year, it has been resold for thousands, with official retail rising to 1,199 euros, and dedicated sites like MideaFinder track stock. Europe is largely a rental market, with nearly a third of EU residents renting, boosting appeal of movable units. Chinese logistics firms have launched expedited \"AC air lanes\" as orders from France, Belgium and the UK surge. Some 85 per cent of EU buildings predate 2000.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Why%20is%20a%20Chinese-made%20portable%20AC%20selling%20out%20across%20heat-stricken%20Europe.pdf"}, {"id": "scmp-26", "title": "Why the Indo-Pacific might be on the back burner at the Nato summit", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Nato's 32 members convene in Ankara this week for a summit expected to be dominated by Ukraine, the Middle East and defence spending, with Indo-Pacific issues sidelined. Analysts said immediate pressures could diminish discussion of cooperation with Asian partners despite Nato chief Mark Rutte's warnings about China's ties with Russia. Trump has called Nato a \"paper tiger\" and withdrew about 5,000 US troops from Germany. Members face pressure to show progress toward the 5 per cent of GDP spending target agreed at The Hague. Rutte warned China will have 1,000 nuclear warheads by 2030, calling the China-Russia-North Korea-Iran grouping the \"main long-term threat\". Of the Indo-Pacific Four, only South Korea's President Lee Jae Myung is expected to attend; Japan and Australia send ministers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Why%20the%20Indo-Pacific%20might%20be%20on%20the%20back%20burner%20at%20the%20Nato%20summit.pdf"}, {"id": "scmp-27", "title": "Wu Xinbo on why Trump's 'America first' foreign policy may be driving China's rise", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "In an interview, Fudan University's Wu Xinbo argues Trump's \"America first\" foreign policy is objectively driving China's rise by spurring independent technological innovation and expanding Beijing's international space. He says US policy has shifted toward pragmatic realism, with declining international leadership, credibility and multilateral influence. China-US relations are moving toward \"process management\" and \"dynamic stability\", extended three years after the May Trump-Xi summit, downplaying competition. Wu calls Taiwan the biggest risk, warning China will retaliate over arms sales. He sees a trilateral, not triangular, China-US-Russia dynamic, tension in US-EU ties, and the Middle East de-Americanising, offering China strategic opportunity. He predicts multipolarisation and \"the East rising and the West declining\", and is optimistic about China-US relations long term.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/Wu%20Xinbo%20on%20why%20Trump%E2%80%99s%20%E2%80%98America%20first%E2%80%99%20foreign%20policy%20may%20be%20driving%20China%E2%80%99s%20rise.pdf"}, {"id": "scmp-28", "title": "'Just as soon as possible': Asia's post-Hormuz supply chain rethink", "source": "SCMP", "date": "6 Jul 2026", "tags": ["Trade", "Southeast Asia"], "summary": "Three shocks in six years, Covid, Russia's invasion of Ukraine, and the US-Israel war on Iran, appear to have ended Asia's love affair with \"just in time\" supply chains, economists say. The Iran war disrupted Gulf energy flows and reignited Houthi Red Sea attacks, threatening two maritime chokepoints at once. Analysts say businesses can no longer presume cargoes will traverse straits like Hormuz, Bab el-Mandeb, Malacca and Taiwan unmolested. Japan unveiled a US$10 billion resilience partnership; Singapore and New Zealand signed an essential-goods pact; Asean is finalising a fuel-sharing framework; Malaysia and Indonesia locked in Russian oil. Firms are carrying higher inventory and pursuing \"China plus one\" into Vietnam and the Philippines. One logistics executive said the operative logic is now \"just as soon as possible\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/06%20Jul%202026/06%20Jul%20SCMP/%E2%80%98Just%20as%20soon%20as%20possible%E2%80%99%20Asia%E2%80%99s%20post-Hormuz%20supply%20chain%20rethink.pdf"}]}, "2026-07-07": {"date": "2026-07-07", "dayOfWeek": "Tuesday", "totalArticles": 63, "sourceCounts": {"WSJ": 18, "ST": 12, "BT": 12, "SCMP": 21}, "executiveDigest": "A sudden oil glut is weakening Iran's hand in talks - crude near $70 as OPEC+ hikes output a fifth straight month and Strait of Hormuz traffic recovers; small-caps are having their best run since 1991 and SK Hynix launched a US$36 billion US listing to ride the AI wave, while a WSJ reconstruction details Europe's 'no going back' rupture with America and Xi Jinping broke precedent with a July 4 message to Trump.", "briefingCards": [{"title": "Lead story - Oil glut reshapes the Iran endgame", "body": "A sudden crude glut is undercutting Iran's leverage: with prices near $70 (Macquarie and Citi see $60) and OECD inventories rebuilding, Tehran's threat to choke the Strait of Hormuz carries less weight. OPEC+ agreed to raise August output by about 188,000 barrels a day - a fifth straight monthly hike - as Hormuz traffic recovered to roughly 40 vessels daily and Gulf producers restored flows. The US Strategic Petroleum Reserve sits at its lowest since 1983, and refilling could take 15-18 months. Vice-President JD Vance explicitly tied restocking to negotiating leverage under the 60-day memorandum."}, {"title": "Markets & finance", "body": "The AI rally is broadening: the Russell 2000 rose about 22% in the first half, its best since 1991, as investors rotated beyond mega-caps into healthcare and industrials on Fed rate-cut hopes. SK Hynix launched a US$36 billion Nasdaq listing - drawing interest of up to US$7 billion from Baillie Gifford and Coatue - to ride AI demand, with Taiwan's Unimicron also tapping markets. But WSJ flagged a 'SaaS-pocalypse' as software loans hit a rough patch. In Singapore, OCBC said record equity gains raise the bar for new IPOs even as it stays overweight, naming Keppel, Singtel and ST Engineering among its picks."}, {"title": "Asia realignment", "body": "Two tectonic shifts stood out. A WSJ reconstruction detailed Europe's rupture with America - Macron's 'there is no going back' after Trump's Greenland threat, and a push for 'de-Americanization' - as NATO's Ankara summit tested resolve and chief Mark Rutte warned against being 'naive' about China. Yet Xi Jinping broke precedent with a congratulatory July 4 message to Trump, signalling a thaw, even as both sides concede neither is ready for a clean decoupling. China also opened lithium futures to foreign traders to cement its pricing power over the US."}, {"title": "Energy & climate", "body": "Beyond oil, the AI build-out's resource strain drew scrutiny: WSJ reported data centres use far more water than tech giants disclose - indirect use runs about 12 times direct - with Phoenix centres potentially exceeding 20% of city water by 2031. China connected its latest Hualong One nuclear reactor near Hong Kong, part of a 120 billion yuan project, as it targets 110GW of nuclear capacity by 2030. Singapore and Indonesia signed a carbon-credits MOU at the Leaders' Retreat, with sovereign fund Danantara to spearhead cross-border electricity cooperation, and Chee Hong Tat pitched Singapore-China clean-energy collaboration."}, {"title": "Technology & AI", "body": "The US-China chip race intensified: Shanghai's Biren is raising US$893 million to mass-produce GPUs and challenge Nvidia, joining Moore Threads, MetaX and Cambricon in exploiting US export curbs. Big Tech softened its tone, with leaders now saying workers will 'flourish' despite AI job fears, and the quest to make humanoid robots safe for homes advanced. Trump hinted US AI firms could make a public 'contribution', sparking speculation. Singapore's PayNow is moving into merchant and business payments - account-to-account already 40% of local flows - putting fresh heat on card networks."}, {"title": "Singapore & SEA focus", "body": "Singapore deepened its international tech and green ties: it signed a landmark space-cooperation pact with Japan's JAXA - the three-month-old National Space Agency's first bilateral deal, spanning quantum satellite communications - and a carbon-credits MOU with Indonesia at the Leaders' Retreat. Retail sales rose 3% in May, a fourth straight monthly gain, and with core inflation holding at 1.4%, BT argued MAS's late-July decision may hinge on robust AI-driven growth rather than energy costs. Electricity retailers rolled out discounts up to 20% below the record tariff, though analysts see a price war as unlikely."}], "keyMetrics": [{"value": "63", "label": "Articles curated today", "sub": "WSJ 18 · ST 12 · BT 12 · SCMP 21"}, {"value": "+22%", "label": "Russell 2000 in H1", "sub": "Best first half since 1991"}, {"value": "US$36b", "label": "SK Hynix US listing", "sub": "Nasdaq ADRs ride the AI wave"}, {"value": "~$70", "label": "Crude oil", "sub": "Glut weakens Iran; OPEC+ hikes again"}, {"value": "Jul 4 note", "label": "Xi's message to Trump", "sub": "Breaks precedent; thaw signal"}, {"value": "JAXA pact", "label": "Singapore-Japan space", "sub": "NSAS's first bilateral deal"}], "articles": [{"id": "wsj-01", "title": "A Sudden Glut of Oil Threatens to Weaken Iran's Hand in Talks", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Energy", "Geopolitics", "Finance & Markets"], "summary": "A sudden oil glut is undercutting Iran's leverage in U.S. talks, since faster global restocking weakens its ability to threaten the Strait of Hormuz. Prices sit near $70; Macquarie and Citigroup forecast $60. OECD inventories fell 163 million barrels March-May to their lowest since December 1990. VP JD Vance tied storage to negotiating leverage, citing a 60-day MOU. Hormuz tanker traffic runs 30-60 a day; Vortexa saw about 140 million barrels exit in June. OPEC+ raised August output by 188,000 barrels daily. The U.S. Strategic Petroleum Reserve hit its lowest since 1983; refilling to prewar levels could take 15-18 months. China imported just six million barrels daily in June.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/A%20Sudden%20Glut%20of%20Oil%20Threatens%20to%20Weaken%20Iran%E2%80%99s%20Hand%20in%20Talks.pdf"}, {"id": "wsj-02", "title": "AI Data Centers Have Been Great for the Steel Industry. Now, a Power Crisis Looms.", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Technology & AI", "Energy"], "summary": "U.S. steelmakers benefiting from the AI data-center construction boom now warn of a high-stakes electricity contest with those same customers. Metallus says power costs are about 70% higher since 2024, rising roughly $15 million annually. Both Metallus and JSW Steel USA are served by PJM Interconnection, where wholesale power costs jumped 76% year-over-year in Q1; PJM forecasts demand outpacing supply by 6.6 gigawatts from 2027. Data centers could use 9.5%-15.3% of U.S. electricity by 2030 per Lawrence Berkeley. Data centers consume about 1 million tons of steel yearly, worth $1.4 billion. The Steel Manufacturers Association wants delayed plant retirements and streamlined permitting, now averaging 4.5 years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/AI%20Data%20Centers%20Have%20Been%20Great%20for%20the%20Steel%20Industry.%20Now,%20a%20Power%20Crisis%20Looms..pdf"}, {"id": "wsj-03", "title": "AI Data Centers Use Far More Water Than Most Tech Giants Report", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Technology & AI", "Environment"], "summary": "Microsoft, Google and Amazon, spending an estimated $1 trillion on AI infrastructure this year and last, use far more water than they report, since only Meta tallies water at power stations feeding data centers. U.S. indirect water consumption has historically been about 12 times direct use, per a 2024 Lawrence Berkeley analysis. Google reported 10.9 billion gallons in 2024 but consumes roughly three times as much indirectly; Meta's indirect use hit 19 billion gallons. Ceres found Phoenix data centers could exceed 20% of city water by 2031, up from 3%. Nvidia and Microsoft are adopting closed-loop cooling; most existing centers use water-hungry evaporative systems that are costly to retrofit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/AI%20Data%20Centers%20Use%20Far%20More%20Water%20Than%20Most%20Tech%20Giants%20Report.pdf"}, {"id": "wsj-04", "title": "Big Tech Warned About AI-Driven Job Losses. Now Leaders Say Workers Will Flourish.", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Tech CEOs who warned AI would wipe out jobs have shifted to a sunnier tone. OpenAI's Sam Altman said the industry was \"pretty wrong on the social and economic implications.\" Anthropic's Dario Amodei, who in May 2025 warned AI could eliminate half of entry-level jobs, now stresses positive scenarios. An EY-Parthenon survey found CEOs expecting significant head-count cuts fell from about 46% in January 2025 to 20% this May. A Ramp/Revelio Labs study found top AI investors grew employment roughly 10% more than peers. Meta is laying off 8,000 workers; Amazon cut 16,000. Only about 30% of Democrats favor accelerating AI, versus 77% of tech founders, per Stanford and Berkeley researchers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/Big%20Tech%20Warned%20About%20AI-Driven%20Job%20Losses.%20Now%20Leaders%20Say%20Workers%20Will%20Flourish..pdf"}, {"id": "wsj-05", "title": "Democrats Are Seizing on Trump's Soaring Wealth as a Campaign Opportunity", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Democrats are casting President Trump's growing in-office wealth as corruption after a disclosure showed he earned over $2.2 billion in his second administration's first year through crypto bets, stock trades and real-estate deals. At least $86 million came from legal s
