an hold conversations and maintain eye contact, sold only to adults. Founder Zhou Jian said orders surpassed 13,000 at launch. Morgan Stanley raised its 2026 China humanoid shipment forecast to 50,000 units, projecting 446,000 by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/UBTech%E2%80%99s%20lifelike%20humanoid%20robots%20built%20for%20companionship%20arriving%20in%20homes%20across%20China.pdf"}, {"id": "scmp-19", "title": "US won't renew USMCA trade pact as Greer targets Canada's China ties", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Trade", "Geopolitics", "Politics"], "summary": "The United States confirmed it would not renew the USMCA trade pact in its current form, with US Trade Representative Jamieson Greer blaming Canada's pursuit of Chinese investment. The refusal did not tear up the deal, which stays in force through annual reviews until it could expire in 2036; a renewal would have reset the clock to 2042. The pact, replacing NAFTA in 2020, covers a market worth about US$1.8 trillion and supports 17 million jobs. Greer said Canada sent mixed messages, pledging to reindustrialise America while courting Chinese capital, and demanded tighter auto content rules to block Chinese parts. A third round of Mexico talks is set for July 20, with Canada left off. Analysts said Ottawa's China thaw was narrow, on canola and EVs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/US%20won%E2%80%99t%20renew%20USMCA%20trade%20pact%20as%20Greer%20targets%20Canada%E2%80%99s%20China%20ties.pdf"}, {"id": "scmp-20", "title": "US, Iran officials hold indirect talks in Qatar to try to end war: diplomat", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Indirect technical talks between US and Iranian officials aimed at ending the Middle East war began in Doha, a diplomat said, held with Qatari and Pakistani mediators. The talks build on the memorandum of understanding and progress made at the Lake Lucerne Summit endorsed in June. US envoys Jared Kushner and Steve Witkoff were not taking part, having met Qatar's prime minister on Tuesday. Trump said \"the denuclearisation of Iran is moving along well.\" The memorandum includes a 60-day ceasefire in the war that began with US-Israeli strikes on February 28, reopening the Strait of Hormuz and a nuclear timetable. Tehran denied Trump's claim of direct talks. Iran's Araqchi warned of an \"immediate and powerful response\" to any threat against its leadership.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/US,%20Iran%20officials%20hold%20indirect%20talks%20in%20Qatar%20to%20try%20to%20end%20war%20diplomat.pdf"}, {"id": "scmp-21", "title": "Wang Yi warns Marco Rubio to approach Taiwan affairs with 'utmost caution'", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "China's Foreign Minister Wang Yi warned the US to approach Taiwan affairs with \"utmost caution\" in a call with Secretary of State Marco Rubio, calling for expanded cooperation and managed risks. Xinhua described the \"positive and constructive\" Tuesday call as the first cabinet-level communication since Trump's mid-May visit to China, where the powers agreed on \"strategic stability.\" Wang urged both sides to \"lengthen the list of cooperation\" and shorten the list of problems. The call comes as Washington and Beijing prepare for a potential Xi visit to the White House in September. Despite stabilised ties, strains persist: the Pentagon added Alibaba, BYD and Baidu to a military-linked list, and Beijing retaliated by adding 10 US firms to its export control list.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Wang%20Yi%20warns%20Marco%20Rubio%20to%20approach%20Taiwan%20affairs%20with%20%E2%80%98utmost%20caution%E2%80%99.pdf"}, {"id": "scmp-22", "title": "Will share buy-backs help Chinese big tech companies rescue battered valuations?", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The world's largest buyer of biopharmaceutical royalties, Royalty Pharma, opened its first Asia-Pacific base in Hong Kong, joining multinationals establishing offices as mainland Chinese biotech out-licensing deals hit record highs. Royalty financing offers drug developers an alternative to raise capital as US investment restrictions loom, said Asia head Kenneth Sun. Chinese biotech business-development deals rose 30 per cent year on year through May 31, with total value up 87 per cent. Despite the proposed US Biotech Investment National Security Act, ING forecast out-licensing deal value would surge to about US$240 billion this year from US$136 billion in 2025. Morgan Stanley projects 35 per cent of new FDA-approved drugs will originate from Chinese firms by 2040. The Hang Seng Innovative Drug Index is down about 20 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/Will%20share%20buy-backs%20help%20Chinese%20big%20tech%20companies%20rescue%20battered%20valuations.pdf"}, {"id": "scmp-23", "title": "'Upside potential': World Gold Council counts on Asian buyers to curb price plunge", "source": "SCMP", "date": "2 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Asian markets are a growing force in gold price discovery as the metal stays sensitive to geopolitical concerns and shifting sentiment, the World Gold Council said. Asian trading hours drove first-half rebounds, while pullbacks tended to occur when US markets were open, its midyear outlook published July 1 showed. In the US, higher yields and sticky inflation led investors to trim gold ETF holdings, while Asian demand in China, India and Japan was driven by geopolitical risk and local currency weakness. Emerging-market central banks, including China's, kept adding gold; China's first-quarter investment demand surged 67 per cent. Gold is seen having upside potential in the second half, even after dropping to around US$4,000 per ounce as of June 26 following January's record highs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/02%20Jul%202026/02%20Jul%20SCMP/%E2%80%98Upside%20potential%E2%80%99%20World%20Gold%20Council%20counts%20on%20Asian%20buyers%20to%20curb%20price%20plunge.pdf"}]}, "2026-07-03": {"date": "2026-07-03", "dayOfWeek": "Friday", "totalArticles": 65, "sourceCounts": {"WSJ": 23, "ST": 10, "BT": 13, "SCMP": 19}, "executiveDigest": "Cracks appear beneath the record rally: US June payrolls badly missed at +57,000 even as unemployment fell to 4.2%, and 'Big Short' investor Michael Burry expanded AI short bets calling it 'the beginning of the end' - yet record 14.8% profit margins keep bulls calm; Iran-US talks in Doha ended without a breakthrough as oil hit a four-month low, and Singapore's PMI rose to 51.3 on an AI semiconductor super-cycle.", "briefingCards": [{"title": "Lead story - Cracks under the record rally", "body": "US job growth slowed sharply in June - non-farm payrolls rose just 57,000 versus a 110,000 forecast (ADP put private hiring at 98,000) - though unemployment fell to 4.2% as an immigration crackdown shrank the labour force; markets put Fed-hike odds near 50%. 'Big Short' investor Michael Burry expanded bearish AI bets on Tesla, Nvidia and chip ETFs, reacting to Samsung and SK Hynix's US$500 billion Korean chip plan: \"I see that as the beginning of the end.\" China's AI stocks, up 65% in the first half, fell 7.7% Thursday. Yet bulls point to a record S&P 500 net margin of 14.8% and 28.8% earnings growth."}, {"title": "Markets & finance", "body": "Regulators landed blows on Big Tech: a Swedish court ordered Google to pay Klarna US$1.97 billion in an antitrust case over favouring its own price-comparison service, Alibaba and a US payments unit agreed to a US$600 million DOJ settlement over illegal drug sales, and Binance cut off European users after financial-crime concerns. Hong Kong's managed assets hit a record US$5.38 trillion, with net inflows up 193%, as investors returned to Chinese assets - overtaking Switzerland as the top cross-border wealth hub. From Oct 5, SGX will shrink board-lot sizes, cutting the entry cost to buy DBS, OCBC and UOB shares."}, {"title": "Asia realignment", "body": "China signalled openness to trimming its gaping EU surplus - Commerce Minister Wang Wentao floated purchase deals and slower exports - as Brussels toughened up with an anti-dumping battery probe and 50% above-quota steel tariffs, setting an October deadline; last year's deficit topped US$410 billion. Japan's PM Takaichi looked to India to counter China in the Indo-Pacific, while Wang Yi toured Europe to test whether transatlantic turmoil can soften Nordic hawks. Singapore and Japan renewed a cooperation pact adding healthcare to AI, semiconductors and quantum, with bilateral trade above $56 billion and 5,300 Japanese firms in Singapore."}, {"title": "Energy & climate", "body": "Iran-US indirect talks concluded in Doha with no clear headway, focused on Strait of Hormuz traffic and frozen funds rather than the nuclear file; talks resume after Ayatollah Khamenei's July 9 burial, and Iran still plans shipping tolls from mid-August. Oil slid to a four-month low as private Chinese refiners snapped up cheaper Middle East crude and US inventories fell. Europe sweltered in a heat wave - sparking debate over its aversion to air conditioning - while El Nino threatens to lift Asean food prices amid fuel and fertiliser shocks."}, {"title": "Technology & AI", "body": "The US-China tech race widened: Shanghai unveiled a quantum-computing hub offering up to 100 million yuan per project as quantum became a national priority, and Zhipu AI released a coding harness for its GLM-5.2 model to take direct aim at Anthropic. China's memory champion CXMT launched a US$4.3 billion IPO amid US export threats. SpaceX showed investors a prototype of Elon Musk's new AI device, small-engine makers gained ground powering data centres, and three economists debated whether AI will kill jobs as ADP flagged workers taking longer to find work."}, {"title": "Singapore & SEA focus", "body": "Singapore's manufacturing PMI edged up to 51.3 in June - an 11-month growth streak and the highest since November 2018 - on an \"AI-driven semiconductor super-cycle\", with electronics at 52.2. A consortium of Microsoft, Singapore's Lightstorm, Singtel, Tata Communications and NEC will build the 3,600km I-2SEA undersea cable linking India to Malaysia and Singapore, live in Q4 2029. DBS deepened its wealth push via an MOU with Samsung Securities and more Greater Bay Area hiring, while Frasers Property neared a deal for Cuppage Terrace and Malaysia said the Johor-Singapore SEZ remains on track."}], "keyMetrics": [{"value": "65", "label": "Articles curated today", "sub": "WSJ 23 · ST 10 · BT 13 · SCMP 19"}, {"value": "+57k", "label": "US June payrolls", "sub": "Big miss; jobless rate 4.2%"}, {"value": "Burry shorts", "label": "AI 'beginning of the end'", "sub": "China AI stocks -7.7% Thu"}, {"value": "51.3", "label": "Singapore June PMI", "sub": "Highest since Nov 2018; AI cycle"}, {"value": "US$1.97b", "label": "Google-Klarna ruling", "sub": "Sweden antitrust damages"}, {"value": "US$5.38t", "label": "Hong Kong managed assets", "sub": "Record; overtakes Switzerland"}], "articles": [{"id": "wsj-01", "title": "3 Economists Answer the Question: Is AI Going to Kill Jobs?", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "In a WSJ \"USA250\" panel, three labor economists debate AI's jobs impact as U.S. unemployment sits at 4.4%. Virginia's Anton Korinek warns AI could usher a new paradigm, pushing labor's share of income below 50% and eventually requiring new income-distribution systems. MIT optimist David Autor rejects a \"software apocalypse,\" arguing technology automates, complements and creates new work like data science, though call-center staff, translators, illustrators and back-office workers in developing nations face displacement. Yale Budget Lab's Martha Gimbel stresses demand for human interaction and that historically \"counting out\" human adaptability is a bad bet. All flag risks to democracy, older displaced workers, and forecasting uncertainty beyond even 12-24 months.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/3%20Economists%20Answer%20the%20Question%20Is%20AI%20Going%20to%20Kill%20Jobs.pdf"}, {"id": "wsj-02", "title": "Alibaba, U.S. Payment Processor to Pay $600 Million in DOJ Settlement Over Illegal Drug Sales", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Alibaba Group and U.S. payment processor AUS Merchant Services agreed to pay $600 million to resolve DOJ allegations they let merchants sell and import illegal pharmaceuticals and restricted items into the U.S. Alibaba.com admitted failing to prevent roughly 80,000 such sales between 2016 and 2024, with gross merchandise value exceeding $200 million, violating the Federal Food, Drug, and Cosmetics Act. Alibaba forfeits $200 million plus a $125 million criminal penalty; AUS, an Ant Group subsidiary, pays $85 million and forfeits $190 million. Undercover officials made over 40 purchases. Alibaba called it a \"mutually satisfactory resolution\"; Assistant Attorney General Tysen Duva said another channel for illegal drugs \"is now closed.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Alibaba,%20U.S.%20Payment%20Processor%20to%20Pay%20%24600%20Million%20in%20DOJ%20Settlement%20Over%20Illegal%20Drug%20Sales.pdf"}, {"id": "wsj-03", "title": "Are Higher Interest Rates Warranted? Fed Chairman Warsh Declines to Say.", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Fed Chairman Kevin Warsh declined to say Wednesday whether the central bank needs a rate increase this month, but said his early weeks have seen inflation risks recede, evidence markets grasp his hard line. Anyone expecting tolerance of above-2% inflation \"would be disappointed,\" he said in Portugal, wanting a \"good family fight\" before deciding. The Fed has held rates at 3.5%-3.75% all year after three 2025 cuts. Of 18 officials submitting June projections, nine saw higher rates warranted, eight favored holding, one a cut. White House adviser Kevin Hassett called a hike a \"macroeconomic mistake.\" Futures still lean toward a hold at the July 28-29 meeting.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Are%20Higher%20Interest%20Rates%20Warranted%20Fed%20Chairman%20Warsh%20Declines%20to%20Say..pdf"}, {"id": "wsj-04", "title": "Binance Cuts Off European Users After Regulator Raises Financial-Crime Concerns", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Binance, the world's largest crypto exchange with about 300 million users, failed to secure an EU license after markets regulator ESMA privately advised national authorities to block it over financial-crime concerns. Binance withdrew a Greek application that would have allowed EU-wide service from July under MiCA rules, and told customers they can only sell holdings and withdraw funds after the July 1 deadline. Binance pleaded guilty in 2023 to U.S. anti-money-laundering violations, paying a record $4.3 billion fine; founder Changpeng Zhao served four months and was pardoned by Trump last November. Rivals Coinbase and OKX offered bonuses to lure customers. Zhao, based in Abu Dhabi, plans to reboot Binance's U.S. business.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Binance%20Cuts%20Off%20European%20Users%20After%20Regulator%20Raises%20Financial-Crime%20Concerns.pdf"}, {"id": "wsj-05", "title": "Dubai Plots a Postwar Comeback That Repairs Its Shattered Image", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Dubai is beginning a long recovery after the Iran war, which unexpectedly put the emirate on the front lines. Traffic at Jebel Ali port collapsed from 40,000 containers a day to about 1,000, with officials needing a month to normalize. Property transactions plunged 80% and prices fell 10%-15%; hotel occupancy dropped, with the Fairmont under 40% full and Atlantis laying off over 700 staff. The Burj al Arab and Barasti closed after Iranian strikes. Expatriates, 90% of the population, are split between departures and bullish long-timers. U.A.E. sovereign funds managing over $1.8 trillion cushion the economy. Officials are expanding eastern-coast ports at Khor Fakkan and Fujairah to reduce Strait of Hormuz vulnerability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Dubai%20Plots%20a%20Postwar%20Comeback%20That%20Repairs%20Its%20Shattered%20Image.pdf"}, {"id": "wsj-06", "title": "Europe Is Hot as Hell. Why Doesn't It Want Air Conditioning?", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Environment", "Society"], "summary": "Record heat waves are colliding with Europe's long resistance to air conditioning, viewed as noisy, energy-hungry and a threat to climate goals. AC penetration is about 56% of homes in Italy, 25% in France and just 5% in the U.K. Paris topped 40C last week, only the fourth such occurrence since 19th-century records. Thousands of schools shut and factories cut production; Europe warms at 2.5C above preindustrial levels versus 1.4C globally. Politicians clash: Marine Le Pen demands a major AC plan while France's climate minister Monique Barbut is \"horrified.\" London requires cooler design before AC. Wheelchair user Luca Funaro sued Paris neighbors over two years to install a unit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Europe%20Is%20Hot%20as%20Hell.%20Why%20Doesn%E2%80%99t%20It%20Want%20Air%20Conditioning.pdf"}, {"id": "wsj-07", "title": "Europe Learns It's Hard to Start a Trade War With China During a Heat Wave", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "As the EU accuses China of flooding it with cheap goods, Chinese state media gleefully note Europeans are desperate for one Chinese product amid the heat wave: air conditioners. China supplies roughly 40% of global air-conditioner exports, dominated by Midea, Haier and Gree. Chinese AC exports to France jumped 57% in May year-over-year to about $26 million and to Spain 41% to $71 million. China's overall exports to the EU rose 16% through May to about $254 billion. Midea's PortaSplit, designed for Europe, is sold out at most German stores; Midea says 100 containers arrive this month and 2026 sales to France, Spain, Germany and the U.K. grew over 70%. EU-China trade talks continue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Europe%20Learns%20It%E2%80%99s%20Hard%20to%20Start%20a%20Trade%20War%20With%20China%20During%20a%20Heat%20Wave.pdf"}, {"id": "wsj-08", "title": "Google Must Pay Nearly $2 Billion to Klarna in Antitrust Case", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A Swedish court ordered Alphabet's Google to pay Klarna $1.97 billion in damages after the buy-now-pay-later firm won an antitrust case alleging anticompetitive practices. Klarna's price-comparison unit PriceRunner sued Google in 2022, claiming the search giant gave preferential treatment to its own price-comparison service in results. The Patent and Market Court in Stockholm ruled partly for PriceRunner Wednesday, dismissing other claims. Klarna shares rose 5% in early trading; Google shares were up slightly. Google said it disagrees and is weighing legal options, citing 2017 Shopping ad changes. The ruling follows the EU's top court upholding a $2.67 billion fine on Google in 2024 over comparison-shopping abuses, spurring further European suits.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Google%20Must%20Pay%20Nearly%20%242%20Billion%20to%20Klarna%20in%20Antitrust%20Case.pdf"}, {"id": "wsj-09", "title": "Inside Trump's $2 Billion Year: From Crypto Bets to Real Estate Deals", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "President Trump's personal income surged past $2.2 billion in his second term's first year, per a WSJ analysis of his 900-page disclosure. Crypto ventures dwarfed real estate, bringing over $1 billion, including $263 million from selling equity in World Liberty Financial and $635 million in royalties from his Celebration Coins memecoin business; total World Liberty and stablecoin income reached $798 million. His investment accounts ballooned from at least $237 million to $858 million, with over 20,000 trades and more than $70 million across the Magnificent 7. Hotel and golf income exceeded $525 million, with Mar-a-Lago rising from $50 million to $77 million. His $WLFI and $TRUMP tokens have since collapsed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Inside%20Trump%E2%80%99s%20%242%20Billion%20Year%20From%20Crypto%20Bets%20to%20Real%20Estate%20Deals.pdf"}, {"id": "wsj-10", "title": "Michael Burry Cites 'Beginning of the End' With New AI Short Bets", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Investor Michael Burry, of \"The Big Short\" fame, expanded his bearish AI wager, adding shorts on Tesla, Caterpillar, Applied Materials and the SOXX chip-maker ETF. He reacted to Samsung and SK Hynix's plan to invest over $500 billion in a Korean chip hub, writing on Substack: \"I see that as the beginning of the end.\" His SOXX put options pay off in March if it drops about a third from peak. Burry set a Tesla price target of $416.22 and added to a monthslong Nvidia short. Since his November bets, Nvidia trades about 5% lower and Palantir is down about 40%. Palantir CEO Alex Karp had called him \"bat—-crazy.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Michael%20Burry%20Cites%20%E2%80%98Beginning%20of%20the%20End%E2%80%99%20With%20New%20AI%20Short%20Bets.pdf"}, {"id": "wsj-11", "title": "Private Sector Hiring Grew Slightly Below Expectations Last Month - ADP Report", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Private employers added a net 98,000 jobs in June, ADP said Wednesday, below the 110,000 economists polled by the Wall Street Journal expected and down from May's 122,000. Education and health led with 48,000 new jobs, with gains also in financial activities and trade, transportation and utilities; natural resources and mining shed 5,000. ADP Chief Economist Nela Richardson said hiring reflects \"both supply and demand,\" with people taking longer to find work amid labor-supply constraints, producing a slowdown in job creation. The report, based on payroll data from over 26 million employees, precedes Thursday's Labor Department report, where economists expected 115,000 jobs added and unemployment holding at 4.3%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Private%20Sector%20Hiring%20Grew%20Slightly%20Below%20Expectations%20Last%20Month%20-%20ADP%20Report.pdf"}, {"id": "wsj-12", "title": "Small-Engine Makers Gain Big Momentum in Data Centers", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Energy", "Technology & AI"], "summary": "Reciprocating engines are gaining ground powering data centers, prized for faster availability than turbines. Among U.S. on-site natural-gas projects tracked by BloombergNEF, about 55% plan gas turbines and 29% reciprocating engines, whose lead times run one to two years versus up to eight for heavy-duty turbines. Innio, which IPO'd in June, leads with 8.3 gigawatts of Jenbacher engines linked to projects; Vantage plans 620 units at its Texas Stargate Frontier campus. Rolls-Royce and Caterpillar follow. Engine systems cost about $103/MWh versus $106-$109.50 for turbines. Innio's shares rose 46% post-IPO, valued at 34 times forward EBITDA. The key risk: manufacturing overbuild, as makers triple capacity toward 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Small-Engine%20Makers%20Gain%20Big%20Momentum%20in%20Data%20Centers.pdf"}, {"id": "wsj-13", "title": "SpaceX Showed Investors Prototype of Elon Musk's New AI Device", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Technology & AI"], "summary": "Elon Musk's SpaceX has developed a prototype handset-like device, slimmer than an iPhone, designed to reshape human interaction with AI, showing it to investors ahead of its planned mega IPO. The device would run a proprietary operating system, integrate xAI technology and use a Qualcomm Snapdragon chipset, people familiar said, though SpaceX cautioned the project is early and may not be built. It draws on Musk's \"everything app\" vision from his 2022 Twitter/X acquisition, echoing Asian super-apps like WeChat and Alipay. Musk previously denied building a phone, saying in February \"We are not developing a phone,\" and last October that making one \"makes me want to die.\" OpenAI and ByteDance are pursuing rival AI devices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/SpaceX%20Showed%20Investors%20Prototype%20of%20Elon%20Musk%E2%80%99s%20New%20AI%20Device.pdf"}, {"id": "wsj-14", "title": "Takeaways From the Supreme Court's Momentous Term With Trump", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Politics", "Society"], "summary": "The Supreme Court wrapped one of its most consequential terms, delivering President Trump sweeping wins and a few big losses days before America's 250th birthday. The conservative majority let policies on deportations, foreign-aid withholding and federal layoffs take effect, and Monday affirmed the president's authority over most policymaking agencies. But it struck down his global tariffs, blocked his bid to remake the Federal Reserve, upheld birthright citizenship for U.S.-born children, and rejected a GOP mail-in-ballot challenge. Roberts, Barrett and Kavanaugh proved pivotal, with 5-4 rulings on the Fed and ballots. The court also narrowed the Voting Rights Act and expanded gun rights, and will hear AR-15 and climate-liability cases in the fall.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Takeaways%20From%20the%20Supreme%20Court%E2%80%99s%20Momentous%20Term%20With%20Trump.pdf"}, {"id": "wsj-15", "title": "Tech Bulls, Keep an Eye on Japan", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Columnist Spencer Jakab warns U.S. tech bulls to watch Japan after Wall Street's best quarter in six years, driven by record chip-maker gains, while gold had its worst quarter in 13 years. The yen weakened to its lowest versus the dollar since 1986, nearing 163, stoking inflation in energy-import-dependent Japan; the Bank of Japan raised rates to a 31-year high of 1%. In July 2024, a BoJ hike to 0.25% sparked a \"yen-carry crisis,\" sending the Topix down 12% in a day and the Nasdaq down over 13% in weeks. Further hikes could snowball as savings rush home and hedge funds unwind carry trades. Japan remains a huge Treasury investor amid ballooning U.S. debt.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Tech%20Bulls,%20Keep%20an%20Eye%20on%20Japan.pdf"}, {"id": "wsj-16", "title": "Trump Family Rakes In Cash From Middle East Deals", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Gulf entities paid President Trump's businesses around $300 million last year, the largest identifiable foreign region in disclosures detailing over $2 billion in revenue. The biggest chunk: $263 million from selling half his World Liberty Financial stake to an entity backed by U.A.E. royal Sheikh Tahnoon bin Zayed Al Nahyan, who oversees over $1.4 trillion in funds. Shortly after, the administration let the U.A.E. import up to 500,000 advanced AI chips a year. Developers paid $38 million in licensing fees for projects in Qatar, Saudi Arabia, the U.A.E. and Oman; Damac paid $10 million. Foreign licensing revenue rose to $59 million in 2025. Qatar also gifted the plane now serving as Air Force One.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Trump%20Family%20Rakes%20In%20Cash%20From%20Middle%20East%20Deals.pdf"}, {"id": "wsj-17", "title": "Trump Pledged No Forever Wars. Now He Risks Forever Talks With Iran.", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "President Trump, who promised to end forever wars, is now bogged in open-ended Iran talks. Washington and Tehran signed a memorandum to halt the war, open the Strait of Hormuz and lift the U.S. blockade, agreeing to resolve nuclear issues within 60 days by Aug. 18. Two weeks on, nuclear talks haven't begun in earnest; the sides are relitigating the strait, Israel's Lebanon war and frozen assets. Analysts say Iran favors substituting \"process for progress.\" A three-day flare-up saw resumed shipping attacks and U.S. strikes before talks restarted. Treasury already delivered oil-sanctions relief that could generate $10 billion in two months. Trump told aides he isn't inclined to return to war even past the deadline.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Trump%20Pledged%20No%20Forever%20Wars.%20Now%20He%20Risks%20Forever%20Talks%20With%20Iran..pdf"}, {"id": "wsj-18", "title": "Trump Takes Maiden Flight on Qatari-Gifted Air Force One. We Were on Board.", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "President Trump took his maiden flight Wednesday on a new Air Force One, a Boeing 747-8 gifted by Qatar, landing in North Dakota for Theodore Roosevelt's library opening; a WSJ reporter was aboard. The jet underwent a $400 million overhaul adding secure communications and Starlink internet, with lie-flat leather seats, massage functions and a red, white, navy and gold paint scheme echoing Trump's personal jet. L3Harris took about 10 months to modify it; a custom $320 million hangar was built at Joint Base Andrews. It replaces a 747-200 serving since George H.W. Bush and bridges to two delayed Boeing planes not expected until mid-2028. Trump dismissed ethics and security criticism over the donation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Trump%20Takes%20Maiden%20Flight%20on%20Qatari-Gifted%20Air%20Force%20One.%20We%20Were%20on%20Board..pdf"}, {"id": "wsj-19", "title": "U.S. Capitalism Is at a Crossroads", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Society", "Politics"], "summary": "In a WSJ \"USA250\" essay, Dartmouth's Matthew Slaughter and Brookings' David Wessel argue American capitalism faces three choices: redistribution or growth, walls or bridges, and regulation or competition. Median household income has grown under 1% yearly for 50 years; the median male worker's $1,325 weekly pay matches 1979 inflation-adjusted. The top 1%'s wealth share rose from 22.8% (1989) to 30.8% (2024), and only about 50% of those born in 1985 out-earn their parents versus 90% born in 1945. Federal R&D fell from 2.8% of GDP in 1963 to 0.6% in 2023. Average tariffs near 12%, seven times a decade ago. The authors urge investment in skills, R&D and global engagement, and avoiding crony capitalism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/U.S.%20Capitalism%20Is%20at%20a%20Crossroads.pdf"}, {"id": "wsj-20", "title": "U.S. Crude Oil Inventories Extend Decline", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "U.S. commercial crude oil inventories fell for a 10th consecutive week, dropping 3.8 million barrels to 408.4 million in the week ended June 26, about 7% below the five-year average, EIA data released Wednesday showed. Analysts polled by the Wall Street Journal had expected a 3.1 million-barrel draw. Strategic Petroleum Reserve stocks fell 5.5 million barrels to 325.7 million on continued emergency releases, while Cushing rose 709,000 barrels. Crude production held near 13.8 million barrels a day; exports fell 661,000 to 4 million. Refineries ran at 96.6% of capacity. Gasoline inventories fell 2.3 million barrels to 214 million; distillate stocks rose 2.5 million to 108.6 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/U.S.%20Crude%20Oil%20Inventories%20Extend%20Decline.pdf"}, {"id": "wsj-21", "title": "U.S. Factory Activity Continued to Expand in June", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "U.S. factory activity expanded for a sixth consecutive month in June, with the Institute for Supply Management's purchasing managers' index at 53.3, down 0.7 point from May and below the 53.9 analysts polled by The Wall Street Journal expected; readings above 50 signal expansion. New orders and production grew at a slower pace, while the prices index stayed in expansion but fell 9.1 points from May. Supplier deliveries slowed for a seventh month and employment improved but remained in contraction. ISM's Susan Spence said 34% of comments were positive and 66% negative. One respondent said \"the conflict in Iran has impacted pricing in every category of raw materials,\" especially oil-heavy adhesives.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/U.S.%20Factory%20Activity%20Continued%20to%20Expand%20in%20June.pdf"}, {"id": "wsj-22", "title": "Warsh Wants the Fed to Talk Less. That Only Gets Wall Street to Listen Harder.", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Fed Chairman Kevin Warsh wants to communicate less so markets respond independently to data, but investors say he has already said plenty. At his first meeting as chairman, Warsh shortened the policy statement, declined to submit a rate forecast and deferred questions to task forces, yet still signaled a tougher inflation line, lifting bond yields and pressuring stocks. The Nasdaq fell 4.6% last week. Analysts warn less guidance makes markets \"more jumpy\"; historically investors even scrutinized Alan Greenspan's briefcase size. Warsh, nominated by Trump in January amid a pressure campaign for lower rates, may be deflecting political pressure while inflation blocks cuts. RBC's Blake Gwinn warned Fed messages can become \"just words\" without action.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Warsh%20Wants%20the%20Fed%20to%20Talk%20Less.%20That%20Only%20Gets%20Wall%20Street%20to%20Listen%20Harder..pdf"}, {"id": "wsj-23", "title": "Why Wall Street Bulls Aren't Worried About Sky-High Stock Prices", "source": "WSJ", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A historic surge in corporate profits is reassuring Wall Street about sky-high valuations. The S&P 500's net profit margin rose to a record 14.8% in the first quarter, per FactSet, up from the prior peak of 13.2%, with financials and industrials also above five-year averages. Excluding tech, the margin was 12.4%. Earnings growth hit 28.8%, the highest since Q4 2021. Analysts expect a second-quarter margin of 14.2%, above the 12.3% five-year average. The S&P 500 trades near 20 times forward earnings versus a 19 ten-year average. Risks include tech's outsize influence, potential pricing reversals, and elevated rates; traders raised the odds of a rate hike after Warsh signaled price-stability commitment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20WSJ/Why%20Wall%20Street%20Bulls%20Aren%E2%80%99t%20Worried%20About%20Sky-High%20Stock%20Prices.pdf"}, {"id": "st-01", "title": "Iran US talks conclude in Doha, focus on Strait of Hormuz", "source": "ST", "date": "3 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran and the US concluded two days of indirect talks in Doha on July 1 with no clear headway, discussing Strait of Hormuz maritime traffic and unfreezing Iranian funds under a memorandum that halted their war in June. The nuclear issue, which Trump said was \"moving along well,\" was not raised. Talks resume after supreme leader Ali Khamenei's July 9 burial; he was killed in February air strikes. An Iranian commander warned the US and Israel against attack, and Tehran vowed retaliation after Israel said new leader Mojtaba Khamenei was \"marked for death.\" Iran seeks recognition of Hormuz control and plans shipping tolls from mid-August. Oil prices hit a four-month low.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/1.%20Iran%20US%20talks%20conclude%20in%20Doha,%20focus%20on%20Strait%20of%20Hormuz.pdf"}, {"id": "st-02", "title": "Can Jurong Lake District become Singapore's second central business district?", "source": "ST", "date": "3 Jul 2026", "tags": ["Society", "Southeast Asia"], "summary": "The Town Hall Link site, the first \"white\" site in the new 120ha Jurong Lake Central precinct, launches for sale in July 2026, marking another step in transforming Jurong Lake District (JLD) into Singapore's largest mixed-use business district outside the city centre. The flexible site allows 40,000 sq m of offices, 1,200 homes and 44,000 sq m of complementary uses, sitting at the intersection of four MRT lines. JLD will eventually add 1,400,000 sq m of office space, 20,000 homes and about 100,000 jobs by the 2040s. Built around Jurong Lake with sustainability features, it aims to decentralise jobs, though the discontinued KL-Singapore High-Speed Rail is a setback.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Can%20Jurong%20Lake%20District%20become%20Singapore's%20second%20central%20business%20district.pdf"}, {"id": "st-03", "title": "DBS to increase investments, hiring in China's Greater Bay Area", "source": "ST", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "DBS Group Holdings, South-east Asia's largest bank, will increase investment and hiring in China's Greater Bay Area, expecting the region to outpace the rest of the country, said North Asia head Sebastian Paredes. He said there is \"no reason not to be optimistic\" about China's long-term prospects, citing electric vehicles, batteries and semiconductors as opportunities, with 5 and 4.5 per cent growth this year and next adding nearly US$1 trillion. DBS aims to raise its 13 per cent Shenzhen Rural Commercial Bank stake and will complete its Citigroup Taiwan consumer-banking acquisition in August. Hong Kong is DBS's second-largest revenue source. Second-quarter net profit soared 48 per cent to $2.7 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/DBS%20to%20increase%20investments,%20hiring%20in%20China's%20Greater%20Bay%20Area.pdf"}, {"id": "st-04", "title": "Europe isn't ready to fight a war, despite spending billions on defence", "source": "ST", "date": "3 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Ahead of the NATO summit opening in Ankara on July 7, Europe is spending on defence at Cold War rates, but this commentary argues it remains unprepared. European NATO members spent over US$480 billion in 2025 and committed to 3.5 per cent of GDP for core spending, potentially reaching US$921 billion yearly. Yet most is borrowing, procurement stays fragmented, and equipment stocks sit below 2021 levels. Europe is now the world's largest arms importer at 33 per cent, with the US supplying 48 per cent, deepening dependency. The Franco-German FCAS fighter project collapsed. Planners fret about 2029, when Russia may be ready for a renewed offensive, as US commitment hollows out.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Europe%20isn't%20ready%20to%20fight%20a%20war,%20despite%20spending%20billions%20on%20defence.pdf"}, {"id": "st-05", "title": "Germany's beleaguered ruling coalition unveils reform package", "source": "ST", "date": "3 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "German Chancellor Friedrich Merz's coalition unveiled reforms on July 2, including EUR 10 billion in annual tax relief for lower-income earners, pension reforms, affordable housing and anti-fraud measures, aiming to revive Europe's largest economy. Measures cut red tape, ease short-term hiring and tighten sick-leave rules, funded partly by raising the top tax rate to 47 per cent for high earners. Economists praised concrete action after months of wrangling with the Social Democrats, though unions criticised fixed-term contracts and higher retirement ages, and doctors called sick-note changes \"absolutely catastrophic.\" Trailing the far-right AfD in polls, Merz's government seeks competitiveness amid China rivalry. Germany halved its 2026 growth forecast to 0.5 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Germany's%20beleaguered%20ruling%20coalition%20unveils%20reform%20package.pdf"}, {"id": "st-06", "title": "Global economy chiefs fret over a Trump return as US election draws closer", "source": "ST", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "At the IMF and World Bank annual meetings in Washington, finance leaders fretted over a potential Donald Trump return in November's US election, as his poll gains erased Kamala Harris's early advantage. Concerns centred on his vowed 10 per cent universal tariff and 60 per cent China duties, trillions in new debt, and reversal of climate work. Analysts estimate his tax breaks would add at least $7.5 trillion in debt over a decade. Markets showed returning \"Trump trades,\" with the dollar posting its biggest monthly gain in over two years. The IMF said the inflation battle was largely won; Kristalina Georgieva urged shrinking Covid-era debt. Emerging markets fear higher US rates.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Global%20economy%20chiefs%20fret%20over%20a%20Trump%20return%20as%20US%20election%20draws%20closer.pdf"}, {"id": "st-07", "title": "Russia kills at least 18 in strikes on Kyiv, other cities", "source": "ST", "date": "3 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russia flattened a section of a Kyiv apartment block on June 17 in its deadliest attack on the capital this year, launching 440 drones and 32 missiles that killed at least 18 and wounded 151. Sixteen died in Kyiv, including a 62-year-old US citizen, and two in Odesa; Ukraine declared June 18 a day of mourning. President Zelensky called it \"pure terrorism\" and urged stronger air defences at the G-7 summit in Canada. The UN said it was Kyiv's deadliest attack this year. Analysts noted a new Russian tactic of concentrating strikes on single cities. The invasion, now in its fourth year, intensifies as Istanbul peace talks failed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Russia%20kills%20at%20least%2018%20in%20strikes%20on%20Kyiv,%20other%20cities.pdf"}, {"id": "st-08", "title": "Singapore, Japan to boost collaboration in areas including AI and healthcare", "source": "ST", "date": "3 Jul 2026", "tags": ["Trade", "Technology & AI"], "summary": "Enterprise Singapore and the Japan External Trade Organisation (JETRO) renewed their memorandum of cooperation for three years at a July 2 ceremony, reaffirming economic cooperation in digitalisation, green transition and healthcare. Existing focus areas include AI, semiconductors, quantum computing, offshore wind and hydrogen, with life sciences and healthcare added as a new priority. Support broadens beyond start-ups to high-growth SMEs and larger corporates. Signed as JETRO marks 70 years in Singapore and the countries celebrate 60 years of diplomatic ties, it follows a March strategic partnership between PMs Lawrence Wong and Sanae Takaichi. Bilateral trade surpassed $56 billion in 2025; over 5,300 Japanese companies operate in Singapore.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Singapore,%20Japan%20to%20boost%20collaboration%20in%20areas%20including%20AI%20and%20healthcare.pdf"}, {"id": "st-09", "title": "South Korean shops turn to robots, self-service to escape labour woes", "source": "ST", "date": "3 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Unstaffed coffee shops, ramen eateries and flower outlets are spreading across South Korea as owners use robots and self-service to counter rising labour costs, relying on customer honesty. Such stores, usually open 24 hours, numbered about 9,000 nationwide by end-2024 and likely quadrupled since 2020. At Lounge X, a robot arm named \"Baris\" serves Americanos and matcha lattes from kiosks across eight unstaffed shops. Owners cite hiring difficulties amid a rapidly ageing population and one of the world's lowest birth rates; the population is projected to shrink from 51.8 million to 36.2 million by 2072. Unstaffed shops reach over 40 per cent profitability. Petty crime remains low, though isolated thefts occur.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/South%20Korean%20shops%20turn%20to%20robots,%20self-service%20to%20escape%20labour%20woes.pdf"}, {"id": "st-10", "title": "Want to own stocks of S'pore banks? It will cost less to get started from Oct 5", "source": "ST", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Singapore Exchange (SGX) said on July 1 it will cut the standard board lot size from Oct 5, giving retail investors easier, more affordable access. For instruments priced above $10 up to $100, the lot falls from 100 to 10 units; above $100, from 100 to one unit. The change covers stocks, REITs, business trusts, warrants and depository receipts. It initially applies to 11 stocks above $10, including DBS, OCBC, UOB, Keppel and SGX, which made up 35 per cent of first-half trading. Reviews occur quarterly. SGX also allows omnibus broker custody accounts from July 15 and proposed enhanced broker standards, including AGM notifications by 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20ST/Want%20to%20own%20stocks%20of%20S'pore%20banks%20It%20will%20cost%20less%20to%20get%20started%20from%20Oct%205.pdf"}, {"id": "bt-01", "title": "Malaysia says JS-SEZ remains on track despite delay in master plan launch", "source": "BT", "date": "3 Jul 2026", "tags": ["Southeast Asia", "Trade"], "summary": "Malaysia's Economy Ministry sought to reassure investors that the Johor-Singapore Special Economic Zone (JS-SEZ) remains firmly on track despite the delayed launch of its master plan, initially slated for Mar 30. Economy Minister Akmal Nasrullah Mohd Nasir said implementation, infrastructure development and investor interest continue unabated, with the launch being carefully coordinated for policy alignment. The zone targets RM260 billion (US$63.7 billion) in GDP for Johor by 2030 and over 20,000 high-skilled jobs. It secured about RM77 billion in approved investments in 2025, with 57 per cent already progressing to implementation, plus nearly RM5.5 billion in the first quarter of 2026. From January to May, IMFC-J managed 285 enquiries totalling RM74.1 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/1.%20Malaysia%20says%20JS-SEZ%20remains%20on%20track%20despite%20delay%20in%20master%20plan%20launch.pdf"}, {"id": "bt-02", "title": "China's private refiners snap up Middle East oil as prices slide", "source": "BT", "date": "3 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "China's independent refiners are buying cheaper Middle Eastern crude after flows accelerated through the Strait of Hormuz following an interim US-Iran peace deal and a temporary US waiver on Iranian oil. Rongsheng Petrochemical bought Saudi crude, Shandong Chambroad purchased Iraq's Basrah grade, and Shenghong acquired UAE's Upper Zakum, traders said. State producers Saudi Aramco and Abu Dhabi National Oil offered flexible terms, with some cargoes priced at discounts up to US$5 a barrel to Brent. Aramco unusually sold at least six million barrels on a spot basis to South Korea, Japan and China. Meanwhile over 20 million barrels of Iranian crude idle in Asian waters as Teheran struggles to find buyers, threatening its revenue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/China's%20private%20refiners%20snap%20up%20Middle%20East%20oil%20as%20prices%20slide.pdf"}, {"id": "bt-03", "title": "DBS, Samsung Securities ink MOU to advance wealth management collaboration across Asia", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "DBS and Samsung Securities signed a memorandum of understanding on Thursday (Jul 2) to collaborate on wealth management and enhance services for Asian clients. The tie-up covers four areas: DBS clients gain access to the South Korean market via Samsung Securities' solutions; Samsung Securities clients access DBS' multi-asset global wealth solutions; advisory services address clients' global needs; and joint learning in areas such as artificial intelligence. Samsung Securities president and CEO Park Jong-moon said pairing his firm's South Korean capital-markets strength with DBS' regional platform offers a differentiated experience. DBS CEO Tan Su Shan said Asia is fast becoming the world's wealth engine, calling wealth management \"just the start\" of serving clients across their wealth and business.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/DBS,%20Samsung%20Securities%20ink%20MOU%20to%20advance%20wealth%20management%20collaboration%20across%20Asia.pdf"}, {"id": "bt-04", "title": "El Nino may pile pressure on Asean food prices as dry weather meets fuel and fertiliser shock", "source": "BT", "date": "3 Jul 2026", "tags": ["Environment", "Southeast Asia"], "summary": "South-east Asian governments, producers and farmers are bracing for cost squeezes as a strengthening El Nino threatens crop yields amid an ongoing energy and fertiliser price shock. Scientists predict it could intensify into a \"Godzilla\" El Nino around November to January, possibly the strongest on record. Monsoon-dependent Indonesia, Malaysia and Thailand are most vulnerable, BMI analyst Ong Bin Hui said. Rice and palm oil prices could spike, with Segi Enam Advisors' Khor Yu-Leng warning that thin rice trade means even modest disruptions trigger export bans and panic buying. Coffee, sugarcane, poultry and livestock are also at risk. Most regional countries depend on food imports, Goldman Sachs analysts noted, amplifying inflationary shocks beyond actual shortages.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/El%20Nino%20may%20pile%20pressure%20on%20Asean%20food%20prices%20as%20dry%20weather%20meets%20fuel%20and%20fertiliser%20shock.pdf"}, {"id": "bt-05", "title": "Frasers Property said to be nearing deal for Cuppage Terrace", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "Frasers Property is reportedly close to buying Cuppage Terrace, a row of 17 conservation shophouses off Orchard Road next to The Centrepoint, for between S$175 million and S$180 million. The 28,986 sq ft site has about 62 years left on its lease, with roughly 50,891 sq ft of lettable area including an outdoor refreshment area exceeding 12,000 sq ft. Based on gross floor area near 35,000 sq ft, the price works out to about S$5,000 per square foot. The asset, owned by Raj Kumar's Royal Holdings Organisation, houses F&B outlets and hotel rooms. The deal would enlarge Frasers' presence ahead of plans to potentially redevelop the stretch, following its S$391.9 million collective-sale purchase of The Centrepoint's rear block.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/Frasers%20Property%20said%20to%20be%20nearing%20deal%20for%20Cuppage%20Terrace.pdf"}, {"id": "bt-06", "title": "How Japan is fighting Trump's protectionism with new trade deals", "source": "BT", "date": "3 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Japan is championing trade liberalisation to counter US President Donald Trump's tariff agenda, pursuing new deals with like-minded powers. On Tuesday (Jun 30) Tokyo launched negotiations for a trade agreement with Mercosur, the roughly 280-million-population bloc comprising Brazil, Argentina, Uruguay, Bolivia and Paraguay, which had collective GDP near US$3 trillion in 2024. Japan already imports agricultural produce, energy and minerals from the bloc and exports chemicals and machinery, and seeks rare earths and clean energy while boosting vehicle exports. Agriculture, especially meat, poses a challenge, with Prime Minister Sanae Takaichi facing concerns from beef and chicken farmers. Takaichi also visited New Delhi for a Thursday India-Japan Summit, as both powers cultivate closer Asian ties amid geopolitical uncertainty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/How%20Japan%20is%20fighting%20Trump's%20protectionism%20with%20new%20trade%20deals.pdf"}, {"id": "bt-07", "title": "Microsoft, Singapore's Lightstorm, Singtel join consortium to build India-South-east Asia undersea cable", "source": "BT", "date": "3 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "A consortium including Microsoft and telecom startup Lightstorm plans to build a new undersea cable linking India with Malaysia and Singapore as firms compete to expand AI and cloud infrastructure in India. Other members include Tata Communications, Singtel, Singapore's Asean Cableship and Japan's NEC Corporation. The I-2SEA cable will span 3,600 km with landing stations in Machilipatnam, Andhra Pradesh, where Meta and Alphabet have announced data centres, and is expected operational in the fourth quarter of 2029. The I Squared-backed Lightstorm connects 19 AI and cloud zones via terrestrial fibre, rising to 29 with the new network. India's data-centre capacity could double from 1.4 gigawatts by 2027. Lightstorm plans to list in India in mid-2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/Microsoft,%20Singapore's%20Lightstorm,%20Singtel%20join%20consortium%20to%20build%20India-South-east%20Asia%20undersea%20cable.pdf"}, {"id": "bt-08", "title": "New Zealand house prices near three-year low on Iran war worries", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "New Zealand house prices fell for a third straight month in June, nearing a three-year low as a global oil shock hits household incomes and confidence. Prices dropped 0.2 per cent from May, when they fell a revised 0.3 per cent, property consultancy Cotality said, with a 0.8 per cent decline over three months, the lowest since July 2023. Cotality's Kelvin Davidson cited high listings and the Iran conflict rumbling on since early March. The RBNZ reviews rates on Jul 8, with investors seeing a 75 per cent chance of a 25-basis-point hike. Average two-year mortgage rates near 5.2 per cent, up from 4.5 per cent in late 2025. Home-building approvals surged 19 per cent over 12 months through May.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/New%20Zealand%20house%20prices%20near%20three-year%20low%20on%20Iran%20war%20worries.pdf"}, {"id": "bt-09", "title": "Serenity Park condo owners lower asking price to S440 million in second shot at collective sale", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "Owners at the freehold Serenity Park condominium in Yio Chu Kang lowered their collective-sale asking price by about 13 per cent to S$440 million, down from the S$505 million guide price marketed earlier this year. The new tag translates to a land rate of S$1,266 per square foot per plot ratio, said Mount Everest Properties director Dillon Loi. A first tender in February drew an offer below the S$505 million price; subsequent private-treaty talks lapsed after 10 weeks despite an 80 per cent mandate to lower the reserve. The interested party is understood to be a local developer. The five-storey, 179-unit development sits on a 23,056 sq m site with a 1.4 gross plot ratio. Owners could reap 30 to 35 per cent premiums.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/Serenity%20Park%20condo%20owners%20lower%20asking%20price%20to%20S440%20million%20in%20second%20shot%20at%20collective%20sale.pdf"}, {"id": "bt-10", "title": "Singapore's PMI edges up to 51.3 in June on AI-related tailwinds", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Singapore's factory activity expanded at a faster pace in June, supported by AI-related tailwinds amid easing Middle East conflict challenges. The purchasing managers' index edged up 0.3 point to 51.3, SIPMM data showed on Thursday (Jul 2), marking 11 consecutive months of growth and the highest reading since November 2018. The electronics-sector PMI also rose 0.3 point to 52.2, a 13th straight month of growth. SIPMM's Stephen Poh cited an \"AI-driven semiconductor super-cycle\" supporting robust production. UOB's Alvin Liew noted inventory drawdowns suggest production is not keeping pace with demand. DBS' Chua Han Teng said the mid-June interim US-Iran peace deal reduced input-cost and supply-chain risks, though confidence in the Strait of Hormuz will take time to recover.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/Singapore's%20PMI%20edges%20up%20to%2051.3%20in%20June%20on%20AI-related%20tailwinds.pdf"}, {"id": "bt-11", "title": "UBS already has enough capital to meet new government requirements: Swiss central bank", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "UBS Group already has enough capital to meet the proposed new requirements in Switzerland's reform, the Swiss National Bank said in its annual financial stability review on Thursday (Jul 2). The central bank continues to support the government's demand for full capital backing of the bank's foreign units, noting UBS holds US$9 billion in reserves at its Swiss unit. The government wants UBS to raise common equity capital held domestically against foreign operations to 100 per cent of each unit's equity value, from 60 per cent, which UBS estimates would require adding about US$20 billion in CET1 capital. UBS warns the plan would severely damage its business model. Lawmakers look set to reduce the demands, with a committee meeting again in August.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/UBS%20already%20has%20enough%20capital%20to%20meet%20new%20government%20requirements%20Swiss%20central%20bank.pdf"}, {"id": "bt-12", "title": "US job growth misses expectations in June; jobless rate falls to 4.2%", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "US job growth slowed more than expected in June and prior-month data was revised lower, but the unemployment rate fell to 4.2 per cent, pointing to continued labour-market stability. Non-farm payrolls rose 57,000 after a downwardly revised 129,000 gain in May, missing the 110,000 forecast by Reuters-polled economists. The report, released a day early due to the US' 250th independence anniversary, followed three months of strong gains. CME's FedWatch showed a roughly 50.7 per cent chance of a Fed rate hike in September; the benchmark rate stands at 3.50 to 3.75 per cent. An immigration crackdown has reduced the labour force, keeping unemployment stable. With the US-Iran ceasefire pushing oil back to pre-war levels, some economists see diminished downside risks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/US%20job%20growth%20misses%20expectations%20in%20June%20jobless%20rate%20falls%20to%204.2.pdf"}, {"id": "bt-13", "title": "US regulator probes US100 million insider trading linked to Chinese brokerages Futu, Tiger Brokers: sources", "source": "BT", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The US Securities and Exchange Commission is examining allegations that unknown insider traders made US$100 million on options bets ahead of a recent Chinese crackdown on cross-border brokerages, a source said. Market-maker Susquehanna International Group aired the claims in a Monday (Jun 29) lawsuit in Manhattan federal court, saying it lost more than US$70 million as counterparty. The traders bought US exchange-traded options in Chinese securities firms targeted in a May 22 crackdown. A judge froze accounts at Interactive Brokers, Futu Holdings and Up Fintech Holdings. Futu and Up Fintech's Tiger Brokers were targeted for unlicenced trading; Futu was hit with a 1.85 billion yuan (US$272 million) penalty. Susquehanna alleges traders were tipped off, spending around US$12 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20BT/US%20regulator%20probes%20US100%20million%20insider%20trading%20linked%20to%20Chinese%20brokerages%20Futu,%20Tiger%20Brokers%20sources.pdf"}, {"id": "scmp-01", "title": "China can help Ukraine recover from war and advance industry, ambassador says", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "China can provide \"all-round\" support for Ukraine's post-war industrial recovery, Beijing's ambassador to Kyiv Ma Shengkun wrote in an Interfax-Ukraine article marking 15 years of strategic partnership. Ma cited China's complete industrial system, mature infrastructure, vast market and development experience, and said continued growth offers Ukraine market access and cooperation channels across agriculture, new energy, infrastructure and education. He reaffirmed China's push for a ceasefire and political settlement, invoking Xi Jinping's \"four principles,\" and rejected Western narratives that a rising power inevitably seeks hegemony. Fighting continues, with Russian drones and missiles striking Kyiv. Ukraine's reconstruction is projected to cost nearly US$588 billion over a decade, three times its 2025 GDP, with direct damage exceeding US$195 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/China%20can%20help%20Ukraine%20recover%20from%20war%20and%20advance%20industry,%20ambassador%20says.pdf"}, {"id": "scmp-02", "title": "China signals openness to reducing gaping EU trade surplus as Brussels toughens stance", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "During Brussels talks, Chinese Commerce Minister Wang Wentao signalled to EU trade chief Maros Sefcovic that Beijing is open to purchase agreements for European goods, lower tariffs and slowing its export surge, a rare acknowledgement its billion-euro-a-day surplus is a political problem. The EU is weighing tariff-rate quotas, a diversification tool and a solidarity mechanism, and set an October deadline for tangible results. Last year's deficit topped US$410 billion, deemed \"unsustainable.\" Germany endorsed tougher, sector-wide anti-dumping measures. Brussels also launched an anti-dumping probe into Chinese batteries, imposed a handling charge on cheap parcels, and doubled above-quota steel tariffs to 50 per cent. Sefcovic will visit Beijing in October amid escalating tensions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/China%20signals%20openness%20to%20reducing%20gaping%20EU%20trade%20surplus%20as%20Brussels%20toughens%20stance.pdf"}, {"id": "scmp-03", "title": "China's AI stocks surge 65% in first half but bubble fears begin to weigh on sentiment", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China's AI stocks entered the second half of 2026 with improving earnings but rising scepticism. The SSE Star 50 index surged roughly 65 per cent in January-June, one of its strongest showings, led by semiconductors, optical modules and AI infrastructure; Cambricon briefly topped 1 trillion yuan. US investor Michael Burry, of The Big Short fame, warned \"it is only a matter of time,\" expanding bearish bets against Nvidia, Tesla and semiconductor ETFs. Morgan Stanley flagged inefficient AI capex and overheating, noting regulators prefer a \"slow bull\"; UBS warned hardware stocks may be peaking. Hong Kong's Hang Seng Tech fell 19 per cent. On Thursday the Star 50 dropped 7.7 per cent amid a sharp correction.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/China%E2%80%99s%20AI%20stocks%20surge%2065%25%20in%20first%20half%20but%20bubble%20fears%20begin%20to%20weigh%20on%20sentiment.pdf"}, {"id": "scmp-04", "title": "China's Wang Yi to test whether transatlantic turmoil can soften Europe's Nordic hawks", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "Chinese Foreign Minister Wang Yi begins a rare tour of Denmark, Sweden, Finland and Norway, testing whether shifting geopolitics can soften some of the EU's most China-critical governments. The trip overlaps a Nato summit in Turkey and follows Brussels' October deadline for trade rebalancing and a more robust EU policy. Analysts say Beijing may sense an opening amid frayed US ties and Trump's Greenland designs, but the Nordics' threat perception of the Russia-China partnership has hardened. Sweden's Kristersson warned China cannot keep \"its own rules.\" Wang's Stockholm visit is the first by a Chinese foreign minister in 22 years, following normalisation after tensions over jailed bookseller Gui Minhai. Security concerns dominate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/China%E2%80%99s%20Wang%20Yi%20to%20test%20whether%20transatlantic%20turmoil%20can%20soften%20Europe%E2%80%99s%20Nordic%20hawks.pdf"}, {"id": "scmp-05", "title": "Could China's containerised aircraft launcher reshape rules of modern warfare?", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Defence", "Technology & AI"], "summary": "Fresh footage shows China's truck-mounted electromagnetic catapult launching a drone, part of a growing \"containerised weapon module suite\" project led by the Beijing Institute of Technology with over 70 research entities. Three eight-wheeled trucks connect to form a runway from which a fixed-wing drone takes off. The system spans at least 10 other modules including air-defence, anti-ship, anti-submarine and electronic warfare, all fitting standard freight containers, with a targeted 2,000 units annually for \"plug-and-play\" deployment. Analysts say it could launch drones from complex terrain or ships, enable rapid conversion of civilian vessels near Taiwan, and export to Belt and Road and Global South partners to \"break the historical monopoly\" on maritime dominance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Could%20China%E2%80%99s%20containerised%20aircraft%20launcher%20reshape%20rules%20of%20modern%20warfare.pdf"}, {"id": "scmp-06", "title": "European companies 'becoming more reliant on China, not less', EU chamber chief says", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Europe's push to reduce dependence on China is driving its firms deeper into Chinese supply chains, EU Chamber of Commerce in China president Jens Eskelund told a Berlin conference. Citing a survey of nearly 300 members, he said 56 per cent are increasing onshoring in China while just 7 per cent are only offshoring, the highest-ever onshoring share. Integrating into China's competitive supply chains is often the only way to make top products cheaply, driven partly by a yuan he called undervalued 20-30 per cent against the euro. Eskelund warned Beijing wields \"escalation dominance\" and urged Europe to identify and protect strategically essential industrial capabilities, including via a proposed Industrial Accelerator Act.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/European%20companies%20%E2%80%98becoming%20more%20reliant%20on%20China,%20not%20less%E2%80%99,%20EU%20chamber%20chief%20says.pdf"}, {"id": "scmp-07", "title": "From starry-eyed to sceptical: why young Chinese are turning away from the American dream", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Society", "Geopolitics"], "summary": "As the US marks its 250th anniversary, young Chinese increasingly view it with pragmatism rather than aspiration. Where parents saw America as the ultimate destination, Gen Z, exposed to \"Eastern rise, Western decline\" narratives and China's ascent in EVs, AI and 5G, favours staying home. Over 70 per cent of Chinese surveyed in 2021 held unfavourable views of the US, up from 17 per cent in 2019. Chinese undergraduate enrolment in the US fell to about 78,583 in 2024-25, down from 148,900 in 2018-19. Covid blame, trade wars, tech curbs and images of American instability accelerated the shift, alongside the \"lying flat\" mindset Xi opposes. Historian Rana Mitter urges recalling shared wartime history.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/From%20starry-eyed%20to%20sceptical%20why%20young%20Chinese%20are%20turning%20away%20from%20the%20American%20dream.pdf"}, {"id": "scmp-08", "title": "Hong Kong assets hit record US$5.38 trillion on renewed China appetite: SFC", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Finance & Markets"], "summary": "Assets and wealth managed in Hong Kong surged to a record HK$42.2 trillion (US$5.38 trillion) last year, up 20 per cent from 2024's HK$35.5 trillion peak, as global investors returned to Chinese assets, the Securities and Futures Commission reported. Net fund inflows topped HK$2 trillion, soaring 193 per cent year on year. Of invested assets, HK$4.8 trillion stayed in Hong Kong and HK$2.3 trillion went to mainland China, up about 26 and 30 per cent respectively, the fastest-growing regions. The surge tracked strong markets after DeepSeek sparked a tech revaluation, with the Hang Seng and CSI 300 up 28 and 18 per cent. BCG data show Hong Kong overtook Switzerland as the top cross-border wealth hub.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Hong%20Kong%20assets%20hit%20record%20US%245.38%20trillion%20on%20renewed%20China%20appetite%20SFC.pdf"}, {"id": "scmp-09", "title": "Inside CXMT's US$4.3b IPO: soaring profits meet US export threat and high-stakes HBM race", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's top DRAM maker CXMT is preparing a 29.5 billion yuan (US$4.3 billion) Shanghai Star Market listing amid an AI-driven memory shortage. First-quarter revenue jumped 719 per cent, swinging to a 33 billion yuan net profit, with prices within 5-10 per cent of Samsung, SK Hynix and Micron. CXMT began supplying DDR5 server memory to Tencent and ByteDance and captured 8 per cent of global DRAM share; Apple is reportedly lobbying Washington to buy from it. Investors whisper about a trillion-yuan valuation, though its DDR5 cost-per-bit runs over 30 per cent higher than rivals. US export controls, including a proposed Match Act, threaten expansion, while high-bandwidth memory remains its key long-term test.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Inside%20CXMT%E2%80%99s%20US%244.3b%20IPO%20soaring%20profits%20meet%20US%20export%20threat%20and%20high-stakes%20HBM%20race.pdf"}, {"id": "scmp-10", "title": "Is expansion of Philippine bases for US use on track? Chinese think tank weighs in", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "A report by Beijing's South China Sea Strategic Situation Probing Initiative says infrastructure expansion at the nine Philippine EDCA sites has \"fallen short of expectations.\" Drawing on satellite imagery, it assessed all sites, noting expanded aprons at Lal-lo airport but limited visible progress at Naval Base Camilo Osias, roughly 400km from Taiwan. The report said the network aims to \"lock the Taiwan Strait from the north\" and control the South China Sea, transforming the Philippines into a \"forward hub\" against China, but slower construction reflects heavy investment needs, political uncertainty and rising nationalism. SCSPI director Hu Bo said sites remain far from fully established, though US presence approaches a \"permanent military presence.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Is%20expansion%20of%20Philippine%20bases%20for%20US%20use%20on%20track%20Chinese%20think%20tank%20weighs%20in.pdf"}, {"id": "scmp-11", "title": "Japan's Takaichi looks to India to counter China in Indo-Pacific", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "Japanese Prime Minister Sanae Takaichi visited India seeking deeper economic and security ties, meeting Narendra Modi in Delhi. Analysts say the trip aims to reinforce a coalition wary of China's Indo-Pacific influence while giving Takaichi an \"easy win\" amid falling domestic support. Talks covered economic and energy security, an LNG stockpiling partnership, bilateral trade in rupees and yen to bypass dollars, mineral supply chains, AI cooperation and a scheme for Indian tech workers in Japan. Japanese firms are investing in Indian chip fabrication. But analysts caution India's willingness to align against China oscillates with its own border relations with Beijing, currently peaceful, making New Delhi less receptive to Tokyo's overtures.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Japan%E2%80%99s%20Takaichi%20looks%20to%20India%20to%20counter%20China%20in%20Indo-Pacific.pdf"}, {"id": "scmp-12", "title": "Potential US ban on Chinese inverters would harm local power industry, firms warn", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Energy", "Trade"], "summary": "A reported US plan to ban foreign-made inverters, a key renewable-power component, over national security concerns would be hard to implement and harmful to local industry, Chinese firms warned. China dominates the global market, and Washington fears Beijing could disrupt US power supplies; a draft may publish by year-end. Giant Sungrow said building a US supply chain could take five years, noting US domestic brands hold about 10 per cent share, and stressed superior capacity and faster development. Sungrow and Huawei are the world's top two suppliers, with Chinese firms filling six of the top 10. The EU banned \"high-risk\" inverters earlier this year. US renewable generation grew 8.1 per cent amid AI-driven demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/03%20Jul%202026/03%20Jul%20SCMP/Potential%20US%20ban%20on%20Chinese%20inverters%20would%20harm%20local%20power%20industry,%20firms%20warn.pdf"}, {"id": "scmp-13", "title": "Shanghai unveils quantum computing hub as China races for tech supremacy", "source": "SCMP", "date": "3 Jul 2026", "tags": ["Technology & AI"], "summary": "Shanghai launched a dedicated quantum computing industrial hub in Xuhui district, drawing an initial 26 quantum firms as it competes with other Chinese cities. The Shanghai Quantum Computing Future Industry Incubation Zone will offer up to 100 million yuan (US$14.73 mill
