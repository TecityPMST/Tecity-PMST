 Iranian negotiators said progress was being made on oil sanction waivers and the release of frozen assets, but warned wider talks cannot advance until the Lebanon war ends. Technical talks continue at the Burgenstock resort.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Iran%20Mediators%20Offer%20Plan%20to%20Ease%20Lebanon%2C%20Hormuz%20Tensions.pdf"}, {"id": "wsj-05", "title": "Iran and Trump Blame Israel First", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "The WSJ editorial board notes Iran again declared the Strait of Hormuz closed, blaming the US for a clear breach of the memorandum of understanding, while Trump and Vance publicly criticised Netanyahu. The board argues Iran is orchestrating escalations to divide the US and Israel and win immunity for Hezbollah. It contends Trump gave away his leverage by signing the MOU, easing sanctions and ending the port blockade. The piece warns that attacking allies while appeasing adversaries amounts to peace through weakness.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Iran%20and%20Trump%20Blame%20Israel%20First.pdf"}, {"id": "wsj-06", "title": "Russia Faces Spreading Fuel Shortages After Ukrainian Drones Pummel Refineries", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Ukrainian long-range drone strikes have knocked an estimated 20%-plus of Russian refining capacity offline, triggering fuel rationing, surging prices and long queues. The IEA called the disruption unprecedented in the history of the conflict. Purchase restrictions have spread to 53 regions, and Crimea suspended private fuel sales entirely. Kyiv has targeted Russia's biggest, most modern refineries, repeatedly hitting the Moscow refinery in one of the largest attacks on the capital since 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Russia%20Faces%20Spreading%20Fuel%20Shortages%20After%20Ukrainian%20Drones%20Pummel%20Refineries.pdf"}, {"id": "wsj-07", "title": "The Biggest Risks Threatening This Highflying Stock Market", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Finance & Markets"], "summary": "Sam Goldfarb surveys the risks beneath a record-seeking US market: stretched valuations, higher rates, AI jitters and surging stock supply. The S&P 500's excess CAPE yield sits near a decade low around 1.3%, signalling thin compensation versus Treasurys. New Fed chair Kevin Warsh struck a more hawkish tone on inflation than expected. Four big tech firms are set to spend over $670 billion on AI infrastructure this year, making any pullback the market's biggest threat.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Biggest%20Risks%20Threatening%20This%20Highflying%20Stock%20Market.pdf"}, {"id": "wsj-08", "title": "The Memory-Chip Crisis Is Here — and You’re Footing the Bill", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A DRAM and NAND shortage driven by AI demand is pushing consumer-electronics prices sharply higher: the Surface Pro rose $600, the Switch 2 hit $499, and the iPhone 18 Pro may reach $1,299. The market is dominated by just three makers — SK Hynix, Samsung and Micron — whose values have roughly quintupled, with SK Hynix and Micron each topping $1 trillion. Micron's contract price for a common data-centre memory chip jumped from $350 to $1,300 over a year. Analysts expect shortages and price increases to persist for years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Memory-Chip%20Crisis%20Is%20Here-and%20You%E2%80%99re%20Footing%20the%20Bill.pdf"}, {"id": "wsj-09", "title": "The US Is Ramping Up Economic Warfare, but Its Enemies Aren’t Blinking", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "The US has imposed more than 1,000 sanctions on Iran in 18 months, yet Tehran's resilience exposes the limits of economic pressure on rogue regimes. Iran kept generating billions — an estimated $43 billion from oil in 2024, mostly to China — forcing Washington to physically blockade its ports. New US sanctions listings jumped from 880 in 2017 to over 3,000 in 2024, but North Korea, Russia, Venezuela and others have largely withstood them. Critics say the failure lies in enforcement, not the sanctions themselves.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20U.S.%20Is%20Ramping%20Up%20Economic%20Warfare.%20Its%20Enemies%20Aren%E2%80%99t%20Blinking..pdf"}, {"id": "wsj-10", "title": "The Would-Be Intelligence Chief Caught Between Trump and Congress", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Jay Clayton, the SDNY US attorney and Trump ally, has had his nomination as director of national intelligence delayed as Trump pressures Congress to pass election legislation. The hold could leave Clayton in limbo while acting director Bill Pulte — feared by some lawmakers as a politicising force — remains in place. Clayton has balanced loyalty with some independence, rebuffing a probe tied to E. Jean Carroll's suits against Trump. The episode underscores tensions between the independent-minded office and a Justice Department closely aligned with the White House.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/The%20Would-Be%20Intelligence%20Chief%20Caught%20Between%20Trump%20and%20Congress.pdf"}, {"id": "wsj-11", "title": "Victory Over Iran Is Still Possible", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "In an op-ed, former Vice-President Mike Pence argues the US-Iran memorandum is appeasement — a plan to make a plan — that fails to require verifiable dismantlement of Iran's nuclear and ballistic-missile programs. He warns it grants immediate sanctions relief worth an estimated $5 billion a month while postponing the hard security questions. Pence urges using the 60-day window to secure concessions first, insisting on verify and never trust. He says Trump should be prepared to let the military finish the job if goals aren't met.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Victory%20Over%20Iran%20Is%20Still%20Possible.pdf"}, {"id": "wsj-12", "title": "Wall Street's Hiring Dilemma: AI Can Model but Can’t Make the Next Rainmaker", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Banks are deploying AI across legal, wealth and investment-banking work — JPMorgan and Citi use Rogo's Felix agent, and Citi partnered with Google on a wealth agent — while wrestling with workforce implications. More than two-thirds of banking executives expect AI to have little impact on overall staffing over three years, though Standard Chartered plans to cut over 15% of back-office roles. Executives stress AI can accelerate modelling but cannot replace relationship-driven rainmakers. Jamie Dimon says some roles are already displaced but talented staff can be redeployed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Wall%20Street%20Hiring%20Dilemma%20AI%20Can%20Model%20but%20Can%E2%80%99t%20Make%20the%20Next%20Rainmaker.pdf"}, {"id": "wsj-13", "title": "Why Apple’s War Chest Can’t Win the Memory War", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Apple says it will raise product prices as soaring memory costs become unsustainable, a humbling admission for a company famed for supply-chain dominance. TrendForce expects DRAM prices for high-end smartphones to surge as much as 83% this quarter. Nvidia, buying tens of billions in DRAM for AI systems, is on track to overtake Apple in annual free cash flow, eroding Apple's procurement clout. As the only trillion-dollar tech firm without a major AI foothold, Apple faces a structural disadvantage because memory hits its cost of goods directly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Why%20Apple%E2%80%99s%20War%20Chest%20Can%E2%80%99t%20Win%20the%20Memory%20War.pdf"}, {"id": "wsj-14", "title": "Why the Memory Crunch Is Almost Impossible to Solve", "source": "WSJ", "date": "23 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "With only a handful of memory makers and fabs taking years to build, policymakers have few quick fixes for the shortage behind Apple's price hikes. Micron's new Idaho plant won't open until mid-2027 and its New York facility not until 2030, while the big three stay cautious to avoid a glut despite record margins. Chinese makers CXMT and Yangtze Memory are expanding fast — CXMT's revenue rose over 700% year-on-year in Q1 2026 — but US national-security rules limit cooperation. Some consumer-tech firms are lobbying to loosen China restrictions even as Micron pushes for tighter ones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20WSJ/Why%20the%20Memory%20Crunch%20Is%20Almost%20Impossible%20to%20Solve.pdf"}, {"id": "st-01", "title": "Australia Sells Advanced Radar to Canada in S$2.26 Billion Deal", "source": "ST", "date": "23 Jun 2026", "tags": ["Defence", "Trade"], "summary": "Australia signed a record A$2.5 billion (S$2.26 billion) deal to export its over-the-horizon radar system to Canada, its largest-ever defence export and the first international sale of the technology. BAE Systems Australia begins delivery on July 1, with the system to bolster Canada's Arctic surveillance and strengthen NORAD. Defence Minister Richard Marles called it a significant new strategic dimension to the relationship. The deal supports about 300 jobs in Australia and nearly 2,300 a year in Canada, which signalled it is diversifying defence ties beyond the US.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Australia%20sells%20advanced%20radar%20to%20Canada%20in%202.26%20billion%20deal.pdf"}, {"id": "st-02", "title": "Britain’s Second Thoughts About Brexit Are Only Growing Stronger", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "On the tenth anniversary of the 2016 referendum, Jonathan Eyal argues Britain has quietly turned against Brexit even as no party in power will reopen it. The decision has helped destroy the careers of six consecutive prime ministers, including the departing Keir Starmer. Eyal contends the dimension that now matters most — security — was barely mentioned in 2016, leaving Britain marooned between a Europe it spurned and an America it can no longer count on. He frames Brexit as a verdict of failure attached to a status quo nobody dares revisit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Britain%27s%20second%20thoughts%20about%20Brexit%20are%20only%20growing%20stronger.pdf"}, {"id": "st-03", "title": "China Is Having Another AI Moment", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Beijing lab Zhipu's new GLM 5.2 is the most capable Chinese-trained model yet, runs at less than a tenth of the price of Anthropic's Fable 5, and ships with open weights, ranking fourth overall and top among open-source models on Artificial Analysis. The release lands days after the Trump administration barred non-Americans from Fable 5, prompting Anthropic to switch off access for everyone. Still, Fable 5 is about 17% cleverer on average, and private benchmarks suggest the US lead is really eight to ten months. Analysts warn Chinese models may teach to the test on public benchmarks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%20is%20having%20another%20AI%20moment.pdf"}, {"id": "st-04", "title": "China Moves Against US Rare Earth and Defence Firms in a Calibrated Response", "source": "ST", "date": "23 Jun 2026", "tags": ["Trade", "Defence"], "summary": "Beijing imposed export controls on 10 US companies — including rare-earth producers MP Materials and USA Rare Earth, plus L3Harris and drone maker Red Cat — and procurement bans on 46 firms such as Lockheed Martin and Raytheon. Analysts view it as a calibrated response to Washington's expanded Pentagon 1260H blacklist, which added Alibaba and Baidu. The controls extend extraterritorially, barring third parties from routing Chinese-origin dual-use items to the listed firms. China still controls more than 70% of rare-earth production and nearly 90% of refining capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%20moves%20against%20US%20rare%20earth%2C%20defence%20firms%20in%20%27calibrated%27%20response%20to%20Pentagon%20blacklist.pdf"}, {"id": "st-05", "title": "China’s Electric Vehicle Giants Are Building Much More Than Cars", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's EV dominance is generating dual-use capabilities that feed Beijing's civil-military fusion strategy, the piece argues, even without direct military control of carmakers. Modern EVs are software-defined platforms built on AI, sensors, mapping and autonomous navigation that can support unmanned systems and intelligent logistics. Battery leaders BYD and CATL, scaled through state support and competition, have technology adaptable to drones and other platforms. The analysis draws a parallel to China's shipbuilding sector, where commercial scale underpins naval capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/China%27s%20electric%20vehicle%20giants%20are%20building%20much%20more%20than%20cars.pdf"}, {"id": "st-06", "title": "From Sidelines to Centre Stage: Andy Burnham on Course to Be UK’s Next PM", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Greater Manchester mayor Andy Burnham, the King of the North, is the front-runner to succeed Keir Starmer after a decisive Makerfield by-election win that helped force the resignation. Burnham pitches himself as the only Labour figure with the charisma to beat Nigel Farage's Reform UK, which has led polls since early 2025. A supporter of decentralisation and a more interventionist state, he has recently moved toward the centre on nationalisation and the EU. If confirmed he would be Britain's seventh prime minister in a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/From%20sidelines%20to%20centre%20stage%2C%20Andy%20Burnham%20on%20course%20to%20be%20UK%27s%20next%20prime%20minister.pdf"}, {"id": "st-07", "title": "Israeli PM Netanyahu Faces One of the Biggest Challenges of His Career", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "With a final US-Iran deal due in about 60 days and an Israeli election weeks later, Netanyahu is fighting for political survival over an agreement Israel was not party to. Israelis across the spectrum have denounced the preliminary deal as a US capitulation that curtails Israel's freedom of action in Lebanon and leaves Iran's missiles and nuclear program unaddressed. Trump has publicly demeaned Netanyahu, saying he gets a little excited sometimes. Analysts call the outcome a colossal failure that hands Iran an economic windfall while delaying hard concessions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Israeli%20PM%20Netanyahu%20faces%20one%20of%20the%20biggest%20challenges%20of%20his%20career.pdf"}, {"id": "st-08", "title": "Keir Starmer Resigns as UK Prime Minister", "source": "ST", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Keir Starmer has resigned as Labour leader, becoming the sixth British leader forced from office in a decade, and will stay on as PM until a successor is chosen between mid-July and September. Jonathan Eyal argues Starmer's undoing was the technocratic, vision-light outsider image that first made him popular. Repeated policy U-turns — scrapping then restoring the winter fuel allowance, and abandoning disability-benefit cuts — left him with the worst of all worlds. As he weakened, cabinet figures including finance minister Rachel Reeves openly defied him.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Keir%20Starmer%20resigns%20as%20UK%20Prime%20Minister.pdf"}, {"id": "st-09", "title": "Moscow Shoots Down Nearly 80 Drones; Russian Attacks Kill Six in Ukraine", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "More than 80 Ukrainian drones were downed over Moscow and 301 across Russian-controlled areas overnight, briefly suspending flights at the capital's airports days after Ukraine again struck Moscow's oil refinery. Russian drone and missile attacks killed at least six people in Ukraine, including three members of one family in the Sumy region. Russian drones also hit civilian merchant vessels, killing an Egyptian crew member aboard the Turkish-operated Victress. Crimea cancelled public events and curbed electricity use amid a deepening fuel crisis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Moscow%20shoots%20down%20nearly%2080%20drones%20Russian%20attacks%20kill%20six%20in%20Ukraine.pdf"}, {"id": "st-10", "title": "Singapore Dollar Set to Gain Against US Dollar, Say Analysts", "source": "ST", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Strategists expect the Singapore dollar to strengthen in the second half of 2026 despite a hawkish Federal Reserve, with the median Bloomberg forecast at 1.26 per US dollar — a gain of about 2.4% from last week's 1.2912. Expectations of further MAS tightening in July, given upside inflation risks, underpin the bullish view; ANZ sees 1.255 by year-end. Unlike peers, MAS manages the exchange rate via the S$NEER band rather than interest rates. Investors awaited May core inflation data, projected to rise to 1.6%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Singapore%20dollar%20set%20to%20gain%20against%20US%20dollar%2C%20say%20analysts.pdf"}, {"id": "st-11", "title": "Singapore Key to GlobalFoundries’ Quest to Equip Humanoid Robots With AI", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "GlobalFoundries, with a large Singapore footprint, sees physical AI — humanoid robots and the data-centre infrastructure to support them — as the next wave, and its 2025 acquisition of Singapore's Advanced Micro Foundry made it the world's largest pure-play silicon-photonics foundry. CTO Gregg Bartlett says the anticipatory investments position GF for a massive ramp over the next five years. BofA projects humanoid robot shipments rising from 20,000 units in 2025 to 10 million by 2035, with 90,000 expected in 2026. The deals reinforce Singapore's standing as a critical node in the global chip supply chain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Singapore%20key%20to%20GlobalFoundries%27%20quest%20to%20equip%20humanoid%20robots%20with%20AI.pdf"}, {"id": "st-12", "title": "South Korea’s Early Exports Jump Again as AI Boom Fuels Chip Demand", "source": "ST", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "South Korea's working-day-adjusted exports rose 49.7% year-on-year in the first 20 days of June, with chip exports soaring 188.4% and computer-related products up 293.3%, producing a $17.5 billion trade surplus. The data reinforce that semiconductors remain the primary driver of growth amid the AI and data-centre investment boom. The Bank of Korea has turned more hawkish, citing inflation risks from higher oil prices and a weaker won, with May CPI at 3.1%. Exports to China rose almost 87% and to the US nearly 54%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/South%20Korea%27s%20early%20exports%20jump%20again%20as%20AI%20boom%20fuels%20chip%20demand.pdf"}, {"id": "st-13", "title": "Syrian President Denies Wanting to Intervene in Lebanon After Trump Remarks", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics"], "summary": "Syrian President Ahmed al-Sharaa denied seeking to intervene militarily in Lebanon after Trump repeatedly suggested Damascus could take on Hezbollah, saying Syria wants economic channels not military ones. Trump told Fox News he was disappointed Israel cannot put Hezbollah away and was close to giving it over to Syria. Sharaa, whose forces toppled Assad in 2024, is hostile to Hezbollah but cautious given Syria's fraught history of intervention in Lebanon. He said any role depends primarily on Lebanon's agreement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Syrian%20President%20denies%20wanting%20to%20intervene%20in%20Lebanon%20after%20Trump%20remarks.pdf"}, {"id": "st-14", "title": "Taiwanese Brothers Amass US$1 Billion From Boom in Display Chips", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Brothers Wu Biing-seng and Jordan Wu have become billionaires as their company Himax Technologies rides a boom in display driver chips, with its US-listed shares more than doubling in 2026. Himax holds a 40% market share in automotive display chips, supplying Ferrari, Volkswagen and Porsche, and the brothers' 24% stake gives them a combined US$1 billion net worth. The fabless firm is now betting on smart glasses, AI and co-packaged optics for data centres. Taiwan's billionaire count rose 9% to 51 in 2025, more than Japan or South Korea.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Taiwanese%20brothers%20amass%201.3%20billion%20from%20boom%20in%20display%20chips.pdf"}, {"id": "st-15", "title": "Vance Hails a Good Foundation for Iran Deal After Direct Talks", "source": "ST", "date": "23 Jun 2026", "tags": ["Geopolitics"], "summary": "Vice-President J.D. Vance declared a very good foundation for a final Iran deal after marathon talks in Switzerland, saying Tehran agreed to invite IAEA inspectors back after a year-long suspension. The two sides are at the start of a 60-day window to reach a long-term settlement covering Iran's nuclear program and enriched-uranium stockpile. Mediators Pakistan and Qatar said a road map and a Lebanon deconfliction cell had been agreed, plus a contact channel to keep the Strait of Hormuz open. Iran said oil and petrochem exports are waived and some frozen assets released.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Vance%20hails%20%27good%20foundation%27%20for%20Iran%20deal%20after%20direct%20talks.pdf"}, {"id": "st-16", "title": "While the World Scrambles for Oil, China Sits on Full Tanks", "source": "ST", "date": "23 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "As the US and Iran haggle over reopening the Strait of Hormuz, China — the world's largest oil importer — is not expected to ramp purchases quickly because its crude stockpiles remain nearly full. Beijing cut daily imports by roughly a third during the war, easing global price pressure, and appears not to have tapped strategic reserves. China has long accumulated inventories when prices are low and increasingly parks surplus foreign exchange in commodities after seeing Russia's assets frozen. Analysts expect only gradual, price-sensitive buying as oil prices stay above pre-war levels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/While%20the%20world%20scrambles%20for%20oil%2C%20China%20sits%20on%20full%20tanks.pdf"}, {"id": "st-17", "title": "Why It’s Nearly Impossible to Build a Robot Without China", "source": "ST", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Once led by Japan, the robotics race now belongs to China, which dominates the humanoid supply chain with firms like Unitree selling humanoids for under US$5,000. Components once imported from Japan are now made in China, making it nearly impossible to build a humanoid without Chinese parts, says BofA's Ming Hsun Lee. China installed more than 300,000 factory robots in 2024 — more than the rest of the world combined — with over two million operating in its plants. The lead is tied to its EV industry, whose component suppliers now serve robot makers; even Tesla relies on China for at least 70% of components.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20ST/Why%20it%27s%20nearly%20impossible%20to%20build%20a%20robot%20without%20China.pdf"}, {"id": "bt-01", "title": "Anthropic vs Trump Administration: Who Decides the Use of Advanced AI?", "source": "BT", "date": "23 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "The piece traces a months-long confrontation between Anthropic and the US government over who decides how powerful AI is used. It began when the Pentagon pushed Anthropic in February 2026 to allow all lawful uses of Claude in defence contracts; Anthropic sought carve-outs barring autonomous weapons and mass surveillance, prompting Secretary of War Pete Hegseth to brand it a supply chain risk and order agencies to stop using its products. In June a national-security export-control directive forced Anthropic to cut off all foreign nationals from its new Fable 5 and Mythos 5 models, leading it to shut them down for everyone — reportedly after a cyber-safeguard jailbreak and concerns its technology reached a China-linked firm. Anthropic is both suing and negotiating, leaving unresolved who bears the burden of proof when frontier-AI risks are hard to verify in real time.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Anthropic%20vs%20Trump%20administration%20Who%20decides%20the%20use%20of%20advanced%20AI.pdf"}, {"id": "bt-02", "title": "Beyond US-China Rivalry: The Triangular Geopolitics of Critical Minerals", "source": "BT", "date": "23 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "The commentary argues critical-minerals competition is no longer a simple US-China contest but a triangular relationship among the technology-rich West, processing-dominant China, and the resource-rich Global South. The G7 recently pledged to cut reliance on any single rare-earth supplier below 60% by 2030. Resource nationalism — exemplified by Indonesia's downstream-processing strategy — is rewriting globalisation as countries seek to capture more value. The author contends the three groups must cooperate rather than decouple, since the world is shifting its dependence from fossil fuels to minerals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Beyond%20US-China%20rivalry%20triangular%20geopolitics%20of%20critical%20minerals%20is%20reshaping%20global%20trade.pdf"}, {"id": "bt-03", "title": "Buy or Build Software? Firms Must Weigh Control, Reversibility and Risk", "source": "BT", "date": "23 Jun 2026", "tags": ["Technology & AI"], "summary": "The traditional buy-versus-build calculus of cost and relevance must now add control, reversibility and risk, the author argues, because software has become the operating model rather than a support function. AI has slashed the cost of building internal tools — one engineer built an app and an autonomous agent in two weeks — shifting many categories from obviously buy to worth evaluating. Meanwhile dependence has grown costlier: European cloud providers reported VMware price increases of 800% to 1,500% after Broadcom's acquisition, and Oracle now licenses Java by total headcount. Firms like Klarna and 37signals have dropped major vendors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Buy%20or%20build%20software%20Firms%20need%20to%20look%20at%20control%2C%20reversibility%20and%20risk.pdf"}, {"id": "bt-04", "title": "Chasing Global Capital: South-east Asia Markets Turn to Value-Up Reforms", "source": "BT", "date": "23 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore, Thailand and Malaysia are stepping up value-up reforms to close valuation discounts and attract capital as Asian private wealth grows and investors demand stronger returns. The shift follows Japan's 2023 Tokyo Stock Exchange capital-efficiency push and South Korea's 2024 Corporate Value-Up Programme tackling the Korea discount. Unlike those mandate-driven efforts, South-east Asia favours a hybrid of incentives and guidance, such as MAS and SGX's S$6.5 billion Equity Market Development Programme and Value Unlock initiative. Analysts cite ageing demographics and rising family-office density as drivers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Chasing%20global%20capital%20South-east%20Asia%20markets%20turn%20to%20%27value%20up%27%20reforms.pdf"}, {"id": "bt-05", "title": "Meet Rental Demand by Letting Developers Keep Some Condo Units", "source": "BT", "date": "23 Jun 2026", "tags": ["Southeast Asia", "Society"], "summary": "This commentary proposes letting developers retain a small share of condo units — up to about 5% of inventory, held for at least 10 years — for leasing without triggering ABSD remission clawback, to safeguard Singapore's future private rental supply. It warns the ABSD regime (20% on a citizen's second home, 30% on a third, and 60% for non-PR foreigners) is curbing investment demand as homes are increasingly bought for owner-occupation. Employment Pass holders rose 15% to 203,300 by December 2025, while URA's private home rental index in Q1 2026 stood 55.3% above Q4 2020, underscoring demand. Developers have shunned the long-stay serviced-apartment alternative, with several government land sale tenders drawing zero or rejected bids.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Meet%20rental%20demand%20by%20letting%20developers%20keep%20ownership%20of%20some%20condo%20units%20without%20hefty%20penalties.pdf"}, {"id": "bt-06", "title": "One-Year Countdown: Existing SFOs Align With Revised MAS Framework", "source": "BT", "date": "23 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Singapore's revised single-family-office framework took effect on June 15, and existing SFOs have one year to comply with simplified rules built on three core requirements: notifying MAS, maintaining a regulated-bank relationship and filing an annual return. Advisers had hoped existing players would be grandfathered in, but they must instead revisit structures, documentation and eligibility before the June 2027 deadline. A new cap limits assets originating from key employees to 10% of total AUM. Practitioners say lean, multigenerational family offices will need time to build governance and reporting infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/One-year%20countdown%20Existing%20SFOs%20evaluate%20how%20they%20can%20align%20with%20revised%20MAS%20framework.pdf"}, {"id": "bt-07", "title": "SK Hynix Overtakes Samsung to Become South Korea’s Most Valuable Company", "source": "BT", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SK Hynix overtook Samsung Electronics as South Korea's most valuable listed company, with its market capitalisation reaching 2,080.4 trillion won (S$1.8 trillion) after a more than 340% share rally this year. The dominant supplier of high-bandwidth memory for Nvidia and Google, SK Hynix captured 61% of the global HBM market in 2025, far ahead of Samsung's 17% and Micron's 21%. It is the world's most valuable memory chipmaker, marking one of the biggest turnarounds in Korean corporate history after near-collapse in 2002. Samsung, which had held the top spot since 2000, noted its value exceeds SK Hynix's when preferred shares are included.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/SK%20Hynix%20overtakes%20Samsung%20to%20become%20South%20Korea%27s%20most%20valuable%20company.pdf"}, {"id": "bt-08", "title": "South Korea’s Policy Chief Flags Property Risks From Chip Windfall", "source": "BT", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Presidential policy chief Kim Yong-beom warned that gains from South Korea's AI-driven chip boom could spill into property speculation, noting excess liquidity has historically flowed into real estate. He highlighted a gap between 3.8% real GDP growth and 13.2% real gross domestic income growth in Q1, as rising chip prices boosted purchasing power faster than output. Seoul apartment prices have risen for 72 straight weeks despite cooling measures. Kim called for normalising property and capital-gains taxes and warned tighter policy could fall hardest on small businesses yet to feel the boom.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/South%20Korea%27s%20policy%20chief%20flags%20property%20risks%20from%20chip%20windfall.pdf"}, {"id": "bt-09", "title": "The Mass Affluent Are Losing Their Allure for Wealth Managers Navigating AI", "source": "BT", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "McKinsey's Debasish Patnaik argues that AI now gives mass-affluent clients — those with US$100,000 to US$1 million — something close to private-banking quality, stripping value from advisers who offered standardised advice. Human managers will increasingly focus on the emotional needs of the truly rich, reading the room through succession and liquidity events. Yet signals are mixed: Citigroup plans to add 400 wealth advisers and 100 private-bank staff even as it builds AI tools for near-instant portfolio reviews. At UBS, 90% of US advisory teams already use an internal AI platform.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/The%20%27mass%20affluent%27%20are%20losing%20their%20allure%20for%20wealth%20managers%20navigating%20AI.pdf"}, {"id": "bt-10", "title": "Why Sinodollars Outweigh the Petroyuan", "source": "BT", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "The column argues talk of a petroyuan displacing the dollar is overstated, because China's economic model depends on accumulating dollar assets — sinodollars — that still dominate global finance. The petrodollar's power came less from oil priced in dollars than from Gulf states reinvesting their surpluses; Russia, Iran and Gulf producers today spend their yuan on imports rather than building an offshore yuan pool. Yuan settlement of China's goods trade hit a record 33.5% in March-April 2026, but capital controls and shallow markets limit the currency's reserve role. The modern equivalent of petrodollars is the recycled surpluses of East Asian manufacturers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Why%20sinodollars%20outweigh%20the%20petroyuan.pdf"}, {"id": "bt-11", "title": "Will Climate Risk Derail South-east Asia’s US$564 Billion Data Centre Boom?", "source": "BT", "date": "23 Jun 2026", "tags": ["Environment", "Southeast Asia"], "summary": "South-east Asia's data-centre investment is projected to reach US$564 billion by 2028, growing 20% a year, yet the region is among the world's most exposed to physical climate risk, with more than one in ten facilities classified high-risk. Low insurance penetration leaves a data gap, so capital providers lack visibility into real liabilities. Low-lying cities like Bangkok and Ho Chi Minh City face chronic flooding that can knock out the power and fibre lifelines on which 24/7 data centres depend. The author urges a shift to forward-looking probabilistic flood modelling, warning climate volatility could reprice the boom and raise the cost per gigabyte.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Will%20climate%20risk%20derail%20South-east%20Asia%27s%20US564%20billion%20data%20centre%20boom.pdf"}, {"id": "bt-12", "title": "Zombie Unicorns Are Haunting Silicon Valley", "source": "BT", "date": "23 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "By May 2026, 332 of 1,900 unicorns tracked by Stanford's Ilya Strebulaev had raised money at or below their peak valuation, with 212 now valued under US$1 billion — zombie unicorns. Cameo has collapsed from a US$1 billion valuation to US$82 million and SonderMind from US$1.1 billion to US$7 million. Venture fundraising fell from US$223 billion in 2022 to US$66 billion in 2025 as higher rates bit, leaving struggling startups unable to raise at old marks. Pitchbook expects net valuation cuts of US$500 billion to US$1 trillion as companies reprice, sell or go bust.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20BT/Zombie%20unicorns%20are%20haunting%20Silicon%20Valley.pdf"}, {"id": "scmp-01", "title": "Amid PLA Pressure, Taiwan Starts Drill to Simulate Rapid Deployment", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan began its week-long Immediate Combat Readiness Exercise to sharpen the military's ability to shift quickly to a wartime footing, as sustained mainland air and naval operations blur the line between peace and war. The drill, focused on the period just before conflict, began hours after the PLA conducted its second long-range maritime mission of the year, with 21 aircraft detected. Officials called it a planned annual exercise but acknowledged Beijing's expanding grey-zone pressure shaped the training. It is the first stage of a revamped framework leading to the large-scale Han Kuang war games in August.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Amid%20PLA%20pressure%2C%20Taiwan%20starts%20drill%20to%20simulate%20rapid%20deployment%20in%20a%20crisis.pdf"}, {"id": "scmp-02", "title": "As Europe Rearms, Can It Decouple Its Military Supply Chains From China?", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Defence", "Trade"], "summary": "Analysts say Europe will selectively de-risk rather than fully decouple its defence supply chains from China, as the cost of freezing Beijing out would be too high. The G7 declaration to cut reliance on a single rare-earth supplier below 60% by 2030 reflects mounting concern, given China supplies over 90% of rare earths, more than 80% of drone parts and 70% of the cotton linters used in propellants. The EU's ReArm Europe plan proposes over EUR 800 billion in defence spending, and its RESourceEU plan mobilises up to EUR 3 billion for critical raw materials. Localisation and joint partnerships dominated the Eurosatory defence exhibition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/As%20Europe%20rearms%2C%20can%20it%20decouple%20its%20military%20supply%20chains%20from%20China.pdf"}, {"id": "scmp-03", "title": "Can the Quad Break China’s Mineral Monopoly Amid a US-India Rift?", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "A US strike on an oil tanker in the Gulf of Oman that killed three Indian sailors has strained US-India ties and cast doubt on the Quad's cohesion and its critical-minerals agenda. Yet analysts say shared anxiety over dependence on China may keep the bloc's US$20 billion Critical Minerals Initiative on track despite the friction. Secretary of State Marco Rubio recently called India a linchpin partner while announcing new maritime and economic-security initiatives. China's near-monopoly in processing graphite, gallium, germanium and rare earths — and its fresh export controls — reinforce the group's resolve.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Can%20Quad%20break%20China%E2%80%99s%20mineral%20monopoly%20amid%20US-India%20rift.pdf"}, {"id": "scmp-04", "title": "China Closing In, but US Leads in Biotech Quality and Commercial Reach", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "A Cure Innovation Index survey of senior US industry and academic leaders found China leads in clinical development and supply chain, while the US leads in capital, commercialisation and talent, with the two tied in scientific discovery. China now runs more clinical drug trials than the US, and its share of early drug-development programmes rose to over 32% by 2024 from 8% in 2015. Yet 85% of respondents said the US lead will last ten years or less, and most see China as an existential threat. Notably, they rated US research-funding cuts a bigger threat than Chinese competition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/China%20closing%20in%20but%20US%20leads%20in%20biotech%20quality%20and%20commercial%20reach%2C%20survey%20finds.pdf"}, {"id": "scmp-05", "title": "China Defends Role in Global Supply Chains Amid Strait of Hormuz Crisis", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Vice-Premier Ding Xuexiang said China's role in stabilising energy and fertiliser markets during the Strait of Hormuz crisis proves it is a defender, not disruptor, of global supply chains. Speaking at the China International Supply Chain Expo, he rejected the Western overcapacity and China shock narratives as cover for protectionism, insisting China never actively pursues a trade surplus. China posted a record near-US$1.2 trillion trade surplus in 2025. Ding warned against politicising trade and urged an open global energy market and sustainable cooperation on critical minerals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/China%20defends%20role%20in%20global%20supply%20chains%20amid%20Strait%20of%20Hormuz%20crisis.pdf"}, {"id": "scmp-06", "title": "China Launches Plan to Revive Foreign Investment as FDI Continues to Fall", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "China unveiled a 15-measure action plan to stabilise inbound investment amid a sustained decline in FDI, expanding market access across services, finance and healthcare. Measures include wider financial-sector opening, earlier access for Hong Kong and Macau investors, and full implementation of national treatment for foreign firms in government procurement. Beijing also pledged tax incentives for reinvested profits and more pilot zones for foreign-invested biotech and hospitals. Analysts welcomed the signal but cautioned the plan is light on implementation detail amid growing pessimism among foreign chambers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/China%20launches%20plan%20to%20revive%20foreign%20investment%20as%20FDI%20continues%20to%20fall.pdf"}, {"id": "scmp-07", "title": "China Says It Warned Off Japanese Provocations During Carrier Drills", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Chinese state broadcaster CCTV aired footage of the Liaoning carrier group warning off Japanese warships and surveillance aircraft in at least four close-range encounters during a 40-day Pacific exercise. Beijing accused Japan of repeated tracking and provocations, while Japan said it monitored some 170 take-offs and landings and shadowed the group through the Miyako Strait. Tensions have run high since PM Sanae Takaichi said in November an attack on Taiwan might trigger Japanese military intervention. Beijing also criticised Tokyo-Manila maritime boundary talks and Japan's more assertive defence posture.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/China%20says%20it%20warned%20off%20multiple%20Japanese%20%E2%80%98provocations%E2%80%99%20during%20aircraft%20carrier%20drills.pdf"}, {"id": "scmp-08", "title": "China’s Green Exports to the US Surge as AI Boom and Iran War Lift Demand", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Trade", "Energy"], "summary": "China's exports of green-energy and battery products to the US accelerated last month, with unassembled photovoltaic cells up 346% year-on-year and lithium-ion batteries up 20.8% to US$780 million. The surge reflects easing trade tensions after May's Xi-Trump summit and US energy-security concerns following the Strait of Hormuz disruption. AI data-centre electricity demand and grid upgrades are providing sustained support for batteries and storage. Globally, China's lithium-battery exports rose 37% in May to US$8 billion, underscoring its commanding clean-energy supply chain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/China%E2%80%99s%20green%20exports%20to%20the%20US%20surge%20as%20AI%20boom%2C%20Iran%20war%20lift%20demand.pdf"}, {"id": "scmp-09", "title": "ECB President Lagarde Urges Talks on Yuan Undervaluation", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "ECB President Christine Lagarde urged global leaders to address the undervaluation of the Chinese yuan as part of the imbalances endangering the world economy. She cited IMF research indicating the renminbi is 15% to 16% undervalued when adjusted for inflation differences. China denies manipulating its currency, but its surging trade surpluses worry G7 leaders alongside US deficits and European underinvestment. Lagarde dismissed the idea of a new Plaza Accord to strengthen the yuan, saying 1985's conditions no longer apply.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/European%20Central%20Bank%E2%80%99s%20President%20Lagarde%20urges%20talks%20on%20yuan%20undervaluation.pdf"}, {"id": "scmp-10", "title": "Frozen Iranian Assets Could Buy US Soybeans in a Classic Trump Deal: Vance", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "Vice-President J.D. Vance floated using unfrozen Iranian assets to buy US agricultural products, crediting Jared Kushner with the very classic Trump deal that would feed Iranians while enriching American farmers. Some US$100 billion in Iranian assets are frozen worldwide, to be released once a final deal takes effect under the 14-point memorandum. The proposal targets a key Republican constituency ahead of November midterms as farmers reel from the China tariff war, with Beijing having shifted soybean orders to Argentina and Brazil. Iran has not said whether it would accept the terms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Frozen%20Iranian%20assets%20could%20be%20used%20to%20buy%20US%20soybeans%20in%20%E2%80%98classic%20Trump%20deal%E2%80%99%20Vance.pdf"}, {"id": "scmp-11", "title": "How Keir Starmer Will Be Replaced — and Will Anyone Stand Against Burnham?", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Politics"], "summary": "Starmer conceded he had lost his MPs' support and will step down once a successor is chosen, possibly by mid-July, with Labour's nominations opening July 9. Andy Burnham, who won nearly 55% in the Makerfield by-election, is the clear front-runner and has confirmed he will stand. Wes Streeting, once seen as his main rival, is backing him, and many in Labour want an uncontested transition before the party conference. Other potential candidates, including Angela Rayner and Al Carns, have yet to comment; a contest could drag the race into September.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/How%20Keir%20Starmer%20will%20be%20replaced%20as%20UK%20PM%20and%20will%20anyone%20stand%20against%20Burnham.pdf"}, {"id": "scmp-12", "title": "How Are Chinese Firms Faring as AI Reshapes Global Market-Cap Rankings?", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Nvidia tops the global rankings at about US$5.1 trillion, with seven US tech firms among the world's ten largest, as AI redraws the corporate order. China's largest listed firms remain dominated by state-owned banks, energy producers and brands like Kweichow Moutai, with Tencent leading domestically at roughly US$505 billion. SpaceX's debut as the sixth-largest listed firm underscored investor conviction that the old economy is fading. Private-sector giants such as CATL and a new generation of AI start-ups like Zhipu — whose market cap topped HK$1 trillion — hint at an incremental rebalancing toward innovation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/How%20are%20Chinese%20firms%20faring%20as%20AI%20and%20tech%20reshape%20global%20market%20cap%20rankings.pdf"}, {"id": "scmp-13", "title": "Iran Agrees to Invite IAEA Inspectors Back, Says US", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Geopolitics"], "summary": "Vice-President J.D. Vance said Iran has agreed to invite IAEA inspectors back after a first round of US-Iran talks in Switzerland, calling it the first step toward permanently ending Iran's nuclear-weapons program. The IAEA estimates Iran holds 440kg of uranium enriched to 60%, close to weapons grade, unseen by inspectors since cooperation was suspended after the 2025 attacks. Mediators Pakistan and Qatar said negotiators agreed a road map toward a final deal within 60 days, with technical talks continuing at Burgenstock. Under the preliminary deal, Iran will dilute its enriched-uranium stocks, possibly by down-blending on site under IAEA supervision.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Iran%20agrees%20to%20invite%20IAEA%20inspectors%20back%2C%20says%20US.pdf"}, {"id": "scmp-14", "title": "Is China Ready to Match Anthropic’s Fable 5? Musk and Zhipu’s Tang Clash", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Technology & AI"], "summary": "Zhipu founder Tang Jie said a Chinese model rivalling Anthropic's flagship Fable 5 could arrive before year-end, after his firm's 744-billion-parameter GLM-5.2 took the No. 2 global spot on Code Arena's front-end coding rankings. In an X exchange, Elon Musk projected such a rival would probably come in Q1 next year and questioned whether it could achieve true usefulness on that timeline. GLM-5.2 propelled Zhipu to the world's third-best AI lab on the Artificial Analysis index. The open-weights release followed Anthropic blocking access to Fable 5 under a US national-security directive; Zhipu's Hong Kong-listed shares have surged more than 1,700% since January.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Is%20China%20AI%20ready%20to%20match%20Anthropic%E2%80%99s%20Fable%205%20Musk%2C%20Zhipu%E2%80%99s%20Tang%20clash%20over%20GLM-5.2%20rise.pdf"}, {"id": "scmp-15", "title": "Japan’s Defence Outreach to Counter China’s Military Rise Hits Hidden Roadblocks", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Japan used the Shangri-La Dialogue to sharpen warnings over China's military rise, with Defence Minister Shinjiro Koizumi rebutting accusations of new militarism and seeking public reassurance from US counterpart Pete Hegseth. Tokyo is expanding security partnerships — deeper cooperation with the Philippines, a shortlisted Mogami-class frigate for New Zealand — and has floated building nuclear-powered attack submarines. Analysts frame this as hedging against a less reliable Washington, whose December National Security Strategy prioritised the western hemisphere. They caution Japan lacks the financial muscle to counter Beijing alone and must avoid overt anti-China branding that would deter regional partners.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Japan%E2%80%99s%20defence%20outreach%20to%20counter%20China%E2%80%99s%20military%20rise%20hits%20hidden%20roadblocks.pdf"}, {"id": "scmp-16", "title": "The Panda Bonds: How China Uses Assets to Boost the Yuan’s Profile", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Brazil is set to become the latest economy to issue panda bonds — yuan-denominated debt sold in China — joining a growing group embracing the currency amid a de-dollarisation trend. It would be the seventh sovereign issuer in a year, after the UAE, Pakistan and Kazakhstan, marking a milestone as China leverages its wide interest-rate gap with the dollar. Panda bond issuance rose about 90% year-on-year to 136.5 billion yuan in the first five months of 2026. Analysts say the bonds are becoming a key tool of Beijing's economic diplomacy and the yuan's internationalisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/The%20panda%20bonds%20how%20China%20uses%20assets%20to%20boost%20yuan%E2%80%99s%20profile%2C%20cement%20partnerships.pdf"}, {"id": "scmp-17", "title": "Trump Criticises UK’s Starmer After PM Announces Resignation", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Trump called outgoing PM Keir Starmer a lovely man but said he had really hurt himself on energy, immigration and crime, faulting him for not exploiting North Sea oil and allowing windmills all over the place. He also said Starmer was insufficiently supportive on NATO and the Iran war, recalling a clash over delayed UK approval to use RAF Akrotiri in Cyprus for strikes on Iran. Starmer will resign as Labour leader but stay on as PM during an orderly transition. Andy Burnham, who received a hero's welcome in Parliament, is widely expected to succeed him as Britain's seventh PM in a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Trump%20criticises%20UK%E2%80%99s%20Starmer%20after%20PM%20announces%20resignation.pdf"}, {"id": "scmp-18", "title": "US-China Rare Earth Clash 2.0? Fragile Truce Tested as Tit-for-Tat Returns", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Beijing's new export controls on 10 US firms — including MP Materials and USA Rare Earth — and procurement bans on 46 others are testing the fragile US-China truce reached in Busan and reaffirmed at the recent Xi-Trump summit. The moves retaliate for the Pentagon designating more than 60 Chinese firms, including Alibaba, Baidu and BYD, as military-linked entities. Analysts warn of more friction, noting Beijing treats critical minerals as strategic military assets to control within and beyond its borders. Both targeted US rare-earth firms have received billions in US government funding — MP Materials a $400 million Pentagon investment and USA Rare Earth a $1.6 billion package.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/US-China%20rare%20earth%20clash%202.0%20Fragile%20truce%20tested%20as%20tit-for-tat%20moves%20return.pdf"}, {"id": "scmp-19", "title": "Why South Korea’s AI Chip Boom Is a Serious Concern for Its Economy", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "South Korea's AI-driven chip boom has pushed exports, profits and stocks to records, but policy chief Kim Yong-beom warned the windfall could fuel property speculation and deepen inequality if gains stay narrowly concentrated. Nominal GDP growth hit 17.1% in Q1, the highest since 2002, and the current-account surplus reached US$102.6 billion in four months, more than four times a year earlier. Samsung and SK Hynix account for more than half of the Kospi's market capitalisation, leading some economists to call the rally an illusion. Analysts urge strengthening broader-employment sectors like construction and retail and boosting housing supply.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/Why%20South%20Korea%E2%80%99s%20AI%20chip%20boom%20is%20a%20%E2%80%98serious%20concern%E2%80%99%20for%20its%20economy.pdf"}, {"id": "scmp-20", "title": "I Will Do What I Have to Do if Iran Doesn’t Stick to Deal, Trump Says", "source": "SCMP", "date": "23 Jun 2026", "tags": ["Geopolitics"], "summary": "Trump warned I will do what I have to do if Iran fails to honour its interim agreement, signed last week with President Masoud Pezeshkian. He insisted Iran must use unfrozen funds to buy food exclusively from the US — they have 91 million people, they can't feed them — but Iran's central bank governor said Tehran is under no such obligation and could buy other non-sanctioned goods. The US-Israel attacks on Iran and Israeli strikes in Lebanon have killed thousands and displaced millions, while roiling global oil markets. The remarks underscore the fragility of the deal during its 60-day window.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/23%20Jun%202026/23%20Jun%20SCMP/%E2%80%98I%20will%20do%20what%20I%20have%20to%20do%E2%80%99%20if%20Iran%20does%20not%20stick%20to%20deal%2C%20Trump%20says.pdf"}]}, "2026-06-24": {"date": "2026-06-24", "dayOfWeek": "Wednesday", "totalArticles": 65, "sourceCounts": {"WSJ": 16, "ST": 12, "BT": 15, "SCMP": 22}, "executiveDigest": "A tech sell-off jolts the AI bull market as SK Hynix's chip boom crowns it Korea's most valuable firm, Washington lets Iran sell oil in dollars on a fragile 60-day waiver, and Britain braces for its seventh prime minister in a decade.", "briefingCards": [{"title": "Lead story — AI's reality check", "body": "Wall Street got an 'AI wake-up call' as tech giants sold off (S&P -1.4%, Nasdaq -2.2%), with sharper losses in Asia where the Kospi plunged from a record. The rout collided with blockbuster AI dealmaking — SpaceX's $6.3bn capacity deal with Reflection AI, Chevron's 2.7GW power pact with Microsoft — even as Satya Nadella warned a few giants must not be allowed to 'eat the economy.' BT's H2 theme captures the mood: resilience over perfection, with investors still wanting the AI trade but no longer at any price."}, {"title": "Markets & finance — issuance returns, valuations stretch", "body": "Mega-IPOs (SpaceX, plus impending Anthropic and OpenAI) could reverse years of shrinking free floats, Fidelity's Efstathopoulos argues, as US-listed firms fell from 8,000+ in 1996 to ~4,300. Top US CEO pay smashed records — Musk's $158bn Tesla package, median S&P 500 pay near $18m. Greenspan's death at 100 frames lessons for Warsh's Fed, while a passive-investing piece reassures that index choice barely dents returns."}, {"title": "Asia realignment — alliances tilt, blacklists bite", "body": "A Lowy poll shows 51% of Australians now rank China ties above the US — a historic first — as trust in Trump's America sinks, even as AUKUS support holds. Alibaba sued the Pentagon over its military blacklist; Japan's Koizumi publicly disputes China's spending data to fend off a 'militarism' label. The cross-source thread: middle powers recalibrating between Washington and Beijing amid a hardening tech and supply-chain contest over copper and minerals."}, {"title": "Energy & climate — Iran reopens, Russia rations", "body": "Washington's two-month waiver lets Iran sell oil in dollars for the first time in decades, with tankers already moving 5m barrels toward Southeast Asia and a 10m-barrel sale to China — but old, fractured fields cap a fast ramp-up, and a paradoxical solar build-out may be needed to sustain output. Meanwhile Ukrainian strikes have Russia weighing fuel imports amid petrol queues. CATL's $742m sodium-ion bet and an El Nino drought warning round out the supply picture."}, {"title": "Technology & AI — the memory crown and China's surge", "body": "SK Hynix overtook Samsung as Korea's most valuable firm on June 22 (shares +300%+ in 2026), turning chip jobs into prized marriage-market catches and making a leveraged Hynix ETF Hong Kong's largest. Anthropic's Fable 5 shutdown is pushing global users toward Chinese rivals like Zhipu's GLM-5.2, while Alibaba's T-Head tripled capital and DeepSeek races to staff its agent team. China's 'AI+Consumption' blueprint aims to reorder its whole economy around AI."}, {"title": "Singapore & SEA focus — inflation, telcos, capital", "body": "Singapore core inflation held at 1.4% in May (below the 1.6% expected), but MAS warns energy costs will pass through with a lag, and NUS finds property executives sharply more pessimistic (80% cite inflation/rates). Singtel crystallised S$1bn from Gulf Development to fund data-centre capex; OCBC is doubling Indonesia wealth advisers. A BT piece warns the broken telco model needs reinvention, and another cautions STI familiarity isn't true diversification."}], "keyMetrics": [{"value": "65", "label": "Articles curated today", "sub": "WSJ 16 · ST 12 · BT 15 · SCMP 22"}, {"value": "-2.2%", "label": "Nasdaq in AI sell-off", "sub": "S&P -1.4%; Kospi plunged from a record high"}, {"value": "+300%", "label": "SK Hynix shares in 2026", "sub": "Overtook Samsung as Korea's most valuable firm"}, {"value": "60 days", "label": "Iran dollar-oil waiver", "sub": "5m barrels sailing to SE Asia; 10m sold to China"}, {"value": "49.4", "label": "UK flash PMI (14-mo low)", "sub": "Second straight contraction; 7th PM looms"}, {"value": "1.4%", "label": "Singapore core inflation (May)", "sub": "Below 1.6% forecast; energy pass-through warned"}], "articles": [{"id": "wsj-01", "title": "Air Force Buys New Generation of Drones Made to Strike Deep Into Enemy Territory", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Defence", "Technology & AI"], "summary": "The US Air Force awarded Anduril and General Atomics contracts for a new fleet of autonomous combat drones — the FQ-44 and larger FQ-42 — built to fly alongside manned jets in airspace defended by Chinese and Russian interceptors. The budget seeks over $1 billion for these collaborative combat aircraft in fiscal 2027 and more than $9.5 billion over five years, targeting a cost of roughly one-third of an F-35's $82.5 million. The military plans about 150 by decade's end and 1,000 in total, with software contracts to Anduril, Shield AI and RTX's Collins Aerospace. The move follows lessons from Ukraine and Iran, where cheap one-way drones reshaped the battlefield.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Air%20Force%20Buys%20New%20Generation%20of%20Drones%20Made%20to%20Strike%20Deep%20Into%20Enemy%20Territory.pdf"}, {"id": "wsj-02", "title": "Chevron Strikes Power Deal With Microsoft for West Texas AI Data Center", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Energy", "Technology & AI"], "summary": "Chevron signed a 20-year deal to sell electricity to Microsoft for one of the largest planned US AI data centres, a 2.7-gigawatt campus on 2,000-plus acres in Reeves County in the Permian Basin. Partnering with Engine No. 1's Joulent and GE Vernova, the 'Project Kilby' complex will run on an on-site gas plant fed by Chevron's local production rather than the Texas grid. Chevron expects a final investment decision after securing permits later this year. The deal cements Chevron's lead over rival Exxon, which partnered with NextEra on a 1.2-gigawatt plant, as oil majors race to capture AI power demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Chevron%20Strikes%20Power%20Deal%20With%20Microsoft%20for%20West%20Texas%20AI%20Data%20Center.pdf"}, {"id": "wsj-03", "title": "China's Ambitious AI Blueprint", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "Walter Russell Mead argues that China's new 'Implementation Opinions on Accelerating AI+Consumption' marks a full-scale push to make AI the foundation of its economic strategy. The 17-point plan targets humanoid robots for elder care, a 'people-vehicle-home' ecosystem linking smart cars, roads and homes, plus brain-computer interfaces and AI wearables. It implements an August 2025 State Council decree laying out a 10-year plan for an 'intelligent society.' Mead warns Western observers not to scoff, citing China's proven record directing investment into favoured sectors such as solar and EVs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/China%E2%80%99s%20Ambitious%20AI%20Blueprint.pdf"}, {"id": "wsj-04", "title": "China's Latest Tool to Control a Disputed Atoll: a Strange Floating Platform", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Satellite images revealed a 300-square-foot floating platform with an antenna and Chinese nationals at Scarborough Shoal, a contested South China Sea reef just 145 miles from Luzon through which a quarter of seaborne trade passes. Beijing's Academy of Sciences called it a temporary coral-research facility; Philippine officials, who flagged it in late May, said it was removed by Wednesday. Analysts at SeaLight and CSIS view it as 'salami-slicing' toward permanent occupation, noting China doubled nearby patrols last year and declared a nature reserve in September. A military base there could threaten US forces in any Taiwan conflict.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/China%E2%80%99s%20Latest%20Tool%20to%20Control%20a%20Disputed%20Atoll%20a%20Strange%20Floating%20Platform.pdf"}, {"id": "wsj-05", "title": "Google Investing in 'Backrooms' Studio A24", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Google is investing roughly $75 million in independent studio A24 — maker of hits 'Backrooms' and 'Marty Supreme' — its first stake in a film studio, as part of an AI research partnership with DeepMind. The multiyear, nonexclusive deal aims to build movie production and distribution tools but gives Google no access to A24's film library or data. A24 partner Scott Belsky said the tools 'won't look anything like' uncomfortable prompted generation, with A24 Labs already building AI-generated storyboards. The valuation roughly matches Thrive Capital's 2024 round that valued A24 at $3.5 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Google%20Investing%20in%20%E2%80%98Backrooms%E2%80%99%20Studio%20A24.pdf"}, {"id": "wsj-06", "title": "Iran Can Now Sell Oil. How Fast Can It Ramp Up?", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Trump's deal lets Iran sell crude and fuels openly for the first time since 2018, waiving sanctions and reopening banking and insurance services, though implementation remains shaky amid Israel-Hezbollah clashes and Iran's renewed Hormuz closure threat. The US lifted a blockade that had cut loadings to roughly 260,000 barrels a day last month, down from 1.85 million before. Three Iranian-linked tankers carrying 5 million barrels sailed past the blockade toward Southeast Asia, and Tehran clinched a 10-million-barrel sale to China. A decade ago Iran pumped nearly 4 million barrels a day, but old, fractured fields make a fast ramp-up difficult.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Iran%20Can%20Now%20Sell%20Oil.%20How%20Fast%20Can%20It%20Ramp%20Up.pdf"}, {"id": "wsj-07", "title": "Microsoft's Satya Nadella: We Can't Let AI Giants Eat the Economy", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Satya Nadella delivered a blistering critique of the AI race, warning a small group of firms is capturing the technology's value while making 'dire prophecies' to justify limitless data-centre expansion. Microsoft has rolled out low-cost models and Copilot Cowork — an autonomous agent letting users pick cheaper models — and is weighing whether to host China's ultralow-cost DeepSeek, which could ignite a price war with OpenAI and Anthropic. The stance is striking given Microsoft is one of OpenAI's oldest backers and struck a multibillion-dollar deal with Anthropic last year. Nadella said there is room for every company to thrive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Microsoft%E2%80%99s%20Satya%20Nadella%20We%20Can%E2%80%99t%20Let%20AI%20Giants%20Eat%20the%20Economy.pdf"}, {"id": "wsj-08", "title": "See How Owning a Home Is Getting More Expensive in Every Way", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Society", "Finance & Markets"], "summary": "Annual basic homeownership costs in the US — mortgage, taxes, insurance, maintenance — jumped from about $20,000 in 2019 to over $28,500 by 2025, outpacing inflation and keeping a generation of buyers out. Existing-home sales have stuck near 4 million a year since 2023, the lowest in decades, as owners cling to sub-3% pandemic-era mortgages. At today's roughly 6.5% rate, a buyer with a $2,500 monthly budget can afford a $384,000 home versus $517,500 at 3%. Insurance, property taxes and repair costs have all climbed, with households spending nearly $12,500 on upkeep last year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/See%20How%20Owning%20a%20Home%20Is%20Getting%20More%20Expensive%20in%20Every%20Way.pdf"}, {"id": "wsj-09", "title": "SpaceX Strikes $6 Billion Deal With AI Startup for Data-Center Space", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Reflection AI, a $25 billion-valuation open-source model builder backed by Nvidia, agreed to rent data-centre capacity from SpaceX for $150 million a month from July 1 through 2029 — a deal worth up to $6.3 billion. It follows similar SpaceX agreements with Anthropic and Google, positioning Reflection as a Western alternative to Chinese open-source models. The deal is among SpaceX's first since its public debut this month valued it at $1.77 trillion, days after it agreed to buy coding firm Cursor for $60 billion. SpaceX shares tumbled 15% in Monday trading, their biggest one-day decline yet.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/SpaceX%20Strikes%20%246%20Billion%20Deal%20With%20AI%20Startup%20for%20Data-Center%20Space.pdf"}, {"id": "wsj-10", "title": "Stressing Over Whether Your Index Fund Has SpaceX? Don't", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Finance & Markets"], "summary": "Telis Demos argues passive investors needn't fret over which indexes capture mega-IPOs like SpaceX: Vanguard's Total Stock Market ETF will include it while S&P 500 funds won't, yet the return gap is small. Over the past decade the S&P 500 ETF returned an annualised 15.6% versus 15.1% for the total-market ETF. Newly listed companies historically have poor market-adjusted records in their first years, though very large IPOs fare better on average. The piece reassures investors that broad, low-cost vehicles diverge little regardless of IPO-inclusion rules.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Stressing%20Over%20Whether%20Your%20Index%20Fund%20Has%20SpaceX%20Don%E2%80%99t.pdf"}, {"id": "wsj-11", "title": "The Forces That Broke the Two-Party System in the U.K.", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Politics", "Society"], "summary": "Nigel Farage's Reform UK handed Labour its worst postwar drubbing in May local elections, turning Starmer's party against him and triggering his Monday resignation. Likely successor Andy Burnham, the ex-Manchester mayor, would be the sixth new prime minister in seven years in a country that had just 13 between 1945 and 2016. Prime ministers now change on average every 14 months amid five or six major parties, with Reform polling near 30% — the first non-Tory, non-Labour lead since WWI. The instability has spooked investors, pushed up borrowing costs and curbed foreign investment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/The%20Forces%20That%20Broke%20the%20Two-Party%20System%20in%20the%20U.K..pdf"}, {"id": "wsj-12", "title": "Top-Paid CEOs Smash the $200 Million Payday", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "More US CEOs crossed the $100 million pay threshold last year than in any year since 2021, with nearly a dozen topping $200 million, led by Elon Musk's record $158 billion Tesla package. Welltower's Shankh Mitra reached $821 million, 99% from stock grants, among the biggest packages of the decade. Median S&P 500 CEO pay rose to nearly $18 million, a new high, with half of chiefs getting raises of 9.8% or more. The resurgence echoes the 'moonshot' awards that followed Musk's 2018 record, which evidence suggests often don't pay off for investors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Top-Paid%20CEOs%20Smash%20the%20%24200%20Million%20Payday.pdf"}, {"id": "wsj-13", "title": "Trump Summons Munitions Makers as Worries Grow Over Low U.S. Stockpiles", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Defence", "Politics"], "summary": "Trump summoned Pentagon officials and top contractors — Lockheed Martin, RTX, Boeing, L3Harris, Northrop Grumman and Honeywell — to the White House to push faster munitions production after the war with Iran depleted US missile stocks. He has threatened to resume bombing if the peace deal collapses, while officials worry over the rate missiles and interceptors were burned through. Trump noted GM and Ford could build missiles with excess capacity, with GM reportedly in talks with Lockheed. Analyst Tom Karako cautioned that handshake deals to boost Patriot and Tomahawk output still lack full appropriations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/Trump%20Summons%20Munitions%20Makers%20as%20Worries%20Grow%20Over%20Low%20U.S.%20Stockpiles.pdf"}, {"id": "wsj-14", "title": "U.S. Allows Iran to Sell Oil in Dollars for First Time in Decades", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The Treasury waived sanctions for two months to let Iran sell oil in dollars, including to US buyers, as VP JD Vance said Tehran agreed to let nuclear inspectors return. Iran did not acknowledge the inspector concession, and Vance said access terms still need negotiating, rekindling concern Iran gains financial relief before surrendering nuclear capacity. Trump said he would attack again if Iran breached the memorandum, declaring 'nuclear weapon supersedes depression.' Allowing dollar payments lets Iranian banks receive funds directly from abroad, a major boon for a regime desperate for foreign exchange.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/U.S.%20Allows%20Iran%20to%20Sell%20Oil%20in%20Dollars%20for%20First%20Time%20in%20Decades.pdf"}, {"id": "wsj-15", "title": "U.S. to Speed Up Early Drug Research to Better Compete With China", "source": "WSJ", "date": "24 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "US health officials unveiled reforms to cut six months to a year off early-phase safety studies, countering a flow of phase-one trials to China and Australia where approvals are faster and cheaper. The FDA will clarify manufacturing requirements, allow rolling review and pilot a program to speed early trials, dubbed 'Operation Trial Blazer.' It reaffirmed a policy that one high-quality trial plus safety evidence can earn approval, versus two previously. The push comes as drugmakers actively buy Chinese biotechs citing regulatory speed, with NIH also examining AI and new trial designs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/24%20Jun%202026/24%20Jun%20WSJ/U.
