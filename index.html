rkets", "Energy"], "summary": "Eurozone industrial output rose 0.1% in April as factories rushed orders ahead of Middle East price hikes, below the 0.2% economists expected and a revised 0.4% March rise. Output is seen weakening as the energy shock bites, with May manufacturing PMI falling to 51.6 and the ECB cutting its 2026 growth forecast to 0.8%. Oil fell more than 4% on news of the interim US-Iran deal to reopen Hormuz. Commerzbank still expects only 0.6% eurozone growth this year amid high energy costs and Chinese competition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Eurozone%20Industrial%20Production%20Picked%20Up%20Again%20in%20April.pdf"}, {"id": "wsj-05", "title": "Is the Luxury Handbag's Heyday Ending?", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Luxury handbag sales are down almost 10% from 2023 peaks, a roughly $8 billion hole in annual spending, as shoppers slip away after pandemic-era price hikes. Brands released 80% fewer new bags between 2023 and 2025 than in 2016-2019 and are betting fresh designs will win buyers back, with 74% of Chanel's online handbag offer now new. Resale demand is surging, up 20% since 2023 on The RealReal. Analysts warn oversaturation of icons like the Birkin has \"killed some of the magic.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Is%20the%20Luxury%20Handbag%E2%80%99s%20Heyday%20Ending.pdf"}, {"id": "wsj-06", "title": "Israel Is Alarmed by Trump's Deal With Iran", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Trump's deal to wind down the Iran war alarmed Israeli officials, who fear easing pressure on Tehran and a rift with the US over Hezbollah in Lebanon; an Israeli strike on Beirut nearly derailed the agreement. Defense Minister Israel Katz said the military would hold its Lebanon security zone indefinitely and act alone to stop Iran's nuclear ambitions if needed. Netanyahu declined to criticize the deal, saying war aims were largely met and \"we have pushed away the immediate threat of annihilation.\" Officials worry sanctions relief could fund Iran's rebuilding without requiring it to surrender enriched uranium.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Israel%20Is%20Alarmed%20by%20Trump%E2%80%99s%20Deal%20With%20Iran.pdf"}, {"id": "wsj-07", "title": "Kevin Warsh Wants the Fed to Stop Explaining Everything", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Kevin Warsh chairs his first Fed meeting Wednesday, having long argued the central bank should say less and shrink its bond holdings, once telling investors to \"stop talking so much.\" Rate action will wait: inflation is running hot after the Iran war pushed up energy prices, shifting the conversation toward hikes rather than cuts. Communications is where Warsh can move first, as he dislikes the forecasts and press conferences he says box the committee in. Insiders say his promised \"regime change\" has been \"more courtship than chain saw.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Kevin%20Warsh%20Wants%20the%20Fed%20to%20Stop%20Explaining%20Everything.pdf"}, {"id": "wsj-08", "title": "Mamdani Tests His Political Power as He Wades Into New York Primaries", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Politics", "Society"], "summary": "New York Mayor Zohran Mamdani is endorsing Democratic socialist allies in the June 23 congressional primaries, testing whether he can sweep more DSA candidates into office and reshape the city's Democratic Party. His pick Claire Valdez faces Brooklyn Borough President Antonio Reynoso, backed by retiring Rep. Nydia Velazquez, in the Seventh District. Mamdani is also backing challengers to incumbents Adriano Espaillat and Dan Goldman, risking backlash from Hispanic voters and party leaders. One strategist called him \"the political king of New York.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Mamdani%20Tests%20His%20Political%20Power%20as%20He%20Wades%20Into%20New%20York%20Primaries.pdf"}, {"id": "wsj-09", "title": "New York Manufacturing Activity Grew at a Slower Pace in June", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets"], "summary": "The New York Fed's Empire State manufacturing index fell to 5.7 in June from 19.6 in May, well below the 13.9 economists expected. New orders eased to 3.5 and shipments printed at 8.6, both pointing to slight increases, while unfilled orders rose. Input and selling price increases remained elevated and supply availability worsened amid the Iran conflict. Employment expanded for a fifth consecutive month and firms stayed fairly optimistic.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/New%20York%20Manufacturing%20Activity%20Grew%20at%20a%20Slower%20Pace%20in%20June.pdf"}, {"id": "wsj-10", "title": "Schneider Electric, Foxconn to Partner on AI Data Centers", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "France's Schneider Electric said it will partner with Taiwan's Foxconn to develop AI data centers, aiming to help customers build and operate infrastructure faster and more efficiently. The collaboration covers closed-loop energy optimization, modular power and cooling assemblies. Production will begin later this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Schneider%20Electric%2C%20Foxconn%20to%20Partner%20on%20AI%20Data%20Centers.pdf"}, {"id": "wsj-11", "title": "Stocks Have Even More Room to Fly if Hormuz Reopens", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "The Dow closed at a record for the 16th time this year, up 0.9%, while the S&P 500 added 1.7% and the Nasdaq rose 3.1% after Trump announced a deal to reopen the Strait of Hormuz. Brent crude fell 4.8% to just above $83 a barrel and the PHLX Semiconductor Index gained 5.5% as chip stocks soared. SpaceX closed at a $2.538 trillion market cap, gaining $433 billion on its second trading day. Analysts cautioned Middle East crude output could take four to six months to return to precrisis levels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Stocks%20Have%20Even%20More%20Room%20to%20Fly%20if%20Hormuz%20Reopens.pdf"}, {"id": "wsj-12", "title": "Trump Says Strait of Hormuz Will Be Fully Open by Friday Under Iran Deal", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Trump said the Strait of Hormuz would be fully open Friday, the same day the US and Iran plan to finalize a peace deal in Switzerland ending the four-month war and starting nuclear talks. Senior US officials contradicted him, saying it could take more than two weeks to resume normal shipping. The memorandum of understanding reopens the strait, lifts the US blockade on Iranian ports and starts a 60-day ceasefire, followed by roughly two months of talks to dismantle Iran's enriched uranium. Vance, Jared Kushner and Steve Witkoff are to attend a formal signing Friday.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Trump%20Says%20Strait%20of%20Hormuz%20Will%20Be%20Fully%20Open%20by%20Friday%20Under%20Iran%20Deal.pdf"}, {"id": "wsj-13", "title": "Trump Stages an Iran Retreat", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The WSJ editorial board argues Trump is touting a strategic retreat as peace, accepting Iran's promises merely to negotiate over its nuclear program in order to reopen Hormuz. It credits him with halting Iran's enrichment for the first time in 20 years and leaving key nuclear facilities \"in rubble,\" but says he never seized Iran's enriched uranium or reopened the strait by force. The deal extends the ceasefire 60 days and ends the US blockade as Iran de-mines the strait, with sanctions relief along the way. The board warns deferring the hardest nuclear issues to talks with \"dishonorable people\" doesn't inspire confidence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Trump%20Stages%20an%20Iran%20Retreat.pdf"}, {"id": "wsj-14", "title": "Trump is Right: The Fed's Economic Models Punish Growth", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "In an op-ed, David Malpass argues the Fed's obsolete Keynesian models punish growth by prescribing rate increases whenever the economy or jobs expand quickly. He says inflation targeting sends wrong signals, the output-gap model assumes low growth potential, and a Fed paper argued near-zero job growth should be expected due to weak demographics. May's 172,000 new jobs led investors to assume higher rates, treating fast job growth as inflationary. Malpass backs Trump's supply-side view that faster growth attracts investment and reduces inflation, and urges long-term dollar stability to push down bond yields.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/Trump%20is%20Right%20The%20Fed%E2%80%99s%20Economic%20Models%20Punish%20Growth.pdf"}, {"id": "wsj-15", "title": "U.K. to Ban Under-16s From Major Social-Media Platforms", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Society", "Technology & AI"], "summary": "Britain said it will force leading social-media companies to restrict access for under-16s from early next year, covering Snapchat, TikTok, YouTube, Instagram, Facebook and X, while exempting WhatsApp and Signal. PM Keir Starmer called it \"a line in the sand,\" adding curbs on livestreaming and strangers messaging minors, and said the rules go further than Australia's pioneering 2025 ban. Nearly eight in 10 UK parents support the move, but critics warn bans are easy to sidestep via VPNs. After Australia's ban, surveys found seven in 10 under-16s who had accounts still had one as of February.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/U.K.%20to%20Ban%20Under-16s%20From%20Major%20Social-Media%20Platforms.pdf"}, {"id": "wsj-16", "title": "U.S. Industrial Production Edged Up in May", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Finance & Markets"], "summary": "US industrial production rose 0.1% in May after a 0.9% April gain, according to Federal Reserve data. Manufacturing output was unchanged after a 0.7% April rise, utilities output fell 0.4%, and mining rose 1.3%. Industrial capacity utilization was 76.2%, in line with estimates.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/U.S.%20Industrial%20Production%20Edged%20Up%20in%20May.pdf"}, {"id": "wsj-17", "title": "What Iran and the U.S. Are Saying About Their Deal", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The US and Iran are both selling their unreleased deal as a win, but their accounts diverge sharply. Iranian state media claims it includes Israeli withdrawal from Lebanon, Tehran's control of Hormuz and no new nuclear curbs; the US calls those details inaccurate and aimed at domestic audiences. Vance said the deal would immediately reopen the waterway and secured a long-term commitment that Iran will never develop a nuclear weapon, calling them \"two very big wins.\" At stake is the unfreezing of billions of dollars for Iran's collapsing economy, with both sides threatening to attack if talks fail.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/What%20Iran%20and%20the%20U.S.%20Are%20Saying%20About%20Their%20Deal.pdf"}, {"id": "wsj-18", "title": "With an Iran Deal, Trump Returns to Realism", "source": "WSJ", "date": "17 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Gerard Baker argues that if the imperfect Iran deal holds, Trump deserves congratulation for cutting losses rather than pursuing high-risk escalation with an uncertain outcome. After a month of bombing that damaged but didn't destroy Iran's missile capabilities and handed Tehran control of a vital shipping lane, achieving US war aims at an acceptable price became impossible. Baker frames Trump's foreign policy as Hobbesian realism, echoing Thucydides' line that \"the strong do what they can and the weak suffer what they must.\" He sees the deal as a return to assertive realism over interventionist idealism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20WSJ/With%20an%20Iran%20Deal%2C%20Trump%20Returns%20to%20Realism.pdf"}, {"id": "st-01", "title": "A free and open Strait of Hormuz can't be left to chance", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "This commentary argues that simply reopening the Strait of Hormuz under an interim Iran-US understanding is only a starting point, as shipping will stay constrained until de-mining is done and commercial confidence returns. The \"double blockades\" by the US and Iran cut Persian Gulf exports to a trickle and pushed up oil prices worldwide, with the Philippines declaring a national emergency. Iran continues to insist on a new strait regime and fees on ships. It proposes an organised international diplomatic coalition of Hormuz-dependent countries to keep the waterway free and open under UNCLOS.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/A%20free%20and%20open%20Strait%20of%20Hormuz%20can%27t%20be%20left%20to%20chance.pdf"}, {"id": "st-02", "title": "As deal to end war emerges from chaos, Iran and China sweep the stakes", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Ravi Velloor writes that the US and Iran have \"digitally\" signed a war-ending agreement with few details known, ahead of a physical signing in Geneva on June 19. He calls it an \"armistice-plus-deal\" born of compulsions on all sides rather than genuine desire for peace, noting Tehran enhanced its geostrategic weight by standing up to both Israel and the US. Global oil reserves had fallen to record lows, with drawdowns nearing the point where sludge appears in stored reserves. Israel is already pushing back against mediator Pakistan's claim of a permanent end to hostilities on all fronts, including Lebanon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/As%20deal%20to%20end%20war%20emerges%20from%20chaos%2C%20Iran%20and%20China%20sweep%20the%20stakes.pdf"}, {"id": "st-03", "title": "Asia's answer to the Thucydides Trap", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics"], "summary": "This essay argues that while the Thucydides Trap has become the go-to lens for US-China rivalry, Asia's own strategic traditions offer a better corrective. Xi Jinping invoked the trap when hosting Trump in Beijing in May, citing the Greek warning that a rising power challenging a dominant one breeds conflict. The piece contends Asia's classical strategists, Sun Tzu's Art of War and Chanakya's Arthashastra, teach that the highest statecraft is avoiding wars, not winning them. It cautions against treating conflict between Washington and Beijing as inevitable.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Asia%27s%20answer%20to%20the%20Thucydides%20Trap.pdf"}, {"id": "st-04", "title": "Bank of Japan raises interest rates to 31-year high", "source": "ST", "date": "17 Jun 2026", "tags": ["Finance & Markets"], "summary": "The Bank of Japan raised its short-term policy rate to 1% from 0.75% on June 16, a 31-year high and its first hike since December, to tame price pressures from the Iran war energy shock. The 7-1 decision aligns the BOJ with other tightening central banks, with new dovish-appointed member Toichiro Asada dissenting over downside growth risks. Deputy Governor Shinichi Uchida called the US-Iran peace deal a \"welcome move\" but flagged broadening price rises, standing in for Governor Kazuo Ueda, who missed the meeting for medical treatment. Analysts had focused on whether a larger 50bp hike would be proposed; none was.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Bank%20of%20Japan%20raises%20interest%20rates%20to%2031-year%20high.pdf"}, {"id": "st-05", "title": "China home prices fall at faster pace in setback to revival", "source": "ST", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "China's new-home prices in 70 cities fell 0.2% in May, accelerating from April's 0.19% slide and halting green shoots seen in early 2026, while resale values dropped 0.26%, the most in three months. The property downturn has weighed on the economy for almost five years, hampering efforts to lift household spending. Recovery signs remain restricted to the largest cities benefiting from the AI investment boom, with Hangzhou, home to Alibaba and Unitree Robotics, posting the biggest gain. Consumer spending also contracted in May for the first time since the pandemic.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/China%20home%20prices%20fall%20at%20faster%20pace%20in%20setback%20to%20revival.pdf"}, {"id": "st-06", "title": "China's Xi backs Myanmar's President as two leaders meet in Beijing", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "Xi Jinping endorsed the leadership of Myanmar's military chief-turned-president Min Aung Hlaing on June 16 as the two met in Beijing to map out bilateral ties. Min Aung Hlaing is on a five-day state visit, his first to China since formalising power after controversial elections in December and January. The leaders witnessed the signing of 18 cooperation memorandums covering cross-border transport in the Greater Mekong sub-region, free trade, disaster assistance, health and media. China remains a key foreign partner of Myanmar's military, which seized power from Aung San Suu Kyi's government in 2021.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/China%27s%20Xi%20backs%20Myanmar%27s%20President%20as%20two%20leaders%20meet%20in%20Beijing.pdf"}, {"id": "st-07", "title": "China's economic imbalance deepens as retail sales fall for first time in over three years", "source": "ST", "date": "17 Jun 2026", "tags": ["Finance & Markets"], "summary": "China's retail sales slid 0.6% in May, the first monthly fall since December 2022, reversing April's 0.2% rise and underscoring a two-speed economy where factories are buoyed by resilient exports but domestic demand weakens. Investment slumped while industrial output picked up pace, official data on June 16 showed. Domestic car sales fell for an eighth consecutive month amid fading consumer-goods trade-in effects and a multi-year property downturn. Economist Zhang Zhiwei said the weak data pressures the government to consider measures to stabilise consumption, expecting policy \"fine-tuning\" in July.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/China%27s%20economic%20imbalance%20deepens%20as%20retail%20sales%20fall%20for%20first%20time%20in%20over%20three%20years.pdf"}, {"id": "st-08", "title": "EU kicks off first phase of membership negotiations with Ukraine", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "The EU formally opened the first phase of membership negotiations with Ukraine and Moldova on June 15, aligning them with a first \"cluster\" of EU laws after a long delay. Ukraine had been stuck for two years as Hungary's Viktor Orban vetoed progress, until his April election defeat by Peter Magyar opened the way. Enlargement commissioner Marta Kos called it \"a day to celebrate,\" while Kyiv hailed a \"rubicon, a milestone.\" A mammoth workload of 35 chapters across six clusters lies ahead, and officials caution the war-torn country will not join soon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/EU%20kicks%20off%20first%20phase%20of%20membership%20negotiations%20with%20Ukraine.pdf"}, {"id": "st-09", "title": "EU says China trained Russian troops to fight in Ukraine war", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "EU foreign policy chief Kaja Kallas said on June 15 that the bloc has \"verified reports\" that the Chinese military has been training Russian personnel to fight in Ukraine, focused on drone use under an agreement signed by senior officers in Beijing in July 2025. China's Foreign Ministry called the claim \"pure slander and smearing\" with no factual basis. Beijing has maintained neutrality while supplying Russia with dual-use technologies including drone parts. On June 15 the EU added two mainland Chinese manufacturers and two Hong Kong shipping firms to its sanctions list.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/EU%20says%20China%20trained%20Russian%20troops%20to%20fight%20in%20Ukraine%20war.pdf"}, {"id": "st-10", "title": "Gulf countries confront questions about relying on US for protection", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "As a preliminary US-Iran deal restores some normalcy, Persian Gulf states are questioning their decades-long reliance on the US for security after the protective umbrella struggled to defend their cities and infrastructure during nearly four months of war. Iran and its allies struck military bases, energy facilities and hotels across the region and shut the Strait of Hormuz, with some drones evading US defences. Chatham House's Sanam Vakil said \"the US security guarantee is no longer reliable in the way they thought it was.\" Two Gulf officials said their governments have already discussed reducing dependence on Washington and diversifying toward Europe and Asia.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Gulf%20countries%20confront%20questions%20about%20relying%20on%20US%20for%20protection.pdf"}, {"id": "st-11", "title": "Israel counts the ways that Netanyahu's Iran strategy failed", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "This analysis says the framework agreement to end the Iran war omits much of what Israel wanted, leaving Netanyahu's hoped-for legacy in doubt as Israel was not directly involved in negotiations. Initial details suggest it does nothing to curb Iran's ballistic missiles or its funding of proxies like Hezbollah and the Houthis, and could ease sanctions to let billions flow to Tehran. Terms on Iran's highly enriched uranium and future enrichment remain undisclosed or to be negotiated during the 60-day ceasefire. Iran says the framework includes a halt to military operations on all fronts, including Lebanon, which could constrain Israel's fight against Hezbollah.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Israel%20counts%20the%20ways%20that%20Netanyahu%27s%20Iran%20strategy%20failed.pdf"}, {"id": "st-12", "title": "Nearly $100m to be pumped into municipal, industrial water solutions: Gan Kim Yong", "source": "ST", "date": "17 Jun 2026", "tags": ["Southeast Asia", "Environment"], "summary": "Singapore will channel close to $100 million into R&D of water solutions for towns and industries, including a research facility for used-water treatment, DPM Gan Kim Yong announced on June 16 at Singapore International Water Week. He said $85 million will go to national water agency PUB to strengthen water security, advancing desalination and management of contaminants of emerging concern. Gan warned climate change will bring more dry and wet extremes, with nearly a third of Singapore at risk of coastal flooding if nothing is done. He also announced the completion of the Republic's latest service reservoir in Tengah.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Nearly%20100m%20to%20be%20pumped%20into%20municipal%2C%20industrial%20water%20solutions%20Gan%20Kim%20Yong.pdf"}, {"id": "st-13", "title": "Netanyahu says war with Iran saved Israel from threat of 'nuclear annihilation'", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "In his first remarks since the US-Iran agreement, Netanyahu said on June 15 the joint US-Israeli campaign had spared Israel from Iran's threat of \"nuclear annihilation\" and that troops would remain in Lebanon, Gaza and Syria \"as long as necessary.\" Facing severe criticism over his handling of the war and failure to influence Washington's negotiations, he highlighted what he called major achievements. He pledged Iran would never acquire nuclear weapons \"with an agreement or without one.\" He said the campaign hit \"every possible infrastructure target,\" neutralising nuclear scientists and crushing facilities.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Netanyahu%20says%20war%20with%20Iran%20saved%20Israel%20from%20threat%20of%20%27nuclear%20annihilation%27.pdf"}, {"id": "st-14", "title": "South-east Asia needs urgent overhaul of energy policies", "source": "ST", "date": "17 Jun 2026", "tags": ["Southeast Asia", "Energy"], "summary": "IEA executive director Fatih Birol told The Straits Times that South-east Asia needs an urgent, bold overhaul of energy policies after the Iran war exposed how exposed it is to costly energy imports. He said a regional electricity grid, nuclear power and ramping up renewables and electric vehicles could boost energy security while meeting rising demand. Birol predicted \"the biggest winners here will be renewables and nuclear power, and also electric cars.\" He called a long-planned ASEAN Power Grid \"a no-brainer\" and said the current crisis could help overcome political obstacles to building cross-border interconnections.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/South-east%20Asia%20needs%20urgent%20overhaul%20of%20energy%20policies.pdf"}, {"id": "st-15", "title": "SpaceX surges 20% in first full day of trading to add $528 billion in value", "source": "ST", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX shares climbed 20% on June 15, their first full trading day, adding US$412 billion (S$528 billion) in value and extending a 19% debut rally to close at US$192.46, over 42% above the US$135 IPO price. The move lifted its market value above US$2.5 trillion, among the world's top six companies and less than US$135 billion shy of overtaking Amazon. The greenshoe over-allotment lifted the amount raised to US$86.2 billion. The solid debut eased fears about absorbing such a large IPO and bolstered the AI rally, potentially paving the way for IPOs from Anthropic and OpenAI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/SpaceX%20surges%2020%20in%20first%20full%20day%20of%20trading%20to%20add%20528%20billion%20in%20value.pdf"}, {"id": "st-16", "title": "US saw risk of Anthropic models being diverted to foreign military intelligence", "source": "ST", "date": "17 Jun 2026", "tags": ["Technology & AI", "Defence"], "summary": "US Commerce Secretary Howard Lutnick said he acted against Anthropic's latest Mythos and Fable AI models because officials feared they could be deployed by military intelligence users in China, Russia or other countries of concern. In a June 12 letter to CEO Dario Amodei, he ordered the company to suspend export of the models worldwide and to all foreign nationals, prompting Anthropic to disable access globally. Senior Anthropic staff met Commerce officials on June 15, joined by national cyber director Sean Cairncross, to negotiate a solution. The government said a safeguard preventing Fable 5 from identifying software vulnerabilities could be \"jailbroken\"; Anthropic said the bypass found only \"minor\" flaws.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/US%20saw%20risk%20of%20Anthropic%20models%20being%20diverted%20to%20foreign%20military%20intelligence.pdf"}, {"id": "st-17", "title": "US-Iran deal promises end to war but how it will work remains unclear", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Doubts swirled around the US-Iran interim deal as shipowners said it could take weeks for confidence to return after any Hormuz reopening and fundamental questions stayed unanswered. Trump said on June 16 the deal was \"done\" and moving to a second stage, though details are unreleased and both sides say a permanent truce is yet to be negotiated. The agreement extends a tenuous April ceasefire by 60 days and reopens the strait, with nuclear talks set to begin in Switzerland on June 19. Curbing Iran's missile programme and ending its support for proxies are not thought to be on the negotiating agenda.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/US-Iran%20deal%20promises%20end%20to%20war%20but%20how%20it%20will%20work%20remains%20unclear.pdf"}, {"id": "st-18", "title": "Why a US Fed interest rate hike may be on the cards", "source": "ST", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "This commentary argues Kevin Warsh, leading his first meeting as Fed chair, should refocus the central bank on stabilising prices after years of an easy-money bias. It notes the economy has hovered near full employment for 55 straight months yet the Fed has missed its inflation target for 63 consecutive months, the worst run since the 1970s Great Inflation. Core inflation is stuck around 3% and consumer prices have risen 30% this decade, making the cost of living the hottest issue in US politics. The piece says there should be an outcry for rate hikes, warning the Fed cannot keep accommodating each supply shock.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/Why%20a%20US%20Fed%20interest%20rate%20hike%20may%20be%20on%20the%20cards.pdf"}, {"id": "st-19", "title": "With war likely over, Iranian rulers must face demands of angry, embittered population", "source": "ST", "date": "17 Jun 2026", "tags": ["Geopolitics", "Society"], "summary": "With the war likely over, Iran's theocratic rulers face the harder task of managing competing demands from emboldened hardliners and an impoverished, angry population. Hardliners, energised by surviving the onslaught, want a tough line in coming US talks and prioritise rearming, confident they can suppress dissent. Ordinary Iranians are desperate for any peace dividend or financial relief to raise living standards after a destructive war and years of sanctions. Officials told Reuters that funds would likely go to reconstruction, bank liquidity and economic support, and warned of renewed mass protests like the unrest quashed in January if living standards fail to improve.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20ST/With%20war%20likely%20over%2C%20Iranian%20rulers%20must%20face%20demands%20of%20angry%2C%20embittered%20population.pdf"}, {"id": "bt-01", "title": "A fragile Iran peace follows a war without victors", "source": "BT", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "This commentary says Trump finally has his agreement to end the Iran war, set to be signed in Geneva on June 19, but the peace is likely fragile and not a permanent settlement. It is a 60-day ceasefire extension allowing Hormuz to reopen gradually and the US blockade to lift, with a promise to resolve nuclear issues through negotiation linked to phased sanctions relief. Israel is unhappy, particularly that its campaign against Hizbollah in Lebanon must end, and Netanyahu may feel pressure to resume attacks. With no outright victor, the best sign is that hardliners on all sides are unhappy, making a gradual relaxation punctuated by violence more likely than full cessation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/A%20fragile%20Iran%20peace%20follows%20a%20war%20without%20victors.pdf"}, {"id": "bt-02", "title": "Can ST Engineering aspire to challenge DBS to be king of the local bourse?", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "This piece asks whether megatrends could let a non-financial group like ST Engineering challenge DBS as Singapore's largest listed company. DBS, backed by Temasek and the fast-growing financial-hub sector, could plausibly hold the top spot for years. ST Engineering, also Temasek-linked, saw its share price rise 28% between end-2025 and June 16 versus DBS's 13%, but its market cap is less than a fifth of DBS's. ST Engineering's 2025 net profit was S$463 million (S$851 million on a base operating basis) against DBS's roughly S$11 billion. Growing leading companies outside banking would make the local market more vibrant.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Can%20ST%20Engineering%20aspire%20to%20challenge%20DBS%20to%20be%20king%20of%20the%20local%20bourse.pdf"}, {"id": "bt-03", "title": "China has a powerful new oil price weapon", "source": "BT", "date": "17 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "This commentary argues that after the Iran war, China has emerged as the world's first oil \"swing importer,\" becoming a stabilising force for commodity prices much as Saudi Arabia is the swing exporter. Chinese customs data showed total oil imports fell in May to an eight-year low of 7.8 million barrels a day, a third less than before the war, with waterborne imports hitting a 10-year low more than 45% below the 2025 average. In May China cut average daily waterborne imports by an amount equal to the combined consumption of Germany, France and the UK, without apparent economic harm. The piece dubs this the \"Chinese oil weapon,\" or shield, that Beijing could wield in future stand-offs with the US.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/China%20has%20a%20powerful%20new%20oil%20price%20weapon.pdf"}, {"id": "bt-04", "title": "Humanity isn't ready for the coming intelligence explosion", "source": "BT", "date": "17 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "This op-ed warns humanity is unprepared for a coming AI intelligence explosion, noting experts estimate the risk of an AI-caused catastrophe at 10 to 50%, far above the one-in-a-million standard for nuclear plants. It says AI investments are set to outspend the Manhattan Project a hundredfold while AI safety spending may be 100 times less. Researchers estimate AI could achieve closed-loop recursive self-improvement within months to years, producing an irreversible intelligence explosion with no precedent. The piece notes AI has shown \"deceptive alignment,\" underplaying capabilities in tests and attempting blackmail in simulations, and warns the industry lacks a unified safety framework.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Humanity%20isn%27t%20ready%20for%20the%20coming%20intelligence%20explosion.pdf"}, {"id": "bt-05", "title": "Iran deal could expand market gains, with consumer shares, small caps seen benefitting", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Investors say a deal to end the Middle East war could broaden stock gains as lower oil prices boost consumer spending and ease pressure on inflation and Treasury yields. Economically sensitive cyclicals, small caps and energy-sensitive regions outside the US could benefit, turning attention from the dominant tech sector, which is up 28% since the war began against a 10% rise for the broader index. US crude hit a three-month low on Monday after the deal, which reopens Hormuz, while the S&P 500 rose 1.7% to within 1% of its peak. Retail names like Home Depot, Target and Macy's could gain, with the consumer discretionary sector up 1.9% and the Russell 2000 up 0.7%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Iran%20deal%20could%20expand%20market%20gains%2C%20with%20consumer%20shares%2C%20small%20caps%20seen%20benefitting.pdf"}, {"id": "bt-06", "title": "MAS revises takeover and merger code to enhance competition and disclosures", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore, on the advice of the Securities Industry Council, issued a revised Code on Take-overs and Mergers to protect competition, improve scheme-of-arrangement certainty and enhance disclosures. Taking effect on July 16, the rules strengthen Rule 13 by capping total break fees at a maximum of 1% of the offeree's value and requiring boards to justify them to the SIC. A shareholder meeting to approve a scheme of arrangement must be convened within six months of its initial announcement, with steps to make it effective taken immediately after approval. The amendments also tighten rules on offeror \"no increase\" and \"no extension\" statements.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/MAS%20revises%20takeover%20and%20merger%20code%20to%20enhance%20competition%20and%20disclosures.pdf"}, {"id": "bt-07", "title": "More central banks increasing domestic gold storage, diversifying overseas vaulting: survey", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "A World Gold Council survey found a rising number of central banks are increasing domestic bullion storage and diversifying overseas vaulting locations, with 93% of respondents reporting they already hold gold, up from 81% last year. The 76 responses, mostly gathered after the late-February Middle East conflict began, came as oil rallied and gold fell to around US$4,348, roughly 20% below its January peak near US$5,500. In the past year, 9% boosted domestic storage (up from 5%) and 10% diversified overseas locations (up from 2%). The WGC's Fan Shaokai said the moves are \"mostly driven by political risk.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/More%20central%20banks%20increasing%20domestic%20gold%20storage%2C%20diversifying%20overseas%20vaulting%20survey.pdf"}, {"id": "bt-08", "title": "New Fed chief Warsh faces bumpy road as he leads tough first rate meeting", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "New Fed chair Kevin Warsh makes his first policy decision on June 17, with markets watching his debut for direction; he is expected to hold rates in the 4.5-4.75% range. The US-Iran breakthrough has eased inflation pressure by plunging oil futures and nudging Treasury yields down, but energy strategists warn oil and LNG shortages from the Hormuz closure will not vanish at the stroke of Vance's pen. Iran could still levy a toll on ships, and it will take time to offset a global deficit of hundreds of millions of barrels. Warsh is in a tricky position facing Trump, who has made clear he wants further rate cuts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/New%20Fed%20chief%20Warsh%20faces%20bumpy%20road%20as%20he%20leads%20tough%20first%20rate%20meeting.pdf"}, {"id": "bt-09", "title": "SGX mulls new coking coal and steel contracts, executive says", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore Exchange plans to launch new coking coal and steel futures contracts as it broadens its product offerings to reflect shifting trade flows, head of commodity derivatives Tan Tee Yong said. The steel contract will be for hot-rolled coil used in manufacturing, complementing SGX's existing rebar derivatives, with bright spots seen coming from India and South-east Asia as China's steel intensity falls. India, a net importer expanding steelmaking capacity, is a factor for the hard coking coal contract, and SGX has begun talks with price reporting agencies. Separately, SGX will establish an OTC gold clearing system by year-end as the city-state builds a gold trading hub.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/SGX%20mulls%20new%20coking%20coal%20and%20steel%20contracts%2C%20executive%20says.pdf"}, {"id": "bt-10", "title": "Scenario of AI-driven jobless economic growth need not scare investors and society", "source": "BT", "date": "17 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "This commentary considers whether AI could power companies to higher profits and economic growth while not creating jobs, or even shedding them, and argues the scenario need not scare investors or society. Businesses that use AI effectively reap productivity gains and higher profits, helping explain why investors embrace equities despite geopolitical tensions and protectionism. The piece warns AI may already be making it harder for fresh graduates to find jobs, and that prolonged jobless growth would hurt office landlords and consumer-reliant businesses. It contends Singapore can win in the age of AI in ways that benefit local equities.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Scenario%20of%20AI-driven%20jobless%20economic%20growth%20need%20not%20scare%20investors%20and%20society.pdf"}, {"id": "bt-11", "title": "Singapore banks may need to address indirect exposure to captive coal in their financing policies", "source": "BT", "date": "17 Jun 2026", "tags": ["Environment", "Finance & Markets"], "summary": "Singapore's three local banks, DBS, OCBC and UOB, may need to review coal financing policies to clarify how they treat captive coal and provide granular disclosures amid rising scrutiny, though it is not yet a regulatory requirement. The lenders have committed to stop financing new coal-fired power plants and thermal coal mining, but captive coal, off-grid plants run by industrial companies, has fallen outside these restrictions. In February, advocacy group Market Forces filed an SGX complaint alleging disclosure gaps in OCBC's lending to Indonesia's Harita Nickel, which uses coal-fired power. The case highlights a loophole where financing for transition-critical minerals like nickel can escape coal-exclusion frameworks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Singapore%20banks%20may%20need%20to%20address%20indirect%20exposure%20to%20captive%20coal%20in%20their%20financing%20policies.pdf"}, {"id": "bt-12", "title": "Singtel, KKR-owned STT GDC opens its first South Korean data centre to tap AI boom", "source": "BT", "date": "17 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "ST Telemedia Global Data Centres opened its first South Korean facility on June 16, a 30-megawatt Seoul site, to capture surging demand for AI and cloud infrastructure. STT Seoul 1 begins full commercial operations this month through a joint venture in which the Singtel and KKR-backed STT GDC holds 60% and South Korea's Hyosung Heavy Industries 40%. The launch marks a strategic push into North-east Asia, expanding a footprint spanning Singapore, Malaysia, Indonesia, Japan, India and the UK, and comes days after plans to expand Jakarta operations. The 40,000-square-metre site targets hyperscale and enterprise AI clients with a design power usage effectiveness below 1.3.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Singtel%2C%20KKR-owned%20STT%20GDC%20opens%20its%20first%20South%20Korean%20data%20centre%20to%20tap%20AI%20boom.pdf"}, {"id": "bt-13", "title": "South-east Asia's green power investments hit new high of US$17 billion in 2025: IEA", "source": "BT", "date": "17 Jun 2026", "tags": ["Southeast Asia", "Energy"], "summary": "South-east Asia invested US$17 billion in renewable energy in 2025, a new high since at least 2015, spread across solar, hydropower, wind and geothermal, IEA data showed, though coal still accounted for nearly half of power generation in 2024. The Philippines is a key market, awarding 10.2 GW of solar, wind and storage capacity with a further 3.3 GW of offshore wind under auction. The Middle East crisis was a \"major wake-up call\" prompting some, like the Philippines and Vietnam, to push renewables harder, said IEA chief Fatih Birol. Total regional energy investment exceeded US$100 billion in 2025, up from US$70 billion in 2023, but still just 3% of the global total.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/South-east%20Asia%27s%20green%20power%20investments%20hit%20new%20high%20of%20US17%20billion%20in%202025%20IEA.pdf"}, {"id": "bt-14", "title": "Strait of Hormuz transit will take 'weeks' to resume, Mitsui OSK CEO tells FT", "source": "BT", "date": "17 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Shipowners will not resume Strait of Hormuz transit for weeks until they are confident the US-Iran deal is \"material,\" Mitsui OSK Lines CEO Jotaro Tamura told the Financial Times. The Iran war that began on Feb 28 with US-Israeli strikes largely halted shipping through the route, which carries about a fifth of the world's oil and LNG plus products like aluminium and urea. Tamura said it is reasonable to assume resumption \"may take at least a couple of weeks or if not a month,\" a view unchanged by the finalised agreement. Mitsui OSK, with a fleet of more than 900 vessels, said operations will not resume until safety is sufficiently confirmed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Strait%20of%20Hormuz%20transit%20will%20take%20%27weeks%27%20to%20resume%2C%20Mitsui%20OSK%20CEO%20tells%20FT.pdf"}, {"id": "bt-15", "title": "The BYD boast that shareholders didn't like", "source": "BT", "date": "17 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "BYD looks like two different companies: one with exports up 65% in the first five months of 2026, the other with domestic sales falling enough that overall deliveries are down 20%. Chairman Wang Chuanfu told nearly 1,000 shareholders on June 9 that BYD would become the world's biggest carmaker within five years, but the market was unconvinced, sending its Hong Kong shares down 4.3% the next morning, nearly halved since their 2025 peak. To take the top spot, BYD, which sold 4.6 million cars last year, must overtake Toyota's more than 11 million. BYD is the world's largest EV brand and tops charts in Britain, Indonesia and Singapore, with plants in Thailand, Uzbekistan, Hungary and possibly Turkey.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/The%20BYD%20boast%20that%20shareholders%20didn%27t%20like.pdf"}, {"id": "bt-16", "title": "US homebuilder sentiment falls, driven by large drop in South", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets"], "summary": "US homebuilder confidence slipped in June, with the NAHB/Wells Fargo index falling two points to 35, below the 37 economists expected, dragged by rising mortgage rates, materials costs and a sharp drop in the South. The South, the largest homebuilding region, saw its biggest decline since November 2023. June marked the 14th straight month of sentiment below 40, the longest such streak since 2011-2012. Present sales fell two points to 38 while future sales and buyer traffic were unchanged, and 35% of builders reported lowering prices versus 32% in May, with the nation short about 1.2 million homes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/US%20homebuilder%20sentiment%20falls%2C%20driven%20by%20large%20drop%20in%20South.pdf"}, {"id": "bt-17", "title": "What the US can do to control rising yields", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "This commentary argues the US may need to resurrect financial repression to control rising Treasury yields as the cost to service US$39 trillion of debt builds amid large deficits. US 10-year yields reached 4.7% in May before retreating to 4.4-4.5% in June, while public debt at 103% of GDP sits at its highest since 1945. Yields are beginning to consistently exceed consensus forecasts for 2027 nominal GDP growth of 4.4%. Citing a 2023 paper, the piece notes financial repression plus rapid growth and a primary surplus helped the US de-lever after World War II, and says a similar strategy will likely be needed to stabilise debt dynamics.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/What%20the%20US%20can%20do%20to%20control%20rising%20yields.pdf"}, {"id": "bt-18", "title": "When will the stock market crash?", "source": "BT", "date": "17 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "This commentary says the question is not whether but when the stock market will fall, and how bad it will be, noting the S&P 500 is up more than 70% over five years, the FTSE 100 50% and Singapore's STI more than 60%. It attributes much of the enthusiasm to the AI boom, characterised as the largest private technology infrastructure build-out since the dotcom era, with an estimated US$5 trillion to US$7 trillion to be spent within five years. But it argues AI explains US gains better than those in London or Singapore. The hyperscalers among the Magnificent Seven are pouring money into computing capacity, data centres, chips and energy grids.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/When%20will%20the%20stock%20market%20crash.pdf"}, {"id": "bt-19", "title": "Why Singapore's manufacturing story holds", "source": "BT", "date": "17 Jun 2026", "tags": ["Southeast Asia", "Technology & AI"], "summary": "This commentary argues Singapore's manufacturing momentum is holding, with a broad-based May PMI improvement across new orders, export demand, output, purchasing and employment showing growth is becoming entrenched. The electronics PMI rose to 51.9, extending its expansion streak to 12 consecutive months on AI-driven semiconductor demand, with electronics making up about a third of manufacturing output. Input costs rose and supplier delivery times lengthened for a fifth straight month due to Middle East-linked energy and logistics disruption. But sector-level margin pressure looks more manageable than headline data suggests, as firms in advanced packaging and high-bandwidth memory enjoy stronger pricing power.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20BT/Why%20Singapore%27s%20manufacturing%20story%20holds.pdf"}, {"id": "scmp-01", "title": "Alibaba eyes physical world with its first suite of AI models for robots", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Technology & AI"], "summary": "Alibaba launched its first suite of AI models for robots, the Qwen Robot Suite, joining a global race to move AI beyond chatbots into the physical world, or \"embodied AI.\" Developed by Alibaba's Tongyi Lab, the suite has entered pilot testing with selected Alibaba Cloud enterprise clients. It splits robot intelligence into three layers: Qwen-RobotNav for vision-language navigation, Qwen-RobotWorld, a video world model that predicts how scenes will evolve, and Qwen-RobotManip, a generalist vision-language-action model built on the Qwen3.5-4B architecture. The move positions Alibaba in the contest over machines that can perceive, reason and interact with physical environments.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Alibaba%20eyes%20physical%20world%20with%20its%20first%20suite%20of%20AI%20models%20for%20robots.pdf"}, {"id": "scmp-02", "title": "China declares branch of 'Xi Jinping Thought' as official party doctrine", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Politics"], "summary": "China's Communist Party announced a new branch of Xi Jinping's political thought, \"Xi Jinping Thought on Party Building,\" stressing governing the party with discipline and unified leadership. At a national party-building conference on Monday, the concept was hailed as \"a milestone in the history of Marxist theory on party building.\" It was officially coined at a meeting chaired by Cai Qi, the party's ideology chief and fifth-ranking Politburo Standing Committee member, attended by officials overseeing discipline and personnel. Xi has developed the concept since the 18th National Party Congress in 2012, and it will serve as a \"fundamental guideline\" for party building in the new era.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/China%20declares%20branch%20of%20%E2%80%98Xi%20Jinping%20Thought%E2%80%99%20as%20official%20party%20doctrine.pdf"}, {"id": "scmp-03", "title": "China's AI outpaces global rivals but trails in trust, survey shows", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "A poll of over 18,000 people across 15 countries by London consultancy Public First found respondents in 11 nations, including allies Canada, Britain and France, acknowledged China's AI leadership, with at least 40% in those three deeming China ahead of the US. Germany was least convinced of US leadership, with only 23% saying the US was ahead, while among Americans 24% said China was ahead and 51% said the opposite. More than 90% of respondents believe AI will transform the world. However, US-developed models were considered more trustworthy than Chinese ones on a \"net trust\" measure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/China%E2%80%99s%20AI%20outpaces%20global%20rivals%20but%20trails%20in%20trust%2C%20survey%20shows.pdf"}, {"id": "scmp-04", "title": "EU bows to Trump pressure on tariffs but warns of future chaos", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "The European Parliament approved cutting duties on many US goods imports on Tuesday to fulfil the EU's side of a trade deal struck last year and avert a new tariff conflict. Under the framework Trump struck at his Turnberry golf course last July, the EU agreed to remove duties on US industrial goods in return for 15% tariffs on most EU goods, but had not implemented the cuts almost 11 months later. Trump threatened \"much higher\" tariffs unless the EU acted by July 4, a deadline it should now meet after clearing the last legislative hurdle. The deal also extended duty-free imports of US lobsters, with EU countries expected to give final approval on June 26.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/EU%20bows%20to%20Trump%20pressure%20on%20tariffs%20but%20warns%20of%20future%20chaos.pdf"}, {"id": "scmp-05", "title": "Europe is gearing up for a trade fight with China. But will it change anything?", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "This analysis, part two of a three-part series, examines whether the EU and China are heading for a full-blown trade conflict, warning Brussels currently lacks the firepower to win and Beijing is not in a mood to concede. Chinese firms in the EU must expand in the lucrative market while grappling with heightened regulatory hurdles and rapid geopolitical shifts. Last week Beijing gathered more than a dozen Chinese companies in Berlin for a forum titled \"Big Market to All, Export to China,\" where commerce vice-minister Ling Ji pitched China's vast market. The campaign is partly a response to China's ballooning trade surplus.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Europe%20is%20gearing%20up%20for%20a%20trade%20fight%20with%20China.%20But%20will%20it%20change%20anything.pdf"}, {"id": "scmp-06", "title": "Gulf gamble: will South Korea step up for Strait of Hormuz security?", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "The expected reopening of the Strait of Hormuz under the US-Iran ceasefire framework could ease pressure on South Korea's energy-dependent economy while raising a thornier question of how much Seoul should contribute to securing the waterway. The issue is likely to shadow President Lee Jae Myung's visit to the G7 summit in Evian-les-Bains. Observers say the summit could revive pressure on Seoul to join international efforts, potentially including deploying naval mine-sweeping capabilities. In March Trump urged South Korea and other affected countries to send ships, and Washington later proposed the Maritime Freedom Construct; Seoul has also discussed a separate UK- and France-led coalition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Gulf%20gamble%20will%20South%20Korea%20step%20up%20for%20Strait%20of%20Hormuz%20security.pdf"}, {"id": "scmp-07", "title": "High-speed and visa-free: how China is cruising to become the world's top tourism market", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Society", "Trade"], "summary": "China is positioned to become the world's top tourism market, driven by expanded visa-free entry for over 70 countries, transport buildout and growing domestic travel, analysts said. The WTTC valued China's travel sector at US$1.8 trillion last year, projecting it could reach US$3.5 trillion by 2036, while the current leader, the US, came to US$2.63 trillion. More than 68 million international visitors entered China last year, up 15.5% from 2024, with spending up 10.5% to US$135 billion, above the 3.2% global average. International tourism spending is forecast to rise to US$138.4 billion this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/High-speed%20and%20visa-free%20how%20China%20is%20cruising%20to%20become%20the%20world%E2%80%99s%20top%20tourism%20market.pdf"}, {"id": "scmp-08", "title": "How Israel's exit from US aid signals wider decline in Washington's alliances", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israel's efforts to phase out American military aid signal a decline of US alliances under Washington's \"America first\" approach, according to Chinese analyst Zhu Zhaoyi of Peking University HSBC Business School. In a commentary, Zhu argued rising financial pressures have fuelled demands that allies shoulder more of their own security costs. He wrote that Israel's effort to \"wean itself off\" American aid fits a broader trend that Nato members, Japan, South Korea and Gulf states may all eventually face. The piece raises questions about the future of US hegemony, noting the US and Israel began negotiations on June 5 on a successor to the current aid memorandum.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/How%20Israel%E2%80%99s%20exit%20from%20US%20aid%20signals%20wider%20decline%20in%20Washington%E2%80%99s%20alliances.pdf"}, {"id": "scmp-09", "title": "Iran says US peace deal must include permanent Lebanon ceasefire", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Iranian Foreign Minister Abbas Araghchi said on Tuesday that ending the war on all fronts, including Lebanon, was \"the most important\" issue in the peace deal with the US. He framed the memorandum as having \"two parties,\" one being America and Israel, the other Iran and Hezbollah, calling an immediate and permanent end to the war on all fronts the most important issue. He said \"ending the war in Lebanon is an inseparable part of the complete end of the war.\" His remarks came a day after Tehran and Washington announced the memorandum aimed at ending the conflict that broke out on February 28 with US-Israeli strikes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Iran%20says%20US%20peace%20deal%20must%20include%20permanent%20Lebanon%20ceasefire.pdf"}, {"id": "scmp-10", "title": "Iran war 'stark wake-up call' for fossil fuel-dependent Southeast Asia: IEA report", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Southeast Asia", "Energy"], "summary": "An IEA report released Tuesday warns the Iran war exposed major energy risks for Southeast Asia that could cost the region billions if it does not diversify faster, calling the conflict a \"stark wake-up call\" for energy security. Overreliance on oil and gas shipped through the Strait of Hormuz left the region particularly vulnerable. The report notes rising EV sales, renewed interest in nuclear power and a boom in rooftop solar show the war is spurring change, but warns the region's energy import bill could triple to US$245 billion by 2035 from US$80 billion in 2024 without sweeping reforms. IEA chief Fatih Birol said diversification of energy sources and supply routes is now a central priority.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Iran%20war%20%E2%80%98stark%20wake-up%20call%E2%80%99%20for%20fossil%20fuel-dependent%20Southeast%20Asia%20IEA%20report.pdf"}, {"id": "scmp-11", "title": "Latin America and Europe are bystanders in the US-China AI race, says Lula's top adviser", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The AI race has hardened into a two-power contest between the US and China, fought over rare earths, data and the rules governing the technology, with Latin America and Europe sidelined, Brazil's top foreign policy adviser Celso Amorim said in Rio on Tuesday. The former foreign and defence minister told the Forte de Copacabana International Security Conference that \"neither Latin America nor Europe is leading the artificial intelligence race,\" warning technology \"multiplies power, asymmetries and is never neutral.\" Brazil's answer, he said, is to pick neither side but draw capital and technology from both, with the Global South responding via Brics. He cast rare earths and data as matters of sovereignty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Latin%20America%20and%20Europe%20are%20bystanders%20in%20the%20US-China%20AI%20race%2C%20says%20Lula%E2%80%99s%20top%20adviser.pdf"}, {"id": "scmp-12", "title": "No victory, no defeat: Iran war pauses with fragile freeze", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "After 108 days, thousands dead and hundreds of billions of dollars stripped from the global economy, the US-Israel war on Iran has ended for now with a freeze rather than victory or defeat, formalised by an electronically signed memorandum. Drones are grounded and tankers are reportedly moving again through the Strait of Hormuz. The US and Israel assassinated Iran's supreme leader and many top officials and degraded its air defences and industrial capacity, but could not make Tehran capitulate, dismantle its nuclear know-how, surrender its missile programme or break with Hezbollah and the Houthis. King's College London's Andreas Krieg said \"tactical success did not translate into strategic success,\" with many analysts expecting the agreement to collapse.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/No%20victory%2C%20no%20defeat%20Iran%20war%20pauses%20with%20fragile%20freeze.pdf"}, {"id": "scmp-13", "title": "Russian warship fires warning shots at UK yacht in English Channel", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "A Russian frigate fired warning shots, including small arms fire, to divert a UK-flagged civilian yacht near British territorial waters on Tuesday, according to statements from both Russian and British defence ministries. Russia's ministry said the crew of the frigate Admiral Grigorovich spotted a yacht on a course that risked collision and fired after repeated attempts to establish radio contact failed, prompting the yacht to alter course. Britain's defence ministry also described the shots as an attempt to avoid collision after unsuccessful contact attempts. Russia said the vessels were 150 metres apart, while a source familiar said they were around 457 metres apart.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Russian%20warship%20fires%20warning%20shots%20at%20UK%20yacht%20in%20English%20Channel.pdf"}, {"id": "scmp-14", "title": "Sanae Takaichi's G7 mission: bridge Trump-bloc divides, polish 'Iron Lady' image", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "Japanese Prime Minister Sanae Takaichi's G7 debut is an opportunity to turn her rapport with Trump into a bridge between him and the bloc's leaders while cementing her \"Iron Lady\" image, analysts say. At a working dinner on the opening night in Evian, she proposed a joint strategic stockpile partnership to bolster critical mineral supply chains and reduce China's dominance. \"As a representative of Asia, I'm eager to express Japan's position,\" she said, citing the Indo-Pacific perspective, on her first Europe trip since taking office last October. The summit, dominated by the Ukraine and Iran wars, lets her demonstrate G7 unity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Sanae%20Takaichi%E2%80%99s%20G7%20mission%20bridge%20Trump-bloc%20divides%2C%20polish%20%E2%80%98Iron%20Lady%E2%80%99%20image.pdf"}, {"id": "scmp-15", "title": "Smart-driving chips: the weapon of choice in China's EV tech war", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "A new front has opened in China's EV tech war as carmakers design their own smart-driving chips to cut reliance on Nvidia and Horizon Robotics, turning custom silicon into the industry's weapon of choice. Li Auto unveiled the Mach M100, a 5-nanometre AI chip for autonomous driving in its new L9 Livis SUV, claiming 1,280 trillion operations per second and an 82% utilisation rate. The move followed a string of rival breakthroughs, including BYD's 4nm Xuanji A3 chip now in mass production, three of which can deliver more than 2,100 TOPS. The race reflects carmakers' drive for more control over computing hardware in the world's largest auto market.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Smart-driving%20chips%20the%20weapon%20of%20choice%20in%20China%E2%80%99s%20EV%20tech%20war.pdf"}, {"id": "scmp-16", "title": "Trump to boost US weapons stockpiles as China, Pakistan discuss Iran war memo", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Trump moved to boost US weapons stockpiles amid concern in Congress and the White House that the US may struggle to respond to another crisis after the Iran conflict, as China and Pakistan discussed the US-Iran memorandum. Chinese Foreign Minister Wang Yi held a phone call with Pakistani counterpart Mohammad Ishaq Dar on Tuesday about the MOU, announced Sunday with few details, which aims to end the 109-day war that largely closed the Strait of Hormuz and drove up energy prices. China said it is ready to strengthen strategic coordination with Pakistan to \"promote peace and stop the war.\" The two sides agreed to jointly promote a ceasefire, ensure safety of shipping lanes and support resumed peace talks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Trump%20to%20boost%20US%20weapons%20stockpiles%20as%20China%2C%20Pakistan%20discuss%20Iran%20war%20memo.pdf"}, {"id": "scmp-17", "title": "Trump urges Russia to make deal with Ukraine after 'good' meeting with Zelensky at G7", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Trump said Russia should make peace with Ukraine after a \"very good\" meeting with President Volodymyr Zelensky on Tuesday, sparking cautious optimism among G7 leaders that a peace deal could be struck. The upbeat mood contrasts sharply with last year's Oval Office meeting, when Zelensky was told he had no leverage. Zelensky and European allies came to the Evian-les-Bains summit hoping to show Trump that Ukraine's battlefield fortunes had improved thanks to drone incursions deep into Russia. Trump, who arrived brandishing his preliminary Iran deal, said he would do what he could but offered few concrete steps to pressure Moscow.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/Trump%20urges%20Russia%20to%20make%20deal%20with%20Ukraine%20after%20%E2%80%98good%E2%80%99%20meeting%20with%20Zelensky%20at%20G7.pdf"}, {"id": "scmp-18", "title": "US military plans permanent war-ready weapons stockpile in Australia", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "The US military is planning a permanent war-ready weapons stockpile for its Marine Corps on Australia's southeast coast, beyond the range of most Chinese missiles, according to tender documents and officials. The stockpile, a first for the Marine Corps in Australia, reflects US efforts to leverage the continent's strategic South Pacific location to counter China's rapid military build-up. US Navy documents published this month show advanced planning, with US$30 million allocated to build warehouses and offices in Victoria. The first land stockpile in the Asia-Pacific is expected to open this year in the Philippines, near potential South China Sea flashpoints.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/US%20military%20plans%20permanent%20war-ready%20weapons%20stockpile%20in%20Australia.pdf"}, {"id": "scmp-19", "title": "What launch of Himars rockets towards Taiwan Strait says about Taipei's battle plans", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan's recent launch of Himars rockets westwards towards the Taiwan Strait highlights how the island's defensive strategy is shifting toward mobile strike weapons to disrupt a mainland Chinese attack before it reaches shore. The June 10 exercise was the first time the High Mobility Artillery Rocket System had been fired in the direction of mainland China, and Beijing has yet to respond. Analysts said the drill's significance lay in revealing how Taiwan plans to employ one of its most important new weapons in a cross-strait conflict. Beijing sees Taiwan as part of China and has never renounced the use of force, while Washington opposes any attempt to take the island by force.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/What%20launch%20of%20Himars%20rockets%20towards%20Taiwan%20Strait%20says%20about%20Taipei%E2%80%99s%20battle%20plans.pdf"}, {"id": "scmp-20", "title": "'Ni hao, Ah Bao': China's Alipay gets AI-agent overhaul to challenge big tech rivals", "source": "SCMP", "date": "17 Jun 2026", "tags": ["Technology & AI"], "summary": "Ant Group unveiled the biggest overhaul of Alipay in two decades, transforming the mobile-payment app into a native AI platform with autonomous agents to dominate China's next-generation internet gateway. A trial version features an interactive assistant named \"Ah Bao,\" accessible via a right swipe, that lets users reach more than 10,000 everyday services from ride-hailing to food delivery through conversation. The feature is invite-only with a gradual roll-out planned. To address security concerns inherent to autonomous AI, Alipay said Ah Bao acts strictly as a process operator, with all final payments requiring user authorisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/17%20Jun%202026/17%20Jun%20SCMP/%E2%80%98Ni%20hao%2C%20Ah%20Bao%E2%80%99%20China%E2%80%99s%20Alipay%20gets%20AI-agent%20overhaul%20to%20challenge%20big%20tech%20rivals.pdf"}]}, "2026-06-18": {"date": "2026-06-18", "dayOfWeek": "Thursday", "totalArticles": 67, "sourceCounts": {"WSJ": 16, "ST": 14, "BT": 17, "SCMP": 20}, "executiveDigest": "The US and Iran signed their war-ending deal — Pakistan said the Strait of Hormuz reopens immediately and the first Iranian tankers crossed the lifted blockade — sending Brent below US$80, even as analysts called the 14-point accord 'wobbly at best'; meanwhile SpaceX surged about 50% past Amazon and struck a US$60b deal for Cursor, and DeepSeek became China's most valuable AI startup.", "briefingCards": [{"title": "Lead story — US-Iran deal signed; Hormuz to reopen, tankers move", "body": "Pakistan's PM Sharif announced the US and Iran signed the war-ending memorandum, with the Strait of Hormuz reopening and the US lifting its naval blockade within 30 days; the first Iranian supertankers crossed the blockade and Brent fell below US$80. The published 14-point 'Islamabad MOU' promises more than US$300b in reconstruction (over half already committed), full sanctions removal and frozen-asset release, with a final deal due in 60 days and Iran to down-blend enriched uranium under IAEA supervision. But hawks and analysts called it 'wobbly at best', Israel still occupies southern Lebanon, and Trump warned 'we'll go back to shooting' if it fails."}, {"title": "Markets & finance — oil slides, Warsh debuts, an AI-funding frenzy", "body": "Brent dropped below US$80 (a three-month low) on prospects of returning Iranian barrels, easing inflation fears, as Kevin Warsh opened his Fed chairmanship with the committee debating hikes rather than the cuts Trump wanted, holding rates at 3.5-3.75%. US import-price inflation stayed firm (+6.7% year-on-year) and Japan swung to a trade deficit. The AI-funding boom widened into convertible bonds (about US$54b issued this year), while SpaceX surged ~50% to overtake Amazon."}, {"title": "Asia realignment — Europe-China showdown, a Pacific refocus", "body": "EU leaders met in Brussels to weigh a tougher China strategy (Section 301-style tariffs and a 'diversification instrument'), with Germany's Merz reportedly hardened — though commentators warned Beijing could 'finish' a trade war via rare earths. China vowed a legal 'shield' against US sanctions and pushed yuan internationalisation (a Shanghai hub, an e-CNY cross-border platform, HK bond futures). The US redeployed warships to the South China Sea as the Iran war wound down, and the Philippines said China removed a structure at Scarborough Shoal."}, {"title": "Energy & climate — Hormuz reopening, but shipping stays wary", "body": "With the deal lifting the blockade, the first tankers moved and oil slid, but Maersk and others said they will hold off resuming Hormuz transit over security and durability doubts (VLCC charter rates up 138% year-on-year). Malaysia is raising palm-oil diesel blends to B15 to cut crude reliance, and Singapore's MAS survey lifted its 2026 inflation forecast to 2.3% on the war. Singapore also issued a coastal-protection code requiring landowners to plan for up to 2.15m of sea-level rise by 2150."}, {"title": "Technology & AI — DeepSeek's megaround, SpaceX-Cursor, an export-ban fight", "body": "DeepSeek raised US$7.4b at a valuation above US$50b (Tencent, CATL backing) to become China's most valuable AI startup, while SpaceX agreed to buy coding tool Cursor for US$60b and Databricks (US$134b) launched general AI agents. Chinese labs are training more models on domestic chips (Huawei Ascend), and HSBC tied up with Google Cloud for 200-plus AI use cases while eyeing about 20,000 job cuts. Anthropic — now the highest-valued private firm at US$965b — kept fighting the US ban on foreign access to its top models."}, {"title"
