<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tecity News Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbfbfa; --surface:#ffffff; --surface-2:#f6f6f4;
    --text:#16181d; --muted:#6c727e; --faint:#9aa0ab;
    --border:#ececec; --border-2:#e2e2e0; --ink:#16181d;
    --hover:#f4f4f2; --ring:rgba(20,23,28,.10);
    --shadow:0 1px 2px rgba(16,18,22,.04), 0 8px 24px rgba(16,18,22,.05);
    --shadow-sm:0 1px 2px rgba(16,18,22,.05);
    --wsj:#D85A30; --st:#1D9E75; --bt:#378ADD; --scmp:#D4537E;
    --maxw:1120px;
  }
  html[data-theme="dark"]{
    --bg:#0c0d10; --surface:#15171c; --surface-2:#1b1e25;
    --text:#eceef2; --muted:#9aa1ad; --faint:#6b7280;
    --border:#252830; --border-2:#2d313b; --ink:#eceef2;
    --hover:#1c1f26; --ring:rgba(255,255,255,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv02","cv03","cv04","ss01";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.6;
  }
  ::selection{background:rgba(120,120,120,.18)}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}

  /* header */
  header.top{position:sticky; top:0; z-index:20; backdrop-filter:saturate(180%) blur(14px);
    background:color-mix(in srgb, var(--bg) 82%, transparent); border-bottom:1px solid var(--border)}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 28px; max-width:var(--maxw); margin:0 auto}
  .brand{display:flex; flex-direction:column; gap:2px; min-width:0}
  .brand .title{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .brand .meta{font-size:12.5px; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:10px}
  select.date{appearance:none; font:inherit; font-size:13px; font-weight:500; color:var(--text);
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; padding:8px 32px 8px 12px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa0ab' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; cursor:pointer; transition:border-color .15s}
  select.date:hover{border-color:var(--ink)}
  .toggle{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; color:var(--muted); transition:.15s}
  .toggle:hover{color:var(--text); border-color:var(--ink)}
  .toggle svg{width:17px; height:17px}

  /* hero digest */
  .hero{padding:48px 0 14px}
  .hero .eyebrow{margin-bottom:16px}
  .digest{font-size:clamp(25px,3.6vw,37px); line-height:1.22; font-weight:400; letter-spacing:-.02em;
    max-width:none; color:var(--text)}
  .digest .lead{max-width:none}

  /* metrics */
  .metrics{display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:30px 0 8px}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px; box-shadow:var(--shadow-sm); transition:.18s}
  .metric:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .metric .v{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.05}
  .metric .l{font-size:12.5px; font-weight:500; margin-top:8px}
  .metric .s{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4}

  /* tabs */
  .tabs{display:flex; gap:26px; margin:34px 0 0; border-bottom:1px solid var(--border)}
  .tab{position:relative; cursor:pointer; padding:0 0 14px; font-size:14px; font-weight:500; color:var(--muted); transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px}

  .section{padding:30px 0 0}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px}
  .section-head h2{margin:0; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .section-head .hint{font-size:12.5px; color:var(--muted)}

  /* lead briefing card */
  .lead-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px 32px; box-shadow:var(--shadow); margin-bottom:16px}
  .lead-card .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:12px}
  .lead-card h3{margin:0 0 12px; font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1.2}
  .lead-card p{margin:0; font-size:15.5px; color:var(--text); line-height:1.65; max-width:none; column-width:34ch; column-gap:48px; column-fill:balance}

  /* briefing grid */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm); transition:.18s}
  .card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .card h3{margin:0 0 10px; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.3}
  .card p{margin:0; font-size:14px; color:var(--muted); line-height:1.62}

  /* coverage / bars */
  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm)}
  .bar-row{display:flex; align-items:center; gap:14px; margin:14px 0}
  .bar-row .name{width:42px; font-size:12.5px; font-weight:600; letter-spacing:.02em}
  .bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; border-radius:99px}
  .bar-row .cnt{width:26px; text-align:right; font-size:12.5px; color:var(--muted); font-weight:600}

  /* article */
  .feed-controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:4px 0 18px}
  .search{flex:1 1 260px; position:relative}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint)}
  .search input{width:100%; font:inherit; font-size:14px; color:var(--text); background:var(--surface);
    border:1px solid var(--border-2); border-radius:12px; padding:11px 14px 11px 38px; outline:none; transition:.15s}
  .search input:focus{border-color:var(--ink); box-shadow:0 0 0 4px var(--ring)}
  .pills{display:flex; flex-wrap:wrap; gap:8px}
  .pill{cursor:pointer; font-size:12.5px; font-weight:500; color:var(--muted); background:var(--surface);
    border:1px solid var(--border-2); border-radius:99px; padding:7px 13px; user-select:none; transition:.14s; line-height:1}
  .pill:hover{border-color:var(--ink); color:var(--text)}
  .pill.active{color:#fff; border-color:transparent}
  .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
  .count{font-size:12.5px; color:var(--muted); margin-bottom:14px}

  .article{padding:22px 4px; border-bottom:1px solid var(--border)}
  .article:first-child{padding-top:6px}
  .article .head{display:flex; align-items:center; gap:12px; margin-bottom:9px; flex-wrap:wrap}
  .src{display:inline-flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted)}
  .src .dot{width:8px; height:8px; border-radius:99px}
  .article h4{margin:0; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.32; flex:1; min-width:240px}
  .article h4 a{color:inherit; text-decoration:none; transition:color .15s}
  .article h4 a:hover{color:var(--wsj-hover, var(--muted))}
  .article .date{font-size:12px; color:var(--faint); white-space:nowrap}
  .article p{margin:6px 0 12px; font-size:14.5px; color:var(--muted); line-height:1.62; max-width:88ch}
  .tags{display:flex; flex-wrap:wrap; gap:7px}
  .tag{font-size:11px; font-weight:600; letter-spacing:.01em; border-radius:99px; padding:3px 10px; border:1px solid transparent}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:14px}
  footer{padding:48px 0 60px; color:var(--faint); font-size:12px; text-align:center}

  @media(max-width:980px){
    .metrics{grid-template-columns:repeat(3,1fr)}
    .cards{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap,.topbar{padding-left:18px; padding-right:18px}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .hero{padding-top:34px}
  }
</style>
</head>

<script>window.ALL_DAYS = {"2026-07-14": {"date": "2026-07-14", "dayOfWeek": "Tuesday", "totalArticles": 63, "sourceCounts": {"WSJ": 11, "ST": 18, "BT": 10, "SCMP": 24}, "executiveDigest": "Trump moved to restore the Iran blockade and charge fees for Strait of Hormuz shipping as the UAE said Iranian missiles struck tankers, killing crew - and economists warned the war is leaving stubbornly higher inflation; DBS crossed S$200 billion in market value as SGX trading jumped 72%, while a quarter-trillion-dollar wave of AI bonds began testing investors' limits and SK Hynix plunged after its Nasdaq debut.", "briefingCards": [{"title": "Lead story - Blockade returns, Hormuz tolls proposed", "body": "Trump moved to restore the naval blockade of Iran and to charge fees for shipping through the Strait of Hormuz, after the UAE said Iranian missiles struck tankers in the strait, killing and injuring crew. WSJ assessed that Iran, aspiring to regional domination, is ready to escalate over Hormuz - even as a separate piece argued Tehran is 'too weak to make peace'. Britain banned support for the IRGC over antisemitic attacks in the UK. Economists now project the war will leave the economy with more stubborn inflation, and BT concluded the ceasefire's collapse proves businesses simply cannot wait the conflict out."}, {"title": "Markets & finance", "body": "DBS crossed S$200 billion in market capitalisation as earnings optimism powered the Singapore bank rally, and SGX securities trading value jumped 72% in June to cap a 'stellar' FY2026. But the AI trade showed strain: a quarter-trillion-dollar onslaught of AI bonds is testing investors' limits, and SK Hynix plunged after its Nasdaq debut as earnings optimism faded - a sharp reversal from its heavily oversubscribed listing. Fed chair Kevin Warsh now faces his first big call: whether to undo last year's rate cuts as war-driven inflation proves sticky."}, {"title": "Asia realignment", "body": "Xi Jinping will attend the World AI Conference for the first time as China elevates its tech push, while Beijing works on an AI safety benchmark targeting large-model risks. China is also moving to break SpaceX's launch monopoly with an IPO push and a historic sea-based rocket recovery. Analysts said a US tariff probe is unlikely to derail a planned autumn Xi-Trump meeting. Elsewhere, Manila and Hanoi's maritime deal may challenge Beijing in the South China Sea, and Britain's Andy Burnham looks set to become prime minister."}, {"title": "Energy & climate", "body": "Iran is not the only conflict vexing the global oil market, BT noted, as Trump's blockade and proposed Hormuz transit fees threaten to re-price freight and insurance across the Gulf. Russian missiles struck Kyiv, triggering fires across the capital, and Ukraine's allies met in Paris to boost air defences and press Moscow to end the war. On critical minerals, the Pentagon invested US$25 million in rare-earths start-up ReElement Technologies, while SCMP reported that 'reverse tech transfer' from China remains a non-starter in the US auto industry."}, {"title": "Technology & AI", "body": "The AI backlash sharpened: Palantir's Alex Karp voiced what WSJ called every angry CEO's private view, hard-line activists are ramping up for a 'war with AI', and 'wage envy' between AI workers and their peers is described as a corporate time bomb. Apple mounted a 'thermonuclear' response to the OpenAI threat after suing it over trade secrets, while OpenAI, Meta and SpaceXAI race to build more cost-efficient models. A Chinese start-up unveiled an aggressive AI-chip road map aimed squarely at challenging Nvidia."}, {"title": "Singapore & SEA focus", "body": "Singapore's bank rally reached a milestone as DBS crossed S$200 billion in market capitalisation on earnings optimism, and SGX securities trading value leapt 72% in June to cap a 'stellar' FY2026. BT charted Asean's 'new financial geography', with connectivity taking centre stage as regional capital markets integrate. Singapore's tourism prospects look bright, though hotel players will need to fight hard to thrive amid rising competition and costs - and BT argued AI alone is not enough to arrest China's economic decline."}], "keyMetrics": [{"value": "63", "label": "Articles curated today", "sub": "WSJ 11 · ST 18 · BT 10 · SCMP 24"}, {"value": "Blockade", "label": "Iran + Hormuz tolls", "sub": "Tankers hit; crew killed"}, {"value": "S$200b", "label": "DBS market cap", "sub": "Crosses milestone on bank rally"}, {"value": "+72%", "label": "SGX June trading", "sub": "Caps a 'stellar' FY2026"}, {"value": "US$250b", "label": "AI bond onslaught", "sub": "Testing investors' limits"}, {"value": "Plunge", "label": "SK Hynix post-debut", "sub": "Earnings optimism fades"}], "articles": [{"id": "wsj-01", "title": "Alex Karp Is Saying What Every Angry CEO Is Thinking About AI", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "Palantir CEO Alex Karp, self-described \"madman,\" escalated the feud between enterprises and AI labs. Palantir released a white paper, \"Institutional Sovereignty in the Age of AI,\" listing 15 steps companies and governments can take to guard against OpenAI and Anthropic. In a near-20-minute CNBC appearance, Karp said \"something has gone completely wrong,\" accusing labs of hyping capabilities and overcharging for tokens that \"create no value.\" Ex-White House AI czar David Sacks amplified him, citing Anthropic's expansion into Claude Science, Security, Legal and Code. Microsoft's Satya Nadella voiced similar concerns at Stanford. Meta launched a paid tier, with Mark Zuckerberg calling rival pricing \"very extreme.\" OpenAI and Anthropic IPOs loom; neither responded to Karp's criticism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Alex%20Karp%20Is%20Saying%20What%20Every%20Angry%20CEO%20Is%20Thinking%20About%20AI.pdf"}, {"id": "wsj-02", "title": "Apple's 'Thermonuclear' Response to the OpenAI Threat", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI"], "summary": "In one of his final acts before John Ternus takes over as CEO, Tim Cook sued OpenAI on Friday, alleging it \"has been stealing Apple's trade secrets\" at every level. Apple accuses OpenAI hardware chief Tang Tan, a 24-year Apple veteran and former product-design VP, of soliciting secrets from Apple staff during job interviews and urging them to bring \"actual parts\" for show-and-tell; a junior employee, Chang Liu, allegedly used an Apple login to access servers. OpenAI said it has \"no interest in other companies' trade secrets.\" Sam Altman posted he is \"not afraid of Apple.\" OpenAI bought Jony Ive's io Products in 2025 to build post-smartphone devices. Apple's revamped Siri, due this fall, relies on Google.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Apple%E2%80%99s%20%E2%80%98Thermonuclear%E2%80%99%20Response%20to%20the%20OpenAI%20Threat.pdf"}, {"id": "wsj-03", "title": "Aspiring to Regional Domination, Iran Is Ready to Escalate Over Hormuz", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Tehran has prioritised a chokehold on the Strait of Hormuz over tens of billions in sanctions relief. Parliament security chief Ebrahim Azizi and speaker Mohammad Bagher Ghalibaf insist the strait opens only via \"Iranian arrangements.\" Washington withdrew a Treasury waiver permitting Iranian oil sales after Iran attacked ships transiting Omani waters; Iran then fired on a vessel, declared the waterway closed, and the U.S. struck back. The February-April war lasted 40 days and killed Supreme Leader Ali Khamenei; successor Mojtaba Khamenei has not appeared publicly. Analysts including Carnegie's Karim Sadjadpour and the Washington Institute's Holly Dagres see brinkmanship and a \"gangster regime\"; Gulf states, hit by Iranian missiles last spring, are re-engaging Tehran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Aspiring%20to%20Regional%20Domination,%20Iran%20Is%20Ready%20to%20Escalate%20Over%20Hormuz.pdf"}, {"id": "wsj-04", "title": "Can AI Make Better Drugs? Not on Wall Street's Timeline", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "AI is boosting lab productivity but has yet to change drug-development economics, leaving investors unwilling to rerate pharma. At Roche's Genentech, computational biologist Aviv Regev runs a \"lab in the loop\" where models predict targets and experiments retrain them; she says AI \"is not smarter\" but encodes information broadly. Only about one in 10 candidates entering human trials reaches market. Eroom's Law, coined in Jack Scannell's 2012 paper, captures rising costs; Scannell likens training AI on current data to teaching a Waymo via a frog on a bike. Anthropic's Eric Kauderer-Abrams, after launching Claude Science, says the industry is in the \"second inning.\" Goldman Sachs estimates AI could add $400 billion of value over a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Can%20AI%20Make%20Better%20Drugs%20Not%20on%20Wall%20Street%E2%80%99s%20Timeline.pdf"}, {"id": "wsj-05", "title": "How to Invest When the Global Crises Never Stop", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "James Mackintosh argues traditional hedges are failing as superpower conflict, U.S. retrenchment and extreme weather multiply shocks. In the on-off U.S.-Israeli war on Iran, which flared again Wednesday, stocks, bonds and even gold fall together. Raphael Arndt, CEO of Australia's Future Fund, rebuilt strategy from first principles and concluded the fund needs \"more equities, not less\" for higher returns, plus gold and hedge funds, since \"bonds won't necessarily diversify\" when shocks are inflationary. Insight CEO Raman Srivastava calls 1970s-80s-style inflation the biggest risk, favouring inflation-linked infrastructure bonds. RBC BlueBay's Mike Bell notes markets \"don't really price geopolitical things until they actually happen\": oil jumped 30% within a week of Russia's 2022 invasion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/How%20to%20Invest%20When%20the%20Global%20Crises%20Never%20Stop.pdf"}, {"id": "wsj-06", "title": "Iran Is Too Weak to Make Peace", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "John Bolton, national security adviser in 2018-19, argues the U.S.-Iran memorandum of understanding and cease-fire were dead on arrival because U.S.-Israeli strikes shattered Iran's government. Civilian leadership is \"in tatters,\" IRGC command and control uncertain, and clerics are in discord after Supreme Leader Ali Khamenei's killing. Negotiators such as President Masoud Pezeshkian, Speaker Mohammad Ghalibaf and Foreign Minister Abbas Aragchi \"can't deliver.\" On July 8, after calling Iran's team \"scum,\" Trump saw no value in talks. Bolton urges reimposing the blockade, choking off oil revenues and reopening Hormuz by force, noting NATO chief Mark Rutte backs U.S. strikes. He warns Gulf uncertainty could keep oil elevated through November's elections.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Iran%20Is%20Too%20Weak%20to%20Make%20Peace.pdf"}, {"id": "wsj-07", "title": "The AI Superfans Companies Count On to Convert the Skeptics", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Companies are deploying internal \"AI champions\" to drive workforce adoption as sceptical staff become the biggest roadblock. Boston Consulting Group's June report, surveying 11,749 employees across 14 markets, found 74% of front-line white-collar workers now use AI daily or several times weekly, up from 51% in 2025. At Ropes & Gray, champion Howard Glazer, now \"Head of Practice AI\" advising some 60 champions, helped lift Harvey usage from 32 users sending a few hundred prompts monthly to nearly 2,200 employees generating over 282,000 prompts. Citigroup scaled its program past 4,000 participants; Citi Stylus Workspaces adoption rose from single digits in late 2024 to over 80%. Mars Snacking's Ramesh Kollepara says the best champions are \"definitely not the most technical people.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20AI%20Superfans%20Companies%20Count%20On%20to%20Convert%20the%20Skeptics.pdf"}, {"id": "wsj-08", "title": "The Hard-Line Activists Ramping Up for the War With AI", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Society", "Technology & AI"], "summary": "A hardening anti-AI resistance is centred in the Bay Area. Stop AI co-founder Sam Kirchner, 27, vanished in November after telling colleague Matthew Hall \"the ship may have sailed on nonviolence\"; comrades warned San Francisco police he might target OpenAI, which locked down its campus. A Quinnipiac poll found 70% of U.S. adults believe AI will cost jobs and 55% say it does more harm than good. Geoffrey Hinton puts extinction odds at 10-20%. In April, an assailant fired 13 shots at an Indianapolis councilman's home leaving a \"no data centers\" note, and a 20-year-old Texas student was charged with attempted murder and arson over an attack on Sam Altman's home. Holly Elmore, who founded Pause AI US, divorced over the cause and expelled Kirchner.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20Hard-Line%20Activists%20Ramping%20Up%20for%20the%20War%20With%20AI.pdf"}, {"id": "wsj-09", "title": "The Quarter-Trillion-Dollar Onslaught of AI Bonds Is Testing Investors' Limits", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The investment-grade bond market is straining to absorb AI-infrastructure borrowing. Recent weeks brought a combined $75 billion from Nvidia, SpaceX and Amazon; Nvidia's and SpaceX's new bonds slumped in secondary trading, while Amazon paid unusually steep rates. Six hyperscalers, Alphabet, Amazon, Meta, Oracle, Nvidia and SpaceX, have issued about $244 billion globally this year, per Dealogic, versus $108 billion in all of 2025 and $17 billion in 2024. Voya's Travis King says investors want \"to leave some room for the next deal.\" Alphabet's 10-year spread widened 0.12 point last week and Meta's 0.16, against 0.02 for the average IG bond. SpaceX's 10-year spread has leapt nearly half a point since June 23. Janus Henderson's John Lloyd cites AI spending estimates north of $10 trillion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20Quarter-Trillion-Dollar%20Onslaught%20of%20AI%20Bonds%20Is%20Testing%20Investors%E2%80%99%20Limits.pdf"}, {"id": "wsj-10", "title": "War Leaves Economy With More Stubborn Inflation, Economists Project", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Energy", "Geopolitics"], "summary": "The WSJ survey of 72 economists, conducted July 2-7, finds the Iran war hurt the U.S. less than feared but entrenched inflation. GDP growth is seen at 2.1% for 2026, up from 2% in April, with recession odds falling to 25% from 33%. CPI is projected to rise 3.4% through December, up from 3.2%, and core PCE 3.2% versus 2.9% previously. Oil, $67.02 a barrel before the war, peaked at $112.95 in April, fell to $68.55 on July 6 and closed at $71.41 Friday after Trump declared the ceasefire over; forecasters see about $70 by December. Unemployment is seen at 4.3%. Economists expect Kevin Warsh's Fed to hold at 3.5%-3.75%; 90% call the Fed \"mostly\" or \"completely\" independent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/War%20Leaves%20Economy%20With%20More%20Stubborn%20Inflation,%20Economists%20Project.pdf"}, {"id": "wsj-11", "title": "Warsh's First Big Call: Whether to Undo Last Year's Cuts", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "New Fed chairman Kevin Warsh presided over a unanimous hold last month, but consensus may fracture at the July 28-29 meeting as hawks push to reverse two of 2025's three cuts. Inflation has run 3% to 4% against a 2% target, leaving the 3.5%-3.75% rate target near zero in real terms. Drivers are idiosyncratic: tariffs, war-related energy and fertilizer disruptions, and the AI build-out. Minneapolis Fed's Neel Kashkari notes the labor market \"is not causing the inflation\"; Friday's monetary policy report judged wage growth consistent with 2%. Christopher Waller says risks have \"completely flipped.\" New York Fed's John Williams counsels patience, seeking monthly core readings of 0.2% or lower. BNP Paribas's James Egelhof expects three hikes starting by December.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Warsh%E2%80%99s%20First%20Big%20Call%20Whether%20to%20Undo%20Last%20Year%E2%80%99s%20Cuts.pdf"}, {"id": "bt-01", "title": "'Wage envy' between AI workers and their peers is a corporate time bomb", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Samsung Electronics reported on Jul 7 that preliminary quarterly profit surged 1,900 per cent year on year on AI-driven memory demand, a third straight record operating quarter. But the windfall deepens an internal \"wage envy\" rift: a May union deal handed some memory chip workers about US$400,000 in bonuses, while mobile and consumer electronics staff got roughly US$4,000. Dissenting workers wore black ribbons, a South Korean mourning symbol. The gap mirrors a global split between AI-adjacent staff and everyone else; in Singapore, AI salaries are rising up to five times faster than overall wages, and 2025 public-sector AI roles carried a 107 per cent premium. The piece argues for a \"stability premium\" for non-AI divisions, since cyclical chip booms eventually fade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/'Wage%20envy'%20between%20AI%20workers%20and%20their%20peers%20is%20a%20corporate%20time%20bomb.pdf"}, {"id": "bt-02", "title": "DBS crosses S$200 billion in market capitalisation as earnings optimism drives Singapore bank rally", "source": "BT", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "DBS pushed above S$200 billion in market capitalisation on Monday (Jul 13), becoming the first Singapore-listed company to cross that threshold, as all three local banks surged to record levels and lifted the Straits Times Index to a fresh high of 5,470.34. DBS closed up 0.5 per cent at S$70.79, OCBC rose 0.2 per cent to S$27.48, while UOB fell 0.9 per cent to S$43.98. Analysts cite a clearer earnings outlook, supportive Singdollar rates, strong credit growth and wealth management fees, plus safe-haven inflows amid Middle East conflict. Macquarie's Jayden Vantarakis upgraded DBS and UOB to \"outperform\" and lifted targets; Citi also raised targets. Morningstar's Kathy Chan warns rate upside may be capped. Q2 results begin with DBS on Aug 6.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/1.%20DBS%20crosses%20S200%20billion%20in%20market%20capitalisation%20as%20earnings%20optimism%20drives%20Singapore%20bank%20rally.pdf"}, {"id": "bt-03", "title": "AI is not enough to arrest China's decline", "source": "BT", "date": "14 Jul 2026", "tags": ["Geopolitics", "Technology & AI", "Finance & Markets"], "summary": "Ruchir Sharma argues China's AI prowess masks deep economic rot. Growth peaked in 2021; China's share of global GDP has slipped from 18 to 16.5 per cent in nominal terms while the US rose to 26 per cent. Independent estimates put real growth closer to zero than the official 4.5 to 5 per cent target. The working-age population is set to shrink by 75 million per decade, 2025 saw record-low births and record-high deaths. Chinese hyperscalers invest just US$100 billion in AI this year versus US$750 billion by US rivals, with an expected productivity boost of only a third of a percentage point by 2030. Total debt nears 350 per cent of GDP, property prices sit at 20-year lows, net FDI is negative and US$425 billion fled Chinese markets in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/AI%20is%20not%20enough%20to%20arrest%20China's%20decline.pdf"}, {"id": "bt-04", "title": "Asean's new financial geography: Connectivity takes centre stage", "source": "BT", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets", "Trade"], "summary": "Standard Chartered's corporate and investment bank CEO argues Asean's financial landscape is being reshaped by trade tensions, tariff uncertainty, geopolitical fragmentation and digitalisation, yet companies are adapting rather than retreating. Cross-border trade and investment remain robust; what is changing is the route. New corridors are emerging between China and South Asia, India and the Middle East, Europe and India, and within Asean, with South-South routes gaining on traditional East-West flows. Singapore is positioned as a coordination point for regional trade, liquidity and risk management, and a gateway linking Asean with China, India and the Middle East. Tokenisation is moving from experimentation to adoption, aided by MAS initiatives Project Guardian and the newly launched Bloom. Adoption will be incremental, with tokenised assets coexisting alongside existing infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Asean's%20new%20financial%20geography%20Connectivity%20takes%20centre%20stage.pdf"}, {"id": "bt-05", "title": "Bright prospects for Singapore tourism, but hotel players will need to fight hard to thrive", "source": "BT", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Finance & Markets", "Society"], "summary": "Singapore drew 16.9 million international visitors in 2025 with record tourism receipts of S$32.8 billion, and remains on track for its S$47 billion to S$50 billion goal by 2040. Investments include Changi Terminal 5 in the mid-2030s, the Marina Bay Cruise Centre expansion, expansions at Marina Bay Sands and Resorts World Sentosa, a Downtown Mice Hub at Straits View, Therme Singapore wellness attraction opening 2030, and plans for Sentosa and Pulau Brani. Mice receipts grew over 35 per cent to S$2.3 billion. But hotels face intense competition: inventory exceeds 74,000 rooms, occupancy ran 75 to 88 per cent, and Revpar was about S$211 in April. The Johor Bahru RTS Link adds a cheap alternative base. CapitaLand Ascott Trust sold The Robertson House for S$360 million at a 2.3 per cent exit yield.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Bright%20prospects%20for%20Singapore%20tourism,%20but%20hotel%20players%20will%20need%20to%20fight%20hard%20to%20thrive.pdf"}, {"id": "bt-06", "title": "Iran isn't the only conflict vexing the global oil market", "source": "BT", "date": "14 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Crude has fallen below US$75 a barrel, roughly pre-war levels, but refined product prices behave as if crude were above US$100. The cause is Ukraine's campaign against Russian refineries: 19 plants attacked over two months, some hit four times, with combined capacity near 4.9 million barrels a day, about 70 per cent of Russia's total. Kyiv has cut Russian diesel production capacity by roughly a third; Moscow has banned fuel exports and is dumping unrefined crude, depressing crude prices. The 3-2-1 crack spread has surged to about US$60 a barrel, a record, versus a US$10.50 average from 1985 to 2021. Roughly 10 per cent of world refining capacity, about eight million barrels a day, is offline. Trump blamed price gouging; the writer says the cause is geopolitical, not corporate.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/Iran%20isn't%20the%20only%20conflict%20vexing%20the%20global%20oil%20market.pdf"}, {"id": "bt-07", "title": "OpenAI, Meta, SpaceXAI compete for more cost-efficient AI models", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Three major AI developers released models in the past week, all pitching cost efficiency over raw capability. OpenAI's GPT-5.6 is designed to complete more work using significantly fewer tokens. SpaceXAI's Grok 4.5 claims twice the token efficiency of comparable rivals, and Meta says pricing for Muse Spark 1.1 will be \"attractive\". The shift comes as enterprises scrutinise AI spending after sticker shock, partly from developers like Anthropic moving to usage-based pricing; one CEO reportedly showed a monthly invoice running into millions. Mark Zuckerberg said rival labs price at \"very high margins\", while Sam Altman said enterprises now weigh spend against value. Cheaper Chinese open models from DeepSeek and routing services like OpenRouter, which raised over US$100 million in May, add pressure on Anthropic.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/OpenAI,%20Meta,%20SpaceXAI%20compete%20for%20more%20cost-efficient%20AI%20models.pdf"}, {"id": "bt-08", "title": "SGX securities trading value jumps 72% in June, caps 'stellar' FY2026", "source": "BT", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore Exchange said on Monday (Jul 13) that June securities market trading value jumped 72 per cent year on year to S$44.6 billion, capping what it called a \"stellar performance\" for FY2026. Securities daily average value rose 72 per cent to S$2.1 billion in June, while full-year SDAV gained 35 per cent to S$1.8 billion, the highest in 18 years. Total FY2026 turnover climbed 35 per cent to S$455.7 billion. The STI hit an all-time high of 5,218.96 on Jun 25, up 30.4 per cent year on year. Retail net inflows reached S$2.4 billion; small- and mid-cap SDAV surged 155 per cent to S$310 million. Derivatives volume rose 31 per cent to 34.3 million contracts in June, and ETF assets under management topped S$20.5 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/SGX%20securities%20trading%20value%20jumps%2072%20in%20June,%20caps%20'stellar'%20FY2026.pdf"}, {"id": "bt-09", "title": "SK Hynix plunges after Nasdaq debut amid diminishing earnings optimism", "source": "BT", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SK Hynix's Seoul shares fell more than 15 per cent on Monday (Jul 13), their biggest one-day drop in nearly two decades, as investors unwound a rally following last week's Nasdaq listing. Its US-listed shares slid 8.3 per cent to US$154.1 premarket after a 12.8 per cent debut gain. Together with Samsung's decline, the selloff drove a 9 per cent plunge in the Kospi and a 20-minute trading halt. SK Hynix raised over US$26 billion selling ADRs at US$149. Analysts flagged oversupply risk from new 2027-2028 capacity, weaker-than-hoped HBM4 shipments and uncertain AI monetisation. CEO Kwak Noh-jung countered that the memory industry faces its most severe shortage in 2027. SK Hynix held a 58 per cent HBM revenue share in Q1 versus 21 per cent each for Samsung and Micron.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/SK%20Hynix%20plunges%20after%20Nasdaq%20debut%20amid%20diminishing%20earnings%20optimism.pdf"}, {"id": "bt-10", "title": "US-Iran ceasefire collapse proves businesses cannot wait out the war", "source": "BT", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "Trump declared the US-Iran ceasefire \"over\" on Jul 10 after Iranian attacks on commercial tankers in the Strait of Hormuz, following a June memorandum of understanding. US airstrikes and Iranian missile fire towards Bahrain, Kuwait and Qatar followed. Roughly a fifth of the world's oil and LNG transits Hormuz, plus about 30 per cent of internationally traded fertiliser. When war broke out in February, the strait effectively closed for weeks and Brent spiked above US$120; prices had drifted to around US$70 before jumping over 5 per cent on Jul 8. War-risk insurance premiums remain elevated and sea-mine risk lingers. Winners include US and Russian oil exporters, Saudi Arabia's Red Sea pipeline route, and EV and solar makers. The writer urges firms to treat Middle East risk as persistent and diversify suppliers and routes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20BT/US-Iran%20ceasefire%20collapse%20proves%20businesses%20cannot%20wait%20out%20the%20war.pdf"}, {"id": "scmp-01", "title": "China seen using new tool to finance hi-tech advances amid slower economic growth", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Goldman Sachs says China could accelerate deployment of an 800 billion yuan (US$117.94 billion) New Policy-Based Financial Instrument to fund hi-tech development and cushion a forecast slowdown in quarterly growth. The quasi-fiscal tool channels strategic investment through policy banks outside commercial lending, meeting a \"dual objective\" of backing hi-tech while limiting local government debt risk. Economist Wang Lisheng wrote that the US-China technology race \"calls for larger and more durable funding support\" and noted hi-tech manufacturing funding, including AI supply chains, remains largely government-led. First-quarter growth was 5 per cent; second-quarter data is due Wednesday. Announced by the NDRC in September at 500 billion yuan, the instrument has funded AI, low-altitude economy, green energy and agriculture. Goldman estimates a 0.5-percentage-point GDP effect through early 2027, outperforming local government financing vehicles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%20seen%20using%20new%20tool%20to%20finance%20hi-tech%20advances%20amid%20slower%20economic%20growth.pdf"}, {"id": "scmp-02", "title": "China works on AI safety benchmark as regulators target large model risks", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "China's Ministry of Industry and Information Technology has begun building a safety benchmark to evaluate AI models, as US and European regulators tighten oversight. The MIIT-led National Industrial Information Security Development Research Centre is recruiting firms and experts to co-build it, with applications due Tuesday. The benchmark will assess generative AI across six dimensions - content safety, value alignment, robustness, fairness, privacy protection and trustworthiness - using a hybrid methodology covering 31 risks. It combines automated fuzzing and stress testing with human oversight to curb hallucinations, data leaks and \"jailbreak\" attacks. It follows a June White House executive order on classified cyber-capability benchmarking and Anthropic's April release of Mythos, withheld from general use. The EU AI Act mandates training-data transparency, with fines up to 7 per cent of turnover.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%20works%20on%20AI%20safety%20benchmark%20as%20regulators%20target%20large%20model%20risks.pdf"}, {"id": "scmp-03", "title": "China's historic sea-based rocket recovery puts spotlight on domestic shipbuilder", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "After China became the second nation after the US to achieve controlled recovery of an orbital-class rocket booster, attention has turned to Guangzhou Shipyard International (GSI), the China State Shipbuilding Corporation subsidiary that designed the Linghangzhe recovery platform with the Chinese Academy of Sciences. Following Friday's maiden launch of the reusable Long March-10B, the first-stage booster returned vertically and was caught by a net-capture system - four hooks latching onto a suspended net, unlike SpaceX and Blue Origin's leg-based landings. Converted from an unpowered barge, the 144-metre, 25,000-tonne platform carries a 36-metre capture net and DP-2 dynamic positioning. Maritime outlet eWorldship said the feat established \"the world's first sea-based net recovery system.\" GSI completed design by end-2024 and delivered the platform in December; all key equipment was Chinese-sourced.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/China%E2%80%99s%20historic%20sea-based%20rocket%20recovery%20puts%20spotlight%20on%20domestic%20shipbuilder.pdf"}, {"id": "scmp-04", "title": "Chinese medical device makers push into Europe as anti-corruption squeeze bites at home", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Finance & Markets"], "summary": "Chinese innovative medical device firms are accelerating into Europe as anti-corruption probes and profit squeezes hit the domestic market. Government-backed hospital purchases in China fell about 12 per cent year on year in the first five months of 2026, partly due to a new hospital corruption probe, HSBC's Linda Shu said. Public hospitals handle about 84 per cent of patient visits. Ningbo-based Jenscare Scientific won CE certification for its LuX-Valve Plus tricuspid valve device, calling it a \"milestone\"; it is not yet approved in China. Germany passed a healthcare savings bill targeting 18.8 billion euros in cuts. HSBC cut estimates for Mindray, Snibe and United Imaging, forecasting revenue growth of 2.5, 5.9 and 17 per cent respectively. The EU bars Chinese bidders from procurement contracts above 5 million euros.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Chinese%20medical%20device%20makers%20push%20into%20Europe%20as%20anti-corruption%20squeeze%20bites%20at%20home.pdf"}, {"id": "scmp-05", "title": "Dollar risks rising but Plaza Accord-style coordination not feasible now: ex-IMF adviser", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Economic historian Barry Eichengreen, a former senior IMF policy adviser, said Plaza Accord-style exchange-rate coordination is out of reach because central banks now prioritise domestic mandates such as price stability and employment. Speaking at an online lecture on Friday co-hosted by Tsinghua University, he warned that if erratic US policies and weakening institutional guard rails persist for another decade under Donald Trump and successors, the probability of an abrupt crisis of confidence in the dollar would exceed 50 per cent. He cited mounting US fiscal debt, threats to Federal Reserve independence, deregulation, tariffs and fraying alliances. Eichengreen favours a multipolar monetary system but said neither the euro nor yuan is ready to replace the dollar. He dismissed Beijing dumping US Treasuries, saying it \"could upend the global financial system.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Dollar%20risks%20rising%20but%20Plaza%20Accord-style%20coordination%20not%20feasible%20now%20ex-IMF%20adviser.pdf"}, {"id": "scmp-06", "title": "EU countries push for trade ban with Israeli settlements", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "Most European Union countries on Monday called for the bloc to propose banning imports from Israeli settlements, EU foreign policy chief Kaja Kallas said after a foreign ministers' meeting. \"The option that got the most support was banning the trade,\" she said, adding ambassadors were tasked to advance the work and an extraordinary meeting could be reconvened. Ireland, the Netherlands and Spain have already imposed national restrictions. The European Commission last week laid out options to curb settlement trade, but some diplomats accuse it of dragging its feet. Kallas called the West Bank situation \"intolerable\" and stressed the measures target settlements, not Israel. Brussels is divided over whether a ban needs unanimity or a weighted majority. More than 500,000 settlers live among some three million Palestinians.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/EU%20countries%20push%20for%20trade%20ban%20with%20Israeli%20settlements.pdf"}, {"id": "scmp-07", "title": "EU eyes social media curbs for children", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Society", "Technology & AI", "Politics"], "summary": "The European Union will move to limit young children's access to social media across the 27-member bloc, European Commission President Ursula von der Leyen said on Monday, in the biggest such effort to date. She presented an expert paper recommending a tiered approach under which under-13s could use social media only for limited periods supervised by parents, carers and teachers, with curbs lifted gradually as teenagers age. \"It is clear we need age-appropriate restrictions to platforms,\" she told reporters in Brussels. Von der Leyen signalled she would follow the recommendations, with a concrete proposal after the summer and an announcement expected at her September State of the Union address. Australia, Britain, China, India and the US have imposed or are weighing bans, mainly targeting TikTok, YouTube, Instagram and Facebook.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/EU%20eyes%20social%20media%20curbs%20for%20children.pdf"}, {"id": "scmp-08", "title": "How China plans to break SpaceX's launch monopoly with IPO push in new space race", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Geopolitics"], "summary": "Beijing is pursuing a coordinated multi-company \"wolf-pack\" strategy to challenge SpaceX's launch dominance, with at least 15 commercial aerospace firms in the IPO pipeline in Shanghai and Hong Kong. CAS Space and Beijing Minospace have reached the inquiry stage on Shanghai's Star Market, while LandSpace Technology - seen as a SpaceX challenger - had its review status restored to \"Inquired\" in late June and seeks 7.5 billion yuan (US$1.1 billion). LandSpace's Zhuque-3 reusable test rocket completed a static fire test. On July 10, China recovered the CASC-developed Long March-10B first stage at sea using the world's first net-based recovery. The push follows SpaceX's record Nasdaq debut in June. Bank of China International notes Chinese launch costs of at least US$5,000 per kilogram versus US$1,500 in America.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/How%20China%20plans%20to%20break%20SpaceX%E2%80%99s%20launch%20monopoly%20with%20IPO%20push%20in%20new%20space%20race.pdf"}, {"id": "scmp-09", "title": "How China's aerospace vision differs from Elon Musk's SpaceX", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's seaborne recovery of a Long March-10B booster using a net-capture vessel proved the viability of its state-led aerospace model, experts said, contrasting it with SpaceX's market-driven approach. Lung Siu Fung of CCB International said China's space sector is \"in a nutshell, a national team,\" with commercial firms supplementary, and bridging the US gap requires national guidance and mobilisation. The China Academy of Launch Vehicle Technology designed both rocket and platform, shifting engineering complexity from rocket to ship and eliminating landing legs. Bryan Luk of the Institute for Greater China Studies called space \"a strategic domain\" tied to sovereignty and industrial policy. The Qianfan constellation, a Starlink rival, passed 200 satellites. CNSA unveiled a 271-member Commercial Space Innovation Consortium on July 1.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/How%20China%E2%80%99s%20aerospace%20vision%20differs%20from%20Elon%20Musk%E2%80%99s%20SpaceX.pdf"}, {"id": "scmp-10", "title": "Is Japan a 'spy paradise' fuelling Russia's war machine?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Concern that foreign spies operate with impunity in Japan deepened after a New York Times report said dozens of Russian agents expelled from Western Europe have entered Tokyo to buy components for Moscow's war on Ukraine, including microchips, transmitters and advanced machinery. The report, citing five Western intelligence agencies, named Maksim Vladimirovich Filchenkov - ostensibly an Aeroflot employee but described as Moscow's most senior GRU 20th Directorate official in Japan - as leading the operation from February 2024, shipping goods via falsified records or third countries, frequently Vietnam. Ukrainian sanctions official Vladyslav Vlasiuk said Japanese components were recovered from around 90 per cent of Russian missiles fired at Ukraine. Japan lacks a specific anti-espionage law; Prime Minister Sanae Takaichi's government passed a bill in May creating a national intelligence bureau.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Is%20Japan%20a%20%E2%80%98spy%20paradise%E2%80%99%20fuelling%20Russia%E2%80%99s%20war%20machine.pdf"}, {"id": "scmp-11", "title": "Japan's 'destructive potential' in South China Sea may eclipse the US: analyst", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Geopolitics", "Southeast Asia"], "summary": "Wu Shicun, founding president of China's National Institute for South China Sea Studies, warned at a Hong Kong round table on Monday that Japan's growing military presence in the disputed waters carries a \"destructive potential\" that could surpass that of the United States. He cited Japan's full participation in this year's US-Philippine Balikatan drills, which deployed more than 1,400 Japanese personnel, three major warships and transport aircraft, and saw Tokyo fire a Type 88 anti-ship missile outside its territory for the first time. Wu said it was Japan's first display of \"military muscle\" since World War II. Foreign ministry official Qi Dahai accused Washington of stirring tensions. The remarks followed the 10th anniversary of the Hague ruling; Beijing summoned a Japanese embassy official to protest Tokyo's statement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Japan%E2%80%99s%20%E2%80%98destructive%20potential%E2%80%99%20in%20South%20China%20Sea%20may%20eclipse%20the%20US%20analyst.pdf"}, {"id": "scmp-12", "title": "Nvidia's future challenger? Chinese start-up reveals aggressive AI chip road map", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shanghai-based Dongfang Suanxin, backed by state funds and domestic tech giants, unveiled a plan to challenge Nvidia using alternative chip architectures that sidestep US export controls. Its strategy centres on software-defined computing and 3D-stacked near-memory architecture, reducing reliance on restricted advanced lithography and memory. Founder Wei Shaojun said: \"We have to forge a path of our own.\" Its flagship DF1000, a 14-nanometre processor, delivers 520 teraflops in BF16 with 6.4 terabytes per second memory bandwidth, and is ready for mass production with shipments by year-end. Valued at 12.3 billion yuan (US$1.81 billion), the firm plans a DF2000 in Q4 2026 to surpass Nvidia's H200 and a DF3000 in late 2027 to rival the B300. Wei conceded 3D stacking degrades yields and fabrication access remains the key constraint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Nvidia%E2%80%99s%20future%20challenger%20Chinese%20start-up%20reveals%20aggressive%20AI%20chip%20road%20map.pdf"}, {"id": "scmp-13", "title": "Pentagon invests US$25 million into rare earths start-up ReElement Technologies", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Trade"], "summary": "The US Department of Defence said on Monday it would invest US$25 million in rare earths start-up ReElement Technologies, part of a broader Trump administration push to boost domestic critical minerals supply and challenge China's dominance of the sector. ReElement plans to use novel processing technology to refine rare earths and other critical minerals at a commercial facility in Marion, Indiana. The rare earths are expected to feed magnets used in fighter jets, missiles and submarines. The Pentagon said funds will buy and install equipment at the Marion site, which will recycle magnets and produce rare earths plus germanium and gallium. It was unclear whether the money is a grant or loan. Reuters reported last week that ReElement had abandoned a US$80 million Pentagon loan after struggling with due diligence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Pentagon%20invests%20US%2425%20million%20into%20rare%20earths%20start-up%20ReElement%20Technologies.pdf"}, {"id": "scmp-14", "title": "Russian missiles strike Kyiv, triggering fires across the Ukrainian capital", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russian ballistic missiles struck Kyiv early on Tuesday, triggering fires across the Ukrainian capital, with the air alert lifted after about 50 minutes and no casualties reported. \"The enemy is attacking Kyiv with ballistic missiles,\" Mayor Vitali Klitschko said on Telegram, adding that air defences were operating. Tymur Tkachenko, head of the capital's military administration, said two storage areas were hit and set on fire in the Holosiivskyi district just outside the city centre. Klitschko said drone debris hit open ground in an eastern suburb, setting cars ablaze. Air-raid sirens preceded around half a dozen explosions. A drone attack in a town outside Kharkiv injured six people. The strikes followed Monday's Coalition of the Willing meeting in Paris. Thirty people were killed in a Russian bombardment on July 1-2.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Russian%20missiles%20strike%20Kyiv,%20triggering%20fires%20across%20the%20Ukrainian%20capital.pdf"}, {"id": "scmp-15", "title": "Taiwan's new military outsourcing plan: a pragmatic fix or security risk?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Defence", "Politics"], "summary": "Taiwan's armed forces will outsource guard duties at nine military academy sites to private security firms in a pilot scheme, the defence ministry said on Monday, aiming to free personnel for core combat missions. Phase one starts September 1 at five sites; four more join from January 1. The island's forces are only about 79 per cent staffed, with eligible conscripts falling to 97,828 in 2023 and projected at 79,742 next year. Former National Security Bureau chief Lee Shying-jow noted 64 people were prosecuted for Beijing-linked espionage in 2024, triple 2021, calling the move \"tantamount to tearing down your own walls.\" Analyst Lu De-yun was more cautious, noting many retired soldiers work in private security. The ministry said guards face vetting and cannot access sensitive information.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Taiwan%E2%80%99s%20new%20military%20outsourcing%20plan%20a%20pragmatic%20fix%20or%20security%20risk.pdf"}, {"id": "scmp-16", "title": "Trump to restore Iran blockade, charge fees for Strait of Hormuz shipping", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Trade"], "summary": "President Donald Trump said on Monday the US would charge commercial vessels a 20 per cent fee for passage through the Strait of Hormuz as Washington reinstates its blockade of Iran. Iranian ships and those trading with Iran would be barred; others retain access. Trump argued Washington should be reimbursed for protecting Gulf allies. The International Maritime Organization said there is \"no legal basis\" for mandatory tolls in international straits. Harvard's James Kraska called it \"a fee for services rendered (protection), not a fee for transit.\" Brent crude jumped 9.6 per cent and WTI 9.4 per cent. CENTCOM said US forces struck Bandar Abbas naval base with sea drones. Enforcement begins 2000 GMT Tuesday. Iranian Foreign Minister Abbas Araghchi mocked the plan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Trump%20to%20restore%20Iran%20blockade,%20charge%20fees%20for%20Strait%20of%20Hormuz%20shipping.pdf"}, {"id": "scmp-17", "title": "UAE says Iranian missiles struck tankers in Hormuz, killing and injuring crew", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "One Indian crew member was killed and eight others wounded when two Emirati oil tankers were struck by Iranian cruise missiles in the Strait of Hormuz, the UAE Ministry of Defence said on Tuesday. The tankers Mombasa and Al Bahiyah were targeted in the southern lane while in Omani territorial waters. Four of the wounded were seriously injured; six were Indian nationals and two Ukrainian. Fires broke out on both vessels but were brought under control. The UAE condemned a \"blatant attack\" and said it retained full right to respond. Separately, UKMTO said a tanker was hit by an unknown projectile 40 nautical miles northeast of Oman's Qalhat, striking the starboard engine room. Iran has not commented. War broke out on February 28 when the US and Israel attacked Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UAE%20says%20Iranian%20missiles%20struck%20tankers%20in%20Hormuz,%20killing%20and%20injuring%20crew.pdf"}, {"id": "scmp-18", "title": "UK bans support for Iran's IRGC and a linked group over antisemitic attacks in Britain", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Politics", "Geopolitics", "Society"], "summary": "Britain on Monday banned support for Iran's Islamic Revolutionary Guard Corps and a linked group following a series of antisemitic attacks, using new powers designed to stop the use of state-sponsored proxies. The ban follows attacks on Jewish-linked sites in London, including the torching of four Jewish community ambulances. The powers \"make it easier to prosecute and lock up anyone,\" Prime Minister Keir Starmer said. The government said the IRGC had \"almost certainly\" directed The Islamic Movement of Companions of the Right, which claimed seven attacks on Jewish, Israeli and Persian-language media locations. Anyone involved in sabotage for designated groups could face life imprisonment if parliament approves. Britain also designated the volunteer wing of Russia's GRU. Iran has previously denied using proxies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UK%20bans%20support%20for%20Iran%E2%80%99s%20IRGC%20and%20a%20linked%20group%20over%20antisemitic%20attacks%20in%20Britain.pdf"}, {"id": "scmp-19", "title": "UK's Burnham set to be PM after securing more Labour MPs' support", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Politics"], "summary": "Andy Burnham moved decisively closer to becoming Britain's next prime minister on Monday, gaining additional Labour MPs' nominations for an unassailable lead in the party's leadership contest. The veteran politician, 56, Greater Manchester mayor for nearly a decade, is the only Labour MP to publicly declare a candidacy to replace outgoing Prime Minister Keir Starmer, who said last month he was quitting after months of pressure over scandals, missteps and policy U-turns. After receiving 322 of 403 Labour MPs' votes on Thursday, Burnham gained 27 more by Monday, reaching 349 - making it impossible for any rival to secure the 81 endorsements needed to challenge. Nominations close Thursday; he will be crowned leader at a special conference and replace Starmer next Monday as Britain's seventh prime minister in a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/UK%E2%80%99s%20Burnham%20set%20to%20be%20PM%20after%20securing%20more%20Labour%20MPs%E2%80%99%20support.pdf"}, {"id": "scmp-20", "title": "US tariff probe unlikely to derail fall Xi-Trump meeting: analysts", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Ongoing US Section 301 tariff investigations are unlikely to impair bilateral ties or the planned September Trump-Xi meeting, analysts said on Monday. The Trump administration launched a forced labour probe covering 60 countries and an excess capacity inquiry targeting 16, both including China alongside the EU, Japan, South Korea and India. \"China is just one of a group of countries,\" said Middlebury's Wei Liang, noting a \"tacit understanding\" that new tariffs will not exceed the suspended IEEPA rates struck down by the Supreme Court in February. China's effective tariff rate is just over 20 per cent; Washington proposes 20-25 per cent. Ambassador Xie Feng urged raising the Board of Trade's tariff-free limit from US$30 billion to US$300 billion. US-China goods trade totalled US$414 billion in 2025, down 28 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/US%20tariff%20probe%20unlikely%20to%20derail%20fall%20Xi-Trump%20meeting%20analysts.pdf"}, {"id": "scmp-21", "title": "Ukraine allies meet in Paris to boost air defence, pressure Russia to end war", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukraine's allies gathered in Paris on Monday to ramp up support for Kyiv, especially air defence, and increase pressure on Russia to end a war now in its fifth year. Representatives of the 37-member Coalition of the Willing, including President Volodymyr Zelensky, met at Les Invalides. The coalition is expected to announce the first joint exercises of the Multinational Force for Ukraine. Nine European countries and Ukraine formed a coalition to develop \"purely defensive\" anti-ballistic capabilities. French President Emmanuel Macron said Europe was \"in the process of becoming a power.\" The Kremlin dismissed the summit as \"a coalition of warmongers.\" Washington has permitted Ukraine to build US-designed Patriot systems and advanced legislation targeting buyers of Russian energy. France, Britain and Spain are ready to send troops.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Ukraine%20allies%20meet%20in%20Paris%20to%20boost%20air%20defence,%20pressure%20Russia%20to%20end%20war.pdf"}, {"id": "scmp-22", "title": "Why 'reverse tech transfer' from China remains a non-starter in the US auto industry", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Trade", "Technology & AI", "Politics"], "summary": "As Canada and EU members embrace \"reverse tech transfer\" - courting Chinese EV investment to strengthen their industries - the US is moving the opposite way, analysts said. Washington maintains tariffs above 120 per cent on Chinese vehicles and last month banned Geely-owned Polestar from selling new US vehicles under the Commerce Department's Connected Vehicle Rule. Senator Bernie Moreno and Representative John Moolenaar introduced the Connected Vehicle Security Act to bar China-linked connected vehicles, software and hardware. LSE's John Minnich said he remains \"sceptical that Washington will allow significant Chinese greenfield manufacturing investment.\" Analysts warned protectionism breeds stagnation; Tu Le of Sino Auto Insights argued shielding markets removes urgency to innovate. Moolenaar has targeted Ford's CATL licensing deal in Michigan; a Gotion battery plant was abandoned there after protests.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Why%20%E2%80%98reverse%20tech%20transfer%E2%80%99%20from%20China%20remains%20a%20non-starter%20in%20the%20US%20auto%20industry.pdf"}, {"id": "scmp-23", "title": "Will Manila and Hanoi's maritime deal challenge Beijing in the South China Sea?", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Southeast Asia", "Geopolitics", "Defence"], "summary": "The Philippines and Vietnam elevated their strategic partnership to an \"enhanced\" level during President To Lam's Manila visit late last month, agreeing a hotline and closer coastguard coordination to prevent accidental clashes. President Ferdinand Marcos Jnr said freedom of navigation \"remains non-negotiable.\" Analysts said the deal chips away at Beijing's preferred bilateral negotiating approach but its value is mostly symbolic. RSIS analyst Ian Seow said deeper cooperation makes it harder for China to engage claimants in isolation, though Hanoi contains disputes through diplomacy while Manila pursues \"assertive transparency.\" Vietnam has quietly reclaimed 11.2 sq km in the Spratlys. Huayang Centre's Bao Yinan noted China's coastguard remains \"substantially larger and better equipped\" than both combined. Luo Liang said a true turning point requires joint naval patrols and intelligence sharing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Will%20Manila%20and%20Hanoi%E2%80%99s%20maritime%20deal%20challenge%20Beijing%20in%20the%20South%20China%20Sea.pdf"}, {"id": "scmp-24", "title": "Xi Jinping to attend World AI Conference for first time as China elevates tech push", "source": "SCMP", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "President Xi Jinping will attend the opening ceremony of the 2026 World Artificial Intelligence Conference in Shanghai and deliver a keynote address, the foreign ministry announced on Monday. It marks his first in-person appearance since the event launched in 2018; Premier Li Qiang attended the 2024 and 2025 openings. The four-day conference, held alongside a high-level meeting on global AI governance, begins Friday with more than 140 forums and 1,100 exhibitors. China's 2026 government work report called for building a \"new form of intelligent economy\" and expanding the \"AI+\" campaign. Beijing has proposed a World AI Cooperation Organisation. OpenRouter said Chinese models overtook US models in token share in early June, with DeepSeek doubling to 18 per cent; Stanford's 2026 AI Index put the performance gap at 2.7 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20SCMP/Xi%20Jinping%20to%20attend%20World%20AI%20Conference%20for%20first%20time%20as%20China%20elevates%20tech%20push.pdf"}, {"id": "st-01", "title": "Age eligibility for community care apartments lowered", "source": "ST", "date": "14 Jul 2026", "tags": ["Society", "Politics"], "summary": "From October's Build-To-Order exercise, Singaporeans aged 55 or older can apply for community care apartments, down from the current 65, the Health and National Development ministries and HDB said on July 13. The assisted-living flats come with senior-friendly fittings and a care-services package. Service fees, currently about $159 monthly, will fall between 18 and 75 per cent as the scope is streamlined from 2026, with social activities shifted to active ageing centres and emergency alert devices made optional. The change, part of Age Well Neighbourhoods efforts, gives seniors more time to plan and right-size their homes. HDB has launched five such projects; about 260 flats will be offered in Toa Payoh.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Age%20eligibility%20for%20community%20care%20apartments%20lowered.pdf"}, {"id": "st-02", "title": "Earthquakes in Asia impact Singapore: Study", "source": "ST", "date": "14 Jul 2026", "tags": ["Environment", "Southeast Asia"], "summary": "A Nanyang Technological University-led study found that the 9.2-magnitude 2004 Sumatra earthquake caused land in Singapore, Malaysia and Thailand to sink gradually for years afterwards, by up to several millimetres annually. Published in Communications Earth & Environment and announced July 10, the research links the vertical land motion to slow flow in the weak upper mantle beneath the Sumatran backarc, even over 600km from the quake. Lead author Grace Ng said massive earthquakes \"set off a slow adjustment deep within the earth.\" Researchers analysed two decades of satellite positioning data. Senior author Emma Hill noted most sea-level projections focus on climate factors, warning that ignoring land motion could underestimate coastal flood risks in low-lying areas.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Earthquakes%20in%20Asia%20impact%20Singapore%20Study.pdf"}, {"id": "st-03", "title": "France powers down nuclear reactors over heatwave", "source": "ST", "date": "14 Jul 2026", "tags": ["Energy", "Environment"], "summary": "France's main energy provider EDF said on July 12 that three nuclear reactors had been temporarily shut down and eight others were running at reduced power due to a heatwave. Reactors at the Golfech, Bugey and Chooz plants, on the Garonne, Rhone and Meuse rivers, were halted to comply with cooling-water discharge rules and avoid releasing too much hot water into already-warming rivers. The Economy Ministry granted a temperature-limit exemption around Bugey until July 20 to secure the grid. It was the second heat-driven shutdown in weeks. The third heatwave since May put over a third of France on the highest alert, with 25 million people facing temperatures up to 41 deg C. Wildfires and drowning deaths spiked.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/France%20powers%20down%20nuclear%20reactors%20over%20heatwave.pdf"}, {"id": "st-04", "title": "Hamas accused of Gaza aid obstruction", "source": "ST", "date": "14 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "A senior UN official on July 13 accused Hamas of interfering with humanitarian deliveries in Gaza and intimidating aid workers. UN Deputy Special Coordinator Ramiz Alakbarov condemned obstruction by Gaza's de facto authorities, saying Hamas actions \"endangered humanitarian personnel\" and disrupted life-saving operations. Armed men linked to Hamas allegedly forced their way into a Jabalia food distribution point on July 11 and entered a World Food Programme warehouse, assaulting two truck drivers. A Hamas-run interior ministry official rejected the \"baseless accusations,\" insisting police protect aid trucks. Israel's COGAT said Hamas cynically exploits humanitarian aid. A ceasefire reached last October has stalled over disarmament; Israeli forces control over 60 per cent of the territory while Hamas holds the rest.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Hamas%20accused%20of%20Gaza%20aid%20obstruction.pdf"}, {"id": "st-05", "title": "Israel to hold Oct 27 elections in vote seen as referendum on Netanyahu", "source": "ST", "date": "14 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Israel will hold national elections on Oct 27, the last date allowed by law, Parliament said on July 12, in a vote widely seen as a referendum on Prime Minister Benjamin Netanyahu since the Gaza war. The Knesset ends its term July 17, letting the coalition complete a rare full four-year term. Netanyahu, 76, the longest-serving premier, said he \"intends to win\" and has raced to pass Bills to shore up his alliance. Polls show most Israelis want him out, with former military chief Gadi Eisenkot his main rival, and support for his premiership falling to 29.4 per cent. Key issues include the ceasefire with Iran, Oct 7 security failures, ultra-Orthodox military draft exemptions, judicial reforms and his corruption trials.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Israel%20to%20hold%20Oct%2027%20elections%20in%20vote%20seen%20as%20referendum%20on%20Netanyahu.pdf"}, {"id": "st-06", "title": "Japan says it must better combat foreign spies on its soil", "source": "ST", "date": "14 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Japan said on July 13 it recognised the need to better counter foreign intelligence after the New York Times reported Russia had turned the country into a \"den of spies\" and key source of weapons components. The NYT investigation, published July 12, said weak espionage laws let Moscow use Japan as a hub for procuring dual-use technology for its war on Ukraine. Chief government spokesman Minoru Kihara cited a growing need to counter foreign intelligence threatening national security, saying Tokyo must act with greater rigour. The report cited Ukrainian estimates that 90 per cent of Russian missiles and drones contain Japanese components, and named a Russian operative working undercover at Aeroflot's Tokyo office. Parliament approved a new coordinating intelligence body in 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Japan%20says%20it%20must%20better%20combat%20foreign%20spies%20on%20its%20soil.pdf"}, {"id": "st-07", "title": "Malaysia's data centre pipeline beats neighbours', but Singapore will keep premium status: JPMorgan", "source": "ST", "date": "14 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Singapore's data centre market will retain pricing power and premium status thanks to high efficiency standards, while those same regulations push the next wave of hyperscale and AI capacity to Malaysia, JPMorgan said in a July 7 note. Analysts called Singapore's proposed efficiency standards a \"structural catalyst\" sharpening both markets' roles: \"Singapore optimises every megawatt; Malaysia captures the next megawatt.\" Singapore ranks among the priciest markets, with monthly rents of US$330 to US$475 per kilowatt, more than double Sydney or Northern Virginia. The draft Digital Infrastructure Bill mandates strict efficiency for operators with 3MW-plus loads, with penalties up to 10 per cent of turnover, forcing 1.25 to 1.3 PUE thresholds. Redeveloping older facilities can yield 7-8 per cent returns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20ST/Malaysia's%20data%20centre%20pipeline%20beats%20neighbours',%20but%20Singapore%20will%20keep%20premium%20status%20JPMorgan.pdf"}, {"id": "st-08", "title": "Protected but deported anyway, as Trump goes after 'dreamers'", "source": "ST", "date": "14 Jul 2026", "tags": ["Politics", "Society"], "summary": "The Trump administration is deporting people protected under DACA, the 2012 Obama-era programme shielding immigrants brought to America as minors, an AFP report found. Jose Contreras, handcuffe
