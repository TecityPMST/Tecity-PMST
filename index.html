ettlements; $263 million tied to World Liberty Financial equity linked to a UAE royal, followed by U.S. AI-chip access for the U.A.E. Georgia Sen. Jon Ossoff and Pennsylvania Gov. Josh Shapiro invoked \"corruption\"; lawmakers formed an \"End Corruption Caucus.\" Trump flew on a $400 million Qatari-gifted 747. Republicans doubt the attacks land; strategist Alex Conant says Democrats must tie Trump's gains to voters' losses.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/Democrats%20Are%20Seizing%20on%20Trump%E2%80%99s%20Soaring%20Wealth%20as%20a%20Campaign%20Opportunity.pdf"}, {"id": "wsj-06", "title": "EV Batteries Are Defying Expectations After Hundreds of Thousands of Miles", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "EV batteries are outlasting expectations, easing a top buyer fear. Richard Symons's five-year-old Tesla Model 3 has logged 247,000 miles and still handles long drives. After five years, the average EV retains up to 95% of original range, per Recurrent. Roughly one in 12 EVs built 2011-2016 needed battery replacements, versus just 0.3% of those built from 2022 on. Battery prices have fallen more than 90% since 2010, per BloombergNEF; out-of-warranty replacements cost $5,000-$16,000. Fast-charging roughly doubles range loss. U.S. EV sales are down 25% in 2026 after Trump ended subsidies, but EVs' new-car share is projected to nearly double to 11% by 2030; globally EVs are 15% now.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/EV%20Batteries%20Are%20Defying%20Expectations%20After%20Hundreds%20of%20Thousands%20of%20Miles.pdf"}, {"id": "wsj-07", "title": "Former Top General Warns the Military Is Being Politicized", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Defence", "Politics"], "summary": "CQ Brown, forced out last year as the nation's top military officer, issued his most direct critique of the Trump administration's military handling. In a Foreign Affairs essay co-written with Duke professor Peter Feaver, Brown warned that deploying troops into U.S. cities for \"politically contentious missions\" like fighting crime risks compromising the military's apolitical role and combat focus. He criticized Pentagon moves under Defense Secretary Pete Hegseth to strike officers from promotion lists and push retirements, noting Gen. Chris Donahue's downgraded European command. Brown, an African-American former fighter pilot, avoided naming Trump. Pentagon spokesman Sean Parnell called the essay a \"hypocritical parting shot of a fired officer.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/Former%20Top%20General%20Warns%20the%20Military%20Is%20Being%20Politicized.pdf"}, {"id": "wsj-08", "title": "How Rogue Nations Are Using Cryptocurrencies to Evade Sanctions", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Iran, Russia and North Korea have sharply increased crypto use to evade sanctions, handling around $100 billion last year, per tracking firms. Chainalysis estimates addresses linked to sanctioned entities received over $100 billion in 2025, nearly eight times 2024's level. Iran and Russia bought drones and weapon parts with crypto; North Korea funds fuel and military gear via hacks. Washington sanctioned four Iranian exchanges including Nobitex; Treasury Secretary Scott Bessent said the U.S. seized $1 billion in crypto. Russia and a sanctioned Moldovan oligarch created the ruble-pegged token A7A5. TRM Labs monitors over 100 Iranian exchanges. Hamas solicited crypto donations, receiving $70,000 across eight wallets in two weeks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/How%20Rogue%20Nations%20Are%20Using%20Cryptocurrencies%20to%20Evade%20Sanctions.pdf"}, {"id": "wsj-09", "title": "NATO Is Fixing Its Cash Flow Problem. Now It Needs to Turn Money Into Munitions.", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "With tens of billions flowing into European militaries, NATO's challenge is converting money into weapons, Secretary-General Mark Rutte told the WSJ ahead of the alliance summit in Ankara. Non-U.S. members boosted spending 20% over 2024 to $574 billion; German outlays rose 24% to $114 billion, targeting roughly $180 billion by 2029. About $300 billion in weapons have been ordered from U.S. firms, nearing \"absorption-capacity.\" Bottlenecks include industrial capacity, strained by Ukraine and rebuilding after the Iran war, plus recruiting soldiers. The price of a 155mm shell has more than quadrupled since 2022. A NATO industry forum will announce billions in contracts; U.S. Ambassador Matthew Whitaker urged defense-company consolidation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/NATO%20Is%20Fixing%20Its%20Cash%20Flow%20Problem.%20Now%20It%20Needs%20to%20Turn%20Money%20Into%20Munitions..pdf"}, {"id": "wsj-10", "title": "OPEC, Allies Hike Output Again as Hormuz Traffic Starts Recovering", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "OPEC+ agreed after a Sunday virtual meeting to raise output by about 188,000 barrels a day in August, a fifth straight monthly increase, as Strait of Hormuz traffic recovers and Gulf producers restore output. Seven members took part, including Saudi Arabia, Russia, Iraq, Kuwait, Algeria, Kazakhstan and Oman. Shipping recovered after Washington and Tehran signed a mid-June interim deal; as of July 2, Hormuz traffic stabilized at 30-60 crossings, averaging about 40 vessels daily, per Kpler. The strait normally carries about a fifth of the world's oil. The U.A.E., which left OPEC end-April, is boosting output; Iran is ramping exports mostly to China. The seven meet again August 2.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/OPEC,%20Allies%20Hike%20Output%20Again%20as%20Hormuz%20Traffic%20Starts%20Recovering.pdf"}, {"id": "wsj-11", "title": "Small Stocks Are Having Their Biggest Run in Decades", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Russell 2000 climbed about 22% in the first half of 2026, its best first half since 1991, beating the Nasdaq by roughly 9 points and notching four straight record closes. Investors see the AI-driven rally spreading beyond trillion-dollar giants; some are rotating from chipmakers into healthcare, industrials and consumer-discretionary. Eased inflation after the U.S.-Iran peace deal and a cooling labor market fed Fed rate-cut hopes. Analysts project 54% earnings growth for the Russell 2000 in 2026, more than double the Russell 1000. Small-caps benefit from domestic revenue and floating-rate borrowing. MaxLinear rose over 600% last quarter. The S&P Small Cap 600's combined value is $1.83 trillion, roughly Broadcom's size.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/Small%20Stocks%20Are%20Having%20Their%20Biggest%20Run%20in%20Decades.pdf"}, {"id": "wsj-12", "title": "Software Loans Hit Rough Patch Even Before AI Fears Triggered SaaS-Pocalypse", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Software firms struggled to repay private loans even before the \"SaaS-pocalypse.\" The share of private software debt worth under 80% of original value hit a five-year high, peaking at 6.1% last September, roughly five months before software stocks tumbled on AI-displacement fears, per MSCI. Many loans stemmed from pandemic-era software booms, borrowed against revenues at private-equity behest. MSCI analyzed $73 billion in institutional holdings; IT markdowns rose to 6.1% from 4.8% over nine months, dipping to 4.7% in Q4. Fears center on tools like Anthropic's Claude Cowork, launched in January. The iShares SaaS ETF fell 24% in Q1. Healthcare debt markdowns hit a five-year high of 7.4%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/Software%20Loans%20Hit%20Rough%20Patch%20Even%20Before%20AI%20Fears%20Triggered%20SaaS-Pocalypse.pdf"}, {"id": "wsj-13", "title": "The Founders Are Why America Is Rich. That Legacy Is at Risk.", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "On the Declaration's 250th anniversary, Greg Ip argues America's wealth stems from founder-built institutions of checks and balances that protected workers, investors and entrepreneurs, echoing Tocqueville and Acemoglu-Robinson's \"Why Nations Fail.\" Inclusive institutions like the 1913 Federal Reserve and 1914 FTC diffused power. President Trump is centralizing economic authority, firing independent-agency members and attempting to remove a Fed governor. This past week the Supreme Court blocked the Fed firing, citing the bank's \"unique historical status,\" but upheld removing FTC commissioners, overturning a 1935 precedent. FTC Chair Andrew Ferguson now consults Trump on cases. Justices Gorsuch and Sotomayor warned of concentrated executive power.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/The%20Founders%20Are%20Why%20America%20Is%20Rich.%20That%20Legacy%20Is%20at%20Risk..pdf"}, {"id": "wsj-14", "title": "The Quest to Make Humanoid Robots Safe Enough for Humans", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "As humanoid robots enter factories and warehouses, makers race to ensure they don't hurt people, especially as machines approach 200 pounds and could crush someone if they lose power. Viral mishaps include a robot kicking a child in China. Agility, whose robots work caged at an auto-parts plant, plans to go public at a $2.5 billion valuation. Morgan Stanley projects a billion humanoids by 2050, a $7.5 trillion market. Unlike \"deterministic\" industrial robots, AI-driven humanoids are \"probabilistic,\" needing layered safeguards. Nvidia announced a Blackwell-based safety system; the ISO expects a standard by mid-2028. Neura Robotics' 176-pound 4NE1 collapses safely; Dexmate and Cobot use stable wheeled bases.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/The%20Quest%20to%20Make%20Humanoid%20Robots%20Safe%20Enough%20for%20Humans.pdf"}, {"id": "wsj-15", "title": "The State of ESG Investing", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Environment"], "summary": "ESG investing has retreated amid anti-\"woke\" backlash and underperformance but isn't dead, proponents say. After tripling between 2018 and 2021, U.S. ESG mutual-fund assets have seen net selling since spring 2022; outflows totaled $65.7 billion, though returns lifted assets to $350.7 billion by March 2026. Fund launches fell from 116 in 2021 to nine in 2025, with 91 closed. BlackRock now ranks No. 1 among U.S. ESG managers, ahead of Vanguard; Parnassus slid to No. 4. Eight red states pulled over $12 billion from BlackRock, and Larry Fink dropped the \"weaponized\" ESG term. Calpers ($620 billion) reframes it as \"sustainability integration.\" Index managers slashed pro-ESG proxy voting.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/The%20State%20of%20ESG%20Investing.pdf"}, {"id": "wsj-16", "title": "With Midterms Around the Corner, Lawmakers Fear Zombie Congress Is Taking Over D.C.", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Politics"], "summary": "GOP lawmakers, some privately calling it a \"zombie Congress,\" have little incentive to show up or toe the party line as Republicans head toward the midterms, endangering key legislation. The party holds a narrow 219-212 House majority. A renewed rebellion over the Save America Act voter-ID bill, led by Rep. Anna Paulina Luna, stalled the floor and sent members home early for July 4; seven Republicans missed the vote. Trump and Speaker Mike Johnson want a third reconciliation bill, possibly including a defense boost. About three dozen House Republicans aren't returning; many quit to seek other offices, some already defeated. Congress must pass spending bills by end-September to avoid a shutdown.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/With%20Midterms%20Around%20the%20Corner,%20Lawmakers%20Fear%20Zombie%20Congress%20Is%20Taking%20Over%20D.C..pdf"}, {"id": "wsj-17", "title": "With Trump in His Corner, Erdogan Gets an Easier Ride From NATO Partners", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "President Trump's admiration for Turkey's Recep Tayyip Erdogan is dampening Western criticism of his crackdown on opponents while cementing Turkey's role mediating conflicts from Ukraine to Iran and Gaza. Trump said Erdogan \"is a strong man\" who grants his every request, and hosts NATO's summit in Turkey next week. Turkey commands NATO's second-largest army; Baykar drones now export to 33-plus countries. Trump is pushing weapons sales opposed by lawmakers, with VP Vance exploring F-35 sales despite Turkey's Russian air-defense purchase. Turkish authorities jailed Istanbul mayor Ekrem Imamoglu, a likely Erdogan challenger, on denied corruption charges, and banned Ankara demonstrations during the summit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/With%20Trump%20in%20His%20Corner,%20Erdogan%20Gets%20an%20Easier%20Ride%20From%20NATO%20Partners.pdf"}, {"id": "wsj-18", "title": "'There Is No Going Back': The Inside Story of Europe's Rupture With America", "source": "WSJ", "date": "7 Jul 2026", "tags": ["Geopolitics", "Politics", "Defence"], "summary": "The WSJ reconstructs closed-door European meetings where the transatlantic alliance began splintering. At a January emergency session in Brussels dubbed \"therapy night,\" nearly 30 leaders vented after Trump threatened to seize Greenland from Denmark; France's Macron declared \"There is no going back,\" with French soldiers already in Greenland. Canada's Mark Carney argued \"the old America isn't coming back,\" molding an allied consensus on hedging. Europeans are pursuing \"de-Americanization,\" removing U.S. tech, dropping Microsoft Teams, and boosting home-grown space, AI and data centers. Britain's MI6 warned Trump's White House was \"'The Crucible' meets 'Wolf Hall.'\" NATO's Rutte urged 3.5% defense spending via \"flattery diplomacy.\" The Ankara summit tests resolve.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20WSJ/%E2%80%98There%20Is%20No%20Going%20Back%E2%80%99%20The%20Inside%20Story%20of%20Europe%E2%80%99s%20Rupture%20With%20America.pdf"}, {"id": "st-01", "title": "Australia Fiji defence alliance signed", "source": "ST", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Australia and Fiji signed the Ocean of Peace Alliance on July 6, committing each nation to aid the other if attacked, as China expands regional influence. It marks Fiji's first-ever alliance and makes it Australia's fourth formal ally after the US, New Zealand and Papua New Guinea. PM Anthony Albanese said an attack on Fiji would trigger Australia's full support for its sovereignty. The pact requires both to consult on threats and \"act to meet the common danger\". Other Pacific states may join later; New Zealand's Christopher Luxon expressed interest. The two also signed a Vuvale Union. Australia, describing a \"permanent state of contest\" with Beijing, recently signed a security deal with Vanuatu.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Australia%20Fiji%20defence%20alliance%20signed.pdf"}, {"id": "st-02", "title": "China missile test alarms Pacific powers", "source": "ST", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "China's military test-fired a missile with a dummy warhead from a nuclear submarine into the Pacific on July 6, drawing criticism from Japan, Australia, New Zealand and Taiwan. State media called it a \"routine arrangement\" of annual training not aimed at any country. The Global Times said it was likely the JL-3, China's most advanced submarine-launched missile, capable of reaching the continental US. Pacific powers received only short advance notice, and the test coincided with the Australia-Fiji Ocean of Peace defence pact signing. Australian Foreign Minister Penny Wong cited a \"rapid military build-up\" lacking transparency. Analysts said the timing of Beijing's notification was notable, while the US studies the launch for insights into PLA capability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/China%20missile%20test%20alarms%20Pacific%20powers.pdf"}, {"id": "st-03", "title": "Chip giant SK Hynix launches $36 billion US listing to ride global AI wave", "source": "ST", "date": "7 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "South Korean chipmaker SK Hynix launched a US share sale on July 6 to raise 43 trillion won (S$36 billion), drawing indications of interest for up to US$7 billion from Baillie Gifford Overseas, Coatue Management and Situational Awareness Partners. The firm will sell 17.79 million new shares via American depositary receipts on the Nasdaq, priced at a reference 242,500 won per ADR. The move rides the global AI boom, with Asian chip firms tapping strong demand; Taiwan's Unimicron also seeks about US$1.4 billion. SK Hynix shares fell 3.4 percent on July 6 but are up roughly 260 percent in 2026. Analysts said the listing broadens its investor base and could narrow its valuation gap with Micron.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Chip%20giant%20SK%20Hynix%20launches%2036%20billion%20US%20listing%20to%20ride%20global%20AI%20wave.pdf"}, {"id": "st-04", "title": "Hamas announces dissolution of Gaza governing body", "source": "ST", "date": "7 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Hamas announced on July 6 the dissolution of the body that had governed Gaza for nearly two decades, clearing the way for a technocratic committee. Emergency committee head Mohammed al-Farra resigned to facilitate transition to the National Committee for the Administration of Gaza (NCAG), created by the Board of Peace under a Trump-brokered October 2025 ceasefire. Hamas said it would no longer run Gaza to \"remove any pretexts for the occupation\". The Cairo-based NCAG said it was ready to govern, calling for a single authority, law and armed force. The Board of Peace demanded all weapons fall under NCAG control per the peace plan and UN Resolution 2802. Hamas's disarmament remains unresolved.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Hamas%20announces%20dissolution%20of%20Gaza%20governing%20body.pdf"}, {"id": "st-05", "title": "How Warsh could change the way S'pore analysts read markets", "source": "ST", "date": "7 Jul 2026", "tags": ["Finance & Markets"], "summary": "New Fed chairman Kevin Warsh has abolished forward guidance, adopting a less predictable communication style that makes it harder for Wall Street to anticipate rate moves. Singapore analysts say this puts greater weight on key economic data, especially inflation, in shaping Fed expectations. CMC Markets sales trader Eugene Koh now watches non-farm payrolls and inflation closely, noting market reactions have grown more nuanced as traders weigh whether soft data raises rate-cut odds. Warsh argues excessive communication makes markets expect too much and treat projections as commitments. The Fed held rates at 3.5 to 3.75 percent at his first June meeting amid persistent inflation. Koh said client conversations have become much more macro-driven.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/How%20Warsh%20could%20change%20the%20way%20S'pore%20analysts%20read%20markets.pdf"}, {"id": "st-06", "title": "Israeli government defies top court over media regulator", "source": "ST", "date": "7 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Israeli Cabinet members voted unanimously on July 5 to defy a Supreme Court ruling on the country's broadcast regulator, raising fears of a constitutional crisis. It is the first time PM Benjamin Netanyahu's government has flouted a court ruling. At issue is the Second Authority for Television and Radio, which the government says lacks a quorum to act; the court on June 17 ordered it to continue. Communications Minister Shlomo Karhi and Justice Minister Yariv Levin proposed rejecting the council's decisions. Opposition leader Yair Lapid called it \"the most serious constitutional crisis in Israel's history\". Ex-premiers Naftali Bennett and Gadi Eisenkot, leading polls to replace Netanyahu, warned of anarchy. Netanyahu did not comment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Israeli%20government%20defies%20top%20court%20over%20media%20regulator.pdf"}, {"id": "st-07", "title": "Japan, Singapore sign space cooperation pact", "source": "ST", "date": "7 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Japan and Singapore signed a landmark agreement on July 6 to jointly develop cooperation in peaceful uses of outer space. The pact with the Japan Aerospace Exploration Agency (JAXA) is the first bilateral deal for the three-month-old National Space Agency of Singapore (NSAS), enabling exchange of critical information and collaboration in fields like quantum satellite communications. It was among a flurry of agreements spanning industry, business and academia. Singapore's nascent space sector has about 70 companies and 2,000 professionals; its financial-hub and research strengths make it a logical partner for experienced Japan. NSAS chief Ngiam Le Na foresees \"significant breakthroughs\". Startup SpeQtral partnered with SKY Perfect JSAT on ultra-secure quantum-cryptography communications.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Japan,%20Singapore%20sign%20space%20cooperation%20pact.pdf"}, {"id": "st-08", "title": "S'pore, China can deepen collaboration, develop solutions that benefit the world: Chee Hong Tat", "source": "ST", "date": "7 Jul 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "Singapore and China can deepen collaboration to yield solutions benefiting the wider world, National Development Minister Chee Hong Tat said on July 6 at the Lianhe Zaobao Singapore-China Forum 2026. He highlighted three areas: sustainable energy, artificial intelligence and eldercare, arguing no country can act alone against climate change, technological shifts and demographic change. China leads in solar, wind and battery storage, which combined with Singapore's sustainable urban planning could yield practical climate solutions. On AI, China's scale in robotics and manufacturing offers productivity insights, while both can learn on regulatory and social frameworks. Chee said technology should improve jobs and productivity, urging focus on using AI to generate new roles despite disruption concerns.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/S'pore,%20China%20can%20deepen%20collaboration,%20develop%20solutions%20that%20benefit%20the%20world%20Chee%20Hong%20Tat.pdf"}, {"id": "st-09", "title": "Samsung union leader's $34 billion bonus victory turns to bitterness", "source": "ST", "date": "7 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Samsung Electronics union leader Choi Seung-ho, hailed in May for securing large profit-sharing bonuses, now faces bitterness after uneven payouts. Some semiconductor workers were promised roughly US$400,000 in 2026, while workers in less lucrative sections received as little as 1 percent of that, prompting protests in black clothes and masks. Choi survived a confidence vote with 88 percent support, but thousands left, cutting membership under 55,000, less than half Samsung's domestic workforce, losing sole negotiating power. A fishmonger's son, 35, he used the AI boom to demand Samsung share windfalls. His case reflects how millennial and Gen Z Korean workers mobilised for personal gains over solidarity, straining a fractured labour movement.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Samsung%20union%20leader's%2034%20billion%20bonus%20victory%20turns%20to%20bitterness.pdf"}, {"id": "st-10", "title": "Singapore retail sales stay in the black in May", "source": "ST", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "Singapore retail sales rose 3 percent year on year to an estimated $4.5 billion in May, a fourth straight month of growth but slower than April's 5.4 percent, SingStat data showed on July 6. Excluding motor vehicles, sales grew 3.7 percent. Month on month, seasonally adjusted sales fell 2.3 percent. Online transactions made up 15.1 percent of the total. Recreational goods jumped 23.6 percent, watches and jewellery 11.7 percent, and petrol stations 9.5 percent on higher prices. Food and alcohol fell 3.7 percent and department stores 3.3 percent. DBS economist Chua Han Teng credited a resilient labour market but expects petrol-driven growth to moderate as US-Iran tensions ease.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Singapore%20retail%20sales%20stay%20in%20the%20black%20in%20May.pdf"}, {"id": "st-11", "title": "Singapore, Indonesia sign carbon credits pact to deepen green cooperation", "source": "ST", "date": "7 Jul 2026", "tags": ["Environment", "Southeast Asia"], "summary": "Singapore and Indonesia signed a memorandum of understanding on carbon credits on July 6 at the annual Leaders' Retreat in Jakarta, where PM Lawrence Wong met President Prabowo Subianto. Cooperation covers identifying high-integrity carbon credit projects, sharing technical expertise on carbon markets, and working toward an implementation agreement under Article 6 of the Paris Agreement. It was signed by DPM Gan Kim Yong and Indonesian Environment Minister Mohammad Jumhur Hidayat. Gan said Singapore is committed to markets that are \"credible, transparent and mutually beneficial\", channelling climate finance into projects from protecting forests to clean technology. Conservation figures welcomed the deal. Prabowo also announced sovereign fund Danantara will spearhead cross-border electricity cooperation with Singapore.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/Singapore,%20Indonesia%20sign%20carbon%20credits%20pact%20to%20deepen%20green%20cooperation.pdf"}, {"id": "st-12", "title": "The HDB town your children move to in 2050 will do more than just house them", "source": "ST", "date": "7 Jul 2026", "tags": ["Society", "Environment"], "summary": "Singaporeans' expectations of a good HDB town are evolving beyond comfortable homes, hawker centres and transport toward health, climate resilience, biodiversity and community, argues this commentary. As residents live longer and face a warmer climate, towns must do more than one thing well. Nature is now valued for cooling streets, absorbing stormwater and boosting well-being, shown in Bishan-Ang Mo Kio Park and newer towns like Bidadari and Tengah using eco-corridors. Success should be measured by benefits generated, not just trees planted. Mobility planning similarly now aims to improve public health and active travel, as with the North-South Corridor. The piece calls for accelerating and scaling this multi-benefit approach to urban development toward 2050.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20ST/The%20HDB%20town%20your%20children%20move%20to%20in%202050%20will%20do%20more%20than%20just%20house%20them.pdf"}, {"id": "bt-01", "title": "Singapore's record-high electricity tariff drives retailers to roll out discounts, but price war unlikely", "source": "BT", "date": "7 Jul 2026", "tags": ["Energy", "Southeast Asia"], "summary": "Singapore electricity retailers are rolling out fixed-price promotions after the July-September regulated tariff jumped 17 per cent to a record S$0.3478 per kWh, driven by Middle East conflict. Geneco, Tuas Power, Keppel Electric and PacificLight are offering rates up to 20 per cent below the tariff, some near S$0.272 per kWh. EMA data shows households on fixed-price plans rose from 36.6 to 37.1 per cent between February and June. Analysts from KPMG and S&P Global say promotions are tactical and time-limited, making a price war unlikely. The market is more resilient than the 2021-2022 crisis, with surviving \"gentailers\" better hedged and a wholesale price cap untriggered.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/1.%20Singapore's%20record-high%20electricity%20tariff%20drives%20retailers%20to%20roll%20out%20discounts,%20but%20price%20war%20unlikely.pdf"}, {"id": "bt-02", "title": "Bankers say Asia loan market to stay weak as war saps confidence", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Asia's loan market shows little sign of rebound entering the second half, as Iran war fallout suppresses lender and borrower confidence. Loan issuance in US dollars, euros and yen across Asia-Pacific ex-Japan fell 15 per cent year-on-year to US$69 billion in the first six months, the weakest first-half in 16 years, Bloomberg data showed. Barclays, HSBC and Deutsche Bank bankers cite delayed deal-making, reduced Middle East liquidity, China's property downturn and weaker currencies. Some lenders are shifting to higher-yielding structured credit and data centre financing, where margins reached 310 basis points on a recent Malaysia deal. Even resilient Australia saw volumes fall about 10 per cent, with margins under pressure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Bankers%20say%20Asia%20loan%20market%20to%20stay%20weak%20as%20war%20saps%20confidence.pdf"}, {"id": "bt-03", "title": "China steps up financial risk cleanup under new top regulator", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "China is intensifying efforts to eliminate financial-sector risks, announcing a one-year regulatory takeover of Wuhan-based Z-Bank and approving the bankruptcy of Zhongrong International Trust. These are the first major enforcement actions under Ding Xiangqun, who took the helm of the National Financial Regulatory Administration in late May. The moves signal a shifting approach to the US$60 trillion system, with authorities more willing to let weaker firms fail. Z-Bank was hit by regulatory violations and deteriorating assets; Zhongrong, tied to Zhongzhi Group, collapsed from property exposure after missing payments in 2023. Vice-Premier He Lifeng said high-risk small and mid-sized institutions have fallen over 70 per cent from 2022 levels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/China%20steps%20up%20financial%20risk%20cleanup%20under%20new%20top%20regulator.pdf"}, {"id": "bt-04", "title": "Does progressive payment for new projects fuel high new condo prices?", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "This commentary asks whether Singapore's progressive payment scheme (PPS) for uncompleted condos fuels high new-launch prices. New condos can command premiums of 40 per cent or more per square foot over nearby resale units. Under PPS, buyers pay 20 per cent on signing, with further payments tied to construction milestones, letting developers lock in sales, de-risk projects and submit bullish land bids that raise prices. Buyers may act aggressively, assuming rising earnings or higher future resale of existing homes. A S$3 million condo equals about 10.1 times the 80th percentile household's annual income. The writer suggests selling only completed units, mirroring recent executive-condo cooling measures, could moderate prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Does%20progressive%20payment%20for%20new%20projects%20fuel%20high%20new%20condo%20prices.pdf"}, {"id": "bt-05", "title": "MAS' next decision may say more about growth than costs", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Monetary Authority of Singapore's late-July monetary policy statement may hinge on surprisingly robust growth rather than Iran-war inflation, this commentary argues. When April's statement warned of energy-driven cost-push inflation via the Strait of Hormuz, an energy crisis loomed. But core inflation held steady at 1.4 per cent in May, below the 1.6 per cent expected, though electricity and gas tariffs are rising 17 and 7.1 per cent this quarter with lagged effects. MAS kept core and headline forecasts at 1.5 to 2.5 per cent. In its survey, 61.9 per cent expect no change, but 38.1 per cent now expect tightening. Strong AI-driven manufacturing could instead spur demand-pull inflation, a \"happier\" reason for tightening.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/MAS'%20next%20decision%20may%20say%20more%20about%20growth%20than%20costs.pdf"}, {"id": "bt-06", "title": "PayNow eyes merchant, business payments in next growth phase, puts heat on card networks", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "PayNow's next growth phase is expected to come from merchant and business payments, with upgrades letting Singapore's national payment system compete more directly with card networks. In June, MAS said it would add features including interoperability between PayNow and Nets QR, deep-linking in QR codes, and larger public-sector transactions. Observers from Forrester, GL Insight, KPMG and PwC say PayNow offers a lower-cost account-to-account rail without interchange fees, though cards retain dominance in consumer spending via rewards and credit. Account-to-account transactions already make up 40 per cent of Singapore's payment flows versus 35 per cent for cards. Analysts see a multi-rail future and PayNow as infrastructure for agentic, programmable payments.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/PayNow%20eyes%20merchant,%20business%20payments%20in%20next%20growth%20phase,%20puts%20heat%20on%20card%20networks.pdf"}, {"id": "bt-07", "title": "Ringgit may rebound on capital flow measures: analysts", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The ringgit is poised to rebound after ending June as Asia's worst performer, as Bank Negara Malaysia's measures to boost foreign-exchange inflows and strong fundamentals support recovery, analysts say. RBC sees the currency at 3.95 per US dollar by year-end, while ANZ forecasts 3.80, the strongest since 2015. It closed 0.2 per cent higher at 4.0722 on Friday and has outperformed all Asian peers since BNM pledged on June 24 to intensify inflow efforts. Malaysia benefits from the AI boom, with total exports surging 45 per cent in May and a record RM40 billion trade surplus. Global funds bought about US$2.1 billion of local bonds. Risks include a hawkish Fed and state elections.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Ringgit%20may%20rebound%20on%20capital%20flow%20measures%20analysts.pdf"}, {"id": "bt-08", "title": "Singapore's equity market gains raise bar for new IPOs: OCBC", "source": "BT", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's IPO market could face a higher bar as the S$6.5 billion Equity Market Development Programme lifts valuations of existing listed stocks, making new listings harder to stand out, OCBC said. Carmen Lee, head of equity research, said new IPOs must offer a meaningful valuation discount or compelling growth story, since firms wanting to price like the market struggle unless delivering roughly 20 per cent earnings growth. The re-rating since February 2025 has boosted secondary-market appeal. OCBC expects a broader IPO pipeline in the second half and remains overweight on Singapore equities, citing AI infrastructure and defensive traits. It named 15 preferred picks including Keppel, Singtel, ST Engineering and Sembcorp Industries, with 12.7 to 52.2 per cent upside.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Singapore's%20equity%20market%20gains%20raise%20bar%20for%20new%20IPOs%20OCBC.pdf"}, {"id": "bt-09", "title": "Who's really keeping fossil fuels alive? Taxpayers globally", "source": "BT", "date": "7 Jul 2026", "tags": ["Energy", "Environment"], "summary": "This commentary argues that taxpayers, not the private sector, are propping up fossil fuels. The private share of energy investment going to oil, gas and coal fell from about 50 to 28 per cent since 2015, while the public sector still puts 53 per cent into dirty power. Governments also subsidise fossil fuels to keep them artificially cheap, with support set to reach about US$1.1 trillion this year (up to US$1.4 trillion if crude averages US$110), per a UNDP study, driven by Strait of Hormuz price pressures. EU fossil-fuel subsidies hit 97 billion euros in 2024, exceeding renewables. Combining public investment and subsidies, taxpayers funded 68 per cent of the fossil system in 2025, peaking at 78 per cent in 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Who's%20really%20keeping%20fossil%20fuels%20alive%20Taxpayers%20globally.pdf"}, {"id": "bt-10", "title": "Why China's Belt and Road Initiative will remain relevant despite growing competition", "source": "BT", "date": "7 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "This essay argues China's Belt and Road Initiative (BRI), launched in 2013 and spanning 150 countries, will remain the dominant global infrastructure model despite rising rivals. The EU's Global Gateway, the G7's PGII and India's connectivity strategies emerged in response to BRI criticisms over debt burdens, opaque procurement and \"debt-trap diplomacy\", exemplified by Sri Lanka's Hambantota Port lease. Yet these competitors expand rather than replace the marketplace. The BRI's strengths lie in fast state-driven financing, first-mover networks across Asia, Africa and Latin America, and its shift toward renewable energy, digital infrastructure and equity financing. Competition acts as a disciplining catalyst, pushing the BRI to become greener, more transparent and responsive. The authors are from the Economic Society of Singapore.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Why%20China's%20Belt%20and%20Road%20Initiative%20will%20remain%20relevant%20despite%20growing%20competition.pdf"}, {"id": "bt-11", "title": "Why Singapore's workforce needs both openness and a strong local core", "source": "BT", "date": "7 Jul 2026", "tags": ["Society", "Southeast Asia"], "summary": "This commentary argues Singapore must pair openness to foreign manpower with a strong local core, treating workplace integration as a core economic capability. Though ranked first in the June IMD World Competitiveness rankings, executives flagged labour adequacy as a weakness. Foreign manpower grew 15 per cent from 1.42 million in 2022 to 1.64 million in 2025, with Work Permit holders 75 per cent of the total. Value comes from complementarity between local knowledge and foreign expertise, but poor integration breeds resentment over fairness. Companies like OCBC, DBS, ByteDance and International SOS use structured onboarding, bias training and mixed teams. The writer, CEO of the Singapore Business Federation, urges firms and trade associations to hire for complementarity and measure integration outcomes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/Why%20Singapore's%20workforce%20needs%20both%20openness%20and%20a%20strong%20local%20core.pdf"}, {"id": "bt-12", "title": "World absorbs historic Iran war oil supply loss, but depleted stocks bring risks", "source": "BT", "date": "7 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "The world has absorbed with surprising ease the loss of over a billion barrels of oil since the Iran war began, but drained buffer reserves leave it exposed to future price spikes. Teheran's throttling of the Strait of Hormuz after the Feb 28 US-Israeli attacks caused history's biggest energy disruption, peaking at 14 million barrels per day, per the IEA. Yet fears of petrol and jet-fuel shortages never materialised; Brent peaked near US$126 in April and now trades below pre-war levels. Saudi Arabia and the UAE found alternative routes, China curtailed buying, and roughly one billion barrels were pulled from reserves. Rebuilding inventories could cost over US$70 billion, leaving markets without a safety net amid a fragile ceasefire.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20BT/World%20absorbs%20historic%20Iran%20war%20oil%20supply%20loss,%20but%20depleted%20stocks%20bring%20risks.pdf"}, {"id": "scmp-01", "title": "Alibaba wins reprieve on US lobbying after Pentagon blacklisted companies", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "A Northern District of California judge ordered the Pentagon not to enforce a lobbying ban against Alibaba while it weighs the firm's constitutional challenge to its inclusion on the Section 1260H blacklist of Chinese \"military-civil fusion\" companies. In early June the Defence Department added Alibaba, Baidu, Unitree Robotics, BYD and Nio to the list, barring contractors from employing lobbyists who also represent blacklisted firms. Alibaba sued weeks later, denying military ties and arguing the ban violated due process and free speech. An Alibaba spokesperson welcomed being able to \"communicate our views.\" The order lasts until the motion resolves or 60 days after an August 31 hearing. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Alibaba%20wins%20reprieve%20on%20US%20lobbying%20after%20Pentagon%20blacklisted%20companies.pdf"}, {"id": "scmp-02", "title": "Beijing opens lithium futures to foreign traders to cement pricing power over US", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Energy", "Trade"], "summary": "Effective July 3, the Guangzhou Futures Exchange began letting foreign miners, battery makers and traders trade lithium carbonate futures and options onshore, using US dollars as margin but settling in yuan, to bolster China's pricing power. Beijing supplied over 64 per cent of global lithium cathode materials last year despite holding only 16.5 per cent of reserves, making it the largest ore importer. The move counters US efforts: the Defense Logistics Agency has tendered for over 35.6 million pounds of lithium carbonate worth up to US$300 million. Mainland prices sat near 165,000 yuan per tonne Monday. S&P Global said China would set global prices for years via refining dominance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Beijing%20opens%20lithium%20futures%20to%20foreign%20traders%20to%20cement%20pricing%20power%20over%20US.pdf"}, {"id": "scmp-03", "title": "Canada picks German firm for new submarine fleet, South Korean competitor loses out", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Canada chose Germany's Thyssenkrupp Marine Systems over South Korea's Hanwha Ocean to build a multibillion-dollar submarine fleet, a move expected to deepen ties with Nato ahead of its Ankara summit. PM Mark Carney announced the selection in Halifax, citing Canadian economic benefits and sovereign control. Canada wants up to 12 subs to replace ageing Victoria-class vessels. TKMS offered redesigned 212CD submarines with a stealth hull and fuel-cell propulsion, pledging at least CAD$160 billion in economic value; Hanwha had touted faster KSS-III delivery. Analysts framed the decision as mid-tier powers de-risking from both the US and China, building \"parallel coalitions\" for strategic autonomy amid Trump's \"America first\" policies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Canada%20picks%20German%20firm%20for%20new%20submarine%20fleet,%20South%20Korean%20competitor%20loses%20out.pdf"}, {"id": "scmp-04", "title": "Caught between the US and China, squeezed Europe strives to find its way", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Geopolitics", "Finance & Markets", "Politics"], "summary": "At France's annual Rencontres Economiques forum in Aix-en-Provence, European leaders diagnosed a continent squeezed between the US and China on security, technology, democracy and industry. Former PM Edouard Philippe warned China reads Europe \"perfectly\" and sees it as weak, urging faster action to defend markets. BCG France's Olivier Scalabre proposed a \"coalition of the willing\" of five to seven states pushing reforms in energy, technology and capital via enhanced cooperation. ECB President Christine Lagarde highlighted fragmentation: the bloc has 295 trading platforms versus the US's two clearing houses, urging a genuine capital markets union to fund innovation, the energy transition and defence. Costa stressed mobilising European savings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Caught%20between%20the%20US%20and%20China,%20squeezed%20Europe%20strives%20to%20find%20its%20way.pdf"}, {"id": "scmp-05", "title": "China's Biren seeks US$900m to fund GPU push and challenge Nvidia amid AI boom", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shanghai Biren Technology is raising HK$7 billion (US$892.5 million) to ramp up production of its graphics processing units, joining a domestic race to capture Nvidia's China market share amid an AI boom. The chipmaker, listed in Hong Kong in January, will issue 153 million new shares at HK$46.2 each, a 9.9 per cent discount. Some 60 per cent of proceeds will fund commercialisation and mass production of next-generation general-purpose GPUs, 20 per cent for R&D. Shares closed 5.4 per cent lower Monday but have surged nearly 150 per cent since IPO. US export controls on Nvidia have opened a lucrative opening for local players including Moore Threads, MetaX and Cambricon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/China%E2%80%99s%20Biren%20seeks%20US%24900m%20to%20fund%20GPU%20push%20and%20challenge%20Nvidia%20amid%20AI%20boom.pdf"}, {"id": "scmp-06", "title": "China's EV deliveries remain stuck in downward spiral, exacerbating industry worries", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "China's electric vehicle deliveries fell for a sixth straight month in June, dropping 7 per cent year on year to 1.04 million units despite promotions, deepening worries over profitability. First-half deliveries slid 13 per cent to 4.73 million units. AlixPartners forecast light-vehicle sales sliding 27.7 per cent in 2026 amid a shaky economy and softening subsidies; only BYD, Leapmotor and Xiaomi are currently profitable, and just seven of 30 EV-dedicated makers may break even by 2030. Beijing halved an EV sales-tax exemption on January 1, imposing a 5 per cent tax, and will cancel a vehicle-use tax exemption from 2027. Carmakers are expanding overseas, with exports seen jumping 41 per cent to 10 million units.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/China%E2%80%99s%20EV%20deliveries%20remain%20stuck%20in%20downward%20spiral,%20exacerbating%20industry%20worries.pdf"}, {"id": "scmp-07", "title": "China's Xi Jinping sets new precedent with July 4 message for Trump and US", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "In a departure from convention, Xi Jinping sent Donald Trump a congratulatory message on the 250th anniversary of US independence, foreign ministry spokeswoman Mao Ning confirmed. Beijing does not usually publicise presidential July 4 greetings; the gesture follows diplomatic efforts to stabilise volatile ties after a May summit in Beijing where Xi said \"common interests are bigger than our differences\" and urged both to transcend the \"Thucydides Trap.\" Historically China limited activity to sending diplomats to US embassy receptions; vice foreign minister Ma Zhaoxu attended this year. China reserves formal national-day messages for select partners such as Russia and Belarus. Xi congratulated Trump on his November 2024 election win.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/China%E2%80%99s%20Xi%20Jinping%20sets%20new%20precedent%20with%20July%204%20message%20for%20Trump%20and%20US.pdf"}, {"id": "scmp-08", "title": "China's latest nuclear reactor goes live, first in Greater Bay Area with Hualong One tech", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Energy", "Environment", "Technology & AI"], "summary": "China General Nuclear Power Group connected the No. 2 reactor of the Taipingling Nuclear Power Plant in Huizhou, under 100km from Hong Kong, to the grid on Saturday, ahead of peak summer demand. It is the first Greater Bay Area reactor using China's proprietary third-generation Hualong One design, capping five years of construction on a 120 billion yuan, six-reactor project. The Hualong One is about 90 per cent domestically sourced, insulating China from Western sanctions. Beijing aims to lift operational nuclear capacity 43 per cent to 110 GW by 2030 as it targets peak emissions by 2030 and carbon neutrality by 2060. One reactor cuts CO2 emissions by over 8.3 million tonnes annually.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/China%E2%80%99s%20latest%20nuclear%20reactor%20goes%20live,%20first%20in%20Greater%20Bay%20Area%20with%20Hualong%20One%20tech.pdf"}, {"id": "scmp-09", "title": "Don't assume US decline will lead to its fall, warns Chinese scholar", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Geopolitics", "Technology & AI"], "summary": "Prominent scholar Zheng Yongnian, dean at the Chinese University of Hong Kong, Shenzhen, warned that underestimating a declining US could be a \"fatal mistake,\" as no force can yet replace it as global hegemon. He cited the dollar's reserve dominance, US military strength and its lead in emerging technologies including AI, where America holds over 55 per cent of the market. Zheng said US hegemony was being \"transformed and upgraded\" toward space, cyberspace and technological standards. Gallup showed China's approval overtaking the US's for the first time in nearly two decades. He accused Washington of hyping China's AI progress to mobilise resources, even as both sides pursue \"constructive strategic stability\" after the May Trump-Xi summit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Don%E2%80%99t%20assume%20US%20decline%20will%20lead%20to%20its%20fall,%20warns%20Chinese%20scholar.pdf"}, {"id": "scmp-10", "title": "EU should learn from China's energy tech, say heads of 2 of France's largest power firms", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Energy", "Geopolitics", "Environment"], "summary": "The heads of two of France's biggest energy firms urged EU governments to work with China on nuclear and renewable power to learn from Chinese efficiency, despite Brussels' concerns over dependence on Beijing. EDF chief Bernard Fontana described a Chinese team building in one week a support structure that takes up to two years in France, saying the help was \"methodological\" without creating dependency. TotalEnergies CEO Patrick Pouyanne, praising China's faster permitting, urged Europe to form joint ventures to share technology, warning against building a useless \"Maginot Line\" as Chinese firms \"come in anyway.\" The comments, made at the Aix-en-Provence forum, follow nuclear cooperation agreements signed during Macron's December visit to China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/EU%20should%20learn%20from%20China%E2%80%99s%20energy%20tech,%20say%20heads%20of%202%20of%20France%E2%80%99s%20largest%20power%20firms.pdf"}, {"id": "scmp-11", "title": "Global investors pivot from access to scale in yuan operations, anchored by Hong Kong", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Global institutional investors are shifting from basic market entry to scaling up yuan operations, with Hong Kong emerging as central infrastructure, an HSBC survey of over 120 investors managing more than US$32 trillion found. Some 63 per cent preferred offshore yuan markets for currency transactions and 54 per cent relied on Bond Connect and Stock Connect. Diversification drove allocation for 66 per cent of respondents, and three quarters expect to raise yuan holdings over the next one to two years. Hong Kong, the largest offshore renminbi hub with over 1 trillion yuan in liquidity, plans an expanded yuan business facility in July and five-year China government bond futures in August, reinforcing its \"superconnector\" role.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Global%20investors%20pivot%20from%20access%20to%20scale%20in%20yuan%20operations,%20anchored%20by%20Hong%20Kong.pdf"}, {"id": "scmp-12", "title": "Hong Kong US dollar gold futures trading hits record high ahead of clearing system launch", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong's US dollar gold futures trading hit a record on Monday as the city pushes to become a global bullion trading and storage hub. A total of 6,676 contracts traded during the day session, beating the prior high of 3,039 set in November 2022, HKEX said, after it waived fees for a year starting Monday when it relaunched the product. Bid-ask spreads were as tight as one tick (US$0.01) for the August contract. HKEX cited broad participation from banks, securities firms and gold producers, calling it part of a strategy to deepen its multi-asset ecosystem. Hong Kong launches a gold clearing and settlement system Tuesday, and its pension fund may allow more gold ETF investment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Hong%20Kong%20US%20dollar%20gold%20futures%20trading%20hits%20record%20high%20ahead%20of%20clearing%20system%20launch.pdf"}, {"id": "scmp-13", "title": "Hong Kong inaugurates trial operation of gold clearing and settlement system", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets"], "summary": "Hong Kong inaugurated the trial operation of a gold clearing and settlement system on Tuesday, a step toward building the city into a trading hub and price-setter for the precious metal. Chief Executive John Lee Ka-chiu announced the move at the Hong Kong FIC & Bond Connect Summit. The government-owned Hong Kong Precious Metals Central Clearing Company will offer services from gold deposits and withdrawals to over-the-counter transaction settlements, Lee said. The first transactions involved multiple banks and mining and jewellery companies. Lee said Hong Kong was also considering a new renminbi gold futures contract with delivery support from the Shanghai Gold Exchange in collaboration with Bloomberg, confirming an earlier South China Morning Post report.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Hong%20Kong%20inaugurates%20trial%20operation%20of%20gold%20clearing%20and%20settlement%20system.pdf"}, {"id": "scmp-14", "title": "Is Beijing preparing for submarine action with maritime survey east of Taiwan?", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "A mainland Chinese research vessel, the Xiang Yang Hong 22, spent June 16-18 conducting an oceanographic survey in the Philippine Sea east of Taiwan, which state media cast as civilian governance but experts called \"inherently dual-use.\" Data on temperature, salinity, currents and seabed topography could improve acoustic models for submarine and anti-submarine warfare, US Naval War College strategists said. Christopher Sharman noted the PLA leverages marine research institutes and organises personnel into \"new-quality\" maritime militia units. The deep waters east of Taiwan favour submarine operations and lie beyond the first island chain. As the PLA expands its nuclear submarine fleet, analysts warned Beijing could be preparing sonar planning and maritime domain awareness for future operations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Is%20Beijing%20preparing%20for%20submarine%20action%20with%20maritime%20survey%20east%20of%20Taiwan.pdf"}, {"id": "scmp-15", "title": "Nato can't be 'naive' about China as it ramps up military might, Rutte claims", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Nato Secretary General Mark Rutte said the alliance \"cannot be naive\" about China's military development, as the Indo-Pacific and European theatres grow more intertwined through Beijing's support for Russia's war in Ukraine. Speaking before the Ankara summit, he responded to a Chinese nuclear-powered submarine firing a test missile carrying a dummy warhead into the Pacific on Monday, the first known submarine-based test since 1982. Rutte said he had texted Japan's defence minister, naming China, North Korea and Iran as \"key enablers\" of Russia's aggression. He noted Nato allies and Canada already invest around 4 per cent of GDP in defence, on a path toward the 5 per cent goal, calling the shift \"transformational.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Nato%20can%E2%80%99t%20be%20%E2%80%98naive%E2%80%99%20about%20China%20as%20it%20ramps%20up%20military%20might,%20Rutte%20claims.pdf"}, {"id": "scmp-16", "title": "North Korea makes play for spot in China-Russia drills with missile test", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "North Korea test-fired 10 cruise missiles from its new destroyer Kang Kon on Friday, days before Russia and China's Joint Sea 2026 exercise off Qingdao, in what analysts called a bid to join future drills. Kim Jong-un watched the launch and ordered the ship into full service within two months, likely before the September 9 founding anniversary. With two 5,000-tonne destroyers commissioned and a nuclear-powered submarine reportedly under construction, Pyongyang is building a sea-based nuclear strike capability. Analysts said Moscow and Beijing supplied parts and technology, drawing North Korea into their strategy of deterring the US-led Indo-Pacific alliance. South Korea, which detected likely Hwasal cruise missiles, is rethinking its land-based missile defences.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/North%20Korea%20makes%20play%20for%20spot%20in%20China-Russia%20drills%20with%20missile%20test.pdf"}, {"id": "scmp-17", "title": "Norway urges China to help bring Russia to Ukraine peace talks", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Norwegian Prime Minister Jonas Gahr Stoere urged China to use its ties to the Russian leadership to help bring a negotiated settlement to the war in Ukraine, saying Beijing likely has the \"best and most direct access\" to Moscow. Speaking after meeting Foreign Minister Wang Yi in Oslo, Stoere said deeper Europe-China cooperation was limited while the war continues. Foreign Minister Espen Barth Eide called the dialogue \"constructive and promising.\" Oslo said talks should start unconditionally with a ceasefire on the current front line. Separately, Ukrainian FP-1 drones struck Russia's largest oil refinery in Omsk, Siberia, some 2,700km away, causing a fire in one of Kyiv's longest-range attacks; Zelensky called Siberia \"now within reach.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Norway%20urges%20China%20to%20help%20bring%20Russia%20to%20Ukraine%20peace%20talks.pdf"}, {"id": "scmp-18", "title": "Talk of US-China decoupling is getting loud - but neither side is ready for a clean break", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Geopolitics", "Trade"], "summary": "As the US marks its 250th anniversary, analysts said US-China financial ties are too entangled for a clean decoupling despite strategic rivalry. From Morgan Stanley's 1995 US$35 million CICC stake to Alibaba's record US$25 billion New York listing, Wall Street offered a \"technology-for-market\" exchange. China amassed reserves peaking near US$4 trillion and Treasury holdings above US$1.3 trillion in 2013, but has since cut them to an 18-year low. US-listed Chinese firms now total under US$1 trillion after crackdowns and delisting threats. Beijing is internationalising the yuan and building payment systems like CIPS and mBridge, yet experts said the shift is \"selective de-risking,\" fragmentation rather than separation, with capital routing through hubs like Hong Kong.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Talk%20of%20US-China%20decoupling%20is%20getting%20loud%20%E2%80%93%20but%20neither%20side%20is%20ready%20for%20a%20clean%20break.pdf"}, {"id": "scmp-19", "title": "Trump hints at public 'contribution' from US AI firms, sparking speculation", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "US President Donald Trump suggested Monday that leading American AI companies \"making tremendous amounts of money\" would make a public \"contribution to the people of our country,\" offering few details but fuelling speculation over greater government involvement. Speaking in the Oval Office, he referenced discussions with Treasury Secretary Scott Bessent and promised \"guardrails.\" The remarks follow tightened oversight of frontier AI and an emergency export-control directive that forced Anthropic to suspend global access to its Fable 5 and Mythos 5 models. A Financial Times report said OpenAI had proposed giving the government a 5 per cent stake. Senator Bernie Sanders introduced a bill requiring a stock tax equal to half AI firms' equity. Trump said the US leads China \"substantially\" in AI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Trump%20hints%20at%20public%20%E2%80%98contribution%E2%80%99%20from%20US%20AI%20firms,%20sparking%20speculation.pdf"}, {"id": "scmp-20", "title": "US at 250: has Europe learned to survive Trump's America?", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Geopolitics", "Politics", "Defence"], "summary": "As the US turns 250, its relationship with Europe has become transactional, unpredictable and often hostile, analysts said, with a \"Freedom 250\" event in Brussels marred by low EU attendance and a media incident involving the US ambassador to Belgium. Since Trump's return 18 months ago, the sides have clashed over trade, defence, Ukraine, Greenland and technology. This year proved calmer as Europe stood firmer: Brussels prepared its anti-coercion \"trade bazooka,\" prompting Trump to drop military options over Greenland, while Ukraine advanced against Russia with European funding. Yet new rifts persist, from digital-tax tariff threats to a public row with Italy's Meloni. Brookings' Stelzenmueller said the world order is \"highly unstable\" ahead of another fraught Nato summit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/US%20at%20250%20has%20Europe%20learned%20to%20survive%20Trump%E2%80%99s%20America.pdf"}, {"id": "scmp-21", "title": "Why China took over Zhongbang Bank - and what it says about hidden financial stress", "source": "SCMP", "date": "7 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "China's National Financial Regulatory Administration announced Friday it would take over Wuhan-based private lender Zhongbang Bank, citing grave credit risks after years of aggressive expansion and flawed governance. The bank, Hubei's first private lender with 123.5 billion yuan in assets at end-2024, drew nationwide savers by offering a 3.65 per cent five-year deposit rate, far above ICBC's 2.2 per cent. Individual depositors are fully protected; corporate savings guaranteed up to 50 million yuan. The PBOC's stability report flagged 312 institutions in the \"red zone.\" Analysts said 80 per cent of its corporate lending went to small businesses and it likely lent to indebted shareholders. Zhongbang will be absorbed by state-controlled Hankou Bank, echoing the 2019 Baoshang Bank seizure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/07%20Jul%202026/07%20Jul%20SCMP/Why%20China%20took%20over%20Zhongbang%20Bank%20%E2%80%93%20and%20what%20it%20says%20about%20hidden%20financial%20stress.pdf"}]}, "2026-07-08": {"date": "2026-07-08", "dayOfWeek": "Wednesday", "totalArticles": 57, "sourceCounts": {"WSJ": 14, "ST": 10, "BT": 13, "SCMP": 20}, "executiveDigest": "Iran's fragile ceasefire is collapsing: its Revolutionary Guard fired missiles at commercial ships near the Strait of Hormuz - setting a Qatari LNG tanker ablaze - during a mass funeral for slain leader Khamenei, prompting the US to strike back and revoke Iran's oil-sales waiver as crude jumped; meanwhile Microsoft cut 4,800 jobs to fund AI, Singapore's three banks hit record highs, and Trump called NATO a 'paper tiger' while eyeing Greenland.", "briefingCards": [{"title": "Lead story - Iran ceasefire collapses again", "body": "Iran's Revolutionary Guard fired missiles at up to three commercial ships near the Strait of Hormuz, hitting a Qatari LNG tanker (Al Rekayyat) near its engine room and a Saudi-flagged supertanker. The US struck back at Iranian air-defence, coastal-surveillance and drone sites 'to impose heavy costs' and revoked Iran's temporary oil-sales waiver; Qatar held Tehran 'fully legally responsible', while Iran accused Washington of violating the Islamabad memorandum and vowed decisive measures. The escalation came amid a mass funeral for slain supreme leader Ali Khamenei - authorities claimed 11 million mourners, some carrying 'KILL TRUMP' placards - as Trump threatened to 'finish the job' and oil prices jumped."}, {"title": "Markets & finance", "body": "Singapore's three banks closed at record highs after a Citi upgrade - OCBC rose 3.3% to S$26.34, UOB 2.9% to S$41.69 and DBS 2.6% to S$68.64 - on a loan-growth recovery and Asia wealth positioning. SpaceX joined the Nasdaq-100 (a US$2.1 trillion cap but under 1% index weight), forcing QQQ and US$800 billion of trackers to buy at Monday's close. WSJ warned South Korea's Kospi - up 165% in a year with 'Squid Game' volatility and over US$100 billion of first-half foreign outflows - risks a reckoning, while MicroStrategy's Strategy looked 'trapped by its own broken bitcoin math'."}, {"title": "Asia realignment", "body": "At the NATO summit in Ankara, Trump called the alliance a 'paper tiger', said he was 'very disappointed' that Italy, Germany and France refused to aid the Iran operation, and insisted the US should control Greenland. Allies scrambled: Canada is rushing to rebuild its military as the US relationship frays, and Europe is racing to plug security holes after a US NATO pullback. China pressed its own agenda - extending a 20-month central-bank gold-buying binge to 2,346 tonnes and expanding Hong Kong's yuan facility 150% to US$73.6 billion to meet international demand amid de-dollarisation."}, {"title": "Energy & climate", "body": "The renewed Hormuz attacks and revoked oil waiver sent crude higher, reversing the recent glut narrative - the strait carries roughly a fifth of global oil and gas - while oil-rich Alaska fretted about $9 gas. DBS's chief investment officer argued the real AI bottleneck is now power, not chips: computing energy needs could reach a thousand times today's levels, behaving like unforgiving baseload as grids lag, favouring utilities, grid operators, storage and nuclear. China touted a self-reliant carbon-14 nuclear-battery milestone, and jet-fuel prices have plunged without translating into lower airfares."}, {"title": "Technology & AI", "body": "Microsoft is cutting about 4,800 jobs (2.1% of staff), including some 3,200 from a 'not healthy' Xbox division, as it channels investment into AI infrastructure amid Big Tech's US$700 billion-plus 2026 capex - insisting the roles are 'not being replaced by AI'. Analysts split on the tech pullback: an FSMOne piece called it a healthy reset (Google's cloud backlog nearly doubled to US$462 billion), favouring cheaper Asian chipmakers at ~15x forward earnings versus 34x for US peers. The UN Secretary-General urged a ban on autonomous 'killer robots' as warfare hits a technological inflection point."}, {"title": "Singapore & SEA focus", "body": "Singapore retained the title of world's most expensive city for the wealthy for a fourth year (Julius Baer), driven by car and property costs and a strong Singdollar - even as home prices are 'finally cooling', with HDB resale down 0.3% in a rare back-to-back quarterly dip that analysts call a healthy adjustment. MAS proposed a protected cell company structure for insurance (targeted 2028) to deepen Singapore's risk-management hub, and is speeding foreign-ETF cross-listing to a three-month approval target. Analysts argued CICT and CapitaLand should snap up Bugis Junction Towers."}], "keyMetrics": [{"value": "57", "label": "Articles curated today", "sub": "WSJ 14 · ST 10 · BT 13 · SCMP 20"}, {"value": "Ships hit", "label": "Hormuz attacks resume", "sub": "US strikes back; oil waiver revoked"}, {"value": "4,800", "label": "Microsoft job cuts", "sub": "~3,200 from Xbox; AI shift"}, {"value": "Record highs", "label": "DBS, OCBC, UOB", "sub": "Citi upgrade; loan-growth recovery"}, {"value": "US$73.6b", "label": "HK yuan facility", "sub": "+150%; de-dollarisation push"}, {"value": "No. 1", "label": "Priciest city for rich", "sub": "Singapore, 4th year running"}], "articles": [{"id": "wsj-01", "title": "Canada Rushes to Build Up Its Military as U.S. Relationship Frays", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Canada is rapidly rearming after decades as a NATO weak link. It met the 2% of GDP spending target ahead of schedule, recruitment hit a 30-year high, and on Monday PM Mark Carney announced negotiations with German-Norwegian group ThyssenKrupp Marine Systems to buy up to 12 submarines, the largest procurement in Canadian history. Carney pledged to reach NATO's new 5% target by 2035 and spend $60 billion over five years. Canada joined Europe's defense procurement pact, opened talks with Sweden's Saab, and signed a $1.76 billion radar deal with Australia, diversifying away from U.S. suppliers. Pentagon official Elbridge Colby rebuked Canada in May, suspending participation in a 1940 joint defense board. Canada previously had only one operational submarine.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Canada%20Rushes%20to%20Build%20Up%20Its%20Military%20as%20U.S.%20Relationship%20Frays.pdf"}, {"id": "wsj-02", "title": "Europe Races to Plug Security Holes After U.S. NATO Pullback", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Europe is scrambling to replace bombers, warships and refuelers the U.S. told NATO members they can no longer rely on in a crisis. Ahead of NATO's Ankara summit, allies confront gaps in long-range strategic bombers, midair refuelers, carriers and submarines that experts say cannot be quickly replicated. Secretary-General Mark Rutte said \"Europeans are already backfilling what the U.S. cannot any longer promise.\" Workarounds include ground-based long-range missiles and committing all new fighter jets to NATO. The cuts free the Pentagon to focus on China even as Russia intensifies strikes on Kyiv. In May the Pentagon canceled an armored brigade deployment to Poland. Lawmakers seek to bar U.S. troop levels falling below 76,000 without further review.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Europe%20Races%20to%20Plug%20Security%20Holes%20After%20U.S.%20NATO%20Pullback.pdf"}, {"id": "wsj-03", "title": "Iran Isn't Just Eulogizing a Leader. It's Sending a Message.", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Geopolitics"], "summary": "A vast crowd joined Monday's funeral procession for Ali Khamenei, the former supreme leader killed at the start of the Iran war, in an event Iran used for political messaging. Authorities said 11 million people attended the memorial that began Saturday. Mourners pelted a picture of Trump with stones and held a \"We will kill Trump\" banner. Foreign delegations were greeted with targeted Quran verses: Hezbollah and Hamas got sympathetic passages, while Saudi Arabia and Turkey received implicit warnings. Chatham House's Sanam Vakil called it \"strategic signaling.\" Iran insists on sole control over the Strait of Hormuz during U.S. talks. Khamenei's son Mojtaba, appointed successor in March, wasn't verified as attending. Gulf states sent lower-level representatives than in 2023.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Iran%20Isn%E2%80%99t%20Just%20Eulogizing%20a%20Leader.%20It%E2%80%99s%20Sending%20a%20Message..pdf"}, {"id": "wsj-04", "title": "Iran's Revolutionary Guard Fires Missiles at Ships Near Hormuz", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran's Islamic Revolutionary Guard Corps fired missiles at two commercial ships near the Strait of Hormuz early Tuesday, a senior U.S. official said, escalating tensions amid talks to end the U.S.-Iran war. \"Our missiles and drones are ready to fire at you,\" the Guard warned ships by radio over the weekend. One vessel appears to be Al Rekayyat, an LNG tanker owned by Qatar's Nakilat; it was hit on the port side near the engine room, sparking a fire, though all crew were safe. The attack occurred near Limah, Oman, in the Gulf of Oman. The U.S. and Iran agreed last month to a 60-day negotiation period. Daily Hormuz traffic had stabilized at 30 to 60 crossings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/08%20Jul%202026/08%20Jul%20WSJ/Iran%E2%80%99s%20Revolutionary%20Guard%20Fires%20Missiles%20at%20Ships%20Near%20Hormuz.pdf"}, {"id": "wsj-05", "title": "JPMorgan, Bank of America and Other Banks Explore a Deal to Shake Up Payments World", "source": "WSJ", "date": "8 Jul 2026", "tags": ["Finance & Markets"], "summary": "Major U.S. banks including JPMorgan Chase, Bank of America, Wells Fargo and PNC have held preliminary talks to acquire a debit network owned by fintech Fiserv, seeking exemption from the Durbin amendment's cap on debit-card interchange fees, people familiar said. Owning a network would let them bypass the 2010 Dodd-Frank rule that caps fees for banks with $10 billion-plus in assets. The model echoes Capital One's $50.6 billion purchase of Discover, which cut out middlemen. Fiserv owns the STAR and Accel networks; its stock is down roughly 70% from a year ago. No deal is certain, and several banks decided against moving forward, wary of backlash from lawmakers, regulators and merchants. Interchange fees total billions annually.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_teci
