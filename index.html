harepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/U.S.%20Bets%20Billions%20of%20Dollars%20in%20Low-Cost%20Loans%20Can%20Revive%20Nuclear%20Power.pdf"}, {"id": "wsj-24", "title": "What Is Trump's Goal in Iran? How His Rhetoric on the War Has Shifted, in His Own Words", "source": "WSJ", "date": "25 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "The Journal tracks how Trump's stated goals in the Iran war shifted. In a Feb. 28 video, he vowed to destroy Iran's missiles and factories, sink its navy, gut its proxies, bar any nuclear bomb, and urged Iranians to overthrow their \"wicked, radical dictatorship.\" Iran responded by closing the Strait of Hormuz—20% of world oil—spiking prices and inflation. After last week's memorandum of understanding reopening the strait and setting nuclear talks, many goals were dropped: Trump now calls Iran's leaders pragmatic, no longer talks of regime change or unconditional surrender, and concedes Iran is entitled to a missile force. Tehran retained thousands of missiles. The MOU lets Iran sell oil with waived sanctions, with $300 billion in regional development funds tied to nuclear progress.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20WSJ/What%20Is%20Trump%E2%80%99s%20Goal%20in%20Iran%20How%20His%20Rhetoric%20on%20the%20War%20Has%20Shifted,%20in%20His%20Own%20Words.pdf"}, {"id": "st-01", "title": "ASEAN's South China Sea Code of Conduct: A maritime security focus", "source": "ST", "date": "25 Jun 2026", "tags": ["Southeast Asia", "Geopolitics", "Energy"], "summary": "As the Philippines chairs ASEAN in 2026, Foreign Secretary Ma. Theresa Lazaro told ST that concluding the long-delayed South China Sea Code of Conduct (COC) with China is \"ASEAN's gift to the world,\" citing fears of choke points like the Strait of Hormuz. The recent Middle East crisis, which pushed oil above US$100 a barrel, injected fresh urgency; negotiators now meet monthly. Four core issues remain unresolved: legal bindingness, geographic scope, the link to the 2002 DOC, and terms of reference. Lazaro, also ASEAN's Myanmar envoy, acknowledged little progress on energy resilience (APSA) and a diplomacy-first stance that diverges from Defence chief Teodoro's harder line. Manila targets COC conclusion by December's leaders' summit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/ASEAN%E2%80%99s%20South%20China%20Sea%20Code%20of%20Conduct%20A%20maritime%20security%20focus.pdf"}, {"id": "st-02", "title": "Can WeChat become China's killer AI app?", "source": "ST", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Tencent confirmed on June 22 it is beta-testing a native AI assistant, Xiaowei, inside WeChat, the super app used by more than a billion people, accessible via text or voice. Long cast as an AI laggard behind Alibaba and ByteDance, Tencent could leverage WeChat's payments, identity and services plumbing to launch AI agents that act on users' behalf, a moat rivals can only dream of. Reports of the agent earlier in June drove Tencent's biggest intraday share jump since 2022. Risks remain: a rogue agent could break institutional trust at scale, compute capacity is uncertain, and consumers resist paying for AI features. ByteDance's Doubao has double the downloads of Tencent's Yuanbao year-to-date, underscoring the stakes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Can%20WeChat%20become%20China%E2%80%99s%20killer%20AI%20app.pdf"}, {"id": "st-03", "title": "Canada to send warships to Indo-Pacific, defence minister says", "source": "ST", "date": "25 Jun 2026", "tags": ["Defence", "Geopolitics", "Trade"], "summary": "Canada will send warships to the Indo-Pacific in two 2026 deployments, arriving in August and November with port calls in Japan, Defence Minister David McGuinty said in Tokyo while leading a 175-organisation, 300-strong defence trade delegation. Three Japan-Canada defence cooperation agreements were set to be signed June 25, focusing on AI, quantum, cryptography and maritime systems. The push reflects Ottawa seeking partners beyond North America amid a turbulent US relationship under Trump, who imposed tariffs and floated Canada as a 51st state; PM Carney has reviewed an 88-jet F-35 order. McGuinty expressed interest in the Japan-UK-Italy GCAP fighter programme while stressing Canada is also \"recalibrating\" and deepening trade ties with China, including a January EV tariff-cutting pact.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Canada%20to%20send%20warships%20to%20Indo-Pacific,%20defence%20minister%20says.pdf"}, {"id": "st-04", "title": "Economic review wraps up with call for Singapore to adapt faster to AI-driven world", "source": "ST", "date": "25 Jun 2026", "tags": ["Technology & AI", "Society", "Energy"], "summary": "Singapore's Economic Strategy Review committees released their final report on June 24, capping a year-long review and urging the Republic to adapt faster to an AI-driven, fragmented world. Drawing on 80-plus consultations, the report set out eight thrusts spanning jobs, skills, AI adoption and resilience. It recommends positioning Singapore as a trusted AI hub for testing and deploying solutions rather than building frontier models or hosting the largest data centres, plus new growth bets in quantum and space technologies. On workers, it urges earlier retrenchment support before job loss, shorter mandatory notification timelines, and bridges to AI-resilient sectors like early childhood education and allied health. It also targets more Singapore-headquartered firms with over $1 billion revenue and stronger energy resilience post-Hormuz.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Economic%20review%20wraps%20up%20with%20call%20for%20Singapore%20to%20adapt%20faster%20to%20AI-driven%20world.pdf"}, {"id": "st-05", "title": "High haze risk in S'pore due to El Nino and biofuel demand", "source": "ST", "date": "25 Jun 2026", "tags": ["Environment", "Southeast Asia", "Energy"], "summary": "The Singapore Institute of International Affairs (SIIA) issued a rare red alert in its annual haze outlook, warning of high risk of severe haze in the region's second half due to a returning, possibly super El Nino, a potential positive Indian Ocean Dipole, and deforestation spurred by biofuel demand. It is only SIIA's second red alert since 2019; the first was 2023. From July 1, Indonesia mandates 50 per cent palm-oil biodiesel blends. Higher diesel and fertiliser costs from Strait of Hormuz disruptions, up 20-30 per cent, may push producers toward cheaper slash-and-burn clearing. Firefighting budgets in Riau and Kalimantan are already exhausted. SIIA's Simon Tay and Khor Yu-Leng flag smallholder lands as the critical gap as Prabowo's administration faces its first high-risk dry season.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/High%20haze%20risk%20in%20S%E2%80%99pore%20due%20to%20El%20Nino%20and%20biofuel%20demand.pdf"}, {"id": "st-06", "title": "Iran claims US defeat in Middle East war deal", "source": "ST", "date": "25 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iran on June 24 hailed the deal ending the Middle East war as \"a declaration of America's defeat,\" with negotiator Mohammad Bagher Ghalibaf crediting Iranian resistance for the Pakistani-mediated \"Islamabad memorandum.\" The war began with US-Israeli strikes on Feb 28 and saw Tehran blockade the Strait of Hormuz and fire thousands of drones and missiles at Gulf neighbours. US Secretary of State Marco Rubio toured the UAE, Kuwait and Bahrain to reassure allies; the MOU does not address Iran's missiles or proxies. Rubio and Trump insisted no tolls can be charged on the Hormuz international waterway after Iran and Oman mused about \"costs.\" A UN scheme began evacuating ships and 11,000 stranded seafarers. Iran disputes Trump's claim it agreed to return UN nuclear inspectors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Iran%20claims%20US%20defeat%20in%20Middle%20East%20war%20deal.pdf"}, {"id": "st-07", "title": "June BTO launch: Woodlands, Bishan and Berlayar draw interest", "source": "ST", "date": "25 Jun 2026", "tags": ["Society"], "summary": "HDB's June Build-To-Order exercise, which opened June 17 and closed June 24, drew 22,634 applicants for 6,952 flats across Ang Mo Kio, Bishan, Bukit Merah, Woodlands and Sembawang, an overall application rate of 3.2. Four-room Standard flats at Woodgrove Acres in Woodlands surprised analysts with nearly four first-timers per unit despite no nearby MRT, as buyers avoided the longer 10-year MOP of Ang Mo Kio Plus projects. Prime projects Lakeview Cascadia (Bishan) and Berlayar Rise (Bukit Merah) were over three times oversubscribed among first-timers, drawing 3,753 and over 5,000 applicants respectively, undeterred by 10-14 per cent subsidy clawbacks. Ang Mo Kio Plus flats saw muted demand (1.3). Minister Chee Hong Tat flagged about 20,000 two-room flexi flats coming from 2026 to 2028.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/June%20BTO%20launch%20Woodlands,%20Bishan%20and%20Berlayar%20draw%20interest.pdf"}, {"id": "st-08", "title": "Recent layoffs at e-commerce firms like Lazada reflect sector's maturation, not decline: Analysts", "source": "ST", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets", "Society"], "summary": "Layoffs at Lazada, Shopee and Amazon reflect a maturing e-commerce sector prioritising profitability and AI adoption rather than decline, analysts told ST. Lazada retrenched 5 per cent of its South-east Asian workforce, including some Singapore staff. After pandemic-era growth-at-all-costs, firms now face intensifying competition from cross-border and social-commerce players like TikTok Shop. DBS's Sachin Mittal and others say demand stays healthy and Singapore's gross merchandise volume is projected to reach US$15 billion (S$19.5 billion) by 2030. Views differ on AI's role: Aletheia's Nirgunan Tiruchelvam attributes cuts to over-hiring, while SDAX's Song Seng Wun expects more episodic retrenchments as chatbots and AI replace risk, data and customer-service teams. Skills combining business judgment, technology and strategy remain in demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Recent%20layoffs%20at%20e-commerce%20firms%20like%20Lazada%20reflect%20sector%E2%80%99s%20maturation,%20not%20decline%20Analysts.pdf"}, {"id": "st-09", "title": "Russia says nuclear weapons the 'only' guarantee against global war", "source": "ST", "date": "25 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Kremlin spokesman Dmitry Peskov said on June 24 that nuclear weapons are the \"only\" bulwark preventing global war, declaring the global security system is \"eroding\" amid fears of a fresh multi-country arms race. The last Russia-US arms control treaty, New START, expired in February, lifting limits on the world's two largest nuclear powers, with no sign of renewal despite agreement to restart high-level military talks. Signed in 2010, it had capped each side at 1,550 deployed warheads. Putin has repeatedly invoked nuclear rhetoric during his offensive on Ukraine, drawing accusations of sabre-rattling. Trump has pressed to bring China, whose growing arsenal remains far smaller, into a new treaty; Beijing has rejected this, while Moscow insists Britain and France must also be included.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Russia%20says%20nuclear%20weapons%20the%20%E2%80%98only%E2%80%99%20guarantee%20against%20global%20war.pdf"}, {"id": "st-10", "title": "Singapore semiconductor firms expand in US for AI boom", "source": "ST", "date": "25 Jun 2026", "tags": ["Technology & AI", "Trade", "Finance & Markets"], "summary": "Singapore semiconductor companies are rapidly expanding in the US to meet surging AI chip demand, adding facilities and headcount. Advanced packaging firm Ecsal Technologies expects to double its US headcount by end-2026 and plans a Texas site, having cut product refresh cycles from two years to six months. Wafer defect inspection provider Visiontec, in El Dorado Hills since November 2025, aims to grow its US team to five by 2027 and 10 by 2029, eyeing a US testing platform and engaging chipmakers like Wolfspeed. Testing-equipment maker AEM, an Intel customer, opened an R&D centre in Carlsbad and guided 2026 revenue of $550-600 million, up from $399 million in 2025, citing agentic AI as a structural tailwind. The US holds just over half of global semiconductor sales.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Singapore%20semiconductor%20firms%20expand%20in%20US%20for%20AI%20boom.pdf"}, {"id": "st-11", "title": "Taiwan says warning time for any China attack is shortening", "source": "ST", "date": "25 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Taiwan's military must verify it can respond immediately to war as warning time for a Chinese attack shortens, Defence Minister Wellington Koo said on June 24 during five days of \"immediate combat readiness\" drills. Some exercises now model China abruptly turning a regular drill into a real attack; China's newest aircraft carrier transited the Taiwan Strait on June 23. Taiwan recently fired US-made HIMARS into the strait, with annual Han Kuang exercises expected in August. China's Taiwan Affairs Office accused the ruling DPP of seeking independence by force while reiterating it will never renounce force. President Lai Ching-te is pushing to lift defence spending to 5 per cent of GDP before 2030. Top US diplomat Raymond Greene stressed allied efforts to maintain the first-island-chain status quo and deter any takeover.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Taiwan%20says%20warning%20time%20for%20any%20China%20attack%20is%20shortening.pdf"}, {"id": "st-12", "title": "Why the future belongs to wise cities, not just smart ones", "source": "ST", "date": "25 Jun 2026", "tags": ["Technology & AI", "Society", "Environment"], "summary": "In a commentary tied to the 10th World Cities Summit in Singapore, SMU president Lily Kong argues the smart-city era of data, sensors and optimisation is insufficient for challenges that are social, ethical and existential. She advances the \"wise city\": one making good collective choices amid competing values over long horizons, asking not just what technology enables but who is served and who is left behind. Examples include designing barrier-free transit for ageing populations (a real Singapore misstep four decades ago), valuing social trust and community resilience as shown during Covid-19, and balancing biodiversity with liveability rather than engineering away every friction. AI raises accountability and bias questions that demand judgment, not just capability. The ultimate measure, she writes, is whether people can lead meaningful, fulfilling lives.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Why%20the%20future%20belongs%20to%20wise%20cities,%20not%20just%20smart%20ones.pdf"}, {"id": "st-13", "title": "Why the US should still insist North Korea give up its nukes", "source": "ST", "date": "25 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "East-West Center's Denny Roy argues Washington should keep denuclearisation as its stated goal toward North Korea despite no realistic prospect of it happening soon. The piece follows Trump posting a 2018 Singapore summit photo with Kim Jong Un, fuelling speculation he may re-engage after the Iran deal reopened the Strait of Hormuz. Roy counters Victor Cha's Foreign Affairs proposal to formally accept the DPRK, which holds an estimated 60 warheads and a new uranium plant, as a permanent nuclear state. He warns talks now would reward bad behaviour, weaken non-proliferation, risk US troop drawdowns from South Korea, and push Seoul and Tokyo toward their own nukes. With US leverage low amid Pyongyang's Russia partnership, he urges patience and continued denuclearisation as the default policy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20ST/Why%20the%20US%20should%20still%20insist%20North%20Korea%20give%20up%20its%20nukes.pdf"}, {"id": "bt-01", "title": "Andy Burnham wants change to define his leadership", "source": "BT", "date": "25 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "Former Manchester mayor Andy Burnham, who won the Jun 18 Makerfield by-election to re-enter the Commons, is the frontrunner to succeed UK PM Keir Starmer, potentially unopposed in a \"coronation\". Starmer is the sixth PM to exit since the 2016 Brexit vote. Burnham, backed by Wes Streeting, pledges to end neoliberalism via his \"business-friendly socialism\" or \"Manchesterism\". Risks include populist Reform UK (led by Trump ally Nigel Farage) leading polls, limited appeal beyond north-west England, and fiscal constraints: debt-to-GDP is 95.1 per cent, and Chancellor Rachel Reeves has only £23.6 billion headroom. Every percentage point yield rise costs £15 billion annually by 2030. Burnham may loosen fiscal rules to break decisively with the past.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Andy%20Burnham%20wants%20change%20to%20define%20his%20leadership.pdf"}, {"id": "bt-02", "title": "Asia's demand for Middle Eastern oil slows after three-week buying spree", "source": "BT", "date": "25 Jun 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Asian refiners have slowed Middle Eastern crude purchases after a three-week buying spree, with majors and traders like Shell and Mercuria absorbing surplus barrels. Abu Dhabi's Adnoc sold around 60 million barrels loading June-August across its first three tenders, mostly to Asia, with some now flowing to Europe as China steps back. Most refiners have completed June-July orders and would need steep discounts to buy more. Iraq and Kuwait are ramping output ahead of a possible Strait of Hormuz reopening as Iran war talks progress. Prices for Dubai and Murban benchmarks have tumbled into a bearish contango. A US waiver allowing Iranian oil adds supply, though financing and insurance risks persist. Floating storage remains uneconomic.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Asia%E2%80%99s%20demand%20for%20Middle%20Eastern%20oil%20slows%20after%20three-week%20buying%20spree.pdf"}, {"id": "bt-03", "title": "Australia consumer prices slip in May, but core inflation tops forecasts", "source": "BT", "date": "25 Jun 2026", "tags": ["Finance & Markets"], "summary": "Australian consumer prices fell 0.7 per cent in May as petrol, clothing and holiday travel costs dropped, slowing annual inflation to 4 per cent from 4.2 per cent, below the 4.3 per cent forecast. But core trimmed-mean inflation rose 0.4 per cent (versus 0.3 per cent expected), lifting its annual pace to 3.6 per cent, keeping a further rate rise possible. The Australian dollar held flat at US$0.6917; three-year bond yields slipped to 4.399 per cent. Markets price a 22 per cent chance of an August RBA hike. The RBA has raised rates three times this year to 4.35 per cent to counter a war-driven energy shock, reversing all 2025 easing. Lower oil prices help, but the RBA remains wary of secondary energy effects.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Australia%20consumer%20prices%20slip%20in%20May,%20but%20core%20inflation%20tops%20forecasts.pdf"}, {"id": "bt-04", "title": "CapitaLand Investment secures approval for its second C-Reit at 4.8 billion yuan", "source": "BT", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "CapitaLand Investment (CLI) announced on Jun 22 it received registration approval for its second China commercial Reit, the CapitaLand Commercial C-Reit, holding two assets appraised at around 4.8 billion yuan (S$917.4 million), with a proposed fundraising of nearly 3.9 billion yuan. The assets are Raffles City Shenzhen, a prime Nanshan-district complex of mall, offices and serviced apartments, and CapitaMall Fucheng in Mianyang, Sichuan, spanning 340,046 sq m combined. Listing is expected in Q2 or Q3 2026, with plans to combine it with CapitaLand Consumption C-Reit. CLI, the sponsor and operating manager, will hold a 20 per cent stake. The move follows its Sep 2025 listing of China's first retail C-Reit with an international sponsor. CLI manages 43 malls, 27 offices and 252 lodging assets in China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/CapitaLand%20Investment%20secures%20approval%20for%20its%20second%20C-Reit%20at%204.8%20billion%20yuan.pdf"}, {"id": "bt-05", "title": "China's Premier Li downplays global trade disruption fears amid surge in exports", "source": "BT", "date": "25 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "At the World Economic Forum in Dalian on Jun 24, Chinese Premier Li Qiang dismissed fears over China's surging exports, recasting \"China Shock 2.0\" as \"China Opportunity 2.0\" and saying the country now provides the world \"increasing dividends of innovation\". China's trade surplus hit a record US$1.2 trillion last year, drawing scrutiny as partners weigh countermeasures. Li denied subsidies drive competitiveness, joking the government lacks the money, citing instead hard work, a 1.4-billion market and supply chains; he praised Huawei for advancing despite \"external suppression\". Recent data show consumer spending and investment at pandemic-era lows, exposing reliance on exports. German Chancellor Friedrich Merz called for talks on exchange rates, citing currencies possibly undervalued by 30 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/China%E2%80%99s%20Premier%20Li%20downplays%20global%20trade%20disruption%20fears%20amid%20surge%20in%20exports.pdf"}, {"id": "bt-06", "title": "DBS provides US$210 million loan to energy transition partnership under Singapore's blended finance initiative", "source": "BT", "date": "25 Jun 2026", "tags": ["Energy", "Finance & Markets"], "summary": "DBS is providing a US$210 million senior financing facility to EtafCo, the investment vehicle backing the Energy Transition Acceleration Finance (Etaf) partnership's displacement strategy, becoming the fund's inaugural senior debt financier. Announced Jun 24, the loan supports eligible energy transition infrastructure debt including renewable energy, grid modernisation, energy storage and clean solutions that reduce coal-fired power reliance. The first phase targets clean energy and grid projects, while mobilising additional capital for Asia's transition. The move makes DBS the sole commercial bank backing two partnerships within Fast-P, Singapore's blended finance initiative launched by MAS. In May, DBS contributed US$75 million to Fast-P's Green Investments Partnership fund managed by Pentagreen Capital. Sustainable finance head Shilpa Gulrajani cited the need for pragmatic, scalable financing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/DBS%20provides%20US210%20million%20loan%20to%20energy%20transition%20partnership%20under%20Singapore%E2%80%99s%20blended%20finance%20initiative.pdf"}, {"id": "bt-07", "title": "Don't 'park the bus' with S-Reits. Now is the time for a goal rush", "source": "BT", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "This commentary argues the worst is likely over for Singapore Reits (S-Reits) and investors should go on the offensive rather than play defensively. Using a World Cup metaphor, it likens an overly cautious S-Reit allocation to \"parking the bus\" -- defending a goalless draw -- and notes that just as Cape Verde drew with Spain and Uruguay through defence, no tournament is won without attacking. The piece references the ever-dependable nature of these trusts but suggests better opportunities may lie elsewhere, urging investors to send capital \"forward to score\" amid an improving outlook for the sector.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Don%E2%80%99t%20%E2%80%98park%20the%20bus%E2%80%99%20with%20S-Reits.%20Now%20is%20the%20time%20for%20a%20goal%20rush.pdf"}, {"id": "bt-08", "title": "Employers want AI-fluent employees. Hiring them is the challenge", "source": "BT", "date": "25 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "Despite soaring demand and salary premiums for AI skills, employers struggle to hire genuinely AI-fluent talent. A 2026 KPMG study found only 5 per cent of users at AI-using firms are sophisticated enough to drive value. A TestGorilla survey of 2,000 US and UK employers found 71 per cent have defined AI fluency and 50 per cent built measurement criteria, yet 59 per cent still made a bad AI hire. The problem is defining fluency as mere tool use. Anthropic's AI Fluency Index, scoring description, delegation and discernment, found 85.7 per cent of conversations showed iteration skills, but only 5.5 per cent fact-checked polished outputs. The piece urges shifting interviews from storytelling toward competency-based evaluation, such as real-time auditing of AI outputs, to test human oversight.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Employers%20want%20AI-fluent%20employees.%20Hiring%20them%20is%20the%20challenge.pdf"}, {"id": "bt-09", "title": "Japan plans to better manage war chest for yen intervention", "source": "BT", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Japan's government plans to examine improving management of its US$1.3 trillion foreign exchange reserves, a war chest for yen intervention, per a draft growth strategy reviewed by Reuters. The plan, central to PM Sanae Takaichi's agenda, aims to boost returns and replenish strained finances amid pledges of proactive spending. Tokyo resumed massive intervention in late April when the yen slid past 160 per dollar, with a US$73 billion yen-buying operation that caused a record 5.6 per cent reserves drop in May. The reserves are largely held in US Treasuries, with surplus income funding the state budget. Some lawmakers propose a sovereign wealth fund, but officials warn drastic portfolio changes are unrealistic and could undermine safety. Analysts note selling Treasuries would strain US ties; Japan is the largest foreign holder.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Japan%20plans%20to%20better%20manage%20war%20chest%20for%20yen%20intervention.pdf"}, {"id": "bt-10", "title": "Ringgit sinks to seven-month low despite record bond inflows as Fed fears dominate", "source": "BT", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The ringgit fell to its weakest since November, depreciating 1.7 per cent over a week to 4.1349 against the US dollar on Jun 24, despite record foreign bond inflows. Foreign holdings of Malaysian bonds rose nearly RM7.5 billion (Jun 8-15) to a record RM311 billion, reversing prior outflows. Bank Negara's Financial Markets Committee attributed the slide to global drivers: hawkish Fed repricing under new chair Kevin Warsh, firmer US yields, and pre-state-election caution. OCBC's Christopher Wong sees USD/MYR at 4.15 by end-2026; SMBC's Jeff Ng now expects above RM4, eyeing possible Fed hikes. Analysts call it a correction, not a depreciation trend. The Singdollar is seen outperforming on MAS's tight policy. BNM will encourage corporates to repatriate overseas earnings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Ringgit%20sinks%20to%20seven-month%20low%20despite%20record%20bond%20inflows%20as%20Fed%20fears%20dominate.pdf"}, {"id": "bt-11", "title": "Singapore tech unfazed by global sell-off on low AI exposure, supportive macro data", "source": "BT", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Singapore tech stocks largely escaped a global tech sell-off on Jun 24, swinging narrowly between gains and losses, thanks to low exposure to crowded AI trades and supportive macro data. The overnight rout hit AI hardware names like Nvidia and memory makers SK Hynix and Samsung amid rate-hike fears and inflated valuations. Asian stocks fell over 2 per cent on Tuesday; South Korea's Kospi plunged over 6 per cent before rebounding 4 per cent. Analysts (RHB's Alfie Yeo, OCBC's Carmen Lee, SGX's Geoff Howie) cite three reasons for Singapore's resilience: lower exposure to overheated semiconductor trades, valuations grounded in earnings and order books, and supportive domestics. Core inflation held at 1.4 per cent in May, below the 1.6 per cent forecast, with MAS expected to hold policy in July.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Singapore%20tech%20unfazed%20by%20global%20sell-off%20on%20low%20AI%20exposure,%20supportive%20macro%20data.pdf"}, {"id": "bt-12", "title": "Supply chain shocks, labour and power constraints weighing on Apac building boom: report", "source": "BT", "date": "25 Jun 2026", "tags": ["Trade", "Southeast Asia"], "summary": "A Linesight report (Jun 24) finds the Asia-Pacific construction boom facing mounting execution pressures from supply chain disruptions, labour shortages and power constraints, making delivery the top challenge. The Middle East conflict pushed the global supply chain pressure index to its highest since July 2022. Strong demand for semiconductors and AI equipment buffers exports across Malaysia, Singapore, Taiwan, South Korea and China, but higher oil and gas prices fuel inflation. Singapore construction output is set to rise 4.5 per cent in 2026 (T5, Marina Bay Sands expansion, hospitals, rail), with 3.5-4.5 per cent inflation. India leads Apac data centre development with a US$114 billion pipeline. Copper rose 9-18 per cent QoQ in Q1; 25 per cent of data centre suppliers already exceed 80 per cent capacity utilisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Supply%20chain%20shocks,%20labour%20and%20power%20constraints%20weighing%20on%20Apac%20building%20boom%20report.pdf"}, {"id": "bt-13", "title": "The AI threat is already within banks", "source": "BT", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "This commentary warns that South-east Asian banks have handed credit, fraud and compliance decisions to autonomous AI they cannot fully explain or audit. It illustrates how attackers can \"train\" fraud models via small test transactions until a S$50,000 transfer looks normal. In May, MAS summoned bank CEOs over AI-enabled cyber risk; minister Tan Kiat How called fully autonomous attack agents inevitable. Legacy controls -- selfie-liveness, SMS OTPs, quarterly model refreshes -- are near obsolete against deepfakes and SIM-swap fraud. A 2022 Forrester study found 89 per cent of banks already adopting such tools. The bigger risk is internal \"shadow AI\". Recommendations: continuous behavioural checks, governing AI agents like employees (owner, scope, audit trail, kill switch, citing GovTech's June AI agent registry), and real-time defence updates. The writer is chief data and AI officer at TrustDecision.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/The%20AI%20threat%20is%20already%20within%20banks.pdf"}, {"id": "bt-14", "title": "Unitree's IPO will test the 'embodied AI' valuation shortcut", "source": "BT", "date": "25 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese humanoid-robot maker Unitree Robotics is reportedly seeking around 4.2 billion yuan (S$802 million) in a planned Shanghai listing, implying roughly 25 times its 1.7 billion yuan 2025 revenue. Its listing will test the broad \"embodied AI\" label financing the sector. Unitree posted a 60.4 per cent gross margin and ~591 million yuan net profit (ex-items) in 2025, more mature than rivals UBTech, Dobot, Deep Robotics and Leju Intelligence. Comparisons show investors may pay more for operating maturity than the humanoid label: loss-making Leju trades at ~17 times sales, while industrial specialist Deep Robotics (337 million yuan revenue, ~53 per cent margin, ~80 per cent industrial revenue) filed at ~41 times. A successful Unitree listing would set a live benchmark, forcing clearer distinctions between robotics propositions -- relevant for South-east Asian manufacturers weighing task-specific versus general-purpose platforms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Unitree%E2%80%99s%20IPO%20will%20test%20the%20%E2%80%98embodied%20AI%E2%80%99%20valuation%20shortcut.pdf"}, {"id": "bt-15", "title": "Who captures the value in Singapore's S$37 billion frontier tech bet?", "source": "BT", "date": "25 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "This commentary argues that despite the world spending a projected US$2.5 trillion on AI in 2026 -- with five US hyperscalers deploying US$700 billion in capex -- nearly all enterprise value remains uncaptured, as pure-play AI vendor revenue will be under US$100 billion (4 per cent of infrastructure spend). Value will accrue at the application layer. The writer frames frontier tech in three layers (intelligent SaaS, \"AI inside\", deep tech) that fragment into vertical \"uncountable large niches\"; vertical AI captured US$3.5 billion in 2025 (healthcare over 40 per cent). McKinsey found 88 per cent of firms use AI but only 6 per cent see bottom-line impact -- the deployment gap. Singapore's S$37 billion RIE2030 plan and full-stack position make it a neutral anchor amid US-China decoupling, despite a severe regional VC reckoning (only four funds closed in 2025).", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20BT/Who%20captures%20the%20value%20in%20Singapore%E2%80%99s%20S37%20billion%20frontier%20tech%20bet.pdf"}, {"id": "scmp-01", "title": "Airbus to inspect 16 A380 planes after cracks found on wings", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Society"], "summary": "Airbus said on Tuesday it will inspect 16 A380 superjumbos, five of them immediately, after cracks were found in a key wing-spar structure on jets used by Emirates and Qantas. The European Union Aviation Safety Agency (EASA) ordered urgent checks of the structural beam carrying aerodynamic load during flight. Of the 16 planes, 15 are operated by Emirates and one by Qantas; the five immediate inspections, all Emirates aircraft, were due as soon as Wednesday. The remaining 11 must be checked before their 13th flight (25 cycles). The cracks, which \"could reduce the structural integrity of the wing\", were found during inspections ordered in a December 2025 directive. The A380 faced similar wing-bracket cracks in 2012, forcing a costly repair programme.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Airbus%20to%20inspect%2016%20A380%20planes%20after%20cracks%20found%20on%20wings.pdf"}, {"id": "scmp-02", "title": "Alibaba slashes Qwen AI model price during US working hours in fight for users", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Technology & AI"], "summary": "Alibaba has cut prices for its flagship Qwen AI models by up to 80 per cent on its Qoder agentic coding platform to attract global developers and compete with rivals like Anthropic and Zhipu AI. The company said on X it was cutting Qwen3.7-Max by 80 per cent and Qwen3.7-Plus by 60 per cent for international users from 10pm to 8am Beijing time, a window matching 10am to 8pm US Eastern Time to capture American users. The move follows US restrictions: when Anthropic blocked global access to Claude Fable 5, Zhipu AI released GLM-5.2. Chairman Joe Tsai said AI could represent a US$50 trillion market. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Alibaba%20slashes%20Qwen%20AI%20model%20price%20during%20US%20working%20hours%20in%20fight%20for%20users.pdf"}, {"id": "scmp-03", "title": "America's 'biggest risk' on AI is China getting ahead, Bessent says", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "US Treasury Secretary Scott Bessent said on Tuesday that China surpassing the United States on AI is the \"biggest risk\" of the technology, outweighing safety or job-loss concerns. Speaking at the Economic Club of New York, he said China's willingness to discuss AI showed America's lead, which it must maintain. Both nations agreed to formal AI governance talks after Trump-Xi discussions in Beijing last month. Bessent warned that attempts to \"weaponise supply chains\" would face retaliation. His comments came a day after China placed export controls on 10 US entities, including rare earth firms MP Materials and USA Rare Earth, and blacklisted 46 US firms from procurement. Washington keeps strict export controls on advanced AI chips, with a rare exception for Nvidia's H200.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/America%E2%80%99s%20%E2%80%98biggest%20risk%E2%80%99%20on%20AI%20is%20China%20getting%20ahead,%20Bessent%20says.pdf"}, {"id": "scmp-04", "title": "As China plans for demographic crisis, some sectors see opportunity", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "As China becomes one of the world's fastest-ageing economies, Goldman Sachs says pharmaceutical and biotech sectors could be the biggest winners, while carmakers and tech hardware makers face headwinds. In a Monday report, the bank projected Hong Kong and mainland China would reach first and eighth in the global ageing ranking by 2050, up from 11th and 26th in 2023. Top buy-rated Chinese names include Bluestar Adisseo, WuXi XDC, Sichuan Kelun-Biotech and Zai Lab. Developed economies will add roughly 4 million retirees aged 65-plus yearly while core consumers (35-55) shrink about 3 million annually from 2030. Leisure, pet care and home furnishings benefit; apparel, education and electronics face declining youth demand. SAIC Motor was singled out among carmakers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/As%20China%20plans%20for%20demographic%20crisis,%20some%20sectors%20see%20opportunity.pdf"}, {"id": "scmp-05", "title": "China closes another offshore investing loophole as TRS faces restrictions", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Finance & Markets"], "summary": "Chinese regulators have tightened total return swaps (TRS), one of the remaining channels for gaining offshore asset exposure through derivatives, as Beijing closes loopholes and curbs domestic investors' access to higher-risk overseas markets. Rather than a high-profile crackdown like last month's action against unlicensed brokers Futu and Tiger Brokers, regulators used \"window guidance\" - verbal instructions delivered to domestic brokerages on Tuesday evening. Brokerages were told to suspend expansion of offshore-related portfolios, including new TRS contracts and increases to existing mandates, though existing portfolios face no immediate liquidation. The move responds to massive inflows of high-net-worth capital into surging global tech stocks across US, Japanese and South Korean equities. TRS avoids direct cross-border capital transfers, making it popular as other channels narrowed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/China%20closes%20another%20offshore%20investing%20loophole%20as%20TRS%20faces%20restrictions.pdf"}, {"id": "scmp-06", "title": "China targets face of international space cooperation in corruption crackdown", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Politics", "Defence"], "summary": "Senior Chinese defence official Bian Zhigang is under investigation for corruption, the latest target in Beijing's sweeping military-sector crackdown. Bian, deputy head of the State Administration of Science, Technology and Industry for National Defence (SASTIND) and deputy director of the China National Space Administration, was suspected of \"serious violations of discipline and law\", the Central Commission for Discipline Inspection said on Wednesday. He had been the face of international cooperation for China's space exploration, last appearing abroad at the Russian Space Forum in Moscow in April. His profile was scrubbed from official sites. He is the second SASTIND deputy head investigated within a year, after Zhang Jianhua's October expulsion. Other targets include former Politburo member Ma Xingrui and ex-AVIC chairman Tan Ruisong, given a suspended death sentence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/China%20targets%20face%20of%20international%20space%20cooperation%20in%20corruption%20crackdown.pdf"}, {"id": "scmp-07", "title": "China's JCET to build new plant in Shanghai to expand advanced chip packaging", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Technology & AI"], "summary": "Chinese chip-packaging and testing giant Jiangsu Changjiang Electronics Technology (JCET) said it will invest 7.8 billion yuan (US$1.15 billion) to build a new advanced packaging and testing plant in Shanghai's Lin-gang Special Area, as demand for home-grown chips surges amid AI development. A controlled subsidiary with 4 billion yuan registered capital will construct the factory, rolled out in two phases with the first completing in the second half of 2028. Advanced packaging has become critical to China's chipmaking as US export controls restrict access to foundries like TSMC. JCET's Shanghai-listed shares have surged 147 per cent this year. It reported record 2025 revenue of 38.87 billion yuan, up 8.1 per cent, though net profit fell 2.75 per cent. CEO Zheng Li calls packaging core to the post-Moore's Law era.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/China%E2%80%99s%20JCET%20to%20build%20new%20plant%20in%20Shanghai%20to%20expand%20advanced%20chip%20packaging.pdf"}, {"id": "scmp-08", "title": "China's central bank sets weaker yuan midpoint against US dollar for third day", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Finance & Markets"], "summary": "Chinese authorities weakened the yuan's midpoint against the US dollar for a third trading day, despite European Central Bank chief Christine Lagarde joining calls highlighting the currency's supposed undervaluation. The People's Bank of China set the midpoint at 6.8195 per US dollar, compared with 6.8171 on Tuesday and a three-year high of 6.8088 on June 15. The offshore yuan traded weaker at 6.79. Bank J. Safra Sarasin forecasts 6.50 by year-end, while many analysts expect the central bank to prefer caution and avoid quick appreciation. The yuan has gained about 3.6 per cent against the dollar this year. China's US$1.19 trillion merchandise trade surplus has fuelled discussion. Lagarde urged G7 leaders to discuss \"excessive imbalances\" including currency aspects.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/China%E2%80%99s%20central%20bank%20sets%20weaker%20yuan%20midpoint%20against%20US%20dollar%20for%20third%20day.pdf"}, {"id": "scmp-09", "title": "China's telecoms giants bet on 'air-space-ground-sea' networks for future AI needs", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Technology & AI"], "summary": "China's telecoms giants are pushing \"air-space-ground-sea\" networks amid Beijing's drive to expand AI infrastructure, executives said at the opening of Mobile World Congress Shanghai on Wednesday. Huawei rotating chairman Wang Tao said internet coverage should extend from 20 per cent on the ground to 100 per cent across high altitudes, oceans and deserts, expecting up to 1 trillion AI agents globally by 2030. China Tower's Zhang Zhiyong cited over 6.2 million base stations, including 3.28 million for 5G. China Mobile's Chen Zhongyue is accelerating \"air-space-ground integrated networks\" and 6G research. The push comes as telecoms revenue growth plummeted from nearly 10 per cent in 2022 to under 1 per cent last year. China has launched underwater data centres off Hainan and Shanghai, ahead of SpaceX's US$75 billion market debut.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/China%E2%80%99s%20telecoms%20giants%20bet%20on%20%E2%80%98air-space-ground-sea%E2%80%99%20networks%20for%20future%20AI%20needs.pdf"}, {"id": "scmp-10", "title": "Exclusive: Dutch semiconductor giants join delegation to China as US pushes chip export curbs: source", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Technology & AI", "Trade", "Geopolitics"], "summary": "Representatives from ASML and NXP will be among 17 business executives joining Dutch Trade Minister Sjoerd Sjoerdsma on his early-July China trip, though Nexperia, entangled in a legal battle with Chinese owner WingTech, will not, a source told the SCMP. Executives agreed to join on condition Sjoerdsma avoid raising human rights or Taiwan arms sales. The trip comes as the Netherlands navigates US pressure over semiconductor supply chains, having objected in May to Washington's proposed Match Act, which would further restrict ASML's China business. Sjoerdsma met US Commerce Secretary Howard Lutnick in Washington on Tuesday and signed on as a full member of the \"Pax Silica\" initiative. He arrives in Beijing on July 6 to meet Commerce Minister Wang Wentao, then travels to Shanghai.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/ExclusiveDutch%20semiconductor%20giants%20join%20delegation%20to%20China%20as%20US%20pushes%20chip%20export%20curbs%20source.pdf"}, {"id": "scmp-11", "title": "Inside China's ideological training camp where PLA top brass study Xi's speeches", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Politics", "Defence"], "summary": "Hundreds of China's top military officials spent weeks at an unprecedented ideology training camp - studying President Xi Jinping's speeches, reading corrupt cadres' confessions and marching in formation - as the military anti-corruption drive deepens. Details published Wednesday in the PLA Daily said Xi personally decided to launch the 10-week exercise, which began April 8 and concluded last week. It offered over 40 lectures and case studies on corrupt individuals, with officials divided into groups on operations, logistics and technology. Defence Minister Dong Jun attended the opening. The drive has felled dozens of leaders; of seven Central Military Commission members named in 2022, only two remain - Xi and anti-corruption chief Zhang Shengmin. Xi warned there must be \"no sanctuary for the corrupt\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Inside%20China%E2%80%99s%20ideological%20training%20camp%20where%20PLA%20top%20brass%20study%20Xi%E2%80%99s%20speeches.pdf"}, {"id": "scmp-12", "title": "Is Malaysia risking its world-class coral reefs for offshore oil?", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Environment", "Energy", "Southeast Asia"], "summary": "A first-of-its-kind report by environmental watchdog RimbaWatch found 86.8 per cent of Malaysia's sensitive marine environments lie in oil production areas, raising concerns over Sabah's world-class reefs in the Coral Triangle, home to over 76 per cent of the world's coral species. Released June 8, the report maps offshore oil and gas blocks against reefs, finding overlap with 40 per cent of mapped shallow reefs and identifying 305 wells, 64 platforms and 822km of pipelines in sensitive areas. Only 5.3 per cent of Malaysia's waters are formal marine protected areas, which co-founder Adam Farhan called \"paper parks\". Petronas launched Malaysia Bid Round 2026 and seeks US$12.1-14.5 billion in annual upstream investment. The report recommends excluding oil and gas from protected areas.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Is%20Malaysia%20risking%20its%20world-class%20coral%20reefs%20for%20offshore%20oil.pdf"}, {"id": "scmp-13", "title": "Kim says North Korea to arm navy with nuclear weapons, build bigger warships", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "North Korean leader Kim Jong-un said his country was \"equipping the navy with nuclear weapons\" and unveiled plans to build 10,000-tonne warships, state media reported Wednesday. The remarks came at the commissioning of the Choe Hyon, one of two 5,000-tonne class warships launched last year, in Nampo on Tuesday, KCNA reported. Kim said the nuclear-arming programme was following its planned course and called it strategically crucial. He plans to commission destroyer Kang Kon next, then launch 10,000-tonne strategic warships, aiming to build two larger-class surface ships yearly. At a party plenary that ended Monday, Kim cited South Korean and US modernisation as pushing the region toward nuclear war. Pyongyang has declared itself an \"irreversible\" nuclear state since the 2019 Hanoi summit with Trump collapsed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Kim%20says%20North%20Korea%20to%20arm%20navy%20with%20nuclear%20weapons,%20build%20bigger%20warships.pdf"}, {"id": "scmp-14", "title": "PLA's advanced aircraft carrier Fujian transits Taiwan Strait amid military drills", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "The People's Liberation Army's most advanced aircraft carrier, the Fujian Type 003, transited the Taiwan Strait on Tuesday, a day after Taipei launched a five-day combat readiness exercise. Military commentator Song Zhongping said the Fujian could be returning to its Hainan home port before heading to the South China Sea for training. Taiwan's armed forces closely monitored the vessel using joint intelligence and surveillance, releasing a photo showing an empty deck. The Immediate Combat Readiness Exercise tests whether units can quickly deploy after receiving orders. Beijing sees Taiwan as part of China to be reunited by force if necessary. The Fujian, the world's biggest conventionally powered warship, is Beijing's first carrier with electromagnetic catapults, making China the second country after the US with such technology.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/PLA%E2%80%99s%20advanced%20aircraft%20carrier%20Fujian%20transits%20Taiwan%20Strait%20amid%20military%20drills.pdf"}, {"id": "scmp-15", "title": "Rebuking Trump, US Senate joins House in vote to end Iran war", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "The US Senate voted 50-48 on Tuesday for a war powers resolution directing President Trump to halt military action against Iran, joining the House, which passed it earlier this month. It marked the first time both chambers passed such a resolution since the War Powers Act of 1973. The unpopular conflict began February 28 when the US and Israel attacked Iran; a Reuters/Ipsos poll found just one in four Americans believe it was worth the cost. Four Republicans - Collins, Paul, Cassidy and Murkowski - joined Democrats, while Democrat Fetterman voted against. Trump called the vote \"poorly timed and meaningless\". The White House says the measure has no force of law; legal experts note constitutionality remains unsettled. The administration is negotiating a peace deal with Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Rebuking%20Trump,%20US%20Senate%20joins%20House%20in%20vote%20to%20end%20Iran%20war.pdf"}, {"id": "scmp-16", "title": "Record-breaking bridges in eastern China to boost port and railway connections", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Society"], "summary": "China has completed the main span of a record-breaking sea bridge at Ningbo-Zhoushan port, expected to improve logistics at the world's busiest cargo port. The 2,212-metre Qinglongmen Grand Bridge in Zhejiang province is the world's longest three-tower cable-stayed bridge, featuring twin 756-metre main spans and 249-metre towers. Built by two China Railway Construction Corporation subsidiaries, it is part of a 17.6 billion yuan (US$2.6 billion) programme launched in 2022. The port handled a record 1.4 billion tonnes of cargo last year, its 17th consecutive year as the world's busiest by throughput. China also completed main towers of the nearly 30km Hangzhou Bay Cross-Sea Railway Bridge, the world's longest railway bridge over the sea, designed for 350 km/h trains, with deck connection expected by October.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Record-breaking%20bridges%20in%20eastern%20China%20to%20boost%20port%20and%20railway%20connections.pdf"}, {"id": "scmp-17", "title": "Southbound Stock Connect flows surge to record US$152b driven by Hong Kong's IPO revival", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Finance & Markets"], "summary": "Southbound Stock Connect flows, through which mainland Chinese investors buy Hong Kong-listed shares, hit a record high, reflecting strong confidence in the city's market amid a booming IPO pipeline. In the 12 months to March, mainland investors bought HK$1.19 trillion (US$151.8 billion) worth of Hong Kong shares, according to the Securities and Futures Commission's annual report published Wednesday. Average daily southbound turnover jumped 84 per cent year on year to HK$124.1 billion, equal to 24 per cent of the city's total market turnover, up from 20 per cent a year earlier. SFC chairman Kelvin Wong Tin-yau cited macroeconomic uncertainty, geopolitical shifts and AI shaping global flows, vowing to entrench Hong Kong's position as the financial gateway bridging the mainland and the world.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Southbound%20Stock%20Connect%20flows%20surge%20to%20record%20US%24152b%20driven%20by%20Hong%20Kong%E2%80%99s%20IPO%20revival.pdf"}, {"id": "scmp-18", "title": "Trump cancels signing of key US housing bill until Save America Act is passed", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Politics"], "summary": "President Trump cancelled his plan to sign a bipartisan affordable housing bill on Wednesday to pressure Republicans to pass the long-stalled Save America Act, a package of national voting restrictions, exposing party fissures and limits of his power. The voting package would require photo ID and proof of citizenship to register, and force states to turn over voter rolls. The housing bill can become law anyway if unsigned within 10 days, and lawmakers believe they can override a veto. Trump made a rare Capitol visit to lobby senators. Although Republicans control 53 of 100 seats, they lack the 60 votes for the filibuster threshold, with five failed votes since mid-March. The cancellation comes amid low-ebb relations after Tuesday's Senate vote to halt Iran military action.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Trump%20cancels%20signing%20of%20key%20US%20housing%20bill%20until%20Save%20America%20Act%20is%20passed.pdf"}, {"id": "scmp-19", "title": "Ukraine drones knock out power in Russia-held Crimea's biggest city", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "Ukrainian drones knocked out power in Sevastopol, the biggest city in Russian-held Crimea, on Wednesday and targeted facilities in central and southern Russia, underscoring the reach of Kyiv's attacks on energy infrastructure. Governor Mikhail Razvozhayev said trolleybuses would not operate and parents should keep children at home. Ukraine's drone commander Robert Brovdi said drones hit the main substation at the Sevastopol power plant. In Nizhny Novgorod, home to Russia's fourth-largest oil refinery, falling drone debris damaged a facility and killed two people. Russia's defence ministry said air defences shot down 323 drones overnight. Ukraine's strategy targets Russian energy facilities to sap war funds. President Putin accused Kyiv of trying to destabilise Russian society and promised additional measures to offset the strikes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/Ukraine%20drones%20knock%20out%20power%20in%20Russia-held%20Crimea%E2%80%99s%20biggest%20city.pdf"}, {"id": "scmp-20", "title": "'Dangerous moment': academic calls for US expulsion from WTO over protectionism", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "The WTO should expel the United States to signal its protectionist policies and weaponisation of trade are unacceptable, said Kristen Hopewell, a University of British Columbia professor, at the World Economic Forum's Summer Davos in Dalian. She warned \"protectionism is contagious\" and that allowing the US to violate rules undermines the system. The WTO's Appellate Body has been disabled since late 2019 as the US blocks new judges. Trump announced sweeping tariffs in April 2025, but the US Supreme Court struck them down as unconstitutional in February. Hopewell noted China was among the few to retaliate directly, yet faces a \"credibility problem\" given its ballooning trade surplus and industrial overcapacity. She said China could build trust through deals like its tariff-free regime for Africa.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/%E2%80%98Dangerous%20moment%E2%80%99%20academic%20calls%20for%20US%20expulsion%20from%20WTO%20over%20protectionism.pdf"}, {"id": "scmp-21", "title": "'War of words' won't stop Iran nuclear inspections, says IAEA", "source": "SCMP", "date": "25 Jun 2026", "tags": ["Geopolitics"], "summary": "The IAEA dismissed conflicting signals from Tehran and Washington and said it expects to resume full monitoring of Iran's near-bomb-grade uranium stockpile. Director General Rafael Grossi said \"there's a war of words\" after Trump threatened on Tuesday to halt peace talks if Iran refused IAEA inspections, while Iran's foreign ministry said there were no immediate plans for visits. The 60-day negotiating window, extendable by consent, expires around mid-August, with talks focused on a decade-long moratorium on uranium enrichment. The IAEA wants access to sites bombed by the US and Israel in June 2025, where 441kg of highly enriched uranium and almost 8,600kg of lower enriched material was last seen. Before returning to Isfahan, Fordow and Natanz, Iran must submit an overdue Article 68 report.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/25%20Jun%202026/25%20Jun%20SCMP/%E2%80%98War%20of%20words%E2%80%99%20won%E2%80%99t%20stop%20Iran%20nuclear%20inspections,%20says%20IAEA.pdf"}]}, "2026-06-26": {"date": "2026-06-26", "dayOfWeek": "Friday", "totalArticles": 63, "sourceCounts": {"WSJ": 17, "ST": 9, "BT": 13, "SCMP": 24}, "executiveDigest": "Micron's blockbuster results and a planned US$29.65 billion SK Hynix US listing reignite the AI-chip trade even as US inflation hits a three-year high of 4.1% and the data-centre build-out emerges as a 'third wave' of inflation; oil tumbles below US$75 as a reopened Strait of Hormuz floods the market, while China's LineShine supercomputer and near-80% domestic AI-server share signal an intensifying US-China tech race.", "briefingCards": [{"title": "Lead story - Micron silences the AI doubters", "body": "Micron blew past forecasts, sending shares up 14% after hours and countering a multi-day tech sell-off that earlier hit Nvidia (-5.5%) and Oracle (-15%). SK Hynix filed for a US$29.65 billion Nasdaq listing (trading from July 10) - among history's biggest share sales, rivalling Saudi Aramco - while OpenAI and Broadcom unveiled a custom AI-inference chip and Qualcomm agreed to buy Modular for $3.9 billion. But WSJ warns the data-centre boom is becoming a 'third wave of inflation': hyperscaler capex is set at $741 billion (up ~75%), and Apple's Tim Cook flagged cost jumps 'unlike anything in 40 years'."}, {"title": "Markets & finance", "body": "US PCE inflation hit a three-year high of 4.1% (core 3.4%) as consumer spending accelerated, keeping pressure on the Fed to raise rates this year. Big US banks aced an easier annual stress test and several raised dividends. Gold sank below US$4,000 an ounce - down nearly 30% from its peak - prompting major Chinese banks (ICBC, Postal Savings) to suspend retail bullion trading. Singapore banks DBS, OCBC and UOB, up 15-26% year-to-date, could see earnings lift from a higher-for-longer Fed under new chair Kevin Warsh."}, {"title": "Asia realignment", "body": "China tested missiles on a US-warship replica and slammed US and European concerns over coastguard patrols near Taiwan, even as Taiwan launched its first-ever non-stop flights to Washington - a symbolic milestone - and Trump backed the 'Six Assurances' but set no arms-sale timeline. A former minister warned Japan and South Korea 'only have each other' as US reliability wavers, while WSJ examined how Beijing is undercutting Washington in Iran. The US is also shifting South China Sea reconnaissance toward drones and the Philippines."}, {"title": "Energy & climate", "body": "A reopened Strait of Hormuz is flooding oil markets: Brent fell below US$75 (from above US$140 in April), with Angolan crude at decade-wide discounts and Iran shipping 30 million barrels to Asia under a US license; oil is back to pre-war levels. Yet US pump prices remain sticky near $3.93 a gallon, prompting Trump to accuse Big Oil of 'gouging' and order a DOJ probe. Allianz estimates US$125 billion of vessels and cargo remain stranded in the Gulf, and Europe braces for a 35C-plus heatwave."}, {"title": "Technology & AI", "body": "The US-China tech race sharpened. China's LineShine supercomputer overtook the US as the world's fastest - 22% quicker than Lawrence Livermore's El Capitan - running on domestic CPUs; Huawei and Cambricon are set to take nearly 80% of China's AI-server market, squeezing Nvidia; and DeepSeek launched an AGI hiring spree. Washington's 'Pax Silica' China-free supply-chain bloc expanded to the EU, Germany and the Netherlands, and the US assured India it would not trigger an AI 'kill switch' after abruptly banning Anthropic's Fable 5 and Mythos 5 models."}, {"title": "Singapore & SEA focus", "body": "OUE Reit is selling Crowne Plaza Changi Airport for S$500 million to a Tokyo Century joint venture, distributing S$20 million in special payouts and cutting leverage to 36.6%, while Frasers Property reshuffles its hotel portfolio in a $2.1 billion revamp. URA released two smaller housing sites in Sin Ming and Kallang, PayNow rolled out a unified QR experience, and a survey shows Singapore investors tilting toward capital preservation. Japan's PM Takaichi unveiled a 370-trillion-yen (S$3 trillion) long-term investment plan, with 101.6 trillion yen earmarked for AI and chips."}], "keyMetrics": [{"value": "63", "label": "Articles curated today", "sub": "WSJ 17 · ST 9 · BT 13 · SCMP 24"}, {"value": "+14%", "label": "Micron after-hours", "sub": "Earnings quiet AI doubters"}, {"value": "US$29.6b", "label": "SK Hynix US listing", "sub": "Among biggest since Aramco"}, {"value": "4.1%", "label": "US PCE inflation", "sub": "Three-year high; Fed pressure"}, {"value": "<US$75", "label": "Brent crude", "sub": "Hormuz reopening floods supply"}, {"value": "S$500m", "label": "OUE Reit hotel sale", "sub": "Crowne Plaza Changi divested"}], "articles": [{"id": "wsj-01", "title": "A Turkish Arms Sale Leads to a Face-Off Between Trump and Congress", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Defence", "Geopolitics", "Politics"], "summary": "The Trump administration plans to override Rep. Gregory Meeks (D., N.Y.), who placed a hold on a proposed $750 million sale of U.S.-made F-110 jet engines to Turkey for its KAAN fighter program. Meeks cited Turkey's retention of a Russian S-400 air-defense system bought roughly a decade ago, a dispute that also blocked Turkey's F-35 purchase. The administration told Congress it would bypass review, with Meeks decrying \"open contempt for Congress's oversight authority.\" An official praised Trump's relationship with President Erdogan. Turkey, NATO's second-largest army, hosts an alliance summit Trump plans to attend in Ankara in July, and helped broker Iran ceasefire talks. NATO defenses downed Iranian missiles aimed at a U.S.-Turkish base.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/A%20Turkish%20Arms%20Sale%20Leads%20to%20a%20Face-Off%20Between%20Trump%20and%20Congress.pdf"}, {"id": "wsj-02", "title": "Around $125 Billion of Vessels, Cargo Remain Stranded in Persian Gulf, Allianz Says", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Trade", "Geopolitics", "Energy"], "summary": "Allianz Commercial said geopolitical uncertainty is now the shipping industry's top risk, with vessels and cargo worth around $125 billion stuck in the Persian Gulf awaiting resumption of transit through the Strait of Hormuz. Its Wednesday industry review said roughly 1,150 cargo-carrying vessels and as many as 20,000 seafarers are stranded amid the strait's closure and reported mining, signaling a \"new maritime order.\" CEO Thomas Lillelund cited a shift from decades of stability to volatility. The insurer cautioned that even if a U.S.-Iran peace deal holds and the strait reopens, solid safe-passage assurances are needed to restore prewar traffic of up to 140 vessels a day, prioritizing resilience over cost efficiency.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Around%20%24125%20Billion%20of%20Vessels,%20Cargo%20Remain%20Stranded%20in%20Persian%20Gulf,%20Allianz%20Says.pdf"}, {"id": "wsj-03", "title": "As AI Companies Race for Power, Amazon and Google Have the Lead", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Technology & AI", "Energy", "Finance & Markets"], "summary": "With power described by Amazon's CEO as the \"single biggest constraint\" in AI, Amazon and Google lead hyperscalers in securing electricity, per data provider Aterio. Amazon's U.S. self-built data centers consume up to roughly 9 gigawatts, comparable to North Dakota's generation capacity, versus about 5 each for Microsoft and Google and 4 for Meta. Amazon is expected to add the most U.S. capacity through 2030, emphasizing cost and reliability, while Google adds capacity fastest and focuses on clean energy, relying more on leases (about a quarter of 2030 capacity). Google bought renewables developer Intersect Power this year and co-locates Texas data centers with solar and wind to skip grid queues.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/As%20AI%20Companies%20Race%20for%20Power,%20Amazon%20and%20Google%20Have%20the%20Lead.pdf"}, {"id": "wsj-04", "title": "Big Banks Ace an Easier Annual Stress Test", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "JPMorgan Chase, Bank of America and peers all passed the Federal Reserve's annual stress test, announced Wednesday, after regulators began disclosing scenarios and models in advance in late 2024. Under a hypothetical severe global recession, capital fell only slightly, staying above minimums; the 32 tested banks would have faced $708 billion in total loan losses, with aggregate capital declining just 1.6%, the smallest drop in seven years. Banks responded with payouts: JPMorgan plans $50 billion in buybacks, Morgan Stanley $20 billion, and Wells Fargo and Goldman Sachs raised dividends. Critics say the Fed gave away the answers. The Trump administration has launched deregulatory reforms benefiting financial firms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Big%20Banks%20Ace%20an%20Easier%20Annual%20Stress%20Test.pdf"}, {"id": "wsj-05", "title": "Chinese Supercomputer LineShine Overtakes U.S. as World's Fastest", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's LineShine system won the No. 1 spot on the latest Top500 supercomputer ranking, calculating 22% faster than No. 2 El Capitan at California's Lawrence Livermore National Laboratory, which helps maintain the U.S. nuclear stockpile. Built by the National Supercomputing Center in Shenzhen and unveiled in April, LineShine relies on domestically developed CPUs rather than GPUs, plus homegrown memory, networking and cooling. The Shenzhen center called it a \"historic step\" toward an independent ecosystem despite U.S. export curbs imposed since 2015. China stopped participating in 2023; this entry signals renewed competition. Designer Lu Yutong said it supports both scientific simulations and AI workloads, though some doubt it matches dedicated AI machines.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Chinese%20Supercomputer%20LineShine%20Overtakes%20U.S.%20as%20World%E2%80%99s%20Fastest.pdf"}, {"id": "wsj-06", "title": "Hegseth Cuts Army Commander's Storied Career Short as Part of Broader Shake-Up", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Defence", "Politics"], "summary": "Gen. Chris Donahue, the top U.S. Army commander in Europe who helped overhaul NATO's defense against Russia and support for Ukraine, will relinquish his command at a July 2 ceremony in Germany, his assignment cut short by Defense Secretary Pete Hegseth. The Pentagon frames it as part of Hegseth's push to cut generals and admirals by 10% overall and four-star positions by 20%, with recommendations due to the Joint Chiefs next week. Donahue, who led Delta Force against ISIS and the 2021 Kabul evacuation, put in retirement papers at the Pentagon's request. Critics including Sen. Jeanne Shaheen say Hegseth is squeezing out accomplished officers for loyalists. Maj. Gen. Christopher Norrie assumes his duties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Hegseth%20Cuts%20Army%20Commander%E2%80%99s%20Storied%20Career%20Short%20as%20Part%20of%20Broader%20Shake-Up.pdf"}, {"id": "wsj-07", "title": "How China Undercuts the U.S. in Iran", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Geopolitics", "Finance & Markets", "Energy"], "summary": "As the White House opens new nuclear talks with Iran, offering sanctions relief and access to roughly $100 billion in frozen assets, that leverage is waning as Tehran uses China's yuan-based financial architecture beyond Washington's reach. Despite sanctions, Iran earned up to $43 billion in oil revenue in 2024, mostly paid in yuan, used to buy Chinese goods and dual-use inputs. The U.S. dollar still anchors roughly 80% of trade finance, letting Washington police transactions. China's CIPS network, a Swift alternative set up in 2015, averaged about 790 billion yuan (around $115 billion) daily over three months since February, up from 680 billion last year. Refiner Hengli will settle future oil in yuan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/How%20China%20Undercuts%20the%20U.S.%20in%20Iran.pdf"}, {"id": "wsj-08", "title": "Mag Seven to Lag Seven: When 'One Decision' Stocks Stumble", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Columnist Spencer Jakab compares the Magnificent Seven to the early-1970s Nifty Fifty \"one decision\" stocks, which crashed but recovered to near-S&P 500 returns by 1997. Micron, up 762% in a year and worth over a trillion dollars, fell 13% Tuesday amid an AI selloff before its earnings. In 2023 and 2024 the Mag Seven drove over half the S&P 500's return, but they have trailed the market in 2026. The Nifty Fifty fetched about 47 times earnings; today's leaders trade at 11 times trailing sales, looking pricier. Jakab warns the Mag Seven are less diversified and lifted by AI, citing Cisco, which regained its 2000 peak only last year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Mag%20Seven%20to%20Lag%20Seven%20When%20%E2%80%98One%20Decision%E2%80%99%20Stocks%20Stumble.pdf"}, {"id": "wsj-09", "title": "Mamdani Deepens His Influence-and the Divide-in the Democratic Party", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Politics", "Society"], "summary": "New York City Mayor Zohran Mamdani, a Democratic socialist who won last year's mayoral primary, showed durable power as all three congressional candidates he endorsed won Tuesday's New York City primaries, ousting two incumbents and a party-backed contender. Strategist Amit Singh Bagga said, \"Mayor Mamdani didn't just pick winners. He made winners.\" Brad Lander unseated two-term Rep. Dan Goldman by linking him to AIPAC, while Claire Valdez and Darializa Avila Chevalier share Mamdani's views on Israel and immigration. Some Democrats fear his rise lets Republicans paint the party as far-left; Attorney General Letitia James warned against blowing up the party. Mamdani hopes to influence November's midterms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Mamdani%20Deepens%20His%20Influence-and%20the%20Divide-in%20the%20Democratic%20Party.pdf"}, {"id": "wsj-10", "title": "Memory-Chip Giant SK Hynix Seeks to Raise $29 Billion in U.S. Listing", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "South Korea's SK Hynix, the world's second-largest memory-chip maker, plans to raise more than $29 billion through a U.S. listing to fund expansion amid the AI boom. Per a Wednesday filing to the Korea Exchange, it aims to raise 45.453 trillion won ($29.65 billion) by issuing American depositary receipts on Nasdaq, with trading expected to begin July 10. The deal would rank among history's biggest share sales, comparable to Saudi Aramco's 2019 IPO and surpassing Alibaba's 2014 U.S. ADR offering. SK Hynix shares have surged about 300% this year, becoming the second South Korean firm past a $1 trillion market value after Samsung. BofA, Citigroup, Goldman Sachs and J.P. Morgan are leading the offering.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Memory-Chip%20Giant%20SK%20Hynix%20Seeks%20to%20Raise%20%2429%20Billion%20in%20U.S.%20Listing.pdf"}, {"id": "wsj-11", "title": "Micron's Blockbuster Earnings Quiet the AI Doubters", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Micron Technology blew past analyst expectations for its May quarter on Wednesday and projected revenue and profit topping Wall Street forecasts, sending shares up 14% after hours and lifting Nasdaq futures. The results countered a dayslong tech selloff that hit South Korean chip makers and U.S. fiber-optic providers; earlier this week Micron slid 7.5%, Nvidia 5.5% and Oracle 15%. Memory and storage stocks have surged 900% to 4,000% over 12 months yet trade below 10 times projected earnings amid skepticism. Micron is locking in high prices via four long-term agreements with large customers. An intensifying oil selloff fueled a Treasury rally, lowering borrowing costs that could give tech stocks room to run.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Micron%E2%80%99s%20Blockbuster%20Earnings%20Quiet%20the%20AI%20Doubters.pdf"}, {"id": "wsj-12", "title": "OpenAI, Broadcom Develop Custom Chip for AI Inference", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance &
