<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tecity News Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fbfbfa; --surface:#ffffff; --surface-2:#f6f6f4;
    --text:#16181d; --muted:#6c727e; --faint:#9aa0ab;
    --border:#ececec; --border-2:#e2e2e0; --ink:#16181d;
    --hover:#f4f4f2; --ring:rgba(20,23,28,.10);
    --shadow:0 1px 2px rgba(16,18,22,.04), 0 8px 24px rgba(16,18,22,.05);
    --shadow-sm:0 1px 2px rgba(16,18,22,.05);
    --wsj:#D85A30; --st:#1D9E75; --bt:#378ADD; --scmp:#D4537E;
    --maxw:1120px;
  }
  html[data-theme="dark"]{
    --bg:#0c0d10; --surface:#15171c; --surface-2:#1b1e25;
    --text:#eceef2; --muted:#9aa1ad; --faint:#6b7280;
    --border:#252830; --border-2:#2d313b; --ink:#eceef2;
    --hover:#1c1f26; --ring:rgba(255,255,255,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv02","cv03","cv04","ss01";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.6;
  }
  ::selection{background:rgba(120,120,120,.18)}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}

  /* header */
  header.top{position:sticky; top:0; z-index:20; backdrop-filter:saturate(180%) blur(14px);
    background:color-mix(in srgb, var(--bg) 82%, transparent); border-bottom:1px solid var(--border)}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 28px; max-width:var(--maxw); margin:0 auto}
  .brand{display:flex; flex-direction:column; gap:2px; min-width:0}
  .brand .title{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .brand .meta{font-size:12.5px; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:10px}
  select.date{appearance:none; font:inherit; font-size:13px; font-weight:500; color:var(--text);
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; padding:8px 32px 8px 12px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa0ab' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center; cursor:pointer; transition:border-color .15s}
  select.date:hover{border-color:var(--ink)}
  .toggle{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border-2); border-radius:10px; color:var(--muted); transition:.15s}
  .toggle:hover{color:var(--text); border-color:var(--ink)}
  .toggle svg{width:17px; height:17px}

  /* hero digest */
  .hero{padding:48px 0 14px}
  .hero .eyebrow{margin-bottom:16px}
  .digest{font-size:clamp(25px,3.6vw,37px); line-height:1.22; font-weight:400; letter-spacing:-.02em;
    max-width:none; color:var(--text)}
  .digest .lead{max-width:none}

  /* metrics */
  .metrics{display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:30px 0 8px}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px; box-shadow:var(--shadow-sm); transition:.18s}
  .metric:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .metric .v{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.05}
  .metric .l{font-size:12.5px; font-weight:500; margin-top:8px}
  .metric .s{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4}

  /* tabs */
  .tabs{display:flex; gap:26px; margin:34px 0 0; border-bottom:1px solid var(--border)}
  .tab{position:relative; cursor:pointer; padding:0 0 14px; font-size:14px; font-weight:500; color:var(--muted); transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px}

  .section{padding:30px 0 0}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px}
  .section-head h2{margin:0; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .section-head .hint{font-size:12.5px; color:var(--muted)}

  /* lead briefing card */
  .lead-card{background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px 32px; box-shadow:var(--shadow); margin-bottom:16px}
  .lead-card .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:12px}
  .lead-card h3{margin:0 0 12px; font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1.2}
  .lead-card p{margin:0; font-size:15.5px; color:var(--text); line-height:1.65; max-width:none; column-width:34ch; column-gap:48px; column-fill:balance}

  /* briefing grid */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm); transition:.18s}
  .card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
  .card h3{margin:0 0 10px; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.3}
  .card p{margin:0; font-size:14px; color:var(--muted); line-height:1.62}

  /* coverage / bars */
  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px; box-shadow:var(--shadow-sm)}
  .bar-row{display:flex; align-items:center; gap:14px; margin:14px 0}
  .bar-row .name{width:42px; font-size:12.5px; font-weight:600; letter-spacing:.02em}
  .bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; border-radius:99px}
  .bar-row .cnt{width:26px; text-align:right; font-size:12.5px; color:var(--muted); font-weight:600}

  /* article */
  .feed-controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:4px 0 18px}
  .search{flex:1 1 260px; position:relative}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint)}
  .search input{width:100%; font:inherit; font-size:14px; color:var(--text); background:var(--surface);
    border:1px solid var(--border-2); border-radius:12px; padding:11px 14px 11px 38px; outline:none; transition:.15s}
  .search input:focus{border-color:var(--ink); box-shadow:0 0 0 4px var(--ring)}
  .pills{display:flex; flex-wrap:wrap; gap:8px}
  .pill{cursor:pointer; font-size:12.5px; font-weight:500; color:var(--muted); background:var(--surface);
    border:1px solid var(--border-2); border-radius:99px; padding:7px 13px; user-select:none; transition:.14s; line-height:1}
  .pill:hover{border-color:var(--ink); color:var(--text)}
  .pill.active{color:#fff; border-color:transparent}
  .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px}
  .count{font-size:12.5px; color:var(--muted); margin-bottom:14px}

  .article{padding:22px 4px; border-bottom:1px solid var(--border)}
  .article:first-child{padding-top:6px}
  .article .head{display:flex; align-items:center; gap:12px; margin-bottom:9px; flex-wrap:wrap}
  .src{display:inline-flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted)}
  .src .dot{width:8px; height:8px; border-radius:99px}
  .article h4{margin:0; font-size:16.5px; font-weight:600; letter-spacing:-.01em; line-height:1.32; flex:1; min-width:240px}
  .article h4 a{color:inherit; text-decoration:none; transition:color .15s}
  .article h4 a:hover{color:var(--wsj-hover, var(--muted))}
  .article .date{font-size:12px; color:var(--faint); white-space:nowrap}
  .article p{margin:6px 0 12px; font-size:14.5px; color:var(--muted); line-height:1.62; max-width:88ch}
  .tags{display:flex; flex-wrap:wrap; gap:7px}
  .tag{font-size:11px; font-weight:600; letter-spacing:.01em; border-radius:99px; padding:3px 10px; border:1px solid transparent}

  .empty{text-align:center; color:var(--muted); padding:60px 0; font-size:14px}
  footer{padding:48px 0 60px; color:var(--faint); font-size:12px; text-align:center}

  @media(max-width:980px){
    .metrics{grid-template-columns:repeat(3,1fr)}
    .cards{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap,.topbar{padding-left:18px; padding-right:18px}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .hero{padding-top:34px}
  }
</style>
</head>

<script>window.ALL_DAYS = {"2026-07-01": {"date": "2026-07-01", "dayOfWeek": "Wednesday", "totalArticles": 58, "sourceCounts": {"WSJ": 10, "ST": 14, "BT": 15, "SCMP": 19}, "executiveDigest": "Wall Street roars back - the Dow tops a record 52,000 as tech rebounds - after the Supreme Court blocks Trump's bid to fire Fed governor Lisa Cook, cementing central-bank independence; China's factory activity returns to expansion and Meituan claims the largest AI model trained wholly on domestic chips, the yen sinks to a historic low, and Singapore households face a record 17% electricity-tariff jump.", "briefingCards": [{"title": "Lead story - Markets rebound, Fed independence cemented", "body": "Wall Street snapped its losing streak: the Dow topped 52,000 for the first time (+307 points to 52,182), the Nasdaq rose 2.1% and the S&P 500 1.2%, with Tesla up 8.5% and SpaceX up over 7%. The rally followed a 5-4 Supreme Court ruling blocking Trump's attempt to fire Fed governor Lisa Cook - handing new chair Kevin Warsh the biggest win and reinforcing Fed independence, even as a companion ruling stripped removal protections from other agencies. Officials are now debating whether firmer inflation warrants rate hikes rather than the cuts Trump wants; Brent edged up to $73."}, {"title": "Markets & finance", "body": "The yen sank to a historic low of 162.40 per dollar - its weakest since 1986 - and an all-time low near 125.5 versus the Singdollar, putting Tokyo on intervention alert after a record 11.73 trillion yen of April-May buying. Hong Kong roared back with a US$6 billion (S$7.8 billion) IPO wave led by Apple supplier Luxshare, with Temasek and GIC among cornerstones, as July shapes up as the city's biggest listing month of the year. WSJ warned earnings forecasts are 'on steroids', while UBS found Asia-Pacific had the slowest 2025 wealth growth at 5.9% as the dollar weakened."}, {"title": "Asia realignment", "body": "The US State Department greenlit a US$22.3 million Hellfire missile sale to Singapore - the latest in a run of 2026 arms deals after a US$2.3 billion P-8A approval in January - as Washington cites China's military build-up; Singapore reiterated it will not take sides. China conducted fresh patrols around Scarborough Shoal in the disputed South China Sea, a US general vowed America would stand with European allies over the Baltics, and China and the EU leaned into dialogue to manage deepening tensions as a US lawmaker urged both powers to de-escalate tit-for-tat actions."}, {"title": "Energy & climate", "body": "Singapore households face record energy bills: the electricity tariff jumps 17% and town gas 7.1% for July-September on higher Middle East gas prices, lifting a four-room HDB bill by about $17 a month, with U-Save rebates doubled to up to $190. Iran's oil money is returning - a US waiver could earn Tehran $8-10 billion over 60 days - though its economy is devastated, with inflation at 88.6% and GDP seen shrinking 6.1%. The World Bank moved to drop its climate-lending goal, while China's Politburo ordered a rapid-response overhaul for floods and extreme heat."}, {"title": "Technology & AI", "body": "China pressed its AI case: Meituan released LongCat-2.0, which it calls the largest model (1.6 trillion parameters) trained entirely on domestic chips - including pre-training, a step beyond DeepSeek - though it says memory remains the bottleneck. DeepSeek reversed the price war it started, adding peak-hour API surcharges. China's new T1100 carbon-fibre line challenges US and Japanese leaders, Nvidia is boosting its China robotics team for 'physical AI', and SCMP framed a 'great AI reckoning' as Treasury's Bessent calls China getting ahead 'the biggest risk to AI'."}, {"title": "Singapore & SEA focus", "body": "Fresh data showed about 1 in 7 Singapore resident households now earn at least $30,000 a month (up from 7.4% in 2020), with median household income crossing $12,446. DBS completed a US$1 billion significant risk transfer - a first for a Singapore bank - freeing regulatory capital, while Q2 CBD office rents climbed on tight supply and an Admiralty executive-condo site launched for sale. A survey found global financial firms increasingly favour Singapore for its 'multipolar' neutrality, even as they pivot expansion toward South Korea; reclamation works for Long Island off East Coast Park begin end-2026."}], "keyMetrics": [{"value": "58", "label": "Articles curated today", "sub": "WSJ 10 · ST 14 · BT 15 · SCMP 19"}, {"value": "52,000", "label": "Dow record high", "sub": "Tech rebound; Fed independence held"}, {"value": "+17%", "label": "SG electricity tariff", "sub": "Record high for Jul-Sep quarter"}, {"value": "162.40", "label": "Yen per US dollar", "sub": "Weakest since 1986; intervention watch"}, {"value": "1 in 7", "label": "SG homes earn $30k+/mth", "sub": "Up from 1 in 14 back in 2020"}, {"value": "1.6tn", "label": "Meituan LongCat params", "sub": "Largest AI model on China chips"}], "articles": [{"id": "wsj-01", "title": "Dow Hits Record as Tech Starts Week Strong", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Dow Jones Industrial Average topped 52000 for the first time on Monday, adding 307 points to 52182.74, as technology shares rallied and lifted the Nasdaq composite 2.1% and the S&P 500 1.2%, breaking five-session losing streaks. Alphabet led gains alongside Amazon (up 3.2%), Meta (2.2%) and Nvidia (1.3%); Tesla climbed 8.5% and SpaceX rose over 7%. The Russell 2000 hit a record, up 21% this year. Brent crude rose 1.6% to $73.15; the 10-year Treasury yield edged up to 4.375%. Yields held steady after the Supreme Court rejected Trump's bid to fire Fed governor Lisa Cook. Analyst Joseph Brusuelas said \"risk appetite to buy tech dragged everything up.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Dow%20Hits%20Record%20as%20Tech%20Starts%20Week%20Strong.pdf"}, {"id": "wsj-02", "title": "Earnings Forecasts Are on Steroids", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Analysts raised S&P 500 earnings-per-share forecasts 3.4% since end-March, an anomaly given they typically cut estimates by an average 2.7% over the past 40 quarters, per FactSet's John Butters. The gains follow the most-profitable quarter ever for the S&P 500. Spencer Jakab notes an accounting rule inflated first-quarter operating income at Alphabet, Amazon and Nvidia, whose stakes in unlisted AI firms like Anthropic and OpenAI were marked up as valuations rose, equal to roughly 12% of S&P 500 profits. University of Florida professor Baolian Wang warns of a \"circular valuation loop\" and expects the effect two-to-three times greater in Q2. Q1 net margin hit 14.8%, twice the postwar average.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Earnings%20Forecasts%20Are%20on%20Steroids.pdf"}, {"id": "wsj-03", "title": "How Jamieson Greer Took Over Trump's Trade Agenda", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Trade", "Politics"], "summary": "U.S. Trade Representative Jamieson Greer has eclipsed Commerce Secretary Howard Lutnick to lead Trump's trade agenda, traveling to India to meet trade minister Piyush Goyal without Lutnick present. Early in Trump's second term Lutnick forced Greer to redo meetings on Commerce turf. Greer now leads talks with Asian nations, the USMCA renegotiation, rebuilding tariffs after the Supreme Court ruled most levies illegal in February, and a new U.S.-China Board of Trade. He is framing replacement tariffs under Section 301 of the 1974 Trade Act. A stern Mormon lawyer mentored by Robert Lighthizer, Greer served as Lighthizer's chief of staff in Trump's first term. Sen. Todd Young welcomed his \"leadership role.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/How%20Jamieson%20Greer%20Took%20Over%20Trump%E2%80%99s%20Trade%20Agenda.pdf"}, {"id": "wsj-04", "title": "How a Tight-Lipped Fed Could Lead to Higher Mortgage Rates", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets"], "summary": "At his first press conference as Fed chairman, Kevin Warsh signaled he wants markets to guide interest rates, declining to provide forward guidance or rate projections. Analysts warn the reduced communication could raise bond-market volatility and risk premiums, hitting mortgage-backed securities backed by Fannie Mae and Freddie Mac. Pimco economist Tiffany Wilding cited \"less anchoring of expectations\" and more front-end volatility. Markets price a 30% chance of a July quarter-point hike but a 77% chance of hikes by year-end, per CME FedWatch. Mortgage News Daily's 30-year fixed rate ticked from 6.52% to 6.66% after the meeting before drifting lower. Warsh is setting up task forces on productivity, data reliability and the balance sheet.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/How%20a%20Tight-Lipped%20Fed%20Could%20Lead%20to%20Higher%20Mortgage%20Rates.pdf"}, {"id": "wsj-05", "title": "Iran's Oil Money Is Coming Back. Its Main Street Will Have to Wait.", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "A Trump administration waiver letting Iran sell oil and receive dollar payments could earn Tehran $8 billion to $10 billion over 60 days, Eurasia Group's Gregory Brew estimates, after the U.S.-Iran deal freed shipping in the Strait of Hormuz. Ordinary Iranians face longer waits amid inflation that hit 88.6% year-on-year in June, over a million job losses and record currency lows. Officials put conflict-related losses at $270 billion; the UN cites damage to 150,000 buildings, including 51,000 Tehran homes. Rystad Energy estimates energy-sector repairs up to $19 billion. The IMF forecasts GDP shrinking 6.1% this year, the steepest since the 1980s. Many Iranians fear a repeat of the failed 2015 nuclear deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Iran%E2%80%99s%20Oil%20Money%20Is%20Coming%20Back.%20Its%20Main%20Street%20Will%20Have%20to%20Wait..pdf"}, {"id": "wsj-06", "title": "Remote Work Is Making It Harder for Grads to Find (and Keep) Jobs", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Society"], "summary": "Remote work is compounding job-market struggles for Gen Z graduates, who miss mentorship and office networking. A London School of Economics study last month, based on over 400 million job postings, found entry-level hiring across several countries fell more than 14% since 2019, with firms that stayed remote more likely to cut junior hiring because slower on-the-job learning reduces return-on-investment. Kylie Klapp took a fully remote role after 150 applications over two years. Fewer than a quarter of Gen Z want fully remote work, per Gallup, versus over a third of older generations. A Deloitte survey found only 6% prioritize leadership positions. Founder Jason Crawford called training junior staff remotely \"a silent tax on senior time.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Remote%20Work%20Is%20Making%20It%20Harder%20for%20Grads%20to%20Find%20(and%20Keep)%20Jobs.pdf"}, {"id": "wsj-07", "title": "Silicon Valley Is Obsessed With 'Trust Stacking,' and the IRS Doesn't Like It", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A tax strategy called trust stacking multiplies the Qualified Small Business Stock (QSBS) break, which lets founders exclude up to $15 million in capital gains, by transferring shares to trusts in relatives' names to exclude $60 million or more. Treasury's top tax-policy official Kenneth Kies signaled a crackdown, saying \"we don't like stacking.\" Last year's tax law raised the QSBS cap to $15 million from $10 million for stock acquired since July 4, 2025. The break is estimated to cut federal revenue by $4.9 billion this year, triple its 2017 level; taxpayers claimed $140 billion in exclusions from 2012 to 2022. Advisers like Alessandro Chesser's GetDynasty facilitate stacking, while others urge caution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Silicon%20Valley%20Is%20Obsessed%20With%20%E2%80%98Trust%20Stacking%2C%E2%80%99%20and%20the%20IRS%20Doesn%E2%80%99t%20Like%20It.pdf"}, {"id": "wsj-08", "title": "Strategy's Turnaround Plan Includes Stock Buyback, Bitcoin Sales and More Reserves", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets"], "summary": "Michael Saylor's Strategy said Monday it would repurchase up to $1 billion of preferred shares and $1 billion of Class A common stock, and might sell bitcoin to raise up to $1.25 billion to cover dividends, interest and reserves, boosting cash reserves to $2.55 billion. Shares rose 13%. The moves aim to stem confidence loss after common shares logged eight straight losses, down over 80% from their November 2024 peak. Its mNAV dipped below one Friday. Strategy raised the dividend on its Stretch preferred stock to 12% from July 1. Bitcoin recently fell below $60,000; Strategy holds 847,363 bitcoin worth about $51 billion. It set a policy to keep at least 12 months of dividend and interest coverage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/Strategy%E2%80%99s%20Turnaround%20Plan%20Includes%20Stock%20Buyback%2C%20Bitcoin%20Sales%20and%20More%20Reserves.pdf"}, {"id": "wsj-09", "title": "The Biggest Winner in Lisa Cook Case? Fed Chairman Kevin Warsh", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Monday's 5-4 Supreme Court ruling blocking Trump's attempt to fire Fed governor Lisa Cook hands the biggest win to new chairman Kevin Warsh, resolving whether a president can remove governors for cause and reinforcing Fed independence. Chief Justice John Roberts cited the Fed's \"unique historical status,\" while a companion ruling stripped removal protections from other agencies. Trump sought Cook's removal last August after official Bill Pulte alleged she misrepresented mortgage occupancy status in 2021; Cook, confirmed in 2022, denies wrongdoing and called the case a \"manufactured pretext.\" Powell has stayed on the board until 2028, denying Trump a seat. Officials now debate whether firmer inflation warrants rate increases rather than the cuts Trump wants.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/The%20Biggest%20Winner%20in%20Lisa%20Cook%20Case%20Fed%20Chairman%20Kevin%20Warsh.pdf"}, {"id": "wsj-10", "title": "The Cutthroat Battle to Become America's Rare-Earth Champion", "source": "WSJ", "date": "1 Jul 2026", "tags": ["Trade", "Defence"], "summary": "MP Materials and USA Rare Earth are locked in a bitter Texas lawsuit as they race to build an all-American rare-earth supply chain, urgency spurred after China—controlling some 90% of rare-earth magnet supplies—cut them off last year. MP alleges former engineer Kevin Elkins took its secret grain-boundary-diffusion formula to USA Rare Earth and seeks at least $5 million in damages; Elkins and USA Rare Earth deny theft, calling the claims \"baseless.\" CEO James Litinsky likened MP's effort to a \"private-market Manhattan Project.\" USA Rare Earth announced $1.6 billion in federal backing in January and is building a Stillwater magnet facility, with Texas mine production expected in 2028. Both firms were hit by new Chinese export restrictions last week.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20WSJ/The%20Cutthroat%20Battle%20to%20Become%20America%E2%80%99s%20Rare-Earth%20Champion.pdf"}, {"id": "st-01", "title": "About 1 in 7 S'pore families earns at least $30k a month", "source": "ST", "date": "1 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "The share of Singapore resident households earning at least $30,000 monthly nearly doubled, reaching 13.4 per cent in 2025 from 7.4 per cent in 2020, according to the General Household Survey released on June 30. Median household market income hit $12,446, crossing $12,000 for the first time, up from $9,099 in 2020. Indian families saw the largest annual real gain at 3.5 per cent. Employment income fell to nearly 80 per cent of total income as investment income rose to 13.5 per cent. Dual-income couples grew to 56.6 per cent. Economists cited dual incomes, strong wages, capital-market gains and skilled immigrants, while flagging inequality and possible tax-regime questions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/About%201%20in%207%20S'pore%20families%20earns%20at%20least%2030k%20a%20month.pdf"}, {"id": "st-02", "title": "Apple supplier Luxshare leads $7.8 billion IPO wave in Hong Kong", "source": "ST", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Apple supplier Luxshare Precision Industry led a June 30 wave of Hong Kong listings worth a combined US$6 billion (S$7.8 billion), across nine filings as companies rushed to market before month-end. Luxshare sought up to HK$24.3 billion (S$4 billion), 2026's biggest debut so far, with cornerstone investors including Temasek, GIC, Hillhouse, Millennium and Tencent buying US$1.5 billion in stock. The AI boom lifted enthusiasm despite the Hang Seng Index falling 11 per cent in 2026. July is on track to be Hong Kong's biggest month for share sales this year. Luxshare, which assembles iPhones and AirPods, has a market value of about US$80 billion and 2025 revenue of 332 billion yuan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Apple%20supplier%20Luxshare%20leads%207.8%20billion%20IPO%20wave%20in%20Hong%20Kong.pdf"}, {"id": "st-03", "title": "China conducts patrols around Scarborough Shoal in disputed South China Sea", "source": "ST", "date": "1 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "China's military and coast guard said on June 30 they carried out patrols around Scarborough Shoal in the South China Sea to safeguard Beijing's territorial claims. The PLA Southern Theatre Command conducted combat-readiness patrols in the waters and airspace, while the China Coast Guard reported law-enforcement patrols against ships engaged in \"illegal rights-violation activities\". The shoal, which Beijing calls Huangyan Dao, is claimed by both China and the Philippines. The patrols followed weekend joint US-Philippine drills that Washington said supported a free and open Indo-Pacific. Beijing has intensified claims, creating a national nature reserve there and earlier installing then removing a floating platform, a move the Philippines called a \"clear pretext for occupation\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/China%20conducts%20patrols%20around%20Scarborough%20Shoal%20in%20disputed%20South%20China%20Sea.pdf"}, {"id": "st-04", "title": "China factory activity returns to expansion, riding AI global boom", "source": "ST", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Trade"], "summary": "China's factory activity returned to expansion in June, driven by demand for chips, computers and AI-related products, plus front-loading of exports ahead of new US Section 301 tariffs due late July. The official manufacturing PMI rose to 50.3 from 50 in May, beating forecasts. Analysts said global AI investment is cushioning manufacturers even as a property slump and Middle East disruption weigh on growth. Factory-gate prices slipped to 48.2, signalling deflation risk, while employment kept falling. Non-manufacturing PMI improved to 50.2 and composite PMI to 50.6. Shipments of automated data-processing equipment jumped 60 per cent year-on-year, but furniture exports grew just 1.9 per cent, underscoring reliance on tech demand.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/China%20factory%20activity%20returns%20to%20expansion,%20riding%20AI%20global%20boom.pdf"}, {"id": "st-05", "title": "China, EU turn to dialogue in pragmatic bid to manage deepening tensions", "source": "ST", "date": "1 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "China and the EU agreed to hold intensive trade talks over three months and establish a new trade and investment consultation mechanism, their first joint statement since 2019, after Commerce Minister Wang Wentao met Trade Commissioner Maros Sefcovic in Brussels on June 29. Four working groups will address trade balance, export controls, intellectual property and WTO reform, with a ministerial meeting set for October in Beijing. Analysts said both sides seek stable ties amid uncertainty over US policy under Trump, with Beijing trying to prevent Brussels drifting into Washington's camp. China's 2025 trade surplus with the EU reached €360.6 billion (S$532 billion). Beijing raised concerns over proposed EU cybersecurity and industrial competitiveness measures.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/China,%20EU%20turn%20to%20dialogue%20in%20pragmatic%20bid%20to%20manage%20deepening%20tensions.pdf"}, {"id": "st-06", "title": "DBS completes $1.3 billion significant risk transfer deal, in first for Singapore bank", "source": "ST", "date": "1 Jul 2026", "tags": ["Finance & Markets"], "summary": "DBS Bank has completed a significant risk transfer (SRT) transaction referencing a US$1 billion (S$1.29 billion) portfolio of corporate loans, the first such deal by a Singapore bank, it said on June 30. An SRT lets a bank transfer part of the credit risk on a loan pool to third-party investors without selling the loans, freeing regulatory capital for new lending. Investors receive a yield typically higher than similarly rated bonds. DBS did not name the investors. As at March 31, its Common Equity Tier 1 ratio stood at 16.9 per cent, down from 17.4 per cent a year earlier but above requirements. DBS said the capability supports Asia's rising financing demand and sets a foundation for more SRT deals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/DBS%20completes%201.3%20billion%20significant%20risk%20transfer%20deal,%20in%20first%20for%20Singapore%20bank.pdf"}, {"id": "st-07", "title": "Electricity tariff for S'pore households to rise by 17%, gas tariff by 7.1% for next quarter", "source": "ST", "date": "1 Jul 2026", "tags": ["Energy", "Society"], "summary": "Singapore households face a 17 per cent electricity tariff rise and a 7.1 per cent town gas increase from July to September, taking both to record highs, the Energy Market Authority said on June 30. It cited higher natural gas prices amid the Middle East conflict. SP Group's home electricity price rises 4.64 cents to 31.91 cents per kWh before GST, surpassing the 2008 peak; a four-room HDB household faces a $17.14 monthly increase. City Energy's gas tariff rises to 23.48 cents per kWh. More than a million eligible HDB households will get up to $190 in U-Save rebates, double the regular amount. Retailers reported surging sign-ups for fixed-price plans as consumers hedge against further rises.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Electricity%20tariff%20for%20S'pore%20households%20to%20rise%20by%2017,%20gas%20tariff%20by%207.1%20for%20next%20quarter.pdf"}, {"id": "st-08", "title": "Hezbollah's fibre-optic drones challenge Israel", "source": "ST", "date": "1 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Fighting between Israel and Hezbollah continues despite a US-brokered agreement, with the Iranian-backed militia deploying cheap fibre-optic-guided explosive drones that have taken scores of Israeli soldiers' lives. The drones, made of plastic mouldings that evade radar and guided by cables spooling up to 30km, bypass Israel's electronic warfare, Trophy and Iron Dome defences. Since March, such first-person-view drones caused more than a third of Israeli army fatalities in Lebanon. Analysts quoted by Ynet called them Israel's \"deadliest threat\" in two years. Hezbollah leader Naim Qassem vowed to fight on. Analyst Jonathan Eyal argues the weapon has restored Hezbollah's ability to impose continuous costs and become a negotiating position against Israel.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Hezbollah's%20fibre-optic%20drones%20challenge%20Israel.pdf"}, {"id": "st-09", "title": "US will stand with European allies in defence of Baltics, US general says", "source": "ST", "date": "1 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "The US will stand with European allies to defend the Baltic states, NATO's US land forces commander General Chris Donahue said on June 30 in Valga, Estonia, as the alliance assigned an additional headquarters to the region. \"The United States will be there alongside you,\" he said. NATO troops in Lithuania, Latvia, Estonia and northern Poland were previously under a single Szczecin-based headquarters; a second command zone lets the alliance devote more troops to the Baltics, with two divisions in Estonia and Latvia under the German-Netherlands Corps in Muenster. NATO has warned Russia could mount a large-scale assault as early as 2029. German Defence Minister Boris Pistorius called the shift a demonstration of alliance unity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/US%20will%20stand%20with%20European%20allies%20in%20defence%20of%20Baltics,%20US%20general%20says.pdf"}, {"id": "st-10", "title": "Ukraine's Zelensky mocks Russian military drive, says Moscow rejects all peace proposals", "source": "ST", "date": "1 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Ukrainian President Volodymyr Zelensky mocked Russia's military drive on June 29, saying the Kremlin had set and postponed 15 deadlines over four years to capture the eastern Donbas region. His comments answered President Vladimir Putin's rejection a day earlier of a purported Ukrainian proposal to abandon long-range strikes and scale down fighting. Zelensky said Putin was out of touch with Russians facing petrol queues linked to Ukraine's strikes on oil targets, adding Ukraine responds \"with precision, not through terrorism\". Russia has captured all of Luhansk and chunks of Donetsk and Zaporizhzhia, but Ukrainian officials say the advance has slowed amid intensified drone strikes. Zelensky said Ukraine's peace proposals are rejected every time.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Ukraine's%20Zelensky%20mocks%20Russian%20military%20drive,%20says%20Moscow%20rejects%20all%20peace%20proposals.pdf"}, {"id": "st-11", "title": "Uncertainty over diplomacy clouds chances for US-Iran deal", "source": "ST", "date": "1 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Iranian and US negotiators were gearing up for talks in Qatar, but uncertainty over timing and content clouded efforts to end the Iran war and reopen the Strait of Hormuz. A Qatari official said top US envoys in Doha would not hold high-level meetings with Iran; instead technical talks on regional security could later be elevated. Jared Kushner and Steve Witkoff were expected in Doha on June 30. Iran's Foreign Ministry said its technical delegation had \"no relation\" to the Americans' visit. The June 17 interim accord gave 60 days to negotiate a permanent truce and address Iran's nuclear programme. Oil prices slipped on de-escalation, set for their biggest quarterly loss since 2020.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Uncertainty%20over%20diplomacy%20clouds%20chances%20for%20US-Iran%20deal.pdf"}, {"id": "st-12", "title": "Works for Long Island to begin off East Coast Park end-2026", "source": "ST", "date": "1 Jul 2026", "tags": ["Environment", "Society"], "summary": "Preparatory works for the Long Island reclamation off East Coast Park will start in end-2026, after which sea sports will be allowed only east of Bedok Jetty, the URA and HDB said on June 30 alongside an environmental impact report. The first phase, west of the jetty, covers about 570ha; a second 155ha phase east of the jetty starts after the 2029 SEA Games. Total works span about 725ha, twice Marina Bay's size. Some impact on biodiversity, including the critically endangered hawksbill turtle, is expected. Kiteboarding is most affected among sea sports. Long Island, envisioned since 1991, is now a coastal defence against rising seas, adding a reservoir and land, expected to take decades.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Works%20for%20Long%20Island%20to%20begin%20off%20East%20Coast%20Park%20end-2026.pdf"}, {"id": "st-13", "title": "World Bank to drop climate lending goal", "source": "ST", "date": "1 Jul 2026", "tags": ["Environment", "Finance & Markets"], "summary": "The World Bank Group said on June 29 it will \"retire\" its goal to devote 45 per cent of annual lending to projects with climate co-benefits, but extend its Climate Change Action Plan that was due to expire on June 30. The lender, pressured by the Trump administration to abandon the 2023 Biden-era target, said it will shift to focusing on lending outcomes rather than input goals. President Ajay Banga has pivoted to \"smart development\" boosting jobs while retaining climate benefits. An earlier 35 per cent target was also dropped. The US declined to sign an October 2025 letter endorsing continued climate work, alongside Russia, Kuwait and Saudi Arabia; India and Japan abstained. France urged keeping the target.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/World%20Bank%20to%20drop%20climate%20lending%20goal.pdf"}, {"id": "st-14", "title": "Yen hits historic low against US dollar", "source": "ST", "date": "1 Jul 2026", "tags": ["Finance & Markets"], "summary": "The yen slid to its weakest against the US dollar since 1986, touching 161.98 on June 29 and extending to 162.40 on June 30, putting traders on alert for intervention. Against the Singapore dollar it hit fresh all-time lows near 125.49, down about 2.9 per cent in 2026. Finance Minister Satsuki Katayama said authorities stood ready to take \"decisive action\". Weakness boosts exporter profits and stocks but swells import costs for oil and gas, fuelling inflation that threatens Prime Minister Sanae Takaichi's popularity. The Bank of Japan raised rates to 1 per cent on June 16, the highest since 1995, with minimal impact as the Fed stays hawkish. April-May intervention totalled a record 11.73 trillion yen.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20ST/Yen%20hits%20historic%20low%20against%20US%20dollar.pdf"}, {"id": "bt-01", "title": "A different type of G7 central bank divergence", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Following the Iran war shock, central banks have reacted divergently, with splits even within the G7. The ECB raised rates, Japan hiked with hawkish signals, the Bank of England and Bank of Canada held, and the US Federal Reserve, now led by new chair Kevin Warsh, kept rates unchanged while launching a sweeping reform agenda of five task forces including outside experts. Beyond the G7, the People's Bank of China eased liquidity, while Indonesia and the Philippines hiked and Brazil and Hungary cut. The author cites four drivers of divergence: differing country conditions, mandates, labour dynamics and geoeconomic exposure. Such fragmentation risks exchange-rate stress, volatile capital flows and instability unless paired with structural reforms and smart fiscal action.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/A%20different%20type%20of%20G7%20central%20bank%20divergence.pdf"}, {"id": "bt-02", "title": "An epic David-and-Goliath stock battle is under way", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The 2021 meme-stock skirmish has escalated into a broader clash between retail and professional investors, most visible in South Korea and Taiwan, this year's best-performing markets. Foreign institutions have sold over US$110 billion citing concentration risk, while local retail traders filled the void. Three stocks TSMC, Samsung and SK Hynix now exceed 30 per cent of the MSCI Emerging Markets Index, up from 18 per cent. Managers who trimmed Korean holdings missed Samsung and Hynix gains of 168 and 303 per cent. The piece questions whether diversification still makes sense, citing Chris Hohn's concentrated fund. Pension giants are shifting: Korea's NPS lifted equity targets, and CalPERS adopts a total-portfolio approach, signalling David may be winning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/An%20epic%20David-and-Goliath%20stock%20battle%20is%20under%20way.pdf"}, {"id": "bt-03", "title": "Beyond rate hikes: Where markets may find their next drivers", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "June was pivotal for monetary policy: the ECB raised rates 25 basis points while the Fed held the funds rate at 3.5-3.75 per cent, with new chair Kevin Warsh seeking to rebuild inflation-fighting credibility. Markets increasingly price a possible further hike, but the author argues any move would reverse prior insurance cuts rather than start a tightening cycle, since wage pressure remains muted. The reopening of the Strait of Hormuz should ease energy costs. The biggest equity risk is euphoric sentiment, not rates. As short-term volatility subsides, investors should refocus on robust corporate fundamentals, with AI-related capex boosting revenues and margins. The author favours technology, industrials, renewables, Japan and potentially China, and stresses genuine diversification.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Beyond%20rate%20hikes%20Where%20markets%20may%20find%20their%20next%20drivers.pdf"}, {"id": "bt-04", "title": "Brand reputations are at stake as AI turns audiences into fact-checkers", "source": "BT", "date": "1 Jul 2026", "tags": ["Technology & AI", "Society", "Southeast Asia"], "summary": "A commentary by Orchan Consulting Asia's founding director argues the communications industry is fixated on using AI to produce content faster, when the more consequential shift is what AI does to audiences. Across South-east Asia - Singapore, Malaysia, Indonesia and Thailand - stakeholders increasingly toggle between treating AI as an efficiency engine for fast conclusions and as a sparring partner to stress-test arguments. The result: audiences are harder to persuade but statements are easier to verify, with claims about conduct, commitments or crisis response cross-referenced in real time by investors querying LLMs on ESG records, journalists surfacing prior statements, and procurement managers testing supplier claims. Reputations now hinge on \"narrative integrity\" - whether claims are true and traceable - rather than narrative control.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Brand%20reputations%20are%20at%20stake%20as%20AI%20turns%20audiences%20into%20fact-checkers.pdf"}, {"id": "bt-05", "title": "ECB's Lagarde says Europe is getting more resilient to economic shocks", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "ECB president Christine Lagarde said Europe is becoming less vulnerable to outside shocks thanks to better banking and fiscal regulations and green-transition investment, speaking as officials gathered in Sintra, Portugal. She cited how Silicon Valley Bank's collapse did not destabilise eurozone lenders and how the region withstood tariffs and a major oil-supply disruption. Weeks after raising rates amid the Middle East conflict, policymakers must decide whether further tightening is needed; board member Isabel Schnabel argues costs may still need to rise. Lagarde called June's hike a \"robust decision\" and denied it was an insurance hike. A eurozone inflation report is expected to show a slowdown to 3 per cent, and markets price one more quarter-point move.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/ECB's%20Lagarde%20says%20Europe%20is%20getting%20more%20resilient%20to%20economic%20shocks.pdf"}, {"id": "bt-06", "title": "Executive condo site in Admiralty launched for sale", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's HDB launched a 99-year executive condominium site at Admiralty Walk for tender on Jun 30, capable of yielding around 450 units across 12,893.3 square metres. Analysts expect cautious bidding given weaker location appeal versus the Canberra Drive parcel and a strong northern supply pipeline. Mogul.sg's Nicholas Mak cited greater development and financial risk from the larger size, forecasting up to five bids at S$600 to S$680 per square foot per plot ratio, totalling S$291.4 million to S$330.3 million. ERA's Eugene Lim noted two EC projects in Woodlands Drive 17 and Sembawang Road could yield 685 units in Q4, with government land sales adding another 1,625 units. Huttons' Mark Yip flagged lukewarm demand. The tender closes Dec 17.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Executive%20condo%20site%20in%20Admiralty%20launched%20for%20sale.pdf"}, {"id": "bt-07", "title": "Global financial firms plan Asia expansion, pivoting to South Korea amid caution on China and India, survey shows", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Global financial firms are pivoting Asia expansion towards South Korea while taking a measured approach to China and India, an ASIFMA-KPMG survey of 34 firms found. About two-thirds plan to expand Asia-Pacific business over three years, with Singapore, Hong Kong, South Korea, China, Japan, India and Taiwan drawing roughly half of interest. ASIFMA said Singapore's appeal reflects multipolar geopolitical positioning, \"not tied to China, the US, or any single Asean bloc\". Expansion interest in South Korea jumped to about 50 per cent from 21 per cent, aided by WGBI inclusion prospects. China interest steadied near 40 per cent amid capital controls and geopolitical risk, while India cooled over regulatory frictions despite climbing ease-of-doing-business rankings.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Global%20financial%20firms%20plan%20Asia%20expansion,%20pivoting%20to%20South%20Korea%20amid%20caution%20on%20China%20and%20India,%20survey%20shows.pdf"}, {"id": "bt-08", "title": "How humanoids and robots could sustain China's dominance in global manufacturing", "source": "BT", "date": "1 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "China, already the leading auto producer and largest exporter, could replicate that dominance in humanoids and robots, the author argues. It holds large export shares in batteries, phones and semiconductor components, and its global export share is projected to rise from 15 to 16.5 per cent by 2030. Chinese humanoid and robot exports hit US$1.5 billion in the year to March, echoing EVs' early trajectory before those surged to an US$86 billion run-rate. Five factors support continued dominance: early trend-spotting, an integrated supply chain, strategically aligned finance, heavy R&D and scale. Chinese firms made about 90 per cent of humanoid robots installed globally in 2025 and produce most essential rare-earth magnets, capturing 50 per cent incremental industrial-robot market share.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/How%20humanoids%20and%20robots%20could%20sustain%20China's%20dominance%20in%20global%20manufacturing.pdf"}, {"id": "bt-09", "title": "Investors should pay more attention to AI firms' corporate governance", "source": "BT", "date": "1 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Stockbroking research has long prioritised financial metrics over corporate governance, a blind spot the author warns could become dangerous as AI companies occupy a larger share of public markets. Many AI firms lack track records, and impressive revenue growth can mask governance weaknesses such as concentrated voting rights, dominant founders, limited board independence and weak controls. Governance failures can destroy value faster than deteriorating performance, as Enron's collapse showed. AI also adds complexity around data sovereignty, cybersecurity, intellectual property, model integrity and ethics. Ironically, greater use of AI in investing could deepen the neglect, since governance assessment requires human judgment. The author says Singapore's Equities Market Development Programme should absorb this lesson, prioritising governance questions over sophisticated financial models.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Investors%20should%20pay%20more%20attention%20to%20AI%20firms'%20corporate%20governance.pdf"}, {"id": "bt-10", "title": "Singapore office rents climb higher in Q2 as limited CBD supply keeps market tight", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore office rents rose again in Q2 2026 as scarce CBD supply and demand from AI and financial-services firms kept the market tight. CBRE data showed core CBD Grade A rents up 0.8 per cent to S$12.50 per square foot monthly, a sixth straight quarterly rise; JLL's basket climbed 1.1 per cent to S$12.19, while Knight Frank's Raffles Place/Marina Bay prime rents averaged S$11.69. Overall CBD vacancy edged up to 6.7 per cent after Shaw Tower's completion, but fell to 5.6 per cent excluding new supply, the lowest in nine quarters. With no completions through 2027, analysts see structural undersupply persisting. Tenants including Shell and Databricks are pre-committing, and AI firms are moving from co-working into permanent space.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Singapore%20office%20rents%20climb%20higher%20in%20Q2%20as%20limited%20CBD%20supply%20keeps%20market%20tight.pdf"}, {"id": "bt-11", "title": "The USMCA review will signal Trump's upcoming global tariff strategy", "source": "BT", "date": "1 Jul 2026", "tags": ["Trade", "Geopolitics", "Politics"], "summary": "A commentary by an LSE IDEAS associate frames the July 1 USMCA review deadline - days before the US marks its 250th independence anniversary - as a signal of Trump's wider tariff strategy. Trump now calls the pact (in effect since July 2020) not working and worth scrapping, while Canada and Mexico favour renewal on existing terms for 16 years; Commerce Secretary Howard Lutnick calls it a \"poor deal\", and USTR Jamieson Greer wants structural changes to de-risk from China via aligned external tariffs, investment screening and tighter rules of origin, citing Mexico as a \"back door\" for Chinese content. He flags risks of a shift to bilateral deals, the July 24 expiry of the 10% Section 122 tariff, and Section 301 and forced-labour probes - covering Asean, China, Singapore and Vietnam - that could bring new 10-12.5% tariffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/The%20USMCA%20review%20will%20signal%20Trump's%20upcoming%20global%20tariff%20strategy.pdf"}, {"id": "bt-12", "title": "UK economy grows as expected before Iran war impact", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Britain's economy grew 0.6 per cent in the first quarter of 2026, matching initial estimates, with services led by computer programming, wholesale and advertising as the main driver, official data confirmed. But households were squeezed even before the worst effects of the US-Iran conflict fed through, with real disposable income per head down 0.8 per cent and the savings ratio falling to 8.9 per cent. It marked a third straight year of strong first-quarter growth, prompting seasonal-adjustment concerns. The ONS revised Q4 2025 growth down to 0.1 per cent and full-year 2025 to 1.3 per cent. With the Bank of England holding rates at 3.75 per cent, likely next PM Andy Burnham faces a tough inheritance amid tight fiscal policy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/UK%20economy%20grows%20as%20expected%20before%20Iran%20war%20impact.pdf"}, {"id": "bt-13", "title": "US dollar depreciation leaves Apac with slowest wealth growth in 2025: UBS", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "The Asia-Pacific recorded the slowest personal wealth growth in 2025 at 5.9 per cent, as US dollar depreciation flattered regions with appreciating currencies, UBS' Global Wealth Report showed. That trailed the Americas' 8.5 per cent and Emea's 17.5 per cent, with South-east Asia lowest globally at 1.6 per cent and Greater China at 4.6 per cent. Apac's share of global wealth fell to 32.8 per cent from 36 per cent, as many markets pegged to the dollar missed the euro's boost. Global personal wealth rose 10.8 per cent in dollar terms. Singapore ranked sixth for average wealth per adult at US$527,217. UBS said the wealth pyramid is becoming a diamond as individuals steadily move up from the lowest bracket.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/US%20dollar%20depreciation%20leaves%20Apac%20with%20slowest%20wealth%20growth%20in%202025%20UBS.pdf"}, {"id": "bt-14", "title": "What happens when public debt stops buying progress", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The historic link between rising public debt and visible progress in infrastructure, education and institutions has broken down, the author argues. Across advanced democracies, debt has hit near-wartime highs, yet productivity has slowed, education outcomes weakened and public trust declined. Many economies exceed 100 per cent debt-to-GDP, with Japan near 240 per cent, while debt-servicing costs rise. Europe's problem is insufficient reform, not spending, per IMF chief Kristalina Georgieva. PISA results have stagnated despite higher expenditure, and redistribution has disappointed as influential groups protect benefits over younger households. In the US, federal debt tops 100 per cent of GDP with interest now exceeding defence spending. The author urges emerging markets to tie borrowing to productivity amid new defence and industrial-policy pressures.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/What%20happens%20when%20public%20debt%20stops%20buying%20progress.pdf"}, {"id": "bt-15", "title": "Why an all-weather portfolio is your best friend", "source": "BT", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The global economy looks healthy near-term, with rising profits, booming AI investment and resilient labour markets, but profound structural uncertainties mean investors betting on a single long-run conviction risk costly mistakes, the author argues, echoing Fed chair Kevin Warsh. AI is the central enigma: tech investment hit 4.9 per cent of US GDP in Q1 2026, eclipsing the dotcom peak, with hyperscaler capex projected above US$1 trillion by 2027. Bulls see transformative productivity; bears note AI is raising inflation, power and chip costs. Compounding this, global debt hit a record US$350 trillion and US debt nears its 1945 peak, while AI, defence, energy and healthcare compete for finite savings, keeping real rates elevated. Diversification offers resilience through boom and bust.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20BT/Why%20an%20all-weather%20portfolio%20is%20your%20best%20friend.pdf"}, {"id": "scmp-01", "title": "After triggering price war, DeepSeek reverses course with surcharge on peak-hour API use", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese AI unicorn DeepSeek is introducing peak-hour surcharges for its API services, reversing the domestic price war it helped start in May with a permanent 75 per cent discount on V4 access. The Hangzhou firm will double prices for V4 models between 9am-noon and 2pm-6pm Beijing time, citing \"better distribution of resources.\" Peak-hour V4 Pro output rises to 12 yuan (US$1.77) per million tokens from 6 yuan, taking effect when the official V4 model launches mid-July. The move departs from months of aggressive undercutting among Chinese players. In mid-June, ByteDance introduced a Seedance 2.0 Mini video model at 23 yuan per million tokens, after Xiaomi and Tencent slashed prices on certain AI models.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/After%20triggering%20price%20war,%20DeepSeek%20reverses%20course%20with%20surcharge%20on%20peak-hour%20API%20use.pdf"}, {"id": "scmp-02", "title": "As China's Communist Party grows more slowly, its members are getting older", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Politics", "Society"], "summary": "The Communist Party's membership grew at a slower pace last year while its average age climbed, official data released before the party's July 1 founding anniversary shows. The party had 101 million members at the end of 2025, up 1 per cent, the slowest growth in at least five years, with annual growth declining every year since 2021. Nearly 30 per cent of members were aged 61 or older, the highest share in five years, while under-35s fell to around 22 per cent. Members now account for 7.21 per cent of China's population amid a broader demographic crisis. Women made up 31.5 per cent, ethnic minorities 7.8 per cent, and 59 per cent held college degrees. India's BJP claimed to have surpassed it with 140 million members.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/As%20China%E2%80%99s%20Communist%20Party%20grows%20more%20slowly,%20its%20members%20are%20getting%20older.pdf"}, {"id": "scmp-03", "title": "China challenges US, Japan's grip on high-end carbon fibre with new T1100 production line", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI", "Trade", "Defence"], "summary": "China has stepped up mass production of ultra-high-strength carbon fibre amid US and Japanese export restrictions, a move that could upend the global supply chain for a material critical to aerospace, drones and robotics. State-owned CNBM launched three production lines in Jiangsu, including one capable of producing 1,000 tonnes of T1100-grade fibre a year, plus two facilities with combined 5,600-tonne capacity. In March, China became the first to mass produce T1200-grade fibre, the world's strongest. T1100's tensile strength is about 7,000 megapascals, seven times that of high-strength steel. For decades the US and Japan dominated the sector, with Toray, Teijin and Mitsubishi holding 52 per cent of the 2025 market. Global demand exceeded 220,000 tonnes in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%20challenges%20US,%20Japan%E2%80%99s%20grip%20on%20high-end%20carbon%20fibre%20with%20new%20T1100%20production%20line.pdf"}, {"id": "scmp-04", "title": "China claims biggest AI model trained on local chips, as Meituan releases LongCat-2.0", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI"], "summary": "Food delivery giant Meituan released LongCat-2.0, which it claims is China's largest AI model trained entirely on home-grown hardware. The open-sourced LLM boasts 1.6 trillion parameters and a 1 million-token context window, on par with DeepSeek's V4-pro. Meituan said it was the industry's first trillion-parameter model to complete full training and inference on a 50,000-card domestic cluster, using Huawei's HCCL communication library. Unlike DeepSeek, which used domestic chips only for inference, LongCat-2.0 used local hardware for pre-training too. The model outperformed Google's Gemini 3.1 Pro on some benchmarks but lagged OpenAI's GPT-5.5 and Anthropic's Claude 4.8 Opus. Meituan said memory was the \"primary bottleneck,\" with accelerators offering less memory than Nvidia's banned H800.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%20claims%20biggest%20AI%20model%20trained%20on%20local%20chips,%20as%20Meituan%20releases%20LongCat-2.0.pdf"}, {"id": "scmp-05", "title": "China faces economic balancing act: AI and exports boom while consumers stay home", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Politics", "Technology & AI"], "summary": "China's leadership held two high-level meetings on Monday, focusing on new growth drivers like AI, decarbonisation and healthcare while calling for a stronger domestic market. Premier Li Qiang chaired a State Council meeting pledging to accelerate AI breakthroughs and build ultra-large computing clusters, while fourth-ranking official Wang Huning convened a separate meeting on boosting consumption. Macquarie's Larry Hu said the meetings showed Beijing was aware of a \"two-speed economy,\" where exports and tech are strong but domestic demand is weak. Exports rose 11.8 per cent in the first five months, but retail sales edged up just 1.4 per cent. The Politburo prepares a high-stakes growth assessment next month, with China maintaining goals of peak emissions by 2030 and carbon neutrality by 2060.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%20faces%20economic%20balancing%20act%20AI%20and%20exports%20boom%20while%20consumers%20stay%20home.pdf"}, {"id": "scmp-06", "title": "China's Politburo orders rapid-response overhaul in the face of floods and extreme heat", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Environment", "Politics"], "summary": "China's top leadership warned of the dangers of extreme weather and the need for better forecasting and disaster prevention. The Politburo issued the warning at its first flood and drought prevention meeting of the year in Beijing on Tuesday, chaired by President Xi Jinping, urging local governments to \"always put the safety of people's lives first\" and prevent mass casualties. It stressed flood control safety for major rivers and lakes and improved rescue capabilities. On June 18, the Water Resources Ministry issued a level 4 emergency response for five provinces. Beijing also closed an investigation into a July 2024 disaster in which 32 residents died in a Miyun nursing home during floods, punishing 17 officials for insufficient monitoring and ineffective responses.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%E2%80%99s%20Politburo%20orders%20rapid-response%20overhaul%20in%20the%20face%20of%20floods%20and%20extreme%20heat.pdf"}, {"id": "scmp-07", "title": "China's factory activity returns to expansion in June but weak domestic demand lingers", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "China's factory activity returned to expansionary territory in June, supported by strong exports, while domestic demand stayed weak. The official manufacturing PMI rose to 50.3 from 50.0, beating a 50.03 projection. The new orders subindex returned to expansion at 51.2, high-technology manufacturing hit 53.5, and new export orders rose to 50.1. May exports skyrocketed 19.4 per cent year on year, but a struggling property sector and soft labour market have households tightening belts. Non-manufacturing PMI came in at 50.2. The ex-factory price index unexpectedly fell to 48.2, with ING's Lynn Song warning \"the spectre of deflation hasn't been vanquished.\" In May, retail sales fell 0.6 per cent year on year, the first decline since the end of Covid lockdowns in 2022.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%E2%80%99s%20factory%20activity%20returns%20to%20expansion%20in%20June%20but%20weak%20domestic%20demand%20lingers.pdf"}, {"id": "scmp-08", "title": "China's millionaire population grows slower than global average. Is the wealth boom over?", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "China's millionaire population and personal wealth grew much more slowly than the global average last year, partly due to a sluggish property market, according to UBS' latest Global Wealth Report. Mainland China added 14,079 individuals with US$1 million or more in assets in 2025, up 0.3 per cent to 5.3 million. Global personal wealth grew over 10 per cent, the fastest since 2017, lifting the millionaire population 1.5 per cent to 57.5 million, but China, Hong Kong and Taiwan rose only 4.6 per cent. Mainland home prices fell 4.1 per cent, offsetting an 18 per cent CSI 300 rise. The US led with 441,078 net new millionaires. UBS economist James Mazeau saw a low chance China's millionaire population would shrink.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/China%E2%80%99s%20millionaire%20population%20grows%20slower%20than%20global%20average.%20Is%20the%20wealth%20boom%20over.pdf"}, {"id": "scmp-09", "title": "Chip supply chain braces for more price hikes as upstream parts create new bottlenecks", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The AI-driven price surge in the semiconductor supply chain is spreading beyond GPUs and memory to upstream materials and manufacturing inputs, creating bottlenecks that could slow global AI infrastructure buildout. Suppliers of capacitors, power chips, copper-clad laminates and industrial gases are gaining leverage. Japan's Murata, the largest maker of multilayer ceramic capacitors, will raise prices for AI-server and automotive products by 10 to 40 per cent from July. Power semiconductor makers Infineon, Texas Instruments and China's Yangjie Technology have raised prices, with Yangjie lifting its full range 10 to 15 per cent. Analysts said pricing power is shifting from end chips to equipment and components. Japan's Nippon Sanso will raise helium prices over 30 per cent from July amid Middle East conflicts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Chip%20supply%20chain%20braces%20for%20more%20price%20hikes%20as%20upstream%20parts%20create%20new%20bottlenecks.pdf"}, {"id": "scmp-10", "title": "How China's new education plan tackles talent crunch, self-reliance amid tech challenges", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Society", "Politics", "Technology & AI"], "summary": "China has placed national strategy and self-reliance in technology and talent at the heart of its five-year education agenda, responding to global tech competition and a shrinking school-age population. A State Council blueprint issued Monday sets out 15 flagship programmes, including stronger vocational training, more emphasis on science and engineering, and \"globally influential\" doctoral training centres. Targets include 100 industry-education consortiums and 200 vocational training bases. Researcher Chu Zhaohui said China has the world's biggest number of PhDs but \"subpar PhDs\" remain a concern. The plan calls for a demographic early-warning system, smaller class sizes, and expanded intake at \"double first-class\" universities. Annual births fell below 8 million last year, and over 21,000 kindergartens closed in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/How%20China%E2%80%99s%20new%20education%20plan%20tackles%20talent%20crunch,%20self-reliance%20amid%20tech%20challenges.pdf"}, {"id": "scmp-11", "title": "Iraq's 14 million barrels of trapped oil travels through Strait of Hormuz", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Vessels carrying about 14 million barrels of Iraqi oil exited the Gulf in late June and are now carrying crude to buyers in Asia, Europe and the US, per Bloomberg tanker tracking, equivalent to 1.4 million barrels a day over 10 days. All cargoes loaded since late February that were stuck have now sailed. Hundreds of ships were blocked after the US and Israel began attacks on Iran on February 28, prompting Iran's near closure of Hormuz, a choke point for a fifth of world oil and gas. Shipping picked up after the US and Iran paused hostilities. Iraq, hard hit financially, is pushing for bigger OPEC quotas. US envoys Steve Witkoff and Jared Kushner met mediators in Qatar to discuss regional issues including Iran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Iraq%E2%80%99s%2014%20million%20barrels%20of%20trapped%20oil%20travels%20through%20Strait%20of%20Hormuz.pdf"}, {"id": "scmp-12", "title": "Nvidia to boost its China robotics team amid emergence of physical AI", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI"], "summary": "US chip giant Nvidia is ramping up a talent drive for its robotics team in China, a market whose vendors dominate global shipments. The firm is recruiting for more than a dozen roles across Beijing, Shanghai and Shenzhen, spanning embodied intelligence, simulation, implementation and solutions. Nvidia aims to accelerate moving robots from research labs into real-world deployment, with staff working on its GR00T humanoid foundation model and Cosmos simulation world model. The push underscores its emphasis on physical AI, after CEO Jensen Huang declared \"physical AI has arrived\" at GTC 2026. Chinese vendors were expected to account for 95 per cent of global humanoid shipments in 2025. Morgan Stanley raised its 2026 forecast for China's humanoid shipments to 50,000 units.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Nvidia%20to%20boost%20its%20China%20robotics%20team%20amid%20emergence%20of%20physical%20AI.pdf"}, {"id": "scmp-13", "title": "Price war fallout: China imposes 60-day payment cap for energy storage sector", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Beijing's campaign to curb disorderly low-price competition, or neijuan (involution), has reached the energy storage sector with new rules shortening payment cycles. A payment cap released by the China Automotive Battery Innovation Alliance and the China Energy Storage Alliance on Monday covers EV and energy storage batteries. Buyers must complete inspection within seven working days, while battery makers must limit payment terms to SME suppliers to a maximum of 60 calendar days. Fitch's Jing Yang said stricter requirements may \"modestly pressure downstream players' flexibility.\" CATL and Ganfeng edged up, while BYD and CALB fell. The framework mirrors a 2025 pledge by 17 carmakers. Energy storage battery sales surged nearly 88 per cent to 255.5 GWh in the first five months.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Price%20war%20fallout_%20China%20imposes%2060-day%20payment%20cap%20for%20energy%20storage%20sector.pdf"}, {"id": "scmp-14", "title": "Should China worry more about keeping defence customers than winning new deals?", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Retaining existing customers and a potential resurgence of Russian competition may be among the biggest challenges for Chinese weapons sales, according to a report from the Bengaluru-based Takshashila Institution. The study cautioned against the \"reductive assumption that Chinese weaponry is uniformly poor in quality,\" but found persistent problems with reliability, spare parts and after-sales support. In May 2025, Pakistan relied on Chinese aircraft and air defence during its four-day conflict with India, and US media reported Chinese radars failed to detect US aircraft in Venezuela. China was the world's fourth-largest arms exporter from 2020 until narrowly overtaken by Germany in 2024. The report flagged Norinco's VT-4 tank and CASC's CH-4B drone as consistently deficient; eight CH-4Bs reportedly crashed in Iraq.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/Should%20China%20worry%20more%20about%20keeping%20defence%20customers%20than%20winning%20new%20deals.pdf"}, {"id": "scmp-15", "title": "The great AI reckoning: how China is flipping the script on US' new industrial revolution", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "As the US marks its 250th anniversary, it confronts a world order dominated by its relationship with China, which has shaken the West's belief in US exceptionalism through advances from EVs to robotics. The piece revisits the 1969 \"Needham Question\" on why the Industrial Revolution happened in Europe not China, and notes Hong Kong scholar Erik Baark's inversion: why China now shows an alternative dynamism in innovation. For years the West dismissed China as a copier reliant on subsidies, but that has shifted as it leads in cutting-edge tech. Treasury Secretary Scott Bessent called China getting ahead \"the biggest risk to AI.\" Writer Kaiser Kuo dubbed the shift \"the great reckoning,\" with AI compared to the Industrial Revolution at the centre of US worries.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/01%20Jul%202026/01%20Jul%20SCMP/The%20great%20AI%20reckoning%20how%20China%20is%20flipping%20the%20script%20on%20US%E2%80%99%20new%20industrial%20revolution.pdf"}, {"id": "scmp-16", "title": "Trump reports more than US$1.4 billion in income from crypto ventures", "source": "SCMP", "date": "1 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "US President Donald Trump reported more than US$1.4 billion in income from his family's crypto ventures last year, showing he now earns most of his income from digital assets that have benefited from his policies, according to his latest financial disclosures. The 2025 filing with the Office of Government Ethics showed he received more than $500 million from World Liberty Financial and another $635 million from sales of his $TRUMP meme coins. He also reported
