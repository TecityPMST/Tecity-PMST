  SCMP:{c:"var(--scmp)", name:"South China Morning Post"}
};
const SRC_ORDER = ["WSJ","ST","BT","SCMP"];
const TAGS = {
  "Geopolitics":"#b4513b","Energy":"#bd7d18","Finance & Markets":"#2f7d57","Technology & AI":"#4361c2",
  "Southeast Asia":"#1d9e75","Defence":"#6b6f76","Society":"#a44b8a","Politics":"#9a5b2a",
  "Trade":"#2a8f9e","Environment":"#3f9b56"
};

function Sun(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>);}
function Moon(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>);}
function SearchIcon(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>);}

function Metric({m}){
  return (<div className="metric">
    <div className="v num">{m.value}</div>
    <div className="l">{m.label}</div>
    <div className="s">{m.sub}</div>
  </div>);
}

function Tag({t}){
  const c = TAGS[t] || "#888";
  return <span className="tag" style={{color:c, background:c+"14", borderColor:c+"33"}}>{t}</span>;
}

function SourceTag({s}){
  return (<span className="src"><span className="dot" style={{background:SRC[s].c}}></span>{s}</span>);
}

function ArticleRow({a}){
  return (<div className="article">
    <div className="head">
      <SourceTag s={a.source}/>
      <h4>{a.url ? <a href={a.url} target="_blank" rel="noopener">{a.title}</a> : a.title}</h4>
      <span className="date">{a.date}</span>
    </div>
    <p>{a.summary}</p>
    <div className="tags">{a.tags.map(t=><Tag key={t} t={t}/>)}</div>
  </div>);
}

function SourceBars({counts,total}){
  const max = Math.max(...SRC_ORDER.map(s=>counts[s]||0),1);
  return (<div className="panel">
    <div className="eyebrow" style={{marginBottom:14}}>Coverage by source</div>
    {SRC_ORDER.map(s=>(
      <div className="bar-row" key={s}>
        <div className="name" style={{color:SRC[s].c}}>{s}</div>
        <div className="bar-track"><div className="bar-fill" style={{width:((counts[s]||0)/max*100)+"%", background:SRC[s].c}}/></div>
        <div className="cnt num">{counts[s]||0}</div>
      </div>))}
    <div className="s" style={{color:"var(--muted)", fontSize:12.5, marginTop:14}}>{total} articles across {SRC_ORDER.filter(s=>counts[s]).length} sources</div>
  </div>);
}

function Overview({day}){
  const [lead, ...rest] = day.briefingCards;
  return (<div>
    <div className="section">
      <div className="section-head"><h2>Today's briefing</h2></div>
      <div className="lead-card">
        <div className="k">{lead.title}</div>
        <p>{lead.body}</p>
      </div>
      <div className="cards">
        {rest.map((c,i)=>(<div className="card" key={i}><h3>{c.title}</h3><p>{c.body}</p></div>))}
      </div>
    </div>
    <div className="section">
      <div className="section-head"><h2>Lead stories</h2><span className="hint">Top of today's feed</span></div>
      <div className="split">
        <div className="panel" style={{padding:"6px 26px 10px"}}>
          {day.articles.slice(0,4).map(a=><ArticleRow key={a.id} a={a}/>)}
        </div>
        <SourceBars counts={day.sourceCounts} total={day.totalArticles}/>
      </div>
    </div>
  </div>);
}

function Feed({day}){
  const [q,setQ]=useState("");
  const [src,setSrc]=useState(new Set());
  const [tags,setTags]=useState(new Set());
  const toggle=(set,setter,v)=>{const n=new Set(set); n.has(v)?n.delete(v):n.add(v); setter(n);};
  const filtered = useMemo(()=>{
    const qq=q.trim().toLowerCase();
    return day.articles.filter(a=>{
      if(src.size && !src.has(a.source)) return false;
      if(tags.size && !a.tags.some(t=>tags.has(t))) return false;
      if(qq && !(a.title.toLowerCase().includes(qq)||a.summary.toLowerCase().includes(qq))) return false;
      return true;
    });
  },[q,src,tags,day]);
  const active = src.size||tags.size||q;
  return (<div className="section">
    <div className="feed-controls">
      <div className="search">
        <SearchIcon/>
        <input type="text" placeholder="Search headlines and summaries" value={q} onChange={e=>setQ(e.target.value)} />
      </div>
      <div className="pills">
        {SRC_ORDER.map(s=>(
          <span key={s} className={"pill"+(src.has(s)?" active":"")} style={src.has(s)?{background:SRC[s].c}:{}} onClick={()=>toggle(src,setSrc,s)}>{s}</span>))}
      </div>
    </div>
    <div className="tagrow">
      {Object.keys(TAGS).map(t=>(
        <span key={t} className={"pill"+(tags.has(t)?" active":"")} style={tags.has(t)?{background:TAGS[t]}:{}} onClick={()=>toggle(tags,setTags,t)}>{t}</span>))}
    </div>
    <div className="count num">{filtered.length} of {day.totalArticles} articles{active?" · filtered":""}</div>
    {filtered.length ? filtered.map(a=><ArticleRow key={a.id} a={a}/>) : <div className="empty">No articles match your filters.</div>}
  </div>);
}

function App(){
  const days = window.ALL_DAYS || {};
  const keys = Object.keys(days).sort().reverse();
  const [date,setDate]=useState(keys[0]);
  const [tab,setTab]=useState("overview");
  const [theme,setTheme]=useState("light");
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  if(!keys.length) return <div className="wrap"><p>No dashboard data available.</p></div>;
  const day = days[date];
  const fmt = (k)=>{const d=new Date(k+"T00:00:00"); return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});};
  const fmtShort = (k)=>{const d=new Date(k+"T00:00:00"); return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});};
  return (<div>
    <header className="top">
      <div className="topbar">
        <div className="brand">
          <span className="title">Tecity News Dashboard</span>
          <span className="meta num">{fmt(day.date)} · {day.totalArticles} articles</span>
        </div>
        <div className="controls">
          <select className="date" value={date} onChange={e=>setDate(e.target.value)}>
            {keys.map(k=><option key={k} value={k}>{fmtShort(k)}</option>)}
          </select>
          <span className="toggle" role="button" aria-label="Toggle theme" onClick={()=>setTheme(theme==="light"?"dark":"light")}>{theme==="light"?<Moon/>:<Sun/>}</span>
        </div>
      </div>
    </header>
    <div className="wrap">
      <section className="hero">
        <div className="eyebrow">Executive digest</div>
        <div className="digest"><span className="lead">{day.executiveDigest}</span></div>
      </section>
      <div className="metrics">{day.keyMetrics.map((m,i)=><Metric key={i} m={m}/>)}</div>
      <div className="tabs">
        <div className={"tab"+(tab==="overview"?" active":"")} onClick={()=>setTab("overview")}>Overview</div>
        <div className={"tab"+(tab==="feed"?" active":"")} onClick={()=>setTab("feed")}>Feed</div>
      </div>
      {tab==="overview" ? <Overview day={day}/> : <Feed day={day}/>}
      <footer>Tecity News Dashboard · rolling 7-trading-day window · generated locally, synced via OneDrive</footer>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
