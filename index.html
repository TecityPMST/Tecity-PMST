hip%20rout%20puts%20South%20Korea%27s%20%27ant%27%20investors%20to%20the%20test%20as%20margin%20debt%20soars.pdf"}, {"id": "st-04", "title": "From ceramah to chatbots: Malaysian parties turn to AI to analyse, engage voters", "source": "ST", "date": "10 Jun 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Malaysian political parties are deploying AI ahead of Johor and Negeri Sembilan state elections to analyse voter behaviour, shape narratives and target messaging. MCA's secretary-general said parties \"can no longer operate without AI,\" using it to integrate voter data and track hot-button issues in real time. Campaigning hasn't officially begun, but the digital groundwork is well under way. The shift marks a move from traditional ceramah rallies to chatbots.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/From%20ceramah%20to%20chatbots%20Malaysian%20political%20parties%20turn%20to%20AI%20tools%20to%20analyse%2C%20engage%20voters.pdf"}, {"id": "st-05", "title": "How Israel is frustrating Donald Trump's Iran plans", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "A 12-hour Israel-Iran flare-up on June 7 highlighted Trump's twin failures to control ally Israel and cajole Iran into a lasting truce. Netanyahu defied Trump twice — bombing Beirut despite a limited ceasefire, prompting an 11-missile Iranian salvo that caused no damage. Trump unconvincingly insisted both sides sought an \"immediate CEASEFIRE.\" The 40-day US-Israel war against Iran left an unresolved Hormuz blockade and an energy-price spike.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/How%20Israel%20is%20frustrating%20Donald%20Trump%27s%20Iran%20plans.pdf"}, {"id": "st-06", "title": "Lebanese president appeals to Israeli government to pursue talks, not war", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "Lebanese President Joseph Aoun made a rare direct appeal to Israel's government and people to negotiate, warning a military solution \"will never provide you with security.\" Lebanon is in US-mediated direct talks with Israel for a full cessation of hostilities, despite Hezbollah's opposition. Aoun said he won't meet Netanyahu before a deal and that any pact would be non-aggression, not full peace, framed around the 2002 Arab Peace Initiative. \"We are ready... Are you?\" he said.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Lebanese%20president%20appeals%20to%20Israeli%20government%20to%20pursue%20talks%2C%20not%20war.pdf"}, {"id": "st-07", "title": "Modern warfare offers important AI lessons for enterprises", "source": "ST", "date": "10 Jun 2026", "tags": ["Technology & AI", "Defence"], "summary": "AI battlefield platforms — Ukraine's NATO-backed Delta system and the Israel-US \"Project Maven\" campaign against Iran — show how fusing drone, satellite and ground data into one picture enables faster, more precise action. The piece argues enterprises can draw the same lesson: value comes from integrating fragmented signals, not any single algorithm. Banks, hospitals and agencies face similar needs to spot anomalies in real time. Situational awareness is the transferable advantage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Modern%20warfare%20offers%20important%20AI%20lessons%20for%20enterprises.pdf"}, {"id": "st-08", "title": "Russian attacks on Ukraine kill three; Zelensky upbeat on talks with US envoys", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "Russian drone and missile attacks on Ukraine's Kharkiv region killed three, including a pregnant woman, as Crimea repelled drones amid intensified Ukrainian strikes on Russian oil facilities. Zelensky reported a \"positive\" call with US envoys Steve Witkoff and Jared Kushner, welcoming a push for a settlement in coming weeks. His open letter proposing face-to-face talks with Putin was rebuffed. Zelensky said Putin's circle is split and Russia's economy is in \"terrible\" shape.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Russian%20attacks%20on%20Ukraine%20kill%20three%20Zelensky%20upbeat%20on%20talks%20with%20US%20envoys.pdf"}, {"id": "st-09", "title": "Singapore to negotiate FTA with East African bloc", "source": "ST", "date": "10 Jun 2026", "tags": ["Southeast Asia", "Trade"], "summary": "Singapore will negotiate a free-trade agreement with the eight-member East African Community, its first with an African partner, President Tharman announced during a Tanzania state visit. It would also be the EAC's first FTA with a non-African partner, spanning Burundi, the DR Congo, Kenya, Rwanda, Somalia, South Sudan, Tanzania and Uganda. Tharman called it a timely move to diversify trade networks amid geopolitical tensions. Singapore could be East African exporters' gateway to ASEAN.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Singapore%20to%20negotiate%20FTA%20with%20East%20African%20bloc.pdf"}, {"id": "st-10", "title": "SpaceX IPO: Can Singapore investors buy in?", "source": "ST", "date": "10 Jun 2026", "tags": ["Finance & Markets", "Technology & AI", "Southeast Asia"], "summary": "Ahead of SpaceX's June 12 Nasdaq debut — the largest IPO ever at ~US$1.75 trillion — Singapore investors are keen but will likely have to wait until after listing to buy shares. SpaceX, which owns AI firm xAI, will be the first AI company to go public, ahead of Anthropic and OpenAI, and has earmarked ~30% (US$22.5 billion) for retail. US distribution runs through brokers like Fidelity, Robinhood and SoFi, subject to eligibility. Indications of interest close June 10 with no fill guaranteed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/SpaceX%20IPO%20Can%20Singapore%20investors%20buy%20in.pdf"}, {"id": "st-11", "title": "The problem with China's appeal for Europe to reject Japan's 'remilitarism'", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "The column examines China's lobbying of European capitals to view PM Takaichi's Japan as a revival of \"militarism\" that Europe, as co-author of the post-1945 order, should help contain. The pitch — echoed by FM Wang Yi at the Munich Security Conference — jars against D-Day commemorations in which Germany participated fully. The author flags the awkwardness of Beijing invoking WWII history against Japan. It frames a contested narrative battle over the Asian security order.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/The%20problem%20with%20China%27s%20appeal%20for%20Europe%20to%20reject%20Japan%27s%20%27remilitarism%27.pdf"}, {"id": "st-12", "title": "Trump claims Middle East peace deal near", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "Trump said negotiators were in the \"final throes\" of a Middle East peace deal — \"two or three days\" — after Iran and Israel halted fresh hostilities. He has repeatedly claimed an imminent agreement even as diplomacy stalls and both sides trade fire despite an April 8 ceasefire. Tehran insists any deal include Lebanon, where Israel presses its war on Hezbollah. Netanyahu said the \"fire on that front is contained.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Trump%20claims%20Middle%20East%20peace%20deal%20near.pdf"}, {"id": "st-13", "title": "UN warns of 'deepening crisis' in oceans, urges action", "source": "ST", "date": "10 Jun 2026", "tags": ["Environment"], "summary": "A UN World Ocean Assessment — five years' work by 600 scientists across 1,352 pages — warns oceans face a \"deepening crisis\" of warming, rising seas, shrinking ice and ecosystems near tipping points. It details the toll of climate change, pollution and overfishing on seas covering 70% of the planet. The report urges stronger multilateral cooperation and science-based decisions. It welcomed January's entry into force of a high-seas biodiversity treaty.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/UN%20warns%20of%20%27deepening%20crisis%27%20in%20oceans%2C%20urges%20action.pdf"}, {"id": "st-14", "title": "US judge blocks Trump's $100,000 fee for skilled visa applications", "source": "ST", "date": "10 Jun 2026", "tags": ["Politics", "Trade"], "summary": "A US federal judge blocked Trump's US$100,000 fee on employer H-1B visa applications for skilled foreign workers, ruling it an unlawful tax that usurps Congress's taxation powers. Judge Leo Sorokin sided with 20 Democratic-led states, writing the payment \"is a tax, regardless of what it is called.\" A different judge upheld the fee in December in a separate, now-appealed case. The fee is part of Trump's broader immigration crackdown.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/US%20judge%20blocks%20Trump%27s%20129%2C000%20fee%20for%20skilled%20visa%20applications.pdf"}, {"id": "st-15", "title": "Xi leaves Pyongyang with renewed signs of China's influence", "source": "ST", "date": "10 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Xi Jinping left North Korea after a two-day visit that state media called a \"new era,\" easing fears that NK-Russia ties could eclipse Chinese influence. Pyongyang staged full pageantry — a 21-gun salute, friendship parade and a visit to the Sino-Korean Friendship Tower. Analysts saw the trip as reaffirming Beijing's sway amid Kim's deepening ties with Moscow. Xi and Kim pledged to defend each other's sovereignty; Kim called China his \"foremost strategic priority.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20ST/Xi%20leaves%20Pyongyang%20with%20renewed%20signs%20of%20China%27s%20influence.pdf"}, {"id": "bt-01", "title": "Bank of Japan to consider pausing bond taper next fiscal year: sources", "source": "BT", "date": "10 Jun 2026", "tags": ["Finance & Markets"], "summary": "The Bank of Japan will consider pausing its bond-taper (quantitative tightening) beyond next fiscal year, sources said, even as it is expected to raise its short-term rate to 1% from 0.75% next week. The nine-member board is split between soothing investor nerves and steadily shrinking the balance sheet. Current purchases run about 2.1 trillion yen a month. The June 15-16 meeting will set a new plan for fiscal 2027 and beyond.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Bank%20of%20Japan%20to%20consider%20pausing%20bond%20taper%20next%20fiscal%20year%20sources.pdf"}, {"id": "bt-02", "title": "China prepares two trillion yuan plan to fund nationwide AI build-out", "source": "BT", "date": "10 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China is preparing to spend around 2 trillion yuan (about S$362 billion) over five years building a national network of interconnected data centres to advance its AI sector and surpass the US. State firms China Mobile and China Telecom would run most centres, relying on local suppliers like Huawei for at least 80% of technology such as AI chips — squeezing out Nvidia and AMD. The NDRC-led blueprint is Beijing's most aggressive AI-infrastructure push yet. It echoes past campaigns to build national champions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/China%20prepares%20two%20trillion%20yuan%20plan%20to%20fund%20nationwide%20AI%20build-out.pdf"}, {"id": "bt-03", "title": "Geopolitical shocks: what moves first and why it matters", "source": "BT", "date": "10 Jun 2026", "tags": ["Finance & Markets", "Energy"], "summary": "A BT analysis of the Iran conflict's most intense phase (Feb 27-Mar 20) shows geopolitical shocks follow a recognisable pattern: energy prices move first, equities follow unevenly, and outcomes diverge by exposure. Brent rose from US$72 to US$100 a barrel as Hormuz supplies were disrupted. For investors, the value lies in knowing where to look and how to position as a shock unfolds. Energy markets lead and are the most forceful initial point of impact.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Geopolitical%20shocks%20What%20moves%20first%20and%20why%20it%20matters.pdf"}, {"id": "bt-04", "title": "Giant oil supertanker orders eclipse record set in 2008", "source": "BT", "date": "10 Jun 2026", "tags": ["Energy", "Trade"], "summary": "Shipowners have ordered a record 262 very large crude carriers — surpassing the 2008 peak that preceded a glut and rate collapse — with deliveries stretching to the decade's end. The Iran war and Hormuz disruption sent VLCC freight rates to record highs of several hundred thousand dollars a day, double pre-conflict levels. The boom dominated the Posidonia conference in Athens. History suggests today's ordering spree could seed the next downturn.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Giant%20oil%20supertanker%20orders%20eclipse%20record%20set%20in%202008.pdf"}, {"id": "bt-05", "title": "Governance is key to families' ability to sustain generational wealth: US adviser", "source": "BT", "date": "10 Jun 2026", "tags": ["Finance & Markets", "Society"], "summary": "Sustaining family wealth across generations hinges on governance, not just portfolios, US adviser Zhou Lu of Vanquour Global Wealth Management said. The largest US and European families overcome \"shirtsleeves to shirtsleeves in three generations\" through entrenched governance, legal structures, the operating business, the family office and managing family dynamics. Western culture's focus on risk mitigation — including among family members — is a discipline Asian families can learn from. Governance matters most in the long run.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Governance%20is%20key%20to%20families%27%20ability%20to%20sustain%20generational%20wealth%2C%20says%20US%20adviser.pdf"}, {"id": "bt-06", "title": "How banks are using SpaceX to woo the super rich", "source": "BT", "date": "10 Jun 2026", "tags": ["Finance & Markets"], "summary": "Wall Street banks are using the SpaceX IPO to court the ultra-wealthy, with 350 investors — including Robert Kraft and Kenneth Langone — gathering at JPMorgan to hear Elon Musk pitch the offering. Nearly two dozen banks will reap over US$500 million in fees, the largest such payout ever. Jamie Dimon framed it as the \"democratisation of finance,\" treating individuals like big institutions. Just as valuable is the chance to deepen and win ultra-rich client relationships.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/How%20banks%20are%20using%20SpaceX%20to%20woo%20the%20super%20rich.pdf"}, {"id": "bt-07", "title": "Malaysia's government-linked funds to invest in firms under MY Value Up programme", "source": "BT", "date": "10 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "Malaysia's government-linked funds will channel capital to better-governed, value-creating firms under the MY Value Up programme, DPM Ahmad Zahid Hamidi said at Invest Malaysia 2026. Participants include Permodalan Nasional, the EPF and the Retirement Fund. Launched in March, the initiative targets the top 88 listed companies — about 80% of Bursa Malaysia's market cap — to articulate and deliver value-creation agendas. It anchors the 2026-2030 Capital Market Masterplan to attract investors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Malaysia%27s%20government-linked%20funds%20to%20invest%20in%20firms%20under%20MY%20Value%20Up%20programme.pdf"}, {"id": "bt-08", "title": "Once deemed a costly failure, industrial policy is making a return - led by China", "source": "BT", "date": "10 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "State-led industrial policy, long dismissed as a costly failure outside the Asian Tigers, is returning — led by China — inaugurating a new era of economic planning. The World Bank, which once warned the Tigers' success was hard to replicate, now acknowledges its old advice didn't hold and published a 2026 guide on 21st-century industrial policy. Better macro management and subdued inflation make conditions more favourable. The debate has shifted from whether to intervene to how.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Once%20deemed%20a%20costly%20failure%2C%20industrial%20policy%20is%20making%20a%20return%20-%20led%20by%20China.pdf"}, {"id": "bt-09", "title": "SGX's Global Listing Board needs a few strong listings right out the gate", "source": "BT", "date": "10 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "SGX's new Nasdaq-linked Global Listing Board needs strong early debuts or risks comparisons to the disappointing SPAC experiment, BT argues. After engineering the dual-listing bridge, the first GLB companies face pressure to perform; a poor showing would hurt both shareholders and SGX. Of three SPACs that listed in Singapore from 2021, only Vertex's VTAC completed a combination — with 17Live faring poorly afterward. Strong listings \"right out the gate\" are seen as critical.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/SGX%27s%20Global%20Listing%20Board%20needs%20a%20few%20strong%20listings%20right%20out%20the%20gate.pdf"}, {"id": "bt-10", "title": "Single founders, billion-dollar valuations: AI is minting unicorn startups at birth", "source": "BT", "date": "10 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "AI has altered company-building economics so that startups can be \"born as unicorns,\" Granite Asia's Jenny Lee said, with single founders shipping products in months and earning revenue within a year. Past cycles needed years of runway, 20-40 engineers and three to five years to product-market fit. She cited a sub-100-person drug-discovery firm that produced 20-plus biologics molecules and over US$100 million net profit in 2025. Asian founders, she noted, prioritise profitability over valuations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Single%20founders%2C%20billion-dollar%20valuations%20AI%20is%20minting%20unicorn%20startups%20at%20birth.pdf"}, {"id": "bt-11", "title": "State of play at half-time of 2026", "source": "BT", "date": "10 Jun 2026", "tags": ["Finance & Markets"], "summary": "At the midpoint of 2026, equity markets have rallied to new highs despite Middle East headwinds, energy prices, inflation and rising yields, on an AI and semiconductor rerating and easing after the Trump-Xi summit and US-Iran talks. Three mega-IPOs at favourable valuations lifted sentiment. Friday's strong US payrolls triggered a selloff that spread to Asia, but Bank of Singapore stays \"overweight\" US equities. It urges a disciplined long-term game plan amid concentrated AI positioning.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/State%20of%20play%20at%20half-time%20of%202026.pdf"}, {"id": "bt-12", "title": "Trump's sliding approval ratings weigh on Republicans' prospects in US midterms", "source": "BT", "date": "10 Jun 2026", "tags": ["Politics"], "summary": "Trump's sliding approval ratings are weighing on Republican prospects for the November 2026 midterms, raising the odds Democrats recapture the House and possibly the Senate. Democrats now hold a 5.3-point generic-ballot edge, a near-eight-point swing from 2024, threatening 21 Republicans who won by under eight points. Immigration, once Trump's strongest card, has become a liability. Thin congressional margins make the shift an \"existential\" concern for the GOP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Trump%27s%20sliding%20approval%20ratings%20weigh%20on%20Republicans%27%20prospects%20in%20US%20midterms.pdf"}, {"id": "bt-13", "title": "Why Europe's tariff plans on China won't solve its trade problem", "source": "BT", "date": "10 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Europe's planned tariffs on China won't fix its deeper trade problems and risk hurting regional supply chains, the column argues. European policymakers increasingly echo US rhetoric that surging Chinese imports threaten domestic industry, beyond earlier strategic concerns over rare earths. The EU's bilateral goods deficit with China hit nearly EUR 360 billion in 2025, almost double a prior level, as EU firms struggle in China while Chinese exports to Europe surge. Tariffs address symptoms, not the structural export issue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/Why%20Europe%27s%20tariff%20plans%20on%20China%20won%27t%20solve%20its%20trade%20problem.pdf"}, {"id": "bt-14", "title": "With Trump mulling stakes in big AI firms, will the tech become a public utility?", "source": "BT", "date": "10 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "Trump and Senator Bernie Sanders share unlikely common ground on the US government taking equity stakes in AI companies so the public shares the rewards. Sanders proposed a sovereign wealth fund holding 50% stakes in big AI firms, via new legislation, to give the public a role and capture trillions in profits for affected workers. Anxiety is rising over AI's automation of white- and blue-collar jobs as OpenAI and Anthropic head to market. Questions remain over how a government shareholder would wield influence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20BT/With%20Trump%20mulling%20stakes%20in%20big%20AI%20firms%2C%20will%20the%20tech%20become%20a%20public%20utility.pdf"}, {"id": "scmp-01", "title": "Anthropic opens powerful Mythos AI model to public - with some safeguards", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Technology & AI"], "summary": "Anthropic is releasing a public version of its powerful Mythos model — branded Claude Fable 5 — with guardrails barring risky uses like cybersecurity, after an earlier preview alarmed the world by finding thousands of software flaws. It is the most powerful model Anthropic has made for wide use, touting software-engineering and analytics performance. Access had been limited to about 200 organisations, including the US government, under the Glasswing programme. Broader access could extend momentum that lifted Anthropic's valuation above US$965 billion and past OpenAI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Anthropic%20opens%20powerful%20Mythos%20AI%20model%20to%20public%20%E2%80%93%20with%20some%20safeguards.pdf"}, {"id": "scmp-02", "title": "As Putin courts Southeast Asia, does 'Russia need Asean more'?", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "A Russia-ASEAN summit in Kazan on June 17-18 could ease Southeast Asia's energy crisis and Moscow's diplomatic isolation, though not all bloc leaders may attend. Analysts are divided on whether ASEAN chair, Philippine President Marcos, will travel. Marking 35 years of ties, the two sides discussed expanding their strategic partnership. The meeting tests how far Southeast Asia will engage Moscow for energy amid the Hormuz-driven crunch.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/As%20Putin%20courts%20Southeast%20Asia%2C%20does%20%E2%80%98Russia%20need%20Asean%20more%E2%80%99.pdf"}, {"id": "scmp-03", "title": "BYD playing catch-up with demand for fast-charging batteries as appeal of EVs rises", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "BYD said demand for its second-generation Blade batteries and Flash Charging technology outstrips capacity, capping 2026 sales volume even as Chinese EVs gain globally. Chairman Wang Chuanfu said BYD is adding 20,000-30,000 units a month of battery capacity and expects strong domestic and international growth once supply catches up next year. Mass production of the new Blade Battery began in March. BYD is the world's largest EV producer.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/BYD%20playing%20catch-up%20with%20demand%20for%20fast-charging%20batteries%20as%20appeal%20of%20EVs%20rises.pdf"}, {"id": "scmp-04", "title": "Beijing regulators expect Hong Kong to press advantage as offshore yuan hub", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China's market regulators pledged \"unswerving\" support for Hong Kong as an international financial centre and urged the city to press its advantage as an offshore yuan hub. Officials want Hong Kong banks to deepen offshore-market development to boost global yuan adoption, said HKAB chair Sun Yu after a Beijing meeting. Regulators promised to expand opening-up and advance mainland-Hong Kong market connectivity. The push supports yuan internationalisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Beijing%20regulators%20expect%20Hong%20Kong%20to%20press%20advantage%20as%20offshore%20yuan%20hub.pdf"}, {"id": "scmp-05", "title": "China chip giants form US$577 million 'patient capital' fund to counter US tech curbs", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A coalition of Chinese tech firms including CXMT and Alibaba launched a 3.91 billion yuan (US$577 million) private-equity fund to provide \"patient capital\" for \"hard tech\" R&D amid tightening US export curbs. The Shanghai-registered Changzhi Hanhai fund pools capital from leading firms and state-backed vehicles, with a CXMT unit holding the largest 30% stake. It targets long-term deep-tech financing that short-term venture capital shuns. The move underscores China's self-sufficiency drive.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/China%20chip%20giants%20form%20US%24577%20million%20%E2%80%98patient%20capital%E2%80%99%20fund%20to%20counter%20US%20tech%20curbs.pdf"}, {"id": "scmp-06", "title": "China to bust Yangtze River chokepoint with US$11 billion 'water staircase' project", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Trade", "Energy"], "summary": "China began construction of a 77.2 billion yuan (US$11.4 billion) project to build mega ship locks — \"water staircases\" — near the Three Gorges dam to double freight capacity on the Yangtze. The decade-long effort, in the 15th five-year plan, would let larger vessels link inland industrial hubs to coastal ports. It aims to transform Asia's longest river into a high-capacity shipping conduit. Monday's groundbreaking advanced a cornerstone logistics strategy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/China%20to%20bust%20Yangtze%20River%20chokepoint%20with%20US%2411%20billion%20%E2%80%98water%20staircase%E2%80%99%20project.pdf"}, {"id": "scmp-07", "title": "Driven by AI demand, China on track to pass US as top nuclear energy producer", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Energy", "Technology & AI"], "summary": "China is on track to overtake the US as the world's top nuclear-energy producer, building reactors at unrivalled speed as AI demand and the Hormuz energy crunch renew the push for reliable power, Gavekal reported. China now accounts for nearly half of reactors under construction globally and could match US capacity within five years. The US still leads in nuclear-fusion research. Beijing has made nuclear a crucial pillar of energy security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Driven%20by%20AI%20demand%2C%20China%20on%20track%20to%20pass%20US%20as%20top%20nuclear%20energy%20producer.pdf"}, {"id": "scmp-08", "title": "Exclusive: US Chagos talks confirmed amid concerns over China's naval ambitions", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "The US confirmed regular high-level talks with Britain to secure the long-term future of the Diego Garcia base amid concerns over China's expanding Indo-Pacific naval ambitions, an official told SCMP. Reports say the White House is weighing buying the Chagos Islands directly from Mauritius. Britain agreed last year to transfer sovereignty to Mauritius while preserving US-UK base use. The official called Diego Garcia \"vital and indispensable.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/ExclusiveUS%20Chagos%20talks%20confirmed%20amid%20concerns%20over%20China%E2%80%99s%20expanding%20naval%20ambitions.pdf"}, {"id": "scmp-09", "title": "Has Xi Jinping's North Korea visit helped cement China's vital role?", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics"], "summary": "Analysts said Xi's North Korea visit reinforced China's \"indispensable\" regional role and Pyongyang's reliance on Beijing's economic support. Xi reached a \"critical consensus\" with Kim and pledged to guide ties \"in the new era,\" with both exchanging views on regional stability. Kim said the visit signalled their closer alignment to the world. The trip helped counter the narrative that Russia could supplant China's influence over Pyongyang.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Has%20Xi%20Jinping%E2%80%99s%20North%20Korea%20visit%20helped%20cement%20China%E2%80%99s%20vital%20role.pdf"}, {"id": "scmp-10", "title": "Is Trump calling the shots on Israel, or just pretending to?", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Politics"], "summary": "Analysts are sceptical of Trump's claims to have reprimanded Netanyahu over escalations with Hezbollah and Iran, seeing mostly finger-wagging and political theatre. Trump told Axios he warned \"Bibi, you better be careful, or you will be on your own,\" after earlier calling him \"crazy.\" Netanyahu's repeated unilateral defiance is seen as embarrassing Trump. Jaded observers view the exchanges as playing to the crowd rather than real leverage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Is%20Trump%20calling%20the%20shots%20on%20Israel%2C%20or%20just%20pretending%20to.pdf"}, {"id": "scmp-11", "title": "Japan's looming typhoon crisis threatens disaster defences and tourism", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Environment", "Society"], "summary": "Japan could face one of its worst typhoon seasons, with Weathernews forecasting up to 28 typhoons affecting the country and 14 possibly making landfall — near historical extremes. A typical year sees about 25 systems form and under three strike the main islands. Repeated extreme weather could strain disaster defences and a summer tourism industry already stretched by packed trains and hotels. Typhoon Jangmi earlier caused disruption.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Japan%E2%80%99s%20looming%20typhoon%20crisis%20threatens%20disaster%20defences%20and%20tourism.pdf"}, {"id": "scmp-12", "title": "Microsoft cuts hundreds of cloud jobs on mainland as China, US tighten data laws", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Microsoft is laying off an estimated 200-400 employees at its Azure cloud unit in China as it navigates tightening US and Chinese data regulations — its third China downsizing in two years. Affected Beijing and Shanghai staff were told roles end July 6, with severance and an option to relocate to Canada. Other Microsoft units in China remain. The cuts reflect restrictions on cross-border data flows between the two countries.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Microsoft%20cuts%20hundreds%20of%20cloud%20jobs%20on%20mainland%2C%20as%20China%2C%20US%20tighten%20data%20laws%20sources.pdf"}, {"id": "scmp-13", "title": "New head of China's financial regulator vows to prevent 'blow-ups' in first policy meeting", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "China's new financial-regulator chief Ding Xiangqun used her first major policy meeting to vow to prevent financial \"blow-ups,\" targeting risks at smaller lenders, the property sector and local-government debt. Ding, who took over the NFRA on May 29 and is the first woman to lead it, called for tougher supervision and faster risk resolution. She backed expanding the property white-list programme and transforming local-government financing vehicles. Smaller institutions are a key concern.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/New%20head%20of%20China%E2%80%99s%20financial%20regulator%20vows%20to%20prevent%20%E2%80%98blow-ups%E2%80%99%20in%20first%20policy%20meeting.pdf"}, {"id": "scmp-14", "title": "Pentagon blacklist raises spectre of investment curbs for Chinese tech firms", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Trade", "Technology & AI"], "summary": "The Pentagon's widening \"Chinese military companies\" blacklist raises reputational and future US-investment-curb risks for top Chinese tech firms, legal experts say. The latest Section 1260H additions span AI, EVs, robotics and biotech — including Alibaba, Baidu, BYD, WuXi AppTec, RoboSense and Unitree — plus memory makers CXMT and YMTC, which had been briefly removed in February. The firms strongly reject the \"military\" label. The list follows earlier additions of Tencent and others.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Pentagon%20blacklist%20raises%20spectre%20of%20investment%20curbs%20for%20Chinese%20tech%20firms.pdf"}, {"id": "scmp-15", "title": "Trump's China thaw faces resistance from Congress and his own administration", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "Trump's warmer tone toward Beijing — endorsing Chinese students, China-linked farmland purchases and downplaying espionage — faces resistance from Congress and his own administration, which keeps tariffs and export curbs in place. His suggestions of letting Chinese carmakers into the US are a non-starter across the executive branch and both parties. Experts call it a transactional approach that raises doubts about the truce's durability. The gap between rhetoric and policy is widening.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/Trump%E2%80%99s%20China%20thaw%20faces%20resistance%20from%20Congress%20and%20his%20own%20administration.pdf"}, {"id": "scmp-16", "title": "US launches strikes against Iran over downed Apache helicopter", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The US launched fresh \"self-defence strikes\" against Iran on Tuesday, hours after Trump said Iran downed a US Apache helicopter patrolling the Strait of Hormuz, calling it a \"proportional response to unjustified Iranian aggression.\" Both US crew members were rescued near Oman, uninjured; US reports said the Apache had contacted an Iranian drone before going down. The retaliation adds new strain to fragile peace efforts. It reignites escalation risk just as a ceasefire seemed to hold.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/US%20launches%20strikes%20against%20Iran%20over%20downed%20Apache%20helicopter.pdf"}, {"id": "scmp-17", "title": "US trade court to Trump administration: speed up tariff refunds", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Trade", "Politics"], "summary": "The US Court of International Trade pressed the Trump administration to speed refunds of billions in tariffs collected under IEEPA and later struck down by the Supreme Court in February. \"The time has come to refund all the duties,\" Judge Richard Eaton said, citing \"growing inequity\" between big importers and small businesses. Customs said it would refund the rest later, unable to \"do it all at once.\" Of an estimated US$166 billion collected, only part has been returned.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/US%20trade%20court%20to%20Trump%20administration%20speed%20up%20tariff%20refunds.pdf"}, {"id": "scmp-18", "title": "With a global AI data shortage looming, China boosts its own supply", "source": "SCMP", "date": "10 Jun 2026", "tags": ["Technology & AI", "Trade"], "summary": "China unveiled a nationwide plan to boost the supply of high-quality AI training data, treating data as a core strategic asset amid a looming global data drought. The National Data Administration's draft road map expands the supply, circulation and commercialisation of industry-specific datasets to anchor the \"AI Plus\" strategy. By 2028 it aims for a validated dataset ecosystem spanning research, manufacturing, energy, finance, healthcare and more. The push aims to secure China a leading AI position.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/10%20Jun%202026/10%20Jun%20SCMP/With%20a%20global%20AI%20data%20shortage%20looming%2C%20China%20boosts%20its%20own%20supply.pdf"}]}};</script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SRC = {
  WSJ:{c:"var(--wsj)", name:"Wall Street Journal"},
  ST:{c:"var(--st)", name:"Straits Times"},
  BT:{c:"var(--bt)", name:"Business Times"},
  SCMP:{c:"var(--scmp)", name:"South China Morning Post"}
};
const SRC_ORDER = ["WSJ","ST","BT","SCMP"];
const TAGS = {
  "Geopolitics":"#b4513b","Energy":"#bd7d18","Finance & Markets":"#2f7d57","Technology & AI":"#4361c2",
  "Southeast Asia":"#1d9e75","Defence":"#6b6f76","Society":"#a44b8a","Politics":"#9a5b2a",
  "Trade":"#2a8f9e","Environment":"#3f9b56"
};

function Sun(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>);}
function Moon(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>);}
function SearchIcon(){return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>);}

function Metric({m}){
  return (<div className="metric">
    <div className="v num">{m.value}</div>
    <div className="l">{m.label}</div>
    <div className="s">{m.sub}</div>
  </div>);
}

function Tag({t}){
  const c = TAGS[t] || "#888";
  return <span className="tag" style={{color:c, background:c+"14", borderColor:c+"33"}}>{t}</span>;
}

function SourceTag({s}){
  return (<span className="src"><span className="dot" style={{background:SRC[s].c}}></span>{s}</span>);
}

function ArticleRow({a}){
  return (<div className="article">
    <div className="head">
      <SourceTag s={a.source}/>
      <h4>{a.url ? <a href={a.url} target="_blank" rel="noopener">{a.title}</a> : a.title}</h4>
      <span className="date">{a.date}</span>
    </div>
    <p>{a.summary}</p>
    <div className="tags">{a.tags.map(t=><Tag key={t} t={t}/>)}</div>
  </div>);
}

function SourceBars({counts,total}){
  const max = Math.max(...SRC_ORDER.map(s=>counts[s]||0),1);
  return (<div className="panel">
    <div className="eyebrow" style={{marginBottom:14}}>Coverage by source</div>
    {SRC_ORDER.map(s=>(
      <div className="bar-row" key={s}>
        <div className="name" style={{color:SRC[s].c}}>{s}</div>
        <div className="bar-track"><div className="bar-fill" style={{width:((counts[s]||0)/max*100)+"%", background:SRC[s].c}}/></div>
        <div className="cnt num">{counts[s]||0}</div>
      </div>))}
    <div className="s" style={{color:"var(--muted)", fontSize:12.5, marginTop:14}}>{total} articles across {SRC_ORDER.filter(s=>counts[s]).length} sources</div>
  </div>);
}

function Overview({day}){
  const [lead, ...rest] = day.briefingCards;
  return (<div>
    <div className="section">
      <div className="section-head"><h2>Today's briefing</h2></div>
      <div className="lead-card">
        <div className="k">{lead.title}</div>
        <p>{lead.body}</p>
      </div>
      <div className="cards">
        {rest.map((c,i)=>(<div className="card" key={i}><h3>{c.title}</h3><p>{c.body}</p></div>))}
      </div>
    </div>
    <div className="section">
      <div className="section-head"><h2>Lead stories</h2><span className="hint">Top of today's feed</span></div>
      <div className="split">
        <div className="panel" style={{padding:"6px 26px 10px"}}>
          {day.articles.slice(0,4).map(a=><ArticleRow key={a.id} a={a}/>)}
        </div>
        <SourceBars counts={day.sourceCounts} total={day.totalArticles}/>
      </div>
    </div>
  </div>);
}

function Feed({day}){
  const [q,setQ]=useState("");
  const [src,setSrc]=useState(new Set());
  const [tags,setTags]=useState(new Set());
  const toggle=(set,setter,v)=>{const n=new Set(set); n.has(v)?n.delete(v):n.add(v); setter(n);};
  const filtered = useMemo(()=>{
    const qq=q.trim().toLowerCase();
    return day.articles.filter(a=>{
      if(src.size && !src.has(a.source)) return false;
      if(tags.size && !a.tags.some(t=>tags.has(t))) return false;
      if(qq && !(a.title.toLowerCase().includes(qq)||a.summary.toLowerCase().includes(qq))) return false;
      return true;
    });
  },[q,src,tags,day]);
  const active = src.size||tags.size||q;
  return (<div className="section">
    <div className="feed-controls">
      <div className="search">
        <SearchIcon/>
        <input type="text" placeholder="Search headlines and summaries" value={q} onChange={e=>setQ(e.target.value)} />
      </div>
      <div className="pills">
        {SRC_ORDER.map(s=>(
          <span key={s} className={"pill"+(src.has(s)?" active":"")} style={src.has(s)?{background:SRC[s].c}:{}} onClick={()=>toggle(src,setSrc,s)}>{s}</span>))}
      </div>
    </div>
    <div className="tagrow">
      {Object.keys(TAGS).map(t=>(
        <span key={t} className={"pill"+(tags.has(t)?" active":"")} style={tags.has(t)?{background:TAGS[t]}:{}} onClick={()=>toggle(tags,setTags,t)}>{t}</span>))}
    </div>
    <div className="count num">{filtered.length} of {day.totalArticles} articles{active?" · filtered":""}</div>
    {filtered.length ? filtered.map(a=><ArticleRow key={a.id} a={a}/>) : <div className="empty">No articles match your filters.</div>}
  </div>);
}

function App(){
  const days = window.ALL_DAYS || {};
  const keys = Object.keys(days).sort().reverse();
  const [date,setDate]=useState(keys[0]);
  const [tab,setTab]=useState("overview");
  const [theme,setTheme]=useState("light");
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  if(!keys.length) return <div className="wrap"><p>No dashboard data available.</p></div>;
  const day = days[date];
  const fmt = (k)=>{const d=new Date(k+"T00:00:00"); return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});};
  const fmtShort = (k)=>{const d=new Date(k+"T00:00:00"); return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});};
  return (<div>
    <header className="top">
      <div className="topbar">
        <div className="brand">
          <span className="title">Tecity News Dashboard</span>
          <span className="meta num">{fmt(day.date)} · {day.totalArticles} articles</span>
        </div>
        <div className="controls">
          <select className="date" value={date} onChange={e=>setDate(e.target.value)}>
            {keys.map(k=><option key={k} value={k}>{fmtShort(k)}</option>)}
          </select>
          <span className="toggle" role="button" aria-label="Toggle theme" onClick={()=>setTheme(theme==="light"?"dark":"light")}>{theme==="light"?<Moon/>:<Sun/>}</span>
        </div>
      </div>
    </header>
    <div className="wrap">
      <section className="hero">
        <div className="eyebrow">Executive digest</div>
        <div className="digest"><span className="lead">{day.executiveDigest}</span></div>
      </section>
      <div className="metrics">{day.keyMetrics.map((m,i)=><Metric key={i} m={m}/>)}</div>
      <div className="tabs">
        <div className={"tab"+(tab==="overview"?" active":"")} onClick={()=>setTab("overview")}>Overview</div>
        <div className={"tab"+(tab==="feed"?" active":"")} onClick={()=>setTab("feed")}>Feed</div>
      </div>
      {tab==="overview" ? <Overview day={day}/> : <Feed day={day}/>}
      <footer>Tecity News Dashboard · rolling 7-trading-day window · generated locally, synced via OneDrive</footer>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
