20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/There%E2%80%99s%20an%20IPO%20Gold%20Rush-and%20Texas%20Is%20Coming%20for%20New%20York.pdf"}, {"id": "wsj-14", "title": "Trump Administration Increasingly Pessimistic of Clinching Iran Nuclear Deal", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Senior U.S. officials told reporters Friday that a nuclear deal with Iran is growing increasingly unlikely, a rare admission that a core Trump foreign-policy goal may fail. They demanded Iran declare the Strait of Hormuz open and stop firing on ships, with one suggesting serious consequences if no promise came by Saturday. Under the June interim agreement, both sides have 60 days to reach a final nuclear pact and pledged to maintain the \"status quo\" on Iran's program and U.S. sanctions. Officials said no deal is possible unless Iran hands over its buried enriched uranium. Trump said, \"They violate the agreement every day, they lie, they cheat.\" Treasury imposed new sanctions on businessman Ali Ansari, and Washington reimposed penalties on Iranian oil sales while resuming strikes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Trump%20Administration%20Increasingly%20Pessimistic%20of%20Clinching%20Iran%20Nuclear%20Deal.pdf"}, {"id": "wsj-15", "title": "Why Home Sales Are Poised to Pick Up This Summer", "source": "WSJ", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "U.S. home sales are showing signs of reviving after a long slump. Mortgage rate locks for home purchases rose in June to their highest level in more than three years, up 14% from a year earlier and 10% from May, according to Optimal Blue; locks typically lead closings by about a month. Redfin said pending home sales also ticked up to their highest since May. The spring season ended weakly, with existing-home sales down 2.4% in June per the National Association of Realtors. The 30-year fixed rate averaged 6.49% this week, per Freddie Mac, stabilizing after volatility tied to the war with Iran and well below the near-8% 2023 peak. Economists have trimmed forecasts on war-driven inflation. A new housing bill may become law.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20WSJ/Why%20Home%20Sales%20Are%20Poised%20to%20Pick%20Up%20This%20Summer.pdf"}, {"id": "st-01", "title": "'They don't need people': The workers left behind by China's robot drive", "source": "ST", "date": "13 Jul 2026", "tags": ["Technology & AI", "Society", "Trade"], "summary": "In Kunshan, the county outside Shanghai that once made a third of the world's laptops, jobless migrant workers now camp in Zhenchuan Good Samaritan Park while recruiters fill daily quotas from 4am. Hu Xinbing, 31, once earned up to 6,000 yuan (S$1,145) monthly on contracts with Apple suppliers Pegatron and Inventec; in May he took gig security shifts paying 60-120 yuan. Automation and trade frictions have cut positions and wages as Kunshan's government backs AI and flying cars. Peking University professor Zhang Dandan estimates 40 million gig workers in China's manufacturing sector, up to 80 per cent of staff in some plants, with few reskilling paths. Hu said: \"It's all robots driving screws.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/'They%20don't%20need%20people'%20The%20workers%20left%20behind%20by%20China's%20robot%20drive.pdf"}, {"id": "st-02", "title": "Woodlands Gateway: A new transport hub", "source": "ST", "date": "13 Jul 2026", "tags": ["Society", "Southeast Asia", "Trade"], "summary": "JTC tender documents seen by The Straits Times outline a 5.66ha mixed-use transport hub, due about 2030, at the heart of the 35ha Woodlands Gateway project. Phase one includes a 6,500 sq m bus interchange requiring LTA design approval, 28,000 sq m of retail and 22,000 sq m of flexible offices, connecting directly to the Johor Bahru-Singapore RTS Link and Woodlands North MRT. Underground roads will route heavy vehicles to industrial premises. Two factory blocks totalling 104,000 sq m follow by 2031 and 2034. The precinct is expected to anchor over 25,000 jobs. The RTS Link, operational by end-2026, can carry 10,000 travellers hourly each way. JTC sought design consultancy interest on June 30.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/1.%20Woodlands%20Gateway%20A%20new%20transport%20hub.pdf"}, {"id": "st-03", "title": "China keeps an anxious eye on 'Malacca Dilemma' amid roiling Hormuz crisis", "source": "ST", "date": "13 Jul 2026", "tags": ["Geopolitics", "Energy", "Southeast Asia"], "summary": "The US-Israel-Iran war that began in February and near-shut the Strait of Hormuz has revived Chinese anxiety over the Strait of Malacca, jointly managed by Singapore, Indonesia and Malaysia. About 80 per cent of China's oil imports transit Malacca, versus 40 per cent via Hormuz; CSIS estimated nearly US$963 billion (S$1.24 trillion) of Chinese trade crossed Malacca in 2024. Beijing credits diversified sourcing from 49 countries, renewables and domestic output; oil is under 20 per cent of energy use. April's reported Indonesia-US defence deal on overflight access, later downplayed by Jakarta, drew Chinese commentary. Analysts warn war-risk premiums and sanctions could halt shipping without a blockade. Trump and Xi agreed in May on \"constructive strategic stability\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/China%20keeps%20an%20anxious%20eye%20on%20'Malacca%20Dilemma'%20amid%20roiling%20Hormuz%20crisis.pdf"}, {"id": "st-04", "title": "Meta is ushering in the era of the K-shaped company", "source": "ST", "date": "13 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "This Bloomberg Opinion column by Beth Kowitt argues Big Tech is splitting into a \"K-shaped company\", with Meta the clearest case. Top AI executives and researchers command nine-figure packages, with some reportedly offered US$500,000 in extra equity to stay, while other staff face layoffs, cut median pay, headcount slashing and keystroke tracking used to train AI agents. Employees are signing petitions, criticising management and attempting to unionise in the UK. Executives called the new AI organisation's roll-out \"atrocious\"; CTO Andrew Bosworth said staff can \"leave, or disagree and commit\". Zuckerberg conceded mistakes and slower-than-expected AI agent progress, and Meta's Muse Spark system has lagged OpenAI and Anthropic benchmarks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/Meta%20is%20ushering%20in%20the%20era%20of%20the%20K-shaped%20company.pdf"}, {"id": "st-05", "title": "Russian strikes kill eight, wound dozens as Ukraine's Zelensky seeks faster weapons deliveries", "source": "ST", "date": "13 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Russian missile and drone attacks on July 11 killed eight people and wounded dozens across Ukraine. Two glide bombs struck a crowded area of Sumy, killing five and injuring 30, hitting a bus stop; glide bombs injured 10 in Zaporizhzhia, a missile killed two in Odesa, and a drone wounded seven in Kharkiv. Russia fired six ballistic and six cruise missiles plus 121 drones overnight; Ukraine downed two cruise missiles and 111 drones. President Volodymyr Zelensky urged faster allied arms deliveries, citing a deal with Donald Trump to license Ukrainian production of Patriot interceptors. Ukraine's drone chief Robert Brovdi said units hit 21 fuel tankers in the Sea of Azov, taking the week's total to 76 vessels.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/Russian%20strikes%20kill%20eight,%20wound%20dozens%20as%20Ukraine's%20Zelensky%20seeks%20faster%20weapons%20deliveries.pdf"}, {"id": "st-06", "title": "S'pore banks hit record highs, DBS tops $70 for the first time", "source": "ST", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Singapore's three banks hit record highs on expectations rates stay higher for longer and optimism before August second-quarter results. DBS passed $70 for the first time on July 9, ending the week up 5.7 per cent at $70.45; OCBC rose 8.46 per cent to $27.43 and UOB 10.12 per cent to $44.38. The Straits Times Index gained 4.29 per cent to 5,469.29; Singapore Airlines added 1.31 per cent to $7.71 despite oil swings from renewed US-Iran tensions. SGX will cut board lots to 10 units for $10-$100 stocks. Gold traded near US$4,100 an ounce. An eToro survey found 51 per cent of Singapore investors expect AI stocks to rise in 2026. Advance Q2 GDP estimates come July 14.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/S'pore%20banks%20hit%20record%20highs,%20DBS%20tops%2070%20for%20the%20first%20time.pdf"}, {"id": "st-07", "title": "S'pore, Malaysia partnership driven by mutual respect, understanding of each other's interests: Tharman", "source": "ST", "date": "13 Jul 2026", "tags": ["Politics", "Southeast Asia", "Geopolitics"], "summary": "Ahead of a four-day state visit to Malaysia at the invitation of King Sultan Ibrahim Sultan Iskandar, President Tharman Shanmugaratnam said the two countries will occasionally disagree but must not let differences hinder their broader partnership. In a written interview with Bernama published July 12, he said ties rest on \"mutual respect and understanding of each other's interests\" and were never purely transactional, with disputes resolved calmly under international law. Regional stability, he said, depends on the discipline to manage disputes responsibly. He cited 60 years of trust, the Johor-Singapore Special Economic Zone and RTS Link, and scope to deepen market integration, supply chain resilience, renewable energy and carbon credits ahead of Singapore's 2027 ASEAN chairmanship.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/S'pore,%20Malaysia%20partnership%20driven%20by%20mutual%20respect,%20understanding%20of%20each%20other's%20interests%20Tharman.pdf"}, {"id": "st-08", "title": "Seatrium transfers its first bit of energy from its floating lab to Singapore's electricity grid", "source": "ST", "date": "13 Jul 2026", "tags": ["Energy", "Technology & AI", "Environment"], "summary": "SGX-listed Seatrium has exported electricity from its floating living lab at Pioneer Yard to Singapore's national grid, with Minister-in-charge of Energy and Science and Technology Tan See Leng witnessing the first electron transfer on July 3. Built in 2025 under a 2020 partnership with the Energy Market Authority, the platform is billed as the world's first remote-controlled, grid-connected floating facility that can generate, store, manage and export power, operated from a centre about 1km away. LNG delivered by vessel fuels its gas engines; surplus output could meet the monthly needs of roughly 1,500 four-room HDB households. Seatrium Digital's Lee Wey Lii said the milestone proves a marine-classed platform can meet Singapore's stringent grid connection standards.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/Seatrium%20transfers%20its%20first%20bit%20of%20energy%20from%20its%20floating%20lab%20to%20Singapore's%20electricity%20grid.pdf"}, {"id": "st-09", "title": "Singapore proposes mandatory notification when firms use personal data for AI training", "source": "ST", "date": "13 Jul 2026", "tags": ["Technology & AI", "Politics", "Society"], "summary": "Organisations using personal data to train generative AI models must clearly notify affected users under proposed advisory guidelines from the Personal Data Protection Commission, whose one-month public consultation closed on July 1. The PDPC wants AI-specific notices, such as in-product pop-ups or dedicated webpages, rather than broad privacy notices citing \"new product development\", detailing what data the model ingests and how to opt out or withdraw consent. It is unclear whether explicit consent is required, whether anonymised data is covered, or if firms may deny services to those refusing. The guidelines are a priority for Denise Wong, PDPC's fifth commissioner since April 2026, who flagged risks from AI smart glasses, smartwatches and palm-scanning payment systems collecting biometric data.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20ST/Singapore%20proposes%20mandatory%20notification%20when%20firms%20use%20personal%20data%20for%20AI%20training.pdf"}, {"id": "bt-01", "title": "Apac investors cool on venture capital despite returns topping global private markets in 2025", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Venture capital led private asset classes in 2025, returning 22 per cent globally and 15.3 per cent in Asia-Pacific, according to an MSCI report, with private equity a distant second at 13.3 per cent. VC posted a 7.2 per cent fourth-quarter return, its best since 2021, and a 19 per cent IRR, rebounding from under 5 per cent in 2024 and negative territory in 2023. Yet sentiment is flat: a Coller Capital survey found 60 per cent of investors keeping 2026 VC allocations unchanged and 25 per cent cutting them. Apac investors instead want more GP relationships, with 53 per cent planning to add, bucking the global trend. Geopolitics influences allocations for 47 per cent of Apac investors versus 37 per cent globally. Private credit appetite cooled, with just 29 per cent raising allocations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Apac%20investors%20cool%20on%20venture%20capital%20despite%20returns%20topping%20global%20private%20markets%20in%202025.pdf"}, {"id": "bt-02", "title": "Culture shift needed to curb controlling shareholders' 'long shadow', boost investor confidence", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A BT commentary argues Singapore needs a boardroom culture shift to strengthen minority shareholder protections and revive the local market. It recalls Ho Ching's 2005 speech warning of \"clever financial engineering\" by S-Reit managers, which swiftly changed behaviour and led MAS to tighten property fund guidelines in 2007. Today, many listed companies have controlling shareholders who determine strategy and appoint all directors. SMU law professor Aurelio Gurrea-Martinez argues that even independent directors acting properly can leave minorities nervous, depressing valuations. His proposed reforms include a \"double vote\" requiring majority-of-minority approval for independent director appointments, a class action regime, and greater use of Section 216A of the Companies Act. MAS consulted on investor compensation proposals, alongside the Value Unlock programme from the Equities Market Review Group.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Culture%20shift%20needed%20to%20curb%20controlling%20shareholders'%20'long%20shadow',%20boost%20investor%20confidence.pdf"}, {"id": "bt-03", "title": "Flight to safety: New citizens and PRs drive Singapore luxury home sales as broader market cools", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia", "Society"], "summary": "Singapore luxury home sales hit a four-year high in H1 2026 even as the broader private residential market cooled. Realion research counted 353 Core Central Region homes sold at S$5 million or more, up 24.7 per cent year on year and 54.8 per cent above H1 2024. Knight Frank logged 128 large prime non-landed sales worth S$1.1 billion, with average unit prices up 8.3 per cent to S$2,689 psf. Buyers include new citizens and permanent residents upgrading from tenancies, plus wealthy investors seeking safe havens. Overall private home sales fell 12 per cent to 10,909 units. Foreign buyers made up just 4.7 per cent of new purchases after 2023 stamp duty hikes. The top deal was a S$37 million unit at The Marq.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Flight%20to%20safety%20New%20citizens%20and%20PRs%20drive%20Singapore%20luxury%20home%20sales%20as%20broader%20market%20cools.pdf"}, {"id": "bt-04", "title": "How social enterprises can play a crucial role in mining of critical minerals", "source": "BT", "date": "13 Jul 2026", "tags": ["Energy", "Environment", "Geopolitics"], "summary": "Surging AI, EV and renewables demand is intensifying pressure on critical minerals supply. JPMorgan Global Research expects global lithium demand to rise 16 per cent year on year in 2026, with EVs accounting for 58 per cent and energy storage 30 per cent, and a further 36 per cent increase by 2030. Dalberg Advisors' Jeffrey Berger warns the scramble shifts social and environmental risk onto vulnerable regions, citing a 50-year moratorium on new mining permits in Palawan and road blockades in Chile's Atacama. Extraction is dominated by for-profit giants such as BHP and Glencore, and state-owned firms in China. Social enterprises can strengthen community engagement, benefit-sharing, traceability and mine closure. BHP's partnership with C-Res on its Australian Local Buying Program is cited as a model.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/How%20social%20enterprises%20can%20play%20a%20crucial%20role%20in%20mining%20of%20critical%20minerals.pdf"}, {"id": "bt-05", "title": "MSCI and UBS ink partnership to improve transparency in private markets", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "MSCI and UBS announced a strategic partnership on Jul 10 to tackle fragmented data and limited transparency in private markets. UBS will adopt MSCI's AI-powered private markets platform, contributing insights from its limited partner, wealth management and asset management businesses. The platform combines fund discovery, portfolio management, analytics and benchmarking in one ecosystem, with automated data processing and independent performance data intended to deliver more timely, consistent portfolio insights and bridge private and public markets. UBS will also help advocate for broader standardisation. UBS CEO Sergio Ermotti said the shared ambition is to \"increase transparency in private markets\". MSCI chairman and CEO Henry Fernandez said investors want public-market rigour in private assets. Separately, BlackRock Aladdin expanded its Preqin Benchmarks and Indices solutions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/MSCI%20and%20UBS%20ink%20partnership%20to%20improve%20transparency%20in%20private%20markets.pdf"}, {"id": "bt-06", "title": "Malaysia's data centre pipeline beats its neighbours, but Singapore will retain premium status: JPMorgan", "source": "BT", "date": "13 Jul 2026", "tags": ["Technology & AI", "Energy", "Southeast Asia"], "summary": "JPMorgan says Singapore will keep its data centre pricing power and premium status thanks to high efficiency standards, but those same rules will push the next wave of hyperscale and AI capacity to Malaysia. Singapore rents run US$330 to US$475 per kilowatt monthly, more than double Sydney or Northern Virginia. The draft Digital Infrastructure Bill would mandate efficiency requirements for operators with 3 MW or more of critical IT load, allow forced capacity cuts and penalties up to 10 per cent of Singapore turnover, and drive PUE towards 1.25 to 1.3. Malaysia's pipeline has reached nearly 13 GW, exceeding Indonesia, Thailand and Singapore combined, with build costs of US$7 million per MW versus Singapore's US$12 million. Keppel DC Reit and Sunway Construction are JPMorgan's preferred plays.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Malaysia's%20data%20centre%20pipeline%20beats%20its%20neighbours,%20but%20Singapore%20will%20retain%20premium%20status%20JPMorgan.pdf"}, {"id": "bt-07", "title": "Prepare for a perilous summer in markets", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "A Financial Times column warns that thin summer liquidity, a high-stakes second-quarter earnings season and multiple cross-currents create conditions for a market shakeout, echoing 2024 when Japanese stocks fell 12 per cent in a day. Barclays' Emmanuel Cau calls it a \"perilous summer period\". Hotspots include new Federal Reserve chair Kevin Warsh, whose reticence and reformist agenda leave investors unsure how he will respond to rising oil prices and the Iran conflict. The yen sits at its weakest against the dollar in 40 years, above 162, raising intervention and carry-trade unwind risks. Gold suffered its worst month since 2008, down over 11 per cent, while Apple, Meta, Amazon, Alphabet, Microsoft and Nvidia have shed US$2 trillion in market value since October 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Prepare%20for%20a%20perilous%20summer%20in%20markets.pdf"}, {"id": "bt-08", "title": "Record electricity prices: Fixed contracts, cost pass-on mitigate impact for Singapore data centre operators", "source": "BT", "date": "13 Jul 2026", "tags": ["Energy", "Technology & AI", "Southeast Asia"], "summary": "A 17 per cent quarter-on-quarter jump in Singapore's Q3 electricity tariffs threatens data centre margins, but Reits say fixed procurement and pass-through leases insulate them for now. Power accounts for 50 to 60 per cent of operators' operating expenses. Phillip Securities' Darren Chan notes most hedges run six to 24 months, so the full impact may only land through 2027. CapitaLand Ascendas Reit has locked Singapore rates until June 2027 and secured favourable bulk-purchase pricing for FY2027 and FY2028; Keppel DC Reit has contracts through end-2026 and over 90 per cent pass-through on Singapore and Ireland co-location assets, keeping net electricity costs below 3 per cent of Opex. Risks are indirect: tenant credit stress and weaker rental reversions. Analysts expect spillover growth to shift towards Johor and Batam.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Record%20electricity%20prices%20Fixed%20contracts,%20cost%20pass-on%20mitigate%20impact%20for%20Singapore%20data%20centre%20operators.pdf"}, {"id": "bt-09", "title": "SK Hynix debut is a bet that AI breaks boom-and-bust chip cycle", "source": "BT", "date": "13 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "SK Hynix raised US$26.5 billion in the largest US listing ever by a foreign company, with shares jumping 13 per cent on debut. Much of the proceeds will expand chip manufacturing, reversing years of industry restraint after past supply gluts. CEO Kwak Noh-Jung said the memory business has changed, with ChatGPT-era shortages lifting prices of everything from iPads to Xbox consoles and customers now seeking long-term supply deals; he expects the deficit to extend beyond 2030. SK Group chairman Chey Tae-won said \"it's not a cyclical business any more\", floating a \"memory as a service\" rental model and more than US$35 billion of US investment. Sceptics including Michael Burry and Ray Dalio warn of an AI bubble. Alphabet, Amazon, Meta, Microsoft and Oracle have added US$350 billion in debt.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/SK%20Hynix%20debut%20is%20a%20bet%20that%20AI%20breaks%20boom-and-bust%20chip%20cycle.pdf"}, {"id": "bt-10", "title": "Singapore banks' battle for wealth talent goes beyond private bankers", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore's wealth management hiring race is broadening beyond relationship managers into technology, investment, compliance and risk roles. Russell Reynolds' hiring activity for wealth-supporting technology roles rose by a mid-teens percentage over the past year. Ethos BeathChapman's Christopher Poh estimates a private bank recruiting 50 relationship managers needs about 30 more middle and back-office staff. DBS, OCBC and UOB are expanding across Asia: OCBC plans 600 consumer banking relationship manager hires over three years, UOB aims to double wealth income to at least S$2.5 billion by 2030, and DBS will open 18 wealth centres by end-2027. Talent is scarce, especially for offshore Greater China and South-east Asian markets. Poh said strong bankers now seek 30 to 35 per cent base-salary rises, though recruiters say platform quality outranks pay.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Singapore%20banks'%20battle%20for%20wealth%20talent%20goes%20beyond%20private%20bankers.pdf"}, {"id": "bt-11", "title": "Singapore, Hong Kong IPO rebound set to continue into H2 2026, but risks remain", "source": "BT", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore and Hong Kong IPO revivals are expected to extend into H2 2026 on regulatory reform and improving liquidity. Singapore saw five listings raising about S$1.1 billion in H1, up from a single IPO in each of the prior two years, with Foundation Healthcare debuting on Jul 8 and three more expected. Hong Kong hosted 85 IPOs raising HK$210.4 billion, up 102 per cent in volume and 96 per cent in proceeds; tech firms took over 70 per cent of listing volume. Reforms cited include MAS's listing tax rebate, a mainboard profit requirement cut from S$30 million to S$10 million, and the S$6.5 million Equity Market Development Programme. Risks persist: about four in five Singapore H1 listings traded below IPO price, with JustCo down roughly 40 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/Singapore,%20Hong%20Kong%20IPO%20rebound%20set%20to%20continue%20into%20H2%202026,%20but%20risks%20remain.pdf"}, {"id": "bt-12", "title": "The microscope moment for cyber resilience", "source": "BT", "date": "13 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "A commentary likens AI-assisted security testing to Leeuwenhoek's microscope: it makes long-hidden weaknesses visible rather than creating them. More capable AI is letting defenders inspect software, configurations and access controls at new depth and speed, surfacing technical and security debt such as legacy code, forgotten environments and excessive access rights, and driving more emergency patches outside normal release cycles. Anthropic, OpenAI and Microsoft are placing models inside controlled security harnesses of prompts, tools, sandboxes and checks; Anthropic and Microsoft have disclosed critical and high-severity issues across browsers, operating system components, networking services and authentication functions. The writer, a Singapore Institute of Directors finance committee member, urges boards to demand validation, quantified loss exposure, faster safe patching and proportionate governance, noting attackers will exploit AI at outpacing scale.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/The%20microscope%20moment%20for%20cyber%20resilience.pdf"}, {"id": "bt-13", "title": "When should we let an autonomous AI agent do the work?", "source": "BT", "date": "13 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A commentary argues agentic AI pays off only in a narrow band of tasks. AI agents transacting on our behalf incur inference, verification and settlement costs. Drawing on Acemoglu and Restrepo's task-based automation model, which omits verification, the writer's new working paper, presented at the Quantitative Finance 2026 conference at NUS in June, argues verification cost decides where automation stops paying. Inference grows task by task, but verification grows combination by combination, since interdependent bookings can clash. Tiny tasks are not worth settlement fees; densely interdependent ones cost more to verify than hiring a person. A hidden discount compounds this: OpenAI is reported heading for roughly US$14 billion of losses this year. MAS published its SAFR agentic finance framework on Jul 3.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20BT/When%20should%20we%20let%20an%20autonomous%20AI%20agent%20do%20the%20work.pdf"}, {"id": "scmp-01", "title": "Assassinations unleashed under Trump haunt Iran war endgame", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "Israeli officials warned Trump's team of fresh Iranian plots to kill him shortly before he ended the Iran ceasefire, a US official said. Tehran has sought revenge since the 2020 drone strike on Qassem Soleimani, and calls sharpened after a joint US-Israeli operation killed supreme leader Ayatollah Ali Khamenei in February; his son and successor Mojtaba skipped funeral rites fearing assassination. Trump switched back to an older Air Force One after Secret Service warnings and threatened \"1000 Missiles are Locked and Loaded\" should Tehran act. Gerald Ford's 1976 executive order barred assassinating foreign leaders; analysts including George Washington University's Matt Dallek say that taboo has lifted, raising risks for US officials and pushing diplomacy further out of reach.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Assassinations%20unleashed%20under%20Trump%20haunt%20Iran%20war%20endgame.pdf"}, {"id": "scmp-02", "title": "Beijing hits out as US-led coalition marks 10th anniversary of South China Sea ruling", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Southeast Asia"], "summary": "China's foreign ministry cast US-led military deployments as the \"primary threat\" to South China Sea stability, asserting \"historic rights\" and vowing \"decisive measures\" against infringements. The statement answered a 14-nation declaration led by the US and the Philippines, including Japan, Australia and Britain, marking a decade since The Hague tribunal invalidated most of Beijing's claims on July 12, 2016. The coalition called the award \"final, legally binding, and definitive\" and opposed coastguard and maritime militia harassment. Beijing, which rejects the ruling, said it became a \"stumbling block\" for China-Philippines ties. It separately summoned a Japanese embassy official after Foreign Minister Toshimitsu Motegi's criticism, accusing Tokyo of arming Manila and exceeding self-defence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Beijing%20hits%20out%20as%20US-led%20coalition%20marks%2010th%20anniversary%20of%20South%20China%20Sea%20ruling.pdf"}, {"id": "scmp-03", "title": "Beyond Claude Code: the Chinese AI tools poised to benefit after back-door alert", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Beijing's cybersecurity warning against Anthropic is expected to accelerate Chinese developers' shift to domestic coding tools. China's National Vulnerability Database, overseen by the industry ministry, alleged multiple Claude Code versions contained a security \"back door\" sending user locations and identities to remote servers without consent, urging immediate uninstallation or patching. The alert followed Anthropic's admission it embedded tracking code to prevent model \"distillation\"; the firm said its policy already barred China-based users. Zhong Lun lawyer Cai Peng expects more firms to drop foreign AI tools. Beneficiaries include ByteDance's Trae (6 million registered users), Alibaba's Qoder, Tencent Cloud's CodeBuddy, and Zhipu AI's CodeGeeX and ZCode. Alibaba owns the South China Morning Post.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Beyond%20Claude%20Code%20the%20Chinese%20AI%20tools%20poised%20to%20benefit%20after%20back-door%20alert.pdf"}, {"id": "scmp-04", "title": "China Life sets up semiconductor fund amid Beijing's call for 'patient' capital", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "China Life Insurance, the country's largest life insurer, will establish a 5 billion yuan (US$737 million) partnership investing principally in semiconductor companies, according to Friday filings in Hong Kong and Shanghai. Formed with a sister company, the fund targets chip design firms with \"substantial technical know-how and resources\". China Life said its role reflected \"long-term and patient capital\". The vehicle, to be finalised by year-end, will invest for two years then enter a six-year exit period, extendable twice. Separately, Jiangxi Ganyue Expressway announced a 200 million yuan fund backing chipmaker MetaX and its supply chain. The moves follow three Qiushi journal commentaries by China Reform Holdings chairman Xu Siwei urging patient capital, a 15th five-year plan goal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/China%20Life%20sets%20up%20semiconductor%20fund%20amid%20Beijing%E2%80%99s%20call%20for%20%E2%80%98patient%E2%80%99%20capital.pdf"}, {"id": "scmp-05", "title": "China issues temporary ban on helium exports as Iran war weighs on chip supply chain", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Trade", "Technology & AI", "Geopolitics"], "summary": "China imposed an immediate temporary ban on helium exports, announced Friday by the commerce ministry and customs administration, with no destinations or exemptions specified. Helium is critical for semiconductors, medical equipment and aerospace. Global supply is strained by the US-Israel war on Iran, which shut a major Qatari facility and disrupted Strait of Hormuz shipping. China imports over 80 per cent of its helium; 2025 imports rose 21.7 per cent to more than 4,900 tonnes while exports were 788 tonnes. Imports fell over 10 per cent in the first five months of 2026 as exports rose 32 per cent to 409 tonnes. Natixis economist Alicia Garcia-Herrero called it \"a clear defensive move\" prioritising domestic chipmakers. The US and Qatar supply 42.6 and 33.2 per cent of world output.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/China%20issues%20temporary%20ban%20on%20helium%20exports%20as%20Iran%20war%20weighs%20on%20chip%20supply%20chain.pdf"}, {"id": "scmp-06", "title": "China to head off AI-fuelled inequality by lifting salaries, narrowing pay gap", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Politics", "Technology & AI", "Society"], "summary": "China has made income growth and wage-distribution reform a priority to cushion its job market against artificial intelligence over the next five years. A blueprint released Thursday by the Ministry of Human Resources and Social Security promotes collective wage bargaining in the private sector, steady wage growth and pay tilted towards frontline workers. Within state enterprises it urges managing \"excessively high earnings\" while rewarding critical talent, and calls for refining minimum wage adjustment mechanisms plus legislative research. Peking University's Huang Yiping warned AI gains accrue to capital, saying compensation has not grown alongside efficiency. Beijing pledged to expand the middle-income group, targeting skilled labourers and rural migrants, and to launch large-scale vocational training tied to \"new quality productive forces\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/China%20to%20head%20off%20AI-fuelled%20inequality%20by%20lifting%20salaries,%20narrowing%20pay%20gap.pdf"}, {"id": "scmp-07", "title": "China's auto shipments to EU surge, but could be near their peak: European analysts", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "One in every 10 new cars registered in the EU in May carried a Chinese brand, overtaking Japanese rivals for the first time, but analysts say the rise may be peaking. Brussels imposed definitive anti-dumping duties on Chinese passenger-car and light-truck tyres on Tuesday and is preparing anti-subsidy duties on plug-in hybrids, whose registrations surged about 270 per cent in five months while facing only the standard 10 per cent tariff. Centre Automotive Research's Beatrix Keim cut her 2035 Chinese market-share forecast to 15 per cent from 20. Germany, historically a brake on trade defence, is hardening its stance. BYD, Leapmotor, MG and Chery are localising output in Hungary and Spain, absorbing tariffs of 10 to 35 per cent and thinner margins.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/China%E2%80%99s%20auto%20shipments%20to%20EU%20surge,%20but%20could%20be%20near%20their%20peak%20European%20analysts.pdf"}, {"id": "scmp-08", "title": "China's developers eagerly line up to offer commercial-property Reits amid recovery signs", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Finance & Markets"], "summary": "China's first four exchange-traded Reits backed by commercial properties have opened fundraising floodgates for office, mall and hotel owners. Wind Information data showed the Shanghai and Shenzhen exchanges held 19 listing applications for commercial-property trusts as of June 24, with six already approved and now in bookbuilding. The initial four were heavily oversubscribed and rose on debut on June 18 after raising a combined 20.3 billion yuan (US$3 billion). Pacific Securities projects annual returns of 4.4 to 5.65 per cent, against roughly 1 per cent one-year deposit rates. CBRE's Ivy Lu expects more developers to gain financing access. Commercial asset prices fell as much as 50 per cent during the six-year slump; Shanghai commercial transactions reached 27.3 billion yuan in the first half, up 18 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/China%E2%80%99s%20developers%20eagerly%20line%20up%20to%20offer%20commercial-property%20Reits%20amid%20recovery%20signs.pdf"}, {"id": "scmp-09", "title": "Democratic pastors eye US midterms to blunt Trump's grip on Christian nationalism", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Politics", "Society"], "summary": "Seven white clergy or ministers-in-training are running as Democrats for congressional seats in November's US midterms, arguing Republicans have hijacked Jesus for political gain. Candidates from Iowa, Texas, Alaska, Arkansas, Kansas and Tennessee, three of them women, are mostly political newcomers united in using Christian teaching to back liberal policies on immigrants and the poor. Adam Hamilton, 62, who leads a 24,000-member Kansas Methodist megachurch, is seeking a US Senate seat backing abortion access and LGBTQ rights; he would be the first Kansas Democrat elected to the Senate since 1932. Arkansas evangelical pastor Robb Ryerse called Christian nationalism \"one of the biggest threats to democracy\". DNC Interfaith Council co-chair Indira Duggirala acknowledged a religious \"vacuum\" in Democratic politics.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Democratic%20pastors%20eye%20US%20midterms%20to%20blunt%20Trump%E2%80%99s%20grip%20on%20Christian%20nationalism.pdf"}, {"id": "scmp-10", "title": "For a China on the rise, soft power is vital", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "This opinion piece argues China's next stage of global influence depends on soft power rather than economic weight alone. A June Public First survey of 24 EU countries on closer ties with Washington or Beijing found opinion split: eight leaned to China, nine to the US and seven were divided. Business is described as a leading builder of reputation, with Huawei, Haier and BYD reshaping \"Made in China\" perceptions much as Toyota and Samsung lifted Japan and South Korea. Chinese infrastructure and renewable-energy investment across the Global South, duty-free access for African imports, expanded visa-free travel, international students, TikTok's cultural reach, Unesco heritage sites and sporting champions all contribute. Soft power, it concludes, is cumulative, requiring creative freedom and trust.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/For%20a%20China%20on%20the%20rise,%20soft%20power%20is%20vital.pdf"}, {"id": "scmp-11", "title": "Formal China-US G2 framework key to 'guarantee' world peace: top Beijing adviser", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Political scientist Zheng Yongnian told the Baichuan Forum in Shenzhen that an \"institutionalised\" China-US G2 framework could provide a \"structural guarantee\" for world peace. He described a \"crisis of modernity\" spanning geopolitical conflict, \"religionised\" societies, economic imbalances and a fading UN-centred order. Zheng, dean of public policy at Chinese University of Hong Kong, Shenzhen, proposed an \"open-source\" development approach: the US pairing technology with Japanese and European manufacturing, China focusing on the Global South. He said trade ties are \"80 per cent cooperative and 20 per cent confrontational\", blaming friction on low political trust. Shenzhen hosts Apec in November and Miami the G20 in December, offering Xi Jinping and Donald Trump further meetings after Trump's May Beijing visit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Formal%20China-US%20G2%20framework%20key%20to%20%E2%80%98guarantee%E2%80%99%20world%20peace%20top%20Beijing%20adviser.pdf"}, {"id": "scmp-12", "title": "In China's electronics hub, a memory chip crisis is hitting consumers hard", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Memory prices in Shenzhen's Huaqiangbei electronics market have tripled over the past year and in some cases risen fivefold, squeezing computer assemblers and buyers. One vendor was selling a Kingston DDR5 kit for 2,980 yuan (US$438) on Tuesday, five times last September's price; mainstream memory kits are up three- to fivefold and SSDs have doubled or tripled. Traders say memory and solid-state drives are now the biggest cost drivers in a PC build, deterring all but urgent buyers. The squeeze stems from AI demand, as chipmakers prioritise server and data-centre orders from global tech giants. TrendForce projects third-quarter DRAM contract prices rising 13 to 18 per cent, down from 58 to 63 per cent, and NAND flash up 10 to 15 per cent versus 60 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/In%20China%E2%80%99s%20electronics%20hub,%20a%20memory%20chip%20crisis%20is%20hitting%20consumers%20hard.pdf"}, {"id": "scmp-13", "title": "Iran closes Hormuz, attacks Gulf states as US says strait remains open", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Iran's Revolutionary Guards declared the Strait of Hormuz closed \"until further notice\" on Sunday after attacking commercial ships, while US Central Command insisted it was \"open to all vessels\" and said \"Iran does not control the strait\". The exchange followed an Iranian strike that set a Cyprus-flagged container ship ablaze, leaving one Indian sailor missing; Oman rescued 23 crew. US forces struck about 140 Iranian targets in a third round this week, with explosions reported in Bandar Abbas, Jask, Qeshm Island and Khuzestan. Iran retaliated against Qatar, the UAE, Bahrain, Kuwait, Jordan and Oman; Qatar reported three injured and Muscat lodged a rare protest. Trump said Tehran struck a ship two hours after nearing a deal. War began with US-Israeli strikes on February 28.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Iran%20closes%20Hormuz,%20attacks%20Gulf%20states%20as%20US%20says%20strait%20remains%20open.pdf"}, {"id": "scmp-14", "title": "Israel to hold parliamentary elections on October 27 as Netanyahu seeks another term", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Israel will hold national elections on October 27, the last date allowed by law, parliament said on Sunday, with the vote seen as a referendum on Benjamin Netanyahu's leadership since the Gaza war. The Knesset ends its term on July 17, letting the ruling coalition complete a full four-year term for the first time in decades, so no dissolution law is needed. Netanyahu, 76, the longest-serving premier, will run again and has floated a \"broad national government\". Polls show most Israelis want him out, with former military chief Gadi Eisenkot, 66, his main rival; Eisenkot's new centrist party Yashar! recently topped Likud. Public opinion soured on the ceasefire ending the February war against Iran, and anger persists over October 7 security failures. Naftali Bennett, allied with Yair Lapid, is another contender.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Israel%20to%20hold%20parliamentary%20elections%20on%20October%2027%20as%20Netanyahu%20seeks%20another%20term.pdf"}, {"id": "scmp-15", "title": "Japan wants 60 million tourists, but China isn't sending them", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Society", "Trade"], "summary": "Japan drew a record 42.7 million foreign visitors last year and targets 60 million arrivals annually by 2030, expanding Narita Airport with a longer second runway and a new 3,500-metre third runway to lift capacity from 340,000 to 500,000 flights. Tourism contributes about 5.6 per cent of GDP, worth 34.3 trillion yen (US$211 billion), making it the second-biggest export earner behind autos. Visitors spent a record 9.5 trillion yen in 2025. But arrivals slipped 1.1 per cent to 17.94 million in the first five months of 2026, and mainland Chinese visitors plunged 60.4 per cent in May to 310,000, a sixth straight decline, after Prime Minister Sanae Takaichi's November remarks on a Taiwan \"contingency\" angered Beijing. Fujitsu's Martin Schulz said China is using travellers as leverage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Japan%20wants%2060%20million%20tourists,%20but%20China%20isn%E2%80%99t%20sending%20them.pdf"}, {"id": "scmp-16", "title": "Markets, not politics, will make China's yuan a global currency", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "This opinion piece argues yuan internationalisation will stall unless Beijing and Hong Kong cut the costs of funding, conversion, hedging, collateral and exit. Hong Kong's yuan deposits reached 1.13 trillion yuan (US$166.3 billion) at end-May with monthly cross-border trade settlement remittances above 1.12 trillion yuan, yet the yuan was only 2.75 per cent of Swift global payments by value in May against the US dollar's 50.73 per cent. Trade finance share was 7 per cent versus 82.5 per cent, and IMF data put the yuan at 1.99 per cent of reserves. The HKMA's RMB Business Facility increase to 500 billion yuan helps, but Hong Kong must build a full offshore funding curve, deeper direct-conversion markets and usable yuan bond collateral, or headline numbers will improve while the currency stays peripheral.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Markets,%20not%20politics,%20will%20make%20China%E2%80%99s%20yuan%20a%20global%20currency.pdf"}, {"id": "scmp-17", "title": "Reading the Sino-US rivalry: how a quiet literary relationship has shaped views on China", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Society", "Geopolitics"], "summary": "Part of a series marking the 250th anniversary of US independence, this feature traces how books have shaped American perceptions of China even as political ties fray and student exchanges dwindle. Alexander Boyd, now 30 and associate editor at China Books Review in New York, was 14 when Nicholas Kristof and Sheryl WuDunn's China Wakes set him on a path to study Chinese and travel to Beijing. Journalist and author Robert Delaney, 58, was drawn in by Mark Salzman's Iron and Silk, lived in China over a decade and wrote The Wounded Muse. From Pearl Buck's The Good Earth and Edgar Snow's Red Star Over China to Jung Chang's Wild Swans, such works inspired scholars, journalists and writers. As ties shift to strategic competition, the market for China books has widened.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Reading%20the%20Sino-US%20rivalry%20how%20a%20quiet%20literary%20relationship%20has%20shaped%20views%20on%20China.pdf"}, {"id": "scmp-18", "title": "Russia's diesel export ban deals fresh blow to strained energy market", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Energy", "Geopolitics", "Trade"], "summary": "Russia's diesel export ban, announced Wednesday, has roiled global energy markets and lifted prices even where Moscow no longer sells. Russia is the world's second-largest diesel exporter after the US, and its loadings had already fallen to 234,000 barrels per day from July 1-10, versus 400,000 bpd in June and a 2025 average near 817,000 bpd, hit by Ukrainian drone strikes. US ultra-low sulphur diesel futures jumped 11 per cent to US$154 a barrel, an US$80 premium to WTI, while European low-sulphur gas oil hit a record US$60.77 premium to Brent. US diesel inventories drew more than 4.5 million barrels to 97.8 million, 6 per cent below the five-year average. Fresh US strikes on Iran compounded Hormuz worries. Analysts warned of knock-on costs for power generation and farmers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Russia%E2%80%99s%20diesel%20export%20ban%20deals%20fresh%20blow%20to%20strained%20energy%20market.pdf"}, {"id": "scmp-19", "title": "Tech stocks capture China's elderly retail investors amid faith in nation's tech sector", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Chinese retail investors, including many pensioners, are pouring savings into chipmakers and AI developers on faith in national tech ascendancy. Fang Yan'an, a veteran investor in his late 70s with more than 30 years trading A-shares, said AI-related firms now make up nearly half his portfolio, worth over 3 million yuan (US$441,790), with one holding up over 1,000 per cent. The Star Market Composite Index has surged about 43.5 per cent this year and ChiNext 20 per cent, with some leading stocks up more than tenfold in two years. China had over 250 million A-share investors by end-2025, 99.7 per cent retail. Sinolink Securities analyst Huang Cendong conceded bubbles exist but stayed bullish medium-term, warning of fragile sentiment and sharp swings during earnings season.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Tech%20stocks%20capture%20China%E2%80%99s%20elderly%20retail%20investors%20amid%20faith%20in%20nation%E2%80%99s%20tech%20sector.pdf"}, {"id": "scmp-20", "title": "Top Chinese political journal calls for 'patient capital' amid AI investment frenzy", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Politics"], "summary": "Qiushi, the Communist Party's top theoretical journal, ran commentaries urging China to cultivate \"patient capital\" for three straight days, published on its WeChat account from Wednesday to Friday. All were drawn from an article by Xu Siwei, chairman of state-owned China Reform Holdings, who argued long-term capital tolerant of risk and lengthy horizons is a strategic source of strength amid great-power competition. The push follows an investment wave into China's AI sector since DeepSeek's emergence, which lifted domestic AI stocks and raised fears speculative money could crowd out long-term funding. Xu called for performance evaluations rewarding long-term contributions, fault-tolerance mechanisms, better exit routes and state funds to crowd in private capital. Similar leverage concerns have surfaced in South Korea.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Top%20Chinese%20political%20journal%20calls%20for%20%E2%80%98patient%20capital%E2%80%99%20amid%20AI%20investment%20frenzy.pdf"}, {"id": "scmp-21", "title": "Trump built walls out of tariffs on 'Liberation Day'. Has the US been boxed in?", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Trade", "Politics", "Geopolitics"], "summary": "Part of a series on the US 250th anniversary, this analysis argues Trump's second-term tariffs mark a structural break likely to endure despite a fragile US-China truce. Historians note echoes of the 1930 Smoot-Hawley Act and the 1789 Tariff Act, but Dartmouth economist Douglas Irwin called the Trump tariffs \"definitely a break from the past\", citing conflicting goals of revenue, protection and negotiation. Manufacturing lost an estimated 102,000 jobs since Trump's return, per a congressional Joint Economic Committee minority report; the goods trade deficit widened 2.1 per cent to US$1.24 trillion; and US$264 billion in tariff revenue was under 5 per cent of federal income. In February the Supreme Court struck down the Liberation Day tariffs' legal basis, ordering US$166 billion in refunds. Hinrich Foundation's Deborah Elms cited unprecedented scale and speed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Trump%20built%20walls%20out%20of%20tariffs%20on%20%E2%80%98Liberation%20Day%E2%80%99.%20Has%20the%20US%20been%20boxed%20in.pdf"}, {"id": "scmp-22", "title": "US military says it has launched more strikes against Iran", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Defence", "Geopolitics", "Energy"], "summary": "The US military said it launched another round of strikes on Iran overnight Sunday into Monday \"to degrade their ability to attack commercial ships\" in the Strait of Hormuz. The barrage followed Sunday morning US attacks answering an Iranian strike on a container ship, and Iranian retaliation against Gulf Arab states, pushing war-ending talks to the brink of collapse. Strikes extended to Qatar, a mediator untouched since April, while the UAE engaged missiles and drones. Iran's Revolutionary Guards claimed hits on Jordan, Kuwait, Oman and Qatar. Iranian media reported explosions near Bandar Abbas and Qeshm Island and one officer killed. Trump told Reuters \"We're beating them up\". Iran's blockade of the strait, which carried a fifth of world oil and LNG shipments, has lifted energy prices before November's congressional elections.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/US%20military%20says%20it%20has%20launched%20more%20strikes%20against%20Iran.pdf"}, {"id": "scmp-23", "title": "Ukraine's prime minister steps down as Zelensky announces government reshuffle", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Politics", "Geopolitics", "Defence"], "summary": "Ukrainian Prime Minister Yulia Svyrydenko resigned on Sunday as President Volodymyr Zelensky announced a government reshuffle, saying Ukraine was \"changing its political strategy\" and offering her a new role leading relations with a key international partner. Svyrydenko, a former economy minister, became premier in July 2025 aged 39 after helping secure the Ukraine-US minerals agreement. Zelensky, governing under martial law with wartime elections barred, said each foreign-policy priority would be assigned to an experienced figure, and flagged changes among law enforcement chiefs; it would be his fourth major reorganisation since Russia's full-scale invasion. Separately, a Ukrainian strike in Russia's Samara region killed one person, reportedly targeting the Rosneft-owned Syzran refinery, part of a campaign Zelensky calls \"long-range sanctions\".", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Ukraine%E2%80%99s%20prime%20minister%20steps%20down%20as%20Zelensky%20announces%20government%20reshuffle.pdf"}, {"id": "scmp-24", "title": "Why a second 'China shock' is good for Southeast Asia", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Southeast Asia", "Trade"], "summary": "This Asian Angle commentary by Roland Rajah argues Southeast Asian fears of Chinese imports are misplaced. The region imported over half a trillion dollars in Chinese goods last year, running a collective deficit near US$290 billion, but roughly 90 per cent of those imports are intermediate inputs or capital goods rather than finished consumer products. Unlike the post-2001 first \"China shock\", today's China exports parts, machinery and technology, becoming \"factory to the factories\", while channelling surpluses into developing economies. Chinese direct investment into Southeast Asian manufacturing hit US$15.4 billion in 2024, up from US$5.7 billion in 2019, with total investment tripling to about US$75 billion. Southeast Asia's exports grew 13 per cent in 2025 versus China's 5 per cent, though Indonesia's textile sector shed 80,000 jobs in 2024.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Why%20a%20second%20%E2%80%98China%20shock%E2%80%99%20is%20good%20for%20Southeast%20Asia.pdf"}, {"id": "scmp-25", "title": "Why factories in southern China are feeling the squeeze despite pickup in orders", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Trade", "Finance & Markets", "Politics"], "summary": "Pearl River Delta electronics exporters say a pickup in orders has not lifted profits, ahead of China's second-quarter and first-half data this week. Rising raw material costs, tougher vendor payment terms and price competition are squeezing margins. Liang Xiong of Guangzhou's A Delight Group said some specialised components, from capacitors to resistors, have risen four, five or even 10 times, partly on AI-related demand, and that quotes once valid for weeks now last days, with many pre-increase orders fulfilled at a loss. China's official manufacturing PMI returned to expansion in June, but the employment index still contracted. Manufacturers are looking to the midyear Politburo meeting, expected later this month, for stimulus. Zhongshan factory rents have halved to about 7 yuan per square metre monthly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Why%20factories%20in%20southern%20China%20are%20feeling%20the%20squeeze%20despite%20pickup%20in%20orders.pdf"}, {"id": "scmp-26", "title": "Wu Shicun on why Beijing will not rule out Scarborough Shoal construction", "source": "SCMP", "date": "13 Jul 2026", "tags": ["Geopolitics", "Defence", "Southeast Asia"], "summary": "In this exclusive interview, Wu Shicun, founding president of China's National Institute for South China Sea Studies, said Beijing cannot rule out building fixed facilities on Huangyan Island (Scarborough Shoal) to support law enforcement resupply if challenges persist, adding that if China takes that step \"external forces have left us with no choice\". He said China will not proactively resume land reclamation. Wu criticised Manila's \"assertive transparency\" campaign as a public relations playbook backed by Western media, and said Vietnam has quietly reclaimed land across 18 Paracel features, pushing artificial land past 11 sq km, potentially yielding six to seven runways in the Spratlys. He said dredging at Antelope Reef is civilian and unrelated, dismissed Philippine claims to Sandy Cay, and voiced deep scepticism about concluding the Code of Conduct under Manila's Asean chairmanship.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/13%20Jul%202026/13%20Jul%20SCMP/Wu%20Shicun%20on%20why%20Beijing%20will%20not%20rule%20out%20Scarborough%20Shoal%20construction.pdf"}]}, "2026-07-14": {"date": "2026-07-14", "dayOfWeek": "Tuesday", "totalArticles": 45, "sourceCounts": {"WSJ": 11, "ST": 0, "BT": 10, "SCMP": 24}, "executiveDigest": "Trump moved to restore the Iran blockade and charge fees for Strait of Hormuz shipping as the UAE said Iranian missiles struck tankers, killing crew - and economists warned the war is leaving stubbornly higher inflation; DBS crossed S$200 billion in market value as SGX trading jumped 72%, while a quarter-trillion-dollar wave of AI bonds began testing investors' limits and SK Hynix plunged after its Nasdaq debut.", "briefingCards": [{"title": "Lead story - Blockade returns, Hormuz tolls proposed", "body": "Trump moved to restore the naval blockade of Iran and to charge fees for shipping through the Strait of Hormuz, after the UAE said Iranian missiles struck tankers in the strait, killing and injuring crew. WSJ assessed that Iran, aspiring to regional domination, is ready to escalate over Hormuz - even as a separate piece argued Tehran is 'too weak to make peace'. Britain banned support for the IRGC over antisemitic attacks in the UK. Economists now project the war will leave the economy with more stubborn inflation, and BT concluded the ceasefire's collapse proves businesses simply cannot wait the conflict out."}, {"title": "Markets & finance", "body": "DBS crossed S$200 billion in market capitalisation as earnings optimism powered the Singapore bank rally, and SGX securities trading value jumped 72% in June to cap a 'stellar' FY2026. But the AI trade showed strain: a quarter-trillion-dollar onslaught of AI bonds is testing investors' limits, and SK Hynix plunged after its Nasdaq debut as earnings optimism faded - a sharp reversal from its heavily oversubscribed listing. Fed chair Kevin Warsh now faces his first big call: whether to undo last year's rate cuts as war-driven inflation proves sticky."}, {"title": "Asia realignment", "body": "Xi Jinping will attend the World AI Conference for the first time as China elevates its tech push, while Beijing works on an AI safety benchmark targeting large-model risks. China is also moving to break SpaceX's launch monopoly with an IPO push and a historic sea-based rocket recovery. Analysts said a US tariff probe is unlikely to derail a planned autumn Xi-Trump meeting. Elsewhere, Manila and Hanoi's maritime deal may challenge Beijing in the South China Sea, and Britain's Andy Burnham looks set to become prime minister."}, {"title": "Energy & climate", "body": "Iran is not the only conflict vexing the global oil market, BT noted, as Trump's blockade and proposed Hormuz transit fees threaten to re-price freight and insurance across the Gulf. Russian missiles struck Kyiv, triggering fires across the capital, and Ukraine's allies met in Paris to boost air defences and press Moscow to end the war. On critical minerals, the Pentagon invested US$25 million in rare-earths start-up ReElement Technologies, while SCMP reported that 'reverse tech transfer' from China remains a non-starter in the US auto industry."}, {"title": "Technology & AI", "body": "The AI backlash sharpened: Palantir's Alex Karp voiced what WSJ called every angry CEO's private view, hard-line activists are ramping up for a 'war with AI', and 'wage envy' between AI workers and their peers is described as a corporate time bomb. Apple mounted a 'thermonuclear' response to the OpenAI threat after suing it over trade secrets, while OpenAI, Meta and SpaceXAI race to build more cost-efficient models. A Chinese start-up unveiled an aggressive AI-chip road map aimed squarely at challenging Nvidia."}, {"title": "Singapore & SEA focus", "body": "Singapore's bank rally reached a milestone as DBS crossed S$200 billion in market capitalisation on earnings optimism, and SGX securities trading value leapt 72% in June to cap a 'stellar' FY2026. BT charted Asean's 'new financial geography', with connectivity taking centre stage as regional capital markets integrate. Singapore's tourism prospects look bright, though hotel players will need to fight hard to thrive amid rising competition and costs - and BT argued AI alone is not enough to arrest China's economic decline."}], "keyMetrics": [{"value": "45", "label": "Articles curated today", "sub": "WSJ 11 · BT 10 · SCMP 24 · ST n/a"}, {"value": "Blockade", "label": "Iran + Hormuz tolls", "sub": "Tankers hit; crew killed"}, {"value": "S$200b", "label": "DBS market cap", "sub": "Crosses milestone on bank rally"}, {"value": "+72%", "label": "SGX June trading", "sub": "Caps a 'stellar' FY2026"}, {"value": "US$250b", "label": "AI bond onslaught", "sub": "Testing investors' limits"}, {"value": "Plunge", "label": "SK Hynix post-debut", "sub": "Earnings optimism fades"}], "articles": [{"id": "wsj-01", "title": "Alex Karp Is Saying What Every Angry CEO Is Thinking About AI", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "Palantir CEO Alex Karp, self-described \"madman,\" escalated the feud between enterprises and AI labs. Palantir released a white paper, \"Institutional Sovereignty in the Age of AI,\" listing 15 steps companies and governments can take to guard against OpenAI and Anthropic. In a near-20-minute CNBC appearance, Karp said \"something has gone completely wrong,\" accusing labs of hyping capabilities and overcharging for tokens that \"create no value.\" Ex-White House AI czar David Sacks amplified him, citing Anthropic's expansion into Claude Science, Security, Legal and Code. Microsoft's Satya Nadella voiced similar concerns at Stanford. Meta launched a paid tier, with Mark Zuckerberg calling rival pricing \"very extreme.\" OpenAI and Anthropic IPOs loom; neither responded to Karp's criticism.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Alex%20Karp%20Is%20Saying%20What%20Every%20Angry%20CEO%20Is%20Thinking%20About%20AI.pdf"}, {"id": "wsj-02", "title": "Apple's 'Thermonuclear' Response to the OpenAI Threat", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI"], "summary": "In one of his final acts before John Ternus takes over as CEO, Tim Cook sued OpenAI on Friday, alleging it \"has been stealing Apple's trade secrets\" at every level. Apple accuses OpenAI hardware chief Tang Tan, a 24-year Apple veteran and former product-design VP, of soliciting secrets from Apple staff during job interviews and urging them to bring \"actual parts\" for show-and-tell; a junior employee, Chang Liu, allegedly used an Apple login to access servers. OpenAI said it has \"no interest in other companies' trade secrets.\" Sam Altman posted he is \"not afraid of Apple.\" OpenAI bought Jony Ive's io Products in 2025 to build post-smartphone devices. Apple's revamped Siri, due this fall, relies on Google.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Apple%E2%80%99s%20%E2%80%98Thermonuclear%E2%80%99%20Response%20to%20the%20OpenAI%20Threat.pdf"}, {"id": "wsj-03", "title": "Aspiring to Regional Domination, Iran Is Ready to Escalate Over Hormuz", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Tehran has prioritised a chokehold on the Strait of Hormuz over tens of billions in sanctions relief. Parliament security chief Ebrahim Azizi and speaker Mohammad Bagher Ghalibaf insist the strait opens only via \"Iranian arrangements.\" Washington withdrew a Treasury waiver permitting Iranian oil sales after Iran attacked ships transiting Omani waters; Iran then fired on a vessel, declared the waterway closed, and the U.S. struck back. The February-April war lasted 40 days and killed Supreme Leader Ali Khamenei; successor Mojtaba Khamenei has not appeared publicly. Analysts including Carnegie's Karim Sadjadpour and the Washington Institute's Holly Dagres see brinkmanship and a \"gangster regime\"; Gulf states, hit by Iranian missiles last spring, are re-engaging Tehran.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Aspiring%20to%20Regional%20Domination,%20Iran%20Is%20Ready%20to%20Escalate%20Over%20Hormuz.pdf"}, {"id": "wsj-04", "title": "Can AI Make Better Drugs? Not on Wall Street's Timeline", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "AI is boosting lab productivity but has yet to change drug-development economics, leaving investors unwilling to rerate pharma. At Roche's Genentech, computational biologist Aviv Regev runs a \"lab in the loop\" where models predict targets and experiments retrain them; she says AI \"is not smarter\" but encodes information broadly. Only about one in 10 candidates entering human trials reaches market. Eroom's Law, coined in Jack Scannell's 2012 paper, captures rising costs; Scannell likens training AI on current data to teaching a Waymo via a frog on a bike. Anthropic's Eric Kauderer-Abrams, after launching Claude Science, says the industry is in the \"second inning.\" Goldman Sachs estimates AI could add $400 billion of value over a decade.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Can%20AI%20Make%20Better%20Drugs%20Not%20on%20Wall%20Street%E2%80%99s%20Timeline.pdf"}, {"id": "wsj-05", "title": "How to Invest When the Global Crises Never Stop", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "James Mackintosh argues traditional hedges are failing as superpower conflict, U.S. retrenchment and extreme weather multiply shocks. In the on-off U.S.-Israeli war on Iran, which flared again Wednesday, stocks, bonds and even gold fall together. Raphael Arndt, CEO of Australia's Future Fund, rebuilt strategy from first principles and concluded the fund needs \"more equities, not less\" for higher returns, plus gold and hedge funds, since \"bonds won't necessarily diversify\" when shocks are inflationary. Insight CEO Raman Srivastava calls 1970s-80s-style inflation the biggest risk, favouring inflation-linked infrastructure bonds. RBC BlueBay's Mike Bell notes markets \"don't really price geopolitical things until they actually happen\": oil jumped 30% within a week of Russia's 2022 invasion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/How%20to%20Invest%20When%20the%20Global%20Crises%20Never%20Stop.pdf"}, {"id": "wsj-06", "title": "Iran Is Too Weak to Make Peace", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "John Bolton, national security adviser in 2018-19, argues the U.S.-Iran memorandum of understanding and cease-fire were dead on arrival because U.S.-Israeli strikes shattered Iran's government. Civilian leadership is \"in tatters,\" IRGC command and control uncertain, and clerics are in discord after Supreme Leader Ali Khamenei's killing. Negotiators such as President Masoud Pezeshkian, Speaker Mohammad Ghalibaf and Foreign Minister Abbas Aragchi \"can't deliver.\" On July 8, after calling Iran's team \"scum,\" Trump saw no value in talks. Bolton urges reimposing the blockade, choking off oil revenues and reopening Hormuz by force, noting NATO chief Mark Rutte backs U.S. strikes. He warns Gulf uncertainty could keep oil elevated through November's elections.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/Iran%20Is%20Too%20Weak%20to%20Make%20Peace.pdf"}, {"id": "wsj-07", "title": "The AI Superfans Companies Count On to Convert the Skeptics", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Companies are deploying internal \"AI champions\" to drive workforce adoption as sceptical staff become the biggest roadblock. Boston Consulting Group's June report, surveying 11,749 employees across 14 markets, found 74% of front-line white-collar workers now use AI daily or several times weekly, up from 51% in 2025. At Ropes & Gray, champion Howard Glazer, now \"Head of Practice AI\" advising some 60 champions, helped lift Harvey usage from 32 users sending a few hundred prompts monthly to nearly 2,200 employees generating over 282,000 prompts. Citigroup scaled its program past 4,000 participants; Citi Stylus Workspaces adoption rose from single digits in late 2024 to over 80%. Mars Snacking's Ramesh Kollepara says the best champions are \"definitely not the most technical people.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20AI%20Superfans%20Companies%20Count%20On%20to%20Convert%20the%20Skeptics.pdf"}, {"id": "wsj-08", "title": "The Hard-Line Activists Ramping Up for the War With AI", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Society", "Technology & AI"], "summary": "A hardening anti-AI resistance is centred in the Bay Area. Stop AI co-founder Sam Kirchner, 27, vanished in November after telling colleague Matthew Hall \"the ship may have sailed on nonviolence\"; comrades warned San Francisco police he might target OpenAI, which locked down its campus. A Quinnipiac poll found 70% of U.S. adults believe AI will cost jobs and 55% say it does more harm than good. Geoffrey Hinton puts extinction odds at 10-20%. In April, an assailant fired 13 shots at an Indianapolis councilman's home leaving a \"no data centers\" note, and a 20-year-old Texas student was charged with attempted murder and arson over an attack on Sam Altman's home. Holly Elmore, who founded Pause AI US, divorced over the cause and expelled Kirchner.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20Hard-Line%20Activists%20Ramping%20Up%20for%20the%20War%20With%20AI.pdf"}, {"id": "wsj-09", "title": "The Quarter-Trillion-Dollar Onslaught of AI Bonds Is Testing Investors' Limits", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The investment-grade bond market is straining to absorb AI-infrastructure borrowing. Recent weeks brought a combined $75 billion from Nvidia, SpaceX and Amazon; Nvidia's and SpaceX's new bonds slumped in secondary trading, while Amazon paid unusually steep rates. Six hyperscalers, Alphabet, Amazon, Meta, Oracle, Nvidia and SpaceX, have issued about $244 billion globally this year, per Dealogic, versus $108 billion in all of 2025 and $17 billion in 2024. Voya's Travis King says investors want \"to leave some room for the next deal.\" Alphabet's 10-year spread widened 0.12 point last week and Meta's 0.16, against 0.02 for the average IG bond. SpaceX's 10-year spread has leapt nearly half a point since June 23. Janus Henderson's John Lloyd cites AI spending estimates north of $10 trillion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/The%20Quarter-Trillion-Dollar%20Onslaught%20of%20AI%20Bonds%20Is%20Testing%20Investors%E2%80%99%20Limits.pdf"}, {"id": "wsj-10", "title": "War Leaves Economy With More Stubborn Inflation, Economists Project", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Energy", "Geopolitics"], "summary": "The WSJ survey of 72 economists, conducted July 2-7, finds the Iran war hurt the U.S. less than feared but entrenched inflation. GDP growth is seen at 2.1% for 2026, up from 2% in April, with recession odds falling to 25% from 33%. CPI is projected to rise 3.4% through December, up from 3.2%, and core PCE 3.2% versus 2.9% previously. Oil, $67.02 a barrel before the war, peaked at $112.95 in April, fell to $68.55 on July 6 and closed at $71.41 Friday after Trump declared the ceasefire over; forecasters see about $70 by December. Unemployment is seen at 4.3%. Economists expect Kevin Warsh's Fed to hold at 3.5%-3.75%; 90% call the Fed \"mostly\" or \"completely\" independent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/14%20Jul%202026/14%20Jul%20WSJ/War%20Leaves%20Economy%20With%20More%20Stubborn%20Inflation,%20Economists%20Project.pdf"}, {"id": "wsj-11", "title": "Warsh's First Big Call: Whether to Undo Last Year's Cuts", "source": "WSJ", "date": "14 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "New Fed chairman Kevin Warsh presided over a unanimous hold last month, but consensus may fracture at the July 28-29 meeting as hawks push to reverse two of 2025's three cu
