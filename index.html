semiconductor and critical-minerals cooperation and speed their UK fighter-jet programme, while China rejected a Lowy Institute report that its strike threat to Australia is 'growing', calling its military 'a force for world peace'. North Korea declared its nuclear status 'irreversible', playing the US-China rivalry card. Xi is swapping fighter-jet sorties for diplomatic hardball to isolate Taiwan, halving warplane incursions while punishing outlets that interview President Lai."},{"title":"Energy & climate — Hormuz relief, but scars remain","body":"A reopened Hormuz — through which about 80% of transiting oil and gas heads to Asia — would relieve the region, but Bloomberg Economics sees 'a very low chance' flows fully revert and warns Asean-5 inflation could peak near 7%. US oil executives warned stockpiles are near critical lows after 15-plus weeks of SPR draws (Cushing near operational limits), with Exxon flagging US$150-160 risk if the deal fails. The IAEA's chief urged better public understanding of nuclear energy in South-east Asia ahead of Singapore's 2027 ASEAN chair."},{"title":"Technology & AI — export-ban scramble, SpaceX afterglow, a chip crunch","body":"Anthropic shut off its top models and rushed staff to Washington after a US ban on foreign use, even as it called for an AI development 'pause'. SpaceX's US$2.1tn debut spurred a space-VC frenzy (US$7.1b in 2025) and a PLA Daily warning of a satellite arms race, while a US judge tossed Musk's xAI trade-secret suit against OpenAI. AI demand drove an MLCC supply crunch (up to 28,000 capacitors per AI server) and China claimed mass production of quantum-grade silicon-28."},{"title":"Singapore & SEA focus — a gold hub and a calmer jobs read","body":"MAS will vault gold for foreign central banks from October and build an SGX OTC gold-clearing system, pressing Singapore's bid to be 'a trusted node in the global gold ecosystem'. The Q1 labour report — its first to assess AI — found firms three times more likely to redesign jobs than cut them, with unemployment steady at 2%. New private-home sales hit a three-month low (447 units) on a thin launch calendar, and AI work platform Monday.com picked Singapore as its second Asia-Pacific HQ."}],"keyMetrics":[{"value":"Jun 19","label":"US-Iran signing","sub":"Hormuz to reopen; Brent down ~5% to ~US$83"},{"value":"1%","label":"BOJ rate (31-yr high)","sub":"First meeting without governor Ueda"},{"value":"5,077","label":"STI record close","sub":"+1% on the deal; S-Reits, SIA tipped"},{"value":"US$7.1b","label":"Space VC (2025)","sub":"Up from US$2.5b; SpaceX afterglow"},{"value":"Oct","label":"MAS gold vaulting","sub":"For foreign central banks; SGX OTC clearing"},{"value":"447","label":"SG new-home sales","sub":"3-month low on thin launch calendar"}],"articles":[{"id":"wsj-01","title":"A Place Where Some AI Stocks Are Still Cheap: China","source":"WSJ","date":"16 Jun 2026","tags":["Technology & AI","Finance & Markets","Geopolitics"],"summary":"Large Chinese tech firms investing heavily in AI trade at lower valuations than US peers, with Alibaba at a forward P/E of 17 versus Amazon's 27, Baidu at 14 and Tencent at 13. UBS's Eva Lee calls it \"an attractive opportunity\" while Goldman notes China is 10% of global AI market cap but just 1.2% of global mutual-fund tech portfolios. Risks include the Pentagon adding around two dozen firms including Alibaba to its military-linked list this month, and US blacklisting of SMIC. Some Chinese AI names are already exuberant, with Cambriicon at a forward P/E of 128 versus Nvidia's 23.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/A%20Place%20Where%20Some%20AI%20Stocks%20Are%20Still%20Cheap%20China.pdf"},{"id":"wsj-02","title":"AI Can Do Math, but Is It Really Math?","source":"WSJ","date":"16 Jun 2026","tags":["Technology & AI","Society"],"summary":"An OpenAI model disproved a longstanding Erdos conjecture on the unit-distance problem in discrete geometry, repeatedly finding dot arrangements beating his supposed ceiling using tools from algebraic number theory. Statistician Daniel Kipnis argues that, per philosopher Reuben Hersh, math is a social phenomenon requiring human verification and communication, so OpenAI collaborated with leading mathematicians to verify and make the result intelligible. He warns that unverified pure math can seed dangerous applied systems, citing how 1970s number theory became the basis for modern cryptography. He calls for journals requiring verification and tenure rewarding the checking of AI-generated proofs.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/AI%20Can%20Do%20Math,%20but%20Is%20It%20Really%20Math.pdf"},{"id":"wsj-03","title":"America Downs Cheap Drones With Million-Dollar Missiles. A Fix Is In the Works.","source":"WSJ","date":"16 Jun 2026","tags":["Defence","Technology & AI"],"summary":"Startups and big contractors are racing to build cheap interceptors as the US shoots down a few-thousand-dollar Iranian drones with missiles costing upward of a million. Former NASA engineer Jason Cornelius's Perseus Defense is making a 15-inch \"micro-missile\" with a 1,100-yard range targeting $10,000, while Estonia's Frankenburg sells interceptors in the low tens of thousands. The Pentagon likely fired about $5.7 billion in interceptors in the war's first four days, per ex-official Elaine McCusker. Iran's Shahed drones, now sent \"up to 400 a day,\" plus efforts by MBDA, Saab and Cambridge Aerospace's Skyhammer underline the demand.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/America%20Downs%20Cheap%20Drones%20With%20Million-Dollar%20Missiles.%20A%20Fix%20Is%20In%20the%20Works..pdf"},{"id":"wsj-04","title":"America Has a Credit Card Problem, Just Not the One You Think","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Society"],"summary":"New York Fed data show over 13% of credit-card balances were 90-plus days delinquent in Q1, near the 2008 peak, but Telis Demos argues today's debt is healthier, with average household card debt around $11,500 (about $1,600 less than the inflation-adjusted 2007 peak). Debt-service payments are 5.4% of disposable income versus over 7% twenty years ago, and the 90-day tally includes already-written-off balances, including a notorious pandemic-era \"vintage.\" Bank charge-off rates of about 3.8% sit below the 4.3% average since 1985. The real risk is tightened lending leaving some consumers without enough credit as prices outpace wages.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/America%20Has%20a%20Credit%20Card%20Problem,%20Just%20Not%20the%20One%20You%20Think.pdf"},{"id":"wsj-05","title":"Anthropic Dispatches Staff to D.C., Racing to Resolve AI Export Restrictions","source":"WSJ","date":"16 Jun 2026","tags":["Technology & AI","Politics","Trade"],"summary":"After the Trump administration on Friday banned foreign use of Anthropic's Fable 5 and Mythos 5 models, Anthropic shut off all access to comply and sent technical staff to Washington over the weekend to negotiate. Saturday calls involved Commerce Secretary Howard Lutnick, National Cyber Director Sean Cairncross, co-founder Tom Brown and policy head Sarah Heck. The trigger was Amazon researchers showing Fable's safeguards could be coaxed into divulging software-vulnerability information; Andy Jassy raised it with Treasury Secretary Scott Bessent, and Trump signed off on the restriction. On Sunday cybersecurity notables signed a letter saying the move \"has taken the best models away from defenders.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Anthropic%20Dispatches%20Staff%20to%20D.C.,%20Racing%20to%20Resolve%20AI%20Export%20Restrictions.pdf"},{"id":"wsj-06","title":"As Kevin Warsh Arrives, Expect Him to Move Slowly","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Politics"],"summary":"Former Fed vice chairman Alan Blinder predicts the FOMC's June 16-17 meeting, the first under new chairman Kevin Warsh, will leave interest rates unchanged. He notes the prior April 28-29 meeting was Powell's most divided, an 8-4 vote with three regional presidents (Hammack, Kashkari, Logan) dissenting over the word \"additional,\" and sentiment has since hardened against cuts. Warsh, a career rate hawk, couldn't push a cut through and is expected to drop \"additional\" and favor terser statements with no forward guidance. Blinder cautions against rushing changes like adopting the Dallas Fed's trimmed-mean inflation measure, which \"may look like moving the goal posts.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/As%20Kevin%20Warsh%20Arrives,%20Expect%20Him%20to%20Move%20Slowly.pdf"},{"id":"wsj-07","title":"Coders Were Tech's MVPs. Now They're Fighting to Stay in the Game.","source":"WSJ","date":"16 Jun 2026","tags":["Technology & AI","Society"],"summary":"Software engineers face new vulnerability as AI coding, layoffs and reduced remote work erode their once-secure positions, with software-developer job openings down about 70% from the 2022 peak per Indeed. Christopher Pack, 27, who graduated in 2022, now saves 65% of after-tax income and says \"I feel like I got on the last plane out of Vietnam.\" Information-sector employment fell 332,000, or 11%, from its November 2022 peak through May, and four-year computer-science enrollment dropped 8.1% last fall. Laid-off developer Michael Waxman, 39, who joked \"I am coding myself out of a job,\" now seeks contract work from his catamaran.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Coders%20Were%20Tech%27s%20MVPs.%20Now%20They%27re%20Fighting%20to%20Stay%20in%20the%20Game..pdf"},{"id":"wsj-08","title":"Emboldened by SpaceX, Investors Are Piling Into All Things Space","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Technology & AI","Defence"],"summary":"Venture funding for US space-tech firms excluding SpaceX jumped to $7.1 billion in 2025 from $2.5 billion a year earlier, per PitchBook, with recent raises including CesiumAstro's $470 million and Impulse Space's $500 million. The surge accelerated after public-market investors poured $75 billion into SpaceX's record IPO last week. Many startups target the Pentagon, which may see a historic budget increase; K2 Space had $500 million in signed contracts at year-end. Investors cite past burns like Virgin Orbit, which went public via a 2021 blank-check deal and filed for bankruptcy less than 18 months later.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Emboldened%20by%20SpaceX,%20Investors%20Are%20Piling%20Into%20All%20Things%20Space.pdf"},{"id":"wsj-09","title":"Europe's Arms Race Is Creating Boomtowns. Why Are Locals So Unhappy","source":"WSJ","date":"16 Jun 2026","tags":["Defence","Society","Geopolitics"],"summary":"Europe's defense boom is sparking division rather than revival in towns like Barrow-in-Furness, England, where a $5.4 billion BAE Systems contract for up to 12 AUKUS-Class submarines added around 5,000 jobs but drained mechanics, nurses and tradesmen, with one local quipping \"We have weapons of mass destruction, but no plasterers.\" Starmer called Barrow \"a blueprint,\" yet life expectancy for boys still drops 12 years over 13 miles into the town. In Bergerac, France, Eurenco's 200 million-euro explosives revival tripled revenue to 580 million euros but hired mostly out-of-towners; UK Defense Secretary John Healey resigned over insufficient funding ahead of a NATO summit in Turkey.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Europe%27s%20Arms%20Race%20Is%20Creating%20Boomtowns.%20Why%20Are%20Locals%20So%20Unhappy.pdf"},{"id":"wsj-10","title":"Everyone Loves Chinese Cars, Except the Chinese","source":"WSJ","date":"16 Jun 2026","tags":["Trade","Geopolitics","Finance & Markets"],"summary":"China's new-car sales fell 22% in May year-over-year to around 1.5 million vehicles, an eighth straight monthly decline, pushing carmakers to expand abroad as exports rose 75% to 784,000 cars. January cuts to plug-in tax exemptions and trade-in subsidies, March's Iran-war gasoline spike and deflation hit demand; BYD's Q1 net profit roughly halved to about $590 million, its lowest since mid-2022. BYD's Stella Li said \"We need to do something to really rebuild consumer confidence,\" and founder Wang Chuanfu vowed to become the world's largest automaker within five years. On Monday the Pentagon added BYD and NIO to its military-linked list, which both companies disputed.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Everyone%20Loves%20Chinese%20Cars,%20Except%20the%20Chinese.pdf"},{"id":"wsj-11","title":"Nvidia Is Developing an AI Healthcare Model With Startup Abridge","source":"WSJ","date":"16 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Nvidia is partnering with Abridge, maker of an AI clinical note-taking app, to train a healthcare AI model for clinical conversations using Nvidia's Nemotron open models, to be used exclusively within Abridge's platform. Nvidia, an investor in Abridge, will see the startup use de-identified clinical data to customize the models, with VP Kimberly Powell noting \"Nvidia has been known to be the AI company that works with every other AI company.\" San Francisco-based Abridge raised $300 million last year at a $5.3 billion valuation; the model is expected later this year. Emory Healthcare's Joon Lee has rolled out Abridge to more than 3,000 physicians, amid moves like Microsoft's Mayo Clinic collaboration.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Nvidia%20Is%20Developing%20an%20AI%20Healthcare%20Model%20With%20Startup%20Abridge.pdf"},{"id":"wsj-12","title":"Oil Executives Are Sounding the Alarm Over Dwindling Stockpiles","source":"WSJ","date":"16 Jun 2026","tags":["Energy","Geopolitics","Finance & Markets"],"summary":"Energy executives warn US and global oil stockpiles are nearing critical levels after 15-plus weeks of drawdowns to offset barrels trapped behind the Strait of Hormuz, which a US-Iran deal set to be signed Friday in Switzerland would reopen. The US has drawn about 66 million barrels from the SPR since late March, with the authorized 172 million-barrel release potentially exhausted by early September, bringing inventories to a historically low 243 million. Cushing stocks have fallen to 21 million barrels near operational limits, and Exxon's Neil Chapman said prices could hit $150 or $160 a barrel. US oil fell 4.1% to $81.42 on Sunday, down more than 25% from near $113 in early April.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Oil%20Executives%20Are%20Sounding%20the%20Alarm%20Over%20Dwindling%20Stockpiles.pdf"},{"id":"wsj-13","title":"SpaceX's Retail-Powered Debut Helps Steady Shaky Markets","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"SpaceX's Friday IPO went off without a hitch, reaching a $2.1 trillion market cap, with do-it-yourself traders buying about $18 million of stock in the first 20 minutes and roughly $118 million in net retail purchases by day's end, the biggest IPO for individuals in recent history per Vanda. The debut helped steady markets after a volatile week marked by a June 5 jobs report that sent the Nasdaq down 4.2% and renewed Iran-war and AI-rally fears. Investor Zaid Admani called it \"the ultimate FOMO IPO.\" Analysts see it as a good omen for two major AI IPOs expected later this year, though some warn the rally remains narrow.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/SpaceX%27s%20Retail-Powered%20Debut%20Helps%20Steady%20Shaky%20Markets.pdf"},{"id":"wsj-14","title":"Tech's Next IPO Wave Promises a Charitable Windfall","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Society","Technology & AI"],"summary":"Upcoming IPOs from SpaceX, Anthropic and OpenAI could deliver a windfall to philanthropy, with the foundation holding a 26% OpenAI stake expected to have equity around $180 billion and pledging at least $1 billion over the next year. Anthropic's seven founders have pledged to donate at least 80% of their wealth, valued by Forbes at $39.2 billion in February when the company was worth $380 billion, now $965 billion; the firm matches employee equity donations 1:1 up to a quarter of grants. Daffy's Adam Nash predicts \"not just billions, but potentially tens of billions\" will flow into the sector. Experts point to the 2012 Facebook IPO and Zuckerberg-Chan gifts as precedent.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/Tech%27s%20Next%20IPO%20Wave%20Promises%20a%20Charitable%20Windfall.pdf"},{"id":"wsj-15","title":"The Faulty Logic Behind the SpaceX Index Trade","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"James Mackintosh argues the popular bet that SpaceX's accelerated index inclusion guarantees free money is unlikely to pay off because the $135-a-share IPO price, set by bankers like Goldman and Morgan Stanley, should already factor in impending index buying despite Friday's 19% pop. A green-shoe option lets underwriters issue an extra $11.2 billion of shares over 30 days, easing supply, and Friday saw 522 million of 556 million floated shares traded. Virginia Tech's Vijay Singal notes the S&P 500 inclusion bump fell from an 8.4% average (1989-2002) as \"hedge funds try to front play the indexers,\" though he still expects 5% or more. Tesla rose 70% before joining the S&P in December 2020 then fell 6.5% on inclusion day.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Faulty%20Logic%20Behind%20the%20SpaceX%20Index%20Trade.pdf"},{"id":"wsj-16","title":"The Iranian Enforcer Driving Tehran's Hard Bargaining With the U.S.","source":"WSJ","date":"16 Jun 2026","tags":["Geopolitics","Defence","Politics"],"summary":"Ahmad Vahidi, 67, the new commander in chief of Iran's Revolutionary Guard, has emerged as the hard-line power broker driving Tehran's tough US negotiations, winning the argument to fire ballistic missiles at Israel for the first time since the April 8 ceasefire. Sanctioned by the US over the 2022 women's-rights crackdown and wanted by Interpol for the 1994 Buenos Aires Jewish-center bombing that killed 85, he has repeatedly overruled Foreign Minister Araghchi and President Pezeshkian, who seek a swift deal to avert economic collapse. He insists Iran re-establish deterrence and protect its missile stockpile and frozen funds. Trump signaled Saturday a preliminary deal opening the Strait of Hormuz was near, but Iran pushed back on the timing.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Iranian%20Enforcer%20Driving%20Tehran%27s%20Hard%20Bargaining%20With%20the%20U.S..pdf"},{"id":"wsj-17","title":"The Kevin Warsh Era Begins at the Federal Reserve","source":"WSJ","date":"16 Jun 2026","tags":["Finance & Markets","Politics"],"summary":"The WSJ Editorial Board argues new Fed chairman Kevin Warsh's first priority at this week's FOMC meeting should be overhauling communication, calling \"forward guidance\" adopted after 2008 a counterproductive policy tool. It traces the shift from pre-1990s inscrutability through Greenspan's 1999 \"balance of risks,\" Bernanke's 2012 inflation target and dot plots, and Powell's post-2019 press conferences after every meeting. The board says projections were badly wrong, underestimating 2021-22 inflation by a factor of about three and fueling the \"transitory\" error. It urges Warsh to end the dot-plot era, limit press conferences and focus on major policy turns and Humphrey-Hawkins testimony.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Kevin%20Warsh%20Era%20Begins%20at%20the%20Federal%20Reserve.pdf"},{"id":"wsj-18","title":"The Race for Hypersonic Missiles","source":"WSJ","date":"16 Jun 2026","tags":["Defence","Technology & AI","Geopolitics"],"summary":"China fields roughly 600 hypersonic missiles (Mach 5-plus) per a leaked assessment, and Andy Kessler profiles Colorado's Ursa Major, which uses 3-D metal printing to help America close the gap. Founded in 2015 by ex-SpaceX engineer Joe Laurenti, the roughly 350-person firm pivoted to defense and built Havoc, a liquid-fueled, hydrogen-peroxide-oxidized missile that can throttle and change direction, under the Air Force's one-year Affordable Rapid Missile Demonstrator, flying in January. CEO Chris Spagnoletti estimates Havoc at $2 million to $3 million per shot versus $15 million-plus for Lockheed and RTX strike missiles, with a range of 500 to 1,000 nautical miles. He says additive manufacturing enables rapid replenishment \"after an Iran-like shooting match.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20WSJ/The%20Race%20for%20Hypersonic%20Missiles.pdf"},{"id":"st-01","title":"AI job cuts are landing hardest in UK, Morgan Stanley says","source":"ST","date":"16 Jun 2026","tags":["Technology & AI","Society"],"summary":"Morgan Stanley research found British companies reported 8 per cent net job losses from AI over the past 12 months, the highest among German, American, Japanese and Australian firms and twice the international average. UK firms saw an average 11.5 per cent productivity increase, similar to US counterparts, yet the US created more jobs than it cut while UK firms were significantly less likely to step up hiring. Vacancies for AI-exposed roles like software developers have dropped 37 per cent since 2022, versus 26 per cent elsewhere, amid the fastest job cuts since 2020. BOE governor Andrew Bailey warned AI is emerging as the next \"general purpose technology\" requiring readiness for displacement.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/AI%20job%20cuts%20are%20landing%20hardest%20in%20UK,%20Morgan%20Stanley%20says.pdf"},{"id":"st-02","title":"Back to square one: A US-Iran 'deal' that resolves little and could make things worse","source":"ST","date":"16 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Columnist Jonathan Eyal argues the US-Iran memorandum of understanding solves none of their differences and is merely a starting point for likely inconclusive talks, despite Vance claiming it would \"fundamentally transform the Middle East\". The MOU fails to address US demands on nuclear capabilities, missiles and proxies, and reinforces Iran's alliance with Hezbollah by conditioning a Gulf ceasefire on Israel ceasing attacks. Eyal calls it a strategic setback for Israel and warns the deal may herald \"the decline of American credibility\" in the region. The agreement is expected to be signed June 19, with the Strait of Hormuz reopening then.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Back%20to%20square%20one%20A%20US-Iran%20'deal'%20that%20resolves%20little%20and%20could%20make%20things%20worse.pdf"},{"id":"st-03","title":"China military growth aids world peace, Beijing claims","source":"ST","date":"16 Jun 2026","tags":["Defence","Geopolitics"],"summary":"China said on June 15 that strengthening its military benefits world peace, rejecting a Lowy Institute report warning that the threat of a direct Chinese missile strike on Australia is increasing. Foreign Ministry spokesman Lin Jian said \"the growth of China's military strength represents an increase in the forces for world peace\" and is not directed at any country. The Sydney-based report cited China's DF-27 intermediate-range ballistic missile, with a range of 5,000km to 8,000km, and island-building in the South China Sea. China condemned the report's \"serious strategic misjudgment\" and urged institutions to stop hyping the China threat.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/China%20military%20growth%20aids%20world%20peace%20claim.pdf"},{"id":"st-04","title":"G-7 leaders meeting in France with Trump tariff threat looming","source":"ST","date":"16 Jun 2026","tags":["Geopolitics","Trade"],"summary":"G-7 leaders gather at Evian-les-Bains, France, from June 15 to 17 amid unease over Donald Trump's tariff threats, including a warning of 100 per cent tariffs on French wine unless Paris drops its digital tax. Leaders will discuss next steps on Iran after the US-Tehran preliminary deal, the Ukraine war, economic imbalances and sourcing critical minerals outside China. Trump is due to meet Zelensky on June 16 as Russian advances have slowed but Kyiv faces fresh attacks and seeks more military funding. Macron secured a Versailles dinner on June 17 marking 250 years of US independence.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/G-7%20leaders%20meeting%20in%20France%20with%20Trump%20tariff%20threat%20looming.pdf"},{"id":"st-05","title":"Is Anthropic hallucinating when it calls for an AI development break?","source":"ST","date":"16 Jun 2026","tags":["Technology & AI","Politics"],"summary":"Columnist Irene Tham examines Anthropic's June 4 report When AI Builds Itself, which warned AI has begun building itself and called for a global development pause as the firm chases a US$1 trillion valuation. Anthropic's Claude writes over 80 per cent of the firm's production code, and in April autonomously fixed over 800 errors that would have taken a human four years. Tham argues a coordinated slowdown is impossible amid the US-China arms race, noting the Trump administration ordered Anthropic to disable its most advanced models for all foreign nationals. She concludes Anthropic is right on AI's capabilities but unrealistic on politics, leaving EU-style regulation as the path forward.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Is%20Anthropic%20hallucinating%20when%20it%20calls%20for%20an%20AI%20development%20break.pdf"},{"id":"st-06","title":"Israel says troops will stay in Lebanon, Gaza despite US-Iran peace deal","source":"ST","date":"16 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Israel's defence minister Israel Katz said on June 15 that Israeli forces would remain in Lebanon, Syria and Gaza \"for an unlimited period of time\" to protect borders against jihadist elements, hours after the US and Iran agreed to end their war. The June 14 deal would reopen the Strait of Hormuz and lift the US naval blockade on Iranian ports. Far-right ministers Itamar Ben Gvir and Bezalel Smotrich denounced the deal, with Ben Gvir saying \"Trump's agreement does not bind us\" and Smotrich calling it \"bad for Israel\". Opposition leader Yair Lapid called it potentially \"one of the most shocking failures of Israel's foreign and security policy\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Israel%20says%20troops%20will%20stay%20in%20Lebanon,%20Gaza%20despite%20US-Iran%20peace%20deal.pdf"},{"id":"st-07","title":"Japan's urban redevelopment projects stall","source":"ST","date":"16 Jun 2026","tags":["Society","Finance & Markets"],"summary":"Tokyo's \"once-in-a-century\" Shibuya redevelopment is running nearly eight years behind schedule, now due to finish in March 2035, amid soaring material prices and a manpower squeeze worsened by 2024 overtime rules. An NHK survey found 70 per cent of local governments and developers have significantly revised or delayed plans, described as a \"nationwide crisis in urban redevelopment\". Material costs for aluminium, glass and steel surged up to 40 per cent since Russia's 2022 invasion of Ukraine, while manpower costs climbed 28 per cent. Projects from Gifu to Sapporo and Fukuoka have been downsized, frozen or cancelled, with JR Kyushu scrapping its Hakata Station Sky City after costs doubled to 870 billion yen.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Japan's%20urban%20redevelopment%20projects%20stall.pdf"},{"id":"st-08","title":"Lack of public understanding of nuclear energy in S-E Asia a challenge: IAEA chief","source":"ST","date":"16 Jun 2026","tags":["Energy","Southeast Asia"],"summary":"IAEA chief Rafael Grossi said there is a lack of public understanding about nuclear energy in South-east Asia, where people often confuse it with nuclear weapons, calling it a challenge for acceptance. He hopes Singapore's 2027 ASEAN chairmanship will deepen dialogue between the Vienna-based agency and the region. Singapore will undergo an IAEA Integrated Nuclear Infrastructure Review assessment in 2027 evaluating capabilities across 19 critical areas, though it has not decided on going nuclear. Grossi said nuclear plants are \"extremely resilient\" to natural hazards, noting Vietnam's Ninh Thuan 1 plant deal with Russia and the Philippines' aim for its first plant by 2032.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Lack%20of%20public%20understanding%20of%20nuclear%20energy%20in%20S-E%20Asia%20a%20challenge%20IAEA%20chief.pdf"},{"id":"st-09","title":"MAS to offer gold vaulting services to foreign central banks from October","source":"ST","date":"16 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Foreign central banks and sovereign entities will be able to store gold reserves with the Monetary Authority of Singapore from October, complementing commercial vaulting capacity exceeding 2,000 tonnes, DPM Gan Kim Yong announced on June 15. SGX will establish an over-the-counter gold clearing system by end-2026, with six banks including DBS, JPMorgan, OCBC and UOB as clearing members. MAS will also extend gold accounts to select Singapore-based bullion banks and remove the current 5 per cent cap on physical precious metals under fund tax incentive schemes. Gan said Singapore aims to be \"a trusted node in the global gold ecosystem\" rather than replacing London and New York.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/MAS%20to%20offer%20gold%20vaulting%20services%20to%20foreign%20central%20banks%20from%20October.pdf"},{"id":"st-10","title":"South Korean President Lee calls for restraint in election protests, rejects rigging claims","source":"ST","date":"16 Jun 2026","tags":["Politics","Society"],"summary":"South Korean President Lee Jae Myung on June 15 urged protesters rallying over June 3 local election ballot shortages not to infringe on others' rights, after disruptions at Seoul's Olympic Park affected sports organisations' work. He denounced the National Election Commission's handling of the elections as a serious failure that infringed voters' rights while rejecting \"absurd conspiracy theories\" alleging election rigging. Lee instructed police to investigate those who obstructed work by force and called for a transparent fact-finding process. He urged the NEC to cooperate with a parliamentary investigation that could begin as early as this week.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/South%20Korean%20President%20Lee%20calls%20for%20restraint%20in%20election%20protests,%20rejects%20rigging%20claims.pdf"},{"id":"st-11","title":"Trump's Iran deal: A fragile peace","source":"ST","date":"16 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Columnist Bhagyashree Garekar argues Trump's June 14 interim deal with Iran offers fragile peace as parties distrust each other, with Iran unlikely to give up its nuclear ambition and no smooth path for the US to release frozen assets and end sanctions. The four-month war cost 13 American servicemen's lives, a US$29 billion Pentagon bill and US$58 billion in extra fuel costs, while depleting munitions to China's advantage. Garekar notes Iran will benefit more from the Strait reopening, draining oil storage and sailing tankers confidently. Ayatollah Ali Khamenei was killed on the first day of strikes, replaced by a brutal IRGC-controlled military junta, leaving Trump limited political gains before the Nov 3 midterms amid 4 per cent inflation.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Trump's%20Iran%20deal%20A%20fragile%20peace.pdf"},{"id":"st-12","title":"Where the Singdollar stretches the furthest in Asia","source":"ST","date":"16 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Five Asian currencies have weakened against the Singapore dollar in 2026 amid geopolitical uncertainty, after MAS tightened policy in April allowing faster appreciation. The Indonesian rupiah fell 8 per cent in 2026 to 13,803.35 per Singdollar, weighed by oil import costs and capital outflows, while the Philippine peso declined 4 per cent to 47.20. The Thai baht weakened around 4 per cent to 25.42 and the South Korean won fell 5 per cent to 1,177.54, both exposed to higher energy prices from the Iran conflict. The Japanese yen declined 2 per cent to 124.94, pressured by the wide US-Japan interest rate gap, making Japan more affordable for Singaporean travellers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Where%20the%20Singdollar%20stretches%20the%20furthest%20in%20Asia.pdf"},{"id":"st-13","title":"Xi swops fighter jets for diplomatic hardball to squeeze Taiwan","source":"ST","date":"16 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Xi Jinping is shifting tactics on Taiwan, ramping up diplomatic isolation while dialling down military provocations, with Taiwan recording a daily average of five Chinese warplanes crossing the strait through May 2026, half the 2025 figure. China has punished European and Japanese outlets that interviewed President Lai Ching-te, expelled a New York Times reporter, and sanctioned New Zealand lawmakers who visited Taiwan. Eurasia Group's Jeremy Chan said \"what Beijing really wants is for Lai to lose at the ballot box\" in 2028. The shift comes as Trump casts doubt on US commitment, branding weapons sales as a bargaining chip, while Xi hosted KMT chairwoman Cheng Li-wun in April.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20ST/Xi%20swops%20fighter%20jets%20for%20diplomatic%20hardball%20to%20squeeze%20Taiwan.pdf"},{"id":"bt-01","title":"AI work platform Monday.com to use Singapore as its second Asia-Pacific HQ","source":"BT","date":"16 Jun 2026","tags":["Technology & AI","Southeast Asia"],"summary":"Work-management platform Monday.com said on June 15 its Singapore office, opened in October 2025, will become its second Asia-Pacific headquarters after Sydney, serving as a base to drive growth across South-east Asia, North-east Asia and India. Regional VP Chris Jordan said Asia-Pacific made up just 8 per cent of the firm's US$351.3 million quarterly revenue (to March 31), versus 53 per cent from North America and 28 per cent from Europe. The firm counts 4,700 South-east Asian customers including Unilever and Hepmil, and sees opportunity in legacy family conglomerates digitising and adding AI to workflows. It has hired 30 people in Singapore since October, with further hiring expected as it locates engineers and customer-success staff closer to clients.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/AI%20work%20platform%20Monday.com%20to%20use%20Singapore%20as%20its%20second%20Asia-Pacific%20HQ.pdf"},{"id":"bt-02","title":"EU and Asean at 50: time for bold action","source":"BT","date":"16 Jun 2026","tags":["Trade","Southeast Asia","Politics"],"summary":"The EU-Asean Business Council's executive director argues the blocs' 50th-anniversary relations in 2027 must deliver tangible outcomes beyond declarations, combining markets of over one billion people and a fifth of global GDP. He urges launching talks for a region-to-region digital trade agreement, a dedicated EU-Asean partnership on the Asean Power Grid, and an investment-protection framework. The 2025 Business Sentiment Survey found 84 per cent favoured a region-to-region FTA over bilateral deals, and 78 per cent said European firms were disadvantaged versus RCEP-linked competitors. A bloc-to-bloc FTA remains a long-term objective as both sides prioritise bilateral deals with the Philippines, Malaysia and Thailand by 2027.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/EU%20and%20Asean%20at%2050%20time%20for%20bold%20action.pdf"},{"id":"bt-03","title":"Investment story trumps size for Reits: the key is to be sufficiently differentiated","source":"BT","date":"16 Jun 2026","tags":["Finance & Markets","Society"],"summary":"The columnist argues that for Singapore Reits a differentiated investment story matters more than scale, contrasting Centurion Accommodation Reit (CAReit) and UI Boustead Reit (UIB Reit). CAReit, listed September 2025, traded at S$1.09, some 24 per cent above its S$0.88 IPO price, while UIB Reit traded at S$0.815, more than 7 per cent below its S$0.88 IPO price. CAReit differentiates as Singapore's first global living sector Reit, with about 72 per cent of Q1 net property income from Singapore purpose-built worker accommodation, whereas UIB Reit's Singapore logistics and industrial portfolio faces abundant rival exposure. The writer suggests city-centre office or Changi Airport retail Reits could offer similarly unique selling points; the writer owns units in both trusts.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Investment%20story%20trumps%20size%20for%20Reits%20the%20key%20is%20to%20be%20sufficiently%20differentiated.pdf"},{"id":"bt-04","title":"Japan central bank set to hike rates to highest since 1995 despite governor absence","source":"BT","date":"16 Jun 2026","tags":["Finance & Markets","Politics"],"summary":"The Bank of Japan is widely expected to raise its benchmark rate by a quarter point to 1 per cent on Jun 16, the highest since 1995, at the first regular policy meeting held without the governor present. Governor Kazuo Ueda, hospitalised for a hepatic cyst infection, will submit views in writing but not vote, with deputy governor Shinichi Uchida holding the press conference. The hike, the first since December, comes as Middle East conflict drives inflation risks and the yen hovers near 160 per US dollar despite record intervention. Ueda has suggested consumer price growth could exceed 3 per cent this fiscal year, while officials may also discuss slowing the pace of bond-purchase reductions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Japan%20central%20bank%20set%20to%20hike%20rates%20to%20highest%20since%201995%20despite%20governor%20absence.pdf"},{"id":"bt-05","title":"New private home sales at three-month low in May, with only one major new launch; developers sell 447 units in all","source":"BT","date":"16 Jun 2026","tags":["Finance & Markets","Society"],"summary":"Singapore developers sold 447 private homes (excluding ECs) in May, a three-month low, well below April's 1,548 units but 43.3 per cent above the 312 sold a year earlier, URA data showed. The slowdown reflected a quieter launch calendar, with only Hudson Place Residences launched; it sold 209 of 327 units at a median S$2,465 per square foot, about 47 per cent of monthly sales. Developers sold about 4,008 new homes in the first five months of 2026; analysts expect sales to stay subdued during June holidays then rebound in July with launches like Lentor Garden Residences and Dunearn House. Singaporean buyers made up 89.6 per cent of May purchases and foreigners just 1.8 per cent, with analysts noting low mortgage rates and improving sentiment after the preliminary US-Iran agreement.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/New%20private%20home%20sales%20at%20three-month%20low%20in%20May,%20with%20only%20one%20major%20new%20launch%20developers%20sell%20447%20units%20in%20all.pdf"},{"id":"bt-06","title":"Russia is the test of Europe's strategic autonomy","source":"BT","date":"16 Jun 2026","tags":["Geopolitics","Defence","Politics"],"summary":"The Bloomberg columnist argues that ending the Ukraine war and finding Russia a stable place in Europe's security architecture is the ultimate test of the continent's strategic autonomy in a post-American world. On Jun 11, E3 ambassadors from France, Germany and the UK visited Moscow to press Ukrainian peace terms, but foreign minister Sergei Lavrov declined to receive them. The writer notes Ukraine has regained narrative control as its drones and soldiers stalled Russia's summer offensive and a debate has begun among Russia's elite on ending the war. He warns that as Putin senses possible strategic defeat, escalation risks rise, with hardliners like Sergei Karaganov urging that the war end only when Russia achieves \"the total defeat of Europe\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Russia%20is%20the%20test%20of%20Europe's%20strategic%20autonomy.pdf"},{"id":"bt-07","title":"Singapore's total employment growth slows in Q1; job vacancies dip while retrenchments inch up","source":"BT","date":"16 Jun 2026","tags":["Society","Technology & AI","Finance & Markets"],"summary":"Singapore's total employment growth moderated in Q1 2026, rising 9,400 (excluding migrant domestic workers) in an 18th straight quarter of growth but down from 17,700 the prior quarter, MOM's Labour Market Report showed. Job vacancies fell to 73,300 in March (a 2.9 per cent rate) while retrenchments rose slightly to 3,830, concentrated in external-oriented sectors such as manufacturing; the overall unemployment rate held at 2 per cent. Manpower Minister Tan See Leng said retrenchment levels \"remain within non-recessionary norms\" and that firms were three times more likely to redesign jobs than cut headcount because of AI. The report included AI's labour impact for the first time, concluding its effect so far is greater on how jobs are performed than whether they exist.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Singapore's%20total%20employment%20growth%20slows%20in%20Q1%20job%20vacancies%20dip%20while%20retrenchments%20inch%20up.pdf"},{"id":"bt-08","title":"Strait of Hormuz reopening would offer relief for Asia, but economic scars will remain","source":"BT","date":"16 Jun 2026","tags":["Energy","Geopolitics","Southeast Asia"],"summary":"A potential US-Iran agreement to reopen the Strait of Hormuz would offer near-term relief for Asia, which has borne the brunt of the months-long war's fallout, but economists warn elevated inflation and supply-chain strains will likely linger through the end of 2026. More than four-fifths of petroleum and LNG transiting the waterway typically heads to Asian markets; Trump said on Jun 14 an interim ceasefire would reopen the strait, with signing scheduled Friday. Wood Mackenzie's Joshua Ngu cautioned disruptions \"will not be solved in a short period of time\", and Asian LNG prices indexed to oil with a three-to-six-month lag mean elevated gas costs persist. Disruptions to fertiliser supply, naphtha, helium and LPG raise food-security and industrial risks across South-east Asia.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Strait%20of%20Hormuz%20reopening%20would%20offer%20relief%20for%20Asia,%20but%20economic%20scars%20will%20remain.pdf"},{"id":"bt-09","title":"The biggest AI skill may not be technical","source":"BT","date":"16 Jun 2026","tags":["Technology & AI","Society"],"summary":"In a Business Times \"Lens on Singapore\" podcast, UOB group HR head Dean Tong and NUS-ISS deputy CEO Victor Chua argued AI's workforce impact is about transition rather than wholesale replacement. Tong said \"most jobs will be affected\" but UOB's recent reductions had \"nothing to do with AI\", and cited the Better U Pivot Programme, which gives displaced staff a 12-month protected period and has achieved around 80 per cent success. Chua highlighted a shortage of \"AI bilinguals\" who pair domain expertise with AI application, framing it as \"AI plus X\". Both said they prioritise problem-solving skills, curiosity and distinctive human abilities over technical skills, with Chua adding \"AI does not confer onto you legitimacy\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/The%20biggest%20AI%20skill%20may%20not%20be%20technical.pdf"},{"id":"bt-10","title":"The enduring enigma of economic growth","source":"BT","date":"16 Jun 2026","tags":["Finance & Markets","Politics","Society"],"summary":"The columnist, a former Chilean finance minister and LSE dean, argues economists, unlike politicians, admit they do not know the root causes of national growth. He notes China's income per person has risen 20-fold since Deng Xiaoping's 1978 reforms and India's nearly fivefold since 1991, while Brazil and Mexico stagnated despite similar liberalisation. Citing Philippe Aghion and Ricardo Hausmann, he locates the key in productivity gains from technological innovation and the slow diffusion of productive capabilities, which are sector-specific and hard to transfer across borders. He concludes markets alone may not generate upgrading, so governments must coordinate investments, provide sector-specific skills, and reward innovation without letting incumbents block competition.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/The%20enduring%20enigma%20of%20economic%20growth.pdf"},{"id":"bt-11","title":"Top banks rush to fill chief AI roles as talent jumps to rivals","source":"BT","date":"16 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Banks from Sydney to London are racing to fill chief AI officer roles that barely existed a year ago, with leaders at HSBC, Commonwealth Bank of Australia and Lloyds starting in the past three months. The jobs can command nearly US$3.5 million a year and require scarce skills, often forcing firms to poach from rivals; the share of organisations with a chief AI officer rose to 76 per cent this year from 26 per cent in 2025, per the IBM Institute for Business Value. Several executives say the role may be short-lived as AI becomes embedded, with ex-Standard Chartered AI head David Hardoon saying \"Do we have a chief Excel officer?\" In Singapore, heads of AI rank among the fastest-growing job listings, per LinkedIn data, even as specialist tech demand outpaces supply.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/Top%20banks%20rush%20to%20fill%20chief%20AI%20roles%20as%20talent%20jumps%20to%20rivals.pdf"},{"id":"bt-12","title":"US-Iran peace deal: S-Reits, aviation stocks, developers on investors' radar as potential winners","source":"BT","date":"16 Jun 2026","tags":["Finance & Markets","Energy","Geopolitics"],"summary":"Singapore Reits, aviation counters and property developers are set to lead gainers after a US-Iran peace deal was announced, though analysts say much geopolitical relief is already priced in. The Straits Times Index rose 1 per cent to close at 5,077.29 on Jun 15, with regional bourses rallying as a formal treaty is set to be signed Friday in Switzerland, reopening the blockaded Strait of Hormuz. Brent crude fell 5 per cent to US$82.94 a barrel; Phillip Securities named Singapore Airlines the \"clear winner\", while S-Reits benefit as lower forward inflation tempers rate-hike expectations. RHB flagged softer outlooks for offshore, marine and defence names as \"urgency premiums\" fade, and a neutral view on banks given a modestly less favourable net interest margin trajectory.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/US-Iran%20peace%20deal%20S-Reits,%20aviation%20stocks,%20developers%20on%20investors'%20radar%20as%20potential%20winners.pdf"},{"id":"bt-13","title":"'Very low chance' that US-Iran deal reverts energy flows to South-east Asia through Hormuz: Bloomberg Economics","source":"BT","date":"16 Jun 2026","tags":["Energy","Southeast Asia","Geopolitics"],"summary":"A US-Iran deal could offer South-east Asia some respite via lower oil prices, but Bloomberg Economics says structural supply disruptions will not be fixed overnight. Tamara Henderson said there is \"a very low chance that the Strait of Hormuz would revert to its pre-war state\", citing deep distrust and misalignment on terms such as recognition of Iran's control of the strait. As much as 90 per cent of crude supply for economies like the Philippines and Vietnam is imported from the Middle East, so the region may need to boost non-Middle East production, tap South China Sea reserves, or cut consumption. Combined with US tariffs, the oil shock is expected to slow real GDP growth in Indonesia, Malaysia, Singapore and Thailand over the rest of 2026, with inflation potentially peaking near 7 per cent in the Asean-5.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/'Very%20low%20chance'%20that%20US-Iran%20deal%20reverts%20energy%20flows%20to%20South-east%20Asia%20through%20Hormuz%20Bloomberg%20Economics.pdf"},{"id":"bt-14","title":"What the Iran-US peace deal means for businesses","source":"BT","date":"16 Jun 2026","tags":["Geopolitics","Energy","Trade"],"summary":"The editorial calls the US-Iran peace deal, announced by Pakistani PM Shehbaz Sharif on Jun 14 with a signing set for Friday in Switzerland, the most consequential market news since the war began in February, but urges caution. The closure of the Strait of Hormuz triggered what the IEA called the \"largest supply disruption in the history of the global oil market\", with UN data showing transits collapsing from around 130 a day in February to just six in March. The deal involves reopening the strait, Iran freely selling oil and a 60-day window to negotiate curbing its nuclear programme, with Israel's posture a wild card after recent strikes in Lebanon. With nearly 20 million barrels a day exported via the strait in 2025, the editorial advises firms to plan for gradual normalisation and keep contingency plans close.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20BT/What%20the%20Iran-US%20peace%20deal%20means%20for%20businesses.pdf"},{"id":"scmp-01","title":"AAPI survey finds fading faith in US as destination for immigrants amid Trump crackdown","source":"SCMP","date":"16 Jun 2026","tags":["Society","Politics"],"summary":"An AP-NORC survey released Monday found only one in three Asian-American and Pacific Islander adults still see the US as a great place for immigrants, while 64 per cent say it used to be but no longer is. Some 41 per cent say they or someone they know now carry proof of immigration status, and half have altered their behaviour because of immigration policy. The findings come as Trump targets legal and illegal immigration, with ICE operations across cities and Justice Department lawsuits to revoke citizenship from 17 people. The Supreme Court will soon rule on birthright citizenship, a cornerstone of Trump's agenda; the poll covered 1,075 adults from April 20 to 28.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/AAPI%20survey%20finds%20fading%20faith%20in%20US%20as%20destination%20for%20immigrants%20amid%20Trump%20crackdown.pdf"},{"id":"scmp-02","title":"After US-Iran accord and oil-price plunge, analysts warn of 'grey area' for Chinese firms","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Energy","Trade"],"summary":"Brent crude plunged more than 4 per cent Monday to a three-month low after Washington and Tehran reached a preliminary accord to end their four-month war, with a draft memorandum committing the US to lift its maritime blockade and issue oil-export waivers. Analysts cautioned that sanctioned Chinese firms may not see immediate relief; ING's Lynn Song said new purchases would not face fresh sanctions but existing ones are unlikely to be rushed off. Since late February the US Treasury has sanctioned dozens of mainland and Hong Kong entities over Iranian oil trade, prompting China to invoke its 'blocking rules' for the first time. Song warned that given uncertainty over the deal's longevity, firms would be operating in a 'grey area for some time'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/After%20US-Iran%20accord%20and%20oil-price%20plunge,%20analysts%20warn%20of%20%E2%80%98grey%20area%E2%80%99%20for%20Chinese%20firms.pdf"},{"id":"scmp-03","title":"After US-Iran deal, Netanyahu says he will run in coming Israeli elections","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Israeli Prime Minister Benjamin Netanyahu said Monday he intends to run in elections scheduled by the end of October, declaring 'I am going to run ... and intend to win'. The 76-year-old, on trial for corruption and under fire over his wartime leadership, spoke after Washington and Tehran agreed a deal to end the war sparked by US-Israeli strikes on Iran in late February. He said the campaign saved Israel from 'nuclear annihilation' and that troops would remain in Lebanon, Gaza and Syria 'as long as necessary'. Israeli figures across the spectrum slammed the US-Iran agreement; former PM Naftali Bennett called it a 'dangerous turn for Israel's security'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/After%20US-Iran%20deal,%20Netanyahu%20says%20he%20will%20run%20in%20coming%20Israeli%20elections.pdf"},{"id":"scmp-04","title":"Argentina edges back to China on currency swap despite US pressure","source":"SCMP","date":"16 Jun 2026","tags":["Finance & Markets","Geopolitics","Trade"],"summary":"Argentina's central bank president Santiago Bausili met PBOC governor Pan Gongsheng in Shanghai, a quiet overture toward Beijing months after Buenos Aires moved to unwind a currency lifeline Washington pushed it to abandon. The 130 billion yuan (US$19 billion) swap, signed in 2009 and renewed in June 2023, expires August 6; Argentina denies negotiating a renewal, but Noticias Argentinas reported talks are advancing with only administrative steps remaining. The drawn balance fell from 21 billion yuan at end-2024 to around 7 billion by close of 2025. Washington had pressed President Milei to cut ties with Beijing, with envoy Mauricio Claver-Carone calling the arrangement 'extortionate' and the US Treasury later announcing a rival US$20 billion swap.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Argentina%20edges%20back%20to%20China%20on%20currency%20swap%20despite%20US%20pressure.pdf"},{"id":"scmp-05","title":"China credit data shows sluggish demand, more household deleveraging amid weak investment","source":"SCMP","date":"16 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"New bank loans totalled 520 billion yuan (US$77 billion) in May, trailing the 620 billion yuan a year earlier, underscoring weak corporate and household lending, per PBOC data released Friday. Outstanding household lending fell 141 billion yuan in May, bringing the cumulative 2026 drop to 631 billion yuan, while corporate medium- to long-term loans contracted 20 billion yuan. CICC said deleveraging households and weak consumption have dented companies' willingness to borrow, with manufacturing investment weakening notably since March. The tech sector stood out as a bright spot, with bond and equity financing giving tech firms a combined 837.6 billion yuan in fresh capital over five months.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%20credit%20data%20shows%20sluggish%20demand,%20more%20household%20deleveraging%20amid%20weak%20investment.pdf"},{"id":"scmp-06","title":"China reaches mass production of key isotope in quantum computing, Beijing says","source":"SCMP","date":"16 Jun 2026","tags":["Technology & AI"],"summary":"State-owned China National Nuclear Corporation said Monday one of its institutes had mass-produced high-purity silicon-28 isotope with isotopic abundance above 99.99 per cent, China's first independent large-scale production of the material. Silicon-28 is critical for silicon-based quantum computers because it provides an 'ultra-quiet' environment allowing fragile qubits to stay stable longer; production was previously concentrated in Russia, Europe and US-linked supply chains. CAS academician Yu Dapeng said the breakthrough 'fundamentally addresses the urgent shortage of essential feedstock'. CNNC said it had produced 26 stable isotopes across 12 elements and would continue developing products for nuclear energy, aerospace and deep-space exploration.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%20reaches%20mass%20production%20of%20key%20isotope%20in%20quantum%20computing,%20Beijing%20says.pdf"},{"id":"scmp-07","title":"China's military mouthpiece PLA Daily cites SpaceX role in warning of satellite arms race","source":"SCMP","date":"16 Jun 2026","tags":["Defence","Technology & AI","Geopolitics"],"summary":"PLA Daily warned in a full-page series Monday that 'the era of the militarised application of low-orbit constellations is arriving at an accelerated pace', citing SpaceX's Starlink as an example of US build-up. The articles, by authors from China's Space Engineering University, ran three days after SpaceX raised US$75 billion in its IPO, making Elon Musk the first trillionaire. They noted Starlink has more than 10,000 satellites and played a key role in the Russia-Ukraine conflict, and cited the Space Force's US$4.2 billion SpaceX contract. The paper did not mention China's own systems, though the Guowang constellation plans around 13,000 satellites and Qianfan some 14,000-15,000.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/China%E2%80%99s%20military%20mouthpiece%20PLA%20Daily%20cites%20SpaceX%20role%20in%20warning%20of%20satellite%20arms%20race.pdf"},{"id":"scmp-08","title":"Chinese compound chip stocks surge after Supreme Court blocks Infineon in GaN patent case","source":"SCMP","date":"16 Jun 2026","tags":["Technology & AI","Finance & Markets","Trade"],"summary":"Chinese compound-semiconductor stocks surged on Monday after China's Supreme People's Court on Friday upheld an injunction barring Germany's Infineon from selling gallium-nitride (GaN) products in mainland China, in a patent case brought by domestic rival Innoscience over two core patents (with 10 million yuan in damages). Innoscience's Hong Kong shares jumped 16.6 per cent, while Silan Microelectronics and Sanan Optoelectronics hit their 10 per cent daily limits and China Resources Microelectronics rose over 13 per cent. Infineon, which called the ruling's effect 'very limited' and vowed to appeal, drew 38 per cent of FY2025 revenue from China and Hong Kong. Analysts framed it as a 'system-level confrontation' over third-generation chips for AI data centres and EVs; Innoscience works with Nvidia on 800 VDC data-centre power solutions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Chinese%20compound%20chip%20stocks%20surge%20after%20Supreme%20Court%20blocks%20Infineon%20in%20GaN%20patent%20case.pdf"},{"id":"scmp-09","title":"EU carbon tariff sows havoc in China as steel firms grapple with 'absurd' rules","source":"SCMP","date":"16 Jun 2026","tags":["Trade","Environment","Geopolitics"],"summary":"China's steel and metals exporters are scrambling to comply with the EU's Carbon Border Adjustment Mechanism (CBAM), which entered implementation in January and demands granular emissions data across cement, iron and steel, aluminium, fertilisers, electricity and hydrogen. Exporters such as Hebei's Neil Miao faced a 40,000 yuan (US$5,900) agency bill before shipping, with one analyst saying CBAM has shifted 'from a climate policy tool to a tool for trade protectionism'. EU certificate prices stood at €75.36 per tonne of CO2 versus around 80 yuan in China, and default-value penalties rise from 10 per cent this year to 30 per cent by 2028 — perversely penalising cleaner electric-arc-furnace makers that lack EU-spec data. With Chinese core steel profits down 85.6 per cent year on year in Q1, some firms are delaying EU shipments or pivoting to the Middle East and South-east Asia, as Brussels prepares to widen CBAM to 180 downstream products from 2028.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/EU%20carbon%20tariff%20sows%20havoc%20in%20China%20as%20steel%20firms%20grapple%20with%20%E2%80%98absurd%E2%80%99%20rules.pdf"},{"id":"scmp-10","title":"Gavin Newsom accuses Trump of directing Justice Department to investigate him","source":"SCMP","date":"16 Jun 2026","tags":["Politics"],"summary":"California Governor Gavin Newsom on Monday accused President Trump of directing the Justice Department to undertake a politically motivated investigation of him and his wife, saying 'he's coming after me because I am considering running for president'. Federal officers in Sacramento have been conducting investigations since 2025, including into wife Jennifer Siebel Newsom's taxes and a charity she co-founded, though a source said these originated in California, not Washington. Newsom, a top 2028 Democratic contender, said agents had been knocking on doors of family and former employees demanding records. A Reuters tally found at least 470 people and institutions targeted for retribution since Trump's second term began.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Gavin%20Newsom%20accuses%20Trump%20of%20directing%20Justice%20Department%20to%20investigate%20him.pdf"},{"id":"scmp-11","title":"How to ride out Hong Kong's US$274 billion lock-up expiry wave hitting stocks this year","source":"SCMP","date":"16 Jun 2026","tags":["Finance & Markets"],"summary":"Over the next 12 months, shares worth US$274 billion could be freed in Hong Kong as IPO lock-ups expire, including from hot listings such as MiniMax Group and Knowledge Atlas Technology, according to Goldman Sachs. Historical data shows stocks posted a median 4 per cent decline three months after lock-up expiry, widening to 7 per cent after six months. SPI Asset's Stephen Innes advised focusing on firms with annual revenue growth of at least 20 per cent, cornerstone ownership of 30-50 per cent, and avoiding those releasing over 30 per cent of shares. Goldman estimated demand could surpass US$400 billion, with US$200 billion from mainland buying and US$180 billion from corporate distributions cushioning the supply wave.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/How%20to%20ride%20out%20Hong%20Kong%E2%80%99s%20US$274%20billion%20lock-up%20expiry%20wave%20hitting%20stocks%20this%20year.pdf"},{"id":"scmp-12","title":"Is Beijing planning to make more drones overseas for Middle Eastern buyers?","source":"SCMP","date":"16 Jun 2026","tags":["Defence","Trade","Geopolitics"],"summary":"State-run North Industries Group Corporation (Norinco) displayed a model drone assembly line at the Eurosatory defence exhibition in Paris, hinting it plans to make more weapons overseas under a 'Norinco defence localisation' banner. The miniature depicted manufacture of drones including the BZK-005E reconnaissance aircraft, operated in Indonesia, Mauritania and reportedly Sudan. Former PLA instructor Song Zhongping said China could transfer assembly lines to Middle Eastern countries 'once the conditions are met, just like it did with certain lines to Pakistan'. In December, Egypt's Arab Organization for Industrialisation signed an MOU with Norinco to co-produce drones, up to 85 per cent made domestically; the Middle East is China's most important drone export market.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Is%20Beijing%20planning%20to%20make%20more%20drones%20overseas%20for%20Middle%20Eastern%20buyers.pdf"},{"id":"scmp-13","title":"Japan, Italy to boost tech, critical minerals cooperation","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Trade","Technology & AI"],"summary":"Japanese Prime Minister Sanae Takaichi and Italian counterpart Giorgia Meloni agreed Monday to deepen cooperation in advanced technologies such as semiconductors and strengthen critical-mineral supply chains amid concerns about over-reliance on China. Speaking before a G7 summit in Evian-les-Bains, France, both welcomed the preliminary US-Iran deal, with Takaichi calling freedom of navigation through the Strait of Hormuz 'a matter of critical importance'. The leaders pledged support for cooperation between Japan's state-backed chip venture Rapidus and an Italian semiconductor firm, and agreed to accelerate the trilateral Global Combat Air Programme with Britain. Several memorandums of understanding were signed as the countries mark 160 years of diplomatic relations.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Japan,%20Italy%20to%20boost%20tech,%20critical%20minerals%20cooperation.pdf"},{"id":"scmp-14","title":"North Korea plays US-China rivalry card to justify 'irreversible' nuclear status","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Defence","Politics"],"summary":"North Korea is leaning into US-China rivalry to legitimise its nuclear build-up, framing its arsenal as a response to a hostile regional environment as the winding down of the Iran conflict may refocus pressure on the Korean peninsula. A foreign ministry spokesman declared the North's nuclear-armed status 'irreversible' and dismissed denuclearisation as an 'empty illusion', while accusing Seoul of discarding its 'mask of peace' via an EU joint statement. Pyongyang seized on a US commander's description of South Korea as a 'dagger' pointed at China to court Beijing and Moscow. Trump added intrigue by sharing a 2018 summit photo with Kim Jong-un, though analyst Doo Jin-ho said the North shows little interest in reviving diplomacy.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/North%20Korea%20plays%20US-China%20rivalry%20card%20to%20justify%20%E2%80%98irreversible%E2%80%99%20nuclear%20status.pdf"},{"id":"scmp-15","title":"The 'rice of electronics': how AI-driven demand for MLCCs triggered a supply bottleneck","source":"SCMP","date":"16 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"AI-driven demand has triggered what Goldman Sachs calls the 'largest and longest' cycle in the history of multilayer ceramic capacitors (MLCCs), dubbed the 'rice of the electronics industry'. An AI server needs up to 28,000 MLCCs per unit, a 13-fold increase over a standard set-up, while Nvidia's Rubin board uses 12,000 units versus 6,500 on GB200. Lead times have stretched to 24 weeks from a typical 10, and consumer MLCC spot prices have risen 20 to 40 per cent. Murata announced 250 billion yen (US$1.56 billion) capex for FY2026 but expects only about 20 per cent capacity growth over two years; Samsung Electro-Mechanics plans a new plant in the Philippines.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/The%20%E2%80%98rice%20of%20electronics%E2%80%99%20how%20AI-driven%20demand%20for%20MLCCs%20triggered%20a%20supply%20bottleneck.pdf"},{"id":"scmp-16","title":"The waste-to-sand plant that could pave the way for China's zero waste coal goal","source":"SCMP","date":"16 Jun 2026","tags":["Environment","Technology & AI"],"summary":"A project in Gaoping, Shanxi province, has begun operations converting ultra-hard coal waste (gangue) into 1,000 tonnes per day of building and industrial materials including sand and gravel aggregates, advancing China's zero-waste goal for the coal industry. China's accumulated coal gangue reserves exceeded 7 billion tonnes, with a comprehensive utilisation rate below 60 per cent, long occupying land and causing pollution. The plant uses X-ray separation before crushing, screening and sand production to make aggregates and unburnt bricks. Former industry official Hu Youyi said the route was 'officially incorporated into China's green building materials system' since last year, but cautioned the aggregates are unsuitable for high-strength load-bearing structures.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/The%20waste-to-sand%20plant%20that%20could%20pave%20the%20way%20for%20China%E2%80%99s%20zero%20waste%20coal%20goal.pdf"},{"id":"scmp-17","title":"Trump may get birthday gift of an Iran deal, but the party may be messy and short-lived","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Chinese analysts say the impending Iran deal is a well-timed 'birthday gift' for Trump, who turned 80 on Sunday — easing pressure to exit an unauthorised war and stabilise an economy where inflation hit a three-year high of 4.2 per cent — but warn celebrations could be short-lived. Shanghai Academy's Pan Guang called Trump a winner on both the economy and November midterms, while Fudan's Sun Degang said he had 'managed to hit the pause button' after 100-plus days of conflict. Thorny issues remain unresolved: Iran's enrichment (Trump said Tehran could enrich 'for nonmilitary purposes. Forever'), sanctions relief sought within 60 days, and a rattled Israel. Pan said Israel is 'the only unpredictable factor', with the capacity to undermine the deal, after Netanyahu reportedly told Trump Israel is not bound by the Lebanon clause and Defence Minister Katz vowed troops will stay in Lebanon, Syria and Gaza 'indefinitely'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Trump%20may%20get%20birthday%20gift%20of%20an%20Iran%20deal,%20but%20the%20party%20may%20be%20messy%20and%20short-lived.pdf"},{"id":"scmp-18","title":"US judge dismisses Elon Musk's xAI trade secret lawsuit against OpenAI","source":"SCMP","date":"16 Jun 2026","tags":["Technology & AI","Politics"],"summary":"US District Judge Rita Lin in San Francisco on Monday dismissed with prejudice Elon Musk's xAI lawsuit accusing OpenAI of stealing trade secrets for chatbots, saying it would be 'futile' for xAI to continue. The judge ruled xAI failed to show OpenAI induced former senior engineer Xuechen Li, a Chinese national, to divulge confidential information about its Grok chatbot. It is Musk's second legal loss against OpenAI in four weeks, following a May 18 jury ruling against him in a US$150 billion case. OpenAI's lawyers wrote it 'does not need or want anyone's trade secrets, especially not from xAI', which is separately suing Li, who has denied wrongdoing.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/US%20judge%20dismisses%20Elon%20Musk%E2%80%99s%20xAI%20trade%20secret%20lawsuit%20against%20OpenAI.pdf"},{"id":"scmp-19","title":"US, Iran sign preliminary Hormuz deal ahead of formal ceremony","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Energy"],"summary":"A senior US official said Trump and VP J.D. Vance electronically signed a memorandum of understanding with Iran to reopen the Strait of Hormuz and end the US naval blockade, with Iranian Speaker Mohammad Bagher Ghalibaf signing for Tehran; a formal ceremony is set for June 19 in Switzerland. Terms remained secret nearly a day on, though officials said the strait would be toll-free for 60 days and floated releasing frozen funds, sanctions relief and a US$300 billion reconstruction fund 'tied to performance'. Trump said in Evian, France, that ships were 'starting to go out now', but Argus reported traffic unchanged at about 3 per cent of normal, with 500-600 vessels waiting to exit the Gulf. Iran's President Pezeshkian called it 'a document of pride' but said a final agreement 'has yet to take shape'; analysts said the 60-day ceasefire lowers the odds of US economic stimulus before the election.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/US,%20Iran%20sign%20preliminary%20Hormuz%20deal%20ahead%20of%20formal%20ceremony.pdf"},{"id":"scmp-20","title":"Will a US-Iran deal ease pressure on China's sanctions-hit firms?","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Energy","Trade"],"summary":"A tentative US-Iran deal has eased escalation fears, but its phased sanctions-relief framework remains contested and legally intricate for dozens of mainland and Hong Kong firms hit with secondary sanctions during Washington's 'Economic Fury' campaign. Under a final agreement to be negotiated within 60 days, the US would eventually lift all sanctions on Iran, with interim Treasury waivers permitting crude and petrochemical exports plus related banking, insurance and shipping. The US had sanctioned 'teapot' refiners such as Hengli Petrochemical and shadow-fleet vessels linked to Hong Kong firms; China issued its first-ever blocking order in May. Natixis economist Gary Ng said relief for already-sanctioned entities 'is likely to be gradual rather than immediate'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Will%20a%20US-Iran%20deal%20ease%20pressure%20on%20China%E2%80%99s%20sanctions-hit%20firms.pdf"},{"id":"scmp-21","title":"Will Beijing's tighter capital-control rules dampen Hong Kong's housing rebound?","source":"SCMP","date":"16 Jun 2026","tags":["Finance & Markets","Society"],"summary":"New home launches in coming weeks will test the impact of Beijing's latest capital-control measures on Hong Kong's recovering housing market, where mainland buyers have accounted for about a third of purchases since stamp duties were removed in 2024. Mainland buyers bought 5,777 homes in the first four months of 2026, with April registrations up nearly 48 per cent month on month to 1,892 deals, a two-year high. The city's price index has been steadying or rising since April last year, and new home sales hit 10,232 in five months, about 50 per cent more than 2025. Savills' Jack Tong said some developers have turned cautious, and Beijing's measures targeting illegitimate outflow channels 'warrant close attention'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Will%20Beijing%E2%80%99s%20tighter%20capital-control%20rules%20dampen%20Hong%20Kong%E2%80%99s%20housing%20rebound.pdf"},{"id":"scmp-22","title":"Zelensky proposes meeting Putin in US after Russian leader 'ignores' G7 invitation","source":"SCMP","date":"16 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Ukrainian President Volodymyr Zelensky said Monday he was willing to meet Vladimir Putin in the United States, suggesting Putin would find such an offer 'much harder to refuse', a proposal made in a call with Trump. Putin has repeatedly rejected face-to-face talks and ignored an invitation to meet Zelensky at the G7 summit in France. Separately, the EU formally opened negotiations with Ukraine and Moldova on a first 'cluster' of laws after Hungary's veto ended with Viktor Orban's election defeat, though full membership remains years away. Ukraine also announced an army recruitment overhaul, replacing indefinite service with contracts of six to 24 months and salaries up to 460,000 hryvnia (US$10,300) monthly.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jun%202026/16%20Jun%20SCMP/Zelensky%20proposes%20meeting%20Putin%20in%20US%20after%20Russian%20leader%20%E2%80%98ignores%E2%80%99%20G7%20invitation.pdf"}]}};</script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SRC = {
  WSJ:{c:"var(--wsj)", name:"Wall Street Journal"},
  ST:{c:"var(--st)", name:"Straits Times"},
  BT:{c:"var(--bt)", name:"Business Times"},
