eng's death. Four of the Nature Index's top five institutions are Chinese, led by the Chinese Academy of Sciences; Harvard placed third.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/China%20is%20now%20world%E2%80%99s%20No%201%20science%20power,%20top%20Russian%20scientist%20Artem%20Oganov%20says.pdf"}, {"id": "scmp-04", "title": "China report warns against European-led Nato 3.0 expansion in the Asia-Pacific", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "A report by China's CICIR think tank warns that Nato's shift to a more Europe-led \"Nato 3.0\" will not heal strategic rifts between Washington and European capitals, and that the bloc's expanding military cooperation with Asia-Pacific nations like Japan leaves it increasingly at odds with a multipolar order. The concept, embraced at Nato's Ankara summit, shifts conventional-defence burden onto Europe as the US recalibrates commitments. CICIR said US and European goals diverge from the start over procurement - Washington's \"made by Nato\" model versus Europe's \"buy European\" push. It cast the alliance's Asian outreach, including ties with the Indo-Pacific Four - Australia, Japan, New Zealand and South Korea - as a US bid to build an \"Asian version of Nato\" to contain China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/China%20report%20warns%20against%20European-led%20Nato%203.0%20expansion%20in%20the%20Asia-Pacific.pdf"}, {"id": "scmp-05", "title": "Chinese AI stock trade remains intact despite 10% correction from jumbo IPO, Fed jitters", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Fund managers say the recent pullback in Chinese tech stocks is a blip unlikely to derail the AI-driven bull run. The Star Market 50 Index fell over 10 per cent in two weeks, reacting to profit-taking, ChangXin Memory's US$9.8 billion IPO and Fed tightening fears, but HSBC Jintrust and UBS expect strong AI earnings and foreign diversification into Chinese assets to overcome the negatives. HSBC's Chen Ping favours computing-power stocks and semiconductors, projecting roughly 50 per cent annual AI capex growth through 2030. ChangXin, set to be Asia's biggest IPO this year, begins trading July 27. Second-quarter GDP growth slowed to 4.3 per cent, below Beijing's target. UBS's James Wang said European interest in Chinese AI stocks stayed robust.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Chinese%20AI%20stock%20trade%20remains%20intact%20despite%2010%25%20correction%20from%20jumbo%20IPO,%20Fed%20jitters.pdf"}, {"id": "scmp-06", "title": "EU accuses China of seeking to reshape global order in stark new strategy paper", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics"], "summary": "The EU accused China, alongside Russia, of trying to \"reshape the global order in line with their interests\" in a new position paper adopted by its 27 foreign ministers, containing some of the bloc's strongest official criticism of Beijing. The document, guidance for the EU's first security strategy, casts both as revisionist powers and labels China a \"key enabler\" of Russia's war on Ukraine - language previously used by Nato. Analyst Mikko Huotari said the wording \"crosses a major diplomatic threshold\". It comes amid claims China trained Russian troops and as fresh sanctions targeting Chinese entities loom. The paper flagged China's assertiveness in the South and East China Seas and across the Taiwan Strait as threatening global security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/EU%20accuses%20China%20of%20seeking%20to%20reshape%20global%20order%20in%20stark%20new%20strategy%20paper.pdf"}, {"id": "scmp-07", "title": "Global views of China and Xi improve as perceptions of US decline, Pew survey finds", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "A new Pew Research Centre survey of over 45,000 people across 37 countries found China's global image has rebounded from pandemic-era lows as confidence in the US declined. Across 20 consistently surveyed countries, China now averages 46 per cent favourability versus 36 per cent for the US - a reversal from 2023, when 54 per cent favoured the US and 19 per cent China. Views of Xi Jinping also improved, though opinions stay negative in wealthier nations. Favourability is strongest in Latin America, Africa and parts of South and Southeast Asia, weaker in Europe and advanced East Asia. Respondents in the Philippines, Japan and Australia were among the most likely to identify China as a threat.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Global%20views%20of%20China%20and%20Xi%20improve%20as%20perceptions%20of%20US%20decline,%20Pew%20survey%20finds.pdf"}, {"id": "scmp-08", "title": "Iran threatens to close more vital seaways as US renews blockade", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Iran threatened to shut off more regional energy exports after the US reimposed a naval blockade of Iranian ports, as both sides launched fresh strikes over the Strait of Hormuz. The Islamic Revolutionary Guard Corps said it struck US military sites in Bahrain, Kuwait and Jordan, warning of the \"closure of all other export corridors\", including Bab el-Mandeb, the Red Sea gateway. The war, begun with US-Israeli strikes on February 28, has frayed a tentative June truce. The US said it hit dozens of targets over seven hours and that Iran attacked seven commercial ships. A Houthi official warned closing Bab el-Mandeb could push oil to US$200 a barrel. Trump threatened to hit Iranian power plants and bridges unless Tehran resumes talks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Iran%20threatens%20to%20close%20more%20vital%20seaways%20as%20US%20renews%20blockade.pdf"}, {"id": "scmp-09", "title": "Is artificial intelligence causing a rise in natural human stupidity?", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Recent scientific studies suggest heavy reliance on generative AI chatbots could erode human memory, decision-making and critical thinking, raising fears about \"cognitive offloading\". One American-British study of 1,222 people found AI tools improved short-term performance on arithmetic and reading tasks but diminished results and persistence once the tools were removed. A viral 2025 MIT study found students using AI to write essays showed less critical thinking. Carnegie Mellon's Grace Liu warned AI \"removes learning opportunities\" across nearly any cognitive activity, unlike calculators that left reasoning to humans. Developers have added \"Socratic\" study modes to ChatGPT and Gemini, and Microsoft built in mistake warnings. Researchers say long-term studies are lacking and urge people to use AI in a smart way.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Is%20artificial%20intelligence%20causing%20a%20rise%20in%20natural%20human%20stupidity.pdf"}, {"id": "scmp-10", "title": "Japan treads diplomatic fine line over US campaign to end ICC 'threat'", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Japan voiced concern over the US campaign against the International Criminal Court, exposing a bind for Tokyo as it defends a tribunal it has long championed without provoking its key security ally. Chief Cabinet Secretary Minoru Kihara stressed Japan's support for the rule of law; Tokyo is the court's largest financial contributor and the ICC's president, Tomoko Akane, is Japanese. The US policy, outlined by Secretary of State Marco Rubio, accused the court of \"waging a war\" against America and called it an \"intolerable threat\" to sovereignty. Analysts said Tokyo will play for time, but the episode deepens doubts about US reliability, and a proposed Japan-hosted ICC Asian branch may be quietly dropped.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Japan%20treads%20diplomatic%20fine%20line%20over%20US%20campaign%20to%20end%20ICC%20%E2%80%98threat%E2%80%99.pdf"}, {"id": "scmp-11", "title": "Osaka-led industry group eyes China mission as corporate Japan navigates trade tensions", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "The Osaka-based Kansai Economic Federation, with 1,300 members, plans to send a delegation to Beijing and Xian from October 18-23 to repair business ties after a diplomatic dispute soured exchanges. Chairman Masayoshi Matsumoto and Osaka Chamber of Commerce head Shingo Torii will lead the group, which awaits confirmation from China's CCPIT trade body. Tensions spiked in November when Prime Minister Sanae Takaichi suggested Japan could deploy forces over a Taiwan conflict, prompting Beijing to issue travel warnings, halt seafood imports and ban some dual-use exports. Japan-China trade reached US$322 billion last year. Analyst Yoichiro Sato said the Kansai visit, rooted in the region's \"pragmatic merchant spirit\", could ease bilateral political tension.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Osaka-led%20industry%20group%20eyes%20China%20mission%20as%20corporate%20Japan%20navigates%20trade%20tensions.pdf"}, {"id": "scmp-12", "title": "Pacific security axis grows as New Zealand eyes Australia-Fiji defence pact", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "New Zealand's interest in joining the newly signed Australia-Fiji defence pact could mark the start of a broader hard-security alliance in the South Pacific, though analysts warn smaller states' concerns may go unaddressed. The Ocean of Peace Alliance, signed July 6, binds Canberra and Suva to mutual defence; it is Fiji's first such treaty and Australia's fourth. Prime Minister Christopher Luxon welcomed the pact, and Foreign Minister Winston Peters, who called China's July 6 ballistic missile test \"deeply concerning\", framed joining as a regional ambition. As Beijing pours aid into the Pacific, Canberra and Wellington are countering its influence. Analysts questioned whether militarised, treaty-based architecture serves Pacific societies focused on climate and economic security.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Pacific%20security%20axis%20grows%20as%20New%20Zealand%20eyes%20Australia-Fiji%20defence%20pact.pdf"}, {"id": "scmp-13", "title": "Senate bill seeks to curb US reliance on China in drug industry", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Bipartisan US senators unveiled legislation to increase transparency around foreign influence in the pharmaceutical industry, amid concerns over dependence on China for critical drug ingredients. The Pharmaceutical Investment Oversight and Accountability Act would require the FTC, with CFIUS, to report annually on foreign investment in US drugmaking, manufacturing reliance and DNA-sequencing technologies. Senator Rick Scott, backed by Democrats Kirsten Gillibrand and Elizabeth Warren, said \"Communist China\" should not control the medicine supply chain. Witnesses said China supplies 94 per cent of key starting materials for amoxicillin and 74 per cent of US heparin, and cited concerns over biotech firm WuXi AppTec. The bill stops short of restricting imports but is billed as a first step toward reducing reliance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Senate%20bill%20seeks%20to%20curb%20US%20reliance%20on%20China%20in%20drug%20industry.pdf"}, {"id": "scmp-14", "title": "Tankers with Iranian oil look to Pakistan for safe harbour as US blockade takes effect", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Two tankers carrying Iranian oil signalled Pakistan as their destination, an unusual move suggesting they seek a safe place to wait as the US blockade takes effect. The Rani and the Amil, carrying a combined 1 million barrels of crude, switched destination signals to Karachi on Tuesday, ship-tracking data show. Analysts say the vessels are unlikely to discharge in Pakistan - which has not imported Iranian crude in a decade - but may wait or transfer cargoes to other ships. Both tankers are US-sanctioned and part of Iran's \"dark fleet\". Waters off eastern Malaysia remain a main holding area for ship-to-ship transfers bound for China; most departing Gulf tankers have signalled Singapore as their next destination.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Tankers%20with%20Iranian%20oil%20look%20to%20Pakistan%20for%20safe%20harbour%20as%20US%20blockade%20takes%20effect.pdf"}, {"id": "scmp-15", "title": "Trump intelligence pick to play 'helpful' role in agreeing economic strategy with China", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Jay Clayton, US nominee for director of national intelligence, told a Senate confirmation hearing he could be \"extremely helpful\" in shaping economic strategy with China, framing Beijing as a leading economic and geopolitical challenge. The Manhattan federal prosecutor listed terrorism, drug trafficking and \"traditional adversaries\" Russia, China and Iran as top threats, drawing pushback from Senator Mark Warner for ranking drugs above China. Clayton, a former SEC chairman under Trump, said the US still cooperates extensively with China economically. Senators also pressed him on Trump's false 2020 election claims and declassifying Covid-19 origins intelligence. The hearing followed Trump's abrupt cancellation of an earlier session, as lawmakers moved to block acting director Bill Pulte.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Trump%20intelligence%20pick%20to%20play%20%E2%80%98helpful%E2%80%99%20role%20in%20agreeing%20economic%20strategy%20with%20China.pdf"}, {"id": "scmp-16", "title": "US hardens AI stance on China as Anthropic calls for extending lead", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Washington is hardening its AI posture toward China as lawmakers advance export-control bills and the Trump administration deepens ties with US AI firms. Anthropic's national security policy head Tarun Chhabra said the US holds a six-to-nine-month lead in frontier models, accusing Chinese labs of \"adversarial\" unauthorised distillation and saying Anthropic shuts millions of accounts weekly. He claimed Zhipu AI's GLM-5.2 was distilled from Anthropic and OpenAI models. The White House launched \"Gold Eagle\" to coordinate cyber vulnerabilities with AI firms. Three export bills - the AI Overwatch Act, Match Act and Chip Security Act - are set to fold into the 2027 NDAA, tightening restrictions on advanced chips and chipmaking equipment, despite pushback from ASML's Netherlands.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/US%20hardens%20AI%20stance%20on%20China%20as%20Anthropic%20calls%20for%20extending%20lead.pdf"}, {"id": "scmp-17", "title": "US launches more Iran strikes, hits oil tanker trying to break Hormuz blockade", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The US launched a fresh wave of strikes against Iran to curb threats to shipping in the Strait of Hormuz, as Trump warned he could widen attacks unless Tehran returned to talks. US Central Command said strikes began at 1900 GMT and that an aircraft disabled the empty tanker M/T Belma with Hellfire missiles as it tried to break the port blockade. Iranian state media reported explosions in Bandar Abbas, Chabahar and Bushehr, home to Iran's only civilian nuclear plant. Iran's Revolutionary Guards said they targeted the US Fifth Fleet in Bahrain; Jordan downed three missiles. Nearly a month after a memorandum of understanding, the foes resumed fighting. Trump scrapped a planned 20 per cent Hormuz shipping levy for Gulf trade deals.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/US%20launches%20more%20Iran%20strikes,%20hits%20oil%20tanker%20trying%20to%20break%20Hormuz%20blockade.pdf"}, {"id": "scmp-18", "title": "US$402,000 bonus splits Samsung device and chip workers as anger, feud mount", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "A feud between Samsung Electronics' device-making and chipmaking divisions is deepening over a nearly 100-fold compensation gap. Employees in the smartphone and appliance Device Experience (DX) division are angry that only Device Solutions (DS) chip staff received performance incentives of up to 600 million won (US$402,900) under a May wage deal, while DX workers get about 6 million won. The Samsung Electronics Company Union, now the second-largest with 28,569 members, plans a \"same company, same rights\" rally in Suwon. Amid a memory-chip upcycle, Samsung posted 57.2 trillion won operating profit in the first quarter, with DS accounting for 53.7 trillion. A rival DS-based union rejected joint 2027 bargaining, seeking separate negotiations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/US%24402,000%20bonus%20splits%20Samsung%20device%20and%20chip%20workers%20as%20anger,%20feud%20mount.pdf"}, {"id": "scmp-19", "title": "US-Iran war: is Trump falling into a Vietnam 'quagmire'?", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Renewed US-Israeli strikes on Iran, five months and two ceasefires in, are prompting analysts to draw parallels with drawn-out US wars like Vietnam and Afghanistan. Trump reimposed a naval blockade on Iranian ports and threatened to hit power plants and bridges if Tehran refuses talks; he himself invoked Vietnam, claiming he \"would have won\" it quickly. Tsinghua researcher Jodie Wen called the quagmire analogy \"not alarmist\", noting US strikes failed to topple Iran's regime or resolve the nuclear issue. Lanzhou University's Zhu Yongbiao said Washington shows signs of \"sinking into a quagmire\". Both cited Iran's resilience, its \"Axis of Resistance\" proxies and the Strait of Hormuz as denial deterrence, while downplaying China's role as a security guarantor.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/US-Iran%20war%20is%20Trump%20falling%20into%20a%20Vietnam%20%E2%80%98quagmire%E2%80%99.pdf"}, {"id": "scmp-20", "title": "Why South Korea's submarine exports are running aground", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Defence", "Trade"], "summary": "South Korea's failed bid for Canada's next-generation submarine fleet has exposed how Nato security ties and pressure to favour allied industrial bases increasingly outweigh commercial competitiveness. Hanwha Ocean lost the Canadian Patrol Submarine Project to Germany's ThyssenKrupp, months after losing Poland's US$4.8 billion Orka programme to Sweden's Saab Kockums. Analysts warned Korean shipyards face an order drought as the EU's 150 billion-euro SAFE instrument - which Canada joined - incentivises buying European. Korea's best market has been Indonesia, though a follow-on order fell through. Domestic KSS-III work runs out around 2029 with no successor announced. Experts urge \"quasi-alliance\" joint-production deals, and suggest pivoting to large unmanned underwater vehicles using Korea's AI strengths.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Why%20South%20Korea%E2%80%99s%20submarine%20exports%20are%20running%20aground.pdf"}, {"id": "scmp-21", "title": "Why the US-China space race could come down to a thin metal cap", "source": "SCMP", "date": "16 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The US-China space race may hinge on the propellant tank dome, an ellipsoidal bulkhead metres wide but millimetres thick that must withstand extreme pressure and is hard to mass-produce. China is signalling two ways to break the bottleneck. On Friday, its Long March 10B delivered satellites then made China's first reusable-rocket recovery, using a dome made via mirror-milling and friction-stir welding benchmarked against SpaceX's Falcon, trimming nearly 400kg per rocket. Separately, a Dalian University of Technology team unveiled a cryogenic \"cold forming\" technique that shapes a seamless dome at minus 196 Celsius in hours rather than a week, cutting production time over 90 per cent. A new Tianjin line can make over 1,000 domes yearly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/16%20Jul%202026/16%20Jul%20SCMP/Why%20the%20US-China%20space%20race%20could%20come%20down%20to%20a%20thin%20metal%20cap.pdf"}]}, "2026-07-17": {"date": "2026-07-17", "dayOfWeek": "Friday", "totalArticles": 71, "sourceCounts": {"WSJ": 20, "ST": 15, "BT": 13, "SCMP": 23}, "executiveDigest": "Trump escalated on two fronts - accusing China in a national address of the 'largest compromise of election data in history' and leaning toward expanding US military operations in Iran as both sides traded fresh blows and Tehran called Hormuz a 'red line'; yet Wall Street traders are having their best year ever, TSMC pledged another US$100 billion for US chip plants, and Singapore's STI drew a 6,000 target from Macquarie.", "briefingCards": [{"title": "Lead story - Trump escalates on China and Iran", "body": "In a national address, Trump accused China of the 'largest compromise of election data in history', and the White House weighed releasing the underlying intelligence - a major new flashpoint just as a Chinese vice-minister prepares a US visit to 'test the temperature'. At the same time, Trump leaned toward expanding US military operations in Iran as the two exchanged fresh blows and Tehran declared the Strait of Hormuz a 'red line', vowing to 'fight till the end'. The IMF warned the global economy now has a reduced cushion against oil disruption, and the IEA cautioned it would be 'in peril' if the Hormuz crisis persists; even VP Vance ramped up criticism of Israel."}, {"title": "Markets & finance", "body": "Wall Street traders are having their best year ever, and banks are on a 'Goldilocks run' - though WSJ cautioned it won't last as blockbuster stock sales threaten to overwhelm the bull market. BlackRock's assets hit a record US$15 trillion on buoyant markets and ETF inflows; JPMorgan, BlackRock and Goldman moved to tokenise stocks and Treasurys; and China's CXMT eyed an US$85.5 billion IPO. But SpaceX shares fell below their IPO price for the first time. In Singapore, Macquarie upgraded its 12-month STI target to 6,000 and named its top picks."}, {"title": "Asia realignment", "body": "US-China friction sharpened across fronts: Beijing denounced fresh US chip curbs as a threat to global supply chains, the US moved to toughen visa rules for Chinese journalists and students, and Rubio said counterterrorism efforts would refocus on left-wing groups. China's economy grew at its weakest pace since 2022, yet Apple's AI tools won Chinese regulatory approval. An ex-World Bank official warned investors to diversify away from US markets, while Singapore's NUS dean argued the Republic has 'no choice but to double down' on its trusted-hub status amid the rivalry."}, {"title": "Energy & climate", "body": "Energy risk stayed elevated: the IMF flagged a thinner global cushion against oil disruption and the IEA warned of peril if the Hormuz crisis drags on, even as China's pause in crude buying - which had cushioned prices - may be ending. BT warned that coal dominance and fiscal constraints will temper South-east Asia's clean-energy boom, and China vowed helium-trade policy changes as global tightening squeezes gas supplies. BYD aims to build 3,000 'flash-charging' stations across Europe within months."}, {"title": "Technology & AI", "body": "The AI arms race intensified: TSMC pledged another US$100 billion for US (Arizona) expansion as Q2 profit blew past forecasts, ASML raised guidance again on 'unrelenting' AI demand, and Nvidia's Jensen Huang sealed a Japan robotics push after a 'yakitori summit'. Xi attended China's World AI Conference amid the US rivalry, and Mira Murati's startup released its first model to loosen the AI giants' grip. But the mood darkened too: WSJ reported the AI backlash has some tech executives 'fearing for their lives', and a fight over humanoid robots shut a car factory for the first time."}, {"title": "Singapore & SEA focus", "body": "Singapore's markets drew fresh optimism - Macquarie lifted its STI target to 6,000, AirTrunk eyes a September-October launch for a US$1.9 billion Singapore REIT IPO, and a Frasers Property-led consortium won the Bayshore Drive site with a S$2.13 billion bid. The Bank of Singapore said China's advanced manufacturing will benefit from the AI up-cycle, while an NUS dean argued Singapore must double down on trusted-hub status amid US-China friction. Singapore and Brunei committed to deeper bilateral ties, and an 'AI frenzy' is filling Asian airlines' cargo bays with semiconductors."}], "keyMetrics": [{"value": "71", "label": "Articles curated today", "sub": "WSJ 20 · ST 15 · BT 13 · SCMP 23"}, {"value": "Two fronts", "label": "Trump escalates", "sub": "China election claim; Iran ops"}, {"value": "Best ever", "label": "Wall Street traders' year", "sub": "Banks on a 'Goldilocks run'"}, {"value": "US$100b", "label": "TSMC US expansion", "sub": "Arizona; Q2 beats forecasts"}, {"value": "US$15t", "label": "BlackRock assets", "sub": "Record on markets, ETF inflows"}, {"value": "6,000", "label": "Macquarie STI target", "sub": "12-month upgrade"}], "articles": [{"id": "wsj-01", "title": "Apple's AI Tools Get China Approval", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China's top cyberspace regulator approved Apple Intelligence, clearing a key hurdle for Apple to launch AI in the world's largest smartphone market. Apple submitted features in early 2025 after nearly a year co-developing with Alibaba and Baidu, whose Qwen model will power Apple Intelligence across iPhone, iPad, Mac and Vision Pro. The absence of AI had risked stalling upgrade cycles amid competition from Huawei, Xiaomi and Oppo. In Q2, iPhone shipments in China jumped 24% year-over-year, making Apple the No. 2 seller behind Huawei, per IDC, even as most Chinese brands' shipments fell after price rises. Beijing requires local data processing and rigorous testing of generative AI services.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Apple%E2%80%99s%20AI%20Tools%20Get%20China%20Approval.pdf"}, {"id": "wsj-02", "title": "Banks Are on a Goldilocks Run. Don't Assume It Will Last.", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "The biggest U.S. banks are enjoying exceptional results, all five topping earnings and revenue estimates with improved efficiency and subdued credit losses. JPMorgan and Goldman each posted 24% returns on equity; JPMorgan benefited from Visa investment gains. CEO Jamie Dimon said it is \"getting close to as good as it gets.\" Net interest margins stayed thin as customers seek higher yields, with JPMorgan's slipping to 2.40%. Valuations look reasonable on earnings but pricier versus book value. Risks are mainly geopolitical and macro: the unpredictable Iran war, a possible AI-spending hiccup, and rate swings. The author warns bull markets feel best right before ending abruptly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Banks%20Are%20on%20a%20Goldilocks%20Run.%20Don%E2%80%99t%20Assume%20It%20Will%20Last..pdf"}, {"id": "wsj-03", "title": "Blockbuster Stock Sales Are Threatening to Overwhelm the Bull Market", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "A rush of equity raising by giant companies is stoking fears the multiyear bull market could tire. SpaceX's record $75 billion IPO, Alphabet's $85 billion equity raise and SK Hynix's $26 billion-plus ADR sale headline $344.7 billion of new shares sold this year, exceeding recent full-year totals, per Dealogic. Elm Wealth projects U.S. firms will issue a net $500 billion of equities over the next year, versus a $1 trillion net reduction previously. AI hyperscalers, facing capex above $800 billion this year, are swapping buybacks for issuance. Analysts note supply surges preceded past slumps but say strong earnings and AI spending could sustain the rally.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Blockbuster%20Stock%20Sales%20Are%20Threatening%20to%20Overwhelm%20the%20Bull%20Market.pdf"}, {"id": "wsj-04", "title": "China's CXMT Eyes $85.5 Billion Market Cap Ahead of Blockbuster IPO", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Geopolitics"], "summary": "ChangXin Memory Technologies, the world's fourth-largest DRAM maker, will raise $8.55 billion on Shanghai's STAR Market, nearly double its target, implying an $85.53 billion valuation. The Hefei-based firm is selling shares to state pension funds, equipment suppliers like AMEC, and Alibaba, Tencent and Xiaomi to secure its supply chain. Backed by state funds, CXMT aims to challenge the Samsung-SK Hynix-Micron memory oligopoly and build a self-sufficient chip supply chain amid an AI-driven shortage. It guided first-half revenue of $16.2-17.7 billion, far above 2025's $9.1 billion, with net profit margin above 45%. U.S. trade curbs still squeeze its advanced high-bandwidth memory roadmap.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/China%E2%80%99s%20CXMT%20Eyes%20%2485.5%20Billion%20Market%20Cap%20Ahead%20of%20Blockbuster%20IPO.pdf"}, {"id": "wsj-05", "title": "China's Crude Buying Pause Has Helped Cushion the Market. That Might Be Changing.", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "China's prolonged retreat from crude buying, which freed barrels for other buyers during the Iran war, may be ending just as renewed U.S.-Iran tensions threaten Gulf supplies. Chinese imports plunged over 40% in June year-over-year as refiners drew down stockpiles built to nearly 1.4 billion barrels. Total oil stocks near 1.9 billion barrels cover roughly 117 days of demand, per Goldman Sachs. Analysts expect imports to rise as lower Saudi and Gulf prices lure refiners and Beijing rebuilds reserves. Gulf exports have fallen below 50% of normal after fresh Strait of Hormuz attacks. Goldman sees Brent averaging $80 in Q4 but possibly topping $110 this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/China%E2%80%99s%20Crude%20Buying%20Pause%20Has%20Helped%20Cushion%20the%20Market.%20That%20Might%20Be%20Changing..pdf"}, {"id": "wsj-06", "title": "China's Economy Grows at Weakest Pace Since 2022", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Geopolitics", "Trade"], "summary": "China's GDP expanded 4.3% in the second quarter year-over-year, down from 5.0% in Q1 and the slowest since late 2022, as surging AI-fueled exports failed to offset weak domestic demand. June exports rose 27%, with semiconductor shipments up over 120%, but a property crash, youth unemployment and deflation weigh on consumption. Property investment fell 18% in the first half; fixed-asset investment dropped 5.7%. Retail sales edged up 1.0% in June and youth joblessness eased to 15.6%. Morgan Stanley and ANZ cut 2026 forecasts to 4.6%. Beijing's growth target is 4.5-5.0%. Analysts say China is tolerating slower growth while tackling local-government debt; the Iran war's oil shock had limited impact.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/China%E2%80%99s%20Economy%20Grows%20at%20Weakest%20Pace%20Since%202022.pdf"}, {"id": "wsj-07", "title": "Chip-Machine Supplier ASML Raises Guidance Again on Unrelenting AI Demand", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "ASML lifted its annual sales guidance for the second time and plans to boost output of chipmaking machines as AI infrastructure demand surges. The Dutch firm, whose EUV lithography systems serve TSMC, Samsung and Intel, now projects sales of 43-45 billion euros ($49.11-51.39 billion), up from 36-40 billion, with gross margin of 54-56%. CEO Christophe Fouquet said memory revenue should rise 75% this year and is weighing a roughly 30% EUV output boost for 2027 and 2028. Q2 sales reached 9.33 billion euros and net profit 2.92 billion, both beating forecasts. Shares initially jumped over 7% but closed lower amid a U.S. chip selloff; ASML remains Europe's most valuable listed company.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Chip-Machine%20Supplier%20ASML%20Raises%20Guidance%20Again%20on%20Unrelenting%20AI%20Demand.pdf"}, {"id": "wsj-08", "title": "IMF Sees Reduced Cushion Against Oil Disruption for Global Economy", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Energy", "Finance & Markets", "Geopolitics"], "summary": "The IMF warned the global economy now has less capacity to absorb an energy-supply shock through the Strait of Hormuz as U.S.-Iran hostilities resume. Earlier buffers, extra supply from other producers, reserve drawdowns and rapid switching to alternatives, cushioned the initial blow but are shrinking as spare capacity is deployed and inventories fall. The Fund last week cut its 2026 global growth forecast to 3% and warned of weaker outcomes if the conflict escalates. It calculated the strait's closure removed over 1.1 billion barrels between March and May, larger than the 1973, 1980s and Gulf War shocks, yet prices rose less than expected. It urged replenishing reserves and shifting to renewables.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/IMF%20Sees%20Reduced%20Cushion%20Against%20Oil%20Disruption%20for%20Global%20Economy.pdf"}, {"id": "wsj-09", "title": "JPMorgan, BlackRock and Goldman to Tokenize Stocks, Treasurys", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Depository Trust & Clearing Corp. plans to convert a batch of shares and Treasurys into digital tokens, its latest step toward a fully digital Wall Street. Nearly 40 firms, including JPMorgan, Goldman Sachs, BlackRock, Vanguard and the NYSE, joined a trial to tokenize securities held at DTCC, stored on blockchain and available for trade. Assets include shares of Microsoft, Circle and several ETFs plus Treasurys. DTCC will formally launch tokenization in October. Its approach makes tokens interchangeable with real shares, carrying the same legal, dividend and governance rights, unlike wrapper structures. Trades settle on HyperLedger Besu or Canton Network. DTCC safeguards over $114 trillion in securities.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/JPMorgan,%20BlackRock%20and%20Goldman%20to%20Tokenize%20Stocks,%20Treasurys.pdf"}, {"id": "wsj-10", "title": "Many Democrats Break With Israel, Back Measure Stripping Military Aid", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics", "Defence"], "summary": "More than 100 House Democrats voted for a measure to eliminate about $3 billion in military financing to Israel, signaling how party support has cratered nearly three years into the Gaza war. The amendment by Rep. Thomas Massie failed 104-314, with all Republicans and many Democrats, including Minority Leader Hakeem Jeffries, opposed; 10 Democrats voted present. Jeffries called it a partisan GOP ploy, but Katherine Clark and Nancy Pelosi backed it. Support for Israel has become a Democratic primary litmus test as polls show more Americans favoring Palestinians. Republican factions, including VP JD Vance, have also grown critical amid a Trump-Netanyahu rift over the Iran war.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Many%20Democrats%20Break%20With%20Israel,%20Back%20Measure%20Stripping%20Military%20Aid.pdf"}, {"id": "wsj-11", "title": "Mira Murati's AI Startup Releases First Model in Bid to Loosen AI Giants' Grip", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI"], "summary": "Thinking Machines Lab, led by former OpenAI tech chief Mira Murati, released its first AI model, Inkling, with \"open weights\" so others can modify it. The model has 975 billion total parameters but only 41 billion active, balancing cost against performance, and is far smaller than top closed models from OpenAI and Anthropic. The release counters frontier labs' \"walled garden\" approach and offers a U.S. alternative to Chinese open-weight models like Alibaba's Qwen. Inkling can be customized via Tinker, the firm's cloud fine-tuning tool. It was pretrained on 45 million tokens using Nvidia hardware, backed by a multiyear Nvidia partnership. The company said safety testing performed well.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Mira%20Murati%E2%80%99s%20AI%20Startup%20Releases%20First%20Model%20in%20Bid%20to%20Loosen%20AI%20Giants%E2%80%99%20Grip.pdf"}, {"id": "wsj-12", "title": "SpaceX Shares Fall Below IPO Price for the First Time", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "SpaceX shares traded below their $135 IPO price for the first time Wednesday, a sign of waning enthusiasm for the largest listing ever. Shares slipped over 2.5% to $132.15 before rebounding to close at $135.27, down less than 1%, as the Nasdaq fell 0.2%. Elon Musk's rocket maker rose 19% on its June 12 debut, giving it a $2.1 trillion value, but has since edged lower despite joining the Nasdaq-100. Analysts remain mostly bullish: Morgan Stanley set a $300 target and JPMorgan $225, while Morningstar sees just $63. The full green-shoe option is already exercised, limiting bankers' support. Investors await the next Starship test flight.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/SpaceX%20Shares%20Fall%20Below%20IPO%20Price%20for%20the%20First%20Time.pdf"}, {"id": "wsj-13", "title": "Stubborn Inflation, Better Growth: Economists Weigh In", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "A WSJ survey of economists sees the U.S. economy facing stubbornly elevated inflation alongside strengthened growth and employment. It was completed before the Labor Department reported June CPI rose 3.5% over 12 months, down from 4.2% in May, and before the U.S.-Iran ceasefire broke down. The panel expects core PCE to rise 3.2% year-over-year in Q4, up from 2.9% in April, and inflation-adjusted GDP to grow 2.1%. Recession odds for the coming year fell to 25%, the lowest since early 2025. Kevin Warsh, Trump's Fed chair since May, has proposed reducing forward guidance. Economists cite AI investment, fiscal stimulus and prior rate cuts as fragile supports.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Stubborn%20Inflation,%20Better%20Growth%20Economists%20Weigh%20In.pdf"}, {"id": "wsj-14", "title": "The AI Backlash Has Tech Executives Fearing for Their Lives", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Mounting opposition to AI has spurred violent rhetoric and threats against tech executives, prompting heightened security. Incidents include an attempted firebombing of OpenAI CEO Sam Altman's home, a man sneaking into Anthropic's lobby warning of a killing, and threats against employees. Digital threats targeting AI chiefs and data centers grew sevenfold between late February and May, per Liferaft. In 2025, 38.1% of S&P 500 tech firms disclosed executive-protection spending, up from 26.8% in 2021, with Palantir, Oracle and Salesforce reporting jumps. Some leaders travel with armed guards or stay quiet on AI. Polls show 55% of Americans believe AI does more harm than good amid job-loss fears.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/The%20AI%20Backlash%20Has%20Tech%20Executives%20Fearing%20for%20Their%20Lives.pdf"}, {"id": "wsj-15", "title": "The Fight Over Humanoid Robots Has Shut Down a Car Factory for the First Time", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "Hyundai's South Korean auto workers staged a partial strike, the car industry's first factory stoppage over humanoid robots, after the January unveiling of its \"Atlas\" robot alarmed the roughly 40,000-member union. Banners in Ulsan demand pre-emptive safeguards amid a monthslong impasse over wages, AI and automation. Adoption is accelerating globally at Tesla, BMW, Mitsubishi and GM. South Korea has the world's highest per-capita industrial-robot rate. An Atlas unit costs about $130,000, paying for itself in roughly two years. Hyundai plans deployment by 2028 at its nonunion Georgia plant. The union seeks fixed salaries, a retirement age of 65 and job guarantees; the four-hour daily stoppage may cut output by 5,000 vehicles.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/The%20Fight%20Over%20Humanoid%20Robots%20Has%20Shut%20Down%20a%20Car%20Factory%20for%20the%20First%20Time.pdf"}, {"id": "wsj-16", "title": "The U.S. and Iran Reckon With Shrinking Options to End the War", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "With the U.S. and Iran fighting again over the Strait of Hormuz, each side is racing against time. Trump wants a resolution before the November midterms and an oil-price surge, while Tehran hopes to outlast him before a reimposed naval blockade cripples its economy. Both have chosen a low-level conflict of endurance, analysts said. Iran uses small boats and antiship missiles to choke tankers; the U.S. cleared lanes off Oman, helping over 800 ships transit. Brent crude rose 1.7% to $84.73, up over 11% in two days but below wartime highs above $100. The U.S. resumed strikes and blockade Tuesday. Analysts say the clock modestly favors Tehran if it keeps escalation contained.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/The%20U.S.%20and%20Iran%20Reckon%20With%20Shrinking%20Options%20to%20End%20the%20War.pdf"}, {"id": "wsj-17", "title": "Trump Dollar 'Gold Coin' to Go Into Production, Bessent Says", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Politics", "Society"], "summary": "The U.S. Mint will strike a one-dollar coin featuring President Trump's face, a rare and controversial move to put a sitting president on U.S. money. Treasury Secretary Scott Bessent unveiled designs showing Trump's full-face image with \"In God We Trust\" and a 1776-2026 inscription; the coin has a gold-like finish but no precious metals. Produced in Philadelphia, it will be available this fall to mark 250 years of independence. The Commission of Fine Arts approved the idea in March, but the bipartisan Citizens Coinage Advisory Committee has refused to consider Trump designs. A longtime panel member called the coin illegal and urged Congress to act; administration officials say it is legal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Trump%20Dollar%20%E2%80%98Gold%20Coin%E2%80%99%20to%20Go%20Into%20Production,%20Bessent%20Says.pdf"}, {"id": "wsj-18", "title": "Trump Leans Toward Expanding U.S. Military Operations in Iran", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Politics"], "summary": "President Trump is leaning toward expanding U.S. military operations in Iran after days of briefings, officials said. Options include stepping up airstrikes, sending ground forces to seize Kharg Island and other Strait of Hormuz territory, and bombing a fortified nuclear-linked tunnel complex at Pickaxe Mountain. A Tuesday Situation Room meeting weighed the plans with VP Vance, Defense Secretary Hegseth and others. The military launched two waves of strikes Wednesday, the fifth straight day, and enforced a blockade, firing on a Curacao-flagged ship bound for Kharg Island. Trump says he prefers diplomacy but Iran hasn't capitulated. A Pickaxe or Kharg operation would be his riskiest bet, exposing troops and lifting gas prices.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Trump%20Leans%20Toward%20Expanding%20U.S.%20Military%20Operations%20in%20Iran.pdf"}, {"id": "wsj-19", "title": "Vance Ramps Up Criticism of Israel", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Vice President JD Vance accused elements of the Israeli government of running a campaign to shape U.S. opinion and prolong the Iran war indefinitely. Speaking on Joe Rogan's podcast, Vance, who helped negotiate last month's ceasefire, described a foreign influence effort to derail diplomacy. He cited a Time article suggesting Israel used lobbying money, including a $45 million contract with former Trump campaign manager Brad Parscale, to pay influencers who attacked him. Parscale denied acting against the administration. The remarks deepen a public rift between Washington and its ally, echoing Trump's frustration with Netanyahu. Vance said Israel is losing the U.S. public-opinion battle amid a generational GOP divide.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Vance%20Ramps%20Up%20Criticism%20of%20Israel.pdf"}, {"id": "wsj-20", "title": "Wall Street Traders Are Having Their Best Year Ever", "source": "WSJ", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "The five biggest Wall Street banks are on pace for their best trading years ever after a second-quarter boom, unusual because past record hauls signaled market turmoil. Together JPMorgan, Goldman, Morgan Stanley, Bank of America and Citigroup could log about $180 billion in 2026 trading revenue. Q2 markets revenue rose about 38% year-over-year, with equities up 71%; JPMorgan's equities jumped 86%. Citadel Securities booked a record $4.3 billion in Q1 as retail volumes doubled from 2024, and BlackRock hit a record $15 trillion in assets. Goldman, Morgan Stanley and Bank of America shares hit all-time highs; JPMorgan nears $1 trillion in market value. The AI frenzy and heavy hedge-fund activity fuel the surge.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20WSJ/Wall%20Street%20Traders%20Are%20Having%20Their%20Best%20Year%20Ever.pdf"}, {"id": "st-01", "title": "AI frenzy fills Asian airlines' cargo bays with semiconductors", "source": "ST", "date": "17 Jul 2026", "tags": ["Technology & AI", "Trade", "Finance & Markets"], "summary": "Surging demand for AI servers and chips is delivering a cargo windfall for Asian carriers, cushioning the surge in jet fuel costs. Korean Air, China Airlines and EVA Air posted their highest cargo revenues in over three years, crediting semiconductor shipments; Korean Air's cargo revenue soared nearly 50 per cent. Bank of America's Nathan Gee said \"cargo has been the key bright spot\" and is bullish into 2027. Rates on Hong Kong, Seoul and Taiwan-to-US lanes hit 2022 highs. EVA Air said AI goods make up 40-50 per cent of Taiwan-US freight. Carriers including China Southern, Cathay Pacific and Air China Cargo are ordering more freighters, as AI cargo crowds out other goods.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/AI%20frenzy%20fills%20Asian%20airlines'%20cargo%20bays%20with%20semiconductors.pdf"}, {"id": "st-02", "title": "AI in management: The future of work", "source": "ST", "date": "17 Jul 2026", "tags": ["Technology & AI", "Society", "Finance & Markets"], "summary": "Salesforce's South and South-east Asia head Arundhati Bhattacharya argues AI optimism runs higher in India than in advanced economies like Singapore, where an ageing workforce makes AI proficiency urgent. She says humans working with AI, not being displaced, is the real future: \"the last generation of managers who manage only humans.\" Its Agentforce suite of autonomous agents handles sales, service and operations work. Amid a 2026 tech sell-off that wiped some US$2 trillion off software stocks, Salesforce's shares fell over 40 per cent, though revenue rose 10 per cent to US$41.5 billion. Agentforce annual recurring revenue hit US$1.2 billion, up 205 per cent. She favours open systems over locking customers in.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/AI%20in%20management%20The%20future%20of%20work.pdf"}, {"id": "st-03", "title": "AirTrunk eyes September or October launch for $1.9 billion Singapore REIT IPO: Sources", "source": "ST", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Southeast Asia"], "summary": "Blackstone-backed data centre operator AirTrunk is targeting a September or October launch for a Singapore REIT initial public offering that could raise about US$1.5 billion (S$1.9 billion), two people with direct knowledge said. The firm has filed confidentially and begun meeting cornerstone investors. The listing comes as global investors pour money into data centres amid rising demand from cloud computing and AI. Timing and size could change with market conditions. AirTrunk, which runs data centres across the Asia-Pacific, declined to comment. Blackstone and the Canada Pension Plan Investment Board agreed in 2024 to buy the company in a deal valuing it at more than A$24 billion (S$21.6 billion).", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/AirTrunk%20eyes%20September%20or%20October%20launch%20for%201.9%20billion%20Singapore%20REIT%20IPO%20Sources.pdf"}, {"id": "st-04", "title": "China tops US in global favourability: Pew survey", "source": "ST", "date": "17 Jul 2026", "tags": ["Geopolitics", "Society"], "summary": "More people worldwide now view China more favourably than the United States for the first time since at least 2023, a Pew Research Center survey of over 42,000 people across 36 countries found. In 20 countries with comparable data, nearly half viewed China positively versus 36 per cent for the US, a reversal from 2023's 58-to-32 US lead. Sentiment shifted even among allies like Canada, Australia, France and Germany. Only India, Japan, the Philippines, South Korea, Israel and Poland favoured the US. Xi Jinping's favourability overtook Trump's. Analysts tie the shift to Trump's tariffs, annexation threats and the US-led Iran war, during which Beijing cast itself as a stabilising force.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/China%20tops%20US%20in%20global%20favourability%20Pew%20survey.pdf"}, {"id": "st-05", "title": "Frasers Property-led consortium outbids two others with $2.13b offer for Bayshore Drive mixed-use site", "source": "ST", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A consortium led by Frasers Property, with Frasers Centrepoint Trust, Sunway MCL, Sekisui House and a Lum Chang unit, won the Bayshore Drive mixed-use site with a top bid of nearly $2.13 billion, or about $1,323 per sq ft per plot ratio. It beat a City Developments-led group ($2.01 billion) and a CapitaLand-UOL tie-up ($1.99 billion). The 618,500 sq ft, 99-year leasehold site will yield up to 1,280 private homes integrated with the upcoming Bedok South MRT station, a new bus interchange and retail. It is the second government land sale in the Bayshore precinct, planned for about 10,000 homes. Analysts cited MRT connectivity and East Coast Park proximity as key draws.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Frasers%20Property-led%20consortium%20outbids%20two%20others%20with%202.13b%20offer%20for%20Bayshore%20Drive%20mixed-use%20site.pdf"}, {"id": "st-06", "title": "India's first private orbital rocket launch", "source": "ST", "date": "17 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "India is set to launch its first privately built orbital rocket on July 18 from the Satish Dhawan Space Centre in Sriharikota. Built by Hyderabad start-up Skyroot Aerospace, the seven-storey Vikram-I is a multi-stage vehicle designed to carry small satellites into low Earth orbit. CEO Pawan Kumar Chandana called it a test flight to gather in-flight data. Named after space pioneer Vikram Sarabhai, it marks India opening its state-led sector to private developers. The rocket uses carbon-fibre structures and a 3D-printed engine, and carries payloads from domestic and international customers. India hosts 400 space start-ups; Skyroot, valued at US$1.1 billion, is backed by GIC and Temasek. India's space economy is valued at US$8.4 billion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/India's%20first%20private%20orbital%20rocket%20launch.pdf"}, {"id": "st-07", "title": "International Energy Agency boss warns global economy in peril if Hormuz crisis persists", "source": "ST", "date": "17 Jul 2026", "tags": ["Energy", "Geopolitics", "Finance & Markets"], "summary": "The global economy faces renewed danger if the conflict choking the Strait of Hormuz is not resolved within weeks, IEA chief Fatih Birol warned at the Aspen Security Forum. He said markets are nervous amid escalating attacks disrupting oil, gas and fertiliser shipments, adding the strait must reopen \"fully open, unconditionally open.\" Traffic has thinned as vessels were attacked and the US reimposed its blockade of Iranian shipping. Saudi Gulf oil loadings slumped after strikes on supertankers. Birol said Bangladesh, Pakistan and India are more vulnerable than South Korea and Japan. Pakistan bought its priciest LNG cargo in four years at about US$20.70 per mmBtu after a Qatari delivery was cancelled. Asian LNG prices surged in July.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/International%20Energy%20Agency%20boss%20warns%20global%20economy%20in%20peril%20if%20Hormuz%20crisis%20persists.pdf"}, {"id": "st-08", "title": "Iran risks overplaying its hand on Hormuz", "source": "ST", "date": "17 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "This Bloomberg Opinion column by Javier Blas argues Iran holds short-term leverage over the Strait of Hormuz but risks squandering it. By striking tankers, Tehran has convinced Gulf states and importers like China and Japan to invest billions in bypass pipelines. Before the war, Hormuz carried about 20 per cent of world oil; Saudi Arabia and the UAE have already re-routed some five million barrels daily. Abu Dhabi's new 1.5-million-barrel pipeline enters service by end-2027, with Saudi Arabia, Kuwait and Iraq weighing further overland routes via the Red Sea and Mediterranean. Pipelines can be built fast; politics is the main obstacle. Blas concludes that by 2030 Hormuz will no longer be the dominant oil chokepoint.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Iran%20risks%20overplaying%20its%20hand%20on%20Hormuz.pdf"}, {"id": "st-09", "title": "Iran warns Strait of Hormuz is a 'red line'", "source": "ST", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Iran declared the Strait of Hormuz an inviolable \"red line,\" warning it will strike all Gulf infrastructure if Trump attacks Iranian facilities. The US launched a fifth night of strikes on July 15 and reimposed a naval blockade to reopen the strait, which Iran closed on July 11 after a truce collapsed. Top negotiator Mohammad Bagher Ghalibaf said Iran is in an \"existential war with America.\" Army spokesman Mohammad Akraminia said Iran can control the strait from every point of its territory. Iran said it targeted US bases in Kuwait and Jordan; Bahrain intercepted aerial attacks. Analysts fear Iran may use Houthi allies to shut the Bab el-Mandeb, threatening a second energy artery. Thousands have died.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Iran%20warns%20Strait%20of%20Hormuz%20is%20a%20'red%20line'.pdf"}, {"id": "st-10", "title": "Israel tells Pentagon chief it will keep troops in Lebanon, Syria, Gaza 'security zones'", "source": "ST", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "Israeli Defence Minister Israel Katz told US counterpart Pete Hegseth that Israel is determined to keep forces in \"security zones\" it has carved out inside Lebanon, Syria and Gaza to protect its borders from jihadist threats. \"We have never asked the United States to act in our place along our borders,\" Katz said. The remarks follow reports that Trump asked Netanyahu to withdraw from Syria and Lebanon, telling him the deployment fuels tensions. After Assad's December 2024 overthrow, Israel entered a UN buffer zone on the Golan Heights and made repeated Syrian incursions. Israel and Lebanon concluded a fifth round of US-brokered talks in Rome on July 15. In Gaza, Israel's military controls 60 per cent of the territory.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Israel%20tells%20Pentagon%20chief%20it%20will%20keep%20troops%20in%20Lebanon,%20Syria,%20Gaza%20'security%20zones'.pdf"}, {"id": "st-11", "title": "Russia planning attacks on infrastructure in Baltic countries, Poland, say leaders", "source": "ST", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Russia is planning attacks on critical energy and transport infrastructure in the Baltic states or Poland, the presidents of Lithuania and Latvia warned on July 15, citing intelligence. Lithuania's Gitanas Nauseda said the planning is happening \"at the highest level, effectively in Moscow.\" Latvia's Edgars Rinkevics warned the region must prepare for provocations as Russia seeks to \"test\" NATO's mutual defence pact and could indirectly probe Article 5. The Baltic states and Poland are all EU and NATO members. The warnings echo Polish PM Donald Tusk's alarm over expected escalation. Officials have linked Russia to arson, cyberattacks and railway diversions. Kremlin spokesman Dmitry Peskov dismissed the claims as \"scare stories\" meant to justify militarisation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Russia%20planning%20attacks%20on%20infrastructure%20in%20Baltic%20countries,%20Poland,%20say%20leaders.pdf"}, {"id": "st-12", "title": "Singapore, Brunei commit to strengthening bilateral ties", "source": "ST", "date": "17 Jul 2026", "tags": ["Southeast Asia", "Politics"], "summary": "Senior Minister Lee Hsien Loong and Brunei's Sultan Hassanal Bolkiah reaffirmed their commitment to strengthening bilateral ties during SM Lee's July 14-17 visit for the Sultan's 80th birthday. Lee conveyed birthday greetings and appreciation for the Sultan's support of the \"enduring special relationship,\" the Foreign Affairs Ministry said. The reaffirmation comes as both mark the 50th anniversary of defence ties in 2026 and the 60th anniversary of the Currency Interchangeability Agreement in 2027. Lee met Crown Prince Al-Muhtadee Billah and other ministers, discussing people-to-people ties, energy and food security, and supply chain resilience. He attended royal celebrations, engaged Singapore Armed Forces personnel training in Brunei, and visited Barramundi Group's aquaculture farm.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Singapore,%20Brunei%20commit%20to%20strengthening%20bilateral%20ties.pdf"}, {"id": "st-13", "title": "US House defeats bid to cut aid to Israel", "source": "ST", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "The US House defeated an amendment to cut off aid to Israel on July 15, voting 314 to 104, though nearly half of Democrats backed it, reflecting a growing progressive rupture with Israel over Gaza. Republican Thomas Massie's measure, backed by 103 Democrats and one Republican, would have blocked US$3.3 billion in annual security assistance. Massie cited Gaza's civilian toll: \"There have been 70,000 casualties in Gaza.\" The Gaza Health Ministry says Israel's offensive killed over 73,000 Palestinians since the October 2023 Hamas attack that killed 1,200 Israelis. The vote was largely symbolic given a likely Trump veto. Democratic leaders split, with Katherine Clark backing it. Israel's standing faces further tests in Michigan's August primaries.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/US%20House%20defeats%20bid%20to%20cut%20aid%20to%20Israel.pdf"}, {"id": "st-14", "title": "White House weighs releasing China election intel", "source": "ST", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "The White House is weighing releasing sensitive intelligence on China's ability to interfere in US elections, which some Trump officials fear could mislead, four sources said. Trump may disclose the material, collected during his first term, in a July 16 speech outlining alleged voting-infrastructure vulnerabilities. The sources stressed the intelligence does not show Beijing manipulated votes; a 2021 assessment found no foreign actor altered any technical aspect of the 2020 vote. The effort centres on a dissent by former analyst Christopher Porter arguing China had the ability and intent to interfere. Officials worry declassification could expose sources and imply Beijing succeeded. A task force led by journalist John Solomon is reviewing documents ahead of the speech.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/White%20House%20weighs%20releasing%20China%20election%20intel.pdf"}, {"id": "st-15", "title": "Who is afraid of Germany?", "source": "ST", "date": "17 Jul 2026", "tags": ["Defence", "Geopolitics", "Politics"], "summary": "In this analysis, Jonathan Eyal examines French unease over Germany's fast-rising military power as Macron meets Chancellor Merz on July 17. Germany's 2026 defence budget tops 108 billion euros, matching France and Britain combined, with the Bundeswehr set to grow to 260,000 soldiers by 2035 and Volkswagen lines retooled for weapons. Merz aims to build \"the strongest conventional army in Europe.\" France fears Germany could displace it as the world's second-largest arms exporter; the joint SCAF fighter project collapsed amid diverging strategic visions, with Germany buying US F-35s and pivoting to a Nordic hub with Sweden's Saab. Eyal argues fears of German militarism are overstated, but France's dream of leading Europe is over.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20ST/Who%20is%20afraid%20of%20Germany.pdf"}, {"id": "bt-01", "title": "As Fed chair Warsh sticks to policy silence, colleagues voice their views", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Fed chairman Kevin Warsh reiterated determination to bring inflation down but gave no hints on action, telling Congress inflation \"is not going to be permanent under my watch\" while pushing a more circumspect communications style. His colleagues were more forthcoming: governor Lisa Cook said she was \"prepared to act\" if disinflation stalls, hinting at a hike; New York Fed's John Williams called policy \"well-positioned\"; Waller wanted several months of easing. June data showed CPI cooling to 3.5 per cent from 4.2 per cent. Warsh flagged AI-driven price pressures and urged markets to \"play the ball, not the Fed,\" declining to submit his own dot. Half of 18 colleagues expect a hike by year-end.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/As%20Fed%20chair%20Warsh%20sticks%20to%20policy%20silence,%20colleagues%20voice%20their%20views.pdf"}, {"id": "bt-02", "title": "Bank of Korea hikes rates for first time in 3.5 years to curb inflation and won slump", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "The Bank of Korea raised its seven-day repurchase rate by 25 basis points to 2.75 per cent, its first hike in 3.5 years, to stabilise a slumping won and counter persistent inflation. Governor Shin Hyun-song flagged more tightening, saying growth, inflation and financial stability all supported the move, with semiconductor-boom demand spilling into domestic demand. The bank expects 2026 growth to \"considerably exceed\" its 2.6 per cent May forecast; the government raised its forecast to a five-year high of 3 per cent. GDP grew 1.8 per cent in Q1, the fastest in nearly six years. The Kospi fell 6.2 per cent on chipmaker selling. Analysts expect at least one more hike, taking the rate to 3 per cent by year-end.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Bank%20of%20Korea%20hikes%20rates%20for%20first%20time%20in%203.5%20years%20to%20curb%20inflation%20and%20won%20slump.pdf"}, {"id": "bt-03", "title": "BlackRock assets hit record US$15 trillion on boost from buoyant markets, ETF inflows", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "BlackRock's Q2 profit beat Wall Street estimates as a stock rally lifted client assets and investors poured into its ETFs, sending shares up more than 7 per cent. Assets under management hit a record US$15.34 trillion, up from US$13.89 trillion in Q1. The firm pulled in US$192 billion of net client cash, led by its iShares franchise. Adjusted EPS was US$13.91, topping the US$12.59 estimate, with operating margin at a near five-year high of 45.9 per cent. It raised planned 2026 buybacks to US$2 billion. Private markets net inflows were US$15.4 billion; CEO Larry Fink said private credit had \"stabilised\" after earlier idiosyncratic risk. Shares still trail the S&P 500's 2026 gain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/BlackRock%20assets%20hit%20record%20US15%20trillion%20on%20boost%20from%20buoyant%20markets,%20ETF%20inflows.pdf"}, {"id": "bt-04", "title": "China's advanced manufacturing sector set to benefit from AI up-cycle: Bank of Singapore", "source": "BT", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's advanced manufacturing will be a key beneficiary of the AI up-cycle, said Bank of Singapore, identifying electric vehicles, solar equipment, industrial machinery and robotics as potential winners. It expects AI-related capex by leading Chinese tech and platform firms to grow more than 20 per cent compounded over coming years, boosting demand for electrical integrated circuits. Electrical machinery and equipment made up half of China's 14.5 per cent Q1 export growth. CIO Jean Chia said \"China is one of the biggest beneficiaries of AI capex,\" but the up-cycle will be unevenly reflected in equities, with onshore A-shares favoured over offshore stocks. BOS urged a \"barbell strategy\" combining quality yield plays with AI proxies like power equipment and energy storage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/China's%20advanced%20manufacturing%20sector%20set%20to%20benefit%20from%20AI%20up-cycle%20Bank%20of%20Singapore.pdf"}, {"id": "bt-05", "title": "Coal dominance, fiscal constraints to temper South-east Asia's clean energy boom", "source": "BT", "date": "17 Jul 2026", "tags": ["Energy", "Southeast Asia", "Environment"], "summary": "South-east Asia hit a record US$17 billion in renewable investment last year, forecast to reach US$22 billion in 2026, but coal reliance and fiscal constraints remain obstacles to a clean-energy transition. Governments fighting inflation, protecting currencies and boosting defence spending are unlikely to raise renewable allocations, while fossil fuel subsidies are set to \"rise sharply\" since the Iran crisis. Coal supplied 47 per cent of power in 2024, up from 37 per cent in 2015, with the Philippines, Vietnam and Thailand turning to it amid the US-Iran war. JETP schemes have been slow, and the US withdrew from JETP in 2025. Observers see interest in \"coal flexibility\" schemes, grid investment and offshore wind, but say bankable projects and clear rules are lacking.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Coal%20dominance,%20fiscal%20constraints%20to%20temper%20South-east%20Asia's%20clean%20energy%20boom.pdf"}, {"id": "bt-06", "title": "Gold, AI and more: Five key questions on investors' minds for H2 2026 answered", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "The Business Times examined five themes for H2 2026. On AI capex, US hyperscalers may spend US$700 billion by end-2026, supporting valuations if monetised, though dispersion makes diversification vital. On gold, the spot price fell below US$4,000 an ounce, but analysts stay bullish, with Amundi targeting US$5,000 on central-bank buying and limited supply. Asia equities look attractive on \"reasonable\" valuations, with South Korea cheapest and Singapore a defensive pick; blue-chips like ST Engineering and Sembcorp rate \"buy.\" Central banks may turn hawkish, favouring shorter-duration and Asian bonds. On private markets, views are mixed amid software defaults, weakening middle-market fundamentals, and underweight private equity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Gold,%20AI%20and%20more%20Five%20key%20questions%20on%20investors'%20minds%20for%20H2%202026%20answered.pdf"}, {"id": "bt-07", "title": "Macquarie upgrades STI 12-month target to 6,000, names its top picks", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "Macquarie raised its 12-month Straits Times Index target to 6,000, citing a \"healthy cocktail\" of macro tailwinds, rising domestic rates and government market initiatives. The target implies a 14 per cent total return from 5,470, including the 4.1 per cent dividend yield. Singapore's economy grew 5.7 per cent year on year in Q2, well ahead of the 2-4 per cent full-year forecast, with manufacturing surging 12.2 per cent on AI-linked semiconductor demand. Financials, 59 per cent of the STI, should benefit as domestic rates bottomed in Q2 and rise around 70 basis points. Top large-cap picks include UOB (preferred bank), OCBC, Jardine Matheson, Singtel, Hongkong Land and Seatrium; small/mid-caps include iFast, Frencken and UMS.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Macquarie%20upgrades%20STI%2012-month%20target%20to%206,000,%20names%20its%20top%20picks.pdf"}, {"id": "bt-08", "title": "Property developers need targeted approach to tap family office capital: PwC", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Property developers courting Singapore's roughly 2,000 single family offices need a targeted approach as the capital pool grows more diverse, said PwC Singapore chairman Marcus Lam. European family offices are more established, while regional ones are younger; all value privacy, personal attention and long-term relationships over structured institutional deployment. Lam attributed strong inflows to Singapore's legal certainty, regulatory transparency, deep capital markets and policy consistency, a \"superpower,\" though the Republic is \"too small\" to keep all global capital, which also flows to Tokyo, South Korea and Hong Kong. He warned real estate lags on AI adoption and must prepare for a fast \"hit,\" and called sustainability \"a capital strategy,\" while flagging slow Johor SEZ execution.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Property%20developers%20need%20targeted%20approach%20to%20tap%20family%20office%20capital%20PwC.pdf"}, {"id": "bt-09", "title": "Quiet market, low offers: MLT defends slow pace of S$1 billion divestment plan", "source": "BT", "date": "17 Jul 2026", "tags": ["Finance & Markets"], "summary": "The manager of Mapletree Logistics Trust defended the slow pace of its S$1 billion divestment plan ahead of its Jul 20 AGM, citing a quiet property market and low-ball offers. Only S$300 million has been cleared, with the remaining pipeline concentrated in Hong Kong and mainland China, where valuations have softened. The manager cited \"subdued investment activity and wide bid-ask spreads\" and refused to panic-sell income-generating assets at discounts. Greater China is 41 per cent of AUM but only 32 per cent of net property income. Mainland borrowing costs have fallen to about 2.5 per cent, letting MLT pivot to cheaper RMB debt. It is developing an RMB-denominated \"China-for-China\" fund to shift Chinese logistics assets to domestic investors.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Quiet%20market,%20low%20offers%20MLT%20defends%20slow%20pace%20of%20S1%20billion%20divestment%20plan.pdf"}, {"id": "bt-10", "title": "Singapore has no choice but to double down on trusted-hub status amid US-China friction: NUS dean", "source": "BT", "date": "17 Jul 2026", "tags": ["Geopolitics", "Southeast Asia", "Technology & AI"], "summary": "Singapore has \"no choice\" but to double down on its identity as a trusted, neutral global hub as US-China friction fragments commerce, said NUS Lee Kuan Yew School dean Joseph Liow at VP Bank's H2 CIO Outlook. He cited the collapse of Meta's US$2 billion Manus acquisition after Beijing ordered it unwound as symptomatic of South-east Asia being caught between the powers. The shift toward weaponised trade tools like entities lists and export controls leaves small states precarious. Liow said the AI race has only two main players, US and China, with America's advantage being allies willing to supply semiconductors while China must develop capabilities indigenously. Semiconductor independence will be the ultimate battleground; VP Bank's Felix Brill warned against concentrated bets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Singapore%20has%20no%20choice%20but%20to%20double%20down%20on%20trusted-hub%20status%20amid%20US-China%20friction%20NUS%20dean.pdf"}, {"id": "bt-11", "title": "TSMC to invest another US$100 billion in US as Q2 profit blows past forecasts", "source": "BT", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "TSMC, the world's main producer of advanced AI chips and a key Nvidia supplier, pledged a further US$100 billion investment in Arizona, adding to US$165 billion already announced, and cited robust AI-driven chip demand. Q2 profit jumped 77 per cent to a record T$706.6 billion (US$22 billion), beating forecasts and marking a ninth straight quarter of double-digit growth. It lifted 2026 capex guidance to US$60-64 billion and raised full-year revenue growth to slightly more than 40 per cent. Demand for its 3nm and 2nm processes and CoWoS packaging remains strong. Its market cap of about US$1.97 trillion is nearly double Samsung's. Separately, ASML raised its 2026 sales forecast and pledged a capacity boost. TSMC shares are up 59 per cent this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/TSMC%20to%20invest%20another%20US100%20billion%20in%20US%20as%20Q2%20profit%20blows%20past%20forecasts
