Markets"], "summary": "OpenAI and Broadcom said Wednesday they collaborated to develop a custom AI chip called Jalapeno, built from scratch for large-language-model inference to improve efficiency and lower the cost of serving AI at scale. Early tests show performance per watt \"substantially better\" than current state-of-the-art chips, though specific measures were not disclosed, with a detailed technical report due in coming months. The chip was built around the memory, networking and compute patterns of LLMs rather than adapted from general-purpose designs. Broadcom provides silicon implementation and networking. President Greg Brockman said designing more of the stack lets OpenAI serve intelligence more efficiently. The deal follows last fall's plan to deploy 10 gigawatts of custom chips over four years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/OpenAI,%20Broadcom%20Develop%20Custom%20Chip%20for%20AI%20Inference.pdf"}, {"id": "wsj-13", "title": "Qualcomm to Acquire AI Software Firm Modular in $3.9 Billion Stock Deal", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Qualcomm agreed to acquire AI software company Modular for about $3.9 billion to make AI faster and cheaper for customers, the chipmaker said Wednesday. As consideration, Qualcomm expects to issue up to 19.2 million common shares to Modular's equity owners, valuing the deal at around $3.92 billion based on Qualcomm's $204.13 Tuesday close, in a private placement. Modular provides software that lets AI run efficiently across hardware architectures, enabling developers to deploy AI at lower total cost. Qualcomm aims to help customers move AI into production from device to cloud more quickly. The deal is expected to close in the second half of this year. The announcement came as Qualcomm hosted a New York investor day; shares rose 1% premarket to $206.25.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Qualcomm%20to%20Acquire%20AI%20Software%20Firm%20Modular%20in%20%243.9%20Billion%20Stock%20Deal.pdf"}, {"id": "wsj-14", "title": "The Data-Center Boom Is Sparking a Third Wave of Inflation", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets", "Energy"], "summary": "As Trump's trade wars wane and gas prices fall, America's AI build-out is emerging as a new inflation catalyst, pushing up prices on everything from smartphones to electricity. Analysts peg 2026 capital spending at five hyperscalers (Alphabet, Amazon, Meta, Microsoft, Oracle) at $741 billion, up nearly 75% from last year, per FactSet. Columbia economist Stijn Van Nieuwerburgh estimates the build-out through 2032 could reach about $8 trillion. Memory and storage chips used in many consumer products are getting pricier; Nintendo, Microsoft and Sony have raised device prices, and Apple's Tim Cook warned of cost jumps unlike anything in 40 years. Fed Chairman Kevin Warsh has argued AI will ultimately be disinflationary by boosting productivity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/The%20Data-Center%20Boom%20Is%20Sparking%20a%20Third%20Wave%20of%20Inflation.pdf"}, {"id": "wsj-15", "title": "Trump Says He Won't Sign Bipartisan Housing Bill, Urges Lawmakers to Pass SAVE America Act", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "President Trump on Wednesday clashed with Republican critics, insisting lawmakers pass the SAVE America Act tightening voter-eligibility rules before he signs a bill to lower housing costs. At a lunch with GOP senators, Trump turned to Iran and shouted with Sen. Bill Cassidy (R., La.) over the war and Cassidy's vote to rein in Trump's war powers; Trump called him a \"loser\" and told him to sit down. Trump also chided Sens. Lisa Murkowski, Rand Paul and Dave McCormick. The senators had backed a nonbinding resolution to remove U.S. troops from hostilities against Iran. The White House released an $87.6 billion supplemental request, mainly for the war. Trump last week signed an MOU with Iran to reopen the Strait of Hormuz.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Trump%20Says%20He%20Won%E2%80%99t%20Sign%20Bipartisan%20Housing%20Bill,%20Urges%20Lawmakers%20to%20Pass%20SAVE%20America%20Act.pdf"}, {"id": "wsj-16", "title": "Trump, Frustrated With High Gas Prices, Channels Biden's Criticism of Big Oil", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Energy", "Politics"], "summary": "President Trump is borrowing a Democratic playbook by blaming Big Oil for sticky gasoline prices. Despite promising pump prices would fall once the U.S.-Iran war ended, gasoline still hovers around $3.93 a gallon, nearly $1 higher than before the conflict, 10 days after the agreement. On Truth Social Tuesday, Trump accused oil companies of \"gouging\" consumers and instructed the Justice Department to investigate. The U.S. oil benchmark fell to around $70 a barrel Wednesday, roughly 27% below early June, while pump prices dropped less than 4% since the deal. The rhetoric echoes Joe Biden's 2022 feud with the industry over $5 gas and Gov. Gavin Newsom's clashes. Executives privately called the accusations baseless, citing slow supply chains.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Trump,%20Frustrated%20With%20High%20Gas%20Prices,%20Channels%20Biden%E2%80%99s%20Criticism%20of%20Big%20Oil.pdf"}, {"id": "wsj-17", "title": "Ukraine's New Air-Power Paradigm", "source": "WSJ", "date": "26 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "Challenging Putin's claim that Russia's advances are unstoppable, Ukraine is scaling a midrange-strike campaign to destroy enemy logistics, which Defense Minister Mykhailo Fedorov on May 27 called a \"logistics lockdown.\" The strategy, developed after the failed 2023 counteroffensive by former Defense Minister Andriy Zagorodnyuk with Western advisers, describes a \"new paradigm for air power\" using cheaper attack drones for air interdiction, targeting command posts, communications, fuel and ammunition. Fedorov said Ukraine quadrupled interdiction strikes; in May it hit 414 enemy headquarters and rear objects, per Gen. Oleksandr Syrskyi. ISW said Ukraine in May began liberating more ground than it lost. Finnish President Alexander Stubb cited eight Russian casualties for every Ukrainian one.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20WSJ/Ukraine%E2%80%99s%20New%20Air-Power%20Paradigm.pdf"}, {"id": "st-01", "title": "AI adoption in the financial sector", "source": "ST", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "The Monetary Authority of Singapore (MAS) will set up a new Future of Finance Institute (FFI) to accelerate the financial sector's adoption of AI and digital technologies, forming a national innovation centre. The FFI will provide shared resources, a knowledge hub, industry sandboxes and implementation toolkits for technologies like agentic AI and tokenised assets. It builds on initiatives including PathFin.ai, which has over 200 participating institutions, and Project Guardian. A board spanning MAS, financial institutions, tech firms and academia will oversee it, with governance details due later in 2026. Separately, NTUC and the Institute of Banking and Finance aim to equip up to 100,000 finance professionals with AI skills over three years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/AI%20adoption%20in%20the%20financial%20sector.pdf"}, {"id": "st-02", "title": "China tests missiles on US warship replica", "source": "ST", "date": "26 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "China has built a replica of a US Navy Arleigh Burke-class guided-missile destroyer at a remote missile-testing site in the Taklamakan Desert in Xinjiang, satellite imagery shows. Analysts say it could be used to test anti-ship weapons. First identified by Joseph Wu of the Taiwan Defense Studies Initiative, the structure is the latest in a series of mock US warships China has built over five years, with prior targets shaped like carriers and destroyers near Ruoqiang. Imagery has shown missile-strike debris around earlier mock-ups. China has also erected replicas of central Taipei, including Taiwan's Presidential Office, at military bases. Beijing reportedly ramped up missile production in 2025 to its highest level since 2013.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/China%20tests%20missiles%20on%20US%20warship%20replica.pdf"}, {"id": "st-03", "title": "Frasers Property reshuffles hotel portfolio in $2.1b revamp: What investors need to know", "source": "ST", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "Frasers Property (FPL) is proposing a $2.1 billion restructuring of its hospitality business, selling several mature hotels while retaining or acquiring assets with growth potential. Announced June 25, the plan includes selling stakes in five Frasers Hospitality Trust hotels, including Frasers House (formerly InterContinental Singapore), to TCC Group Investments at a 6-7 per cent premium, valued around $1.1 billion. FPL will retain a 49.9 per cent stake in four higher-yield assets and earmark four non-core properties for divestment within 24 months. It will take full ownership of Fraser Suites Singapore for potential redevelopment of the Valley Point site. Shares closed 1.9 per cent higher at $1.09. Shareholders vote in August.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Frasers%20Property%20reshuffles%20hotel%20portfolio%20in%202.1b%20revamp%20What%20investors%20need%20to%20know.pdf"}, {"id": "st-04", "title": "Goodbye to tokenmaxxing and hello to token efficiency", "source": "ST", "date": "26 Jun 2026", "tags": ["Technology & AI"], "summary": "The AI industry is shifting from \"tokenmaxxing\" - maximising token use - toward cost efficiency, the writer argues, as 2026 brings AI's tangible effects to everyday work. Tokens are how AI firms bill enterprise customers, and US token use has grown 100-fold in two years, while China's has surged 1,000-fold. Frontier model costs are not dropping despite data-centre expansion; Uber burnt its entire 2026 AI budget in four months, prompting limits. Chinese firms offer cheaper, \"good enough\" models priced over 10 times below top US ones, encouraging mixed-usage strategies. With Gartner projecting 40 per cent of enterprise apps featuring AI agents by end-2026, and agentic deployments needing 20 times more tokens, token efficiency becomes critical.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Goodbye%20to%20tokenmaxxing%20and%20hello%20to%20token%20efficiency.pdf"}, {"id": "st-05", "title": "Oil back to pre-war levels, as US reassures Gulf allies", "source": "ST", "date": "26 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Oil prices fell to pre-war levels on June 25 as the US said flows through the Strait of Hormuz were nearing normal, with at least 20 million barrels exiting in 24 hours. Iran, which took control of the choke point during its conflict with the US and Israel, warned vessels to stick to Tehran-designated routes, rejecting new lanes announced by Oman. Secretary of State Marco Rubio toured the Gulf to reassure allies wary of a preliminary Iran deal, insisting Tehran cannot charge for use of international waterways. The accord, criticised at home and abroad as too generous, includes a US$300 billion fund and sanctions easing, and sets up 60 days of talks. The Senate voted 50-47 to block a war powers measure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Oil%20back%20to%20pre-war%20levels%2C%20as%20US%20reassures%20Gulf%20allies.pdf"}, {"id": "st-06", "title": "PayNow upgrades offer unified QR payment experience", "source": "ST", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "MAS and the Association of Banks in Singapore unveiled PayNow enhancements on June 25, including a unified QR payment experience merging PayNow and NETS QR codes for local users and tourists, plus smoother online checkout. Currently many apps cannot scan across both systems, and online buyers must switch between merchant and banking apps. The proposed integration would pre-fill payment details and route users directly to their banking or wallet app. A unified QR pilot is targeted by end-2026, with checkout functionality within a year. Larger-value government transactions will be tested from 2027. Part of the PayNow Generation 2 study, PayNow was benchmarked against 11 jurisdictions, and over 90 per cent of residents and businesses use it.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/PayNow%20upgrades%20offer%20unified%20QR%20payment%20experience.pdf"}, {"id": "st-07", "title": "Taiwan starts Washington flights in milestone for uncertain ties", "source": "ST", "date": "26 Jun 2026", "tags": ["Geopolitics", "Trade"], "summary": "Taiwan inaugurates its first-ever non-stop flight to the US capital, with carrier Eva Air launching direct service on June 26 between Taoyuan and Washington Dulles four times weekly. The de facto US ambassador Raymond Greene called it an \"unprecedented milestone\". The route carries political symbolism as China ramps up pressure on Taiwan and amid concerns over President Donald Trump's transactional approach, including remarks that arms sales could be a \"negotiating chip\" with China. The link eases visits by US lawmakers and underscores growing commercial ties; Taiwan's exports to the US were 329 per cent higher in 2025 than 2019. Passenger flights to the US rose 71 per cent over seven years, contrasting with slower recovery in China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Taiwan%20starts%20Washington%20flights%20in%20milestone%20for%20uncertain%20ties.pdf"}, {"id": "st-08", "title": "Temperatures set to surpass 35 deg C across Europe", "source": "ST", "date": "26 Jun 2026", "tags": ["Environment", "Society"], "summary": "At least 101 million people in Europe were expected to face temperatures above 35 deg C on June 25 in a punishing, increasingly deadly heatwave, with over 380 million facing more than 30 deg C. France and Spain were among the worst hit, with children among the victims; Spain's MoMo system linked 212 deaths to the heat between June 21 and 24. Scientists blame human-driven climate change, with UN climate chief Simon Stiell saying it bears \"the fingerprints of the climate crisis\". A \"heat dome\" of trapped North African air drove the conditions. Britain broke its June record at 35.7 deg C near Gatwick, with red warnings extended. Temperatures were expected to ease in western Europe from June 26.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Temperatures%20set%20to%20surpass%2035%20deg%20C%20across%20Europe.pdf"}, {"id": "st-09", "title": "Trump calls likely next British leader Andy Burnham 'extremely liberal'", "source": "ST", "date": "26 Jun 2026", "tags": ["Politics", "Geopolitics"], "summary": "US President Donald Trump was dismissive of Andy Burnham, the former Greater Manchester mayor set to become Britain's next prime minister, saying on June 24 he knew little about him beyond hearing he is \"extremely liberal\". Trump suggested that meant Burnham \"probably won't open up the North Sea\". Burnham is likely the only contender to replace Keir Starmer as Labour leader and could become PM by mid-July. Trump's comments signal a potentially rocky relationship; ties with Starmer soured after Trump criticised Britain and mocked Starmer as weak for refusing to back the US campaign against Iran. Starmer's government declined new North Sea oil licences, while Burnham has said he holds \"something of an open mind\" on the issue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20ST/Trump%20calls%20likely%20next%20British%20leader%20Andy%20Burnham%20%E2%80%98extremely%20liberal%E2%80%99.pdf"}, {"id": "bt-01", "title": "As Europe roasts in a heatwave, Asia's air-con makers grab some cool cash", "source": "BT", "date": "26 Jun 2026", "tags": ["Environment", "Trade"], "summary": "As record heat grips Europe, Asian air-conditioner makers including Samsung Electronics, China's Midea, LG Electronics and Japan's Mitsubishi Electric are reporting booming sales. Air-conditioning is ubiquitous in Asia but rare in Europe, where only about 20 per cent own units. Samsung cited double-digit first-half sales growth in Italy, Spain and France; German e-commerce sales rose roughly 37 per cent in May, while Spanish and French shipments jumped 108 per cent. Midea's PortaSplit sold out in some channels, pushing second-hand prices above new units. Older European buildings make installation costly, often exceeding 1,000 euros (S$1,474). The World Meteorological Organization says Europe is warming at more than twice the global average.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/As%20Europe%20roasts%20in%20a%20heatwave,%20Asia's%20air-con%20makers%20grab%20some%20cool%20cash.pdf"}, {"id": "bt-02", "title": "Asia-Pacific investors outpace US and Europe in private credit push: State Street", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Asia-Pacific institutional investors are ramping up private-market exposure faster than Western peers, a State Street study published Jun 23 found. Some 48 per cent of Asia-Pacific respondents plan to raise private credit allocations over two years, versus 39 per cent in EMEA and 31 per cent in the US. State Street's Eric Chng cited Asian familiarity with credit and lower existing allocations. Over 480 institutions globally were polled in March and April. Half intend to grow private-market allocations; AI and AI infrastructure ranked as the top investment theme, chosen by 41 per cent of Asia-Pacific respondents. Some 86 per cent in the region already offer or plan retail-focused private market products.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Asia-Pacific%20investors%20outpace%20US%20and%20Europe%20in%20private%20credit%20push%20State%20Street.pdf"}, {"id": "bt-03", "title": "Australia's housing slump wipes US$128 billion off top two markets", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "Australia's housing downturn has erased US$128 billion from its two largest markets this quarter, threatening the wealth effect underpinning consumer spending. Sydney prices fell 2.7 per cent between Mar 31 and Jun 25, wiping A$120 billion (S$107.3 billion), while Melbourne dropped 2.3 per cent, shedding A$65 billion, per Bloomberg Economics. Declines are concentrated at the top end, where the priciest 25 per cent of Melbourne and Sydney dwellings fell 4.5 and 5 per cent from last year's peaks. Economist James McIntyre expects softening to spread broadly in late 2026. Rapid rate rises, slowing immigration, affordability limits and a Labor crackdown on housing tax breaks have cooled prices, improving affordability painfully.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Australia's%20housing%20slump%20wipes%20US128%20billion%20off%20top%20two%20markets.pdf"}, {"id": "bt-04", "title": "China's central bank to add tool to better manage short-term liquidity", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "China's central bank said on Jun 25 it will debut overnight lending next week, offering reverse-repos to banks and brokers to deepen control over volatile short-term rates. The People's Bank of China plans to inject cash on Jun 29 and 30, the month-end when seasonal demand spikes, to \"better meet short-term liquidity needs\". The move follows governor Pan Gongsheng's pledge to improve control over very short-dated rates. Guosheng Securities called it \"a key step in China's interest rate reform\" and expects the overnight rate set at 1.3 per cent, below the 1.4 per cent seven-day rate. Bonds rallied, with 30-year treasury futures jumping 50 ticks to a three-week high.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/China's%20central%20bank%20to%20add%20tool%20to%20better%20manage%20short-term%20liquidity.pdf"}, {"id": "bt-05", "title": "Higher-for-longer US rates could boost Singapore banks' earnings beyond 2026: analysts", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "A more hawkish US Federal Reserve under new chair Kevin Warsh could lift Singapore bank earnings by slowing net interest margin compression, analysts say. Higher-for-longer rates may improve the sector's outlook beyond 2026. Since the Jun 17 Fed meeting, DBS, OCBC and UOB shares rose 1.9, 1.3 and 1.4 per cent; year-to-date gains reached 17.4, 25.7 and 15.3 per cent. OCBC's Carmen Lee said elevated rates could prompt a review of 2027 estimates. UOB's Chen Jiesheng expects three-month Sora to reach 1.42 per cent by Q4 2026, from 1.07 per cent now. Analysts named DBS best positioned on asset quality, citing stronger provisioning buffers and fewer defaults among riskier segments.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Higher-for-longer%20US%20rates%20could%20boost%20Singapore%20banks'%20earnings%20beyond%202026%20analysts.pdf"}, {"id": "bt-06", "title": "Hormuz reopening is quickly flooding oil markets with supply", "source": "BT", "date": "26 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Oil markets are suddenly awash in supply as cargoes accelerate out of the Strait of Hormuz following a US-Iran deal to reopen the waterway. Markets are weakening across Europe and Asia, with Angolan crude selling at decade-wide discounts of nearly US$10 a barrel below Dated Brent. Some Chinese refiners are even offering cargoes for sale. Brent plunged below US$75 a barrel on Jun 24, the first time since the war started, after peaking above US$140 in April. Goldman Sachs' Daan Struyven said \"reopening is going well and quickly\". Iran shipped 30 million barrels to Asia under a US license. US crude inventories sit at their lowest since 1984.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Hormuz%20reopening%20is%20quickly%20flooding%20oil%20markets%20with%20supply.pdf"}, {"id": "bt-07", "title": "It's too soon to breathe easy on China's economy", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "Disappointing data suggest China's recovery needs more stimulus, this commentary argues. The economy is caught in a two-speed pattern where exports excel but domestic demand wilts. May retail sales fell 0.6 per cent, three times the expected drop, while investment and new home sales declined. The PBOC has not signalled rate cuts, and the fiscal deficit shrank in the first five months of 2026, suggesting austerity over stimulus. With inflation near 1 per cent, a demand boost would help. Leaders lowered the 2026 growth target to 4.5-5 per cent, the lowest since 1991. PBOC adviser Huang Yiping called rebalancing \"crucial\", but the piece warns against complacency: every boom ends.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/It's%20too%20soon%20to%20breathe%20easy%20on%20China's%20economy.pdf"}, {"id": "bt-08", "title": "Japan's Takaichi unveils 370 trillion yen long-term spending plan", "source": "BT", "date": "26 Jun 2026", "tags": ["Politics", "Technology & AI"], "summary": "Japanese Prime Minister Sanae Takaichi unveiled an investment roadmap envisioning more than 370 trillion yen (S$3 trillion) over the 14 years to March 2041, with 101.6 trillion yen earmarked for AI and chips. The plan, released Jun 24, aims to build a \"strong and prosperous investment framework\" and channel funds into economic-security sectors. Analysts questioned its viability given the long timeframe; S&P Global's Harumi Taguchi said its accuracy is \"inevitably very low\". Markets largely shrugged it off. Three fiscal scenarios assume 2 per cent inflation; only the optimistic case steadily cuts the debt-to-GDP ratio. Takaichi's investment push helped the Nikkei 225 briefly top 70,000.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Japan's%20Takaichi%20unveils%20370%20trillion%20yen%20long-term%20spending%20plan.pdf"}, {"id": "bt-09", "title": "Large US banks can weather hypothetical downturn, several raise dividends: Fed", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "The US Federal Reserve said on Jun 24 that 32 of the largest banks could weather a severe downturn and keep lending, absorbing over US$700 billion in hypothetical losses while staying above minimum capital requirements. In the annual stress test, capital levels fell 1.6 percentage points under a scenario of one-third real estate price declines, 10 per cent unemployment and market turmoil. Vice-chair Michelle Bowman said results \"underscore the strength of the banking system\". JPMorgan, Goldman Sachs, Morgan Stanley, State Street and Wells Fargo raised dividends. Aggregate high-quality capital dipped to 11.2 per cent. The Fed will not update stress capital buffers until after the 2027 test.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Large%20US%20banks%20can%20weather%20hypothetical%20downturn,%20several%20raise%20dividends%20Fed.pdf"}, {"id": "bt-10", "title": "Malaysia's Forest City family office push gains traction, but ecosystem gaps remain", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Forest City's family-office push has moved past paper approvals, with Maybank-assisted single family offices now operating and holding over RM700 million (S$219.3 million) in assets. Maybank has supported nine SFOs under the Johor-Singapore Special Economic Zone scheme and Forest City incentive package. It remains unclear whether the project will meet its RM2 billion AUM target by end-2026, with advisers citing geopolitical headwinds and currency volatility. Early movers include billionaire Chua Ma Yu's CMY Capital and Yow Kee Family Office. Maybank facilitated about RM20 billion in zone financing over two years. The scheme offers a lower-cost \"dual-HQ\" complement to Singapore, with a RM30 million AUM threshold.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Malaysia's%20Forest%20City%20family%20office%20push%20gains%20traction,%20but%20ecosystem%20gaps%20remain.pdf"}, {"id": "bt-11", "title": "OUE Reit selling Crowne Plaza Changi Airport for S$500 million; unitholders to get special payout", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "OUE Reit is selling the Crowne Plaza Changi Airport hotel for S$500 million to a Tokyo Century-OUE joint venture, its manager said on Jun 25. The price represents a 1.3 per cent premium to independent valuations, with net cash proceeds of about S$498.5 million. The manager will distribute S$20 million as special payouts over two years. CEO Han Khim Siew called it \"an opportune time to crystallise the value\", avoiding capital expenditure as leases expire in 2028. The deal lifts pro forma FY2025 DPU 5.8 per cent and cuts leverage from 41.5 to 36.6 per cent. OUE holds 51 per cent of the JV, Tokyo Century 49 per cent. Units rose 1.4 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/OUE%20Reit%20selling%20Crowne%20Plaza%20Changi%20Airport%20for%20S500%20million%20unitholders%20to%20get%20special%20payout.pdf"}, {"id": "bt-12", "title": "Singapore investors are reshaping portfolios with a focus on capital preservation: survey", "source": "BT", "date": "26 Jun 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore and Asia-Pacific investors are adjusting portfolios amid geopolitical uncertainty and rising market concentration, the Schroders Global Investor Insights Survey 2026 found. Some 87 per cent of regional investors expect greater volatility next year. Singapore investors emphasise capital preservation far more than peers, at 64 versus 44 per cent. The survey polled over 1,000 investors managing US$72 trillion over April and May. Fifty-five per cent of regional respondents cited geopolitical escalation as the biggest portfolio risk, followed by commodity and energy price shocks. Energy emerged as the favoured rotation away from AI and technology, chosen by 62 per cent in Singapore. Conviction in active management and cross-asset investing remains strong.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/Singapore%20investors%20are%20reshaping%20portfolios%20with%20a%20focus%20on%20capital%20preservation%20survey.pdf"}, {"id": "bt-13", "title": "URA releases two smaller housing sites in Sin Ming, Kallang for sale", "source": "BT", "date": "26 Jun 2026", "tags": ["Southeast Asia", "Finance & Markets"], "summary": "The Urban Redevelopment Authority on Jun 25 released two smaller city-fringe residential sites under the first-half 2026 government land sales programme. The confirmed-list parcel along Lorong Puntong and Sin Ming Avenue, near Bright Hill MRT, spans 4,283.1 sq m and could yield 140 homes; tenders require developers to build a sheltered linkway. Analysts expect firm demand, citing its location beside Ai Tong School, with four to 10 bids and offers up to S$1,570 psf ppr. The reserve-list Kitchener Link site in Kallang could house 145 units but may not be triggered amid ample supply. Competing nearby launches include the 1,240-unit Thomson Reserve, expected in late 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20BT/URA%20releases%20two%20smaller%20housing%20sites%20in%20Sin%20Ming,%20Kallang%20for%20sale.pdf"}, {"id": "scmp-01", "title": "As US wavers, ex-minister says Japan and South Korea 'only have each other'", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Former Japanese foreign and defence minister Taro Kono urged Tokyo and Seoul to build a strong security alliance as US commitment to East Asia grows uncertain. Speaking at the Jeju Forum, he said \"Japan and Korea only have each other,\" noting the Philippines and Australia are too distant. Kono said Europe could pursue a defence \"plan B\" without Washington, but Korea, the Philippines, Australia and New Zealand could not. He stressed China must be at the table on North Korea, called for a Seoul-Tokyo joint defence industrial alliance, higher defence spending, and proposed expanding Nato to include like-minded Asian nations. He questioned US resolve since Trump's first term.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/As%20US%20wavers,%20ex-minister%20says%20Japan%20and%20South%20Korea%20%E2%80%98only%20have%20each%20other%E2%80%99.pdf"}, {"id": "scmp-02", "title": "Asia treads cautiously on Iranian oil exports despite US sanctions waiver", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Asian economies are expected to stay cautious about buying Iranian oil despite a 60-day US sanctions waiver effective from Sunday, weighing compliance, financial risk and a possible return of US-Iran hostilities. Refiners in India, Japan and South Korea have secured supplies elsewhere and see two months as too short for legal requirements. Analysts expect Tehran to sell aggressively, pressuring Saudi Arabia and the UAE on market share. Brent crude fell to US$71.83 a barrel as hopes grew the Strait of Hormuz would fully reopen. An ANZ report estimated Iranian output rising from 2.4 million barrels per day to 3.1 million by August.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Asia%20treads%20cautiously%20on%20Iranian%20oil%20exports%20despite%20US%20sanctions%20waiver.pdf"}, {"id": "scmp-03", "title": "Beijing slams US, European concerns over coastguard patrols near Taiwan", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Beijing on Thursday rejected criticism from the US, Britain, France and Germany over recent coastguard operations east of Taiwan, calling the patrols lawful and necessary to safeguard its maritime rights. The four nations had said the deployments \"threaten regional stability\" and shipping safety. Foreign ministry spokesman Guo Jiakun urged them to respect China's sovereignty and \"stop blurring right and wrong.\" Beijing described the patrols as a response to Japan and the Philippines negotiating maritime boundaries overlapping Taiwan's claims. The PLA recently sent its most advanced carrier, the Fujian, through the Taiwan Strait. Beijing accused Taiwan's ruling DPP of colluding with external forces.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Beijing%20slams%20US,%20European%20concerns%20over%20coastguard%20patrols%20near%20Taiwan.pdf"}, {"id": "scmp-04", "title": "China vows to seek tariff cuts with US while decrying its 'malicious' trade acts", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Trade", "Geopolitics"], "summary": "Beijing vowed to keep pursuing reciprocal tariff cuts and \"win-win\" cooperation with Washington even after imposing fresh restrictions on dozens of American firms, illustrating parallel cooperation and confrontation. Commerce ministry spokesman He Yadong said both sides would consult on tariff reductions and encourage trade in aircraft and agricultural products. The overture follows ambassador Xie Feng's proposal to raise the trade board's tariff-free goods limit tenfold, from US$30 billion to US$300 billion. Beijing defended adding 10 US firms to its export-control list and barring 46 from procurement as a response to the Pentagon expanding its Chinese Military Companies List. Alibaba, the Post's owner, sued to be removed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/China%20vows%20to%20seek%20tariff%20cuts%20with%20US%20while%20decrying%20its%20%E2%80%98malicious%E2%80%99%20trade%20acts.pdf"}, {"id": "scmp-05", "title": "China 'on track to surpass United States' in global goals for human, planet health: UN", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Environment", "Society"], "summary": "China is \"on track to surpass the United States\" in efforts to eradicate poverty and protect the planet, according to the UN's Sustainable Development Report 2026, which tracks progress on the 17 Sustainable Development Goals. From 2015 to 2025 the China-US gap closed to just 0.63 points out of 100. The US slipped from 40th to 45th while China rose from 63rd to 49th; Russia held 51st. China and India recorded the biggest gains. China eliminated poverty and ensured equal education but faces challenges on marine and land species and press freedom. Finland, Sweden and Denmark led the index. The UN forecast none of the 17 goals would be met by 2030.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/China%20%E2%80%98on%20track%20to%20surpass%20United%20States%E2%80%99%20in%20global%20goals%20for%20human,%20planet%20health%20UN.pdf"}, {"id": "scmp-06", "title": "China's Big Fund becomes SMIC's third-largest shareholder after record Star Market buyout", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's state-backed Big Fund became the third-largest shareholder of SMIC, the country's largest wafer foundry, after SMIC completed acquiring manufacturing subsidiary SMNC in the biggest M&A deal recorded on Shanghai's Star Market. SMIC issued 547 million shares worth 40.6 billion yuan (US$6 billion) to five SMNC shareholders for 49 per cent of the company. SMNC, founded in 2013, focuses on 12-inch wafer foundry services in Beijing. SMIC's two largest shareholders remain HKSCC Nominees and Grand Investment International. The deal underscores Beijing's reliance on the Big Fund to finance chip self-sufficiency amid tightening US export controls, even as the fund trims stakes in mature chip firms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/China%E2%80%99s%20Big%20Fund%20becomes%20SMIC%E2%80%99s%20third-largest%20shareholder%20after%20record%20Star%20Market%20buyout.pdf"}, {"id": "scmp-07", "title": "China's cybersecurity industry needs its own Mythos model, 360 founder warns", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Defence"], "summary": "China must develop its own equivalent to Anthropic's Mythos model to counter AI-era cybersecurity risks, 360 Security Technology founder Zhou Hongyi warned, likening the US technology to a \"cyber nuclear weapon.\" Released in April, Mythos can autonomously find software vulnerabilities, accelerating discovery a hundredfold. Zhou said the US excluded China from its Project Glasswing alliance, which gave 40-plus organisations access. A domestic version would give China \"reciprocal strategic deterrence,\" he argued. He said Chinese models still trail US ones by 20 to 30 per cent and urged focus on AI agent systems, citing 360's Tu Long Feng platform. The Shanghai-listed firm's shares have fallen over 30 per cent since early May.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/China%E2%80%99s%20cybersecurity%20industry%20needs%20its%20own%20Mythos%20model,%20360%20founder%20warns.pdf"}, {"id": "scmp-08", "title": "China's green-energy costs seen undercutting traditional energy as capacity hits record", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Energy", "Environment"], "summary": "China's green-energy costs are projected to plummet, offering a substantial advantage over traditional sources, after installed power-generation capacity hit a world-leading 4.01 billion kilowatts, the National Energy Administration said. Some expect green energy to cost as little as 0.3 yuan (US$0.04) per kWh within five years. Hithium chairman Wu Zuyu forecast a \"0.1-yuan era\" for energy storage equipment, against coal-fired power's 0.42 to 0.62 yuan. Non-fossil sources' share of new capacity rose from 25 per cent in 2010 to 62 per cent in May, while coal fell from 61 to 32 per cent. Wu expects sodium-ion batteries to become commercially viable within about five years.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/China%E2%80%99s%20green-energy%20costs%20seen%20undercutting%20traditional%20energy%20as%20capacity%20hits%20record.pdf"}, {"id": "scmp-09", "title": "DeepSeek hiring spree: Chinese AI firm seeks newcomers as it pursues AGI", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI"], "summary": "DeepSeek is looking to \"at least double the size of every department\" in a new hiring spree, the Chinese AI firm announced Thursday, opening 33 positions across seven categories including AI core system R&D and deep learning research. The firm said its philosophy lets newcomers take on core tasks and become a \"driving force\" behind artificial general intelligence. Key roles include pre-training data engineer and supercomputing cluster R&D engineer. The push follows DeepSeek's first external fundraising, raising about 50 billion yuan (US$7.4 billion) in a Series A round, lifting its valuation to roughly 400 billion yuan (US$58.9 billion). Founder Liang Wenfeng was the largest backer; Tencent and CATL also invested.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/DeepSeek%20hiring%20spree%20Chinese%20AI%20firm%20seeks%20newcomers%20as%20it%20pursues%20AGI.pdf"}, {"id": "scmp-10", "title": "EU pitches Brazil a 'more beneficial' rare earths deal than US or China", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Trade", "Energy"], "summary": "The EU is offering Brazil a \"more beneficial\" critical minerals partnership than the US or China, international partnerships commissioner Jozef Sikela said, promising investment in domestic refining and technology transfer to cut Brussels' dependence on Chinese supply chains. Sikela visited a rare earth processing centre run by Australian miner Viridis during a week-long trip. Brazil holds the world's second-largest rare earth reserves and requires domestic processing for foreign access. China controls about 91 per cent of global rare earth refining and 94 per cent of permanent magnet production. Serra Verde, Brazil's only operating mine, recently closed a US$565 million DFC financing package with Washington.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/EU%20pitches%20Brazil%20a%20%E2%80%98more%20beneficial%E2%80%99%20rare%20earths%20deal%20than%20US%20or%20China.pdf"}, {"id": "scmp-11", "title": "Exclusive: US assures India over AI 'kill switch' as 'Pax Silica' expands in bid to counter China", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "The US assured India that future AI models will not be \"cut off,\" days after Washington abruptly banned Anthropic's advanced models on national security grounds, a senior Indian official told the Post. S. Krishnan said access once provided would not be cut. India raised the \"kill switch\" concern at the \"Pax Silica\" summit, a US-led initiative to build China-free AI supply chains. In early June the Trump administration barred foreign nationals from using Anthropic's Fable 5 and Mythos 5. The move drew criticism from France's Macron and Canada's Carney. Pax Silica is expanding, adding the EU, Netherlands, Germany and Greece, with Kazakhstan, Argentina and others to follow. Officials announced a US$50 million \"Pax Pass\" platform.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/ExclusiveUS%20assures%20India%20over%20AI%20%E2%80%98kill%20switch%E2%80%99%20as%20%E2%80%98Pax%20Silica%E2%80%99%20expands%20in%20bid%20to%20counter%20China.pdf"}, {"id": "scmp-12", "title": "Huawei and Cambricon lead China's AI server chip surge, piling pressure on Nvidia", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese chip suppliers led by Huawei and Cambricon, plus tech giants designing their own silicon, are set to capture nearly 80 per cent of China's domestic AI server market this year, further squeezing Nvidia, according to TrendForce. Foreign suppliers' combined share is forecast to fall to 21 per cent in 2026 from 34 per cent last year, while domestic suppliers rise to 56 per cent from 46 per cent. ASICs designed by Chinese internet firms should reach 23 per cent. ByteDance and Alibaba are building AI infrastructure aggressively, developing in-house chips via T-Head and Kunlunxin. Globally, Nvidia is forecast to retain a 64 per cent share, with AI server shipments growing over 28 per cent in 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Huawei%20and%20Cambricon%20lead%20China%E2%80%99s%20AI%20server%20chip%20surge,%20piling%20pressure%20on%20Nvidia.pdf"}, {"id": "scmp-13", "title": "Is EV battery technology nearing an inflection point? CATL boss expresses doubts", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Energy"], "summary": "Robin Zeng Yuqun, head of the world's largest EV battery maker CATL, played down expectations for solid-state battery technology, predicting an inflection point only by 2030. Speaking at \"Summer Davos\" in Dalian, he said the technology had reached only level four of nine and that commercial viability was unproven. Solid-state batteries, which use a solid electrolyte, offer higher energy capacity, longer range and improved safety over lithium-ion. Toyota and Samsung are among developers, but no fully solid-state EV batteries have been produced. Current 500km-range batteries cost over 20,000 yuan (US$2,935); solid-state versions could cost up to three times more. Chery and Nio's WeLion are pursuing semi-solid-state variants.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Is%20EV%20battery%20technology%20nearing%20an%20inflection%20point%20CATL%20boss%20expresses%20doubts.pdf"}, {"id": "scmp-14", "title": "Is the US banning drones from China until it can make better ones itself?", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "As Washington tightens restrictions on Chinese technology, US emergency services and pilots are urging regulators not to restrict DJI drones they consider essential. Battalion Chief William Marsiglio of Virginia was among more than 3,000 Americans filing comments to the FCC, warning that costlier alternatives could undermine response capacity. The US defence budget targeted DJI in December, leading the FCC to effectively bar imports of its newest models. Public comments ran 10 times higher than comparable proceedings. Analysts frame DJI's case as emblematic of selective US-China decoupling following the May Xi-Trump summit, with export controls quietly redesigning interdependence and possibly eroding American leverage.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Is%20the%20US%20banning%20drones%20from%20China%20until%20it%20can%20make%20better%20ones%20itself.pdf"}, {"id": "scmp-15", "title": "Kuaishou chip spin-off taps new funding for in-house designs amid US export controls", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese internet giants are increasingly moving into semiconductor design, betting proprietary chips will give greater control as AI workloads surge and geopolitical tensions hamper access to foreign technology. Short-video giant Kuaishou's chip spin-off TranStreams raised an undisclosed Series A+ round led by QF Capital, with backing from a Beijing state fund, Baidu's venture arm and XGD. Spun off in 2024, TranStreams focuses on its SL200 system-on-chip for video processing and AI inferencing, claiming 35 per cent higher video compression efficiency than Nvidia's latest AV1 solution. Proceeds will fund next-generation chips and SL200 expansion. ByteDance, Baidu and Alibaba, the Post's owner, are pursuing similar in-house chip efforts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Kuaishou%20chip%20spin-off%20taps%20new%20funding%20for%20in-house%20designs%20amid%20US%20export%20controls.pdf"}, {"id": "scmp-16", "title": "Major Chinese banks suspend individual trading on Shanghai Gold Exchange amid volatility", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "Chinese banks are accelerating efforts to scale back retail precious-metals trading as gold fell below US$4,000 an ounce for the first time since November, having lost nearly 30 per cent since peaking earlier this year. ICBC said it would stop individual Shanghai Gold Exchange-linked trading from July 24, following Postal Savings Bank, Ping An Bank and China Guangfa Bank. Bank of China and China CITIC Bank raised margin requirements, some to 140 per cent. The sell-off was driven by a stronger dollar and reduced Fed rate-cut expectations. Goldman Sachs cut its year-end gold target to US$4,900, Deutsche Bank to US$4,800. State Street's Robin Tsui said long-term Chinese demand should hold.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Major%20Chinese%20banks%20suspend%20individual%20trading%20on%20Shanghai%20Gold%20Exchange%20amid%20volatility.pdf"}, {"id": "scmp-17", "title": "Trump backs 'Six Assurances' to Taiwan but no arms sale timeline, US diplomat says", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Top US diplomat for East Asia Michael DeSombre sought to reassure Taiwan that Washington stands by its \"Six Assurances\" despite Trump's earlier dismissal, but offered no timeline for a stalled US$14 billion arms package. Testifying to a House hearing, DeSombre said US Taiwan policy had not changed and that Beijing constantly raises arms sales. One assurance is that the US would not consult Beijing before arms-sale decisions, yet Trump said he discussed Taiwan arms sales with Xi \"in great detail\" and called the package a \"good negotiating chip.\" DeSombre said it was \"currently under review.\" The Post reported new sales are unlikely before Xi's planned September US visit.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Trump%20backs%20%E2%80%98Six%20Assurances%E2%80%99%20to%20Taiwan%20but%20no%20arms%20sale%20timeline,%20US%20diplomat%20says.pdf"}, {"id": "scmp-18", "title": "Trump casts doubt on US striking Iran school on war's first day", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "President Trump said it may never be known who was at fault for a February 28 strike on a girls' school in Minab, southern Iran, on the war's first day, which killed more than 175 children and teachers. Reuters reported in March that an internal US military probe found US forces were likely responsible. \"I don't think it was us,\" Trump said, suggesting \"missiles flying all over the place.\" The UN human rights office called the strike \"absolutely horrific\"; deliberately attacking a school would likely be a war crime. The New York Times reported a US Tomahawk missile hit the school. House Democrats filed impeachment proceedings against Defence Secretary Pete Hegseth.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Trump%20casts%20doubt%20on%20US%20striking%20Iran%20school%20on%20war%E2%80%99s%20first%20day.pdf"}, {"id": "scmp-19", "title": "US hearing warns Chinese economic espionage now targets AI", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "Witnesses told the House Select Committee on China that decades of Chinese technology theft have strengthened Beijing's military and now target AI. David Shedd, former acting director of the Defense Intelligence Agency, said China orchestrated a \"highly strategic\" effort blending cyber espionage, human intelligence and academic collaboration to steal Western secrets. Some witnesses cautioned against broad anti-China measures: civic leader John Yang urged using \"a scalpel, not a sledgehammer,\" warning of a brain drain and that Asian-Americans feel unsafe. A heated exchange erupted between Democrat Ro Khanna and witness Michael Lucci over birthright citizenship. Shedd said Chinese firms such as Alibaba have targeted Anthropic and other US AI models.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/US%20hearing%20warns%20Chinese%20economic%20espionage%20now%20targets%20AI.pdf"}, {"id": "scmp-20", "title": "US inflation rises to 3-year high, spending picks up", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Finance & Markets"], "summary": "US consumer spending accelerated in May even as prices rose at the fastest pace in over three years, suggesting Americans are powering through the Iran war's fallout. The PCE price index rose 4.1 per cent from a year earlier, the most since April 2023; core prices rose 3.4 per cent. Inflation-adjusted spending rose 0.3 per cent, likely keeping pressure on the Federal Reserve to raise rates this year. Personal income rose 0.7 per cent and the saving rate held at 3 per cent, the lowest since 2022. The economy grew at an annualised 2.1 per cent in Q1. Jobless claims fell by 12,000 to 215,000, while durable-goods orders dropped 4.5 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/US%20inflation%20rises%20to%203-year%20high,%20spending%20picks%20up.pdf"}, {"id": "scmp-21", "title": "US is 'superhero', China 'supervillain' in global AI contest, American officials warn", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "House Foreign Affairs Committee Chairman Brian Mast warned that \"America is the superhero\" and China the \"supervillain\" in the contest for global AI leadership, days after Treasury Secretary Scott Bessent called China getting ahead America's \"biggest risk.\" Speaking at a Hudson Institute event, Republican senator Jim Banks called the AI race \"a moral race\" the US cannot afford to lose. The Trump administration retains strict export controls on advanced chips for China while avoiding Biden-era blanket bans. The US relies on private investment and top models, while China emphasises open-weight models and subsidised industrial deployment. Last month the two agreed to formal AI governance talks after Trump's Beijing trip.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/US%20is%20%E2%80%98superhero%E2%80%99,%20China%20%E2%80%98supervillain%E2%80%99%20in%20global%20AI%20contest,%20American%20officials%20warn.pdf"}, {"id": "scmp-22", "title": "US shifts South China Sea reconnaissance towards drones and Philippines: think tank", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "US \"freedom of navigation\" operations in the South China Sea declined last year as Washington relied more on the Philippines and uncrewed drones for reconnaissance, a Beijing-based think tank found. The South China Sea Strategic Situation Probing Initiative said large vessels faced maintenance and deployment constraints, partly from the Middle East conflict, but the region remained the US military's most critical theatre and operations may grow \"more aggressive.\" The US conducted just two public freedom-of-navigation operations last year, down from six in 2023, targeting Scarborough Shoal and the Spratlys. Close-in aerial reconnaissance rose to 1,200 sorties, increasingly staged from the Philippines' Clark Air Base using P-8A aircraft and MQ-9 Reaper drones.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/US%20shifts%20South%20China%20Sea%20reconnaissance%20towards%20drones%20and%20Philippines%20think%20tank.pdf"}, {"id": "scmp-23", "title": "US' Rubio wraps up Gulf tour as allies share concerns over Iran peace accord", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Geopolitics", "Energy"], "summary": "US Secretary of State Marco Rubio told Gulf allies any deal with Iran would account for their interests, wrapping up a Middle East trip aimed at winning over partners deeply uneasy about the preliminary accord, which many see as too soft. Speaking in Bahrain, Rubio said the US sought enduring peace not at allies' expense. He warned that if Iran blocks ships in the Strait of Hormuz \"then we're going to have a problem,\" and ruled out shipping fees. He did not discuss a US$300 billion reconstruction fund Gulf states fear Iran would use to rebuild its military. Oman pledged a safe-passage corridor without transit tolls. The conflict began February 28 with US-Israeli strikes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/US%E2%80%99%20Rubio%20wraps%20up%20Gulf%20tour%20as%20allies%20share%20concerns%20over%20Iran%20peace%20accord.pdf"}, {"id": "scmp-24", "title": "Why Chinese competition, not geopolitics, is the biggest challenge for foreign firms", "source": "SCMP", "date": "26 Jun 2026", "tags": ["Trade", "Finance & Markets"], "summary": "The main risk for foreign businesses in China is not geopolitics but fierce domestic competition, McKinsey Greater China chairman Joe Ngai said at Summer Davos in Dalian. Securing market access remains a concern, but the real test is beating local rivals: \"these guys are hungry ... they can beat everyone up,\" he said, calling China's ecosystem \"the world's toughest gym.\" Despite heightened US and EU scrutiny, Ngai argued decoupling was \"far too simplistic\" and that firms still rely on China's industrial engine. He cited Apple, whose 80 of top 100 suppliers remain China-based, and Nvidia, which still eyes the market. Cook and Huang joined Trump's May Beijing delegation that calmed bilateral tensions.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/26%20Jun%202026/26%20Jun%20SCMP/Why%20Chinese%20competition,%20not%20geopolitics,%20is%20the%20biggest%20challenge%20for%20foreign%20firms.pdf"}]}, "2026-06-29": {"date": "2026-06-29", "dayOfWeek": "Monday", "totalArticles": 60, "sourceCounts": {"WSJ": 13, "ST": 8, "BT": 9, "SCMP": 30}, "executiveDigest": "A fragile US-Iran ceasefire breaks down as Washington launches fresh strikes after Iran hits a Singapore-flagged tanker in the Strait of Hormuz and retaliates against US bases in Kuwait and Bahrain; Trump threatens 100% tariffs on countries taxing US tech, the BIS warns an AI-funding downturn could crash faster than a banking crisis, and the memory-chip boom roars on with Micron up about 16%.", "briefingCards": [{"title": "Lead story - US-Iran ceasefire breaks down", "body": "The Pakistan-brokered US-Iran truce frayed badly. US Central Command struck more than 10 Iranian missile, drone and radar sites on June 26 after Iran's IRGC hit the Singapore-flagged M/V Ever Lovely with a drone in the Strait of Hormuz; Iran then fired missiles and drones at US bases in Kuwait and Bahrain on June 28, and Trump warned the Islamic Republic 'will no longer exist'. Hormuz transits slumped from about 70 vessels to as few as 14. A WSJ analysis found Iran struck 20-plus US sites during the war - total cost near $40 billion - prompting Washington to weigh moving bases westward."}, {"title": "Markets & finance", "body": "The BIS used its Annual Economic Report to warn that record public debt, financial fragilities and an unsustainable AI boom are raising global risks, cautioning that an AI-funding downturn routed through hedge funds and private credit could crash faster than a banking crisis. Memory chips stayed red-hot - Micron jumped about 16%, SK Hynix 13% and Sandisk 22%, with shortages seen beyond 2027 - even as megacap tech fell. Sovereign investors managing US$29 trillion are pivoting to energy assets, and 61% of central banks now say US debt threatens the dollar's reserve status, up from 20% in 2024."}, {"title": "Asia realignment", "body": "China escalated pressure on Japan, adding 20 Japanese entities - including Mitsubishi and Kawasaki units - to an export-control list over alleged 'remilitarisation', while South Korea and Japan reaffirmed Korean-peninsula denuclearisation. Pakistan unsettled India by unveiling a new Chinese-built stealth submarine, and a US report said China now leads in GPS-style positioning, reconnaissance and anti-satellite capabilities. A former minister's warning that Tokyo and Seoul 'only have each other' keeps resonating as US reliability is questioned across the region."}, {"title": "Energy & climate", "body": "Saudi Aramco restarted crude loadings at Ras Tanura's Ju'aymah terminal after a near-four-month halt, and the CPTPP (including Singapore) welcomed the Hormuz reopening while pledging to keep sea lanes open. China unveiled a five-year plan to draw 50% of electricity from nuclear and other non-fossil sources by 2030, backed by over 20 trillion yuan (US$2.9 trillion), and fired up the world's biggest superconducting magnet for a fusion project. Australian energy exploration hit a 10-year high on surging Asian gas demand."}, {"title": "Technology & AI", "body": "The Trump administration partly rolled back its Anthropic ban, letting Mythos 5 return to government-trusted partners while Fable 5 stays restricted and OpenAI delayed its GPT-5.6 rollout over security concerns. The memory boom's long-term threat is innovation itself - Nvidia, Qualcomm and Cerebras are designing around scarce high-bandwidth memory. In Europe, investors chased AI exposure via power suppliers (Schneider, Siemens Energy) and banks, while Meta's AI research chief said agents delivering 'economic value' are the next frontier as Chinese tech workers fear being 'optimised' out of jobs."}, {"title": "Singapore & SEA focus", "body": "Singapore felt the Iran flare-up directly: the vessel struck in Hormuz was Singapore-flagged, and as a CPTPP member the Republic backed keeping the strait open while the bloc advances expansion talks with the UAE, Philippines and Indonesia. On the local market, flexible-workspace firm JustCo's IPO flopped - down 42.6% from its S$0.94 offer - and Royal Group is planning a long-stay serviced-apartment project on Claymore Road. Heavier freight and bad weather caused delays at Singapore's port, while a debate continued over expanded cash access alongside the digital-payments push."}], "keyMetrics": [{"value": "60", "label": "Articles curated today", "sub": "WSJ 13 · ST 8 · BT 9 · SCMP 30"}, {"value": "Truce broken", "label": "US-Iran ceasefire", "sub": "US strikes; Singapore tanker hit"}, {"value": "100%", "label": "Trump tariff threat", "sub": "On digital-services-tax nations"}, {"value": "+16%", "label": "Micron shares", "sub": "Memory shortage seen past 2027"}, {"value": "US$29t", "label": "Sovereign funds pivot", "sub": "To energy; dollar fears deepen"}, {"value": "-42.6%", "label": "JustCo since IPO", "sub": "Flex-workspace debut flops"}], "articles": [{"id": "wsj-01", "title": "Atlanta Fed Search for New Leader Stalls", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "The search for a new Atlanta Fed president has stalled after an April slate of finalists yielded no choice, rebooting a process now in its seventh month. Favorite Rebecca Patterson, a former Bridgewater executive, never reached the second-stage interview with the Fed board; Marc Sumerlin and Michael Faulkender also failed to advance. The delay means new Chairman Kevin Warsh, who took office May 22, will influence the appointment, which carries a 2027 FOMC vote. The vacancy follows Raphael Bostic's February departure; he had faced board concerns over 2022 disclosure violations. White House advisers explored swaying the choice toward a candidate more sympathetic to the administration, though they have no formal role. Heidrick & Struggles is assisting.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Atlanta%20Fed%20Search%20for%20New%20Leader%20Stalls.pdf"}, {"id": "wsj-02", "title": "Democrats Are in a Civil War-and the Far Left Is Gaining Ground", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Politics", "Society"], "summary": "The Democratic Party's internal war escalated after three left-wing candidates won Tuesday's New York primaries, two toppling incumbents, all backed by Mayor Zohran Mamdani. Democratic socialists previously won mayoral races in New York City, Seattle and Washington, D.C., plus House primaries in California and Maine. Centrists are alarmed: 10 House Democrats, including Rep. Tom Suozzi, signed a pledge favoring capitalism over socialism. Third Way noted the three NY districts are 36 points more Democratic than the nation, while target GOP seats favor Republicans by about 8 points. Key battlegrounds include Michigan's Senate primary, where Sanders-backed Abdul El-Sayed leads Rep. Haley Stevens. Trump called the winners \"Communists\" on social media.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Democrats%20Are%20in%20a%20Civil%20War-and%20the%20Far%20Left%20Is%20Gaining%20Ground.pdf"}, {"id": "wsj-03", "title": "How Iran Devastated an American Naval Base-and Caused a U.S. Recalculation", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Defence", "Geopolitics"], "summary": "A WSJ analysis of satellite imagery and footage found Iranian missiles and drones repeatedly hit Naval Support Activity Bahrain between late February and June, damaging the command headquarters, at least a dozen buildings and two satellite-communications terminals. No deaths occurred at the base, but Iran struck at least 20 U.S. sites regionwide, prompting a re-evaluation of America's Middle East footprint. Estimated NSA Bahrain construction costs reached about $400 million; CSIS pegged total war cost near $40 billion, with $2.2-$5.1 billion in base damage. Centcom said Iran fired over 8,000 missiles and drones while the U.S. struck 13,500 targets. The military weighs moving bases west; Israel is among basing options considered. Rubio skipped Saudi Arabia, deepening a rift.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/How%20Iran%20Devastated%20an%20American%20Naval%20Base-and%20Caused%20a%20U.S.%20Recalculation.pdf"}, {"id": "wsj-04", "title": "Saudi Arabia Restarts Crude Loadings at Major Gulf Terminal After Nearly Four-Month Halt", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Energy", "Geopolitics"], "summary": "Saudi Arabia resumed crude loadings at Ras Tanura's Ju'aymah offshore terminal in the Persian Gulf, shipping-tracking data from Kpler showed, after a nearly four-month halt during the Iran war that forced exports via the Red Sea. Two supertankers began loading Thursday at the Saudi Aramco-operated terminal, with a third waiting offshore; each VLCC carries around 2 million barrels. Tanker traffic through the Strait of Hormuz picked up sharply after the U.S. and Iran signed an interim deal, reaching the fastest pace since the war began in late February. Ras Tanura, home to the world's largest offshore oil-loading facility, exported about 6 million barrels a day in last year's final quarter before the Iranian attack and Hormuz closure forced diversion to Yanbu.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Saudi%20Arabia%20Restarts%20Crude%20Loadings%20at%20Major%20Gulf%20Terminal%20After%20Nearly%20Four-Month%20Halt.pdf"}, {"id": "wsj-05", "title": "The Long-Term Threat to the Memory Chip Boom Is Innovation", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Memory chip makers are selling everything they produce, but their biggest customers' innovation poses the longer-term risk. Micron locked up long-term deals with 15 new customers and projects shortage running beyond 2027, citing \"very good visibility to a five-year time horizon.\" Micron shares jumped nearly 16% Thursday, SK Hynix 13%, and Sandisk 22%, while most megacap tech fell; the 10 trillion-dollar companies lost over 2% combined. Apple raised some product prices mid-cycle, citing memory costs. Qualcomm touted \"high-bandwidth compute\" to avoid scarce HBM, Nvidia is redesigning Vera Rubin to use less memory, and Cerebras touted its HBM-free chips. Most Micron deals last five years and lock in price floors beating past peak margins.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/The%20Long-Term%20Threat%20to%20the%20Memory%20Chip%20Boom%20Is%20Innovation.pdf"}, {"id": "wsj-06", "title": "Trump Administration Rolls Back Part of Anthropic Model Ban", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Technology & AI", "Politics"], "summary": "The Trump administration is letting Anthropic reoffer one of its banned AI models, Mythos 5, to dozens of government-trusted companies and partners, Commerce Secretary Howard Lutnick said in a Friday letter to Anthropic Chief Compute Officer Tom Brown. Fable 5, a general-purpose Mythos version, remains restricted, as does Mythos 5 for untrusted entities. The rollback followed two weeks of talks addressing security concerns sparked by Amazon researchers who found a way to evade Fable's safeguards. Anthropic has feuded with the administration for months; Trump earlier called it a \"radical-left, woke company\" but recently praised CEO Dario Amodei. Separately, OpenAI delayed its GPT-5.6 rollout over government security concerns. A new executive order expands cybersecurity officials' role in AI evaluation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Trump%20Administration%20Rolls%20Back%20Part%20of%20Anthropic%20Model%20Ban.pdf"}, {"id": "wsj-07", "title": "Trump Threatens 100% Tariff on European Countries That Impose Digital Services Tax", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Trade", "Technology & AI"], "summary": "President Trump on Friday threatened a 100% tariff on European nations that implement a Digital Services Tax on U.S. tech companies, writing on Truth Social that any such country would \"immediately be met with a 100% TARIFF\" on all goods sent to America. France, Denmark and Portugal already levy such taxes; Trump earlier threatened tariffs on Canada and South Korea, plus a 100% tax on French wines. An EU spokesman called unilateral measures \"unjustified\" and pledged to respond \"swiftly and decisively.\" Trump said the tariff would supersede last year's EU trade pact, which capped most European-goods tariffs at 15%. The EU on Thursday approved promised tariff cuts. The legal authority for immediate imposition remains unclear after February's Supreme Court ruling.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Trump%20Threatens%20100%25%20Tariff%20on%20European%20Countries%20That%20Impose%20Digital%20Services%20Tax.pdf"}, {"id": "wsj-08", "title": "U.S. Launches Fresh Attacks on Iran", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "The U.S. launched fresh strikes on Iran on June 26, one day after Tehran hit a ship in the Strait of Hormuz, signaling a fragile ceasefire could be breaking apart. Centcom said U.S. aircraft struck Iranian missile and drone storage and coastal radar sites after Iran hit the Singapore-flagged M/V Ever Lovely with a one-way attack drone; the vessel sustained no casualties. A senior U.S. official said the ceasefire holds. The Islamic Revolutionary Guard Corps, which carried out the ship attack, vowed to respond. Trump said Iran fired at least four drones; three were shot down. Hormuz transits dipped to 54 Thursday from 70 Wednesday, with just 14 around Friday midday, per Kpler. Iran insists all vessels notify Tehran before crossing.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/U.S.%20Launches%20Fresh%20Attacks%20on%20Iran.pdf"}, {"id": "wsj-09", "title": "Ukrainian Strikes Turn Crimea From Prize Asset to Liability for Putin", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Geopolitics", "Defence"], "summary": "Russian-installed authorities in Crimea declared a state of emergency Friday over a fuel and energy crisis caused by Kyiv's drone blockade of the Black Sea peninsula, which Putin seized in 2014. Ukraine's campaign of more than 100 drone strikes daily has collapsed Crimea's transport and electricity infrastructure as tourism season began. Kyiv destroyed bridges, railways, fuel depots, ferries and ports while targeting fuel trucks crossing via the Novorossiya highway. The crisis comes months ahead of Russian parliamentary elections amid mounting discontent over the war. Some 2,500 vehicles massed Friday to leave via Kerch Bridge, with five-hour waits. Officials banned civilian fuel sales; locals report shortages of bread and sugar and curfews ordering closures by 8 p.m.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Ukrainian%20Strikes%20Turn%20Crimea%20From%20Prize%20Asset%20to%20Liability%20for%20Putin.pdf"}, {"id": "wsj-10", "title": "Wall Street Realizes It Needs More Than Money to Counter Mamdani", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Politics", "Finance & Markets"], "summary": "After Mayor Zohran Mamdani's far-left slate swept Tuesday's New York primaries, beating business-backed incumbents, the city's finance elites are scrambling to respond. Donors and strategists concluded that money alone can't save candidates with a weak ground game and muddled message, while the Democratic Socialists of America's anticapitalist, anti-Israel message won voters. Ideas floated include a Robin Hood Foundation-style giving group and funding get-out-the-vote work. Steven Fulop of the Partnership for New York City called the outcome \"very, very scary.\" Mamdani ally Brad Lander defeated Rep. Dan Goldman, criticizing AIPAC-linked donations. Citigroup earlier pledged $60 billion for affordable housing over five years. Potential mayoral challengers named include Jessica Tisch, Julie Menin and Rep. Ritchie Torres.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Wall%20Street%20Realizes%20It%20Needs%20More%20Than%20Money%20to%20Counter%20Mamdani.pdf"}, {"id": "wsj-11", "title": "Warsh Taps Veteran Fed Economists Daniel Covitz and Eric Engstrom as Advisers - WSJ", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Federal Reserve Chairman Kevin Warsh has tapped two veteran central-bank economists as advisers: Daniel Covitz, a deputy director in research and statistics, and Eric Engstrom, a senior associate director in monetary affairs. Both are longtime staffers at an institution Warsh has pledged to retool since taking over last month. Covitz, with nearly three decades at the Fed, contributed to Warsh's speeches during his 2006-11 governorship; his research covers financial stability and credit markets. Engstrom last year modeled economic scenarios, finding the \"soft landing\" odds gave way by mid-2025 to \"mild stagflation\" risk amid tariff uncertainty. Warsh last week announced five task forces to re-examine Fed communications, data analysis and asset-portfolio management, staffed by outside experts.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Warsh%20Taps%20Veteran%20Fed%20Economists%20Daniel%20Covitz%20and%20Eric%20Engstrom%20as%20Advisers%20-%20WSJ.pdf"}, {"id": "wsj-12", "title": "Who Are Smartglasses for, Exactly?", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Technology & AI", "Society"], "summary": "A deluge of smartglasses has begun, but their purpose remains unclear. Meta's new line starts at $299 and plays well with vision plans; its in-lens display model costs $799, while Snap's just-announced Specs reach $2,195. Google and Samsung will release competing lines this fall via Gentle Monster and Warby Parker, and Apple is reportedly developing its own. Meta has captured over 80% of the market, yet that meant just seven million pairs sold in 2025, versus over 100 million smartwatches and a billion smartphones yearly. Qualcomm's Ziad Asghar envisions niche-specific glasses rather than one universal device. Concerns persist over privacy, screen time and built-in AI. Powerful work models, like Xreal's Aura, offload computing to a pocket puck.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/29%20Jun%202026/29%20Jun%20WSJ/Who%20Are%20Smartglasses%20for%2C%20Exactly.pdf"}, {"id": "wsj-13", "title": "Who Is Troy Rohrbaugh? The Options Trader and Surprise Front-Runner to Succeed Jamie Dimon", "source": "WSJ", "date": "29 Jun 2026", "tags": ["Finance & Markets"], "summary": "JPMorgan Chase on Thursday named Troy Rohrbaugh, 56, co-president and gave him responsibility for Chase Bank and the consumer business, making the former Goldman Sachs foreign-exchange derivatives trader a surprise front-runner to succeed CEO Jamie Dimon. Dimon lured Rohrbaugh in 2005; well-timed 2007-08 trades earned the bank hundreds of millions during the crisis, and he moved JPMorgan from ninth to first
