.pdf"}, {"id": "bt-12", "title": "UK economy claws back some growth as Burnham prepares to take power", "source": "BT", "date": "17 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Britain's economy grew a minimal 0.1 per cent in May, in line with forecasts and reversing April's fall, as services expanded 0.3 per cent but industrial production and construction contracted. Growth over the three months to May was 0.7 per cent, a positive send-off for finance minister Rachel Reeves before her expected replacement by Shabana Mahmood under incoming prime minister Andy Burnham, who replaces Keir Starmer on Monday. The OECD expects 0.9 per cent UK growth in 2026, strongest among major European economies, and urged Burnham to keep budget discipline and address energy prices. Analysts flagged policy uncertainty as a drag. The goods trade deficit narrowed to £18.7 billion as Gulf refined-oil imports fell to zero amid the Strait of Hormuz closure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/UK%20economy%20claws%20back%20some%20growth%20as%20Burnham%20prepares%20to%20take%20power.pdf"}, {"id": "bt-13", "title": "Why national security - not market forces - will define the US-China AI race", "source": "BT", "date": "17 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Defence"], "summary": "This commentary argues the US-China AI race will be shaped by security imperatives, not pure market forces, contending disruption theory cannot explain Beijing blocking Meta's US$2 billion Manus acquisition or Washington's restriction on Anthropic's advanced models, both on national-security grounds. Every major power designates AI dual-use; battlefield use spans Ukrainian drone feeds, autonomous loitering munitions and offensive cyber operations. The author contrasts capitalist closed models with China's state-led approach, warning AI could echo the EV sector's subsidy-driven oversupply, while noting Western labs' losses like OpenAI's US$39 billion. He questions whether \"open\" models like DeepSeek are truly open given data-transmission and intelligence-law concerns, contrasting them with Mistral's \"sovereign AI\" and Singapore's HTX Phoenix.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20BT/Why%20national%20security%20-%20not%20market%20forces%20-%20will%20define%20the%20US-China%20AI%20race.pdf"}, {"id": "scmp-01", "title": "Trump's intense attacks have failed to sway Iran. He's trying again anyway", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Energy", "Defence"], "summary": "Analysts say Donald Trump's ramped-up US air strikes on Iran, now in a sixth day, are unlikely to force concessions and may instead \"harden\" Tehran's position, said the Atlantic Council's Jonathan Panikoff. With an interim ceasefire collapsed, Trump seeks to break Iran's grip on the Strait of Hormuz, driving up oil prices and rattling markets. He has weighed expanding targets to energy plants, bridges, Kharg Island oil hub and a nuclear-linked site, while Iran signalled it could prod Houthi allies to close the Bab al-Mandeb strait. A senior official said \"the only language Iran understands is military might.\" The 4-1/2-month war has killed thousands and dented Trump's ratings before November midterms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/1.%20Trump%E2%80%99s%20intense%20attacks%20have%20failed%20to%20sway%20Iran.%20He%E2%80%99s%20trying%20again%20anyway.pdf"}, {"id": "scmp-02", "title": "Trump accuses China of 'largest compromise of election data in history' in national address", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Trump will deliver a prime-time \"Speech to the Nation,\" expected to cover foreign policy and domestic issues amid low support for the Iran war and looming 2026 midterms. The address, teased by allies as the most critical since the 1962 Cuban Missile Crisis, follows his reinstatement of a US naval blockade on Iran. Despite calling Xi Jinping a \"friend,\" Trump is set to repeat claims of Chinese election interference, alleging China's \"largest compromise of election data in history.\" He says states are being notified of compromised data and cites a Homeland Security probe identifying some 278,000 non-citizens registered to vote. He warned adversaries including Russia, China and North Korea can compromise election infrastructure.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/10.%20Trump%20accuses%20China%20of%20%E2%80%98largest%20compromise%20of%20election%20data%20in%20history%E2%80%99%20in%20national%20address.pdf"}, {"id": "scmp-03", "title": "Why the West has an uphill task challenging China in pharmaceutical ingredients", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Trade", "Geopolitics", "Society"], "summary": "US think tanks warn that China's dominance in pharmaceutical ingredients could become the next critical dependency after rare earths and drones. China supplies 40 per cent of global active pharmaceutical ingredients, while nearly 41 per cent of key starting materials for US-approved drugs are sourced exclusively from China, per Brookings. The Council on Foreign Relations likened the leverage to rare earths, and the Atlantic Council urged cooperation with the EU, India and Mexico. Analysts say Beijing's edge, rooted in decades of industrial scaling, low costs and an integrated ecosystem, is hard to displace. \"Market forces alone are unlikely to rebuild these supply chains quickly,\" said Asia Society's Lizzi Lee, noting rebuilding needs deliberate policy support and generations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/11.%20Why%20the%20West%20has%20an%20uphill%20task%20challenging%20China%20in%20pharmaceutical%20ingredients.pdf"}, {"id": "scmp-04", "title": "China vows helium-trade policy changes as global tightening squeezes gas supplies", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Trade", "Energy", "Technology & AI"], "summary": "China will adjust export controls on helium in response to shifting domestic and global supply, after temporarily suspending overseas shipments last week amid tightening supplies. The Commerce Ministry said the ban complied with foreign trade laws and WTO rules, with spokesman He Yadong saying it aimed to \"safeguard domestic supply.\" Helium, an LNG by-product, is critical for semiconductors, medical equipment and aerospace. China imports more than 85 per cent of its supply, bringing in over 4,900 tonnes last year, up 21.7 per cent, while exporting about 788 tonnes to markets including South Korea, Taiwan and Germany. Global gas supplies have been squeezed by the US-Israeli war on Iran, which shut a major Qatari facility at Ras Laffan.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/12.%20China%20vows%20helium-trade%20policy%20changes%20as%20global%20tightening%20squeezes%20gas%20supplies.pdf"}, {"id": "scmp-05", "title": "Chinese foreign vice-minister Ma Zhaoxu set for US visit in 'temperature test' for Xi", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Chinese foreign vice-minister Ma Zhaoxu is expected in Washington next week to lay groundwork for Xi Jinping's anticipated US visit later this year, the SCMP has learned. Sources said a stop in Miami, host of December's G20 summit, is also likely, suggesting a possible second Xi trip in 2026. \"If Ma's trip materialises, it will serve as a temperature check,\" said Hutong Research's Feng Chucheng, potentially paving the way for a September summit. Trump invited Xi during a May Beijing visit, and Beijing has privately confirmed a September 24 date. Officials floated up to four Trump-Xi meetings this year. Ties show strain after the Pentagon listed firms including Alibaba, owner of the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/13.%20ExclusiveChinese%20foreign%20vice-minister%20Ma%20Zhaoxu%20set%20for%20US%20visit%20in%20%E2%80%98temperature%20test%E2%80%99%20for%20Xi.pdf"}, {"id": "scmp-06", "title": "Does Beijing own Batanes? Why Chinese scholars' claim is a warning shot to Manila", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "Chinese scholars have drawn fierce pushback from Manila by claiming Beijing should hold sovereignty over the Batanes Islands, between Taiwan and Luzon. At a June 30 discussion at Jinan University, scholars including from the Chinese Academy of Social Sciences argued Batanes legally belonged to Taiwan, and thus China, and also claimed the Babuyan Islands. Manila's foreign affairs department rejected the claims, calling its sovereignty \"settled and not up for debate,\" while the National Security Council said they had \"no merit\" and defence chief Gilberto Teodoro dismissed them as \"a joke.\" Analysts said the assertions were a warning shot signalling Beijing's dissatisfaction with Japan-Philippines maritime border talks east of Taiwan. Beijing has not officially commented.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/14.%20Does%20Beijing%20own%20Batanes%20Why%20Chinese%20scholars%E2%80%99%20claim%20is%20a%20warning%20shot%20to%20Manila.pdf"}, {"id": "scmp-07", "title": "China's population ageing seen as 'inevitable' before 2050. Why push more births?", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Society", "Politics"], "summary": "A new Zhongtai Securities report says a rapid rise in China's ageing population before 2050 is \"inevitable,\" even with a fertility recovery, but higher birth rates remain critical to averting a worse crisis later. Even if the total fertility rate rose above 1.3 from about 1.05, the share aged 65 and over would reach 29 per cent by 2050, mirroring Japan. Raising fertility to 1.3 would ease the dependency ratio to 74 per cent by 2100, versus 120 per cent if declines continue. China's population fell for a fourth year in 2025, with births plunging 17 per cent to a record 7.9 million. Analysts say pro-natalist policies work best in rural areas and for families with one child.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/15.%20China%E2%80%99s%20population%20ageing%20seen%20as%20%E2%80%98inevitable%E2%80%99%20before%202050.%20Why%20push%20more%20births.pdf"}, {"id": "scmp-08", "title": "From humanoids to Huawei: what to watch as Xi attends China's WAIC amid US AI rivalry", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "China will use its largest annual AI gathering, the World AI Conference (WAIC) in Shanghai, to showcase ambitions beyond foundation models into autonomous agents, scientific research, humanoid robots and consumer devices, amid US chip restrictions. Xi Jinping attends the opening ceremony and delivers a keynote. The four-day event brings over 1,100 companies and 3,000 exhibits, including 300-plus global debuts. Developers will show 261 large models, including MiniMax's M3, Alibaba's Qwen, SenseTime's SenseNova-U1 Pro and Moonshot's Kimi K2.7 Code. Firms like ZTE's Nubia and Honor teased agent phones, while more than 300 humanoid robots are expected. Beijing rejected Western claims that its open-source AI push is a \"trap.\" Alibaba owns the SCMP.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/16.%20From%20humanoids%20to%20Huawei%20what%20to%20watch%20as%20Xi%20attends%20China%E2%80%99s%20WAIC%20amid%20US%20AI%20rivalry.pdf"}, {"id": "scmp-09", "title": "Anthropic, China and why Pax Silica architect thinks the US can keep the AI lead", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Defence"], "summary": "US undersecretary of state Jacob Helberg defended Washington's sudden restrictions on foreign access to Anthropic's cutting-edge models, saying they were meant to safeguard US and allied critical infrastructure. \"We do not want cyberattacks on our critical infrastructure,\" he told the SCMP. In early June, Commerce barred foreign nationals from using Anthropic's Fable 5 and Mythos 5 models on national security grounds; access was restored three weeks later. Helberg leads the Pax Silica initiative, backed by 22 other nations plus the EU, aimed at building semiconductor supply chains and reducing \"coercive dependencies,\" widely seen as targeting China's rare-earth dominance. The White House also launched Gold Eagle, a clearing house to coordinate cyber-vulnerability detection with leading US AI firms.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/17.%20ExclusiveAnthropic,%20China%20and%20why%20Pax%20Silica%20architect%20thinks%20the%20US%20can%20keep%20the%20AI%20lead.pdf"}, {"id": "scmp-10", "title": "BYD aims to build 3,000 'flash-charging' stations across Europe within months", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Trade", "Energy"], "summary": "Chinese EV giant BYD is building a network of 6,000 charging stations in overseas markets, aiming for 3,000 flash-charging stations across Europe by the end of March 2027, plus 2,000 in the Americas and 1,000 in Asia-Pacific. Its newest stations can give some pure electric models over 900km of range after under 10 minutes of charging. In mainland China, BYD runs over 7,000 flash-charging stations, targeting 20,000 by year-end. Overseas deliveries soared 82.5 per cent to over 471,000 in the first half of 2026. A supplier said the buildout reflects BYD \"internationalising its businesses at a quick pace,\" partly driven by an energy shock from the US-Israel war on Iran. China's carmakers are expected to export 10 million vehicles this year.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/18.%20BYD%20aims%20to%20build%203,000%20%E2%80%98flash-charging%E2%80%99%20stations%20across%20Europe%20within%20months.pdf"}, {"id": "scmp-11", "title": "Nvidia chief Jensen Huang seals Japan robotics push after 'yakitori summit'", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Nvidia CEO Jensen Huang held a \"yakitori summit\" with Japanese executives from semiconductor materials and components companies while visiting Tokyo, a move aimed at strengthening local cooperation. Per Nikkei, he dined at an izakaya near Kanda Station, greeted with applause and proposing a toast. Huang has cultivated ties over meals abroad, previously sharing fried chicken with Samsung's Lee Jae-yong and other Korean chiefs. The dinner was a prelude to Nvidia's Japan investment plans. Fujitsu announced it was leading a major AI push using Nvidia's technology, combining Japan's robotics prowess with \"physical AI.\" The initiative, unveiled with Fujitsu CEO Takahito Tokita, includes top industrial robot makers Fanuc, Yaskawa Electric and Kawasaki Heavy Industries, building on a prior deal.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/19.%20Nvidia%20chief%20Jensen%20Huang%20seals%20Japan%20robotics%20push%20after%20%E2%80%98yakitori%20summit%E2%80%99.pdf"}, {"id": "scmp-12", "title": "US and Iran exchange blows in rekindled Middle East war", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The US struck Iran and Tehran attacked US allies in the Gulf on Thursday as the foes battled over the Strait of Hormuz in a renewed Middle East war, a month after a preliminary deal aimed to end fighting that began in late February. CENTCOM said it conducted a sixth straight night of strikes to \"further degrade Iranian military capabilities.\" Iranian TV reported explosions in Bushehr, home to Iran's only civilian nuclear plant, and blasts near Ahvaz. Iran's Revolutionary Guards said they struck a US airbase in Jordan with ballistic missiles. Kuwait intercepted drones and Bahrain sounded sirens. A senior Iranian spokesman said \"we will never back down over the Strait of Hormuz,\" which Tehran vowed to keep closed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/2.%20US%20and%20Iran%20exchange%20blows%20in%20rekindled%20Middle%20East%20war.pdf"}, {"id": "scmp-13", "title": "Giant models grab headlines, but some Chinese start-ups bet on smaller phone-ready AI", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "As the AI race pushes trillion-parameter models, a parallel contest is heating up over lightweight systems designed to run entirely on smartphones and laptops, promising faster processing, better privacy and lower costs. Beijing-based ModelBest, a prominent on-device AI player, raised more than 5 billion yuan (US$738 million) this year, lifting its valuation to 20 billion yuan. Shanghai-based StepFun, backed by Tencent, unveiled the StepX Neo, which it claimed is the world's first agentic smartphone, plus Step Edge on-device models offering latency as short as 0.1 seconds. The edge-AI push aligns with Beijing's self-reliance drive; home-grown chips suit lightweight training. ModelBest's MiniCPM5-1B was trained entirely on Huawei's Ascend hardware. Apple secured a China licence for Apple Intelligence.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/20.%20Giant%20models%20grab%20headlines,%20but%20some%20Chinese%20start-ups%20bet%20on%20smaller%20phone-ready%20AI.pdf"}, {"id": "scmp-14", "title": "TSMC pledges extra US$100 billion for Arizona fab expansion amid soaring AI chip demand", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Trade"], "summary": "TSMC pledged an additional US$100 billion to expand its Arizona facilities, lifting its total US investment to US$265 billion, as it rushes to meet AI-driven demand. Chairman CC Wei said the firm would proceed \"as fast as possible\" but gave no timeline, citing market and customer demand. The new money targets 2-nanometre and below technologies and advanced packaging fabs for leading US customers. It builds on US$165 billion pledged in March 2025. TSMC raised 2026 capital expenditure to US$60-64 billion. Second-quarter net income jumped 77 per cent to NT$706.6 billion (US$22 billion), beating estimates, with revenue up 36 per cent. The scale-up comes amid US reshoring ambitions; Trump threatened a 100 per cent tariff on foreign chips, exempting committed manufacturers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/21.%20TSMC%20pledges%20extra%20US%24100%20billion%20for%20Arizona%20fab%20expansion%20amid%20soaring%20AI%20chip%20demand.pdf"}, {"id": "scmp-15", "title": "Beijing denounces US chip curbs as threat to global supply chains", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Trade"], "summary": "Beijing condemned US lawmakers' latest efforts to curb Chinese access to leading chips and chipmaking equipment, warning they would cause \"arbitrary disruption and damage\" to global supply chains. The criticism followed reports that three export-control bills, the AI Overwatch Act, the Match Act and the Chip Security Act, are set to be folded into the National Defence Authorisation Act in the Senate, marking a new escalation. Chinese embassy spokesman Liu Chang said Beijing \"firmly rejects\" inserting negative content about China, urging the US to stop \"politicising, weaponising and ideologising\" trade and tech. China hawks welcomed the move, as the NDAA is seen as \"must-pass\" legislation. The bills advance even as the Trump administration loosened some curbs, allowing Nvidia H200 sales to China.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/22.%20Beijing%20denounces%20US%20chip%20curbs%20as%20threat%20to%20global%20supply%20chains.pdf"}, {"id": "scmp-16", "title": "Race against Tesla: China EV maker Xpeng to launch viral humanoid globally in 2027", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Technology & AI", "Trade"], "summary": "Chinese EV maker Xpeng expects to produce more than 1,000 humanoid robots a month by the end of 2026 as it competes with Tesla to dominate physical AI. The Guangzhou carmaker said its capacity would pave the way for a global launch of Iron, its next-generation humanoid, with commercial deliveries projected in 2027. CEO He Xiaopeng projects sales of 1 million robots by 2030. Iron runs on Xpeng's Vision-Language-Action 2.0 model, converting visual data directly into motion. \"Xpeng is rebuilding its image as a global contender in physical AI,\" said Suolei's Eric Han. Tesla is shifting to physical AI, converting its Fremont plant to build robots, but has yet to sell its Optimus. China maintains an edge in the robotic supply chain.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/23.%20Race%20against%20Tesla%20China%20EV%20maker%20Xpeng%20to%20launch%20viral%20humanoid%20globally%20in%202027.pdf"}, {"id": "scmp-17", "title": "Iran says Strait of Hormuz a 'red line', vows to fight till the end", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Iran said the Strait of Hormuz was an inviolable \"red line,\" warning that if Trump carried out threats to attack its infrastructure, it would strike all infrastructure across the Gulf. The US intensified strikes early Thursday, hitting targets further north and firing on a ship accused of breaking its naval blockade; Iran retaliated with missiles and drones targeting US allies. Officials say US strikes have killed more than 35 and wounded over 300. Top negotiator Mohammad Bagher Ghalibaf declared \"we are in an essential and existential war with America.\" Army spokesman Mohammad Akraminia said Iran controls Hormuz, which carried about a fifth of global oil and gas shipments. Iran says reopening requires US compliance with the 14-point June memorandum.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/3.%20Iran%20says%20Strait%20of%20Hormuz%20a%20%E2%80%98red%20line%E2%80%99,%20vows%20to%20fight%20till%20the%20end.pdf"}, {"id": "scmp-18", "title": "US to focus counterterrorism efforts on left-wing groups, Rubio says", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics", "Society"], "summary": "US Secretary of State Marco Rubio told officials from more than 60 countries that Washington would refocus international counterterrorism on what he called \"far-left terror,\" arguing left-wing violence had long been overlooked. He said Islamic militancy was \"severely diminished\" while left-wing violence was a \"blind spot,\" citing a transnational threat. The Washington conference sparked Democratic concerns the Trump administration is politicising counterterrorism and diverting resources. Trump has prioritised countering left-wing groups, singling out antifa and vowing action after activist Charlie Kirk's killing. Since November, Washington designated four European groups, including Antifa Ost, as Foreign Terrorist Organisations, offering rewards up to US$10 million. Rubio announced a new visa restriction policy and said more designations would come soon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/4.%20US%20to%20focus%20counterterrorism%20efforts%20on%20left-wing%20groups,%20Rubio%20says.pdf"}, {"id": "scmp-19", "title": "US to toughen up visa regulations for Chinese journalists, foreign students", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Politics", "Geopolitics", "Society"], "summary": "The White House moved to tighten visa rules for foreign students, media and exchange participants, including stricter limits on Chinese journalists, in its latest immigration crackdown. In one of the most sweeping changes in decades, Homeland Security announced a final rule setting fixed admission periods for F student, J exchange and I media visa classes, eliminating what it called a \"duration of status loophole.\" DHS Secretary Markwayne Mullin said the old approach let thousands abuse the system by perpetually enrolling. The rules take effect 60 days after Federal Register publication. Most foreign journalists' admission drops from up to five years to 240 days, but Chinese journalists would be limited to 90-day stays, a proposal Beijing condemned as discriminatory. Legal experts warn of economic harm.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/5.%20US%20to%20toughen%20up%20visa%20regulations%20for%20Chinese%20journalists,%20foreign%20students.pdf"}, {"id": "scmp-20", "title": "Rubio says 25% US tariffs on some Brazilian goods price for Lula's 'ego'", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Trade", "Politics", "Finance & Markets"], "summary": "The US will begin charging a 25 per cent tariff on certain Brazilian imports following a year-long investigation alleging unfair trade practices, effective July 22. The US Trade Representative said Brazil's practices were \"unreasonable and discriminatory,\" restricting American farmers, workers and exporters. Coffee, beef and certain ethanol products are exempt, though ethanol faces the new tariffs. Brazil denounced the levies, saying \"there is no justification for unilateral measures against our country,\" and vowed to diversify trade partnerships. The Section 301 probe called out Brazil's electronic payments service Pix, which the US says unfairly disadvantages American providers. President Lula da Silva has portrayed Pix as a symbol of technological sovereignty. Trump was expected to \"sign something\" on the tariffs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/6.%20Rubio%20says%2025%25%20US%20tariffs%20on%20some%20Brazilian%20goods%20price%20for%20Lula%E2%80%99s%20%E2%80%98ego%E2%80%99.pdf"}, {"id": "scmp-21", "title": "Ex-World Bank official warns to diversify away from US markets, people 'will suffer'", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "A coordinated push toward global market diversification is urgently needed to shield savers from a dangerous correction in highly concentrated US equities, former World Bank vice-president Ian Goldin warned in Hong Kong. Now an Oxford professor, Goldin said inflated valuations of a handful of US tech giants left investors worldwide vulnerable, citing a recent correction in SpaceX's valuation. Although the US economy is less than 20 per cent of global GDP, more than 70 per cent of globally listed equities and bonds remain concentrated in US markets. \"This affects pensioners, poor people,\" he said, warning \"people around the world will suffer.\" His call echoes Beijing's efforts to position Chinese markets as a diversification destination; PBOC governor Pan Gongsheng touts Chinese assets.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/7.%20Ex-World%20Bank%20official%20warns%20to%20diversify%20away%20from%20US%20markets,%20people%20%E2%80%98will%20suffer%E2%80%99.pdf"}, {"id": "scmp-22", "title": "Dutch Prime Minister Rob Jetten set to visit China next spring: sources", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Geopolitics", "Trade", "Politics"], "summary": "Dutch Prime Minister Rob Jetten is set to visit China next spring, two sources told the SCMP. It would be his first Beijing trip since taking office in February and the first by a Dutch premier since the Nexperia saga plunged bilateral ties into crisis last year. He arrives as The Hague is squeezed by the US-China tech war, with Washington pushing to further restrict ASML sales to China. Analyst Frans-Paul van der Putten said the Dutch government wants stable ties and has been forced to diversify as Washington proves a less reliable ally. The Hague sent food security and trade ministers earlier this year, with an Economy Minister visit under consideration, dependent on an inquiry into Wingtech's management of Nexperia.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/8.%20ExclusiveDutch%20Prime%20Minister%20Rob%20Jetten%20set%20to%20visit%20China%20next%20spring%20sources.pdf"}, {"id": "scmp-23", "title": "Ukraine's Patriot missile request tests Japan's pacifist limits", "source": "SCMP", "date": "17 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Ukrainian President Volodymyr Zelensky said Kyiv was keen to work with Japan's Mitsubishi Heavy Industries to manufacture Patriot missiles, after Trump said Washington would license Ukraine to produce the weapons. Mitsubishi is among firms approved by the US to make Patriots, which have helped Ukraine intercept Russian ballistic and hypersonic missiles amid a severe shortage. Japan has provided billions in aid since the war began in February 2022. Analysts say Tokyo is unlikely to agree; \"Tokyo is not ready for Ukraine's request to co-produce lethal weapons,\" said Adelaide's Purnendra Jain, noting Japan bars lethal weapons exports to warring states. Tokyo must also weigh China-Japan ties, which have \"hit rock bottom\" over PM Sanae Takaichi's Taiwan remarks, given close China-Russia ties.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/17%20Jul%202026/17%20Jul%20SCMP/9.%20Ukraine%E2%80%99s%20Patriot%20missile%20request%20tests%20Japan%E2%80%99s%20pacifist%20limits.pdf"}]}, "2026-07-20": {"date": "2026-07-20", "dayOfWeek": "Monday", "totalArticles": 68, "sourceCounts": {"WSJ": 21, "ST": 8, "BT": 12, "SCMP": 27}, "executiveDigest": "The US and Iran crept toward a wider war as American airstrikes followed troop deaths and Trump threatened Iran's fortified 'Pickaxe Mountain'; his fresh claims of Chinese election-meddling stirred US-China tensions amid a week of policy U-turns, while a China-driven AI surge - Alibaba calling its new Qwen model second only to Claude, and Moonshot's advances - fuelled a Wall Street chip selloff, and Singapore's Q2 growth eased even as AI demand drove GDP.", "briefingCards": [{"title": "Lead story - US and Iran creep toward wider war", "body": "The US and Iran edged toward a broader conflict: US airstrikes targeted Iran after American troop deaths, Trump said the US 'hit Iran very hard', and he threatened to bomb Iran's fortified 'Pickaxe Mountain'. The Houthi threat to Saudi Arabia's Red Sea oil-export route is growing, and the UAE is trialling a Hormuz workaround to bypass the chokepoint at its economic heart, while Chinese shipbuilders snap up supertanker orders as the turmoil drags on. Separately, Trump stirred fresh US-China tensions with claims Beijing meddled in US elections - part of what WSJ called a week of policy U-turns and election allegations - as his military-funding demands collided with GOP politics."}, {"title": "Markets & finance", "body": "A China-driven AI surge rattled US chips: Moonshot AI added fuel to a Wall Street chip selloff, and Nvidia - challenged by Apple - only narrowly retained Wall Street's crown. WSJ warned sky-high deficits threaten the bond market, US import prices unexpectedly rose in June, and BT asked how long until a 'US markets reckoning over Trump's damage'. Beijing stepped in with US$8.9 billion of state stock purchases to stem a decline, gold is testing whether a US$4,000 floor can hold, and BT flagged that South Korea's AI-heavy market is now setting the tone for global stocks - 'we are all Korean investors now'."}, {"title": "Asia realignment", "body": "China pressed its AI-and-resources advantage: Alibaba said its newest Qwen model is second only to Anthropic's Claude Fable 5 and unveiled an open-source stack targeting Nvidia's software moat, while Chinese Nvidia alternatives projected massive sales. Xi Jinping warned against creating 'new historical injustices' in the AI era. Meanwhile the US is 'trampling allies' in the global hunt for rare earths, a Chinese firm demanded UK compensation over British Steel's nationalisation, and SCMP noted America's own China expertise is fading. Lebanon's president heads to the White House to press for an Israeli withdrawal."}, {"title": "Energy & climate", "body": "Energy stayed central to the geopolitics: gas prices are set to stay higher for longer even if oil falls, the Houthi threat menaces Saudi oil exports, and China ramped up ethylene output - 'industrial gold' - amid Iran-war disruptions. SCMP flagged the AI boom's 'dirty secret', the coal that powers it, even as investors turned upbeat on the long-delayed ASEAN power grid and China touted city-level 'clean-power AI token factories'. More provocatively, one piece asked whether the atmosphere itself - 'weather weapons' - could become the next geopolitical battleground."}, {"title": "Technology & AI", "body": "The AI race went structural: SpaceX is in talks to supply computing power for the Pentagon's AI push, Meta plans to hire a top Amazon cloud executive as it weighs a cloud play, and Chinese tech giants from Ant to Tencent are deploying AI agents to win enterprise clients. A new 'AI token' economy is emerging as a corporate currency, though BT cautioned 'AI is running on borrowed money'. In Singapore, OpenAI is expanding its team amid surging Apac startup demand, while rising AI bills are pushing local firms to chase ROI over 'tokenmaxxing'."}, {"title": "Singapore & SEA focus", "body": "AI demand drove Singapore's GDP even as Q2 growth eased and global chipmakers were hit, and DBS's S$200 billion market-cap milestone prompted debate on creating more high-performing big-caps. OpenAI is expanding its Singapore team on surging Apac demand, and rising AI bills are pushing companies toward measurable ROI. On property, Lentor Gardens Residences sold 54% of 499 units over its launch weekend as mall owners reposition amid a shifting consumer landscape. Investors turned upbeat on the long-delayed ASEAN power grid, and Singapore is working to nurture global business champions."}], "keyMetrics": [{"value": "68", "label": "Articles curated today", "sub": "WSJ 21 · ST 8 · BT 12 · SCMP 27"}, {"value": "Wider war", "label": "US strikes Iran", "sub": "After US troop deaths"}, {"value": "Chip selloff", "label": "China AI surge", "sub": "Alibaba Qwen challenges Nvidia"}, {"value": "US$8.9b", "label": "Beijing stock buying", "sub": "State steps in to stem decline"}, {"value": "S$200b", "label": "DBS market cap", "sub": "Milestone; big-cap debate"}, {"value": "Q2 eases", "label": "Singapore GDP", "sub": "AI demand up; chipmakers hit"}], "articles": [{"id": "wsj-01", "title": "AI's Wider Availability Is Good for China, Not Great for OpenAI and Anthropic", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "AI is becoming a widely available commodity as prices plunge, lightweight models proliferate and the compute bottleneck eases. Xi Jinping championed open-weights models in a Shanghai speech, while Chinese systems like GLM 5.2 and Kimi K3 catch up to top U.S. labs. On OpenRouter, the top five models are Chinese, handling roughly 45% of tracked tokens. ChatGPT's global consumer share fell below 50% in March amid Gemini and Claude competition. Commoditization is driven by diffusion of AI knowledge and distillation, which Microsoft's Satya Nadella defended as \"ironic\" to restrict. Poised for IPOs, OpenAI and Anthropic face price wars and mounting data-center spending that threaten their competitive edge and future profitability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/AI%E2%80%99s%20Wider%20Availability%20Is%20Good%20for%20China,%20Not%20Great%20for%20OpenAI%20and%20Anthropic.pdf"}, {"id": "wsj-02", "title": "China's Moonshot AI Adds More Fuel to Wall Street's Chip Selloff", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "China's Moonshot AI unveiled its Kimi K3 large language model Friday, intensifying a chip-stock selloff and stoking \"DeepSeek 2.0 concerns.\" The PHLX Semiconductor index, holding Nvidia, Broadcom and Micron, plunged 10% for the week, its steepest drop since April 2025, entering bear-market territory. The S&P 500 fell 1% and the Nasdaq slid 1.4%. Billed as the world's largest open-source model, Kimi K3 topped Anthropic's Opus 4.8 and OpenAI's GPT 5.5 on some coding benchmarks. Cheaper, customizable open-weight models threaten frontier labs whose compute demand underpins U.S. capital spending. Netflix fell 7.3% and SpaceX dropped 5.4% after aborting a Starship test. The Dow shed 0.8%, or 407 points.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/China%E2%80%99s%20Moonshot%20AI%20Adds%20More%20Fuel%20to%20Wall%20Street%E2%80%99s%20Chip%20Selloff.pdf"}, {"id": "wsj-03", "title": "Gas Prices Will Stay Higher for Longer, Even if Oil Falls", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Energy", "Finance & Markets"], "summary": "Trump has calmed crude markets during the Iran war, but has less sway over gasoline prices that matter more to consumers. U.S. crude hovers near $80 a barrel, about 18% above pre-war levels, while gasoline is 32% higher at $3.94 a gallon. Gasoline crack spreads average 90 cents, a four-year high. Crude had shock absorbers—China slashed imports to 5.7 million barrels a day and reserves were released—but fuel markets lacked buffers. Conflict curtailed refining in the Middle East and Russia, which banned diesel exports. Global gasoline inventories run below average. In the U.S., higher biofuel-blending quotas added compliance-credit costs of 14 cents a gallon, keeping fuel prices elevated even if Hormuz reopens.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Gas%20Prices%20Will%20Stay%20Higher%20for%20Longer,%20Even%20if%20Oil%20Falls.pdf"}, {"id": "wsj-04", "title": "Houthi Threat to Saudi Arabia's Red Sea Oil-Export Route Is Growing", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "Escalating hostilities between Saudi Arabia and Yemen's Iran-backed Houthis threaten a crucial oil-export route the kingdom uses to bypass the blocked Strait of Hormuz. A pipeline carries crude west to a Red Sea port, letting tankers sail through Bab al-Mandeb to Asian markets. The Houthis fired drones and missiles at a Saudi airport after accusing Riyadh of bombing San'a's runway, and their leader threatened Saudi oil facilities, declaring \"airports for airports, seaports for seaports.\" A 2022 truce is breaking down. Saudi Arabia exports about four million barrels a day via the Red Sea, down from 7.3 million pre-war. Capital Economics warns simultaneous waterway closures could tip the global economy into recession.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Houthi%20Threat%20to%20Saudi%20Arabia%E2%80%99s%20Red%20Sea%20Oil-Export%20Route%20Is%20Growing.pdf"}, {"id": "wsj-05", "title": "How Sky-High Deficits Threaten the Bond Market", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Near-record peacetime deficits force the U.S. to issue roughly $2 trillion a year in extra Treasurys as the market's structure grows fragile. Surface metrics look healthy—$1.2 trillion daily turnover, solid auction bids—but the 30-year yields 0.5 point above the 10-year, signaling wariness over deficits and inflation. Dealers now buy just 10-15% of auction Treasurys, down from 40-50% in 2010. \"Price insensitive\" holders fell to 52% from 75% in 2007. Hedge funds' share jumped to 8.5%, funded by fragile repo loans that could trigger fire sales like March 2020. Fed Chair Kevin Warsh disavowed bailouts but flagged a crisis escape clause. Trump is tinkering with markets rather than cutting deficits.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/How%20Sky-High%20Deficits%20Threaten%20the%20Bond%20Market.pdf"}, {"id": "wsj-06", "title": "Meta Plans to Hire Top Amazon Computing Executive Dave Brown as It Weighs Cloud Push", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Dave Brown, one of Amazon Web Services' most senior executives, plans to join Meta Platforms within weeks to focus on its data-center build-out, reporting to infrastructure head Santosh Janardhan. The move signals Meta's growing ambitions in computing and a possible cloud business. Meta and Anthropic have discussed an early-stage deal for Meta to rent extra compute to the AI startup. CEO Mark Zuckerberg said a cloud is \"definitely on the table,\" with firms approaching Meta weekly for compute. Meta expects $125-$145 billion in capital expenditures this year, much for AI data centers. Brown, a 19-year Amazon veteran and S-team member, joins amid soaring demand for infrastructure talent. AWS posted $37.6 billion first-quarter revenue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Meta%20Plans%20to%20Hire%20Top%20Amazon%20Computing%20Executive%20Dave%20Brown%20as%20It%20Weighs%20Cloud%20Push%20-%20WSJ.pdf"}, {"id": "wsj-07", "title": "Nvidia, Challenged by Apple, Narrowly Retains Wall Street's Crown", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Apple momentarily overtook Nvidia as the most valuable U.S. public company Friday before Nvidia closed slightly ahead at $4.908 trillion versus Apple's $4.902 trillion. Apple's market cap hit $4.91 trillion intraday. Nvidia, Wall Street's darling amid chip scarcity, has been volatile as doubts grow over the AI build-out; its stock is up 15.7% over the year but 15% below its May high, when it peaked near $5.5 trillion. Apple rose 57.8%, buoyed by iPhone 17 sales and a coming Siri AI, shrugging off memory-chip cost hikes. Nvidia dethroned Microsoft last June and has led for 266 trading days. Alphabet trails at $4.2 trillion, with pending Anthropic and OpenAI IPOs threatening the hierarchy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Nvidia,%20Challenged%20by%20Apple,%20Narrowly%20Retains%20Wall%20Street%E2%80%99s%20Crown.pdf"}, {"id": "wsj-08", "title": "Saab Backs Guidance as Defense Demand Remains Strong", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Defence", "Finance & Markets"], "summary": "Swedish defense company Saab backed its medium-term growth guidance after signing several large orders, citing continued strong demand amid the Ukraine war and Middle East conflict. CEO Micael Johansson said customers keep investing in immediate readiness and long-term capabilities. Saab booked its largest-ever export deal in the second quarter, a 47 billion kronor ($4.87 billion) agreement to deliver three submarines to Poland. Since quarter-end it signed a 24.6 billion kronor deal for 16 Gripen jets to Ukraine, was selected by NATO for up to 10 GlobalEye surveillance aircraft, and won an 8.7 billion kronor German frigate order. Saab still targets around 22% organic sales growth for 2023-27. Second-quarter net profit rose to 2.14 billion kronor as sales climbed 28%.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Saab%20Backs%20Guidance%20as%20Defense%20Demand%20Remains%20Strong.pdf"}, {"id": "wsj-09", "title": "SpaceX in Talks to Provide Computing Power for Pentagon's AI Push", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Defence"], "summary": "SpaceX is in talks with the Defense Department to provide data-center capacity worth up to several billion dollars for running AI models, deepening Elon Musk's Pentagon ties. The talks are ongoing and could collapse. SpaceX has signed similar deals with Anthropic and Google and plans to expand cloud computing, aiming to undercut providers like CoreWeave. Some officials worry the Pentagon is too reliant on Musk. The department recently approved SpaceX, Amazon, Google, Microsoft and Oracle for classified AI use, seeking to avoid single-provider lock-in. The Pentagon wants $30 billion for an \"Artificial Intelligence Arsenal\" focused on high-end chips. SpaceX, which absorbed xAI and went public, built massive Memphis data centers. Compute deals could yield tens of billions in annual revenue.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/SpaceX%20in%20Talks%20to%20Provide%20Computing%20Power%20for%20Pentagon%E2%80%99s%20AI%20Push.pdf"}, {"id": "wsj-10", "title": "The Investors With a New Way to Win in Silicon Valley", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "A new generation of investors is transforming venture capital as companies stay private far longer, locking the public out of key wealth-creation phases. Spark Capital's Yasmin Razavi, the only outside investor on Anthropic's board, led its Series C in May 2023 when others balked at a $4 billion valuation. SpaceX's IPO and expected Anthropic and OpenAI debuts have vaulted little-known firms like Spark, Gigafund and Greenoaks atop the investing world. Rather than seeking influence, they write check after check to help startups scale—a riskier, IPO-like model. U.S. startups raised $321 billion last year versus $84 billion in 2016; average late-stage rounds swelled past $1 billion. Michael Moritz says \"the business has changed entirely.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20Investors%20With%20a%20New%20Way%20to%20Win%20in%20Silicon%20Valley.pdf"}, {"id": "wsj-11", "title": "The SAVE America Act: Key Provisions and Political Hurdles for Trump's Election Bill", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Politics", "Society"], "summary": "After alleging in a prime-time speech that U.S. elections were compromised, Trump pressed Congress to pass the SAVE America Act, which would require approved voter ID and documentary proof of citizenship to register for federal elections and let officials purge noncitizens anytime. Trump demands an expanded version banning most mail-in voting and restricting transgender healthcare and sports participation. Democrats warn it could disenfranchise millions, and some Republicans say it is unworkable before the midterms. The Senate has voted five times without passage, needing 60 votes; House versions stalled. In 2024, 37% of Democrats voted by mail versus 24% of Republicans. Qualifying citizenship documents include passports and birth certificates; a REAL ID alone won't necessarily suffice.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20SAVE%20America%20Act%20Key%20Provisions%20and%20Political%20Hurdles%20for%20Trump%E2%80%99s%20Election%20Bill.pdf"}, {"id": "wsj-12", "title": "The Tax Strategy for People Suffering From Stock-Market Success", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "A long bull market leaves investors with concentrated winners they can't diversify without triggering huge capital-gains taxes. One solution is a 351 exchange, where investors contribute stocks or ETFs to a launching ETF and receive equal-value shares, deferring tax until sale and gaining instant diversification. Held until death, heirs get a stepped-up basis that erases most gains. Since 2021, at least 80 ETFs launched this way, raising over $18 billion; Plancorp clients contributed $361 million to one Dimensional fund. But federal rules cap a single stock at 25% of the contributed portfolio and five stocks at 50%, so heavily concentrated holders often don't qualify. The Treasury Department is reportedly weighing clearer guidance, though a block is not expected.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20Tax%20Strategy%20for%20People%20Suffering%20From%20Stock-Market%20Success.pdf"}, {"id": "wsj-13", "title": "The U.K. Gets Another New Leader on Monday. His First Task: Reassure the Markets.", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Andy Burnham, the Manchester mayor who executed an understated coup, becomes Britain's sixth prime minister in seven years, formalized by King Charles on Monday. The telegenic 56-year-old, a lawmaker only since last month, won the Labour leadership uncontested after Keir Starmer resigned following dire local-election results behind Reform UK. Burnham has floated decentralizing power, tax reform, nationalizing utilities and scrapping the electoral system, but faces tight fiscal limits: gilt yields are the G7's highest, the tax burden is the heaviest since World War II, and debt is 94% of output. Investors, scouring his Reddit posts, will punish lavish spending. His first task is reassuring markets, though analysts doubt his plans will lift growth before the next election.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20U.K.%20Gets%20Another%20New%20Leader%20on%20Monday.%20His%20First%20Task%20Reassure%20the%20Markets..pdf"}, {"id": "wsj-14", "title": "The U.S. Is Trampling Allies in the Global Hunt for Rare Earths", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Trade", "Defence"], "summary": "Europe's push to loosen Beijing's grip on critical minerals has hit a snag: America's deep pockets. The U.S. is on a global shopping spree for rare earths needed for jet fighters, tanks and ammunition, outspending Europe and sparking fears an increasingly protectionist Trump administration will hoard supplies and leave Europeans dependent on China. Over five years to February, the U.S. allocated about $46 billion for critical raw-material projects, roughly eight times the EU's level, per a French think tank. Washington negotiated preferential access in Congo and Ukraine and uses Export-Import Bank financing tied to selling into the U.S. The Pentagon ordered contractors to remove Chinese rare earths by next year. Officials call the U.S. both a potential partner and competitor.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20U.S.%20Is%20Trampling%20Allies%20in%20the%20Global%20Hunt%20for%20Rare%20Earths.pdf"}, {"id": "wsj-15", "title": "The U.S. and Iran Creep Toward a Wider War With Escalating Attacks", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "Fighting between the U.S. and Iran has expanded, with American forces striking a broader range of targets and moving jet fighters into the Middle East while Tehran launches attacks across the Persian Gulf. The conflict centers on control of the Strait of Hormuz after a deal to open the waterway collapsed last week. The U.S. is hitting bridges and interior targets to pressure Iran, including near Bandar Abbas, which handles 90% of container traffic, and repeatedly striking Chabahar. Oil prices have risen more than 10% this week. More than 2,000 Marines are operating in the region enforcing a port blockade. An Iran expert warned \"this escalation is rapidly intensifying,\" with a risk of total war neither side wants.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/The%20U.S.%20and%20Iran%20Creep%20Toward%20a%20Wider%20War%20With%20Escalating%20Attacks.pdf"}, {"id": "wsj-16", "title": "Trump Has Threatened to Bomb Iran's Pickaxe Mountain. What Is Hidden There?", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "As Trump escalates rhetoric against Iran, he has named a new target: Pickaxe Mountain, a subterranean complex under construction near the Natanz nuclear site. \"Pickaxe Mountain is a possible target for a nice big fat shot,\" Trump told broadcaster Hugh Hewitt. Iran began the site in 2020 after sabotage damaged Natanz, and an official said it would house \"sensitive\" equipment. Construction appears incomplete and it wasn't struck in earlier attacks. Former U.S. and Israeli officials argue it could help Tehran revive its nuclear program. Sitting over 5,200 feet up, it has hardened tunnels at 100 and 145 meters below the peak, suggesting multiple levels. A think tank estimated a workspace exceeding 53,000 square feet. Iran has denied the IAEA design information.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Trump%20Has%20Threatened%20to%20Bomb%20Iran%E2%80%99s%20Pickaxe%20Mountain.%20What%20Is%20Hidden%20There.pdf"}, {"id": "wsj-17", "title": "Trump Stirs China Tensions With Claims That It Meddled in U.S. Elections", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Trump's televised claim Thursday that China interfered in the 2020 U.S. elections adds a new irritant to a tenuous detente with Beijing already strained by trade and tech competition. The allegations jarred with the calm since his May Beijing trip, where he and Xi Jinping sought to stabilize ties. China denied meddling, with spokesman Lin Jian saying the claims \"have no factual ground.\" Analysts say the remarks, driven by domestic politics ahead of November midterms where Republicans risk losing Congress, are unlikely to derail relations unless followed by punitive measures. A Fudan scholar cited GOP pressure over inflation and weak economic satisfaction. A March 2021 U.S. assessment found Beijing considered but ultimately didn't deploy a 2020 influence campaign.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Trump%20Stirs%20China%20Tensions%20With%20Claims%20That%20It%20Meddled%20in%20U.S.%20Elections.pdf"}, {"id": "wsj-18", "title": "Trump's Man in Canada Practices a No-Holds-Barred Diplomacy", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Geopolitics", "Politics", "Trade"], "summary": "U.S. Ambassador to Canada Pete Hoekstra, a former Michigan Republican congressman, has become a household name in Ottawa by embracing Trump's blunt tone. His July Fourth guest list included Tamara Lich, under house arrest for leading the 2022 \"Freedom Convoy\" blockades. Hoekstra has called Canadian responses to Trump's 51st-state talk \"nasty,\" demanded a newspaper apology, and drawn rebukes for undiplomatic behavior. He says he came to represent the president, not to be liked. Trump's tariffs and annexation threats have strained the neighbors' bonds, weighing on Canadian manufacturing and clouding North American free trade. A Pew poll found just 35% of Canadians now see the U.S. as a reliable partner, down from 83% in 2022, which Hoekstra called \"a problem.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Trump%E2%80%99s%20Man%20in%20Canada%20Practices%20a%20No-Holds-Barred%20Diplomacy.pdf"}, {"id": "wsj-19", "title": "Trump's Military-Funding Demands Collide With Internal GOP Politics", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Politics", "Defence"], "summary": "House Republicans are advancing extra military spending four months into the Iran war, but the package is far smaller than Trump sought and its passage is uncertain amid party divides. The Budget Committee advanced a $95 billion framework providing up to $73 billion in defense and intelligence funding, $12 billion in farm assistance and $10 billion to tighten voting rules. Speaker Mike Johnson aims to pass it before the August recess. Some GOP lawmakers call it dead on arrival, citing missing spending cuts and lack of Iran-war details; the narrow 219-212 majority allows few defections. Democrats questioned funding an \"unauthorized\" war. The Senate is cool; Majority Leader John Thune doubts 50 votes exist, asking \"is the juice worth the squeeze?\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Trump%E2%80%99s%20Military-Funding%20Demands%20Collide%20With%20Internal%20GOP%20Politics.pdf"}, {"id": "wsj-20", "title": "Trump's Week of Policy U-Turns and Election Allegations", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Trump's prime-time Thursday address casting doubt on U.S. election integrity capped a week of decisions that baffled senior Republicans, many of whom opposed the speech. Eighteen months into his second term, the president has little interest in hearing no, brushing aside advice to stop relitigating the 2020 election and empowering loyalists over moderating voices. Watching were Bill Pulte, acting director of national intelligence, and journalist John Solomon, both given authority to probe election fraud; some aides fear Pulte will funnel unverified information. Republicans worry Trump is neglecting cost-of-living concerns and the grinding Iran war ahead of midterms where they risk losing Congress. The week also featured high-profile policy U-turns as Trump pressed his SAVE America Act.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/Trump%E2%80%99s%20Week%20of%20Policy%20U-Turns%20and%20Election%20Allegations.pdf"}, {"id": "wsj-21", "title": "U.S. Import Prices Unexpectedly Rise in June", "source": "WSJ", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Trade"], "summary": "U.S. import prices unexpectedly ticked up in June from May, driven by nonfuel imports as petroleum prices finally pulled back, Bureau of Labor Statistics data showed. Overall import prices rose 0.3%, less than the downwardly revised 1.7% increase in May. Year-on-year, prices were up 7.1%. Import prices exclude duties such as Trump-administration tariffs, as well as transportation costs. Petroleum import prices fell 0.7%, offering relief after the Iran war drove crude sharply higher earlier this year, while prices for nonpetroleum imports rose 0.5%, offsetting the lower fuel costs.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20WSJ/U.S.%20Import%20Prices%20Unexpectedly%20Rise%20in%20June.pdf"}, {"id": "st-01", "title": "7th PM in a decade: Is Andy Burnham and Labour's survival tactic a cure for UK's woes?", "source": "ST", "date": "20 Jul 2026", "tags": ["Politics", "Finance & Markets"], "summary": "Andrew Burnham, 56, becomes Britain's seventh prime minister in a decade on July 20, taking over from Keir Starmer after Labour's historic May 2026 local election defeats. The former Manchester mayor won an uncontested leadership \"coronation\" and promises the most radical economic rupture in 50 years, vowing to reverse Thatcher-era privatisation by renationalising water, energy and transport, starting with Thames Water. He also plans to shift government functions from London to Manchester. Analysts warn the midterm-replacement mechanism is a party survival tactic, not a cure for deep problems: 95 per cent debt-to-GDP, stagnant incomes and NHS decay. Markets may punish his left-wing tilt, echoing Liz Truss's 49-day collapse, while allies question Britain's reliability.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/7th%20PM%20in%20a%20decade%20Is%20Andy%20Burnham%20and%20Labour's%20survival%20tactic%20a%20cure%20for%20UK's%20woes.pdf"}, {"id": "st-02", "title": "AI demand drives Singapore GDP but Q2 growth eases; global chipmakers hit hard", "source": "ST", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Singapore's economy grew 5.7 per cent year on year in the second quarter of 2026, easing from the first quarter's 6.3 per cent but beating the 5.5 per cent forecast, MTI said on July 14. AI-related demand for semiconductors drove electronics and precision engineering, though construction and retail slowed. Renewed US-Iran hostilities and a Strait of Hormuz blockade lifted crude to about US$81 a barrel, clouding the outlook. Chipmakers had a torrid week: SK Hynix, freshly Nasdaq-listed, plunged 15.5 per cent as investors locked profits; Samsung fell over 8 per cent despite a 19-fold profit jump. Micron, Western Digital and SanDisk slid, dragging Singapore's AEM, UMS and Frencken lower. Sheng Siong plans a $520 million headquarters.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/AI%20demand%20drives%20Singapore%20GDP%20but%20Q2%20growth%20eases%20global%20chipmakers%20hit%20hard.pdf"}, {"id": "st-03", "title": "China wants the world to use its AI - but not all of it", "source": "ST", "date": "20 Jul 2026", "tags": ["Technology & AI", "Geopolitics"], "summary": "At Shanghai's World Artificial Intelligence Conference on July 17, President Xi Jinping pledged to help other countries develop AI, promote Chinese open-source models and shape global governance. Yet regulators were simultaneously weighing whether to restrict overseas access to China's most advanced models, revealing a dilemma between spreading Chinese tech and guarding strategic assets. June semiconductor exports jumped 122 per cent by value; computing equipment rose 53 per cent. Beijing strengthened oversight of overseas tech transactions from July 1 and reportedly met Alibaba and ByteDance over model access. The moves mirror Washington's curbs on Anthropic's Fable and Mythos. China now leads high-impact research in 69 of 74 critical technologies, posing a \"high monopoly risk\" in 41. It ordered Meta to unwind its Manus acquisition.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/China%20wants%20the%20world%20to%20use%20its%20AI%20-%20but%20not%20all%20of%20it.pdf"}, {"id": "st-04", "title": "Lebanon's Aoun to meet Trump at White House, hoping to generate pressure on Israel", "source": "ST", "date": "20 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "Lebanese President Joseph Aoun will make his first White House visit on July 21, presenting Donald Trump a written plan to disarm Iran-backed Hezbollah and secure Israel's withdrawal from occupied southern Lebanon. Aoun, 62, a former army commander elected in 2025, is the first Lebanese head of state to visit in nearly 20 years. He will ask Trump to \"exert the necessary pressure on Israel\" to implement a US-brokered June 26 agreement. A new war erupted when Hezbollah fired at Israel on March 2 supporting Iran, triggering an Israeli campaign that killed over 4,300 people, per Lebanon's health ministry. Aoun sought direct talks with Israel, drawing fierce Hezbollah criticism, but has declined Trump's call to meet Netanyahu directly.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/Lebanon's%20Aoun%20to%20meet%20Trump%20at%20White%20House,%20hoping%20to%20generate%20pressure%20on%20Israel.pdf"}, {"id": "st-05", "title": "New York mayor still considering Netanyahu arrest during UN meet", "source": "ST", "date": "20 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "New York Mayor Zohran Mamdani said in a July 18 New York Times interview that he is in talks over whether to try to arrest Israeli Prime Minister Benjamin Netanyahu during the UN General Assembly in September, calling him a \"war criminal\" who \"belongs in The Hague.\" Mamdani, who has labelled Israel an \"apartheid regime,\" admitted he is unsure he has power to order the NYPD to detain a foreign leader and is consulting the city's legal team. The ICC said in 2024 it had reasonable grounds to believe Netanyahu bore responsibility for alleged war crimes in Gaza. Israel's UN ambassador Danny Danon rebuked Mamdani on X, saying Netanyahu will attend and address the assembly with pride.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/New%20York%20mayor%20still%20considering%20Netanyahu%20arrest%20during%20UN%20meet.pdf"}, {"id": "st-06", "title": "Russia pounds Kyiv with ballistic missiles in escalating air war", "source": "ST", "date": "20 Jul 2026", "tags": ["Defence", "Geopolitics"], "summary": "Russia fired more than 40 missiles at Ukraine overnight on July 19, including 25 ballistic missiles targeting Kyiv, killing one person and wounding 16 across six districts, President Volodymyr Zelensky said. Strikes damaged apartment buildings, supermarkets and an entertainment centre. Ukraine faces a shortage of interceptors for its US-designed Patriot systems since the US-Israeli war on Iran began, letting Russia intensify weekly ballistic barrages. Domestic instability adds pressure, with thousands protesting the ousting of popular defence minister Mykhailo Fedorov. Ukrainian drones struck Russia, damaging Kazakh oil tankers at Novorossiysk and destroying warehouses near Moscow, killing eight. The UN said June was Ukraine's deadliest month for civilians since April 2022, with at least 293 killed. Peace talks remain frozen.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/Russia%20pounds%20Kyiv%20with%20ballistic%20missiles%20in%20escalating%20air%20war.pdf"}, {"id": "st-07", "title": "Singapore nurtures global business champions", "source": "ST", "date": "20 Jul 2026", "tags": ["Trade", "Society"], "summary": "Singapore is expanding efforts to nurture homegrown companies into global industry leaders, moving beyond its longstanding strategy of attracting multinationals, EDB executive vice-president Choo Heng Tong said at an NUS Business School conference on July 16. Speaking to 400 founders, investors and alumni, he said EDB is working with venture capital and private equity firms to identify and support high-growth companies, taking a long-term approach. The push follows Economic Strategy Review recommendations identifying two pillars: nurturing globally leading companies, especially in AI and technology, and sustaining a vibrant entrepreneurial ecosystem. Choo cited Singapore's 29 free trade agreements, 150 diplomatic ties, 7,000 multinationals and 300 investment firms. Business China chairman Lee Yi Shyan said Singapore's future depends on attracting talent and maintaining social cohesion.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/Singapore%20nurtures%20global%20business%20champions.pdf"}, {"id": "st-08", "title": "US airstrikes target Iran after troop deaths", "source": "ST", "date": "20 Jul 2026", "tags": ["Geopolitics", "Defence", "Energy"], "summary": "The US and Iran traded missiles and airstrikes on July 19 as Washington sought to \"punish\" Tehran for its first military losses since Middle East hostilities resumed. A preliminary deal collapsed amid deadlock over the Strait of Hormuz, key to global oil supply. Iran said it targeted two US bases in Kuwait; Jordan and Bahrain intercepted missiles. American military fatalities reached 17 since the US-Israel war began on Feb 28. Iran said the US struck its unfinished Darkhovin nuclear plant, which the IAEA said held no nuclear material. Kuwait reported a power and water plant hit for a second day. Iran's health ministry said 50 were killed recently. Supreme leader Mojtaba Khamenei vowed to teach Americans \"unforgettable lessons.\"", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20ST/US%20airstrikes%20target%20Iran%20after%20troop%20deaths.pdf"}, {"id": "bt-01", "title": "'We are all Korean investors now': Why South Korea's AI-heavy market is setting the tone for global stocks", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "South Korea's US$4 trillion equity market has become an early global read on AI risk appetite, with fund managers in London, New York and Tokyo checking Seoul before trading. Swings in Samsung Electronics and SK Hynix ripple through global chip stocks, and SK Hynix's US listing extended that influence to Wall Street. The Kospi's 60-day correlation with the Nasdaq 100 has climbed to 0.46, near a two-year high, while leveraged trading has made it one of the world's most volatile benchmarks. \"We are all Korean investors now,\" said PineBridge's Hani Redha. The index has plunged 25 per cent since its June peak, a US$1 trillion wipeout, but remains up 62 per cent for 2026.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/'We%20are%20all%20Korean%20investors%20now'%20Why%20South%20Korea's%20AI-heavy%20market%20is%20setting%20the%20tone%20for%20global%20stocks.pdf"}, {"id": "bt-02", "title": "AI is running on borrowed money", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Big tech's colossal AI data-centre spending is increasingly financed by debt, raising systemic risk. Oracle, whose building spree helped fund Larry Ellison's media ambitions, had its debt cut by S&P Global on Jul 9 to one notch above junk. Alphabet, Microsoft, Amazon, Meta and Oracle are pouring over US$800 billion into AI this year, planning US$1.2 trillion in 2027, exceeding the US military budget request. Bank of America says their combined capex now exceeds free cash flow, making them as capital-intensive as ExxonMobil. Accounting rules let firms treat the outlays as capital expenditure, flattering earnings and propelling stocks. Oracle, Amazon and SpaceX bonds have been hit as the bond market charges premiums for heightened risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/AI%20is%20running%20on%20borrowed%20money.pdf"}, {"id": "bt-03", "title": "DBS' S$200 billion milestone: What will it take to create more high-performing big-cap stocks?", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "DBS's market capitalisation breached S$200 billion on Jul 13, delivering a 29.1 per cent year-to-date total return, the fourth-best Straits Times Index performer. The columnist argues Singapore needs more high-performing, globally relevant big-caps. DBS, aiming for over S$1 trillion in wealth assets by 2030, trades at 2.95 times NAV on a 17 per cent ROE, dwarfing peers. It held a 27.6 per cent STI weighting at Jun 30, nearly twice OCBC's, while Singtel and UOB are about a third of its size. The author suggests a broader benchmark including mid-caps, weighted or capped, and says fostering more DBS-scale firms requires capable CEOs and regional scale, much as banks were once encouraged to merge.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/DBS'%20S200%20billion%20milestone%20What%20will%20it%20take%20to%20create%20more%20high-performing%20big-cap%20stocks.pdf"}, {"id": "bt-04", "title": "Gold at a crossroads: Can the US$4,000 floor hold?", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Geopolitics"], "summary": "After a historic rally, gold has corrected sharply in 2026, retreating from record highs near US$5,600 to around US$4,000. The article frames US$4,000 as key psychological support and the 61.8 per cent Fibonacci retracement, the \"golden ratio\", where buyers and central banks have repeatedly stepped in. But macro forces will drive the next move: renewed US-Iran tensions threaten Strait of Hormuz energy supplies and inflation, while easing US inflation data reflected an earlier lull. If inflation reaccelerates, the Fed may hold rates higher for longer, strengthening the dollar and pressuring non-yielding bullion. Should US$4,000 break, the next support lies between US$3,500 and US$3,700. Gold's path hinges on inflation, Fed policy and geopolitics.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/Gold%20at%20a%20crossroads%20Can%20the%20US4,000%20floor%20hold.pdf"}, {"id": "bt-05", "title": "How long until there is a US markets reckoning over Trump's damage?", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Politics", "Geopolitics"], "summary": "The columnist questions why markets remain sanguine about the economic damage from Donald Trump. His re-escalation around the Strait of Hormuz raises supply-shock and stagflation risks, while tariff wars and the weaponisation of trade unravel globalisation's efficiencies. Though the IMF projects 3.0 per cent global growth in 2026, the US runs unusually loose policy, a deficit near 6 per cent of GDP and postwar-high public debt. The BIS warns the AI investment boom echoes historic manias that ended in recessions. Rising long-term Treasury yields hint at an \"incipient Trump discount\", yet do not fully price inflation risks. De-anchored expectations, fiscal and financial dominance, and short-duration debt held by leveraged hedge funds leave central banks dangerously exposed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/How%20long%20until%20there%20is%20a%20US%20markets%20reckoning%20over%20Trump's%20damage.pdf"}, {"id": "bt-06", "title": "Lentor Gardens Residences sells 54% of 499 units over launch weekend", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Lentor Gardens Residences, the seventh private launch in Singapore's Lentor precinct, sold 270 of 499 units, about 54 per cent, over its Jul 18-19 launch weekend at an average S$2,350 per square foot. All three commercial units sold at S$2,550 psf, developer Kingsford Group said. Three-bedroom units led at 42 per cent of transactions; Singaporeans made up 91 per cent of buyers. Analysts called it a solid result, noting six earlier Lentor projects have sold 99.2 per cent of units. Prices from about S$1.4 million for two-bedders sit within mass-market reach, aided by proximity to Lentor MRT and schools. Resilient Outside Central Region demand, pent-up buying after May cooling measures, and tight supply underpinned the strong take-up.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/Lentor%20Gardens%20Residences%20sells%2054%20of%20499%20units%20over%20launch%20weekend.pdf"}, {"id": "bt-07", "title": "London landlords head for the exit as rent laws deal final blow", "source": "BT", "date": "20 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "UK landlords, squeezed for a decade, are exiting the buy-to-let market, with London hardest hit. The Renters' Rights Act, effective May 1, bars no-fault evictions, replaces fixed terms with rolling contracts, limits rent hikes and deposits, and bans bidding above advertised rent. London had 5 per cent fewer rooms to rent in the second quarter year-on-year, per SpareRoom, as landlord confidence fell. Savills estimates 30 per cent of London homes listed in the year to March were former buy-to-lets. Rents hit records as supply dropped, while buy-to-let is now 13.8 per cent of individuals' mortgage debt, a 12-year low. Critics warn tenants ultimately pay through higher rents and reduced maintenance. New PM Andy Burnham offers landlords no reprieve.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20%20Jul%202026/20%20Jul%20BT/London%20landlords%20head%20for%20the%20exit%20as%20rent%20laws%20deal%20final%20blow.pdf"}, {"id": "bt-08", "title": "OpenAI grapples with surging startup demand in Apac even as it expands Singapore team", "source": "BT", "date": "20 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "Surging Asia-Pacific startup demand has become the biggest challenge for Thomas Jeng, OpenAI's regional head of startups, as companies race to adopt AI. \"We have so much demand,\" he said, returning to 800 emails after a week away. OpenAI, which pledged over US$300 million and 200-plus roles in Singapore over coming years, is expanding Jeng's team. Singapore is a top-five global market for its coding agent Codex, with adoption up roughly 17 times since late last year. OpenAI courts startups by demonstrating model performance directly, running workshops, hackathons and a credits programme, having extended over US$30 million in token credits across Apac. Jeng stresses building an ecosystem and availability over competing for market share, connecting founders across South-east Asia, Japan and the US.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/20
