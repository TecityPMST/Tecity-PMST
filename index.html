s create a quintillion route combinations. Experts project reliable self-correcting quantum computers by 2030. Singapore's ports and banks, including OCBC for fraud detection, are also exploring the technology, which speakers called convergent with AI.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Singapore%20military%20explores%20quantum%20computing%20for%20mission%20planning.pdf"}, {"id": "st-10", "title": "Trump speaks to new British PM Andy Burnham, gets invite to visit Manchester", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "US President Donald Trump said on July 20 he had a \"very good conversation\" with new British PM Andy Burnham and that they would meet in the \"not too distant future\", signalling potentially warmer ties after tensions with predecessor Keir Starmer. Trump said they discussed North Sea oil, trade and demining the Strait of Hormuz, pledging US support. Relations had strained after Starmer refused initial military support for Trump's attack on Iran; renewed US-Iran hostilities could be an early test for Burnham over allowing British bases. Burnham, before taking office, said he plans to be \"upfront\" with Trump. He congratulated Trump on the World Cup, invited him to Manchester, and outlined UK commitment to securing Hormuz shipping.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Trump%20speaks%20to%20new%20British%20PM%20Andy%20Burnham,%20gets%20invite%20to%20visit%20Manchester.pdf"}, {"id": "st-11", "title": "US condemns China in South China Sea clash", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Southeast Asia"], "summary": "The United States condemned \"dangerous and aggressive actions\" by China after a clash with the Philippine Navy in the South China Sea, as Secretary of State Marco Rubio arrived in Manila on July 21 for an ASEAN foreign ministers' meeting. The State Department said China's provocations undermine regional stability. The Philippine military accused the Chinese coast guard of wounding a Filipino sailor on July 20; Beijing called the account a \"complete distortion of the truth\". Rubio, open to meeting Chinese counterpart Wang Yi, heralded US commitment to freedom of navigation in an op-ed alluding to China. He plans Quad talks with Australia, Japan and India, and meetings with South Korea and possibly Vietnam, raising energy, critical minerals and AI cooperation.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/US%20condemns%20China%20in%20South%20China%20Sea%20clash.pdf"}, {"id": "st-12", "title": "Ukraine's Zelensky meets commanders as street protests mount", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Defence"], "summary": "President Volodymyr Zelensky met top military commanders on July 20 to ease growing discontent with defence leadership that has triggered Ukraine's largest street protests since Russia's 2022 invasion. Thousands in Kyiv and other cities defied martial law for days, protesting last week's removal of reformer Mykhailo Fedorov as defence minister and demanding the dismissal of commander-in-chief Oleksandr Syrskyi, criticised for Soviet-style command and high casualties. Zelensky met five generals and a colonel seen as potential replacements, including Mykhailo Drapatyi and Volodymyr Horbatyuk. A poll showed 61 per cent opposed Fedorov's dismissal; he reportedly wants to return only as defence minister. Organisers threatened an indefinite general protest unless Syrskyi is removed and Fedorov reappointed by July 24.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Ukraine's%20Zelensky%20meets%20commanders%20as%20street%20protests%20mount.pdf"}, {"id": "st-13", "title": "What does Trump want? Gulf states have no answer as Iran war escalates", "source": "ST", "date": "22 Jul 2026", "tags": ["Geopolitics", "Energy"], "summary": "In this commentary, Joseph Chinyong Liow argues the June 17 US-Iran ceasefire is all but dead, with both locked in a dangerous escalatory spiral and the US risking another long Middle East war without clear strategy. Trump's shifting justifications, from degrading Iran's nuclear and missile capabilities to regime change and reopening the Strait of Hormuz, reveal deep inconsistencies. Gulf Arab states cannot drop backchannel talks with Tehran even while targeted, yet cannot cut ties with Washington as no alternative security provider exists; China, Russia and Europe are absent. Divergent positions among the UAE, Bahrain, Oman, Saudi Arabia and Qatar have rendered the Gulf Cooperation Council ineffective. Their security, Liow warns, has become collateral in a transactional test of wills.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/What%20does%20Trump%20want%20Gulf%20states%20have%20no%20answer%20as%20Iran%20war%20escalates.pdf"}, {"id": "st-14", "title": "Why would you agree to train an AI that replaces you?", "source": "ST", "date": "22 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "This Financial Times commentary likens today's AI push to Frederick Winslow Taylor's early 20th-century drive to extract workers' tacit knowledge via stopwatches and notebooks. It argues the knowledge needed to make AI genuinely powerful in many white-collar jobs is locked inside employees' heads and hard to codify, echoing Michael Polanyi's line that \"we can know more than we can tell.\" Bridgewater found general models parsed news correctly only about 50 per cent of the time, but a fine-tuned bespoke model reached 85 per cent. Ford rehired veteran engineers to train its systems. Training bespoke AI requires employee consent, giving workers with tacit knowledge unexpected leverage. Workplaces marked by mistrust, or where staff doubt they will share AI gains, will struggle.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20ST/Why%20would%20you%20agree%20to%20train%20an%20AI%20that%20replaces%20you.pdf"}, {"id": "bt-01", "title": "'Positive surprises' in store for S-Reits' H1 earnings as valuations lag fundamentals, say analysts", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Analysts expect Singapore-listed Reits to post low-to-mid single-digit year-on-year DPU growth in the H1 reporting season starting late July, with possible upside from office and industrial sectors. The rally lags fundamentals: the iEdge S-Reit Index is down about 4.6 per cent year to date, while the Straits Times Index gained 19.1 per cent, reflecting rate uncertainty and fund flows into banks and AI counters. RHB sees a \"rising disconnect\" suggesting a bottom is near. OCBC trimmed DPU forecasts by about 1 per cent but still expects marginal growth. DBS notes Singapore-focused assets are insulated from rate shocks. OUE Reit reports first, on Jul 22.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/'Positive%20surprises'%20in%20store%20for%20S-Reits'%20H1%20earnings%20as%20valuations%20lag%20fundamentals,%20say%20analysts.pdf"}, {"id": "bt-02", "title": "AI can boost productivity, potentially increase revenue, but many Asean firms struggle with roll-out: Bain", "source": "BT", "date": "22 Jul 2026", "tags": ["Technology & AI", "Southeast Asia"], "summary": "South-east Asian companies are receptive to artificial intelligence as a growth tool but struggle to scale adoption, according to Bain & Company. Fewer than 20 per cent of the firms Bain works with in the region are meaningfully scaling AI investments, and two-thirds remain stuck at the pilot and planning stage. Financial services firms lead adoption, while other sectors are hindered by wariness over unsystematic roll-outs and fear of employee resistance. Asia-Pacific managing partner Shintaro Okuno advises picking two or three \"commercial plays\" and going deep to build success cases. Bain sees the biggest time savings in financial services, followed by consumer and healthcare, plus significant sales uplift.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/AI%20can%20boost%20productivity,%20potentially%20increase%20revenue,%20but%20many%20Asean%20firms%20struggle%20with%20roll-out%20Bain.pdf"}, {"id": "bt-03", "title": "Ant International raises US$1.2 billion in global expansion push", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Technology & AI"], "summary": "Ant International, the global arm of the Jack Ma-backed fintech, raised US$1.2 billion in a Series A round to expand cross-border payments and AI-enabled commerce. Proceeds will build operations in merchant payment, account management and other financial services for small businesses. It drew capital from Ant Group, affiliate Alibaba and international investors, having sought a valuation of US$10 billion or more from existing shareholders including General Atlantic and Silver Lake. The funding could help prepare a potential Hong Kong listing as soon as this year. Ant International, more independent since forming its own board in 2024, saw revenue reach US$3 billion in 2024, growing about 25 per cent in 2025.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Ant%20International%20raises%20US1.2%20billion%20in%20global%20expansion%20push.pdf"}, {"id": "bt-04", "title": "China is solving the wrong consumption problem", "source": "BT", "date": "22 Jul 2026", "tags": ["Geopolitics", "Finance & Markets"], "summary": "Beijing's first-ever five-year consumption road map, unveiled last week, failed to deliver the bold measures needed to make personal spending a higher strategic priority, this commentary argues. Many details point in the opposite direction. The official target of 60 trillion yuan (US$8.9 trillion) in retail sales by 2030 implies annual expansion slowing to just 3.7 per cent from 2026 onward, far below the 5.3 per cent recorded during the previous plan, which included the pandemic peak. The piece contends China is trying to make shopping more satisfying, when consumers already enjoy a wide choice of high-quality goods, misdiagnosing what actually constrains household spending in the economy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/China%20is%20solving%20the%20wrong%20consumption%20problem.pdf"}, {"id": "bt-05", "title": "China's dual-velocity economy: export ascendancy amid domestic stagnation", "source": "BT", "date": "22 Jul 2026", "tags": ["Geopolitics", "Trade"], "summary": "China's economy in 2026 presents a striking paradox, this commentary argues: exports surge while domestic demand drifts in protracted torpor. On the external front, China posted a record trade surplus approaching US$1.2 trillion in 2025, with aggregate exports expanding about 5.5 per cent to some US$3.8 trillion. Domestically, however, consumption remains anaemic: retail sales growth languishes near 1 per cent, property transactions have contracted 65 per cent from their 2020 peak, and households have retreated into unprecedented precautionary thrift. The author calls this bifurcation among the most consequential predicaments facing the world's second-largest economy, with implications extending well beyond China's borders.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/China's%20dual-velocity%20economy%20export%20ascendancy%20amid%20domestic%20stagnation.pdf"}, {"id": "bt-06", "title": "EGP Energy offers 1 million public shares at S$0.51 each in mainboard listing", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Energy"], "summary": "Electrical infrastructure provider EGP Energy Corporation launched its IPO on Jul 21, seeking about S$30.6 million in gross proceeds ahead of a Singapore Exchange mainboard listing. The offering comprises 18,823,500 shares at S$0.51 each, with 17,823,500 placed to institutional investors and 1,000,000 offered to the public. Cornerstone investors including Amova, Avanda and Value Partners subscribed for 41,176,500 new shares, raising about S$21 million. EGP will be the fourth mainboard listing this year, after Foundation Healthcare, JustCo and UI Boustead Reit. UOB and UOB Kay Hian are joint issue managers. The IPO closes noon Jul 27, with trading expected Jul 29. Implied market capitalisation is around S$115 million.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/EGP%20Energy%20offers%201%20million%20public%20shares%20at%20S0.51%20each%20in%20mainboard%20listing.pdf"}, {"id": "bt-07", "title": "How long can energy markets withstand the Iran war?", "source": "BT", "date": "22 Jul 2026", "tags": ["Energy", "Geopolitics"], "summary": "Global oil markets have twice priced in a Strait of Hormuz closure and twice priced it back out, this analysis notes. Brent spiked past US$120 a barrel when war between the US and Iran began, fell to US$72.24 by June after the strait reopened, then climbed to the US$80 range when the ceasefire collapsed in early July. Markets held up because Opec+, led by Saudi Arabia and the UAE, entered with ample spare capacity, and IEA members released around 400 million barrels from stockpiles. But strain is showing: US refinery utilisation nears 97 per cent, and the Strategic Petroleum Reserve has fallen to about 316 million barrels, the lowest since 1983.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/How%20long%20can%20energy%20markets%20withstand%20the%20Iran%20war.pdf"}, {"id": "bt-08", "title": "Investing in a K-shaped economy", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Society"], "summary": "This investment commentary examines the widely discussed K-shaped economy, in which a yawning gap separates high earners who are spending and growing their wealth from low-income households living hand to mouth. The same divergence appears at the corporate level, where rich companies expand rapidly while smaller businesses struggle to pay their bills. The author argues that for investors, the key task is discerning which companies are thriving and which are struggling amid this uneven landscape. Understanding the split matters for positioning portfolios, as beneficiaries and casualties of the bifurcation increasingly diverge in performance, valuation and resilience across both consumer and corporate segments of the economy.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Investing%20in%20a%20K-shaped%20economy.pdf"}, {"id": "bt-09", "title": "Kingsford Group inks deal to buy Tan Boon Liat Building at lower reserve price of S$950m", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Freehold Tan Boon Liat Building has been sold en bloc to a Kingsford Group unit for S$950 million, likely Singapore's largest collective sale so far this year, said adviser Cushman & Wakefield. The price is 5 per cent below the revised S$1 billion reserve and 17.4 per cent under the original S$1.15 billion asking price from its February 2025 launch. The sale is conditional on 80 per cent owner support. The Urban Redevelopment Authority plans to rezone the Business 1 industrial site to residential with commercial on the first storey, lifting the plot ratio to 4.9 and allowing twin towers up to 48 storeys, a 50 per cent uplift in allowable gross floor area.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Kingsford%20Group%20inks%20deal%20to%20buy%20Tan%20Boon%20Liat%20Building%20at%20lower%20reserve%20price%20of%20S950m.pdf"}, {"id": "bt-10", "title": "Risks of autonomous AI agents not yet fully understood: Josephine Teo", "source": "BT", "date": "22 Jul 2026", "tags": ["Technology & AI", "Politics"], "summary": "Autonomous AI agents pose risks that are not yet fully understood, warned Minister for Digital Development and Information Josephine Teo at the IBM Think on Tour Singapore event on Jul 21. Her comments came six months after Singapore released its governance framework for agentic AI. Unlike traditional large language models, agentic AI can initiate and execute tasks with limited human interaction, and Teo said it will be \"quite a long time\" before the full range of problems is understood. Trust Bank's Rajay Rai cited a 50 per cent deflection rate from AI customer service. Panellists from the SAF's Digital and Intelligence Service and IBM stressed human accountability and tiered governance based on use-case risk.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Risks%20of%20autonomous%20AI%20agents%20not%20yet%20fully%20understood%20Josephine%20Teo.pdf"}, {"id": "bt-11", "title": "Singapore inflation expectations inch up to 3.4% on geopolitical and trade fears: survey", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Southeast Asia"], "summary": "Singapore households modestly raised near-term price expectations amid global uncertainties, supply chain disruptions and tariff fears, according to the DBS-SMU Singapore Index of Inflation Expectations. One-year-ahead headline inflation expectations climbed to 3.4 per cent in June from 3.3 per cent in March, with core expectations mirroring the move. Of 536 respondents, 87.7 per cent expect higher prices, with 57.8 per cent citing geopolitical conflicts involving Hamas, Israel, Ukraine, Russia and Iran. DBS economist Taimur Baig noted a 2026 rebound in global inflation from Middle East energy constraints and AI-cycle demand. The uptick follows MAS's April tightening, its first since October 2022. Five-year headline expectations rose to 4.3 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Singapore%20inflation%20expectations%20inch%20up%20to%203.4%20on%20geopolitical%20and%20trade%20fears%20survey.pdf"}, {"id": "bt-12", "title": "Singdollar bonds: Let quality carry and credit do more of the work", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets"], "summary": "The first half of 2026 saw a sharp reversal in interest-rate expectations, this fixed-income commentary notes. Markets entered the year anticipating further monetary easing, but the Middle East conflict and disruption to energy supplies reignited inflation concerns. Singapore Overnight Rate Average Overnight Indexed Swap (Sora-OIS) rates rose by around 45 to 60 basis points across medium tenors in March before partially retracing as oil prices eased. Despite the abrupt repricing, Singapore dollar bonds remained relatively resilient. The author argues investors should let quality carry and credit selection do more of the work, favouring higher-quality issuers and disciplined credit exposure over duration bets in the current volatile rate environment.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Singdollar%20bonds%20Let%20quality%20carry%20and%20credit%20do%20more%20of%20the%20work.pdf"}, {"id": "bt-13", "title": "Takaichi's popularity dips after prioritising controversial laws", "source": "BT", "date": "22 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "Approval ratings for Japanese Prime Minister Sanae Takaichi fell after she pushed through divisive bills despite cost-of-living concerns. Support dropped to 53 per cent from 60 per cent in an Asahi poll, while ANN found her popularity fell over 10 points to 49.2 per cent and Mainichi recorded 41 per cent. The polls followed passage of controversial laws, including one that effectively shuts women out from inheriting Japan's Imperial throne and another criminalising desecration of the national flag. In the Asahi poll, 57 per cent said Takaichi wasn't doing enough to counter inflation. Japan's first female premier, who took office in October 2025, faces pressure as her honeymoon period closes.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/Takaichi's%20popularity%20dips%20after%20prioritising%20controversial%20laws.pdf"}, {"id": "bt-14", "title": "The US Federal Reserve needs to tighten monetary policy", "source": "BT", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Politics"], "summary": "Pressure on US Federal Reserve chair Kevin Warsh to tighten monetary policy has receded somewhat, this commentary observes. The June consumer price index report was benign: the overall inflation rate fell, helped by a sharp drop in petrol prices, and the core measure excluding food and energy was also much better behaved. Meanwhile, payroll employment growth stalled last month after rising briskly earlier in the year, and wage inflation sits at a level consistent with 2 per cent price inflation, given strong underlying productivity growth. Despite the easing pressure, the author argues the Fed still needs to tighten policy to keep inflation durably contained, cautioning against premature complacency about the disinflation trend.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/The%20US%20Federal%20Reserve%20needs%20to%20tighten%20monetary%20policy.pdf"}, {"id": "bt-15", "title": "The risk of Model Autophagy Disorder: why firms need a Plan B for their data", "source": "BT", "date": "22 Jul 2026", "tags": ["Technology & AI"], "summary": "As businesses embed artificial intelligence deeper into daily operations, public Internet content is becoming a less reliable source for the context the technology needs, this commentary warns. Much of the Web's readily available information has already been heavily mined and fed to large language models, and a growing share of what remains is now generated by AI rather than people. Whenever the quality of the Internet's information declines, so does the reliability of AI outcomes built on top of it, a phenomenon known as Model Autophagy Disorder, where models feed on their own outputs. The author argues firms need a Plan B for sourcing trustworthy, human-generated data to sustain AI performance.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/The%20risk%20of%20Model%20Autophagy%20Disorder%20why%20firms%20need%20a%20Plan%20B%20for%20their%20data.pdf"}, {"id": "bt-16", "title": "What is China's Moonshot AI and why is it roiling markets?", "source": "BT", "date": "22 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Chinese startup Moonshot AI released its Kimi K3 model on Jul 17, delivering benchmark performance that rivals top offerings from OpenAI and Anthropic and sending AI and semiconductor stocks tumbling worldwide. Investors feared China's rise could force US leaders to pull back investment, hitting demand at Nvidia, SK Hynix and Samsung Electronics. Founded in early 2023 by former Tsinghua professor Yang Zhilin, Moonshot reached a US$20 billion valuation and is raising up to US$2 billion more at a US$30 billion valuation, while dismantling its offshore structure ahead of a Hong Kong IPO. Annual recurring revenue topped US$200 million in April. Chinese models undercut US rivals aggressively on price.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20BT/What%20is%20China's%20Moonshot%20AI%20and%20why%20is%20it%20roiling%20markets.pdf"}, {"id": "scmp-01", "title": "Another 'DeepSeek moment'? What China's Kimi K3 means for the global AI industry", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Finance & Markets", "Geopolitics"], "summary": "Moonshot AI's Kimi K3, a 2.8-trillion-parameter open-weight model, has revived the debate over whether China can match US frontier AI despite chip curbs, performing close to OpenAI and Anthropic systems. Banks including Morgan Stanley and Goldman Sachs call it an \"all-round catch-up\" narrowing the model gap to weeks. UBS strategist Sunil Tirumalai argues cheaper Chinese models may not cut hardware demand, since efficiency spurs wider adoption. Nomura data shows K3 costs about US$0.94 per task, near GPT-5.6. Analysts expect the main pressure to fall on model-provider margins rather than compute demand, potentially benefiting chipmakers and cloud operators. Moonshot is racing to add GPUs after K3 demand overwhelmed its capacity.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Another%20%E2%80%98DeepSeek%20moment%E2%80%99%20What%20China%E2%80%99s%20Kimi%20K3%20means%20for%20the%20global%20AI%20industry.pdf"}, {"id": "scmp-02", "title": "As Iran war drags on, China keeps tight grip on fuel exports despite eased curbs", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Energy", "Geopolitics", "Trade"], "summary": "Beijing lifted refined fuel export restrictions this month amid high oil prices and ample reserves, but imposed compliance rules to protect domestic stockpiles, three sources said. Refiners can only ship under allocated quotas while keeping inventories above end-February levels, with quotas going mostly to state-owned refiners. Curbs began in March after the US-Israeli war on Iran. China shipped 23.6 million tonnes of fuel in the first half, down 13.2 per cent year-on-year, with April dropping nearly 38 per cent. Renewed US strikes near Abadan pushed Brent above US$90. Analysts said exports were unlikely to rebound immediately because refiners must maintain high product inventories and arrange cargo allocations.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/As%20Iran%20war%20drags%20on,%20China%20keeps%20tight%20grip%20on%20fuel%20exports%20despite%20eased%20curbs.pdf"}, {"id": "scmp-03", "title": "As US-Chinese AI model gap narrows, what next for Washington?", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Geopolitics", "Politics"], "summary": "New models from Moonshot AI and Alibaba have narrowed the US-China AI gap from months to weeks, leaving Washington's policy at a crossroads over controlling frontier models, restricting Chinese open-weight models, and driving global adoption. China continues releasing powerful open-weight models like Kimi K3 and Qwen3.8, and Xi Jinping endorsed \"inclusive\" open AI at Shanghai's WAIC, where 28 mostly Global South countries signed on. US users complain safety guard rails block routine coding tasks. The Trump administration recently forced Anthropic to suspend Fable 5 and Mythos 5 over security concerns. Officials remain divided between broad bans on Chinese models and a hands-off pro-competition approach amid persistent indecision.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/As%20US-Chinese%20AI%20model%20gap%20narrows,%20what%20next%20for%20Washington.pdf"}, {"id": "scmp-04", "title": "Asia's oil buyers face US$100-per-barrel risk as Houthis threaten Saudi blockade", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Energy", "Geopolitics", "Trade"], "summary": "Asia's oil buyers face a second chokepoint risk after Iran-aligned Houthi militants threatened a naval blockade of Saudi Arabia, while Strait of Hormuz shipping stays disrupted by the US-Iran conflict. A full closure of the Bab el-Mandeb Strait could hit about 7.4 million barrels per day, roughly 7 per cent of global output. Saudi Arabia raised Yanbu exports to about 4 million barrels daily to bypass Hormuz, with 2.5 million moving through Bab el-Mandeb. Analysts at Rystad Energy warned prices could rebound above US$100 if disruptions persist. Asia sources nearly 60 per cent of crude from the Middle East. Washington also backed tariffs of up to 100 per cent on top Russian oil buyers.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Asia%E2%80%99s%20oil%20buyers%20face%20US%24100-per-barrel%20risk%20as%20Houthis%20threaten%20Saudi%20blockade.pdf"}, {"id": "scmp-05", "title": "Can Beijing's stock support deliver a long bull run and fuel its high-stakes tech drive?", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Technology & AI", "Politics"], "summary": "China's rapid move to stem a stock market rout through state buying and stabilisation pledges underscores its resolve to protect tech innovation financing and safeguard over 200 million individual investors. Beijing wants a durable bull run on the US$15 trillion market to fund tech self-sufficiency via equity financing. On Tuesday the Star Market 50 Index jumped 11 per cent after five state-backed insurers pledged more equity investment and two state buyers poured about 60 billion yuan (US$8.9 billion) into stocks. Regulators aim to avoid a repeat of the 2015 boom-to-bust cycle. Analysts expect further policy support from a Politburo meeting next week, though not all interventions reliably halt falling stocks.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Can%20Beijing%E2%80%99s%20stock%20support%20deliver%20a%20long%20bull%20run%20and%20fuel%20its%20high-stakes%20tech%20drive.pdf"}, {"id": "scmp-06", "title": "China, Russia plan fifth rail link to keep trade chugging along in harsh winter months", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Trade", "Geopolitics"], "summary": "Plans for a fifth cross-border railway linking China and Russia are advancing as Heilongjiang province issued a tender for a feasibility study and preliminary design. The line would connect Heihe with Blagoveshchensk, capital of Russia's Amur Oblast, cutting through the Amur River and reaching the Trans-Siberian Railway. It would join existing crossings at Manzhouli, Suifenhe, Tongjiang and Hunchun, overcoming road and waterway bottlenecks that constrain winter shipping. Planning follows Vladimir Putin's May visit to Beijing, when both sides agreed to add a Zabaykalsk-Manzhouli line. Sanctions-hit Moscow relies increasingly on China as an economic lifeline. First-half bilateral trade grew 25.6 per cent year-on-year to US$134.1 billion, customs data showed.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/China,%20Russia%20plan%20fifth%20rail%20link%20to%20keep%20trade%20chugging%20along%20in%20harsh%20winter%20months.pdf"}, {"id": "scmp-07", "title": "China's Kimi K3 fuels fears safety curbs are holding back US AI", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Defence", "Politics"], "summary": "Moonshot AI's new Kimi K3 rivals top US systems at spotting cybersecurity flaws, stoking fears in Washington that strict safety guard rails disadvantage American AI firms. Swiss firm Aikido Security said the 2.8-trillion-parameter open-weight model performed \"extremely close\" to OpenAI's GPT-5.6 Sol at a fraction of the cost, detecting 23 of 26 known vulnerabilities. Aikido called it the strongest open-weight model for cybersecurity. Former White House AI adviser David Sacks cited cases where US models refused to patch flaws that Kimi K3 fixed. Hugging Face reportedly turned to Zhipu's GLM-5.2 after US models refused a threat analysis. Elon Musk's xAI said it would soon finish a rival 2-trillion-parameter model.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/China%E2%80%99s%20Kimi%20K3%20fuels%20fears%20safety%20curbs%20are%20holding%20back%20US%20AI.pdf"}, {"id": "scmp-08", "title": "China's policy playbook took its EV sector from zero to hero - can other countries follow?", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Trade", "Environment"], "summary": "China's rise from automotive latecomer to EV powerhouse has prompted emerging markets to copy its state-led playbook, using incentives to build demand while localising production. Electrification lowered entry barriers by reducing the importance of engines, and China's supply chain eases component sourcing. Vietnam's VinFast became the country's bestselling brand in 2025 with 175,099 vehicles, backed by tax and land incentives. Turkey's Togg outsold Tesla and BYD domestically, while India protects local players like Tata and Mahindra with tariffs near 100 per cent. Analysts warn the model is hard to replicate: many nations depend on Chinese batteries from CATL, Gotion and others, limiting how much higher-value supply chain they can capture at home.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/China%E2%80%99s%20policy%20playbook%20took%20its%20EV%20sector%20from%20zero%20to%20hero%20%E2%80%93%20can%20other%20countries%20follow.pdf"}, {"id": "scmp-09", "title": "China's youth jobless rate edges down in June for third consecutive month", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Society", "Finance & Markets"], "summary": "China's urban youth unemployment rate fell for a third straight month in June, easing to 14.9 per cent for 16-to-24-year-olds excluding students, a 0.7 percentage point monthly drop, the National Bureau of Statistics said. Officials credited a post-Spring Festival rebound and peak seasonal hiring in accommodation, retail, transport and IT. The 25-29 jobless rate edged down to 7.1 per cent. But headwinds loom: a record 12.7 million students graduate this summer, about 4 per cent more than last year, likely pushing youth unemployment higher in July and August. Goldman Sachs warned AI is hitting entry-level white-collar jobs. Overall urban unemployment was 5 per cent, versus 4.2 per cent in the US.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/China%E2%80%99s%20youth%20jobless%20rate%20edges%20down%20in%20June%20for%20third%20consecutive%20month.pdf"}, {"id": "scmp-10", "title": "Chinese AI agent Qiushi Engine outperforms Anthropic's Claude Code in autonomous research", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Society"], "summary": "A Zhejiang University-led AI system, Qiushi Engine, has topped the ResearchClawBench leaderboard for autonomous scientific research, overtaking Anthropic's Claude Code and Open Science Desktop. The benchmark, created by a Shanghai Artificial Intelligence Laboratory-led team, tests whether AI agents can independently conduct research and match or surpass human reference papers across 10 disciplines. Using OpenAI's GPT-5.5, Qiushi Engine scored just above 30 on the 100-point scale, where 50 means matching human conclusions. Developers said it demonstrated \"end-to-end autonomous scientific discovery\", validating a previously unreported physical mechanism in optical computing. However, ResearchClawBench's developers cautioned that even the strongest agents remain far from reliable rediscovery and cannot yet make new discoveries dependably.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Chinese%20AI%20agent%20Qiushi%20Engine%20outperforms%20Anthropic%E2%80%99s%20Claude%20Code%20in%20autonomous%20research.pdf"}, {"id": "scmp-11", "title": "EU lawmakers arrive in China for high-stakes talks to manage mounting tensions", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Geopolitics", "Trade", "Politics"], "summary": "A European Parliament delegation began a three-day China visit to manage strained ties amid trade friction and expanding EU import curbs. The eight-member Foreign Affairs Committee group, led by David McAllister, is the committee's first trip to China, resuming exchanges frozen since 2021 over Xinjiang sanctions. Foreign Minister Wang Yi urged broader engagement with Chinese society and warned against politicising trade. Talks in Beijing and Shanghai cover the Ukraine war, human rights, Indo-Pacific stability, tech sovereignty and AI governance. Brussels complains of Chinese overcapacity and rare-earth export controls; China's 2025 EU trade surplus hit nearly 360 billion euros (US$411 billion). EU trade chief Maros Sefcovic seeks \"tangible\" results by October.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/EU%20lawmakers%20arrive%20in%20China%20for%20high-stakes%20talks%20to%20manage%20mounting%20tensions.pdf"}, {"id": "scmp-12", "title": "Japan seeks Southeast Asia sea lanes to avoid troubled waters in region", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Southeast Asia", "Geopolitics", "Trade"], "summary": "Japan is turning to five lesser-used Southeast Asian straits as insurance against maritime shocks, planning detailed nautical charts so ships can bring vital goods to its economy. Tokyo will work with Indonesia and the Philippines to map the Maluku Passage, Ombai, Sunda, Surigao and Balabac straits, financing 2 billion yen (US$12.3 million) through development aid. The project aims to give shipping alternatives if routes through Hormuz and Malacca are disrupted; about 90 per cent of Japan's crude comes via Hormuz. Analysts said it deepens cooperation amid concern over China's expanding maritime activities. Experts warned re-routing is costly and the core vulnerability remains, since ships must still reach Japan through the contested Western Pacific.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Japan%20seeks%20Southeast%20Asia%20sea%20lanes%20to%20avoid%20troubled%20waters%20in%20region.pdf"}, {"id": "scmp-13", "title": "Taiwan opens door to Starlink - but now it must wait to see if Elon Musk is ready to enter", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Defence", "Geopolitics"], "summary": "Taiwan cleared the way for overseas satellite internet providers like Starlink to operate on the island, a move analysts said could bolster military and civilian communications if networks are disrupted in a conflict with mainland China. The legislature amended the Telecommunications Management Act to exempt satellite operators from foreign ownership caps and the Taiwanese-chair requirement, removing the obstacle that collapsed 2021 talks. Analysts said Starlink could rapidly expand Taiwan's low Earth orbit capacity, citing its Ukraine war performance. But entry depends on whether Musk, who has major China business ties and called Taiwan part of China, will risk provoking Beijing. Lawmakers warned against over-dependence on a foreign operator during a crisis.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Taiwan%20opens%20door%20to%20Starlink%20%E2%80%93%20but%20now%20it%20must%20wait%20to%20see%20if%20Elon%20Musk%20is%20ready%20to%20enter.pdf"}, {"id": "scmp-14", "title": "The US mounts pressure across 3 maritime flashpoints. How should China respond?", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Defence", "Geopolitics", "Politics"], "summary": "Chinese researchers urged tighter coordination among maritime authorities to counter a US \"three seas linkage\" strategy pressuring Beijing across the East China Sea, Taiwan Strait and South China Sea. Writing in the Pacific Journal, Beijing Foreign Studies University's Yue Shengsong warned Washington aims to force China into multi-front operations and strategic overextension by synchronising military, alliance, rule-making and narrative activities along the first island chain. He said Japan has become the key axis linking the three seas, while the Philippines serves as a \"strategic springboard\" via US base access. Yue called for cross-departmental mechanisms, credible deterrence and leadership in international maritime rule-making. Nanjing University's Zhu Feng urged firmness balanced with dialogue and dispute management.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/The%20US%20mounts%20pressure%20across%203%20maritime%20flashpoints.%20How%20should%20China%20respond.pdf"}, {"id": "scmp-15", "title": "Trump softens tone on alleged China election meddling before Rubio-Wang talks", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Politics", "Geopolitics"], "summary": "US Secretary of State Marco Rubio will meet Chinese Foreign Minister Wang Yi in Manila on Wednesday, as President Donald Trump signalled Washington would raise alleged 2020 election interference but downplayed retaliation. Trump said the alleged interference \"took place a long time ago\" and acknowledged \"we do things to them too\". Last week he accused China of the \"largest compromise of election data in history\", alleging Beijing obtained over 200 million voter records; China rejected the claims. The talks come on the sidelines of Asean meetings. Rubio said Xi Jinping's expected US visit remains on track for September. Trump also signed an order directing military contractors to cut reliance on adversary-linked critical mineral supply chains from 2027.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Trump%20softens%20tone%20on%20alleged%20China%20election%20meddling%20before%20Rubio-Wang%20talks.pdf"}, {"id": "scmp-16", "title": "Trump vows to help Lebanon pursue peace with Israel", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Geopolitics", "Politics"], "summary": "President Donald Trump vowed to help Lebanon \"a lot\" as President Joseph Aoun sought Washington's backing for a fragile effort to disarm Hezbollah and forge peace with Israel. Aoun, the first Lebanese president invited to Washington since 2009, asked for political support and continued backing for the Lebanese army, now deploying in southern pilot zones under a US-backed framework with Israel. Trump said he would authorise resuming direct US airline flights to Lebanon, suspended over 40 years since a 1985 hijacking. In a sign of fragility, the Lebanese army said Israeli troops fired near its soldiers; the IDF said it fired warning shots. Hezbollah has rejected disarming. Recent strikes killed more than 4,300 people in Lebanon.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Trump%20vows%20to%20help%20Lebanon%20pursue%20peace%20with%20Israel.pdf"}, {"id": "scmp-17", "title": "US war in Iran has cost US$37.5 billion so far, Pentagon chief Hegseth says", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Defence", "Politics", "Geopolitics"], "summary": "The US war in Iran has cost US$37.5 billion so far, Defence Secretary Pete Hegseth told sceptical lawmakers as he sought urgent funding for the unpopular conflict, his first public testimony since bombings resumed. The figure includes certain war aspects and anticipated costs through September 30. Trump last month asked Congress for nearly US$90 billion in additional funding, mostly Iran-related, ahead of November midterms where Democrats lead in polls. Hegseth also urged a US$1.5 trillion 2027 budget, warning training would be curtailed without a funding boost. A fragile ceasefire collapsed this month; US troops killed in the war rose to 18, with roughly 430 injured. Trump has threatened to expand strikes on Iranian energy and nuclear sites.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/US%20war%20in%20Iran%20has%20cost%20US%2437.5%20billion%20so%20far,%20Pentagon%20chief%20Hegseth%20says.pdf"}, {"id": "scmp-18", "title": "What's at stake as Beijing beats global peers with first approval of novel therapy", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Society", "Finance & Markets"], "summary": "China's drug regulator has for the first time approved a novel, globally trialled medicine ahead of the US, Japan and Europe, hailed as a \"historic breakthrough\" as the country doubles down on biopharmaceuticals as a growth engine. The National Medical Products Administration approved a rare-disease therapy for narcolepsy type 1 in people aged 16 and older, reportedly Takeda's TAK-861. Officials said Chinese patients were included in international trials from the outset, enabling earlier approval. Biotech was elevated to \"pillar industry\" status in this year's government work report. The move follows a record wave of cross-border licensing deals; China approved 38 innovative drugs in the first half, mostly home-grown, ending years of patients waiting for foreign therapies.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/What%E2%80%99s%20at%20stake%20as%20Beijing%20beats%20global%20peers%20with%20first%20approval%20of%20novel%20therapy.pdf"}, {"id": "scmp-19", "title": "Zhipu shares surge 37% as firm builds giant data centre powered by Chinese chips", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Technology & AI", "Finance & Markets"], "summary": "Shares of Chinese AI firm Z.ai, also known as Zhipu, soared 37 per cent in Hong Kong on Tuesday to close at HK$1,219 (US$155), after it completed a 1-gigawatt AI computing centre powered entirely by domestic chips. The facility will train and deploy its GLM models, including flagship GLM-5.2. The rebound followed a week-long drop of more than 40 per cent. The Beijing-based firm also acquired infrastructure software developer XCore Sigma, spun off from the Chinese Academy of Sciences, to improve chip utilisation and cut inference costs. China's AI computing demand is expected to reach about 5 GW by 2028. Z.ai was added to the US Entity List in early 2025 but said it had mastered the full LLM technology stack.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/Zhipu%20shares%20surge%2037%25%20as%20firm%20builds%20giant%20data%20centre%20powered%20by%20Chinese%20chips.pdf"}, {"id": "scmp-20", "title": "'Clear signals': Why China looks set to expand capital outflow channels", "source": "SCMP", "date": "22 Jul 2026", "tags": ["Finance & Markets", "Trade", "Politics"], "summary": "China's robust trade surplus will pave the way for Beijing to further open its capital account, giving more leeway for outflows while advancing yuan internationalisation, said Standard Chartered's Greater China chief economist Ding Shuang. He argued a bigger surplus lets China allow more outflows, creating headroom for broader capital account opening. First-half exports jumped 17.6 per cent and imports rose 26.6 per cent; June's trade surplus expanded to US$125.62 billion. Ding cited \"clear signals\", including plans to issue fresh Qualified Domestic Institutional Investor quotas in autumn. He projected the yuan trading between 6.75 and 6.85 per dollar by the third quarter's end, and said stimulus may be held back unless GDP growth threatens to fall below 4.5 per cent.", "url": "https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity%20News%20Dashboard/22%20Jul%202026/22%20Jul%20SCMP/%E2%80%98Clear%20signals%E2%80%99%20Why%20China%20looks%20set%20to%20expand%20capital%20outflow%20channels.pdf"}]}};</script>
