 thought it could ignore. Leaning on Google's models, the author warns, risks ceding leverage to a key competitor.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Apple%20is%20handing%20AI%20power%20to%20its%20rival%20Google.pdf"},{"id":"bt-03","title":"CGSI upgrades Singapore banking sector to 'overweight' on net interest income upside","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"CGS International upgraded the Singapore banking sector to 'overweight' from 'neutral', citing robust capital inflows and continued loan growth. The brokerage raised FY2027-2028 EPS estimates across the three local banks by 2.6% to 6.3%, factoring in a five-basis-point rise in net interest margins for FY2027. Analysts said continued deposit liquidity has supported resilient net interest income, with MAS data showing 7.3% year-on-year deposit growth in April. Lower-cost Casa deposits have outpaced fixed deposits since February 2026.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/CGSI%20upgrades%20Singapore%20banking%20sector%20to%20%27overweight%27%20on%20net%20interest%20income%20upside.pdf"},{"id":"bt-04","title":"CICT's S$3.9 billion Paragon buy draws scrutiny over timing, funding at EGM","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Unitholders of CapitaLand Integrated Commercial Trust pressed management at an EGM over the timing and funding of its S$3.9 billion acquisition of Orchard Road mall Paragon, though 99.96% ultimately voted in favour. Former CapitaLand executive Ng Ee Peng questioned longer-term plans for the freehold asset amid shifts in tourism and retail, arguing the deal can't simply be to keep it 'in situ'. The scrutiny reflected concerns about experiential travel and e-commerce competition. The overwhelming approval cleared one of the year's largest S-REIT deals.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/CICT%27s%20S3.9%20billion%20Paragon%20buy%20draws%20scrutiny%20over%20timing%2C%20funding%20at%20EGM.pdf"},{"id":"bt-05","title":"Japan's largest banks to jointly issue stablecoins by March 2027","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Japan's three largest banking groups, MUFG, SMBC and Mizuho, said they will jointly issue stablecoins during the fiscal year ending March 2027, setting up a council to examine operational frameworks. The move signals growing digital-payments momentum in a country where cash and credit cards remain dominant, with the Financial Services Agency supporting the experimental stage. Stablecoins have been strongly backed by Trump and are drawing global interest, though some policymakers worry they could move funds outside regulated banking. Startup JPYC began issuing yen-pegged stablecoins last October.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Japan%27s%20largest%20banks%20to%20jointly%20issue%20stablecoins%20by%20March%202027.pdf"},{"id":"bt-06","title":"Morgan Stanley Australia CEO warns of weaker property market","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"Morgan Stanley Australia CEO Richard Wagner warned that new tax changes for property investors could trigger a market downturn while consumer sentiment is already weak. He called post-budget auction clearance rates 'quite alarming' and said certain pockets of the market face downward price pressure. Last month's federal budget reduced investors' ability to deduct losses and mortgage interest and removed a capital-gains tax discount, aiming to help first-time buyers into one of the world's least affordable markets. Investors make up 40% of the residential market, Wagner noted.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Morgan%20Stanley%20Australia%20CEO%20warns%20of%20weaker%20property%20market.pdf"},{"id":"bt-07","title":"Software sell-off: Singapore's private wealth gets more discerning on AI-era technology exposure","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Technology & AI"],"summary":"Asian family offices and high-net-worth allocators are re-evaluating their software exposure amid fears that traditional SaaS models are losing their structural moats to generative AI. Recent volatility crystallised the anxiety, with the iShares Software ETF plunging 30% over a few weeks on AI-displacement fears before an uneven 40% rebound that has since tapered. Allocators are pivoting away from generic software toward firms with deep data moats and structural resilience. The shift reflects a more discerning approach to AI-era technology bets among Singapore's wealthy.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Software%20sell-off%20Singapore%27s%20private%20wealth%20gets%20more%20discerning%20on%20AI-era%20technology%20exposure.pdf"},{"id":"bt-08","title":"Tech stocks could surpass S-Reits on iEdge Singapore Next 50 index if growth momentum keeps up: SGX","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"SGX said the technology sector could overtake S-REITs as the dominant force in the iEdge Singapore Next 50 Index if its early-year momentum holds, marking a shift from income-led toward growth exposure. The June review, effective June 22, added AEM Holdings, Top Glove, UI Boustead Reit and PC Partner Group, displacing Singapore Post, Digital Core Reit, Wee Hur Holdings and China Sunsine. SGX framed the change as technology's growing footprint coming at the expense of defensive, income-oriented segments. It signals an evolving tilt in Singapore's mid-cap landscape.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/Tech%20stocks%20could%20surpass%20S-Reits%20on%20iEdge%20Singapore%20Next%2050%20index%20if%20growth%20momentum%20keeps%20up%20SGX.pdf"},{"id":"bt-09","title":"The next financial crisis could start with advanced economies' sovereign debt","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"This commentary argues the next major financial shock may originate in advanced economies' sovereign debt markets rather than emerging ones. Public debt sits at historic highs across many developed economies, deficits remain elevated, and bond markets are increasingly sensitive to inflation, rates and investor confidence. It cites the 2007-08 crisis, the eurozone debt crisis and the UK's 2022 gilt turmoil as precedents for advanced-economy instability. Yet emerging markets, the author warns, would likely bear a disproportionate share of any resulting adjustment.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/The%20next%20financial%20crisis%20could%20start%20with%20advanced%20economies%27%20sovereign%20debt.pdf"},{"id":"bt-10","title":"US existing-home sales jump to highest this year, top forecasts","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"US existing-home sales rose 3.2% in May to an annualised 4.17 million, the fastest pace this year and above all estimates in a Bloomberg survey. NAR chief economist Lawrence Yun said more Americans are on the move, calling it 'great news for the housing market and the economy'. The figures point to thawing in a resale market stuck near a 4 million pace for about three years, with pending sales improving and sellers conceding on price. Mortgage rates have risen above 6.5% in recent months, a lingering headwind.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/US%20existing-home%20sales%20jump%20to%20highest%20this%20year%2C%20top%20forecasts.pdf"},{"id":"bt-11","title":"US$165 billion of renewable energy assets in Asean face high risk of climate hazards: report","source":"BT","date":"11 Jun 2026","tags":["Environment","Southeast Asia"],"summary":"A Zurich Insurance report found about 75% of renewable energy sites across South-east Asia, including planned and under-construction projects, are at high risk of severe climate-related events by 2030. That puts roughly US$165 billion of regional renewable value at risk across some 1,380 solar, wind, hydropower and geothermal sites. The report found an upfront investment of about US$13 billion, about 2% of asset value, to make the assets climate-resilient could avoid US$82 billion in losses, a 6.5-times return. Only Timor-Leste was excluded from the assessment.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/US165%20billion%20of%20renewable%20energy%20assets%20in%20Asean%20face%20high%20risk%20of%20climate%20hazards%20report.pdf"},{"id":"bt-12","title":"iCapital strengthens Apac presence as demand for alternatives surges among wealthy investors","source":"BT","date":"11 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Temasek-backed fintech iCapital plans to expand its Asia headcount as high-net-worth demand for private-market access accelerates in Singapore and the region. Its Asia Advisor Survey 2025 found 38% of advisers in Singapore and Hong Kong reported rising client interest in alternatives, climbing to 100% among firms managing over US$3 billion. Globally, iCapital sees private-wealth alternatives allocations rising from US$4 trillion in 2022 to US$13 trillion by 2032. COO Jeff McGoey said Singapore's wealthy have shifted from whether to invest in alternatives to how.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20BT/iCapital%20strengthens%20Apac%20presence%20as%20demand%20for%20alternatives%20surges%20among%20wealthy%20investors.pdf"},{"id":"scmp-01","title":"As Japanese and Korean giants move upmarket, China's MLCC firms see their chance","source":"SCMP","date":"11 Jun 2026","tags":["Technology & AI","Trade"],"summary":"Surging AI-server demand is driving Japanese and South Korean makers of multilayer ceramic capacitors (MLCCs) further upmarket, opening lower-end share for Chinese competitors. MLCCs, dubbed the 'rice of the electronics industry', stabilise currents in devices from smartphones to AI servers and data centres. Goldman Sachs has described the current boom as 'the largest and longest cycle in history', with high-end orders fuelling capacity expansion and higher prices. Chinese firms still lag in advanced technology but see room to expand.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/As%20Japanese%20and%20Korean%20giants%20move%20upmarket%2C%20China%E2%80%99s%20MLCC%20firms%20see%20their%20chance.pdf"},{"id":"scmp-02","title":"As de-dollarisation trends persist, can the yuan take the euro's place?","source":"SCMP","date":"11 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"China's yuan-denominated CIPS payment system hit a single-day record of 1.22 trillion yuan (US$180.3 billion) on April 2, nearly doubling February's daily average, after Trump threatened to bomb Iran. The spike came as more oil producers scaled up 'petroyuan' settlements amid a de-dollarisation trend the Iran war has accelerated. The US dollar still dominates global settlements, but analysts say the yuan surpassing the euro for the No 2 spot looks more attainable in the short term. A slump in Europe could help the yuan gain ground.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/As%20de-dollarisation%20trends%20persist%2C%20can%20the%20yuan%20take%20the%20euro%E2%80%99s%20place.pdf"},{"id":"scmp-03","title":"Asia-Pacific home to more than a third of world's top finance centres: Colliers","source":"SCMP","date":"11 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"A Colliers report found Asia-Pacific cities account for 39% of top global financial-services firms and about 36% of the world's leading financial centres, signalling an eastward shift. New York remained the clear benchmark with 4.6 out of 5, followed by London at 3.9 and Singapore at 3.6, across rankings of more than 200 markets. Singapore, Beijing, Shanghai and Hong Kong ranked among the region's top talent hubs, supported by strong labour markets and venture capital. The report nonetheless affirmed New York's enduring concentration of financial headquarters.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Asia-Pacific%20home%20to%20more%20than%20a%20third%20of%20world%E2%80%99s%20top%20finance%20centres%20Colliers.pdf"},{"id":"scmp-04","title":"Beijing detects suspected Japanese spy planes near Taiwan","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Chinese state-affiliated media said two suspected Japan Coast Guard reconnaissance aircraft were spotted near a mainland maritime task force southeast of Taiwan, accusing them of snooping. The claim, carried by a CCTV-linked account, said the planes were detected at 6.15am and 2.11pm, one bearing the Coast Guard's distinctive livery. Beijing strengthened patrols east of Taiwan this month in response to May maritime-boundary talks between Japan and the Philippines. Those negotiations aim to delimit overlapping EEZs in the western Pacific, east of Taiwan.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Beijing%20detects%20suspected%20Japanese%20spy%20planes%20near%20Taiwan.pdf"},{"id":"scmp-05","title":"China sounds alarm over AI 'skills' that evade guard rails and mine crypto","source":"SCMP","date":"11 Jun 2026","tags":["Technology & AI"],"summary":"China's cybersecurity watchdog CNCERT warned that third-party AI 'skills' packages claiming to bypass model safety guard rails or enable crypto-mining expose users to data leaks and money-laundering risks. Issued via WeChat, the warning highlighted a fast-emerging grey market for unregulated AI extensions. Like smartphone apps, such skills function as plug-ins that connect AI agents to external databases and automate workflows. The watchdog said packages promising prohibited content can quietly run mining software and leak sensitive data.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/China%20sounds%20alarm%20over%20AI%20%E2%80%98skills%E2%80%99%20that%20evade%20guard%20rails%20and%20mine%20crypto.pdf"},{"id":"scmp-06","title":"China to bust Yangtze River chokepoint with US$11 billion 'water staircase' project","source":"SCMP","date":"11 Jun 2026","tags":["Trade","Environment"],"summary":"China has begun construction on a 77.2 billion yuan (US$11.4 billion) project to ease a freight chokepoint at the Three Gorges dam on the Yangtze River. The centrepiece is a series of mega ship locks, or 'water staircases', designed to double freight capacity and let larger vessels pass, linking inland industrial hubs to coastal ports. The decade-long buildout was included in China's 15th five-year plan (2026-2030). It is a cornerstone of Beijing's strategy to turn Asia's longest waterway into a high-capacity shipping conduit.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/China%20to%20bust%20Yangtze%20River%20chokepoint%20with%20US%2411%20billion%20%E2%80%98water%20staircase%E2%80%99%20project.pdf"},{"id":"scmp-07","title":"China's military warned against 'dangers of AI sycophancy' on the battlefield","source":"SCMP","date":"11 Jun 2026","tags":["Defence","Technology & AI"],"summary":"China's military mouthpiece PLA Daily warned of the 'dangers of AI sycophancy', where AI systems alter facts to match user biases, calling it a 'severe threat' as the military relies more on automation. The article said the risk far exceeds that in daily life, posing systemic erosion to command decisions and human-machine collaboration. China has said AI is being used across multiple weapon platforms. The commentary urged action to prevent sycophantic AI from undermining operational cognition on the battlefield.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/China%E2%80%99s%20military%20warned%20against%20%E2%80%98dangers%20of%20AI%20sycophancy%E2%80%99%20on%20the%20battlefield.pdf"},{"id":"scmp-08","title":"China's shipyards pass fresh milestone with delivery of vast specialised carrier","source":"SCMP","date":"11 Jun 2026","tags":["Trade","Defence"],"summary":"China's Jiangnan Shipyard delivered the world's largest ammonia carrier, the 93,000-cubic-metre Ivy Cove, marking a milestone in its push into high-value shipbuilding. It is the first of a six-ship order placed in 2023 by Singaporean shipowner Eastern Pacific Shipping, the first EPS has placed with Jiangnan. The shipyard said the order reflects Chinese builders' role in global decarbonisation. Already the dominant builder of bulk carriers and container ships, China is now capturing a rising share of hi-tech gas-carrier orders.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/China%E2%80%99s%20shipyards%20pass%20fresh%20milestone%20with%20delivery%20of%20vast%20specialised%20carrier.pdf"},{"id":"scmp-09","title":"Chinese pharmaceutical firms' cost advantages trump Pentagon blacklist: analysts","source":"SCMP","date":"11 Jun 2026","tags":["Trade","Geopolitics"],"summary":"Analysts say the Pentagon's blacklisting of contractor WuXi AppTec won't stop multinational drug makers from collaborating with Chinese biopharma firms, citing China's cost advantages. Jefferies' Cui Cui said multinationals still prefer made-in-China for cost efficiency and that WuXi's earnings visibility remains intact. The global industry seeks 'cost flexibility' amid drug-pricing reforms and looming patent expirations, giving China an edge. The blacklisting came via the Defence Department's updated Section 1260H list of alleged Chinese military-linked entities.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Chinese%20pharmaceutical%20firms%E2%80%99%20cost%20advantages%20trump%20Pentagon%20blacklist%20analysts.pdf"},{"id":"scmp-10","title":"Chinese propagandists stoking dissent over Trump tariffs and data centres, OpenAI says","source":"SCMP","date":"11 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"OpenAI said Chinese-speaking users tried to use ChatGPT to generate slogans and cartoons opposing Trump's tariffs and to intervene in US debates over data centres and AI. The company, which dated the activity to late 2025 and early 2026, said the efforts appeared to have had little or no effect. It nonetheless illustrates how central generative AI is becoming to digital influence campaigns, even those aimed at AI firms. China's Washington embassy said it firmly opposes 'groundless attacks or smears against China'.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Chinese%20propagandists%20stoking%20dissent%20over%20Trump%20tariffs%20and%20data%20centres%2C%20OpenAI%20says.pdf"},{"id":"scmp-12","title":"Hong Kong debt market heats up as Tencent, Swire raise US$5.2b in multi-currency deals","source":"SCMP","date":"11 Jun 2026","tags":["Finance & Markets"],"summary":"Tencent and Swire Pacific raised more than US$5.2 billion in fresh funding, underscoring Hong Kong's growing role as an international bond hub. The issuers offered bonds across US dollars, offshore yuan and Hong Kong dollars, highlighting the breadth of the city's fundraising platform. Tencent unveiled a dual-currency package of US$2.45 billion in dollar notes and 15 billion yuan (US$2.2 billion) in offshore yuan notes, days after announcing a US$30 billion medium-term note programme. The surge reflects strengthening investor appetite for Hong Kong debt.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Hong%20Kong%20debt%20market%20heats%20up%20as%20Tencent%2C%20Swire%20raise%20US%245.2b%20in%20multi-currency%20deals.pdf"},{"id":"scmp-13","title":"How will the Pentagon's expanded blacklist of Chinese firms affect Xi's US visit?","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Trade"],"summary":"The Pentagon's updated Section 1260H list expanded to 188 entities from 134, testing the fragile stability reached at last month's leadership summit. Many Chinese tech and industrial giants were targeted, including Alibaba, Baidu, BYD, Nio, WuXi AppTec, Unitree, TP-Link and solar firms JA Solar and Trina Solar. Analysts said the move highlights persistent intense competition despite efforts to ease tensions ahead of Xi's planned US visit. The blacklisting carries reputational and commercial weight even where direct sanctions don't immediately follow.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/How%20will%20the%20Pentagon%E2%80%99s%20expanded%20blacklist%20of%20Chinese%20firms%20affect%20Xi%E2%80%99s%20US%20visit.pdf"},{"id":"scmp-15","title":"Starlink rival Qianfan hits satellite milestone, but is it too slow and costly?","source":"SCMP","date":"11 Jun 2026","tags":["Technology & AI"],"summary":"China's Qianfan broadband network has placed more than 200 satellites in orbit, reaching 201 after a Zhuque-2E launch from the Gobi Desert, but faces concerns its rollout is too slow and costly. The latest mission delivered a direct-to-cell test satellite alongside a China Mobile satellite, following back-to-back launches from Taiyuan and the new Hainan spaceport. Despite a quickening pace, the Starlink challenger still lags official deployment targets. Analysts question whether it can scale economically against SpaceX's lead.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Starlink%20rival%20Qianfan%20hits%20satellite%20milestone%2C%20but%20is%20it%20too%20slow%20and%20costly.pdf"},{"id":"scmp-16","title":"Thousands of Iranians left without water in searing heat after US hits reservoirs","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Society"],"summary":"US strikes on the southern Iranian town of Sirik damaged two reservoirs, leaving about 20,000 residents without safe drinking water, Iranian state media said. The strikes also hit Jask and Qeshm Island in the Strait of Hormuz, after Washington said Iran downed a US Army Apache helicopter over Gulf waters. Local officials said conditions had become 'extremely difficult and critical' with temperatures between 45 and 50 degrees Celsius. The humanitarian toll underscores the widening civilian impact of the escalating conflict.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Thousands%20of%20Iranians%20left%20without%20water%20in%20searing%20heat%20after%20US%20hits%20reservoirs.pdf"},{"id":"scmp-17","title":"Trump says 'I love the inflation', as rate hits 3-year high amid Iran war","source":"SCMP","date":"11 Jun 2026","tags":["Politics","Energy"],"summary":"Trump brushed off US consumer inflation surging to a fresh three-year high in May, saying 'I love the inflation' when asked if he was concerned. Soaring energy prices driven by his war in Iran pose a key challenge for Republicans ahead of the midterms. House Speaker Mike Johnson said the remark was taken out of context, while Senate Democratic leader Chuck Schumer said it showed Trump's disdain for struggling families. Trump insisted price pressures would ease once the conflict ends.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Trump%20says%20%E2%80%98I%20love%20the%20inflation%E2%80%99%2C%20as%20rate%20hits%203-year%20high%20amid%20Iran%20war.pdf"},{"id":"scmp-18","title":"US midterms could bring 'renewed volatility' to China ties, veteran diplomat warns","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Politics"],"summary":"Veteran Chinese diplomat Bian Qingzu warned that a Democratic win in the 2026 US midterms could bring 'renewed volatility' to China-US relations. Writing on the China-US Focus website, he said the results are likely to have a 'profound impact' on the stability of bilateral ties. Bian cited mounting anti-Trump sentiment and widespread expectations that Democrats could retake the House and possibly the Senate. His commentary reflects Beijing's close attention to the electoral calculus shaping US-China policy.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/US%20midterms%20could%20bring%20%E2%80%98renewed%20volatility%E2%80%99%20to%20China%20ties%2C%20veteran%20diplomat%20warns.pdf"},{"id":"scmp-19","title":"UniIC, a smaller rival to CXMT, pushes for mainland China IPO amid memory supercycle","source":"SCMP","date":"11 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Xi'an UniIC, a DRAM maker backed by Tsinghua UniGroup, is accelerating its push for a Beijing listing, joining larger rival CXMT in seeking to ride the memory supercycle. UniIC recently completed its mandatory IPO tutoring phase, five months after initiating the process, per China Securities Regulatory Commission records. The move follows CXMT, China's top DRAM maker, winning Shanghai Stock Exchange approval for a colossal listing. Surging AI-driven global memory demand is fuelling the listing rush among Chinese chipmakers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/UniIC%2C%20a%20smaller%20rival%20to%20CXMT%2C%20pushes%20for%20mainland%20China%20IPO%20amid%20memory%20supercycle.pdf"},{"id":"scmp-21","title":"Was Xi's stance on China-North Korea military ties also a message for US, Russia?","source":"SCMP","date":"11 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Analysts say North Korea is gaining strategic value for China to counter the US, though Pyongyang may avoid intensifying military ties with Beijing. At a Monday meeting with Kim Jong-un, Xi Jinping said both sides should enhance exchanges in diplomacy, law enforcement and military affairs, per Xinhua, though North Korean media did not report the remarks in full. Denuclearisation was notably absent from their statements, a contrast with Xi's 2019 visit. For the first time since 1992, both leaders were accompanied by their defence ministers.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/11%20Jun%202026/11%20Jun%20SCMP/Was%20Xi%E2%80%99s%20stance%20on%20China-North%20Korea%20military%20ties%20also%20a%20message%20for%20US%2C%20Russia.pdf"}]},"2026-06-12":{"date":"2026-06-12","dayOfWeek":"Friday","totalArticles":54,"sourceCounts":{"WSJ":16,"ST":7,"BT":9,"SCMP":22},"executiveDigest":"After three days of escalating US-Iran clashes — a second day of exchanged fire and a US strike that killed three Indian sailors on a blockaded tanker — Trump abruptly called off further strikes, citing talks that could yield a deal 'this weekend', even as US inflation hit a three-year high of 4.2% that sent stocks lower and pushed the ECB toward its first hike in years.","briefingCards":[{"title":"Lead story — US-Iran clashes peak, then Trump calls off strikes","body":"After the most serious escalation since April — a second day of exchanged fire, a downed US Apache and a US missile strike that killed three Indian sailors on a blockaded tanker — Trump abruptly cancelled planned strikes on Thursday, citing negotiations that reached Iran's top leadership and a possible deal 'this weekend'. The US-led naval blockade stays until a deal is signed; sticking points are the sequencing of sanctions relief and Iran's roughly 11 tons of enriched uranium. Analysts warn Iran's decentralised 'Mosaic' command delegates wide latitude to local commanders, raising miscalculation risk."},{"title":"Markets & finance — 4.2% inflation jolts stocks and central banks","body":"US CPI hit a three-year high of 4.2% (energy was over 60% of the rise; petrol up ~40% year-on-year), sending the Dow, S&P 500 and Nasdaq down more than 1% and erasing over a year of real wage gains. The ECB is set for its first hike in nearly three years as eurozone inflation reached 3.2%, Bank Indonesia surprised with a 25bp rise, and gold plunged about 4% to a six-month low. Oracle beat with cloud revenue up 93% and a US$638b backlog, even as strategists warned valuations now top 1929's."},{"title":"Asia realignment — middle powers and the China-North Korea question","body":"Petronas signed a 20-year, 2m-tonne LNG deal with Japan's JERA, casting Anwar's Malaysia as a rising 'middle power' even as it hunts Russian crude with Hormuz shut. Taiwan expects its US$14b US arms package to advance after a HIMARS drill, while Beijing completed a seabed survey east of Taiwan. After Xi's Pyongyang visit omitted denuclearisation, analysts asked whether Beijing has quietly accepted a nuclear North Korea — whose enrichment capacity could expand 75%."},{"title":"Energy & climate — Hormuz shutdown lifts oil and EVs","body":"Brent rose to US$94.58 (from about US$73 pre-war) with warnings of US$150 if hostilities fully resume, and Malaysia scrambled for Russian and Turkish crude. The disruption is reshaping demand: EVs hit a record 66.7% of China's car sales in early June, and BYD seized Germany's plug-in hybrid crown (+232% in May). The Pentagon said it escorted 200 ships and 100m barrels through Hormuz over the past month, disputing Iran's 'closed' claim."},{"title":"Technology & AI — price war, self-improving models and a chip crunch","body":"OpenAI is weighing drastic token price cuts to fight Anthropic, which overtook its valuation after Claude Code went viral, as both chase recursive self-improvement alongside China's MiniMax, Alibaba and ByteDance. Oracle's remaining performance obligations leapt 363% to US$638b and an AMD-only, anti-Nvidia cloud (TensorWave) was valued at US$1.55b. A memory supercycle deepened — China's Biwin inked a US$1.86b flash deal bigger than its annual sales — as US lawmakers vowed to keep the AI lead from China."},{"title":"Singapore & SEA focus — wealth, tokens and a data-centre push","body":"DBS will offer retail tokenised gold (1g-backed) via digibank, JPMorgan doubled its Singapore private bankers to over 50 (private-bank AUM +41% to US$300b), and SGX turnover jumped 70% in May with the STI at a record 5,072. Keppel is chasing power-constrained data-centre markets and bid for Singapore's 200MW plan; Stripe relocated its global product head to Singapore. Meta began unwinding its US$2b buy of Singapore-based Manus AI under Beijing pressure, while Ong Ye Kung urged 'more globalisation' to ease public unease."}],"keyMetrics":[{"value":"4.2%","label":"US CPI (May)","sub":"3-year high; energy >60% of the rise"},{"value":"US$94.58","label":"Brent crude","sub":"Up from ~US$73 pre-war; US$150 risk"},{"value":"−4%","label":"Gold's plunge","sub":"~US$4,063, a 6-month low"},{"value":"66.7%","label":"EV share in China","sub":"Record week; petrol cars off top-10"},{"value":"+70%","label":"SGX May turnover","sub":"S$45.8b; STI at record 5,072"},{"value":"US$638b","label":"Oracle RPO backlog","sub":"+363% y/y on AI cloud contracts"}],"articles":[{"id":"wsj-01","title":"AI Shifts Cyber's Hardest Problem From Finding Flaws to Fixing Them","source":"WSJ","date":"12 Jun 2026","tags":["Technology & AI"],"summary":"Frontier AI models can detect software flaws at machine scale and chain minor weaknesses into viable attacks, shifting cyber's bottleneck from discovery to remediation, executives told WSJ. Visa, which joined Anthropic's Project Glasswing (its Mythos/Fable 5 model went public Tuesday), built a 'Mean Time to Adapt' metric and will open-source its Visa Vulnerability Agentic Harness Wednesday. Accenture's Rex Thexton said 'Prioritization is the new battleground'; smaller vendors and open-source projects with fewer resources are the weak link. Cyber chiefs from over a dozen states pressed Anthropic, OpenAI, Microsoft and Google for early-access testing as patching windows shrink to near zero.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/AI Shifts Cyber%E2%80%99s Hardest Problem From Finding Flaws to Fixing Them.pdf"},{"id":"wsj-02","title":"America's Four-Year Trucking Slump Is Finally Over","source":"WSJ","date":"12 Jun 2026","tags":["Trade","Finance & Markets"],"summary":"Trucking executives declared an end to a nearly four-year freight downturn as rates rose to sustainable levels, with the Logistics Managers' Index showing transportation prices climbing in May at the fastest rate in the report's 10-year history. Dry-van spot rates for the week ended June 5 were up about 52% year-over-year excluding fuel surcharges, per FTR and Truckstop.com. Estes Express president Webb Estes called it 'a breath of air,' while NFI's Sidney Brown said it was 'a supply-driven freight recovery' after Trump administration crackdowns on immigrant drivers pushed many carriers out. Data-center demand lifted flatbed spot rates to an all-time high, though housing and consumer demand stayed flat.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/America%E2%80%99s Four-Year Trucking Slump Is Finally Over.pdf"},{"id":"wsj-03","title":"Anti-Nvidia Data-Center Startup Is Valued at $1.55 Billion in New Funding Round","source":"WSJ","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Las Vegas cloud-computing startup TensorWave, which refuses to use Nvidia chips and runs exclusively on AMD hardware, closed a Series B led by AMD and hedge fund Magnetar Capital, raising $350 million at a $1.55 billion post-money valuation, nearly quadrupling its value from a $400 million round about a year ago. CEO Darrick Horton, 28, said 'I don't like buying things from monopolies,' calling Nvidia a 2023-era 'monopoly by default.' TensorWave runs three data centers in Pennsylvania, Arizona and Florida with 10,000 GPUs and 14 megawatts of capacity, and has signed leases for 500 megawatts, aiming for 2 gigawatts within a year. It has helped improve AMD's ROCm software to rival Nvidia's CUDA, targeting inference workloads.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Anti-Nvidia Data-Center Startup Is Valued at $1.55 Billion in New Funding Round.pdf"},{"id":"wsj-04","title":"ECB to Keep Guard Up Despite Muted Signs of Inflation Spiral","source":"WSJ","date":"12 Jun 2026","tags":["Finance & Markets","Energy"],"summary":"The European Central Bank is set to raise interest rates Thursday for the first time in nearly three years as higher energy prices from the Middle East war spill into broader inflation, though economists say second-round effects remain limited. Eurozone inflation accelerated to 3.2% in May while core unexpectedly rose to 2.5% and services inflation reached 3.5%, surprising Commerzbank's Vincent Stamer. Pantheon's Claus Vistesen expects the ECB to lift its inflation forecast and possibly hike again in July, saying policymakers would 'much rather run the risk of hiking now.' Wage demands have stayed muted so far, but Pantheon sees food inflation climbing to 4-5% next year as Strait of Hormuz closures crimp fertilizer chemicals.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/ECB to Keep Guard Up Despite Muted Signs of Inflation Spiral.pdf"},{"id":"wsj-05","title":"Gas Prices Wipe Out More Than a Year of Wage Gains","source":"WSJ","date":"12 Jun 2026","tags":["Energy","Finance & Markets"],"summary":"Surging gasoline prices have erased over a year of US wage gains, with inflation-adjusted average hourly earnings falling 0.7% below year-earlier levels in May, the biggest gap since February 2023 and the second straight month inflation topped earnings growth. The drop followed the late-February US and Israeli attacks on Iran, knocking real earnings back to January 2025 levels. Regular gasoline averaged $4.15 a gallon Wednesday per AAA, down from May's $4.49 but well above the year-earlier $3.12. White House spokesman Kush Desai said the administration will keep 'pushing our affordability agenda.'","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Gas Prices Wipe Out More Than a Year of Wage Gains.pdf"},{"id":"wsj-06","title":"Inflation Heated Up to 4.2% in May, as Energy Costs Continued to Bite","source":"WSJ","date":"12 Jun 2026","tags":["Finance & Markets","Energy"],"summary":"US consumer prices rose 4.2% year-over-year in May, a three-year high, up from 3.8% in April, as the Iran war pushed energy prices higher, the Labor Department said Wednesday. The energy index accounted for over 60% of the monthly CPI increase, with gasoline jumping 7% on the month and over 40% from a year earlier; core prices rose a milder 2.9% annually and 0.2% on the month. Economists including RSM's Joe Brusuelas said May likely marks the peak, assuming gas prices don't reaccelerate on Hormuz conflict. The Dow, S&P 500 and Nasdaq all fell more than 1%, and the report leaves Fed officials, gathering soon under new Chairman Kevin Warsh, debating whether a rate increase belongs back on the table.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Inflation Heated Up to 4.2%25 in May%2C as Energy Costs Continued to Bite.pdf"},{"id":"wsj-07","title":"Inflation Is Picking Investors' Pockets","source":"WSJ","date":"12 Jun 2026","tags":["Finance & Markets"],"summary":"WSJ columnist Spencer Jakab warns that inflation, 'the cruelest tax,' is quietly eroding equity returns as tech stocks took their second plunge in three sessions and investors rotated into names like J.M. Smucker and Home Depot ahead of the CPI report and SpaceX's IPO. The Fed's preferred gauge has run above target for 62 straight months; the S&P 500 is up almost 50% over five years after inflation versus 72% unadjusted. Citing Absolute Strategy Research's Ian Harnett and David Bowers, who see stagflation as a key risk, the piece notes the S&P took 15 years (2000-2015) to break even after inflation post-tech-bubble, with even longer recoveries from 1929 and 1965. Today's cyclically adjusted valuation tops 1929's and the dividend yield is near a record low.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Inflation Is Picking Investors%E2%80%99 Pockets.pdf"},{"id":"wsj-08","title":"North Korea's Uranium Enrichment Capacity Could Soon Expand by 75%, Analysis Says","source":"WSJ","date":"12 Jun 2026","tags":["Defence","Geopolitics"],"summary":"North Korea's uranium-enrichment capacity could expand by 75% once a new Yongbyon facility reaches full production, signaling Kim Jong Un intends to grow his arsenal, according to London-based nonprofit Vertic. The site is estimated to house over 9,000 centrifuges producing roughly 160 kilograms of highly enriched uranium a year, atop a prior 215 kilograms, with a total stockpile near 2,100 kilograms. Vertic's Grant Christopher said 'they're running up the numbers,' while SIPRI estimates 60 warheads plus material for 90 more, up from about 50 in 2025. Built in roughly 18 months from late 2024, the facility sat openly in central Yongbyon; China, during Xi Jinping's Pyongyang visit this week, did not publicly mention denuclearization.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/North Korea%E2%80%99s Uranium Enrichment Capacity Could Soon Expand by 75%25%2C Analysis Says.pdf"},{"id":"wsj-09","title":"Now Is a Good Time to Buy Into America's Mega Utility Merger","source":"WSJ","date":"12 Jun 2026","tags":["Energy","Finance & Markets"],"summary":"WSJ's Jinjoo Lee argues NextEra Energy's roughly 9% share drop since announcing its acquisition of Dominion Energy makes it a buying opportunity, attributing the slide to a regulatory 'merger penalty box' and Dominion's troubled offshore wind project, which hit cost overruns and a Trump administration stop-work order. NextEra has promised $2.25 billion in bill credits for Dominion customers, while the deal adds Virginia's data-center-rich demand growth of 5-6% annually and lifts regulated earnings from about 70% to over 80%. The share decline cut roughly $18 billion off NextEra's market value, far above the $4.83 billion termination fee. Approvals across Virginia, South Carolina and North Carolina are expected to take 12 to 18 months; NextEra targets 8%-plus EPS growth standalone.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Now Is a Good Time to Buy Into America%E2%80%99s Mega Utility Merger.pdf"},{"id":"wsj-10","title":"OpenAI Considers Drastic Price Cuts, Anticipating War for Users With Anthropic","source":"WSJ","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"OpenAI is weighing significant cuts to its token pricing to win customers from Anthropic, anticipating similar cuts from its rival, people familiar told WSJ. CEO Sam Altman said costs had become 'a huge issue' and the company could 'help people get more value for less spend,' though deep cuts could erode both firms' already loss-making margins. Anthropic's revenue surged after its coding tool Claude Code went viral and the five-year-old startup surpassed OpenAI's valuation for the first time, prompting OpenAI to focus on its Codex tool. OpenAI confidentially filed for an IPO this week, with Altman telling staff it plans to go public 'within the next year'; News Corp, the Journal's owner, has a content-licensing deal with OpenAI.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/OpenAI Considers Drastic Price Cuts%2C Anticipating War for Users With Anthropic.pdf"},{"id":"wsj-11","title":"Oracle Reports Higher Profit on Surging Cloud Revenue","source":"WSJ","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"Oracle reported a fourth-quarter profit of $4.3 billion, or $1.45 a share (adjusted $2.11, beating the $1.96 expected), as total revenue rose 21% to $19.18 billion and cloud revenue reached $9.9 billion, with cloud-infrastructure revenue up 93% year-over-year. Co-CEO Clay Magouyrk said 'AI infrastructure makes the existing cloud infrastructure market look small,' citing trillions in annual market size, while software revenue fell 2% to $6.8 billion. Remaining performance obligations hit $638 billion, up 363% year-over-year, driven by large AI contracts; CFO Hillary Maxson guided to about $70 billion net capex for fiscal 2027 and warned of near-term margin pressure. Shares closed down 2.2% at $201.26 and fell further after hours, despite reaffirmed $90 billion fiscal-2027 revenue guidance.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Oracle Reports Higher Profit on Surging Cloud Revenue.pdf"},{"id":"wsj-12","title":"Second Flare-Up of Anti-Migrant Violence Signals Tensions in U.K.","source":"WSJ","date":"12 Jun 2026","tags":["Society","Politics"],"summary":"The UK faced a second bout of anti-immigration riots in a week after Hadi Alodid, a 30-year-old Sudanese asylum seeker, allegedly stabbed a man in north Belfast, leaving the victim with serious injuries and the loss of his left eye; Alodid was charged with attempted murder. Masked men set cars, buses and homes alight overnight Tuesday and targeted minorities, with Northern Ireland First Minister Michelle O'Neill condemning 'outright thuggery.' The unrest followed protests in southern England last week over a separate stabbing, with VP JD Vance blaming 'the mass invasion of migrants' and Elon Musk reposting attack footage and calling for protests. PM Keir Starmer accused Musk of 'trying to whip up division,' as Reform UK leads polls and the government's counterterror czar Jonathan Hall urged debate on immigration as a national-security issue.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Second Flare-Up of Anti-Migrant Violence Signals Tensions in U.K..pdf"},{"id":"wsj-13","title":"The World's Great Powers Are Learning They Have Limits","source":"WSJ","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Yaroslav Trofimov argues recent conflicts show great powers can't simply impose their will, as the US has failed to secure a strategic victory over Iran, which still blockades the Strait of Hormuz, while Ukraine has turned the tide against Russia despite Trump cutting US aid over a year ago. Officials including Italy's Guido Crosetto and the Netherlands' Gen. Onno Eichelsheim said drones and cheap precision missiles have leveled the field, making regime change by force 'no longer conceivable' and stalemate likely if victory isn't won within two weeks. China watches closely as it weighs Taiwan; retired Senior Col. Zhou Bo urged learning Russian drone tactics. Singapore's Bilahari Kausikan called the Thucydides 'strong do what they will' maxim 'crude fatalism,' warning Taiwan may lack the will to exercise its agency.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/The World%E2%80%99s Great Powers Are Learning They Have Limits.pdf"},{"id":"wsj-14","title":"Three Days of Clashes Show the Iran Conflict Is Entering a Dangerous New Phase","source":"WSJ","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Three days of US-Iran hostilities marked the most serious escalation since Trump's April ceasefire ended nearly 40 days of strikes that began Feb. 28, with both sides trying to apply pressure without returning to all-out war. An Iranian drone brought down a US Apache helicopter off Oman, prompting hours of US retaliatory strikes; Iran called the downing accidental, then launched missiles and drones at Gulf states and Jordan. Analysts said Iran's 'Mosaic' defense delegates wide latitude to ground commanders, raising miscalculation risks, while Iran's threshold for escalation has been killing US troops. Talks have stalled over the timing of sanctions relief and nuclear limits; Trump posted that Iran 'will have to pay the price' and reportedly weighed strikes on Iranian bridges and power plants.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Three Days of Clashes Show the Iran Conflict Is Entering a Dangerous New Phase.pdf"},{"id":"wsj-15","title":"Trump Calls for Short-Term Extension of Surveillance Program","source":"WSJ","date":"12 Jun 2026","tags":["Politics","Defence"],"summary":"President Trump urged Congress in a Truth Social post Wednesday to pass a short-term extension of FISA Section 702, which is set to expire Friday, citing national security and the coming World Cup and US 250th-anniversary events. Senate Majority Leader John Thune circulated a bill to extend the program to July 2, and Speaker Mike Johnson planned a Thursday fast-track vote needing a two-thirds majority. Democrats, including Sen. Mark Warner, say they won't reauthorize unless Trump drops his interim DNI pick Bill Pulte, whom critics call unqualified; Warner would back an extension if deputy Aaron Lukas leads instead. The program collects data on foreigners abroad but sweeps up Americans' communications; an intelligence court already approved surveillance through March 2027, so it wouldn't shut down immediately.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/Trump Calls for Short-Term Extension of Surveillance Program.pdf"},{"id":"wsj-16","title":"U.S., Iran Exchange Fire for Second Successive Day","source":"WSJ","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"The US launched a fresh wave of strikes on Iran Wednesday on Trump's orders, hitting dozens of targets including air defenses and radar sites near the Strait of Hormuz, after Trump said Iran was 'playing us for suckers' over a nuclear deal. Iran retaliated against Kuwait, Bahrain and Jordan, claiming a drone attack on the US Fifth Fleet in Bahrain; Defense Secretary Pete Hegseth said 'if we need to negotiate with bombs, we'll negotiate with bombs.' The Pentagon framed the strikes as coercive diplomacy, denying Iranian claims the strait was closed and saying the US had secretly escorted 200 ships carrying 100 million barrels of oil through it over the past month. Sticking points include sequencing of sanctions relief and Iran's roughly 11 tons of enriched uranium, with Trump demanding terms stricter than the 2015 deal.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun WSJ/U.S.%2C Iran Exchange Fire for Second Successive Day.pdf"},{"id":"st-01","title":"Citibank Singapore to expand offerings for wealthy clients, tap AI as competition heats up","source":"ST","date":"12 Jun 2026","tags":["Finance & Markets","Technology & AI","Southeast Asia"],"summary":"Citibank Singapore is expanding privileges for high-net-worth clients and deploying AI to grow its wealth business, after double-digit revenue and client investment asset growth in 2025 that sustained into Q1 2026. Citigold requires $250,000 in investible assets and Citigold Private Client at least $1.5 million; Citi Wealth manages over US$1 trillion in client balances and targets the estimated US$5 trillion held elsewhere by existing clients. New tools include Citi Sky, an agentic AI assistant with a virtual human avatar launching first for US Citigold clients in English and Spanish. Citi plans to hire about 100 private bankers and roughly 400 specialists globally; group wealth revenue rose 11 per cent to US$3.1 billion, with CEO Yeo Wenxian saying clients \"want clarity, conviction and connectivity across markets.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/Citibank%20Singapore%20to%20expand%20offerings%20for%20wealthy%20clients,%20tap%20AI%20as%20competition%20heats%20up.pdf"},{"id":"st-02","title":"DBS to launch gold in the form of digital tokens for retail customers","source":"ST","date":"12 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"DBS Group said on June 11 it will offer tokenised physical gold to retail customers via its digibank app in the second half of 2026, the first such Singapore offering letting retail customers digitally access, hold and trade tokenised gold on a single platform. Each DBS Physical Gold Token is backed by 1g of physical gold held in a dedicated DBS vault in Singapore, worth about $200 as at June 11. Gold hit a record US$5,600 an ounce earlier in 2026 but spot gold fell to US$4,111.95 on June 10, down 27 per cent from that peak. Physical gold holdings among DBS wealth clients have more than doubled over three years, and DBS is exploring listing the token on its DBS Digital Exchange for accredited and institutional investors.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/DBS%20to%20launch%20gold%20in%20the%20form%20of%20digital%20tokens%20for%20retail%20customers.pdf"},{"id":"st-03","title":"Drone rescue highlights US Navy's autonomous push","source":"ST","date":"12 Jun 2026","tags":["Defence","Technology & AI","Geopolitics"],"summary":"A US Navy Corsair unmanned surface vessel operated by the Fifth Fleet's Task Force 59 rescued two US Army aviators near the Strait of Hormuz on June 8 after they were apparently shot down by Iran, in what officials called the first sea drone rescue piloted from afar. The pair were carried by the drone before a helicopter plucked them from the sea in a two-hour operation. Task Force 59, unveiled in 2021, focuses on unmanned systems and AI; the 7m diesel-powered Corsair, made by Texas-based Saronic Technologies, was introduced to the region in March and can loiter autonomously for more than 50 days. Analysts said the rescue underscored the drones' versatility, with Bryan Clark of the Hudson Institute calling the role a \"surprise.\"","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/Drone%20rescue%20highlights%20US%20Navy's%20autonomous%20push.pdf"},{"id":"st-04","title":"JPMorgan doubles private bankers in Singapore team to over 50: Sources","source":"ST","date":"12 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"JPMorgan Chase has roughly doubled its Singapore-based relationship managers serving wealthy regional clients to more than 50, about twice the number from the start of 2025, sources said. Most hires targeted the Indonesian market, which grew to about 20 staff from fewer than 10 in 2025, with the bank poaching from top competitors. JPMorgan's private banking client assets soared 41 per cent in 2025 to US$300 billion, overtaking DBS as Asia's third-largest private bank excluding China, behind UBS and HSBC. Minimum client assets were lowered to US$10 million from US$25 million; Paul Thompson, head of Singapore and South-east Asia, said the firm achieved record revenue and AUM in 2025 and will keep investing in talent.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/JPMorgan%20doubles%20private%20bankers%20in%20Singapore%20team%20to%20over%2050%20Sources.pdf"},{"id":"st-05","title":"Microsoft's Xbox plans major layoffs in July: Sources","source":"ST","date":"12 Jun 2026","tags":["Technology & AI","Society"],"summary":"Microsoft's Xbox division is planning major job cuts in July, expected shortly after the fiscal year closes June 30, as new CEO Asha Sharma overhauls the unit to stem declining revenue, sources said. In a June 10 email, Sharma said the business had fallen to a 3 per cent \"accountability margin\" and that, excluding Activision Blizzard King, Xbox spent over US$20 billion over five years while annual revenue declined nearly half a billion. Xbox will also slash marketing and other budgets, having spent two years shuttering studios, cancelling games and raising prices as Game Pass growth plateaued. Sharma is reversing course on multiplatform releases, announcing on June 7 that Gears Of War: E-Day and Clockwork Revolution will not come to PlayStation or Switch; the PS5 has sold over 90 million units versus roughly a third for Xbox.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/Microsoft's%20Xbox%20plans%20major%20layoffs%20in%20July%20Sources.pdf"},{"id":"st-06","title":"Ong Ye Kung: Start at home to quell growing unease over globalisation","source":"ST","date":"12 Jun 2026","tags":["Politics","Trade","Society"],"summary":"Speaking at the 31st Nikkei Future of Asia forum in Tokyo on June 11, Singapore Health Minister Ong Ye Kung said discontent over globalisation can be allayed only if governments address citizens' bread-and-butter concerns, arguing the world has entered a \"new era of interdependence.\" He outlined three pillars: sound fiscal discipline, noting Japan, Germany and Britain each spend over 10 per cent of GDP on healthcare versus Singapore's roughly 5 per cent; economic models that generate growth and hope; and social cohesion amid immigration sensitivities, describing Singapore's approach as \"calibrated openness and deliberate integration.\" Ong said \"to address the insecurity of globalisation, we need more globalisation,\" warning decoupling is unrealistic. He cited Micron's first high-bandwidth memory packaging facility, opening by 2027 in his Sembawang Central division, as contributing about one-fifth of global HBM supply.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/Ong%20Ye%20Kung%20Start%20at%20home%20to%20quell%20growing%20unease%20over%20globalisation.pdf"},{"id":"st-07","title":"Why it's harder for China to keep North Korea in line","source":"ST","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"President Xi Jinping's June 8 visit to Pyongyang, welcomed with a 21-gun salute, showed North Korea has become a far more difficult partner for China to manage, this Bloomberg Opinion column by Karishma Vaswani argues. Though China accounts for more than 95 per cent of North Korea's trade, Kim Jong Un is stronger than at Xi's 2019 visit, with a growing nuclear arsenal of around 60 warheads and fissile material for at least 30 more, per SIPRI. A 2024 defence pact and North Korean troops fighting in Ukraine have transformed ties with Russia, with Pyongyang possibly supplying up to US$14 billion in soldiers and weapons in exchange for military technology. The official visit readout omitted any mention of denuclearisation, suggesting Beijing may now tolerate Kim's nuclear ambitions to preserve influence over the increasingly unpredictable partner.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12 Jun 2026/12 Jun ST/Why%20it's%20harder%20for%20China%20to%20keep%20North%20Korea%20in%20line.pdf"},{"id":"bt-01","title":"Alibaba, JD.com shares slide after Beijing slams price-cut promotions","source":"BT","date":"12 Jun 2026","tags":["Technology & AI","Trade","Finance & Markets"],"summary":"Alibaba shares fell as much as 5.9% on Jun 11 in Hong Kong, their biggest intraday drop in nearly three months, closing 5.4% down, while JD.com closed 2.9% lower. The Beijing branch of China's State Administration for Market Regulation summoned the two firms, plus PDD, ByteDance and Xiaohongshu, over alleged false advertising during the annual '618' midyear shopping festival, per CCTV. Officials said some companies seemingly promised tens of billions of yuan in subsidies but failed to provide details. The name-and-shame campaign reflects Beijing's push to curb price wars eroding profits, as May consumer prices rose just 1.2%.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Alibaba,%20JD.com%20shares%20slide%20after%20Beijing%20slams%20price-cut%20promotions.pdf"},{"id":"bt-02","title":"BOJ governor Ueda's absence fuels market nerves over rate meeting","source":"BT","date":"12 Jun 2026","tags":["Finance & Markets","Politics"],"summary":"BOJ governor Kazuo Ueda is expected to miss the central bank's Jun 15-16 policy meeting due to hospitalisation, refraining from voting but issuing his views via statement, with deputy Ryozo Himino as acting chair and Shinichi Uchida hosting the press conference. Officials are set to consider a quarter-point hike to the benchmark rate, with a further increase possible later in 2026. Overnight index swaps showed the hike's odds briefly fell to about 73% on Jun 11 before nearly fully pricing it in again. The yen was little changed at 160.5 per US dollar; analysts said the key question is how Uchida handles communication.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/BOJ%20governor%20Ueda's%20absence%20fuels%20market%20nerves%20over%20rate%20meeting.pdf"},{"id":"bt-03","title":"CDL, Hong Realty trump 3 other bidders with S$542.4 million offer at S$1,865 psf ppr for Peck Hay plot","source":"BT","date":"12 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"An 80:20 City Developments (CDL) and Hong Realty joint venture placed the top bid of S$542.4 million, or S$1,865.15 psf ppr, for a 99-year leasehold site at Peck Hay Road near Newton MRT, in a GLS tender that closed Jun 11 with four bids. The price was 2.5% above the S$1,820 psf ppr fetched for a nearby Bukit Timah Road plot in November, and 8.4% above the second-highest bid of about S$1,720 psf ppr from Sunway MCL and CSC Land. The JV plans a 39-storey tower with about 380 units; consultants estimate launch prices of S$3,400 to S$3,900 psf. CBRE's Tricia Song said \"developers are hungry to replenish their depleted landbanks\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/CDL,%20Hong%20Realty%20trump%203%20other%20bidders%20with%20S542.4%20million%20offer%20at%20S1,865%20psf%20ppr%20for%20Peck%20Hay%20plot.pdf"},{"id":"bt-04","title":"Euro awaits ECB rate hike, dollar muted","source":"BT","date":"12 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"The euro held steady at US$1.1536 on Jun 11 ahead of an ECB meeting expected to raise rates for the first time in nearly three years, with markets watching for guidance on back-to-back June and July hikes. The pound traded at US$1.3364 and the yen at 160.5 per dollar, near levels prompting Tokyo intervention fears. US CPI rose 4.2% in the 12 months through May, the largest gain since April 2023, though core CPI gained just 0.2% on the month. Traders have fully priced a 25-basis-point Fed hike by December, with the Fed expected to hold at Kevin Warsh's first meeting as chair next week.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Euro%20awaits%20ECB%20rate%20hike,%20dollar%20muted.pdf"},{"id":"bt-05","title":"Five areas to watch as renewed US-Iran hostilities rattle global markets","source":"BT","date":"12 Jun 2026","tags":["Geopolitics","Energy","Finance & Markets"],"summary":"A collapse of the US-Iran ceasefire, after a US helicopter downing on Jun 9 and the renewed closure of the Strait of Hormuz, is forcing a broad portfolio reassessment across oil, equities, central banks, forex and gold. Rystad's Jorge Leon warned a full resumption could drive oil towards US$150 a barrel; Brent rose nearly US$1.50 to US$94.58 on Jun 11. The Nasdaq 100 closed nearly 2% lower as capital rotated into defensive sectors, while Bank Indonesia made a surprise 25bp hike to 5.5%. Spot gold plunged over 4% to about US$4,063 an ounce, a more than six-month low.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Five%20areas%20to%20watch%20as%20renewed%20US-Iran%20hostilities%20rattle%20global%20markets.pdf"},{"id":"bt-06","title":"Keppel eyes constrained markets as next frontier of data centre growth","source":"BT","date":"12 Jun 2026","tags":["Technology & AI","Energy","Southeast Asia"],"summary":"Keppel is targeting data centre markets where land and power are scarce, betting constraints let it command higher prices, said data centre business CEO Wong Wai Meng, citing presence in Taiwan, Japan and Korea. Its 25 MW floating data centre in Singapore, using a seawater cooling system, begins operations in 2028 with 100% capacity already taken up. Keppel funds growth via its balance sheet and the Keppel Data Centre Fund, whose third vintage held about S$2.7 billion FUM at end-2025; with Keppel DC Reit the division manages about S$13 billion. Keppel has bid for the Singapore government's plan to build at least 200 MW of data centres.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Keppel%20eyes%20constrained%20markets%20as%20next%20frontier%20of%20data%20centre%20growth.pdf"},{"id":"bt-07","title":"Meta starts unwinding Singapore-based Manus deal by splitting operations, data","source":"BT","date":"12 Jun 2026","tags":["Technology & AI","Geopolitics","Trade"],"summary":"Meta Platforms has completed an operational split from agentic AI firm Manus and halted data sharing, a pivotal step in unwinding a US$2 billion acquisition opposed by Beijing. Since early June, Meta has barred Manus staff from its internal systems and stopped employees using Manus tools, with an internal memo saying Meta is \"sunsetting\" Manus. Chinese regulators demanded the deal be undone in April; Manus's founders Xiao Hong, Ji Yichao and Zhang Tao are exploring raising about US$1 billion for a buyback at a valuation matching the US$2 billion Meta paid. The China-founded firm relocated its headquarters and key staff to Singapore in 2025; investors including Tencent, ZhenFund and HSG have received proceeds.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Meta%20starts%20unwinding%20Singapore-based%20Manus%20deal%20by%20splitting%20operations,%20data.pdf"},{"id":"bt-08","title":"SGX securities trading value jumps 70% in May amid 'robust' trading activity","source":"BT","date":"12 Jun 2026","tags":["Finance & Markets","Southeast Asia"],"summary":"Singapore Exchange's securities market turnover rose 70% year on year to S$45.8 billion in May 2026, with securities daily average value up 79% to S$2.4 billion, the highest since October 2007, SGX reported on Jun 10. Derivatives traded volume gained 20% to 30.5 million contracts. The Straits Times Index advanced 3.5% month on month, hitting an all-time high of 5,072 points on May 19, while STI ETFs booked a 15th straight month of net inflows. Retail cumulative net inflows topped S$1.5 billion over the first five months; capital-raising picked up with JustCo's May 22 mainboard listing.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/SGX%20securities%20trading%20value%20jumps%2070%20in%20May%20amid%20'robust'%20trading%20activity.pdf"},{"id":"bt-09","title":"Stripe moves head of global product to Singapore to drive Asia-Pacific growth","source":"BT","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets","Southeast Asia"],"summary":"Stripe is relocating Abhinav Tiwari, 41, promoted to head of global product at the start of 2026, permanently to Singapore to drive its Asia-Pacific business, calling the move \"reflective of growth in the region\". He cited work with GCash, the Philippines' largest e-wallet, on a product expected to launch by end-June, and named Manus AI among Stripe clients. Founded in 2010 by John and Patrick Collison, Stripe processes over US$1.9 trillion in payments annually and entered Singapore in September 2016. Tiwari said Stripe is keen to partner Singapore's government on stablecoins via MAS's Project Bloom, calling them \"an absolute game changer\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20BT/Stripe%20moves%20head%20of%20global%20product%20to%20Singapore%20to%20drive%20Asia-Pacific%20growth.pdf"},{"id":"scmp-01","title":"China leads US in everyday AI apps but firms are overvalued, experts say","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Finance & Markets"],"summary":"At the 2026 HKEX Future Tech Summit in Shenzhen, Alibaba Cloud's Chi Zhang said China is only \"100 days behind\" the US in frontier AI capabilities and leads in consumer AI applications. Lixue Xia of Infinigence AI cited energy, infrastructure and open-source as China's AGI growth drivers, while some US firms have switched to cheaper Chinese vendors like DeepSeek. Investors warned valuations are overinflated: Matrix Partners China's Ti Tong called firms \"very expensive\" and near a bull-market top. CICC's Lou Xinyu said the market sits at an unprecedented high point.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%20leads%20US%20in%20everyday%20AI%20apps%20but%20firms%20are%20overvalued,%20experts%20say.pdf"},{"id":"scmp-02","title":"China races against US for AI's holy grail: self-improving tech","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Geopolitics"],"summary":"Anthropic said its Mythos model, released publicly on Tuesday, is edging closer to recursive self-improvement (RSI), while Chinese firms MiniMax, Xiaomi and Alibaba tout self-evolution advances. MiniMax's M3 reproduced an award-winning AI paper after running autonomously nearly 12 hours and optimised an FP8 GEMM kernel in about 24 hours; Alibaba's Qwen3.7-Max optimised a kernel in 35 hours, 10 times faster than usual. ByteDance-Tsinghua researchers automated CUDA kernel optimisation 100 per cent faster than prior methods. US start-ups Recursive Superintelligence and Ricursive Intelligence, both months old, are valued above US$4 billion each.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%E2%80%99s%20races%20against%20US%20for%20AI%E2%80%99s%20holy%20grail%20self-improving%20tech.pdf"},{"id":"scmp-03","title":"China's biotech industry sees global expansion as unstoppable, despite US pressure","source":"SCMP","date":"12 Jun 2026","tags":["Society","Geopolitics","Trade"],"summary":"Citic Securities' Zhang Jun told the HKEX Future Tech Summit that Chinese biotech globalisation is \"already irreversible\" despite US barriers, with Chinese firms now accounting for about half of all global biotech business-development deals. Akeso's cancer drug ivonescimab, hailed as biotech's \"DeepSeek moment\" after beating Merck's Keytruda, has been filed for US FDA approval via Summit Therapeutics, with approval possibly by year-end. The Pentagon this week added WuXi AppTec to a list alleging military links, and Representative John Moolenaar urged the Treasury to bar US investment in Chinese biotech. Macquarie's Tony Ren said broad decoupling from WuXi AppTec, the world's second-largest contract drug manufacturer, was unfeasible.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%E2%80%99s%20biotech%20industry%20sees%20global%20expansion%20as%20unstoppable,%20despite%20US%20pressure.pdf"},{"id":"scmp-04","title":"China's BYD claims Germany's plug-in hybrid crown, disrupting market of iconic auto giants","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Trade","Environment"],"summary":"BYD registered 6,169 vehicles in Germany in May, up 232 per cent year-on-year, for a 2.6 per cent market share, with 4,290 plug-in hybrids led by the Atto 2 DM-i (2,113 units) and over 15 per cent of the plug-in hybrid segment. Chairman Wang Chuanfu declared \"the worst is over\" and aims to make BYD the world's largest carmaker by volume within five years, with overseas sales hitting a record 160,000 units in May. BYD leverages the EU's 10 per cent tariff on Chinese hybrids versus 27 per cent on full EVs, alongside discounts up to 30 per cent and German subsidies. Schmidt Automotive Research found only 18,536 of 30,472 BYD vehicles registered since 2022 remained on German roads by early 2026.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%E2%80%99s%20BYD%20claims%20Germany%E2%80%99s%20plug-in%20hybrid%20crown,%20disrupting%20market%20of%20iconic%20auto%20giants.pdf"},{"id":"scmp-05","title":"China's central bank head says country a haven for asset diversification in volatile world","source":"SCMP","date":"12 Jun 2026","tags":["Finance & Markets","Geopolitics"],"summary":"PBOC governor Pan Gongsheng told representatives of about 30 central banks at a Shanghai conference co-hosted with the BIS that China's market depth offers diversification amid global volatility. Overseas institutions held 3.12 trillion yuan (US$460.5 billion) in China's interbank bond market by end-April (1.8 per cent of the total) and 4 trillion yuan in A-shares (about 3 per cent), both below China's roughly 17 per cent share of the global economy. J.P. Morgan's En Xuehai said Chinese assets were shifting from \"optional allocation\" to \"must-have\" in global portfolios. BIS general manager Pablo Hernandez de Cos stressed international cooperation amid rapid non-bank financial expansion.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%E2%80%99s%20central%20bank%20head%20says%20country%20a%20haven%20for%20asset%20diversification%20in%20volatile%20world.pdf"},{"id":"scmp-06","title":"China's ports are by far the most efficient in the world: World Bank study","source":"SCMP","date":"12 Jun 2026","tags":["Trade","Southeast Asia"],"summary":"A World Bank and S&P Global study released Wednesday placed seven Chinese trade hubs in the global top 10 for port efficiency in 2025. Fuzhou in Fujian claimed top spot, followed by Dalian and Oman's Salalah, with Hong Kong ninth, per the Container Port Performance Index covering more than 400 ports. The report cited East and South Asia's export focus, inter-port competition and sustained infrastructure investment. Ningbo in Zhejiang was highlighted for stable ship turnaround times amid Red Sea and US-Israel-Iran war supply disruptions.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/China%E2%80%99s%20ports%20are%20by%20far%20the%20most%20efficient%20in%20the%20world%20World%20Bank%20study.pdf"},{"id":"scmp-07","title":"Citic Securities breaks Fitch's rating ceiling with first 'A' category for Chinese brokerage","source":"SCMP","date":"12 Jun 2026","tags":["Finance & Markets"],"summary":"Fitch on Tuesday assigned an A-minus long-term issuer default rating with a stable outlook to Citic Securities and its Hong Kong subsidiary, the first mainland brokerage to enter the agency's A-category, which had historically capped Chinese brokers at the B-category. Fitch cited expected support from state-owned parent Citic Group, which holds over 12 trillion yuan (US$1.8 trillion) in assets, plus Citic Securities' market-leading franchise and expanding international presence. Operating income to average equity rose to 15.6 per cent in Q1 2026 from 9.9 per cent in 2024. The upgrade follows a 16 billion yuan share placement earmarked for international operations.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Citic%20Securities%20breaks%20Fitch%E2%80%99s%20rating%20ceiling%20with%20first%20%E2%80%98A%E2%80%99%20category%20for%20Chinese%20brokerage.pdf"},{"id":"scmp-08","title":"EVs capture two-thirds of China's car market in record-breaking week","source":"SCMP","date":"12 Jun 2026","tags":["Technology & AI","Energy","Environment"],"summary":"Electric vehicles hit a record 66.7 per cent of new car sales in mainland China during the first week of June, up from 62.9 per cent in May, with deliveries exceeding 152,000 units between June 1 and 7, per CPCA data. The surge came despite Beijing paring subsidies, with buyers of a 100,000 yuan EV now getting 12,000 yuan, down 40 per cent. Analyst Eric Han said the Middle East conflict and Iran's closure of the Strait of Hormuz \"has given Chinese EV makers an unexpected shot in the arm\". In May, no Chinese petrol-car brand ranked among the top 10 bestselling models, a market first.","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/EVs%20capture%20two-thirds%20of%20China%E2%80%99s%20car%20market%20in%20record-breaking%20week.pdf"},{"id":"scmp-09","title":"Exclusive: Killing of Indian sailors 'very unfortunate', US lawmaker says, as tensions rise","source":"SCMP","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Republican Congressman Rob Wittman called the US killing of three Indian sailors off Oman \"a very, very unfortunate incident\", saying the military is determining what happened. A US missile strike on Tuesday hit the Palau-flagged M/T Settebello, killing three of 28 crew (24 Indian); Central Command blamed the vessel for breaching a blockade by transporting Iranian oil. India summoned the US charge d'affaires and lodged a formal protest after three vessels with Indian crew were attacked in three days. Former NSC official Lisa Curtis called it \"one of the most difficult years for the US-India relationship in the last 25 years\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/ExclusiveKilling%20of%20Indian%20sailors%20%E2%80%98very%20unfortunate%E2%80%99,%20US%20lawmaker%20says,%20as%20tensions%20rise.pdf"},{"id":"scmp-10","title":"Has Beijing given up on a nuclear weapon-free Korean peninsula?","source":"SCMP","date":"12 Jun 2026","tags":["Geopolitics","Defence"],"summary":"Neither Beijing nor Pyongyang mentioned denuclearisation in statements on Xi Jinping's two-day state visit to North Korea this week, fuelling speculation China's stance is softening. Analysts including the International Crisis Group's William Yang said China is downplaying the goal as unrealistic given Pyongyang's enshrined nuclear status, but a Chinese expert insisted Beijing has \"never abandoned\" denuclearisation. Beijing is uneasy over deepening Pyongyang-Moscow ties, including a 2024 defence pact and North Korean troops fighting in Ukraine. Renmin University's Shi Yinhong said any Chinese mediation between Washington and Pyongyang would \"surely fail\".","url":"https://stcsg-my.sharepoint.com/personal/teoqingwei_tecity_com_sg/Documents/Tecity News Dashboard/12%20Jun%202026/12%20Jun%20SCMP/Has%20Beijing%20given%20up%20on%20a%20nuclear%20weapon-free%20Korean%20peninsula.pdf"},{"id":"scmp-11","title":"Have trade tensions scuppered EU-China talks ahead of tough Brussels decisions?","source":"SCMP","date":"12 Jun 2026","tags":["Trade","Geopolitics","Politics"],"summary":"An EU-China digital dialogue set for June 23 in Be
